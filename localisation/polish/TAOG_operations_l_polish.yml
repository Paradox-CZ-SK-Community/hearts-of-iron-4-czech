l_polish:
 operation_rescue_general: "Zachránit zajatého velitele"
 operation_rescue_general_desc: "§LJeden z našich velitelů byl zajat nepřítelem a je držen v zajetí. Musíme připravit operaci k jeho záchraně.§!"
 free_general_free_in_transit: "Osvobození během převozu"
 free_general_free_in_transit_desc: "Naši operativci zjistili, že se chystá přesun cíle, a připraví příležitost k zachycení a přepadení transportu na trase."
 free_general_assault_holding_area: "Útok na místo zadržení"
 free_general_assault_holding_area_desc: "Nepřítel drží našeho velitele na zabezpečeném místě, které naši operativci vypátrali. Připraví odvážný útok, aby zajatce osvobodili."
 free_general_disguise_and_extract: "Přestrojení a evakuace"
 free_general_disguise_and_extract_desc: "Naši operativci s využitím odborné prohnanosti pomohou zajatému veliteli vytvořit převlek, který mu umožní oklamat věznitele a uniknout na přátelské území."
