 POL_submarine_1: "Třída Wilk"
 POL_submarine_1_desc: "Třídu Wilk tvořily tři ponorky postavené Francouzi pro polské námořnictvo a uvedené do provozu na počátku 30. let 20. století. Vycházely z francouzské konstrukce třídy Saphir. Byly to poměrně velké ponorky o výtlaku téměř 1 000 tun. Byly vyzbrojeny šesti 550mm torpédomety a mohly se ponořit až do hloubky 80 m."
 POL_submarine_2: "Třída Orzeł"
 POL_submarine_2_desc: "Třídu Orzeł tvořily dvě ponorky postavené v Nizozemsku pro polské námořnictvo. Lodě byly dokončeny jen několik měsíců před německou invazí. Byly to velké ponorky o výtlaku 1 100 tun. Byly vyzbrojeny dvanácti 550mm torpédomety a měly hloubku ponoru 80 m."
 POL_submarine_3: "Třída Sokół"
 POL_submarine_3_desc: "Dvě ponorky třídy Sokół byly britské ponorky třídy U dokončené pro polské exilové námořnictvo v letech 1941-42. Lodě měly výtlak 540 tun a byly vyzbrojeny čtyřmi 533mm torpédomety. Měly kvalitní vybavení britským radarem a sonarem a hloubku ponoru 60 m."
 POL_submarine_4: "Třída Delfin"
 POL_destroyer_1: "Třída Wicher"
 POL_destroyer_1_desc: "Dva torpédoborce třídy Wicher byly prvními velkými hladinovými loděmi polského námořnictva a byly uvedeny do služby v letech 1930 až 1932. Byly velké, s výtlakem 1 540 tun. Podle projektu byly vyzbrojeny čtyřmi děly M1924 ráže 130 mm/40, která však byla těsně před německou invazí modernizována na 120mm švédská děla. Vylepšeny byly také jejich torpédomety a protiletadlová výzbroj."
 POL_destroyer_2: "Třída Grom"
 POL_destroyer_2_desc: "Dva torpédoborce třídy Grom byly postaveny v Británii pro polské námořnictvo a uvedeny do služby v roce 1937. Patřily k největším a nejrychlejším torpédoborcům druhé světové války. Jejich výtlak činil téměř 2 000 tun a v hlavní výzbroji byly vyzbrojeny pěti děly Bofors M34 ráže 120 mm/50 mm. Měly také šest torpédometů ráže 533 mm a dobrý doplněk protiponorkové obrany."
 POL_destroyer_3: "Třída Piorun"
 POL_destroyer_3_desc: "Polský torpédoborec Piorun byl britský torpédoborec třídy N postavený pro polské exilové námořnictvo a uvedený do služby v roce 1940. Měl výtlak 1770 tun a slušnou rychlost a spolehlivost. Byl vyzbrojen šesti hlavními děly ráže 120 mm/45 QF Mk XII a měl také pět 533mm torpédometů, slušné vybavení pro protiponorkovou obranu a tehdy nejnovější britský radar a sonar."
