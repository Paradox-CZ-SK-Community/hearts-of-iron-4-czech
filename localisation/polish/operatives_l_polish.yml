 lar_decryption_bonus_tech_desc: "Získáme §G+10 rychlost dešifrování§!"
 lar_decryption_bonus_tt: "Získáme §G+10 rychlost dešifrování§!"
 upgrade_airforce_department: "Oddělení leteckého zpravodajství"
 upgrade_airforce_department_desc: "§LOddělení leteckého zpravodajství bude užitečnou součástí naší agentury; bude zodpovědné za infiltraci nepřátelského letectva a shromažďování informací o pohybech nepřátelských letadel.§!"
 upgrade_anti_partisan: "Protipartizánská činnost"
 upgrade_anti_partisan_desc: "§LPropaganda je silný nástroj pro zajištění loajality našich občanů, ale vytvoření poslušnosti na nepřátelském území je mnohem složitější. Výcvikem operativců pro infiltraci nepřátelského odboje můžeme začít provádět efektivní zatýkání a ukončit jejich narušující činnost. Zahraniční partyzáni tak ztratí naději na návrat ke starému režimu.§!"
 upgrade_army_department: "Armádní oddělení"
 upgrade_army_department_desc: "§LZpravodajské informace o nepřátelské armádě jsou zásadní a je nutné vytvořit oddělení vojenského zpravodajství. Naši operativci budou vycvičeni k infiltraci nepřátelských sil, kde budou sloužit jako vojáci či generálové a hlásit nám tajemství zpoza nepřátelských linií.§!"
 upgrade_blueprint_stealing: "Krádeže nákresů"
 upgrade_blueprint_stealing_desc: "§LVíme, že náš nepřítel má tajné projekty experimentálních zbraní a vozidel, ale nevíme přesně jaké. Infiltrací těchto oddělení získáme nejen přehled o jejich plánech, ale i možnost využít tyto informace k rozvoji našeho vlastního zbrojního výzkumu.§!"
 upgrade_commando_training: "Výcvik komand"
 upgrade_commando_training_desc: "§LNaše oddělení se obvykle věnuje subtilnějším aspektům války, ale někdy je potřeba malý tým těžce vyzbrojených vojáků. Když všechny naše agenty vyškolíme ve způsobech válečného komanda, budou efektivnější při sabotážních operacích, snížíme šanci odhalení a zvýšíme schopnost získat nepřátelské kryptologické vybavení.§!"
 upgrade_crypto_strength: "Vládní šifrovací škola"
 upgrade_crypto_strength_2: "Strojově podporované šifrování"
 upgrade_crypto_strength_2_desc: "§LUkazuje se, že naše současné metody šifrování nestačí. Naši nejlepší odborníci navrhli stroj, který dokáže generovat nové šifry. Jeho nasazení učiní naše šifrování pro nepřítele prakticky neprolomitelné.§!"
 upgrade_crypto_strength_desc: "§LKódy a šifry se ukázaly jako nejúčinnější způsob ochrany našich sítí. Vládní komunikační úřad se zaměří na tvorbu nových a komplexních metod šifrování.§!"
 upgrade_decryption_boost: "Skupina pro rádiový odposlech"
 upgrade_decryption_boost_2: "Strojově podporované dešifrování"
 upgrade_decryption_boost_2_desc: "§LStroje se již osvědčily při šifrování dat, přičemž nejobtížnější je dešifrovat signály šifrované pomocí strojů. Stroje pro kryptoanalýzu jsou důležité při luštění zpráv, jejichž kód zatím neznáme, a budou cenným přínosem pro náš dešifrovací tým.§!"
 upgrade_decryption_boost_desc: "§LRádiové vlny umožnily komunikovat na dálku na velké vzdálenosti a signály jsou často šifrovány neustálou změnou frekvence vysílání s nepravidelnou frekvencí. Pokud chceme zachytit nepřátelskou komunikaci, musíme vytvořit odposlechovou skupinu, která se bude věnovat prolamování nepřátelského rádiového šifrování.§!"
 upgrade_diplo_training: "Diplomatický výcvik"
 upgrade_diplo_training_desc: "§LVýcvik našich agentů v „podmazávání“ zahraničních investorů a diplomatů je může přesvědčit o prospěšnosti naší věci a odvrátit jejich zájmy od nepřátel státu.§!"
 upgrade_economy_civilian: "Ekonomické oddělení"
 upgrade_economy_civilian_desc: "§LNaši agenti budou vycvičeni k tomu, aby vystupovali jako civilisté na nepřátelském území a působili v jeho průmyslovém i civilním sektoru; budou shromažďovat zpravodajské informace o nepřátelském průmyslu a ekonomice.§!"
 upgrade_form_department: "Založit oddělení"
 upgrade_form_department_desc: "§LKryptologie je metoda tvorby kódů a šifer pro udržení tajné komunikace. Bez správného klíče může být zpráva psaná šifrou téměř nepochopitelná. Stejně důležité jako dešifrování nepřítele je i šifrování vlastních dat.§!"
 upgrade_interrogation_techniques: "Techniky výslechu"
 upgrade_interrogation_techniques_desc: "§LČasto je účinnější zlomit mysl nepřátelského agenta než jeho tělo. Použití fyzického násilí je nespolehlivé a často vede k falešným informacím; skutečně schopný vyšetřovatel dokáže zlomit vůli nepřítele i bez násilí. Ale pokud na to přijde, máme způsoby, jak je přimět mluvit...§!"
 upgrade_invisible_ink: "Neviditelný inkoust"
 upgrade_invisible_ink_desc: "§LDopis napsaný neviditelným inkoustem vypadá pouhým okem jako prázdný list papíru, ale použití UV světla nebo chemikálií, jako je amoniak, odhalí jeho obsah. Standardizací používání neviditelného inkoustu zajistíme, že naše informace zůstanou tajné i při zachycení nepřítelem.§!"
 upgrade_naval_department: "Námořní oddělení"
 upgrade_naval_department_desc: "§LNámořní válka je klíčovou součástí dosažení vítězství a s pokrokem námořních technologií je nezbytné vytvořit oddělení námořního zpravodajství.§!"
 upgrade_passive_defense: "Pasivní obrana"
 upgrade_passive_defense_desc: "§LDomobrana může být klíčovým prvkem naší zpravodajské obrany. Výcvikem jednotek domobrany a posádek v oblasti špionáže a kontrašpionáže zajistíme trvalou obrannou přítomnost i v době, kdy jsou naši specialisté nasazeni jinde.§!"
 upgrade_plastic_explosives: "Plastické trhaviny"
 upgrade_plastic_explosives_desc: "§LPlastická struktura trhavin z nich činí ideální prostředek pro sabotáže nepřátelské výroby, proto je přirozené vyzbrojit jimi zahraniční partyzány. Nálože lze snadno umístit na skrytá a zranitelná místa továren a jejich tvárnost z nich činí ideální nástroj i pro spektakulární politické atentáty...§!"
 upgrade_portable_radios: "Přenosná rádia"
 upgrade_portable_radios_desc: "§LKonvenční radiokomunikační zařízení jsou příliš velká a nepraktická pro utajené operace, ale vytvořením kompaktních verzí maskovaných jako běžné předměty, například kufříky, umožníme agentům komunikovat kdykoliv bez vzbuzení podezření.§!"
 upgrade_psycho_warfare: "Psychologická válka"
 upgrade_psycho_warfare_desc: "§LPropaganda se osvědčila při prosazování našich ideologických zájmů doma, ale ještě účinnější je šíření strachu z nepřátelských režimů. Spoluprací s protiideologickými hnutími v zahraničí výrazně zvýšíme účinnost šíření naší ideologie po celém světě...§!"
 upgrade_suicide_pills: "Sebevražedné pilulky"
 upgrade_suicide_pills_desc: "§LAčkoliv je to nežádoucí, je nevyhnutelné, že někteří agenti padnou do zajetí. Musíme jim dát možnost uniknout hrůzám výslechu, a kyanidová kapsle ukrytá v zubu jim poskytne tuto poslední možnost, pokud to bude nutné.§!"
 upgrade_training_centers: "Místní výcviková centra"
 upgrade_training_centers_desc: "§LAčkoliv se naši agenti dokáží přizpůsobit jakémukoliv prostředí, kulturní zvyklosti a jazyky jsou přirozenější těm, kteří v dané kultuře vyrůstali. Pokud chceme vybudovat globální síť špionů, musíme rozšířit nábor a výcvik po celém světě a přijímat agenty z různých kultur a prostředí.§!"
