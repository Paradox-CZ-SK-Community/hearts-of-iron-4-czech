l_polish:
 AFG_industrial_events.10.a: "Je to v našem strategickém zájmu."
 AFG_industrial_events.10.b: "Nemáme potřebu se zaplétat do [FROM.GetAdjective] vnitřních záležitostí."
 AFG_industrial_events.10.desc: "[FROM.GetAdjectiveCap] vláda navrhla společný podnik, v jehož rámci bychom jim pomohli s rozvojem nedávno objevených ropných polí výměnou za dlouhodobé koncese na veškerou vytěženou ropu. Ačkoliv návrh působí upřímně, nemůžeme zaručit, že si zachováme přístup k ropě, pokud se rozmary [FROM.GetAdjective] vlády změní."
 AFG_industrial_events.10.t: "[FROM.GetNameDefCap] nám nabízí ropné koncese"
 AFG_industrial_events.11.a: "Bude to významný krok směrem k industrializaci."
 AFG_industrial_events.11.desc: "[FROM.GetAdjectiveCap] vláda souhlasila s investicemi do rozvoje našich ropných zdrojů výměnou za dlouhodobý podíl po zahájení těžby."
 AFG_industrial_events.11.t: "[FROM.GetNameDefCap] souhlasí s ropnou dohodou"
 AFG_industrial_events.12.a: "Pro projekt si tedy najdeme jiného partnera."
 AFG_industrial_events.12.desc: "Úzkoprsá [FROM.GetAdjective] vláda odmítla náš návrh na společný rozvoj ropných zdrojů."
 AFG_industrial_events.12.t: "[FROM.GetNameDefCap] odmítá ropnou dohodu"
 AFG_industrial_events.13.a: "Riskovali jsme a prohráli."
 AFG_industrial_events.13.b: "Tyto zdroje si vezmeme zpět pomocí síly."
 AFG_industrial_events.13.desc: "[FROM.GetAdjectiveCap] vláda znárodnila svůj ropný průmysl navzdory našim rozsáhlým investicím. Znárodnění vedlo k okamžitému ukončení dlouhodobých ropných koncesí, na kterých jsme se dohodli. Region nyní se zatajeným dechem očekává naši reakci."
 AFG_industrial_events.13.t: "[FROM.GetNameDefCap] znárodňuje ropný průmysl"
 AFG_industrial_events.14.a: "Nenecháme se zastrašit k podrobení."
 AFG_industrial_events.14.desc: "Arogantní [FROM.GetAdjective] režim vyhlásil svůj záměr svrhnout naši spravedlivou vládu za to, že jsme spáchali „zločin“ využívání našich přírodních zdrojů ve prospěch vlastního lidu. Zatím není jasné, jak hodlají své hrozby uskutečnit, ale měli bychom zahájit přípravy na vojenský vpád na naše území."
 AFG_industrial_events.14.t: "[FROM.GetName] vyhlašuje válku na [ROOT.GetName]"
 AFG_industrial_events.15.a: "Záležitost je tedy uzavřena."
 AFG_industrial_events.15.desc: "[FROM.GetNameDef] vláda použila tvrdou rétoriku ohledně našeho znárodnění ropného průmyslu. Neexistují však žádné náznaky, že by hodlali záležitost dále eskalovat."
 AFG_industrial_events.15.t: "[FROM.GetNameDefCap] klade znárodnění jen malý odpor"
 AFG_industrial_events.16.a: "Dalo se to očekávat."
 AFG_industrial_events.16.desc: "V důsledku nedávných nepřátelských akcí mezi našimi zeměmi [FROM.GetNameDef] pozastavuje naše ropné koncese v této zemi. I kdyby boje skončily, je pravděpodobné, že si budou chtít zachovat kontrolu nad vlastními zdroji."
 AFG_industrial_events.16.t: "[FROM.GetAdjectiveCap] ropné koncese pozastaveny"
 AFG_industrial_events.20.a: "Posilování našeho vlivu v regionu je důležité."
 AFG_industrial_events.20.b: "[FROM.GetNonIdeologyName] nehraje žádnou roli v našich dlouhodobých plánech"
 AFG_industrial_events.20.desc: "[FROM.GetAdjectiveCap] vláda prosazuje politiku zvýšení zahraničních investic a obrátila se na nás ohledně našeho zájmu. Ačkoliv z této dohody nezískáme výrazný ekonomický přínos, šlo by o vynikající příležitost, jak nakazit [FROM.GetAdjective] vládu naším způsobem uvažování."
 AFG_industrial_events.20.t: "[FROM.GetName] - investiční příležitost"
 AFG_industrial_events.21.a: "Skvělé zprávy!"
 AFG_industrial_events.21.desc: "[FROM.GetNameDef] oznamuje svůj záměr investovat značné finanční prostředky do industrializace naší země. Ačkoliv je to pro nás ekonomicky velmi přínosné, musíme zůstat ostražití, aby [FROM.GetAdjective] vláda nevyužila této situace k přílišnému ovlivňování naší politiky."
 AFG_industrial_events.21.t: "[FROM.GetAdjectiveCap] vláda oznamuje investice"
 AFG_industrial_events.22.a: "$bftb_greece.194.a$"
 AFG_industrial_events.22.desc: "$bftb_greece.194.desc$"
 AFG_industrial_events.22.t: "$bftb_greece.194.t$"
 AFG_industrial_events.30.a: "Budeme požadovat, ať s námi [AFG.GetNonIdeologyName] jedná o využívání řeky."
 AFG_industrial_events.30.b: "Nyní si nemůžeme dovolit diplomatickou krizi."
 AFG_industrial_events.30.desc: "V posledních letech [FROM.GetAdjective] vláda realizovala řadu přehradních a zavlažovacích projektů na svých řekách. Ty vyústily v několik úprav toku řeky Hilmand, která protéká do našich východních provincií. Množství vody přitékající přes hranici se rok od roku znatelně snižuje a naši lidé se obávají, že pokud bude tento trend pokračovat, nebudou již moci řeku využívat. Musíme se rozhodnout, zda se s tím vypořádáme interně, nebo záležitost projednáme s [FROM.GetAdjective] vládou."
 AFG_industrial_events.30.t: "[FROM.GetNameDefCap] mění tok řeky Hilmand"
 AFG_industrial_events.31.a: "Možná bychom mohli smlouvu o vodních zdrojích?"
 AFG_industrial_events.31.b: "Voda je naše a můžeme s ní nakládat podle svého."
 AFG_industrial_events.31.desc: "[FROM.GetAdjectiveCap] vláda žádá o jednání ohledně našich nedávných úprav toku řeky Hilmand. Tvrdí, že naše přehrady a zavlažovací systémy snižují průtok vody přes hranici na nebezpečně nízkou úroveň. Někteří členové kabinetu navrhli uzavření smlouvy, která by regulovala tok vody přes hranici. To by pravděpodobně znamenalo omezení přínosů našich současných úprav, ale zároveň by to zmírnilo jejich dopad na [FROM.GetAdjective] obyvatelstvo za hranicí."
 AFG_industrial_events.31.t: "[FROM.GetNameDef] požaduje jednání o řece"
 AFG_industrial_events.32.a: "Zní to rozumně."
 AFG_industrial_events.32.b: "Uspokojí nás pouze úplné zrušení úprav."
 AFG_industrial_events.32.desc: "[FROM.GetAdjectiveCap] vláda navrhuje uzavření smlouvy o vodních zdrojích mezi našimi zeměmi, která by regulovala množství vody využívané pro zavlažovací projekty a zároveň nám zaručila minimální průtok vody přes hranici. Ačkoliv se návrhy zdají rozumné, pravděpodobně by to vyžadovalo, abychom se smířili s určitým snížením průtoku oproti historickému stavu."
 AFG_industrial_events.32.t: "[FROM.GetNameDefCap] navrhuje smlouvu o vodních zdrojích"
 AFG_industrial_events.33.a: "Nemáme prostředky na vojenskou eskalaci."
 AFG_industrial_events.33.b: "Pak situaci napravíme silou."
 AFG_industrial_events.33.desc: "[FROM.GetAdjectiveCap] vláda odmítla jakákoliv další jednání ohledně úprav toku řeky Hilmand s odůvodněním, že veškerá voda protékající jejich územím je jejich a mohou s ní nakládat dle libosti. Ustoupení v této fázi by je mohlo povzbudit k úplnému přerušení toku vody v budoucnu. Jakákoliv další eskalace by však vyžadovala ozbrojený konflikt."
 AFG_industrial_events.33.t: "[FROM.GetNameDefCap] odmítá další jednání"
 AFG_industrial_events.34.a: "Krize byla odvrácena."
 AFG_industrial_events.34.desc: "[FROM.GetAdjectiveCap] vláda souhlasila s uzavřením smlouvy o vodních zdrojích mezi našimi zeměmi za podmínky, že zajistí přijatelný minimální průtok vody přes hranici k nim. Ačkoliv nás to donutí nevyužívat přehrady v plném rozsahu jako dosud, alespoň se v blízké budoucnosti vyhneme jakémukoliv konfliktu ohledně řeky Hilmand."
 AFG_industrial_events.34.t: "[FROM.GetNameDefCap] souhlasí se smlouvou o vodních zdrojích"
 AFG_industrial_events.35.a: "Nemůžeme dovolit, aby to dále eskalovalo."
 AFG_industrial_events.35.b: "Pokud nejsou schopni rozumného jednání, nemá smysl v něm pokračovat."
 AFG_industrial_events.35.desc: "[FROM.GetNameDefCap] odmítá přijmout jakoukoliv smlouvu a místo toho požaduje úplné zrušení všech projektů na řece Hilmand, které snižují její průtok k nim. Zdá se, že jsou ochotni prosadit svou vůli silou, pokud odmítneme."
 AFG_industrial_events.35.t: "[FROM.GetNameDefCap] odmítá smlouvu o vodních zdrojích"
 AFG_industrial_events.36.a: "Bylo na čase."
 AFG_industrial_events.36.desc: "[FROM.GetAdjectiveCap] vláda souhlasila se zrušením mnoha úprav, které provedla na řece Hilmand. Ačkoliv to vůči nám bezpochyby vyvolalo značnou nevraživost, podařilo se nám prozatím vyhnout ozbrojené konfrontaci."
 AFG_industrial_events.36.t: "[FROM.GetNameDefCap] souhlasí se zrušením úprav Hilmandu"
 AFG_industrial_events.37.a: "Jaká absurdní eskalace."
 AFG_industrial_events.37.desc: "Podle zpráv se [FROM.GetAdjective] ozbrojené síly podél naší hranice mobilizují k invazi do údolí řeky Hilmand po krachu jednání mezi našimi vládami. Zdá se, že nemáme jinou možnost než obdobně mobilizovat vlastní síly."
 AFG_industrial_events.37.t: "[FROM.GetNameDefCap] připravuje své síly na invazi"
 AFG_industrial_events.38.a: "Zdá se, že úpravy jsou zatím v bezpečí."
 AFG_industrial_events.38.desc: "Navzdory týdnům vyhrocených jednání mezi našimi vládami se zdá, že [FROM.GetAdjective] vláda prozatím upustila od snah narušit naše přehradní a zavlažovací projekty. Pouze čas ukáže, zda tuto otázku znovu otevřou v budoucnu."
 AFG_industrial_events.38.t: "[FROM.GetNameDefCap] mlčí ohledně úprav Hilmandu"
 AFG_industrial_events.40.a: "Znepokojivý vývoj."
 AFG_industrial_events.40.desc: "Naše snahy o rozšíření vysokoškolského vzdělávání vedly k odporu ze strany nových absolventů, kteří si nedokážou najít zaměstnání odpovídající jejich kvalifikaci. To vedlo k deziluzi, kvůli níž se absolventi obracejí k radikální politice, aby ventilovali své frustrace."
 AFG_industrial_events.40.t: "Více univerzitních absolventů se radikalizuje"
 AFG_industrial_events.50.a: "Brzy budou osvobozeni!"
 AFG_industrial_events.50.desc: "Využitím přeshraničních vazeb našeho paštunského obyvatelstva se nám podařilo vyburcovat jejich příbuzné za hranicí k protivládním protestům a požadavkům na sjednocení pod naší vládou."
 AFG_industrial_events.50.t: "Paštunský odboj zapouští kořeny"
 AFG_industrial_events.51.a: "Znepokojivá situace."
 AFG_industrial_events.51.desc: "Buřiči, které podporuje [FROM.GetNonIdeologyName], zřejmě překračují hranici, aby vyvolávali nepokoje mezi paštunským obyvatelstvem. Hovoří se o sjednocení Paštunů pod [FROM.GetAdjective] vládou namísto té naší."
 AFG_industrial_events.51.t: "Paštunský odboj podél [AFG.GetAdjective] hranice"
 AFG_industrial_events.52.a: "Území způsobuje více problémů, než je jeho cena."
 AFG_industrial_events.52.b: "Je to naše suverénní území bez ohledu na jejich nároky."
 AFG_industrial_events.52.desc: "Kvůli přetrvávajícím napětím v některých převážně paštunských oblastech si [FROM.GetAdjective] vláda dovolila obrátit se na nás s nabídkou převzetí kontroly nad neklidnými regiony. Podezření, že po celou dobu stála za nedávnými nepokoji, jsou velmi silná."
 AFG_industrial_events.52.t: "[FROM.GetNameDefCap] navrhuje převod území"
 AFG_industrial_events.53.a: "Skvělé."
 AFG_industrial_events.53.desc: "Zabrána naléhavějšími problémy jinde [FROM.GetAdjective] vláda souhlasila s převodem části svého území, kde se paštunské nepokoje vymkly kontrole. Můžeme však mít nevratně poškozené vztahy s našimi [FROM.GetAdjective] sousedy kvůli našemu zasahování do jejich vnitřních záležitostí."
 AFG_industrial_events.53.t: "[FROM.GetNameDefCap] převádí území"
 AFG_industrial_events.54.a: "Nemáme zájem tuto situaci dále eskalovat."
 AFG_industrial_events.54.b: "Nebojíme se osvobodit území silou."
 AFG_industrial_events.54.desc: "Navzdory naší pečlivé manipulaci situace podél [FROM.GetAdjective] hranice jejich vláda odmítla předat kontrolu nad jakýmkoliv paštunským územím. Zdá se, že jedinou cestou k získání území je eskalace situace hrozbou vojenského zásahu."
 AFG_industrial_events.54.t: "[FROM.GetNameDefCap] odmítá převod území"
 AFG_industrial_events.55.a: "Nemáme mnoho jiných možností, než je uklidnit."
 AFG_industrial_events.55.b: "Jsme připraveni bránit naše území za každou cenu."
 AFG_industrial_events.55.desc: "[FROM.GetAdjectiveCap] vláda vydala prohlášení odsuzující naši okupaci údajně paštunských území a naznačila, že je připravena v případě potřeby osvobodit území silou. Samozřejmě mohou blufovat, ale v tuto chvíli nemáme možnost zjistit jejich skutečné úmysly."
 AFG_industrial_events.55.t: "[FROM.GetNameDefCap] hrozí válkou"
 AFG_industrial_events.56.a: "Je čas uskutečnit naše hrozby."
 AFG_industrial_events.56.b: "Musíme ustoupit."
 AFG_industrial_events.56.desc: "Nepřekvapivě nám [FROM.Capital.GetCapitalVictoryPointName] odmítá předat naše právoplatné pohraniční území. Musíme se tedy buď uchýlit k hrozbě vojenského vpádu, nebo riskovat ztrátu tváře na mezinárodní scéně."
 AFG_industrial_events.56.t: "[FROM.GetNameDefCap] odmítá ultimátum"
 AFG_industrial_events.57.a: "Vítězství mezinárodního práva a pořádku."
 AFG_industrial_events.57.desc: "[FROM.GetAdjectiveCap] vláda konečně dostala rozum a rozhodla se deeskalovat situaci podél hranice a vzdala se nároků na sporné pohraniční území, kde v poslední době napětí zesílilo."
 AFG_industrial_events.57.t: "[FROM.GetNameDefCap] se vzdává nároků"
 AFG_industrial_events.58.a: "Ukončeme tento konflikt."
 AFG_industrial_events.58.b: "Vyženeme je z našeho území."
 AFG_industrial_events.58.desc: "[FROM.GetAdjectiveCap] diplomaté nás oslovili s mírovou nabídkou pod podmínkou, že uznáme jejich kontrolu nad sporným paštunským územím podél hranice. Jelikož toto území v současnosti okupují, nemáme záruku, že je budeme schopni v dohledné době vytlačit. Zároveň by to však vytvořilo precedent, že si [FROM.GetNameDef] může postupně ukusovat z našich hranic."
 AFG_industrial_events.58.t: "[FROM.GetNameDefCap] nabízí podmínky příměří"
 AFG_industrial_events.59.a: "Pak budeme pokračovat v obraně našeho území."
 AFG_industrial_events.59.desc: "[FROM.GetAdjectiveCap] vláda odmítla naši nedávnou mírovou nabídku. Zjevně se domnívají, že stále nás dokážou vytlačit z našeho právoplatného území."
 AFG_industrial_events.59.t: "[FROM.GetNameDefCap] odmítá podmínky příměří"
 AFG_industrial_events_31_tt: "§RTento postup může vést k tomu, že se my a [FROM.GetNameDefCap] ocitneme ve vzájemné válce!§!"
 AFG_political_events.01.a: "Zajímavý návrh."
 AFG_political_events.01.b: "Pro tento region máme alternativní plány."
 AFG_political_events.01.desc: "[FROM.GetNameDef] nás oslovuje s odvážným návrhem na reorganizaci Střední Asie. Jejich plán vyžaduje, abychom jim předali kontrolu nad několika státy podél [FROM.GetAdjective] hranice a vytvořili novou socialistickou federaci, kterou bude spravovat [FROM.Capital.GetCapitalVictoryPointName]. To by nám mohlo umožnit pomoci s vybudováním silného nárazníkového státu v regionu, který by převzal část našich obranných povinností a uvolnil tak naši armádu pro nasazení jinde."
 AFG_political_events.01.t: "Návrh na sjednocení Střední Asie"
 AFG_political_events.02.a: "Výborně!"
 AFG_political_events.02.desc: "[FROM.GetNameDefCap] přijímá náš návrh na sjednocení Střední Asie do jednoho politického celku pod naší kontrolou. Zdá se, že po desetiletích nestability nastává pro náš lid nová éra."
 AFG_political_events.02.t: "[FROM.GetName] přijímá návrh"
 AFG_political_events.03.a: "Navždy nám stát v cestě nemohou."
 AFG_political_events.03.desc: "[FROM.GetNameDefCap] odmítá náš návrh na sjednocení Střední Asie do jednoho politického celku pod naší kontrolou. Přestože jde o zásadní neúspěch, sen ještě není mrtvý. Musíme jen vyčkat na správnou příležitost."
 AFG_political_events.03.t: "[FROM.GetName] odmítá návrh"
 AFG_political_events.10.a: "Tuto iniciativu podporujeme."
 AFG_political_events.10.b: "Jednoho suzeréna jsme se už zbavili a dalšího nepotřebujeme."
 AFG_political_events.10.desc: "[FROM.GetNonIdeologyName] nám předkladá zajímavý návrh na posílení obou našich zemí vytvořením konfederace. Ta by znamenala otevření hranic v rámci jednotného hospodářského prostoru a vytvoření společné zahraniční politiky na světové scéně. Zároveň by však omezila naši vlastní svobodu jednání."
 AFG_political_events.10.t: "[FROM.GetNameDefCap] navrhuje konfederaci"
 AFG_political_events.100.a: "Pokud to povede k dlouhodobému míru, kdo jsme, abychom odporovali?"
 AFG_political_events.100.b: "Nic takového neuděláme."
 AFG_political_events.100.desc: "[FROM.GetAdjectiveCap] vláda identifikovala strategickou nutnost vytvoření nárazníkového státu. Za tímto účelem formálně požádala o převod kontroly nad několika územími ve východním Íránu, aby bylo možné vytvořit stát Chorásán. Tvrdí, že tento nový nárazníkový stát bude v regionu působit jako stabilizační prvek."
 AFG_political_events.100.t: "Nárazníkový stát Chorásán"
 AFG_political_events.101.a: "Naše západní křídlo je konečně zabezpečeno."
 AFG_political_events.101.desc: "[FROM.GetNameDef] vláda souhlasila s převodem kontroly nad určenými územími ve východním Íránu. Tento převod nám podle plánu umožní založit nárazníkový stát Chorásán."
 AFG_political_events.101.t: "[FROM.GetNameDefCap] souhlasí se zřízením nárazníkového státu"
 AFG_political_events.102.a: "Budeme prosazovat svou agendu jinými prostředky."
 AFG_political_events.102.desc: "[FROM.GetAdjectiveCap] vláda bohužel odmítá náš návrh na převod kontroly nad požadovanými územími ve východním Íránu. Vyjádřila obavy ohledně důsledků takového kroku a jeho dopadu na regionální stabilitu."
 AFG_political_events.102.t: "[FROM.GetNameDefCap] odmítá návrh nárazníkového státu"
 AFG_political_events.11.a: "Výborně!"
 AFG_political_events.11.desc: "[FROM.GetAdjectiveCap] vláda souhlasila s naším návrhem na konfederaci. Nyní můžeme zahájit proces integrace našich politických a hospodářských systémů. To by mělo v blízké budoucnosti působit jako odstrašení pro naše regionální protivníky."
 AFG_political_events.11.t: "[FROM.GetName] souhlasí s konfederací"
 AFG_political_events.110.a: "Pokud nám dají pokoj."
 AFG_political_events.110.b: "Neustoupíme ani o píď."
 AFG_political_events.110.t: "[FROM.GetNameDefCap] požaduje území"
 AFG_political_events.111.a: "Výborně!"
 AFG_political_events.111.desc: "[FROM.GetNameDefCap] souhlasí s převodem států, které jsme požadovali. Po desetiletích sporů můžeme konečně přivítat náš dávno ztracený lid zpět."
 AFG_political_events.111.t: "[FROM.GetNameDefCap] souhlasí s odstoupením území"
 AFG_political_events.112.a: "Stálo to za pokus."
 AFG_political_events.112.b: "Pak si ho vezmeme silou."
 AFG_political_events.112.desc: "[FROM.GetAdjectiveCap] vláda odmítá převést státy, které jsme po ní požadovali. Zdá se, že budeme muset v budoucnu najít jiné způsoby, jak získat naše právoplatné území zpět."
 AFG_political_events.112.t: "[FROM.GetNameDefCap] odmítá odstoupit území"
 AFG_political_events.12.a: "Promarněná příležitost."
 AFG_political_events.12.desc: "[FROM.GetAdjectiveCap] vláda odmítla náš návrh na vytvoření konfederace mezi našimi zeměmi. Jde o zásadní selhání naší zahraniční politiky a vyvolalo to obavy ohledně toho, jak bude [FROM.GetNameDef] nyní nahlížet na naše dlouhodobé vztahy."
 AFG_political_events.12.t: "[FROM.GetName] odmítá konfederaci"
 AFG_political_events.120.a: "To odpovídá našim strategickým cílům v regionu."
 AFG_political_events.120.b: "[SOU.GetAdjectiveCap] krev nebude nikdy prolita pro [FROM.GetNonIdeologyName]!"
 AFG_political_events.120.desc: "Zástupci [AFG.GetAdjective] komunistického hnutí nás oslovili s žádostí o podporu jejich narůstající revoluce. Ačkoliv je sporné, zda je tato zkoušená země schopna udržet socialistickou ekonomiku, nemůžeme přehlédnout význam posouvání hranic socialismu hlouběji do Střední Asie a dále."
 AFG_political_events.120.t: "[FROM.GetNameDefCap] žádá o podporu"
 AFG_political_events.121.a: "Děkujeme, soudruzi!"
 AFG_political_events.121.desc: "Na důkaz svého závazku k ideálům mezinárodní solidarity [FROM.GetNameDefCap] souhlasí s tím, že nám pomůže v našem boji. Informovali nás, že k nám v blízké době vyrazí plně vybavení dobrovolníci z jejich ozbrojených sil."
 AFG_political_events.121.t: "[FROM.GetNameDefCap] nám přichází na pomoc"
 AFG_political_events.122.a: "Zrada socialistických ideálů."
 AFG_political_events.122.desc: "[FROM.GetNameDefCap] nám odmítá pomoci. Tvrdí, že naše revoluce je předčasná a odsouzená k nezdaru. Pro náš lid teď bude mimořádně snadné nesnášet všechno, co [FROM.GetNameDef] představuje."
 AFG_political_events.122.t: "[FROM.GetNameDefCap] odmítá naši podporu"
 AFG_political_events.130.a: "Tuto iniciativu podporujeme."
 AFG_political_events.130.b: "Jsou to blázni, že se nás na to vůbec ptají."
 AFG_political_events.130.desc: "[FROM.GetAdjectiveCap] vláda s námi konzultovala návrh na posílení své země vytvořením konfederace zahrnující část našeho území podél [ROOT.GetAdjective] hranice. To by znamenalo úpravu našich hranic, ale mohlo by to pomoci vytvořit silného spojence v regionu."
 AFG_political_events.130.t: "[FROM.GetNameDefCap] žádá o území"
 AFG_political_events.131.a: "Výborně!"
 AFG_political_events.131.desc: "[FROM.GetAdjectiveCap] vláda souhlasila s naším návrhem na konfederaci. Nyní můžeme zahájit proces integrace nového území do našeho politického a hospodářského systému. To by mělo v blízké budoucnosti působit jako odstrašení pro naše regionální protivníky."
 AFG_political_events.131.t: "[FROM.GetName] souhlasí s konfederací"
 AFG_political_events.132.a: "Promarněná příležitost."
 AFG_political_events.132.desc: "[FROM.GetAdjectiveCap] vláda odmítla náš návrh na vytvoření konfederace. Jde o zásadní selhání naší zahraniční politiky a vyvolalo to obavy ohledně toho, jak budou naše dlouhodobé vztahy s [FROM.GetNameDef] nyní vypadat."
 AFG_political_events.132.t: "[FROM.GetName] odmítá konfederaci"
 AFG_political_events.140.a: "Šarmantní mladík $AFG_mohammed_daoud_khan$."
 AFG_political_events.140.b: "Stále konzistentní $AFG_shah_mahmud_khan$."
 AFG_political_events.140.c: "Pevně tradicionalistický $AFG_muhammad_ibrahim_khan$."
 AFG_political_events.140.desc: "Tyto volby byly poněkud chaotické vzhledem k nedostatku předchozích zkušeností země s podobnými událostmi. Přesto se objevilo několik kandidátů s širokými programy, kteří se stali favority. Jak se však volební místnosti uzavírají, zdá se, že volba voličů je:"
 AFG_political_events.140.t: "Výsledky voleb"
 AFG_political_events.150.a: "Jen nás to posílí."
 AFG_political_events.150.b: "Jsou to blázni, že nás s tím vůbec oslovují."
 AFG_political_events.150.desc: "[FROM.GetAdjectiveCap] vláda nás oslovila s návrhem na posílení obou našich zemí částečnou integrací našich vojenských ekonomik. To by znamenalo, že bychom si v případě války museli navzájem pomoci, ale možná je to přijatelná cena za užší spolupráci."
 AFG_political_events.150.t: "[FROM.GetNameDefCap] žádá o obrannou smlouvu"
 AFG_political_events.151.a: "Výborně!"
 AFG_political_events.151.desc: "[FROM.GetAdjectiveCap] vláda souhlasila s naším obranným návrhem. Nyní můžeme zahájit proces integrace našich vojenských komplexů. To by mělo v blízké budoucnosti působit jako odstrašení pro naše regionální protivníky."
 AFG_political_events.151.t: "[FROM.GetName] souhlasí s rozšířením smlouvy"
 AFG_political_events.152.a: "Promarněná příležitost."
 AFG_political_events.152.desc: "[FROM.GetAdjectiveCap] vláda odmítla náš návrh na koordinaci obranného průmyslu a naše sny o tom, že [FROM.GetLeader] může být náš přítel, tak náhle končí."
 AFG_political_events.152.t: "[FROM.GetName] odmítá smlouvu"
 AFG_political_events.153.a: "V regionu by se nám hodilo více spojenců."
 AFG_political_events.153.b: "Proč zasahovat do tak vzdálených oblastí?"
 AFG_political_events.153.desc: "V diskrétní zprávě se na naši vládu obrátil $AFG_faqir_of_ipi$, tradicionalistický [FROM.GetAdjective] kmenový vůdce, se žádostí o podporu svého nástupu na trůn. Slibuje, že s naší podporou vybuduje silný [AFG.GetNonIdeologyName] sladěný s našimi zájmy."
 AFG_political_events.153.t: "$AFG_faqir_of_ipi$ nás žádá o pomoc"
 AFG_political_events.154.a: "Jak se nás opovažují zradit!"
 AFG_political_events.154.desc: "[FROM.GetAdjectiveCap] vláda odpověděla na naši žádost a s politováním odmítla přispět, aby se $AFG_faqir_of_ipi$ dostal na trůn. S odkazem na obavy z možného zapletení a současné geopolitické klima se [FROM.GetNameDef] raději zaměřuje na jiné strategické priority."
 AFG_political_events.154.t: "[FROM.GetNameDefCap] odmítá náš plán"
 AFG_political_events.155.a: "My jsme budoucnost pro [AFG.GetNonIdeologyName]!"
 AFG_political_events.155.desc: "V reakci na naši žádost [FROM.GetName] souhlasí s podporou nástupu $AFG_faqir_of_ipi$ na [ROOT.GetAdjective] trůn. Tato podpora bude zahrnovat vojenskou pomoc a vybavení k zajištění úspěchu našeho úsilí."
 AFG_political_events.155.t: "[FROM.GetNameDefCap] souhlasí s podporou"
 AFG_political_events.156.a: "Výborně!"
 AFG_political_events.156.desc: "Jak bylo dříve dohodnuto, [FROM.GetAdjective] vybavení je nám k dispozici od vypuknutí občanské války. Jejich operativci v hlavním městě nás rovněž ujistili, že [FROM.GetAdjective] jednotky v utajení brzy dorazí do země, aby nám pomohly v boji."
 AFG_political_events.156.t: "[JAP.GetAdjectiveCap] podpora dorazila"
 AFG_political_events.157.a: "Výborně!"
 AFG_political_events.157.desc: "Jak bylo dříve dohodnuto, [FROM.GetAdjective] vybavení je nám k dispozici od vypuknutí občanské války. Jejich operativci v hlavním městě nás rovněž ujistili, že [FROM.GetAdjective] jednotky v utajení brzy dorazí do země, aby nám pomohly v boji."
 AFG_political_events.157.t: "[GER.GetAdjectiveCap] podpora dorazila"
 AFG_political_events.158.a: "V regionu by se nám hodilo více spojenců."
 AFG_political_events.158.b: "Proč zasahovat do tak vzdálených oblastí?"
 AFG_political_events.158.desc: "V diskrétní zprávě se na naši vládu obrátil $AFG_faqir_of_ipi$, tradicionalistický [FROM.GetAdjective] kmenový vůdce, se žádostí o podporu svého nástupu na trůn. Slibuje, že s naší podporou vybuduje silný [FROM.GetNonIdeologyName] sladěný s našimi zájmy."
 AFG_political_events.158.t: "$AFG_faqir_of_ipi$ nás žádá o pomoc"
 AFG_political_events.159.a: "Jak se opovažují nás zradit!"
 AFG_political_events.159.desc: "[FROM.GetAdjectiveCap] vláda odpověděla na naši žádost a s politováním odmítla přispět, aby se $AFG_faqir_of_ipi$ dostal na trůn. S odkazem na obavy z možného zapletení a současné geopolitické klima se [FROM.GetNameDef] raději zaměřuje na jiné strategické priority."
 AFG_political_events.159.t: "[FROM.GetNameDefCap] odmítá náš plán"
 AFG_political_events.160.a: "My jsme budoucnost pro [AFG.GetNonIdeologyName]!"
 AFG_political_events.160.desc: "V reakci na naši žádost [FROM.GetName] souhlasí s podporou nástupu $AFG_faqir_of_ipi$ na [ROOT.GetAdjective] trůn. Tato podpora bude zahrnovat vojenskou pomoc a vybavení k zajištění úspěchu našeho úsilí."
 AFG_political_events.160.t: "[FROM.GetNameDefCap] souhlasí s podporou"
 AFG_political_events.170.a: "Ať žije nový emír!"
 AFG_political_events.170.desc: "$RAJ_mirza_khurshid_jah_bahadur$ dorazil do naší země teprve před několika dny a nyní se koná velkolepý obřad, při němž jsou uznány jeho nároky na Mughalskou a Tímúrovskou říši a zároveň je korunován novým emírem Afghánistánu. Časem se možná budeme moci přihlásit ke slávě těchto dávných říší."
 AFG_political_events.170.t: "Korunovace mughalského prince"
 AFG_political_events.171.a: "Ať žije nový emír!"
 AFG_political_events.171.desc: "$BUK_mohammed_alim_khan$ pobývá v Kábulu od té doby, co byl Sověty vyhnán z Buchary. S jeho korunovací novým emírem Afghánistánu bychom snad mohli využít jeho nároků k znovuzískání Střední Asie z rukou [SOV.GetAdjective] hrozby."
 AFG_political_events.171.t: "Korunovace bucharského emíra"
 AFG_political_events.172.a: "Nestojí to za boj."
 AFG_political_events.172.b: "Kdo si myslí, že jsou?"
 AFG_political_events.172.desc: "\nZačátkem tohoto týdne [FROM.GetAdjective] jednotky vpadly a obsadily naše území Vazíristánu s tvrzením, že jejich cílem je chránit region před možnou okupací jejich nepřáteli. Jedná se jednoznačně o válečný akt, avšak takový, který bychom si pravděpodobně mohli dovolit ignorovat, jelikož jim zřejmě nejde o střet s námi, ale snaží se sjednotit rozptýlený paštunský lid."
 AFG_political_events.172.t: "[FROM.GetNameDefCap] okupuje Vazíristán!"
 AFG_political_events.173.t: "Nový královský předseda vlády"
 AFG_political_events.173.desc: "Vzhledem k tomu, že mnozí zpochybňují rozhodnutí, které přijal $AFG_mohammad_hashim_khan$, bylo rozhodnuto upevnit královskou vládu jmenováním jednoho z jeho sourozenců novým vůdcem, za kterého bude odpovídat $AFG_mohammed_zahir_shah$. Kdo jej nahradí?"
 AFG_political_events.173.a: "Stále konzistentní $AFG_shah_mahmud_khan$"
 AFG_political_events.173.b: "Vojensky brilantní $AFG_sardar_shah_wali_khan$"
 AFG_political_events.173.c: "Progresivnější $AFG_mohammed_daoud_khan$"
 AFG_political_events.20.a: "Oslabení nepřátelského vlivu v zemi nám přinese užitek."
 AFG_political_events.20.b: "O [FROM.GetNonIdeologyName] nemáme zájem"
 AFG_political_events.20.desc: "[FROM.GetAdjectiveCap] diplomaté nás oslovili s návrhem ekonomických investic do jejich hospodářství. Tvrdí, že pokud bychom jim pomohli rozvíjet průmysl, získali bychom podíl na budoucím exportu. Zároveň dali jasně najevo, že by to nepochybně rozhněvalo [SOU.GetNameDef] a [ENG.GetNameDef], kteří mají historicky pro [FROM.GetNonIdeologyName] jiné plány."
 AFG_political_events.20.t: "[FROM.GetName] se zajímá o investice"
 AFG_political_events.21.a: "Velkorysý příspěvek!"
 AFG_political_events.21.desc: "[FROM.GetAdjectiveCap] diplomaté oznámili, že jejich vláda podporuje náš návrh investovat v [ROOT.GetAdjective] ekonomice. Inženýři a podnikatelé jsou již na cestě, aby po celé zemi zakládali nové průmyslové podniky."
 AFG_political_events.21.t: "[FROM.GetName] souhlasí s investicemi do naší ekonomiky"
 AFG_political_events.22.a: "Zapamatujeme si to."
 AFG_political_events.22.desc: "[FROM.GetAdjectiveCap] diplomaté oznámili, že jejich vláda odmítá investovat v [ROOT.GetAdjective] ekonomice. Tvrdí, že naše dlouhodobé motivace nejsou jasné a že nechtějí poskytovat ekonomickou pomoc zemi, která by se nakonec mohla ocitnout ve sféře vlivu jejich nepřátel."
 AFG_political_events.22.t: "[FROM.GetName] odmítá investovat do naší ekonomiky"
 AFG_political_events.30.a: "Je to nový začátek a staneme se [ROOT.GetAdjective] republikou"
 AFG_political_events.30.b: "Jsme především národem Paštunů"
 AFG_political_events.30.c: "Spojení demokracie a islámu je cestou vpřed"
 AFG_political_events.30.desc: "Po letech politických reforem a kompromisů mezi různými frakcemi napříč naší zemí máme nyní příležitost jednou provždy setřást okovy monarchismu. Musíme však znovu definovat, kým jsme jako národ."
 AFG_political_events.30.t: "Budoucnost pro [ROOT.GetNonIdeologyName]"
 AFG_political_events.40.a: "Nejsme v pozici, abychom odporovali."
 AFG_political_events.40.b: "Jsou to jen plané hrozby a nenecháme se jimi zastrašit."
 AFG_political_events.40.desc: "Zástupci [FROM.GetAdjective] ambasády předložili naší vládě ultimátum. Požadují, abychom omezili zahraniční vliv v naší zemi, který by mohl ohrozit zájmy, které zde má [FROM.GetNameDef], jinak hrozí vojenskou intervencí s cílem nahradit naši vládu."
 AFG_political_events.40.t: "[FROM.GetNameDefCap] vydává ultimátum"
 AFG_political_events.41.a: "Budeme situaci nadále pečlivě sledovat."
 AFG_political_events.41.desc: "[FROM.GetAdjectiveCap] vláda ustoupila našim požadavkům na ukončení zahraničního vměšování v jejich zemi, které by mohlo ohrozit naše zájmy v regionu. Ačkoliv jsou s naším zásahem nespokojeni, zdá se, že v dohledné době nemají chuť bojovat."
 AFG_political_events.41.t: "[FROM.GetNameDefCap] ustupuje našim požadavkům"
 AFG_political_events.42.a: "Budeme je muset sladit jinými prostředky."
 AFG_political_events.42.b: "Nenechávají nám jinou možnost."
 AFG_political_events.42.desc: "[FROM.GetAdjectiveCap] vláda odmítla naše požadavky na ukončení zahraničního vměšování v jejich zemi. Tvrdí, že nemáme právo zasahovat do jejich vnitřních záležitostí ani do dohod, které uzavřeli s jinými státy."
 AFG_political_events.42.t: "[FROM.GetNameDefCap] odmítá požadavky"
 AFG_political_events.43.a: "Budeme situaci sledovat."
 AFG_political_events.43.desc: "Náš velvyslanec pro [FROM.GetNameDefCap] nás informoval, že zde byla nedávno podepsána jakási dohoda se zástupci jiné země. Ačkoliv podrobnosti nejsou známy, nelze pochybovat o tom, že [FROM.GetNameDefCap] ovlivňují státy, které se mohou snažit narušit naše zájmy v regionu."
 AFG_political_events.43.t: "[FROM.GetNameDefCap] zažívá zahraniční vměšování"
 AFG_political_events.51.a: "V regionu by se nám hodilo více spojenců."
 AFG_political_events.51.b: "Proč zasahovat do tak vzdálených oblastí?"
 AFG_political_events.51.desc: "V diskrétní zprávě se na naši vládu obrátil $AFG_amunullah_khan$, bývalý [FROM.GetAdjective] vládce, se žádostí o podporu svého návratu na trůn. Slibuje, že s německou podporou vybuduje silný, modernizovaný [FROM.GetNonIdeologyName] sladěný s našimi zájmy."
 AFG_political_events.51.t: "$AFG_amunullah_khan$ žádá o pomoc"
 AFG_political_events.52.a: "Jak se opovažují nás zradit!"
 AFG_political_events.52.desc: "[FROM.GetAdjectiveCap] vláda odpověděla na naši žádost a s politováním odmítla přispět, aby se $AFG_amunullah_khan$ vrátil na trůn. S odkazem na obavy z možného zapletení a současné geopolitické klima se [FROM.GetNameDef] raději zaměřuje na jiné strategické priority."
 AFG_political_events.52.t: "[FROM.GetNameDefCap] odmítá náš plán"
 AFG_political_events.53.a: "My jsme budoucnost pro [AFG.GetNonIdeologyName]!"
 AFG_political_events.53.desc: "V reakci na naši žádost [FROM.GetName] souhlasí s podporou návratu $AFG_amunullah_khan$ na [ROOT.GetAdjective] trůn. Tato podpora bude zahrnovat vojenskou pomoc a vybavení k zajištění úspěchu našeho úsilí."
 AFG_political_events.53.t: "[FROM.GetNameDefCap] souhlasí s podporou"
 AFG_political_events.54.a: "Výborně!"
 AFG_political_events.54.desc: "Jak bylo dříve dohodnuto, [FROM.GetAdjective] vybavení je nám k dispozici od vypuknutí občanské války. Jejich operativci v hlavním městě nás rovněž ujistili, že [FROM.GetAdjective] jednotky v utajení brzy dorazí do země, aby nám pomohly v boji."
 AFG_political_events.54.t: "[GER.GetAdjectiveCap] podpora dorazila"
 AFG_political_events.60.a: "Přijměme náš sdílený osud!"
 AFG_political_events.60.b: "Kdo jsou oni, aby mluvili jménem [ROOT.GetAdjective] lidu?"
 AFG_political_events.60.desc: "[FROM.GetNameDef] vytváří nový politický celek, který nazývá turko-perskou unií. Zdá se, že jde o využití jejich tureckého a perského dědictví ke sjednocení všech našich národů pod jednou vládou. Prvním krokem má být vytvoření vojenské aliance s námi. Pokud ji přijmeme, je nepochybné, že časem budou prosazovat hlubší integraci pod svým vedením."
 AFG_political_events.60.t: "Pozvánka do Turko-perské unie"
 AFG_political_events.61.a: "Skvělé!"
 AFG_political_events.61.desc: "[FROM.GetNameDefCap] souhlasí se vstupem do naší turko-perské unie. Společně budou naše armády schopny lépe odrazovat agresi našich společných nepřátel. A co je důležitější, získali jsme opěrný bod pro postupné oslabování jejich nezávislosti."
 AFG_political_events.61.t: "[FROM.GetNonIdeologyName] vstupuje do Turko-perské unie"
 AFG_political_events.62.a: "Časem pochopí svou chybu."
 AFG_political_events.62.b: "Kdo není s námi, je proti nám!"
 AFG_political_events.62.desc: "[FROM.GetNameDefCap] odmítá členství v Turko-perské unii. Jsou pobouřeni naší domnělou arogancí, když jsme se pokusili mluvit jménem všech [TUR.GetAdjective] a [PER.GetAdjective] národů."
 AFG_political_events.62.t: "[FROM.GetNonIdeologyName] odmítá Turko-perskou unii"
 AFG_political_events.70.a: "V tuto chvíli si konflikt nemůžeme dovolit."
 AFG_political_events.70.b: "Válku si nemůžeme dovolit, ale musí to odsouhlasit [ROOT.OVERLORD.capital.GetCapitalVictoryPointName]."
 AFG_political_events.70.c: "Hranice jsou uzavřenou záležitostí a dále se o nich jednat nebude."
 AFG_political_events.70.desc: "Durandova linie, stanovená roku 1893 jako hranice, která delí Britskou Indií a [FROM.GetNonIdeologyName], je již dlouho zdrojem sporů. S nástupem [FROM.GetAdjective] nacionalismu a snahou sjednotit paštunské kmeny na obou stranách hranice [FROM.GetLeader] oficiálně odmítá Durandovu linii. [FROM.Capital.GetCapitalVictoryPointName] nyní požaduje nové vyjednání hranic s odkazem na historické křivdy a nespravedlivé rozdělení paštunských území. Dokonce zašli tak daleko, že pohrozili válkou, pokud nedojde k dohodě."
 AFG_political_events.70.t: "[FROM.GetNonIdeologyName] odmítá Durandovu linii"
 AFG_political_events.71.a: "Slavné vítězství Afghánistánu!"
 AFG_political_events.71.desc: "Navzdory všem očekáváním [FROM.GetNameDef] ustupuje našim požadavkům na přehodnocení Durandovy linie. Pod obrovským tlakem a neochotná riskovat vleklý konflikt v regionu [FROM.GetAdjective] vláda souhlasila s překreslením hranic a uznala náš oprávněný nárok na paštunská území. Toto diplomatické vítězství nejen sjednocuje náš lid, ale také posiluje legitimitu, kterou má [ROOT.GetLeader]. [ROOT.GetNameDef] je jednotnější a silnější než kdy dříve."
 AFG_political_events.71.t: "[FROM.GetNameDefCap] souhlasí s přejednáním hranic"
 AFG_political_events.72.a: "Musíme se vyhnout zatažení do dalšího konfliktu."
 AFG_political_events.72.b: "Nenecháme se zastrašit k územním ústupkům."
 AFG_political_events.72.desc: "[AFG.GetAdjectiveCap] politická situace dospěla do kritického bodu. Jejich vláda oficiálně odmítla Durandovu linii a požaduje nové vyjednání hranic za účelem sjednocení paštunských kmenů. [AFG.GetAdjectiveCap] vláda dala jasně najevo, že nesplnění těchto požadavků povede k vyhlášení války. Tváří v tvář hrozbě nákladného a zdlouhavého konfliktu [FROM.GetNameDef] navrhuje postoupit sporné území na [AFG.GetNameDef] ve snaze zachovat regionální stabilitu a zabránit další eskalaci."
 AFG_political_events.72.t: "[FROM.GetNameDef] navrhuje územní ústupky"
 AFG_political_events.73.a: "Pragmatické řešení."
 AFG_political_events.73.desc: "Vzhledem k současnému globálnímu napětí a možnosti nákladného konfliktu v regionu se [FROM.Capital.GetCapitalVictoryPointName] souhlasí, že je v jejich nejlepším zájmu postoupit sporné území na [AFG.GetNonIdeologyName]. Jsme instruováni tento krok přijmout, abychom zachovali stabilitu a vyhnuli se zbytečné válce."
 AFG_political_events.73.t: "[FROM.GetNameDefCap] přijímá územní ústupky"
 AFG_political_events.74.a: "Uděláme, co bude nutné."
 AFG_political_events.74.desc: "Požadavky, které vznesl [AFG.GetNonIdeologyName] na přejednání Durandovy linie a postoupení paštunských území, odmítá [FROM.Capital.GetCapitalVictoryPointName] co i jen vyslyšet. Navzdory riziku konfliktu se [FROM.GetAdjective] vláda rozhodla, že ústupky by vytvořily nebezpečný precedent a oslabily jejich postavení v regionu. Jsme instruováni odmítnout požadavky, které vznáší [AFG.GetNonIdeologyName] a v případě potřeby se připravit na obranu hranice."
 AFG_political_events.74.t: "[FROM.GetNameDefCap] odmítá územní ústupky"
 AFG_political_events.75.a: "Pak se musíme připravit na válku."
 AFG_political_events.75.desc: "Navzdory našim nárokům a zjevné touze paštunského lidu po sjednocení [FROM.GetNameDef] zcela odmítá přejednat vzájemné hranice. Jejich odpověď je nekompromisní, odmítá jakoukoli představu o postoupení území a varuje před další eskalací. Zdá se, že jedinou cestou k osvobození těchto území bude otevřený konflikt."
 AFG_political_events.75.t: "Odmítnutí přejednání hranic"
 AFG_political_events.80.a: "Je to v našem nejlepším zájmu."
 AFG_political_events.80.b: "Nemají žádné právo nám diktovat naši zahraniční politiku."
 AFG_political_events.80.desc: "V odvážném kroku k prosazení dominance v islámském světě vydává [FROM.GetNameDef] ultimátum. Požadují, abychom se připojili k jejich rozšiřující se alianci, jejímž cílem je sjednotit a posílit islámské země pod [FROM.GetAdjective] vedením. Nesplnění tohoto požadavku má podle všeho vést k plnohodnotné invazi."
 AFG_political_events.80.t: "[FROM.GetNameDefCap] požaduje sladění zahraniční politiky"
 AFG_political_events.81.a: "Ve skutečnosti neměli na výběr."
 AFG_political_events.81.desc: "V reakci na naše ultimátum se [FROM.GetNameDef] podvoluje našim požadavkům. Souhlasí se vstupem do naší aliance a uznala sílu a vůdčí postavení, které má [ROOT.GetNameDef] při sjednocování islámského světa. Tento strategický krok nejen rozšiřuje náš vliv, ale také upevňuje naši pozici jako dominantní mocnosti v regionu. S nimi po našem boku je naše vize sjednocené islámské fronty opět o krok blíže realitě."
 AFG_political_events.81.t: "[FROM.GetNameDefCap] souhlasí se vstupem"
 AFG_political_events.82.a: "Pak budou zničeni."
 AFG_political_events.82.desc: "V otevřeném odporu vůči našemu ultimátu [FROM.GetNameDef] odmítá náš požadavek vstupu do aliance. Jejich vláda zůstává neochvějná ve své nezávislosti a není ochotna se podřídit naší autoritě."
 AFG_political_events.82.t: "[FROM.GetNameDefCap] se odmítá přidat"
 AFG_political_events.85.a: "Mohlo by to být v náš prospěch."
 AFG_political_events.85.b: "Nenecháme se vtáhnout do [FROM.GetAdjective] politiky."
 AFG_political_events.85.desc: "V tajné komunikaci se na nás obrátila [FROM.GetAdjective] vláda s návrhem obranného paktu. Usilují o vzájemnou dohodu o obraně v případě války a uznávají strategické výhody partnerství s námi proti našim nepřátelům. Ambice Afghánistánu stát se dominantní silou v islámském světě by se mohly shodovat s našimi širšími geopolitickými zájmy."
 AFG_political_events.85.t: "[FROM.GetNameDefCap] nás žádá o ochranu"
 AFG_political_events.86.a: "Pak zahájíme naši expanzi v celém regionu."
 AFG_political_events.86.desc: "[FROM.GetNameDefCap] souhlasí s naším návrhem obranného paktu. Tento pakt zajišťuje, že se obě naše země v případě války vzájemně podpoří, čímž posílíme naši strategickou pozici. S vojenskou silou, kterou představuje [FROM.GetNameDef] stojící po našem boku, jsou nyní naše ambice stát se dominantní mocností v islámském světě mnohem dosažitelnější."
 AFG_political_events.86.t: "[FROM.GetNameDefCap] souhlasí s paktem"
 AFG_political_events.87.a: "Bude to chtít čas, ale svých cílů dosáhneme sami."
 AFG_political_events.87.desc: "V pečlivě formulované odpovědi [FROM.GetNameDef] odmítla náš návrh obranného paktu. Přestože uznává možné strategické přínosy, rozhodla se v tuto chvíli upřednostnit jiná partnerství a zůstat opatrná ohledně závazků vůči nám."
 AFG_political_events.87.t: "[FROM.GetNameDefCap] odmítá nabízený pakt"
 AFG_political_events.90.a: "Musíme nasadit další bezpečnostní síly k potlačení nepokojů."
 AFG_political_events.90.desc: "Objevily se zprávy, že [AFG.GetNameDef] aktivně podporuje reakční aktivity v našich středoasijských republikách. Předpokládá se, že [AFG.GetAdjective] agenti rozdmýchávají nepokoje a podporují proti[ROOT.GetAdjective] nálady mezi místním obyvatelstvem. Toto podvratné chování představuje přímou výzvu naší autoritě v regionu a ohrožuje stabilitu našich středoasijských území. Musíme čelit tomuto zahraničnímu vměšování a udržet kontrolu nad našimi republikami."
 AFG_political_events.90.t: "[AFG.GetNameDefCap] podporuje reakcionáře ve Střední Asii"
 AFG_political_events.91.a: "Musíme potlačit povstání a obnovit naši autoritu."
 AFG_political_events.91.desc: "Teď, kdy je s námi [AFG.GetNameDef] ve válce, dospěla situace v našich středoasijských republikách do kritického bodu. Povzbuzeny [AFG.GetAdjective] vměšováním a posíleny probíhajícím konfliktem povstaly některé republiky a vyhlásily nezávislost. Toto rozsáhlé povstání hrozí destabilizací celého regionu a dalším přetížením našich vojenských kapacit. Musíme jednat rychle, potlačit vzpoury a obnovit pořádek, jinak riskujeme ztrátu kontroly nad celou Střední Asií."
 AFG_political_events.91.t: "Středoasijské republiky povstávají"
 AFG_political_events.95.a: "Je to nezbytné pro regionální bezpečnost, schváleno."
 AFG_political_events.95.b: "[AFG.GetNonIdeologyName] není naše starost."
 AFG_political_events.95.desc: "Na nedávnou občanskou válku, která zachvátila [AFG.GetNonIdeologyName], se [ROOT.Capital.GetCapitalVictoryPointName] dívá se znepokojením. Situace však nabrala novou naléhavost poté, co zprávy z regionu naznačují, že [AFG.GetLeader] se může spolehnout ve svém cíli svrhnout legitimní vládu také na pomoc [GER.GetAdjective] jednotek. Lze předpokládat, že si [AFG.GetLeader] vybral [GER.GetNameDef] jako svého spojence, což by představovalo vážnou hrozbu pro naše zájmy v oblasti. Členové ozbrojených sil proto připravili plány k našemu schválení, které by nám umožnily skrytě podpořit legitimní vládu a zabránit tomu, aby moc v zemi převzali fašisté."
 AFG_political_events.95.t: "[FROM.GetNonIdeologyName] má podporu [GER.GetAdjectiveCap] jednotek"
 AFG_political_events_110_desc_balochistan: "[FROM.GetNameDef] žádá o území Balúčistánu. Tvrdí, že tato území jim právem náleží a že současné hranice nespravedlivě rozdělují jejich lid i území."
 AFG_political_events_110_desc_durand: "[FROM.GetNameDef] žádá o několik našich území podél jejich hranice. Tvrdí, že tato území jim právem náleží a že současné hranice nespravedlivě rozdělují jejich lid i území."
 AFG_political_events_153_tt: "§Y[JAP.GetNonIdeologyName] nám bude dodávat zbraně a vyšle dobrovolníky na naši pomoc po vypuknutí občanské války.§!"
 AFG_political_events_51_tt: "Poté, co se [AFG.GetNonIdeologyName] ocitne v občanské válce: "
 AFG_political_events_90_tt: "Odemkne rozhodnutí §Y[AFG_get_turkik_people_name_key]§! k odstranění buněk odboje ve středoasijských státech. §RPokud se nám nepodaří odstranit buňky odboje a [FROM.GetNameDef] nám vyhlásí válku, vzpurné státy proti nám povstanou!§!"
 AFG_political_influence_major_warning_tt: "Pokud [FROM.GetNameDefCap] získá více než §R40 %§! podpory pro ideologii, která není v souladu s naší, získáme možnost zasáhnout a případně je napadnout prostřednictvím rozhodnutí §Y$AFG_foreign_intervention_category$§!"
 GOE_IRQ_news.1.a: "Stojíme na straně povstalců."
 GOE_IRQ_news.1.b: "Jak zareaguje [ENG.GetNameDef]?"
 GOE_IRQ_news.1.c: "Musíme znovu získat kontrolu nad situací."
 GOE_IRQ_news.1.d: "Po letech nespokojenosti s [ENG.GetAdjective] správou a migrací do regionu od Velké války, [PAL.GetName] zažívá povstání arabského obyvatelstva. Účastníci povstání požadují stažení [ENG.GetAdjective] jednotek a plnou nezávislost Palestiny. Ačkoli [ENG.GetNameDef] tyto požadavky pravděpodobně neakceptuje, je zřejmé, že správa území se pro ně stane stále nákladnějším podnikem."
 GOE_IRQ_news.1.t: "Velké palestinské povstání"
 GOE_IRQ_news.2.a: "Měli bychom se na to připravit."
 GOE_IRQ_news.2.d: "Odvážným krokem [FROM.GetAdjective] vláda oficiálně odmítla Ankarskou smlouvu a označila její územní ujednání za přežitek minulosti. Toto rozhodnutí přímo zpochybňuje ustálené hranice a dohody, které uzavřeli [TUR.GetNameDef], [PER.GetNameDef] a [FROM.GetNonIdeologyName], čímž uvrhlo region do politické nejistoty. [TUR.Capital.GetCapitalVictoryPointName] i [PER.Capital.GetCapitalVictoryPointName] hlásí propuknutí veřejného pobouření nad tímto vzdorem a rostoucí napětí doprovázejí výzvy k rozhodné reakci na [FROM.GetAdjective] jednostranný krok."
 GOE_IRQ_news.2.t: "[FROM.GetNameDefCap] odmítá Ankarskou smlouvu"
 GOE_RAJ.1.a: "Skvělý nápad"
 GOE_RAJ.1.b: "To by bylo příliš agresivní"
 GOE_RAJ.1.desc: "Náš subjekt [FROM.GetNameDef] vidí příležitost rozšířit náš vliv na indickém subkontinentu podrobením [BHU.GetAdjective] poustevnického království. To by nám mohlo otevřít cestu do vlastního vnitrozemí Asie."
 GOE_RAJ.1.t: "[FROM.GetName] žádá o povolení napadnout [BHU.GetName]"
 GOE_RAJ.10.a: "Budeme bojovat"
 GOE_RAJ.10.b: "Musíme porušit přísahu"
 GOE_RAJ.10.desc: "$RAJ_subhas_chanda_bose$ zahájil svou revoluci. Dorazil telegram s oznámením, že pokud hodláme dodržet svůj slib, nyní je ta pravá chvíle.\nToto by mohlo zcela vyřadit významného protivníka v asijské sféře."
 GOE_RAJ.10.t: "[FROM.GetName] vyzývá [JAP.GetName], aby splnilo svou přísahu."
 GOE_RAJ.11.a: "Krev a svoboda!"
 GOE_RAJ.11.desc: "[FROM.GetName] plně mobilizuje a podpoří nás v našem boji."
 GOE_RAJ.11.t: "[FROM.GetName] plní svůj slib"
 GOE_RAJ.12.a: "Křivopřísežníci!"
 GOE_RAJ.12.desc: "Žádný [FROM.GetAdjective] voják není připraven nám pomoci. Slibovaná pomoc je v nedohlednu a Tokio mlčí. Můžeme jen předpokládat, že jsme na to sami."
 GOE_RAJ.12.t: "[FROM.GetName] porušuje svůj slib"
 GOE_RAJ.13.a: "Předat jim je"
 GOE_RAJ.13.b: "Ve skutečnosti je potřebujeme"
 GOE_RAJ.13.desc: "Vláda Azad Hind by mohla využít vyhrazené hlavní město pro administrativní účely, které je daleko od frontových linií, dokud nebude jejich vítězství upevněno.\nNedávno dobyté Andamanské ostrovy by k tomu mohly být ideální."
 GOE_RAJ.13.t: "Má [GetRajName] obdržet Andamanské ostrovy?"
 GOE_RAJ.14.a: "Skvělé"
 GOE_RAJ.14.desc: "[JAP.GetAdjectiveCap] vojska úspěšně napadli Andamanské ostrovy. Rozhodli se předat jejich kontrolu nám, abychom zde mohli zřídit řádnou vládu."
 GOE_RAJ.14.t: "[JAP.GetName] předává Andamany"
 GOE_RAJ.14.tt: "Můžeme přesunout naše hlavní město na Andamany dokončením zaměření §Y$RAJ_shaheed_and_swara$j§!."
 GOE_RAJ.15.a: "Co mají za lubem?"
 GOE_RAJ.15.desc: "[RAJ.GetNameDefCap] nás informuje, že si hodlá ponechat přístav Aden pod svou kontrolou navzdory dřívějším plánům předat jej koruně.\nJak se dalo očekávat, vyvolalo to v parlamentu značný rozruch, zejména ze strany Winstona Churchilla, avšak v tuto chvíli nejsou plánována žádná disciplinární opatření."
 GOE_RAJ.15.t: "[RAJ.GetNameDefCap] bude nadále kontrolovat [992.GetName]"
 GOE_RAJ.16.a: "Méně administrativní zátěže."
 GOE_RAJ.16.desc: "Jak bylo stanoveno zákonem o vládě Indie z roku 1935, [GetRajAdjective]ká administrativa nám předala správní odpovědnost nad [992.GetName]."
 GOE_RAJ.16.t: "[FROM.GetNameDefCap] předává [992.GetName]"
 GOE_RAJ.17.a: "Nabídnout záruky pro [TIB.GetName]"
 GOE_RAJ.17.b: "Nemůžeme si dovolit otevřít další frontu."
 GOE_RAJ.17.desc: "V agresivním kroku [RAJ.GetName] demonstruje sílu na [TIB.GetAdjective] hranici a prohlašuje, že hodlá rozšířit svou bezpečnostní zónu k ochraně svého jádra. To je v přímém rozporu s našimi zájmy v regionu."
 GOE_RAJ.17.t: "[RAJ.GetName] napadá [TIB.GetName]"
 GOE_RAJ.18.a: "Budou si to muset vzít silou"
 GOE_RAJ.18.b: "Nemůžeme si dovolit válku tak daleko od domova"
 GOE_RAJ.18.desc: "Jakmile je [RAJ.GetNameDefCap] bez jha své minulosti, stal se [RAJ.GetLeader] natolik odvážným, že požaduje navrácení našich koloniálních držav v oblasti. Sjednocení subkontinentu do jednoho silného státu se zdá být pro nově vzniklou zemi nejvyšší prioritou."
 GOE_RAJ.18.t: "[RAJ.GetLeader] požaduje navrácení koloniálních držav"
 GOE_RAJ.19.a: "Pak si to budeme muset vzít silou"
 GOE_RAJ.19.desc: "[FROM.GetAdjectiveCap] vláda tvrdohlavě odmítla předat právoplatné [GetRajAdjective]ké území navzdory opakovaným varováním, že současný stav je nepřijatelný."
 GOE_RAJ.19.t: "[FROM.GetName] odmítá předat kolonie"
 GOE_RAJ.2.a: "Skvělé"
 GOE_RAJ.2.desc: "[FROM.GetName] schvaluje naši žádost o územní expanzi. V cestě by nám měl stát jen minimální odpor."
 GOE_RAJ.2.t: "[FROM.GetName] souhlasí"
 GOE_RAJ.20.a: "Spravedlnosti bylo učiněno zadost"
 GOE_RAJ.20.desc: "[FROM.GetName] s nechutí přijímá naše požadavky. Dává však jasně najevo, že takto hrubá politika nebude dlouhodobě tolerována a je možná jen jako malá kompenzace."
 GOE_RAJ.20.t: "[FROM.GetName] předává své kolonie"
 GOE_RAJ.21.a: "Nabídnout jim mír"
 GOE_RAJ.21.b: "Žádný mír pro imperialisty!"
 GOE_RAJ.21.desc: "Stará vláda pod jhem imperialistické Británie kapitulovala a uprchla ze země. Jak upevňujeme kontrolu nad subkontinentem, musíme se rozhodnout, jak naložit s našimi bývalými suzerény."
 GOE_RAJ.21.t: "Řetěz, který se přetrhl"
 GOE_RAJ.22.a: "Žádný kompromis"
 GOE_RAJ.22.b: "Východ padl"
 GOE_RAJ.22.desc: "Zoufale znějící telegram od lorda Linlithgowa nás informoval, že povstalci, které vede [RAJ.GetLeader], převzali kontrolu nad zemí.\nLinlithgow míří do země s nabídkou bílého míru, který navrhuje [RAJ.GetLeader], za předpokladu, že se vzdáme všech nároků na Indii."
 GOE_RAJ.22.t: "Britský Rádž padl"
 GOE_RAJ.23.a: "Budiž."
 GOE_RAJ.23.desc: "[ENG.GetName] odmítá naši mírovou nabídku. Jejich záměrem je zjevně pokračovat ve válce, dokud nezískají zpět svou perlu."
 GOE_RAJ.23.t: "[ENG.GetName] odmítá mírovou nabídku"
 GOE_RAJ.24.a: "Krev byla prolita"
 GOE_RAJ.24.desc: "[ENG.GetName] s nechutí přijímá naši mírovou nabídku. [GetRajName] má nyní svou svobodu a je pánem svého osudu."
 GOE_RAJ.24.t: "[ENG.GetName] přijímá mírovou nabídku"
 GOE_RAJ.25.a: "Podepsat mír"
 GOE_RAJ.25.b: "Ještě jsme neskončili"
 GOE_RAJ.25.desc: "[RAJ.GetAdjectiveCap] vláda uzavřela mír se svými bývalými suzerény a konečně dosáhla plné nezávislosti na imperiální nadvládě. Nyní máme možnost učinit totéž a odejít s významným morálním vítězstvím."
 GOE_RAJ.25.t: "[RAJ.GetName] a [ENG.GetName] uzavírají bílý mír"
 GOE_RAJ.26.a: "Skvělé!"
 GOE_RAJ.26.desc: "Úspěšně jsme osvobodili našeho vůdce z vězení. Je to velký přínos, který vnese řád a strukturu do naší věci."
 GOE_RAJ.26.t: "$RAJ_subhas_chanda_bose$ osvobozen z vězení"
 GOE_RAJ.27.a: "Ne, válka musí pokračovat"
 GOE_RAJ.27.b: "Zní to jako dohoda"
 GOE_RAJ.27.desc: "Poté, co se [RAJ.GetNameDefCap] vymaňuje z okovů svých utlačovatelů, si již nepřeje, aby naše země pokračovaly v bezvýsledné válce."
 GOE_RAJ.27.t: "[RAJ.GetNameDefCap] si přeje bílý mír"
 GOE_RAJ.28.a: "Zlověstné"
 GOE_RAJ.28.desc: "[FROM.GetName] odmítá náš pokus o ukončení konfliktu. Jedna říše tedy musí padnout. Budeme to my, nebo oni?"
 GOE_RAJ.28.t: "[FROM.GetName] odmítá podepsat bílý mír"
 GOE_RAJ.29.a: "Victor Hope nahradí markýze"
 GOE_RAJ.29.b: "Ponechat Freeman-Freemana"
 GOE_RAJ.29.desc: "Jak se blíží konec funkčního období Freeman-Freemana Thomase ve funkci místokrále Indie, musíme se rozhodnout, zda jej chceme nahradit vhodným kandidátem, nebo zda prodloužíme funkční období markýze z Willingdonu."
 GOE_RAJ.29.t: "Nový místokrál pro [RAJ.GetName]"
 GOE_RAJ.3.a: "Škoda"
 GOE_RAJ.3.desc: "[FROM.GetName] odmítá naši žádost o územní expanzi s tím, že v tuto chvíli není v zájmu Koruny destabilizovat subkontinent."
 GOE_RAJ.3.t: "[FROM.GetName] odmítá"
 GOE_RAJ.30.a: "Konečně budeme svobodní."
 GOE_RAJ.30.b: "Ne, nám se zde líbí"
 GOE_RAJ.30.desc: "Po staletích [ENG.GetAdjective] nadvlády správa konečně opouští Indii. Úředníci balí své kanceláře, koloniální administrátoři píší závěrečné zprávy a Union Jack je stahován z vládních budov. Přechod však zdaleka není hladký - otázky hranic a vojenské kontroly zůstávají nevyřešeny, což způsobuje zpoždění konečné nezávislosti."
 GOE_RAJ.30.t: "Britská správa Rádže padla"
 GOE_RAJ.30_we_are_leaving_tt: "§Y[RAJ.GetName]§! zůstane dočasně pod naší kontrolou, zatímco si uspořádá vlastní administrativu. Nakonec však dostane svobodu."
 GOE_RAJ.31.a: "Musíme"
 GOE_RAJ.31.a_tt: "Vznikne Východoindická společnost, která převezme kontrolu nad částmi Indie"
 GOE_RAJ.31.b: "Nikdy"
 GOE_RAJ.31.desc: "Jak se [RAJ.GetName] snaží vzpamatovat z Velké hospodářské krize, zdá se, že cenová regulace destabilizovala zemi. Navázání rupie na libru s sebou nese riziko uvržení obou našich zemí do hospodářského chaosu.\nKonsorcium soukromých osob nás oslovilo s návrhem rozdělit Rádž na dvě části, čímž by se snížila finanční zátěž státu. Jedna část by byla v soukromých rukou a druhá by zůstala pod kontrolou Koruny.\nNečinnost by mohla vést k ještě horším následkům."
 GOE_RAJ.31.t: "[RAJ.GetName] se zmítá v cenovém chaosu"
 GOE_RAJ.32.a: "Předat"
 GOE_RAJ.32.b: "Ponechat"
 GOE_RAJ.32.b_tt: "Ponecháme si kontrolu nad §Yprovincí Aden§!, což nám umožní dokončit zaměření §Y$RAJ_trade_port$§!"
 GOE_RAJ.32.desc: "Podle plánu [ENG.GetAdjective] vlády máme provincii Aden předat, avšak pokud budeme chtít, můžeme se pokusit si ji ponechat."
 GOE_RAJ.32.t: "Otázka Adenu"
 GOE_RAJ.33.a: "Tohle nepřipustíme"
 GOE_RAJ.33.b: "Máme jiné starosti"
 GOE_RAJ.33.b_tt: "Ztráta kontroly nad Gudžarátem a Dillí si vynutí bílý mír"
 GOE_RAJ.33.c: "Za vítězství!"
 GOE_RAJ.33.desc: "Skupina, která se prohlašuje za právoplatné dědice dávno zaniklé říše, vyhlásila válku za nezávislost na dalekém severozápadě a shromažďuje nespokojené frakce pod svou zástavou. Přestože většina Indie zůstává pod kontrolou, toto povstání ohrožuje stabilitu. Bude to jen poznámka pod čarou v dějinách, nebo návrat říše?"
 GOE_RAJ.33.t: "Povstání v severozápadní Indii!"
 GOE_RAJ.34.a: "Katastrofa!"
 GOE_RAJ.34.desc: "[UK_INDIA.GetName] zažívá katastrofu! Místní správa se zhroutila kvůli vleklé válce na západě. Aby si udržela kontrolu nad zemí, nabídla povstalcům územní kompromis. Tyto povstalce sice nemusíme uznávat, ale prozatím je válka ztracena."
 GOE_RAJ.34.t: "Správa pro [UK_INDIA.GetName] se hroutí"
 GOE_RAJ.35.a: "To bylo nečekané"
 GOE_RAJ.35.desc: "Rádž přestal existovat bez toho, aby padl co i jen jediný výstřel. Upevnili jsme kontrolu nad Indií a vláda Jeho Veličenstva, unavená břemenem impéria, se rozhodla nezasahovat."
 GOE_RAJ.35.t: "[ENG.GetName] nás nechává jít"
 GOE_RAJ.37.a: "Měli bychom jejich bluf dorovnat?"
 GOE_RAJ.37.desc: "Naše poslední okupační politiky podle očekávání vedly k nárůstu aktivit odboje. To zřejmě upoutalo pozornost vlády Jeho Veličenstva. Dorazil ostře formulovaný dopis, který jasně dává najevo, že Londýn neschvaluje náš bezohledný přístup ke správě. Text je plný pečlivě volených slov, z nichž však čiší hrozba. Jsme jednoznačně varováni, abychom přehodnotili svůj postoj, jinak nám může být „pomoc“ s obnovením pořádku vnucena způsobem, který bychom nemuseli ocenit."
 GOE_RAJ.37.t: "Varování z Whitehallu"
 GOE_RAJ.38.a: "Prozatím budeme vstřícní."
 GOE_RAJ.38.desc: "Zdá se, že [ENG.GetAdjective] vláda už má našeho přístupu k místní správě plné zuby. Britské jednotky dorazily v plné síle pod záminkou stabilizačních operací. Odbojové sítě byly rozprášeny, problematické živly pacifikovány a náš vliv byl elegantně odsunut stranou.\n[ENG.GetNameDef] tvrdí, že jde pouze o dočasné opatření nutné k ochraně integrity regionu. Zpráva je však jasná: velení je v jejich rukou a pokud chceme vládnout, musíme to dělat podle jejich pravidel."
 GOE_RAJ.38.t: "Impérium vrací úder"
 GOE_RAJ.39.a: "Zaručit bezpečnost pracovníků"
 GOE_RAJ.39.a_tt: "Po převzetí moci budeme povinni do §Y6 měsíců§! zvýšit bezpečnost práce. Nesplnění rozhněvá odbory. Zvýšená bezpečnost práce přináší:"
 GOE_RAJ.39.b: "Zaručit minimální mzdu"
 GOE_RAJ.39.b_tt: "Po převzetí moci budeme povinni do §Y6 měsíců§! zaručit minimální mzdu. Nesplnění rozhněvá odbory. Zaručená minimální mzda přináší:"
 GOE_RAJ.39.c: "Ukončit jednání"
 GOE_RAJ.39.c_tt: "Budeme se s nimi moci znovu setkat až dokončíme §Y$RAJ_royal_indian_navy_mutiny$§!"
 GOE_RAJ.39.desc: "Vůdci odborů souhlasili se setkáním s námi. V temném sklepě, daleko od zvědavých očí vlády. Mají vliv na farmáře, tovární dělníky i rybáře - na obyčejné lidi. Jsou ochotni nás podpořit ve snaze svrhnout současnou vládu, avšak na oplátku požadují určité ústupky."
 GOE_RAJ.39.t: "Jednání s odbory"
 GOE_RAJ.4.a: "Nepřijatelné podmínky"
 GOE_RAJ.4.b: "Musíme ustoupit"
 GOE_RAJ.4.desc: "Vzhledem k rychle se zhoršující bezpečnostní situaci na kontinentu [FROM.GetNameDef] požaduje, aby se naše království pevně začlenilo do jejich sféry vlivu.\n[FROM.GetAdjectiveCap] vláda zdůraznila, že bychom si ponechali určitou míru nezávislosti, avšak již nemůže tolerovat potenciální bezpečnostní rizika pro stát."
 GOE_RAJ.4.t: "[FROM.GetName] požaduje naše podrobení"
 GOE_RAJ.40.a: "Jak se opovažují?"
 GOE_RAJ.40.desc: "Indické jednotky překročily sporné území poblíž [986.GetName]. V kopcích a rovinách severně od Dillí propukají potyčky. Tvrdí, že území náleží revoluci na základě historických práv. V rozhlasovém projevu premiér označil Pákistán za relikt koloniálního rozdělení. Napětí roste a střet se zdá být nevyhnutelný."
 GOE_RAJ.40.t: "Pohraniční střet severně od Dillí"
 GOE_RAJ.41.a: "Revoluce postupuje."
 GOE_RAJ.41.b: "Hořká ztráta"
 GOE_RAJ.41.desc: "Indické jednotky obsadily pohraničí. Pákistánské síly se po těžkých bojích stáhly a nad regionem nyní vlají komunistické prapory. Indické vysílání to označuje za triumf lidu."
 GOE_RAJ.41.t: "[RAJ.GetName] zabírá [986.GetName]"
 GOE_RAJ.42.a: "Jak se opovažují?"
 GOE_RAJ.42.desc: "Indické jednotky překročily sporné území poblíž [431.GetName]. Na rovinách severně od Kalkaty propukají potyčky. Tvrdí, že území náleží revoluci na základě historických práv. V rozhlasovém projevu premiér označil Pákistán za relikt koloniálního rozdělení. Napětí roste a střet se zdá být nevyhnutelný."
 GOE_RAJ.42.t: "Pohraniční střet v [431.GetName]"
 GOE_RAJ.43.a: "Revoluce postupuje."
 GOE_RAJ.43.b: "Hořká ztráta"
 GOE_RAJ.43.desc: "Indické jednotky obsadily Kalkatu. Pákistánské síly se po těžkých bojích stáhly a nad regionem nyní vlají komunistické prapory. Indické vysílání to označuje za triumf lidu."
 GOE_RAJ.43.t: "[RAJ.GetName] zabírá [431.GetName]"
 GOE_RAJ.44.a: "Jak se opovažují?"
 GOE_RAJ.44.desc: "Indické jednotky překročily sporné území poblíž [433.GetName]. Indické síly obsadily Tádž Mahal. Tvrdí, že území náleží revoluci na základě historických práv. V rozhlasovém projevu premiér označil Pákistán za relikt koloniálního rozdělení. Napětí roste a střet se zdá být nevyhnutelný."
 GOE_RAJ.44.t: "Pohraniční střet v [433.GetName]"
 GOE_RAJ.45.a: "Revoluce postupuje."
 GOE_RAJ.45.b: "Hořká ztráta"
 GOE_RAJ.45.desc: "Indické jednotky obsadily [433.GetName]. Pákistánské síly se po těžkých bojích stáhly a nad regionem nyní vlají komunistické prapory. Indické vysílání to označuje za triumf lidu."
 GOE_RAJ.45.t: "[RAJ.GetName] zabírá [433.GetName]"
 GOE_RAJ.46.a: "Vyžeňte Rudé!"
 GOE_RAJ.46.b: "Nedokážeme ten tlak ustát"
 GOE_RAJ.46.c: "Už jsme na cestě ke komunismu!"
 GOE_RAJ.46.desc: "Nepokoje na venkově přerostly v otevřené povstání, když komunističtí agitátoři, dlouho působící v utajení, vyzvali lid se zbraní v ruce. Vesnice se obrátily proti svým statkářům a nad radnicemi vlají prapory se srpem a kladivem.\n\nPovstání nese jasné stopy toto, že jej organizuje [FROM.GetName], a to v podobě jejich sloganů i zbraní.\n\nZačala nová válka o srdce a duši našeho národa."
 GOE_RAJ.46.t: "Lidové povstání"
 GOE_RAJ.47.a: "Budeme je pečlivě sledovat."
 GOE_RAJ.47.desc: "Indická lidová republika začala rozšiřovat svůj ideologický vliv za své hranice.\n\nV posledních týdnech zesílily v našem politickém prostoru proindické hlasy. Publikace chválí jejich model decentralizovaného socialismu, odpor vůči zahraničnímu vlivu a zdánlivý úspěch při transformaci postkoloniálního státu.\n\nZda jde o koordinované úsilí, jak chce [From.GetNameDef] ovlivnit naši vnitřní politiku, zůstává nejasné - jejich přítomnost je však citelná."
 GOE_RAJ.47.t: "Indický vliv sílí"
 GOE_RAJ.48.a: "Znepokojivé"
 GOE_RAJ.48.desc: "Po sérii publikací a vysílání inspirovaných, tím, jak funguje [RAJ.GetNameDef], se rostoucí část [This.GetAdjective] společnosti obrací k indickému modelu agrárního socialismu. Poselství pozemkové reformy, samosprávy a protiimperiální jednoty nachází odezvu jak u dělníků, tak u rolníků.\n\nAčkoliv jde zatím o okrajové hnutí, mnozí v [This.GetAdjective] vedení se obávají, že bez razantní reakce by se tyto nálady mohly proměnit v masové stávky, nebo hůře - ozbrojenou agitaci sladěnou s revolučními cíli, které prosazuje [From.GetNameDef]."
 GOE_RAJ.48.t: "Indický revoluční vliv na [This.GetNameDef]"
 GOE_RAJ.49.a: "Hořká ztráta"
 GOE_RAJ.49.b: "[431.GetName] je právoplatně naše."
 GOE_RAJ.49.desc: "Pákistánské jednotky si udržely kontrolu nad Kalkatou. Indické síly se po těžkých bojích stáhly a Pákistán nadále region drží. Indické vysílání selhání cenzuruje, aby se vyhnulo celonárodní ostudě."
 GOE_RAJ.49.t: "[PAK.GetName] stále drží [431.GetName]"
 GOE_RAJ.5.a: "Nepřijatelné"
 GOE_RAJ.5.desc: "[FROM.GetName] odmítá naše požadavky a zdůrazňuje, že je nezávislým královstvím s vlastními pravidly a zájmy."
 GOE_RAJ.5.t: "[FROM.GetName] odmítá"
 GOE_RAJ.50.a: "Hořká ztráta"
 GOE_RAJ.50.b: "[433.GetName] je právoplatně náš."
 GOE_RAJ.50.desc: "Pákistánské jednotky stále ovládají [433.GetName]. Indické síly se po těžkých bojích stáhly a Pákistán má region nadále ve svých rukách. Indické vysílání selhání cenzuruje, aby se vyhnulo celonárodní ostudě."
 GOE_RAJ.50.t: "[PAK.GetName] stále drží [433.GetName]"
 GOE_RAJ.51.a: "Hořká ztráta"
 GOE_RAJ.51.b: "[986.GetName] je právoplatně náš."
 GOE_RAJ.51.desc: "Pákistánské jednotky si udržely kontrolu nad pohraničními oblastmi. Indické síly se po těžkých bojích stáhly a Pákistán nadále region drží. Indické vysílání selhání cenzuruje, aby se vyhnulo celonárodní ostudě."
 GOE_RAJ.51.t: "[PAK.GetName] stále drží [986.GetName]"
 GOE_RAJ.6.a: "Skvělé!"
 GOE_RAJ.6.desc: "[FROM.GetName] přijímá naše požadavky a fakticky proměňuje svou zemi v podřízený stát."
 GOE_RAJ.6.t: "[FROM.GetName] ustupuje"
 GOE_RAJ.7.a: "Pomůžeme mu."
 GOE_RAJ.7.a_tt: "§YBudeme povoláni do tažení na [RAJ.GetName], až Čandra Bós zahájí svou revoluci.§!"
 GOE_RAJ.7.b: "Máme jiné plány"
 GOE_RAJ.7.desc: "Ve svém boji za [GetRajAdjective]kou nezávislost se nacionalistický vůdce Čandra Bós obrátil na nás s návrhem destabilizovat indický subkontinent. Pokud návrh přijmeme, budeme vyzváni pomoci se svržením imperiální okupace, až nastane správný čas."
 GOE_RAJ.7.t: "$RAJ_subhas_chanda_bose$ navrhuje svržení [GetRajAdjective]ké vlády"
 GOE_RAJ.8.a: "O krok blíže k nezávislosti"
 GOE_RAJ.8.desc: "[FROM.GetName] naznačila, že nás podpoří v našem boji za nezávislost."
 GOE_RAJ.8.t: "[FROM.GetName] souhlasí s pomocí"
 GOE_RAJ.9.a: "Pomoc stejně nepotřebujeme"
 GOE_RAJ.9.desc: "[FROM.GetName] uvedla, že má vlastní plány, které by byly ohroženy zapojením do války proti [ENG.GetAdjective], a proto nám odmítne poskytnout pomoc."
 GOE_RAJ.9.t: "[FROM.GetName] odmítá nám pomoci"
 GOE_RAJ_33_c_tt: "§RMusíme přežít §Y255 dní§!, než bude nabídnuto příměří. Pokud v době příměří obsadíme všechny státy v západní, východní, centrální, jižní nebo severní Indii, získáme větší územní ústupky!§!"
 GOE_RAJ_eic.2.a: "Musí být flexibilní"
 GOE_RAJ_eic.2.b: "Musí být úsporný"
 GOE_RAJ_eic.2.c: "Musí mít dobré vztahy s vládou"
 GOE_RAJ_eic.2.d: "Musí být nekompromisní"
 GOE_RAJ_eic.2.desc: "Společnost potřebuje pevnou ruku, která povede její růst, a my musíme vybrat vůdce, jenž přinese nejvyšší návratnost investic. Jeho osobnost se promítne do celého vedení, proto je důležité zvolit správně."
 GOE_RAJ_eic.2.t: "Jmenovat generálního ředitele"
 GOE_RAJ_eic.3.a: "Zbláznili se?"
 GOE_RAJ_eic.3.b: "Nechme, ať proudí modrý lotos"
 GOE_RAJ_eic.3.desc: "[FROM.GetName] požaduje, abychom umožnili volný tok opia mezi našimi zeměmi. Pokud jsou lidé ochotni za něj platit, kdo jsme my, abychom jim upírali jejich právo ke spotřebě? Může to být morálně špatné a škodlivé pro jednotlivce, ale kdo jsme, abychom jim v tom bránili, pokud jsou ochotni platit? Jediným problémem je, že [FROM.GetAdjective] vláda zároveň požaduje smluvní přístav, aby mohla dále šířit... zboží."
 GOE_RAJ_eic.3.t: "[RAJ.GetName] požaduje, abychom přijali obchod s opiem"
 GOE_RAJ_eic.4.a: "Zkoušeli jsme cukr, teď přijde bič"
 GOE_RAJ_eic.4.desc: "[FROM.GetName] otevřeně odmítá naše požadavky a připomíma nám, že je suverénním státem s vlastními zákony. Skutečnost, že se je snažíme k něčemu nutit, se blíží rouhání."
 GOE_RAJ_eic.4.t: "[FROM.GetName] kategoricky odmítá"
 GOE_RAJ_eic.5.a: "Dohoda bez nátlaku"
 GOE_RAJ_eic.5.desc: "[FROM.GetName] souhlasí s obchodem velkého množství opia mezi našimi zeměmi. Díky novému smluvnímu přístavu jsme schopni zboží přímo distribuovat po celém světě. Nechť tato spotřeba sbližuje přátele i nepřátele."
 GOE_RAJ_eic.5.t: "[FROM.GetName] souhlasí"
 GOE_RAJ_eic.6.a: "Nejsme ochotni toto území prodat"
 GOE_RAJ_eic.6.a_tt: "[FROM.GetName] již nebude moci znovu požádat o tento stát, ale může žádat o jiné státy."
 GOE_RAJ_eic.6.b: "Nikdy"
 GOE_RAJ_eic.6.b_tt: "[FROM.GetName] již nebude moci žádat o žádné další území"
 GOE_RAJ_eic.6.c: "Zní to jako dohoda"
 GOE_RAJ_eic.6.desc: "[RAJ.GetName], usilující o rozšíření svých obchodních aktivit, nám předkládá nabídku, že odkoupí [RAJ_i_want_to_buy_this_land.GetName] výměnou za značnou míru investic v naší zemi."
 GOE_RAJ_eic.6.t: "[RAJ.GetName] chce odkoupit [RAJ_i_want_to_buy_this_land.GetName]" 
 GOE_RAJ_eic.7.a: "Nakonec povolí"
 GOE_RAJ_eic.7.desc: "[FROM.GetName] nemá ochotu se tohoto území vzdát, avšak do budoucna nevylučuje jiné příležitosti k převodu odlišných území."
 GOE_RAJ_eic.7.t: "[FROM.GetName] se nechce vzdát svého území"
 GOE_RAJ_eic.8.a: "Podivný postoj"
 GOE_RAJ_eic.8.desc: "[FROM.GetName] zcela vylučuje jakýkoli převod území na nás a prohlašuje, že už samotný návrh je urážkou základní slušnosti."
 GOE_RAJ_eic.8.t: "[FROM.GetName] vylučuje jakékoli převody"
 GOE_RAJ_eic.9.a: "Skvělé obchody!"
 GOE_RAJ_eic.9.desc: "[FROM.GetName] přijala obchod. Peníze jim brzy zašleme a převod aktiv je na spadnutí."
 GOE_RAJ_eic.9.t: "[FROM.GetName] souhlasí"
 GOE_RAJ_famine.1.a: "Ou!"
 GOE_RAJ_famine.1.desc: "[?global.famine_state.GetName] hlásí výskyt hnědé skvrnitosti. Úředníci se obávají, že by se toto houbové onemocnění mohlo dále šířit a ohrozit zimní sklizeň."
 GOE_RAJ_famine.1.t: "Hnědá skvrnitost napadá [?global.famine_state.GetName]"
 GOE_RAJ_famine.10.a: "Chladnokrevní hlupáci"
 GOE_RAJ_famine.10.desc: "[FROM.GetName] nás informuje, že nám neposkytne žádnou pomoc s tím, že odmítá představu, že má vůči našemu státu jakoukoli povinnost během takové celosvětové krize."
 GOE_RAJ_famine.10.t: "[FROM.GetName] nám odmítá poskytnout pomoc"
 GOE_RAJ_famine.11.a: "Skvělé!"
 GOE_RAJ_famine.11.desc: "[FROM.GetName] nám velkoryse poskytuje rozsáhlý balík pomoci, který pomohl zmírnit hladomor a zabránit jeho dalšímu šíření do sousedních států."
 GOE_RAJ_famine.11.t: "[FROM.GetName] poskytuje rozsáhlý balík pomoci"
 GOE_RAJ_famine.12.a: "Dobře!"
 GOE_RAJ_famine.12.desc: "[FROM.GetName] nám poskytla menší balík pomoci, který pomohl zmírnit hladomor a zabránit jeho dalšímu šíření do sousedních států. I když by mohli udělat více, je to lepší než nic."
 GOE_RAJ_famine.12.t: "[FROM.GetName] poskytuje menší balík pomoci"
 GOE_RAJ_famine.13.a: "Kilometry získané utrpením prostých lidí."
 GOE_RAJ_famine.13.desc: "Zdá se, že nejhorší fáze hladomoru pominula. Dobrá sklizeň zmírnila největší utrpení a ceny potravin klesají. I když bude trvat nějaký čas obnovit pocit normality, jde o první krok k uzdravení oblasti.\nTváří v tvář této velké tragédii se musíme ptát: jaká je skutečná cena vítězství?"
 GOE_RAJ_famine.13.t: "Hladomor sužující [?global.famine_state.GetName] postupně odeznívá"
 GOE_RAJ_famine.2.a: "Snad je to už konec"
 GOE_RAJ_famine.2.desc: "Silný cyklon následovaný několika bouřemi zasáhl [?global.famine_state.GetName]. Škody jsou rozsáhlé, navíc však došlo k rozšíření hnědé skvrnitosti na větší území, což dále zhoršilo dopady této houby."
 GOE_RAJ_famine.2.t: "[?global.famine_state.GetName] hlásí zasažení cyklonem"
 GOE_RAJ_famine.3.a: "Snad se opět mýlí."
 GOE_RAJ_famine.3.desc: "Oficiální odhady letošních výnosů plodin předpovídají výrazný nedostatek. Je však všeobecně známo, že tyto prognózy byly v minulosti často mylné."
 GOE_RAJ_famine.3.t: "Nespolehlivé odhady úrody"
 GOE_RAJ_famine.4.a: "Distribuční síť potravin je dušena"
 GOE_RAJ_famine.4.desc: "Indické provincie a knížecí státy začaly kvůli obavám z rostoucích cen potravin zavádět meziregionální obchodní bariéry. Tyto překážky mohou ceny potravin dále zvyšovat, jak se jednotlivé provincie stále více izolují."
 GOE_RAJ_famine.4.t: "Provinční obchodní bariéry"
 GOE_RAJ_famine.5.a: "Začíná to být vážné"
 GOE_RAJ_famine.5.desc: "S růstem cen obilí se místní vláda pokusila zavést cenové regulace na pomoc obyvatelstvu. Ty však vedly pouze k tomu, že velké množství obilí zmizelo na černém trhu nebo bylo hromaděno ve skladech.\nMístní vláda již opatření zmírnila, přesto však přetrvává všeobecné přesvědčení, že obilí je výrazný nedostatek, což vede k prudké inflaci."
 GOE_RAJ_famine.5.t: "[?global.famine_state.GetName] zachvacuje cenový chaos"
 GOE_RAJ_famine.6.a: "..."
 GOE_RAJ_famine.6.desc: "Místní vláda schválila program, který upřednostňuje základní zásoby pro vyšší a střední vrstvy obyvatelstva, jež jsou důležité pro těžký průmysl ve státě a jsou nakloněny západním hodnotám a modernizaci. To vedlo k dalšímu prudkému růstu cen potravin."
 GOE_RAJ_famine.6.t: "[?global.famine_state.GetName] zavádí přednostní zásobování"
 GOE_RAJ_famine.7.a: "Tohle není dobré"
 GOE_RAJ_famine.7.desc: "[?global.famine_state.GetName] hlásí propuknutí masových občanských nepokojů. Nedostatek základních zásob donutil početné venkovské obyvatelstvo přesunout se do přeplněných měst při hledání pomoci.\nSituace se rychle vymkla kontrole, jak se začaly formovat davy a dochází ke střetům."
 GOE_RAJ_famine.7.t: "[?global.famine_state.GetName] sužuje hladomor"
 GOE_RAJ_famine.7.tt: "§YHladomor se může každý měsíc rozšířit do sousedních států, pokud nebudou přijata preventivní opatření\nOdemkne kategorii rozhodnutí Hladomor§!"
 GOE_RAJ_famine.9.a: "Promiň, starý brachu. Nemůžeme si nic dovolit."
 GOE_RAJ_famine.9.b: "Zašleme rozsáhlou pomoc"
 GOE_RAJ_famine.9.c: "Zašleme menší pomoc"
 GOE_RAJ_famine.9.desc: "[FROM.Getname] čelí zhoršující se situaci, kdy se část země nachází ve stavu hladomoru. Vláda žádá o jakoukoli pomoc, kterou může mezinárodní společenství poskytnout ke zmírnění utrpení a ukončení nouzového stavu."
 GOE_RAJ_famine.9.t: "[FROM.Getname] žádá o pomoc proti hladomoru"
 GOE_RAJ_famine.9.tt: "Aktivuje rozhodnutí §YHladomor§!"
 GOE_RAJ_generals.1.a: "Rozhodně!"
 GOE_RAJ_generals.1.b: "Nemáme zájem."
 GOE_RAJ_generals.1.desc: "[RAJ.GetLeader] požádal o vyslání [RAJ.GetAdjective] jednotek, které bude [ENG.GetNameDefCap] cvičit pod vedením britských vojáků, a nabízí za tuto službu štědrou platbu."
 GOE_RAJ_generals.1.t: "Koloniální výměna kadetů"
 GOE_RAJ_generals.2.a: "Skvělé!"
 GOE_RAJ_generals.2.desc: "[ENG.GetLeader] odpověděl na náš návrh a souhlasil s tím, že [ENG.GetNameDefCap] přijme naše jednotky na výcvik."
 GOE_RAJ_generals.2.t: "[ENG.GetNameDefCap] souhlasí!"
 GOE_RAJ_generals.3.a: "To je škoda."
 GOE_RAJ_generals.3.desc: "[ENG.GetLeader] odpověděl na náš návrh a uvedl, že nemá zájem."
 GOE_RAJ_generals.3.t: "[ENG.GetNameDefCap] odmítá naši nabídku."
 GOE_RAJ_generals.4.a: ""
 GOE_RAJ_generals.4.b: ""
 GOE_RAJ_generals.4.desc: ""
 GOE_RAJ_generals.4.t: ""
 GOE_RAJ_generals.5.a: ""
 GOE_RAJ_generals.5.desc: ""
 GOE_RAJ_generals.5.t: ""
 GOE_RAJ_generals.6.a: ""
 GOE_RAJ_generals.6.desc: ""
 GOE_RAJ_generals.6.t: ""
 GOE_RAJ_generals.7.a: "Vzájemně výhodná dohoda!"
 GOE_RAJ_generals.7.b: "Nemáme zájem."
 GOE_RAJ_generals.7.desc: "[RAJ.GetLeader] nám zaslal žádost o zajištění nákupu zásobovacího materiálu z [ENG.GetAdjective] civilního průmyslu. Byla nám nabídnuta vysoká provize za zprostředkování těchto obchodů."
 GOE_RAJ_generals.7.t: "[RAJ.GetNameDefCap] žádá o nákup zásob"
 GOE_RAJ_generals.8.a: "Skvělé!"
 GOE_RAJ_generals.8.desc: "[ENG.GetLeader] odpověděl na náš návrh a souhlasil s tím, že od nich můžeme nakupovat zásobovací materiál."
 GOE_RAJ_generals.8.t: "[ENG.GetNameDefCap] souhlasí!"
 GOE_RAJ_generals.9.a: "To je škoda."
 GOE_RAJ_generals.9.desc: "[ENG.GetLeader] odpověděl na náš návrh a uvedl, že nemá zájem."
 GOE_RAJ_generals.9.t: "[ENG.GetNameDefCap] odmítá naši nabídku."
 GOE_RAJ_goa.1.a: "Nestojí to za možný konflikt."
 GOE_RAJ_goa.1.b: "V žádném případě. Goa je a bude naše!"
 GOE_RAJ_goa.1.desc: "[RAJ.GetLeader] požaduje Goa. [RAJ.GetLeader] trvá na tom, že Goa je [RAJ.GetAdjective] územím, a hrozí vojenskou akcí, pokud jim ji nepředáme."
 GOE_RAJ_goa.1.t: "[RAJ.GetNameDefCap] požaduje Goa"
 GOE_RAJ_goa.2.a: "Goa je naše!"
 GOE_RAJ_goa.2.desc: "[FROM.GetLeader] se rozhodl záležitost odložit a umožnil nám anektování Goa, aby zabránil konfliktu."
 GOE_RAJ_goa.2.t: "[FROM.GetNameDefCap] opouští Goa"
 GOE_RAJ_goa.3.a: "To znamená válku!"
 GOE_RAJ_goa.3.b: "Po zralé úvaze ustoupíme."
 GOE_RAJ_goa.3.desc: "[FROM.GetLeader] odpověděl na naše požadavky a odmítl nám právo na Goa navzdory hrozbám vojenské akce."
 GOE_RAJ_goa.3.t: "[FROM.GetNameDefCap] odmítá převod Goa"
 GOE_RAJ_goa.4.a: "Skvělé."
 GOE_RAJ_goa.4.desc: "[RAJ.GetLeader] reagoval na naše hrozby vojenské akce a [RAJ.GetAdjective] jednotky byly z Goa staženy."
 GOE_RAJ_goa.4.t: "[RAJ.GetNameDefCap] ustupuje"
 GOE_RAJ_loyalist.01.a: "$NSB_soviet_spanish_civil_war.4.a$"
 GOE_RAJ_loyalist.01.desc: "Dnes přinášíme dobré zprávy. [RAJ.GetAdjectiveCap] vedení nás oslovilo s návrhem na zvýšení produkce a vývozu základních surovin z [RAJ.GetNonIdeologyName] do širšího Impéria. Můžeme očekávat, že se naše sklady zaplní indickým čajem, bavlnou a jutou, zatímco [RAJ.GetNameDef] prokáže svou hodnotu jako cenný přínos pro naši bohatou říši."
 GOE_RAJ_loyalist.01.t: "[FROM.GetAdjectiveCap] exporty pro Impérium"
 GOE_RAJ_loyalist.02.a: "$NSB_soviet_civil_war_common.126.a$"
 GOE_RAJ_loyalist.02.desc: "Proběhla rozsáhlá jednání o rozvoji výrobních kapacit napříč Impériem. Díky nim má [?RAJ_crown_commodities_civ_built_flag.GetName] nové a rozšířené průmyslová zařízení. Doufáme, že to posílí Impérium tváří v tvář rostoucím globálním požadavkům."
 GOE_RAJ_loyalist.02.t: "$RAJ_the_empires_workshop$"
 GOE_RAJ_loyalist.03.a: "Tato válka by nám mohla prospět. Pokračujme."
 GOE_RAJ_loyalist.03.b: "Útok na [PER.GetNameDef]? Ne, příliš riskantní."
 GOE_RAJ_loyalist.03.desc: "Dnes ráno se na nás obrátily [RAJ.GetAdjective] vládní úřady s návrhem, v němž žádají povolení zaútočit na [PER.GetNameDef]. Uvádějí několik důvodů, včetně ochrany perského koridoru a preventivního zajištění ropných [PER.GetAdjective] polí dříve, než se jich zmocní naši nepřátelé. Taková invaze by mohla vyvolat nevoli světového společenství, avšak bylo by pošetilé přehlížet její přínosy. Jak máme postupovat?"
 GOE_RAJ_loyalist.03.t: "[FROM.GetAdjectiveCap] návrh na invazi do Íránu"
 GOE_RAJ_loyalist.04.a: "Pochodem chod, směr [PER.GetNameDef]!"
 GOE_RAJ_loyalist.04.desc: "Obdrželi jsme dobré zprávy od našeho vyslance v [ENG.GetNameDef]. [ENG.GetAdjectiveCap] vláda souhlasila s tím, abychom se připravili na invazi do [PER.GetNameDef]. S požehnáním Koruny musíme shromáždit naše jednotky a připravit se na válku."
 GOE_RAJ_loyalist.04.t: "[FROM.GetNameDefCap] souhlasí s válkou"
 GOE_RAJ_loyalist.05.a: "Musíme respektovat přání Koruny."
 GOE_RAJ_loyalist.05.desc: "Bohužel se zdá, že naše žádost o útok na [PER.GetNameDef] se nesetkala s pochopením. Koruna rozhodla, že nemáme zahajovat žádné vojenské operace, a přestože s tím nemusíme souhlasit, je rozumné řídit se rozkazy [ENG.GetAdjective] vlády."
 GOE_RAJ_loyalist.05.t: "[FROM.GetNameDefCap] žádá, abychom ustoupili"
 GOE_RAJ_loyalist.06.a: "Musíme posílit financování obrany."
 GOE_RAJ_loyalist.06.b: "Měli bychom se zaměřit na útočné schopnosti."
 GOE_RAJ_loyalist.06.c: "[RAJ.GetAdjectiveCap] letectvo potřebuje naši podporu."
 GOE_RAJ_loyalist.06.d: "Rozšiřme naše námořní operace."
 GOE_RAJ_loyalist.06.desc: "Se zřízením Velitelství jihovýchodní Asie stojíme na rozcestí. Máme omezené zdroje, které můžeme této operaci věnovat, a musíme rozhodnout, na co se zaměřit, abychom podpořili válečné úsilí, které vede [ENG.GetNameDef]."
 GOE_RAJ_loyalist.06.t: "Velitelství jihovýchodní Asie"
 GOE_RAJ_loyalist.07.a: "Nemůžeme jim to dovolit."
 GOE_RAJ_loyalist.07.b: "Musíme přinést oběti pro naši obranu."
 GOE_RAJ_loyalist.07.desc: "Ve jménu ochrany navrhuje [FROM.GetNameDefCap] převést [event_target:RAJ.RAJ_annexing_country_target.GetName] pod [FROM.GetAdjective] správu, aby bylo možné zajistit rozvoj zdejší obrany. Ačkoli tento scénář není z hlediska naší suverenity ideální, můžeme jen předpokládat, že jde o dočasné opatření. Nebo v to alespoň doufáme."
 GOE_RAJ_loyalist.07.t: "Obrana Malajska"
 GOE_RAJ_loyalist.08.a: "$GOE_RAJ_loyalist.07.a$"
 GOE_RAJ_loyalist.08.b: "$GOE_RAJ_loyalist.07.b$"
 GOE_RAJ_loyalist.08.desc: "Ve jménu ochrany navrhuje [FROM.GetNameDefCap] převést [event_target:RAJ.RAJ_annexing_country_target.GetName] pod [FROM.GetAdjective] správu, aby bylo možné zajistit rozvoj zdejší obrany. Ačkoli tento scénář není z hlediska naší suverenity ideální, můžeme jen předpokládat, že jde o dočasné opatření. Nebo v to alespoň doufáme."
 GOE_RAJ_loyalist.09.a: "Tak budiž."
 GOE_RAJ_loyalist.09.desc: "Navzdory našemu nejlepšímu úsilí [FROM.GetNameDef] odmítá naši nabídku ochrany. Zdá se, že náš obranný plán je nepřesvědčil, aby jej svěřili do naší péče."
 GOE_RAJ_loyalist.09.t: "[FROM.GetNameDefCap] odmítá náš obranný plán"
 GOE_RAJ_loyalist.10.a: "Výborně. Zahajte přípravy."
 GOE_RAJ_loyalist.10.desc: "Skvělé zprávy! [FROM.GetNameDefCap] souhlasí s tím, že nám umožní rozmístit jednotky na svém území a podílet se na ochraně jejich zemí před cizí invazí. To výrazně podpoří naše válečné úsilí."
 GOE_RAJ_loyalist.10.t: "[FROM.GetNameDefCap] převádí [event_target:RAJ.RAJ_annexing_country_target.GetName] pod naši správu"
 GOE_RAJ_loyalist.11.a: "$ENG_winston_churchill$ by měl vést [RAJ.GetNameDef]."
 GOE_RAJ_loyalist.11.b: "Churchill nejlépe poslouží jako poradce."
 GOE_RAJ_loyalist.11.c: "[RAJ.GetNameDef] nemá pro Churchilla místo."
 GOE_RAJ_loyalist.11.desc: "Je to temný den pro [ENG.GetAdjective] Impérium. [ENG.GetNameDef] padlo a my se nacházíme v jedinečné pozici, kdy můžeme hostit jejich exilové vedení. Je to částečně díky našemu úsilí znovu potvrdit loajalitu ke Koruně. $ENG_winston_churchill$ vedl [ENG.GetNameDef] podle svých nejlepších schopností a nyní musíme rozhodnout, jakou roli má pro nej [RAJ.GetNameDef]."
 GOE_RAJ_loyalist.11.t: "$RAJ_the_jewel_becomes_the_crown$"
 GOE_RAJ_loyalist.12.a: "Sbohem, $ENG_winston_churchill$."
 GOE_RAJ_loyalist.12.desc: "I v těchto temných časech lze nalézt naději. Navzdory naší kapitulaci dokázal $ENG_winston_churchill$ uprchnout z ostrova a dorazit do [RAJ.GetNonIdeologyName]. Odtud může hájit [ENG.GetAdjective] zájmy a řídit válečné operace, dokud nezískáme zpět naši vlast."
 GOE_RAJ_loyalist.12.t: "$ENG_winston_churchill$ opouští [ENG.GetNameDef]"
 GOE_RAJ_loyalist.13.a: "$ENG_winston_churchill$ by se měl znovu stát premiérem."
 GOE_RAJ_loyalist.13.b: "Jeho služeb již není zapotřebí."
 GOE_RAJ_loyalist.13.desc: "Když je naše domovina konečně opět pod naší kontrolou, můžeme začít obnovovat původní kabinet. $ENG_winston_churchill$ se úspěšně vrátil z [RAJ.GetNonIdeologyName] a nyní musíme rozhodnout, jak budeme postupovat."
 GOE_RAJ_loyalist.13.t: "$ENG_winston_churchill$ se vrací"
 GOE_RAJ_loyalist.14.a: "Můžeme to povolit."
 GOE_RAJ_loyalist.14.b: "Máme s těmi zdroji jiné plány."
 GOE_RAJ_loyalist.14.desc: "Dnes ráno jsme přijali [FROM.GetAdjective] vyslance. [FROM.GetNameDef] žádá o právo těžit [BRM.GetAdjective] wolfram v [288.GetName] na podporu svého rostoucího válečného úsilí. Musíme pečlivě zvážit, jak na tuto žádost reagovat, protože ji nelze brát na lehkou váhu."
 GOE_RAJ_loyalist.14.t: "[BRM.GetAdjectiveCap] wolfram pro [FROM.GetName]"
 GOE_RAJ_loyalist.15.a: "Je dobré to vědět."
 GOE_RAJ_loyalist.15.desc: "Náš suzerén [OVERLORD.GetNameDef] uděluje pro [RAJ.GetNameDef] práva na těžbu wolframu v oblasti [288.GetName], aby mohli zásobovat svůj průmysl a přispět k válečnému úsilí. Je to příležitost dokázat [OVERLORD.GetNameDef], že jsme odhodláni podporovat jejich zájmy v regionu."
 GOE_RAJ_loyalist.15.t: "$state_resource_tungsten$ z [288.GetName] udělen pro [RAJ.GetName]"
 GOE_RAJ_loyalist.16.a: "Značný přínos."
 GOE_RAJ_loyalist.16.desc: "[FROM.GetNameDefCap] nám uděluje práva na těžbu wolframu v [288.GetName]. To by mělo podpořit naše válečné úsilí a umožnit nám pokračovat v boji ve jménu Koruny."
 GOE_RAJ_loyalist.16.t: "[FROM.GetName] uděluje práva na těžbu surovin"
 GOE_RAJ_loyalist.17.a: "Jaké zklamání."
 GOE_RAJ_loyalist.17.desc: "Bohužel [FROM.GetNameDef] odmítá naši žádost o těžbu barmského wolframu. Je to velké zklamání, protože tyto zdroje mohly být klíčové pro udržení rozvoje našeho válečného stroje."
 GOE_RAJ_loyalist.17.t: "Barmský wolfram odepřen pro [FROM.GetName]"
 GOE_RAJ_loyalist.77.t: "Obrana Barmy"
 GOE_RAJ_mughals_peace_deal.1.a: "Skvělé"
 GOE_RAJ_mughals_peace_deal.1.desc: "Konečně se ukázalo, že hospodářské obtíže vleklé války jsou pro [UK_INDIA.GetAdjective] vládu neúnosné. Navzdory námitkám svého suzeréna nám nabídli významné územní ústupky výměnou za mír."
 GOE_RAJ_mughals_peace_deal.1.t: "[UK_INDIA.GetName] nabízí územní ústupky"
 GOE_RAJ_navy.1.a: "To bude prospěšné pro nás oba!"
 GOE_RAJ_navy.1.b: "Nemáme zájem."
 GOE_RAJ_navy.1.desc: "[RAJ.GetLeader] nám zaslal návrh na uzavření námořní obchodní dohody mezi [RAJ.GetAdjective] a [ENG.GetAdjective] správou.\nTo umožní vzájemnou spolupráci v námořní výrobě a zároveň otevře cestu k dalším obchodním dohodám v budoucnu."
 GOE_RAJ_navy.1.t: "[RAJ.GetNameDefCap] navrhuje námořní dohodu"
 GOE_RAJ_navy.10.a: "Vzájemně výhodná dohoda!"
 GOE_RAJ_navy.10.b: "Nemáme zájem."
 GOE_RAJ_navy.10.desc: "[RAJ.GetAdjectiveCap] představitelé požádali o odkoupení práv k našim moderním lodním kontraktům a zároveň žádají právo vyvíjet naše křižníky z roku 1936 pro Královské indické námořnictvo. Za tyto kontrakty nabízejí štědrou finanční kompenzaci."
 GOE_RAJ_navy.10.t: "[RAJ.GetNameDefCap] žádá o práva k moderním lodním kontraktům"
 GOE_RAJ_navy.11.a: "To je skvělá zpráva pro Královské indické námořnictvo!"
 GOE_RAJ_navy.11.desc: "[ENG.GetAdjectiveCap] představitelé odpověděli na naši žádost a souhlasili s udělením vylepšených lodních kontraktů. Na úvod jsme obdrželi pět křižníků, které dorazí již nyní."
 GOE_RAJ_navy.11.t: "[ENG.GetNameDefCap] souhlasí s udělením moderních lodních kontraktů!"
 GOE_RAJ_navy.12.a: "To je škoda."
 GOE_RAJ_navy.12.desc: "[ENG.GetAdjectiveCap] představitelé odpověděli na naši žádost a odmítli nám udělit vylepšené lodní kontrakty s tím, že naše nabídka je pro ně příliš nízká."
 GOE_RAJ_navy.12.t: "[ENG.GetNameDefCap] odmítá nabídku"
 GOE_RAJ_navy.2.a: "Perfektní"
 GOE_RAJ_navy.2.desc: "[FROM.GetAdjectiveCap] představitelé souhlasili s navrhovanou námořní dohodou a podepsali ji. Do budoucna z toho budeme výrazně těžit."
 GOE_RAJ_navy.2.t: "[FROM.GetNameDefCap] souhlasí!"
 GOE_RAJ_navy.3.a: "To je škoda."
 GOE_RAJ_navy.3.desc: "[FROM.GetAdjectiveCap] představitelé odmítli námi navrhovanou námořní dohodu s tím, že jim nepřináší žádný prospěch a je zjevně jednostranná."
 GOE_RAJ_navy.3.t: "[ENG.GetNameDefCap] odmítá obchodní dohodu"
 GOE_RAJ_navy.4.a: "Ta oběť za to stojí."
 GOE_RAJ_navy.4.b: "Za žádných okolností s tím nesouhlasíme!"
 GOE_RAJ_navy.4.desc: "[RAJ.GetAdjectiveCap] představitelé požádali o převelení jednoho z našich námořních velitelů ke službě v Královském indickém námořnictvu, aby pomohl s jeho rozšířením a výcvikem nových námořních pěšáků. Jde o nákladný krok, nicméně nabízejí vysokou finanční odměnu."
 GOE_RAJ_navy.4.t: "[RAJ.GetNameDefCap] žádá o převelení námořního velitele"
 GOE_RAJ_navy.5.a: "Perfektní"
 GOE_RAJ_navy.5.desc: "[FROM.GetAdjectiveCap] představitelé souhlasili s vysláním jednoho ze svých velitelů do [RAJ.GetNonIdeologyName], aby pomohl s naším námořním rozvojem."
 GOE_RAJ_navy.5.t: "[ENG.GetNameDefCap] souhlasí!"
 GOE_RAJ_navy.6.a: "To je škoda."
 GOE_RAJ_navy.6.desc: "[FROM.GetAdjectiveCap] představitelé odmítli vyslat jednoho ze svých velitelů do [RAJ.GetNonIdeologyName] a trvají na tom, abychom si své velitele vycvičili sami."
 GOE_RAJ_navy.6.t: "[ENG.GetNameDefCap] odmítá nabídku"
 GOE_RAJ_navy.7.a: "Stejně jsme je nepoužívali!"
 GOE_RAJ_navy.7.b: "Nemáme zájem."
 GOE_RAJ_navy.7.desc: "[FROM.GetLeader] požádal o odkoupení našich starých vyřazených lodí. Ty sice nejsou v provozu, ale [FROM.GetLeader] trvá na tom, že je [FROM.GetNameDefCap] dokáže využít. Nabízejí vysokou finanční kompenzaci."
 GOE_RAJ_navy.7.t: "[RAJ.GetNameDefCap] žádá o koupi našich vyřazených lodí"
 GOE_RAJ_navy.8.a: "To je skvělá zpráva pro Královské indické námořnictvo!"
 GOE_RAJ_navy.8.desc: "[FROM.GetLeader] přijal naši žádost o koupi jejich vyřazených lodí. Do Indie by měly dorazit v nejbližší době."
 GOE_RAJ_navy.8.t: "[ENG.GetNameDefCap] přijímá naši obchodní nabídku!"
 GOE_RAJ_navy.9.a: "To je škoda."
 GOE_RAJ_navy.9.desc: "[FROM.GetLeader] odmítl naši nabídku na odkoupení jejich lodí a nyní musíme hledat jinou cestu k rozšíření našeho námořnictva."
 GOE_RAJ_navy.9.t: "[ENG.GetNameDefCap] odmítá nabídku"
 GOE_RAJ_news.1.a: "Podruhé to vyjde."
 GOE_RAJ_news.1.desc: "S tím, jak [RAJ.GetNonIdeologyName] zažívá rostoucí napětí, jak [?event_target:EIC_FORMER.GetNonIdeologyName] stabilizuje region, stala klíčovým tématem jednání v jejich parlamentu. Dnes ráno pronesl [?event_target:EIC_FORMER.GetLeader] projev, v němž oznámil [?event_target:EIC_FORMER.GetLeader.GetHerHis] plán vytvořit nový korporátní stát v [429.GetName]i, aby podpořil hospodářský růst [RAJ.GetNonIdeologyName], tak [?event_target:EIC_FORMER.GetNonIdeologyName]. Tvrdí, že tento stát bude fungovat nezávisle na Koruně, ale přesto [?event_target:EIC_FORMER.GetNonIdeologyName] bude mít ekonomické pouto prostřednictvím daní. Také jej popsal jako „duchovního nástupce Východoindické společnosti 19. století“.\n\n[?event_target:EIC_FORMER.GetLeader] uvedl, že ačkoli to může přinést dočasný zmatek a zvýšenou nestabilitu, otevře to cestu k nové hospodářské jistotě a postupné stabilizaci regionu."
 GOE_RAJ_news.1.t: "Návrat [?event_target:EIC_FORMER.GetAdjectiveCap] Východoindické společnosti"
 GOE_RAJ_news.2.a: "Rádž padl."
 GOE_RAJ_news.2.desc: "Rychle sílící komunistické nálady, které zažívá [RAJ.GetNonIdeologyName], dnes dosáhly kritického bodu, když Královské indické námořnictvo vyhlásilo vzpouru, čímž již oslabená koloniální správa ztratila i ten zbytek vlivu, který měla nad subkontinentem. Výsledkem je vyhlášení nové Indické lidové republiky, kterou vede [RAJ.GetLeader].\n\nAby se předešlo nevyhnutelnému konfliktu, [RAJ.GetLeader] si již zajistil dohodu o [PAK.GetAdjective] autonomii, jejímž výsledkem vzniká [PAK.GetNameDef] jako nezávislý stát. Jeho vůdce [PAK.GetLeader], již souhlasil s okamžitým uzavřením příměří mezi oběma zeměmi."
 GOE_RAJ_news.2.t: "Vzpoura v Královském indickém námořnictvu"
 GOE_RAJ_news.3.a: "Slibné."
 GOE_RAJ_news.3.desc: "Rozhodnutí obnovit Východoindickou společnost v Indii přijalo [?event_target:EIC_FORMER.GetNameDef] před několika lety s cílem stabilizovat upadající [RAJ.GetAdjective] hospodářství. Jelikož byl tento krok obecně považován za úspěšný i podle [?event_target:EIC_FORMER.GetAdjective] ekonomů, [?event_target:EIC_FORMER.GetAdjective] vláda oznámila, že s okamžitou platností bude zbývající území pod správou Rádže spravovat [RAJ.GetNameDefCap]. Správa Rádže bude zrušena, což umožní, aby [RAJ.GetNameDefCap] mohla spravovat celý subkontinent."
 GOE_RAJ_news.3.t: "Umíráček Rádže"
 GOE_RAJ_partition.10.a: "Nemáme na to čas"
 GOE_RAJ_partition.10.b: "Musíme tomu učinit konec"
 GOE_RAJ_partition.10.desc: "Na indickém subkontinentu vypukla válka. Mohlo by být v našem zájmu zasáhnout, jelikož máme značný vliv na obě země, a učinit této šílenosti konec."
 GOE_RAJ_partition.10.t: "Válka na indickém subkontinentu"
 GOE_RAJ_partition.11.desc: "Po mnoho let byl [RAJ.GetNameDef] spravován především muži Koruny, avšak s rostoucími požadavky na samosprávu je nezbytné vytvořit nový indický parlament. Ten umožní domácímu vedení podílet se na formování země, zatímco budou i nadále zohledněny zájmy Impéria. Přesto musíme rozhodnout, kdo by měl tuto novou vládu vést."
 GOE_RAJ_partition.2.a: "Ať policie ustoupí."
 GOE_RAJ_partition.2.b: "Rozežeňte dav."
 GOE_RAJ_partition.2.desc: "[?unrest_target_state.GetName] hlásí propuknutí protestů proti [ENG.GetAdjective] vládě, přičemž místní bezpečnostní složky hlásí narůstající násilné střety mezi demonstranty a úřady."
 GOE_RAJ_partition.2.t: "[?unrest_target_state.GetName] zažívá rozsáhlé protesty"
 GOE_RAJ_partition.3.a: "Nasadit národní gardu"
 GOE_RAJ_partition.3.b: "Pokusit se zprostředkovat jednání s agitátory"
 GOE_RAJ_partition.3.desc: "Napětí, které zmítá [?unrest_target_state.GetName], dosáhlo kritické úrovně, zatímco místní policie jen stěží zvládá stále neklidnější davy. Továrny napojené na vládu se staly hlavním cílem agitátorů a čelí častým sabotážím uprostřed narůstajících nepokojů."
 GOE_RAJ_partition.3.t: "[?unrest_target_state.GetName] zmítají nepokoje"
 GOE_RAJ_partition.4.a: "Je to naše vina?"
 GOE_RAJ_partition.4.b: "Kampaň ke snížení napětí"
 GOE_RAJ_partition.4.c: "Uvěznit agitátory"
 GOE_RAJ_partition.4.desc: "S tím, jak sílí tlak na nezávislost, se prohlubuje vážné rozdělení společnosti. Hinduisté, odhodlaní zachovat jednotnou Indii, se stále častěji dostávají do střetu s muslimy, kteří se obávají marginalizace v hinduistickém státě a volají po vytvoření samostatné vlasti. Tato eskalující situace zažehla násilné střety mezi extremistickými frakcemi obou komunit a vážně ohrožuje stabilitu země."
 GOE_RAJ_partition.4.t: "Náboženské násilí"
 GOE_RAJ_partition.5.a: "Situace se vyvíjí..."
 GOE_RAJ_partition.5.b: "Zvýšit policejní opatření"
 GOE_RAJ_partition.5.desc: "Zatímco muslimské hlasy v stále hlasitěji požadují oddělenou vlast mimo Indii, hinduističtí nacionalisté vyšli do ulic s protesty proti rostoucímu vlivu muslimů v zemi, což často vede k násilným střetům."
 GOE_RAJ_partition.5.t: "Střety mezi hinduisty a muslimy"
 GOE_RAJ_partition.6.a: "Všichni, bez ohledu na náboženství, jsme si rovni jako děti Indie."
 GOE_RAJ_partition.6.desc: "Před mnoha lety jsme uzavřeli schůzku s osudem a nyní nadešel čas svůj slib naplnit - ne zcela ani v plné míře, ale velmi podstatně. Úderem půlnoci, když svět spí, se Indie probudí k životu a svobodě. Přichází okamžik, který se v dějinách objevuje jen zřídka, kdy vystupujeme ze starého do nového, kdy jedna éra končí a duše národa, dlouho potlačovaná, konečně nachází svůj hlas."
 GOE_RAJ_partition.6.t: "Schůzka s osudem"
 GOE_RAJ_partition.7.a: "Nehru je jasnou volbou"
 GOE_RAJ_partition.7.b: "Muž, který tolik obětoval - Gándhí"
 GOE_RAJ_partition.7.c: "Džinnáh si zaslouží šanci"
 GOE_RAJ_partition.7.d: "Louis Mountbatten, stále potřebujeme jejich pomoc"
 GOE_RAJ_partition.7.desc: "Jak se naše země uzavírá kapitolu poznamenanou podrobením, otevírá se nová kapitola sebeurčení."
 GOE_RAJ_partition.7.t: "Otázka vedení"
 GOE_RAJ_partition.8.a: "Co mohl spatřit v té temné propasti?"
 GOE_RAJ_partition.8.desc: "Muž identifikovaný jako Nathuram Godse se pokusil o atentát na Mahátmu Gándhího během mnohonáboženské modlitby, avšak byl zadržen členy prezidentské ochranky dříve, než stačil vystřelit.\nGándhí je v pořádku a byl převezen na bezpečné místo; mluvčí uvedli, že byl touto událostí hluboce otřesen a zdá se, že se ponořil do hlubokého rozjímání o budoucím směřování světa a o svém místě v něm."
 GOE_RAJ_partition.8.t: "Gándhí přežil pokus o atentát"
 GOE_RAJ_partition.9.a: "Máme jen omezený čas"
 GOE_RAJ_partition.9.desc: "[ENG.GetName] vyjádřujel vážné obavy nad boji na indickém subkontinentu. Jeho vláda nám dala jasně najevo, že není ochotna sledovat, jak obě země sklouzávají do krvavé války, a v případě potřeby zasáhne silou, aby ji ukončila."
 GOE_RAJ_partition.9.t: "[ENG.GetName] se připravuje zasáhnout"
 GOE_RAJ_partition_become_free_to_stop_the_chaos_tt: "Nestabilita bude pokračovat, dokud nezískáme nezávislost"
 GOE_RAJ_princely.1.a: "$RAJ_mir_osman_ali_khan$ povede naši říši ke slávě"
 GOE_RAJ_princely.1.b: "$RAJ_mirza_khurshid_jah_bahadur$ je nejrozumnější volba"
 GOE_RAJ_princely.1.c: "$RAJ_ahmad_yar_khan$ nás ochrání!"
 GOE_RAJ_princely.1.d: "$RAJ_huseyn_shaheed_suhrawardy$ nás povede do budoucnosti!"
 GOE_RAJ_princely.1.desc: "Historická říše Bábura byla rozsáhlá a osvícená a po staletí vládla subkontinentu. Pokud chceme dostát tomuto odkazu, čeká nás ještě mnoho práce. Ačkoliv mnozí z rodu Gurkání přežívají, jen jeden nás může dovést ke slávě."
 GOE_RAJ_princely.1.t: "Volba knížete, který se postaví do čela [ROOT.GetNameDef]"
 GOE_RAJ_princely.2.a: "$RAJ_huseyn_shaheed_suhrawardy$ nás povede do budoucnosti!"
 GOE_RAJ_princely.2.b: "$RAJ_maharaja_hari_singh$ má podporu lidu!"
 GOE_RAJ_princely.2.c: "$RAJ_bodh_chandra_singh$ je náš nejlepší stratég!"
 GOE_RAJ_princely.2.d: "Ani jeden z nich není dost dobrý."
 GOE_RAJ_princely.2.desc: "$GOE_RAJ_princely.1.desc$"
 GOE_RAJ_princely.2.t: "Volba knížete, který se postaví do čela [ROOT.GetNameDef]"
 GOE_RAJ_princely.3.a: "$RAJ_umed_singh$ má cit pro lidi."
 GOE_RAJ_princely.3.b: "$RAJ_pratap_singh_rao_gaekwad$ je zjevnou volbou!"
 GOE_RAJ_princely.3.c: "$RAJ_maharaja_jayachamarajendra_wadiyar$ je nejlepší."
 GOE_RAJ_princely.3.d: "Možná bychom měli znovu zvážit první seznam."
 GOE_RAJ_princely.3.desc: "$GOE_RAJ_princely.1.desc$"
 GOE_RAJ_princely.3.t: "Volba knížete, který se postaví do čela [ROOT.GetNameDef]"
 GOE_RAJ_transfered_commander_tt: "Převelen do [RAJ.GetNonIdeologyName]"
 GOE_generic_events.1.a: "Vichistická vláda je legitimní autoritou."
 GOE_generic_events.1.b: "Podpoříme vládu v exilu."
 GOE_generic_events.1.c: "Zbavíme se Francouzů jednou provždy!"
 GOE_generic_events.1.desc: "Neschopnost [FRA.GetAdjective] armády ubránit Paříž vedla ke zhroucení vlády. Po narychlo sjednaném příměří vznikl ve Vichy nový režim. Řada [FRA.GetAdjective] představitelů však uprchla do zahraničí, kde založila vládu v exilu a přísahala pokračovat v boji, dokud nebude [FRA.GetNonIdeologyName] osvobozena. Naši vládu nyní čeká obtížné rozhodnutí."
 GOE_generic_events.1.t: "[FRA.GetAdjectiveCap] vláda se hroutí"
 GOE_generic_events.2.a: "Moudré rozhodnutí."
 GOE_generic_events.2.desc: "[FROM.GetNameDef] dává jasně najevo svůj závazek respektovat naši autoritu jako jediného zástupce [FRA.GetAdjective] lidu a nadále následovat naše vedení ve všech otázkách zahraniční politiky."
 GOE_generic_events.2.t: "[FROM.GetAdjectiveCap] správa zůstává loajální"
 GOE_generic_events.3.a: "Tohle nemůže zůstat bez odezvy!"
 GOE_generic_events.3.b: "Jsou bezvýznamní."
 GOE_generic_events.3.desc: "[FROM.GetNameDef] nás bodá do zad tím, že odmítá uznat naši autoritu jako legitimní [FRA.GetAdjective] vládu. Místo toho přislíbila loajalitu našim nepřátelům."
 GOE_generic_events.3.t: "[FROM.GetAdjectiveCap] správa nás zrazuje"
 GOE_generic_events.4.a: "Toto oportunistické chování je nepřijatelné."
 GOE_generic_events.4.b: "Bylo nevyhnutelné, že se něco takového stane."
 GOE_generic_events.4.desc: "[FROM.GetAdjectiveCap] vláda využila nedávného chaosu k vyhlášení nezávislosti na nás. Naše ozbrojené síly se sice stále vzpamatovávají ze změny vlády, přesto se domnívají, že je možné situaci znovu získat pod kontrolu a donutit [FROM.GetAdjective] území vrátit se pod naši správu."
 GOE_generic_events.4.t: "[FROM.GetAdjectiveCap] správa vyhlašuje nezávislost"
 GOE_generic_events.5.a: "Zvítězíme!"
 GOE_generic_events.5.desc: "Naši bývalí utlačovatelé zuří nad naším vyhlášením nezávislosti a začínají mobilizovat své síly, aby potlačili naše nově nabyté svobody. Zdá se, že naši nezávislost nezískáme bez krveprolití."
 GOE_generic_events.5.t: "Obrana naší nezávislosti"
 GOE_generic_events_1_tt: "§RVichistická Francie nám může vyhlásit válku!§!"
 IRQ_kurdistan_events.1.a: "Samozřejmě, že pomůžeme!"
 IRQ_kurdistan_events.1.b: "[IRQ.GetNameDefCap] a jeho problémy jsou mimo náš zájem."
 IRQ_kurdistan_events.1.desc: "Právě jsme obdrželi zprávy od [IRQ.GetAdjective] kurdských nacionalistů, kteří žádají o pomoc pro svou revoluci."
 IRQ_kurdistan_events.1.t: "Kurdští nacionalisté nás žádají o pomoc"
 IRQ_kurdistan_events.2.a: "To jsou skvělé zprávy!"
 IRQ_kurdistan_events.2.desc: "Naše kontakty se vyplatily. [FROM.GetNameDefCap] reaguje na naši žádost o pomoc a souhlasí, že podpoří naši věc."
 IRQ_kurdistan_events.2.t: "[FROM.GetNameDefCap] souhlasí s poskytnutím pomoci"
 IRQ_kurdistan_events.3.a: "Nesmíme se tím nechat odradit!"
 IRQ_kurdistan_events.3.desc: "Naše kontakty odpověděly na naši žádost o pomoc. Bohužel, [FROM.GetNameDefCap] ji odmítá. Jsme na to sami."
 IRQ_kurdistan_events.3.t: "[FROM.GetNameDefCap] odmítá pomoci"
 IRQ_kurdistan_events.4.a: "Dělníci mají pravdu."
 IRQ_kurdistan_events.4.b: "Tyto socialistické praktiky nemůžeme dopustit!"
 IRQ_kurdistan_events.4.desc: "V důsledku našeho nedávného tlaku na industrializaci jsme zaznamenali vznik několika odborových svazů. Tovární dělníci se spojili a požadují to, co považují za spravedlivé pracovní podmínky. Uklidnění jejich požadavků by nám mohlo prospět, avšak není jisté, jaké to bude mít politické důsledky."
 IRQ_kurdistan_events.4.t: "Vznik odborových svazů"
 IRQ_political_events.10.a: "Zasáhneme a dosadíme do čela naše přátele."
 IRQ_political_events.10.b: "Vydat diplomatický protest."
 IRQ_political_events.10.desc: "Anglo-irácká smlouva byla vyjednána roku 1930, aby mladému státu poskytla větší autonomii, avšak zároveň jej pevně vázala na naši zahraniční politiku. Vláda ji však zrušila a požaduje, abychom se zcela stáhli z [FROM.GetAdjective] území. Vzhledem k naší závislosti na ropě z tohoto regionu by to mohlo ohrozit naši národní bezpečnost, pokud by se [FROM.GetAdjective] vláda rozhodla přerušit dodávky."
 IRQ_political_events.10.t: "[FROM.GetNonIdeologyName] ruší smlouvu"
 IRQ_political_events.11.a: "Vítězství pro arabský svět!"
 IRQ_political_events.11.desc: "K našemu překvapení vydala [FROM.GetAdjective] vláda pouze ostře formulovaný diplomatický protest adresovaný našemu velvyslanci v reakci na naše odstoupení od z anglo-irácké smlouvy. Zdá se, že prozatím [FROM.GetNameDef] neplánuje pro nás žádné vážnější následky."
 IRQ_political_events.11.t: "[FROM.GetNameDef] vydává diplomatický protest"
 IRQ_political_events.12.a: "Budeme bránit své území."
 IRQ_political_events.12.b: "Tohle nestojí za válku."
 IRQ_political_events.12.desc: "[FROM.GetNameDef] požaduje, abychom postoupili naše západní území, kde žije významná arabská menšina. Tvrdí, že jde o ochranu místních Arabů. Tato oblast však zároveň obsahuje rozsáhlou ropnou infrastrukturu, která by zjevně prospěla jejich hospodářství. Pokud toto ultimátum odmítneme, je pravděpodobné, že se pokusí území získat silou."
 IRQ_political_events.12.t: "[FROM.GetNameDefCap] požaduje území"
 IRQ_political_events.13.a: "Další vítězství pro arabský svět."
 IRQ_political_events.13.desc: "[FROM.GetNameDefCap] souhlasí s převodem území, které jsme požadovali. Ačkoli byla naše armáda připravena kvůli této oblasti bojovat, zdá se, že jsme zvítězili bez jediného výstřelu."
 IRQ_political_events.13.t: "[FROM.GetNameDefCap] souhlasí s převodem území"
 IRQ_political_events.14.a: "Pak si ho vezmeme silou."
 IRQ_political_events.14.b: "Prohlédli náš bluf."
 IRQ_political_events.14.desc: "[FROM.GetNameDefCap] odmítá převést území, které jsme požadovali. Zdá se, že pokud chceme oblast osvobodit spod [FROM.GetAdjective] nadvlády, budeme se muset spolehnout na své ozbrojené síly."
 IRQ_political_events.14.t: "[FROM.GetNameDefCap] odmítá převod území"
 IRQ_political_events.15.a: "Skutečně vítaná úleva."
 IRQ_political_events.15.desc: "Zdá se, že [FROM.GetAdjective] ozbrojené síly ustupují od zvýšené bojové pohotovosti podél hranice. Ačkoli jsme byli připraveni bránit své území, je vítanou úlevou, že se válce prozatím podařilo vyhnout."
 IRQ_political_events.15.t: "[FROM.GetNameDef] se stahuje"
 IRQ_political_events.16.a: "Odměníme je, pokud s tím místní nebudou mít problém."
 IRQ_political_events.16.b: "Nelze jim věřit."
 IRQ_political_events.16.desc: "Poté, co [FROM.GetAdjective] vláda prokázala svou loajalitu odstraněním pro[GER.GetAdjective] důstojníků z armády, požádala o možnost integrovat sousední [455.GetName]. Vazby mezi královskými rodinami obou zemí již existují a tento krok by nám odlehčil část administrativní zátěže."
 IRQ_political_events.16.t: "[FROM.GetNameDefCap] chce kontrolovat [455.GetName]"
 IRQ_political_events.17.a: "Je to vítaná změna."
 IRQ_political_events.17.b: "Současné uspořádání nám vyhovuje."
 IRQ_political_events.17.desc: "[FROM.FROM.GetNonIdeologyName] se snaží rozšířit své pravomoci v rámci [FROM.GetAdjective] sféry vlivu tím, že bude spravovat [ROOT.GetNameDef]. Pokud souhlasíme, přestaneme být přímo odpovědní [FROM.GetAdjective] suzerénu, avšak nadále nebudeme mít prostředky k samostatnému vystupování na světové scéně."
 IRQ_political_events.17.t: "[FROM.FROM.GetNonIdeologyName] nás chce spravovat"
 IRQ_political_events.18.a: "Je čas slavit!"
 IRQ_political_events.18.desc: "Dnešek je radostným dnem pro náš národ, neboť oficiálně začínáme spravovat [455.GetName]. Jde o významný krok k sjednocení širšího arabského světa pod naší vládou."
 IRQ_political_events.18.t: "[FROM.GetNameDefCap] souhlasí s převodem"
 IRQ_political_events.19.a: "Temný den pro [ROOT.GetNonIdeologyName] i [455.GetName]."
 IRQ_political_events.19.desc: "Kvůli celé řadě komplikací [FROM.GetNameDef] odmítá náš plán převzít odpovědnost za [455.GetName]. Zdá se, že navzdory veškeré snaze zavděčit se námi stále pohŕdají."
 IRQ_political_events.19.t: "[FROM.GetNameDefCap] odmítá převod"
 IRQ_political_events.20.a: "Nepochybně překvapivé."
 IRQ_political_events.20.desc: "[FROM.GetAdjectiveCap] vláda odmítla plán převést odpovědnost za jejich zemi na [IRQ.GetNonIdeologyName]. Přestože jsme se domnívali, že je to potěší, zdá se, že dávají přednost ďáblu, kterého už znají."
 IRQ_political_events.20.t: "[FROM.GetNameDef] odmítá návrh"
 IRQ_political_events.21.a: "Zajistěte převod správy, ale nejprve se poraďte s místními."
 IRQ_political_events.21.b: "Zapomínají, kde je jejich místo."
 IRQ_political_events.21.desc: "[FROM.GetNameDef] požaduje naše okamžité stažení z regionu v návaznosti na nedávné vlny násilí na tomto území. Tvrdí, že jsou lépe schopni spravovat mandátní území a že náš způsob správy poškozuje jejich arabské bratry. Stažení by sice bylo výhodné pro naši armádu, ale dopady na zahraniční politiku by mohly být značné."
 IRQ_political_events.21.t: "[FROM.GetNameDefCap] chce, ať je [454.GetName] spravována nima"
 IRQ_political_events.22.a: "Současné uspořádání je neudržitelné..."
 IRQ_political_events.22.b: "Máme vlastní agendu."
 IRQ_political_events.22.desc: "[FROM.GetAdjectiveCap] vláda plánuje, že [ROOT.GetName] změní správce a tím novým bude [IRQ.GetNameDef]. Pokud okamžitě nepodnikneme kroky k narušení tohoto procesu, bude nám během několika dní rozkazovat [IRQ.Capital.GetCapitalVictoryPointName]."
 IRQ_political_events.22.t: "[FROM.FROM.GetNonIdeologyName] plánuje převzetí správy"
 IRQ_political_events.23.a: "Arabská solidarita dnes zvítězila."
 IRQ_political_events.23.desc: "[ENG.GetAdjectiveCap] vláda si uvědomila, že situace je pro její síly neudržitelná, a souhlasila, že [454.GetName] se bude lépe spravovat z našich rukou."
 IRQ_political_events.23.t: "[ENG.GetNameDefCap] souhlasí s převodem"
 IRQ_political_events.24.a: "Arabský svět dnes truchlí."
 IRQ_political_events.24.b: "Tohle nestrpíme. [FROM.GetNameDefCap] již není pro nás partner."
 IRQ_political_events.24.desc: "Kvůli celé řadě komplikací [FROM.GetNameDef] odmítá náš plán, aby byla [454.GetName] spravována námi. Navzdory nabídce, která by umožnila pro [ENG.GetNameDef] klidné stažení z regionu, se rozhodli pokračovat v krvavé a nákladné okupaci bez ohledu na cenu."
 IRQ_political_events.24.t: "[FROM.GetNameDefCap] odmítá převod"
 IRQ_political_events.25.a: "Imperialističtí lokajové"
 IRQ_political_events.25.desc: "[FROM.GetAdjectiveCap] vláda odmítla plán převést odpovědnost za jejich zemi na [IRQ.GetNonIdeologyName]. Přestože jsme se domnívali, že je to potěší, zdá se, že dávají přednost ďáblu, kterého už znají."
 IRQ_political_events.25.t: "[FROM.GetNameDef] odmítá návrh"
 IRQ_political_events.26.a: "Společně jsme silnější."
 IRQ_political_events.26.b: "V tuto chvíli nemáme zájem."
 IRQ_political_events.26.c: "Nikdy se nevzdáme své suverenity!"
 IRQ_political_events.26.desc: "[FROM.GetNameDef] nás oslovuje s nabídkou členství v jejich federaci. Přestože by přistoupení přineslo nepochybné hospodářské a bezpečnostní výhody, museli bychom se vzdát značné části své autonomie."
 IRQ_political_events.26.t: "[FROM.GetNameDefCap] nabízí členství ve federaci"
 IRQ_political_events.27.a: "Společně jsme silnější."
 IRQ_political_events.27.desc: "[FROM.GetNameDefCap] moudře přijímá naši nabídku členství ve federaci. Naši úředníci a diplomaté již připravují veškeré kroky k rychlému integračnímu procesu."
 IRQ_political_events.27.t: "[FROM.GetNameDefCap] souhlasí s členstvím ve federaci"
 IRQ_political_events.28.a: "Možná změní názor?"
 IRQ_political_events.28.desc: "[FROM.GetNameDefCap] pošetile odmítá naši nabídku členství ve federaci. Zároveň však netvrdí, že bude proti vstupu i v budoucnu, až bude jejich obyvatelstvo vnímavější."
 IRQ_political_events.28.t: "[FROM.GetNameDefCap] odmítá členství ve federaci"
 IRQ_political_events.29.a: "Jak krátkozraké..."
 IRQ_political_events.29.desc: "[FROM.GetNameDefCap] tvrdě odmítá naši nabídku členství ve federaci. Trvají na tom, že takové uspořádání nikdy dobrovolně nepřijmou kvůli obavám z dopadů na svou zemi."
 IRQ_political_events.29.t: "[FROM.GetNameDefCap] se staví proti federaci"
 IRQ_political_events.30.a: "Další válku si nemůžeme dovolit."
 IRQ_political_events.30.b: "Jen blufují."
 IRQ_political_events.30.desc: "[FROM.GetNameDef] vznáší odvážný požadavek, abychom se vzdali kontroly nad Libanonem, s odkazem na svou povinnost chránit a sjednotit arabské národy regionu. Ačkoli své nároky zahalují do jazyka panarabismu, je zřejmé, že klíčovou roli v jejich ambicích hraje strategická poloha území a jeho hospodářský potenciál, včetně cenných přístavů a infrastruktury. Pokud jejich požadavky odmítneme, je nepravděpodobné, že by tuto záležitost nechali vyšumět do ztracena."
 IRQ_political_events.30.t: "[FROM.GetNameDef] chce kontrolovat [553.GetName]"
 IRQ_political_events.31.a: "Zajistěte převod správy, ale nejprve se poraďte s místními."
 IRQ_political_events.31.b: "Zapomínají, kde je jejich místo."
 IRQ_political_events.31.desc: "[FROM.GetNameDef] požaduje náš okamžitý odchod z regionu po nedávných vlnách násilí na tomto území. Tvrdí, že jsou lépe připraveni zvládnout správu mandátu a že naše jednání poškozuje jejich arabské bratry. Stažení by sice prospělo naší armádě, avšak zahraničněpolitické dopady by mohly být značné."
 IRQ_political_events.31.t: "[FROM.GetNameDefCap] chce kontrolovat [553.GetName]"
 IRQ_political_events.32.a: "Současné uspořádání je neudržitelné..."
 IRQ_political_events.32.b: "Máme vlastní agendu."
 IRQ_political_events.32.desc: "[FROM.GetAdjectiveCap] vláda plánuje opustit [ROOT.GetName] a předat jeho správu na [IRQ.GetNameDef]. Pokud okamžitě nepodnikneme kroky k narušení tohoto procesu, bude nám během několika dní rozkazovat [IRQ.Capital.GetCapitalVictoryPointName]."
 IRQ_political_events.32.t: "[FROM.FROM.GetNonIdeologyName] plánuje převzetí správy"
 IRQ_political_events.33.a: "Arabská solidarita dnes zvítězila."
 IRQ_political_events.33.desc: "[ENG.GetAdjectiveCap] vláda si uvědomila, že situace je pro její síly neudržitelná, a souhlasila s tím, že opustí [454.GetName] a předá pravomoci nad regionem nám."
 IRQ_political_events.33.t: "[ENG.GetNameDefCap] souhlasí s převodem"
 IRQ_political_events.34.a: "Arabský svět dnes truchlí."
 IRQ_political_events.34.desc: "Kvůli celé řadě komplikací [FROM.GetNameDef] odmítá náš plán převzít odpovědnost za [553.GetName]. Navzdory nabídce, která by umožnila pro [ENG.GetNameDef] klidné stažení z regionu, se rozhodli pokračovat v krvavé a nákladné okupaci bez ohledu na cenu."
 IRQ_political_events.34.t: "[FROM.GetNameDefCap] odmítá převod"
 IRQ_political_events.35.a: "Imperialističtí lokajové"
 IRQ_political_events.35.desc: "[FROM.GetAdjectiveCap] vláda odmítla plán převést odpovědnost za jejich zemi na [IRQ.GetNonIdeologyName]. Přestože jsme se domnívali, že je to potěší, zdá se, že dávají přednost ďáblu, kterého už znají."
 IRQ_political_events.35.t: "[FROM.GetNameDef] odmítá návrh"
 IRQ_political_events.40.a: "Moc na výběr nemáme."
 IRQ_political_events.40.b: "Rozhodně ne!"
 IRQ_political_events.40.desc: "[FROM.GetNameDef] formálně požaduje, abychom předali kontrolu nad Sýrií do jejich rukou. Tvrdí, že Sýrii jako nedílnou součást arabského světa má mít pod kontrolou [FROM.GetNameDef], aby byla zajištěna stabilita a prosperita regionu. Ačkoli tuto žádost prezentují jako krok k arabské jednotě, postoupení Sýrie by výrazně oslabilo náš vliv na Blízkém východě. Odmítnutí návrhu by mohlo dále vyhrotit vztahy a vést k eskalaci."
 IRQ_political_events.40.t: "[FROM.GetNameDefCap] žádá o Sýrii"
 IRQ_political_events.41.a: "Bude nám lépe."
 IRQ_political_events.41.b: "Současné uspořádání nám vyhovuje."
 IRQ_political_events.41.desc: "V překvapivém vývoji událostí [FROM.GetNameDef] souhlasí s předáním správy nad námi na [FROM.FROM.GetNameDef]. Mnozí v naší vládě pochybují, zda tato dohoda skutečně odráží naše zájmy, nebo zda nejsme pouze pěšákem ve větší geopolitické hře. Nastal čas rozhodnout se, zda tento převod přijmeme, nebo se postavíme vnucené cizí kontrole."
 IRQ_political_events.41.t: "[FROM.GetNameDefCap] nás hodlá převést"
 IRQ_political_events.42.a: "Neměli bychom to dál hrotit."
 IRQ_political_events.42.b: "Máme jiné prostředky, jak území získat."
 IRQ_political_events.42.desc: "[FROM.GetNameDef] jednoznačně odmítá náš návrh na převedení Sýrie pod naši správu a také odmítá naši vizi arabské jednoty a regionální stability. Toto odmítnutí podkopává snahy o sjednocení arabského světa a upírá syrskému lidu možnost stát se součástí silnějšího, jednotného státu. Nyní je otázkou, zda se pokusíme pokračovat diplomatickou cestou, nebo se připravíme na razantnější řešení sporu."
 IRQ_political_events.42.t: "[FROM.GetNameDefCap] odmítá žádost"
 IRQ_political_events.43.a: "Výborně!"
 IRQ_political_events.43.desc: "[FROM.GetNameDef] souhlasí s naším návrhem převést Sýrii pod naši správu, což představuje významný krok k sjednocení arabského světa. Tato historická dohoda posiluje naši pozici regionálního lídra a přibližuje nás k naplnění vize sjednoceného a prosperujícího arabského národa."
 IRQ_political_events.43.t: "[FROM.GetNameDefCap] souhlasí s žádostí"
 IRQ_political_events.50.a: "Moc na výběr nemáme."
 IRQ_political_events.50.b: "Rozhodně ne!"
 IRQ_political_events.50.desc: "[FROM.GetNameDef] formálně požaduje, abychom předali kontrolu nad Kuvajtem do jejich rukou. Tvrdí, že Kuvajt jako nedílnou součást arabského světa má mít pod kontrolou [FROM.GetNameDef], aby byla zajištěna stabilita a prosperita regionu. Ačkoli tuto žádost prezentují jako krok k arabské jednotě, postoupení Kuvajtu by výrazně oslabilo náš vliv na Blízkém východě. Odmítnutí návrhu by mohlo dále vyhrotit vztahy a vést k eskalaci."
 IRQ_political_events.50.t: "[FROM.GetNameDefCap] žádá o Kuvajt"
 IRQ_political_events.51.a: "Bude nám lépe."
 IRQ_political_events.51.b: "Současné uspořádání nám vyhovuje."
 IRQ_political_events.51.desc: "V překvapivém vývoji událostí vláda [FROM.GetNameDef] souhlasí s předáním správy nad námi na [FROM.FROM.GetNameDef]. Mnozí v naší vládě pochybují, zda tato dohoda skutečně odráží naše zájmy, nebo zda nejsme pouze pěšákem ve větší geopolitické hře. Nastal čas rozhodnout se, zda tento převod přijmeme, nebo se postavíme vnucené cizí kontrole."
 IRQ_political_events.51.t: "[FROM.GetNameDefCap] nás hodlá převést"
 IRQ_political_events.52.a: "Neměli bychom to dál hrotit."
 IRQ_political_events.52.b: "Máme jiné prostředky, jak území získat."
 IRQ_political_events.52.desc: "[FROM.GetNameDef] jednoznačně odmítáa náš návrh na převedení Kuvajtu pod naši správu a smetla ze stolu naši vizi arabské jednoty a regionální stability. Toto odmítnutí podkopává snahy o sjednocení arabského světa a upírá obyvatelům Kuvajtu možnost stát se součástí silnějšího, jednotného státu. Nyní je otázkou, zda se pokusíme pokračovat diplomatickou cestou, nebo se připravíme na razantnější řešení sporu."
 IRQ_political_events.52.t: "[FROM.GetNameDefCap] odmítá naši žádost"
 IRQ_political_events.53.a: "Výborně!"
 IRQ_political_events.53.desc: "[FROM.GetNameDef] souhlasí s naším návrhem převést Kuvajt pod naši správu, což představuje významný krok k sjednocení arabského světa. Tato historická dohoda posiluje naši pozici regionálního lídra a přibližuje nás k naplnění vize sjednoceného a prosperujícího arabského národa."
 IRQ_political_events.53.t: "[FROM.GetNameDefCap] souhlasí s naší žádostí"
 IRQ_political_events.60.a: "Dobrá."
 IRQ_political_events.60.b: "Nelze jim věřit."
 IRQ_political_events.60.desc: "Tváří v tvář rostoucímu tlaku Spojenců nám nabízí [FROM.GetNonIdeologyName] mírové urovnání. Navrhují obnovit regentství a znovu nastolit naši autoritu výměnou za ukončení bojů a zachování jejich územní celistvosti. Ačkoli tento návrh uznává marnost dalšího odporu, zároveň představuje výrazný obrat od ambicí Zlatého čtverce a může vyvolat nepokoje mezi jejich stoupenci."
 IRQ_political_events.60.t: "[FROM.GetNameDefCap] nabízí mír"
 IRQ_political_events.61.a: "Alespoň můžeme ukončit krveprolití."
 IRQ_political_events.61.desc: "[FROM.GetNameDefCap] souhlasí s naším mírovým návrhem. Podmínky vyžadují, abychom se podřídili [FROM.GetAdjective] autoritě, čímž konflikt skončí. Přestože je válka u konce, toto rozhodnutí může vyvolat vnitřní nepokoje, neboť ti, kteří bojovali za suverenitu a nezávislost, se budou vyrovnávat s opětovným nastolením cizí nadvlády nad zemí."
 IRQ_political_events.61.t: "[FROM.GetNameDefCap] přijímá mírovou dohodu"
 IRQ_political_events.62.a: "Pak budeme bojovat až do hořkého konce."
 IRQ_political_events.62.desc: "[FROM.GetNameDefCap] odmítá náš mírový návrh a trvá na úplném podrobení bez kompromisů. Jelikož jednání selhala, konflikt bude pokračovat a my budeme čelit plné síle spojeneckých armád. Cesta před námi bude plná obtíží, avšak naše odhodlání k nezávislosti zůstává neotřeseno."
 IRQ_political_events.62.t: "[FROM.GetNameDefCap] odmítá mírovou dohodu"
 IRQ_political_events.70.a: "Jaké štěstí může mít jeden člověk?"
 IRQ_political_events.70.desc: "Dnes ráno se v Mosulu stal terčem pokusu o atentát $IRQ_bakr_sidqi$. Pokus provedl desátník Abdulláh al-Talafarí, když namířil zbraň na Sidqího a jeho pravou ruku Muhammada Alího Džaváda. Při útoku byl Džavád těžce zraněn, zatímco Sidqí vyvázl bez jediného škrábnutí."
 IRQ_political_events.70.t: "$IRQ_bakr_sidqi$ přežil pokus o atentát"
 IRQ_political_events.71.a: "Jsme už dostatečně legitimní."
 IRQ_political_events.71.b: "$IRQ_sharaf_bin_rajeh$ postačí"
 IRQ_political_events.71.c: "Potřebujeme prezidenta, ne krále!"
 IRQ_political_events.71.desc: "Mnozí v naší zemi stále nepovažují Zlatý čtverec za legitimní vládce a vnímají nás jako uzurpátory a nelegitimní lotry. Abychom tento problém vyřešili, přišli naši ministři s několika možnostmi. Buď budeme ignorovat volání lidu a doufat, že časem utichne, nebo dosadíme emíra z Táifu jako nového regenta za Fajsala II. Vždy však existuje i možnost přeměny na republiku, což by však mohlo být mezi náboženským obyvatelstvem velmi nepopulární..."
 IRQ_political_events.71.t: "Legitimizace naší vlády"
 IRQ_political_events.72.a: "$IRQ_abd_al_ilah$ převezme regentství"
 IRQ_political_events.72.b: "$IRQ_faisal_ii$ by ho měl nahradit přímo!"
 IRQ_political_events.72.desc: "Dnes přišly zprávy, že náš velký král Ghází I. tragicky zahynul při autonehodě v Bagdádu, když řídil svůj sportovní vůz. Někteří tvrdí, že šlo o nehodu, jiní spekulují, že to bylo na příkaz Núrího as-Saída kvůli královým plánům na sjednocení s Kuvajtem, avšak jistotu nemá nikdo. Jedno je však jasné - někdo musí převzít pochodeň a zaujmout jeho místo."
 IRQ_political_events.72.t: "Smrt Gházího I."
 IRQ_political_events.73.a: "$IRQ_abd_al_ilah$ si znovu nárokuje hášimovské dědictví"
 IRQ_political_events.73.b: "Je nezbytné zachovat ústavní povahu naší monarchie!"
 IRQ_political_events.73.desc: "V důsledku nedávných pohřebních obřadů zesnulého Gházího I. vzrostly monarchistické nálady, neboť lid truchlí. To otevírá příležitost, aby $IRQ_abd_al_ilah$ omezil moc premiérů, kteří dlouhodobě podkopávali naši absolutní vládu, jako první krok k plnému obnovení hášimovské moci nad Arábií."
 IRQ_political_events.73.t: "Rostoucí podpora absolutní hášimovské vlády"
 IRQ_political_events.74.a: "Dokonalé načasování."
 IRQ_political_events.74.b: "Tohle si nemůžeme dovolit."
 IRQ_political_events.74.desc: "Naši noví [FROM.GetAdjective] přátelé navrhují vyslat misi ropných magnátů a průmyslníků, aby zajistili investice do jejich rozsáhlých zdrojových polí. Dohoda má být zajištěna počátečním, oboustranně výhodným výměnným obchodem - zbraně za ropu."
 IRQ_political_events.74.t: "[FROM.GetName] zve ropnou delegaci"
 IRQ_political_events.75.a: "Skvělé"
 IRQ_political_events.75.desc: "Naši [FROM.GetAdjective] přátelé souhlasili s vysláním delegace s výhledem na budoucí investice, za předpokladu, že okamžitě podepíšeme dohodu o počáteční výměně. Dopadlo to dobře."
 IRQ_political_events.75.t: "Delegace přijata"
 IRQ_political_events.76.a: "Bohužel"
 IRQ_political_events.76.desc: "Bohužel [FROM.GetAdjective] vláda odmítla naši žádost o výměnu vzácné ropy za zbraně. Jejich ztráta, náš zisk."
 IRQ_political_events.76.t: "Delegace odmítnuta"
 IRQ_political_events.77.t: "[IRQ.GetNameDefCap] dobývá [680.GetName]"
 IRQ_political_events.77.desc: "Po rychlém tažení v [680.GetName] obsadila [IRQ.GetAdjective] armáda všechna hlavní sídla a prohlásila oblast za své území."
 IRQ_political_events.77.a: "Naše síla roste!"
 IRQ_political_events.77.b: "Nu dobrá."
 IRQ_political_events.78.t: "[IRQ.GetNameDefCap] se stahuje z [680.GetName]"
 IRQ_political_events.78.desc: "Tváří v tvář vážným obtížím se [IRQ.GetAdjective] armáda stáhla od města Dajr az-Zaur. Nemusí to být konec konfliktu, avšak prozatím má oblast pod kontrolou [SYR.GetNameDef]."
 IRQ_political_events.78.a: "Dočasný nezdar..."
 IRQ_political_events.78.b: "Dajr az-Zaur nepadl!"
 IRQ_regent_turned_down_absolute_powers: "§Y$IRQ_abd_al_ilah$§! odmítl příležitost obnovit absolutní monarchii"
 MainInvader190: "Dnes ráno jsme obdrželi zprávu od [PER.GetAdjective] vlády s nabídkou na ukončení bojů. Výměnou nám umožní přístup k rozsáhlým zásobám svých přírodních zdrojů. To by znamenalo rychlý konec války a umožnilo nám soustředit se na naše další cíle. Navíc bychom se díky jejich ropným koncesím ocitli ve výhodné pozici pro případné budoucí válečné tažení."
 MainInvader191: "Zdá se, že [FROM.GetNameDef] souhlasí s naší nabídkou a začali připravovat podmínky kapitulace. Přijdeme sice o část svých přírodních zdrojů, avšak je to mnohem příznivější výsledek než stát se loutkovým státem, který bude kontrolovat [FROM.GetNameDef]."
 MainInvader192: "Je to temný den. Náš nepřítel se rozhodl pokračovat v postupu do našeho území navzdory vlastním ztrátám a navzdory našim požadavkům na mír. Jejich neochota ukončit válku výměnou za naše suroviny je zklamáním a nezbývá nám než pokračovat v boji."
 NotMainInvader190: "Dnes ráno jsme obdrželi zprávu od [PER.GetAdjective] vlády s nabídkou na ukončení bojů. Přestože z toho pro nás neplyne žádný okamžitý zisk ani kompenzace, znamenalo by to rychlý konec války a umožnilo nám soustředit se na naše další cíle."
 NotMainInvader191: "Zdá se, že [FROM.GetNameDef] souhlasí s naší nabídkou a začali připravovat podmínky kapitulace. Doufali jsme, že k tomu nebude muset dojít, avšak za daných okolností je tento výsledek tím nejlepším možným."
 NotMainInvader192: "Je to temný den. Náš nepřítel se rozhodl pokračovat v postupu do našeho území navzdory vlastním ztrátám a navzdory našim požadavkům na mír. Jejich neochota válku ukončit je zklamáním a nyní nám nezbývá než dál bojovat."
 PER_communist_events.1.a: "Znepokojivý vývoj."
 PER_communist_events.1.desc: "Radikálové prosazující nezávislost na nás byli v posledních dnech výrazně aktivnější. Zatím není jasné, co tento nárůst činnosti vyvolalo, místní úřady však vyjadřují obavy z šíření nacionalistické a socialistické rétoriky v ulicích. Pokud chceme zabránit eskalaci situace, budeme nejspíše muset přistoupit k tvrdému zásahu."
 PER_communist_events.1.t: "Nárůst radikální činnosti"
 PER_communist_events.10.a: "Udeříme, dokud máme převahu."
 PER_communist_events.10.b: "Je čas spolknout hořkou pilulku."
 PER_communist_events.10.desc: "Jakákoli naděje na diplomatické řešení probíhající krize v Perském zálivu se rozplynula poté, co [FROM.GetNameDef] vysílá svou námořní údernou skupinu k prolomení naší blokády v regionu. Pokud si chceme zachovat moment překvapení, měli bychom okamžitě zahájit preventivní úder. Jinak bychom měli situaci deeskalovat."
 PER_communist_events.10.t: "[FROM.GetNameDefCap] vysílá své námořnictvo"
 PER_communist_events.11.a: "Jejich bezpečnost je i naší bezpečností."
 PER_communist_events.11.b: "Státní tajemství prodávat nebudeme."
 PER_communist_events.11.desc: "[FROM.GetNonIdeologyName] nás žádá o technickou podporu při vývoji protilodních technologií, aby mohla čelit hrozbě koloniálních mocností v Perském zálivu. Zavázali se, že se s námi podělí o veškerý budoucí vývoj."
 PER_communist_events.11.t: "[FROM.GetNameDefCap] žádá o vojenské technologie"
 PER_communist_events.12.a: "Výborně!"
 PER_communist_events.12.desc: "Naši inženýři netrpělivě očekávají příchod důvěrného [FROM.GetAdjective] výzkumu a prototypů poté, co se [FROM.GetAdjective] vláda rozhodla s námi sdílet část vojenských technologií. Tento krok výrazně urychlí náš vlastní vývoj."
 PER_communist_events.12.t: "[FROM.GetNameDefCap] souhlasí s technologickým transferem"
 PER_communist_events.13.a: "Uspějeme i bez nich."
 PER_communist_events.13.desc: "[FROM.GetAdjectiveCap] vláda odmítla naši žádost o technologie, které by nám pomohly lépe bránit Perský záliv před cizími námořními mocnostmi. Pro naše inženýry je to rána, přesto jsou odhodláni pokračovat ve vývoji samostatně."
 PER_communist_events.13.t: "[FROM.GetNameDefCap] odmítá technologický transfer"
 PER_communist_events.14.a: "Dobře, že dodrželi slovo."
 PER_communist_events.14.desc: "V souladu s naší dohodou nám [FROM.GetNameDef] doručuje prototyp zbraně, o níž se domnívají, že by mohla vytlačit imperialisty z Perského zálivu. Zda se ukáže jako skutečně účinná, se teprve ukáže."
 PER_communist_events.14.t: "[FROM.GetNameDefCap] dodává prototyp"
 PER_communist_events.2.a: "Zdvojnásobíme své úsilí."
 PER_communist_events.2.desc: "[FROM.GetAdjectiveCap] úřady zahájily rozsáhlý zásah proti kurdským hnutím za nezávislost v celém regionu. Naše kontakty se proto stáhly do úkrytu nebo uprchly přes [ROOT.GetAdjective] hranici."
 PER_communist_events.2.t: "Zásah proti kurdskému hnutí"
 PER_communist_events.20.a: "Přiznáme jim autonomii."
 PER_communist_events.20.b: "Tato území musí zůstat pod naší správou."
 PER_communist_events.20.desc: "V reakci na snahy o potlačení kmenové struktury a rostoucí požadavky na autonomii požádala [SOU.GetNameDef] nově vzniklá Demokratická strana Kurdistánu o uznání jako samostatná socialistická republika. Musíme se rozhodnout, zda si oblast ponecháme pod přímou kontrolou, nebo ji předáme [KUR.GetAdjective] lidu."
 PER_communist_events.20.t: "[KUR.GetAdjectiveCap] lid požaduje autonomii"
 PER_communist_events.3.a: "Musíme zabránit eskalaci!"
 PER_communist_events.3.desc: "Činnost kurdských separatistů a socialistů v posledních dnech dosáhla vrcholu. Objevují se také důkazy o distribuci zbraní napříč zemí v přípravě na povstání v nadcházejících týdnech. Pokud nezasáhneme rychle, může být otevřený konflikt nevyhnutelný."
 PER_communist_events.3.t: "Kurdské povstání na spadnutí"
 PER_communist_events.4.a: "Kdo za tím stojí?"
 PER_communist_events.4.desc: "V posledních dnech výrazně vzrostl odpor proti naší okupaci území v okolí [PER.GetAdjective] hranice. Přestože přesný spouštěč zůstává nejasný, roste podezření, že někdo záměrně podněcuje proti[ROOT.GetAdjective] nálady s cílem oslabit naši přítomnost v oblasti."
 PER_communist_events.4.t: "Zvýšený odboj na [PER.GetAdjective] hranici"
 PER_communist_events.5.a: "Stáhneme se, ale s protestem."
 PER_communist_events.5.b: "Oni? A s čím?"
 PER_communist_events.5.desc: "Zdá se, že většinu nedávného napětí v Perském zálivu způsobuje [FROM.GetNameDef]. Po sérii strategických úspěchů v regionu se nyní cítí dostatečně sebejistě k dosud největšímu kroku. V ostrém varování požadují naše úplné stažení z Arabského poloostrova a Perského zálivu a naznačují ochotu oblast zablokovat, pokud nevyhovíme."
 PER_communist_events.5.t: "Krize v Perském zálivu"
 PER_communist_events.6.a: "Naše práce ještě neskončila!"
 PER_communist_events.6.desc: "Navzdory hlasité diplomatické rétorice zahájily [FROM.GetAdjective] síly stahování z regionu. Jde o zásadní strategické vítězství, které je po celém světě vnímáno jako další známka úpadku kolonialismu."
 PER_communist_events.6.t: "[FROM.GetNameDefCap] souhlasí se stažením"
 PER_communist_events.7.a: "Pak ukážeme svou rozhodnost."
 PER_communist_events.7.b: "Nemůžeme si dovolit další eskalaci."
 PER_communist_events.7.desc: "Jak se dalo čekat, [FROM.Capital.GetCapitalVictoryPointName] odmítá stáhnout své síly ze sporných oblastí Perského zálivu a Arábie. Zdá se, že se ti zatvrzelí hlupáci domnívají, že nemáme odvahu naplnit hrozby blokády námořních tras."
 PER_communist_events.7.t: "[FROM.GetNameDefCap] odmítá stažení"
 PER_communist_events.8.a: "Čas na politiku dělových člunů."
 PER_communist_events.8.b: "Dali jasně najevo svůj postoj, nařiďte stažení."
 PER_communist_events.8.desc: "V dalším vyhrocení krize zahajuje [FROM.GetNameDef] blokádu civilní lodní i letecké dopravy v oblasti. Zpravodajské informace navíc potvrzují zvýšenou bojovou pohotovost jejich ozbrojených sil."
 PER_communist_events.8.t: "[FROM.GetNameDefCap] blokuje Perský záliv"
 PER_communist_events.9.a: "To je naučí."
 PER_communist_events.9.desc: "Zdá se, že nedávná okázalá [FROM.GetAdjective] rétorika se zhroutila tváří v tvář naší neochvějné obraně vlastních zájmů. Ve smířlivém projevu [FROM.GetLeader] potvrdil snahu zachovat mír v regionu. Jejich spojenci pravděpodobně těžce nesou tento ústup od [FROM.GetAdjective] zásad."
 PER_communist_events.9.t: "[FROM.GetNameDefCap] zmírňuje svou rétoriku"
 PER_communist_events_1_tt: "Odemkne rozhodnutí §Y$PER_anti_gulf_decisions_cat$§! zaměřená na potlačení odboje."
 PER_communist_events_3_tt: "§RMusíme zahájit tvrdý zásah proti opozici, pokud se chceme vyhnout kurdskému povstání a válce!§!"
 PER_communist_events_4_tt: "§RV našich státech v Perském zálivu může v nadcházejících měsících vzrůst odboj!§!"
 PER_fascist_events.1.a: "Loutkový Pahlaví nám vyhovuje."
 PER_fascist_events.1.b: "Nová dynastie pro nový Írán."
 PER_fascist_events.1.desc: "Císařská rada se sešla, aby rozhodla, komu bude nabídnuta prestižní role šáha. Někteří prosazují obnovu dynastie Kádžárovců, jiní navrhují ponechat Pahlavího na trůně kvůli legitimitě v očích lidu. Mezitím straníci volají po založení zcela nové dynastie."
 PER_fascist_events.1.t: "Zasedání císařské rady"
 PER_fawzia_married: "Fawzia Fúad se vdala"
 PER_foreign_policy_events.1.a: "Boj by byl marný."
 PER_foreign_policy_events.1.b: "Ať přijdou!"
 PER_foreign_policy_events.1.desc: "Zdá se, že [FROM.GetAdjective] vláda je stále nervóznější z naší diplomatické pozice. Během uplynulého týdne se [FROM.GetAdjective] velvyslanec a [THIS.GetLeader] setkali nejméně šestkrát a při posledním jednání prakticky předložil ultimátum.\n\nBuď s nima vstoupíme do obranného paktu a přijmeme „určitou míru konzultací ve vnitřních záležitostech“, nebo [FROM.GetNameDef] s největší pravděpodobností přistoupí k vojenské intervenci."
 PER_foreign_policy_events.1.t: "[FROM.GetNameDef] zkouší zastrašování"
 PER_foreign_policy_events.2.a: "Nebudeme je dál provokovat... zatím."
 PER_foreign_policy_events.2.b: "Připravit útok na [FROM.GetNameDef]!"
 PER_foreign_policy_events.2.c: "Musíme připravit společnou invazi se [SOU.GetAdjective] vojsky."
 PER_foreign_policy_events.2.desc: "Naše pokusy vyřešit sporné otázky diplomatickou cestou zjevně selhaly. Když náš velvyslanec požádal o další kolo jednání, [FROM.GetLeader] mu stroze sdělil, že [FROM.GetAdjective] stana již své stanovisko jasně vyjádřila a není o čem dále jednat."
 PER_foreign_policy_events.2.t: "[FROM.GetNameDefCap] odmítá"
 PER_foreign_policy_events.3.a: "Musíme zajistit Perský koridor!"
 PER_foreign_policy_events.3.b: "Budeme respektovat [PER.GetAdjective] nezávislost."
 PER_foreign_policy_events.3.desc: "[FROM.GetNameDef] nám zasílá diplomatickou nótu s návrhem na společný vojenský útok na [PER.GetNameDef]. [FROM.GetAdjectiveCap] velení tvrdí, že tato operace nám umožní zajistit íránská ropná pole a zásobovací trasy pro [FROM.GetNameDef] a zároveň zabráni, aby nepřítel využil [TUR.GetNonIdeologyName] k možnému postupu přes [PER.GetName] směrem k ropným polím v Baku a do [RAJ.GetNonIdeologyName]."
 PER_foreign_policy_events.3.t: "Anglo-[SOV.GetAdjective] invaze do Íránu"
 PER_foreign_policy_events.4.a: "Zahájit přípravy!"
 PER_foreign_policy_events.4.desc: "[FROM.GetAdjectiveCap] velvyslanec předal nótu, v níž [FROM.GetNameDef] souhlasí s organizací a provedením společného vojenského úderu na [PER.GetNameDef]. [ROOT.GetNameDef] i [FROM.GetNameDef] jsou přesvědčeni, že půjde o rychlou a účinnou akci proti početně slabšímu a technologicky zaostalejšímu nepříteli, která nám zajistí íránská ropná pole i [FROM.GetAdjective] zásobovací trasy pro [ROOT.GetNameDef] a zabrání možnému nepřátelskému postupu směrem k Baku a do [RAJ.GetNonIdeologyName]."
 PER_foreign_policy_events.4.t: "Anglo-[SOV.GetAdjective] invaze do Íránu"
 PER_foreign_policy_events.5.a: "Vždy tak nespolehliví..."
 PER_foreign_policy_events.5.desc: "Po několika vyčerpávajících jednáních mezi [ROOT.GetAdjective] a [FROM.GetAdjective] diplomaty nám [FROM.GetNameDef] sděluje, že se do našich plánů nezapojí. Sám [FROM.GetLeader] dokonce naznačil, že náš návrh je jen zástěrkou pro územní ambice.\nZdá se, že na [PER.GetNameDef] si budeme muset vystačit sami."
 PER_foreign_policy_events.5.t: "[FROM.GetNameDef] odmítá"
 PER_imperial_events.1.a: "Souhlasíme. Je to v nejlepším zájmu obou stran."
 PER_imperial_events.1.b: "Nemůžeme s tím souhlasit."
 PER_imperial_events.1.desc: "[SOU.Capital.GetCapitalVictoryPointName] má vskutku zajímavou nabídku od [PER.GetAdjective] šáha. [PER.Capital.GetCapitalVictoryPointName] nabízí na uzavření paktu o neútočení, který by zajistil bezpečnost obou našich zemí. Vzhledem k tomu, jak je [PER.GetNameDef] blízko k našim jižním hranicím bychom to měli pečlivě zvážit."
 PER_imperial_events.1.t: "[FROM.GetNameDefCap] chce jednat o paktu o neútočení"
 PER_imperial_events.10.a: "Nemáme jinou možnost než ustoupit."
 PER_imperial_events.10.b: "Možná je přimějeme za to zaplatit?"
 PER_imperial_events.10.c: "Vezmou si to jen přes naši mrtvolu."
 PER_imperial_events.10.desc: "Dnes jsme obdrželi zprávu od [PER.GetAdjective] šáha s požadavkem, abychom jim předali kontrolu nad oblastí Balúčistánu. [PER.GetNameDef] tvrdí, že jim toto území náleží z božského práva. Musíme být opatrní - pokud je vyprovokujeme, mohou nám vyhlásit válku."
 PER_imperial_events.10.t: "[FROM.GetNameDefCap] požaduje Balúčistán"
 PER_imperial_events.100.a: "Ať se už nikdy nepokusí zaútočit."
 PER_imperial_events.100.desc: "Poté, co se nám podařilo vytlačit vetřelce zpět na jejich území, jsme pozvali jejich diplomaty do Teheránu k zahájení mírových rozhovorů. Naštěstí souhlasili a po hodinách jednání bylo dohodnuto, že přestanou útočit a [PER.GetNameDef] jako odškodnění získá jejich pohraniční území."
 PER_imperial_events.100.t: "Teheránská smlouva"
 PER_imperial_events.101.a: "Pak se zastavíme až v jejich hlavním městě!"
 PER_imperial_events.101.desc: "Přestože se nám podařilo vetřelce zatlačit zpět, naši protivníci odmítli mírové rozhovory v Teheránu. V důsledku toho konflikt pokračuje."
 PER_imperial_events.101.t: "Neúspěšná jednání"
 PER_imperial_events.11.a: "Výborná práce."
 PER_imperial_events.11.desc: "Skvělé zprávy. [FROM.GetNameDefCap] činí rozumné rozhodnutí a předává Balúčistán pod naši kontrolu. Konečně jsme získali předmostí v oblasti Indu."
 PER_imperial_events.11.t: "[FROM.GetNameDefCap] souhlasí s předáním Balúčistánu"
 PER_imperial_events.110.a: "$PER_imperial_events.80.a$"
 PER_imperial_events.110.b: "$PER_imperial_events.80.b$"
 PER_imperial_events.110.desc: "$PER_imperial_events.80.desc$"
 PER_imperial_events.110.t: "$PER_imperial_events.80.t$"
 PER_imperial_events.111.a: "Náš plán vyšel!"
 PER_imperial_events.111.desc: "Poté, co se nám podařilo vytlačit [SOV.GetAdjective] síly zpět hluboko na jejich území, jsme oslovili naše nepřátele a pozvali jejich diplomaty do Teheránu k mírovým jednáním. Naštěstí byli návrhu nakloněni a po dlouhých jednáních jsme se dohodli, že jako kompromis výměnou za ukončení vleklé války postoupí svá pohraniční území."
 PER_imperial_events.111.t: "Zajištění nárazníkových států"
 PER_imperial_events.112.a: "Pak se zastavíme až v jejich hlavním městě!"
 PER_imperial_events.112.desc: "Poté, co se nám podařilo vytlačit [SOV.GetAdjective] síly zpět na jejich území, jsme se pokusili zahájit mírová jednání v Teheránu. Bohužel nebyli ochotni jednat a válka tak pokračuje."
 PER_imperial_events.112.t: "Ztroskotaná jednání"
 PER_imperial_events.12.a: "Dobrá, když musíme."
 PER_imperial_events.12.b: "Pak si to vezmeme silou."
 PER_imperial_events.12.c: "Je to příliš riskantní. Přerušte jednání."
 PER_imperial_events.12.desc: "Zdá se, že [RAJ.GetAdjective] vláda není ochotna vzdát se Balúčistánu bez určité kompenzace. Můžeme jejich požadavky splnit, nebo jim prostě vyhlásit válku. Volba je na nás."
 PER_imperial_events.12.t: "[FROM.GetNameDefCap] nabízí prodej Balúčistánu"
 PER_imperial_events.120.a: "Ano, to zní přijatelně."
 PER_imperial_events.120.b: "Rozhodně ne. Postupujte na hlavní město."
 PER_imperial_events.120.desc: "Dnes ráno jsme obdrželi zprávu, že [PER.GetAdjective] vláda hodlá kapitulovat. V rámci dohody nám umožní obsadit jejich území, zatímco si ponechají monarchii jako loutkový režim. Jak odpovíme?"
 PER_imperial_events.120.t: "[PER.GetNameDefCap] vyjednává o své kapitulaci"
 PER_imperial_events.121.a: "To je úleva..."
 PER_imperial_events.121.desc: "Naštěstí [ENG.GetAdjective] vláda souhlasila s tím, že nám umožní spravovat [PER.GetNameDef] pod jejím dohledem. Snad to konečně ukončí krveprolití."
 PER_imperial_events.121.t: "[ENG.GetNameDefCap] přijímá náš návrh"
 PER_imperial_events.122.a: "Jsou to temné časy..."
 PER_imperial_events.122.desc: "Bohužel [ENG.GetAdjective] vláda náš návrh odmítla. To znamená, že boj musí pokračovat, avšak pokud prohrajeme, je pravděpodobné, že se budeme muset vzdát za jejich podmínek."
 PER_imperial_events.122.t: "[ENG.GetNameDefCap] odmítá náš návrh"
 PER_imperial_events.13.a: "Fantastické!"
 PER_imperial_events.13.desc: "Skvělé zprávy! Šáh souhlasil s tím, že nám [PER.GetNameDef] zaplatí za převedení Balúčistánu pod jejich kontrolu. Přišli jsme sice o malou část našeho území, ale získané prostředky pomohou našemu vlastnímu úsilí."
 PER_imperial_events.13.t: "[FROM.GetNameDefCap] souhlasí s koupí Balúčistánu"
 PER_imperial_events.130.a: "Ano, to zní přijatelně"
 PER_imperial_events.130.b: "Rozhodně ne. Postupujte na hlavní město."
 PER_imperial_events.130.desc: "Dnes ráno jsme obdrželi zprávu od [PER.GetAdjective] vlády s úmyslem kapitulovat a zahájit proces vzdání se. V jeho rámci jsou ochotni postoupit nám svá severní území a umožnit nám jejich anexi. Jak máme postupovat?"
 PER_imperial_events.130.t: "[PER.GetNameDefCap] vyjednává o své kapitulaci"
 PER_imperial_events.131.a: "To je úleva..."
 PER_imperial_events.131.desc: "Naštěstí [SOU.GetAdjective] vláda souhlasila s naším návrhem. Možná jsme přišli o severní území, ale alespoň jsme zabránili dalšímu postupu [SOU.GetAdjective] armády..."
 PER_imperial_events.131.t: "[SOU.GetNameDefCap] přijímá náš návrh"
 PER_imperial_events.132.a: "Jsou to temné časy..."
 PER_imperial_events.132.desc: "Bohužel [SOU.GetAdjective] vláda odmítla náš návrh kapitulace. To znamená, že musíme pokračovat v boji, avšak pokud prohrajeme, je pravděpodobné, že se budeme muset vzdát za jejich podmínek."
 PER_imperial_events.132.t: "[SOU.GetNameDefCap] odmítá náš návrh"
 PER_imperial_events.14.a: "Shromáždit naše jednotky!"
 PER_imperial_events.14.desc: "Obávám se, že náš risk se nevyplatil. Po obdržení našeho oznámení [PER.GetAdjective] šáh oficiálně pohrozil naší zemi válkou. Jejich jednotky se připravují překročit Indus a vzít si to, co chtějí, silou. Je to smutný vývoj událostí."
 PER_imperial_events.14.t: "[FROM.GetNameDefCap] hrozí válkou"
 PER_imperial_events.140.a: "Musí dostat lekci."
 PER_imperial_events.140.b: "Máme důležitější starosti."
 PER_imperial_events.140.desc: "[FROM.GetLeader] prohlásil, že [FROM.GetNameDef] již nebude uznávat [ROOT.GetAdjective] nadvládu. [FROM.GetNameDefCap] si přeje zachovat dobré vztahy, avšak [FROM.GetLeader] tvrdí, že jsou připraveni v případě potřeby bojovat za nezávislost."
 PER_imperial_events.140.t: "[FROM.GetNameDefCap] vyhlašuje nezávislost"
 PER_imperial_events.141.a: "Azádí! Budeme bojovat do posledního muže!"
 PER_imperial_events.141.desc: "Jak se dalo očekávat, [FROM.GetLeader] odmítl žádost o formální nezávislost. Jelikož se s tímto vývojem počítalo, [ROOT.GetAdjective] ozbrojené síly již zajišťují klíčové pozice v zemi. Tentokrát je národ mnohem lépe připraven."
 PER_imperial_events.141.t: "Boj znovu začíná"
 PER_imperial_events.142.a: "Jho padlo."
 PER_imperial_events.142.desc: "V překvapivém vývoji událostí [FROM.GetLeader] přijal [ROOT.GetAdjective] vyhlášení nezávislosti. Od této chvíle nemá [FROM.GetNameDef] žádný vliv na [ROOT.GetAdjective] politiku, vnitřní ani zahraniční. [ROOT.Capital.GetCapitalVictoryPointName] je svědkem, jak se na hlavním náměstí shromáždily slavíci davy."
 PER_imperial_events.142.t: "Obnovená [PER.GetAdjective] čest"
 PER_imperial_events.15.a: "Ještě že tak."
 PER_imperial_events.15.desc: "Zdá se, že [PER.GetNameDef] vidí, že pokus vyrvat nám oblast Balúčistánu nestojí za to riziko. Můžeme mít klid - alespoň prozatím."
 PER_imperial_events.15.t: "[FROM.GetNameDefCap] ustupuje"
 PER_imperial_events.150.a: "Situace nám nepřeje..."
 PER_imperial_events.150.b: "Musíme pokračovat! Zvítězíme!"
 PER_imperial_events.150.desc: "Válka se protáhla a nepodařilo se nám dosáhnout stanovených cílů. Nedávno jsme obdrželi požadavek [FROM.GetAdjective] vlády na ukončení bojů. Můžeme pokračovat, ale musíme vzít v úvahu vlastní ztráty."
 PER_imperial_events.150.t: "[FROM.GetNameDefCap] požaduje bílý mír"
 PER_imperial_events.151.a: "Tohle lze považovat za vítězství!"
 PER_imperial_events.151.desc: "Skvělé zprávy! [FROM.GetNameDefCap] souhlasí s našimi mírovými požadavky a zacíná stahovat své jednotky z našeho území. Bojovali jsme dlouho a tvrdě - tento den si zaslouží být slaven."
 PER_imperial_events.151.t: "[FROM.GetNameDefCap] stahuje své síly"
 PER_imperial_events.152.a: "Budou litovat, že neustoupili!"
 PER_imperial_events.152.desc: "Je to temný den. Nepřítel se rozhodl pokračovat v postupu navzdory ztrátám i našim výzvám k míru. Pokud chtějí boj, pak ho budou mít."
 PER_imperial_events.152.t: "[FROM.GetNameDefCap] odmítá ustoupit"
 PER_imperial_events.153.a: "Okamžitě stáhnout všechny jednotky."
 PER_imperial_events.153.desc: "Dnes ráno jsme obdrželi zprávu od válečného kabinetu, že naši spojenci, kteří útočí na [PER.GetNameDef], požadují ukončení bojů do doby, než dokončí mírová jednání s nepřítelem. Jelikož jsme do konfliktu vstoupili na podporu [FROM.GetAdjective] vlády, nedává pokračování v bojích žádný smysl."
 PER_imperial_events.153.t: "[FROM.GetNameDefCap] vyzývá k míru"
 PER_imperial_events.16.a: "Tak tedy válka."
 PER_imperial_events.16.desc: "Zdá se, že [RAJ.GetAdjective] vláda jednoznačně odmítla vzdát se území Balúčistánu. Je načase držet se svého postoje a vyhlásit válku na [RAJ.GetNameDef]!"
 PER_imperial_events.16.t: "[FROM.GetNameDefCap] se odmítá vzdát Balúčistánu"
 PER_imperial_events.160.a: "Situace se nevyvíjí v náš prospěch..."
 PER_imperial_events.160.b: "Musíme pokračovat! Zvítězíme!"
 PER_imperial_events.160.desc: "Jak válka postupovala, nepodařilo se nám dosáhnout našich cílů v původně stanoveném čase. Naopak, země, které jsme se pokusili napadnout, nás dokázaly zatlačit zpět na naše vlastní území. Nedávno jsme proto obdrželi zprávu od [FROM.GetAdjective] vlády s požadavkem na ukončení bojů. Pokud bychom kapitulovali, [PER.GetNameDef] požaduje, abychom jim jako reparace postoupili naše pohraniční území. Můžeme pokračovat v boji, musíme však vzít v úvahu vlastní ztráty."
 PER_imperial_events.160.t: "[FROM.GetNameDefCap] požaduje naši kapitulaci"
 PER_imperial_events.161.a: "Tohle lze považovat za vítězství!"
 PER_imperial_events.161.desc: "Skvělé zprávy! [FROM.GetNameDefCap] souhlasí s našimi mírovými požadavky a začíná stahovat své jednotky z našeho území. Zároveň byl zahájen proces postoupení jejich sousedních pohraničních území nám. Bojovali jsme dlouho a tvrdě, abychom je zadrželi - tento den si budeme připomínat ještě po mnoho let!"
 PER_imperial_events.161.t: "[FROM.GetNameDefCap] stahuje své síly"
 PER_imperial_events.162.a: "Budou litovat, že nevyužili šanci skončit!"
 PER_imperial_events.162.desc: "Je to temný den. Náš nepřítel se rozhodl pokračovat v postupu na naše území navzdory svým ztrátám a navzdory našim výzvám k míru. Jejich neochota zaplatit za své provinění je urážkou všeho, co se zde odehrálo. Pokud chtějí boj, pak ho dostanou."
 PER_imperial_events.162.t: "[FROM.GetNameDefCap] odmítá ustoupit"
 PER_imperial_events.170.a: "Situace se nevyvíjí v náš prospěch..."
 PER_imperial_events.170.b: "Musíme pokračovat! Zvítězíme!"
 PER_imperial_events.170.desc: "Jak válka pokračovala, nepodařilo se nám dosáhnout našich cílů v časovém rámci, který jsme si stanovili. Ve skutečnosti nás ti, které jsme se pokusili napadnout, dokázali zatlačit zpět na naše vlastní území. Nedávno jsme proto obdrželi zprávu od [FROM.GetAdjective] vlády s požadavkem na ukončení bojů. Pokud bychom kapitulovali, pravděpodobně bychom po několik let trpěli placením válečných reparací. Můžeme však pokračovat v boji, musíme ale zvážit vlastní ztráty."
 PER_imperial_events.170.t: "[FROM.GetNameDefCap] požaduje naši kapitulaci"
 PER_imperial_events.171.a: "Tohle lze považovat za vítězství!"
 PER_imperial_events.171.desc: "Skvělé zprávy! [FROM.GetNameDefCap] souhlasí s našimi mírovými požadavky a začíná stahovat své jednotky z našeho území. Jejich provinění během této války nám umožnila vymoci si reparace za invazi. Bojovali jsme dlouho a tvrdě, abychom je zadrželi - tento den si budeme připomínat ještě po mnoho let!"
 PER_imperial_events.171.t: "[FROM.GetNameDefCap] stahuje své síly"
 PER_imperial_events.172.a: "$PER_imperial_events.162.a$"
 PER_imperial_events.172.desc: "$PER_imperial_events.162.desc$"
 PER_imperial_events.172.t: "$PER_imperial_events.162.t$"
 PER_imperial_events.180.a: "Je to výhodné pro všechny."
 PER_imperial_events.180.b: "To nepřipadá v úvahu, pokračujeme ve válce."
 PER_imperial_events.180.desc: "Dnes ráno jsme obdrželi zprávu od [PER.GetAdjective] vlády s nabídkou ukončení bojů výměnou za to, že se nechají spravovat jako náš subjekt pod naším dohledem. To by znamenalo rychlý konec války a umožnilo by nám soustředit se na naše další cíle."
 PER_imperial_events.180.t: "[FROM.GetNameDefCap] nabízí složení přísahy"
 PER_imperial_events.181.a: "Pyrrhovo vítězství, ale je to to nejlepší, co můžeme získat."
 PER_imperial_events.181.desc: "Zdá se, že [FROM.GetAdjective] diplomaté souhlasili s naší nabídkou a začali připravovat naše podmínky kapitulace. Ačkoli nejde o ideální situaci, umožněním, abychom žili pod [FROM.GetAdjective] jhem, bychom zachránili nespočet životů."
 PER_imperial_events.181.t: "[FROM.GetNameDefCap] souhlasí s našimi podmínkami"
 PER_imperial_events.182.a: "To je ostuda..."
 PER_imperial_events.182.desc: "Je to temný den. Náš nepřítel se rozhodl pokračovat v postupu na naše území navzdory vlastním ztrátám a navzdory našim požadavkům na mír. Jejich neochota umožnit nám ukončit válku jejich vítězstvím je zklamáním a nemáme jinou možnost než pokračovat v boji."
 PER_imperial_events.182.t: "[FROM.GetNameDefCap] odmítá naše podmínky"
 PER_imperial_events.190.a: "Můžeme s těmito podmínkami souhlasit"
 PER_imperial_events.190.b: "Není to pro nás výhodné, pokračujme ve válce."
 PER_imperial_events.190.desc: "[GetROOTMainInvaderOrNot190]"
 PER_imperial_events.190.t: "[FROM.GetNameDefCap] si přeje vyjednávat podmínky kapitulace"
 PER_imperial_events.191.a: "To je to nejlepší, co může [PER.GetNameDef] dostat"
 PER_imperial_events.191.desc: "[GetROOTMainInvaderOrNot191]"
 PER_imperial_events.191.t: "[FROM.GetNameDefCap] souhlasí s našimi podmínkami"
 PER_imperial_events.192.a: "To je ostuda..."
 PER_imperial_events.192.desc: "[GetROOTMainInvaderOrNot192]"
 PER_imperial_events.192.t: "[FROM.GetNameDefCap] odmítá naše podmínky"
 PER_imperial_events.2.a: "Skvělé zprávy."
 PER_imperial_events.2.desc: "[SOU.Capital.GetCapitalVictoryPointName] hlásí dobré zprávy! Náš diplomat se vrátil se zprávou, že [SOU.GetNameDef] si přeje připojit se k paktu o neútočení. To nám umožní pokračovat v přípravě válečných plánů, aniž by se nám oni do nich pletli."
 PER_imperial_events.2.t: "[SOU.GetNameDefCap] souhlasí s paktem o neútočení"
 PER_imperial_events.20.a: "[PER.GetNameDef] se probouzí do smutného dne..."
 PER_imperial_events.20.desc: "Dnes odpoledne se v centru Teheránu ozvaly výstřely, když byl během projevu k národu Rezá Šáh Pahlaví zasažen kulkou. Navzdory maximálnímu úsilí záchranářů šáh svým zraněním bohužel podlehl. Pachatelé byli odhaleni jako důstojníci [PER.GetAdjective] armády, kteří nesouhlasili s šáhovým vedením. Syn Rezá Šáha Pahlavího, Mohammad Rezá Pahlaví, má být uveden do úřadu jako nový [PER.GetAdjective] šáh. Doufejme, že jeho vláda bude méně bouřlivá."
 PER_imperial_events.20.t: "Rezá Šáh Pahlaví zavražděn!"
 PER_imperial_events.200.a: "Samozřejmě tento pakt přátelství podepíšeme!"
 PER_imperial_events.200.b: "Nejsme příbuzní, [SSB_leader.GetLeader] - neznáme vás."
 PER_imperial_events.200.desc: "[SSB_leader.GetLeader] a [ROOT.GetLeader] se setkali poté, co [SSB_leader.GetLeader] přijel s návrhem podepsat vzájemný pakt o neútočení a ponechal otevřenou možnost další spolupráce v budoucnu. [event_target:SSB_leader.GetAdjectiveCap] diplomaté tvrdě pracovali na své argumentaci a podrobně rozebírali společné dějiny a zájmy našich dvou zemí, následované upřímnou výzvou k míru mezi bratrskými národy. Vyjednávání probíhala v příjemném duchu, avšak konečné rozhodnutí, zda pakt podepíšeme, je na nás."
 PER_imperial_events.200.t: "Saadabadský pakt"
 PER_imperial_events.201.a: "[ROOT.GetNameDef] vás bude vždy považovat za přítele."
 PER_imperial_events.201.desc: "[FROM.GetLeader] projevil velké nadšení, když mu byly předloženy naše návrhy smlouvy o přátelství a paktu o neútočení, a neztrácel čas, aby nám zaslal podepsané dokumenty. Díky jejich souhlasu jsme o krok blíže k dosažení míru doma i míru ve světě!"
 PER_imperial_events.201.t: "[FROM.GetName] podepisuje Saadabadský pakt"
 PER_imperial_events.202.a: "...mohl jste prostě říct „ne“."
 PER_imperial_events.202.desc: "[FROM.GetLeader] sepsal dlouhý a rozvláčný dopis, ve kterém sdělil, že nabídka smlouvy o přátelství a paktu o neútočení nestojí ani za papír a inkoust, na kterých byla napsána. Dále uvedl, že cokoli menšího než formální aliance je pro [FROM.GetNameDef] i [ROOT.GetNameDef] jen ztrátou času a že si přeje být do budoucna omluven z jakýchkoli [ROOT.GetAdjective] plánů."
 PER_imperial_events.202.t: "[FROM.GetName] odmítá Saadabadský pakt!"
 PER_imperial_events.210.a: "Postoupit území..."
 PER_imperial_events.210.b: "Nikdy nezískají naši zem."
 PER_imperial_events.210.desc: "[event_target:SSB_leader.GetLeader] sepsal dlouhý dopis, ve kterém nás informoval o [event_target:SSB_leader.GetAdjective] požadavcích na postoupení části pohraničního území. Ačkoli jde o zjevný a drzý pokus pošlapat naši suverenitu, pokud [ROOT.GetLeader] odmítne, mohlo by to vést k tomu, že [event_target:SSB_leader.GetNameDef] podnikne drastické kroky k zajištění těchto oblastí. Jak máme postupovat?"
 PER_imperial_events.210.t: "[event_target:SSB_leader.GetName] požaduje naše pohraniční území!"
 PER_imperial_events.211.a: "Ti hlupáci..."
 PER_imperial_events.211.desc: "Dnes ráno nám zaslal [event_target:SSB_leader.GetNameDef], že neochotně souhlasí s našimi požadavky a již zahájili proces předání svého pohraničního území do našich rukou. Netuší, že jim to v budoucnu jen zkomplikuje situaci v rámci našich dalších plánů."
 PER_imperial_events.211.t: "[event_target:SSB_leader.GetName] souhlasí s našimi požadavky!"
 PER_imperial_events.212.a: "Budou toho litovat."
 PER_imperial_events.212.desc: "Dnes ráno nám zaslal [event_target:SSB_leader.GetNameDef] zprávu, že naše požadavky rozhodně odmítají. Ačkoli to představuje jen menší komplikaci pro naše plány, znamená to, že si dané území budeme muset vzít pěkně po staru."
 PER_imperial_events.212.t: "[FROM.GetName] odmítá naše požadavky!"
 PER_imperial_events.220.a: "Mosaddek je zjevná volba"
 PER_imperial_events.220.b: "Možná bude lepší volbou Forúghí?"
 PER_imperial_events.220.c: "Kašání posílí podporu duchovenstva."
 PER_imperial_events.220.desc: "V důsledku rozsáhlé reorganizace [PER.GetAdjective] vlády byly vyhlášeny volby, aby si lid mohl zvolit nového předsedu vlády. Jak se občané po celé zemi hrnou k volebním urnám, vystupují do popředí především dva kandidáti: $PER_mohammad_mosaddegh$ a $PER_mohammad_ali_foroughi$. Jak se nakonec národ rozhodne?"
 PER_imperial_events.220.t: "Čas voleb"
 PER_imperial_events.230.a: "Proč čekat? Připravte korunovaci!"
 PER_imperial_events.230.b: "Je rozumné sesadit dynastii Pahlaví."
 PER_imperial_events.230.c: "[SAF.GetNameDef] bude skvělý exil pro dynastii Pahlaví."
 PER_imperial_events.230.desc: "Po mnoha letech [ENG.GetAdjective] exilu je dědic dynastie Kadžárovců, $PER_mohammad_hassan_mirza$, připraven vrátit se na [PER.GetAdjective] trůn. Vláda dynastie Pahlaví nenaplnila očekávání [ENG.GetAdjective] vlády a panuje naděje, že návrat staré vládnoucí rodiny k moci zajistí pro [ENG.GetNameDef] zájmy v regionu."
 PER_imperial_events.230.t: "Návrat dynastie Kadžárovců"
 PER_imperial_events.231.a: "Výborně. Nyní musíme korunovat nového kadžárského šáha."
 PER_imperial_events.231.desc: "Po pečlivém zvážení byla dynastie Pahlaví sesazena z [PER.GetAdjective] trůnu. Navzdory desetiletím služby zemi je nezbytné, abychom jednali ve prospěch [ENG.GetAdjective] vlády. Ačkoli již nemají místo v [PER.GetAdjective] monarchii, nadále usilují o vliv v politických kruzích země."
 PER_imperial_events.231.t: "Rodina Pahlaví sesazena"
 PER_imperial_events.232.a: "Škoda, ale nyní musíme korunovat nového kadžárského šáha."
 PER_imperial_events.232.desc: "V návaznosti na plán znovu dosadit dynastii Kadžárovců na [PER.GetAdjective] trůn bylo rozhodnuto, že nejlepším řešením pro budoucnost naší země je vyhostit rodinu Pahlaví, ať se jich ujme [SAF.GetNameDef]. Tím si nakloníme [ENG.GetNameDef], které bychom mohli v budoucnu přesvědčit, aby nám umožnily větší autonomii."
 PER_imperial_events.232.t: "Rodina Pahlaví vyhoštěna do [SAF.GetAdjective] exilu"
 PER_imperial_events.233.a: "Ať žije nový šáh!"
 PER_imperial_events.233.desc: "Dnes ráno zažívá [FROM.Capital.GetCapitalVictoryPointName] okázalý korunovační obřad, při kterém byl $PER_mohammad_hassan_mirza$ korunován novým [PER.GetAdjective] šáhem. Po mnoha desetiletích vlády Pahlaví je Kadžárovec opět vládnoucím monarchou tohoto velkého národa. Naše snahy o obnovení kadžárské dynastie potěšily [ENG.GetAdjective], která doufá, že jí to umožní posílit kontrolu nad jejími zájmy v oblasti."
 PER_imperial_events.233.t: "$PER_mohammad_hassan_mirza$ korunován"
 PER_imperial_events.3.a: "Nešťastný vývoj událostí..."
 PER_imperial_events.3.desc: "Bohužel se nám nepodařilo přesvědčit [SOU.GetNameDef], aby podepsal pakt o neútočení. To znamená, že pokud budeme pokračovat v našich expanzních plánech, musíme se mít na pozoru před hrozbou ze severu."
 PER_imperial_events.3.t: "[SOU.GetNameDefCap] odmítá naši nabídku"
 PER_imperial_events.30.a: "Jak výjimečná událost!"
 PER_imperial_events.30.desc: "Na oslavu založení starověké Achaimenovské říše Kýrem Velikým uspořádal [PER.GetAdjective] šáh okázalou slavnost, která měla vyzdvihnout starobylou civilizaci a zároveň předvést moderní pokrok dosažený za jeho vlády. Velcí vůdci všech hlavních světových mocností byli pozváni, aby se oslav zúčastnili, avšak mezi chudšími vrstvami [PER.GetAdjective] obyvatelstva se rychle šíří nespokojenost, neboť tuto podívanou považují za plýtvání penězi. Přesto si hosté užívají skvělý čas, vychutnávají vynikající jídlo a jsou svědky impozantní vojenské přehlídky."
 PER_imperial_events.30.t: "Oslava Perské říše"
 PER_imperial_events.40.a: "Šáh si vezme Fawzii z Egypta"
 PER_imperial_events.40.b: "Šáh si vezme $PER_teymourtash$"
 PER_imperial_events.40.c: "Šáh si vezme Irandokht Kadžárovou"
 PER_imperial_events.40.desc: "Během příprav na převzetí role šáha měl $PER_mohammed_reza_pahlavi$ dostatek příležitostí si najít lásku. Tři ženy upoutaly jeho pozornost, avšak pouze jedna může být korunována šáhbánu a vládnout po jeho boku jako [PER.GetAdjective] regentka. Je to Fawzia z Egypta, princezna sultána; $PER_teymourtash$, první šáhova láska; a Irandokht, bývalá kadžárská princezna, kterou šáh poznal ve Švýcarsku."
 PER_imperial_events.40.t: "Vybrat šáhbánu"
 PER_imperial_events.50.a: "Ještě že tak!"
 PER_imperial_events.50.desc: "Dnes odpoledne se v centru Teheránu ozvaly výstřely, když byl během projevu k národu $PER_reza_shah_pahlavi$ téměř zasažen kulkou při nezdařeném pokusu o atentát. Pachatelé byli okamžitě zadrženi a odhaleni jako důstojníci [PER.GetAdjective] armády, kteří nesouhlasili s šáhovým vedením. Šáh využil tento pokus o atentát jako prostředek ke sjednocení lidu za svou věc."
 PER_imperial_events.50.t: "$PER_reza_shah_pahlavi$ přežil pokus o atentát!"
 PER_imperial_events.60.a: "Souhlasíme. Je to pro naše dobro."
 PER_imperial_events.60.b: "S tím nemůžeme souhlasit."
 PER_imperial_events.60.desc: "Dnes ráno [GER.Capital.GetCapitalVictoryPointName] obdržel nabídku [PER.GetAdjective] šáha na uzavření paktu o neútočení, který má zajistit bezpečnost našich dvou zemí. Vzhledem na to, že [PER.GetNameDef] produkuje hromadu klíčových surovin, jako je ropa, bychom tuto nabídku měli zvážit."
 PER_imperial_events.60.t: "[FROM.GetNameDefCap] chce jednat o paktu o neútočení"
 PER_imperial_events.61.a: "Skvělé zprávy."
 PER_imperial_events.61.desc: "Dobré zprávy! Náš diplomat opustil [GER.Capital.GetCapitalVictoryPointName] a vrátil se se zprávou, že [GER.GetNameDef] si přeje s námi uzavřít pakt o neútočení. S ohledem na cíle, které hlásá [GER.GetNameDef], je to to nejlepší, co můžeme udělat pro zajištění bezpečnosti naší země."
 PER_imperial_events.61.t: "[GER.GetNameDefCap] souhlasí s paktem o neútočení"
 PER_imperial_events.62.a: "Nešťastný vývoj událostí..."
 PER_imperial_events.62.desc: "Bohužel se nám nepodařilo přesvědčit [GER.GetNameDef], ať podepíše pakt o neútočení. Je to škoda, ale přesto nám to může v budoucnu umožnit vstoupit do jejich frakce."
 PER_imperial_events.62.t: "[GER.GetNameDefCap] odmítá naši nabídku"
 PER_imperial_events.70.a: "Příjemná nabídka. Rozšiřte pozvání."
 PER_imperial_events.70.b: "Na takovéto rozmary nemáme čas."
 PER_imperial_events.70.desc: "Dnes ráno jsme obdrželi dopis zaslaný přímo z Saadabadského paláce v Teheránu. Šlo o projev dobré vůle od samotného Rezá Šáha Pahlavího, který projevil zájem navštívit Berlín s cílem zlepšit vztahy mezi našimi dvěma zeměmi. Vůdce se snaží, ať má s námi [PER.GetNameDef] dobré vztahy. Co bychom měli udělat?"
 PER_imperial_events.70.t: "$PER_reza_shah_pahlavi$ si přeje navštívit [GER.GetNameDef]"
 PER_imperial_events.71.a: "Slyšel jsem, že Braniborská brána je v tomto období nádherná!"
 PER_imperial_events.71.desc: "V reakci na náš dopis dobré vůle adresovaný pro [GER.GetNameDef] vyjádřil [GER.GetLeader] zájem, abychom navštívili Berlín s cílem zlepšit vztahy mezi našimi zeměmi. Musí jít o krátkou cestu, jelikož nás v Teheránu čeká mnoho povinností, ale vzhledem k napjaté světové situaci stojí za to udržet [GER.GetNameDef] na naší straně."
 PER_imperial_events.71.t: "[GER.GetNameDefCap] rozšiřuje pozvání k návštěvě"
 PER_imperial_events.72.a: "No nic, zpátky do práce."
 PER_imperial_events.72.desc: "V reakci na náš dopis dobré vůle adresovaný pro [GER.GetNameDef] [GER.GetLeader] bohužel odmítl naši nabídku k návštěvě Berlína. Je to škoda, jelikož to mohla být dobrá příležitost navázat bližší vztahy s mocným vůdcem. Bohužel, tentokrát se to nepodařilo."
 PER_imperial_events.72.t: "[GER.GetLeader] nemá čas na setkání"
 PER_imperial_events.80.a: "Máme větší problémy jinde. Stáhněme naše jednotky"
 PER_imperial_events.80.b: "Ne! Musíme postupovat dál!"
 PER_imperial_events.80.desc: "Nedávný postup [PER.GetAdjective] armády bohužel vedl k četným ztrátám na naší straně, zejména když převzali kontrolu nad několika našimi regiony. Situace se pro nás vyvinula nepříznivě a možná bychom měli zvážit konsolidaci ztrát a stažení jednotek z oblasti. To by však znamenalo postoupení části ztraceného území na [PER.GetNameDef]."
 PER_imperial_events.80.t: "Situace na [PER.GetAdjective] frontě"
 PER_industrial_events.1.a: "To zní jako dobrý obchod"
 PER_industrial_events.1.b: "Tohle nepotřebujeme."
 PER_industrial_events.1.desc: "[PER.GetNameDefCap] nás oslovuje s nabídkou těžebních práv k jejich nově získané ropě ve $STATE_413$u. Daná oblast oplývá touto klíčovou surovinou. Možná stojí za to tuto nabídku zvážit?"
 PER_industrial_events.1.t: "[FROM.GetNameDefCap] nabízí těžební práva"
 PER_industrial_events.2.a: "Je to zkrátka dobrý obchod!"
 PER_industrial_events.2.desc: "[FROM.GetNameDefCap] velkoryse přijímá naši nabídku týkající se nově získané ropy. To jen pomůže rozšířit naše rozsáhlé ropné impérium."
 PER_industrial_events.2.t: "[FROM.GetNameDefCap] přijímá naši obchodní nabídku"
 PER_industrial_events.3.a: "Je to jejich ztráta!"
 PER_industrial_events.3.desc: "Bohužel [FROM.GetNameDef] odmítá naši štědrou obchodní dohodu na [PER.GetAdjective] ropu. Možná bude lepší přesunout náš obchod jinam?"
 PER_industrial_events.3.t: "[FROM.GetNameDefCap] odmítá naši obchodní nabídku"
 PER_irandokht_married: "Irandokht se vdala"
 PER_islamic_revolution_events.1.a: "Musíme postupovat opatrně."
 PER_islamic_revolution_events.1.desc: "Zdá se, že některá naše rozhodnutí týkající se rozvoje naší země začala popuzovat řadu členů duchovenstva. Jak jejich nespokojenost dále narůstá, musíme jednat obezřetně, abychom je ještě více neodcizili."
 PER_islamic_revolution_events.1.t: "Nestabilita v duchovenstvu"
 PER_islamic_revolution_events.2.a: "Zakročme proti těmto revolucionářům."
 PER_islamic_revolution_events.2.b: "Okamžitě uklidněme duchovenstvo."
 PER_islamic_revolution_events.2.c: "Ať to zkusí!"
 PER_islamic_revolution_events.2.desc: "Naše kroky nadále odcizují duchovenstvo a v důsledku toho začínají mnozí vysoce postavení představitelé islámu získávat podporu mezi [PER.GetAdjective] obyvatelstvem. Čas se krátí a hrozí nám revoluce. Jak budeme postupovat?"
 PER_islamic_revolution_events.2.t: "Islámští revolucionáři se dávají do pohybu"
 PER_kurdish_rebellion_growing: "Kurdské povstání sílí"
 PER_kurds_armed_and_ready: "Kurdové jsou ozbrojeni a připraveni"
 PER_orchestrating_rebellions: "Organizování povstání"
 PER_resource_rights_on_war_tt: "§RPokud mezi našimi zeměmi vypukne válka, těžební práva a mimo-mapové továrny budou odstraněny!§!"
 PER_revolution_events.1.a: "Svolat jednotky!"
 PER_revolution_events.1.desc: "Dnes ráno opoziční strany vytvořily koalici a po infiltraci naší armády proti nám nyní povstaly se zbraní v ruce! Jejich síly se chystají vytáhnout na komplex Saadabad! [PER.GetNameDef] se musí připravit k obraně své suverenity!"
 PER_revolution_events.1.t: "Převrat na spadnutí"
 PER_saadabad_pact: "Požádáno o Saadabadský pakt"
 PER_saadabad_pact_member: "Člen Saadabadského paktu"
 PER_ssb_events.1.a: "Rozhodně, podepíšeme to!"
 PER_ssb_events.1.b: "To není v nejlepším zájmu [THIS.GetNameDefCap]."
 PER_ssb_events.1.desc: "[SSB_leader.GetLeader] svolal schůzku s vůdci všech zemí, které Saadabadský pakt podepsaly. [SSB_leader.GetLeader] uvádí, že Saadabadský pakt začal jako jednoduchý pakt o neútočení mezi našimi zeměmi, ale vyrostl v něco mnohem většího - naše hospodářská i vojenská spolupráce stále sílí. Jelikož jsou naše země ze všech stran obklopeny světovými velmocemi, jsme proti nim bezmocní. [SSB_leader.GetLeader] navrhl formální alianci mezi námi, aby zajistila úplnou vojenskou spolupráci a hospodářskou jednotu, a prohlásil, že je to nezbytné pro naše přežití, protože proti těmto mocnostem jsme odsouzeni k nezdaru."
 PER_ssb_events.1.t: "[SSB_leader.GetNameDefCap] nás zve do Saadabadského paktu"
 PER_ssb_events.10.a: "Tento pakt začíná mít velký dopad na naši ekonomiku."
 PER_ssb_events.10.desc: "[FROM.GetAdjectiveCap] vláda dokončila dohody s významnými společnostmi v celém saadabadském regionu a vyměňuje obrovská množství [SSB_resource_event_scripted_loc] za různé suroviny. Zatímco převážná část [SSB_resource_event_scripted_loc] míří přímo do soukromých rukou, naše vláda si ponechává skromnou část jako správní poplatek."
 PER_ssb_events.10.t: "[PER.GetName] podepisuje dohodu o vývozu ropy"
 PER_ssb_events.11.t: "[TUR.GetName] podepisuje dohodu o vývozu chromu"
 PER_ssb_events.2.a: "Skvělé!"
 PER_ssb_events.2.desc: "Schůzka skončila a [FROM.GetLeader] dal jasně najevo, že formální aliance mezi členy Saadabadského paktu je pro přežití našich zemí nanejvýš důležitá, a souhlasil se vstupem do aliance."
 PER_ssb_events.2.t: "[FROM.GetNameDefCap] vstupuje do Saadabadského paktu!"
 PER_ssb_events.3.a: "Saadabadská aliance bude žít i bez nich!"
 PER_ssb_events.3.desc: "Schůzka skončila a bohužel se nám nepodařilo přesvědčit, aby se také připojil [FROM.GetLeader]. Naše stávající vojenská a hospodářská spolupráce bude pokračovat, ale [FROM.GetLeader] uvádí, že formální Saadabadská aliance není v nejlepším zájmu jeho země."
 PER_ssb_events.3.t: "[FROM.GetNameDefCap] odmítá naši nabídku aliance."
 PER_ssb_events.4.a: "Je to oboustranně výhodná dohoda!"
 PER_ssb_events.4.b: "To zjevně není v našem zájmu."
 PER_ssb_events.4.desc: "[FROM.GetLeader] zorganizoval schůzku signatářů Saadabadského paktu, aby projednali návrh [FROM.GetAdjective] vlády. [FROM.GetLeader] uvádí, že se nacházíme v nebezpečné situaci, kdy nás ze všech stran ohrožují velmoci, a nabízí ještě těsnější propojení našich ekonomik - [FROM.GetNameDef] bude investovat prostředky do rozšiřování našeho průmyslu a společně budeme náš průmysl sdílet."
 PER_ssb_events.4.t: "[FROM.GetNameDefCap] navrhuje hospodářskou integraci"
 PER_ssb_events.5.a: "Skvělé!"
 PER_ssb_events.5.desc: "Po skončení schůzky [FROM.GetLeader] vyjádřil nadšení pro tento nápad a věří, že jde o oboustranně výhodnou dohodu."
 PER_ssb_events.5.t: "[FROM.GetNameDefCap] souhlasí!"
 PER_ssb_events.6.a: "To je škoda."
 PER_ssb_events.6.desc: "Po skončení schůzky [FROM.GetLeader] vyjádřil pochybnosti o návrhu a uvedl, že působí jednostranně a má zjevný cíl - nastolit v regionu situaci, kde bude dominovat pouze [THIS.GetNameDef]."
 PER_ssb_events.6.t: "[FROM.GetNameDefCap] odmítá."
 PER_ssb_events.7.a: "Dnes je skvělý den pro [ROOT.GetNonIdeologyName]!"
 PER_ssb_events.7.desc: "[IRQ.GetNameDefCap] dnes schvaluje zákon, který otevírá obchod po trati Berlín-Bagdád všem signatářům Saadabadského paktu. To umožní rozsáhlý, snadný a levný obchod s celou Evropou a bude to přínosem pro naše ekonomiky."
 PER_ssb_events.7.t: "[IRQ.GetNameDefCap] otevírá železnici Berlín-Bagdád Saadabadskému paktu"
 PER_ssb_events.8.a: "Snad to nepřeroste v úplný rozpad paktu..."
 PER_ssb_events.8.desc: "Znepokojivé zprávy: [FROM.PREV.GetNameDefCap] vyhlašuje válku jinému členu, čímž porušuje základní ustanovení Saadabadské smlouvy. V důsledku toho již není [FROM.PREV.GetNonIdeologyName] členem Saadabadského paktu. Jen čas ukáže, jaký dopad to bude mít na další vývoj paktu - možná to povede k větší soudržnosti zbývajících členů, nebo to naopak spustí řetězovou reakci, která Saadabadský pakt zahubí..."
 PER_ssb_events.8.t: "[FROM.PREV.GetNameDefCap] vyhlašuje válku na [FROM.PREV.FROM.GetNameDefCap] a porušuje Saadabadský pakt!"
 PER_ssb_events.9.a: "Skvělé!"
 PER_ssb_events.9.desc: "Možnost společné výzkumné dohody v rámci Saadabadského paktu je už delší dobu předmětem diskusí, ale po zdlouhavých jednáních bylo konečně dosaženo dohody. Veškeré objevy a informace týkající se výzkumu budou v rámci paktu sdíleny a nyní jsou zavedeny systémy umožňující společné výzkumné projekty. To může pro nás znamenat nástup nové éry vědy a umožnit nám postavit se po bok zbytku světa jako vůdci a inovátoři v oblasti vědy."
 PER_ssb_events.9.t: "Úsvit Saadabadské výzkumné spolupráce"
 PER_teymourtash_married: "Tejmúrtáš se vdala"
 RAJ_famine_prevention_stats: "Naše preventivní opatření\n- Zastavila šíření hladomoru: §Y[?RAJ_times_shield_has_blocked_spread]§!×\n- Zkrátila délku hladomoru o: §Y[?RAJ_famine_reduction_from_shield]§! měsíců"
 RAJ_famine_risk_scripted_gui_desc: "Šance, že preventivní opatření zastaví šíření hladomoru do sousedních států: §G[?RAJ_famine_shield]%§!\nRiziko šíření hladomoru: §R[?RAJ_famine_spreads]%§!"
 RAJ_famine_scripted_timeframe_non_reveal_desc: "Očekáváme, že hladomor potrvá ještě §Y[?RAJ_famine_spread_times_min]§!-§Y[?RAJ_famine_spread_times_max]§! měsíců."
 RAJ_famine_scripted_timeframe_reveal: "[GetFamineTimeframe]\n$RAJ_famine_prevention_stats$"
 RAJ_famine_scripted_timeframe_reveal_desc: "Zjistili jsme, že hladomor potrvá ještě §Y[?RAJ_famine_spread_times]§! měsíců."
 RAJ_famine_shield_tt: "Šance, že preventivní opatření zastaví šíření hladomoru: §G+$RIGHT|0$%§!\n"
 RAJ_partition_1.a: "Nepřijatelné."
 RAJ_partition_1.desc: "To, co začalo jako civilní protest, přerostlo v násilí, když místní policejní složky zasáhly proti nespokojenému obyvatelstvu. [ENG.GetAdjectiveCap] policie tvrdí, že jednala pod hrozbou násilí, zatímco protestující trvají na tom, že se striktně drželi nenásilí.\nNikdo nebyl zabit, avšak 2 místní policisté utrpěli lehká zranění a 1 protestující byl po otřesu mozku převezen do místní nemocnice."
 RAJ_partition_1.t: "Protest v [FROM.GetName] přerůstá v násilí."
 SSB_if_join_tt: "Přijetí této dohody umožní §Ypakt o neútočení§!, odemkne §Yspolečný strom zaměření§! pro všechny signatářské země a udělí nám národní duch §Y$SSB_saadabad_pact$§!, který se bude postupně zlepšovat, jak budou v rámci společného stromu zaměření dokončována zaměření."
 SSB_resource_event_scripted_loc_chromium: "chromu"
 SSB_resource_event_scripted_loc_oil: "ropy"
 SSB_you_will_lose_the_bonus_tt: "§RVyhlášení války členu Saadabadského paktu je porušením smlouvy a povede k vašemu vyloučení - ztratíte národního ducha a navždy přijdete o přístup ke sdílenému stromu zaměření.§!"
 currentStateCompliance: "  Aktuálně §Y[?var:THIS.compliance]%§! poslušnosti."
 currentStateResistance: "  Aktuálně §R[?var:THIS.resistance]%§! odboje."
 goe_japan.1.a: "Samozřejmě"
 goe_japan.1.b: "Ne"
 goe_japan.1.desc: "$RAJ_subhas_chanda_bose$, vůdce Indické národní armády, nás oslovil s nabídkou: jeho síly jsou připraveny podpořit náš postup do [BRM.GetName]. Vnímá to jako první krok k osvobození Indie od [ENG.GetAdjective] nadvlády a věří, že úderem na Barmu můžeme oslabit Britský rádž. Jeho muži jsou zocelení nacionalisté a jejich znalost terénu by se mohla ukázat jako neocenitelná. Přijmeme?"
 goe_japan.1.t: "Bós nabízí podporu pro barmské tažení"
 rejected_hashemite_federation_tt: "§RJiž nebudeme moci pozvat [FROM.GetNameDef] do naší federace!§!"
 the_1936_PAL_revolt_has_happened: "§YProběhlo palestinské povstání a Britové vyhnali disidenty do exilu.§!"
