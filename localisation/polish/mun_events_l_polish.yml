l_polish:
 MUN_czech_skoda_priority.t: "Škodovy závody"
 MUN_czech_skoda_priority.d: "Společnost Škoda Works vyrábí širokou škálu produktů, od dělostřelectva přes tanky až po vlaky a námořní děla. Díky tomu máme velkou všestrannost při přesouvání zdrojů tam, kde je poptávka nejvyšší, což nyní můžeme částečně řídit."
 MUN_czech_skoda_priority.1.a: "Zajímavé"
 MUN_czech.2.t.1:0 "Paramilitární v Sudetech žádají o pomoc"
 MUN_czech.2.t.2:0 "Sudetský svobodný sbor žádá o pomoc"
 MUN_czech.2.t.3:0 "Dělnické milice v Sudetech žádají o pomoc"
 MUN_czech.2.d.1:0 "S ohledem na nedávné zprávy o našich nárocích na [CZE.getname] si mnoho politických stran v Sudetech rychle vytvořilo paramilitární skupiny po celém regionu v naději, že podlomí [CZE.GetAdjective] vládu. Nyní žádají naši podporu při přeshraničních nájezdech a provádění sabotáží, aby podpořily naše vlastní úsilí proti [CZE.getname]."
 MUN_czech.2.d.2:0 "S ohledem na nedávné zprávy o našich nárocích na [CZE.getname] rychle mobilizovaly sudetské politické strany své paramilitární jednotky: Sudetský svobodný sbor. Jednotky Svobodného sboru po celých Sudetech se začaly formovat a napadat majetek [CZE.GetAdjective] vlády v Sudetech. Nyní žádají naši plnou podporu při provádění přeshraničních nájezdů a sabotážích proti [CZE.getname]."
 MUN_czech.2.d.3:0 "S ohledem na nedávné zprávy o našich nárocích na [CZE.getname] rychle mobilizovaly místní komunistické strany dělnické milice. Tyto dělnické milice začaly napadat majetek [CZE.GetAdjective] vlády v regionu. Nyní žádají naši plnou podporu při provádění přeshraničních nájezdů a sabotážích proti [CZE.getname] a dalším kontrarevolucionářům."
 MUN_czech.2.a:0 "Samozřejmě jim pomůžeme"
 MUN_czech.2.b:0 "Možná je lepší je dál nezesilovat"
 MUN_czech.3.t: "Partizánská činnost v Sudetech"
 MUN_czech.3.d: "V návaznosti na nedávný zájem [FROM.getname] o anektování Sudet začaly paramilitární skupiny vstupovat do potyček proti nám. Začaly napadat vládní budovy a podkopávat naše obrany v několika oblastech. Pokud chceme zlepšit naši vojenskou situaci v oblasti, musíme se těmito paramilitárními skupinami zabývat."
 MUN_czech.3.a: "Jak by se to mohlo ještě zhoršit?"
 MUN_czech.4.t: "Krize důvěry"
 MUN_czech.4.d: "Nedávné zprávy o vojenské agresi proti nám otřásly vládou v základech. [CZE.GetLeader] ztratil víru ve schopnost své vlády vést zemi skrze tuto krizi. Požádal $CZE_jan_syrovy$, aby převzal velení nad situací a vedl zemi. $CZE_jan_syrovy$ prohlásil, že je zdrženlivý převzít vedení, avšak v této situaci mu [CZE.GetLeader] sdělil, že nemá na výběr a musí převzít velení a vést nás skrze tuto krizi."
 MUN_czech.4.a: "Potřebujeme vás více než kdy jindy."
 MUN_czech.4.b: "Nesmíme ztratit hlavu."
 MUN_czech.5.t: "Tomáš Masaryk zemřel"
 MUN_czech.5.d: "Masaryk byl stabilizující postavou v československé politice více než dvě dekády. Když se koalice jevily jako nemožné a politické patové situace nepřekonatelné, Masaryk dokázal znovu a znovu politická zázraky, které posílily a rozvíjely Československo do podoby, jaké je dnes. Jeho přítomnost bude velmi postrádána a její vliv bude cítit v celé zemi."
 MUN_czech.5.a: "Nenahraditelný politický velikán."
 MUN_czech.7.t: "Přehodnocení závazků vůči [CZE.getnamedef]"
 MUN_czech.7.d: "Dostaly se k nám zprávy, že [GER.getnamedef] si přeje anektovat Sudety a je ochoten kvůli tomu vyvolat válku s [CZE.getnamedef]. V současné době máme s [CZE.getnamedef] obrannou dohodu, což znamená, že pokud by šli do války s [GER.getnamedef], byli bychom povinni jim pomoci. Pokud chceme tomuto výsledku předejít, musíme okamžitě vystoupit z našich obranných dohod s [CZE.getnamedef]."
 MUN_czech.7.a: "Stojíme za našimi přáteli"
 MUN_czech.7.b: "Neměli bychom proti [GER.getnamedef] šanci"
 MUN_czech.1001.t: "[FROM.GetNameDefCap] požaduje koridor do [SOV.GetNameDef]"
 MUN_czech.1001.d: "Ve snaze koordinovat vojenské akce s [SOV.GetNameDef] požaduje [FROM.GetNameDef], abychom jim postoupili hraniční regiony [89.GetName] a [91.GetName]."
 MUN_czech.1002.t: "[FROM.GetNameDefCap] požaduje vliv nad Jugoslávskou ligou"
 MUN_czech.1002.d: "Po rozšíření na jih přišel [FROM.GetName] s neobvyklým požadavkem. Nežádají zabraní území, ale kontrolu nad Jugoslávskou obrannou ligou, stát se ochráncem a suverénem severobalkánských zemí, které jsou momentálně našimi protektoráty. Tvrdí, že by byly schopnějším ochráncem než my, ale to samozřejmě může být jen záminka."
 MUN_czech.1002.a: "Možná mají pravdu"
 MUN_czech.1002.b: "Ne, jsou pod naší ochranou!"
 MUN_czech.1003.t: "[FROM.GetName] odmítá požadavky"
 MUN_czech.1003.d: "Navzdory přesvědčivým argumentům našich diplomatů [FROM.GetNameDef] odmítl ustoupit našim požadavkům."
 MUN_czech.1003.a: "Nenechali nám jinou možnost"
 MUN_czech.1004.t: "[FROM.GetName] postupuje proti Maďarsku"
 MUN_czech.1004.d: "Do [ROOT.capital.GetCapitalVictoryPointName] dorazily zprávy o postupu [FROM.GetAdjective] jednotek směrem k [HUN.GetAdjective] hranici. Ačkoliv nás zástupci [HUN.GetAdjective] nepochybně brzy kontaktují, už nyní bychom měli zvážit, zda pomoci [HUN.GetNameDef] a získat potenciálního spojence, nebo nechat [FROM.GetNameDef] pokračovat ve svých plánech."
 MUN_czech.1004.a: "Měli bychom chránit naše zájmy"
 MUN_czech.1004.b: "Zůstaňme stranou"
 MUN_czech.1005.t: "[FROM.GetName] požaduje pobřežní území"
 MUN_czech.1005.d: "S rostoucím územím [FROM.GetNameDef] přišli jejich zástupci požadovat, abychom jim postoupili půdu, kterou kdysi vlastnili [FROM.GetAdjective] šlechtici. Tvrdí, že by jim to dalo přístup k Jadranu, a nejsou příliš nakloněni naslouchat našim názorům na věc."
 MUN_czech.1006.t: "[FROM.GetName] navrhuje partnerství"
 MUN_czech.1006.d: "[FROM.GetNameDef] k nám přistoupil s návrhem vzájemné obranné smlouvy, s cílem odradit jakéhokoli útočníka společnou silou našich armád. Zajímavé však je, že existuje i tajná část smlouvy, kde je popsán možný rozšíření vlivu [ROOT.GetAdjective] a jak by nám v tom mohl [FROM.GetNameDef] pomoci."
 MUN_czech.1007.t: "[FROM.GetName] požaduje sblížení"
 MUN_czech.1007.d: "Nedůvěra mezi námi a [FROM.GetNameDef] od jejich vzniku je vedla k tomu, že nyní požadují naše začlenění, jinak hrozí invazí. Zajímavé je, že [FROM.GetNameDef] také oslovuje naše teritoriální ambice a slibuje, že výměnou za přerušení našich nároků na jejich území nám mohou pomoci získat jiná území, která si nárokujeme."
 MUN_czech.1007.b: "Musíme si zachovat suverenitu!"
 MUN_czech.1008.t: "[FROM.GetName] navrhuje přizvat [CZE_invited_country.GetName]"
 MUN_czech.1008.d: "Zástupci [FROM.GetNameDef], náš most do střední Evropy, navrhli rozšíření naší aliance pozváním [CZE_invited_country.GetName]."
 MUN_czech.1008.a: "Další odstrašující prvek proti útoku na nás"
 MUN_czech.1008.b: "Nemůžeme být očekáváni, že budeme bránit celou Evropu"
 MUN_czech.1009.t: "[FROM.GetName] nás zve do [CZE.GetFactionName]"
 MUN_czech.1009.d: "Diplomaté z [FROM.GetNameDef] dali najevo, že bychom byli vítáni v jejich alianci. V minulosti však naše teritorální nároky byly předmětem sporů v vztazích s [FROM.GetNameDef]. Nyní musíme rozhodnout, zda nadále uplatňovat tyto nároky, nebo se soustředit na navázání přátelštějších vztahů."
 MUN_czech.1009.a: "Za našeho nového spojence!"
 MUN_czech.1009.b: "Přidáme se poté, co budou naše nároky uznány"
 MUN_czech.1009.c: "Nejsme zainteresováni"
 MUN_czech.1010.t: "[FROM.GetName] nás žádá, abychom vedli [CZE.GetFactionName]"
 MUN_czech.1010.d: "Poté, co se [FROM.GetNameDef] nedávno pokusila proměnit dohody Malé dohody v reálnou alianci, přišla s návrhem: chtějí, abychom vedli tuto novou frakci. Postoupili by vedení výměnou za to, že bychom se stali jejich cenným ochráncem, dohoda, která by rozšířila naší sféru, ale potenciálně i s národy, které jsou ohroženy."
 MUN_czech.1010.a: "Byli by to cenní spojenci"
 MUN_czech.1010.b: "Ochrana [ROOT.GetNameDef] stačí"
 MUN_czech.1011.t: "[FROM.GetName] navrhuje dohodu o ochraně"
 MUN_czech.1011.d: "Jako součást snahy odradit jakoukoli agresi vůči [FROM.GetNameDef] nás jejich diplomaté oslovili s návrhem vzájemné obranné smlouvy. V případě naší podpory by nám nabízeli stejnou ochranu, čímž by donutili jakéhokoli agresora bojovat na dvou frontách."
 MUN_czech.1011.a: "Stojí to za to riziko"
 MUN_czech.1011.b: "Neutralita je bezpečnější"
 MUN_czech.1012.t: "[FROM.GetName] požaduje naši podrobení"
 MUN_czech.1012.d: "Posíleni nově vytvořenou aliancí přišli zástupci [FROM.GetNameDef] s požadavky, které by pro nás znamenaly ztrátu suverenity. S podporou [SOV.GetName], vzhledem k jeho zájmu v regionu, musíme nyní rozhodnout, zda si můžeme dovolit odmítnout."
 MUN_czech.1012.a: "Odpor by zbytečně zahodili životy [ROOT.GetAdjective]"
 MUN_czech.1012.b: "Smrt před hanbou!"
 MUN_czech.1013.t: "[FROM.GetName] nabízí podmíněnou alianci"
 MUN_czech.1013.d: "Po pečlivém zvážení vláda [FROM.GetNameDef] oznámila, že souhlasí s výhodností aliance, avšak také prohlásila, že nemůže pominout své teritorální nároky. Proto přišla s návrhem: připojí se k naší frakci, ale pouze pokud jim ustoupíme území, které si nárokují."
 MUN_czech.1013.a: "Oběť, která stojí za to"
 MUN_czech.1013.b: "Snažíme se chránit naše území!"
 MUN_czech.1014.t: "[FROM.GetName] žádá o ochranu"
 MUN_czech.1014.d: "Vlivní diplomaté z [FROM.GetNameDef] oslovili ministra zahraničí s žádostí, abychom stvrdili vágní ochranné sliby obsažené ve smlouvě Československo-Sovětské z roku 1935."
 MUN_czech.1014.a: "Možná bychom měli zkusit ochránit našeho spojence"
 MUN_czech.1014.b: "Nechme to u vágních slibů"
 MUN_czech.1015.t: "[FROM.GetName] navrhuje sloučení našich frakcí"
 MUN_czech.1015.d: "Nyní, když máme stejné nepřátele, přišel k nám [FROM.GetName] s návrhem, který by prohloubil naši spolupráci integrací naší frakce do jejich."
 MUN_czech.1015.a: "Koordinovaná snaha by ušetřila životy"
 MUN_czech.1015.b: "Musíme mít kontrolu"
 MUN_czech.1016.t: "[FROM.GetName] navrhuje pakt o neútočení"
 MUN_czech.1016.d: "Navazujíc na předchozí rozhovory, které byly zrušeny po změně zahraniční politiky, navrhl [FROM.GetNameDef] pokračovat v jednání o paktu o neútočení."
 MUN_czech.1016.a: "O jednu hranici méně k ochraně"
 MUN_czech.1016.b: "To nám překáží v našich ambicích"
 MUN_czech.1017.t: "Společná invaze do [GER.GetNameDef]?"
 MUN_czech.1017.d: "[FROM.GetNameDef] se obrátil na vrchol [ROOT.GetAdjective] s tajnými plány na invazi do [GER.GetNameDef]. Po prokázání svého odhodlání zlikvidovat [GER.GetAdjective] hrozbu požádali, abychom jim pomohli a společně přemohli mocnou [GER.GetAdjective] armádu."
 MUN_czech.1017.a: "Uderíme na [GER.GetNameDef] s nimi"
 MUN_czech.1017.b: "To je příliš nebezpečné"
 MUN_czech.1018.t: "Bojovat sami proti [GER.GetNameDef]?"
 MUN_czech.1018.t.2: "Společná invaze do [GER.GetNameDef]"
 MUN_czech.1018.d: "Navzdory našemu diplomatickému úsilí se nám nepodařilo získat žádnou zahraniční podporu pro preventivní invazi do [GER.GetName]. Otázkou nyní je, zda vůbec pokračovat v našich naplánovaných útocích."
 MUN_czech.1018.d.FRA_POL: "Převratné zprávy dorazily jak z [FRA.GetNameDef], tak z [POL.GetNameDef], naši diplomaté hlásí, že obě země se zavázaly nám pomoci při invazi do [GER.GetNameDef]."
 MUN_czech.1018.d.FRA: "Naši diplomaté se vrátili z [FRA.GetNameDef] s výbornou zprávou, že by se ochotně zúčastnili společné invaze do [GER.GetNameDef]. Nyní musíme zhodnotit, zda by naše společné síly byly dostatečné."
 MUN_czech.1018.d.POL: "Naši diplomaté se vrátili z [POL.GetNameDef] s výbornou zprávou, že by se ochotně zúčastnili společné invaze do [GER.GetNameDef]. Nyní musíme zhodnotit, zda by naše společné síly byly dostatečné."
 MUN_czech.1018.a: "Nikdy to neuvidí přijít"
 MUN_czech.1018.b: "S odstupem času je to příliš rizikové"
 MUN_czech.1019.t: "[FROM.GetName] požaduje [762.GetName]"
 MUN_czech.1019.d: "Pod záminkou obnovení předchozích českých hranic a zlegalizování své kontroly nad [72.GetName] doručili zástupci [FROM.GetAdjective] ultimátum, požadující, abychom postoupili [762.GetName]."
 MUN_czech.1019.a: "Možná nám to zajistí bezpečí"
 MUN_czech.1020.t: "[FROM.GetName] nabízí podmíněné investice"
 MUN_czech.1020.a: "Skvělý obchod!"
 MUN_czech.1020.b: "Tato ustanovení jsou nepřijatelná"
 MUN_czech.1020.d: "Dorazili k nám diplomaté z [FROM.GetNameDef], kteří představili dohodu, kde by jejich stát investoval do našeho průmyslu a infrastruktury výměnou za dohodu o zdrojích. Tento krok, přicházející po předchozích neúspěšných investicích, naznačuje obnovené úsilí o zlepšení vzájemných vztahů."
 CZE_investment_effects_tt: "Za §Y100 dní§! získáme:\n§YInfrastrukturu§! ve §Y3§! náhodných státech.\n§YCivilní továrnu§! v §Y1§! náhodném státě.\n"
 MUN_czech.1021.t: "Návrat rakousko-uherské celní unie?"
 MUN_czech.1021.d: "[CZE.GetNameDefCap] nás oslovil s návrhem obchodní smlouvy mezi bývalými rakousko-uherskými národy. Ač šťastní za jejich nezávislost, nová [CZE.GetAdjective] vláda se zdá být obzvlášť ochotná obnovit prospěšné prvky bývalé monarchie."
 MUN_czech.1021.a: "Více obchodu zní lákavě"
 MUN_czech.1021.b: "Musíme chránit naše domácí výrobce"
 MUN_czech.1022.t: "[CZE.GetName] obsazuje Slezsko"
 MUN_czech.1022.d: "Po prudkých bojích kolem hor [69.GetName] se [CZE.GetAdjective] jednotkám podařilo prorazit a nastolit kontrolu nad celým Slezskem, než byli jejich protivníci schopni znovu poskytnout vážný odpor."
 MUN_czech.1022.a: "Musíme zasáhnout"
 MUN_czech.1022.b: "Nemůžeme si vytvořit dalšího nepřítele"
 MUN_czech.1022.c: "Velké vítězství!"
 MUN_czech.1023.t: "[CZE.GetName] zahajuje boj o Slezsko"
 MUN_czech.1023.d: "Pod záminkou zastaralých nároků týkajících se středověkých království a říší, [FROM.GetNameDef] eskaloval hraniční šarvátky do omezené války ve snaze ovládnout [ROOT.GetAdjective] Slezsko."
 MUN_czech.1023.a: "Připravit vojska"
 MUN_czech.1024.t: "[CZE.GetName] navrhuje mírovou dohodu"
 MUN_czech.1024.d: "Poté, co hraniční střety ve Slezsku přerostly v plnohodnotnou válku, naznačil [FROM.GetNameDef] ochotu ukončit konflikt, pokud jim bude postoupeno území, které si nárokují."
 MUN_czech.1024.a: "Možná bychom se měli zaměřit na jiné oblasti"
 MUN_czech.1024.b: "Situace je stále v náš prospěch"
 MUN_czech.1024.c: "O tom se nebude jednat!"
 MUN_czech.1025.t: "Konec španělské dobrovolnické mise"
 MUN_czech.1025.d.1: "Naše [ROOT.GetAdjective] jednotky poslané k [CZE_supported_spanish_faction.GetName] se vracejí domů poté, co jim pomohly dosáhnout vítězství. Boje přinesly našim jednotkám nové poznatky, zejména jejich zdravotnickým oddílům."
 MUN_czech.1025.d.2: "Navzdory statečnému boji našich [ROOT.GetAdjective] sil ve španělské občanské válce byla strana, kterou jsme podporovali, nakonec poražena. Přesto si naše jednotky, zvláště jejich zdravotnické týmy, odnesly cenné poznatky."
 MUN_czech.1025.a: "Doufejme, že tyto lekce nebudeme muset použít doma"
 MUN_czech.1026.t: "[FROM.GetName] odmítá návrh"
 MUN_czech.1026.a: "Jejich ztráta"
 MUN_czech.1026.b: "Znepokojivý vývoj"
 MUN_czech.1026.france_refuses_to_lead: "Navzdory nabídnuté vůdčí roli, kterou [FROM.GetAdjective] odmítl přijmout. Zdá se, že [FROM.GetAdjective] se snaží zůstat neutrální, nebo načasovat své kroky."
 MUN_czech.1026.sphere_of_influence: "Ačkoliv nám členové vlády [FROM.GetAdjective] ujistili, že si cení naší účasti v [ROOT.GetFactionName], sdělili, že rozšiřování našeho vlivu na Balkán by bylo příliš a mohlo by odradit potenciální spojence."
 MUN_czech.1026.guarantee: "Naši diplomaté hlásí, že navzdory jejich snahám [FROM.GetNameDef] nesouhlasil s naší návrhem vzájemné obrany. Zdá se, že nás považují za rizikovější než sebe; doufejme, že se mýlí."
 MUN_czech.1026.faction_merge: "Navzdory našemu nejlepšímu úsilí se nám a diplomatům [FROM.GetAdjective] nepodařilo dohodnout na sjednocení [ROOT.GetFactionName] a [FROM.GetFactionName]."
 MUN_czech.1026.non_aggression: "Navzdory ujištěním o jejich mírumilovných záměrech odmítli [FROM.GetAdjective] diplomaté podepsat pakt o neútočení s naším státem; proč, to zůstává otázkou."
 MUN_czech.1026.trade_deal: "S odkazem na touhu zůstat ekonomicky nezávislými odmítl [FROM.GetNameDef] náš návrh obchodní dohody."
 MUN_czech.1026.faction_invite: "Ačkoliv naši diplomaté předkládali argumenty, proč by [FROM.GetNameDef] profitoval z aliance s námi, nakonec se je nepodařilo přesvědčit."
 MUN_czech.1026.weapons_sale: "Navzdory naší štědré nabídce se [FROM.GetNameDef] rozhodl od nás momentálně zbraně nekupovat."
 MUN_czech.1026.unification: "I když uznali přínosy, které by federace přinesla, rozhodl se [FROM.GetNameDef] ponechat svou exilovou vládu jako jedinou legitimní vládu pro svá území."
 MUN_czech.1026.white_peace: "Naši zástupci se dnes vrátili se smutnou zprávou, že navzdory naší okupaci [66.GetName] vedení [FROM.GetAdjective] není ochotno podepsat mírovou dohodu. Zdá se, že budeme muset buď v tažení pokračovat, nebo doufat, že je vyčerpáme."
 MUN_czech.1027.t: "Navázat [FROM.GetAdjective]-[ROOT.GetAdjective] obchodní dohodu?"
 MUN_czech.1027.d: "Navzdory počátečním ideologickým rozdílům oslovil [FROM.GetNameDef] naši pragmatičnost a nabídl obchodní dohodu. Výměnou za to, že by [FROM.GetAdjective] mohli těžit suroviny v [202.GetName], by nám poskytli obráběcí stroje, které tak zoufale potřebujeme k rozšíření průmyslové kapacity."
 MUN_czech.1027.a: "Skvělá dohoda."
 MUN_czech.1027.b: "Měli bychom jim tyto zdroje odepřít."
 MUN_czech.1028.t: "Zpožděné opevňovací snahy"
 MUN_czech.1028.d: "Mnozí v zemi se nyní ptají, proč vláda nepokračovala v opevňovacích projektech, které zahájila koncem minulého roku. Vláda vyčlenila prostředky na další projekty výstavby pevností skrze Fortifikační radu. Při absenci pokroku požadují lidé, aby projekt buď pokračoval, nebo byly prostředky vráceny. Pokud chceme naše opevňovací programy dokončit včas, není čas ztrácet a je třeba projekty znovu spustit."
 MUN_czech.1028.a: "Nemáme čas ztrácet!"
 CZE_no_time_to_lose_tt: "Náš časový okno k dokončení opevňovacích projektů před objevením se hrozby je nyní velmi úzké."
 MUN_czech.1029.t: "Opevňovací projekt dokončen"
 MUN_czech.1029.d: "Náš poslední opevňovací projekt byl dokončen a zdroje jsou k dispozici k zahájení dalšího projektu. Naši inženýři jsou připraveni okamžitě nasadit práce na nové linii opevnění."
 MUN_czech.1029.a: "Výborná práce, pánové"
 MUN_czech.1030.t: "[FROM.GetName] požaduje integraci"
 MUN_czech.1030.d: "[FROM.GetNameDefCap] požadoval, abychom se stali součástí jejich svazu, když se snaží jej rozšířit. Ač apelují na různé země v regionu různými důvody — panslavismus, panbalkanismus a společná historie v rámci Rakouska-Uherska — tento apel obsahuje jasnou implikovanou hrozbu, pokud odmítneme."
 MUN_czech.1030.a: "Možná by to nebylo tak špatné"
 MUN_czech.1030.b: "Není to přesvědčivé"
 MUN_czech.1031.t: "[FROM.GetName] navrhuje unii"
 MUN_czech.1031.d: "Ačkoliv se [ROOT.GetNameDef] kapituloval, [FROM.GetAdjective] vláda přišla s razantním návrhem, který by nám umožnil pokračovat v boji: sloučení toho, co zůstalo z naší země, s jejich."
 MUN_czech.1031.a: "Společně lépe ochráníme naše domovy"
 MUN_czech.1031.b: "Naše rozdíly jsou příliš velké"
 MUN_czech.1032.t: "Překlenutí propasti"
 CZE_divide_nation_title_dynamic_sudentenland: "$MUN_czech.1032.t$ v Sudetech"
 CZE_divide_nation_title_dynamic_czech_states: "$MUN_czech.1032.t$ s českými dělníky"
 CZE_divide_nation_title_dynamic_tesinko_poles: "$MUN_czech.1032.t$ v [72.GetName]"
 CZE_divide_nation_title_dynamic_slovakia_states: "$MUN_czech.1032.t$ v [SLO.GetNonIdeologyName]"
 CZE_divide_nation_title_dynamic_hungarian_states: "$MUN_czech.1032.t$ v [664.GetName]"
 CZE_divide_nation_title_dynamic_ukrainian_states: "$MUN_czech.1032.t$ v [73.GetName]"
 MUN_czech.1032.d: "Nedávné snahy řešit problémy v [FROM.getname] byly úspěšné v utišení hněvu vůči centrální vládě, alespoň prozatím. Zdroje vlády jsou nyní uvolněny k věnování se jiným sociálním či ekonomickým programům, které budou nadále bojovat s problémy rozdělujícími naši zemi."
 MUN_czech.1032.a: "Pusťme se do toho znovu"
 MUN_czech.1033.t: "Exilová vláda [FROM.GetAdjective] žádá o uznání"
 MUN_czech.1033.d: "Exilová vláda [FROM.GetAdjective] pod vedením $CZE_edvard_benesh$ žádá, abychom hostili jejich delegaci, jak se snaží získat zpět suverenitu [CZE.GetNonIdeologyName]."
 MUN_czech.1033.a: "Další spojenec proti [GER.GetAdjective]s"
 MUN_czech.1033.b: "Jsou nelegitimní"
 MUN_czech.1034.t: "Nepokoje na Slovensku"
 MUN_czech.1034.d: "V důsledku ustoupení nacionalistickým náladám vytvořili členové Slovenské ľudové strany vlastní paramilitární síly, které nyní usilují o nezávislost nebo alespoň autonomii Slovenska. Otázka zní, zda se zaměříme na udržení jakési jednoty tím, že tomu zabráníme, nebo zda tomu ustoupíme a soustředíme se na území loajální vládě."
 MUN_czech.1034.a: "Poslat armádu na Slovensko!"
 MUN_czech.1034.b: "Zatkni je, ale udělme určitou autonomii"
 MUN_czech.1034.c: "Převzít přímou kontrolu"
 MUN_czech.1034.c_tt: "§RBudeme na milosti rozhodnutí [GER.GetNameDef] ohledně osudu Československa.§!"
 MUN_czech.1035.t: "[FROM.GetName] nabízí vyrábět zbraně pro nás"
 MUN_czech.1035.d: "Náš integrační partner [CZE.GetNameDef] nám nabídnul unikátní dohodu: budou za poplatek vyrábět zbraně, které nyní vyrábíme doma. To by nám umožnilo soustředit se na jiné sektory průmyslu."
 MUN_czech.1035.a: "To znamená méně duplicitní práce"
 MUN_czech.1035.b: "Nesmíme udělat naši armádu závislou na cizím vybavení"
 MUN_czech.1036.d: "Velká hospodářská krize našemu národu nepřinesla ekonomické ani politické výhody. Mnoho regionálních ekonomických a politických problémů nás sužuje a zdá se, že se i přes zázračné zotavení z krize zhoršují. Musíme tyto problémy řešit dříve, než naši zemi dále rozdělí."
 MUN_czech.1036.a: "Musíme vyléčit naši zemi"
 CZE_divided_nation_event_onbroad_tt: "Odemkli jsme §YRozhodnutí§!, která nám umožní §YOdstranit§! negativní §YModifikátory států§! na našich domovských státech.\n\nDokončení těchto §YRozhodnutí§! také sníží negativní modifikátory na národním duchu §Y$CZE_a_divided_nation_dynamic_modifier$§! dokud nebude §YOdstraněn§!."
 MUN_czech.1037.t: "[GER.GetName] chrání [HUN.GetName]"
 MUN_czech.1037.d: "Po zjištění zjevných válečných záměrů v naší zemi vůči [HUN.GetNameDef] dali zástupci [GER.GetAdjective] jasně najevo, že případná válka s [HUN.GetAdjective] by znamenala i válku s [GER.GetNameDef]. Zda pokračovat nyní, záleží na nás."
 MUN_czech.1037.a: "Naše plány musí být zrušeny"
 MUN_czech.1037.b: "To nic nemění"
 MUN_czech.1038.t.1: "[FROM.GetName] nabízí licencování svých návrhů tanků"
 MUN_czech.1038.t.2: "[FROM.GetName] nabízí prodej pušek"
 MUN_czech.1038.t.3: "[FROM.GetName] nabízí prodej dělostřelectva"
 MUN_czech.1038.t.4: "[FROM.GetName] nabízí prodej lehkých tanků"
 MUN_czech.1038.t.5: "[FROM.GetName] nabízí prodej stíhaček"
 MUN_czech.1038.d: "Zástupci vlády [FROM.GetAdjective] a jejich zbrojovek nás oslovili s nabídkou prodeje zbraní. Cena je přiměřená a [FROM.GetNameDef] také nabízí některé velmi moderní typy zbraní."
 MUN_czech.1038.a: "Zní to jako dobrý obchod"
 MUN_czech.1039.t: "[RUT.getname] chce dohodu o autonomii"
 MUN_czech.1039.d: "V návaznosti na Autonomní dohodu, kterou jsme dali [SLO.getname], se $RUT_augustin_voloshyn$ dotázal na možnost, aby jeho region měl podobnou federaci s námi. To se zdá absurdní, ale vzhledem k okolnostem musíme tyto požadavky brát vážně."
 MUN_czech.1039.a: "Uvidíme, jak to půjde"
 MUN_czech.1040.t: "[CZE.getname] nám nabízí smlouvu o celní unii"
 MUN_czech.1040.d: "[CZE.getnameDEFCAP] znovu otevřel diplomatická jednání o celní unii mezi našimi státy. Nabízená dohoda se zdá fér, ale později může obsahovat další požadavky, na které nemusíme být připraveni. Tato smlouva a to, co se vyměňuje, se zdá být symbolické, takže podpisu by nemělo nic bránit."
 MUN_czech.1040.a: "Zdá se neškodné"
 MUN_czech.1040.b: "Tomu nelze věřit"
 MUN_czech.1041.t: "[FROM.getname] odmítá dohodu o celní unii"
 MUN_czech.1041.d: "S odkazem na obavy, jak by tato smlouva mohla narušit jejich ekonomiku, [From.getname] odmítl podepsat celní unii mezi našimi dvěma státy. Tyto důvody se nám jeví jako bezpředmětné výmluvy."
 MUN_czech.1041.a: "Zklamání"
 MUN_czech.1042.t: "[FROM.getname] souhlasí s dohodou o celní unii"
 MUN_czech.1042.d: "Vidouce, že smlouva je uspokojivá, [FROM.getname] s jejími podmínkami souhlasil. Doufejme, že je to první krok k bližším vztahům mezi našimi národy."
 MUN_czech.1042.a: "Výborně"
 MUN_czech.1043.t: "[FROM.getname] požaduje, abychom se připojili k jejich federaci"
 MUN_czech.1043.d: "S odkazem na bližší vztahy mezi našimi národy a nedávné události ve světě řekl [FROM.getname], že by bylo lépe pod jejich ochranou než osamoceni. To se zdá být záminkou k obsazení našeho území. Co máme dělat?"
 MUN_czech.1043.a: "Přijímáme"
 MUN_czech.1043.b: "Hrozný nápad"
 MUN_czech.1044.t: "[FROM.getname] odmítá připojení k federaci"
 MUN_czech.1044.d: "Vidouce, že jim bude lépe samostatně než pod námi, [FROM.getname] odmítl možnost připojit se k naší federaci. Je to rána našemu cíli posílit postavení v Evropě. Co dělat dál, když [FROM.getname] neotočí rozumem?"
 MUN_czech.1044.a: "To je škoda"
 MUN_czech.1044.b: "Budeme muset zkusit jiné prostředky"
 MUN_czech.1045.t: "[FROM.getname] souhlasí s připojením k federaci"
 MUN_czech.1045.d: "Vidouce, že by byli lépe chráněni pod námi než sami za sebe, [FROM.getname] moudře vstoupil do naší federace. To výrazně posílí naši pozici v Evropě."
 MUN_czech.1045.a: "Výborně"
 MUN_czech.1046.t: "Hojení rozdělení"
 MUN_czech.1046.d: "Po vyřešení mnoha problémů v naší zemi se napětí zdá mírnit. Po dokončení řady ekonomických a sociálních programů se naše země začíná hojit."
 MUN_czech.1046.a: "Skvělá zpráva"
 MUN_czech.1048.t: "[FROM.GetName] přijímá požadavky"
 MUN_czech.1048.t2: "[FROM.GetName] souhlasí s návrhem"
 MUN_czech.1048.d: "S neochotou nám úředníci [FROM.GetAdjective] oznámili, že hodlají ustoupit našim teritoriálním požadavkům. Již dochází k odklonu [FROM.GetAdjective] jednotek z území."
 MUN_czech.1048.d2: "Po dlouhých diskusích se naši úředníci a představitelé [FROM.GetNameDef] dohodli na nové roli [FROM.GetAdjective] ekonomiky jako součásti naší unie. Toto uspořádání jistě přinese prosperitu oběma našim občanům."
 MUN_czech.1048.d3: "Náš návrh paktu o neútočení byl přijat s nadšením zástupci [FROM.GetAdjective] – zdá se, že jejich ambice jsou momentálně zaměřeny jinde."
 MUN_czech.1048.d4: "Nacházejíce se pod vážnou hrozbou, [FROM.GetNameDef] ustoupil našim požadavkům na sblížení."
 MUN_czech.1048.d5: "Po dlouhých diskusích se naši úředníci a představitelé [FROM.GetNameDef] dohodli, že část naší vojenské průmyslové základny bude věnována výrobě vybavení pro ně. Na oplátku obdržíme obchodní zboží pro naše trhy a výrobu."
 MUN_czech.1049.d: "Nová vláda [FROM.GetNameDef] nás oslovila s návrhem aliance. Navzdory počátečnímu antiněmeckému postoji jejich nové vojenské vlády se zdá, že byli pragmatičtí a uznali, že jejich starší mezinárodní partneři jsou nespolehliví."
 MUN_czech.1050.d: "Naši diplomaté se vrátili z [FROM.GetNameDef] se zklamáním, že naše žádost o vstup do jejich aliance byla odmítnuta. Důvody jsou nejasné, a nyní jsme v nepříjemné situaci, kdy jsme odhalili naši nedůvěru k tradičním společníkům, aniž bychom získali nového."
 MUN_czech.1050.a: "Pak bychom jim měli nabídnout výhodnější podmínky"
 MUN_czech.1050.b: "Hledejme lepší spojence"
 MUN_czech.1051.t: "[FROM.GetName] žádá sféru vlivu"
 MUN_czech.1051.d: "Náš nový spojenec, [FROM.GetNameDef], vyjádřil zájem rozšířit svůj vliv za hranice. V důsledku toho přišli zástupci [FROM.GetAdjective] žádat o povolení a podporu pro toto rozšíření, kde má být jasně vymezena hranice mezi oblastmi pod vlivem [ROOT.GetAdjective] a [FROM.GetAdjective]."
 MUN_czech.1051.a: "Měli bychom posílit našeho klíčového [FROM.GetAdjective] spojence"
 MUN_czech.1052.t: "[FROM.GetName] žádá, abychom povolili přesun [SOV.GetAdjective] jednotek"
 MUN_czech.1052.d: "Po nové diplomatické dohodě mezi [FROM.GetNameDef] a [SOV.GetNameDef] se [FROM.GetNameDef] cítí jistý, že by je [SOV.GetNameDef] v případě konfliktu ochránil. Jedinou překážkou je chybějící pozemní spojení mezi oběma, a proto nás [FROM.GetAdjective] diplomaté žádají, abychom povolili průjezd [SOV.GetAdjective] jednotek naším územím do [FROM.GetNameDef], pokud konflikt nastane."
 MUN_czech.1052.a: "Jejich boj nás také ochrání"
 MUN_czech.1053.t: "[FROM.GetName] na nás tlačí s [HUN.GetAdjective] nároky"
 MUN_czech.1053.d: "Po proměně [HUN.GetNameDef] na klientský stát nyní [FROM.GetNameDef] požaduje, abychom přijali stejný osud. Hrozí, že pokud odmítneme, podpoří maďarské nároky na [ROM.GetAdjective] území. Nyní musíme zvolit mezi ztrátou suverenity nebo potenciálním ohrožením naší územní integrity."
 CZE_cancel_anti_hungary_focus_tt: "Zruší zaměření §Y$CZE_neutralize_the_hungarian_threat$§!"
 MUN_czech.1054.t: "Společná invaze do [LIT.GetName]?"
 MUN_czech.1054.d: "Jak bylo dříve dohodnuto, [FROM.GetNameDef] přišel s návrhem, který by posílil náš stát. Konkrétně násilnou unifikací s [LIT.GetNameDef], což by nám zajistilo přístup k dodatečným zdrojům a znemožnilo nepříteli zaútočit přes [LIT.GetNameDef]."
 MUN_czech.1054.a: "Musíme se rozšířit, abychom čelili expanzi jiných"
 MUN_czech.1055.t: "Přicházejí [SOV.GetAdjective] dobrovolníci"
 MUN_czech.1055.d: "V bezprecedentním výkonu letecké logistiky použil [SOV.GetNameDef] své letectvo k nasazení několika divizí dobrovolníků na naše letiště v [73.GetName], aby podpořili náš současný válečný úsilí."
 MUN_the_fall_of_the_republic.1.t: "Široké vypuknutí protestů"
 MUN_the_fall_of_the_republic.1.d: "Nedávné rozhodnutí [ROOT.GetLeader] vzdát se Sudet vedlo k vypuknutí protestů po celé zemi. Zatímco politické a vojenské vedení se snažilo vyhnout krveprolití v tom, co považovali za beznadějný odpor proti přesile, mnozí v zemi cítili, že učinili chybu. Některé politické hnutí nyní využívají chaosu k prosazení svých cílů."
 MUN_the_fall_of_the_republic.1.a: "Neměli jsme na výběr!"
 MUN_the_fall_of_the_republic.2.t.1: "Pád První republiky"
 MUN_the_fall_of_the_republic.2.t.2: "Chaos ve vládě"
 MUN_the_fall_of_the_republic.2.d: "V důsledku rozhodnutí vlády o odstoupení Sudet došlo k vlně rezignací nižších činitelů v armádě a vládě. Někteří z těchto lidí údajně přes noc uprchli ze země. Je třeba zásadních změn ve vládě, aby se zabránilo odlivu úředníků a obnovila se důvěra v naše vedení."
 MUN_the_fall_of_the_republic.2.a: "Potřebujeme radikální změny."
 MUN_the_fall_of_the_republic.2.b: "Musíme zůstat na kurzu!"
 MUN_the_fall_of_the_republic.3.t: "[RUT.getname] žádá o autonomii"
 MUN_the_fall_of_the_republic.3.d: "S nedávným politickým chaosem, který postihl naši zemi, si malý region Podkarpatské Rusi přeje větší autonomii od [9.GetCapitalVictoryPointName]. Odvolávají se na dlouhotrvající rozdíly mezi regionem a zbytkem [ROOT.getname]. Nicméně tento požadavek vypadá jako místní vůdci využívající příležitosti k získání moci. Odmítnutí by stálo hodně politického kapitálu v době, kdy žádný nemáme."
 MUN_the_fall_of_the_republic.3.a: "Jistě, proč ne?"
 MUN_the_fall_of_the_republic.3.b: "Zcela rozhodně ne!"
 MUN_the_fall_of_the_republic.3.c: "Pustíme je."
 MUN_the_fall_of_the_republic.4.t: "Osud [RUT.getname]"
 MUN_the_fall_of_the_republic.4.d: "V následcích nedávného chaosu, který postihl [CZE.getname], malý region [RUT.getname] zůstal mimo hranice jakéhokoli státu. Region prohlásil nezávislost a navazuje diplomatické styky se sousedy. Mnozí ve vládě se obávají, že takto strategicky důležitý region na naší hranici padne do rukou někoho jiného. Armáda navrhuje vydat odtrženému regionu ultimátum s okamžitou anexí."
 MUN_the_fall_of_the_republic.4.a: "Pošleme jim ultimátum hned!"
 MUN_the_fall_of_the_republic.4.b: "To může být riskantní, počkejme."
 MUN_the_fall_of_the_republic.5.t: "[FROM.getname] požaduje naši anexi!"
 MUN_the_fall_of_the_republic.5.d: "Po naší nezávislosti byla jen otázka času, než některý sousední stát bude usilovat o začlenění našeho území. [FROM.getname] je první, kdo požaduje naše kapitulaci. Co máme udělat?"
 MUN_the_fall_of_the_republic.5.a: "Budeme bojovat do posledního muže!"
 MUN_the_fall_of_the_republic.5.b: "Nemáme na vybranou, řekneme ano."
 MUN_the_fall_of_the_republic.6.t: "[FROM.getname] odmítá naše ultimátum!"
 MUN_the_fall_of_the_republic.6.d: "V překvapivém kroku [FROM.getname] odmítl naše ultimátum a místo toho se rozhodl bránit ozbrojeně. Nedali nám jinou možnost než je napadnout. Plány bitev a směry útoku jsou již připraveny; stačí vydat rozkaz k útoku."
 MUN_the_fall_of_the_republic.6.a: "Varovali jsme je."
 MUN_the_fall_of_the_republic.6.a_tt: "Tato operace neovlivní §Y$HUN_pal_teleki$§!, pokud [RUT.GetNameDef] nemá spojence"
 MUN_the_fall_of_the_republic.6.b: "To se může vymstít, raději počkejme."
 MUN_the_fall_of_the_republic.7.t: "[FROM.getname] ustupuje našim požadavkům"
 MUN_the_fall_of_the_republic.7.d: "K našemu očekávání [FROM.getname] přijal naše požadavky a je ochoten být anektován výměnou za několik triviálních podmínek. Malý region neměl šanci odolat národu tak mocnému jako my. Naše severní hranice je nyní lépe chráněna a vláda je spokojená s snadným vítězstvím."
 MUN_the_fall_of_the_republic.7.a: "Výborná zpráva."
 MUN_czech_bop.1.t: "Připravenost armády"
 MUN_czech_bop.1.d: "Reformy první poloviny desetiletí začínají přinášet ovoce. Armáda je v současnosti jednou z nejmodernějších v Evropě. Nicméně mezi některými politiky a vedením velkých průmyslových konglomerátů se začíná projevovat pocit samolibosti. Pokud má armáda zůstat v špičkové připravenosti, musíme bojovat proti možným pochybnostem o její schopnosti a těm, kteří ji snaží podkopávat ve vlastním zájmu."
 MUN_czech_bop.1.a: "Budeme připraveni."
 MUN_czech_bop.2.t.1: "Hrozba německé zbrojení"
 MUN_czech_bop.2.t.2: "Rozšiřování armád sousedních zemí"
 MUN_czech_bop.2.d.1: "Nedávná remilitarizace Porýní [GER.getnameDEFcap] vyděsila některé naše vojenské a politické představitele. I když mnozí věří v aliance, které země uzavřela, a v přípravy armády čelit možné německé hrozbě, někteří nejsou přesvědčeni, že dokážeme odolat jakékoli [GER.GetAdjective] hrozbě."
 MUN_czech_bop.2.d.2: "Nedávné zprávy o tom, že někteří naši sousedé zahájili programy výrazného rozšíření svých armád, vyděsily některé naše vojenské a politické představitele. Mnozí věří v aliance, které země uzavřela, a v přípravy armády čelit možné vnější hrozbě. Někteří však nejsou přesvědčeni, že dokážeme odolat případné agresi."
 MUN_czech_bop.2.a: "Budeme připraveni."
 MUN_czech_bop.2.a_tt: "Zbrojní snahy našich sousedů způsobily, že někteří v armádě pochybují o naší schopnosti odolat možné agresi. Musíme armádu uklidnit našimi kroky."
 MUN_czech_bop.3.t: "[CZE.getname] poslalo pozorovatele do naší země"
 MUN_czech_bop.3.d: "[CZE.getname] nedávno poslal do naší země pozorovatele, aby sledovali probíhající konflikt. Současně nás kontaktoval jeden z jejich výrobců malých zbraní, zda bychom měli zájem zbraně nakoupit. To by zahrnovalo pašování zbraní kvůli omezením uloženým nám."
 MUN_czech_bop.3.a: "Uvidíme, kam to povede."
 MUN_czech_bop.3.b: "Nesmíme jim dovolit jen pozorovat."
 MUN_czech_bop_3_tt: "§Y[CZE.getname]§! výrobce zbraní §Y$CZE_zbrojovka_brno_organization$§! se může pokusit propašovat zbraně k nám."
 MUN_czech_bop.4.t: "Plán $CZE_zbrojovka_brno_organization$"
 MUN_czech_bop.4.d: "[ETH.getname] navázal kontakt se zástupci zbrojovky $CZE_zbrojovka_brno_organization$ a má zájem propašovat naše zbraně do země. Navzdory sankcím Společnosti národů proti [ETH.GetNameDef] je $CZE_zbrojovka_brno_organization$ ochotna tento plán uskutečnit. Porušení mandátu Společnosti národů by bylo mezinárodně nepopulární, pokud bychom byli odhaleni."
 MUN_czech_bop.4.a: "Pusťme se do toho"
 MUN_czech_bop.4.b: "Nestojí to za možné následky"
 CZE_gun_smuggling_tt: "Pašování zbraní do země"
 CZE_we_got_caught_tt: "§Y$CZE_zbrojovka_brno_organization$§! byla odhalena."
 CZE_we_dont_get_caught_tt: "§Y$CZE_zbrojovka_brno_organization$§! nebyla odhalena."
 MUN_czech_bop.5.t: "$CZE_zbrojovka_brno_organization$ souhlasí s pašovacím plánem"
 MUN_czech_bop.5.d: "Po jednání se zástupci české vlády dostala $CZE_zbrojovka_brno_organization$ tajné svolení k zahájení pašování malé dodávky malých zbraní do země. Jejich expertíza bude také k dispozici skrze naše zadní kanály."
 MUN_czech_bop.5.a: "Dobrého využijeme."
 MUN_czech_bop_5_tt: "Tento §YVýrobce§! bude §Rodebrán§! po skončení války."
 MUN_slovakia_little_war.1.t: "Vítězství v [71.Getname]"
 MUN_slovakia_little_war.1.d: "Naše armáda se v [71.Getname] ukázala v dobrém světle porážkou nepřátelských sil v oblasti. Naši velitelé si z bitvy odnesli neocenitelné zkušenosti, které mohou využít dále."
 MUN_slovakia_little_war.1.a: "Výborná práce."
 MUN_slovakia_little_war.2.t: "Porážka v [71.Getname]"
 MUN_slovakia_little_war.2.d: "Navzdory našemu snažení byly naše jednotky v [71.Getname] poraženy. Nedostatek munice a motorizační techniky včas byl klíčovým faktorem naší ztráty. Přes toto selhání si velitelé zapojení do bitvy odnesli důležité poznatky."
 MUN_slovakia_little_war.2.a: "Zklamání z výkonu."
 MUN_slovakia_little_war.3.t: "Hraniční střety v [71.Getname]"
 MUN_slovakia_little_war.3.d: "I po získání území v důsledku $GER_first_vienna_award$ [HUN.getnamedef] stále usiluje o další úpravy hranic s námi v oblasti [71.getname]. Musíme tomuto výzvě čelit silou, abychom ukázali, že naši zemi nevzdáme bez boje."
 MUN_slovakia_little_war.3.a: "Jak se opovažují!"
 MUN_slovakia_little_war.4.t: "Patová situace v [71.Getname]"
 MUN_slovakia_little_war.4.d: "Navzdory našim snahám se našim silám nepodařilo vyhrát střet v [71.Getname]. Nedostatek munice a motorizační techniky včas byl klíčovým faktorem. Přes toto zklamání si zapojení velitelé odnesli důležitá ponaučení."
 MUN_slovakia_little_war.4.a: "Zklamání."
 MUN_czech.news.1.t: "Sudetská krize"
 MUN_czech.news.1.desc: "Lidé v Sudetech zahájili ozbrojené povstání proti [CZE.getnameDef]. Došly k nám zprávy, že paramilitární skupiny napadají policejní stanice a vládní budovy po celém regionu. To bylo vyvoláno nedávnými zprávami, že [FROM.getname] usiluje o anektování regionu.\n\nTyto povstání se zdají být předzvěstí většího konfliktu mezi [FROM.getname] a [CZE.GetNameDef]. Konflikt, který se nyní jeví nevyhnutelným."
 MUN_czech.news.1.a: "To Evropě nesvědčí."
 MUN_czech.news.1.b: "Chaos je žebřík."
 MUN_czech.news.1.c: "Zvítězíme!"
 MUN_czech.news.1.d: "Doufejme, že převládne diplomacie."
 MUN_czech.news.2.t: "[FROM.GetNameDefCap] invaduje [RUT.GetNameDef]"
 MUN_czech.news.2.desc: "\nV rámci nedávného řetězce událostí, které následovaly po politickém chaosu v [CZE.getname], malý region [RUT.getname] zůstal mimo hranice jakéhokoli státu. Tento odtržený stát poté prohlásil nezávislost a začal vytvářet milice na ochranu svého nového státního postavení.\n\n[FROM.getnamedefcap] měl dlouhodobé nároky na tento region a využil příležitosti k rychlé invazi do malého odtrženého státu. Jejich vítězství nad [RUT.getname] mnozí pozorovatelé považují za předem dané."
 MUN_czech.news.2.a: "Karpatská co?"
 MUN_czech.news.2.b: "To bude snadné."
 MUN_czech.news.2.c: "Přijďte, když se odvážíte!"
 MUN_slovakia.news.1.t: "Hraniční střety v [71.Getname]"
 MUN_slovakia.news.1.desc: "Přestože jsme po $GER_first_vienna_award$ získali zpět [664.Getname], [HUN.getnamedef] stále usiluje o další úpravy hranic s [SLO.getnamedef] v oblasti [71.Getname].\n\nTento konflikt vypadá jako záminka pro [HUN.getnamedef] otestovat sílu své armády proti slabšímu protivníkovi. Mladá armáda [SLO.getnamedef] možná není připravena na tuto výzvu."
 MUN_slovakia.news.1.a: "Hádející si děti."
 MUN_slovakia.news.1.b: "Jsme připraveni na úkol."
