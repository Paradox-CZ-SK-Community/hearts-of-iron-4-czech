l_polish:
 MUN_czech_skoda_priority.t: "Škodovy závody"
 MUN_czech_skoda_priority.d: "Společnost Škodovy závody vyrábí širokou škálu produktů, od dělostřelectva po tanky, vlaky a námořní děla. To přináší velkou pružnost při přesouvání zdrojů tam, kde je nejvyšší poptávka, což nyní můžeme částečně řídit."
 MUN_czech_skoda_priority.1.a: "Zajímavé"
 MUN_czech.2.t.1: "Sudetské polovojenské jednotky žádají o pomoc"
 MUN_czech.2.t.2: "Sudetský Freikorps žádá o pomoc"
 MUN_czech.2.t.3: "Sudetské dělnické milice žádají o pomoc"
 MUN_czech.2.d.1: "Ve světle nedávných zpráv o našich záměrech vůči [CZE.GetName] mnoho sudetských politických stran rychle vytvořilo polovojenské jednotky po celém regionu v naději, že podkopou [CZE.GetAdjective] vládu. Nyní žádají naši podporu při přeshraničních nájezdech a sabotážích, aby pomohly našemu úsilí proti [CZE.GetName]."
 MUN_czech.2.d.2: "Ve světle nedávných zpráv o našich záměrech vůči [CZE.GetName] sudetské politické strany rychle zmobilizovaly svou polovojenskou organizaci: Freikorps. Jednotky po celých Sudetech vytvořily oddíly a začaly útočit na [CZE.GetAdjective] vládní majetek v Sudetech. Nyní žádají naši plnou podporu při přeshraničních nájezdech a sabotážích proti [CZE.GetName]."
 MUN_czech.2.d.3: "Ve světle nedávných zpráv o našich záměrech vůči [CZE.GetName] místní komunistické strany rychle zmobilizovaly dělnické milice. Tyto milice začaly útočit na [CZE.GetAdjective] vládní majetek v regionu. Nyní žádají naši plnou podporu při přeshraničních nájezdech a sabotážích proti [CZE.GetName] a dalším kontrarevolucionářům."
 MUN_czech.2.a: "Samozřejmě jim pomůžeme"
 MUN_czech.2.b: "Možná bude lepší je dále neposilovat"
 MUN_czech.3.t: "Partyzánská činnost v Sudetech"
 MUN_czech.3.d: "V důsledku nedávného zájmu [FROM.GetName] o anexi Sudet začaly proti nám působit polovojenské jednotky. Začaly útočit na vládní budovy a podkopávají naši obranu v několika oblastech. Pokud chceme zlepšit naši vojenskou situaci v oblasti, musíme se s těmito skupinami vypořádat."
 MUN_czech.3.a: "Jak by to ještě mohlo být horší?"
 MUN_czech.4.t: "Krize důvěry"
 MUN_czech.4.d: "Nedávné zprávy o vojenské agresi proti nám otřásly vládou až do základů. [CZE.GetLeader] ztratil víru ve schopnost své vlády vést zemi touto krizí. Požadoval, aby $CZE_jan_syrovy$ převzal velení situace a vedl zemi. $CZE_jan_syrovy$ uvedl, že se vedení zdráhá ujmout, avšak [CZE.GetLeader] mu sdělil, že nemá jinou možnost než převzít velení a provést nás touto krizí."
 MUN_czech.4.a: "Potřebujeme vás více než kdy jindy."
 MUN_czech.4.b: "Nesmíme ztratit hlavu."
 MUN_czech.5.t: "Tomáš Masaryk zemřel"
 MUN_czech.5.d: "Masaryk byl po více než dvě desetiletí stabilizující postavou československé politiky. Když se zdálo nemožné vytvářet koalice a politické patové situace byly nepřekonatelné, Masaryk znovu a znovu dokázal vykonat politické zázraky, které pomáhaly posilovat a rozvíjet Československo do dnešní podoby. Jeho přítomnost bude velmi postrádána a pocítí ji celý národ."
 MUN_czech.5.a: "Nenahraditelný politický velikán."
 MUN_czech.7.t: "Přehodnocení závazků vůči [CZE.GetNameDef]"
 MUN_czech.7.d: "Nedávno k nám dorazily zprávy, že [GER.GetNameDef] si přeje anektovat Sudety a je ochotno kvůli tomu jít do války s [CZE.GetNameDef]. V současnosti máme s [CZE.GetNameDef] obrannou dohodu, což znamená, že pokud vstoupí do války s [GER.GetNameDef], budeme povinni jim přijít na pomoc. Pokud se chceme tomuto výsledku vyhnout, musíme z našich obranných dohod s [CZE.GetNameDef] okamžitě vystoupit."
 MUN_czech.7.a: "Stojíme při našich přátelích"
 MUN_czech.7.b: "[GER.GetNameDef] nás taky projede"
 MUN_czech.1001.t: "[FROM.GetNameDefCap] požaduje koridor pro [SOV.GetNameDef]"
 MUN_czech.1001.d: "Ve snaze koordinovat vojenské akce se [SOV.GetNameDef] požaduje [FROM.GetNameDef], abychom jim postoupili pohraniční oblasti [89.GetName] a [91.GetName]."
 MUN_czech.1002.t: "[FROM.GetNameDefCap] požaduje vliv nad Jugoslávskou obrannou ligou"
 MUN_czech.1002.d: "Po expanzi na jih přišlo [FROM.GetName] s neobvyklým požadavkem. Nepožaduje zabrání území, ale kontrolu nad Jugoslávskou obrannou ligou a postavení ochránce a suzeréna severobalkánských zemí, které jsou nyní našimi subjekty. Tvrdí, že by byli schopnějším ochráncem než my, ale to může být jen záminka."
 MUN_czech.1002.a: "Možná mají pravdu"
 MUN_czech.1002.b: "Ne, jsou pod naší ochranou!"
 MUN_czech.1003.t: "[FROM.GetName] odmítá požadavky"
 MUN_czech.1003.d: "Navzdory přesvědčivým argumentům našich diplomatů [FROM.GetNameDef] odmítlo ustoupit našim požadavkům."
 MUN_czech.1003.a: "Nenechávají nám jinou možnost"
 MUN_czech.1004.t: "[FROM.GetName] postupuje proti Maďarsku"
 MUN_czech.1004.d: "Do [ROOT.Capital.GetCapitalVictoryPointName] dorazily zprávy o [FROM.GetAdjective] jednotkách postupujících k [HUN.GetAdjective] hranici. Ačkoli se na nás [HUN.GetAdjective] zástupci nepochybně brzy obrátí, měli bychom si už nyní ujasnit, zda pomoci [HUN.GetNameDef] a získat možného spojence, nebo zda nechat [FROM.GetNameDef] pokračovat v jeho současných plánech."
 MUN_czech.1004.a: "Musíme chránit své zájmy"
 MUN_czech.1004.b: "Držme se stranou"
 MUN_czech.1005.t: "[FROM.GetName] požaduje pobřežní území"
 MUN_czech.1005.d: "Jak [FROM.GetNameDef] postupně rozšiřuje svou říši, přišli nyní jeho zástupci požadovat, abychom jim postoupili území, které kdysi vlastnila [FROM.GetAdjective] šlechta. Tvrdí, že by jim to poskytlo možný přístup k Jadranu, zjevně se však příliš nezajímají o náš názor."
 MUN_czech.1006.t: "[FROM.GetName] navrhuje partnerství"
 MUN_czech.1006.d: "[FROM.GetNameDef] nás oslovilo s návrhem smlouvy o vzájemné obraně, která má odradit případné útočníky spojenou silou našich armád. Zajímavé však je, že smlouva obsahuje i tajnou část, kde je nastíněno možné rozšíření [ROOT.GetAdjective] vlivu a jak by s tím [FROM.GetNameDef] mohlo pomoci."
 MUN_czech.1007.t: "[FROM.GetName] požaduje sblížení"
 MUN_czech.1007.d: "Nedůvěra mezi námi a [FROM.GetNameDef] od doby jejich vzniku vedla k tomu, že nyní požadují naše sblížení, jinak riskujeme invazi. Zajímavé však je, že [FROM.GetNameDef] se zároveň odvolává na naše územní ambice a slibuje, že pokud přestaneme uplatňovat nároky na jejich území, pomůže nám získat jiná území, která si nárokujeme."
 MUN_czech.1007.b: "Musíme si zachovat svrchovanost!"
 MUN_czech.1008.t: "[FROM.GetName] navrhuje spojenectví s [CZE_invited_country.GetName]"
 MUN_czech.1008.d: "Zástupci [FROM.GetNameDef], našeho mostu do střední Evropy, navrhli rozšíření našeho spojenectví pozváním [CZE_invited_country.GetName]."
 MUN_czech.1008.a: "Další odstrašení proti útoku na nás"
 MUN_czech.1008.b: "Nemůžeme být nuceni bránit celou Evropu"
 MUN_czech.1009.t: "[FROM.GetName] nás zve do [CZE.GetFactionName]"
 MUN_czech.1009.d: "Diplomaté z [FROM.GetNameDef] nám sdělili, že bychom byli v jejich alianci vítáni. V minulosti však byly naše územní nároky sporným bodem vztahů s [FROM.GetNameDef]. Nyní se musíme rozhodnout, zda na těchto nárocích nadále trvat, nebo se zaměřit na přátelštější vztahy."
 MUN_czech.1009.a: "Na našeho nového spojence!"
 MUN_czech.1009.b: "Připojíme se, až budou naše nároky uznány"
 MUN_czech.1009.c: "Nemáme zájem"
 MUN_czech.1010.t: "[FROM.GetName] nás zve do čela [CZE.GetFactionName]"
 MUN_czech.1010.d: "Poté, co se [FROM.GetNameDef] nedávno pokusilo proměnit dohody Malé dohody ve skutečnou alianci, přišlo s návrhem: chtějí, abychom vedli tuto novou frakci. Vzdali by se vedení a výměnou by získali cenného ochránce v naší osobě. Dohoda by rozšířila naši sféru vlivu, avšak potenciálně i o země, které jsou ohroženy."
 MUN_czech.1010.a: "Budou cennými spojenci"
 MUN_czech.1010.b: "Chránit [ROOT.GetNameDef] nám stačí"
 MUN_czech.1011.t: "[FROM.GetName] navrhuje ochrannou dohodu"
 MUN_czech.1011.d: "V rámci snahy odradit jakoukoli agresi vůči [FROM.GetNameDef] nás jejich diplomaté oslovili s návrhem smlouvy o vzájemné obraně. Na oplátku za naši podporu by nám nabídli stejnou ochranu a přinutili by každého agresora bojovat na dvou frontách."
 MUN_czech.1011.a: "Stojí to za riziko"
 MUN_czech.1011.b: "Neutralita je bezpečnější"
 MUN_czech.1012.t: "[FROM.GetName] požaduje naše podrobení"
 MUN_czech.1012.d: "Povzbuzeni nově vytvořenou aliancí dorazili zástupci [FROM.GetNameDef] s řadou požadavků, které by znamenaly ztrátu naší svrchovanosti. S podporou [SOV.GetName], které má o region zájem, se nyní musíme rozhodnout, zda si můžeme dovolit odmítnout."
 MUN_czech.1012.a: "Odpor by stál [ROOT.GetAdjective] životy"
 MUN_czech.1012.b: "Smrt před hanbou!"
 MUN_czech.1013.t: "[FROM.GetName] nabízí podmíněnou alianci"
 MUN_czech.1013.d: "Po pečlivém zvážení vláda [FROM.GetNameDef] oznámila, že sdílí názor, že aliance by byla výhodná, avšak zároveň uvedla, že nemůže přehlédnout své územní nároky. Proto přišla s návrhem: vstoupí do naší frakce, ale pouze pokud jim postoupíme území, které požadují."
 MUN_czech.1013.a: "Oběť, kterou stojí za to přinést"
 MUN_czech.1013.b: "Snažíme se chránit své území!"
 MUN_czech.1014.t: "[FROM.GetName] žádá ochranu"
 MUN_czech.1014.d: "Vlivní diplomaté z [FROM.GetNameDef] oslovili ministra zahraničí se žádostí, abychom upevnili neurčité sliby ochrany obsažené v československo-sovětské smlouvě z roku 1935."
 MUN_czech.1014.a: "Možná bychom měli zkusit ochránit našeho spojence"
 MUN_czech.1014.b: "Zůstaňme jen u neurčitých slibů"
 MUN_czech.1015.t: "[FROM.GetName] navrhuje sloučení našich frakcí"
 MUN_czech.1015.d: "Protože nyní máme stejné nepřátele, přišlo [FROM.GetName] s návrhem prohloubit spolupráci začleněním jejich frakce do té naší."
 MUN_czech.1015.a: "Koordinované úsilí zachrání životy"
 MUN_czech.1015.b: "Musíme mít vše pod kontrolou"
 MUN_czech.1016.t: "[FROM.GetName] navrhuje pakt o neútočení"
 MUN_czech.1016.d: "V návaznosti na dřívější rozhovory, které byly zrušeny po změně zahraničněpolitických plánů, navrhlo [FROM.GetNameDef] pokračovat v jednáních o paktu o neútočení."
 MUN_czech.1016.a: "O jednu hranici méně k obraně"
 MUN_czech.1016.b: "To bude překážet našim ambicím"
 MUN_czech.1017.t: "Společná invaze do [GER.GetNameDef]?"
 MUN_czech.1017.d: "[FROM.GetNameDef] oslovilo vrcholné představitele [ROOT.GetAdjective] s tajnými plány na invazi do [GER.GetNameDef]. Poté, co ukázali, jak odhodlaně chtějí odstranit [GER.GetAdjective] hrozbu, požádali nás o pomoc, abychom společně přemohli mocnou [GER.GetAdjective] armádu."
 MUN_czech.1017.a: "Udeříme s nimi na [GER.GetNameDef]"
 MUN_czech.1017.b: "To je příliš nebezpečné"
 MUN_czech.1018.t: "Bojovat sami proti [GER.GetNameDef]?"
 MUN_czech.1018.t.2: "Společná invaze do [GER.GetNameDef]"
 MUN_czech.1018.d: "Navzdory našemu nejlepšímu diplomatickému úsilí se nám nepodařilo získat žádnou zahraniční podporu pro preventivní invazi do [GER.GetName]. Otázkou nyní je, zda v našich útočných plánech vůbec pokračovat."
 MUN_czech.1018.d.FRA_POL: "Dorazily skvělé zprávy od [FRA.GetNameDef] i [POL.GetNameDef]; naši diplomaté hlásí, že obě země se zavázaly podpořit nás při invazi do [GER.GetNameDef]."
 MUN_czech.1018.d.FRA: "Naši diplomaté se vrátili z [FRA.GetNameDef] se skvělou zprávou, že jsou ochotni zúčastnit se společné invaze do [GER.GetNameDef]. Nyní musíme posoudit, zda budou naše spojené síly dostačující."
 MUN_czech.1018.d.POL: "Naši diplomaté se vrátili z [POL.GetNameDef] se skvělou zprávou, že jsou ochotni zúčastnit se společné invaze do [GER.GetNameDef]. Nyní musíme posoudit, zda budou naše spojené síly dostačující."
 MUN_czech.1018.a: "Nikdy to neuvidí přicházet"
 MUN_czech.1018.b: "Při zpětném pohledu je to příliš riskantní"
 MUN_czech.1019.t: "[FROM.GetName] požaduje [762.GetName]"
 MUN_czech.1019.d: "S odvoláním na snahu obnovit dřívější české hranice a legitimizovat svou kontrolu nad [72.GetName] doručili [FROM.GetAdjective] zástupci ultimátum požadující, abychom postoupili [762.GetName]."
 MUN_czech.1019.a: "Možná nás to udrží v bezpečí"
 MUN_czech.1020.t: "[FROM.GetName] nabízí podmíněné investice"
 MUN_czech.1020.a: "Skvělá dohoda!"
 MUN_czech.1020.b: "Tyto podmínky jsou nepřijatelné"
 MUN_czech.1020.d: "Dorazili diplomaté z [FROM.GetNameDef] s návrhem dohody, podle níž by jejich země investovala do našeho průmyslu a infrastruktury výměnou za surovinovou dohodu. Tento krok, následující po neúspěšných investicích v předchozích letech, naznačuje obnovené úsilí o zlepšení našich vztahů."
 CZE_investment_effects_tt: "Za §Y100 dní§! získáme:\n§YInfrastrukturu§! ve §Y3§! náhodných státech.\n§YCivilní továrnu§! v §Y1§! náhodném státě.\n"
 MUN_czech.1021.t: "Návrat rakousko-uherské celní unie?"
 MUN_czech.1021.d: "[CZE.GetNameDefCap] nás oslovilo s návrhem obchodní dohody mezi bývalými zeměmi Rakouska-Uherska. Přestože jsou spokojeni se svou nezávislostí, nová [CZE.GetAdjective] vláda je zjevně velmi nakloněna obnově výhodných prvků rakousko-uherského soustátí."
 MUN_czech.1021.a: "Více obchodu zní lákavě"
 MUN_czech.1021.b: "Musíme chránit naše domácí výrobce"
 MUN_czech.1022.t: "[CZE.GetName] zabírá Slezsko"
 MUN_czech.1022.d: "Po tvrdých bojích v horách [69.GetName] se [CZE.GetAdjective] jednotkám podařilo prorazit a ovládnout celé Slezsko dříve, než se jednotky, s nimiž bojovaly, zotavily natolik, aby kladly vážný odpor."
 MUN_czech.1022.a: "Musíme zasáhnout"
 MUN_czech.1022.b: "Nemůžeme si vytvářet dalšího nepřítele"
 MUN_czech.1022.c: "Velké vítězství!"
 MUN_czech.1023.t: "[CZE.GetName] zahajuje boj o Slezsko"
 MUN_czech.1023.d: "S odvoláním na zastaralé argumenty o středověkých královstvích a říších vyostřilo [FROM.GetNameDef] pohraniční střety v omezenou válku ve snaze získat kontrolu nad [ROOT.GetAdjective] Slezskem."
 MUN_czech.1023.a: "Připravit vojska"
 MUN_czech.1024.t: "[CZE.GetName] navrhuje mírovou dohodu"
 MUN_czech.1024.d: "Poté, co se pohraniční střety ve Slezsku změnily v plnohodnotnou válku, dalo [FROM.GetNameDef] nyní najevo ochotu konflikt ukončit, pokud mu bude postoupeno území, které požaduje."
 MUN_czech.1024.a: "Možná bychom se měli zaměřit na jiné oblasti"
 MUN_czech.1024.b: "Situace je stále v náš prospěch"
 MUN_czech.1024.c: "O tom se nejedná!"
 MUN_czech.1025.t: "Konec španělské dobrovolnické mise"
 MUN_czech.1025.d.1: "[ROOT.GetAdjectiveCap] jednotky vyslané k [CZE_supported_spanish_faction.GetName] se vracejí domů poté, co jí pomohly dosáhnout vítězství. Boje přinesly našim vojákům nové poznatky, zejména jejich zdravotnickým oddílům."
 MUN_czech.1025.d.2: "Navzdory statečnému boji [ROOT.GetAdjective] sil ve španělské občanské válce byla strana, kterou jsme podporovali, nakonec poražena. Přesto se naši vojáci, a zejména jejich zdravotnické týmy, naučili cenné lekce."
 MUN_czech.1025.a: "Doufejme, že tyto poznatky nebudeme muset využít doma"
 MUN_czech.1026.t: "[FROM.GetName] odmítá návrh"
 MUN_czech.1026.a: "Jejich škoda"
 MUN_czech.1026.b: "Znepokojivý vývoj"
 MUN_czech.1026.france_refuses_to_lead: "Navzdory vedoucí úloze, která byla [FROM.GetAdjective] nabídnuta výměnou za vstup do naší aliance, se rozhodli ji nepřijmout. Zdá se, že se [FROM.GetAdjective] snaží zůstat neutrální, nebo jen získává čas."
 MUN_czech.1026.sphere_of_influence: "Ačkoli nás členové [FROM.GetAdjective] vlády ujistili, že si naší účasti ve [ROOT.GetFactionName] váží, uvedli, že rozšiřování našeho vlivu na Balkán by zašlo příliš daleko a mohlo by odradit potenciální spojence."
 MUN_czech.1026.guarantee: "Naši diplomaté hlásí, že navzdory svému úsilí [FROM.GetNameDef] nesouhlasilo s naším návrhem smlouvy o vzájemné obraně. Zdá se, že odhadují, že jsme ohroženi více než oni; doufejme, že se mýlí."
 MUN_czech.1026.faction_merge: "Navzdory našemu nejlepšímu úsilí se naši diplomaté a diplomaté [FROM.GetAdjective] nedokázali dohodnout na sjednocení [ROOT.GetFactionName] a [FROM.GetFactionName]."
 MUN_czech.1026.non_aggression: "Navzdory ujištěním o svých mírových úmyslech odmítli [FROM.GetAdjective] diplomaté podepsat s naší zemí pakt o neútočení. Proč tomu tak je, se teprve ukáže."
 MUN_czech.1026.trade_deal: "S odvoláním na snahu zůstat hospodářsky nezávislí odmítlo [FROM.GetNameDef] náš návrh obchodní dohody."
 MUN_czech.1026.faction_invite: "Ačkoli naši diplomaté vysvětlili, proč by [FROM.GetNameDef] profitovalo ze spojenectví s námi, nakonec se je nepodařilo získat na naši stranu."
 MUN_czech.1026.weapons_sale: "Navzdory naší štědré nabídce se [FROM.GetNameDef] v tuto chvíli rozhodlo od nás zbraně nekoupit."
 MUN_czech.1026.unification: "Navzdory uznání výhod, které by federace přinesla, se [FROM.GetNameDef] rozhodlo ponechat svou exilovou vládu jako jedinou legitimní vládu svých zemí."
 MUN_czech.1026.white_peace: "Naši zástupci se dnes vrátili se smutnou zprávou, že navzdory naší okupaci [66.GetName] není [FROM.GetAdjective] vedení ochotno podepsat mírovou smlouvu. Zdá se, že budeme muset buď pokračovat v dobývání, nebo doufat, že je vyčerpáme."
 MUN_czech.1027.t: "Uzavřít [FROM.GetAdjective]-[ROOT.GetAdjective] obchodní dohodu?"
 MUN_czech.1027.d: "Navzdory počátečním ideologickým rozdílům se [FROM.GetNameDef] obrátilo na náš pragmatismus a oslovilo nás s návrhem obchodní dohody. Výměnou za to, že [FROM.GetAdjective] bude smět těžit suroviny v [202.GetName], nám pomohou dodat obráběcí stroje, které tak zoufale potřebujeme k rozšíření našeho průmyslu."
 MUN_czech.1027.a: "Zatraceně dobrá dohoda."
 MUN_czech.1027.b: "Tyto zdroje jim musíme odepřít."
 MUN_czech.1028.t: "Zpožděné opevňovací práce"
 MUN_czech.1028.d: "Mnozí v zemi si nyní kladou otázku, proč vláda nepokračovala v opevňovacích projektech zahájených koncem minulého roku. Vláda vyčlenila prostředky na další stavbu pevností prostřednictvím Rady pro opevnění. Protože program nepřináší žádný pokrok, lidé požadují buď pokračování projektu, nebo vrácení prostředků. Pokud si přejeme v opevňovacích programech pokračovat, není času nazbyt a projekty musíme okamžitě znovu spustit, aby byly dokončeny včas."
 MUN_czech.1028.a: "Nemáme času nazbyt!"
 CZE_no_time_to_lose_tt: "Naše časové okno pro dokončení opevňovacích projektů před objevením se hrozby je nyní velmi úzké."
 MUN_czech.1029.t: "Opevňovací projekt byl dokončen"
 MUN_czech.1029.d: "Náš nejnovější opevňovací projekt byl dokončen a zdroje jsou k dispozici pro zahájení dalšího projektu. Naši inženýři jsou připraveni být okamžitě nasazeni na jiné místo a zahájit přípravné práce nové opevňovací linie."
 MUN_czech.1029.a: "Výborná práce, pánové"
 MUN_czech.1030.t: "[FROM.GetName] požaduje integraci"
 MUN_czech.1030.d: "[FROM.GetNameDefCap] požaduje, abychom se stali součástí jejich unie, kterou chtějí rozšířit. Různým zemím v regionu nabízejí různé důvody: panslavismus, panbalkanismus či společnou historii v Rakousku-Uhersku. Za touto nabídkou se však skrývá i jasná hrozba, pokud odmítneme."
 MUN_czech.1030.a: "Možná by to nemuselo být tak špatné"
 MUN_czech.1030.b: "Nepříliš přesvědčivé"
 MUN_czech.1031.t: "[FROM.GetName] navrhuje unii"
 MUN_czech.1031.d: "Ačkoli je [ROOT.GetNameDef] po kapitulaci, [FROM.GetAdjective] vláda přišla s drastickým návrhem, který by nám umožnil pokračovat v boji: sloučit zbytky našeho národa s jejich."
 MUN_czech.1031.a: "Společně lépe ochráníme své domovy"
 MUN_czech.1031.b: "Naše rozdíly jsou příliš velké"
 MUN_czech.1032.t: "Překlenutí rozdíly"
 CZE_divide_nation_title_dynamic_sudentenland: "$MUN_czech.1032.t$ v Sudetech"
 CZE_divide_nation_title_dynamic_czech_states: "$MUN_czech.1032.t$ s českými dělníky"
 CZE_divide_nation_title_dynamic_tesinko_poles: "$MUN_czech.1032.t$ v [72.GetName]"
 CZE_divide_nation_title_dynamic_slovakia_states: "$MUN_czech.1032.t$ na [SLO.GetNonIdeologyName]"
 CZE_divide_nation_title_dynamic_hungarian_states: "$MUN_czech.1032.t$ v [664.GetName]"
 CZE_divide_nation_title_dynamic_ukrainian_states: "$MUN_czech.1032.t$ v [73.GetName]"
 MUN_czech.1032.d: "Nedávné snahy vyřešit problémy v [FROM.GetName] úspěšně zmírnily hněv vůči ústřední vládě, alespoň prozatím. Zdroje naší vlády jsou nyní opět volné a mohou být využity na další sociální či hospodářské programy, které budou nadále řešit problémy rozdělující naši zemi."
 MUN_czech.1032.a: "Pusťme se do toho znovu"
 MUN_czech.1033.t: "[FROM.GetAdjectiveCap] exilová vláda žádá o uznání"
 MUN_czech.1033.d: "[FROM.GetAdjectiveCap] exilová vláda, kterou vede $CZE_edvard_benesh$, žádá, abychom přijali její delegaci, zatímco usiluje o obnovení svrchovanosti pro [CZE.GetNonIdeologyName]."
 MUN_czech.1033.a: "Další spojenec proti [GER.GetAdjective]ům"
 MUN_czech.1033.b: "Jsou nelegitimní"
 MUN_czech.1034.t: "Nepokoje na Slovensku"
 MUN_czech.1034.d: "Kvůli tomu, že jsme ustoupili nacionalistickým náladám jiných skupin, vytvořili členové Slovenské ľudové strany vlastní polovojenskou sílu, která nyní usiluje o nezávislost nebo alespoň autonomii Slovenska. Nyní stojíme před otázkou, zda se zaměřit na udržení zdání jednoty tím, že tomu zabráníme, nebo jí dosáhnout tím, že to umožníme a soustředíme se na území věrná vládě."
 MUN_czech.1034.a: "Pošlete armádu na Slovensko!"
 MUN_czech.1034.b: "Zatkněte je, ale poskytněte určitou autonomii"
 MUN_czech.1034.c: "Převezměte přímou kontrolu"
 MUN_czech.1034.c_tt: "§RBudeme vydáni napospas rozhodnutí [GER.GetNameDef] o osudu Československa.§!"
 MUN_czech.1035.t: "[FROM.GetName] nám nabízí výrobu zbraní"
 MUN_czech.1035.d: "Naše úzké partnerství s [CZE.GetNameDef] je přivedlo k jedinečné nabídce: za úplatu pro nás budou vyrábět zbraně, které nyní vyrábíme doma. To by nám umožnilo soustředit se na ostatní odvětví našeho průmyslu."
 MUN_czech.1035.a: "To znamená méně duplicitního úsilí"
 MUN_czech.1035.b: "Nemůžeme učinit naši armádu závislou na cizím vybavení"
 MUN_czech.1036.d: "Velká hospodářská krize naší zemi hospodářsky ani politicky nijak nepomohla. Sužuje nás mnoho regionálních ekonomických a politických problémů a zdá se, že se zhoršují i navzdory našemu zázračnému zotavení z krize. Musíme tyto potíže řešit dříve, než naši zemi rozdělí ještě více."
 MUN_czech.1036.a: "Musíme uzdravit naši zemi"
 CZE_divided_nation_event_onbroad_tt: "Odemkne §Yrozhodnutí§!, která nám umožní §Yodstranit§! negativní §Ymodifikátory států§! v našich domovských územích.\n\nDokončením těchto §Yrozhodnutí§! se také sníží negativní modifikátory §Y$CZE_a_divided_nation_dynamic_modifier$§! národního ducha, dokud nebude §Yodstraněn§!."
 MUN_czech.1037.t: "[GER.GetName] chrání [HUN.GetName]"
 MUN_czech.1037.d: "Poté, co si [GER.GetAdjective] zástupci všimli zjevného ospravedlňování války proti [HUN.GetNameDef] v naší zemi, dali jasně najevo, že válka proti [HUN.GetAdjective]ům by znamenala válku i s [GER.GetNameDef]. Zda nyní pokračovat, záleží jen na nás."
 MUN_czech.1037.a: "Naše plány musí být zrušeny"
 MUN_czech.1037.b: "To nic nemění"
 MUN_czech.1038.t.1: "[FROM.GetName] nabízí licenci na své tankové konstrukce"
 MUN_czech.1038.t.2: "[FROM.GetName] nabízí prodej pušek"
 MUN_czech.1038.t.3: "[FROM.GetName] nabízí prodej dělostřelectva"
 MUN_czech.1038.t.4: "[FROM.GetName] nabízí prodej lehkých tanků"
 MUN_czech.1038.t.5: "[FROM.GetName] nabízí prodej stíhaček"
 MUN_czech.1038.d: "Zástupci [FROM.GetAdjective] vlády a jejích zbrojních společností nás oslovili s nabídkou prodeje zbraní. Cena se zdá být zcela běžná a [FROM.GetNameDef] navíc nabízí i velmi moderní výzbroj."
 MUN_czech.1038.a: "To zní jako dobrá dohoda"
 MUN_czech.1039.t: "[RUT.GetName] chce dohodu o autonomii"
 MUN_czech.1039.d: "Ve světle dohody o autonomii, kterou jsme poskytli [SLO.GetName], se $RUT_augustin_voloshyn$ dotazuje, zda by jeho region nemohl získat stejný druh federalizační dohody. Zdá se to absurdní, ale vzhledem k okolnostem musíme tyto požadavky brát vážně."
 MUN_czech.1039.a: "To ještě uvidíme"
 MUN_czech.1040.t: "[CZE.GetName] nám nabízí smlouvu o celní unii"
 MUN_czech.1040.d: "[CZE.GetNameDefCap] nedávno obnovilo diplomatická jednání o celní unii mezi našimi dvěma zeměmi. Nabízená dohoda se zdá být spravedlivá, ale může později obsahovat další požadavky, na které nemusíme být připraveni. Tato smlouva i předmět obchodu působí bezvýznamně a symbolicky, takže jejím podpisem nic nezkazíme."
 MUN_czech.1040.a: "Zdá se neškodná"
 MUN_czech.1040.b: "Tomu nelze věřit"
 MUN_czech.1041.t: "[FROM.GetName] odmítá smlouvu o celní unii"
 MUN_czech.1041.d: "S odvoláním na důvody, podle nichž by tato smlouva mohla poškodit jejich hospodářství, [FROM.GetName] odmítlo podepsat smlouvu o celní unii mezi našimi dvěma zeměmi. Tyto důvody působí jako nepodložené výmluvy bez skutečné váhy."
 MUN_czech.1041.a: "Zklamání"
 MUN_czech.1042.t: "[FROM.GetName] souhlasí se smlouvou o celní unii"
 MUN_czech.1042.d: "Protože je smlouva považována za uspokojivou, [FROM.GetName] souhlasilo s jejími podmínkami. Doufejme, že je to první krok k užším vztahům mezi našimi dvěma zeměmi."
 MUN_czech.1042.a: "Výborně"
 MUN_czech.1043.t: "[FROM.GetName] požaduje, abychom vstoupili do jejich federace"
 MUN_czech.1043.d: "S odvoláním na sbližování našich dvou zemí a nedávný vývoj ve světě [FROM.GetName] prohlásilo, že pod jejich ochranou nám bude lépe než o samotě. Zdá se však, že jde pouze o záminku k okupaci našeho území. Co bychom měli udělat?"
 MUN_czech.1043.a: "Souhlasíme"
 MUN_czech.1043.b: "Strašný nápad"
 MUN_czech.1044.t: "[FROM.GetName] odmítá vstoupit do federace"
 MUN_czech.1044.d: "Protože se domnívají, že jim bude lépe o samotě než pod námi, [FROM.GetName] odmítlo možnost vstoupit do naší federace. Je to rána našemu cíli posílit postavení v Evropě. Co nyní uděláme, když [FROM.GetName] nechce přijít k rozumu?"
 MUN_czech.1044.a: "To je škoda"
 MUN_czech.1044.b: "Budeme muset zkusit jiné prostředky"
 MUN_czech.1045.t: "[FROM.GetName] souhlasí se vstupem do federace"
 MUN_czech.1045.d: "Protože usoudili, že pod naší ochranou budou v bezpečí více než sami, [FROM.GetName] moudře vstoupilo do naší federace. To výrazně posílí naše postavení v Evropě."
 MUN_czech.1045.a: "Výborně"
 MUN_czech.1046.t: "Uzdravování rozdělení"
 MUN_czech.1046.d: "Poté, co jsme se vypořádali s mnoha problémy v naší zemi, napětí uvnitř státu zřejmě polevuje. Po dokončení mnoha hospodářských a sociálních programů se zdá, že se naše země začíná zotavovat."
 MUN_czech.1046.a: "Skvělé zprávy"
 MUN_czech.1048.t: "[FROM.GetName] přijímá požadavky"
 MUN_czech.1048.t2: "[FROM.GetName] souhlasí s návrhem"
 MUN_czech.1048.d: "Neochotně nás [FROM.GetAdjective] představitelé informovali, že hodlají ustoupit našim územním požadavkům. Již nyní [FROM.GetAdjective] jednotky z daného území ustupují."
 MUN_czech.1048.d2: "Po dlouhých jednáních naši představitelé a zástupci [FROM.GetNameDef] úspěšně dohodli novou úlohu [FROM.GetAdjective] hospodářství jako součásti naší unie. Toto uspořádání jistě přinese prosperitu občanům obou zemí."
 MUN_czech.1048.d3: "Náš návrh paktu o neútočení byl [FROM.GetAdjective] zástupci přijat s okamžitým nadšením. Zdá se, že jejich ambice se nyní soustředí jinam."
 MUN_czech.1048.d4: "Tváří v tvář vážné hrozbě [FROM.GetNameDef] ustoupilo našim požadavkům na sblížení."
 MUN_czech.1048.d5: "Po dlouhých jednáních naši představitelé a zástupci [FROM.GetNameDef] úspěšně dosáhli dohody, podle níž bude část našeho vojenského průmyslu vyrábět vybavení pro ně. Na oplátku obdržíme obchodní zboží pro naše trhy a výrobu."
 MUN_czech.1049.d: "Nová vláda [FROM.GetNameDef] nás oslovila s návrhem spojenectví. Navzdory původně protiněmeckému postoji jejich nové vojenské vlády se zdá, že pragmaticky uznala nespolehlivost svých dosavadních mezinárodních partnerů."
 MUN_czech.1050.d: "Naši diplomaté se vrátili z [FROM.GetNameDef] se zklamáním: naše žádost o vstup do jejich aliance byla zamítnuta. Ačkoli důvody nejsou jasné, ocitli jsme se nyní v obtížné situaci, kdy jsme odhalili své obavy z tradičních spojenců, aniž bychom získali nové."
 MUN_czech.1050.a: "Pak bychom měli nabídnout výhodnější podmínky"
 MUN_czech.1050.b: "Hledejme si lepší spojence"
 MUN_czech.1051.t: "[FROM.GetName] žádá sféru vlivu"
 MUN_czech.1051.d: "Náš nový spojenec [FROM.GetNameDef] vyjádřil zájem rozšířit svůj vliv za své hranice. [FROM.GetAdjectiveCap] zástupci proto přišli žádat o svolení a podporu pro toto rozšíření, při němž má být stanovena jasná hranice mezi oblastmi pod [ROOT.GetAdjective] a [FROM.GetAdjective] vlivem."
 MUN_czech.1051.a: "Měli bychom posílit našeho klíčového [FROM.GetAdjective] spojence"
 MUN_czech.1052.t: "[FROM.GetName] žádá, abychom umožnili průchod [SOV.GetAdjective] vojskům"
 MUN_czech.1052.d: "Po nové diplomatické dohodě mezi [FROM.GetNameDef] a [SOV.GetNameDef] je [FROM.GetNameDef] přesvědčeno, že je [SOV.GetNameDef] v případě konfliktu ochrání. Jedinou překážkou je nedostatek pozemního spojení mezi oběma zeměmi, a proto se [FROM.GetAdjective] diplomaté obrátili na naši vládu s žádostí, abychom v případě války umožnili průchod [SOV.GetAdjective] vojsk přes naše území do [FROM.GetNameDef]."
 MUN_czech.1052.a: "Jejich boj ochrání i nás"
 MUN_czech.1053.t: "[FROM.GetName] na nás tlačí [HUN.GetAdjective] nároky"
 MUN_czech.1053.d: "Poté, co učinilo z [HUN.GetNameDef] svůj klientský stát, požaduje nyní [FROM.GetNameDef], abychom přijali stejný osud. Hrozí, že pokud odmítneme, podpoří [HUN.GetAdjective] nároky na [ROM.GetAdjective] území. Musíme si nyní vybrat mezi ztrátou svrchovanosti a možným ohrožením územní celistvosti."
 CZE_cancel_anti_hungary_focus_tt: "Zruší Zaměření §Y$CZE_neutralize_the_hungarian_threat$§!"
 MUN_czech.1054.t: "Společná invaze do [LIT.GetName]?"
 MUN_czech.1054.d: "Jak bylo dříve dohodnuto, přišlo [FROM.GetNameDef] s návrhem, který by posílil náš stát. Konkrétně násilné sjednocení s [LIT.GetNameDef], které by nám zajistilo přístup k dalším zdrojům a zároveň nepříteli znemožnilo útočit na nás přes [LIT.GetNameDef]."
 MUN_czech.1054.a: "Musíme expandovat, abychom odolali expanzi ostatních"
 MUN_czech.1055.t: "[SOV.GetAdjectiveCap] dobrovolníci dorazili"
 MUN_czech.1055.d: "V bezprecedentním výkonu letecké logistiky využívá [SOV.GetNameDef] své letectvo k přesunu několika divizí dobrovolníků na naše letiště v [73.GetName], aby podpořili naše současné válečné úsilí."
 MUN_the_fall_of_the_republic.1.t: "Masové vypuknutí protestů"
 MUN_the_fall_of_the_republic.1.d: "Nedávné rozhodnutí [ROOT.GetLeader] vzdát se Sudet vedlo k vypuknutí protestů po celé zemi. Zatímco politické a vojenské vedení chtělo zabránit krveprolití v tom, co považovalo za bezúčelný odpor tváří v tvář nemožným vyhlídkám, mnozí lidé v celé zemi cítili, že učinili špatné rozhodnutí. Některá politická hnutí se nyní snaží využít zmatku k prosazení vlastních cílů."
 MUN_the_fall_of_the_republic.1.a: "Neměli jsme jinou možnost!"
 MUN_the_fall_of_the_republic.2.t.1: "Pád první republiky"
 MUN_the_fall_of_the_republic.2.t.2: "Chaos ve vládě"
 MUN_the_fall_of_the_republic.2.d: "Po rozhodnutí vlády vzdát se Sudet zasáhla naši zemi vlna rezignací nižšího vedení armády i státní správy. Někteří z těchto lidí údajně přes noc uprchli ze země. Jsou nutné zásadní změny ve vládě, aby se zastavil odchod úředníků a obnovila se důvěra v naši schopnost vést stát."
 MUN_the_fall_of_the_republic.2.a: "Potřebujeme radikální změny."
 MUN_the_fall_of_the_republic.2.b: "Musíme vytrvat!"
 MUN_the_fall_of_the_republic.3.t: "[RUT.GetName] žádá autonomii"
 MUN_the_fall_of_the_republic.3.d: "V důsledku nedávného politického chaosu, který postihl naši zemi, si malý region Zakarpatská Ukrajina přeje větší autonomii od [9.GetCapitalVictoryPointName]. Odkazuje přitom na dlouhodobé rozdíly mezi regionem a zbytkem [ROOT.GetName]. Zdá se však, že místní představitelé jen využívají příležitosti k posílení vlastního postavení. Odmítnutí této žádosti by nás stálo mnoho politického kapitálu ve chvíli, kdy si to nemůžeme dovolit."
 MUN_the_fall_of_the_republic.3.a: "Jistě, proč ne?"
 MUN_the_fall_of_the_republic.3.b: "V žádném případě!"
 MUN_the_fall_of_the_republic.3.c: "Nechme je jít."
 MUN_the_fall_of_the_republic.4.t: "Budoucnost pro [RUT.GetName]"
 MUN_the_fall_of_the_republic.4.d: "V důsledku nedávného chaosu, který postihl [CZE.GetName], se malý region [RUT.GetName] ocitl mimo hranice jakéhokoli státu. Tento malý odštěpenecký útvar se prohlásil nezávislou zemí a zahájil diplomatická jednání se svými sousedy. Mnozí v naší vládě se obávají, že tak strategicky významný region na našich hranicích padne do rukou někoho jiného. Armáda navrhla okamžitě zaslat odtrženému regionu ultimátum požadující jeho anexi."
 MUN_the_fall_of_the_republic.4.a: "Pošlete jim ultimátum okamžitě!"
 MUN_the_fall_of_the_republic.4.b: "To by mohlo být riskantní, vyčkejme."
 MUN_the_fall_of_the_republic.5.t: "[FROM.GetName] požaduje naši anexi!"
 MUN_the_fall_of_the_republic.5.d: "Po našem vyhlášení nezávislosti bylo jen otázkou času, kdy se některý sousední stát pokusí začlenit nás do svého území. Zdá se, že [FROM.GetName] je prvním z nich a požaduje naši kapitulaci. Co bychom měli udělat?"
 MUN_the_fall_of_the_republic.5.a: "Budeme bojovat do posledního muže!"
 MUN_the_fall_of_the_republic.5.b: "Nemáme jinou možnost než souhlasit."
 MUN_the_fall_of_the_republic.6.t: "[FROM.GetName] odmítá naše ultimátum!"
 MUN_the_fall_of_the_republic.6.d: "Překvapivým krokem [FROM.GetName] odmítlo naše ultimátum a místo toho se rozhodlo klást ozbrojený odpor. Nedali nám jinou možnost než invazi. Bojové plány i postupy útoku již byly připraveny, stačí jen vydat rozkaz k útoku."
 MUN_the_fall_of_the_republic.6.a: "Byli varováni."
 MUN_the_fall_of_the_republic.6.a_tt: "Tato operace neovlivní §Y$HUN_pal_teleki$§!, pokud [RUT.GetNameDef] nemá spojence"
 MUN_the_fall_of_the_republic.6.b: "Mohlo by se to obrátit proti nám, raději vyčkejme."
 MUN_the_fall_of_the_republic.7.t: "[FROM.GetName] ustupuje našim požadavkům"
 MUN_the_fall_of_the_republic.7.d: "Nikoho nepřekvapilo, že [FROM.GetName] přijalo naše požadavky a je ochotno být anektováno výměnou za několik bezvýznamných podmínek. Tento malý region neměl proti tak mocnému státu, jako je ten náš, žádnou šanci na odpor. Naše severní hranice je nyní bezpečnější než dříve a vláda je velmi spokojena s tímto snadným vítězstvím."
 MUN_the_fall_of_the_republic.7.a: "Výborné zprávy."
 MUN_czech_bop.1.t: "Připravenost armády"
 MUN_czech_bop.1.d: "Reformní úsilí první poloviny desetiletí začíná přinášet ovoce. Naše armáda je nyní jednou z nejmodernějších v Evropě. Přesto se mezi některými politiky a vedením mnoha průmyslových konglomerátů začíná šířit pocit samolibosti. Má-li si armáda udržet vrcholnou připravenost, musíme bojovat proti pochybnostem o její schopnosti bojovat i proti těm, kteří ji chtějí oslabit pro vlastní prospěch."
 MUN_czech_bop.1.a: "Budeme připraveni."
 MUN_czech_bop.2.t.1: "Hrozba německého zbrojení"
 MUN_czech_bop.2.t.2: "Vojenské rozšiřování sousedních zemí"
 MUN_czech_bop.2.d.1: "Nedávná remilitarizace Porýní ze strany [GER.GetNameDef] vyděsila některé naše vojenské i politické představitele. Zatímco mnozí věří ve spojenectví, která země uzavřela, a v přípravy armády čelit možné německé hrozbě, jiní si nejsou tak jisti, že dokážeme obstát proti jakékoli [GER.GetAdjective] hrozbě."
 MUN_czech_bop.2.d.2: "Nedávné zprávy o tom, že někteří naši sousedé zahájili programy výrazného rozšíření svých armád, vyděsily část našich vojenských i politických představitelů. Mnozí věří ve spojenectví uzavřená s jinými zeměmi a v přípravy armády čelit jakékoli zahraniční hrozbě. Jiní si však nejsou tak jisti, že dokážeme čelit možné cizí agresi."
 MUN_czech_bop.2.a: "Budeme připraveni."
 MUN_czech_bop.2.a_tt: "Zbrojení našich sousedů způsobilo, že část armády pochybuje o naší schopnosti odolat možné agresi. Musíme armádu uklidnit svými činy."
 MUN_czech_bop.3.t: "[CZE.GetName] vyslalo do naší země pozorovatele"
 MUN_czech_bop.3.d: "[CZE.GetName] nedávno vyslalo do naší země jednotlivce, aby sledovali probíhající konflikt. Zároveň jeden z jejich výrobců ručních zbraní kontaktoval některé naše diplomaty neoficiální cestou s dotazem, zda bychom měli zájem koupit od nich ruční zbraně. Kvůli omezením uvaleným na nás by to znamenalo pašování zbraní do země."
 MUN_czech_bop.3.a: "Uvidíme, kam to povede."
 MUN_czech_bop.3.b: "Nesmíme jim dovolit nic víc než jen pozorování."
 MUN_czech_bop_3_tt: "§Y[CZE.GetName]§! výrobce zbraní §Y$CZE_zbrojovka_brno_organization$§! se může pokusit propašovat nám zbraně."
 MUN_czech_bop.4.t: "Plán společnosti $CZE_zbrojovka_brno_organization$"
 MUN_czech_bop.4.d: "[ETH.GetName] navázalo kontakt se zástupci výrobce zbraní $CZE_zbrojovka_brno_organization$ a má zájem o pašování našich zbraní do země. Navzdory sankcím Společnosti národů proti [ETH.GetNameDef] je $CZE_zbrojovka_brno_organization$ ochotna tento plán uskutečnit. Porušení mandátu Společnosti národů by bylo mezinárodně velmi nepopulární, pokud bychom byli odhaleni."
 MUN_czech_bop.4.a: "Uděláme to"
 MUN_czech_bop.4.b: "Nestojí to za možné následky"
 CZE_gun_smuggling_tt: "Pašování zbraní do země"
 CZE_we_got_caught_tt: "§Y$CZE_zbrojovka_brno_organization$§! bude dopadena."
 CZE_we_dont_get_caught_tt: "§Y$CZE_zbrojovka_brno_organization$§! nebude dopadena."
 MUN_czech_bop.5.t: "$CZE_zbrojovka_brno_organization$ souhlasí s pašeráckým plánem"
 MUN_czech_bop.5.d: "Po jednání se zástupci české vlády dostala společnost $CZE_zbrojovka_brno_organization$ tajný souhlas zahájit pašování menšího množství ručních zbraní do země. Jejich odborné znalosti nám budou rovněž k dispozici prostřednictvím našich neveřejných kanálů."
 MUN_czech_bop.5.a: "Dobře je využijeme."
 MUN_czech_bop_5_tt: "Tento §Yvýrobce§! bude po skončení války §Rodstraněn§!."
 MUN_slovakia_little_war.1.t: "Útok na [71.GetName] končí vítězstvím"
 MUN_slovakia_little_war.1.d: "Naše armáda si při útoku na [71.GetName] vedla dobře a porazila nepřátelské síly v oblasti. Naši velitelé získali z bitvy neocenitelné poznatky a zkušenosti, které budou moci využít v budoucnu."
 MUN_slovakia_little_war.1.a: "Výborná práce."
 MUN_slovakia_little_war.2.t: "Útok na [71.GetName] končí porážkou"
 MUN_slovakia_little_war.2.d: "Navzdory našemu nejlepšímu úsilí byly naše síly při útoku na [71.GetName] poraženy. Klíčovým faktorem porážky byla neschopnost včas shromáždit dostatek munice a motorizovaného vybavení. Přes tento neúspěch se velitelé zapojení do bitvy naučili velmi důležité lekce."
 MUN_slovakia_little_war.2.a: "Podprůměrný výkon."
 MUN_slovakia_little_war.3.t: "Pohraniční střet v [71.GetName]"
 MUN_slovakia_little_war.3.d: "I po získání našeho území v rámci $GER_first_vienna_award$ se [HUN.GetNameDef] stále snaží prosadit další úpravy hranic v [71.GetName]. Musíme této výzvě čelit silou a ukázat, že svou půdu nepostoupíme bez boje."
 MUN_slovakia_little_war.3.a: "Jak se opovažují!"
 MUN_slovakia_little_war.4.t: "Patová situace v [71.GetName]"
 MUN_slovakia_little_war.4.d: "Navzdory našemu nejlepšímu úsilí se našim silám nepodařilo střet v [71.GetName] vyhrát. Klíčovým faktorem neúspěchu byla neschopnost včas shromáždit dostatek munice a motorizovaného vybavení. Přes tento nezdar se velitelé zapojení do bitvy naučili velmi důležité lekce."
 MUN_slovakia_little_war.4.a: "Zklamání."
 MUN_czech.news.1.t: "Sudetská krize"
 MUN_czech.news.1.desc: "Lidé v Sudetech zahájili ozbrojené povstání. Přicházejí zprávy, že polovojenské skupiny začaly útočit na policejní stanice a vládní budovy po celém regionu. Spouštěčem byly nedávné zprávy, že [FROM.GetName] usiluje o anexi tohoto území.\n\nTato povstání se zdají být předehrou k většímu konfliktu, který čeká[FROM.GetName] a [CZE.GetNameDef]. Konfliktu, který se nyní zdá nevyhnutelný."
 MUN_czech.news.1.a: "To pro Evropu nevěstí nic dobrého."
 MUN_czech.news.1.b: "Chaos je žebřík."
 MUN_czech.news.1.c: "Zvítězíme!"
 MUN_czech.news.1.d: "Snad zvítězí diplomacie."
 MUN_czech.news.2.t: "[FROM.GetNameDefCap] napadá [RUT.GetNameDef]"
 MUN_czech.news.2.desc: "\nNěkde v řetězci událostí po politickém chaosu, ve kterém se zmítá [CZE.GetName], se [RUT.GetName] ocitá mimo hranice jakéhokoli státu. Tento stát se poté prohlásil nezávislou zemí a začal vytvářet milice k obraně své nové státnosti.\n\n[FROM.GetNameDefCap] projevuje o tento region dlouhodobý zájem a po využití příležitosti okamžitě napadá tento malý odštěpenecký stát. Mnohým pozorovatelům se jeví, že [RUT.GetName] má svůj osud zpečetěn."
 MUN_czech.news.2.a: "Karpat... co?"
 MUN_czech.news.2.b: "To bude snadné."
 MUN_czech.news.2.c: "Jen pojďte!"
 MUN_slovakia.news.1.t: "[71.GetName] zažívá pohraniční střety"
 MUN_slovakia.news.1.desc: "Navzdory tomu, že [HUN.GetNameDef] znovuzískalo [664.GetName], které jim přidělila $GER_first_vienna_award$, se stále snaží o další úpravy hranic, a útočí na [71.GetName].\n\nTento konflikt se zdá být záminkou, jak si [HUN.GetNameDef] chce vyzkoušet sílu své armády proti mnohem slabšímu protivníkovi. Mladá [SLO.GetAdjective] armáda možná ještě není připravena čelit výzvě, která před ní stojí."
 MUN_slovakia.news.1.a: "Hašteřící se děti."
 MUN_slovakia.news.1.b: "Jsme na tento úkol připraveni."
