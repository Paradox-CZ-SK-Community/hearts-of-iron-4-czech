 SUPPLY_FLOW_SHOW_RANGE: "§HDistribuční uzly§! distribuují zásoby do okolních provincií. Jejich dosah a efektivita závisí na počasí, podmínkách na zemi, infrastruktuře, úrovni železnice a motorizaci.\n\nPro zvýšení dosahu a zásob poskytovaných §HSupply Hub§! zvažte použití příkazu §HVylepšit železnici§!, změnu §HÚrovně motorizace§! nebo vylepšení §HÚrovně infrastruktury§!.\n\nDržte §GShift§! pro zobrazení dosahu.\n§GShift-klik§! pro přepínání motorizace.\n§GCtrl-klik§! pro přepínání spojeneckých zásob."
