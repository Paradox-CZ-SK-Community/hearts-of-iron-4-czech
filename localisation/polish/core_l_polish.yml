 NAVY_REPAIR_POLICY_SPLIT_DESC: "Možnost §YPovolit dělení§! umožňuje nejvíce poškozeným lodím se odpojit a vrátit se na blízkou námořní základnu na opravy, zatímco zbytek úderné skupiny bude pokračuje ve své misi.\nOdpojené lodě jsou velmi zranitelné vůči útoku, zatímco se vrací.\nPo dokončení oprav se lodě vrátí zpět ke svým přiřazeným úderným skupinám.\n\nPočet lodí, které se odpojí, závisí na nastavení priority oprav, jakož i na poškození každé jednotlivé lodě."
