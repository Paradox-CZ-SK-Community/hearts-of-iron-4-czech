 NAVAL_MISSION_ACTIVATE: "Aktivovat"
 NAVAL_MISSION_NAME_NONE: "Čekání na pokyny"
 NAVAL_MISSION_NAME_PATROL: "Patrola"
 NAVAL_MISSION_NAME_PATROL_DESC: "Přikázat úderné skupině, aby hlídkovala v oblasti operací flotily.\n\nÚderná skupina může hlídkovat pouze v jedné oblasti najednou.\nPokusi se odhalit nepřátelské flotily ve své aktivní oblasti. Radar a vzdušná převaha mu pomohou odhalit nepřítele rychleji.\n\nVezměte na vědomí, že nepřítel vás může odhalit a zapojit se dříve, než jej odhalíte."
 NAVAL_MISSION_NAME_SEARCH_AND_DESTROY: "Hledat a zničit"
 NAVAL_MISSION_NAME_STRIKE_FORCE: "Úderná skupina"
 NAVAL_MISSION_NAME_STRIKE_FORCE_DESC: "Rozkažte úderné skupině, aby čekala v nejbližší námořní základně, dokud nebude spatřena nepřátelská úderná skupina.\nJakmile jedna z vašich hlídkových skupín zaznamená nepřítele, vaše úderná skupina se přesune, aby ho zachytila.\n\nKdyž se aktivně nezapojuje do boje, tato mise spotřebovává $PERCENT|%0G$ paliva."
 NAVAL_MISSION_NAME_SEARCH_AND_DESTROY_DESC: "Nařídíte úderné skupině, aby aktivně vyhledávala a napadala nepřátelské flotily v určených regionech."
 NAVAL_MISSION_NAME_CONVOY_RAIDING: "Přepadávání konvojů"
 NAVAL_MISSION_NAME_CONVOY_RAIDING_DESC: "Nařídí úderné skupině přepadávání nepřátelských konvojů ve vybraných regionech."
 NAVAL_MISSION_NAME_CONVOY_ESCORT: "Doprovod konvoje"
 NAVAL_MISSION_NAME_CONVOY_ESCORT_DESC: "Rozkaz úderné skupině, aby eskortoval konvoje ve vybraných regionech a chránil je před nepřátelskými útoky."
 NAVAL_MISSION_NAME_INVASION: "Doprava/Invaze"
 NAVAL_MISSION_NAME_INVASION_DESC: "Nařidte úderné skupině, aby aktivně podporovala přepravu vojsk a invaze v vybraných §YInvazních rozkazech§!.\n§GKlikněte§! pro aktivaci této mise, poté §Gklikněte§! na šipku invaze, pokud jste ji nakreslili."
 NAVAL_MISSION_NAME_MINES_PLANTING: "Pokládání min"
 NAVAL_MISSION_NAME_MINES_PLANTING_DESC: "Nařídí úderné skupině, aby položila námořní miny v určených oblastech. Nejvyšší možná penalizace pro vaše nepřátele je:\n"
 NAVAL_MISSION_MISSED_REQUIREMENT_WARN_SHORE_BOMBARDMENT: "£mapicon_unit_invalid_orders£ Nízké schopnosti bombardování pobřeží"
 NAVAL_MISSION_MISSED_REQUIREMENT_WARN_SHORE_BOMBARDMENT_DESC: "Úderná skupina nebude schopná efektivně pomáhat divizím na pobřeží v boji kvůli svým nízkým kapacitám pobřežního bombardování. Zvažte přidání lodí s §Ytěžkým dělostřeleckým útokem§! do úderné skupiny."
 NAVAL_MISSION_MISSED_REQUIREMENT_WARN_DEPTH_CHARGES: "£mapicon_unit_invalid_orders£ Nízké množství §Yhlubinných náloží§!"
 NAVAL_MISSION_MISSED_REQUIREMENT_WARN_DEPTH_CHARGES_DESC: "Je nepravděpodobné, že by úderná skupina poškodila ponorky. Zvažte přidání lodí s větším počtem §Hhlubinných náloží§!."
 NAVAL_MISSION_MISSED_REQUIREMENT_WARN_SUB_SURFACE_DETECTION: "£mapicon_unit_invalid_orders£ Nízká podmořská detekce"
 NAVAL_MISSION_MISSED_REQUIREMENT_WARN_SUB_SURFACE_DETECTION_DESC: "Úderná skupina pravděpodobně během boje nezjistí ponorky. Zvažte přidání více lodí se §Ysonary§!, §Yradary§! nebo §Yletadlových katapultů§!."
 NAVAL_MISSION_MISSED_REQUIREMENT_WARN_SURFACE_DETECTION: "£mapicon_unit_invalid_orders£ Nízké hladinová detekce"
 NAVAL_MISSION_MISSED_REQUIREMENT_WARN_SURFACE_DETECTION_DESC: "Úderná skupina bude pomalá při detekci potenciálních nepřátel. Zvažte přidání více lodí s §Yradary§! a §Yletadlových katapultů§!."
 NAVAL_MISSION_MISSED_REQUIREMENT_WARN_SPEED: "£mapicon_unit_invalid_orders£ Nízká maximální rychlost"
 NAVAL_MISSION_MISSED_REQUIREMENT_WARN_SPEED_DESC: "Průměrná rychlost operační skupiny je příliš nízká a omezuje její schopnost vyhledávání. Zvažte odstranění pomalých lodí nebo přidání rychlejších."
 NAVAL_MISSION_MISSED_REQUIREMENT_WARN_SURFACE_VISIBILITY: "£mapicon_unit_invalid_orders£ Vysoká hladinová viditelnost"
 NAVAL_MISSION_MISSED_REQUIREMENT_WARN_SURFACE_VISIBILITY_DESC: "Úderná skupina je příliš viditelná a nepřítel ji může snadno zpozorovat nebo se jí vyhnout. Zvažte použití menších nebo méně obrněných lodí s nižší hladinovou viditelností."
 NAVAL_MISSION_SET_REASON_FOR_PLANTING_NO_SHIPS: "Pokládání min §Rnelze§! udělat, protože žádná z lodí ve vaší flotile nemá schopnost to udělat!"
