 UNITS_VIEW_BTN_RESHAPE: "§HEditační mód§!\nStiskněte toto tlačítko pro přepínání režimu, nebo držte §GALT§!\n§GPravé kliknutí§! na ukotvení plánů bitvy zakončující je upravit.\n§GKlikněte a držte tlačítko myši§! na Pokroku šipky pro jeho přetvoření nebo spojení s jiným rozkazem.\n§GPravé kliknutí a držte tlačítko myši§! na jednom z blikajících rozkazů pro začátek malování nového Směru postupu."
 UNITS_VIEW_BTN_DRAW_OFFENCE: "§HOfenzivní linie§!\n§GPravým kliknutím a tažením myši§! na mapě nakreslíte §YOfenzivní linii§!.\nČáry mohou být malovány pouze na území, kterému jste přidělili §HFrontovou linii§! nebo §HNámořní invazi§!.\n\nDivize přidělené k plánu s Ofenzivní linií se pokusí ovládnout území, aby posunuly svůj frontový řádek tam.\n\n§GPodržte tlačítko myši§! a §Gpustěte§! ho na tlačítko pro provádění chování pro změnu typu provádění plánu"
 UNITS_VIEW_BTN_DRAW_DEFENCE: "§HFrontová linie§!\n - §GKlikněte§! na jednu z hranic proti jiné zemi, abyste nastavili přiřazenou frontu podél celé hranice.\n - §GPravým kliknutím a tažením myši§! na jednu z hranic proti jiné zemi, abyste nastavili frontu v kratším intervalu.\n - §GPravým kliknutím a tažením myši§! na existující konce fronty, abyste je upravili.\n\nFrontové linie jsou výchozím bodem útoků do nepřátelského území směrem k ofenzivním liniím, ale také vám umožňují rychle umístit divize podél cizí hranice."
 UNITS_VIEW_BTN_DRAW_DEFENCE_ARMY_GROUP: "§HFrontová linie§!\n - §GKlikněte§! na jednu z hranic proti jiné zemi, abyste nastavili přiřazenou frontu podél celé hranice.\n - §GShift + Klik§! na jednu z hranic proti jiné zemi, abyste nastavili přiřazenou frontu bez sub-armádových front podél celé hranice.\n - §GPravým kliknutím a tažením myši§! na jednu z hranic proti jiné zemi, abyste nastavili frontu v kratším intervalu.\n - §GShift + Pravým kliknutím a tažením myši§! na jednu z hranic proti jiné zemi, abyste nastavili frontu bez sub-armádových front v kratším intervalu.\n - §GPravým kliknutím a tažením myši§! na existující konce fronty, abyste je upravili.\n\nFrontové linie jsou výchozím bodem útoků do nepřátelského území směrem k ofenzivním liniím, ale také vám umožňují rychle umístit divize podél cizí hranice."
 UNITS_VIEW_BTN_DRAW_FALLBACK: "§HLinie ústupu§!\n - §GPravé kliknutí a držte tlačítko myši§! na přátelském území pro kreslení §YJednorázového§! obranného rozkazu.\n\nFallback linie jsou užitečné pro umístění divizí na obranu, například za řeku, nebo jinde na přátelském území."
 UNITS_VIEW_BTN_AREA_DEFENSE: "§HObrana oblasti§!\n - §GKlikněte§! na státy, abyste je přidali/odebrali z rozkazu armády.\nArmáda s tímto rozkazem nemůže mít v daný čas jiné typy rozkazu.\n\nDivize přidělené armádě s tímto rozkazem se rozprostřou po přidělené oblasti, aby chránily důležitá města, přístavy nebo jiné objekty a také se vypořádaly s menšími přítomnostmi nepřítele."
 UNITS_VIEW_BTN_DRAW_NAVAL_INV: "§HRozkaz k námorní invazi§!\nKrok 1) §GKlikněte§! na jednu z označených provincií pro nastavení zdroje invaze.\nKrok 2) §GPravým kliknutím§! na požadovanou pobřežní provincii pro invazi.\nJakmile bude plán aktivován, invaze se začne připravovat a rezervovat konvoje z vašich zásob."
 UNITS_VIEW_BTN_DRAW_PARADROP: "§HRozkaz k výsadku§!\nKrok 1) §GKlikněte§! na naši leteckou základnu, abyste určili výchozí bod. Letecká základna musí mít k dispozici transportní letadla.\nKrok 2) §GPravým kliknutím§! na provincii, která je v dosahu místních transportních letadel, abyste určili místo seskoku.\n§gPamatujte, že pouze jednotky s dovedností padákového vojska budou přepraveny.§!"
