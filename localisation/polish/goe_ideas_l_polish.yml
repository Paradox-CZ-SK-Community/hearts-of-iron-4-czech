 AFG_nufus_modifier: "Nufus"
 AFG_pashtun_domination: "Paštúnská dominance"
 AFG_pashtunwali: "Paštúnválí"
 AFG_pashtunwali_desc: "Paštúnové tvoří největší a politicky nejvlivnější část obyvatelstva. Významná část Paštúnů se řídí tradičním kodexem etiky a pravidel známým jako Paštúnválí. To vládám ztěžuje nejen udržení moci, ale i prosazování reforem, pokud se jeví jako rozporné s tímto tradičním kodexem."
 AFG_placated_graduates: "Uspokojení absolventi"
 AFG_placated_graduates_desc: "Rozšířením státní správy se nám podařilo absorbovat velkou část nezaměstnaných absolventů, kteří by se jinak radikalizovali."
 AFG_pro_democratic_influx: "Příliv prodemokratických sil"
 AFG_quami_modifier: "Kaumí"
 AFG_radio_networks: "Rádio Kábul"
 AFG_railway_company_idea: "Afghánská železniční společnost"
 AFG_republic_idea: "Nová republika"
 AFG_republic_idea_desc: "Naše nová republika nabídne lidem větší svobodu a rovnost než cokoliv předtím. Se zvýšenou stabilitou se nyní můžeme zaměřit na rozvoj vzdělávání a ekonomiky."
 AFG_reviving_the_workshop_of_the_world: "Oživení dílny světa"
 AFG_shadows_of_the_emir_no_lar: "Stíny emíra"
 AFG_sikh_volunteers_idea: "Sikhští dobrovolníci"
 AFG_subsistence_economy_modifier: "Naturální hospodářství"
 AFG_subsistence_economy_modifier_desc: "Většina obyvatelstva žije na venkově a produkuje pouze tolik potravin, kolik potřebuje pro sebe a své rodiny, aby přežili kruté zimní měsíce. Mají jen malý zájem měnit svůj způsob života ve prospěch rozsáhlých průmyslových odvětví vytvářejících zisk a je nepravděpodobné, že by tento postoj změnili bez ohledu na to, kdo údajně drží moc v Kábulu."
 AFG_textile_company_idea: "Chajbarské textilie"
 AFG_turkestan_legion_idea: "Turkestánská legie"
 AFG_turkish_military_mission: "Turecká vojenská mise"
 AFG_turkish_military_mission_desc: "Od roku 1933 se turecký vojenský personál podílí na vzdělávání nové generace afghánských vojáků. Časem by bylo možné toto uspořádání rozšířit a přiblížit tak naše velké národy k sobě."
