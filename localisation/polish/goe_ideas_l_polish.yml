 AFG_look_to_the_past_modifier: "Návrat k tradici"
 AFG_look_to_the_past_modifier_desc: "Lidé touží po změně a návratu k politickým systémům, které respektují jejich tradiční hodnoty. Společně mohou ještě překonat moc Kábulu."
