 IRQ_air_force_modifier: "Královské irácké letectvo"
 IRQ_air_force_modifier_IRQ: "Královské irácké letectvo"
 IRQ_air_force_modifier_KUR: "Kurdské letectvo"
 IRQ_al_muthanna_club_idea: "Kluby Al-Muthanna"
 IRQ_al_muthanna_club_idea_desc: "Kluby Al-Muthanna představují mocnou sílu v irácké společnosti, prosazující arabský nacionalismus a protiimperialistické smýšlení. Ačkoliv inspirují jednotu a hrdost mezi iráckou mládeží, jejich radikální rétorika a vliv na politiku hrozí prohloubením rozdělení a destabilizací křehkého státu."
 IRQ_anglo_iraqi_mutual_defense_agreement: "Anglo-irácká dohoda o vzájemné obraně"
 IRQ_anglo_iraqi_oil_company: "Benefity Anglo-irácké ropné společnosti"
 IRQ_anglo_iraqi_treaty: "Anglo-irácká smlouva"
 IRQ_anglo_iraqi_treaty_desc: "Přestože byla v roce 1930 znovu vyjednána, anglo-irácká smlouva zůstává jednostrannou dohodou, která činí Irák de facto klientským státem Britského impéria. Smlouva poskytuje Britům přednostní práva na iráckou ropu a umožňuje jim využívat vojenská zařízení po celé zemi. To nadále vyvolává masový odpor mezi iráckým obyvatelstvem, které touží po skutečné nezávislosti. Každá vláda, která se dostane k moci, se bude muset rozhodnout, zda smlouvu znovu vyjedná, nebo ji zruší a riskuje hněv britské armády."
