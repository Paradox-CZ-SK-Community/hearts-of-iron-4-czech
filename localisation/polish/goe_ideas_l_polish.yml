 IRQ_river_navy: "Říční námořnictvo"
 IRQ_river_navy_desc: "Disponujeme největším říčním námořnictvem v regionu, které zdržuje či dokonce brání nepřátelským vpádům na naše území. Ačkoliv se nemůže rovnat oceánským námořnictvům, představuje klíčový prvek bezpečnosti naší země."
