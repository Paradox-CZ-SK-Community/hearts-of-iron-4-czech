 POL_four_year_plan_mission: "Příprava na další čtyřletý plán"
 POL_four_year_plan_mission_desc: "Čtyřletý plán je v plném proudu, a pokud se chceme na další čtyři roky náležitě připravit, musíme zajistit, aby naše sliby týkající se reforem a industrializace země byly dodrženy."
 POL_invite_ford: "Pozvat Ford Motors"
 POL_invite_ford_desc: "Levné, efektivní a americké, Ford Motors jsou schopny vyrábět automobily s bezkonkurenční rychlostí."
 POL_invite_foreign_motor_decisions: "Pozvat zahraniční automobilky"
 POL_invite_foreign_motor_decisions_desc: ""
 POL_invite_somua: "Pozvat SOMUA"
 POL_invite_somua_desc: "Francouzská motorizovaná a obrněná vozidla jsou odolnější než ostatní a jsou schopna snášet střely z nepřátelských vozidel, aniž by utrpěla nějaké poškození. Právě tyto typy vozidel potřebujeme, abychom přežili válku."
 POL_invite_vauxhall: "Pozvat Vauxhall"
 POL_invite_vauxhall_desc: "Britové prokázali, že jejich automobilová technika je na silnici mnohem rychlejší a kvalitnější než jakákoliv jiná na světě."
 POL_looming_peasants_strike_mission: "Hrozící stávka rolníků"
 POL_looming_peasants_strike_mission_desc: "Rolníci jsou nespokojení, požadují vyšší platy a výrazné snížení cen potravin. Kvůli špatnému železničnímu spojení na východě Polska je zásobování regionu potravinami a vybavením nákladné, ale s dalšími investicemi do železnice bychom mohli splnit to, co rolníci požadují."
 POL_miedzymorze_decisions: "Mezimoří"
 POL_miedzymorze_decisions_desc: ""
 POL_military_appeasement: "Vojenský ústupek"
 POL_military_appeasement_desc: "Svobodné město Gdaňsk nelze integrovat pouze hrubou silou, určitá míra ústupků může přimět gdaňskou domobranu, aby se více přizpůsobila polským představám o městě."
 POL_peasant_strike_category: "Stávka rolníků"
 POL_peasant_strike_category_desc: ""
 POL_peasants_strike: "Stávka rolníků!"
 POL_peasants_strike_desc: "Napětí na Východě dosáhlo bodu varu. Pokud tuto krizi co nejdříve nevyřešíme, může dojít k občanské válce. Stávka organizovaná vůdcem Rolnické strany Stanisławem Mikołajczykem vytvořila koalici demokratů, socialistů a komunistů v opozici vůči polské vládě, a pokud bude ignorována, vyvolá povstání."
 POL_raid_nazi_resistance: "Razie proti nacistickým přívržencům"
 POL_raid_nazi_resistance_desc: "Ve městě jsou lidé, kteří by rádi předali klíče od své svobody nacistům a podřídili město Berlínu. Tyto živly je třeba z města za každou cenu odstranit, i když tvrdá vojenská akce může mít nepříznivý vliv na to, jak nás místní obyvatelé vnímají."
 POL_sanation_decisions: "Polská vláda sanace"
 POL_sanation_decisions_desc: "Sanacionisté se dělí na tábory levice a pravice, které se snaží o narušení naší vlády. Musíme tyto strany patřičně uklidnit a odsunout na vedlejší kolej, abychom mohli vytvořit stabilní vládu ve prospěch budoucnosti Polska!"
 POL_sanation_left_irritation: "Podráždění sanační levice"
 POL_sanation_left_irritation_desc: "Sanační levice, unavená bagatelizací a odsunem na vedlejší kolej za Moścického režimu, usiluje o obnovení vlády bývalého premiéra Waleryho Sławka."
 POL_sanation_right_irritation: "Podráždění sanační pravice"
 POL_sanation_right_irritation_desc: "Sanační pravice, která má na své straně většinu armády, se snaží podkopat diktaturu a vytvořit vojenskou juntu pod vedením Edwarda Rydz-Śmigły. Sanační pravice, která má vazby na armádu i falangistické polovojenské jednotky, je nebezpečnou politickou frakcí."
 POL_sending_deligates_flag: "Již na diplomatické misi."
 POL_sideline_the_left: "Odsunutí levice na vedlejší kolej"
 POL_sideline_the_left_desc: "S pomocí pravičáků se nám může podařit odsunout levici na vedlejší kolej a zatlačit ji více na politický okraj naší společnosti."
 POL_sideline_the_right: "Odsunutí pravice na vedlejší kolej"
 POL_sideline_the_right_desc: "Ačkoli je pravice silná, mohla by být společným úsilím levice a Hradu zatlačena do politické bezvýznamnosti."
 POL_tighten_control: "Upevnit kontrolu"
 POL_tighten_control_desc: "Získali jsme ve městě dostatek příznivců, abychom mohli dále zpřísnit naši kontrolu, aniž bychom vyvolali občanské nepokoje. Díky tomu získáme lepší přístup k gdaňským zdrojům a budeme stále blíže k dosažení jednoty ve městě."
 POL_unification_propaganda: "Propagovat sjednocení"
 POL_unification_propaganda_desc: "Danzig je kulturně rozmanité město Poláků, Němců a nesčetných dalších menšin a nacistická strana se snaží tuto multikulturní spolupráci narušit. K obrácení menšin ve městě na naši stranu lze využít účinnou propagandu a slíbit jim rovnoprávnost, kvůli které by nacisté raději zemřeli, než aby jim ji poskytli."
