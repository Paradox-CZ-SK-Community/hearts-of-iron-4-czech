l_polish:
 6_month_timer_mughal_tt: "Budeme mít §Y255§! dní na vítězství v této válce, než decentralizovaná správa nabídne příměří."
 AFG_75_year_oil_concessions: "Nabídnout ropní koncese na 75 let"
 AFG_75_year_oil_concessions_desc: "Geologové v posledních letech objevili na našem území významné zásoby ropy. Postrádáme však průmyslovou kapacitu k jejich těžbě vlastními silami. Pokud bychom oslovili jednu z velmocí s oboustranně výhodnou dohodou, mohli bychom ropu těžit společně."
 AFG_75_year_oil_concessions_tt: "§YOdemkne rozhodnutí k těžbě ropných zdrojů na našem území ve spolupráci se zahraniční mocností.§!"
 AFG_accelerate_integration: "Posílit konfederaci"
 AFG_accelerate_integration_desc: "Konfederace, kterou nedávno vytvořili [ROOT.GetNonIdeologyName] a [PAK.GetNonIdeologyName], je mimořádně úspěšné. Nyní bychom však měli integrační proces ještě urychlit, abychom byli připraveni na cokoli, co nám svět postaví do cesty."
 AFG_adopt_nufus: "Zavést Nufus"
 AFG_adopt_nufus_desc: "Staletý systém verbování nepravidelných sil k obraně říše již splnil svůj účel a pravděpodobně by neobstál proti vpádu profesionálních nepřátelských jednotek. Proto jej musíme nahradit systémem formální branné povinnosti a výcviku."
 AFG_adopt_nufus_tt: "§ROdstraní rozhodnutí $AFG_quami_category$ a znemožní nábor nepravidelných divizí!§!"
 AFG_afghan_pakistan_cold_War: "Afghánsko-pákistánská studená válka"
 AFG_afghan_pakistan_cold_War_desc: "Přestože nás bolí být v rozporu s našimi příbuznými za hranicí, musíme si přiznat hrozbu, kterou pro nás nyní představují. Proto se musíme připravit je držet na uzdě všemi nezbytnými prostředky."
 AFG_against_kabul: "Proti Kábulu"
 AFG_against_kabul_desc: "Král Záhir a jeho strýcové jsou uzurpátoři trůnu a jejich nelegitimní režim musí být za každou cenu svržen."
 AFG_agreement_with_germany: "[GER.GetNameDef] nám pomůže"
 AFG_agreement_with_germany_desc: "V těchto neklidných časech musíme hledat silné a spolehlivé spojence, abychom si zajistili postavení dominantní moci v islámském světě. Obrátíme se proto na [GER.GetNameDef] a zjistíme jejich zájem o pakt vzájemné obrany."
 AFG_agreement_with_germany_tt: "\n\n§Y[GER.GetNameDefCap] bude ochotnější přijmout dohodu, pokud bude mít na nás názor vyšší než 50.§!"
 AFG_align_with_the_allies: "Přiklonit se ke Spojencům"
 AFG_align_with_the_allies_desc: "Navzdory množství křivd vůči Britům je musíme prozatím odložit stranou a usilovat o užší spolupráci se Spojenci. Jak říkají Britové, je lepší jednat s ďáblem, kterého známe."
 AFG_alliance_with_turkik_peoples: "Aliance s turkickými národy"
 AFG_alliance_with_turkik_peoples_desc: "V rámci našich strategických cílů na severu je nezbytné oslabit stávající mocenské struktury rozdmýcháváním nepokojů mezi turkickými národy v regionu. Využitím stávajících křivd a podporou nespokojenosti můžeme destabilizovat místní vlády a vytvořit příznivější prostředí pro naši expanzi."
 AFG_alliance_with_turkik_peoples_tt: "Odemkne rozhodnutí §Y[AFG_get_turkik_people_name_key]§! k šíření odbojových buněk v [SOU.GetAdjective] středoasijských státech. Státy, do nichž jsme zasahovali, se k nám připojí, pokud nám [SOU.GetNameDef] vyhlásí válku."
 AFG_ally_basmachi_remnants: "Spojit se se zbytky basmačů"
 AFG_ally_basmachi_remnants_desc: "Až do roku 1934 bojovali basmačové proti [SOV.GetAdjective] silám s cílem osvobodit Střední Asii od jejich tyranské vlády. Ačkoli bylo jejich hnutí potlačeno, některým vůdcům se podařilo uprchnout. Měli bychom se pokusit s těmito bojovníky za svobodu navázat kontakt a pozvat je na náš dvůr."
 AFG_ally_the_brahui_khanate: "Spojit se s Brahujským chanátem"
 AFG_ally_the_brahui_khanate_desc: "Chanát Kalát byl v pozdějších letech Durránské říše naším důležitým spojencem a výrazně nám pomohl ve vítězstvích nad Maráthskou konfederací. Měli bychom s nimi znovu navázat kontakt a zasadit úder následovníkům Maráthů!"
 AFG_ally_the_sikhs: "Spojit se se Sikhy"
 AFG_ally_the_sikhs_desc: "Sikhové jsou významnou náboženskou menšinou na indickém subkontinentu a jsou to obávaní bojovníci. Měli bychom jejich pomoc využít k ovládnutí regionu pro sebe."
 AFG_ally_the_young_afghans: "Spojit se s Mladými Afghánci"
 AFG_ally_the_young_afghans_desc: "Mladí Afghánci, vedení intelektuálem Mahmúdem Tarzím, ovlivnili bývalého Amanulláha Chána a stáli v čele reformního hnutí prosazujícího konstituční monarchii. Měli bychom obnovit kontakty s demokraticky smýšlejícími stoupenci Amanulláha a zajistit jejich podporu pro naši novou demokratickou vládu."
 AFG_alternative_partnerships: "Hledat alternativní partnerství"
 AFG_alternative_partnerships_desc: "Po desetiletí jsme si udržovali nezávislost pečlivým vyvažováním vlivu, který na naši zemi měli [ENG.GetNameDef] a [SOU.GetNameDef] vlivu. Nyní však do Velké hry vstoupil nový hráč a my musíme podle toho upravit svou strategii."
 AFG_anti_soviet_cooperation: "Protisovětská spolupráce"
 AFG_anti_soviet_cooperation_desc: "Není nouze o země, které si přejí omezit [SOU.GetAdjective] vliv. Měli bychom tuto příležitost využít k získání vojenských zkušeností od těchto států, abychom byli plně připraveni na budoucí [SOU.GetAdjective] expanzionismus."
 AFG_appraoch_anti_communist_theologians: "Oslovit protisovětské teology"
 AFG_appraoch_anti_communist_theologians_desc: "Mnozí muslimští učenci a teologové se shodují, že komunismus je zhoubou naší občanské společnosti. Bohužel [SOV.GetNameDef] tuto odpornou ideologii vnucuje našim bratřím ve Střední Asii a my musíme udělat vše, co je v našich silách, abychom tomuto šílenství učinili přítrž."
 AFG_approach_foreign_inteligence_services: "Oslovit zahraniční zpravodajské služby"
 AFG_approach_foreign_inteligence_services_desc: "Ležíme na křižovatce velmocí a dlouhodobě jsme byli vystaveni jejich velkým hrám. Pokud bychom vybudovali vlastní zpravodajskou službu, mohli bychom své jedinečné postavení využít k tomu, abychom naše sousedy hráli proti sobě."
 AFG_asymmetric_warfare: "Asymetrická válka"
 AFG_asymmetric_warfare_desc: "Zatímco se naši sousedé vzdávají svého dědictví ve jménu industrializace a stále větších armád, my je překonáme nekonvenčními taktikami a lepší znalostí terénu. Spolu s odhodláním našich vojáků tak odrazíme každého útočníka."
 AFG_axis_airforce: "Letectvo Osy"
 AFG_axis_airforce_desc: "Po úzké spolupráci s [GER.GetAdjective] letectvem věříme, že bychom mohli vybudovat vlastní funkční letecké síly podle jejich vzoru. Stačí nám k tomu potřebné vybavení."
 AFG_axis_equipment: "Výzbroj Osy"
 AFG_axis_equipment_desc: "Naše vojenské vybavení je změs nesourodých variant z mnoha zemí. S trochou pomoci, kterou nám může poskytnou [GER.GetNameDef], však konečně můžeme veškerou výzbroj sjednotit a zároveň modernizovat."
 AFG_biding_our_time: "Vyčkávat"
 AFG_biding_our_time_desc: "Dokud král Záhir Šáh vystupuje jako symbolická hlava státu, může vláda spravovat záležitosti bez obav z radikálních povstání, pokud si udrží podporu konzervativní většiny."
 AFG_bill_of_rights: "Listina práv"
 AFG_bill_of_rights_desc: "Náš lid si zaslouží kodifikovaný dokument svých práv před zákonem."
 AFG_can_core_once_controlled_tt: "Odemyká rozhodnutí, aby bylo možno udělat z nárokovaného území domovské, pokud bude zabráno"
 AFG_central_asian_unification: "Sjednocení Střední Asie"
 AFG_central_asian_unification_desc: "Díky naší pečlivé správě se Střední Asie proměnila z ekonomického zapadákova v rychle se rozvíjející průmyslovou velmoc. Společně vytvoříme novou socialistickou budoucnost pro všechny naše lidi."
 AFG_central_asian_unification_tt: "Odemkne rozhodnutí §Y$AFG_develop_central_asia_category$§! k získání domovských území na bývalých [SOU.GetAdjective] státech ve Střední Asii, které nám byly předány."
 AFG_chaki_dam: "Přehrada Čak"
 AFG_chaki_dam_desc: "S rostoucí poptávkou po elektřině musíme zajistit její stabilní dodávky. S pomocí zahraničních expertů bychom mohli na řece Čak vybudovat vodní elektrárnu, která by po léta zásobovala okolí včetně Kábulu."
 AFG_chromite_mines: "Vybudovat chromitové doly"
 AFG_chromite_mines_desc: "Chrom se v průmyslovém světě stává stále žádanějším zdrojem. Měli bychom zahájit těžbu vlastních chromitových ložisek pro export a získané bohatství využít k dalšímu rozvoji průmyslu."
 AFG_clear_malarial_swamps: "Odvodnit malarické bažiny"
 AFG_clear_malarial_swamps_desc: "Malárie zůstává pohromou mnoha oblastí země. Odvodněním míst, kde se množí paraziti přenášející malárii, můžeme zbavit venkovské obyvatelstvo historické křivdy a získat novou půdu pro rozvoj."
 AFG_communist_industrialization: "Komunistická industrializace"
 AFG_communist_industrialization_desc: "Po demontáži starých vládních mechanismů imperialistického režimu můžeme zahájit proces rychlé kolektivizace a industrializace, který přivede naši ekonomiku do 20. století."
 AFG_communist_propaganda: "Ministerstvo propagandy"
 AFG_communist_propaganda_desc: "Veškeré prostředky masové komunikace musí být podřízeny autoritě státu a využity k povznesení lidu v naší slavné dělnické republice."
 AFG_concessions_to_pashtuns: "Ústupky Paštunům"
 AFG_concessions_to_pashtuns_desc: "Paštunové tvoří většinu obyvatelstva a po staletí se řídí tradičním kodexem paštúnválí. Mnozí z nich se nyní obávají, že jejich způsob života je ohrožen. Tyto obavy by bylo možné zmírnit zapojením více paštunských nacionalistů a stoupenců paštúnválí do vlády."
 AFG_connect_the_cities: "[ROOT.GetNonIdeologyName]ský okruh"
 AFG_connect_the_cities_desc: "Ačkoli železnice bude pro náš dlouhodobý rozvoj klíčová, nelze přehlížet přínosy moderní silniční sítě mezi hlavními městy. Vybudováním okružní silnice můžeme konečně narušit ekonomický regionalismus, který naši ekonomiku dlouhodobě sužuje."
 AFG_constructing_a_national_identity_tt: "Po odebrání národního ducha §Y$AFG_constructing_a_national_identity_idea$§!:\n"
 AFG_contact_amanullah_loyalists: "Kontaktovat loajalisty Amanulláha"
 AFG_contact_amanullah_loyalists_desc: "Bývalý král $AFG_amunullah_khan$ nikdy formálně nepředal trůn nástupci, když byl nespravedlivě svržen chátrou. Musíme proto sjednotit ty, kteří mu zůstali věrní, a připravit [AFG.GetNonIdeologyName] na jeho nevyhnutelný návrat."
 AFG_contact_rural_loyalists: "Kontaktovat venkovské maliky"
 AFG_contact_rural_loyalists_desc: "[AFG.GetAdjectiveCap] elitu je snadné podplatit či ovlivnit. Běžný občan však nemá zájem o hmotné cetky ani politické sliby. Oslovením jejich tradičních hodnot a křivd je však můžeme získat na svou stranu."
 AFG_contact_rural_loyalists_tt: "§YVíce paštunských milicí se přidá na naši stranu v nadcházející občanské válce.§!"
 AFG_crackdown_on_nomadic_practices: "Zásah proti kočovným praktikám"
 AFG_crackdown_on_nomadic_practices_desc: "TODO"
 AFG_cross_border_ties: "Přeshraniční vazby"
 AFG_cross_border_ties_desc: "Povaha naší geografie znamená, že hranice jsou vždy propustné a rodiny se přes ně stěhují a usazují se na obou stranách. V průběhu generací to vedlo k silným mezilidským vazbám v sousedních zemích, které lze v době krize využít."
 AFG_cross_border_ties_tt: "Odemkne rozhodnutí §Y$AFG_cross_border_ties_category$§! k anexi nárokovaného území"
 AFG_crown_the_bukharan_emir: "Korunovat bucharského emíra"
 AFG_crown_the_bukharan_emir_desc: "Po zajištění území musí povstat nový vládce, který přijme titul emíra. Sayyid Mir Muhammad Alim Chán z Buchary pobývá v Kábulu již řadu let a je ideálním kandidátem, pokud chceme obnovit slávu velké Durránské říše."
 AFG_crown_the_golden_emir: "Korunovat zlatého emíra"
 AFG_crown_the_golden_emir_desc: "Po zajištění území musí povstat nový vládce, který přijme titul emíra. Mirzálí Chán Vazír se osvědčil na bojišti a není překvapením, že je nejoblíbenějším kandidátem. Pomůže nám znovu sjednotit Paštunistán a také sjednotit celý islámský svět."
 AFG_custail_pashtunwali_primacy: "Omezit nadřazenost paštúnválí"
 AFG_custail_pashtunwali_primacy_desc: "Tradiční morální kodex Paštunů, paštúnválí, nemá v novém králově státě místo. Bude přijata nová série zákonů, které upevní moc Paštunů a zároveň modernizují tento zastaralý soubor pravidel."
 AFG_darulaman: "Darulaman"
 AFG_darulaman_university: "Univerzita Darulaman"
 AFG_darulaman_university_desc: "Naše moderní město Darulaman se po přesunu vládních institucí rychle rozrůstá. Král si však přeje učinit z Darulaman velké centrum vzdělanosti založením nové univerzity se špičkovým zázemím."
 AFG_defending_democracy: "Bránit národ"
 AFG_defending_democracy_desc: "Ačkoli jsme ochránili vládu před vnitřními hrozbami, vždy budou existovat i hrozby za našimi hranicemi. Musíme zajistit, aby naše ekonomika dokázala v případě války plně podporovat ozbrojené síly."
 AFG_demand_pashtunistan_referendum: "Požadovat referendum o Paštunistánu"
 AFG_demand_pashtunistan_referendum_desc: "Paštunové tvoří většinu našeho národa, avšak mnozí zůstávají za hranicemi v sousedních státech. Musíme prosazovat nezávislost těchto oblastí, aby se Paštunové mohli dostat do naší sféry vlivu."
 AFG_development_in_taj: "Rozvíjet Tádžikistán"
 AFG_development_in_taj_desc: "Tádžikistán je pouhým stínem svého potenciálu. Po integraci do naší ekonomiky by se mohl stát cenným zdrojem hliníku a dalších klíčových surovin pro naše modernizační snahy."
 AFG_development_in_tms: "Rozvíjet Turkmenistán"
 AFG_development_in_tms_desc: "Ropa se stává klíčovým zdrojem moderní ekonomiky i armády. Průzkumníci naštěstí zjistili, že Turkmenistán oplývá tímto vzácným zdrojem, který jen čeká na těžbu."
 AFG_development_in_uzb: "Rozvíjet Uzbekistán"
 AFG_development_in_uzb_desc: "Uzbekistán byl dlouhodobě zanedbáván různými režimy, které jej ovládaly. Pokud si máme zajistit kontrolu, musíme tuto křivdu napravit a zvýšit rozvoj regionu a zároveň jej integrovat do naší ekonomiky."
 AFG_eastern_state_breakaway_tt: "§Y [1006.GetName] \n [1008.GetName] §!"
 AFG_education_for_women_and_girls: "Vzdělání pro ženy a dívky"
 AFG_education_for_women_and_girls_desc: "Král a jeho manželka chápali význam vzdělávání žen a dívek namísto jejich odsouzení k životu domácí služby. Po jeho svržení byly tyto reformy zrušeny. Nyní tuto nespravedlnost napravíme."
 AFG_electrification: "Elektrifikační iniciativy"
 AFG_electrification_desc: "Inovace v průmyslu, komunikaci i vedení války jsou stále více závislé na elektřině. Musíme proto zajistit, ať je [ROOT.GetNonIdeologyName] schopen využívat nové technologické pokroky rozšířením elektrifikace."
 AFG_electrification_tt: "\n§YElektrifikace se bude v průběhu času šířit z Kábulu směrem ven, přičemž každé dva měsíce získá jeden nový domovský stát tento modifikátor.§!"
 AFG_emerging_economy: "Vznikající ekonomika"
 AFG_encourage_jezail_production: "Podpořit místní výrobu džezajlů"
 AFG_encourage_jezail_production_desc: "Džezajly jsou již po dlouhou dobu oblíbenou zbraní paštunských kmenů díky své levné výrobě a během anglo-afghánských válek nám prokázaly velkou službu. Měli bychom kmeny povzbudit, aby v této tradici pokračovaly, a umožnily nám tak vycvičit více branců."
 AFG_enforce_the_pashtunwali: "Vynucovat paštúnválí"
 AFG_enforce_the_pashtunwali_desc: "Ačkoli jsou psané zákony paštúnválí v mnoha ohledech zastaralé, je stále nutné je zachovat, aby byla zajištěna paštunská dominance ve vnitřní politice. Nejzastaralejší části mohou být upraveny, avšak systém jako celek zůstane zachován po celé generace."
 AFG_enforce_western_attire: "Vynucovat západní oděv"
 AFG_enforce_western_attire_desc: "Král a jeho nejbližší okolí nejsou příliš nadšeni tradičním oděvem, kterého se drží většina obyvatelstva. Vnímají jej jako symbol zaostalé společnosti, a proto chtějí zadat výstavbu textilní továrny a přijmout nové zákony, které prosadí nošení západního oděvu."
 AFG_establish_camelry_regiments: "Zřídit velbloudí pluky"
 AFG_establish_camelry_regiments_desc: "Velbloudi jsou odolná zvířata a pokud chceme zajistit, aby naše armáda byla schopna operovat v pouštích i horách, musíme se přizpůsobit. S pomocí velbloudích jednotek budeme schopni bojovat v jakémkoli terénu, včetně oblastí, kam se naši nepřátelé neodváží."
 AFG_establish_darulaman: "Založit Darulaman"
 AFG_establish_darulaman_desc: "Darulaman měl být nově plánovaným městem, které by nahradilo Kábul jako [AFG.GetAdjective] hlavní město. Po svržení krále byly práce na městě pozastaveny. Nyní můžeme projekt dokončit a učinit z něj maják modernity."
 AFG_establish_naval_bases: "Zřídit nové námořní základny"
 AFG_establish_naval_bases_desc: "Založením naší první námořní základny, která bude zásobovat lodě podél nově osvobozeného pobřeží, můžeme zahájit namáhavý proces budování vlastního námořnictva."
 AFG_establish_naval_bases_tt: "Přidá §G1§! §Ynámořní základnu§! v náhodném pobřežním státě"
 AFG_establish_radio_networks: "Modernizovat Rádio Kábul"
 AFG_establish_radio_networks_desc: "Rádio Kábul bylo založeno ve 20. letech a dnes používá již zastaralé vybavení. Měli bychom investovat do modernizace jeho vysílací techniky, abychom zajistili, že vláda bude mít přímý komunikační kanál k co největší části obyvatelstva."
 AFG_expand_academy: "Rozšířit vojenskou akademii"
 AFG_expand_academy_desc: "S rozšiřováním profesionálnější armády roste i potřeba dobře vycvičených důstojníků. Vybudování národní armádní akademie je rozumným krokem k zajištění potřebného velení a odbornosti pro obranu našich hranic."
 AFG_expand_academy_tt: "Naverbuje §Ydva§! náhodné §Ygenerály§!"
 AFG_expand_border_guards: "Rozšířit pohraniční stráž"
 AFG_expand_border_guards_desc: "Měli bychom pohraniční policii vycvičit v základním vedení boje, aby mohla v době krize převzít větší odpovědnost a ulevit pravidelným ozbrojeným silám."
 AFG_expand_equipment_purchases: "Rozšířit nákupy vybavení"
 AFG_expand_equipment_purchases_desc: "Naše ozbrojené síly jsou stále více závislé na vybavení přesahujícím jednoduché pušky a granáty. Pokud mají zůstat věrohodnou silou, musíme co nejdříve pořídit více podpůrného vybavení."
 AFG_expand_kabul_university: "Rozšířit Kábulskou univerzitu"
 AFG_expand_kabul_university_desc: "Potřebu profesionálních inženýrů, lékařů a učitelů již nelze uspokojovat pouze vysíláním studentů do zahraničí. Musíme investovat do vlastních institucí a vychovat novou generaci domácích odborníků."
 AFG_expand_kabul_university_tt: "§RRozšiřování vysokého školství povede k radikalizaci absolventů, pokud ekonomika neporoste natolik, aby jim nabídla pracovní místa!§!"
 AFG_expand_karakul_lambskin_industry: "Rozšířit průmysl karakulské jehnětiny"
 AFG_expand_karakul_lambskin_industry_desc: "Výrobky z karakulské jehnětiny patří k nemnoha produktům, které [ROOT.GetNonIdeologyName] vyváží ve velkém množství. Můžeme toho využít k rozšíření našeho vznikajícího průmyslu vybudováním továren na zpracování a export těchto výrobků."
 AFG_expand_quami_template: "Reformovat Kaumí"
 AFG_expand_quami_template_2_tt: "Pokud jsme vyzkoumali §Y$tech_engineers$, $tech_military_police$ nebo $tech_field_hospital$§!, budou přidány do šablony."
 AFG_expand_quami_template_desc: "Systém Kaumí nám v průběhu let bezpochyby dobře sloužil, avšak existuje prostor pro zlepšení. Restrukturalizací jednotek při jejich vytváření budou schopny lépe bránit [AFG.GetNonIdeologyName]."
 AFG_expand_quami_template_tt: "Přidá §Y3§! prapory nepravidelných jednotek do šablony §YPashtun Levy§!."
 AFG_expand_royal_guard: "Rozšířit královskou gardu"
 AFG_expand_royal_guard_desc: "Královská garda představuje elitu našich ozbrojených sil a odpovídá tomu i její výcvik a odbornost. Nicméně s tím, jak naši sousedé upadají do konfliktů, se objevují obavy ohledně jejího omezeného počtu."
 AFG_expand_standing_army: "Rozšířit stálou armádu"
 AFG_expand_standing_army_desc: "Abychom porazili nepřátele a zajistili si nezávislost, naše armáda musí být nejen účinná, ale i početná. Měli bychom proto rozšířit brannou povinnost a naverbovat více mužů do našich řad."
 AFG_expand_state_education: "Rozšířit státní školství"
 AFG_expand_state_education_desc: "TODO"
 AFG_expand_state_run_factories: "Rozšířit státní továrny"
 AFG_expand_state_run_factories_desc: "Po letech zanedbávání ze strany předchozího režimu je čas nastartovat ekonomickou modernizaci země založením nových státních továren vyrábějících spotřební i vojenské zboží."
 AFG_expand_telegraph_network: "Rozšířit telegrafní síť"
 AFG_expand_telegraph_network_desc: "[ROOT.GetNonIdeologyName] zaostává za svými sousedy v celé řadě ekonomických ukazatelů. Prvním krokem k modernizaci ekonomiky je zlepšení komunikace mezi našimi městy a sousedy rozšířením telegrafní sítě."
 AFG_expand_the_kings_powerbase: "Rozšířit královu mocenskou základnu"
 AFG_expand_the_kings_powerbase_desc: "Mladý král Záhir Šáh je pro lid spíše symbolickou postavou, zatímco jeho strýcové drží nejmocnější vládní posty. Král je však stále více frustrován jejich zpátečníckým myšlením a přeje si vybudovat podporu pro progresivnější režim."
 AFG_expand_the_madrasas: "Rozšířit medresy"
 AFG_expand_the_madrasas_desc: "Abychom lépe kontrolovali obyvatelstvo a učili jej způsobům, jakými má žít, měli bychom navýšit financování muslimských vzdělávacích institucí v naší zemi."
 AFG_expel_allied_nationals: "Vyhostit státní příslušníky Spojenců"
 AFG_expel_allied_nationals_desc: "Mocnosti Osy nám předložily sporné důkazy, že našemu režimu hrozí svržení ze strany Spojenců. Tvrdí, že jediným způsobem, jak tomu zabránit, je vyhostit všechny občany spojeneckých států a tím odhalit jejich špiony v zemi."
 AFG_expel_axis_nationals: "Vyhostit státní příslušníky Osy"
 AFG_expel_axis_nationals_desc: "Spojenci nás obviňují z nadržování jejich nepřátelům kvůli tomu, že [ROOT.GetNonIdeologyName] představuje pro občany válčících států volné pole působnosti. Ačkoli existuje jen málo důkazů o jejich záškodnické činnosti, měli bychom Spojence uklidnit tím, že těmto lidem nařídíme opustit zemi po dobu současného globálního konfliktu."
 AFG_exploit_turko_persian_heritage: "Využít turko-perské dědictví"
 AFG_exploit_turko_persian_heritage_desc: "Naše země byla po staletí silně ovlivňována jak perskou, tak tureckou kulturou. Měli bychom tento fakt postavit do popředí naší politiky a vytvořit novou turko-perskou identitu, kterou lze využít k posílení pocitu jednoty s našimi sousedy."
 AFG_exploit_turko_persian_heritage_tt: "Odemkne rozhodnutí §Y$AFG_turko_persian_heritage_category$§! k pozvání zemí do naší frakce nebo k získání válečných cílů proti nim."
 AFG_extend_a_hand_to_tokyo: "Podat ruku Tokiu"
 AFG_extend_a_hand_to_tokyo_desc: "Díky pomoci [JAP.GetAdjective] sil se nám podařilo zvítězit v boji o Afghánistán. Nyní, když se [JAP.GetNameDef] snaží sjednotit a osvobodit Asii, by bylo rozumné se na ně znovu obrátit."
 AFG_eyes_on_the_north: "Pohled na sever"
 AFG_eyes_on_the_north_desc: "Oblasti na našem severu jsou bohaté na suroviny, které naši protivníci dosud plně nevyužili. Je nezbytné, abychom zahájili přípravy na možnou expanzi do těchto regionů. Posílení vojenské přítomnosti a zajištění zásobovacích tras bude klíčovým krokem."
 AFG_fascist_cw_is_over: "Amanulláhovo povstání je u konce. (Fašisté svrhli vládu a zvítězili v občanské válce.)"
 AFG_follower_of_islam: "Následovník islámu"
 AFG_follower_of_islam_desc: "Islám stojí v jádru naší víry již více než tisíc let a měli bychom zajistit, aby se náš vůdce řídil jeho zásadami a vedl náš národ k nové zlaté éře."
 AFG_foreign_influence_tt: "Přidá §Y[PREV.GetIdeologyNameWithCaps] na vzestupu§!, který poskytuje (Denní podpora pro [PREV.GetRulingIdeology] ideologii: §G+0.02§!)"
 AFG_foreign_military_advisors: "Pozvat zahraniční vojenské poradce"
 AFG_foreign_military_advisors_desc: "Abychom naši armádu vycvičili podle moderních standardů, bude nejrychlejším řešením pozvat poradce ze západních zemí. Pomohou vycvičit novou generaci [ROOT.GetAdjective] mužů pro boj na neustále se vyvíjejícím bojišti."
 AFG_forge_a_national_identity: "Vytvořit národní identitu"
 AFG_forge_a_national_identity_desc: "Naši lidé se nevnímají jako Afghánci, ale spíše jako příslušníci jednotlivých kmenů a národností. Měli bychom usilovat o zavedení paštštiny a darí jako státních jazyků a jednoho dne snad dokážeme sjednotit lid pod jednotnou afghánskou národní identitou."
 AFG_form_the_khuddamul_furqan: "Založit Chuddám al-Furkán"
 AFG_form_the_khuddamul_furqan_desc: "Abychom posílili legitimitu nové vlády, musíme založit řádnou politickou stranu pod vedením Zlatého emíra. Jediná přijatelná loajalita je ke Chuddám al-Furkán a pouze tato strana přinese lidu spásu."
 AFG_form_the_turkestan_legion: "Zformovat Turkestánskou legii"
 AFG_form_the_turkestan_legion_desc: "Mnozí jsou ochotni bojovat proti komunismu i na globální úrovni. Měli bychom zorganizovat turkické protikomunistické dobrovolnické jednotky, které budou bojovat až do hořkého konce proti silám, jež se staví proti islámu."
 AFG_form_the_turkestan_legion_tt: "Odemkne rozhodnutí §Y$AFG_turkestan_legion_cat$§! k náboru divizí z celého turkického světa."
 AFG_fortify_pakistan: "Opevnit hranici"
 AFG_fortify_pakistan_desc: "Je nezbytné zajistit naše nově rozšířené hranice. Vybudování série opevnění a obranných postavení zajistí stabilitu a bezpečnost našeho území a zároveň nám poskytne silnou pozici pro projekci vojenské moci v případě vypuknutí konfliktu."
 AFG_fortify_pakistan_tt: "Státy podél [RAJ.GetAdjective] hranice, které jsme získali v předchozím zaměření, obdrží §G2§! §Ypozemní pevnosti§!"
 AFG_from_the_ashes: "Z popela"
 AFG_from_the_ashes_desc: "Po rozpadu Osmanské říše vzniklo v islámském světě mocenské vakuum. Nyní, když jsou velmoci opět zaměstnány globálním konfliktem, máme příležitost prosadit se jako přední mocnost islámského světa."
 AFG_fruit_packing: "Zpracování ovoce"
 AFG_fruit_packing_desc: "[ROOT.GetAdjectiveCap] obyvatelé jsou schopní zemědělci a měli bychom využít případné přebytky jejich produkce balením pro export. K tomu musíme vybudovat další průmyslová zpracovatelská zařízení."
 AFG_future_of_balochistan: "Budoucnost Balúčistánu"
 AFG_future_of_balochistan_desc: "Přestože v současnosti spolupracujeme se Spojenci, musíme uvažovat o dlouhodobé politice v našem regionu. Měli bychom proto usilovat o nezávislý Balúčistán, který budeme moci ovlivňovat, dříve než jej pohltí větší stát."
 AFG_gain_religious_support_for_reforms: "Ten, kdo důvěřuje Bohu"
 AFG_gain_religious_support_for_reforms_desc: "Mezi lidmi roste obava, že mladý král Záhir Šáh využije nově nabytou autoritu k prosazení drastických reforem, které naruší jejich způsob života. Abychom tyto obavy rozptýlili, získáme podporu mulláhů a prokážeme královu oddanost islámu."
 AFG_gant_refuge_to_jadidists: "Poskytnout azyl džadídistům"
 AFG_gant_refuge_to_jadidists_desc: "[SOV.GetNameDef] tvrdě potlačuje islámské modernisty a reformátory z džadídistického hnutí a mnozí bývalí členové Mladých Bucharanů a Mladých Chivanů jsou terčem čistek, které rozpoutal [SOV.GetLeader]. Bylo by moudré jim poskytnout útočiště v naší zemi a zároveň jim umožnit přinést k nám některé z jejich demokratických ideálů."
 AFG_graveyard_of_empires: "Hřbitov říší"
 AFG_graveyard_of_empires_desc: "Říše přicházejí a odcházejí, ale náš lid zůstává nesporným pánem tohoto regionu. Dokud zůstaneme jednotní a spojeni se svým dědictvím, [ROOT.GetNonIdeologyName] se stane pro jakéhokoliv agresora jeho skutečným hrobem."
 AFG_hold_a_loya_jirga: "Svolat Lója džirga"
 AFG_hold_a_loya_jirga_desc: "Měli bychom přesvědčit krále Záhira, aby svolal setkání kmenových a náboženských vůdců země, na němž můžeme zpochybnit jeho legitimitu a získat větší podporu pro naše rostoucí povstání."
 AFG_hold_a_loya_jirga_tt: "Po zahájení §Y[ROOT.GetAdjectiveCap] občanské války§! získá protistrana následující bonusy na §G180§! dní:"
 AFG_hold_elections: "Uspořádat volby"
 AFG_hold_elections_desc: "Jak se situace v zemi uklidňuje, [AFG.GetNonIdeologyName] má příležitost konečně uspořádat první svobodné volby."
 AFG_hold_elections_tt: "§YNásledující volební událost nám umožní zvolit nového vůdce země.§!"
 AFG_hone_the_shamshir: "Nabrousit šamšír"
 AFG_hone_the_shamshir_desc: "Šamšír, symbol síly a vzdoru, musí být nabroušen pro nadcházející bitvy. Modernizací našich sil a zdokonalením strategií zajistíme, že [ROOT.GetNameDef] se připraví ke zasazení rozhodujícího úderu, jakmile nastane správný okamžik."
 AFG_hot_war_with_pakistan: "Zničit Pákistán"
 AFG_hot_war_with_pakistan_desc: "[PAK.GetNonIdeologyName] se snaží rozdělit náš lid a udržet nás ve vzájemných sporech, zatímco [SOU.GetNameDef] a [RAJ.GetNameDef], naše skutečné hrozby, dále sílí. Musíme tento domýšlivý režim odstranit dříve, než uvrhne celý náš lid pod jho další mocnosti."
 AFG_ideology_on_the_rise_flipped_tt: "§R\n\n[THIS.GetNameDefCap] může chtít zaútočit na [ROOT.GetNameDef], pokud nad námi získá příliš velký vliv jiná země! (Pokud je jiná ideologie než Nezařazená nebo [THIS.GetIdeologyNameWithCaps] vyšší než 40 %, [THIS.GetNameDef] nás může napadnout!)§!"
 AFG_ideology_on_the_rise_tt: "§R\n\nVelmoci, které mají jinou ideologii než [THIS.GetNameDef], mohou chtít napadnout [ROOT.GetNameDef], pokud jejich vliv nad námi příliš vzroste! (Pokud [THIS.GetIdeologyNameWithCaps] překročí 40 %, ostatní mocnosti nás mohou napadnout!)§!"
 AFG_implement_currency_controls: "Da Afghanistan Bank"
 AFG_implement_currency_controls_desc: "Naše ekonomika postrádá silný finanční sektor, který by dokázal podporovat hospodářský rozvoj země. Měli bychom proto ve spolupráci se soukromým sektorem založit společnou banku, která bude poskytovat služby našim vznikajícím odvětvím a podnikům."
 AFG_increase_agricultural_exports: "Zvýšit zemědělský export"
 AFG_increase_agricultural_exports_desc: ""
 AFG_increase_air_purchases: "Rozšířit nákupy letectva"
 AFG_increase_air_purchases_desc: "Naše letectvo rychle získává schopnost odradit nebo zničit zahraniční letouny vstupující do našeho vzdušného prostoru. Postrádáme však schopnost promítat sílu na pozemní cíle. Měli bychom proto zahájit investice do vlastních bombardovacích letek."
 AFG_increase_land_and_animal_taxes: "Zvýšit daně z půdy a dobytka"
 AFG_increase_land_and_animal_taxes_desc: "Venkovské obyvatelstvo přispívá k hospodářské vitalitě země jen málo a samozásobitelské zemědělství jim umožňuje vyhýbat se většině forem zdanění. Abychom podpořili modernější zemědělské postupy, zavedeme nové daňové politiky, které je donutí usilovat o vyšší zisky, pokud chtějí uživit své rodiny."
 AFG_infrastructure_construction: "Investice do infrastruktury"
 AFG_infrastructure_construction_desc: "Nedostatek infrastruktury napříč zemí brzdí hospodářský rozvoj a ponechává obyvatelstvo spokojené s životem podle staletých tradic. Takový přístup není v dlouhodobém zájmu státu a musí být napraven investicemi do infrastrukturních projektů."
 AFG_instate_a_compulsory_jizya: "Zavést povinnou džizju"
 AFG_instate_a_compulsory_jizya_desc: "Práva nemuslimů byla za staré správy přísně vymezena. Nastal čas tyto záležitosti upravit pro moderní svět a prokázat všem našim subjektům, že jsme osvícenou říší."
 AFG_integrate_tajik_and_uzbek_republics: "Obránce Střední Asie"
 AFG_integrate_tajik_and_uzbek_republics_desc: "Prokázali jsme, že jsme pro [SOU.GetNameDef] neocenitelným přínosem. Je tedy spravedlivé požadovat za naše úsilí územní ústupky. To by zároveň pomohlo uklidnit nepaštunské menšiny na severu."
 AFG_integrate_tajik_and_uzbek_republics_tt: "Pokud §Y[SOU.GetName]§! souhlasí s návrhem:"
 AFG_integrate_the_basmachi_movement: "Integrovat basmačské hnutí"
 AFG_integrate_the_basmachi_movement_desc: "Až do roku 1934 bojovali basmačové proti [SOV.GetAdjective] silám s cílem osvobodit Střední Asii od jejich tyranské vlády. Ačkoli bylo jejich hnutí z velké části rozdrceno, některým vůdcům se podařilo uniknout. Měli bychom se pokusit navázat kontakt s těmito bojovníky za svobodu a pozvat je na náš dvůr."
 AFG_international_brigades: "Mezinárodní brigády"
 AFG_international_brigades_desc: "Navzdory statečným obětem našich mužů se válka nevyvíjí v náš prospěch. Můžeme však zvrátit průběh otevřením náboru mezinárodním dobrovolníkům, kteří touží bojovat proti útlaku."
 AFG_into_the_plains_of_india: "Do nížin [RAJ.GetNonIdeologyName]"
 AFG_into_the_plains_of_india_desc: "Nastal čas, aby se náš lid prosadil jako pán indického subkontinentu. Učiníme to, co kdysi naši předkové - sejdeme z hor, zatímco jsou slabí - tentokrát však zůstaneme."
 AFG_introduce_national_service: "Zavést národní službu"
 AFG_introduce_national_service_desc: "Národy kolem nás se řítí do konfliktu a není zaručeno, že se vyhneme tomu, abychom byli vtaženi do tohoto víru. Abychom byli na takovou eventualitu připraveni, zavedeme formu národní služby, která posílí ozbrojené síly."
 AFG_invite_foreign_corporations: "Pozvat zahraniční korporace"
 AFG_invite_foreign_corporations_desc: "V průmyslu nadále zaostáváme za ostatními státy, což se projevuje nízkou domácí výrobou zbraní. Abychom to zvrátili a modernizovali průmysl, pozveme korporace z celého světa, aby zde zahájily svou činnost."
 AFG_invite_the_mughal_prince: "Pozvat mughalského prince"
 AFG_invite_the_mughal_prince_desc: "Po zajištění území musí povstat nový vládce, který převezme Tímúrovo dědictví. Ať už krví, zásluhami či silou vůle, naše volba určí budoucnost říše. Měli bychom proto pozvat mughalského prince, který v současnosti pobývá v Indii, aby usedl na náš trůn."
 AFG_invite_waziristan_rebels: "Pozvat povstalce z Vazíristánu"
 AFG_invite_waziristan_rebels_desc: "Fakír z Ipi a jeho milice laškarů vedou aktivní boj proti [RAJ.GetAdjective] úřadům v severozápadních provinciích. Měli bychom jim pomoci překročit naše hranice a vybudovat pro ně mocenskou základnu ve východních regionech, aby se jednou mohli vrátit do Vazíristánu silnější než kdy dříve."
 AFG_invite_waziristan_rebels_tt: "Po zahájení §Y[ROOT.GetAdjective] občanské války§! získáme dodatečného §G+10 000§! personálu"
 AFG_iron_mines: "Rozšířit doly na měď a cín"
 AFG_iron_mines_desc: "Cín, měď a železo jsou nezbytné pro výrobu mnoha moderních potřeb. Pokud se máme rozvinout v industrializovaný stát, musíme vybudovat a zajistit vlastní přístup k těmto surovinám. Naštěstí máme dostatek dosud nevyužitých ložisek."
 AFG_islamic_republic_idea: "Islámská demokracie"
 AFG_join_axis: "Připojit se k Ose"
 AFG_join_axis_desc: "Ačkoli jsme se dosud vyhýbali zapojení do velkého konfliktu, plné nasazení ve prospěch Osy nabízí mnoho příležitostí. Požádáme proto o plnoprávné členství ve frakci."
 AFG_kabul_conference: "Kábulská konference"
 AFG_kabul_conference_desc: "Po desetiletích bojů, kdy nás svírali [ENG.GetNameDef] a [SOU.GetNameDef], nyní máme příležitost stanout po boku vládců nového světového řádu a nárokovat si to, co nám právem náleží."
 AFG_kabul_conference_tt: "Odemkne rozhodnutí §Y$AFG_kabul_conference_category$§! ke snížení ceny cílových států v §YIndii, Střední Asii, Íránu a na Blízkém východě§! během mírových konferencí, pokud naše frakce zvítězí."
 AFG_kajaki_dam: "Zřídit správu údolí Hilmandu"
 AFG_kajaki_dam_desc: "Měli bychom se inspirovat Úřadem pro údolí Tennessee v USA a založit obdobnou instituci pro údolí řeky Hilmand. Organizace by měla na starosti hospodářský rozvoj oblasti ku prospěchu národní ekonomiky. Musíme však dbát na to, abychom nevyprovokovali západní sousedy změnami toku řeky."
 AFG_kajaki_dam_tt: "\n§RPokud s námi [414.OWNER.GetNameDef] nenajde společnou řeč prostřednictvím následujícího řetězce události, může to vést k válce!§!"
 AFG_khorasan_buffer_state: "Zřídit chórásánský nárazníkový stát"
 AFG_khorasan_buffer_state_desc: "S tím, jak nám již [PER.GetNameDef] v podstatě nemůže nic udělat, musíme se zaměřit na budoucnost. Kvůli historickému napětí a naší účasti v operaci Countenance bychom měli usilovat o vytvoření nárazníku mezi námi a případně mstivou [PER.GetAdjective] vládou."
 AFG_khorasan_buffer_state_tt: "§YZřídíme loutkovou vládu Chórásánu v následujících státech, pokud je ovládáme:\n [1004.GetName]\n [416.GetName]\n [1003.GetName]§!"
 AFG_khyber_pass_riflining: "Drážkování z Chajbarského průsmyku"
 AFG_khyber_pass_riflining_desc: "Domácí dílny podél Chajbarského průsmyku vyrábějí již po desetiletí kopie zahraničních zbraní. Jejich kvalita je sice nižší, ale vynahrazují to množstvím. Možná nastal čas investovat do regionu a vyvinout domácího výrobce zbraní pro naše ozbrojené síly."
 AFG_linchpin_of_global_defense: "Klíčový pilíř globální obrany"
 AFG_linchpin_of_global_defense_desc: "Spojenci nadále vnímají naši loajalitu jako přínos pro své geopolitické postavení vůči společným protivníkům. Měli bychom toho využít a zajistit větší investice do vojenské infrastruktury, které budou vzájemně výhodné."
 AFG_look_to_other_partners: "Obrátit se na jiné partnery"
 AFG_look_to_other_partners_desc: "Naše obchodní dohody se Sovětským svazem vyvolaly podezření z ovlivňování naší domácí a zahraniční politiky. Tato obvinění jsou samozřejmě nepravdivá, nicméně by pro nás mohlo být výhodné poohlédnout se po jiných obchodních partnerech."
 AFG_look_to_other_partners_tt: "[ROOT.GetNameDef] umožní velmocem investice, čímž obdržíme §Gjednu mimo-mapovou civilní továrnu za každou zemi, která souhlasí§! výměnou za §Rovlivňování naší politiky po dobu jednoho roku.§!"
 AFG_maintain_neutrality: "Zachovat neutralitu"
 AFG_maintain_neutrality_desc: "Navzdory relativní vnitřní stabilitě je globální situace stále nebezpečnější. Než budeme proti své vůli zataženi do konfliktů, musíme všem jasně dát najevo, že zůstáváme neutrální zemí."
 AFG_maintain_quami: "Zachovat Kaumí"
 AFG_maintain_quami_desc: "Systém odvodů Kaumí je po staletí základním kamenem naší obrany. Proč bychom měli zahazovat systém zakořeněný v tradici, který by jeho zrušení prospělo pouze městské elitě v metropoli?"
 AFG_maintain_quami_tt: "§YZachová rozhodnutí $AFG_quami_category$ a schopnost verbovat další nepravidelné divize.§!"
 AFG_militia_cavalry: "Katganská jízda"
 AFG_militia_cavalry_desc: "[ROOT.GetNameDefCap] je domovem řady koňských plemen vyšlechtěných pro drsný terén země. Ta lze využít v jezdeckých brigádách namísto investic do drahého zahraničního vybavení, které je náchylné k poruchám a vyžaduje rozsáhlou podporu."
 AFG_ministry_of_supply: "Ministerstvo zásobování"
 AFG_ministry_of_supply_desc: "Zásobovací linie armády prakticky neexistují. Ke zlepšení situace zřídíme nové ministerstvo, které bude zajišťovat veškeré zásobování ozbrojených sil a kritické infrastruktury."
 AFG_modern_economy: "Moderní ekonomika"
 AFG_modern_economy_desc: "Konečně jsme se zbavili okovů zastaralých hospodářských praktik, které po staletí brzdily náš lid. Nyní můžeme skutečně stát po boku ostatních průmyslových zemí světa."
 AFG_modifiy_1923_constitution_modifier_tt: "Upravit §Y$AFG_1923_constitution_modifier$§! o:\n"
 AFG_modifiy_amanullah_insurrection_modifier_tt: "Upravit §Y$AFG_amanullah_insurection_modifier$§! o:\n"
 AFG_modifiy_look_to_the_past_modifier_tt: "Upravit §Y$AFG_look_to_the_past_modifier$§! o:\n"
 AFG_mohammed_daoud_khan_available_as_general_tt: "§Y$AFG_mohammed_daoud_khan$§! se stane dostupným jako generál §Y2.§!úrovně"
 AFG_mountain_training: "Horský výcvik"
 AFG_mountain_training_2: "Ovládnout hory"
 AFG_mountain_training_2_desc: "Po úspěchu našeho horského výcviku je zřejmé, že bychom měli pokračovat ve vytváření specializovaných bojových jednotek pro tento terén."
 AFG_mountain_training_desc: "Nové technologie a taktiky přicházejí a odcházejí, avšak hory a údolí zůstávají neměnné. Namísto snahy držet krok s technologiemi sousedů bychom se měli soustředit na využití okolní krajiny k získání taktické výhody."
 AFG_naval_academy: "Zřídit námořní akademii"
 AFG_naval_academy_desc: "Naše historická absence pobřeží znamená i naprostý nedostatek důstojníků s námořními zkušenostmi. Musíme proto založit námořní akademii a pokusit se přilákat důstojníky ze zahraničí k výcviku první generace [AFG.GetAdjective] námořníků."
 AFG_naval_academy_tt: "Naverbuje §Ydva§! náhodné §Yadmirály§!"
 AFG_new_army: "Stálá armáda"
 AFG_new_army_desc: "Navzdory přetrvávajícímu odporu venkovského obyvatelstva vůči vojenským reformám musíme pokračovat a zavést rozsáhlý výcvikový program pro nejnovější ročník branců."
 AFG_nufus_intro_tt: "Upravit §Y$AFG_nufus_modifier$§! o:"
 AFG_occupy_peshawar_tt: "§RToto může vést k válce s vlastníkem [442.GetName]!§!"
 AFG_occupy_waziristan_tt: "§RToto může vést k válce s vlastníkem [987.GetName]!§!"
 AFG_officer_training: "Výcvik důstojníků"
 AFG_officer_training_desc: "[GER.GetAdjectiveCap] armáda se ukázala být více než vyrovnaným protivníkem pro [ENG.GetAdjective] či [SOU.GetAdjective] síly. Měli bychom požádat o podporu jejich důstojníků při výcviku nové generace [ROOT.GetAdjective] vojáků."
 AFG_officialize_the_turkish_afghan_defense_treaty: "[TUR.GetAdjectiveCap]-[ROOT.GetAdjective] obranná smlouva"
 AFG_officialize_the_turkish_afghan_defense_treaty_desc: "Od roku 1933 pomáhají turečtí vojenští pracovníci s výcvikem nové generace afghánských vojáků. Nastal čas tyto vazby využít a požádat o obrannou smlouvu, v níž bychom se vzájemně zavázali chránit před cizí agresí."
 AFG_parliamentary_democracy: "Parlamentní demokracie"
 AFG_parliamentary_democracy_desc: "Politické přesvědčení krále Záhira Šáha začíná po letech ve stínu strýců vycházet najevo. Je zřejmé, že by král podpořil přechod k parlamentní demokracii, pokud by mezi lidmi existovala dostatečná podpora. Takto radikální změna by však mohla uvrhnout zemi do občanské války s tradičně smýšlejícími oblastmi mimo metropoli."
 AFG_parliamentary_democracy_tt: "§YPokud je demokratická podpora vyšší než 50 %, vyhneme se vyvolání občanské války.§!"
 AFG_pashtun_empire: "Vzestup Paštunistánu"
 AFG_pashtun_empire_desc: "Dnešek se zapíše do dějin našeho národa. [ROOT.GetLeader] slavnostně vyhlašuje vznik Paštunské hegemonie a počátek nové éry paštunského lidu. Díky modernizované armádě, strategickým aliancím a ambiciózním politikám jsme upevnili své postavení jako dominantní regionální mocnost."
 AFG_permit_axis_airbases: "Povolit letecké základny Osy"
 AFG_permit_axis_airbases_desc: "Naši přátelé v [GER.Capital.GetCapitalVictoryPointName] mají potíže nasadit letectvo tak daleko od domova. Můžeme jim v tom pomoci a zároveň získat užitečnou infrastrukturu a know-how."
 AFG_placeholder_1: "Zajistit německé investice"
 AFG_placeholder_1_desc: "Po staletích nepřátelství a konfliktů pro nás není [ENG.GetNameDef] ani [SOU.GetNameDef] někdo, koho můžeme považovat za přítele. Sílící [GER.GetName] nám však nabízí příležitost získat ideově bližšího mezinárodního partnera."
 AFG_political_events_53_tt: "§Y[GER.GetNonIdeologyName] nám dodá zbraně a vyšle dobrovolníky na naši pomoc po vypuknutí občanské války.§!"
 AFG_prepare_for_operation_countenance: "Připravit se na operaci Countenance"
 AFG_prepare_for_operation_countenance_desc: "Spojenci se chystají udeřit na [PER.GetName], aby si zajistili ropu dříve, než se k ní dostanou naši nepřátelé. Musíme provést logistické přípravy k podpoře intervence a splnit svou úlohu v nadcházející operaci."
 AFG_prepare_the_war_industries: "Připravit válečný průmysl"
 AFG_prepare_the_war_industries_desc: "Současný průmysl postrádá kapacitu pro válečnou výrobu. Abychom se vyhnuli převálcování sousedními státy, musíme přesměrovat továrny k podpoře armády namísto uspokojování potřeb vládnoucí elity."
 AFG_privatize_factories: "Privatizovat továrny"
 AFG_privatize_factories_desc: "TODO"
 AFG_proclaim_a_new_caliphate: "Vyhlásit nový chalífát"
 AFG_proclaim_a_new_caliphate_2_tt: "Odemkne rozhodnutí k §Yintegraci§! nárokovaných států, které ovládáme"
 AFG_proclaim_a_new_caliphate_desc: "Po rozpadu Osmanské říše nebyl vyhlášen žádný nový chalífát. Abychom vedli zbloudilé a svedené, musíme přijmout tento nový úřad a dostát odkazu dávných Rašídúnů."
 AFG_proclaim_a_new_caliphate_tt: "Získá válečný cíl §YZabrat nárokovaný stát§! proti každé zemi, která okupuje státy, na něž nám toto zaměření dává nároky"
 AFG_proclaim_the_second_afghan_empire: "Vyhlásit Druhou Afghánskou říši"
 AFG_proclaim_the_second_afghan_empire_desc: "Roku 1747 Ahmad Šáh Durrání sjednotil afghánské kmeny a vytvořil z nich říši. Na vrcholu moci ovládala velkou část Střední Asie, východní Indie a Íránu a stála po boku Osmanské říše jako nejvýznamnější islámská velmoc druhé poloviny 18. století. Tento odkaz musíme znovu obnovit!"
 AFG_promote_muslim_work_ethic: "Podporovat muslimskou pracovní etiku"
 AFG_promote_muslim_work_ethic_desc: "Západ se dlouhodobě chlubí svou „protestantskou pracovní etikou“, zatímco přehlíží tvrdou práci islámského světa. Nastal čas jim připomenout, že jsme jim v oddanosti i odbornosti plně rovnocenní."
 AFG_promote_the_counter_elite: "Podpořit alternativní elitu"
 AFG_promote_the_counter_elite_desc: "V řadách politické elity působí mnoho osob s radikálními plány na modernizaci země, které však dosud brzdilo konzervativní prostředí. Po rozpuštění staré vlády možná nastal čas dát těmto radikálům prostor."
 AFG_promote_the_counter_elite_tt: "Následující poradci se stanou dostupnými k najmutí:"
 AFG_propose_confederation_with_pakistan: "Navrhnout konfederaci s Pákistánem"
 AFG_propose_confederation_with_pakistan_desc: "[PAK.GetNonIdeologyName] také trpěl pod [ENG.GetAdjective] nadvládou příliš dlouho a právem usiluje o nezávislost. Naše národy však sdílejí tolik historie a kultury, že dává smysl, aby se naše dvě země spojily dříve, než se proti sobě postaví."
 AFG_protector_of_baghdad: "Ochránce Bagdádu"
 AFG_protector_of_baghdad_desc: "TODO"
 AFG_protector_of_the_tajiks: "Ochránce Tádžiků"
 AFG_protector_of_the_tajiks_desc: "Mezi většinovými Paštuny a početnou populací Tádžiků na severu často vznikalo napětí. Nyní však máme příležitost získat si jejich přízeň tím, že osvobodíme Tádžiky za našimi hranicemi, které ničí [742.OWNER.GetLeader] a [742.OWNER.GetLeader.GetHersHis] despotická vláda."
 AFG_protector_of_the_tajiks_tt: "Odemkne rozhodnutí k navržení míru s [742.OWNER.GetNameDef], pokud [ROOT.GetName] obsadí [742.GetName]"
 AFG_prussians_of_the_orient: "Prusové Orientu"
 AFG_prussians_of_the_orient_desc: "Díky výcviku zahraničními důstojníky a velkému množství přebytečného [GER.GetAdjective] vybavení nás [GER.GetAdjective] představitelé začali označovat jako Prusy Orientu. Musíme tomuto titulu dostát a čelit každému, kdo se nám odváží postavit."
 AFG_purchase_aircraft: "Nakoupit zahraniční letadla"
 AFG_purchase_aircraft_desc: "Naše ozbrojené síly jsou příliš zranitelné vůči útokům ze vzduchu. Musíme investovat do vlastního letectva, abychom mohli čelit nepřátelským letounům."
 AFG_purchase_capital_ships: "Nakoupit hlavní lodě"
 AFG_purchase_capital_ships_desc: "Naše námořnictvo se po nedávném získání menších plavidel začíná formovat, stále nám však chybí palebná síla větších lodí. Měli bychom proto začít hledat hlavní lodě, které bychom mohli zakoupit."
 AFG_purchase_destroyers: "Nakoupit torpédoborce"
 AFG_purchase_destroyers_desc: "Vybudování odbornosti a infrastruktury pro návrh a stavbu moderních válečných lodí by nám trvalo desetiletí. Mnohem pragmatičtějším přístupem je pořízení uložených plavidel z jiných zemí a jejich úprava pro naše potřeby."
 AFG_purchase_tanks: "Nakoupit zahraniční tanky"
 AFG_purchase_tanks_desc: "Naší armádě chybí palebná síla k prolomení silných nepřátelských linií i rychlost k rychlému postupu. Musíme se proto obrátit na zbytek světa a investovat do obrněných sil."
 AFG_pursue_our_own_agenda: "Prosazovat vlastní agendu"
 AFG_pursue_our_own_agenda_desc: "Mezinárodní řád se přepisuje, zatímco velmoci mezi sebou soupeří. Namísto vázání se na jednu skupinu bychom měli využít chaosu a prosazovat vlastní zahraničněpolitické cíle."
 AFG_qargha_dam: "Vybudovat nádrž Qargha"
 AFG_qargha_dam_desc: "Suché oblasti země trpí nedostatečným zavlažováním, což ohrožuje úrodu a může vést k hladomorům. Výstavbou přehrad můžeme zvýšit dostupnost vody pro zavlažování a dokonce dosáhnout zemědělských přebytků."
 AFG_quami_intro_tt: "Upravit §Y$AFG_quami_modifier$§! o:"
 AFG_rail_construction: "Založit Afghánskou železniční společnost"
 AFG_rail_construction_desc: "Pro přepravu velkého množství surovin či lidí není nic efektivnějšího než železnice. Musíme proto založit železniční společnost, která vybuduje a bude provozovat vlastní železniční síť."
 AFG_raise_lashkar_regiments: "Zformovat pluky laškarů"
 AFG_raise_lashkar_regiments_desc: "Spolubojovníci Fakíra z Ipi v paštunských oblastech Britské Indie se označovali jako laškari. Nyní, když ovládá [ROOT.GetNameDef], je nejvyšší čas oficiálně zřídit podobné pluky ve státní službě."
 AFG_raj_attack_bonus: "Vpadnout do Indie"
 AFG_rapprochement_with_non_pashtuns: "Sblížení s Nepaštuny"
 AFG_rapprochement_with_non_pashtuns_desc: "Po příliš dlouhou dobu byli Nepaštunové v naší zemi odsouváni na okraj politiky. To vedlo nejen k odporu vůči centrální vládě, ale i k jejímu úplnému svržení v roce 1929. Musíme proto zajistit, aby se v novém demokratickém systému všichni cítili zastoupeni."
 AFG_rebuild_the_silk_road: "Obnovit Hedvábnou stezku"
 AFG_rebuild_the_silk_road_desc: "Hedvábná stezka kdysi přinášela říši bohatství a kulturu. Obnovením této historické obchodní sítě znovu zaujmeme své místo v centru světového obchodu a podpoříme prosperitu celé říše."
 AFG_reclaim_moghulistan: "Znovu získat Moghulistán"
 AFG_reclaim_moghulistan_desc: "Moghulistán, jeden z Čagatajských chanátů, byl nástupnickým státem Velké mongolské říše. Jako nový stát usilující o stejnou slávu bychom si tato území měli přivlastnit."
 AFG_reclaim_the_emperors_lost_domain: "Znovu získat ztracené císařovy državy"
 AFG_reclaim_the_emperors_lost_domain_desc: "Ten čas konečně nadešel. Vzhledem k současné světové situaci není lepší chvíle udeřit na [SOV.GetNameDef]. Osvobodíme celou Střední Asii jednou provždy."
 AFG_reclaim_transoxiana: "Znovu získat Transoxanii"
 AFG_reclaim_transoxiana_desc: "Staré země Transoxanie kdysi patřily Tímúrovské říši, k jejíž dědictví se hlásíme. Musíme tato území znovu získat, jinak bude náš odkaz poskvrněn slabostí a váhavostí."
 AFG_recruit_experts_and_officers: "Naverbovat odborníky a důstojníky"
 AFG_recruit_experts_and_officers_desc: "Vědci, inženýři a důstojníci, kteří dříve pracovali pro [PER.GetNonIdeologyName] či [TUR.GetNonIdeologyName], začínají rozpoznávat převahu naší země. Můžeme je přesvědčit, aby nám sloužili při budování regionální velmoci."
 AFG_recruit_foreign_experts: "Naverbovat zahraniční odborníky"
 AFG_recruit_foreign_experts_desc: "Pokud v zemi postrádáme potřebné znalosti, měli bychom je hledat za hranicemi a přivést ty, kteří nám nyní pomohou a zároveň nás tyto dovednosti naučí do budoucna."
 AFG_red_threat: "Rudá hrozba"
 AFG_red_threat_desc: "S našimi tajnými spojenci ve Střední Asii máme jedinečnou příležitost oslabit [SOU.GetAdjective] vliv a rozšířit náš vlastní. Naši invazi sladíme s odbojovými buňkami v regionu a svrhneme nepřítele dříve, než si vůbec uvědomí, co se děje."
 AFG_reform_1: "Reforma vzdělávání"
 AFG_reform_1_desc: "Přechod k parlamentní demokracii nebyl hladký a musíme více upevnit demokratické hodnoty u nastupující generace. Proto musíme reformovat vzdělávací systém a zpřístupnit jej všem dětem v zemi."
 AFG_reform_2: "Vybudovat přehradu Čak"
 AFG_reform_2_desc: "S pomocí zahraničních partnerů máme technologické i finanční prostředky k výstavbě nové velké vodní elektrárny na řece Čak, která zásobí elektřinou hlavní město a okolí, i když tím popudíme jejich protivníky."
 AFG_reform_3: "Omezit protidemokratický vliv"
 AFG_reform_3_desc: "Navzdory snahám o sblížení nové vlády s opozicí zůstává mnoho lidí náchylných k reakčním a protidemokratickým názorům. Musíme proto důsledně omezit takové aktivity."
 AFG_reform_4: "Ekonomická modernizace"
 AFG_reform_4_desc: "Se stabilitou se vrací i investice a podnikatelský zájem. Abychom nastartovali [ROOT.GetAdjective] ekonomiku, investujeme do modernizace zemědělství a omezeného průmyslu."
 AFG_rehabilitate_the_saqqawists: "Rehabilitovat Saqqávisty"
 AFG_rehabilitate_the_saqqawists_desc: "Saqqávisté v roce 1929 svrhli dekadentní vládu Amanulláha Chána, avšak později byli téměř zničeni. Možná nastal čas uctít tyto hrdiny, kteří bojovali za zachování našich tradičních hodnot."
 AFG_reinforce_the_royal_guard: "Stíny krále"
 AFG_reinforce_the_royal_guard_desc: "Navzdory své legitimitě čelí král odporu ze strany nespokojenců, kterým vadí jeho návrat a radikální reformy. Tito zrádci nesmí podkopávat královo dílo a musí být řešeni novou bezpečnostní službou působící ve stínech."
 AFG_reinforce_the_royal_guard_tt: "Odemkne rozhodnutí §Y$AFG_shadows_of_the_emir_category$§! k potlačování nesouhlasu a zvýšení stability."
 AFG_reintroduce_heavy_cavalry: "Znovu zavést těžkou jízdu"
 AFG_reintroduce_heavy_cavalry_desc: "Naši předkové opakovaně vpadali na koních do indických a středoasijských nížin, když byli jejich vládci slabí. Jak se naši sousedé zaplétají do konfliktů, možná se blíží další taková chvíle."
 AFG_reintroduce_war_elephants: "Znovu zavést válečné slony"
 AFG_reintroduce_war_elephants_desc: "Zatímco se svět snaží vytvářet stále složitější motorizované stroje, my využijeme osvědčené metody vedení války a oživíme použití válečných slonů k zastrašení nepřátel."
 AFG_remember_the_khost_rebellion: "Vzpomínka na Chóstské povstání"
 AFG_remember_the_khost_rebellion_desc: "Roku 1924 povstali spravedliví proti králi Amanulláhovi a jeho západním přisluhovačům, aby zachránili zemi před ztrátou identity. Povstání bylo poraženo, ale jeho duch přetrval. Nyní víme, jak porazit Kábul - je čas návratu k tradicím."
 AFG_renew_soviet_trade_agreement: "Obnovit sovětskou obchodní dohodu"
 AFG_renew_soviet_trade_agreement_desc: "Navzdory ideologickým rozdílům byl [SOU.GetName] pro naši zemi dobrým hospodářským partnerem. Někteří se obávají [SOU.GetAdjective] vlivu, my však nevidíme problém v obnovení obchodní dohody."
 AFG_renounce_the_durand_line: "Zříci se Durandovy linie"
 AFG_renounce_the_durand_line_desc: "Durandova linie, kterou nám vnutili cizí utlačovatelé, příliš dlouho rozdělovala naše paštunské bratry. Diplomacií či silou zbraní této nespravedlnosti učiníme konec."
 AFG_renounce_the_durand_line_tt: "\n\n§YVlastník nárokovaných států bude ochotnější přijmout náš návrh, pokud již je ve válce nebo oslaben probíhající občanskou válkou.§!"
 AFG_reorganize_the_royal_guard: "Reorganizovat královskou gardu"
 AFG_reorganize_the_royal_guard_desc: "Královská garda nedokáže dostát cti, která jí byla svěřena. Oživíme ji sérií reforem a rozšířením jejích řad. Musí ztělesňovat [ROOT.GetAdjective] sílu a odhodlání."
 AFG_repaying_our_friends: "Splacení dluhu přátelům"
 AFG_repaying_our_friends_desc: "TODO"
 AFG_repeal_the_durand_line: "Zrušit Durandovu linii"
 AFG_repeal_the_durand_line_desc: "Prokázali jsme Spojencům, že jsme v regionu spolehlivým partnerem. Možná nastal vhodný čas znovu projednat Durandovu linii, která nám byla krutě vnucena."
 AFG_republic_of_afghanistan: "Vyhlásit republiku"
 AFG_republic_of_afghanistan_desc: "Zavedení demokracie formou konstituční monarchie bylo významným krokem. Přetrvává však obava, že demokratické svobody nebudou plně zajištěny, dokud neodstraníme poslední zbytky monarchie a nevyhlásíme republiku."
 AFG_republic_of_afghanistan_tt: "§YBudeme si moci zvolit novou identitu země, která může změnit domovská území nebo přidat nové myšlenky.§!"
 AFG_request_german_support: "Požádat o německou podporu"
 AFG_request_german_support_desc: "$AFG_amunullah_khan$ dlouhodobě obdivuje [GER.GetNonIdeologyName] a získal si řadu vysoce postavených stoupenců v jeho vládě. Možná by podpořili králův návrat výměnou za spřátelený režim v regionu."
 AFG_request_german_support_tt: "Pokud §Y[GER.GetNonIdeologyName]§! přijme náš návrh, dodá nám zbraně a vyšle dobrovolníky na pomoc po vypuknutí občanské války. §Y[GER_oskar_von_nidermayer.GetName]§! se k nám připojí jako generál."
 AFG_request_japanese_support: "Požádat o japonskou podporu"
 AFG_request_japanese_support_desc: "[JAP.GetNameDef] usiluje o dominanci v Asii a mohou hledat spojence sdílející jejich cíle. Měli bychom je přesvědčit, že král Záhir tomuto úsilí odporuje, a získat jejich podporu pro nadcházející povstání."
 AFG_request_japanese_support_tt: "Pokud §Y[JAP.GetNonIdeologyName]§! přijme náš návrh, dodá nám zbraně a vyšle dobrovolníky na pomoc po vypuknutí občanské války."
 AFG_request_soviet_support: "Požádat o sovětskou pomoc"
 AFG_request_soviet_support_desc: "Naše revoluce je ohrožena nedostatkem ekonomických zdrojů a personálu potřebného k obsazení klíčových populačních center. Abychom uspěli, budeme potřebovat, ať nám [SOU.GetNameDef] přijde na pomoc - a to co nejdříve."
 AFG_research_bonus_1: "Rozvinout domácí námořní průmysl"
 AFG_research_bonus_1_desc: "Velmoci nám prodají pouze to, co považují za zastaralé a neohrožující jejich zájmy. Pokud chceme vybudovat moderní námořnictvo, musíme investovat do vlastních návrhů."
 AFG_research_bonus_2: "Investovat do námořního vývoje"
 AFG_research_bonus_2_desc: "Naše zkušenosti s vývojem menších lodí se osvědčily a nyní se naši inženýři chtějí pustit do mnohem větších konstrukcí."
 AFG_restore_herat: "Obnovit Herát"
 AFG_restore_herat_desc: "Navzdory starému sídlu moci v Kábulu je načase, aby bylo hlavní město přesunuto do hlavního sídla Durránské říše, do Herátu. Tímto krokem budeme schopni posílit svůj nárok na to, že jsme nástupci této kdysi velké říše."
 AFG_restore_the_timurid_empire: "Obnovit Tímúrovskou říši"
 AFG_restore_the_timurid_empire_desc: "Prapory Tímúra znovu vlají a říše, která kdysi naháněla hrůzu sultánům i králům, povstala z popela dějin. Náš vliv se rozprostírá nad zeměmi jeho výbojů a spojuje Východ se Západem. Svět ať se má na pozoru - Tímúrové se vrátili."
 AFG_retire_the_uncles: "Odeslat strýce do ústraní"
 AFG_retire_the_uncles_desc: "Politická situace v [ROOT.Capital.GetCapitalVictoryPointName] se začíná obracet proti staré gardě. Nastal čas, aby král rozpustil současný kabinet a vytvořil nový, odpovídající jeho cílům."
 AFG_return_of_the_emir: "Návrat krále"
 AFG_return_of_the_emir_desc: "Plány jsou připraveny, kontakty navázány a zbraně rozdány. Zbývá už jen, aby se král vrátil do Afghánistánu a naše nesourodé povstání zahájilo svržení nelegitimního režimu krále Záhira."
 AFG_return_to_delhi: "Návrat do Dillí"
 AFG_return_to_delhi_desc: "Dillí bylo kdysi sídlem sultána a domovem Červené pevnosti, kde stál náš slavný Paví trůn. Nyní vytáhneme na město, znovu získáme dávno ztracené hlavní město a naplníme odkaz dávných mughalských císařů."
 AFG_revive_the_1923_constitution: "Obnovit ústavu z roku 1923"
 AFG_revive_the_1923_constitution_desc: "Král byl vizionářem, který již v roce 1923 pochopil, že zemi je nutné vtáhnout do 20. století. Jeho reformy však byly Záhirem Šáhem téměř zcela zrušeny. S králem znovu u moci můžeme navázat tam, kde skončil, a obnovit jeho ústavu z roku 1923."
 AFG_revive_the_workshop_of_the_world: "Obnovit „dílnu světa“"
 AFG_revive_the_workshop_of_the_world_desc: "Budeme následovat své předky modernizací továren a oživením obchodních cest. Tato proměna učiní z naší ekonomiky velmoc schopnou konkurovat největším státům světa."
 AFG_salang_pass: "Tunel v průsmyku Salang"
 AFG_salang_pass_desc: "Horský terén výrazně ztěžuje rozvoj dopravních tras napříč zemí. [SOU.GetAdjectiveCap] inženýři se však domnívají, že by dokázali vybudovat tunel skrze hory u Salangu. Jejich vláda nabídla realizaci projektu výměnou za určité strategické ústupky."
 AFG_savior_of_the_holy_lands: "Spasitel Svatých zemí"
 AFG_savior_of_the_holy_lands_desc: "Nastal okamžik splnit posvátnou povinnost a osvobodit Svaté země z jha cizích utlačovatelů. Naši stateční vojáci potáhnou s odhodláním našich předků, inspirováni spravedlivým cílem znovuzískání kolébky naší víry."
 AFG_scavenging: "Sběrné taktiky"
 AFG_scavenging_desc: "Vybavení, které si nedokážeme vyrobit sami, se zde často objevuje v rukou cizích agresorů. Měli bychom proto vycvičit své síly k rozpoznávání a zabavování cenného vojenského materiálu, kdykoli je to možné."
 AFG_secure_army_support: "Zajistit podporu armády"
 AFG_secure_army_support_desc: "V ozbrojených silách stále působí řada důstojníků, které jmenoval $AFG_amunullah_khan$, nebo mu sloužili. Se správnými pobídkami by mohli být přiměni podpořit jeho návrat na trůn."
 AFG_secure_army_support_tt: "§YVíce armádních divizí se připojí na naši stranu v nadcházející občanské válce.§!"
 AFG_secure_baghdad: "Zajistit Bagdád"
 AFG_secure_baghdad_desc: "Jak se náš vliv v regionu rozšiřuje, je zřejmé, že [IRQ.GetNameDef] má potenciál podkopat naše úsilí. Musíme proto požadovat sladění jejich zahraniční politiky, jinak pocítí hněv našich ozbrojených sil."
 AFG_secure_dynasty: "Zajistit dynastii"
 AFG_secure_dynasty_desc: "S ekonomikou stabilizovanou a lidem uklidněným můžeme zajistit dynastii Barakzajů odstraněním méně loajálních prvků vlády a jejich nahrazením rodinnými příslušníky věrnými králi - nebo spíše jeho strýcům."
 AFG_secure_iran: "Zajistit Írán"
 AFG_secure_iran_desc: "Nastal čas zajistit [PER.GetAdjective] ropná pole. Ve spolupráci se spojenci uděláme, co je nutné - i kdyby to znamenalo, že [PER.Capital.GetCapitalVictoryPointName] zažije změnu režimu."
 AFG_seek_american_aid: "Usilovat o americkou pomoc"
 AFG_seek_american_aid_desc: "$PAR_accept_american_loans_desc$"
 AFG_seek_british_investment: "Usilovat o britské investice"
 AFG_seek_british_investment_desc: "Po desetiletí jsme přiživovali [ENG.GetAdjective] obavy z toho, že [SOV.GetNameDef] pronikne skrze naši zemi do Indie. To vedlo k dotacím a investicím, které nás měly udržet na jejich straně."
 AFG_shipyards: "Zřídit [ROOT.GetAdjective] lodní dopravu"
 AFG_shipyards_desc: "I když zatím nejsme připraveni vyvíjet vlastní lodě, budoucí flotila bude potřebovat zařízení pro údržbu a modernizaci. Zřízením loděnice nyní zajistíme dlouhodobý provoz našich plavidel."
 AFG_shipyards_tt: "Přidá §G1§! stavební slot a §G1§! §Y loděnici§! v pobřežním státě."
 AFG_shipyards_tt_2: "§YOdemkne vojenskou průmyslovou organizaci:§!"
 AFG_sinkiang_intervention: "Intervence v Sin-ťiangu"
 AFG_sinkiang_intervention_desc: "[SIK.GetNonIdeologyName] je již dlouho součástí islámského světa. Vzestup komunismu v bývalé Ruské říši a Číně však nyní ohrožuje naše muslimské bratry za hranicemi."
 AFG_socialist_coup: "Socialistický převrat"
 AFG_socialist_coup_desc: "Jak se rozpadávají konzervativní omezení politického myšlení, otevřela se Pandořina skříňka a zemí se šíří vlna odporu proti monarchii. Nastal čas skoncovat s tímto přežitým královstvím a vybudovat moderní socialistický stát."
 AFG_socialist_coup_tt: "§YPokud je podpora komunismu vyšší než 60 %, vyhneme se vyvolání občanské války.§!"
 AFG_sov_attack_bonus: "Rudá hrozba"
 AFG_sov_iran_war: "Svrhnout [PER.GetAdjective] šáha"
 AFG_sov_iran_war_desc: "[SOU.GetNameDef] je obklíčen ze všech stran a nemůže tak udržovat flotilu v teplých vodách, která by čelila našim nepřátelům. Jelikož nepřímo podporují naše nepřátele, tím, že obsadíme [PER.GetName], získáme novou námořní základnu a zároveň odstraníme potenciální hrozbu."
 AFG_soviet_research_cooperation: "Sovětská výzkumná spolupráce"
 AFG_soviet_research_cooperation_desc: "[SOU.GetNameDef] po svržení starého režimu se mění z dřívějšího protivníka na nejbližšího spojence."
 AFG_soviet_research_technology_exchange_tt: "§Y[SOU.GetNameDefCap] bude ochotnější souhlasit, pokud má na nás vysoký názor.§!\nPokud [SOU.GetFlag]§Y[SOU.GetNameDef]§! souhlasí, vstoupíme s nimi do skupiny sdílení technologií."
 AFG_spinzar_cotton_factory: "Investovat do bavlnáren Spinzar"
 AFG_spinzar_cotton_factory_desc: "Továrna na bavlnu Spinzar v Kundúzu je v současnosti jedním z našich nejziskovějších podniků a její majitelé chtějí své podnikání rozšířit. Bez státní podpory však nebude schopna výrazně překročit svou současnou velikost. Měli bychom se snažit zakládat nové pobočky a investovat do budoucnosti našeho bavlnářského průmyslu."
 AFG_standardize_equipment: "Standardizovat výzbroj"
 AFG_standardize_equipment_desc: ""
 AFG_state_atheism: "Státní ateismus"
 AFG_state_atheism_desc: "Paštúnválí, islám a další tradiční „opium lidu“ musí ustoupit, chceme-li modernizovat ekonomiku i společnost. Je proto nutné tyto zastaralé zvyklosti omezit a vzdělávat obyvatelstvo na sekulárním základě."
 AFG_state_industries: "Zřídit vojenský průmysl"
 AFG_state_industries_desc: "Absolventi vysokých škol se radikalizují, protože nemají dostatek pracovních příležitostí odpovídajících jejich kvalifikaci. Tomu můžeme zabránit vytvořením státních podniků, které je zaměstnají a zároveň zajistí domácí výrobu vybavení pro naše ozbrojené síly."
 AFG_state_industries_tt: "Odemkne rozhodnutí ke zřízení §Yvojenských průmyslových organizací§! a prodlouží časový limit radikalizace absolventů."
 AFG_stir_unrest_in_the_east: "Rozdmýchat nepokoje na východě"
 AFG_stir_unrest_in_the_east_desc: "Vazíristán a Péšávar zůstávají ohnisky proti[RAJ.GetAdjective] i [AFG.GetAdjective] aktivit. Měli bychom se řídit jejich příkladem a rozpoutat povstání v Chajbarském průsmyku, které odvede královy síly jinam."
 AFG_sugar_processing: "Cukrovar Baghlán"
 AFG_sugar_processing_desc: "Domácí poptávka po cukru dlouhodobě roste. Je proto vhodné ji uspokojit zřízením cukrovaru, který bude zpracovávat zemědělské suroviny na tuto hodnotnou komoditu. Tento krok nejen pokryje poptávku, ale zároveň podpoří zaměstnanost v průmyslovém sektoru."
 AFG_support_king_zahir: "Podpořit krále Záhira"
 AFG_support_king_zahir_desc: "Po desetiletích politické nestability zahájí vláda krále Záhira Šáha éru míru a hospodářské stability."
 AFG_support_king_zahir_tt: "§YKrál Záhir Šáh§! získá:\n Nárůst politické síly §G+5 %§!\n Denní podpora pro §YNezařazené§! §G+0.02§!"
 AFG_support_nort_west_frontier_rebels: "Podpořit povstalce na severozápadní hranici"
 AFG_support_nort_west_frontier_rebels_desc: "Paštunští povstalci na [RAJ.GetAdjective] severozápadní hranici nadále statečně bojují proti svým utlačovatelům, navzdory tomu, že Fakír odešel do [ROOT.GetNameDef]. Měli bychom zasáhnout a chránit je, i kdyby to mělo znamenat válku s těmi, kteří si toto území v současnosti nárokují."
 AFG_support_soviets_in_asia: "Podpořit Sověty v Asii"
 AFG_support_soviets_in_asia_desc: "Pro [SOU.GetAdjective] středoasijské republiky platí, že [SOU.Capital.GetCaptialVictoryPointName] je daleko, a proto se staly ohniskem kontrarevolučních aktivit. Abychom zabránili pronikání reakcionářů do naší země, měli bychom podpořit [SOU.GetNameDef] při udržování pořádku v regionu."
 AFG_support_warzistan_independence: "Podpořit nezávislost Vazíristánu"
 AFG_support_warzistan_independence_desc: "Naše hranice s Angličany v Indii jsou trvalým zdrojem napětí mezi našimi zeměmi. Ačkoli nemáme sílu je z regionu vytlačit, můžeme oslabit jejich nadvládu podporou nezávislostních hnutí, například ve Vazíristánu."
 AFG_the_amu_darya_plan: "Plán Amudarji"
 AFG_the_amu_darya_plan_desc: "Císař vypracoval plány a navázal kontakt s těmi ve své staré vlasti, kteří si přejí uniknout [SOV.GetAdjective] nadvládě. Nejprve musí být naše osvobozenecké tažení pečlivě naplánováno, a teprve poté můžeme zaútočit na [SOV.GetNameDef]."
 AFG_the_conquerors_of_persia: "Dobyvatelé Persie"
 AFG_the_conquerors_of_persia_desc: "[PER.GetNameDefCap], zem nesmírného bohatství a dějin, je někdejším rivalem naší říše. Jejím podrobením znovu potvrdíme naši dominanci, zajistíme strategická západní území a upevníme postavení říše jako pravého dědice imperiální slávy."
 AFG_the_crown_and_the_world: "Koruna a svět"
 AFG_the_crown_and_the_world_desc: "Osudem říše je stát se nepřekonatelnou světovou supervelmocí. Rozšiřováním vlivu, posilováním síly a prosazováním své dominance si zajistíme postavení nejvyšší mocnosti moderního světa."
 AFG_the_echoes_of_panipat: "Ozvěny Panípatu"
 AFG_the_echoes_of_panipat_desc: "Třetí bitva u Panípatu dosud zní v paměti celého indického subkontinentu. Tehdy jsme rozdrtili maráthská vojska a upevnili svou nadvládu nad severozápadní Indií. Nastal čas to zopakovat a udeřit na domýšlivé dědice Maráthské konfederace!"
 AFG_the_faqirs_revolt: "Fakírovo povstání"
 AFG_the_faqirs_revolt_desc: "Konečně nastal ten pravý čas. Fakírovy síly jsou připraveny povstat na východě proti zkorumpované vládě v Kábulu a obnovit islámské tradice, na nichž naše země kdysi spočívala. Inšalláh, zachráníme Afghánistán!"
 AFG_timurid_bureaucracy: "Tímúrovská byrokracie"
 AFG_timurid_bureaucracy_desc: "Tímúrovská byrokracie, zakořeněná v odkazu Tímúra, nabízí osvědčený model účinné správy a centralizované moci. Její revitalizace posílí správní aparát emirátu a zajistí stabilitu a prosperitu v celém jeho rozlehlém panství."
 AFG_topple_iran: "Svrhnout Írán"
 AFG_topple_iran_desc: "[ROOT.GetLeader] je připraven přinést svobodu a spravedlnost našim [PER.GetAdjective] bratrům a sestrám, které po dlouhá léta sužuje [PER.GetLeader] a jeho despotická vláda. Nejen zajistíme naše hranice, ale také posílíme svůj vliv v regionu."
 AFG_towards_an_amanullah_caliphate: "Směrem k Amanulláhovu chalífátu"
 AFG_towards_an_amanullah_caliphate_desc: "$AFG_amunullah_khan$ kdysi zvažoval přijetí titulu chalífy po zániku Osmanské říše, ale nakonec se rozhodl pro modernější režim. Tentokrát se rozhodl tuto chybu neopakovat a místo toho si zajistit své místo jako vůdce islámského světa."
 AFG_truck_factory: "Továrna na nákladní vozy Džangalak"
 AFG_truck_factory_desc: "Ve spolupráci s našimi [SOU.GetAdjective] partnery máme možnost vybudovat první velkou továrnu na výrobu vozidel. Vyrobené nákladní automobily by mohly pokrýt domácí poptávku jak v průmyslu, tak v armádě."
 AFG_turko_persian_empire: "Turko-perská říše"
 AFG_turko_persian_empire_desc: "Nyní, když je většina [TUR.GetAdjective] a [PER.GetAdjective] území pevně pod naší kontrolou, nastal čas přetvořit naši říši v nové turko-perské impérium, které zajistí bezpečnost a stabilitu naší společnosti."
 AFG_ulugh_beg_academy: "Akademie Ulugha Bega"
 AFG_ulugh_beg_academy_desc: "Ulugh Beg, někdejší sultán mocné Tímúridské říše, se vedle své vlády zasloužil i o rozvoj astronomie a matematiky. Je proto vhodné uctít jeho odkaz založením univerzity nesoucí jeho jméno."
 AFG_unify_the_islamic_world: "Sjednotit islámský svět"
 AFG_unify_the_islamic_world_desc: "Muslimské státy se už příliš dlouho hádají o nepodstatné věci a zanedbávají svou povinnost spolupracovat. Nastal čas je vyzvat, aby se sjednotily v jedné velké alianci."
 AFG_unite_pashtunistan: "Sjednotit Paštunistán"
 AFG_unite_pashtunistan_desc: "Konečným cílem Fakírova tažení bylo vždy vytvoření nezávislého paštunského státu na území Britské Indie. Nyní se však nabízí příležitost vybudovat paštunský stát mimo tyto hranice a podmanit si zbývající oblasti. Ať žije Paštunistán, ať žije emír!"
 AFG_united_islamic_world_faction: "Ittehad-e Islami"
 AFG_utilize_cameleers: "Využít velbloudáře"
 AFG_utilize_cameleers_desc: "Naši velbloudáři byli vysíláni do celého světa a sloužili Britskému impériu při cestování a zásobování v nebezpečných oblastech Velké australské pouště. Měli bychom tyto zkušené pracovníky využít k podpoře našich jednotek na našem vlastním území."
 AFG_visit_foreign_capitals: "Navštívit zahraniční metropole"
 AFG_visit_foreign_capitals_desc: "Náš režim nemá dostatečně silné vazby na světové velmoci. Vzhledem k rostoucí nestabilitě geopolitické situace by bylo rozumné posílit vztahy s těmito státy, pro případ že se nám naskytnou nové příležitosti."
 AFG_work_with_ger_intel_bonus: "Techniky potlačování partyzánů"
 AFG_work_with_gestapo: "Spolupracovat s [GER.GetAdjective] rozvědkou"
 AFG_work_with_gestapo_desc: "Na nově získaných územích přetrvává odboj a nepokoje, které představují vážnou hrozbu pro naši autoritu. Za tímto účelem jsme navázali spolupráci s [GER.GetAdjective] zpravodajskými službami. Jejich expertíza v oblasti protipovstaleckých a zpravodajských operací bude klíčová při identifikaci a neutralizaci povstaleckých struktur. "
 AT_PEACE_WITH_SYRIA_OWNER_TT_NOT: "Není ve válce se Sýrií"
 GRE_byz_unified_flag: "Byzanc"
 IRQ_a_new_caliph: "Nový chalífa"
 IRQ_a_new_caliph_desc: "Po letech bojů jsme se etablovali jako přední mocnost islámského světa. Nastal proto čas navázat na odkaz Husajna ibn Alího a znovuobnovit chalífát pod vedením Hášimovské dynastie."
 IRQ_a_new_islamic_golden_age: "Nový islámský zlatý věk"
 IRQ_a_new_islamic_golden_age_desc: "TODO"
 IRQ_abd_al_illah_fm_tt: "§Y$IRQ_abd_al_ilah$§! se stane dostupným jako §Ypolní maršál§! úrovně 3"
 IRQ_air_research_bonus: "Výzkum aerodynamiky a avioniky"
 IRQ_air_research_bonus_desc: "Obor avioniky se s narůstajícími konflikty po celém světě rychle rozvíjí. Pokud se chceme stát regionální mocností, potřebujeme zařízení, kde budou naši inženýři vyvíjet špičkové technologie pro letectvo."
 IRQ_al_muthanna_club: "Kluby al-Muthanna"
 IRQ_al_muthanna_club_desc: "V regionu vzniká množství klubů a skupin usilujících o vytvoření panarabského režimu. Zajistíme jim financování, aby mohly dále růst a ovlivňovat obyvatelstvo tímto směrem."
 IRQ_align_afghanistan_fasc: "Pozvat Afghánistán"
 IRQ_align_afghanistan_fasc_desc: "[AFG.GetNameDef] měli dlouho [SOU.GetNameDef] a [ENG.GetNameDef] pouze za nárazníkový stát. Možná jej společnou spoluprací můžeme dostat na odpovídající pozici v regionu."
 IRQ_align_afghanistan_fasc_tt: "§Y[AFG.GetNameWithFlag]§! obdrží pozvání do naší frakce"
 IRQ_allied_training: "Spojenecký výcvik"
 IRQ_allied_training_desc: "Naši spojenci jsou ochotni předat nám část odborných znalostí, které získali v nedávných konfliktech s našimi nepřáteli. Přijmeme tuto pomoc, abychom co nejlépe připravili naše jednotky na boj."
 IRQ_anglo_iraqi_oil_expansion: "Anglo-irácké rozšíření těžby ropy"
 IRQ_anglo_iraqi_oil_expansion_desc: "Současné uspořádání s Anglo-iráckou ropnou společností může část obyvatel rozhořčovat, ale jsou krátkozrací a nedokážou pochopit přínosy pro naši ekonomiku ani ochranu, kterou nám poskytuje [ENG.GetNameDef]."
 IRQ_anti_western_alliance: "Protizápadní aliance"
 IRQ_anti_western_alliance_desc: "Pokud by dominantní regionální mocnosti spojily svou vojenskou sílu a zavázaly se k vzájemné obraně, měli bychom skutečnou šanci postavit se západním mocnostem, které se neustále vměšují do našich záležitostí."
 IRQ_anti_western_alliance_per_tt: "§Y[PER.GetNameWithFlag]§! obdrží pozvání do naší frakce"
 IRQ_anti_western_alliance_tur_tt: "§Y[TUR.GetNameWithFlag]§! obdrží pozvání do naší frakce"
 IRQ_approach_tribes_for_support: "Oslovit kmeny pro podporu"
 IRQ_approach_tribes_for_support_desc: "Mnoho venkovských komunit se stále drží tradičního kmenového způsobu života a od vzniku našeho státu vůči nám byly převážně nepřátelské. Možná jsme dosud nenašli správné pobídky, jak si je získat."
 IRQ_arab_dominance: "Arabská dominance"
 IRQ_arab_dominance_desc: "[IRQ.GetNonIdeologyName] je rozmanitá země, avšak pouze upevněním politické dominance arabské většiny můžeme doufat ve stabilní vládu."
 IRQ_arab_free_legion: "Svobodná arabská legie"
 IRQ_arab_free_legion_desc: "Arabové z celého světa se dobrovolně hlásí k boji proti starým mocnostem, které nás po desetiletí brzdily. Měli bychom toho využít a rekrutovat jednotky i mimo naše hranice, aby bojovaly po boku naší armády proti společným nepřátelům."
 IRQ_arab_free_legion_tt: "Odemkne rozhodnutí §Y$IRQ_arab_free_legion_cat$§! k verbování divizí z celého arabského světa."
 IRQ_arab_league: "Založit Arabskou ligu"
 IRQ_arab_league_desc: "Musíme vytvořit alianci podobně smýšlejících arabských zemí s cílem chránit arabské zájmy před vnějšími zásahy a osvobodit naše bratry za hranicemi z okupace."
 IRQ_arab_league_economic_cooperation: "Hospodářská rada Arabské ligy"
 IRQ_arab_league_economic_cooperation_desc: "Chceme-li posílit bratrství mezi arabskými národy, měli bychom prohloubit spolupráci v hospodářské sféře."
 IRQ_arab_league_economic_cooperation_tt: "Získáme mimo-mapovou §Ycivilní továrnu§! za každý další §Yarabský stát§!, který má na nás §Ynázor§! vyšší než §G85§!."
 IRQ_arab_republic_core_tt: "Odemkne rozhodnutí §Y$united_arab_republic_cat$§! k získání domovských území na arabských státech, které vlastníme."
 IRQ_army_research_bonus: "Modernizovat vojenské doktríny"
 IRQ_army_research_bonus_desc: "Mnozí naši důstojníci jsou buď bývalí vojáci Osmanské říše, nebo prošli základním výcvikem u [ENG.GetAdjective] armády. V obou případech jsou jejich taktiky zastaralé a vyžadují okamžitou modernizaci."
 IRQ_assasination_of_sidqi: "Atentát na Bakra Sidkího"
 IRQ_assasination_of_sidqi_desc: "[IRQ_assassination_of_sidqi_desc_key]"
 IRQ_assassination_of_sidqi_desc_leader: "Bakr Sidkí od svržení předchozí vlády nedokázal sjednotit zemi. Mezi politickými elitami roste odpor a širší irácká veřejnost nedůvěřuje tomu, že Kurd má takový vliv na státní dění. Pokud se naskytne příležitost, je téměř jisté, že se někdo pokusí o jeho odstranění..."
 IRQ_assassination_of_sidqi_desc_not_leader: "Bakr Sidkí očividně chystá převrat proti naší vládě a řada našich důstojníků hlásí, že se snaží získat jejich podporu pro případ jeho uskutečnění. Pokud si chceme udržet moc, budeme ho muset odstranit."
 IRQ_attempted_assasination_of_sidqi: "Pokus o atentát na Sidkího"
 IRQ_attempted_assasination_of_sidqi_desc: "Navzdory silné nespokojenosti mezi obyvatelstvem i politickými elitami zůstaly dosavadní pokusy o atentát na Bakra Sidkího neúspěšné. Je však zřejmé, že musíme posílit bezpečnostní a zpravodajské složky, abychom ochránili nový režim před odpůrci."
 IRQ_axis_training: "Braniborská výcviková mise"
 IRQ_axis_training_desc: "$IRQ_allied_training_desc$"
 IRQ_baghdad_colleges_of_engineering_and_education: "Rozšířit bagdádské vysoké školy"
 IRQ_baghdad_colleges_of_engineering_and_education_desc: "Bagdád byl po staletí centrem vzdělanosti, ale v posledních desetiletích byl opomíjen ve prospěch západních univerzit. Nastal čas investovat do našich vzdělávacích institucí a znovu z něj učinit srdce akademického světa."
 IRQ_bakr_sidqi_coup: "Převrat Bakra Sidkího"
 IRQ_bakr_sidqi_coup_desc: "Současný režim je slabý a pomýlený. Pod vedením Bakra Sidqiho jej svrhneme a zajistíme [ROOT.GetAdjective] lidu nezávislou budoucnost."
 IRQ_bakr_sidqi_tt: "§Y$IRQ_bakr_sidqi$§! je najat jako neodvolatelný poradce."
 IRQ_basra_military_port_focus: "Předání vojenského přístavu Basra"
 IRQ_basra_military_port_focus_desc: "S naším obnoveným zájmem o moře a Perský záliv bychom měli zajistit, aby vojenský přístav v Basře přešel pod naši správu a nezůstal v rukou imperialistických sil okupujících naši zemi."
 IRQ_bomber_training: "Výcvik bombardérů"
 IRQ_bomber_training_desc: "Naše letectvo postrádá zkušenosti s velkými letadly určenými k bombardování. Tento nedostatek musíme rychle odstranit."
 IRQ_carve_up_syria: "Rozdělit Sýrii"
 IRQ_carve_up_syria_desc: "Sýrie měla právem náležet našemu království, avšak Francouzi nám ji odebrali. Také [TUR.GetNonIdeologyName] jako náš spojenec si činí nárok na její části. Možná je čas vznést společný požadavek na toto území, zatímco je svět rozptýlen."
 IRQ_cavalry_integration: "Integrace jízdy"
 IRQ_cavalry_integration_desc: "I když se motorizace může stát standardem budoucnosti, v současnosti se stále musíme spoléhat na jízdu."
 IRQ_commander_of_the_faithful: "Velitel věřících"
 IRQ_commander_of_the_faithful_desc: "oté, co jsme se ujali úkolu sjednotit arabské národy pod naší vládou, je nezbytné získat je pro naši věc v maximální možné míře. Abd al-Iláh se nyní může prohlásit Amírem al-Mu'minín, titulem, který kdysi nesl Husajn bin Alí al-Hášimí."
 IRQ_construct_the_dukan_dam: "Vybudovat přehradu Dukan"
 IRQ_construct_the_dukan_dam_desc: "Velké řeky naší země bychom měli využít nejen k zavlažování, ale i k výrobě elektrické energie. Toho dosáhneme výstavbou vodní elektrárny na řece Zab, která vytvoří umělé jezero."
 IRQ_construct_the_kut_barrage: "Vybudovat jez Kut"
 IRQ_construct_the_kut_barrage_desc: "Nedávné komplikace při výstavbě přehrady v Kutu je nutné urychleně překonat, aby bylo možné zajistit dostatečné vodní zdroje pro zavlažování podél řeky Tigris."
 IRQ_create_repair_yards: "Založit hlubokomořský přístav Umm Qasr"
 IRQ_create_repair_yards_desc: "Rozvoj hlubokomořského přístavu by mohl výrazně posílit naši schopnost exportu a zároveň poskytnout zázemí pro kotvení a zásobování vojenských lodí."
 IRQ_curtail_arabism: "Omezit panarabismus"
 IRQ_curtail_arabism_desc: "Rostoucí posedlost panarabismem mezi našimi obyvateli odcizuje nearabské komunity a zároveň nás staví do přímého střetu s velmocemi. Musíme tuto ideologii omezit dříve, než nás zničí."
 IRQ_decouple_from_the_pound: "Odpoutat se od libry"
 IRQ_decouple_from_the_pound_desc: "Naše měna zůstává navázaná na britskou libru šterlinků, což omezuje naši schopnost provádět hospodářské politiky odpovídající našim potřebám. Musíme toto spojení přerušit a zřídit vlastní měnovou radu pro kontrolu dináru."
 IRQ_demand_greater_stake_in_the_company: "Požadovat větší podíl ve společnosti"
 IRQ_demand_greater_stake_in_the_company_desc: "Udělali jsme mnoho pro to, aby provoz ropných zařízení byl co nejspolehlivější pro [ENG.GetNameDef]. Je tedy spravedlivé, aby se podělili o větší část bohatství, které dodávky ropy vytvářejí."
 IRQ_demand_palestine: "Požadovat Palestinu"
 IRQ_demand_palestine_desc: "Britové se ukázali jako nedůvěryhodní, pokud jde o ochranu palestinského lidu v mandátních územích. Zatímco se na ně upírá pozornost světa, můžeme být schopni je přinutit k ústupku a požadovat, aby mandát převedli pod naši kontrolu."
 IRQ_demand_syria_hashemite: "Navrhnout sjednocení Sýrie"
 IRQ_demand_syria_hashemite_desc: "Sýrie byla krátce pod vládou Fajsala I. v roce 1920, ale byla nám vyrvána francouzskou zradou. Nyní můžeme vyjednávat z pozice síly a požadovat navrácení našeho právoplatného území."
 IRQ_develop_the_kuwaiti_port: "Rozvoj kuvajtského přístavu"
 IRQ_develop_the_kuwaiti_port_desc: "S Kuvajtem pod naší právoplatnou kontrolou se naše pobřeží výrazně rozšířilo. To nám poskytlo příležitost dále rozšířit naše námořní zařízení a podpořit ještě silnější přítomnost v Perském zálivu."
 IRQ_develop_the_kuwaiti_port_tt: "Přidá §G1§Y námořní základnu §!§! v každé provincii."
 IRQ_discuss_a_new_treaty: "Projednat novou smlouvu"
 IRQ_discuss_a_new_treaty_desc: "Anglo-irácká smlouva byla vyjednána v době, kdy jsme byli mladým a slabým státem. Nyní jsme přední mocností islámského světa a taková smlouva je urážkou našeho vůdce. Nastal tedy čas, ať s námi [ENG.GetNameDef] vyjedná novou smlouvu."
 IRQ_effectivize_the_production_line: "Optimalizace výrobních linek"
 IRQ_effectivize_the_production_line_desc: "Abychom si v budoucnu zajistili nezávislost, jednorázové kroky nebudou stačit. Musíme proto zavést opatření, která zajistí neustálé zlepšování v průběhu času."
 IRQ_eliminate_the_golden_square: "Eliminovat Zlatý čtverec"
 IRQ_eliminate_the_golden_square_desc: "Zlatý čtverec a jejich stoupenci by nás kvůli své touze sjednotit arabský svět uvrhli do regionálního konfliktu a vnitřního rozdělení. Musí být eliminováni dříve, než zničí náš stát."
 IRQ_embargo_the_axis_powers: "Uvalit embargo na Osu"
 IRQ_embargo_the_axis_powers_desc: "Mocnosti Osy představují hrozbu pro světový mír a musí být zbaveny všech zdrojů nezbytných k vedení války."
 IRQ_encourage_federalism: "Podporovat federalismus"
 IRQ_encourage_federalism_desc: "Měli bychom se snažit poskytnout Kurdům a Asyřanům určitou míru autonomie a legalizovat místní jazyky a zvyklosti v celé naší zemi, abychom sjednotili všechny irácké občany pod jedním praporem."
 IRQ_ensure_sunni_dominance: "Zajistit nadvládu sunnitů"
 IRQ_ensure_sunni_dominance_desc: "Navzdory tomu, že jsou menšinou, sunnitská elita dlouhodobě vládne naší zemi, podporována hášimovskou dynastií a arabskými nacionalisty. Pokud chceme, aby tyto skupiny zůstaly u moci, musíme zajistit, aby sunnitská dominance v naší politice pokračovala."
 IRQ_establish_iraqi_coastal_defense_force: "[IRQ_establish_iraqi_coastal_defense_force_key]"
 IRQ_establish_iraqi_coastal_defense_force_IRQ: "Zřídit irácké pobřežní obranné síly"
 IRQ_establish_iraqi_coastal_defense_force_KUR: "Zřídit kurdské pobřežní obranné síly"
 IRQ_establish_iraqi_coastal_defense_force_desc: "Naše pobřeží je sice krátké, ale leží na jedné z nejdůležitějších zásobovacích tras pro vývoz ropy na Západ. Proto musíme vybudovat námořní síly k ochraně našich zájmů v této oblasti."
 IRQ_expand_camel_corps: "Začlenit [ROOT.GetAdjective] policii"
 IRQ_expand_camel_corps_desc: "[ENG.GetAdjectiveCap] jednotky během poslední Velké války prokázali všestrannost velbloudích jednotek jejich nasazením v severní a východní Africe. Naše policie je již na využívání těchto zvířat při hlídkách zvyklá, mohli bychom je proto více začlenit do armády a poučit se z jejich zkušeností."
 IRQ_expand_habbaniya_airbase: "Rozšířit leteckou základnu Habbáníja"
 IRQ_expand_habbaniya_airbase_desc: "Letecká základna Habbáníja se stala srdcem leteckých operací v Iráku od doby, kdy ji vybudovali [ENG.GetAdjective]. Abychom lépe vyhověli naší rostoucí letecké síle, měli bychom tamní zařízení rozšířit."
 IRQ_expand_membership: "Rozšířit členství ve federaci"
 IRQ_expand_membership_desc: "Zatímco se někteří posmívali myšlence naší federace, jiní s úžasem sledovali naše úspěchy. Možná nastal čas rozšířit členství na ty, kteří jsou dost moudří na to, aby pochopili, že společně jsme silnější."
 IRQ_expand_membership_tt: "Odemkne rozhodnutí §Y$hashemite_federation_cat$§! k pozvání členů, aby se stali vašimi subjekty."
 IRQ_expand_oil_production: "Rozšířit těžbu ropy"
 IRQ_expand_oil_production_desc: "Geologové se domnívají, že na území naší země se nachází hojné dosud nevyužité zásoby ropy. Tyto zdroje mohou našemu lidu přinést obrovské bohatství a musí být co nejdříve využity."
 IRQ_expand_the_cotton_industries: "Rozšířit bavlnářský průmysl"
 IRQ_expand_the_cotton_industries_desc: "Jako důležitá součást naší ekonomiky musíme věnovat větší pozornost bavlnářskému sektoru, protože naše poptávka neustále roste."
 IRQ_export_infrastructure: "Exportní infrastruktura"
 IRQ_export_infrastructure_desc: "Ropa má zásadní význam pro světovou ekonomiku, a investicemi do naší exportní infrastruktury můžeme dostat [ROOT.GetNameDef] na mapu světa a zároveň z toho finančně těžit."
 IRQ_extensive_irrigation_projects: "Rozsáhlé projekty zavlažování"
 IRQ_extensive_irrigation_projects_413_tt: "Pokud ovládáme §Y[413.GetName]§!, získáme v tomto státě §G2§! další stavební sloty"
 IRQ_extensive_irrigation_projects_680_tt: "Pokud ovládáme §Y[680.GetName]§!, získáme v tomto státě §G1§! další stavební slot"
 IRQ_extensive_irrigation_projects_desc: "Velká část naší země je suchá a nevhodná pro zemědělství. Prostřednictvím rozsáhlých zavlažovacích projektů však můžeme tyto oblasti proměnit v úrodná pole."
 IRQ_fighter_training: "Výcvik stíhacích pilotů"
 IRQ_fighter_training_desc: "Veškeré naše vojenské i hospodářské plánování bude k ničemu, pokud naši piloti nebudou schopni efektivně využívat své letouny k ochraně našeho nebe před nepřátelskými bombardéry."
 IRQ_finish_the_berlin_baghdad_railway: "Dokončit železnici Berlín-Bagdád"
 IRQ_finish_the_berlin_baghdad_railway_desc: "Staré Německé císařství si dlouho kladlo za cíl vybudovat železnici z Berlína do Bagdádu, aby podpořilo námořní přítomnost v Perském zálivu. Tento „Taurus Express“ však nikdy nebyl zcela dokončen. Nyní bychom mohli ekonomické přínosy této tratě využít tím, že ji dokončíme sami."
 IRQ_fligerfuhrer_irak: "Fliegerführer Irak"
 IRQ_fligerfuhrer_irak_desc: "Naše armáda je beznadějně slabší než [ENG.GetAdjective] síly, avšak s pomocí letadel a pilotů od našich spojenců bychom mohli převážit misky vah v náš prospěch."
 IRQ_forceful_industrialization: "Nucená industrializace"
 IRQ_forceful_industrialization_desc: "§Y[ROOT.GetNameDef]§! se industrializuje příliš pomalu. Pokud se chceme vyhnout zaostávání za našimi protivníky, musíme řídit rozsáhlý program industrializace, i kdyby to mělo rozhněvat veřejnost."
 IRQ_form_opec: "Založit OPEC"
 IRQ_form_opec_desc: "Velmoci jsou zcela závislé na toku ropy do svých továren a vozidel. Pokud by producenti ropy spolupracovali na její těžbě a bezpečnosti, mohli bychom konečně pohnat velmoci k odpovědnosti za vše, co nám provedly."
 IRQ_form_the_independent_mechanized_brigade: "Zformovat nezávislou mechanizovanou brigádu"
 IRQ_form_the_independent_mechanized_brigade_desc: "Po zakoupení potřebného vybavení a po rozsáhlém výcviku se naše ozbrojené síly domnívají, že jsou připraveny nasadit své první mechanizované jednotky."
 IRQ_form_the_independent_mechanized_brigade_tt: "Vytvoří šablonu divize §YAl-Mechanikiyah§! (§YMechanizovaná§!) a nasadí §Y1§! jednotku."
 IRQ_found_company_for_cement: "Založit Všeobecnou společnost pro cement"
 IRQ_found_company_for_cement_desc: "Abychom zlepšili stavební projekty, které hodláme zahájit po celé zemi, musíme založit státní podnik pro výrobu a distribuci cementu, jenž je pro moderní infrastrukturu stále důležitější."
 IRQ_found_southern_steel_plants: "Založit Jižní ocelárny"
 IRQ_found_southern_steel_plants_desc: "Ocel je klíčová pro hospodářský rozvoj i výrobu vojenského vybavení. Dosud existuje jen málo domácích producentů schopných pokrýt naše potřeby, což nás činí závislými na dovozu. To se musí změnit."
 IRQ_found_the_iraqi_state_railways: "[IRQ_found_the_iraqi_state_railways_key]"
 IRQ_found_the_iraqi_state_railways_IRQ: "Založit Irácké státní dráhy"
 IRQ_found_the_iraqi_state_railways_KUR: "Založit Kurdské státní dráhy"
 IRQ_found_the_iraqi_state_railways_desc: "Navzdory naší domnělé nezávislosti si [ENG.GetNameDef] stále ponechává kontrolu nad naší železniční infrastrukturou prostřednictvím Mesopotamian Railways. Měli bychom je oslovit s nabídkou odkupu a přejmenovat společnost na Irácké státní dráhy."
 IRQ_found_the_state_company_for_iron_and_steel: "Státní společnost pro železo a ocel"
 IRQ_found_the_state_company_for_iron_and_steel_desc: "Nedávné investice do ocelářství posílily naši ekonomiku a snížily závislost na dovozu. Můžeme však jít ještě dál založením státních podniků, které nám umožní kontrolovat dodávky těchto klíčových surovin."
 IRQ_further_ussr_support: "Další podpora ze [SOV.GetAdjective] strany"
 IRQ_further_ussr_support_desc: "Na počátku naší cesty ke svobodě jsme se opírali o [SOV.GetName]. Přestože jsme si původně nepřáli být závislí na jiných, pokud nás budou považovat za sobě rovné, může se toto partnerství ukázat jako přínosné."
 IRQ_greater_iraq: "Velký Irák"
 IRQ_greater_iraq_desc: "Větší část arabského obyvatelstva nyní bezpečně spadá pod naši vládu. Je tedy vhodné tuto událost stvrdit vyhlášením širší definice, co znamená §Y[IRQ.GetNonIdeologyName]§!."
 IRQ_greater_iraq_tt: "Odemkne rozhodnutí §Y$greater_iraq_decision_cat$§! k získání domovského území na státy Blízkého východu, které vlastníme."
 IRQ_has_become_kurdistan_flag: "Stát se Kurdistánem"
 IRQ_hashemite_arab_federation: "Hašemitská arabská federace"
 IRQ_hashemite_arab_federation_desc: "Díky členům hašemitské dynastie usazeným po celém regionu máme příležitost sjednotit naše království do jedné velké Hašemitské arabské federace."
 IRQ_heavy_industry_investments: "Investice do těžkého průmyslu"
 IRQ_heavy_industry_investments_desc: "Dosáhli jsme pokroku v zásobování průmyslu surovinami, avšak chceme-li dohnat velmoci, musíme založit více státních podniků těžkého průmyslu nebo subvencovat stávající."
 IRQ_increase_anglo_iraqi_economic_ties: "Prohloubit anglo-irácké hospodářské vazby"
 IRQ_increase_anglo_iraqi_economic_ties_desc: "Bylo by pošetilé nevyužít úzkých hospodářských vztahů, které jsme vybudovali s Angličany."
 IRQ_increase_italian_business_relations: "Dovoz z [ITA.GetNonIdeologyName]"
 IRQ_increase_italian_business_relations_desc: "Nemůžeme zůstat zcela závislí na Angličanech. Naštěstí jsou Italové více než ochotni nám v tomto úsilí pomoci."
 IRQ_increase_prime_ministers_powers: "Posílit pravomoci předsedy vlády"
 IRQ_increase_prime_ministers_powers_desc: "Ukázalo se, že irácký lid netouží po absolutní vládě hašemitské dynastie. Nyní se tedy otevírá příležitost jednou provždy upevnit ústavní charakter vlády a nasměrovat Irák západním směrem."
 IRQ_independent_flight_schools: "Nezávislé letecké školy"
 IRQ_independent_flight_schools_desc: "Naši piloti byli většinou cvičeni v zahraničí [ENG.GetAdjective] instruktury, avšak nyní máme dostatečný počet pilotů, abychom mohli zahájit domácí výcvik."
 IRQ_infantry_focus: "Posílit pěchotu"
 IRQ_infantry_focus_desc: "Velmoci si mohou hrát se svými mechanizovanými monstrami, avšak realita je taková, že každá válka se nakonec rozhodne pěchotou. Armáda proto obdrží výrazné navýšení rozpočtu na výcvik."
 IRQ_invest_in_ordnance_mountain_howitzers: "Investovat do horských houfnic"
 IRQ_invest_in_ordnance_mountain_howitzers_desc: "Naše země je ze severu a východu obklopena horami, ale naše ozbrojené síly postrádají dostatečnou palebnou sílu pro boj v takovém terénu. Možná nastal čas investovat do specializovaného horského dělostřelectva, které by je podpořilo v případě konfliktu s našimi sousedy."
 IRQ_invite_foreign_advisors: "Pozvat zahraniční poradce"
 IRQ_invite_foreign_advisors_desc: "Postrádáme odborné znalosti, abychom mohli čelit jakékoli námořní mocnosti v regionu. Můžeme však zlepšit schopnosti našich sil tím, že přivedeme zahraniční odborníky, kteří budou školit naše námořní důstojníky."
 IRQ_invite_foreign_arms_corporations: "Pozvat zahraniční korporace"
 IRQ_invite_foreign_arms_corporations_desc: "Potřeba domácího zbrojního průmyslu je zásadní, avšak postrádáme odborné znalosti k vývoji a výrobě vlastního vybavení. Měli bychom proto navázat spolupráci se zahraničními korporacemi a založit továrny, které budou přínosné jak pro nás, tak pro ně."
 IRQ_invite_oil_mission: "Pozvat ropnou misi"
 IRQ_invite_oil_mission_ctt: "§Y[GER.GetNameDef]§! získá práva na naši §Yropu§! v §Y[676.GetName]§! výměnou za:"
 IRQ_invite_oil_mission_desc: "Naší pákou je černé zlato - a naši noví přátelé jej potřebují víc než dost. Malý ústupek dnes může znamenat mnohem větší zisk v budoucnu."
 IRQ_iran_ultimatum: "Prosadit nárok na Arabistán"
 IRQ_iran_ultimatum_desc: "§Y[PER.GetName]§! má ve svých západních oblastech značnou arabskou populaci. Možná nastal čas požadovat jejich sjednocení s naší zemí."
 IRQ_iran_ultimatum_tt2: ""
 IRQ_iran_ultimatum_tt: "§YPokud [PER.GetNameDef] odmítne postoupit území, budeme moci vyhlásit válku.§!"
 IRQ_iraqi_al_futuwwa: "Zformovat iráckou Al-Futuwwu"
 IRQ_iraqi_al_futuwwa_desc: "Chceme-li vybudovat silný národ, musíme založit mládežnické organizace, které povedou lid k boji za slavnou budoucnost."
 IRQ_is_kurdistan: "§YHra za Kurdistán§!"
 IRQ_join_axis: "$TUR_join_the_axis$"
 IRQ_join_axis_desc: "$TUR_join_the_axis_desc$"
 IRQ_kurdish_attack_iran: "Osvobodit Kurdy v Íránu"
 IRQ_kurdish_attack_iran_desc: "[PER.GetNameDef] představuje hrozbu pro náš lid. Pouze silou můžeme osvobodit Kurdy a zajistit jim budoucnost."
 IRQ_kurdish_attack_turkey: "Osvobodit Kurdy v Turecku"
 IRQ_kurdish_attack_turkey_desc: "[TUR.GetNameDef] aktivně utlačuje kurdský lid a okrádá jej o dědictví. To už nemůžeme tolerovat."
 IRQ_kurdish_democratic: "Kurdská demokratická strana"
 IRQ_kurdish_democratic_desc: "§Y[IRQ.GetNameDef]§! denně pošlapává kurdská práva svou arabskou většinou. Nastal čas založit politické hnutí usilující o svobodný a nezávislý stát."
 IRQ_kurdish_form_the_peshmerga: "Zformovat Pešmergy"
 IRQ_kurdish_form_the_peshmerga_desc: "Přestože se nám podařilo porazit iráckou armádu, nemusí to tak být vždy. Musíme proto vybudovat národní armádu s moderním výcvikem."
 IRQ_kurdish_industry: "Rozšířit průmyslovou základnu"
 IRQ_kurdish_industry_desc: "Abychom nebyli pohlceni silnějšími sousedy, musíme vybudovat vlastní průmyslovou základnu."
 IRQ_kurdish_language: "Kurdské jazykové školy"
 IRQ_kurdish_language_desc: "S nově nabytou nezávislostí můžeme konečně vytvořit vzdělávací systém založený na kurdské kultuře a jazyce."
 IRQ_kurdish_oil: "Kurdská ropa"
 IRQ_kurdish_oil_desc: "Ropná ložiska byla v minulosti využívána, avšak zisky z nich odtékaly pryč. Nyní můžeme vybudovat vlastní ropný průmysl."
 IRQ_kurdish_outreach: "Kurdské sbližování"
 IRQ_kurdish_outreach_desc: "Kurdi severního Iráku mají potenciál vážně narušit naši autoritu. Musíme je integrovat, i kdyby to znamenalo určitou autonomii."
 IRQ_kurdish_reject_ankara_treaty: "Odmítnout Ankarskou smlouvu"
 IRQ_kurdish_reject_ankara_treaty_desc: "Ankarská smlouva zničila dřívější pokusy o kurdský stát. Musíme jasně říci, že tyto hranice odmítáme."
 IRQ_kurdish_revolt: "Vyhlásit povstání"
 IRQ_kurdish_revolt_desc: "Nastal čas zanechat §Y[IRQ.GetNonIdeologyName]§!, vyhlásit nezávislost a vytvořit svobodný kurdský stát."
 IRQ_kurdish_revolt_tt: "Vyhlásíme nezávislost na §YIráckém státě§! a vstoupíme do §Rválky za nezávislost§!."
 IRQ_kurdish_socialist: "Požádat o sovětskou pomoc"
 IRQ_kurdish_socialist_desc: "[SOU.GetNameDefCap] touží po způsobu, jak podkopat západní dominanci na Blízkém východě. Možná by byli ochotni podpořit nás v našem boji proti [IRQ.GetAdjective] vládě a tím i proti jejich [ENG.GetAdjective] ochráncům."
 IRQ_kurdish_support_resistance: "Podporovat odboj v zahraničí"
 IRQ_kurdish_support_resistance_desc: "Zatímco lidé u nás si užívají skutečnou svobodu, stále příliš mnoho našich bratří zůstává uvězněno pod vládou cizích mocností. Musíme je podpořit v jejich snahách o osvobození."
 IRQ_kurdish_united: "Sjednocený Kurdistán"
 IRQ_kurdish_united_desc: "Po velkých útrapách a boji jsme konečně sjednotili kurdský lid pod naší vládou. Ať už přijde cokoli, stojíme nyní jako jeden sjednocený národ."
 IRQ_kurdish_women_in_military: "Ženy v armádě"
 IRQ_kurdish_women_in_military_desc: "Zastaralý názor, že ženy musí být drženy mimo konflikt, musí být odstraněn, pokud chceme vybudovat silnou armádu schopnou postavit se našim sousedům."
 IRQ_liberate_levant: "Osvobodit Levantu"
 IRQ_liberate_levant_desc: "Levanta byla rozdělena vítězi Velké války, což přineslo obyvatelům regionu pouze krveprolití a utrpení. Nemůžeme již nečinně přihlížet, zatímco naši bratři trpí takovým osudem."
 IRQ_liberate_north_africa: "Osvobodit severní Afriku"
 IRQ_liberate_north_africa_desc: "Severní Afrika je již příliš dlouho drcena pod imperialistickou botou Evropanů. Nastal čas ji osvobodit a přivést zpět do našeho společenství."
 IRQ_local_arms_industry: "Místní zbrojní průmysl"
 IRQ_local_arms_industry_desc: "Pokud vypukne válka, nebudeme se moci spoléhat na dodávky vojenského vybavení ze zahraničí. Musíme proto rychle vybudovat vlastní domácí zbrojní průmysl, který podpoří naše síly v době krize."
 IRQ_modernization: "Usilovat o modernizaci"
 IRQ_modernization_desc: "Pochodování ulicemi se zastaralým vybavením může stačit k udržení pořádku mezi naším obyvatelstvem, ale sotva odradí cizí mocnosti od agrese. Musíme modernizovat naše vybavení a vybudovat ozbrojené síly jako skutečný odstrašující faktor."
 IRQ_nationalize_the_anglo_iraqi_oil_company: "Znárodnit Anglo-iráckou ropnou společnost"
 IRQ_nationalize_the_anglo_iraqi_oil_company_desc: "Anglo-irácká ropná společnost nadále ovládá naše hospodářství i zahraniční politiku a odvádí naše bohatství do válečných lodí [ENG.GetAdjective] námořnictva, což nám brání spravovat vlastní záležitosti. Nastal čas tuto frašku ukončit a společnost znárodnit ve prospěch našeho lidu."
 IRQ_naval_air_support: "Námořní letecká podpora"
 IRQ_naval_air_support_desc: "Věřit, že dokážeme vybudovat námořnictvo schopné čelit velmocem, je pošetilé. Vývoj letadel schopných útočit na námořní cíle však může srovnat síly za zlomek ceny jediné lodi."
 IRQ_navy_research_bonus: "Námořní technologický pokrok"
 IRQ_navy_research_bonus_desc: "Doposud jsme byli závislí na lodích ze zahraničí, které byly zastaralé ještě předtím, než jsme je zakoupili. Abychom nezůstali pozadu, musíme vyvíjet vlastní námořní technologie a naši flotilu modernizovat nebo znovu vybudovat."
 IRQ_party_of_national_brotherhood: "Strana národního bratrstva"
 IRQ_party_of_national_brotherhood_desc: "Příliš dlouho vláda ustupovala [ENG.GetAdjective] rozmarům. Pouze Strana národního bratrstva má potenciál pozvednout [IRQ.GetNonIdeologyName] ke slávě."
 IRQ_proclaim_united_arab_republic: "Vyhlásit Sjednocenou arabskou republiku"
 IRQ_proclaim_united_arab_republic_desc: "Naše sny o panarabském státě se začínají naplňovat. Musíme využít příležitosti, vyhlásit vznik Sjednocené arabské republiky a sjednotit lid kolem naší věci."
 IRQ_project_babylon_focus: "Projekt Babylon"
 IRQ_project_babylon_focus_desc: "Abychom vyhráli budoucí války, musíme zajistit těžké zbraně potřebné k porážce našich nepřátel, bez ohledu na jejich početní převahu. Měli bychom proto otevřít zařízení zaměřená na výzkum a vývoj experimentálních zbraní."
 IRQ_promote_kurdish_culture: "Podpora kurdské identity"
 IRQ_promote_kurdish_culture_desc: "Kurdský lid je rozptýlen napříč několika zeměmi, avšak naše kultura nás spojuje bez ohledu na místo, kde žijeme. Musíme toto dědictví podporovat a chránit dříve, než bude zničeno těmi, kdo nám vládnou."
 IRQ_protector_of_the_gulf: "Ochránce Zálivu"
 IRQ_protector_of_the_gulf_desc: "Prokázali jsme se jako důvěryhodný spojenec západních mocností. Možná by byly ochotny stáhnout se z regionu výměnou za to, že od nynějška zajistíme bezpečnost Perského zálivu."
 IRQ_purchase_alternative_aricraft: "Nákup alternativních letadel"
 IRQ_purchase_alternative_aricraft_desc: "Abychom se vyhnuli přílišné závislosti na jednom dodavateli, měli bychom se poohlédnout po letadlech i mimo [ENG.GetNameDef]. [ITA.GetNameDef] vypadá jako slibná alternativa."
 IRQ_purchase_armored_equipment: "Nákup obrněné techniky"
 IRQ_purchase_armored_equipment_desc: "Našim silám chybí úderná síla protivníků kvůli přílišné závislosti na tradiční pěchotě. Tank je jasně budoucností pozemního boje a musíme najít někoho, kdo nám prodá své přebytečné modely."
 IRQ_purchase_british_aircraft: "Nákup britských letadel"
 IRQ_purchase_british_aircraft_AAT_tt: "§YZískáme větší dotaci na vybavení, dokud je aktivní $IRQ_anglo_iraqi_treaty$.§!"
 IRQ_purchase_british_aircraft_desc: "Vzhledem k našim vazbám na [ENG.GetAdjective] RAF se zdá logické pořizovat další letadla právě od nich."
 IRQ_purchase_british_aircraft_treaty_tt: "§YZískáme větší množství vybavení, dokud je aktivní $IRQ_anglo_iraqi_treaty$.§!"
 IRQ_purchase_foreign_equipment: "Nakoupit zahraniční obráběcí stroje"
 IRQ_purchase_foreign_equipment_desc: "Přestože máme úrodnou půdu a mnoho oblastí vhodných k zavlažování, postrádáme mechanizované nástroje průmyslových mocností. Pokud bychom investovali do dovozu takového vybavení, mohli bychom výrazně zvýšit produkci plodin i průmyslový výkon."
 IRQ_purchase_mechanized_equipment: "Nakoupit mechanizované vybavení"
 IRQ_purchase_mechanized_equipment_desc: "Pomalý postup pěchoty se stal zjevnou slabinou našich sil v důsledku rozšíření mechanizované pěchoty v zahraničí. Je na čase investovat do mechanizace našich vlastních sil, než bude příliš pozdě."
 IRQ_purchase_small_ships: "Nákup malých lodí"
 IRQ_purchase_small_ships_desc: "$SMB_purchase_destroyers_and_subs_desc$"
 IRQ_put_down_tribal_revolts: "Potlačit kmenová povstání"
 IRQ_put_down_tribal_revolts_desc: "TODO"
 IRQ_raf_levies_focus: "Odvody RAF"
 IRQ_raf_levies_focus_desc: "[ENG.GetAdjectiveCap] udržují na našem území řadu odvedených jednotek k zajištění bezpečnosti svých leteckých základen. Možná bychom mohli zlepšit naše obranné schopnosti lepší spoluprací s těmito silami."
 IRQ_rally_behind_the_hashemite_dynasty: "Semknout se za hášimovskou dynastií"
 IRQ_rally_behind_the_hashemite_dynasty_desc: "Hášimovská rodina musí být středobodem, kolem něhož budeme nadále budovat pocit irácké národní identity. Po letech u moci jsme blízko skutečnému upevnění naší vlády."
 IRQ_rally_the_arab_world: "Sjednotit arabský svět"
 IRQ_rally_the_arab_world_desc: "Arabský svět touží setřást okovy západních mocností. Společně sjednotíme arabské národy a znovu se staneme pány svého vlastního osudu."
 IRQ_reach_out_to_jordan: "Navázat kontakt s Jordánskem"
 IRQ_reach_out_to_jordan_desc: "Naši příbuzní nadále vládnou v Jordánsku pod ochranou [ENG.GetAdjective]. Možná bychom je i [ENG.GetAdjective] mohli přesvědčit, aby nám umožnili rozvíjet větší politickou a ekonomickou soudržnost výměnou za převzetí jejich obrany."
 IRQ_reapproachment_with_the_tribes: "Sblížení s kmeny"
 IRQ_reapproachment_with_the_tribes_desc: "Stále existuje mnoho kmenových vůdců, kteří naší vládě plně nedůvěřují. Měli bychom je uklidnit a investovat do jejich regionů, aby jejich loajalita patřila výhradně nám."
 IRQ_reapproachment_with_the_tribes_tt: "§Y$KUR_ahmed_barzani$§! a §Y$IRQ_mustafa_barzani$§! se stanou dostupnými jako §Ygenerálové§! 3. úrovně"
 IRQ_refuge_for_the_grand_mufti: "Útočiště pro velkého muftího"
 IRQ_refuge_for_the_grand_mufti_desc: "Po nedávných nepokojích v Palestině byl Amín al-Husajní, kontroverzní velký muftí Jeruzaléma, vyhnán Brity. Abychom uklidnili proti-britské nálady na našem vlastním území, mohli bychom mu dočasně poskytnout útočiště."
 IRQ_regime_change_in_arabia: "Změna režimu v Arábii"
 IRQ_regime_change_in_arabia_desc: "Rod Saúdů nelze považovat za důvěryhodného spojence proti velmocem. Proto musí být odstraněn dříve, než se stane hrozbou."
 IRQ_regional_economic_integration: "Regionální ekonomická integrace"
 IRQ_regional_economic_integration_desc: "Musíme zorganizovat masivní investice do infrastruktury regionu, abychom mohli všichni těžit z dlouhodobého hospodářského růstu."
 IRQ_regional_military_integration: "Regionální vojenská integrace"
 IRQ_regional_military_integration_desc: "Postrádáme výrobní kapacity velmocí v oblasti vojenské produkce, ale možná bychom prostřednictvím regionálních investic mohli začít dohánět náskok."
 IRQ_regional_military_integration_tt: "Dokončení tohoto zaměření, pokud je Jordánsko naším subjektem nebo ho ovládáme, přidá v Jordánsku dvě další vojenské továrny."
 IRQ_religious_resistance: "Náboženský odboj"
 IRQ_religious_resistance_desc: "S velkým muftím pod naší ochranou bychom s ním mohli spolupracovat na podněcování odboje napříč arabským světem proti utlačujícím západním režimům, které nám byly vnuceny."
 IRQ_renegotiate_treaty: "Znovu vyjednat anglo-iráckou smlouvu"
 IRQ_renegotiate_treaty_desc: "Prokázali jsme, že nepředstavujeme hrozbu pro zájmy, které má [ENG.GetNameDef] v regionu a že můžeme být jejich potenciálním spojencem, pokud to bude potřeba. Proto bychom měli konečně znovu vyjednat anglo-iráckou smlouvu na rovnoprávném základě."
 IRQ_request_syria_from_vichy: "Požádat o Sýrii"
 IRQ_request_syria_from_vichy_desc: "Francouzi nikdy nebyli tak rozdělení a slabí. Toto je ideální příležitost požadovat převedení jejich syrského území pod naši kontrolu."
 IRQ_restoration_of_hejaz: "Obnovit Hidžáz"
 IRQ_restoration_of_hejaz_desc: "Saudové nedávno rozdrtili Království Hidžáz. Tím zároveň omezili vliv hášimovské dynastie. Je načase jim to oplatit stejnou mincí."
 IRQ_restore_al_andalus: "Obnovit Al-Andalus"
 IRQ_restore_al_andalus_desc: "Španělé se mohou považovat za pány Pyrenejského poloostrova, ale dávno před vznikem jejich státu zde existoval Al-Andalus. Navrácení tohoto území do islámského světa bude porážkou, na kterou Evropané nikdy nezapomenou."
 IRQ_restore_regent: "Návrat regenta"
 IRQ_restore_regent_desc: "Pošetilý oportunismus Rašída Alího al-Gajláního a Zlatého čtverce přinesl naší zemi jen zkázu. Musíme se jednou provždy zbavit jejich zhoubného vlivu tím, že je odstraníme a obnovíme starou vládu."
 IRQ_revoke_anglo_iraq_treaty: "Zrušit anglo-iráckou smlouvu"
 IRQ_revoke_anglo_iraq_treaty_desc: "Jednostranná anglo-irácká smlouva brzdila rozvoj našeho národa příliš dlouho. Nyní však máme vůli postavit se Angličanům a smlouvu konečně zrušit, bez ohledu na následky."
 IRQ_revoke_anglo_iraq_treaty_tt: "§R[ENG.GetNameDefCap] pravděpodobně vyhlásí válku za zrušení smlouvy!§!"
 IRQ_royal_iraqi_army: "[IRQ_royal_iraqi_army_key]"
 IRQ_royal_iraqi_army_IRQ: "Královská irácká armáda"
 IRQ_royal_iraqi_army_KUR: "Kurdská armáda"
 IRQ_royal_iraqi_army_desc: "Hrozba války, ať už ze strany sousedů nebo vzdálenějších mocností, je stále pravděpodobnější. Zároveň existuje množství vnitřních frakcí připravených roztrhat náš stát. Jedinou silou, která je může udržet na uzdě, je naše armáda."
 IRQ_rural_electrification: "Elektrifikace venkova"
 IRQ_rural_electrification_desc: "Zatímco ve městech elektrifikace postupuje, venkovské obyvatelstvo zůstává stranou těchto pokroků. Měli bychom proto zřídit národní energetický úřad a rozšířit elektrickou infrastrukturu rovnoměrně po celé zemi."
 IRQ_scavenging: "Využití sběračské taktiky"
 IRQ_scavenging_desc: "Vybavení, které nedokážeme vyrobit sami, se zde často objevuje v rukou zahraničních agresorů. Měli bychom proto vycvičit naše jednotky, aby dokázaly rozpoznat a zabavit cennou vojenskou techniku, kdykoli je to možné."
 IRQ_seek_axis_investment: "Ucházet se o investice Osy"
 IRQ_seek_axis_investment_desc: "Naše ekonomika stagnuje a potřebuje diverzifikaci, chceme-li zvýšit odolnost vůči zahraniční agresi. Možná by naši přátelé v zahraničí byli ochotni investovat, aby prohloubili naše vztahy."
 IRQ_special_forces: "Speciální jednotky"
 IRQ_special_forces_desc: "V některých situacích může hrstka specializovaných vojáků operujících za nepřátelskými liniemi zasadit zdrcující úder, jaký by celá armáda v otevřeném boji nezvládla. Takové síly musíme mít i my."
 IRQ_special_projects: "Jaderné výzkumné centrum Tuwaitha"
 IRQ_special_projects_desc: "Zprávy o atomových tajemstvích ze zahraničí se dostaly k našim vědcům a inženýrům, kteří touží prokázat své schopnosti. S jejich odborností a dostatečným financováním bychom mohli vyvinout zbraně nepředstavitelné síly."
 IRQ_status_of_lebanon: "Postavení Libanonu"
 IRQ_status_of_lebanon_desc: "Se Sýrií pevně pod naší kontrolou se pozornost obrátila k budoucnosti Libanonu. Možná bychom mohli zkusit štěstí ještě jednou a požadovat jeho předání pod naši správu."
 IRQ_strengthen_mesopotamian_farming: "Posílit mezopotámské zemědělství"
 IRQ_strengthen_mesopotamian_farming_desc: "Stejně jako mnoho jeho předchůdců leží [ROOT.GetNonIdeologyName] na dvou velkých řekách, Tigridu a Eufratu. Území mezi nimi je ideální pro zemědělství, avšak moderní technika by mohla ještě zvýšit výnosy."
 IRQ_strengthen_relations_with_iran: "Posílit vztahy s Íránem"
 IRQ_strengthen_relations_with_iran_desc: "Ačkoli se [IRQ.GetNonIdeologyName] a [PER.GetNonIdeologyName] ne vždy shodly, sdílíme společný cíl modernizace a odporu vůči západní dominanci v regionu. Je čas vybudovat konstruktivní vztah a dosáhnout našich cílů společně."
 IRQ_strengthen_relations_with_turkey: "Posílit vztahy s Tureckem"
 IRQ_strengthen_relations_with_turkey_desc: "[TUR.GetNonIdeologyName] stálo v čele odporu proti západním mocnostem, i když je to nakonec stálo jejich říši. Jsme proto přirozenými spojenci a měli bychom vztahy dále prohlubovat."
 IRQ_strengthen_the_golden_square: "Posílit Zlatý čtverec"
 IRQ_strengthen_the_golden_square_desc: "Zlatý čtverec, složený ze čtyř vysoce postavených důstojníků, se stal ohniskem panarabismu a proti[ENG.GetAdjective] nálad. Možná nastal čas je plně zapojit do vlády a zahájit reformy k posílení státu."
 IRQ_strengthen_the_iraqi_dinar: "[IRQ_strengthen_the_iraqi_dinar_key]"
 IRQ_strengthen_the_iraqi_dinar_IRQ: "Posílit irácký dinár"
 IRQ_strengthen_the_iraqi_dinar_KUR: "Posílit kurdský dinár"
 IRQ_strengthen_the_iraqi_dinar_desc: "Nyní, když jsme převzali kontrolu nad měnou z [ENG.GetAdjective] rukou, můžeme konečně nastavit vlastní měnovou politiku ve prospěch domácí ekonomiky."
 IRQ_support_from_skies_above: "Podpora z nebes"
 IRQ_support_from_skies_above_desc: "Vzhledem k okolnímu prostředí by bylo nerozumné spoléhat se výhradně na pěchotu a pozemní jednotky. Vybudování letectva sice přinese vysoké náklady, avšak je to krok, který musíme učinit."
 IRQ_support_from_skies_above_tt: "Členství ve frakci, kterou vede §Y[SOV.GetNameWithFlag]§!, a jejich vlastnictví letadel §Yletecké podpory§! poskytne §Y100§! těchto letadel pro §Y[ROOT.GetNameWithFlag]§!"
 IRQ_support_from_the_mountains: "Horská odbornost"
 IRQ_support_from_the_mountains_desc: "S několika drsnými horskými pásmy kolem nás budou výcvik a vybavení přizpůsobené boji v těchto oblastech velkou pomocí. Počáteční náklady by nás neměly odradit."
 IRQ_support_the_allied_war_effort: "Podpora spojeneckého válečného úsilí"
 IRQ_support_the_allied_war_effort_desc: "Ať už to náš lid přijme nebo ne, naše budoucnost leží po boku Spojenců. Musíme prokázat oddanost jejich věci a vybojovat si místo v nově vznikajícím světovém řádu."
 IRQ_suppress_tribal_revolts: "Potlačit kmenová povstání"
 IRQ_suppress_tribal_revolts_desc: "Abychom do naší země přinesli jednotu a zajistili, že se při střetu s našimi sousedy nerozpadneme zevnitř, musíme potlačit kmenová povstání a zároveň snížit chudobu u těch, kteří jsou ochotni spolupracovat, aby mohly být zaceleny trhliny v duši našeho národa."
 IRQ_take_advantage_of_british_weakness: "Využít situace"
 IRQ_take_advantage_of_british_weakness_desc: "Pokud chceme vyhnat [ENG.GetNameDef] z našeho regionu, sotva dostaneme lepší příležitost než nyní, kdy jsou zaměstnáni konflikty po celém světě. Udeřme ranou, z níž se už nikdy nevzpamatují."
 IRQ_training: "Pěchotní škola Al-Waš"
 IRQ_training_desc: "[IRQ.GetNonIdeologyName] má zastaralý výcvik jednotek, který by mohl být zlepšen zavedením reforem po vzoru jiných států. Proto bychom měli naše vojáky vzdělávat v používání lehkých zbraní a pěchotní taktice ve Pěchotní škole Al-Waš."
 IRQ_unite_maghreb: "Sjednotit Maghreb"
 IRQ_unite_maghreb_desc: "Maghreb je nedílnou součástí islámského světa a příliš dlouho trpěl pod západní nadvládou. S naší nově nabytou silou jej sjednotíme a jednou provždy vyženeme imperialisty."
 IRQ_unite_maghreb_tt: "Získá válečný cíl §YZnovu získat domovský stát§! proti každé zemi, která okupuje státy, na které jsme tímto zaměřením získali domovské území"
 IRQ_unite_mashriq: "Sjednotit Mašrik"
 IRQ_unite_mashriq_desc: "Mašrik je tepajícím srdcem islámského světa. Nemůžeme spočinout, dokud nebude celý pod kontrolou chalífy."
 MUGHAL_divisions_spawned: "§Y4§! plně vybavené loajalistické divize se k nám připojí po spuštění povstání."
 PER_a_modern_iran: "Moderní Írán"
 PER_a_modern_iran_desc: "Po veškerém úsilí o modernizaci můžeme konečně hrdě a sebevědomě stát mezi ostatními národy."
 PER_abolish_feudalism: "Zrušit feudalismus"
 PER_abolish_feudalism_desc: "Po mnoho let fungoval [ROOT.GetNonIdeologyName] na základě feudálního systému, v němž vlastníci půdy drželi majetek, na kterém pracovali rolníci z venkovských oblastí. Jedná se o zastaralý systém a naší povinností jako vlády je tuto půdu od vlastníků odkoupit a následně ji za mnohem nižší cenu prodat rolníkům. Tímto krokem přineseme svobodu značné části našeho obyvatelstva."
 PER_absolute_monarchy: "Absolutní monarchie"
 PER_absolute_monarchy_desc: "Po tvrdém zásahu Rezá Šáha Pahlavího proti odpůrcům, kteří se snažili svrhnout jeho vládu, byla vyhlášena absolutní monarchie. Tím byla další moc soustředěna do rukou koruny a zajištěno, že nikdo nebude moci ohrozit jeho dynastii. Tento proces zahrnuje také militarističtější přístup k zahraniční politice a rozšíření stálé armády, kterou disponuje [PER.GetNameDef]."
 PER_absorb_byzantines: "Pohltit Byzantskou říši"
 PER_absorb_byzantines_desc: "Konečně jsme vyrovnali staletou křivdu vůči Řekům tím, že jsme zničili [GRE.GetNameDef]. Toto území může být nyní začleněno a stát se oficiální součástí našeho impéria."
 PER_absorb_byzantines_tt: "Odemkne rozhodnutí §Y$PER_absorb_byzantines_category$§!, která nám umožní integrovat dobytá území do našeho státu."
 PER_acceptance_ger_tt: "§Y[GER.GetNameDefCap]§! s větší pravděpodobností přijme, pokud na nás mají §Gvysoký názor§!!"
 PER_acceptance_tt: "§Y[SOU.GetNameDefCap]§! s větší pravděpodobností přijme, pokud na nás mají §Gvysoký názor§!!"
 PER_add_organizer_trait_tt: "§YDva§! náhodně vybraní velitelé armády získají vlastnost $organizer$."
 PER_add_panzer_leader_trait_tt: "§YDva§! náhodně vybraní velitelé armády získají vlastnost $panzer_leader$."
 PER_address_the_issue_tt: "Odemkne §YRozhodnutí islámské revoluce§!, která nám dají §R90 dní§! na potlačení revolucionářů."
 PER_addressing_the_issue_flag: "Řešení problému"
 PER_adult_literacy: "Kampaň gramotnosti dospělých"
 PER_adult_literacy_desc: "Negramotnost je závažným problémem, který sužuje naše obyvatelstvo. Schopnost číst a psát ve vlastním jazyce pomůže náš lid posílit a osvobodit. Rada ministrů a ministerstvo školství společně připravily vzdělávací osnovy a zavázaly se založit školy pro dospělé obyvatelstvo."
 PER_air_shortcut: "Letectvo"
 PER_air_superiority: "Vzdušná nadvláda"
 PER_air_superiority_desc: "Nejdůležitějším úkolem našeho letectva je získat kontrolu nad oblohou. Pokud dosáhneme vzdušné nadvlády, budeme moci provádět nebezpečnější operace bez obav ze zachycení."
 PER_align_with_axis: "Připojit [PER.GetNameDef] k Ose"
 PER_align_with_axis_desc: "Zatímco v Evropě zuří válka, naši [GER.GetAdjective] přátelé potřebují spojence, kteří by jim pomohli s válečným úsilím. Nastal čas vstoupit do boje a přidat se na stranu Osy."
 PER_ally_bazaari: "Spojenectví s bazáristy"
 PER_ally_bazaari_desc: "Bazary a obchodníci, kteří v nich působí, jsou již po staletí pilíři našich komunit. Nyní však čelí rostoucímu tlaku nadnárodních korporací průmyslových mocností. Pokud přijmeme opatření na ochranu obchodníků, pravděpodobně se sjednotí kolem naší konzervativní věci."
 PER_ally_the_bazaari: "Získat elity"
 PER_ally_the_bazaari_desc: "Mezi [PER.GetAdjective] elitami roste nespokojenost se směřováním země. Mnozí se obávají o budoucnost svých podniků či majetku a mohou být ochotni podpořit naši věc výměnou za záruky ochrany před politickými otřesy."
 PER_anti_air_development: "Financovat protivzdušnou obranu"
 PER_anti_air_development_desc: "Továrny v našich městech se staly cílem nepřátelských bombardérů, kteří se snaží narušit náš hospodářský a průmyslový rozvoj. Měli bychom proto nasměrovat zdroje do rozvoje protivzdušné obrany."
 PER_anti_air_research: "Iniciativa výzkumu protiletadlové obrany"
 PER_anti_air_research_boost: "Výzkum protiletadlové obrany"
 PER_anti_air_research_desc: "Naše současné protiletadlové zbraně začínají zastarávat. Musíme vyvinout větší úsilí při výzkumu nových technologií, které pomohou chránit náš stát před hrozbami z oblohy."
 PER_anti_soviet_resistance_network: "Proti[SOU.GetAdjective] odboj"
 PER_anti_soviet_resistance_network_desc: "Ať už to jakkoli přikrášlují, realita je taková, že [SOU.GetNameDef] je jen další ruské impérium a mnoho íránských národů zůstává uvězněno pod jeho despotickým jařmem. Musíme více podkopávat jejich autoritu a podporovat osvobození našeho lidu."
 PER_appease_the_seperatists: "Uklidnit separatisty"
 PER_appease_the_seperatists_desc: "Nastal čas splnit naše závazky vůči ázerbájdžánskému a kurdskému obyvatelstvu tím, že jim poskytneme větší autonomii v jejich záležitostech. Zároveň však musíme usilovat o jejich setrvání v naší sféře vlivu v zájmu společné bezpečnosti."
 PER_appease_the_seperatists_tt: "§GUž nám nebude hrozit vypuknutí války za nezávislost.§!"
 PER_army_shortcut: "Armáda"
 PER_artillery_bonus: "Domácí výroba dělostřelectva"
 PER_assassinate_reza_shah: "Atentát na Rezá Šáha"
 PER_assassinate_reza_shah_desc: "Rezá Šáh Pahlaví sice přinesl pro [PER.GetNameDef] velké změny, ne všechny jsou však mezi lidmi oblíbené. Po léta kolují zvěsti o atentátu, ale nikdo se dosud neodvážil vystřelit... nebo snad ano?"
 PER_assessing_the_opposition: "Vyhodnocení opozice"
 PER_assessing_the_opposition_desc: "Než vůbec začneme uvažovat o rozšíření našich hranic, musíme se nejprve podívat dovnitř země. Několik opozičních stran je s naší vládou stále nespokojenějších. Pokud chceme získat podporu lidu pro obnovu impéria, musíme si zajistit plnou podporu ve vládě, a to jakýmikoli prostředky."
 PER_assessing_the_opposition_tt: "Odemkne rozhodnutí §YZásahů vlády§! v rámci mise §Y$PER_civil_unrest_category$§! ze zaměření §Y$PER_legacy_of_greatness$§!, která nám umožní řídit hrozbu a zabránit občanské válce."
 PER_azadi: "Azádí"
 PER_azadi_autonomy_effect: "Duch Azádí"
 PER_azadi_desc: "Azádí je perské slovo pro „svobodu“ a stane se heslem, kolem něhož se sjednotíme při odporu proti našim okupantům. [ROOT.OVERLORD.GetNameDefCap] očekáva naši poslušnost, ale naším záměrem bylo vždy chránit suverenitu. Možná jsme prohráli bitvu, ale válku budeme vést dál."
 PER_bakhtiari_boost: "Výcvik Bachtiárů"
 PER_battlefield_support: "Podpora bojiště"
 PER_battlefield_support_desc: "Abychom zajistili bezpečnost našich jednotek postupujících k frontě, je zásadní využívat letadla pozemní podpory, která zabrání nepřátelským strojům v útocích na naši armádu."
 PER_bolster_civilian_industry: "Posílit civilní průmysl"
 PER_bolster_civilian_industry_desc: "Máme-li přežít blížící se bouři, musíme posílit náš civilní průmysl. Čím více zdrojů do něj vložíme, tím větší šanci bude mít naše ekonomika přežít nadcházející válku."
 PER_bolster_infantry: "Posílit pěchotu"
 PER_bolster_infantry_desc: "Obyčejný pěšák byl po generace základem každé armády a neměli bychom tuto složku zanedbávat. Posilme naši pěchotu a zajistěme, aby naše armády pochodovaly s hrdostí."
 PER_bolster_the_caspian: "Posílit Kaspik"
 PER_bolster_the_caspian_desc: "Kaspické moře je sice vnitrozemské, ale pro [SOV.GetNameDef] je to pouze další cesta k invazi na naše území. Někteří mohou tvrdit, že jeho obrana je zbytečná, ale opatrnosti vůči severním sousedům není nikdy nazbyt."
 PER_brown_shirts: "Pochody úderných jednotek"
 PER_brown_shirts_desc: "Mnozí členové naší strany v poslední době přijali hnědé uniformy evropských fašistických hnutí. Možná bychom měli tyto oddané stoupence využít k pořádání masových pochodů na podporu hnutí."
 PER_brown_shirts_tt: "§YZískáme [?ROOT.PER_fascist_militia_count] divizí milic při vypuknutí občanské války proti šáhovi nebo při přechodu na fašismus.§!"
 PER_buffer_state_tt: "Pokud bude přijat §Ymír§!, pak bude [AZR.GetFlag]§Y[AZR.GetNameDef]§!, [GEO.GetFlag]§Y[GEO.GetNameDef]§!, [ARM.GetFlag]§Y[ARM.GetNameDef]§! a [TMS.GetFlag]§Y[TMS.GetNameDef]§! uvolněny jako [PER.GetFlag]§Y[PER.GetAdjective]§! subjekty "
 PER_capital_protect: "Chránit [PER.Capital.GetCapitalVictoryPointName]"
 PER_capital_protect_desc: "Vzhledem k poloze je [PER.Capital.GetCapitalVictoryPointName] ideální místo k vybudování houževnaté obrany. Zřízením bunkrů a opěrných bodů zde budeme moci držet jako poslední bašta [PER.GetAdjective] naděje."
 PER_challenge_the_royal_navy: "Vyzvat britskou flotilu"
 PER_challenge_the_royal_navy_desc: "Nyní máme technologie i teoretické znalosti, abychom se postavili našemu hlavnímu protivníkovi. Chybí nám však praktické zkušenosti. Možná je získáme prostřednictvím menších provokací v Zálivu?"
 PER_choose_a_shahbanu: "Vybrat šáhbánu"
 PER_choose_a_shahbanu_desc: "Královská linie dynastie Pahlaví musí pokračovat, avšak vzhledem k mládí Muhammada Rezá Pahlavího dosud neměl možnost najít manželku. Nastal čas zvážit možnosti a vybrat ženu, která se stane šáhbánu naší země."
 PER_civil_unrest_tt: "§RZvolením tohoto zaměření se spustí časovaná mise $PER_civil_unrest_category$§!"
 PER_civil_war_happened: "Občanská válka proběhla"
 PER_clamp_azerbaijani_dissidence: "Potlačit ázerbájdžánský odpor"
 PER_clamp_azerbaijani_dissidence_desc: "Sever naší země obývá značná ázerbájdžánská populace, pro kterú je [PER.GetNameDef] jejich domovem. Přesto je zde mnoho nespokojených s naší vládou. Je nejvyšší čas tyto vzbouřenecké buňky zlikvidovat a vrátit regionu stabilitu a prosperitu."
 PER_clamp_kurdish_dissidence: "Potlačit kurdský odpor"
 PER_clamp_kurdish_dissidence_desc: "[PER.GetNameDefCap] zahrnuje území, která kdysi patřila Kurdům. Existuje proto významná diaspora nespokojená s naší vládou. Je nejvyšší čas tyto povstalecké buňky potlačit a obnovit stabilitu a prosperitu v regionu."
 PER_clash_of_titans: "Souboj titánů"
 PER_clash_of_titans_desc: "Objevil se nečekaný problém - znovuzrozené [GRE.GetNameDef]. Nemůžeme si dovolit další impérium, které by shromažďovalo jednotky na našich hranicích. Musíme okamžitě vyhlásit válku a zajistit tato území pro slávu šáha!"
 PER_clergy_happy_tt: "§GZvolením tohoto zaměření uklidníme duchovenstvo. Nebudou již považovat povstání proti vám za nutné.§!"
 PER_clergy_revolt_tt: "§RZvolením tohoto zaměření vyvoláte revoluci, která vás uvrhne do občanské války!§!"
 PER_clergy_upset_tt: "§RZvolením tohoto zaměření rozhněváte duchovenstvo. Pokud stabilita příliš klesne, hrozí revoluční občanská válka!§!"
 PER_coastal_defense_initiative: "Iniciativa pobřežní obrany"
 PER_coastal_defense_initiative_desc: "I když máme omezený přístup k oceánům, námořní invaze zůstává reálnou hrozbou. Abychom ochránili [PER.GetAdjective] pobřeží, musíme zahájit rozvoj obrany podél břehů Perského zálivu a Kaspického moře."
 PER_comintern_research_collaboration: "Výzkumná spolupráce s Kominternou"
 PER_comintern_research_collaboration_desc: "[SOU.GetNameDefCap] patří mezi světové lídry ve vědě a výzkumu. Díky zajištěnému spojenectví můžeme vyslat naše vědce, aby se učili od špičkových [SOU.GetAdjective] odborníků a přinesli jejich znalosti zpět domů."
 PER_communist_afghanistan_intervention: "Narušit Velkou hru"
 PER_communist_afghanistan_intervention_desc: "[ENG.GetAdjectiveCap] a [SOU.GetAdjective] se již téměř století přou o [AFG.GetNonIdeologyName]. My narušíme rovnováhu ve svůj prospěch tím, že tam dosadíme komunistický režim."
 PER_communist_air_defense: "Iniciativa protivzdušné obrany"
 PER_communist_air_defense_desc: "Nesmíme dopustit, aby vše, co jsme vybudovali, bylo zničeno z oblohy imperialistickými mocnostmi. Proto po celé zemi vybudujeme síť protivzdušné obrany."
 PER_communist_basic_plane_design: "Spolupráce v letectvu"
 PER_communist_basic_plane_design_desc: "Reformy našeho letectva začaly dobře, nyní se musíme zaměřit na vývoj technologií a dovedností potřebných k boji proti lodím. Možná bychom tento proces mohli urychlit s pomocí soudruhů ze zahraničí."
 PER_communist_destabilize_iraq: "Destabilizovat severní Irák"
 PER_communist_destabilize_iraq_desc: "[ENG.GetNameDef] je závislé na ropě, kterou jim posílá [IRQ.GetNonIdeologyName]. Můžeme jim přístup narušit podporou kurdského povstání na severu země a jeho napojením na nás."
 PER_communist_destabilize_iraq_tt: "Odemkne rozhodnutí §Y$PER_gulf_decisions_cat$§! pro podporu kurdského povstání."
 PER_communist_education_reform: "Rozšířit vzdělávací systém"
 PER_communist_education_reform_desc: "Náš vzdělávací systém je zastaralý a neodpovídá potřebám státu. Musíme dostat více dětí do škol a zajistit, aby odcházely s praktičtějšími dovednostmi využitelnými v pracovním procesu."
 PER_communist_gulf_hegemony: "Hegemonie v Perském zálivu"
 PER_communist_gulf_hegemony_desc: "Dosáhli jsme toho, co se zdálo nemožné - vyhnání imperialistických mocností z Perského zálivu. Nyní jsme faktickou velmocí regionu a můžeme začít prosazovat svůj vliv bez vnějších zásahů."
 PER_communist_industrialization: "Výbor pro hospodářské plánování"
 PER_communist_industrialization_desc: "Zřídíme nový úřad, který bude dohlížet na rozšiřování a modernizaci hospodářství, oproštěný od předsudků a setrvačnosti předchozích ekonomických institucí."
 PER_communist_kurdish_uprising: "Připravit kurdské povstání"
 PER_communist_kurdish_uprising_desc: "TODO"
 PER_communist_liberate_pashtuns: "Podpora paštunského nacionalismu"
 PER_communist_liberate_pashtuns_desc: "Teď, když je [AFG.GetNonIdeologyName] pevně v naší sféře vlivu můžeme destabilizovat pohraniční oblasti, které ovládá [ENG.GetNameDef], podporou silnějšího paštunského nacionalismu v celém regionu."
 PER_communist_liberate_pashtuns_tt: "Odemkne další rozhodnutí §Y$PER_gulf_decisions_cat$§! pro podporu odporu proti koloniálním mocnostem podél afghánsko-íránské hranice."
 PER_communist_naval_bomber_design: "[SOU.GetAdjectiveCap]-[ROOT.GetAdjective] konstrukce bombardérů"
 PER_communist_naval_bomber_design_desc: "S pomocí našich [SOU.GetAdjective] soudruhů jsme téměř připraveni nasadit síly námořních bombardérů, které zničí každé námořnictvo natolik pošetilé, aby vplulo do Perského zálivu bez našeho svolení."
 PER_communist_naval_designs: "Námořní spolupráce"
 PER_communist_naval_designs_desc: "V našich námořních reformách jsme dosáhli pokroku, avšak musíme zdvojnásobit úsilí a zahájit vývoj ponorkových technologií. Možná by nám v tom mohli pomoci naši soudruzi jinde?"
 PER_communist_propaganda: "Národní íránský rozhlas"
 PER_communist_propaganda_desc: "Znárodnění rozhlasových stanic do jedné veřejnoprávní instituce nám umožní rychle ovlivňovat veřejné mínění v otázkách, kde se plně neshoduje s postojem státu."
 PER_communist_propaganda_tt: "Odemkne rozhodnutí §Y$PER_national_iranian_radio$§! ke zvýšení stability, válečné podpory a popularity strany."
 PER_communist_shore_defense: "Iniciativa pobřežní obrany"
 PER_communist_shore_defense_desc: "Udržování silné soustavy námořní obrany podél našeho pobřeží výrazně odradí každého potenciálního agresora od vylodění na našich březích."
 PER_communist_submarine_design: "[SOU.GetAdjectiveCap]-[ROOT.GetAdjective] vývoj ponorek"
 PER_communist_submarine_design_desc: "Ve spolupráci s našimi [SOU.GetAdjective] soudruhy jsme blízko vývoji špičkové ponorky, která nám umožní ovládnout Perský záliv."
 PER_consolidate_british_territory: "Konsolidovat [ENG.GetAdjective] území"
 PER_consolidate_british_territory_desc: "Příliš dlouho byla [ENG.GetAdjective] přítomnost na Blízkém východě, kde [ENG.GetNameDef] ve skutečnosti nemá co pohledávat. Nyní, když jsme vybojovali vlastní nezávislost, učiňme totéž i pro ostatní národy regionu a zajistěme, abychom je chránili my, nikoli oni."
 PER_constitutional_monarchy: "Obnovení ústavních omezení moci šáha"
 PER_constitutional_monarchy_desc: "Šáh příliš dlouho ovládal politiku země, avšak jeho úplná absence by znepokojila mnohé, kteří nadále věří v jeho posvátnou roli. Proto omezíme jeho vliv na politické záležitosti a zredukujeme jeho postavení na ceremoniální."
 PER_construct_air_bases: "Vybudovat letecké základny"
 PER_construct_air_bases_desc: "Naše letadla potřebují základny, z nichž mohou efektivně plnit své úkoly. Je proto zásadní rozvíjet nové letecké základny po celé zemi a rozšířit kapacity našeho letectva."
 PER_construct_air_defenses: "Zřídit protivzdušnou obranu"
 PER_construct_air_defenses_desc: "Musíme podél hranic instalovat více protiletadlových děl, abychom ochránili naše postupující jednotky před nepřátelskými letadly."
 PER_construct_naval_bases: "Vybudovat nové námořní základny"
 PER_construct_naval_bases_desc: "Naše současná námořní kapacita je nižší, než bychom si přáli. Abychom ji zvýšili, musíme vybudovat další loděnice podél obou našich pobřeží schopné obsluhovat válečné lodě."
 PER_continue_westernization: "Pokračovat ve westernizaci"
 PER_continue_westernization_desc: "Westernizace byla vždy do jisté míry cílem, který přetrvával v myslích našeho vedení. Mnozí touží následovat některé z hlavních západních mocností a přijmout jejich ideologie a postupy. Pokud se k nim chceme v budoucnu připojit, musíme se na tuto integraci připravit již nyní."
 PER_crush_saudi_arabia: "Integrace válečné ekonomiky"
 PER_crush_saudi_arabia_desc: "Naše nedávná tažení nám přinesla velké množství průmyslového vybavení a personálu, které lze převézt domů a využít. I když to bude vyžadovat značný počet vlaků."
 PER_currently_doing_war_plan: " Aktuálně se pracuje na §Yválečném plánu§!."
 PER_curtail_pan_arabism: "Omezit panarabismus"
 PER_curtail_pan_arabism_desc: "Arabské národy Blízkého východu a severní Afriky stále více přijímají panarabskou solidaritu. Nemůžeme dopustit, aby se u našich hranic zformovala jednotná síla, a proto musíme jednat preventivně."
 PER_cyrus_initiative: "Kýrova iniciativa"
 PER_cyrus_initiative_desc: "Kýrova iniciativa je náš nejnovější přísně tajný projekt zaměřený na vývoj ničivých zbraní, které dokážeme použít na bojišti k naprostému zničení našich nepřátel. Naši vědci již připravili zajímavé návrhy, jaké žádný jiný stát dosud nevyvinul."
 PER_czech_tanks: "Zakoupit české tankové licence"
 PER_czech_tanks_desc: "Než začneme navrhovat a vyrábět vlastní mechanizované síly, měli bychom se obrátit na státy proslulé výrobou tanků. [CZE.GetNameDef] nám může poskytnout licenci na výrobu tanků ze slavných Škodových závodů."
 PER_deal_with_eitc: "Uzavřít dohodu s EITC"
 PER_deal_with_eitc_desc: "Naši východní sousedé nezaháleli. [RAJ.GetNonIdeologyName] obnovila Východoindickou obchodní společnost, která se stala celostátním megakoncernem. Bylo by moudré získat je na naši stranu v otázce ropného monopolu a uzavřít dohodu s nimi i se zbytkem OPEC."
 PER_declare_loyalty_to_britain: "[ROOT.OVERLORD.GetNameDef] a jeho věrný subjekt"
 PER_declare_loyalty_to_britain_desc: "Jako nový [ROOT.OVERLORD.GetAdjective] subjekt bychom měli postupovat opatrně a následovat vůli našeho suzeréna. Možná je to příležitost konečně dokončit náš modernizační program."
 PER_declared_loyalty: "Vyhlášena loajalita suzerénovi"
 PER_demand_afghan_territory: "Požadovat afghánské území"
 PER_demand_afghan_territory_desc: "[AFG.GetNameDefCap] je zemí vysokých hor a klikatých řek, proto bude její dobytí v budoucnu složité. Pokud si zde zajistíme předmostí, stane se výborným výchozím místem pro další postup na Kábul."
 PER_demand_iraqi_territory: "Požadovat irácké území"
 PER_demand_iraqi_territory_desc: "Severní [IRQ.GetNonIdeologyName] bude ideálním předmostím k demonstraci, že [PER.GetNameDef] je jedinou skutečnou velmocí regionu."
 PER_demand_war_reparations: "Požadovat válečné reparace"
 PER_demand_war_reparations_desc: "Navzdory snahám útočníků se jim nepodařilo splnit jejich cíle a my začínáme ve válce vítězit. Musíme jim okamžitě vnutit své požadavky a přinutit je zaplatit za způsobené škody."
 PER_demand_west_asia: "Zajistit francouzskou západní Asii"
 PER_demand_west_asia_desc: "[FRA.GetAdjectiveCap] jsou na těchto územích neoprávněnými vetřelci a musí být vytlačeni, pokud chceme naplnit vlastní imperiální cíle. [SYR.GetNameDef] a [LEB.GetNameDef] musí být zabrány."
 PER_democratic_shortcut: "Politika:\nNárodní fronta"
 PER_desert_training: "Specializovaný výcvik v poušti"
 PER_desert_training_desc: "[PER.GetNonIdeologyName] se skládá ze značné části z pouštních oblastí. Aby naše armáda dokázala v tomto prostředí efektivně operovat, musíme výcvik přizpůsobit přežití a pohybu v poušti."
 PER_develop_cities: "Rozvoj hlavních sídel"
 PER_develop_cities_desc: "V současnosti je Teherán nejrozvinutějším [ROOT.GetAdjective] městem. Chceme-li skutečně přijmout modernizaci, musíme rozšířit infrastrukturu i v dalších velkých městech."
 PER_develop_oil_fields: "Rozvíjet ropná pole"
 PER_develop_oil_fields_desc: "K našemu již rozsáhlému ropnému komplexu jsme objevili nové zdroje černého zlata. Vybudování nových vrtů by mohlo vést až k vytvoření monopolu na tuto strategickou surovinu."
 PER_develop_qorkhaneh: "Rozvinout Korcháne"
 PER_develop_qorkhaneh_desc: "Korcháne je naším hlavním zdrojem výroby zbraní a munice v Teheránu. Investice do jeho rozvoje zajistí, že výroba vybavení zůstane na nejvyšší úrovni."
 PER_dig_and_defend: "Zakopat se a bránit"
 PER_dig_and_defend_desc: "Nepřátelské síly proudí na hranice našeho státu ze všech stran. Místo ofenzivy se musíme zakopat, bránit se a způsobovat vetřelcům ztráty."
 PER_donate_oil_fields: "Převést ropná pole na [GER.GetNameDef]"
 PER_donate_oil_fields_desc: "Po letech dodávek ropy státům jako [ENG.GetNameDef] by pro nás bylo výhodnější, ať část našich těžebních zařízení převezme [GER.GetNameDef], což podpoří jejich válečné úsilí."
 PER_eastern_expansion: "Expanze na východ"
 PER_eastern_expansion_desc: "Režimy na východ od nás zůstávají křehké a náchylné ke kolapsu. Taková příležitost k jejich začlenění do naší sféry vlivu se nemusí znovu opakovat."
 PER_educational_reforms: "Vzdělávací reformy"
 PER_educational_reforms_desc: "Zavedli jsme nové kampaně gramotnosti a vybudovali univerzity. Nastal čas uskutečnit reformy, které přispějí ke společenskému rozvoji a odstraní dřívější nerovnosti ve vzdělávání."
 PER_elevate_the_iran_party: "Posílit Íránskou stranu"
 PER_elevate_the_iran_party_desc: "Strana Túde by navázala náš stát na [SOU.GetNameDef] a udělala vše, co od ní [SOU.Capital.GetCapitalVictoryPointName] žádá. Všichni pokrokoví občané musí stát při Íránské straně, pokud chceme dosáhnout vlastní cesty k socialismu."
 PER_embrace_industrial_powers: "Přijmout průmyslové mocnosti"
 PER_embrace_industrial_powers_bonus: "Přijaty průmyslové mocnosti"
 PER_embrace_industrial_powers_desc: "Namísto izolace bychom měli využít vazby na průmyslové mocnosti k podpoře rozvoje [PER.GetAdjective] budoucnosti."
 PER_embrace_national_front: "Směrem k republice"
 PER_embrace_national_front_desc: "Politická moc již nemůže zůstat v rukou nevoleného šáha. Musíme zrušit celou instituci a směřovat k vytvoření [ROOT.GetAdjective] republiky."
 PER_embrace_opulence: "Přijmout kulturu okázalosti"
 PER_embrace_opulence_desc: "Pro někoho tak významného, jako je Král králů, je zásadní ukázat světu, jak okázalá může být [PER.GetAdjective] říše. Ukažme svou nádheru všem, kdo na ni chtějí pohlédnout."
 PER_emperor_for_people: "Císař pro lid"
 PER_emperor_for_people_desc: "Muhammad Rezá Šáh chce, aby jeho vláda znovu spojila panovníka s lidem a zlepšila život běžných občanů."
 PER_entice_foreign_investment: "Přilákat zahraniční investice"
 PER_entice_foreign_investment_desc: "Naše ekonomika má obrovský potenciál, avšak potřebujeme větší zahraniční investice k nastartování růstu."
 PER_establish_air_academy: "Zřídit leteckou akademii"
 PER_establish_air_academy_desc: "Založení oficiální letecké akademie v Teheránu urychlí výcvik a zajistí, že naši piloti budou špičkově připraveni."
 PER_establish_airforce: "Zřídit letectvo"
 PER_establish_airforce_desc: "Císařské [PER.GetAdjective] letectvo bylo založeno roku 1920 Rezá Šáhem Pahlavím. Dnes jej musíme dále upevnit."
 PER_establish_immortal_legion_tt: "Odemkne divizní šablonu §YImmortal Legion§! a naverbuje §Ytři§! jednotky v §Y[ROOT.capital.GetCapitalVictoryPointName]§!"
 PER_establish_motor_arms: "Zřídit průmysl motorových zbraní"
 PER_establish_motor_arms_desc: "Abychom podpořili naši pěchotu, měli bychom se zaměřit na výrobu různých typů vozidel, které zajistí, že jejich schopnost pohybu na bojišti bude moderní a co nejplynulejší. Založením průmyslu pro tento typ vybavení se připravujeme na budoucí modernizaci našich ozbrojených sil."
 PER_establish_northern_buffer_states: "Zřídit nárazníkové státy na severu"
 PER_establish_northern_buffer_states_desc: "Abychom zajistili, že [PER.GetNameDef] nebude čelit přímému vpádu našich nepřátel, musíme osvobodit okupované národy v této oblasti a obnovit jejich suverenitu. Doufejme, že to v budoucnu zabrání jakýmkoli překvapivým invazím."
 PER_establish_nuclear_program: "Zřídit [PER.GetAdjective] jaderný program"
 PER_establish_nuclear_program_desc: "Tajemství atomu byla již nějakou dobu zkoumají [GER.GetNameDef] a [USA.GetNameDef]. Po obdržení poznámek a výzkumných dokumentů nám naši [USA.GetAdjective] přátelé oficiálně pomohli se zřízením vlastního jaderného programu."
 PER_establish_opec: "Založit OPEC"
 PER_establish_opec_desc: "S plně rozvinutým ropným průmyslem je načase obrátit pozornost na další ropou bohaté země a zjistit, zda se můžeme sjednotit pod jedním praporem a monopolizovat tento strategický zdroj. [IRQ.GetNameDef], [SAU.GetNameDef] a [VEN.GetNameDef] se jednomyslně rozhodli vytvořit Organizaci zemí vyvážejících ropu."
 PER_establish_special_unit: "Založit Legii nesmrtelných"
 PER_establish_special_unit_desc: "Nesmrtelní byli jedny z nejikoničtějších jednotek nasazovaných starověkými perskými říšemi. Jak vstupujeme do nové éry imperiální velikosti, nastal čas znovu ustanovit Nesmrtelné jako legii elitních úderných jednotek."
 PER_establish_tehran_armor: "Založit Tehran Armor"
 PER_establish_tehran_armor_desc: "Nastal čas založit naši vlastní společnost na výrobu tanků. Po rozhodnutí o názvu Tehran Armor bylo oznámeno, že tato společnost bude státem dotována, aby jí pomohla s rozjezdem."
 PER_establish_the_navy: "Zřídit námořnictvo"
 PER_establish_the_navy_desc: "Stejně jako letectvo bylo i imperiální [PER.GetAdjective] námořnictvo založeno Rezou Šáhem Pahlavím po jeho převratu proti staré dynastii Kádžárovců. Od té doby jsme zjistili potřebu posílit to, co již bylo vytvořeno, a zajistit si lepší kontrolu nad moři, která omývají naše severní a jižní hranice."
 PER_established_cell_here: "Zřízena opoziční buňka"
 PER_every_man_serves: "Každý muž, který může sloužit"
 PER_every_man_serves_desc: "Budoucností naší armády bude kvantita nad kvalitou. Máme rozsáhlou populaci a v takových časech by měl každý muž schopný nosit zbraň splnit svou občanskou povinnost a bránit svou zemi před zahraničními vetřelci. Přijdeme sice o specializovaný výcvik, avšak naše početní převaha by mohla nepřítele zahltit."
 PER_exclude_religion: "Vyloučit náboženství"
 PER_exclude_religion_desc: "Islám a náboženství obecně se staly překážkou modernizace našeho státu jak po politické, tak hospodářské stránce. Musíme jasně dát najevo, že [ROOT.GetNonIdeologyName] tyhle překážky nebude muset překonávat."
 PER_expand_dockyards: "Rozšířit loděnice"
 PER_expand_dockyards_desc: "Jak se naše námořnictvo rozrůstá, musíme tomu přizpůsobit i námořní infrastrukturu. Jen tak zajistíme, že kontrola nad naším pobřežím zůstane pevně v našich rukou."
 PER_expand_immortal_legion_tt: "Naverbuje §Ytři§! jednotky §YImmortal Legion§! v §Y[ROOT.capital.GetCapitalVictoryPointName]§!"
 PER_expand_imperial_guard: "Rozšířit císařskou gardu"
 PER_expand_imperial_guard_desc: "Jako nejnovější velký rod vládnoucí zemi vyžaduje dynastie šáha jen to nejlepší, pokud jde o královskou gardu. Pokud budou správně vyzbrojeni a vycvičeni, mohou se připojit i k našim frontovým jednotkám."
 PER_expand_imperial_guard_tt: "Odemkne divizní šablonu §YIranian Imperial Guard§! a naverbuje §Ydvě§! jednotky v §Y[ROOT.capital.GetCapitalVictoryPointName]§!"
 PER_expand_military_facilities: "Rozšířit vojenské závody"
 PER_expand_military_facilities_desc: "Naše současná schopnost vyrábět výzbroj je značně nedostatečná. Musíme co nejdříve rozšířit vojenské závody, aby byla naše nově reorganizovaná armáda plně vyzbrojena a připravena k boji."
 PER_expand_oil_production: "Rozšířit těžbu ropy"
 PER_expand_oil_production_desc: "[PER.GetNonIdeologyName] má ohromné zásoby ropy a byla by hloupost tento potenciál nevyužít. Rozšiřme těžbu, abychom měli v budoucnu silnou vyjednávací pozici vůči Západu."
 PER_expand_tabriz_masshad: "Spojení Tabríz-Mašhad"
 PER_expand_tabriz_masshad_desc: "Musíme pokračovat v rozšiřování Transíránské železnice. Zaměřme se na propojení měst Tabríz a Mašhad."
 PER_expand_tehran_abbas: "Spojení Teherán-Bandar Abbás"
 PER_expand_tehran_abbas_desc: "Musíme pokračovat v rozšiřování Transíránské železnice. Zaměřme se na propojení měst Teherán a Bandar Abbás."
 PER_expand_tehran_armor: "Rozšířit závody Tehran Armor"
 PER_expand_tehran_armor_desc: "Společnost Tehran Armor pracuje na vývoji nových tanků pro naše válečné úsilí. Urychleme tento proces rychlým rozšířením jejích výrobních kapacit, aby mohly být obrněnce nasazeny na bojiště co nejdříve."
 PER_expand_tehran_emam: "Spojení Teherán-Bandar Šáhpúr"
 PER_expand_tehran_emam_desc: "Musíme pokračovat v rozšiřování Transíránské železnice. Zaměřme se na propojení měst Teherán a Bandar Šáhpúr."
 PER_expand_unique_unit: "Rozšířit Legii nesmrtelných"
 PER_expand_unique_unit_desc: "Po založení Legie nesmrtelných jako součásti našeho imperiálního dědictví nyní můžeme investovat prostředky do jejího rozšíření a umožnit dalším mužům nést tíhu [PER.GetAdjective] impéria."
 PER_expert_raiders: "Zkušení nájezdníci"
 PER_expert_raiders_desc: "Ochrana vlastního námořního obchodu je důležitá, avšak ve válce je klíčové aktivně narušovat zásobovací trasy nepřítele. Musíme se zaměřit na využití našich námořních sil k přepadům nepřátelských konvojů."
 PER_fascism_sway_the_rich_idea_tt: "Při vypuknutí občanské války nebo převzetí moci fašisty získáme následující ideu:"
 PER_fascist_attack_afghanistan: "Konfrontovat Afghánistán"
 PER_fascist_attack_afghanistan_desc: "Za našimi hranicemi je uvězněna početná íránská populace pod nadvládou Paštunů v [AFG.Capital.GetCapitalVictoryPointName]u. Taková urážka naší územní celistvosti již nebude tolerována."
 PER_fascist_attack_turkey: "Omezit [TUR.GetAdjective] hrozbu"
 PER_fascist_attack_turkey_desc: "[TUR.GetNonIdeologyName] a jeho osmanští předchůdci po dlouhá staletí ohrožovali naše hranice a kazili naši kulturu, přičemž okupovali území, která právem patří našemu lidu. Musíme tuto historickou křivdu napravit."
 PER_fascist_reach_out_to_germany: "Obrátit se na Západ"
 PER_fascist_reach_out_to_germany_desc: "Jak se zapojení do globálního konfliktu stává stále pravděpodobnějším, měli bychom se možná přiklonit k ideologicky spřízněným režimům, jako je [GER.GetNameDef]."
 PER_fascist_reach_out_to_japan: "Obrátit se na Východ"
 PER_fascist_reach_out_to_japan_desc: "[JAP.GetNonIdeologyName] zná boj mezi modernizací státu a ochranou vlastní kultury před zhoubnými vlivy westernizace. Měli bychom se s nimi sblížit, abychom prolomili západní sevření globální moci."
 PER_fascist_secularism: "Prosadit sekularismus"
 PER_fascist_secularism_desc: "Násilná konverze Perské říše k islámu zničila naši kdysi velkolepou kulturu. Musíme se vrátit ke svým kořenům a vyloučit toto cizí náboženství z veřejného života přísným prosazováním sekularismu."
 PER_feat_of_engineering: "Inženýrský triumf"
 PER_feat_of_engineering_bonus: "Dokončena Transíránská železnice"
 PER_feat_of_engineering_desc: "Dokončením Transíránské železnice jsme dosáhli něčeho výjimečného. Nejen kvůli jejímu obrovskému rozsahu, ale také díky technickým zázrakům potřebným k překonání strmých tras a horského terénu. Na tento inženýrský úspěch, realizovaný naší vládou a najatými inženýry, může být [ROOT.GetNonIdeologyName] hrdý."
 PER_fight_for_iran: "Boj za [PER.GetNonIdeologyName]"
 PER_fight_for_iran_desc: "Naše nejhorší obavy se naplnily, když nepřátelské síly prorazily naše obrany a postupují v plnohodnotné invazi na [PER.GetNameDef]. Přestože nás čekají těžké časy, musíme sjednotit náš lid a připravit naše jednotky k obraně našeho velkého národa proti jakékoli cizí moci, která ohrožuje naši suverenitu."
 PER_fight_for_iran_shortcut: "Boj za Írán"
 PER_finding_a_shah: "Hledání šáha"
 PER_finding_a_shah_desc: "Po porážce dynastie Pahlaví máme příležitost dosadit na Sluneční trůn vstřícnějšího šáha, který bude naslouchat moudrým radám svých důvěryhodných poradců."
 PER_finding_a_shah_tt: "V následující události si budeme moci zvolit, kdo se stane novým [ROOT.GetAdjective] šáhem."
 PER_first_iranian_empire: "První íránská říše"
 PER_first_iranian_empire_desc: "Rezá Šáh Pahlaví vždy upřednostňoval označení své země jako [PER.GetNameDef] a právě on obnovil tento název jako oficiální jméno státu v roce 1935. Základem jeho nových imperiálních ambicí proto bude vytvoření zcela nové íránské říše, namísto přímého napodobování dřívějších Peršanů."
 PER_first_warning_flag: "První varování islámské revoluce"
 PER_follow_the_tudeh: "Semknout se kolem strany Túde"
 PER_follow_the_tudeh_desc: "Strana Túde je jedinou stranou, která skutečně vyjadřuje touhu lidu po radikální změně, na rozdíl od demokratické fasády současného režimu. Proto se kolem ní musíme sjednotit jako kolem jádra radikálního hnutí."
 PER_food_for_all: "Jídlo pro každého občana"
 PER_food_for_all_desc: "Hladomory nám nejsou cizí. Díky modernizačním snahám můžeme zlepšit distribuci potravin a zajistit, aby měl každý [PER.GetAdjective] občan přístup k základním životním potřebám."
 PER_foothold_in_indus: "Předmostí na Indu"
 PER_foothold_in_indus_desc: "[RAJ.GetNameDefCap] je výkladní skříní [ENG.GetAdjective] koloniální moci. Tato země nám však náleží právem daným slovy Dareia Velikého. Zahajme jednání a zajistěme si opěrný bod v Indii."
 PER_foothold_in_indus_tt: "Odemkne §Yřetězec událostí§!, v němž budou §Y[PER.GetNameDefCap]§! a §Y[RAJ.GetNameDefCap]§! jednat o kontrole §YBalúčistánu§!."
 PER_force_abdication: "Vynutit abdikaci"
 PER_force_abdication_desc: "Šáh a jeho přisluhovači jsou otřeseni masovým odporem lidu. Nyní je ten pravý okamžik využít naší výhody a donutit ho k abdikaci, abychom jednou provždy ukončili tento feudální nesmysl."
 PER_force_them_back: "Zatlačit je zpět"
 PER_force_them_back_desc: "Vždy jsme věděli, že jakmile válka začne, budeme se muset buď bránit, nebo zatlačit naše nepřátele zpět. Pokud zvolíme ofenzivní postup, budeme v dobré pozici k prosazení našich požadavků po skončení konfliktu. Může to být riskantní, ale naše síly jsou na takovou operaci připraveny."
 PER_force_white_peace: "Vynutit bílý mír"
 PER_force_white_peace_desc: "Invaze našeho nepřítele neprobíhá zcela podle plánu. Díky našemu tvrdému odporu a odhodlání postavit se jim se jim nepodařilo získat mnoho [PER.GetAdjective] území. Vzhledem k jejich obtížím jsme v dobré pozici vynutit si bílý mír na těchto opovážlivých vetřelcích."
 PER_forced_secularization: "Vynucená sekularizace"
 PER_forced_secularization_desc: "Od chvíle, kdy se Rezá Šáh Pahlaví dostal k moci, [PER.GetNameDef] neustálé tlačí proti duchovenstvu. Islám sice zůstává naším státním náboženstvím, avšak ve snaze dokázat západnímu světu, že jsme schopni stát po jeho boku, je načase oddělit náboženství od státu a vydat se cestou modernizace."
 PER_foreign_retraining: "Program zahraničního přeškolení"
 PER_foreign_retraining_desc: "Naše současná armáda je špatně vycvičená a neorganizovaná. Abychom zlepšili kvalitu našich sil, [PER.GetNonIdeologyName] musí investovat do příchodu zahraničních odborníků, kteří by vycvičili naše jednotky. To by je mělo rychle připravit na boj."
 PER_foreign_schools: "Převzít zahraniční školy"
 PER_foreign_schools_bonus: "Znárodněné zahraniční školy"
 PER_foreign_schools_desc: "Na [PER.GetAdjective] území se nachází velké množství škol vlastněných zahraničními subjekty. Tyto instituce lze považovat za důkaz toho, že naše vedení přenechává suverenitu cizím mocnostem. Měli bychom je převzít a znárodnit ve prospěch rozvoje naší země."
 PER_form_arya_party: "Založit stranu Árijá"
 PER_form_arya_party_desc: "Hasan Arfa byl loajálním vojenským důstojníkem a oddaným obráncem šáha jako odrazu samotného Boha. Nyní však může využít rostoucích nacionalistických nálad k radikální reformě země, která překoná i nejodvážnější představy samotného šáha."
 PER_form_oil_company: "Založit vlastní ropnou společnost"
 PER_form_oil_company_desc: "Příliš dlouho byly naše ropné pole těženy a kontrolovány zahraničními koloniálními mocnostmi. S nově získanými zásobami a budoucností bez cizího vlivu nastal čas založit Národní [PER.GetAdjective] ropnou společnost."
 PER_form_savak: "Založit SAVAK"
 PER_form_savak_desc: "Špionáž se ukazuje jako klíčový prvek válečného úsilí. Abychom drželi krok se zpravodajskými aktivitami našich nepřátel, měli bychom založit vlastní organizaci pro řízení operativců a špionážních operací. I na domácí scéně nám to pomůže posílit vládu a sledovat ty, kteří by ji chtěli svrhnout."
 PER_form_savama: "Zřídit tajnou policii"
 PER_form_savama_desc: "Zrádci, kteří opustili naši kulturu nebo pracují jako agenti cizích mocností, musí být co nejdříve odhaleni a odstraněni. Za tímto účelem zřídíme novou speciální policejní složku."
 PER_form_sumka: "Založit SUMKA"
 PER_form_sumka_desc: "$PER_davud_monshizadeh$ nedávno navštívil [GER.GetNameDef], kde se seznámil s tamním národně socialistickým hnutím. Nyní se zdá, že je připraven vrátit se do Íránu a využít současnou vlnu nacionalismu k nastolení nového íránského řádu."
 PER_found_iranian_shipyards: "Založit íránské loděnice"
 PER_found_iranian_shipyards_desc: "Zatímco nákup lodí od jiných zemí nám prozatím stačil, pokud chceme držet krok s námořním zbrojením v regionu, musíme investovat do vlastních kapacit. Toho dosáhneme založením společnosti zaměřené především na stavbu lodí pro naše válečné úsilí - íránských loděnic."
 PER_free_elections: "Svobodné volby"
 PER_free_elections_desc: "S formováním naší nové, obnovené vlády nastal čas rozhodnout, kdo se stane předsedou vlády a povede [PER.GetNameDef] do zlatého věku demokracie!"
 PER_free_elections_tt: "Umožní vám vybrat, který §Ykandidát§! je nejvhodnější, aby vedl §Ydemokratický [PER.GetNonIdeologyName].§!"
 PER_fund_imperial_excellency: "Financovat imperiální velkolepost"
 PER_fund_imperial_excellency_desc: "Říše se vydala cestou okázalého předvádění svého bohatství vůči méně významným sousedům. Nyní je čas část těchto prostředků investovat do vylepšení paláce. Najmutí dalších stráží se zdá být vhodným řešením!"
 PER_fund_state_intelligence: "Financovat státní rozvědku"
 PER_fund_state_intelligence_desc: "Navýšením financování našeho státního zpravodajského programu budeme schopni lépe sledovat možné nepokoje a povstání v naší zemi. Jejich včasným potlačením zajistíme bezpečnost a stabilitu našeho státu."
 PER_future_of_war: "Budoucnost války"
 PER_future_of_war_desc: "Ještě před několika desetiletími se války vedly pomocí lidí a koní, skromného dělostřelectva a zastaralých taktik. V moderní době však nastává éra tanku. Musíme držet krok s pokrokem ve vojenské technologii, pokud chceme čelit silám, které nás ohrožují."
 PER_german_non_aggression: "[GER.GetNonIdeologyName] a pakt o neútočení"
 PER_german_non_aggression_desc: "Jak se situace v Evropě začíná vyhrocovat, může na nás být vyvíjen nátlak, abychom si vybrali stranu. Je však důležité, ať si [PER.GetNameDef] zachová svou neutralitu, pokud by vypukla válka. Vzhledem k jejich rozsáhlé industrializaci bude nejlepší, když [GER.GetNameDef] obdrží od nás nabídku paktu o neútočení, abychom zajistili naši bezpečnost."
 PER_german_tanks: "Zakoupit německé tankové licence"
 PER_german_tanks_desc: "Než začneme uvažovat o návrhu a výrobě vlastních mechanizovaných sil, měli bychom se obrátit na země známé svou produkcí tanků. Pokud oslovíme [GER.GetNameDef], můžeme vyrábět silné tanky, které projdou nepřátelskými linimi jako nůž máslem."
 PER_glory_of_cyrus: "Sláva Kýra Velikého"
 PER_glory_of_cyrus_desc: "Po splnění našich válečných cílů a zajištění území pod [PER.GetAdjective] suverenitou jsme díky tvrdé práci a odvaze našich ozbrojených sil přinesli pro naši zemi novou éru prosperity. Konečně může [PER.GetNameDef] znovu naplnit odkaz zakladatele naší civilizace, Kýra Velikého. Sláva Kýrovi! Sláva šáhovi!"
 PER_half_stability_tt: "§RNaše stabilita klesla pod 50 %! Pokud klesne pod 20 %, hrozí revoluce!§!"
 PER_his_fathers_footsteps: "V otcových stopách"
 PER_his_fathers_footsteps_desc: "Po tragické smrti Rezy Šáha Pahlavího převzal jeho syn, Mohammad Rezá Pahlaví, roli [PER.GetAdjective] vůdce. Přestože je mladým králem, který neměl touhu vládnout, musí nyní následovat cestu svého otce a přinést slávu pro [PER.GetNameDef]."
 PER_hormuz_crisis: "Hormuzská krize"
 PER_hormuz_crisis_desc: "Imperialisté jsou v defenzivě, nyní je čas je pod hrozbou útoku ze všech stran vytlačit z regionu. Začneme tento proces blokádou Hormuzského průlivu pro imperiální lodní dopravu."
 PER_hormuz_crisis_tt: "§YKaždá koloniální mocnost v Arábii nebo v Perském zálivu obdrží událost k stažení z území v regionu. Pokud odmítnou, budeme mít možnost jim vyhlásit válku.§!"
 PER_imperial_excellency_tt: "Po dokončení národního zaměření §Y$PER_expand_imperial_guard$§! budou §Ydvě§! jednotky §YIranian Imperial Guard§! naverbovány v §Y[ROOT.capital.GetCapitalVictoryPointName]§!"
 PER_imperial_expansionism: "Imperiální expanzionismus"
 PER_imperial_expansionism_desc: "Nastal čas začít pracovat na rozšíření naší nové říše za současné hranice. Musíme promazat náš válečný stroj, povolat obyvatelstvo k plnění jejich povinnosti a ukázat světu, že [PER.GetAdjective] impérium je připraveno získat to, co mu právem náleží."
 PER_imperial_funded_universities: "Císařem financované univerzity"
 PER_imperial_funded_universities_desc: "Abychom dokázali, že [PER.GetNameDef] může stát po boku světových velikánů, šáh věnoval značné prostředky na financování univerzit. Díky tomuto daru získá náš lid lepší přístup ke kvalitnímu vysokoškolskému vzdělání."
 PER_import_rocketry: "Dovoz raketových konstrukcí"
 PER_import_rocketry_desc: "Válečnictví se vyvíjí neuvěřitelným tempem. Jak jiné státy začínají vyvíjet raketové technologie pro bojiště, musíme s nimi držet krok dovozem plánů potřebných k výrobě vlastních zázračných zbraní."
 PER_increase_education_funding: "Zvýšit financování vzdělávání"
 PER_increase_education_funding_bonus: "Zvýšené financování vzdělávání"
 PER_increase_education_funding_desc: "V rámci modernizační iniciativy Rezá Šáha byl kladen důraz na zvýšení kvality vzdělávání. Chceme zavést bezplatné povinné vzdělávání pro muže i ženy a uzavřít soukromá náboženská vzdělávací zařízení."
 PER_increase_faculty_staffing_budget: "Zvýšit rozpočet na akademické pracovníky"
 PER_increase_faculty_staffing_budget_desc: "Chceme-li si udržet technologickou úroveň, musíme přilákat ty nejchytřejší mozky, které naše země nabízí. Cena bude vysoká, avšak cena technologické stagnace ještě vyšší."
 PER_increase_faculty_staffing_budget_tt: "Upraví §Y$PER_technological_modifier$§! o:\n"
 PER_increase_heavy_arms: "Rozšířit výrobu těžkých zbraní"
 PER_increase_heavy_arms_desc: "S růstem našich ozbrojených sil roste i potřeba rozsáhlých zařízení pro výrobu těžké techniky. To nám umožní vyvíjet vlastní dělostřelecké konstrukce a přestat se spoléhat na zahraniční podporu."
 PER_increase_military_funding: "Zvýšit vojenské výdaje"
 PER_increase_military_funding_desc: "Náš vůdce Rezá Šáh Pahlaví je absolventem prestižních Perských kozáků. Není proto překvapením, že usiluje o posílení [PER.GetAdjective] vojenských schopností investicemi do výcviku a výroby výzbroje."
 PER_increase_oil_sales: "Zvýšit prodej ropy"
 PER_increase_oil_sales_desc: "Jelikož již s námi [ENG.GetNameDef] spolupracuje v oblasti těžby ropy, dává smysl zvýšit objem prodeje z nově vytěžených zdrojů. Jedná se o oboustranně výhodnou dohodu."
 PER_industrial_aid: "Průmyslová pomoc"
 PER_industrial_aid_desc: "[SOU.GetNameDef] již názorně ukázal, že i zemědělskou ekonomiku lze rychle industrializovat. Měli bychom je požádat o sdílení jejich zkušeností."
 PER_industry_shortcut: "Ekonomika"
 PER_infantry_equipment_bonus: "Posílení pěchotní výzbroje"
 PER_international_solidarity: "Mezinárodní solidarita"
 PER_international_solidarity_desc: "I když jsme se zbavili imperialistických okovů doma, nebudeme skutečně svobodní, dokud imperialisté neopustí celý region. Dokud nejsme připraveni na otevřený střet, budeme jejich pozice systematicky podkopávat."
 PER_intervene_in_central_asia: "Ochrana velkoíránské diaspory"
 PER_intervene_in_central_asia_desc: "Oslabili jsme [SOU.GetAdjective] kontrolu nad Střední Asií a mezičasem jsou i oni zaměstnáni konflikty jinde. Nastal čas je z regionu jednou provždy vytlačit."
 PER_intervention_in_iraq: "Napadnout [IRQ.GetNonIdeologyName]"
 PER_intervention_in_iraq_desc: "[IRQ.GetNonIdeologyName] je pouhým výtvorem západních imperialistů, kteří nakreslili hranice na mapě. Takový stát je neudržitelný a měl by být navrácen svým právoplatným vlastníkům - nám."
 PER_invading_country_flag: "Vedení útoku na [PER.GetNameDef]"
 PER_invasion_of_india: "Invaze na indický subkontinent"
 PER_invasion_of_india_desc: "Plány, jak napadnout [RAJ.GetNameDef], patří k našim nejambicióznějším cílům, avšak půjde o velmi nebezpečnou operaci. Ohrozíme tím [ENG.GetAdjective] zájmy a přivoláme jejich hněv. Pokud jsme ochotni nést následky, pak pokračujme."
 PER_invest_in_univerity_facilities: "Investovat do univerzitních zařízení"
 PER_invest_in_univerity_facilities_desc: "Chceme-li technologicky konkurovat, musíme zajistit odpovídající zázemí pro studenty, profesory i vědce. Naše nejbystřejší mysli nesmí být omezovány nedostatkem vybavení."
 PER_invite_british_investors: "Pozvat [ROOT.OVERLORD.GetAdjective] investory"
 PER_invite_british_investors_desc: "Pro obnovu ekonomiky po invazi bychom mohli požádat [ROOT.OVERLORD.GetNameDef] o vyslání investorů, kteří pomohou nastartovat náš průmysl."
 PER_invite_oil_nations: "Pozvat ropné státy"
 PER_invite_oil_nations_desc: "OPEC zatím úspěšně zvyšuje zisky z ropy, avšak máme prostor pro další rozšíření. Oslovme další ropné státy světa a vyzvěme je ke vstupu do OPEC."
 PER_iran_first: "[ROOT.GetNonIdeologyName] na prvním místě"
 PER_iran_first_desc: "Pouze íránský lid dokáže skutečně chránit své hodnoty a kulturu. Budeme sledovat vlastní cíle a přizpůsobíme svět své vůli."
 PER_iran_for_iranians: "[PER.GetNonIdeologyName] pro [PER.GetAdjective] lid"
 PER_iran_for_iranians_desc: "Bylo skutečně ostudné, že jsme museli kapitulovat před imperialistickými suzerény a postoupit naše území těm, kteří chtějí zničit naši suverenitu. Pokud však něco platí, pak to, že naše touha po nezávislosti nikdy nezanikne. Je čas povstat a vyhlásit nezávislost!"
 PER_iranian_culture: "Sjednotit ultranacionalisty"
 PER_iranian_culture_desc: "Navzdory veškeré rétorice politiků a šáha není nikdo z nich ochoten učinit to, co je nutné k ochraně našeho kulturního dědictví a územní integrity. Sjednotíme roztříštěné spisovatele a nacionalisty do nového politického hnutí, které obnoví velikost našeho národa."
 PER_iranian_industrialization: "Industrializace"
 PER_iranian_industrialization_desc: "Nebudeme se při modernizaci naší ekonomiky spoléhat na zahraniční mocnosti. Místo toho využijeme nevyužitý potenciál našeho lidu a najdeme vlastní cestu k modernizaci."
 PER_iranian_nuclear_program: "[ROOT.GetAdjectiveCap] jaderný program"
 PER_iranian_nuclear_program_desc: "Zahájení vlastního jaderného programu je klíčový krok, který potřebuje [ROOT.GetNameDef], aby byl za světovou velmoc."
 PER_iranian_revolutionary_vanguard: "Íránský revoluční předvoj"
 PER_iranian_revolutionary_vanguard_desc: "Abychom obstáli proti velmocím, které jsou mnohem silnější než my, musíme začít rozšiřovat naši armádu a mobilizovat obyvatelstvo. I když nás to nepostaví na jejich úroveň, zajistí to, že nebudeme jen bezvýznamnou překážkou v jejich cestě."
 PER_iranian_socialism: "Íránský socialismus"
 PER_iranian_socialism_desc: "Pro zajištění dlouhodobé bezpečnosti státu musíme navázat nová spojenectví s podobně smýšlejícími vládami v regionu."
 PER_iranian_socialist_revolution: "Íránská socialistická revoluce"
 PER_iranian_socialist_revolution_desc: "Nastal okamžik, aby dělnická třída Íránu povstala a rozdrtila slabý šáhistický režim i jeho buržoazní vykonavatele. Na jeho místě vznikne nový stát dělníků a rolníků řízený samotným lidem."
 PER_islamic_restoration: "Odpor proti gharbzadegí"
 PER_islamic_restoration_desc: "Nedávné nadšení pro westernizaci narušuje samotné základy naší islámské kultury i íránské společnosti jako celku. Vláda proto musí více omezit přístup k západním neřestem a jejich bezvěreckým ideologiím."
 PER_islamic_revolution: "Islámská revoluce"
 PER_islamic_revolution_desc: "Dny šáha jsou sečteny. Mešity zní výzvami ke změně a ulice už nejsou pod jeho kontrolou. Starý řád se hroutí."
 PER_islamic_revolution_tt: "[PER.GetNameDef] a islámští revolucionáři se ocitnou v §Robčanské válce§!!"
 PER_islamic_solidarity: "Islámské bratrství"
 PER_islamic_solidarity_desc: "I když se nemusíme vždy shodnout s proudy mimo šíitský islám, nemůžeme popřít, že sdílíme společného nepřítele v imperialistických mocnostech západní Evropy, které nadále zasahují do našich vnitřních záležitostí. Společně je však jednou provždy vyženeme z našich zemí."
 PER_land_reform: "Pozemková reforma"
 PER_land_reform_desc: "Po úspěchu revoluce provedeme rozsáhlé pozemkové reformy, které osvobodí ekonomiku z pout feudalismu."
 PER_last_thousand_years: "Říše na tisíc let"
 PER_last_thousand_years_desc: "Díky veškeré naší práci a úsilí o zlepšení naší země jsme konečně dosáhli bodu, kdy může [PER.GetNameDef] obstát ve zkoušce času a vystoupit na světové scéně jako moderní a silná země. Konečně jsme překonali lesk našich Achaimenovských předků!"
 PER_legacy_of_gilani: "Odkaz Ozry Gílání"
 PER_legacy_of_gilani_desc: "Ozra Gílání byla první ženou, která vstoupila do imperiálního [PER.GetAdjective] letectva, a vytvořila tak precedent pro budoucnost, v níž budou naše ozbrojené síly inkluzivnější. Měli bychom definovat roli žen v armádě a umožnit jim sloužit jako pilotky. I ony by měly mít právo sloužit své zemi."
 PER_legacy_of_greatness: "Odkaz velikosti"
 PER_legacy_of_greatness_desc: "Pro jejich příznivce není žádným překvapením, že dynastie Pahlaví je předurčena přetrvat po generace. Ačkoliv nás čekají bouřlivé časy, je zřejmé, že šáh a jeho syn směřují [PER.GetNameDef] k zlatému věku prosperity."
 PER_legacy_of_greatness_tt: "Upraví §Y$PER_legacy_of_greatness_modifier$§! o:"
 PER_limit_foreign_influence: "Omezit zahraniční vliv"
 PER_limit_foreign_influence_desc: "Příliš dlouho musí [PER.GetNameDef] čelit rozmarům cizích mocností. Nárokují si naše zdroje a požadují podíl na našem přírodním bohatství. [PER.GetNameDef] se musí postavit na vlastní nohy, a proto bychom měli omezit vliv těchto cizinců na naši zemi."
 PER_lobby_military_dissidents: "Vojenská síť Túde"
 PER_lobby_military_dissidents_desc: "Strana Túde má řadu členů na vlivných pozicích v armádě. Možná je dokážeme získat na naši stranu a využít je k podkopání šáha ve vhodný okamžik."
 PER_luftwaffe_planes: "Zakoupit letouny Luftwaffe"
 PER_luftwaffe_planes_desc: "Pokud jde o výjimečná letadla, [GER.GetAdjective] Luftwaffe patří k těm nejlepším. Jelikož již máme úzké kontakty na [GER.GetNameDef], dává smysl se na ně obrátit a odkoupit přebytečné stroje, které již nepotřebují."
 PER_march_on_saadabad: "Pochod na Saadabad"
 PER_march_on_saadabad_desc: "Režim nedokázal řešit naše požadavky, proto vytáhneme na komplex Saadabad a předložíme šáhovi ultimátum. Buď přistoupí na změnu kurzu a zůstane jako vládce, nebo pocítí hněv našeho hnutí."
 PER_march_to_nile: "Dlouhý pochod k Nilu"
 PER_march_to_nile_desc: "Abychom znovu získali bývalá perská území v severní Africe, musíme prorazit [ENG.GetAdjective] severní Afrikou a nakonec napadnout Egypt. To bude [ENG.GetNameDef] považovat za válečný akt, ale je to riziko, které musíme podstoupit, pokud se chceme prosadit jako dominantní imperiální mocnost v regionu."
 PER_memphis_initiative_tt: "Odemkne rozhodnutí §Y$PER_memphis_initiative_category$§!, která umožní integrovat dobytá území."
 PER_merchant_navy: "Obchodní loďstvo"
 PER_merchant_navy_desc: "Přeprava surovin po moři je zásadní, aby [PER.GetNameDef] přežil. Proto je naprosto nezbytné vybudovat profesionální obchodní loďstvo schopné podporovat naše ozbrojené síly."
 PER_metropolitan_iran: "Metropolitní [ROOT.GetNonIdeologyName]"
 PER_metropolitan_iran_desc: "Konečně, po rozsáhlém rozvoji jsme dosáhli bodu, kdy lze [ROOT.GetNonIdeologyName] považovat za metropolitní zemi. Naše města pulzují průmyslem a životem, což nás připravuje na úspěšnou budoucnost."
 PER_middle_east_protectorate: "Zřídit protektorát nad Blízkým východem"
 PER_middle_east_protectorate_desc: "Po skončení války se nám podařilo zajistit některé země v oblasti kolem nás. Nyní má [PER.GetNameDef] povinnost jako jejich suzerén zajistit jejich ochranu před dalšími invazemi bývalých mocností. Pokud by se někdo pokusil nám tato území vzít, rádi uvidíme, jak se o to pokusí."
 PER_middle_east_protectorate_faction: "Protektorát Blízkého východu"
 PER_military_excellency: "[PER.GetAdjectiveCap] vojenská dokonalost"
 PER_military_excellency_desc: "Pokud jde o vítěznou armádu, ta nejlépe vycvičená má největší šanci zvítězit. Díky přísnému výcviku, vynikajícímu vybavení a nezdolatelným taktikám ukažme světu, že [PER.GetAdjective] armáda je síla, se kterou je třeba počítat."
 PER_military_high_schools: "Zřídit vojenské střední školy"
 PER_military_high_schools_desc: "Dobře vycvičená stálá armáda začíná u naší mládeže. Výchovou mladých lidí v duchu vojenské dokonalosti si zajistíme úspěch do budoucna. Bude to trvat několik let, ale nakonec budeme mít nejsilnější armádu v regionu."
 PER_modern_cataphract: "Moderní katafrakt"
 PER_modern_cataphract_desc: "Katafrakt byl typ těžké obrněné jízdy, který vznikl v našich zemích ve starověku. Jak Achaimenovská, tak Sásánovská říše využívaly tyto silně vyzbrojené jednotky na bojišti. Inspirováni jimi bychom měli být schopni vytvořit motorizovaného kolosa, který vzdá hold naší jezdecké tradici."
 PER_modernize_iran_economy: "Modernizovat [PER.GetAdjective] ekonomiku"
 PER_modernize_iran_economy_desc: "S pomocí našich průmyslově vyspělejších přátel se nám podařilo modernizovat naši ekonomiku. Jak továrny pracují na plné obrátky a náš lid pilně pracuje, brzy se zařadíme mezi velké průmyslové mocnosti světa."
 PER_modernizing_iran: "Modernizovat [ROOT.GetNonIdeologyName]"
 PER_modernizing_iran_desc: "Příliš dlouho byl [ROOT.GetNonIdeologyName] brzděn neorganizovaností a malichernými spory. Musíme se naučit spoléhat sami na sebe, pokud chceme vybudovat stát, který obstojí ve zkoušce času. Vytvořme budoucnost založenou na jednotě a přijměme moderní dobu."
 PER_modify_opposition_tt: "Upraví §Y$PER_opposition_modifier$§! o:"
 PER_motorize_infantry: "Motorizovat pěchotu"
 PER_motorize_infantry_desc: "Musíme držet krok s dobou a k tomu je nezbytné mechanizovat naše běžné jednotky, aby mohly postupovat po bojišti po boku tanků, chráněné a připravené působit zkázu."
 PER_motorized_infantry_bonus: "Iniciativa modernizace obrněných jednotek"
 PER_national_bank: "Posílit [ROOT.GetAdjectiveCap] národní banku"
 PER_national_bank_desc: "Z hospodářského hlediska jsme ve srovnání se západními rivaly nezaostávali zrovna málo. To však můžeme změnit. Nejprve musíme posílit [ROOT.GetAdjectiveCap] národní banku a zpřístupnit ji zejména venkovskému obyvatelstvu."
 PER_national_museum: "Otevřít národní muzeum"
 PER_national_museum_desc: "Dokumentace naší historie je nesmírně důležitá, obzvláště vzhledem k bohaté tapisérii dějin, kterou [ROOT.GetNonIdeologyName] po staletí utvářel. Plány na otevření muzea v Teheránu existují již léta - nastal čas je konečně uskutečnit."
 PER_nationalize_oil_fields: "Znárodnit ropná pole"
 PER_nationalize_oil_fields_desc: "Po dlouhá léta jsme prodávali naši ropu v nespravedlivých dohodách chamtivým státům. Nastal čas, aby [PER.GetNameDef] znárodnil svou ropnou produkci a převzal plnou kontrolu nad vlastními přírodními zdroji."
 PER_naval_academy_random_admirals_tt: "Až §Ytři§! náhodně vybraní námořní velitelé získají §G+1§! k dovednosti $SKILL_NAVY_LEADER_COORDINATION$"
 PER_navy_shortcut: "Námořnictvo"
 PER_negotiate_tt: "Pokusí se zprostředkovat §Ymír§! s našimi nepřáteli, což může vést k tomu, že se staneme pro [ENG.GetFlag]§Y[ENG.GetNameDef]§! §Rsubjektem§! a [SOU.GetFlag]§Y[SOU.GetNameDef]§! nám vezme část území!"
 PER_negotiate_with_america: "Vyjednávat s Amerikou"
 PER_negotiate_with_america_desc: "[USA.GetNameDefCap] se ukázaly jako světový lídr ve vývoji atomových technologií, které by mohly být klíčové pro udržení naší relevance na světové scéně. Měli bychom vyslat diplomatickou delegaci a požádat je o pomoc s rozvojem vlastního jaderného programu."
 PER_neutral_shortcut: "Politika:\nDynastie Pahlaví"
 PER_new_shah_tt: "§Y$PER_mohammed_reza_pahlavi$§! se stane vůdcem §Y$PER_neutrality_party$§!"
 PER_non_lethal_takeover: "Pokojný převrat"
 PER_nuclear_program: "[PER.GetAdjectiveCap] jaderný program"
 PER_officers_to_italy: "Vyslat důstojníky na výcvik do Itálie"
 PER_officers_to_italy_desc: "[ITA.GetNameDefCap] je zemí, odkud jsme získali první lodě pro naše loděnice, a proto máme přirozené vazby v oblasti námořního rozvoje. Měli bychom požádat [ITA.GetAdjective] vládu o možnost vyslat naše důstojníky na námořní výcvik."
 PER_oil_and_rubber_industry: "Diverzifikovat průmysl"
 PER_oil_and_rubber_industry_desc: "Přestože disponujeme rozsáhlými zásobami ropy, nesmíme dopustit, aby se naše ekonomika stala zcela závislou na jejím vývozu. Musíme diverzifikovat průmysl a vyrábět zboží určené i pro domácí spotřebu."
 PER_oil_baron: "Prohlásit se ropným magnátem"
 PER_oil_baron_desc: "Namísto využívání naší ropy k financování válek, které vedou jiné země po celém světě, by bylo vhodnější ji uchovat pro vlastní potřebu. Pokud bude [ROOT.GetNonIdeologyName] ropu hromadit, můžeme zajistit, že ji budeme prodávat těm, kteří ji potřebují, za nadsazené ceny."
 PER_one_for_all_all_for_one: "Jeden za všechny, všichni za jednoho"
 PER_one_for_all_all_for_one_desc: "Každý [PER.GetAdjective] občan musí být plně vycvičen ve střelbě a připraven bránit svůj lid, pokud na to dojde. Nikdo není této povinnosti ušetřen, jediná šance, jak přežít Velkou hru a zachovat naši íránskou identitu, je začít mobilizovat tempem, kterému [ENG.GetNameDefCap] a [SOU.GetNameDef] nebudou schopni konkurovat."
 PER_opec: "OPEC"
 PER_open_abadan: "Otevřít technickou školu v Abadánu"
 PER_open_abadan_desc: "Technické vzdělání nám pomůže zařadit se mezi průmyslové velmoci světa a otevřením této nové technické školy můžeme poskytnout vzdělání těm, kteří chtějí pracovat v těchto oborech. To by mělo urychlit náš rozvoj a proces modernizace."
 PER_operation_countenance_flag: "Operace Countenance"
 PER_operation_countenance_happened: "Operace Countenance proběhla"
 PER_our_own_artillery: "Vybudovat vlastní dělostřelectvo"
 PER_our_own_artillery_desc: "Nyní máme kapacity potřebné k efektivnímu návrhu a výrobě vlastních typů podpůrného dělostřelectva. Už se nemusíme spoléhat na obchod, abychom posílili naše síly. Naše nové kanóny budou chrlit oheň na nepřátele a zajistí, že udržíme linii v jakémkoli konfliktu."
 PER_our_place_in_empire: "[ROOT.OVERLORD.GetNameDef] a naše místo"
 PER_our_place_in_empire_desc: "Po jednání s [ROOT.OVERLORD.GetAdjective] vládou jsme se rozhodli jmenovat [PER.GetLeader] místokrálem, což nám poskytne větší volnost."
 PER_own_plane_designs: "Vyvinout vlastní konstrukce"
 PER_own_plane_designs_desc: "Po letech nákupu zahraničních letadel je čas pověřit naše inženýry vývojem vlastních leteckých konstrukcí."
 PER_pahlavis_deposed_flag: "Dynastie Pahlaví sesazena"
 PER_pahlavis_exiled_flag: "Dynastie Pahlaví vyhnána"
 PER_pan_iranianism: "Paníránismus"
 PER_pan_iranianism_desc: "Mimo naše hranice stále žijí íránské národy. Nastal čas prosazovat širší íránskou identitu a usilovat o sjednocení našeho lidu."
 PER_path_through_iraq: "Prorazit cestu přes Irák"
 PER_path_through_iraq_desc: "[IRQ.GetNameDefCap] je branou k dobytí severní Afriky a musí padnout jako první. Blízkost Bagdádu nám umožní rychlý postup."
 PER_perfect_iranian_airforce: "Dovést [PER.GetAdjective] letectvo k dokonalosti"
 PER_perfect_iranian_airforce_desc: "Se všemi zdroji a časem, které jsme investovali do rozvoje našich vzdušných sil, je nejvyšší čas dosáhnout vrcholu a prohlásit se za jednu z nejefektivnějších leteckých sil na světě. Nic nepřekoná schopnosti našich pilotů ani kvalitu našich letadel."
 PER_persian_german_trade: "Persko-německá obchodní komora"
 PER_persian_german_trade_desc: "[GER.GetNonIdeologyName] se po porážce ve Velké válce dokázalo znovu rychle industrializovat. To je vynikající příklad, kterým se musí [PER.GetNameDef] řídit, pokud chceme modernizovat . Zdá se také, že jejich nový vůdce k nám chová respekt, což umožňuje hladké navázání pozitivních vztahů."
 PER_persian_gulf_fleet: "Flotila Perského zálivu"
 PER_persian_gulf_fleet_desc: "Perský záliv je naším jediným přístupem ke světu po moři, a proto stojí za to jej chránit za každou cenu. Zaměříme-li výcvik specificky na operace v zálivu, zajistíme, že případní útočníci z jihu budou mít značné potíže s vyloděním."
 PER_pilot_training: "Výcvik pilotů"
 PER_pilot_training_desc: "Piloti potřebují víc než jen vrozený talent, aby mohli řídit bojové letouny. Důkladný výcvikový program pro ty, kteří jsou ochotni riskovat své životy za vlast, bude zásadní pro zajištění jejich bezpečnosti a efektivity ve vzduchu."
 PER_plant_resistance_cells: "Zakládat buňky odboje"
 PER_plant_resistance_cells_desc: "Abychom se připravili na náš preventivní úder, bylo by moudré rozdmýchat politické nepokoje v našich sousedních regionech. [IRQ.GetNameDef] se zdá být výbornou volbou, stejně jako okupované oblasti, které drží [AZR.GetNameDef], [GEO.GetNameDef], [ARM.GetNameDef] a [TMS.GetNameDef]."
 PER_post_war_spoils: "Poválečná kořist"
 PER_post_war_spoils_desc: "Nyní, když válka skončila, musíme rozhodnout, jaký osud čeká [IRQ.GetNonIdeologyName] a [AFG.GetNonIdeologyName]. Po jednání s našimi spojenci jsme se rozhodli, že nejlepším řešením bude, ať se o tyto území postará [PER.GetNameDef]. Tím zajistíme silnější a stabilnější Blízký východ."
 PER_preemptive_invasion_of_iran_tt: "Jakmile [PER.GetNameDef] kapituluje, vytvoříme z této země subjekt, přičemž začleníme několik států na našich hranicích a získáme práva na suroviny v [PER.GetAdjective] státech bohatých na ropu. Budeme moci požádat o [SOU.GetAdjective] intervenci k provedení společné operace."
 PER_preemptive_strike: "Preventivní úder"
 PER_preemptive_strike_desc: "Nikdo nebude ohrožovat naši suverenitu. Abychom zajistili, že ti, kdo na nás hledí chamtivým pohledem, pochopí, že se do nás nemají plést, ukážeme jim plnou sílu [PER.GetAdjective] ozbrojených sil. Pokud udeříme jako první, nebudou připraveni čelit rychlému a drtivému útoku."
 PER_preparatory_mobilization: "Přípravná mobilizace"
 PER_preparatory_mobilization_desc: "Selhání v přípravě znamená přípravu na selhání. Není tajemstvím, že zahraniční mocnosti hledí na [PER.GetNonIdeologyName] chamtivě, a pokud si jej budou chtít přivlastnit, budeme bojovat až do konce. Přípravou mobilizace naší armády budeme připraveni na cokoli, co proti nám naši nepřátelé použijí."
 PER_prepare_for_worst: "Připravit se na nejhorší"
 PER_prepare_for_worst_desc: "Jelikož jsme zachytili náznaky, že se [PER.GetNameDef] může stát cílem invaze, je rozumné začít s přípravami pro případ nejhoršího. Přestože jsme to tušili, nemůžeme se jen vzdát a odhalit své slabiny. Místo toho musíme posílit naše síly, abychom byli připraveni, až nadejde čas pro náš preventivní úder."
 PER_price_stabilization: "Stabilizace cen"
 PER_price_stabilization_desc: "Po posílení bank musíme nyní zahájit kampaň proti nepřiměřené ziskuchtivosti. Můžeme pokutovat vlastníky továren a velkých řetězců, kteří nebudou spolupracovat, a stanovit ceny zboží napříč zemí."
 PER_proclaim_greater_iran: "Vyhlásit Velký Írán"
 PER_proclaim_greater_iran_desc: "Naše hranice byly obnoveny do jejich oprávněné podoby na všech frontách a osvobodili jsme náš lid od tyranie cizí nadvlády. Nyní můžeme konečně vyhlásit zrod Velkého Íránu, který obstojí ve zkoušce času."
 PER_profit_from_war: "Profitovat z války"
 PER_profit_from_war_desc: "Válka znamená peníze a v současném konfliktu, který zuří po celém světě, je jich možné vydělat opravdu hodně. S pokrokem technologií roste potřeba ropy u válčících zemí, které jí zásobují své válečné mašiny. Je to pro nás skvělá příležitost a bylo by pošetilé ji nevyužít."
 PER_profit_from_war_tt: "Odemkne rozhodnutí §Y$PER_profit_from_war_category$§!, které umožní, ať [PER.GetNonIdeologyName] poskytujet práva na suroviny jiné zemi výměnou za zámořskou továrnu."
 PER_promise_clergy_power: "Přislíbit moc duchovenstvu"
 PER_promise_clergy_power_desc: "Islám je základním pilířem společnosti pro mnoho našich obyvatel. Nemůžeme si tedy dovolit ztratit podporu lidu znevažováním věřících a musíme udělat více pro to, abychom je získali na svou stranu."
 PER_promote_resistance_levant: "Protiimperialistický odboj"
 PER_promote_resistance_levant_desc: "Naše snahy vypořádat se s imperialisty často narážejí na tvrdý odpor kvůli jejich drtivé palebné síle. Nicméně není nouze o lidi, kteří by byli ochotni chopit se zbraní za nepřátelskými liniemi."
 PER_propagate_political_literature: "Založit místní opoziční skupiny"
 PER_propagate_political_literature_desc: "Instituce imperiálního státu se mohou jednotlivci zdát nepřekonatelné, ale ve skutečnosti jsou jeho zdroje rozptýleny po celé zemi a nedokážou čelit decentralizovanému odboji. Abychom dosáhli změny, využijeme této slabiny."
 PER_propagate_political_literature_tt: "Odemkne rozhodnutí §Y$PER_mass_protests$§! k zakládání opozičních skupin ve státech, aby se nepřipojily k Šáhovi v případě §Robčanské války§!."
 PER_purchase_foreign_ships: "Nákup zahraničních lodí"
 PER_purchase_foreign_ships_desc: "Naše námořnictvo bylo před několika lety vybudováno nákupem nových ozbrojených lodí, které může [ITA.GetNameDef] postrádat. Můžeme posílit naše námořní schopnosti oslovením dalších zahraničních mocností a nákupem dalších plavidel. To zároveň zlepší vztahy mezi zeměmi."
 PER_push_negotiations: "Tlačit na vyjednávání"
 PER_push_negotiations_desc: "Zatím se nám dařilo invazi odrážet tak dlouho, jak to jen šlo. Nemáme však dostatek sil k přímému ukončení konfliktu. Máme ale určitou vyjednávací pozici a můžeme nabídnout část našich přírodních zdrojů výměnou za zachování naší suverenity."
 PER_push_negotiations_tt: "Našim nepřátelům bude zaslána §Yudálost§!, která nabídne §Ypráva na suroviny§! iniciátorovi konfliktu výměnou za §Ybílý mír§!. Pokud odmítnou, válka bude pokračovat."
 PER_push_to_deserts: "Severní ofenzíva"
 PER_push_to_deserts_desc: "Nepřátelské síly na nás útočí především ze severních hranic. Musíme soustředit naše jednotky v těchto oblastech a zabránit vetřelcům v dalším postupu. Poté přeneseme boj na jejich území a zatlačíme je zpět k hranicím."
 PER_push_to_mountains: "Jižní fronta"
 PER_push_to_mountains_desc: "Zdá se, že invaze získala území na jihu země. Pokud ji chce [PER.GetNonIdeologyName] odrazit, musíme zaměřit naše úsilí na vytlačení nepřítele zpět do Perského zálivu. Čas hraje proti nám, nesmíme jim dovolit získat další území."
 PER_question_of_resources: "Otázka surovin"
 PER_question_of_resources_desc: "Zjistili jsme, že je velmi pravděpodobné, že potenciální invaze ze strany našich bývalých spojenců je motivována bohatstvím zdrojů, kterými [PER.GetNameDef] disponuje. Naše ropná pole jsou neocenitelná a existuje vysoké riziko, že se jich někdo pokusí zmocnit. To nesmíme dopustit, a proto musíme udeřit na tyto potenciální hrozby dříve, než zaútočí ony na nás..."
 PER_raf_planes: "Nákup letadel RAF"
 PER_raf_planes_desc: "[ENG.GetNameDefCap] disponuje Královským letectvem a jejich schopnosti a dovednosti jsou známé po celém světě. Nejde však jen o um pilotů, ale i o kvalitu jejich letadel, která jim pomáhá vítězit v bitvách. Obraťme se na ně a objednejme si jejich stroje."
 PER_raiding_fleet_boost: "Zkušení nájezdníci"
 PER_rally_ancient_history: "Semknout se kolem starověké historie"
 PER_rally_ancient_history_desc: "Není tajemstvím, že mladá vláda dynastie Pahlaví zanechala mnoho lidí nejistých ohledně budoucnosti. Naší nejlepší šancí, jak posílit nacionalistickou hrdost a důvěru v Šáha, je připomenout našemu lidu i světu, jak velkolepá byla historie starověké Persie. Nastal čas oslavit Achaimenovskou říši."
 PER_rally_bakhtiari_and_qashqai: "Sjednotit Bachtiáry a Kaškaje"
 PER_rally_bakhtiari_and_qashqai_desc: "Nespokojeny se změnou režimu začaly kmeny Bachtiárů a Kaškajů vzdorovat novému právnímu řádu. Můžeme toho využít - pokud je získáme na svou stranu, získáme další lidi, kteří nám pomohou bojovat, pokud se náš boj za nezávislost změní v krvavý konflikt."
 PER_rally_behind_mosaddegh: "Semknout se kolem Mosaddeka"
 PER_rally_behind_mosaddegh_desc: "Od počátku vlády dynastie Pahlaví je $PER_mohammad_mosaddegh$ známý svým nesouhlasem s mnoha aspekty Šáhovy vlády. Pokud chceme skutečně vystoupit proti dynastii Pahlaví a vytvořit nový, demokratičtější [PER.GetNonIdeologyName], možná právě on je osobností, za kterou bychom měli sjednotit naše hnutí."
 PER_rally_the_reformers: "Založit Národní frontu"
 PER_rally_the_reformers_desc: "V celé zemi existuje mnoho skupin, které by rády viděly konec Šáha či samotné monarchie. Jak se svět začíná destabilizovat, mohou se těmto skupinám naskytnout nové příležitosti k akci."
 PER_rally_the_reformers_tt: "Odemkne rozhodnutí §Y$PER_mass_protests$§! k vytvoření základny operací pro naše opoziční hnutí."
 PER_rapid_appeasement_tt: "Obětováním našich zdrojů se nám prozatím podařilo odvrátit revoluci."
 PER_rapid_industrialization: "Rychlá industrializace"
 PER_rapid_industrialization_desc: "Modernizace znamená industrializaci. Nelze uniknout realitě, že musíme rychle rozšířit naši průmyslovou výrobu, pokud se chceme vyrovnat ostatním velmocím světa."
 PER_reach_to_seperatists: "Navázat kontakt se separatisty"
 PER_reach_to_seperatists_desc: "Dělnická třída se dosud plně nevyrovnala se svými sociálně-ekonomickými podmínkami, a proto postrádá sílu prolomit zakořeněnou moc šáha. Na severu a východě však existuje mnoho lidí povzbuzených ázerbájdžánskými či kurdskými náladami, které bychom mohli získat na svou stranu."
 PER_reach_to_seperatists_tt: "Všechny vlastněné státy, které jsou domovským územím §YKurdistánu§! nebo §YÁzerbájdžánu§!, se k nám připojí a v nadcházející občanské válce poskytnou jednotky.\n\n§ROvšem budou očekávat získání nezávislosti jako kompenzaci do dvou let od dokončení tohoto zaměření!§!"
 PER_rebuild_persepolis: "Obnovit Persepolis"
 PER_rebuild_persepolis_desc: "Persepolis byl ceremoniálním hlavním městem Achaimenovské říše a jeho ruiny se nacházejí na pláních u Marvdaštu. Jako významná kulturní památka by jeho obnova byla silným gestem a symbolem našeho impéria na dlouhá desetiletí."
 PER_rebuilding_iran: "Obnovit [PER.GetNonIdeologyName]"
 PER_rebuilding_iran_desc: "Invaze zanechala velkou část našeho průmyslu a infrastruktury v troskách. Měli bychom využít tento čas k obnově naší země do její bývalé slávy, dát vše znovu dohromady a vzpamatovat se z utržených ran."
 PER_reclaim_turkish_peninsula: "Znovuzískat turecký poloostrov"
 PER_reclaim_turkish_peninsula_desc: "[TUR.GetNameDefCap] představuje překážku, která stojí v cestě naší expanzi na západ. Anatolie byla kdysi perským územím a je na čase ji znovu získat. Přesuňme naše jednotky na pozice a připravme se na invazi!"
 PER_recruit_bakhtiari: "Naverbovat bachtiárské horské specialisty"
 PER_recruit_bakhtiari_desc: "Bachtiárové jsou lúrský kmen z východního [PER.GetNonIdeologyName]u. Zatímco mnozí na západě země mají obavy z jejich vlivu, jejich nomádský způsob života může být pro naše ozbrojené síly velmi užitečný. Naverbováním členů jejich kmenů můžeme dát našim horským jednotkám výraznou výhodu nad nepřáteli."
 PER_recruit_rebels_tt: "Odemkne divizní šablony §YBakhtiari Rebels§! a §YQashqai Rebels§! a naverbuje §Ydvě§! jednotky od každé v §Y[ROOT.capital.GetCapitalVictoryPointName]§!"
 PER_reinforce_iranian_identity: "Posílit [PER.GetAdjective] identitu"
 PER_reinforce_iranian_identity_desc: "Navzdory tomu, že jsme byli donuceni ustoupit našim nepřátelům, jsme stále [PER.GetAdjective] národ a nikdo nám to nevezme. Musíme tuto identitu posílit mezi lidmi a ukázat jim, že naše touha po svobodě stále silně hoří v našich srdcích."
 PER_reinforced_identity: "Posílená identita"
 PER_reinstate_qajars: "Obnovit dynastii Kádžárovců"
 PER_reinstate_qajars_desc: "Dynastie Kádžárovců byla poslední vládnoucí rodinou, než [PER.GetNameDef] ovládla dynastie Pahlaví. Byla svržena roku 1925 samotným Rezou Šáhem Pahlavím a dědic rodu, $PER_mohammad_hassan_mirza$, žije v [ENG.GetAdjective] exilu. Jelikož Pahlavíové nedokázali udržet zájmy, které má [ENG.GetNameDef] v naši zemi, možná nastal čas obnovit vládu Kádžárovců a doufat, že to potěší naše nové suzerény."
 PER_reinstate_qajars_tt: "Spustí řetězec §Yudálostí§!, který nám umožní dosadit dynastii Kádžárovců zpět na [PER.GetAdjective] trůn."
 PER_reintegrate_anatolia: "Reintegrovat Anatolii"
 PER_reintegrate_anatolia_desc: "Nyní, když jsme dobyli území v bývalých [TUR.GetAdjective] hranicích, může [PER.GetNameDef] tato území začít začleňovat jako oficiální, de iure součást státu."
 PER_reintegrate_anatolia_tt: "Odemkne rozhodnutí §Y$PER_integrate_anatolia_decisions_category$§!, která umožní začlenění dobytých území."
 PER_reject_foreign_dominance: "Odmítnout zahraniční nadvládu"
 PER_reject_foreign_dominance_desc: "[SOU.GetNameDefCap] a [ENG.GetNameDef] stojí přímo na našem prahu. Je zřejmé, že bychom se mohli stát subjektem, pokud nezasáhneme okamžitě. Je čas přestat přehlížet realitu a začít se bránit tahům Velké hry."
 PER_reparations_tt: "Našim nepřátelům bude zaslána §Yudálost§!, která požaduje §Ymír§! a §Yválečné reparace§! ve formě §Ytováren§! a §Ypostihu§! pro agresora. Pokud je nepřátelská země §Ypřímým sousedem§!, místo toho §Ynám§! postoupí pohraniční území."
 PER_republic_of_mahabad_tt: "Uvolní [KUR.GetNameDef] jako §YMahábádskou republiku§!"
 PER_request_british_equipment: "Požádat o [ROOT.OVERLORD.GetAdjective] vybavení"
 PER_request_british_equipment_desc: "Naše ozbrojené síly utrpěly během invaze těžké ztráty a nutně potřebují doplnit výzbroj. Jako jejich nový subjekt máme dobrou pozici požádat [ROOT.OVERLORD.GetNameDef] o zásoby a vybavení, abychom naše jednotky dostali zpět na jejich původní úroveň."
 PER_request_membership_allies: "Požádat o vstup ke Spojencům"
 PER_request_membership_allies_desc: "S rostoucím napětím ve světě nastal čas vybrat si stranu. Vzhledem k tomu, že jsme se sblížili se západními státy, dává smysl se k nim připojit. Společně můžeme zastavit hrozbu fašismu po celém světě."
 PER_resistance_decisions_tt: "Odemkne rozhodnutí §Y$PER_plant_resistance_cat$§!, která nám umožní vyvolávat nestabilitu v sousedních zemích v přípravě na invazi."
 PER_restructure_army: "Reorganizovat armádu"
 PER_restructure_army_desc: "Naše armáda byla oslabena dlouhými lety války s Ruskem pod vedením dynastie Kádžárovců. Vzhledem k současnému stavu světa by bylo rozumné obnovit naše ozbrojené síly do jejich bývalé slávy."
 PER_retake_north_iran: "Znovudobýt severní [PER.GetNonIdeologyName]"
 PER_retake_north_iran_desc: "Při naší počáteční kapitulaci a žádosti o mír jsme byli nuceni převést naše severní území na [SOU.GetNameDef]. Nyní, když jsme znovu nabyli síly, je čas udeřit na tyto vetřelce a získat zpět to, co nám právem náleží."
 PER_reverse_engineer_tanks: "Zpětně analyzovat zahraniční tanky"
 PER_reverse_engineer_tanks_desc: "Podrobnějším studiem tanků, které jsme získali ze zahraničí, můžeme pochopit jejich fungování a naučit se vyrábět vlastní konstrukce pro budoucí využití. To je první krok k tomu, aby [PER.GetNonIdeologyName] vyvinul vlastní tankové konstrukce."
 PER_revive_old_ways: "Obnovit staré tradice"
 PER_revive_old_ways_desc: "Chceme-li vyniknout na světové scéně, musíme nadále vyzdvihovat ideály někdejších perských říší. Proto bychom měli usilovat o znovuzavedení zoroastrismu jako [PER.GetAdjective] státního náboženství. Některé menší kmeny na východě země tuto víru stále praktikují, takže její obnova není nereálná."
 PER_revolution_in_the_gulf: "Revoluce v Perském zálivu"
 PER_revolution_in_the_gulf_desc: "Rovnováha sil v regionu se začíná přiklánět na naši stranu. Musíme využít této výhody a začít podporovat širší protikoloniální hnutí v oblasti."
 PER_revolution_in_the_gulf_tt: "Odemkne další rozhodnutí §Y$PER_gulf_decisions_cat$§! k podpoře odboje v okupovaných státech Perského zálivu."
 PER_roll_back_reforms: "Obnova národa"
 PER_roll_back_reforms_desc: "Ačkoli Šáh dosáhl určitého pokroku v modernizaci země, jeho reformy nešly dostatečně daleko. Budeme prosazovat mnohem hlubší a radikálnější program, který nás navrátí k velikosti."
 PER_root_out_conspiracies: "Vymýtit spiknutí"
 PER_root_out_conspiracies_desc: "V průběhu let se objevilo mnoho zvěstí o možných atentátech na Rezu Šáha Pahlavího. Toto riziko považujeme za příliš velké, a proto je naprosto zásadní tato spiknutí odhalit a zlikvidovat, abychom zajistili bezpečnost Šáha."
 PER_royal_college_funding: "Založit Teheránskou univerzitu"
 PER_royal_college_funding_desc: "Je zásadní držet krok s intelektuálním rozvojem. Přesměrováním části prostředků, které jsme získali ze Šáhovy pokladny, do vzdělávacích institucí si zajistíme schopnost držet krok s rychle se vyvíjejícími technologiemi."
 PER_royal_visit_germany: "Královská návštěva Německa"
 PER_royal_visit_germany_desc: "Během vlády Rezy Šáha jsme udržovali dobré vztahy s [GER.GetAdjective] vůdcem. To se odráží i v jejich přání hostit nás na královské návštěvě ve své zemi. Pokud tuto nabídku přijmeme, jistě tím dále zlepšíme názor, který na nás má [GER.GetNameDef], ale teprve se ukáže, zda to bude přínos, či naopak přítěž!"
 PER_saadabad_treaty: "Smlouva ze Saadabadského paláce"
 PER_saadabad_treaty_desc: "Nemáme co ztratit a můžeme jen získat tím, že udržíme přátelské vztahy s našimi sousedy. Myšlenka smlouvy, která by toto přátelství formalizovala, se objevuje již delší dobu, a je načase převzít iniciativu a zakotvit ji v oficiální dohodě."
 PER_sea_specialization: "Specializace loďstva"
 PER_second_warning_flag: "Druhé varování islámské revoluce"
 PER_secularize_the_state: "Sekularizovat stát"
 PER_secularize_the_state_desc: "Od chvíle, kdy jsme zahájili proces westernizace, čelíme neustálému odporu [PER.GetAdjective] duchovenstva. Islám sice zůstává státním náboženstvím, ale pokud chceme dokázat západnímu světu, že jsme schopni stát po jejich boku, je načase oddělit náboženství od státu a vydat se cestou modernizace."
 PER_secure_afghanistan: "Zajistit Afghánistán"
 PER_secure_afghanistan_desc: "[AFG.GetNameDefCap] je jednou z otevřených bran, které má [PER.GetNameDef] na východ. Zajištění tohoto koridoru pro naše spojence je zásadní. Zároveň nám to umožní zajistit, že [AFG.GetNameDef] bude pod naší ochranou. Je to přece v zájmu [AFG.GetAdjective] lidu."
 PER_secure_coastline: "Zajistit pobřeží"
 PER_secure_coastline_desc: "Invaze má přijít z Perského zálivu, proto je musíme zastavit přímo na pobřeží a zabránit nepříteli získat jakékoli [PER.GetAdjective] předmostí. Pokud jim ho znemožníme vytvořit, budeme v dobré pozici zastavit jejich postup hned v počátku."
 PER_secure_iraq: "Zajistit Irák"
 PER_secure_iraq_desc: "V rámci našich závazků vůči spojencům musíme zajistit [IRQ.GetNameDef] všemi dostupnými prostředky. Toto radikální opatření má zajistit ochranu [IRQ.GetAdjective] lidu před vnějšími hrozbami a zároveň podpořit jednotu v regionu."
 PER_shahanshah: "Šáhanšáh"
 PER_shahanshah_desc: "Šáhanšáh, neboli král králů, je nejvyšší titul udělovaný panovníkovi Persie. Je to titul, který se k našemu současnému vládci dokonale hodí a jehož znovuzavedení je velkou poctou."
 PER_shahbanu_tt: "Získá událost §Y$PER_imperial_events.40.t$§!, která umožní vybrat královnu dostupnou jako §Ypolitickou poradkyni§!."
 PER_shiraz_university: "Financovat Šírázskou univerzitu"
 PER_shiraz_university_bonus: "Financovaná Šírázská univerzita"
 PER_shiraz_university_desc: "Při financování nových univerzit bychom se měli zaměřit na technické školy, jejichž absolventi položí základy pro moderní [ROOT.GetNonIdeologyName]!"
 PER_soviet_alignment: "Sblížení se Sovětským svazem"
 PER_soviet_alignment_desc: "Svět se rychle mění a potřebujeme silné spojence, kteří odradí naše nepřátele. Strana Túde je jedinou socialistickou stranou s vazbami na [SOU.GetNameDef], a proto může pomoci vybudovat pevné vztahy."
 PER_soviet_alignment_tt: "Pokud je §Y[SOV.GetNameWithFlag]§! komunistickou zemí, obdrží pozvání do naší frakce."
 PER_soviet_iranian_oil_collaboration: "Sovětsko-íránská ropná spolupráce"
 PER_soviet_iranian_oil_collaboration_desc: "[ROOT.GetNameDefCap] a naši [SOU.GetAdjective] sousedé disponují rozsáhlými zásobami ropy. Koordinací a rozšířením těžby můžeme upevnit naši kontrolu nad nejdůležitějším zdrojem na světě."
 PER_special_forces_program: "Program speciálních sil"
 PER_special_forces_program_desc: "Existují místa, kam naše běžné jednotky nemohou proniknout, a proto je vytvoření programu speciálních sil naprosto nezbytné. Brzy budeme mít specializované jednotky schopné zvládnout i ty nejnáročnější úkoly."
 PER_special_units: "Íránské speciální operace"
 PER_special_units_boost: "Program speciálních sil"
 PER_special_units_desc: "S rostoucími vojenskými schopnostmi musíme věnovat pozornost i specializovaným jednotkám vedle našich běžných sil. To nám otevře nové možnosti, včetně zpravodajských operací, speciálních jednotek a dokonce i experimentálních zbraní."
 PER_spoils_of_war: "Válečná kořist"
 PER_spoils_of_war_desc: "Naše úsilí v této válce nezůstalo bez povšimnutí našich spojenců, kteří jsou otevřeni myšlence, ať [PER.GetNameDef] získá po jejím skončení území v okolním regionu. Je to skvělá příležitost využít válečné kořisti."
 PER_stage_mass_protests: "Organizovat protesty"
 PER_stage_mass_protests_desc: "Lidé už mají dost Šáhových výmluv a zakořeněné moci elit. Nastal čas vyjít do ulic a požadovat okamžité změny."
 PER_stage_mass_protests_tt: "Odemkne rozhodnutí §Y$PER_mass_protests$§! ke snížení podpory šáha."
 PER_stand_our_ground: "Držet naše pozice"
 PER_stand_our_ground_desc: "Strach a nejistota prostupují naší vládou, zatímco hrozby ze strany našich sousedů i vzdálenějších mocností vytvářejí neustálý tlak. Musíme si pevně stát za svým, bez ohledu na to, co přijde. Je čas přijmout opatření, která zajistí, že [PER.GetNameDef] přežije nadcházející desetiletí."
 PER_stand_with_germany: "Postavit se za [GER.GetNameDef]"
 PER_stand_with_germany_desc: "Po mnoho let je [GER.GetNameDef] jedním z našich největších obchodních partnerů. Jak pokračují ve svých vlastních expanzivních cílech, bylo by rozumné uzavřít s nimi dohodu a sjednat pakt o neútočení, abychom ochránili naše vlastní zájmy."
 PER_stand_with_giants: "Postavit se mezi velmoci"
 PER_stand_with_giants_desc: "Svět balancuje na ostří nože a v Evropě se schyluje ke konfliktu mezi mocnými státy. Jak se tento sud s prachem pomalu blíží k výbuchu, musíme připravit [PER.GetNameDef] na to, aby se dokázal postavit po bok velmocí a obstál jako moderní a pokroková společnost."
 PER_stand_with_giants_tt: "Upraví §Y$PER_stand_with_giants_modifier$§! o:"
 PER_state_atheism: "Plná sekularizace"
 PER_state_atheism_desc: "Moderní [PER.GetNameDef] již nemá za nutné, aby náboženství hrálo tak významnou roli jako dříve. Namísto toho bychom měli podporovat formu ateismu mezi obyvatelstvem, což nám umožní soustředit se na modernizační reformy. To však nepochybně rozladí naše duchovenstvo."
 PER_strategic_bombing: "Strategické bombardování"
 PER_strategic_bombing_desc: "Války se nevyhrávají jen ve vzduchu, ale také ničením ekonomických a průmyslových kapacit nepřítele. Zaměřme se na strategické bombardování a zničme jejich zařízení dříve, než je obrátí proti nám."
 PER_strengthen_iranian_parliament: "Posílit íránský parlament"
 PER_strengthen_iranian_parliament_desc: "S omezenými pravomocemi Šáha můžeme zlepšit náš demokratický proces tím, že vrátíme moc zpět do volených parlamentních komor, kam náleží."
 PER_strengthen_iranian_parliament_tt: "\n\n§RPokud má demokratická strana méně než 30% podpory, Šáh proti nám rozpoutá občanskou válku!§! \n\n§RPokud vypukne občanská válka, nebude možné plně pokračovat v islámské revoluci.§!"
 PER_strengthen_the_tudeh: "Posílit stranu Túde"
 PER_strengthen_the_tudeh_desc: "Strana Túde se stala předvojem [ROOT.GetAdjective] dělnické třídy a vedla ji k vítězství nad Šáhem. Nyní musí získat pravomoci k zavedení socialismu a osvobození lidu z pout imperialismu a kapitalismu."
 PER_strike_first_tt: "Postup v této větvi vám §Rznemožní§! pokračovat v dalších zaměřeních §YSaadabadského paktu§!!"
 PER_subserviant_to_noone: "Nepodléháme nikomu"
 PER_subserviant_to_noone_desc: "I když jsme dříve považovali naše vazby na [ENG.GetNameDef] a Anglo-íránskou ropnou společnost za přínosné, již nemáme důvod dovolovat, aby naše zdroje byly zneužívány cizími mocnostmi. Tuto společnost bychom měli rozpustit a zaměřit se na vlastní rozvoj."
 PER_superior_firepower: "Rozšířená zařízení těžké výzbroje"
 PER_support_technology_bonus: "Posílení podpory pěchoty"
 PER_swear_fealty: "Přísahat věrnost vetřelcům"
 PER_swear_fealty_desc: "Navzdory veškeré snaze ochránit [PER.GetNameDef] jsme nedokázali nepřítele zastavit. Jak se jejich jednotky blíží k hlavnímu městu, bylo by moudré je kontaktovat a okamžitě ukončit válku tím, že se nabídneme jako subjekt. Tímto způsobem alespoň zabráníme další devastaci naší země."
 PER_swear_fealty_tt: "Odešle nepřátelům §Yudálost§! s žádostí o kapitulaci a přijetí statusu §Ysubjektu§!. Tím se odemkne §Yvětev subjektu§!, ve které se rozhodne o dalším postupu."
 PER_swedish_artillery: "Licencovat [SWE.GetAdjective] dělostřelectvo"
 PER_swedish_artillery_desc: "[SWE.GetNonIdeologyName] vyvinulo výkonné dělostřelectvo, ze kterého by naše armáda mohla výrazně těžit. Měli bychom se obrátit na tuto severskou zemi a vyjednat licenční dohodu."
 PER_take_regional_tour: "Vydat se cestu po regionu"
 PER_take_regional_tour_desc: "Po vyhlášení nového impéria se Rezá Šáh Pahlaví chce vydat na cestu po regionu a navštívi [IRQ.GetNameDef] i [AFG.GetNameDef], aby zlepšil vztahy s jejich vůdci."
 PER_tank_specialization_bonus: "[PER.GetAdjectiveCap] specializace tanků"
 PER_tech_share_bonus: "Technologická spolupráce"
 PER_tehran_moscow_pact: "Pakt Teherán-[SOV.Capital.GetCapitalVictoryPointName]"
 PER_tehran_moscow_pact_desc: "Není žádným tajemstvím, že [SOV.GetNameDef] se nad námi na severu tyčí jako obrovský medvěd. Pokud chceme uskutečnit naše expanzivní plány, musíme tento problém řešit co nejrychleji. Můžeme vyslat diplomatickou misi do Moskvy a pokusit se vyjednat pakt o neútočení."
 PER_tehran_power_grid_bonus: "Teheránská elektrická síť rozšířena"
 PER_tehran_power_plant: "Otevřít elektrárnu v Teheránu"
 PER_tehran_power_plant_desc: "Jak naše města po celé zemi rostou, musíme zajistit jejich dostatečné zásobování elektřinou. Otevřeme novou elektrárnu v hlavním městě Teheránu a upevníme tak další důležitý krok v rozvoji našeho nejvýznamnějšího města."
 PER_territory_demands_tt: "Toto zašle požadavky dané zemi, aby nám §Ypředala§! svá pohraniční území. Je pravděpodobnější, že tak učiní, pokud je naše armáda §Ysilnější§!."
 PER_the_memphis_initiative: "Memfisská iniciativa"
 PER_the_memphis_initiative_desc: "Začleňování území do naší říše je klíčové pro udržení kontroly nad dobytými oblastmi. Zejména Egypt bude obtížné udržet pod kontrolou, pokud nebudeme opatrní, a proto bychom mu měli věnovat zvláštní pozornost."
 PER_the_new_economy: "Nová ekonomika"
 PER_the_new_economy_desc: "Nová ekonomika, založená na potřebách lidu namísto rozmarů trhu, se po našich reformách začíná formovat. Přestože je před námi ještě mnoho práce, můžeme říci, že [ROOT.GetNameDef] buduje socialismus."
 PER_the_pahlavi_imperium: "Pahlavíovské impérium"
 PER_the_pahlavi_imperium_desc: "Od svržení dynastie Kádžárovců v roce 1925 je Reza Šáh Pahlaví [PER.GetAdjective] vůdčí silou. V době, kdy se naše země ocitá na křižovatce dalšího velkého světového konfliktu, musí být velký Šáh připraven čelit jakékoli bouři, která by mohla zasáhnout naše slavné [PER.GetAdjective] země."
 PER_the_peoples_airforce: "Lidové revoluční letectvo"
 PER_the_peoples_airforce_desc: "Pokud se chceme stát regionální mocností, musíme získat kontrolu nad Perským zálivem. Abychom toho dosáhli, začneme budovat lidové letectvo, které dokáže čelit námořní převaze imperialistických mocností."
 PER_the_peoples_navy: "Lidové revoluční námořnictvo"
 PER_the_peoples_navy_desc: "I když nemůžeme soupeřit s hladinovými flotilami imperialistických mocností přímo, můžeme tak učinit vývojem specializované třídy ponorek."
 PER_the_unification_initiative: "Iniciativa sjednocení"
 PER_the_unification_initiative_desc: "[PER.GetNameDefCap] se již několik let potýká s problémy, zejména pokud jde o sjednocení obyvatelstva pod jednou vlajkou. Kurdský a ázerbájdžánský odpor na západě a odpor duchovenstva vůči náboženským reformám nám dávají mnoho práce, pokud má být [PER.GetNameDef] státem, který je vnitřně jednotný."
 PER_there_can_be_only_one: "Může existovat jen jeden"
 PER_there_can_be_only_one_desc: "Ačkoli s námi sdílí [GER.GetNameDef] mnoho hodnot, je stále zřejmější, že se považují za nadřazené všem ostatním národům světa. To je urážka našeho lidu i našeho dědictví a musíme jejich omyl napravit silou."
 PER_third_persian_empire: "Třetí perská říše"
 PER_third_persian_empire_desc: "Abychom zajistili budoucnost našeho lidu, Mohammed Reza Pahlaví vyhlásil vznik Třetí perské říše, která si klade za cíl navázat na odkaz našich starověkých předků - Achaimenovců. Je to nová éra pro zemi, která nás dovede ke slávě."
 PER_train_tank_commanders: "Vycvičit tankové velitele"
 PER_train_tank_commanders_desc: "Abychom maximálně využili naše tankové divize, musí být vedeny schopnými veliteli. K tomu je nutné poslat naše vojenské důstojníky zpět do výcviku, aby se naučili efektivně začlenit tankovou válku do své taktiky."
 PER_trains_from_britain: "Požádat o vlaky [ENG.GetNameDef]"
 PER_trains_from_britain_desc: "Při otevření Transíránské železnice potřebujeme vlaky, abychom projekt co nejrychleji uvedli do provozu. Jelikož má [ENG.GetNameDef] podíly v našich surovinách, bylo by pro obě strany výhodné, kdyby nám poskytli parní lokomotivy pro zahájení provozu."
 PER_trains_from_germany: "Požádat o vlaky [GER.GetNameDef]"
 PER_trains_from_germany_desc: "Při otevření Transíránské železnice potřebujeme vlaky, abychom projekt co nejrychleji uvedli do provozu. Máme [GER.GetAdjective] přátele, a pokud je požádáme, jistě nám rádi poskytnou přebytečné parní lokomotivy pro slavnostní otevření."
 PER_trans_iranian_railway: "Transíránská železnice"
 PER_trans_iranian_railway_desc: "V roce 1927 jsme zahájili práce na celostátní železniční síti známé jako Transíránská železnice. Nyní, když chceme modernizovat [ROOT.GetNonIdeologyName], je nezbytné investovat prostředky do dokončení tohoto monumentálního projektu."
 PER_transfer_officers_to_intelligence: "Přesunout důstojníky do zpravodajství"
 PER_transfer_officers_to_intelligence_desc: "Abychom posílili operace naší zpravodajské služby, musíme přesunout některé z našich intelektuálně nadanějších důstojníků do zpravodajské sekce."
 PER_treaty_of_tehran_tt: "Odešle událost pro [ENG.GetFlag]§Y[ENG.GetNameDef]§! a [SOV.GetFlag]§Y[SOV.GetNameDef]§! s žádostí o stažení jejich jednotek a ukončení války."
 PER_trial_fifty_three: "Proces s Padesáti třemi"
 PER_trial_fifty_three_desc: "Komunistické politické organizace představují problém při upevňování vlády dynastie Pahlaví nad zemí. Nemůžeme dovolit, aby se tyto protimonarchistické nálady šířily a vedly k masovým protestům. Musíme tyto odpůrce postavit před soud a nechat tribunál rozhodnout o jejich osudu."
 PER_trial_fifty_three_tt: "Zvolením tohoto zaměření budou všichni §Ykomunističtí§! poradci vyloučeni z vlády."
 PER_united_progressive_parties: "Sjednocené progresivní strany"
 PER_united_progressive_parties_desc: "Po abdikaci Šáha máme příležitost vybudovat progresivnější budoucnost pro [ROOT.GetNonIdeologyName]. Abychom toho dosáhli, musíme sjednotit všechny progresivní strany do jedné velké koalice, která prosadí naši agendu."
 PER_university_of_isfahan: "Financovat Isfahánskou univerzitu"
 PER_university_of_isfahan_bonus: "Financovaná Isfahánská univerzitu"
 PER_university_of_isfahan_desc: "[ROOT.GetNonIdeologyName] naléhavě potřebuje nové vzdělávací instituce zaměřené na výchovu nové generace zdravotnických odborníků. Univerzita v Isfahánu má potenciál stát se nejpokročilejší lékařskou školou v celé zemi!"
 PER_uphold_civil_rights: "Dodržovat občanská práva"
 PER_uphold_civil_rights_desc: "Respektování občanských práv [PER.GetAdjective] obyvatel bylo dosud důležitou součástí vlády Mohammeda Rezy Šáha. Udržováním tohoto základního principu naší společnosti motivujeme náš lid k větším úspěchům."
 PER_upscale_military_production: "Navýšit vojenskou výrobu"
 PER_upscale_military_production_desc: "Chceme-li čelit těm, kteří ohrožují naši zemi, musíme být připraveni zdvojnásobit náš vojensko-průmyslový výkon. Budováním nových továren si zajistíme nejlepší podmínky pro další posilování našich ozbrojených sil moderním vybavením."
 PER_usurp_afghanistan: "Podrobit [AFG.GetNameDef]"
 PER_usurp_afghanistan_desc: "Nastal čas konečně přivést Kábul pod [PER.GetAdjective] kontrolu. Veďme naše síly hluboko do [AFG.GetAdjective] hor a nevracejme se, dokud naše vlajka nebude vlát nad palácem Tádžbeg."
 PER_vanguard_template_tt: "Vytvoří §Ydivizní šablonu dělostřelectva§!."
 PER_venerate_islam: "Uctívat islám"
 PER_venerate_islam_desc: "Islám je základní součástí naší společnosti od doby, kdy byla stará říše téměř zcela rozložena během muslimského dobytí Persie. Od té doby hraje důležitou roli v každodenním životě většiny našich občanů. Namísto odporu vůči duchovenstvu je možná načase uctívat naše náboženství a ukázat světu, jak oddaní islámu jsme."
 PER_war_elephant: "Válečný slon"
 PER_war_elephant_desc: "Ačkoliv nebyli v dávné Perské říši využíváni tak široce, prosluli jsme nasazováním malé skupiny válečných slonů při našich starověkých výbojích. Naši vědci přišli s návrhem velmi těžkého tanku inspirovaného tvarem indického slona, který jistě vyvolá v našich nepřátelích stejný strach, jako tomu bylo před tisíci lety."
 PER_war_plan_cambyses: "Válečný plán Kambýsés"
 PER_war_plan_cambyses_desc: "Kambýsés II., přímý nástupce Kýra Velikého, byl druhým králem králů Achaimenovské říše. Jelikož bylo jeho panování poznamenáno výboji v severní Africe a Egyptě, naše tažení v této oblasti nesou jeho jméno na počest jeho slávy."
 PER_war_plan_darius: "Válečný plán Dareios"
 PER_war_plan_darius_desc: "Dareios Veliký byl Achaimenovský vládce, který v naší dávné historii sloužil Persii jako král králů. Vládl Persii v době jejího územního vrcholu, sahajícího až do údolí Indu. Proto nyní ponese jeho jméno náš plán postupu na indický subkontinent a vyhnání [ENG.GetAdjective] z těchto zemí."
 PER_war_plan_xerxes: "Válečný plán Xerxés"
 PER_war_plan_xerxes_desc: "Xerxés byl čtvrtým králem králů Achaimenovské říše, příbuzný jak Darea, tak Kýra Velikého. Jelikož je nejznámější svou invazí do Řecka v roce 480 př. n. l., rozhodli jsme se po něm pojmenovat naše plány na invazi do zemí západně od nás. Konečně napravíme naši porážku z rukou Helénů."
 PER_we_survived: "Přežili jsme"
 PER_we_survived_desc: "Podařilo se nám přežít navzdory všem překážkám! Nyní nastává čas vytvořit stabilitu pro náš lid."
 PER_we_will_survive: "Přežijeme"
 PER_we_will_survive_desc: "Konečně dorazila válka až k našim dveřím. Bezpochyby uděláme vše pro to, abychom se těmto vetřelcům postavili a ukázali světu, že [PER.GetNameDef] přežije navzdory všem překážkám. Přetrvali jsme tisíce let a přetrváme další tisíce."
 PER_wether_the_storm: "Čelit sílící bouři"
 PER_wether_the_storm_desc: "Zdá se, že naše snahy o diplomatickou ochranu se obrátily proti nám, když bývalí přátelé obracejí své zraky k našim zemím s cílem zabránit nám, abychom se obrátili proti nim. Ačkoliv jsme to neměli v úmyslu, musíme se připravit na vše, co může přijít."
 PER_white_peace_tt: "Pošle našim nepřátelům §Yudálost§!, která požaduje §Ybílý mír§!, což nám umožní §Yponechat si naše dříve vlastněná území§!."
 PER_white_revolution: "Zahájit Bílou revoluci"
 PER_white_revolution_desc: "Modernizovat [ROOT.GetNonIdeologyName] není snadný úkol. Vyžaduje značné množství razantních reforem, aby bylo tohoto velkého cíle dosaženo. Nazveme ji Bílá revoluce, nebo také revoluce šáha a lidu, a přivede [PER.GetNameDef] po bok velkých západních národů."
 PER_women_vote: "Rozšířit volební právo na ženy"
 PER_women_vote_desc: "V současnosti mohou o vládních záležitostech hlasovat pouze muži. Jelikož tvoří přibližně polovinu naší populace, měli bychom zajistit, aby i ženy v naší zemi mohly být slyšeny. Měli bychom však postupovat opatrně, protože to může vést k tomu, že duchovenstvo uvěří, že se odvracíme od tradic."
 PER_workers_army: "Lidová armáda"
 PER_workers_army_desc: "Armáda je plná kontrarevolučních fanatiků čekajících na příležitost obnovit své zastaralé názory v našem státě. Musíme armádu reformovat, abychom tomu zabránili, počínaje odstraněním reakcionářů."
 RAJ_GOE_enforced_peace_decision: "Hrozící příměří"
 RAJ_GOE_enforced_peace_decision_desc_2_1_tt: "§YPokud ovládáme [443.GetName], [989.GetName], [433.GetName], [428.GetName] a [437.GetName], získáme po skončení války rozsáhlejší územní ústupky§!"
 RAJ_GOE_enforced_peace_decision_desc_2_2_tt: "§YPokud ovládáme [429.GetName], [427.GetName], [424.GetName], [425.GetName], [423.GetName], [982.GetName] a [983.GetName], získáme po skončení války rozsáhlejší územní ústupky§!"
 RAJ_GOE_enforced_peace_decision_desc_2_3_tt: "§YPokud ovládáme [436.GetName], [984.GetName], [426.GetName], [438.GetName] a [435.GetName], získáme po skončení války rozsáhlejší územní ústupky§!"
 RAJ_GOE_enforced_peace_decision_desc_2_4_tt: "§YPokud ovládáme [431.GetName], [985.GetName], [430.GetName], [432.GetName], [990.GetName] a [434.GetName], získáme po skončení války rozsáhlejší územní ústupky§!"
 RAJ_GOE_enforced_peace_decision_desc_2_tt: "§YUdržíme kontrolu nad kterýmkoli z následujících regionů§!: §YZápadní Indie§!, §YJižní Indie§!, §YStřední Indie§!, §YVýchodní Indie§! a §YSeverní Indie§!, pokud při vstupu příměří v platnost ovládáme všechny státy v daném regionu."
 RAJ_GOE_enforced_peace_decision_desc_eng_tt: "Pokud [RAJ.GetName] vydrží dostatečně dlouho, [UK_INDIA.GetAdjective] vláda jim nabídne příměří výměnou za územní ústupky."
 RAJ_GOE_enforced_peace_decision_desc_tt: "Pokud se nám podaří vydržet dostatečně dlouho, [UK_INDIA.GetAdjective] vláda nám nabídne příměří."
 RAJ_GOE_enforced_peace_decision_eng: "$RAJ_GOE_enforced_peace_decision$"
 RAJ_GOE_mughal_independence_category: "Mughalská nezávislost"
 RAJ_GOE_secure_central_india: "[GetMughalCivilWarStatus] střední Indii"
 RAJ_GOE_secure_eastern_india: "[GetMughalCivilWarStatus] východní Indii"
 RAJ_GOE_secure_northern_central_india: "[GetMughalCivilWarStatus] severní a střední Indii"
 RAJ_GOE_secure_northern_india: "[GetMughalCivilWarStatus] severní Indii"
 RAJ_GOE_secure_southern_india: "[GetMughalCivilWarStatus] jižní Indii"
 RAJ_GOE_secure_western_central_india: "[GetMughalCivilWarStatus] západní a střední Indii"
 RAJ_GOE_secure_western_india: "[GetMughalCivilWarStatus] západní Indii"
 RAJ_a_congress_resurgent: "Obrození Kongresu"
 RAJ_a_congress_resurgent_desc: "Národní kongres výrazně posílil na popularitě i vlivu. Nyní představuje politickou sílu, kterou nelze ignorovat."
 RAJ_a_peacock_prince: "Paví princ"
 RAJ_a_peacock_prince_desc: "Mughalské dědictví vyžaduje schopného vládce, který znovu získá jeho trůn. Mezi knížecími státy musí povstat Paví princ, takový, jehož rodokmen, ambice a vize dokážou obnovit slávu říše a znovu sjednotit subkontinent."
 RAJ_a_permanent_muslim_governmental_seat: "Stálé muslimské zastoupení ve vládě"
 RAJ_a_permanent_muslim_governmental_seat_desc: "Muslimové tvoří v naší zemi početnou menšinu a abychom zmírnili jejich obavy ze sjednocené Indie, poskytneme jim stálé zastoupení ve vládě."
 RAJ_a_private_military: "Soukromá armáda"
 RAJ_a_private_military_desc: "Naši místní policii lze snadno přeměnit na soukromou armádu. Technicky by nebyla součástí žádné armády, ale byla by placena přímo společností, v souladu s vládními nařízeními."
 RAJ_a_private_military_tt_1: "Vytvoří nepravidelné divize s plným personálem a vybavením.\n\nVysílání divizí jako dobrovolníků poskytne §G1§! mimo-mapovou §Ycivilní továrnu§! na §Y365§! dní, pokud budou vyslány do zemí, kam jsme dosud dobrovolníky neposlali.\nOpětovné vyslání dobrovolníků do stejné země po §Y540§! dnech poskytne továrnu znovu.\n\nTyto továrny se nezapočítávají do §Ydaní§!."
 RAJ_a_secular_state: "Sekulární stát"
 RAJ_a_secular_state_desc: "Indie je náboženská země, ale je důležité, aby samotný stát byl sekulární, aby se předešlo obavám z možné diskriminace menšin."
 RAJ_a_tiger_uncained: "Nespoutaný tygr"
 RAJ_a_tiger_uncained_desc: "Příliš dlouho jsme byli podrobeni různým říším a svázáni jhem imperiální nadvlády. Už nikdy více! Jako tygr konečně osvobozený ze zajetí se již nikdy dobrovolně nepodrobíme."
 RAJ_a_tiger_unchained: "Nespoutaný tygr"
 RAJ_a_tiger_unchained_desc: "Vytvoříme elitní jednotky schopné zvládnout i nejnáročnější horský terén. Tito tygři hor budou nahánět strach našim nepřátelům a zajistí naši nadvládu v horách."
 RAJ_abolish_agrarian_society_criteria: "Urychlit industrializaci"
 RAJ_abolish_agrarian_society_criteria_desc: "V moderní době je nezbytné držet krok s ostatními státy v oblasti hospodářského rozvoje. Příliš dlouho jsme spoléhali na zemědělství. Je čas otevřít cestu rychlé industrializaci, díky které se [RAJ.GetNameDef] dostane do nové éry pokroku."
 RAJ_abolish_agrarian_society_criteria_tt: "Trvale zkracuje dobu potřebnou ke snížení účinků §Y$idea_RAJ_agrarian_society$§! o §Y3§! měsíce"
 RAJ_accept_russian_muhajir_money: "Přijmout ruské muhádžirské finance"
 RAJ_accept_russian_muhajir_money_desc: "Zahraniční zlato proudí do našich rukou a rozdmýchává plameny revoluce."
 RAJ_acquire_new_resources: "Získat nové zdroje"
 RAJ_acquire_new_resources_desc: "Náš průmysl vyžaduje stále větší přísun surovin, aby uspokojil poptávku po zboží. Zaměstnáme proto nezaměstnané masy v nových zpracovatelských závodech napříč našimi državami."
 RAJ_across_the_himalayas: "Přes Himálaj"
 RAJ_across_the_himalayas_desc: "Země za Himálajem skrývají nesmírné bohatství a strategický význam. Rozšířením vlivu Mughalské říše přes tyto impozantní hory upevníme naši nadvládu a zajistíme nové hranice pro slávu říše."
 RAJ_agrarian_socialism: "Agrární socialismus"
 RAJ_agrarian_socialism_desc: "Revoluce začíná na polích.\nNechť se půda vrátí těm, kdo ji obdělávají, a nechť vesnice spravují samy sebe ve jménu rovnosti a spravedlnosti."
 RAJ_agricultural_cooperatives: "Zemědělská družstva"
 RAJ_agricultural_cooperatives_desc: "Zemědělská družstva vlastněná několika farmáři jsou klíčem k udržitelnosti, soběstačnosti a posílení obyvatelstva."
 RAJ_agricultural_cooperatives_tt: "Získá §G1§! §Yinfrastrukturu§! v každém vlastněném státě s alespoň 4 §Ycivilními továrnami§!.\nZíská §G1§! §Ycivilní továrnu§! za každé 2 §Yinfrastruktury§! získané tímto zaměřením."
 RAJ_airforce_shortcut: "Indické letectvo"
 RAJ_akhand_bharat: "$RAJ_akhand_bharat_tag$"
 RAJ_akhand_bharat_desc: "$RAJ_akhand_bharat_tag$ musí zůstat jednotný a nedělitelný. Všichni, kdo dluží nedílnou loajalitu indickému národu a státu, budou považováni za zcela rovné a budou sdílet stejné povinnosti bez ohledu na kastu, vyznání či náboženství."
 RAJ_akhand_bharat_tt: "Odemkne rozhodnutí k vytvoření domovského území ve státech [AFG.GetName], [MLD.GetName], [NEP.GetName], [PAK.GetName], [BAN.GetName], [BHU.GetName] a [SRL.GetName] a ke vzniku $RAJ_akhand_bharat_tag$u. Vždy lze cílit jednu zemi, přičemž pro získání dalších domovských území je nutné obsadit všechna stávající."
 RAJ_all_india_kisan_sabha: "Celoindický svaz rolníků"
 RAJ_all_india_kisan_sabha_desc: "Rolníci a zemědělci venkovské Indie byli vykořisťováni příliš dlouho. Nastal čas, aby se zorganizovali a společně vyjádřili své požadavky."
 RAJ_all_india_students_federation: "Celoindická studentská federace"
 RAJ_all_india_students_federation_desc: "Mobilizace studentů proti [ENG.GetAdjective] nadvládě zajistí, že naše nejbystřejší mysli budou pracovat proti zavedenému řádu."
 RAJ_ammunition_factories_shortcut: "Továrny na munici"
 RAJ_ammunition_factory_khadki: "Továrna na munici v Khadki"
 RAJ_ammunition_factory_khadki_desc: "Abychom byli schopni zásobovat moderní armádu, musíme výrazně rozšířit kapacity našich zbrojních továren."
 RAJ_an_economy_unbound: "Uvolněná ekonomika"
 RAJ_an_economy_unbound_desc: "Už nejsme brzděni našimi suzerény a naše ekonomika může konečně rozkvést, zbavená dřívějších závazků."
 RAJ_annex_goa: "Anektovat Goa"
 RAJ_annex_goa_desc: "Goa patří Indii a byla jí kdysi odebrána imperialistickými silami. Je zřejmé, že [POR.GetName] ji již nedokáže ubránit. Musíme napravit tuto historickou křivdu."
 RAJ_appoint_a_c_suite: "Jmenovat vrcholové vedení"
 RAJ_appoint_a_c_suite_desc: "Silné korporátní vedení je klíčem k našemu úspěchu. Sestavením schopného výkonného týmu zajistíme efektivní řízení, strategickou vizi a stabilní růst."
 RAJ_appoint_german_friendly_government: "Jmenovat proněmeckou vládu"
 RAJ_appoint_german_friendly_government_desc: "Pokud se naši vláda a [GER.GetNameDef] sblíží, posílí to naše vazby na rostoucí evropskou velmoc. Tato administrativa bude klást důraz na průmyslový růst, vojenskou modernizaci a pevný odpor vůči bolševismu."
 RAJ_appoint_soviet_friendly_government: "Jmenovat prosovětskou vládu"
 RAJ_appoint_soviet_friendly_government_desc: "Abychom zajistili trvalou podporu z Moskvy, dosadíme vládu plně sladěnou se sovětskou ideologií. Její loajalita zajistí hospodářskou pomoc, vojenskou spolupráci a ideologickou jednotu našeho nového státu."
 RAJ_arm_the_peasantry: "Vyzbrojit rolnictvo"
 RAJ_arm_the_peasantry_desc: "Revoluce musí dosáhnout každého pole.\nRozdělíme zbraně loajálním venkovským milicím, aby žádná vesnice nezůstala bezbranná vůči reakci."
 RAJ_armoured_corps_center_and_school: "Centrum mechanizovaných sil"
 RAJ_armoured_corps_center_and_school_desc: "Budoucnost válčení spočívá v mechanizované síle. Založení centra mechanizovaných sil nám umožní cvičit naše jednotky v mechanizované taktice a učinit z tanků hrot naší moderní vojenské strategie."
 RAJ_army_shortcut: "Důstojníci"
 RAJ_arrest_congress_leaders: "Zatknout vůdce Kongresu"
 RAJ_arrest_congress_leaders_desc: "Vůdci Kongresu se odmítají přizpůsobit nové realitě vlády společnosti. Nadále kladou odpor a při každé příležitosti vyvolávají nepokoje. Musíme tyto buřiče potlačit dříve, než se jejich vliv rozšíří."
 RAJ_assam_oil_dlc: "Ásámská ropa"
 RAJ_assam_oil_dlc_desc: "Nedávno jsme objevili rozsáhlá ropná naleziště v Ásámu. Založením státní ropné společnosti a vybudováním těžebních zařízení můžeme výrazně posílit naši ekonomiku."
 RAJ_assume_eastern_naval_responsibilities: "Převzít východní námořní odpovědnost"
 RAJ_assume_eastern_naval_responsibilities_desc: "Není pochyb o tom, že [JAP.GetNameDef] na východě vyvolává napětí. Jak se jejich plány začínají naplňovat, je nezbytné připravit naše námořnictvo na obranu [RAJ.GetAdjective] vod. Musíme požádat korunu, aby nám vyslala lodě [ENG.GetAdjective] námořnictva na pomoc."
 RAJ_attract_scientists: "Přilákat vědce"
 RAJ_attract_scientists_desc: "Díky našemu velkému bohatství nyní můžeme přilákat nejlepší vědce z celého světa."
 RAJ_authoritarianship: "Autoritářství"
 RAJ_authoritarianship_desc: "Silná centralizovaná moc zajistí mír, spravedlnost a stabilitu našeho nového státu."
 RAJ_automating_the_army: "Automatizace armády"
 RAJ_automating_the_army_desc: "Upřednostníme mechanizaci a pokročilé obrněné divize, čímž připravíme cestu k plně modernizované armádě."
 RAJ_azad_hind_bank: "Banka Azad Hind"
 RAJ_azad_hind_bank_desc: "$RAJ_azad_hind_dlc_bank_desc$"
 RAJ_azad_hind_dlc: "Azad Hind"
 RAJ_azad_hind_dlc_bank: "Banka Azad Hind"
 RAJ_azad_hind_dlc_bank_desc: "Revoluce vyžaduje zdroje. Založením Banky Azad Hind vytvoříme finanční instituci určenou k podpoře boje za nezávislost. Bude mobilizovat prostředky, posilovat vlastence a položí ekonomické základy svobodné Indie."
 RAJ_azad_hind_dlc_desc: "Azad Hind představuje vyvrcholení našeho boje za osvobození, exilovou vládu odhodlanou ukončit britskou nadvládu. Se svými silami připravenými a jasnou vizí je připravena vést Indii ke svobodě silou a odhodláním."
 RAJ_azad_hind_dlc_radio: "Rádio Azad Hind"
 RAJ_azad_hind_dlc_radio_desc: "Abychom šířili poselství osvobození, musíme založit Rádio Azad Hind. Toto revoluční vysílání ponese naši výzvu ke svobodě přes hranice, sjednotí vlastence a zažehne boj proti koloniálnímu útlaku. Tento boj potřebuje hlas - a tím bude náš."
 RAJ_azad_hind_dlc_tt: "Získáme: "
 RAJ_azad_hind_dlc_tt_2: "Na začátku §Robčanské války§! po dobu §Y120§! dní"
 RAJ_azad_hind_radio: "Rádio Azad Hind"
 RAJ_azad_hind_radio_desc: "$RAJ_azad_hind_dlc_radio_desc$"
 RAJ_ban_untouchability_once_and_for_all: "Navždy zakázat nedotknutelnost"
 RAJ_ban_untouchability_once_and_for_all_desc: "Nedotknutelnost je skvrnou naší společnosti, která nás rozděluje v době, kdy nejvíce potřebujeme jednotu. Jejím zrušením potvrdíme důstojnost každého Inda a učiníme zásadní krok k vybudování spravedlivého a inkluzivního státu."
 RAJ_bathe_in_hellfire: "Ponořit se do pekelného ohně"
 RAJ_bathe_in_hellfire_desc: "Naši nepřátelé budou mít jen dvě možnosti - podřídit se, nebo čelit hranici."
 RAJ_bathe_in_hellfire_desc_tt: "§YJaderné zbraně§! nyní trvale zničí §Y50%§! §Yvojenských továren§! v cílovém státě.\n§YTermonukleární zbraně§! nyní trvale zničí §Y100%§! §Yvojenských továren§! v cílovém státě."
 RAJ_bhoodan_movement: "Hnutí Bhúdán"
 RAJ_bhoodan_movement_desc: "Dobrovolným přerozdělením půdy posílíme bezzemky a obnovíme spravedlnost na venkově. Navrácením půdy těm, kteří na ní pracují, si získáme nejen jejich práci, ale i jejich trvalou loajalitu."
 RAJ_bhutanese_protectorate: "Bhútánský protektorát"
 RAJ_bhutanese_protectorate_desc: "Musíme respektovat izolaci [BHU.GetAdjective] lidu, ale zároveň nemůžeme ignorovat skutečnost, že malé státy jsou ohroženy mocnostmi s imperiálními ambicemi. Nabídneme jim ochranu pod indickými křídly."
 RAJ_bhutanese_protectorate_tt: "§Y[BHU.GetName]§! se stane dominiem §Y[RAJ.GetNameDefCap].§!\n\nJe pravděpodobnější, že přijmou, pokud\n\t- mají o nás vysoké mínění\n\t- máme výrazně silnější armádu než oni"
 RAJ_black_swan_sloops: "Šalupy třídy Black Swan"
 RAJ_black_swan_sloops_desc: "Získáním a úpravou cenově dostupných trupů třídy Black Swan můžeme rychle rozšířit naši flotilu lehkých hlídkových plavidel, ideálních pro pobřežní obranu a ochranu konvojů."
 RAJ_bombay_baroda_and_central_india_railway: "Bombajská, Barodská a Středoindická železnice"
 RAJ_bombay_baroda_and_central_india_railway_desc: "Rozšíření Bombajské, Barodská a Středoindické železnice propojí klíčové regiony, podpoří hospodářský růst a sjednotí komunity. Tyto důležité tratě posílí obchodní sítě a upevní infrastrukturu Indie pro nadcházející výzvy."
 RAJ_bombay_trade_port: "Obchodní přístav Bombaj"
 RAJ_bombay_trade_port_desc: "Bombaj má potenciál stát se světovým obchodním přístavem, který umožní dovoz a vývoz obrovského množství zboží. Stačí investovat do rozšíření přístavní infrastruktury."
 RAJ_boycott_british_made_goods: "Bojkot britského zboží"
 RAJ_boycott_british_made_goods_desc: "Již dlouho je [GetRajName] pro [ENG.GetNameDef] pouze zdrojem surovin a 	odbytištěm pro jejich prodražené výrobky. My bychom měli vyrábět pro [RAJ.GetRajAdjective] občany, ne být vykořisťováni vlastními okupanty."
 RAJ_break_the_zamindars: "Zlomit zamindáry"
 RAJ_break_the_zamindars_desc: "Statkáři jsou páteří starého režimu.\nRozložíme jejich panství, zabavíme jejich půdu a rozptýlíme jejich moc do větru."
 RAJ_british_air_experts: "Britští letečtí odborníci"
 RAJ_british_air_experts_desc: "Využití zkušeností britských pilotů a inženýrů může urychlit rozvoj našeho letectva. Jejich zkušenosti z moderní letecké války nám poskytnou cenné poznatky při budování silné vzdušné síly."
 RAJ_burn_down_the_cellular_jail: "Zničit Celulární věznici"
 RAJ_burn_down_the_cellular_jail_desc: "Celulární věznice je urážkou všech, kteří kdy bojovali za nezávislost Indie, a musí být zničena."
 RAJ_cabinet_mission_plan: "Plán kabinetní mise"
 RAJ_cabinet_mission_plan_desc: "Se sjednocenou frontou muslimů i hinduistů jsme připraveni čelit delegaci vyslané [ENG.GetAdjective] vládou."
 RAJ_campaign_against_agrarian_societys: "Plány industrializace"
 RAJ_campaign_against_agrarian_societys_desc: "Indie nemůže zůstat v minulém století. Musíme vynaložit soustředěné úsilí na povznesení našeho lidu."
 RAJ_capital_ship_effort_dlc: "$RAJ_capital_ship_effort$"
 RAJ_central_comittee_authority: "Autorita ústředního výboru"
 RAJ_central_comittee_authority_desc: "Disciplína je síla.\nÚstřední výbor bude dohlížet na všechny aspekty správy, aby revoluce nesklouzla do chaosu."
 RAJ_chariot_of_victory: "Vůz vítězství"
 RAJ_chariot_of_victory_desc: "Bojiště vyžaduje rychlost i sílu. Investicemi do obrněných vozidel a mechanizovaných sil vytvoříme moderní armádu schopnou rychlých a rozhodujících vítězství, která zajistí nadvládu Indie v každém konfliktu."
 RAJ_chindits_: "Čindité"
 RAJ_chindits__desc: "Čindité jsou elitní, nekonvenční jednotky vycvičené pro dlouhodobé operace v džungli. Rozšířením jejich řad a zdokonalením jejich taktiky získáme sílu schopnou obcházet nepřítele a narušovat jeho operace hluboko za jeho liniemi."
 RAJ_chindits_dlc: "$RAJ_chindits$"
 RAJ_chindits_dlc_desc: "$RAJ_chindits_desc$"
 RAJ_circuvment_demobilization_restrictions: "Obejít omezení"
 RAJ_circuvment_demobilization_restrictions_desc: "Vláda stále udržuje přísný limit na počet mužů, které můžeme mobilizovat. Koruna se zjevně obává armády, kterou nemá pod kontrolou. Nevadí, existují způsoby, jak tato omezení obejít - ať už úplatky, nebo nezapočítáváním některých náboženských pracovníků do ozbrojených sil."
 RAJ_coal_fire_and_steel: "Uhlí, oheň a ocel"
 RAJ_coal_fire_and_steel_desc: "Uhlí pohání stroje, oheň kalí vůli a ocel buduje budoucnost. Investicemi do těžkého průmyslu položíme základy soběstačné Indie schopné bránit svou suverenitu a podporovat svůj rozvoj."
 RAJ_coastal_protection: "Ochrana pobřeží"
 RAJ_coastal_protection_desc: "Naše rozsáhlé pobřeží potřebuje ochranu před zahraničními hrozbami."
 RAJ_colonial_cadet_exchange: "Koloniální výměna kadetů"
 RAJ_colonial_cadet_exchange_desc: "Pošleme naše nejlepší kadety na výcvik po boku britských důstojníků, abychom zajistili, že naše armáda bude vybavena nejmodernějšími postupy."
 RAJ_colonial_cadet_exchange_tt: "Po odstranění:"
 RAJ_company_bonuses: "Podnikové bonusy"
 RAJ_company_bonuses_desc: "Navážeme výkon na potenciální bonusy, abychom zvýšili efektivitu napříč společností."
 RAJ_comrades_of_the_city: "Soudruzi města"
 RAJ_comrades_of_the_city_desc: "Městští dělníci jsou předvojem.\nSe vzděláním, nástroji a jednotou povedou republiku do moderní éry."
 RAJ_concessions_to_the_industrialists: "Ústupky průmyslníkům"
 RAJ_concessions_to_the_industrialists_chances_tt: "§Y$RAJ_investments_from_local_leaders$§! se budou soustředit především na §Ycivilní průmysl§! a v menší míře na §Yvojenský průmysl§!."
 RAJ_concessions_to_the_industrialists_desc: "Abychom podpořili rozvoj bez zatížení imperiální pokladny, nabídneme výhodné podmínky průmyslníkům ochotným investovat do regionálního růstu. Výměnou za mírné ústupky si místní elity zajistí loajalitu prostřednictvím prosperity."
 RAJ_confer_with_the_congress: "Jednání s Kongresem"
 RAJ_confer_with_the_congress_desc: "Ačkoli by mnozí ve správě dali přednost mlčení, úplné ignorování hnutí za nezávislost by mohlo vyvolat větší nepokoje. Vyhověním vybraným požadavkům můžeme uklidnit situaci a posílit vnitřní stabilitu."
 RAJ_conquer_afghanistan: "Dobýt Afghánistán"
 RAJ_conquer_afghanistan_desc: "Afghánistán, pradávné srdce říše, musí být znovu získán. Obnovením kontroly nad tímto historickým regionem uctíme mughalské dědictví a zajistíme klíčovou pevnost pro obrodu impéria."
 RAJ_conquerors_of_iraq: "Pochod na Mezopotámii"
 RAJ_conquerors_of_iraq_desc: "Irák byl kdysi klíčovou křižovatkou obchodu a moci v říši Tímúra a jeho bohatství živilo naši dávnou slávu. Dnes leží v rukou méněcenných vládců, nehodných jeho odkazu. Navrácením Mezopotámie pod naši nadvládu zajistíme strategické srdce říše, ovládneme bránu mezi Východem a Západem a připomeneme světu, že Tímúrovci se neptají — oni berou."
 RAJ_conquerors_of_persia: "Dobyvatelé Persie"
 RAJ_conquerors_of_persia_desc: "[PER.GetNameDef], země nesmírného bohatství a historie, byla kdysi soupeřem říše. Jejím podrobením pod mughalskou vládu znovu potvrdíme svou nadvládu, zajistíme klíčová západní území a upevníme postavení říše jako pravého dědice imperiální velikosti."
 RAJ_conquerors_of_turkey: "Druhá bitva u Ankary"
 RAJ_conquerors_of_turkey_desc: "Anatolie byla kdysi bojištěm říší a dějiny pamatují Tímúrovo vítězství nad Osmany. Přesto nástupci tohoto zlomeného sultanátu stále přežívají a drží se zemí, které právem náleží pod naši vládu. Pochodem na západ znovu prolomíme jejich obranu a získáme zpět své dávné výboje."
 RAJ_constitution_for_the_masses: "Ústava pro masy"
 RAJ_constitution_for_the_masses_desc: "Lidová republika nemůže spočívat na starém imperiálním právu.\nNová ústava musí odrážet vůli dělníků, rolníků a bezzemků — nikoli rozmary monarchů či koloniálních guvernérů."
 RAJ_consult_with_congress_leaders: "Konzultovat s vůdci Kongresu"
 RAJ_consult_with_congress_leaders_desc: "Namísto toho, abychom se násilím zapojili do [ENG.GetAdjective] válek, musíme využít oficiální cesty. Konzultujme to s vůdci Kongresu a pokusme se je přesvědčit, ať [RAJ.GetNameDef] může vstoupit do války."
 RAJ_contamination_cleanup_crew: "Dekontaminační jednotky"
 RAJ_contamination_cleanup_crew_desc: "Naši vojáci musí být připraveni bojovat i v těch nejtvrdších podmínkách, včetně jaderného spadu."
 RAJ_continue_the_five_year_plan: "Pokračovat v pětiletém plánu"
 RAJ_continue_the_five_year_plan_desc: "Po prvním roce pětiletého plánu je čas zhodnotit dosažený pokrok a využít získané zkušenosti v následujících čtyřech letech."
 RAJ_continue_the_five_year_plan_tt: "Všechny modifikátory našeho §Ypětiletého plánu§! budou zvýšeny o §G+30%§!"
 RAJ_cordite_factory_aruvankadu_tamil_nadu: "Továrna na kordit Aruvankadu"
 RAJ_cordite_factory_aruvankadu_tamil_nadu_desc: "Kvalitní pohonné látky pro dělostřelectvo poskytnou našim těžkým zbraním výhodu nad nepřítelem."
 RAJ_corporate_domination: "Korporátní dominance"
 RAJ_corporate_domination_desc: "Jak upevňujeme kontrolu nad subkontinentem, stále více dominujeme soukromému i veřejnému sektoru. S cílem úplné kontroly, přímé či nepřímé, dokážeme zvýšit produktivitu napříč všemi podniky."
 RAJ_corporate_expansion: "Korporátní expanze"
 RAJ_corporate_expansion_desc: "Hospodářský růst našeho hlavního portfolia vedl k populačnímu boomu. Abychom zajistili dlouhodobý růst, rozšíříme infrastrukturu pro naše budoucí zaměstnance."
 RAJ_cottage_industries: "Domácí průmysl"
 RAJ_cottage_industries_desc: "Výroba probíhající v domácnostech představuje životaschopnou alternativu k těžkému průmyslu a dává lidem pocit nezávislosti."
 RAJ_court_the_princes: "Získat knížata na svou stranu"
 RAJ_court_the_princes_desc: "Knížecí státy dlouhodobě představují pilíře loajality a pořádku na subkontinentu. Potvrzením jejich privilegií a větším zapojením do správy posílíme imperiální základnu proti rostoucímu populistickému neklidu."
 RAJ_creative_accounting: "Kreativní účetnictví"
 RAJ_creative_accounting_desc: "Pomocí kreativních účetních triků můžeme část našich zisků „zmizet“, alespoň tak, jak tomu budou věřit daňové úřady."
 RAJ_cripps_mission_dlc: "$RAJ_cripps_mission$"
 RAJ_cripps_mission_dlc_desc: "$RAJ_cripps_mission_desc$"
 RAJ_crown_commodities: "Korunní komodity"
 RAJ_crown_commodities_cg_to_the_empire_tt: "(§Y[ENG.GetFlag][ENG.GetName]§! a jejich §Ysubjekty§!):"
 RAJ_crown_commodities_desc: "Upřednostněním pěstování exportně orientovaných tržních plodin si můžeme zajistit stabilní tok příjmů a posílit svůj hospodářský význam pro Říši. Čaj, bavlna, juta a další pilíře koloniálního obchodu se stanou základem prosperity venkova."
 RAJ_cruiser_effort_dlc: "$RAJ_cruiser_effort$"
 RAJ_crush_the_anathema: "Rozdrtit anathému"
 RAJ_crush_the_anathema_desc: "Komunismus je pro řádné podnikání naprostou anathémou. Peníze hýbou světem a svět ovládaný komunisty by vedl ke stagnaci. Musíme tuto hnilobu spálit do základů."
 RAJ_cult_of_personality: "$GUAY_cult_of_personality$"
 RAJ_cult_of_personality_desc: "$GUAY_cult_of_personality_desc$"
 RAJ_cultural_reawekening: "Kulturní obrození"
 RAJ_cultural_reawekening_desc: "Nastává nový úsvit plný umění, jazyka a tradic. Sjednotíme národ pod nadčasovým duchem naší civilizace."
 RAJ_curtail_the_zamindars: "Omezit zamindáry"
 RAJ_curtail_the_zamindars_desc: "Zakořeněný vliv venkovských statkářů dlouhodobě brzdí modernizaci správy a v konečném důsledku i potenciál, jenž [ROOT.GetNameDef] má. Přesunem pravomocí a zdrojů k úředníkům založeným na zásluhách a odpovědnějším institucím oslabíme jejich vliv a zároveň posílíme základy efektivnějšího státu."
 RAJ_deathblow_to_imperial_remnants: "Smrtící úder zbytkům impéria"
 RAJ_deathblow_to_imperial_remnants_desc: "[PAK.GetName] sloužil jako zástupce Angličanů, kteří mu dodávali značné množství zdrojů ve snaze vyvážit rostoucí vliv komunismu. Nyní tento spor jednou provždy ukončíme."
 RAJ_deathknell_to_the_raj: "Umíráček pro Rádž"
 RAJ_deathknell_to_the_raj_desc: "Postupně jsme oslabovali zbytky Rádže tím, že jsme přebírali stále větší kontrolu nad jeho územím. Nyní je čas ukončit tuto frašku a převzít plnou kontrolu nad subkontinentem."
 RAJ_deathknell_to_the_raj_trigger: "Existuje §YRádž§! pod §Ybritskou§! vládou"
 RAJ_deathknell_to_the_raj_trigger_tt: "Anexuje zbytky Rádže"
 RAJ_debt_manipulation: "Manipulace s dluhem"
 RAJ_debt_manipulation_desc: "Můžeme využít existující dluhy k vytvoření zdánlivých ztrát, což nám umožní platit nižší daně a hromadit přebytečné zisky."
 RAJ_debt_relief: "Oddlužení"
 RAJ_debt_relief_desc: "Po dlouhou dobu bohatí [ENG.GetAdjective] i [GetRajAdjective] spekulanti lákali obyčejné lidi do dluhových pastí, až se to stalo běžným jevem. Budeme tlačit na místní vlády, aby těmto lidem poskytly úlevu a zmírnily jejich břemeno."
 RAJ_decentralize_the_party: "Decentralizovat stranu"
 RAJ_decentralize_the_party_desc: "Moc by neměla vycházet pouze z úřadů v Indraprasthě.\nNechť lid vede revoluci prostřednictvím místních rad a venkovských sovětů."
 RAJ_defend_burma: "Bránit Barmu"
 RAJ_defend_burma_desc: "[BRM.GetName] slouží jako nárazníková zóna, pokud se [JAP.GetName] rozhodne pro agresi. Posílení její postavení je pro nás jednoznačně přínosné."
 RAJ_defend_states: "Ubránit"
 RAJ_defenders_of_the_revolution: "Obránci revoluce"
 RAJ_defenders_of_the_revolution_desc: "Nejsou to jen vojáci. Jsou to strážci myšlenky.\nPovýšíme naše nejdisciplinovanější a nejloajálnější bojovníky do elitního sboru, který bude bránit půdu i ideologii."
 RAJ_defenders_of_the_revolution_idea_tt: "Přidá technologii §Y$revolutionary_mass_assault$§!."
 RAJ_defense_of_burma: "Obrana Barmy"
 RAJ_defense_of_burma_desc: "[BRM.GetNonIdeologyName] leží přímo na východ od Bengálska a její džungle tvoří poslední přirozenou bariéru proti hrozbě z východu. Je nezbytné zde mobilizovat obranné síly, které budou stát po boku [BRM.GetAdjective] jednotek a udrží indický subkontinent pevně v [ENG.GetAdjective] rukou."
 RAJ_defense_of_india_act: "Zákon o obraně Indie"
 RAJ_defense_of_india_act_desc: "[GetRajName] může čelit ohrožení vnější agresí. [ROOT.GetLeader] vyhlásil proklamací zákon, který stanoví zvláštní opatření k zajištění veřejné bezpečnosti a zájmu státu, jakož i k obraně [GetRajAdjective] státu."
 RAJ_defense_of_malaya: "Obrana Malajska"
 RAJ_defense_of_malaya_desc: "[MAL.GetNameDef] může být vzhledem ke své poloze mezi Indickým a Tichým oceánem ohrožena invazí. Jakožto další klenot Koruny musíme přispět k obraně a opevnění regionu. Musíme si udržet kontrolu nad jihovýchodní Asií."
 RAJ_deforestation: "Palivo pro oheň"
 RAJ_deforestation_desc: "Oheň pohání průmysl. Oheň potřebuje dřevo a uhlí — a toho máme dostatek. Proč toho tedy nevyužít?"
 RAJ_demand_return_of_imperialist_colonies: "Požadovat návrat imperialistických kolonií"
 RAJ_demand_return_of_imperialist_colonies_desc: "Nastal čas požadovat návrat všech imperialistických kolonií na subkontinentu, sjednotit všechny indické země pod jednou vlajkou a ukončit éru koloniálního zasahování."
 RAJ_demobilize: "Demobilizovat"
 RAJ_demobilize_desc: "Jednou z klíčových podmínek vlády je demobilizace armády, přičemž smí zůstat pouze kostra mírových sil. Obávají se snad, že by naše armáda mohla přerůst tu jejich?"
 RAJ_desert_training: "Výcvik v poušti"
 RAJ_desert_training_desc: "V rámci snahy zvýšit dovednosti a efektivitu našich ozbrojených sil můžeme zavést výcvikový režim v oblasti pouště Thár a jejím okolí. To pomůže našim jednotkám přizpůsobit se suchému prostředí."
 RAJ_destroyer_of_worlds: "Ničitel světů"
 RAJ_destroyer_of_worlds_desc: "Postupem času se z nás stane mocný ničitel světů, vychovaný zde k úplnému zničení našich nepřátel."
 RAJ_dominate_the_bay_of_bengal: "Ovládnout Bengálský záliv"
 RAJ_dominate_the_bay_of_bengal_desc: "Zajištění námořní nadvlády v Bengálském zálivu je klíčové pro naši námořní strategii. Rozšířením naší přítomnosti a projekcí síly v těchto vodách ochráníme obchodní trasy a prosadíme regionální dominanci."
 RAJ_douglas_dakota: "Douglas Dakota"
 RAJ_douglas_dakota_desc: "Máme naléhavou potřebu rychlé přepravy vojáků a materiálu. Dakota je pro tento úkol mimořádně schopným letounem."
 RAJ_east_india_railways_dlc: "Východoindické železnice"
 RAJ_east_india_railways_dlc_desc: "Rozšířením a modernizací Východoindických železnic můžeme posílit obchod, zlepšit propojení země a položit koleje pro prosperující a integrovaný stát."
 RAJ_eastern_pakistan: "Východní Pákistán"
 RAJ_eastern_pakistan_desc: "Bangladéš se změní na Východní Pákistán a všichni muslimové budou spravováni pod jednou vlajkou."
 RAJ_eastern_pakistan_tt: "§Y[PAK.GetName]§! bude vlastnit po rozdělení i §Y[BAN.GetName]§!"
 RAJ_eastern_shipyard_construction: "Výstavba východních loděnic"
 RAJ_eastern_shipyard_construction_desc: "Na podporu růstu moderního námořnictva rozšíříme loděnice na východním pobřeží. Tyto nové kapacity se stanou páteří našich námořních ambicí."
 RAJ_education_efforts: "Podpora vzdělávání"
 RAJ_education_efforts_2: "$RAJ_education_efforts$"
 RAJ_education_efforts_2_desc: "$RAJ_education_efforts_desc$"
 RAJ_education_efforts_desc: "Míra gramotnosti v zemi je stále nedostatečná. Musíme výrazně navýšit výdaje na vzdělávání, abychom dohnali velmoci."
 RAJ_education_for_the_masses: "Vzdělání pro masy"
 RAJ_education_for_the_masses_desc: "Bez znalostí se revoluce zvrhne v tyranii.\nGramotnost, politické vzdělávání a vědecká příprava musí dorazit do každé vesnice i továrny."
 RAJ_eic_shortcut: "Východoindická společnost"
 RAJ_elephants_for_the_modern_age: "Sloni pro moderní dobu"
 RAJ_elephants_for_the_modern_age_desc: "Mocní váleční sloni Mughalské říše kdysi ovládali bojiště. Nyní jejich odkaz přizpůsobíme moderní době investicemi do obrněných vozidel a mechanizovaných sil, čímž vytvoříme nezastavitelné válečné stroje, které dovedou naši říši k vítězství."
 RAJ_empower_provincial_authorities: "Posílit provinční autority"
 RAJ_empower_provincial_authorities_chances_tt: "§Y$RAJ_investments_from_local_leaders$§! se rozdělí rovnoměrně mezi §YCivilní průmysl§!, §YVojenský průmysl§! a §YObrannou infrastrukturu§!."
 RAJ_empower_provincial_authorities_desc: "Namísto dvoření se soukromým zájmům posílíme správní pravomoci místních autorit, aby samy řídily rozvoj. Svěřením investičních rozhodnutí provinční správě odměníme loajalitu odpovědností."
 RAJ_engineering_revolution: "Inženýrská revoluce"
 RAJ_engineering_revolution_desc: "Pokrok Indie vyžaduje inženýrskou revoluci. Investicemi do infrastruktury, průmyslu a špičkových technologií můžeme proměnit národ v mocnost schopnou vést jak v míru, tak ve válce."
 RAJ_enrollment_of_dali_children: "Zápis dětí dalitů"
 RAJ_enrollment_of_dali_children_desc: "Dalité, takzvaní „nedotknutelní“, nejnižší vrstva kastovního systému, žijí v trvalé chudobě. Tento systém, skvrna na našem národě, lze začít bourat zápisem jejich dětí do škol."
 RAJ_establish_the_reserve_bank_of_india: "Založit Rezervní banku Indie"
 RAJ_establish_the_reserve_bank_of_india_desc: "Abychom ochránili naši ekonomiku před otřesy, založíme rezervní banku s mandátem řídit měnovou politiku."
 RAJ_every_man_a_gun: "Každý muž se zbraní"
 RAJ_every_man_a_gun_desc: "V Lidové republice je každý občan vojákem.\nZavedeme jednotný výcvik a hromadně vyzbrojíme obyvatelstvo, čímž se celý národ promění v pevnost."
 RAJ_every_man_a_leader: "Každý muž vůdcem"
 RAJ_every_man_a_leader_desc: "Skutečná revoluční síla nevychází z rozkazů, ale z iniciativy.\nVyškolíme místní velitele a vůdce milicí, aby jednali rozhodně bez čekání na povolení."
 RAJ_exile_princes: "Vyhostit knížata"
 RAJ_exile_princes_desc: "Éra knížecí vlády skončila. Abychom zajistili skutečnou národní jednotu, odstraníme tyto zbytky feudální moci a pošleme je daleko od jejich paláců i lidu, kterému kdysi vládli."
 RAJ_exiled_princes_flag: "Vyhostil knížata"
 RAJ_expand_healthcare_facilities: "Rozšířit zdravotnická zařízení"
 RAJ_expand_healthcare_facilities_desc: "Pokud v něčem [GetRajName] žalostně zaostává, je to zdravotnictví. Úplavice, cholera a malárie pustoší venkov a brzdí růst. Rozšíření místních zdravotnických zařízení tomu pomůže čelit."
 RAJ_expand_industry_in_hyderabad: "Rozšířit průmysl v Hajdarábádu"
 RAJ_expand_industry_in_hyderabad_desc: "Rozšíření továren v Hajdarábádu výrazně zvýší naši průmyslovou kapacitu bez nutnosti velkých investic."
 RAJ_expand_mazagon_dock_dlc: "$RAJ_expand_mazagon_dock$"
 RAJ_expand_mazagon_dock_dlc_desc: "$RAJ_expand_mazagon_dock_desc$"
 RAJ_expand_tax_loopholes: "Rozšířit daňové kličky"
 RAJ_expand_tax_loopholes_desc: "Využitím mezer v daňovém zákoníku můžeme legálně minimalizovat své povinnosti a ušetřené prostředky znovu investovat do další expanze. Efektivita koneckonců začíná v účetnictví."
 RAJ_expand_the_zamindari_system: "Rozšířit zamindárský systém"
 RAJ_expand_the_zamindari_system_desc: "Zamindárský systém dlouhodobě poskytuje spolehlivý rámec pro správu venkova a výběr daní. Rozšířením jeho působnosti a potvrzením privilegií loajálních statkářů zajistíme místní pořádek a správní efektivitu bez přetížení centrálního státu."
 RAJ_exploit_the_frontier: "Využít pohraničí"
 RAJ_exploit_the_frontier_decisions_tt: "umožní rozvoj těžby surovin v naší zemi a žádosti o těžební práva v Barmě."
 RAJ_exploit_the_frontier_desc: "V odlehlých a málo využívaných oblastech subkontinentu i za jeho hranicemi leží rozsáhlá naleziště surovin. Rozšířením operací a posílením kontroly nad územími, jako je [BRM.GetNonIdeologyName], zajistíme klíčové materiály, například wolfram, a pohon pro náš válečný stroj."
 RAJ_extend_indian_security_zone: "Rozšířit bezpečnostní zónu [GetRajName]"
 RAJ_extend_indian_security_zone_desc: "Rozšíření naší bezpečnostní zóny ochrání indické hranice a umožní projekci síly v regionu. Posílením vlivu zajistíme stabilitu a ochranu nutnou pro bezpečný a suverénní stát."
 RAJ_extended_franchise: "Rozšířená práva"
 RAJ_extended_franchise_desc: "Rozšíření práv běžných [GetRajAdjective] občanů je klíčovým krokem k oslabení [ENG.GetAdjective] kontroly nad zemí."
 RAJ_famine_impact_reduction: "§YTímto se sníží dopad hladomoru, pokud nastane§!"
 RAJ_favor_the_muslim_league: "Upřednostnit Muslimskou ligu"
 RAJ_favor_the_muslim_league_desc: "Poskytnutím většího uznání a politické podpory Muslimské lize si vypěstujeme loajální protiváhu k dominantnímu nacionalistickému hnutí. Její posílení zavede užitečné třenice mezi těmi, kdo chtějí mluvit za celou Indii. V jednotě je síla, v rozdělení zvládnutelná politika."
 RAJ_fight_malnutrition: "Boj proti podvýživě"
 RAJ_fight_malnutrition_desc: "Musíme zavést rozsáhlé plány na boj s podvýživou mezi obyvatelstvem."
 RAJ_five_year_plan: "Pětiletý plán"
 RAJ_five_year_plan_desc: "Každý komunistický stát potřebuje pětiletý plán! Musíme začít vytvářet ten náš, aby mohl [RAJ.GetAdjective] průmysl vzkvétat!"
 RAJ_five_year_plan_flag: "Dokončil zaměření §Y$RAJ_five_year_plan$§!"
 RAJ_five_year_plan_modify_tt: "Upravuje §Y$RAJ_five_year_plan$§! o:"
 RAJ_five_year_plan_tt: "Dokončení buď §Y$RAJ_agrarian_socialism$§!, nebo §Y$RAJ_urban_industrialism$§! změní $$RAJ_five_year_plan$$"
 RAJ_five_year_plan_when_removed_tt: "Aktuální počet dní: [?RAJ_five_year_plan_flag:days|Y0]"
 RAJ_focus_on_military_industry: "Zaměřit se na vojenský průmysl"
 RAJ_focus_on_military_industry_desc: "Musíme upřednostnit bezpečnost země nade vše a rozšířit armádu, abychom zajistili své přežití."
 RAJ_focus_on_the_countryside: "Zaměřit se na venkov"
 RAJ_focus_on_the_countryside_desc: "Naše síla spočívá v milionech lidí, kteří nazývají půdu svým domovem.\nInvestujme do nich, vyzbrojme je a zorganizujme - revoluce patří vesnicím."
 RAJ_for_the_people_by_the_people: "Pro lid, lidem"
 RAJ_for_the_people_by_the_people_desc: "Zaměříme se na posílení pěchoty, dělostřelectva a podpůrných jednotek, abychom vybudovali armádu skutečně zakořeněnou ve vůli lidu."
 RAJ_force_china_to_accept_opium_trade: "Třetí opiová válka"
 RAJ_force_china_to_accept_opium_trade_desc: "[CHI.GetName] se pokusila regulovat obchod s opiem, čímž se dostala do přímého rozporu s našimi cíli růstu. Musíme zajistit, aby pochopila svou chybu."
 RAJ_force_china_to_accept_opium_trade_tt: "Vznikne celosvětový trh s opiem. Někteří generálové si to možná až příliš oblíbí..."
 RAJ_forging_the_mughal_arsenal: "Znovuvybudování mughalského arzenálu"
 RAJ_forging_the_mughal_arsenal_desc: "Války minulosti se vyhrávaly klacky a kameny, ty časy jsou pryč. Má-li naše říše obstát proti moderním velmocím, musíme vybudovat průmyslovou základnu schopnou udržet obrovský válečný stroj. Montážní linky se rozezní hukotem průmyslu a brzy naše armády pochodují se zbraněmi z vlastních továren."
 RAJ_form_a_federal_court: "Zřídit federální soud"
 RAJ_form_a_federal_court_desc: "Každá forma demokracie potřebuje federální soud k zajištění vlády práva. Musíme zajistit, abychom byli souzeni svými vrstevníky, nikoli [ENG.GetAdjective] právníky."
 RAJ_form_a_police_force: "Zřídit bezpečnostní sbor"
 RAJ_form_a_police_force_desc: "Ačkoli nám omezení brání udržovat formální armádu, máme povolení vytvořit a vybavit bezpečnostní sbor pod záminkou policie. Jde o zásadní krok k ochraně našich zájmů."
 RAJ_form_ties_with_leftist_parties: "Navázat vazby s levicovými stranami"
 RAJ_form_ties_with_leftist_parties_desc: "Musíme získat podporu socialistů a komunistů v zemi."
 RAJ_forming_an_indian_doctrine: "Formování indické doktríny"
 RAJ_forming_an_indian_doctrine_desc: "Nastal čas razit vlastní cestu. Vytvoříme indickou doktrínu, která odráží naše jedinečné silné stránky a ambice."
 RAJ_fortify_aden: "Opevnit Aden"
 RAJ_fortify_aden_desc: "Aden se stal důležitým přístavem a musí být posílen proti možným útokům."
 RAJ_fortify_el_alamein: "Opevnit El-Alamein"
 RAJ_fortify_el_alamein_desc: "El-Alamein má zásadní strategický význam při držení Egypta. Koruna ocení naše úsilí při opevnění tohoto regionu a zabránění nepříteli získat oporu v [ENG.GetAdjective] severní Africe."
 RAJ_forward_bloc: "Forward Bloc"
 RAJ_forward_bloc_desc: "Forward Bloc představuje odvážnou vizi budoucnosti Indie - odmítá kompromisy a přijímá revoluční akci. Sjednocením všech protiimperialistických sil můžeme urychlit boj za úplnou nezávislost a položit základy silnější, radikálnější Indie."
 RAJ_found_scindia_shipyard_dlc: "$RAJ_found_scindia_shipyard$"
 RAJ_found_scindia_shipyard_dlc_desc: "$RAJ_found_scindia_shipyard_desc$"
 RAJ_founding_of_the_peoples_republic: "Vznik Lidové republiky"
 RAJ_founding_of_the_peoples_republic_desc: "Svrhli jsme starý řád.\nNyní začíná úkol vybudovat nový - vytvořený lidem, pro lid a udržovaný revolucí."
 RAJ_free_abyssinia: "Osvobodit Habeš"
 RAJ_free_abyssinia_desc: "Příliš dlouho jsme nechávali Habeš v rukou nepřítele. Prokážeme koruně svou hodnotu mohutnou námořní invazí do Afrického rohu přes Aden a osvobodíme její lid od okupantů."
 RAJ_freedom_of_the_press: "Svoboda tisku"
 RAJ_freedom_of_the_press_desc: "Svoboda tisku je nezbytná pro každou vznikající demokracii. Bez ní je autoritářství hned za rohem."
 RAJ_frontier_corps: "Pohraniční sbor"
 RAJ_frontier_corps_desc: "Naše země se skládá z několika biomů, včetně drsného pohraničí na východě. Navázáním kontaktu s místními milicemi a využitím jejich znalostí boje v náročném prostředí získáme významnou výhodu."
 RAJ_funnel_british_investments_into_princely_states: "Britské investice do knížecích států"
 RAJ_funnel_british_investments_into_princely_states_desc: "Koruna nařídila, že každá investice do společnosti musí být utracena v Indii - ale neuvedla, že musí být utracena přímo ve společnosti."
 RAJ_funnel_british_investments_into_princely_states_tt: "Každý subjekt na indickém subkontinentu obdrží §G1§! §YCivilní továrnu§! a §G3§! stavební sloty.\nDosud neuvolněné subjekty obdrží bonus po svém vzniku."
 RAJ_give_me_blood_and_i_will_grant_you_freedom: "Dejte mi krev a já vám dám svobodu"
 RAJ_give_me_blood_and_i_will_grant_you_freedom_desc: "Cesta k nezávislosti je dlážděna bojem a oběťmi. Svoláním odvážných k boji za naši věc můžeme inspirovat hnutí dostatečně silné, aby zlomilo řetězy koloniální nadvlády. Vítězství připadne těm, kteří jsou ochotni zaplatit jeho cenu."
 RAJ_give_me_blood_and_i_will_grant_you_freedom_tt: "Spustí občanskou válku za nezávislost mezi demokratickými stoupenci a námi.\nKaždý stát, který má více než §Y65 %§! nebo §Y85 % odboje§!, se během občanské války přidá k nám a poskytne nám podle výše odboje 1 nebo 2 divize.\nVšechny ostatní státy se přidají na demokratickou stranu."
 RAJ_give_sikkim_administrative_rights_for_bhutan: "Udělit Sikkimu správní práva pro Bhútán"
 RAJ_go_into_hiding: "Přejít do ilegality"
 RAJ_go_into_hiding_desc: "Subháš Čandra Bós musí uniknout britskému dohledu, aby mohl pokračovat v boji za nezávislost. Přechodem do ilegality zajistí, že vedení hnutí zůstane nedotčeno a připravené udeřit ve správný okamžik."
 RAJ_go_into_hiding_tt: "Bós unikne zajetí a zahájí svou cestu; vrátí se po vypuknutí občanské války."
 RAJ_great_depression_price_controls: "Cenové regulace během Velké hospodářské krize"
 RAJ_great_depression_price_controls_desc: "Velká hospodářská krize tvrdě zasáhla subkontinent. Navázáním rupie na libru a zavedením různých cenových regulací se pokusíme situaci stabilizovat."
 RAJ_great_indian_peninsula_railway_dlc: "Velká indická poloostrovní železnice"
 RAJ_great_indian_peninsula_railway_dlc_desc: "Velká indická poloostrovní železnice je klíčem k odemčení hospodářského potenciálu střední a jižní Indie. Rozšíření této sítě posílí obchod, podpoří průmysl a zajistí plynulé propojení celého subkontinentu."
 RAJ_ground_pounder: "Blízká letecká podpora"
 RAJ_ground_pounder_desc: "Náročný terén Indie ztěžuje rychlý pohyb tanků. Blízká letecká podpora bude klíčová pro kompenzaci nedostatku těžké pozemní podpory."
 RAJ_guarantee_nepalese_independence: "Garantovat nezávislost Nepálu"
 RAJ_guarantee_nepalese_independence_desc: "Suverenita Nepálu je symbolem odolnosti vůči imperiální nadvládě. Zaručením jeho nezávislosti zajistíme bezpečnost Himálaje a získáme silného spojence v boji proti zahraničnímu vlivu v regionu."
 RAJ_guided_democracy: "Řízená demokracie"
 RAJ_guided_democracy_desc: "Pečlivě řízený demokratický proces vytvoří zdání volby, zatímco výsledky zůstanou pevně pod naší kontrolou. Stabilita vyžaduje vedení a my jsme připraveni jej poskytnout."
 RAJ_gun_and_shell_factory_cossipore: "Továrna na zbraně a munici"
 RAJ_gun_and_shell_factory_cossipore_desc: "Továrna v Cossipore dále zvýší naše schopnosti ve výrobě pěchotní výzbroje a zároveň zajistí dostatek munice pro naše jednotky."
 RAJ_gurkhas: "Gurkhové"
 RAJ_gurkhas_desc: "Gurkhové, proslulí svou odvahou a houževnatostí, jsou elitní silou bez konkurence v boji. Rozšířením jejich role a zajištěním jejich oddanosti naší věci získáme klíčovou výhodu na bojišti."
 RAJ_halls_of_knowledge: "Síně vědění"
 RAJ_halls_of_knowledge_2: "Císařské akademie"
 RAJ_halls_of_knowledge_2_desc: "Vědění je klíčem k trvalé moci. Založením císařských akademií napříč Mughalskou říší vychováme učence, vědce a správce, kteří budou podporovat inovace, posilovat správu a zajistí odkaz moudrosti a pokroku."
 RAJ_halls_of_knowledge_3: "Studnice věčného poznání"
 RAJ_halls_of_knowledge_3_desc: "Poznání může vést do hluboké studny chaosu, kam se člověk neodvažuje vkročit, ale právě tam se musíme vydat."
 RAJ_halls_of_knowledge_desc: "Silný stát je postaven na základech vědění. Investicemi do výzkumu a vzdělávání podpoříme inovace, posílíme náš lid a zajistíme, že [ROOT.GetNameDef] bude mít místo mezi lídry ve vědě, průmyslu a pokroku."
 RAJ_halls_of_knowlege_3: "Knihovny říše"
 RAJ_halls_of_knowlege_3_desc: "Vzdělaná společnost je základem prosperující říše. Budováním velkolepých knihoven napříč Mughalskou říší zachováme starověké vědění, podpoříme inovace a inspirujeme budoucí generace k dosažení bezprecedentní velikosti."
 RAJ_hand_over_aden_to_the_crown: "Předat Aden koruně"
 RAJ_hand_over_aden_to_the_crown_desc: "Jak bylo plánováno, [ROOT.GetNameDef] předá svrchovanost nad Adenem britské koruně, čímž sníží administrativní zátěž."
 RAJ_handloom_weaving: "Ruční tkalcovství"
 RAJ_handloom_weaving_desc: "Ruční tkalcovství se stalo symbolem tradice a nezávislosti subkontinentu a zároveň poskytuje pracovní příležitosti místním výrobcům."
 RAJ_haripura_session_of_the_indian_national_congress: "Druhé zasedání v Haripuře"
 RAJ_haripura_session_of_the_indian_national_congress_desc: "S kapitalismem, který pohání globální napětí, nastal čas přetvořit svárádž v boj dělníků a rolníků. Druhé zasedání v Haripuře nás sjednotí pod revoluční vizí a odmítne imperialistická spojenectví."
 RAJ_headhunt_army_personell: "Přetáhnout armádní personál"
 RAJ_headhunt_army_personell_desc: "Existuje mnoho nezaměstnaných talentovaných jedinců z bývalé armády, kteří hledají práci. Můžeme jim nabídnout lepší podmínky než vláda."
 RAJ_heavy_industries: "Těžký průmysl"
 RAJ_heavy_industries_desc: "Rychlá industrializace je klíčová pro zajištění budoucnosti [RAJ.GetName]. Rozvojem silného těžkého průmyslu položíme základy vojenské síly a ekonomické nezávislosti v moderním světě."
 RAJ_hedgemony_of_the_subcontinent: "Hegemonie subkontinentu"
 RAJ_hedgemony_of_the_subcontinent_desc: "Dosáhli jsme průmyslové dominance na subkontinentu a odsunuli všechny ostatní, kteří by si mohli činit nárok na tuto pozici. Stali jsme se neotřesitelnými a ostatní státy jsme nechali daleko za sebou."
 RAJ_hedgemony_of_the_subcontinent_tt: "Všechny počáteční státy jsou vlastněny [ROOT.GetName]"
 RAJ_help_from_the_nagas: "Pomoc od Nágů"
 RAJ_help_from_the_nagas_desc: "Nágové, se svou dokonalou znalostí terénu a nepřekonatelnými partyzánskými schopnostmi, jsou neocenitelnými spojenci. Získáním jejich podpory posílíme naši pozici na severovýchodě a proměníme drsné kopce v pevnost odporu a síly."
 RAJ_hide_communist_infiltration: "$RAJ_royal_indian_navy_mutiny_tt2$"
 RAJ_high_altitude_training: "Výcvik ve vysokých nadmořských výškách"
 RAJ_high_altitude_training_desc: "Drsné vrcholy Himálaje vyžadují sílu a odolnost. Zavedením specializovaného výcviku ve vysokých nadmořských výškách připravíme naše jednotky na dominanci v extrémních podmínkách, zajistíme naše hranice a upevníme kontrolu nad strategickými horskými oblastmi."
 RAJ_high_altitude_training_tt: "Získá šablonu horské jednotky"
 RAJ_hill_training: "Výcvik v kopcovitém terénu"
 RAJ_hill_training_desc: "V rámci snahy rozšířit výcvik našich jednotek musíme zajistit, aby byly připraveny bojovat v horském terénu, stejně jako v džunglích, pouštích a městech."
 RAJ_hindi_as_a_national_language: "Hindština jako národní jazyk"
 RAJ_hindi_as_a_national_language_desc: "Přijetí hindštiny jako národního jazyka sjednotí Indii pod společnou kulturní identitou. Podporou jejího používání posílíme komunikaci, podpoříme národní hrdost a položíme základy soudržného a nezávislého státu."
 RAJ_hindu_mahasabha: "Progresivní hinduistické státy"
 RAJ_hindu_mahasabha_desc: "Všeindická hinduistická velká rada podporuje nezávislost knížecích států a označuje je za „základ hinduistické moci“. Umožněním jejich nezávislosti z nich můžeme získat více prostředků a upevnit zbytek země."
 RAJ_hindu_mahasabha_tt: "Uvolnění knížecího státu jako loutky zvýší bonus tohoto ducha o §G+4%§!, dokud zůstane vaší loutkou, až do maxima §Y32%§!."
 RAJ_hindutva: "Hindutva"
 RAJ_hindutva_desc: "Myšlenka Hindutvy usiluje o sjednocenou Indii založenou na kulturním a náboženském dědictví. Podporou této ideologie chceme vytvořit národní identitu, která posílí jednotu a připraví Indii na prosazení se na světové scéně."
 RAJ_his_majestys_loyal_government: "Loajální vláda Jeho Veličenstva"
 RAJ_his_majestys_loyal_government_break_free_tt: "Pro úplné osamostatnění musíme dokončit všechna tři závěrečná zaměření: §Y$RAJ_the_dominion_of_india$§!, §Y$RAJ_keep_calm_and_carry_on$§! a §Y$RAJ_holding_the_gates_of_india$§!."
 RAJ_his_majestys_loyal_government_desc: "Ačkoli se výzvy k nezávislosti ozývají stále hlasitěji, [ROOT.GetAdjective] aparát zůstává pevný. Spravováni místokrálem Jeho Veličenstva budeme nadále disciplinovaně prosazovat zájmy Koruny."
 RAJ_holding_the_gates_of_india: "Držet brány Indie"
 RAJ_holding_the_gates_of_india_desc: "Ať se stane cokoli, [RAJ.GetNonIdeologyName] musí odolat před dravými vetřelci z východu. U bran [RAJ.GetNonIdeologyName] je zastavíme. Neprojdou."
 RAJ_hostile_takeover: "Nepřátelské převzetí"
 RAJ_hostile_takeover_desc: "Všechno se dá koupit. Je to jen otázka ceny a toho, jak hluboko je kdo ochoten klesnout."
 RAJ_hostile_takeover_tt: "Odemkne rozhodnutí kupovat státy za §YCivilní továrny§!. Státy, se kterými začínáme, mají při nákupu slevu."
 RAJ_i_am_death: "Já jsem smrt"
 RAJ_i_am_death_desc: "Náš vůdce se po pokusu o atentát ponořil do hlubokého transu. Uvědomil si, že pokud nelze krutost lidstva zastavit, musí být lidstvo pod jeho pevným demokratickým vedením."
 RAJ_ignite_the_sino_indian_war: "Zažehnout čínsko-indickou válku"
 RAJ_ignite_the_sino_indian_war_desc: "Doutnající napětí s Čínou kvůli hraničním sporům už nelze ignorovat. Rozhodným krokem prosadíme svou převahu v Himálaji."
 RAJ_imperial_industry_initiative: "Imperiální průmyslová iniciativa"
 RAJ_imperial_industry_initiative_desc: "Abychom zajistili postavení [ROOT.GetNonIdeologyName] jako pilíře říše, musíme se zavázat k rozsáhlému rozvoji městského průmyslu. Imperiální průmyslová iniciativa nasměruje zdroje do těžkého průmyslu a kvalifikované pracovní síly, čímž zajistí, že naše města se stanou motorem odolnosti a obnovy na subkontinentu."
 RAJ_imperial_rail_renewal_act: "Zákon o obnově imperiálních železnic"
 RAJ_imperial_rail_renewal_act_desc: "Abychom zajistili rychlý přesun zboží, jednotek a zásob napříč subkontinentem, investujeme do komplexní modernizace železniční infrastruktury [ROOT.GetNonIdeologyName]. Zákon o obnově imperiálních železnic zmodernizuje zastaralé tratě, rozšíří logistické kapacity a propojí naše rozsáhlá území ocelí a párou."
 RAJ_imperial_rail_renewal_act_tt: "Přidá §G1§! §Y$industrial_complex$§! za každé dokončené železniční zaměření v průmyslové větvi."
 RAJ_import_substitution_industrialisation: "Industrializace nahrazující dovoz"
 RAJ_import_substitution_industrialisation_desc: "Kdekoliv je to možné, měli bychom nahrazovat dovážené zboží domácí produkcí tím, že vyrovnáme náklady na jeho výrobu."
 RAJ_inclusive_nationalism: "Inkluzivní nacionalismus"
 RAJ_inclusive_nationalism_desc: "Nacionalismus a hrdost na vlastní zemi nemusí být nutně špatné, pokud je dokážeme formovat tak, aby byly inkluzivní pro všechny. Jednota vydrží, pokud budeme sdílet stejnou lásku k naší zemi."
 RAJ_incorporation_of_the_east_india_company: "Nová Východoindická společnost"
 RAJ_incorporation_of_the_east_india_company_desc: "Po otřesu způsobeném velkou hospodářskou krizí a stále hlasitějších výzvách k nezávislosti je zřejmé, že [ENG.GetAdjective] koruna již nedokáže nést břemeno správy Indie. Může to vést k dočasné nestabilitě, ale současný stav je neudržitelný."
 RAJ_incorporation_of_the_east_india_company_tt: "§YRádž§! bude rozdělen mezi §YVýchodoindickou společnost§! a zbytky §YIndie§!."
 RAJ_increase_funding_for_the_GRSE: "Zvýšit financování GRSE"
 RAJ_increase_funding_for_the_GRSE_desc: "Zvýšíme státní financování GRSE, abychom umožnili výstavbu nových loděnic."
 RAJ_india_indivisible: "Indie nedělitelná"
 RAJ_india_indivisible_desc: "Naše území je stále plné napětí a konfliktů. Musíme spolupracovat, aby se [ROOT.GetName] stala celistvou."
 RAJ_india_indivisible_tt: "Odemkne rozhodnutí vytvořit domovské území v §Yindických§!, §Ypákistánských§! a §Ybangladéšských§! státech"
 RAJ_india_united: "Indie sjednocená"
 RAJ_india_united_desc: "Jsme muslimové, hinduisté, křesťané i židé; my všichni jsme Indie."
 RAJ_india_united_tt: "§YIndie zůstane během rozdělení sjednocená a nerozdělí se§!"
 RAJ_indian_air_force: "[ROOT.GetAdjectiveCap] letectvo"
 RAJ_indian_air_force_desc: "Obloha je novou frontou moderní války. Vybudováním silného a nezávislého [ROOT.GetAdjective] letectva zajistíme naši suverenitu, ovládneme vzdušný prostor a připravíme se na výzvy budoucích konfliktů."
 RAJ_indian_army_corps_of_engineers: "Sbor ženistů [ROOT.GetAdjective] armády"
 RAJ_indian_army_corps_of_engineers_desc: "Od opevnění po mosty - sbor ženistů [ROOT.GetAdjective] armády je klíčový pro úspěch operací. Rozšířením a vybavením této důležité složky zajistíme, že naše síly překonají jakoukoli překážku a otevřou si cestu k vítězství na všech frontách."
 RAJ_indian_cruiser_development: "Vývoj [ROOT.GetAdjective] křižníků"
 RAJ_indian_cruiser_development_desc: "Nastal čas vydat se vlastní námořní cestou. Vývojem domácích křižníků potvrdíme naši průmyslovou nezávislost a položíme základy moderního [ROOT.GetAdjective] loďstva."
 RAJ_indian_gentleman_officers: "Indičtí důstojníci z vyšší společnosti"
 RAJ_indian_gentleman_officers_desc: "Abychom zajistili budoucnost a bezpečnost našeho velkého imperiálního klenotu, je nezbytné získat loajální muže pro vedení nové [RAJ.GetAdjective] armády. Tito muži díky úzké spolupráci s imperiálními úřady prokázali svou oddanost zemi a mohou být jmenováni našimi nejdůvěryhodnějšími veliteli."
 RAJ_indian_independence_act: "Zákon o nezávislosti Indie"
 RAJ_indian_independence_act_desc: "Někdy přichází okamžik, který se v historii objevuje jen zřídka - kdy přecházíme ze starého do nového, kdy jedna éra končí a duše národa, dlouho potlačovaná, konečně promlouvá."
 RAJ_indian_legion: "Indická legie"
 RAJ_indian_legion_desc: "Indická legie složená z indických exulantů, které kontroluje [GER.GetName], prošla rozsáhlým výcvikem v pouštním boji. Jejich zkušenosti můžeme využít ke zlepšení našich vlastních jednotek."
 RAJ_indian_marine_corps: "[ROOT.GetAdjectiveCap] námořní pěchota"
 RAJ_indian_marine_corps_desc: "Založíme specializovaný sbor námořní pěchoty, vycvičený pro obojživelné operace a speciální útoky."
 RAJ_indian_national_highways: "Indické národní silnice"
 RAJ_indian_national_highways_desc: "Abychom rozvinuli [RAJ.GetAdjectiveCap] průmysl, musíme začít od základů - našich zásobovacích tras."
 RAJ_indian_prosperity_sphere: "Indická sféra prosperity"
 RAJ_indian_socialism: "Indický socialismus"
 RAJ_indian_socialism_desc: "Namísto inspirace u velkých socialistických mocností si [RAJ.GetNameDefCap] vytvoří vlastní socialistickou doktrínu."
 RAJ_indian_states_force: "Síly indických států"
 RAJ_indian_states_force_desc: "Knížecí státy mají vlastní ozbrojené síly, které lze povolat k obraně [GetRajName]."
 RAJ_indian_territorial_force: "[ROOT.GetAdjectiveCap] teritoriální síly"
 RAJ_indian_territorial_force_desc: "[ROOT.GetAdjectiveCap] teritoriální síly poskytnou důležitou rezervu vycvičených občanů připravených bránit vlast."
 RAJ_indianize_the_army: "Indizace armády"
 RAJ_indianize_the_army_desc: "Nastal čas nahradit koloniální vliv indickým velením v ozbrojených silách. Povýšením indických důstojníků a reorganizací armády vybudujeme vojsko, které skutečně reprezentuje a slouží národu."
 RAJ_indo_centric_curriculum: "Indocentrické osnovy"
 RAJ_indo_centric_curriculum_desc: "[GetRajName] má své vzdělávání dlouho postaveno na [ENG.GetAdjective] světonázoru, co oslabuje naši identitu a redukuje naši historii na příběh podřízenosti. Musíme založit vzdělávací systém na vlastní identitě a učit děti naši historii."
 RAJ_industrialize_the_ganges: "Industrializovat Gangu"
 RAJ_industrialize_the_ganges_desc: "Ganga nás po staletí živila.\nNyní bude pohánět naše stroje, živit naše pece a vyzbrojovat naše armády."
 RAJ_infiltrate_aden: "Infiltrace Adenu"
 RAJ_infiltrate_aden_desc: "Aden, strategické předmostí britské moci, je klíčem k narušení jejich kontroly v regionu. Infiltrací a organizováním místního odboje můžeme rozpoutat povstání a oslabit britský vliv právě ve chvíli, kdy začne náš boj za nezávislost."
 RAJ_infiltrate_aden_tt: "Po zahájení války za nezávislost povstane domobrana v §Y[659.GetName]§!, §Y[906.GetName]§!, §Y[658.GetName]§!, §Y[765.GetName]§!, §Y[422.GetName]§! a §Y[656.GetName]§! a zaútočí na državy, které vlastní [ENG. GetName]."
 RAJ_institute_of_fundamental_research_GOE: "Institut základního výzkumu"
 RAJ_institute_of_fundamental_research_GOE_desc: "S podporou předních průmyslníků a vědeckých kapacit založíme Institut základního výzkumu, který se zaměří na pokročilé teoretické studie. Institut se stane centrem špičkového výzkumu, včetně studia atomové energie."
 RAJ_institutional_money_laundering: "Institucionální praní peněz"
 RAJ_institutional_money_laundering_desc: "Investoři přece nepotřebují vědět, kam peníze skutečně směřují, že? Není naším cílem, ba až povinností, maximalizovat zisky za každou cenu? Co na tom, že to zahrnuje trochu podvodu? Nebudou o tom mít ani tušení."
 RAJ_institutional_money_laundering_tt: ""
 RAJ_integrate_the_princes2: "Podrobení knížecích států"
 RAJ_integrate_the_princes2_desc: "Systém polonezávislosti knížecích států není něco, co chceme zachovat. Knížecí státy budou jednou provždy plně začleněny do Indie."
 RAJ_integrate_the_princes: "Začlenit knížata"
 RAJ_integrate_the_princes_desc: "Nyní, když jsme knížata vyhnali a postupně je začleňujeme do Indie, je čas knížecí státy jednou provždy plně integrovat."
 RAJ_invite_soviet_industrial_experts: "Pozvat sovětské průmyslové odborníky"
 RAJ_invite_soviet_industrial_experts_desc: "Sověti mají zkušenosti s budováním průmyslové základny od nuly.\nPoučme se z jejich modelu a urychleme naši vlastní transformaci."
 RAJ_iron_will_indoctrination: "Indoktrinace železné vůle"
 RAJ_iron_will_indoctrination_desc: "Síla není jen v těle, je i v přesvědčení.\nVštípíme každému vojákovi absolutní disciplínu, ideologickou jasnost a nezlomnou vůli bojovat."
 RAJ_jaguar: "Jaguar"
 RAJ_jaguar_desc: "Jaguar je ideálním prostředkem k prosazení demokratické spravedlnosti z nebe."
 RAJ_join_the_co_prospherity_sphere: "Připojit se ke Sféře vzájemné prosperity"
 RAJ_join_the_co_prospherity_sphere_desc: "Japonsko je jedinou místní silou ochotnou postavit se západním imperialistům. Musíme se k nim připojit ve jménu vyššího cíle."
 RAJ_join_the_co_prospherity_sphere_tt: "(§Y[JAP.GetName]§!) obdrží událost „§Y[RAJ.GetNameDefCap] se chce připojit ke Sféře vzájemné prosperity§!“."
 RAJ_join_the_shadow_scheme: "Připojit se ke Stínovému plánu"
 RAJ_join_the_shadow_scheme_desc: "Zapojením do tajných operací můžeme rozšířit naše zpravodajské schopnosti a posílit naši strategickou pozici."
 RAJ_jugantar: "Jugantar"
 RAJ_jugantar_desc: "Duch Jugantaru se probouzí a šíří odpor po celé zemi. Můžeme toho využít k opětovnému získání Bengálska."
 RAJ_jugantar_tt: "Po vyhlášení války na [PAK.GetName] získáme divize v oblasti Bangladéše"
 RAJ_jungle_training_GOE: "Výcvik v džungli"
 RAJ_jungle_training_GOE_desc: "V tak rozlehlých zemích, jako jsou ty naše, máme k dispozici velkou rozmanitost biomů. [RAJ.GetNonIdeologyName], [BRM.GetNonIdeologyName] i Indočína jsou pokryty džunglí a speciální výcvik je nutný, aby byli naši vojáci v tomto nebezpečném prostředí efektivní."
 RAJ_just_good_business: "Prostě dobrý obchod"
 RAJ_just_good_business_desc: "Ve skutečnosti nemáme nic proti našim východním kolegům, jen disponují zdroji, které potřebujeme. Je to prostě dobrý obchod."
 RAJ_keep_british_generals: "Ponechat britské generály"
 RAJ_keep_british_generals_desc: "V těchto nejistých časech je zkušené vedení klíčové. Zachováním britských generálů zajistíme, že armáda bude těžit z jejich zkušeností a disciplíny, což udrží stabilitu a efektivitu na naší cestě k nezávislosti."
 RAJ_keep_british_generals_tt: "Ponecháme si všechny britské generály, i pokud nám [ENG.GetName] vyhlásí válku"
 RAJ_keep_calm_and_carry_on: "Zachovat klid a pokračovat"
 RAJ_keep_calm_and_carry_on_desc: "V této nejtěžší hodině nesmíme zakolísat. [ROOT.GetNameDefCap] povstane jako pevnost síly a s neúnavným odhodláním bude vytvářet nástroje války. Nechť pece hoří a kovárny znějí, neboť vítězství se nerodí z pohodlí, ale z odvahy, potu a oceli."
 RAJ_khadi_movement: "Hnutí Khadi"
 RAJ_khadi_movement_desc: "V rámci Svadéši se symbolem nezávislosti stalo khadi. Ručně předená látka je nejen symbolem odporu, ale zároveň poskytuje ekonomické příležitosti pro chudé a utlačované."
 RAJ_kingmaker: "Tvůrce králů"
 RAJ_kingmaker_desc: "Vysíláním dobrovolníků do zahraničních konfliktů rozšiřujeme náš vliv a získáváme cenné bojové zkušenosti. Tyto kroky nejen podporují naše spojence, ale také nás staví do role rozhodující síly ovlivňující výsledky globálních konfliktů."
 RAJ_lahore_resolution: "Lahórská rezoluce"
 RAJ_lahore_resolution_desc: "Muslimská menšina v zemi přijala Láhórskou rezoluci, která požaduje vytvoření vlastního státu - Pákistánu."
 RAJ_land_grab: "Získávání půdy"
 RAJ_land_grab_desc: "Abychom uspokojili požadavky rychlé industrializace, musíme získávat a přetvářet půdu napříč subkontinentem. Pokrok nesnese váhání."
 RAJ_land_of_the_tillers: "Země rolníků"
 RAJ_land_of_the_tillers_desc: "Statkáři zmizeli, ale boj pokračuje.\nPřerozdělíme půdu a zlomíme poslední okovy feudalismu - pole po poli, vesnici po vesnici."
 RAJ_land_reforms: "Pozemkové reformy"
 RAJ_land_reforms_desc: "Umožněním většímu počtu lidí využívat půdu, kterou mají, je vyvedeme z chudoby."
 RAJ_league_against_gandhism: "Liga proti gandhismu"
 RAJ_league_against_gandhism_desc: "Mahátmova politika nenásilí je obdivuhodná. Bohužel [ENG.GetNameDef] znovu a znovu ukázuje, že na protesty odpovídá střelbou. Proto je zapotřebí nová taktika, i kdyby měla být vykoupena krví."
 RAJ_league_against_gandhism_tt: "Události nepokojů při rozdělení nyní poskytnou §G5%§! válečné podpory, až do maxima §Y+50%§!."
 RAJ_league_against_gandhism_tt_event: "Přidá §G+5%§! válečné podpory díky podpoře §Y$RAJ_league_against_gandhism$§!"
 RAJ_learn_from_the_crown: "Učit se od Koruny"
 RAJ_learn_from_the_crown_desc: "Musíme se poučit z rozsáhlých vojenských zkušeností Koruny a převzít jejich osvědčené doktríny, abychom byli připraveni na nadcházející výzvy."
 RAJ_learn_from_the_secret_intelligence_service: "Učit se od tajné zpravodajské služby"
 RAJ_learn_from_the_secret_intelligence_service_desc: "Spoluprací s britskou tajnou zpravodajskou službou můžeme vybudovat silnou špionážní síť k ochraně našich zájmů."
 RAJ_legacy_of_military_service: "Tradice vojenské služby"
 RAJ_legacy_of_military_service_desc: "[GetRajName] má mnoho vesnic, ve kterých sloužili otcové v armádě, a proto jsou jejich synové nuceni následovat jejich příklad. Je to tradice a můžeme ji využít k získání více rekrutů než obvykle."
 RAJ_legacy_of_timur: "Odkaz Tímúra"
 RAJ_legacy_of_timur_desc: "Tímúrova říše nikdy neměla upadnout v zapomnění. Znovuzískáním našich předků a jejich sjednocením pod jednou vládou obnovíme tímúrovský odkaz a vytvoříme novou éru síly a ambicí. Svět se znovu bude třást před potomky Tímúra."
 RAJ_legalize_the_opium_trade: "Legalizovat obchod s opiem"
 RAJ_legalize_the_opium_trade_desc: "Ačkoli je to kontroverzní, legalizace opia slibuje obrovské ekonomické zisky. Regulací jeho obchodu můžeme tuto neřest proměnit v lukrativní pilíř naší ekonomické strategie."
 RAJ_linlithgows_declaration_of_war: "Linlithgowovo vyhlášení války"
 RAJ_linlithgows_declaration_of_war_current_effects_tt: "§Y[ROOT.GetNameWithFlag]§! vyhlásí válku všem současným nepřátelům svého suzeréna"
 RAJ_linlithgows_declaration_of_war_desc: "Jako součást [ENG.GetAdjective] impéria je naší povinností chopit se zbraní a připojit se k jejich válkám. Není čas ztrácet čas žádáním vůdců Kongresu o povolení. Je třeba jednat rozhodně. Připravte vyhlášení a připravte se na válku se všemi nepřáteli, které [ENG.GetNameDef] má."
 RAJ_linlithgows_declaration_of_war_tt: "§Y[ROOT.GetNameWithFlag]§! vyhlásí válku všem nepřátelům svého suzeréna (§Y[ENG.GetNameWithFlag]§!)."
 RAJ_lions_of_the_great_war_: "Lvi Velké války"
 RAJ_lions_of_the_great_war__desc: "Oběti indických vojáků ve Velké válce jsou důkazem jejich statečnosti. Připomenutím jejich odkazu uctíme jejich odvahu a inspirujeme novou generaci k následování jejich ducha v boji za osud Indie."
 RAJ_lions_of_the_great_war_dlc: "$RAJ_lions_of_the_great_war$"
 RAJ_lions_of_the_great_war_dlc_desc: "$RAJ_lions_of_the_great_war_desc$"
 RAJ_litteracy_effort: "Kampaň za gramotnost"
 RAJ_litteracy_effort_desc: "Nevzdělané obyvatelstvo je jako otevřená mysl - bez ochrany a obrany. Schopnost číst je základní dovednost každého člověka. Koneckonců, kdo by tratil na informovaném stádu, ne-li pastýř?"
 RAJ_lobby_for_increased_policing_responsibilities: "Lobovat za rozšíření policejních pravomocí"
 RAJ_lobby_for_increased_policing_responsibilities_desc: "Svět už není tak klidným místem jako dříve. Rostoucí napětí doma i v zahraničí nám dává větší prostor chránit majetek společnosti. Budeme lobovat za zvýšení výdajů na soukromé vojenské společnosti. Vláda to jistě pochopí, a pokud ne, každý má svou cenu."
 RAJ_lobby_parliment: "Lobovat v parlamentu"
 RAJ_lobby_parliment_desc: "S podporou soukromých investorů budeme v parlamentu prosazovat privatizaci jako jedinou účinnou ochranu před další globální ekonomickou krizí. Prodej částí Ráje není jen strategií, ale zajištěním stability pro celé impérium."
 RAJ_lobby_parliment_tt: "Začneme formovat Východoindickou společnost"
 RAJ_local_recruitment_offices: "Místní náborové kanceláře"
 RAJ_local_recruitment_offices_desc: "Máme velkou populaci a mnoho lidí by se rádo dobrovolně přihlásilo do armády jako způsob, jak zlepšit svou ekonomickou situaci, aniž bychom museli vyhlašovat všeobecnou mobilizaci. Zřízením náborových kanceláří získáme dostatek dobrovolníků."
 RAJ_local_recruitment_offices_tt: "Každý [?RAJ_recruitment_offices_timeout_max]. měsíc sníží postih §Y$idea_RAJ_agrarian_society$§! o\n\t Faktor rekrutovatelné populace: §G+[?RAJ_agrarian_society_conscription_factor_penalty_reduction_display] %§!\n\t Rychlost mobilizace: §G[?RAJ_agrarian_society_mobilization_speed_penalty_reduction_display] %§!\n\t Faktor ceny mobilizačních zákonů: §G[?RAJ_agrarian_society_mobilization_laws_cost_factor_penalty_reduction_display] %§!"
 RAJ_local_resistance_to_land_taxes: "Místní odpor proti pozemkovým daním"
 RAJ_local_resistance_to_land_taxes_desc: "Vláda v Dillí je z velké části financována z místních daní. Pokud podnítíme odpor proti jejich placení, ochromíme vládu a zároveň ponecháme větší část bohatství jejím poddaným."
 RAJ_long_range_escorts: "Dálkové doprovodné letadla"
 RAJ_long_range_escorts_desc: "K ochraně životně důležitých zásobovacích tras a misí potřebujeme letadla schopné doprovázet bombardéry a transportní stroje na velké vzdálenosti. Investice do dálkových doprovodů zajistí naši vzdušnou převahu a bezpečnost operací daleko za našimi hranicemi."
 RAJ_look_to_the_future: "Hledět do budoucnosti"
 RAJ_look_to_the_future_desc: "Abychom zvládli tento cenový chaos, musíme se dívat dopředu, ne zpět. Je nutné okamžitě zavést rozsáhlá stabilizační opatření."
 RAJ_look_to_the_past: "Hledět do minulosti"
 RAJ_look_to_the_past_desc: "Cenové regulace úspěšně zmírnily dopady velké hospodářské krize, avšak nyní způsobují zmatek v ekonomice, protože inflace se vymyká kontrole. Zoufalství vede k nespokojenosti a místní vůdci získávají politickou sílu tím, že burcují obyvatelstvo příběhy o dávné slávě.\nMůže se to, co kdysi bylo, znovu zrodit?"
 RAJ_lowest_bigger_construction: "Levná výstavba"
 RAJ_lowest_bigger_construction_desc: "Měli bychom vždy volit nejnižší nabídku, abychom minimalizovali náklady na výstavbu."
 RAJ_loyalist_branch_capstone_focuses_become_free_tt: "Dokončení všech tří vrcholných zaměření §Y$RAJ_the_dominion_of_india$§!, §Y$RAJ_keep_calm_and_carry_on$§! a §Y$RAJ_holding_the_gates_of_india$§! §Godstraní omezení změny úrovně autonomie na§! §YNezávislý§!."
 RAJ_madras_ship_repair_factories: "Opravárenské loděnice v Madrásu"
 RAJ_madras_ship_repair_factories_desc: "Madrás bude rozvinut jako klíčové námořní podpůrné centrum s vyhrazenými opravárenskými zařízeními pro údržbu a modernizaci naší rostoucí flotily, čímž zajistíme operační připravenost na východním pobřeží."
 RAJ_mahatma: "Mahátma"
 RAJ_mahatma_desc: "Mahátma Gándhí je bezpochyby tváří hnutí za nezávislost. Společně s Džaváharlálem Néhrúem zlomíme jho, které nás poutá k Británii."
 RAJ_majestys_government_shortcut: "Loajální vláda"
 RAJ_manipulate_army_statistics: "Manipulovat armádní statistiky"
 RAJ_manipulate_army_statistics_desc: "Koruna se obává, že naše soukromé vojenské společnosti příliš zesílí a mohly by ohrozit regulérní armádu. Existují však způsoby, jak zahlcovat vládní kontrolní orgány čísly a falešnými stopami."
 RAJ_manipulate_army_statistics_tt: "Vytvoří nepravidelné divize s plným personálem a vybavením."
 RAJ_mass_assault: "Masivní útok"
 RAJ_mass_production: "Masová výroba"
 RAJ_mass_production_desc: "Budeme pořizovat vybavení od soukromých podniků, které nabízejí nejnižší cenu. Snižování nákladů na výzbroj je klíčem k růstu."
 RAJ_mechanization_of_the_cavalry: "Mechanizace jízdy"
 RAJ_mechanization_of_the_cavalry_desc: "Éra jízdního boje skončila. Mechanizací jízdy ji proměníme v moderní obrněnou sílu, která kombinuje rychlost a palebnou sílu, aby ovládla bojiště a vedla Indii do budoucnosti válčení."
 RAJ_military_engineer_services: "Vojenské ženijní služby"
 RAJ_military_engineer_services_desc: "Vojenské ženijní služby tvoří páteř vojenské infrastruktury, od opevnění po zásobovací trasy. Posílením této klíčové složky zajistíme, že naše síly budou mít k dispozici silnice, základny a obranu potřebnou k vítězství v každém konfliktu."
 RAJ_military_pensions: "Vojenské penze"
 RAJ_military_pensions_desc: "Zavedení vojenských penzí jako součásti armádního systému posílí celý vojenský aparát tím, že udrží personál ve službě déle."
 RAJ_mineral_exploitation_institute: "Institut pro využití nerostů"
 RAJ_mineral_exploitation_institute_desc: "Nedávný rozvoj těžby nepřinesl očekávané výnosy. Zdá se, že musíme investovat do lepších geologických průzkumů, abychom přesněji odhadli potenciál našich přírodních zdrojů."
 RAJ_mixed_economy: "Smíšená ekonomika"
 RAJ_mixed_economy_desc: "Disponujeme množstvím přírodních zdrojů a diverzifikace do těžby nerostů posílí naši soběstačnost."
 RAJ_mixed_economy_tt: "Získá §G+3§! surovin za každou technologii §Ytěžby§! v každém domovském státě s více než 6 jednotkami surovin"
 RAJ_mobilization_of_the_indian_army: "Mobilizace indické armády"
 RAJ_mobilization_of_the_indian_army_desc: "Naše počty jsou velké a náš duch je posílen obranou naší slavné říše. I když potrvá, než shromáždíme síly ze všech koutů subkontinentu, je nezbytné zahájit mobilizaci [RAJ.GetAdjective] armády. Nastal čas povstat a bojovat za [RAJ.GetNameDef] a [ENG.GetNameDef]."
 RAJ_model_after_germany: "Německo jako vzor"
 RAJ_model_after_germany_desc: "Můžeme napodobit německé disciplinované a efektivní vojenské doktríny a přetvořit naše síly v moderní válečný stroj."
 RAJ_model_after_soviet: "Sovětský svaz jako vzor"
 RAJ_model_after_soviet_desc: "Důraz Sovětského svazu na masovou mobilizaci a revoluční taktiky nabízí předlohu pro náš vlastní vojenský rozvoj."
 RAJ_model_after_usa: "USA jako vzor"
 RAJ_model_after_usa_desc: "Studiem amerických vojenských strategií můžeme modernizovat naši armádu se zaměřením na flexibilitu a technologické inovace."
 RAJ_modernizing_navy_dlc: "Modernizace námořnictva"
 RAJ_modernizing_navy_dlc_desc: "Chceme-li se prosadit jako regionální mocnost, musíme modernizovat naše námořnictvo investicemi do pokročilých návrhů lodí, zlepšení infrastruktury a strategické doktríny, která nám umožní promítat vliv napříč asijskými moři."
 RAJ_modify_a_loyal_government_tt: "Upraví §Y$RAJ_a_loyal_government$§! o:"
 RAJ_modify_indian_railways_tt: "Upravuje $idea_RAJ_indian_railways$ o: "
 RAJ_modify_south_east_asia_command_dm_tt: "Upraví §Y$RAJ_south_east_asia_command_dm$§! o:"
 RAJ_mountain_guns: "Horská děla"
 RAJ_mountain_guns_desc: "Válčení ve vysokých nadmořských výškách vyžaduje přizpůsobivost. Horská děla, navržená pro drsný terén, poskytují klíčovou palebnou podporu jednotkám v nejtěžších podmínkách."
 RAJ_mountain_tanks: "Horské tanky"
 RAJ_mountain_tanks_desc: "Klasické tanky mají v členitém terénu potíže, ale specializované horské tanky nám dají převahu ve vysokohorském boji. Tyto obratné stroje ovládnou výšiny a zajistí strategické pozice."
 RAJ_mughal_court: "Mughalský dvůr"
 RAJ_mughal_court_desc: "Mughalský dvůr shromažďuje nejbystřejší mysli a nejvlivnější vůdce říše. Posílením těchto poradců upevníme impérium jejich radami a zajistíme, že každé rozhodnutí bude odrážet slávu a ambice naší vlády."
 RAJ_mughal_court_princely_states_tt: "Všichni knížata opustí své knížecí státy a vstoupí do Mughalské říše jako dostupní poradci nebo generálové."
 RAJ_mughal_court_tt: "Všechny knížecí státy obdrží národní duch:"
 RAJ_mughal_shortcut: "Politika:\nMughalové"
 RAJ_national_planning_committee: "Národní plánovací výbor"
 RAJ_national_planning_committee_desc: "Hospodářská soběstačnost je základem skutečné nezávislosti. Zřízením Národního plánovacího výboru můžeme vytyčit cestu industrializace, rozvoje venkova a spravedlivého růstu."
 RAJ_nationalize_british_owned_factories: "Znárodnit britské továrny"
 RAJ_nationalize_british_owned_factories_desc: "Továrny vybudované prací [RAJ.GetAdjective] obyvatel již nebudou sloužit cizím zájmům. Znárodněním [ENG.GetAdjective] průmyslu vrátíme kontrolu lidu a získáme zpět to, co nám bylo nespravedlivě odebráno."
 RAJ_nationalize_gun_carriage_agency: "Znárodnit Gun Carriage Agency"
 RAJ_nationalize_gun_carriage_agency_desc: "Gun Carriage Agency je jedním z našich hlavních zdrojů zbraní. Taková moc nemůže zůstat v rukou soukromé společnosti - musí být znárodněna."
 RAJ_nationalize_tata_group: "Znárodnit Skupinu Tata"
 RAJ_nationalize_tata_group_desc: "Musíme přestat být závislí na Skupině Tata pro fungování naší ekonomiky. Nastal čas převzít kontrolu a společnost znárodnit."
 RAJ_navy_shortcut: "Indické námořnictvo"
 RAJ_netaji: "Netádží"
 RAJ_netaji_desc: "Netádží $RAJ_subhas_chanda_bose$ zosobňuje ducha neúnavného odporu proti imperiální nadvládě. Jeho vize a vedení inspirují miliony k boji za suverénní Indii. Pod jeho vedením se sen o nezávislosti přibližuje realitě."
 RAJ_new_economic_policy: "Nová hospodářská politika"
 RAJ_new_economic_policy_desc: "Budeme se řídit modelem, který podporuje kapitálové investice a růst podniků prostřednictvím nízkých daní a vstřícných podmínek pro podnikání."
 RAJ_night_shifts: "Noční směny"
 RAJ_night_shifts_desc: "Zavedení nočních směn zvýší provozní kapacitu a urychlí výrobu. Dodatečné náklady jsou malou cenou za nepřetržitou efektivitu."
 RAJ_north_western_state_railway: "Severozápadní státní železnice"
 RAJ_north_western_state_railway_desc: "Severozápadní státní železnice je klíčová pro propojení indického vnitrozemí se strategickými pohraničními oblastmi. Rozšíření a modernizace této sítě posílí regionální obchod i naši přítomnost na důležitých hranicích."
 RAJ_nothing_personal: "Nic osobního"
 RAJ_nothing_personal_desc: "Koruna nám už příliš dlouho vnucuje svou vůli a dusí náš růst zastaralými opatřeními. Není to nic osobního, ale vláda nesmí být příčinou podprůměrného růstu."
 RAJ_nothing_personal_tt: "Vytvoří válečný cíl na §Y[ENG.GetNameDef]§! a §Yzemě Commonwealthu§!"
 RAJ_obtain_british_naval_contracts: "Získat britské námořní zakázky"
 RAJ_obtain_british_naval_contracts_desc: "Obrátíme se na [ENG.GetNameDefCap], abychom získali námořní stavební zakázky a využili jejich průmyslové kapacity k posílení naší flotily."
 RAJ_obtain_modern_ship_contracts: "Získat zakázky na moderní lodě"
 RAJ_obtain_modern_ship_contracts_desc: "Abychom urychlili modernizaci našeho námořnictva, kontaktujme [ENG.GetNameDefCap] a jednejme o získání nejmodernějších křižníků, čímž zajistíme konkurenceschopnost naší flotily v měnícím se námořním prostředí."
 RAJ_open_up_new_markets: "Otevřít nové trhy"
 RAJ_open_up_new_markets_desc: "Hrozí, že v nadcházejících letech dojde k přesycení našich stávajících trhů, pokud nepřijmeme rázná opatření k jejich rozšíření. Proto přistoupíme k nepřátelským převzetím sousedních území."
 RAJ_orchestrate_train_robberies: "Lidová železnice"
 RAJ_orchestrate_train_robberies_desc: "Výstavba železnic se pod vedením dělníků a přísnějším dohledem zpomalila, avšak každá nová trať je lépe začleněna do plánovaného hospodářství, což přináší vyšší logistickou efektivitu."
 RAJ_orchestrate_train_robberies_tt: "Zaměření na železnice nyní upraví ducha §Y$idea_RAJ_indian_railways$§! o:\nVýstup továren: §G+[?RAJ_railway_default_increase_tt]%§!\nRychlost výstavby železnic: §R[?RAJ_railway_default_decrease_tt]%§!\nRychlost výstavby zásobovacích uzlů: §R[?RAJ_railway_default_decrease_tt]%§!\nRychlost výstavby infrastruktury: §R[?RAJ_railway_default_decrease_tt]%§!\nza každé dokončené železniční zaměření\n\nVšechna již dokončená železniční zaměření budou automaticky upravena podle tohoto efektu."
 RAJ_ordnance_factory_kanpur_uttar_pradesh: "Zbrojovka Kanpur"
 RAJ_ordnance_factory_kanpur_uttar_pradesh_desc: "Zbrojovka v Kanpuru je základním pilířem indické obranné výroby. Rozšířením její kapacity a modernizací zařízení zajistíme stabilní dodávky zbraní a vybavení, čímž posílíme naše ozbrojené síly při obraně země."
 RAJ_ordnance_factory_khamaria_jabalpur: "Zbrojovka Khamaria Jabalpur"
 RAJ_ordnance_factory_khamaria_jabalpur_desc: "Zbrojovka Khamaria v Džabalpuru je klíčovým producentem munice a výzbroje. Rozšíření její kapacity posílí palebnou sílu naší armády a zajistí, že naše jednotky budou dobře vybaveny pro jakoukoli výzvu."
 RAJ_ordnance_factory_medak: "Zbrojovka Medak"
 RAJ_ordnance_factory_medak_desc: "Zbrojovka Medak, specializující se na výrobu obrněných vozidel, je zásadní pro modernizaci naší armády. Rozšíření její výroby zajistí, že naše síly budou vybaveny moderní technikou potřebnou k dominanci na bojišti."
 RAJ_overlords_railway_investment: "[ROOT.OVERLORD.GetAdjectiveCap] investice do železnic"
 RAJ_overlords_railway_investment_desc: "Po položení základů moderní železniční sítě pozveme [ROOT.OVERLORD.GetAdjective] průmyslové a finanční zájmy k dalším investicím do jejího rozšíření a zdokonalení. Jejich kapitál spolu s naší rostoucí infrastrukturou vytvoří železniční systém hodný říše."
 RAJ_partition_preparation: "Příprava na rozdělení"
 RAJ_partition_preparation_desc: "Musíme se připravit na rozdělení, jinak nás pohltí chaos, který nastane při přesunech milionů lidí."
 RAJ_partition_preparation_tt: "§YSníží dopady rozdělení, až k němu dojde§! Při přípravě získáme: \n"
 RAJ_partition_preparation_tt_2: "Bez přípravy získáme: \n"
 RAJ_peacock_throne_for_the_modern_age: "Pávý trůn pro moderní dobu"
 RAJ_peacock_throne_for_the_modern_age_desc: "Pávý trůn byl vrcholným symbolem moci a velikosti našich předků. Vybudováním nového trůnu v našem historickém centru moci potvrdíme svou nadvládu, posílíme loajalitu a jasně vyjádříme naši vizi pro úrodné oblasti subkontinentu."
 RAJ_phantom_armies: "Fantomové armády"
 RAJ_phantom_armies_desc: "Nafouknutím počtu vojenského personálu ve výkazech můžeme oklamat daňové úřady."
 RAJ_planned_but_decentralized: "Plánované, ale decentralizované"
 RAJ_planned_but_decentralized_desc: "Zachováme ekonomické plánování, ale poskytneme místním kolektivům autonomii.\nEfektivita skrze ideologii, nikoli byrokracii."
 RAJ_planned_economy2: "Konsolidovat plánovanou ekonomiku"
 RAJ_planned_economy2_desc: "Trh nemá v revoluci místo.\nKaždý zdroj, každý pracovník a každá továrna musí sloužit pětiletému plánu."
 RAJ_planned_economy: "Plánovaná ekonomika"
 RAJ_planned_economy_desc: "Silný stát vyžaduje silnou ekonomiku vedenou jasným cílem a vizí. Zavedením plánované ekonomiky můžeme efektivně rozdělovat zdroje, upřednostnit průmyslový růst a zajistit spravedlivý rozvoj pro všechny občany."
 RAJ_pledge_for_the_allies: "Závazek vůči Spojencům"
 RAJ_pledge_for_the_allies_desc: "S tím, jak po celém světě sílí fašismus a komunismus, Indie nemůže zůstat osamocena. [ENG.GetName] možná nejsou přítelem Indie, ale je zřejmé, že ostatní jsou našimi nepřáteli."
 RAJ_power_sharing_agreement: "Dohoda o sdílení moci"
 RAJ_power_sharing_agreement_desc: "Muslimská liga na nás hledí s nedůvěrou a obává se, co se stane s muslimy v Indii ovládané hinduisty. Uzavřeme s nimi dohodu o rovnocenném sdílení moci."
 RAJ_preamble_to_the_constitution_of_india: "Preambule k ústavě [GetRajName]"
 RAJ_preamble_to_the_constitution_of_india_desc: "My, lid [GetRajName], jsme se slavnostně rozhodli vytvořit z [GetRajName] svrchovanou socialistickou sekulární demokratickou republiku a zajistit všem jejím občanům spravedlnost, svobodu, rovnost a podporovat mezi nimi bratrství v našem ústavodárném shromáždění tohoto dne."
 RAJ_preemptive_invasion_of_iran: "Preventivní invaze do Íránu"
 RAJ_preemptive_invasion_of_iran_desc: "[PER.GetNameDef] s námi sousedí na západě a pokud s nima nebude rychle zatočeno, můžou našim nepřátelům poskytnout přímou cestu útoku na [RAJ.GetNameDef] přes perský koridor. Taková invaze může vyvolat nevoli těch, kdo usilují o mír, ale pokud uspějeme, bohatá [PER.GetAdjective] ropná pole  budou naše."
 RAJ_princely_autonomy: "Autonomie knížecích států"
 RAJ_princely_autonomy_desc: "Subkontinent se postupně destabilizuje. Využijeme místní knížata k upevnění kontroly. Oni získají zdání místní moci a my budeme sklízet výhody - pokud nám budou platit."
 RAJ_princely_autonomy_tt: "Při uvolnění knížecího státu jako loutky přidá: "
 RAJ_princely_state_donations_GOE: "Dary knížecích států"
 RAJ_princely_state_donations_GOE_desc: "$RAJ_princely_state_donations_desc$"
 RAJ_princely_states_policy: "Politika knížecích států"
 RAJ_princely_states_policy_desc: "Knížecí státy mají různé podoby - od vlivného Hajdarábádu po menší knížectví na severních hranicích. Musíme stanovit politiku, jak s nimi nakládat."
 RAJ_princley_state_breakaway_tt: "§Y [442.GetName]\n [987.GetName]\n [988.GetName]\n [444.GetName]\n [445.GetName]\n [1012.GetName]\n§!"
 RAJ_prioritize_army_cargo: "Upřednostnit vojenský náklad"
 RAJ_prioritize_army_cargo_desc: "Železniční síť je páteří vojenské logistiky. Upřednostněním vojenského nákladu zajistíme, že naši vojáci budou zásobováni zbraněmi, zdroji a posilami potřebnými k rychlému a rozhodnému vítězství."
 RAJ_prioritize_civilian_cargo: "Upřednostnit civilní náklad"
 RAJ_prioritize_civilian_cargo_desc: "Silné zázemí je klíčem k vítězství. Upřednostněním civilního nákladu zajistíme včasné dodávky potravin, zboží a materiálů pro udržení obyvatelstva i průmyslu, čímž posílíme odolnost země v době krize."
 RAJ_privatized_healthcare: "Privatizované zdravotnictví"
 RAJ_privatized_healthcare_desc: "Požadavky na komunistické zdravotnické systémy musí být potlačeny v celém našem území. Zdravotní péče bude poskytována těm, kteří si ji zasloužili prostřednictvím neviditelné ruky trhu."
 RAJ_privatized_tutelage: "Privatizované vzdělávání"
 RAJ_privatized_tutelage_desc: "Vzdělání bude vyhrazeno těm, kteří si ho zaslouží, prostřednictvím přísně privatizovaného systému škol a univerzit, bez nežádoucích živlů."
 RAJ_procure_the_armor: "Varunovo pancéřování"
 RAJ_procure_the_armor_desc: "Varuna potřebuje silné pancéřování, velmi silné pancéřování. Testování na méně nákladném projektu je nezbytné pro udržení nízkých nákladů."
 RAJ_procure_the_guns: "Varunovo dělo"
 RAJ_procure_the_guns_desc: "Potřebujeme dostatečně silný odstrašující prostředek k ochraně našich tras - a silný odstrašující prostředek vyžaduje velké dělo, velmi velké dělo."
 RAJ_procure_the_task_force: "Varunova úderná skupina"
 RAJ_procure_the_task_force_desc: "I největší lodě potřebují doprovod, aby byly chráněny před nepřátelskými plavidly. Vytvořením silné námořní úderné skupiny zajistíme, že naše hlavní lodě budou moci plnit své hlavní úkoly."
 RAJ_productivity_mandate: "Nařízení o produktivitě"
 RAJ_productivity_mandate_desc: "Vázáni závazky vůči investorům jsme nuceni maximalizovat výstup ve všech sektorech. Produktivita již není cílem - je to povinnost, která musí být splněna za každou cenu."
 RAJ_promote_violence_against_the_british: "Podporovat násilí proti Britům"
 RAJ_promote_violence_against_the_british_desc: "Čas mírových protestů skončil. Abychom zlomili okovy imperiální nadvlády, musíme přijmout přímou akci. Koordinovaný odpor oslabí britskou kontrolu a inspiruje masy k povstání proti tyranii."
 RAJ_protest_against_the_howell_monument: "Protest proti památníku Holwella"
 RAJ_protest_against_the_howell_monument_desc: "Holwellův památník je symbolem koloniální nadvlády a nespravedlnosti. Organizací protestů proti tomuto symbolu sjednotíme národ v odmítnutí imperiální propagandy a požadavku na odstranění reliktů, které urážejí náš boj za svobodu."
 RAJ_provincial_autonomy: "Na cestě k nezávislosti"
 RAJ_provincial_autonomy_desc: "Získání větší provinční autonomie od Britů bude prvním zásadním krokem k dosažení našeho konečného cíle - nezávislosti."
 RAJ_provincial_autonomy_occupation_law_tt: "Odemkne okupační zákony §Y$independent_rule$§! a §Y$princely_subjugation$§! pro knížecí státy"
 RAJ_provincial_autonomy_tt: "\nPro úplné osvobození cestou §Y$RAJ_two_nation_theory_$§! musíme dokončit buď §Y$RAJ_united_bengal$§! nebo §Y$RAJ_eastern_pakistan$§!.\n\nPro úplné osvobození cestou §Y$RAJ_india_united$§! musíme dokončit §Y$RAJ_a_secular_state$§!.\n\nPro úplné osvobození cestou §Y$RAJ_league_against_gandhism$§! musíme dokončit §Y$RAJ_red_in_the_shadows$§! nebo §Y$RAJ_give_me_blood_and_i_will_grant_you_freedom$§!."
 RAJ_punjab_autonomy: "Autonomie Paňdžábu"
 RAJ_punjab_autonomy_desc: "Paňdžáb má pro sikhy hluboký význam a udělením místní autonomie si můžeme získat jejich důvěru."
 RAJ_purchase_british_supply_equipment: "Nákup britského zásobovacího vybavení"
 RAJ_purchase_british_supply_equipment_desc: "Musíme získat pokročilé britské zásobovací vybavení, abychom posílili naše síly a zlepšili logistiku na bojišti."
 RAJ_purchase_cruisers_and_dreadnoughts: "Nákup křižníků a dreadnoughtů"
 RAJ_purchase_cruisers_and_dreadnoughts_desc: "$SMB_purchase_cruisers_and_dreadnoughts_desc$"
 RAJ_purchase_decomissioned_british_ships: "Nákup vyřazených lodí"
 RAJ_purchase_decomissioned_british_ships_desc: "Obrátíme se na [ENG.GetNameDefCap] s cílem získat vyřazená námořní plavidla. Ačkoliv jsou zastaralá, lze je modernizovat a rychle tak rozšířit naši flotilu za minimální náklady."
 RAJ_purchase_destroyers_and_subs: "Nákup torpédoborců a ponorek"
 RAJ_purchase_destroyers_and_subs_desc: "$SMB_purchase_destroyers_and_subs_desc$"
 RAJ_purge_the_reactionaries: "Čistka reakcionářů"
 RAJ_purge_the_reactionaries_desc: "Se starým světem nemůže být kompromis.\nNepřátelé revoluce, sabotéři a kontrarevoluční živly budou vykořeněni."
 RAJ_purna_swaraj: "Úplná samospráva - Púrna svarádž"
 RAJ_purna_swaraj_desc: "[ENG.GetAdjectiveCap] vláda v Indii nejenže připravila [RAJ.GetAdjective] lid o svobodu, ale také jej vystavila vykořisťování a zničila Indii ekonomicky, politicky, kulturně i duchovně. Proto musí Indie zpřetrhat vazby na [ENG.GetNameDef] a dosáhnout Púrna svarádž, tedy úplné nezávislosti."
 RAJ_quality_training: "Kvalitní výcvik"
 RAJ_quality_training_desc: "Množství samo o sobě války nevyhrává.\nStandardizujeme výcvikové programy, zlepšíme přípravu důstojníků a zvýšíme profesionalitu našich ozbrojených sil."
 RAJ_quinine: "Chinin"
 RAJ_quinine_desc: "Zajištěním chininu a podobných léků pro naše jednotky jim umožníme bojovat v tropických podmínkách bez rizika malárie."
 RAJ_quinine_tt: "Odemkne vylepšenou verzi schopnosti §Y$ABILITY_EXTRA_SUPLIES$§!.\n\nCena velitelské síly: §Y0.15§! (za každý prapor)\nDélka trvání: §Y10 dní§!\nCooldown: §Y21 dní§!\n\n§YPo aktivaci:§!\nOpotřebení divize: §G12.0%§!\n$MODIFIER_HEAT_ATTRITION$: §G35.00%§!\n$MODIFIER_NO_SUPPLY_GRACE$: §G+240.0 hodin§!\nŠance na nemoc: §G-100.00%§!\nZajistí armádám zásoby na §Y240§! hodin"
 RAJ_railways_shortcut: "Železnice"
 RAJ_raise_import_duties: "Zvýšit dovozní cla"
 RAJ_raise_import_duties_desc: "Abychom snížili hospodářskou závislost a podpořili domácí růst, zavedeme vyšší dovozní cla na zahraniční zboží. Tato politika ochrání místní průmysl, udrží kapitál v našich hranicích a zajistí, že [ROOT.GetNameDef] bude stát na vlastních nohou."
 RAJ_rally_the_indian_left: "Sjednotit indickou levici"
 RAJ_rally_the_indian_left_desc: "Roztříštěná levice se musí sjednotit, aby vedla boj za práva pracujících a skutečnou nezávislost. Sjednocením socialistických a komunistických sil pod jedním praporem vytvoříme mocnou frontu proti imperialismu i kapitalismu."
 RAJ_rani_of_jhansi_regiment: "Pluk Lakšmí Báí"
 RAJ_rani_of_jhansi_regiment_desc: "Inspirováni odvahou Lakšmí Báí vytvoříme čistě ženský pluk, který se postaví proti útlaku. Posílením těchto statečných bojovnic zasadíme mocný úder koloniální nadvládě a přepíšeme roli žen v boji za nezávislost."
 RAJ_rashtriya_swayamsevak_sangh: "Ráštríja svajamsévak sangh"
 RAJ_rashtriya_swayamsevak_sangh_desc: "Zorganizujeme mládež do disciplinované síly připravené bránit náš národ a za každou cenu hájit hodnoty hindutvy."
 RAJ_re_establish_the_khyber_rifles: "Obnovit Chajbarské střelce"
 RAJ_re_establish_the_khyber_rifles_desc: "Obnovíme milici Chajbarských střelců k obraně našeho drsného terénu a možná se od nich i něčemu přiučíme."
 RAJ_rebuilding_the_empires_roads: "Obnova císařských silnic"
 RAJ_rebuilding_the_empires_roads_desc: "Říše nemůže fungovat bez možnosti přesouvat armády, zboží a lidi. Zchátralé silnice a železnice zanechané Brity musí být rozšířeny a modernizovány"
 RAJ_recruitment_shortcut: "Nábor"
 RAJ_red_in_the_shadows: "Rudí ve stínech"
 RAJ_red_in_the_shadows_desc: "Uprostřed chaosu imperiálního úpadku nabírají revoluční síly na síle a v utajení podkopávají starý řád. Vzestup rudého praporu značí blížící se zúčtování, které může změnit budoucnost Indie i světa."
 RAJ_red_in_the_shadows_tt: "Odemkne rozhodnutí k infiltraci britské vlády a ovlivnění hnutí za nezávislost směrem k prokomunistickému postoji, čímž sníží požadavky na dokončení §Y$RAJ_royal_indian_navy$§!"
 RAJ_red_punjab_operation: "Operace Rudý Paňdžáb"
 RAJ_red_punjab_operation_desc: "Naše hlavní město je zranitelné vůči zahraniční agresi. Musíme rozšířit jeho bezpečnostní zónu."
 RAJ_reform_the_agricultural_sector: "Reforma zemědělského sektoru"
 RAJ_reform_the_agricultural_sector_desc: "Desetiletí neefektivního využívání půdy a zastaralých postupů zanechala [ROOT.GetAdjective] zemědělský sektor zranitelným. Cílenými reformami, investicemi do infrastruktury a moderními metodami zvýšíme výnosy a posílíme potravinovou bezpečnost."
 RAJ_reform_the_agricultural_system: "Reforma zemědělského systému"
 RAJ_reform_the_agricultural_system_desc: "Po příliš dlouhou dobu trpěl indický potravinový systém zanedbáváním, špatným řízením a vykořisťováním. S obnovením Mughalské říše musíme zajistit, aby žádný poddaný již netrpěl hladem. Investicemi do zavlažování, modernizací zemědělství a zlomením moci vykořisťujících statkářů proměníme Indii v zemi hojnosti, kde hladomor bude minulostí."
 RAJ_regimental_loyalty: "Plukovní loajalita"
 RAJ_regimental_loyalty_desc: "Pouta plukovní loajality vytvářejí jednotu a disciplínu mezi našimi vojáky. Podporou hrdosti na tyto tradice budujeme sílu spojenou ctí, důvěrou a neochvějným odhodláním k vítězství."
 RAJ_relax_agrarian_society_criteria: "Industrializovat společnost"
 RAJ_relax_agrarian_society_criteria_desc: "Abychom se stali moderní průmyslovou mocností, musíme přesunout naši ekonomiku od tradičního zemědělství. Podporou přechodu venkovského obyvatelstva do průmyslu vytvoříme základ pro dlouhodobý růst a technologický pokrok."
 RAJ_relax_agrarian_society_criteria_tt: "Upraví §Y$idea_RAJ_agrarian_society$§!\n§YEfektivní změna:§!"
 RAJ_release_subjects_hint_tt: "§YSubjekty ze subkontinentu uvolněné námi budou s větší pravděpodobností upřednostňovat průmyslová zaměření.§!"
 RAJ_renegotiate_adens_control: "Znovu vyjednat kontrolu nad Adenem"
 RAJ_renegotiate_adens_control_desc: "Původním plánem bylo převést Aden na [ENG.GetName], avšak mít obchodní přístav u Rudého moře přináší značné výhody. Musíme tuto politiku přehodnotit a udržet si nad ním kontrolu."
 RAJ_renegotiate_adens_control_tt: "Udržíme kontrolu nad [992.GetName] místo jeho převedení na [ENG.GetName]"
 RAJ_reorganize_the_five_year_plan_towards_heavy_industry: "Přesměrovat pětiletý plán"
 RAJ_reorganize_the_five_year_plan_towards_heavy_industry_desc: "Současné tempo industrializace je nedostatečné.\nMusíme upřednostnit těžký průmysl a výrobu oceli, chceme-li ubránit revoluci."
 RAJ_request_transfer_of_british_commanders: "Požádat o převelení britských velitelů"
 RAJ_request_transfer_of_british_commanders_desc: "Požádáme [ENG.GetNameDefCap] o převelení jednoho z jejich námořních velitelů, aby nám pomohl s výcvikem nových námořníků."
 RAJ_restore_the_timurid_empire: "Obnovit Tímúrovskou říši"
 RAJ_restore_the_timurid_empire_desc: "Prapory Tímúra opět vlají a říše, která kdysi naháněla strach sultánům i králům, povstala z popela dějin. Naše vláda se rozprostírá po územích formovaných jeho výboji a spojuje Východ i Západ pod jednou nadvládou. Ať svět zpozorní — Tímúrovci se vrátili a tentokrát to bude natrvalo."
 RAJ_restrictive_administration_budget: "Omezený administrativní rozpočet"
 RAJ_restrictive_administration_budget_desc: "Abychom zachovali fiskální disciplínu, musí být odstraněny veškeré nepodstatné výdaje. Efektivita vyžaduje soustředit zdroje tam, kde přinášejí měřitelné výsledky."
 RAJ_revisiting_inquities: "Oko za oko"
 RAJ_revisiting_inquities_desc: "Úpadek naší říše byl urychlen zásahy zahraničních obchodních společností. Někteří z nás věří, že s naší nově nabytou silou máme právo vystavit své někdejší nepřátele stejným křivdám, jaké oni způsobili nám."
 RAJ_reviving_the_workshop_of_the_world: "Obnova dílny světa"
 RAJ_reviving_the_workshop_of_the_world_desc: "Před britskou nadvládou byla Indie světovým centrem průmyslu, textilu a obchodu. Nyní, s obnovenou říší, je čas tuto tradici znovu získat. Modernizací továren a oživením obchodních cest proměníme naši ekonomiku v mocnost soupeřící s největšími státy světa."
 RAJ_revolt_of_the_princes: "Povstání knížat"
 RAJ_revolt_of_the_princes_desc: "Knížecí státy, dlouho podrobené britské nadvládě, povstanou, aby znovu získaly své dědictví."
 RAJ_revolt_of_the_princes_tt: "Po vyhlášení války Britskému Ráji povstanou knížecí státy a připojí se k nám jako subjekty."
 RAJ_rifle_factory_ishapore_west_bengal: "Zbrojovka Išápur"
 RAJ_rifle_factory_ishapore_west_bengal_desc: "Zbrojovka v Išápuru bude spolupracovat s továrnou v Khadki na výrobě ručních zbraní pro armádu."
 RAJ_road_to_independence_shortcut: "Cesta k nezávislosti"
 RAJ_rolling_nuke_barrages: "Postupné jaderné přehradné palby"
 RAJ_rolling_nuke_barrages_desc: "Přehradná palba byla během Velké války běžná. Nové technologie nyní umožňují ještě ničivější varianty."
 RAJ_royal_indian_air_force_dlc: "Královské [ROOT.GetAdjective] letectvo"
 RAJ_royal_indian_air_force_dlc_desc: "Královské [ROOT.GetAdjective] letectvo představuje vrchol letecké síly Indie. Rozšířením jeho schopností moderními letouny a výcvikem zajistíme nadvládu ve vzduchu, připraveni bránit naši zemi a promítat sílu v regionu."
 RAJ_royal_indian_artillery_: "Královské indické dělostřelectvo"
 RAJ_royal_indian_artillery__desc: "Posílením této impozantní složky zajistíme schopnost poskytovat ničivou palebnou sílu, prorážet nepřátelské linie a dosahovat vítězství na bojišti."
 RAJ_royal_indian_artillery_dlc: "$RAJ_royal_indian_artillery$"
 RAJ_royal_indian_artillery_dlc_desc: "$RAJ_royal_indian_artillery_desc$"
 RAJ_royal_indian_navy_dlc: "$RAJ_royal_indian_navy$"
 RAJ_royal_indian_navy_dlc_desc: "$RAJ_royal_indian_navy_desc$"
 RAJ_royal_indian_navy_mutiny: "Vzpoura Královského indického námořnictva"
 RAJ_royal_indian_navy_mutiny_desc: "Mezi indickými námořníky roste nespokojenost a podpora naší věci. Můžeme toho využít k uchopení moci a zastavení anglických posil. Nebudou mít jinou možnost než se podřídit."
 RAJ_royal_indian_navy_mutiny_tt2: "§RRozhodnutí o komunistické infiltraci budou odstraněna po splnění našich závazků§!"
 RAJ_royal_indian_navy_mutiny_tt: "§RRozhodnutí o komunistické infiltraci budou odstraněna po dokončení tohoto zaměření§!"
 RAJ_rural_development_plan: "Plán rozvoje venkova"
 RAJ_rural_development_plan_desc: "Po zahájení zemědělských reforem musíme nyní přivést průmysl na venkov. Mechanizace, venkovské infrastrukturní projekty a drobná výroba promění vesnice v motory produkce."
 RAJ_rural_mechanization_program: "Program mechanizace venkova"
 RAJ_rural_mechanization_program_desc: "Abychom zvýšili zemědělskou produkci a snížili závislost na zastaralých pracovních metodách, zavedeme strukturovaný program mechanizovaného hospodaření. Traktory, mlátičky a zavlažovací systémy promění produktivitu venkova a položí základy moderní soběstačné ekonomiky."
 RAJ_sanatani: "Sanátaní"
 RAJ_sanatani_desc: "Zásady Sanátan dharmy poskytují nadčasový základ pro jednotu a obrodu Indie. Přijetím těchto hodnot můžeme inspirovat harmonický a odolný národ vedený tradicí."
 RAJ_secret_weapons: "Obnovit naši vědeckou převahu"
 RAJ_secret_weapons_desc: "Znovu se ustanovíme jako světový lídr ve vývoji raket a využijeme je k ničení našich nepřátel."
 RAJ_secular_rule: "Sekulární správa"
 RAJ_secular_rule_alt: "Timúrovské dědictví"
 RAJ_secular_rule_alt_desc: "Nastal čas znovu získat naši pradávnou domovinu a vytvořit novou éru v horách, kde se zrodila naše dynastie. Ukotvením říše v drsném srdci Afghánistánu upevníme svou nadvládu a obnovíme základy imperiální vlády."
 RAJ_secular_rule_desc: "Mughalská říše stojí na rozmanitosti a sekulární správa zajišťuje spravedlivé vládnutí pro všechny poddané bez ohledu na víru. Upřednostněním zásluh a rovnosti posilujeme jednotu říše a upevňujeme loajalitu napříč jejími rozsáhlými a rozmanitými územími."
 RAJ_secure_rajahsthan: "Zajistit Rádžasthán"
 RAJ_secure_rajahsthan_desc: "Pouště Rádžasthánu se nesmí stát základnou pro kontrarevoluci.\nPřivedeme tento stát pod naši kontrolu."
 RAJ_secure_states: "Obsadit"
 RAJ_secure_weapons: "Zajistit zbraně"
 RAJ_secure_weapons_desc: "Naše vojenské vybavení je směsicí nesourodých variant z různých zemí. S trochou pomoci ze zahraničí však můžeme získat výzbroj potřebnou k přípravě na naše osvobození."
 RAJ_secure_weapons_tt: "Zbraně budou přidány do skladu po dokončení §Y$RAJ_the_mughal_uprising$§!."
 RAJ_seek_domestic_allies: "Hledat domácí spojence"
 RAJ_seek_domestic_allies_desc: "Forward Bloc nemůže dosáhnout své vize sám. Hledáním spojenců napříč politickým spektrem sjednotíme revoluční myslitele, rozšíříme podporu a vytvoříme vedení schopné dovést Indii ke skutečné nezávislosti."
 RAJ_seek_financial_aid_from_the_ussr: "Požádat [SOU.GetNameDef] o finanční pomoc"
 RAJ_seek_financial_aid_from_the_ussr_desc: "K urychlení našich revolučních cílů a národního rozvoje se obrátíme na [SOU.GetNameDefCap] s žádostí o finanční pomoc. Jejich podpora nám pomůže vybudovat nový řád založený na solidaritě a síle."
 RAJ_seek_international_recognition: "Usilovat o mezinárodní uznání"
 RAJ_seek_international_recognition_desc: "Abychom legitimizovali náš boj, musíme získat mezinárodní uznání. Mobilizací globální podpory izolujeme [ENG.GetNameDef] a posílíme náš nárok na suverenitu v očích světa."
 RAJ_seek_intial_funding: "Zajistit počáteční financování"
 RAJ_seek_intial_funding_desc: "Abychom položili základy našich velkých ambicí, musíme získat kapitál od [ENG.GetAdjective] investorů. Jejich počáteční financování zažehne náš hospodářský motor."
 RAJ_seek_intial_funding_tt: "Přidá §G3§! stavební sloty\nPřidá §G3§! §Ycivilní továrny§! do hlavního města po dokončení §Y$RAJ_incorporation_of_the_east_india_company$§!"
 RAJ_seek_intial_funding_unlock_tt: "Odemkne zaměření §Y$RAJ_seek_intial_funding$§!\n\n"
 RAJ_seek_japanese_support: "Hledat japonskou podporu"
 RAJ_seek_japanese_support_desc: "Nepřítel našeho nepřítele může být naším nejsilnějším spojencem. Hledáním japonské podpory můžeme získat přístup ke zdrojům, výcviku a personálu potřebnému k boji proti britské nadvládě. Přestože je tato cesta plná rizik, takové spojenectví může převážit misky vah v náš prospěch."
 RAJ_seek_japanese_support_tt: "Po zahájení války za nezávislost nám [JAP.GetNameDef] poskytne:\n§Y120§! námořních bombardérů B4Y\n§Y135§! stíhaček Ki-10\nJejich odpovídající návrhy a\n"
 RAJ_seven_shackles: "Sedm pout"
 RAJ_seven_shackles_2: "Čtvrté až šesté ze sedmi pout"
 RAJ_seven_shackles_desc: "Vyavasajbandí omezuje Indy ve svobodné volbě povolání a svazuje je s vykořisťujícími systémy. Odstraněním tohoto pouta osvobodíme pracující a umožníme jim přispívat ke skutečně nezávislé a spravedlivé ekonomice."
 RAJ_shaheed_and_swaraj: "Šahíd a svarádž"
 RAJ_shaheed_and_swaraj_desc: "Oběti našich mučedníků inspirují neúnavné úsilí o svarádž. Jejich krev pohání naši revoluci a připomíná nám, že nezávislost se nedává, ale se bere. Nechť jejich památka posílí naše odhodlání dosáhnout svobodné a suverénní Indie."
 RAJ_shareholder_democracy: "Akcionářská demokracie"
 RAJ_shareholder_democracy_desc: "Zákonodárná moc v zemi formálně náleží společnosti, ale pouze na papíře. Soudci i zákonodárci jsou na naší výplatní listině, což nám umožňuje snadno prosazovat výhodnou legislativu a rozdělovat opozici."
 RAJ_sharpen_the_tulwar: "Nabrousit tulvár"
 RAJ_sharpen_the_tulwar_desc: "Tulvár, symbol síly a vzdoru, musí být připraven na nadcházející boje. Modernizací našich sil a zdokonalením strategií zajistíme, že [ROOT.GetNameDef] zasadí rozhodující úder, až přijde správný okamžik."
 RAJ_sideline_the_conflict: "Ustoupit od konfliktu"
 RAJ_sideline_the_conflict_desc: "Není jasné, proč musí [ROOT.GetName] trpět kvůli chybným rozhodnutím jiných a územní agresi. Musíme se soustředit na vnitřní záležitosti, nikoli na vnější konflikty."
 RAJ_siege_batteries: "Obléhací baterie"
 RAJ_siege_batteries_desc: "Když nám stojí v cestě opevnění, obléhací baterie je promění v trosky. Tyto těžké dělostřelecké jednotky přinášejí bezkonkurenční ničivou sílu a zajistí, že žádná pevnost neodolá našemu postupu."
 RAJ_sikh_religious_guarantees: "Náboženské záruky pro sikhy"
 RAJ_sikh_religious_guarantees_desc: "Sikhové jsou významnou náboženskou menšinou a zároveň obávanými bojovníky. Musíme si je získat zajištěním jejich náboženských práv."
 RAJ_skibedi_san_ma: "Zlomení militaristů"
 RAJ_skibedi_san_ma_desc: "Militaristé z oblasti Si-pej San Ma představují překážku pro nadvládu Mughalské říše ve Střední Asii. Rozhodnou kampaní můžeme zlomit jejich moc, zajistit strategické obchodní cesty a rozšířit vliv říše v regionu."
 RAJ_smiling_buddah: "Usmívající se Buddha"
 RAJ_smiling_buddah_desc: "Projekt Usmívající se Buddha znamená vstup Indie do éry jaderných schopností. Ovládnutím této technologie potvrdíme svou nezávislost a zajistíme silný odstrašující prostředek."
 RAJ_socialist_self_reliance: "Socialistická soběstačnost"
 RAJ_socialist_self_reliance_desc: "Nebudeme závislí na kapitalistickém dovozu ani imperialistických poradcích.\nIndie se uživí sama, vyzbrojí se sama a pokud bude třeba, obstojí sama."
 RAJ_south_east_asia_command: "Velitelství jihovýchodní Asie"
 RAJ_south_east_asia_command_desc: "S rostoucím napětím sílí potřeba centralizovaného velení pro jihovýchodní Asii. Můžeme stát u zrodu takové iniciativy a vybudovat základnu, ze které budeme řídit naše vojenské operace na kontinentu."
 RAJ_south_east_asia_command_rename_dm_tt: "Přejmenuje národní duch §Y$RAJ_indian_gentlemen_officers_goe$§! na §Y$RAJ_south_east_asia_command_dm$§!."
 RAJ_south_indian_railway_company: "Jihoindická železniční společnost"
 RAJ_south_indian_railway_company_desc: "Jihoindická železniční společnost spojuje dynamický jih se zbytkem Indie. Posílení a rozšíření této sítě podpoří regionální růst a jednotu."
 RAJ_soviet_indian_industrial_cooperation: "Sovětsko-indická průmyslová spolupráce"
 RAJ_soviet_indian_industrial_cooperation_desc: "Abychom urychlili naši ekonomickou transformaci, [SOU.GetNameDefCap] obdrží náš návrh na průmyslové partnerství. Jejich technické znalosti a zkušenosti s centralizovaným rozvojem budou klíčové při budování socialistické ekonomiky přizpůsobené našim potřebám."
 RAJ_soviet_influence: "Sovětský vliv"
 RAJ_soviet_influence_desc: "Sovětský svaz představuje model revoluční transformace. Přijetím jeho ideologického vedení a institucionálních rámců můžeme vytyčit cestu, na kterou se vydá [RAJ.GetName]."
 RAJ_special_economic_zones: "Speciální ekonomické zóny"
 RAJ_special_economic_zones_desc: "Zřídíme v naší zemi speciální ekonomické zóny, které usnadní investice korporací a sníží jejich daňovou zátěž."
 RAJ_special_operations_executive: "Výkonné oddělení speciálních operací"
 RAJ_special_operations_executive_desc: "Výkonné oddělení speciálních operací se specializuje na nekonvenční válku, od sabotáží po zpravodajskou činnost. Rozšíření jeho role v Indii nám poskytne nástroje k narušení plánů nepřítele a promění tajné operace ve strategickou výhodu."
 RAJ_specialized_dietary_requirement: "Specifické stravovací požadavky"
 RAJ_specialized_dietary_requirement_desc: "Abychom udrželi morálku a soudržnost, musíme respektovat rozmanité stravovací potřeby našich vojáků. Poskytováním jídel odpovídajících jejich náboženským a kulturním zvyklostem zajistíme, že každý voják bude připraven k boji."
 RAJ_spitfire: "Spitfire"
 RAJ_spitfire_desc: "Spitfiry, proslulé svou rychlostí a obratností, budou tvořit jádro našeho moderního letectva a zajistí nadvládu ve vzduchu i účinnou obranu proti jakékoli letecké hrozbě."
 RAJ_standardized_rations: "Standardizované příděly"
 RAJ_standardized_rations_desc: "Efektivita a jednotnost jsou základem silné armády. Zavedením standardizovaných přídělů zjednodušíme logistiku, snížíme náklady a zajistíme, že všichni vojáci budou zásobováni stejně, což posílí jednotu a disciplínu."
 RAJ_stir_unrest_in_the_north: "Rozdmýchat nepokoje na severu"
 RAJ_stir_unrest_in_the_north_desc: "Obyvatelé severních částí Rádže byli cenovými kontrolami postiženi nepoměrně více. Jsou jako suchá tráva, stačí jiskra."
 RAJ_stir_unrest_in_the_north_focus_tt: "Při osamostatnění si ponecháme kontrolu nad těmito státy:"
 RAJ_stop_unrest_events_tt: "§GNebudou se již objevovat žádné události nepokojů.§!"
 RAJ_stopping_the_japanese_threat_into_central_asia: "Zastavit japonskou hrozbu ve Střední Asii"
 RAJ_stopping_the_japanese_threat_into_central_asia_desc: "Japonské ambice nekončí na hranicích Číny. Jejich pohled se nyní obrací ke Střední Asii, potenciálnímu odrazovému můstku pro další imperiální expanzi.\nMusíme jednat rychle. Posílením naší východní hranice zastavíme vlnu dobývání dříve, než dosáhne stepí a ještě dál."
 RAJ_strengthen_ties_with_british_investors_GOE: "Posílit vazby s britskými investory"
 RAJ_strengthen_ties_with_british_investors_GOE_desc: "$RAJ_strengthen_ties_with_british_investors_desc$"
 RAJ_strike_against_china: "[CHI.GetName], náš další cíl"
 RAJ_strike_against_china_desc: "Pokud se [CHI.GetName] stane regionální mocností, zaútočí na nás - možná ne dnes, ale jistě zítra. Musíme udeřit první."
 RAJ_strike_burma: "[BRM.GetNameDef] patří nám"
 RAJ_strike_burma_desc: "[BRM.GetName] svou pouhou existencí představuje strategickou hrozbu na naší východní hranici. Pokud ji dostaneme pod svou kontrolu, zabezpečíme hranici a odstraníme potenciální předmostí cizích mocností."
 RAJ_strike_eastern_pakistan: "Úder na Východní Pákistán"
 RAJ_strike_eastern_pakistan_desc: "Východní křídlo [PAK.GetName] je izolované a nestabilní.\nNyní je čas udeřit, než si dokážou vybudovat pevné postavení."
 RAJ_submarine_effort_dlc: "$RAJ_submarine_effort$"
 RAJ_supply_center_fortifications: "Opevnění zásobovacích center"
 RAJ_supply_center_fortifications_desc: "Zajištění našich zásobovacích center je klíčové pro udržení válečného úsilí. Opevněním těchto uzlů zajistíme nepřerušený tok surovin a ochráníme páteř našich vojenských operací před nepřátelskými útoky."
 RAJ_supply_center_fortifications_tt: "Přidá §G3§! §Y$bunker$§! ke každému §YDistribučnímu uzlu§! v námi vlastněných státech"
 RAJ_support_naval_invasions: "Podpora námořních invazí"
 RAJ_support_naval_invasions_desc: "Tato válka se nebude vést pouze na zemi a ve vzduchu, ale také na moři. Stejně jako mobilizujeme pozemní síly, musíme připravit i námořnictvo k podpoře invazních plánů našich spojenců."
 RAJ_suppress_paramilitary_organizations: "Potlačit polovojenské organizace"
 RAJ_suppress_paramilitary_organizations_desc: "[GetRajName] je stále působištěm roztříštěných polovojenských skupin. Musíme je rychle vymýtit - jakmile se plevel pevně zakoření v půdě, je těžké jej vytrhnout."
 RAJ_swadeshi_movement: "Hnutí svadéší"
 RAJ_swadeshi_movement_desc: "Svadéší, tedy hospodářská soběstačnost nezávislá na [ENG.GetAdjective], posílí hnutí za nezávislost a udrží bohatství Indie v Indii."
 RAJ_take_in_british_naval_experts: "Přijmout [ENG.GetAdjective] námořní experty"
 RAJ_take_in_british_naval_experts_desc: "Ve Spojeném království se nacházejí někteří z nejlepších námořních odborníků na světě. Přivést část z nich k nám nebude obtížné."
 RAJ_take_over_administrative_rights: "Převzít správní pravomoci"
 RAJ_take_over_administrative_rights_desc: "Aby se [ENG.GetAdjective] vláda mohla z oblasti stáhnout důstojně, začala předávat správní úkoly našim firemním úředníkům."
 RAJ_tata_steel_dlc: "Tata Steel"
 RAJ_tata_steel_dlc_desc: "$RAJ_tata_steel_desc$"
 RAJ_tea_exports: "Vývoz čaje"
 RAJ_tea_exports_desc: "Čaj se stal významným vývozním artiklem po celém světě a tvoří základ živobytí mnoha Indů."
 RAJ_tea_exports_tt: "§YLze rozšířit až pětkrát§!"
 RAJ_tea_exports_tt_2: "\nPo získání nezávislosti odstraní §Y$idea_RAJ_tea_exports$§! a"
 RAJ_temple_entry_movements: "Hnutí za vstup do chrámů"
 RAJ_temple_entry_movements_desc: "Nedotknutelnost je hanbou této země a pouze nás rozděluje. V boji proti ní umožníme lidem všech kast vstup do jejich míst uctívání."
 RAJ_tenancy_reforms: "Reformy nájemního bydlení"
 RAJ_tenancy_reforms_desc: "Bohatí spekulanti ovládají trh s bydlením, zvyšují ceny a snižují životní úroveň obyčejných lidí. Kongres bude důrazně prosazovat nájemní reformy a stanoví strop pro výši nájemného."
 RAJ_territorial_development_scheme: "Program územního rozvoje"
 RAJ_territorial_development_scheme_desc: "Abychom plně využili hospodářský potenciál, kterým disponuje [ROOT.GetNameDef], musíme znovu posoudit rozdělení a využití půdy. Program územního rozvoje určí zanedbané oblasti, odstraní překážky růstu a připraví nové zóny pro průmyslovou expanzi."
 RAJ_the_aden_protectorate: "Adenský protektorát"
 RAJ_the_aden_protectorate_desc: "Provincie Aden na Arabském poloostrově spadá pod naši správu. Je proto nezbytné zajistit její obranu, ať i [ENG.GetNameDef] vidí, že [RAJ.GetNameDef] má schopnost chránit zájmy [ENG.GetAdjective] impéria ve vodách Blízkého východu."
 RAJ_the_burma_rifles: "Barmští střelci"
 RAJ_the_burma_rifles_desc: "Barmští střelci představují klíčovou sílu pro udržení bezpečnosti v náročném terénu východní hranice. Posílením a modernizací tohoto pluku zajistíme stabilitu, ochranu klíčových oblastí a připravenost na budoucí výzvy."
 RAJ_the_burma_road: "Barmská cesta"
 RAJ_the_burma_road_desc: "Barmská cesta je životně důležitou zásobovací trasou, která spojuje Indii s jihovýchodní Asií a dál. Její zabezpečení a rozšíření zajistí plynulý tok surovin a posil, čímž upevníme svou pozici v regionu a podpoříme spojence."
 RAJ_the_calcutta_line: "Kalkatská linie"
 RAJ_the_calcutta_line_desc: "S rostoucím regionálním napětím je nezbytné zabezpečit východní hranici. Opevnění Kalkatské linie vytvoří obrannou bariéru, ochrání klíčovou infrastrukturu a uchrání naše srdce země před vnějšími hrozbami."
 RAJ_the_calcutta_line_tt: "Přidá §G2§! §Ypozemní pevnosti§! do §Ykaždé§! provincie ve státě."
 RAJ_the_crown_and_the_world: "Koruna a svět"
 RAJ_the_crown_and_the_world_desc: "Osudem Mughalské říše je povstat jako bezkonkurenční globální supervelmoc. Rozšiřováním našeho vlivu, posilováním moci a prosazováním dominance si zajistíme místo na vrcholu moderního světa."
 RAJ_the_defense_of_hong_kong: "Obrana Hongkongu"
 RAJ_the_defense_of_hong_kong_desc: "S tím, jak [CHI.GetNonIdeologyName] tlačí na [ENG.GetAdjective] državy, má Koruna obavy o osud Hongkongu. Nacházíme se v ideální pozici městu pomoci s obranou proti invazi a v případě úspěchu si získáme přízeň i uznání [ENG.GetAdjective] vlády."
 RAJ_the_dominion_of_india: "Indické dominium"
 RAJ_the_dominion_of_india_desc: "Po obnovení pořádku na subkontinentu je čas zaujmout místo mezi našimi imperiálními sourozenci jako loajální a samosprávné dominium impéria.\nAť žije král!"
 RAJ_the_dominion_of_india_every_owned_state_compliance_tt: "Každý vlastněný stát s méně než §Y100 %§! poslušnosti"
 RAJ_the_empires_workshop: "Dílna impéria"
 RAJ_the_empires_workshop_civs_to_the_empire_subjects_tt: "(§Y[ENG.GetFlag][ENG.GetName]§! v náhodném domovském státě): \n Přidá §G2§! stavební sloty. \n Přidá §G2§! §Y$industrial_complex$§! \n\n(§YKaždý subjekt [ENG.GetFlag][ENG.GetAdjective]§! v náhodném domovském státě): \n Přidá §G1§! stavební slot. \n Přidá §G1§! §Y$industrial_complex$§!"
 RAJ_the_empires_workshop_desc: "Abychom zajistili sílu říše tváří v tvář rostoucím globálním nárokům, prohloubíme hospodářské vazby, které má [ROOT.GetNameDef] a [ROOT.OVERLORD.GetNameDef]. Koordinované investice a rozšiřování továren na obou územích promění naši společnou průmyslovou základnu v společný výrobní motor."
 RAJ_the_enemy_of_my_enemy: "Nepřítel mého nepřítele"
 RAJ_the_enemy_of_my_enemy_desc: "V boji za nezávislost vznikají spojenectví z nutnosti. Spoluprací s těmi, kteří odporují Britům, můžeme oslabit jejich sevření naší země. Svoboda si může vyžádat nepravděpodobná partnerství, ale vítězství je to jediné, na čem záleží."
 RAJ_the_enemy_of_my_enemy_tt: "§Y[JAP.GetAdjectiveCap]§! vláda vyhlásí válku protistraně v občanské válce a poskytne nám pomoc."
 RAJ_the_enemy_of_my_enemy_tt_2: "§Y[JAP.GetNameDef]§! se rovněž pokusí napadnout §Y[733.GetName]§! a předat jej nám."
 RAJ_the_government_of_india_act: "Zákon o správě Indie"
 RAJ_the_government_of_india_act_desc: "Zákon o správě Indie otevřel cestu k větší samosprávě v našich provinciích. Přenesením větší pravomoci na místní ministerstva můžeme uklidnit umírněné hlasy a posílit správní efektivitu, zatímco říše si pevně udrží kontrolu."
 RAJ_the_government_of_india_act_pp_bonus_tt: "Upraví §Y$RAJ_a_loyal_government$§! o [?RAJ_the_government_of_india_act_pp_bonus_based_on_compliance|+=%%0] $MODIFIER_POLITICAL_POWER_FACTOR$ za každý počáteční stát s více než §Y74%§! poslušnosti."
 RAJ_the_great_recovery: "Velká obnova"
 RAJ_the_great_recovery_desc: "Jizvy Velké hospodářské krize stále tíží naši ekonomiku, zpomalují pokrok a oslabují důvěru. Nyní však s obnovenou stabilitou a vizí setřeseme břemeno stagnace. Nepůjde jen o návrat k normálu, ale o začátek nové kapitoly pro naši zemi."
 RAJ_the_hindu_martial_tradition: "Hinduistická válečná tradice"
 RAJ_the_hindu_martial_tradition_desc: "Od bojovníků Šivádžího po obránce dharmy obnovíme naše dávné bojové tradice a připravíme náš lid na nadcházející střety."
 RAJ_the_indian_national_army: "Indická národní armáda"
 RAJ_the_indian_national_army_desc: "Indická národní armáda zosobňuje boj za nezávislost a sjednocuje vlastence pod jednou vlajkou k boji proti koloniální nadvládě. Se svým odhodláním a oběťmi je připravena vést Indii k osvobození a suverenitě."
 RAJ_the_indian_parliament: "Indický parlament"
 RAJ_the_indian_parliament_desc: "S rostoucími požadavky na samosprávu zřídíme indický parlament, který převezme civilní pravomoci od místokrále. Tento krok poskytne skutečnou autonomii domácímu vedení, samozřejmě v rámci říše."
 RAJ_the_integrity_of_india_act: "Zákon o integritě Indie"
 RAJ_the_integrity_of_india_act_desc: "Abychom čelili rostoucí hrozbě pobuřování a zachovali imperiální autoritu, přijmeme Zákon o integritě Indie. Tento zákon nám umožní zadržovat agitátory, omezovat politický nesouhlas a zajistit loajální správu napříč subkontinentem. Jednota musí být někdy vynucena."
 RAJ_the_jewel_becomes_the_crown: "Klenot se stává korunou"
 RAJ_the_jewel_becomes_the_crown_desc: "S pádem mateřské země je nyní na nás převzít odpovědnost za vedení v rámci imperiální rodiny. S novou energií využijeme rozsáhlé zdroje, kterými [ROOT.GetNameDef] disponuje, k osvobození srdce říše a zničení všech, kdo se odvážili pošpinit její zelené a malebné kraje."
 RAJ_the_ledo_road: "Cesta z Ledo"
 RAJ_the_ledo_road_desc: "Cesta z Ledo, vedoucí náročným terénem, je klíčovou zásobovací trasou spojující Indii se spojeneckými silami v Číně. Dokončení a zabezpečení této tepny zajistí nepřetržitý tok jednotek, surovin a vybavení potřebného k obratu situace v jihovýchodní Asii."
 RAJ_the_legacy_of_babur: "Dědictví Bábura"
 RAJ_the_legacy_of_babur_desc: "Mughalská říše kdysi sjednotila rozsáhlá území subkontinentu pod svou vlajkou. Dnes existují tací, kteří sní o obnovení její slávy a využívají odkaz Bábura k inspiraci nové éry imperiálního vzestupu a jednoty."
 RAJ_the_legacy_of_babur_tt: "Každý stát, ve kterém byli vyvolány nepokoje, obdrží: "
 RAJ_the_mughal_uprising: "Mughalské povstání"
 RAJ_the_mughal_uprising_desc: "Odlehlý severní region představuje ideální geografickou oblast pro odtržení od Britů.\nMístní vůdci rozdmýchali v srdcích lidí vzpomínky na slavnou minulost, kdy Mughalská říše vládla této zemi a lid byl svobodný utvářet svůj vlastní osud.\nInšalláh, stejně tak budeme i my."
 RAJ_the_mughal_uprising_tt2: "Budeme vlastnit všechny státy, které kontrolujeme na konci občanské války"
 RAJ_the_mughal_uprising_tt: "Odtrhneme se od §YBritského Rádže§! a §Rvyhlásíme válku za nezávislost§!."
 RAJ_the_need_for_a_mercantile_navy: "Potřeba obchodního námořnictva"
 RAJ_the_need_for_a_mercantile_navy_desc: "Námořní obchod je nejdůležitější způsob globálního obchodu. Potřebujeme námořnictvo schopné tyto dodávky zajišťovat a zároveň je chránit."
 RAJ_the_ordnance_factories_board: "Správa zbrojovek"
 RAJ_the_ordnance_factories_board_desc: "Sjednocení rozsáhlé sítě indických zbrojovek pod jednu správu zefektivní výrobu, zvýší účinnost a zajistí stabilní dodávky zbraní a munice. Tento základ posílí naši armádu a podpoří soběstačnost Indie v obranném průmyslu."
 RAJ_the_pakistan_movement: "Pákistánské hnutí"
 RAJ_the_pakistan_movement_desc: "Požadavky na muslimský Pákistán stále sílí. Pokud budou střety mezi hinduisty a muslimy pokračovat, jednotná Indie nemusí být udržitelná."
 RAJ_the_pakistan_movement_tt_1: "Obnovuje se, dokud nenastane:\n§Y-[PAK.GetName]§! je svobodný\n§Y-[PAK.GetName]§! kapituloval\n-Opakováno §Y5§!×.\n\nNa konci §Y90denního§! trvání efektu získáme: "
 RAJ_the_pakistan_movement_tt_2: "Po dobu §Y90§! dní"
 RAJ_the_peoples_liberation_army: "Vytvořit Lidovou osvobozeneckou armádu"
 RAJ_the_peoples_liberation_army_desc: "Disciplinovaná a ideologicky oddaná síla, Lidová osvobozenecká armáda povede boj za národní osvobození. Složená z dělníků a rolníků je připravena bránit revoluci a vytvořit nový řád."
 RAJ_the_punjab_accord: "Paňdžábská dohoda"
 RAJ_the_punjab_accord_desc: "Uznáním jedinečného postavení sikhské komunity a udělením omezené autonomie v Paňdžábu posílíme tradiční vazby loajality a služby. Na oplátku jejich podpora upevní autoritu, kterou má [ROOT.GetNameDef] v klíčovém regionu a zajistí, že tradice a stabilita půjdou ruku v ruce."
 RAJ_the_red_curtain_falls_over_asia: "Rudá opona se zatahuje nad Asií"
 RAJ_the_red_curtain_falls_over_asia_desc: "Zajistili jsme naši vlast.\nNyní je čas nést plamen revoluce k našim sousedům - slovem, letáky či zbraní."
 RAJ_the_red_curtain_falls_over_asia_desc_tt: "Odemkne rozhodnutí k šíření komunistické revoluce po celé Asii"
 RAJ_the_return_of_the_east_india_company: "Návrat Východoindické společnosti"
 RAJ_the_return_of_the_east_india_company_desc: "Po mnoha desetiletích bude Východoindická společnost znovu založena, aby mohla s nemilosrdnou efektivitou plně využít indický subkontinent."
 RAJ_the_return_of_the_east_india_company_tt: "Investiční schémata Východoindické společnosti a daně jsou nyní aktivní.\nOdemkne §Yrozhodnutí§! k vyplácení dividend investorům"
 RAJ_the_revolutionary_army_marches: "Revoluční armáda pochoduje"
 RAJ_the_revolutionary_army_marches_desc: "S jasným cílem naše armáda pochoduje - za revoluci, za Indii a za obyčejný lid."
 RAJ_the_riches_of_the_raj: "Bohatství Rádže"
 RAJ_the_riches_of_the_raj_desc: "Pod rozsáhlými pláněmi a drsnými pahorky se skrývají suroviny potřebné k pohonu říše ve válce. Ocel, ropa a další klíčové materiály budou těženy, zpracovány a využity k obraně říše."
 RAJ_the_riches_of_the_raj_targets_oil_tt: "Každý výchozí stát s §Y$state_resource_oil$§!£resources_strip|1 : \n Přidá produkci §Y+4§!£resources_strip|1. \n Přidá §G1§! §Y$infrastructure$§!."
 RAJ_the_riches_of_the_raj_targets_tt: "Každý výchozí stát s alespoň §Y20§! jednotkami §Y$state_resource_aluminium$§!£resources_strip|2 , §Y$state_resource_rubber$§!£resources_strip|3 , §Y$state_resource_chromium$§!£resources_strip|6 , §Y$state_resource_tungsten$§!£resources_strip|4, §Y$state_resource_coal$§!£resources_strip|0 nebo §Y$temporary_state_resource_steel$§!£resources_strip|5 : \n Přidá produkci §Y+4§! dodatečných jednotek dané suroviny. \n Přidá §G1§! §Y$infrastructure$§!."
 RAJ_the_second_duar_war: "2. Anglo-bhútánská válka"
 RAJ_the_second_duar_war_desc: "[BHU.GetAdjectiveCap] obyvatelé již nemohou být ponecháni jako nezávislý stát v situaci, jaká ve světě panuje. Musíme je plně začlenit do Indie."
 RAJ_the_second_gorkha_war: "2. Anglo-gurkhská válka"
 RAJ_the_second_gorkha_war_desc: "Nezávislost Nepálu je reliktem minulosti, která rozděluje subkontinent, jenž by měl být jednotný. Rozhodná kampaň přivede Gurkhy pod naši správu a zajistí Himálaj."
 RAJ_the_silk_road: "Obnovit Hedvábnou stezku"
 RAJ_the_silk_road_desc: "Hedvábná stezka kdysi přinášela říši bohatství a kulturu. Obnovením této historické obchodní sítě znovu získáme své místo v centru světového obchodu, obohatíme říši a podpoříme prosperitu napříč jejími rozsáhlými územími."
 RAJ_the_sun_sets: "Slunce zapadá"
 RAJ_the_sun_sets_desc: "Éra impérií se chýlí ke konci. Jak slábne [ENG.GetAdjective] moc, urychlíme jejich pád. Slunce nad jejich říší konečně zapadne a my povstaneme z jejího stínu."
 RAJ_the_sword_and_the_saffron: "Meč a šafrán"
 RAJ_the_sword_and_the_saffron_desc: "Náš osud je utvářen silou a vírou. Meč bude bránit naši zemi a šafránový prapor sjednotí náš lid pod jedním cílem."
 RAJ_the_true_mongols: "Praví Mongolové"
 RAJ_the_true_mongols_desc: "[Root.GetNameDef] je právoplatným dědicem mongolského odkazu, spojujícím sílu stepí s kulturou subkontinentu. Přijetím našich kořenů vyvoláme ducha pravých Mongolů a budeme dobývat a sjednocovat jako naši předkové."
 RAJ_the_varuna_class: "Třída Varuna"
 RAJ_the_varuna_class_desc: "Naše nejnovější hlavní loď je kolosálním technickým úspěchem. Proto si zaslouží jméno boha."
 RAJ_theocratic_rule: "Znovu kodifikovat dhimmi"
 RAJ_theocratic_rule_alt: "Mongolské dědictví"
 RAJ_theocratic_rule_alt_desc: "Jsme dědici dobyvatelů, pokračovatelé říše, která kdysi otřásla světem. Abychom uctili mongolský odkaz, musíme sjednotit síly a podrobit indický subkontinent jediné vládě, kde budou všichni spojeni věrností trůnu, nikoli vírou či původem. Před mocí říše se všichni skloní."
 RAJ_theocratic_rule_desc: "Práva nemuslimů byla za mughalské správy přísně vymezena. Je čas tyto otázky přizpůsobit modernímu světu a dokázat celé Indii, že jsme osvícenou říší."
 RAJ_threaten_princes: "Vyhrožovat knížatům"
 RAJ_threaten_princes_desc: "Knížata se podřídí našim požadavkům, nebo ponesou následky své neposlušnosti."
 RAJ_through_the_wakhan_corridor: "Přes Vachánský koridor"
 RAJ_through_the_wakhan_corridor_desc: "$RAJ_skibedi_san_ma_desc$"
 RAJ_thunder_elephants: "Hromoví sloni"
 RAJ_thunder_elephants_desc: "Majestátní sloni, symbol mughalské moci, se vracejí na bojiště jako zosobnění síly a tradice. Jejich mohutnost a přítomnost inspirují naše armády a nahánějí strach nepřátelům, čímž otevírají cestu k imperiálním vítězstvím."
 RAJ_timurid_bureaucracy: "Timúrovská byrokracie"
 RAJ_timurid_bureaucracy_desc: "Timúrovská byrokracie, vycházející z odkazu Timúra, představuje model efektivní správy a centralizované moci. Její obnova posílí správu říše a zajistí stabilitu a prosperitu napříč rozsáhlými územími."
 RAJ_to_shake_the_world: "Otřást světem"
 RAJ_to_shake_the_world_desc: "Průmyslový potenciál Indie je obrovský a nyní je čas jej uvolnit. Rozšiřováním továren, modernizací infrastruktury a využitím našich zdrojů proměníme Indii v průmyslového giganta schopného ovlivnit osud světa."
 RAJ_trade_federation_of_india: "Rebranding"
 RAJ_trade_federation_of_india_desc: "V posledních letech jsme dosáhli historického růstu a získali úroveň politické moci, o jaké se většině korporací může jen zdát. Některé státy pod naší kontrolou však stále nepřijímají vládu společnosti - možná by je mohl přesvědčit výrazný příliv finančních prostředků."
 RAJ_trade_federation_of_india_tt: "Odemkne rozhodnutí k získání domovského území vlastněných států s vysokou poslušností pomocí §Yfaktoru továren na spotřební zboží§! a §Ypolitické síly§!."
 RAJ_trade_port: "Obchodní přístav"
 RAJ_trade_port_desc: "Aden je zatím velmi malý přístav, ale s investicemi se může proměnit v prosperující obchodní centrum."
 RAJ_trade_protection: "Ochrana obchodu"
 RAJ_trade_protection_desc: "Abychom zajistili prosperitu naší ekonomiky, musíme chránit klíčové obchodní trasy a průmysl před zahraničním vykořisťováním. Posílení ochrany obchodu zabezpečí indické zdroje, podpoří domácí růst a ochrání naše trhy před vnějšími hrozbami."
 RAJ_trade_route_protection: "Ochrana obchodních tras"
 RAJ_trade_route_protection_desc: "Na východě i západě se formují nepřátelské síly. Musíme být schopni odradit každého, kdo by chtěl narušit přepravu zboží v našich vodách."
 RAJ_trainer_planes: "Cvičné letouny"
 RAJ_trainer_planes_desc: "Zkušení piloti jsou základem silného letectva. Investicemi do cvičných letounů zajistíme kvalitní výcvik a vybudujeme elitní piloty připravené bránit indické nebe."
 RAJ_tryst_with_destiny: "Setkání s osudem"
 RAJ_tryst_with_destiny_desc: "Před mnoha lety jsme uzavřeli smlouvu s osudem a nyní nadešel čas splnit náš slib - ne zcela, ne úplně, ale ve velké míře. O půlnoci, když svět spí, se Indie probudí k životu a svobodě."
 RAJ_two_nation_theory_: "Teorie dvou národů"
 RAJ_two_nation_theory__desc: "Teorie dvou národů tvrdí, že hinduisté a muslimové jsou odlišné národy, z nichž každý si zaslouží vlastní stát. Přijetím této ideologie uznáváme potřebu oddělených cest k sebeurčení a formujeme budoucnost subkontinentu prostřednictvím rozdělení a autonomie."
 RAJ_two_nation_theory_dlc: "$RAJ_two_nation_theory$"
 RAJ_two_nation_theory_dlc_desc: "$RAJ_two_nation_theory__desc$"
 RAJ_union_busting: "Potlačení odborů"
 RAJ_union_busting_desc: "Odbory jsou brzdou inovací a zásluhového postupu - pracovníkům nepomáhají a firmy zatěžují byrokracií. Je třeba tuto komunistickou agendu zničit dříve, než se rozšíří."
 RAJ_unite_the_subcontinent: "Sjednotit subkontinent"
 RAJ_unite_the_subcontinent_desc: "Rozdrobené státy subkontinentu jsou jen stínem své někdejší slávy. Jejich sjednocením pod mughalskou vlajkou obnovíme harmonii, sílu a velkolepost říše určené vládnout od hor až k mořím."
 RAJ_united_bengal: "Sjednocené Bengálsko"
 RAJ_united_bengal_desc: "Rozdělení Pákistánu na dvě země, Bengálsko a Pákistán, dává smysl. Vláda v Pákistánu by jen stěží dokázala efektivně spravovat vzdálenou bangladéšskou enklávu."
 RAJ_united_bengal_tt: "§Y[BAN.GetName]§! získá při rozdělení nezávislost"
 RAJ_uplifting_the_people_of_india: "Pozvednutí indického lidu"
 RAJ_uplifting_the_people_of_india_desc: "Indický lid musí být odhodlaný na své cestě k nezávislosti. K tomu je však nutné nejprve zajistit jeho základní potřeby - proto zavedeme odpovídající opatření."
 RAJ_uranium_tipped_bullets: "Uranem potažené střely"
 RAJ_uranium_tipped_bullets_desc: "Co jiného dělat s přebytkem uranu než jím opatřit naše střely?"
 RAJ_uranium_tipped_bullets_tt: "§Y$category_all_infantry$§!:\n    $STAT_ARMY_HARD_ATTACK$ §G+25%§!\n    $STAT_COMMON_PIERCING$ §G+100%§!\n§Y$category_cavalry$§!:\n    $STAT_ARMY_HARD_ATTACK$ §G+10%§!\n    $STAT_COMMON_PIERCING$ §G+40%§!\n§Y$category_artillery$§!:\n    $STAT_COMMON_PIERCING$ §G+100%§!\n§Y$category_tank_destroyers$§!\n    $STAT_ARMY_HARD_ATTACK$ §G+15%§!\n    $STAT_COMMON_PIERCING$ §G+20%§!\n§Y$anti_tank$§!\n    $STAT_ARMY_HARD_ATTACK$ §G+10%§!\n    $STAT_COMMON_PIERCING$ §G+20%§!\n§Y$mot_anti_tank_brigade$§!\n    $STAT_ARMY_HARD_ATTACK$ §G+10%§!\n    $STAT_COMMON_PIERCING$ §G+20%§!\n§Y$anti_air$§!\n    $STAT_AIR_ATTACK$ §G+10%§!\n§Y$mot_anti_air_brigade$§!\n    $STAT_AIR_ATTACK$ §G+10%§!"
 RAJ_urban_industrialism: "Městský industrialismus"
 RAJ_urban_industrialism_desc: "Budoucnost neleží na pastvinách, ale v továrnách.\nPouze rychlý průmyslový rozvoj může zajistit revoluci a připravit nás na nadcházející konflikty."
 RAJ_urban_industrialism_tt2: "Toto upraví pětiletý plán směrem k agrárnímu socialismu, což poskytne: "
 RAJ_urban_industrialism_tt: "Toto upraví pětiletý plán směrem k průmyslové expanzi, což poskytne §G+10%§! rychlosti výstavby"
 RAJ_urban_training: "Výcvik v městském prostředí"
 RAJ_urban_training_desc: "I když doufáme, že k tomu nedojde, je možné, že budeme muset bránit naše města. Musíme být připraveni zvládnout takovou situaci prostřednictvím specializovaného výcviku."
 RAJ_vertical_integration: "Vertikální integrace"
 RAJ_vertical_integration_desc: "Nedávné daňové optimalizace zůstaly zahraničními vládami téměř nepovšimnuty. Možná bychom mohli využít další mezery v zákonech ke snížení daní."
 RAJ_viceroys_body_guard: "Místokrálova garda"
 RAJ_viceroys_body_guard_desc: "Místokrálova garda je symbolem tradice, disciplíny a prestiže. Jejím zachováním a modernizací udržíme tento symbol autority a přizpůsobíme jej novým výzvám."
 RAJ_vultee_vengeance: "Vultee Vengeance"
 RAJ_vultee_vengeance_desc: "Získáním amerických letounů Vultee Vengeance můžeme výrazně rozšířit naše letectvo za velmi přijatelnou cenu."
 RAJ_war_taxes: "Válečné daně"
 RAJ_war_taxes_desc: "Náklady války vyžadují společnou oběť. Zavedením válečných daní můžeme financovat naše vojenské operace a zajistit zdroje potřebné k vítězství. Svobodná Indie stojí za každou rupii."
 RAJ_war_taxes_tt: "Odemkne rozhodnutí zavést válečné daně vůči každé zemi, se kterou jsme ve válce."
 RAJ_water_privatization: "Privatizace vodárenství"
 RAJ_water_privatization_desc: "Navážeme veřejně-soukromá partnerství s místními dodavateli vody za účelem zvýšení efektivity a kvality služeb."
 RAJ_womens_auxiliary_air_force: "Ženské pomocné letectvo"
 RAJ_womens_auxiliary_air_force_desc: "Ženské pomocné letectvo umožňuje ženám podílet se na leteckých operacích, od logistiky po komunikaci. Jejich zapojením posílíme naše letectvo a dokážeme, že každý Ind může přispět k obraně nebes."
 RAJ_womens_auxiliary_corps: "Ženský pomocný sbor"
 RAJ_womens_auxiliary_corps_desc: "Zřízením ženského pomocného sboru umožníme ženám sloužit v klíčových podpůrných rolích a posílíme tak naše ozbrojené síly. Jejich přínos podpoří logistiku, komunikaci i operace a ukáže, že každý Ind má své místo při zajištění naší budoucnosti."
 RAJ_womens_royal_indian_naval_service: "Ženská královská [ROOT.GetAdjective] námořní služba"
 RAJ_womens_royal_indian_naval_service_desc: "Vytvoříme ženskou královskou [ROOT.GetAdjective] námořní službu, která umožní ženám sloužit v námořnictvu."
 RAJ_work_with_local_leaders: "Spolupráce s místními vůdci"
 RAJ_work_with_local_leaders_desc: "Spoluprací s vlivnými regionálními představiteli můžeme rozšířit svůj vliv bez nadměrného vyčerpání zdrojů. Tito vůdci rozumějí potřebám svých oblastí a dokáží prosazovat změny, které prospívají jak jejich obyvatelům, tak zájmům Koruny."
 SSB_accept_tt: "Uzavřeme pakt o neútočení se všemi zeměmi, které přijmou Saadabadský pakt. Získáme přístup ke společnému stromu zaměření s ostatními členy, který nám pomůže dosáhnout společných cílů."
 SSB_baghlan_sugar_factory_branches: "Nové pobočky Baghlán Sugar Company"
 SSB_baghlan_sugar_factory_branches_desc: "Společnost Baghlán Sugar Company v současnosti staví továrny pouze pro [AFG.GetNonIdeologyName]. Mohli bychom umožnit, aby nové továrny byly budovány kdekoliv v zemích Saadabadského paktu, čímž bychom podpořili vzájemný hospodářský růst."
 SSB_basic_available_trigger_tt: "Není ve válce s žádným členem Saadabadského paktu"
 SSB_berlin_baghdad_railway_into_iran_afghanistan: "Společný obchod po železnici Berlín-Bagdád"
 SSB_berlin_baghdad_railway_into_iran_afghanistan_desc: "Železnice Berlín-Bagdád je hlavním pilířem [IRQ.GetAdjective] obchodu a hospodářství. Máme příležitost propojit tuto trať se železnicí Ankara-Kábul a umožnit ostatním signatářským zemím obchodovat po této trase."
 SSB_chromium_2_tt: "Dováží suroviny od ostatních členů paktu, přidává:\n§Y4§! £GFX_resources_strip|1, §Y5§!£GFX_resources_strip|4, §Y6§!£GFX_resources_strip|2, §Y6§!£GFX_resources_strip|5 přímo do §Yhlavního města§!."
 SSB_chromium_tt: "Dováží [TUR.GetAdjective] suroviny, přidává §Y10§! £GFX_resources_strip|6 do §Yhlavního města§!."
 SSB_combined_arms: "Kombinované zbraně"
 SSB_combined_arms_desc: "Po formalizaci aliance nadešel čas k poslednímu kroku sjednocení našich armád a zajištění, že se budeme schopni navzájem bránit."
 SSB_coordinate_military_production: "Rozšířit náš vliv"
 SSB_coordinate_military_production_desc: "Dny velkých říší a nadvlády jsou pryč - ve srovnání se zbytkem světa jsme zeslábli. Ale už nejsme sami. Stojíme sjednoceni Saadabadským paktem. Společně můžeme znovu povstat a zaujmout své místo vládců tohoto regionu."
 SSB_economic_cooperation: "Hospodářská spolupráce"
 SSB_economic_cooperation_desc: "S hrozbou vojenských titánů ze všech stran je potřeba hospodářské spolupráce mezi členy Saadabadského paktu stále zřejmější. Musíme si navzájem otevřít trhy a snížit cla, abychom omezili naši závislost na světových velmocích."
 SSB_expand_afghanistans_military_infrastructure: "[AFG.GetAdjectiveCap] poušní výcvik"
 SSB_expand_afghanistans_military_infrastructure_desc: "[AFG.GetNonIdeologyName] má bohaté zkušenosti s bojem v poušti a se zvládáním obtížného terénu. Všechny členské státy mohou z těchto znalostí výrazně těžit."
 SSB_expand_iranian_oil_fields: "Vývoz [PER.GetAdjective] ropy"
 SSB_expand_iranian_oil_fields_desc: "Naše závislost na světových velmocích roste a představuje riziko, které si nemůžeme dovolit. Musíme rozšířit infrastrukturu našich ropných polí, abychom byli v této oblasti soběstační."
 SSB_expand_irans_military_infrastructure: "Rozšířit [PER.GetAdjective] vojenskou infrastrukturu"
 SSB_expand_irans_military_infrastructure_desc: "Musíme rozšířit naši vojenskoprůmyslovou kapacitu v rámci unie a každý musí přispět svým dílem. Nová továrna na vybavení bude postavena v Íránu."
 SSB_expand_iraqs_military_infrastructure: "[IRQ.GetAdjectiveCap] zpracování surovin"
 SSB_expand_iraqs_military_infrastructure_desc: "Abychom přestali být závislí na silnějších zemích, musíme rozšířit vlastní těžbu a zpracování surovin, zajistit obchod uvnitř našich hranic a posílit naši soběstačnost."
 SSB_expand_road_and_rail_connections: "Rozšířit silniční a železniční spoje"
 SSB_expand_road_and_rail_connections_desc: "Jak Saadabadský pakt sílí, je nevyhnutelné, že postavíme železnici z Istanbulu do Kábulu, která propojí naši infrastrukturu."
 SSB_expand_turkeys_military_infrastructure: "[TUR.GetAdjectiveCap] horský sbor"
 SSB_expand_turkeys_military_infrastructure_desc: "[TUR.GetNameDefCap] je plný hor, a proto má [TUR.GetAdjective] armáda bohaté zkušenosti s horským bojem. Sdílení těchto znalostí a technologií v rámci paktu bude přínosem pro všechny."
 SSB_expand_turkish_chromium_deposits: "Vývoz [TUR.GetAdjective] chromu"
 SSB_expand_turkish_chromium_deposits_desc: "Naše závislost na světových velmocích roste a představuje riziko, které si nemůžeme dovolit. Musíme rozšířit naše ložiska chromu, abychom byli v této oblasti soběstační."
 SSB_faction_invite_tt: "Pozveme signatářské země Saadabadského paktu s §Ynezařazenou§! ideologií do naší nové frakce."
 SSB_flags_tt: "[PER.GetFlag][TUR.GetFlag][IRQ.GetFlag][AFG.GetFlag]"
 SSB_form_the_saadabad_alliance: "Návrh plnohodnotné aliance"
 SSB_form_the_saadabad_alliance_desc: "Saadabadský pakt začal jako jednoduchý pakt o neútočení. Vyrostl však v něco mnohem většího - se společným vojenským i hospodářským rozvojem a sdílenými zdroji je načase vytvořit oficiální Saadabadskou alianci."
 SSB_integration_of_our_infrastructure: "Integrace naší infrastruktury"
 SSB_integration_of_our_infrastructure_desc: "S narůstajícím napětím po celém světě a se supervelmocemi ze všech stran už prostý hospodářský a vojenský pakt nestačí. Musíme plně integrovat naši infrastrukturu, zrušit veškerá cla a sdílet naše zdroje."
 SSB_is_in_faction_tt: "Je členem Saadabadského paktu"
 SSB_is_leader_tt: "Je vůdcem Saadabadského paktu"
 SSB_joint_military_exercises: "Společná vojenská cvičení"
 SSB_joint_military_exercises_desc: "Začneme sjednocovat náš výcvikový proces a spolupracovat na zmenšení rozdílů mezi našimi armádami, čímž vznikne polounifikovaná Saadabadská armáda."
 SSB_military_cooperation: "Vojenská spolupráce"
 SSB_military_cooperation_desc: "Tváří v tvář hrozbě, že „Velká hra“ skončí naším podrobením některou z velmocí, je vojenská spolupráce v rámci Saadabadského paktu důležitější než kdy dřív. Pokud se nám nepodaří sjednotit obranu, budeme poraženi jednotlivě."
 SSB_oil_2_tt: "Dováží suroviny od ostatních členů paktu, přidává:\n§Y4§! £GFX_resources_strip|4, §Y5§!£GFX_resources_strip|2, §Y6§!£GFX_resources_strip|4, §Y6§!£GFX_resources_strip|6 přímo do §Yhlavního města§!."
 SSB_oil_tt: "Dováží [PER.GetAdjective] suroviny, přidává §Y10§! £GFX_resources_strip|1 do §Yhlavního města§!."
 SSB_resource_tt: "$SSB_flags_tt$$trade_cost_for_target_factor_tt$"
 SSB_saadabad_research_cooperation: "Výzkumná spolupráce Saadabadského paktu"
 SSB_saadabad_research_cooperation_desc: "Po formalizaci aliance je logickým dalším krokem sjednotit naše výzkumné a vědecké kapacity a vytvořit jednotný vědecký výbor."
 SSB_savak_protect_us: "SAVAK chrání nás všechny"
 SSB_savak_protect_us_desc: "SAVAK odvádí skvělou práci při ochraně našeho národa prostřednictvím kontrarozvědky. Máme příležitost nabídnout tuto ochranu i zbytku paktu sdílením našich znalostí z oblasti kontrarozvědky, což našim spojencům přinese výhody téměř bez nákladů."
 SSB_spirit_tooltip: "Upravuje §YSaadabadský pakt§!:"
 SSB_the_saadabad_pact: "Saadabadský pakt"
 SSB_the_saadabad_pact_desc: "Nemáme co ztratit a vše získat, pokud zůstaneme přátelští se svými sousedy. Myšlenka smlouvy, která by toto přátelství formalizovala, byla několikrát nastolena - je nejvyšší čas převzít iniciativu a zajistit, aby toto přátelství bylo zakotveno ve smlouvě."
