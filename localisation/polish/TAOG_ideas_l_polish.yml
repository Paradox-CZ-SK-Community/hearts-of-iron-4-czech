 SIA_military_wing_label: "Vojenské křídlo" # todo: NEW TRANSLATION
 SIA_wing_state_full_support: "§GPlná podpora§!" # todo: NEW TRANSLATION
 SIA_wing_state_slight_support: "§GMírná podpora§!" # todo: NEW TRANSLATION
