 NZL_railways_board: "Vládní železniční rada"
 NZL_railways_board_desc: "Vládní železniční rada byla vytvořena v roce 1931 jako restrukturalizace železničního oddělení ve snaze oddělit rozhodování od vládních úřadů. Od jejího zřízení však není na železniční síti patrné téměř žádné zlepšení. Roste tlak na vládu, aby radu zrušila a převzala zpět přímou kontrolu."
 NZL_great_depression: "Velká hospodářská krize"
 NZL_great_depression_desc: "Kolaps světového hospodářství v roce 1929 zasáhl převážně zemědělské hospodářství Nového Zélandu velmi tvrdě. Jelikož země nakupovaly z Nového Zélandu méně produkce, mnoho lidí se ocitlo bez práce, což snížilo kupní sílu spotřebitelů a následně způsobilo kolaps dalších odvětví. Roky úsporných opatření zanechaly národ toužící po změně směru. "
 NZL_commonwealth_loyalty: "Loajalita k Britskému společenství"
 NZL_commonwealth_loyalty_desc: "Nový Zéland zůstává oddaným členem Britského společenství a uznává krále jako právoplatnou hlavu státu. Hospodářství Nového Zélandu je také silně integrováno do širšího imperiálního hospodářského systému."
