 AST_faction_training_initiative_idea_1: "Výcviková iniciativa"
 AST_faction_training_initiative_idea_1_desc: "Iniciativa společného výcviku Pacifického odboje je kooperativní program mezi jeho členy, který zajišťuje, že všichni spojenečtí vojáci podstoupí stejně přísný vojenský výcvik." # todo: CHANGED
