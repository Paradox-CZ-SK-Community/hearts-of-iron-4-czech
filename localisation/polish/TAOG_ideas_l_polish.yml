 idea_SIA_songsuradet_ascendant_0_desc: "Po úspěšném odolání hněvu vlády si Phraya Songsuradet upevnil svou základnu a vyšel z toho silnější. Nyní je to, co lidé nazývají nedotknutelným, příliš prominentní a zakořeněný, aby ho bylo možné odstranit.\nPravděpodobně bude zasahovat do vládních politik a zpomalovat rozhodování, aby si zajistil, že nebude opět cílem čistky." # todo: NEW TRANSLATION
