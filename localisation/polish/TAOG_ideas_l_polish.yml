 AST_unratified_westminster_act_idea: "Neradifikovaný Westminsterův akt" # todo: NEW TRANSLATION
 AST_unratified_westminster_act_idea_desc: "Statute of Westminster byl přijat v roce 1931, což umožnilo samosprávným dominím [ENG.GetNameDef] zvýšit jejich suverenitu. Pokud bychom ho ratifikovali, většina pravomocí britského parlamentu legislativně pro [AST.GetName] by byla odebrána." # todo: NEW TRANSLATION
