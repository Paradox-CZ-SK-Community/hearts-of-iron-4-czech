 AST_singapore_strategy_idea: "Výstavba obrany Singapuru"
 AST_singapore_strategy_idea_desc: "Na žádost Austrálie vyvineme úsilí ke zlepšení obranných staveb v Singapuru. Singapurská strategie je koneckonců klíčovou součástí pacifické obranné politiky.\n\n§W§YPři odstranění§! (§YSingapur§!):\n Přidá §G2§! §Yletecké základny§!.\n Přidá §G2§! §Ynámořní základny§!.\n Přidá §G1§! §Ypobřežní pevnost§!.§!\n"
