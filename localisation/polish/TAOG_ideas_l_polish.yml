 AST_faction_training_initiative_idea_1: "Iniciativa výcviku" # todo: NEW TRANSLATION
 AST_faction_training_initiative_idea_1_desc: "Společná výcviková iniciativa Tichomořského odporu je kooperativní program mezi jeho členy, zajišťující, že všichni spojenečtí vojáci projdou stejně přísným výcvikem.\n\nS více než §Y4§! členy frakce bude §YIniciativa výcviku§! §Gupgradována§!." # todo: NEW TRANSLATION
