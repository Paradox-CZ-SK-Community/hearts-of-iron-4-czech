 AST_anti_fascist_measures: "Antifašistická opatření"
 AST_anti_fascist_measures_desc: "Fašismus ještě do Austrálie nezaryl své drápy a demokratické síly chtějí, aby to tak zůstalo. Commonwealth Investigation Branch bude sledovat a zadržovat všechny podezřelé živly, aby zabránila jakýmkoli fašistickým skupinám získat vliv."
 ABDA_corps_expeditionnaire_spirit: "Corps Expéditionnaire"
 ABDA_corps_expeditionnaire_spirit_desc: "Francouzské síly nasazené na pacifickém válčišti byly zoceleny koloniální službou a zvyklé působit daleko od domova v obtížných podmínkách. Jejich zkušenosti z bojů v jihovýchodní Asii jim dávají zvláštní povědomí o japonské taktice a terénu, díky čemuž jsou odolnou silou, když nepřítel tlačí vpřed."
 ABDA_maintain_strategic_flexibility_spirit: "Strategická flexibilita"
 ABDA_maintain_strategic_flexibility_spirit_desc: "Americká průmyslová produkce je směrována na pacifické válčiště a výroba loděnic je urychlována, aby udržela flotilu schopnou promítat sílu napříč celou šíří oceánu. Odmítáním přílišného vázání na jedinou frontu Spojené státy zajišťují, že jejich námořní síla může být nasazena všude tam, kde si to situace vyžádá."
 AST_toe_the_line_spirit: "Držet se linie"
 AST_toe_the_line_spirit_desc: "Stát vyzval k obětem a obyvatelstvo odpovědělo. Přídělový systém, delší pracovní doba a přesměrování civilní výroby k národnímu úsilí uvolnily zdroje, které by vláda jinak neměla jak získat. Jde o přísné uspořádání, a ne všeobecně oblíbené."
