 ABDA_supreme_command: "Vrchní velení ABDACOMu" # todo: NEW TRANSLATION
 ABDA_supreme_command_desc: "Spojené americké, britské, nizozemské a australské velení (ABDACOM) ustanovilo jednotnou námořní doktrínu napříč všemi členskými námořnictvy. Jak se aliance prohlubuje, sdílené zpravodajství, koordinace hlídkových úkolů a vzájemná logistická podpora postupně zvyšují bojovou účinnost každé flotily, která nese prapor ABDACOMu." # todo: NEW TRANSLATION
