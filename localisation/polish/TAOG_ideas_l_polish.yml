 idea_SIA_an_absolute_monarchy: "Absolutní monarchie"
 idea_SIA_an_absolute_monarchy_desc: "Veškerá politická autorita spočívá v koruně. Královo slovo je zákon, nesouhlas je potlačován a plná váha královské prestiže je vržena za národní mobilizaci. Trůn velí loajalitě a armáda je jeho nástrojem."
 idea_SIA_a_constituional_monarchy: "Konstituční monarchie"
 idea_SIA_a_constituional_monarchy_desc: "Ústavní rámec vymezuje hranice královské moci a zakotvuje práva lidu. S korunou jako sjednocujícím symbolem, nikoli absolutní autoritou, se národ stává stabilnějším, otevřenějším novým myšlenkám a sladěnějším s demokratickým světem."
