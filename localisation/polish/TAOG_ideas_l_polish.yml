 AST_unratified_westminster_act_idea_desc: "Westminsterský statut byl přijat v roce 1931 a umožnil [ENG.GetAdjecive] samosprávným dominiím zvýšit svou svrchovanost. Kdybychom jej ratifikovali, většina pravomocí britského parlamentu vydávat zákony i ve jménu [AST.GetNonIdeologyName] by byla odstraněna. "
