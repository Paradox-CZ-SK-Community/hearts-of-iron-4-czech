 AST_imperial_pressure_spirit_desc: "Kvůli nedávným událostem již nelze popírat, že se australská politika posouvá směrem nevhodným pro národ pod záštitou Britského společenství. [ENG.GetNameDefCap] se pokusí navést náš národ zpět na předurčenou cestu, ale jejich trpělivost nemusí být věčná.\n\n§WBude odstraněno, jakmile §Y[AST.GetName]§! nebude §Y[ENG.GetAdjecive]§! subjektem§!"
