l_polish:
 idea_INS_volksraad: "Volksraad"
 idea_INS_volksraad_desc: "Volksraad je rada zřízená Nizozemskem v roce 1918 jako součást systému „etické politiky“, jejímž cílem bylo vytvořit systém polodemokracie, v němž by mohly být zastoupeny různé etnické menšiny a kultury napříč souostrovím. Ačkoli je teoreticky demokratické povahy, generální guvernér a nizozemská koruna mají bezpodmínečné právo veta."
 INS_volksraad_custom_tt: "Umožňuje najmout §Yporadce Volksraadu§!\nUmožňuje používat §Yrozhodnutí Volksraadu§!"
 INS_great_depression: "Velká hospodářská krize"
 INS_great_depression_desc: "Ačkoli přímý dopad velké hospodářské krize na Indie je malý, následná protekcionistická politika, kterou země po celém světě zavedly, měla ničivý dopad na hospodářství Indií, jež je závislé na nepřetržitém vývozu surovin, jako je kaučuk a ropa."
 INS_great_depression_tt: "Upraví §Y$INS_great_depression$§! o:"
 INS_dutch_east_indies: "Špatně řízená správa"
 INS_dutch_east_indies_desc: "Východní Indie je rozsáhlé souostroví obsahující stovky odlišných kultur a jazyků, což z ní činí notoricky obtížně spravovatelnou kolonii. Různá hnutí za nezávislost, kulturní bariéry a hospodářské dopady velké hospodářské krize této situaci nepomohly a správa funguje velmi neefektivně. „Etická politika“, zavedená v roce 1918, se pokusila situaci zlepšit nařízením etických pracovních předpisů a poskytnutím demokratického zastoupení menšinovým skupinám, velká hospodářská krize však způsobila, že zůstala z větší části nevymáhána."
 INS_dutch_east_indies_tt: "Upraví §Y$INS_dutch_east_indies$§! o:"
 INS_volksraad_tt: "Upraví §Y$INS_dutch_east_indies$§! o:"
 INS_royal_netherlands_east_indies_army_desc: "Koninklijk Nederlands Indisch Leger (KNIL) je dlouhodobě existující armáda Východní Indie, působící nezávisle na Nizozemsku. KNIL tvoří evropští i indonéští vojáci, avšak kulturní a jazykové bariéry mezi mnoha kulturami souostroví a Nizozemskem činí nábor obtížným a pomalým procesem."
 idea_INS_netherlands_most_precious_jewel: "Nejcennější klenot Nizozemska"
 idea_INS_netherlands_most_precious_jewel_desc: "Nizozemská východní Indie je kolonií Nizozemska už zhruba 350 let a správa kolonie je těsně propojena s nizozemskou vládou. Východní Indie bývá často označována za „klenot v nizozemské koruně“ a Nizozemsko neprojevilo žádnou touhu uvolnit sevření svého drahocenného klenotu."
 INS_netherlands_most_precious_jewel_tt: "£GFX_trigger_no Může zvýšit autonomii na Svobodný"
