 idea_SIA_overheated_economy: "Přehřátá ekonomika" # todo: NEW TRANSLATION
 idea_SIA_overheated_economy_desc: "Ekonomika byla tlačena za své přirozené meze. Spotřebitelská poptávka předběhla kapacitu a stavební boom se zastavil, zatímco se věci ochlazují." # todo: NEW TRANSLATION
