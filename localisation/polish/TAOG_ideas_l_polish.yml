 idea_SIA_an_absolute_monarchy: "Absolutní monarchie" # todo: NEW TRANSLATION
 idea_SIA_an_absolute_monarchy_desc: "Veškerá politická autorita spočívá v koruně. Královo slovo je zákon, nesouhlas je potlačován a plný váhový význam královského prestiže je vržen za národní mobilizaci. Trůn požaduje loajalitu a armáda je jeho nástrojem." # todo: NEW TRANSLATION
 idea_SIA_a_constituional_monarchy: "Konstituční monarchie" # todo: NEW TRANSLATION
 idea_SIA_a_constituional_monarchy_desc: "Ústavní rámec definuje meze královské moci a zaručuje práva lidu. S korunou jako sjednocujícím symbolem spíše než absolutní autoritou roste národ stabilnější, otevřenější novým myšlenkám a více sladěný s demokratickým světem." # todo: NEW TRANSLATION
