 idea_SIA_death_to_nationalists: "Smrt nacionalistům" # todo: NEW TRANSLATION
 idea_SIA_death_to_nationalists_desc: "Antinacionalistické nálady procházejí řadami, dávají našim silám výhodu proti nacionalistickým armádám Číny." # todo: NEW TRANSLATION
