 idea_SIA_the_military_oversight_bureau_desc: "Úřad vojenského dohledu stanovuje vyšší standardy pro nové velitele a urychluje rozvoj odbornosti v důstojnickém sboru." # todo: NEW TRANSLATION
 idea_SIA_public_credit_debt: "Veřejný dluh" # todo: NEW TRANSLATION
 idea_SIA_public_credit_debt_desc: "Úvěrové závazky státu jsou trvalým odlivem ekonomiky, spotřebovávají zdroje, které by jinak proudily do výroby a civilního zboží." # todo: NEW TRANSLATION
