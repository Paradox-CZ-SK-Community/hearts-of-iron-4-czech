 idea_SIA_the_yellow_dossier: "Žlutý spis" # todo: NEW TRANSLATION
 idea_SIA_the_yellow_dossier_desc: "Tajná zpráva o stavu domácího průmyslu vynutila řešení zakořeněných neefektivit. Požadované reformy nesou ovoce v našich továrnách, ač narušení, která přinášejí, nejsou bez nákladů." # todo: NEW TRANSLATION
