 NZL_railways_board: "Správní rada státních drah" # todo: NEW TRANSLATION
 NZL_railways_board_desc: "Správní rada státních drah byla vytvořena v roce 1931 jako restrukturalizace železničního úřadu ve snaze oddělit rozhodování od vládních oddělení. Nicméně od jejího zřízení není patrné výrazné zlepšení železniční sítě. Roste tlak, aby vláda radu zrušila a převzala přímou kontrolu." # todo: NEW TRANSLATION
 NZL_great_depression: "Velká hospodářská krize" # todo: NEW TRANSLATION
 NZL_great_depression_desc: "Kolaps globální ekonomiky v roce 1929 tvrdě zasáhl převážně zemědělskou ekonomiku Nového Zélandu. S klesající poptávkou po novozélandských produktech mnoho lidí přišlo o práci, což snížilo kupní sílu spotřebitelů a následně způsobilo kolaps dalších odvětví. Roky úsporných opatření zanechaly národ toužící po změně směru." # todo: NEW TRANSLATION
 NZL_commonwealth_loyalty: "Věrnost Britskému společenství" # todo: NEW TRANSLATION
 NZL_commonwealth_loyalty_desc: "Nový Zéland zůstává oddaným členem Britského společenství a zachovává krále jako legitimního head of state. Ekonomika Nového Zélandu je rovněž silně integrována do širšího impériového ekonomického systému." # todo: NEW TRANSLATION
