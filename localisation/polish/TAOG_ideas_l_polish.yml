 idea_SIA_death_to_communists: "Smrt komunistům"
 idea_SIA_death_to_communists_desc: "Protikomunistické nadšení prostupuje řadami a dává našim silám výhodu proti komunistickým armádám Číny."
 idea_SIA_death_to_nationalists: "Smrt nacionalistům"
 idea_SIA_death_to_nationalists_desc: "Protinacionalistické nálady prostupují řadami a dávají našim silám výhodu proti nacionalistickým armádám Číny."
 idea_SIA_breaking_the_burmese_line: "Prolomení barmské linie"
 idea_SIA_the_yellow_dossier: "Žlutý spis"
 idea_SIA_the_yellow_dossier_desc: "Tajná zpráva o stavu domácího průmyslu nás donutila vypořádat se s hluboce zakořeněnou neefektivitou. Reformy, které požaduje, přinášejí v našich továrnách ovoce, i když narušení, která s sebou nesou, nejsou bez následků."
 idea_SIA_the_yellow_dossier_2: "$idea_SIA_the_yellow_dossier$"
 idea_SIA_the_yellow_dossier_2_desc: "$idea_SIA_the_yellow_dossier_desc$"
 idea_SIA_pacific_war_preparations: "Přípravy na válku v Pacifiku"
 idea_SIA_a_race_against_time: "Závod s časem"
 idea_SIA_overheated_economy: "Přehřáté hospodářství"
 idea_SIA_overheated_economy_desc: "Hospodářství bylo vyhnáno za své přirozené meze. Spotřebitelská poptávka překonala kapacity a stavební boom se zastavil, zatímco situace chladne."
 idea_SIA_ending_military_grift: "Ukončení vojenské korupce"
 idea_SIA_the_military_oversight_bureau: "$SIA_military_oversight_bureau$"
 idea_SIA_the_military_oversight_bureau_desc: "Úřad vojenského dohledu stanovuje vyšší standardy pro nové velitele a urychluje rozvoj odbornosti napříč důstojnickým sborem."
 idea_SIA_public_credit_debt: "Dluh z veřejného úvěru"
 idea_SIA_public_credit_debt_desc: "Úvěrové závazky státu jsou neustálou zátěží pro hospodářství a spotřebovávají zdroje, které by jinak proudily do výroby a spotřebního zboží."
 idea_SIA_public_credit_debt_2: "Splácení $idea_SIA_public_credit_debt$"
 idea_SIA_public_credit_debt_2_desc: "$idea_SIA_public_credit_debt_desc$"
 idea_SIA_revision_of_unequal_treaties: "Revize nerovných smluv"
 idea_SIA_purged_military: "Pročištěná armáda"
 idea_SIA_purged_military_desc: "Odstranění důstojníků považovaných za politicky nespolehlivé připravilo armádu o zkušené vedení, což brzdí organizaci i rozvoj zbývajících jednotek."
 SIA_khana_ratsadon_inlay_title: "Khana Ratsadon"
 SIA_civilian_wing_label: "Civilní křídlo"
 SIA_military_wing_label: "Vojenské křídlo"
 SIA_wing_state_full_support: "§GPlná podpora§!"
 SIA_wing_state_slight_support: "§GMírná podpora§!"
 SIA_wing_state_neutral: "§YNeutrální§!"
 SIA_wing_state_opposition: "§RV opozici§!"
 SIA_wing_state_rebellious: "§RVzpurné§!"
 SIA_civilian_wing_history_tt: "Civilní frakci Khana Ratsadon vedou progresivní správci a technokraté, především §YPridi Banomyong§!. Pridi studoval právo ve Francii a vrátil se s ambicemi provést pozemkovou reformu, státní hospodářské plánování a ústavní demokracii, která by skutečně posílila obyčejné lidi.\n\nCivilní křídlo je obecně §Gpro rozvoj§!, upřednostňuje investice do vzdělání, infrastruktury a průmyslu. Ke značným vojenským výdajům je skeptické a obává se jakéhokoli sklouzávání k vládě silné ruky. Jeho podporu lze nejsnáze získat politikami, které modernizují stát a chrání ústavní vládu."
 SIA_military_wing_history_tt: "Vojenské frakci Khana Ratsadon dominují armádní důstojníci, kteří se považují za skutečné strážce revoluce. Její nejambicióznější postavou je §YPlaek Phibunsongkhram§!, plukovník, jehož obdiv k nacionalistickým hnutím Evropy s každým rokem roste.\n\nVojenské křídlo je §Gpro přezbrojení§! a tíhne k silnému centralizovanému státu. K Pridiho hospodářským myšlenkám, které považuje za nebezpečně radikální, chová podezření a má jen málo trpělivosti s civilním zasahováním do obranných záležitostí. Jeho loajalitu lze nejsnáze zajistit vojenskými investicemi a politikami, které promítají sílu národa."
 idea_SIA_wing_promotion_disruption: "Frakční přeskupení" # todo: NEW TRANSLATION
 idea_SIA_wing_promotion_disruption_desc: "Otevřené upřednostnění jedné větve Khana Ratsadon vyvedlo vládu z rovnováhy. Pošlapaná frakce se zdržuje, armádní rutina je narušena a běžná správa trpí, dokud se nové uspořádání neujme." # todo: NEW TRANSLATION
 idea_SIA_military_wing_unrest: "Vojenské křídlo v povstání" # todo: NEW TRANSLATION
 idea_SIA_military_wing_unrest_desc: "Trpělivost důstojníků opět vypršela. Poté, co se jim nepodařilo uchvátit moc přímo, vojenské křídlo nyní ventiluje svůj hněv sabotáží, dezercemi a otevřeným odmítáním spolupráce. Bojová síla armády se rozpadá, dokud nejsou nespokojenci přivedeni k poslušnosti." # todo: NEW TRANSLATION
 idea_SIA_civilian_wing_unrest: "Civilní křídlo v povstání" # todo: NEW TRANSLATION
 idea_SIA_civilian_wing_unrest_desc: "Pridiho frakce znovu ztratila důvěru ve vládu. Odepřeni druhé šance na moc, civilní křídlo se uchyluje ke stávkám, byrokratickým překážkám a agitaci ve městech. Ekonomika se zastavuje a země se stává neovladatelnou, dokud se emoce neuklidní." # todo: NEW TRANSLATION
 idea_SIA_unwavering_civilian_support: "Neochvějná podpora civilistů" # todo: NEW TRANSLATION
 idea_SIA_unwavering_civilian_support_desc: "S rozpuštěným vojenským křídlem a vyřešenou otázkou legitimity civilní správa není zpochybňována. Osvobozeni od vměšování armády se Pridiho technokraté vrhají do řízení s horlivostí, jakou stará koalice nikdy nedokázala projevit." # todo: NEW TRANSLATION
 idea_SIA_unified_khana_ratsadon: "Sjednocená lidová strana" # todo: NEW TRANSLATION
 idea_SIA_unified_khana_ratsadon_desc: "Starý spor mezi vojáky a civilisty skončil. S oběma křídly Khana Ratsadon táhnoucími konečně jedním směrem může vláda jednat s jednotou účelu, jakou dosud nepoznala. Vojáci, úředníci a průmyslníci nyní pracují jako jedno." # todo: NEW TRANSLATION
