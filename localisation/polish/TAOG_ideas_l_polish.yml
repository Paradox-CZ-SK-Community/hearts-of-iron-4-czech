 INS_anti_colonialist_sentiment_idea: "Protikoloniální nálady"
 INS_anti_colonialist_sentiment_idea_desc: "Indonéští revolucionáři působí v našem národě a šíří mezi veřejností propagandu, což vede k rostoucím protikoloniálním náladám."
 INS_revolutionaries_working_with_indonesians_idea: "Revolucionáři spolupracují s Indonésany"
 INS_revolutionaries_working_with_indonesians_idea_desc: "[ROOT.GetAdjectiveCap] komunisté byli přistiženi při komunikaci s indonéskými vůdci a jsou podezřelí z příprav ozbrojené revoluce."
 idea_SIA_civilian_full_support: "Civilní křídlo: §Gplná podpora§!"
 idea_SIA_civilian_full_support_desc: "Civilní křídlo pevně stojí za vládou. Správci a technokraté poskytují své odborné znalosti a pohánějí rozvoj kupředu."
 idea_SIA_civilian_slight_support: "Civilní křídlo: mírná podpora"
 idea_SIA_civilian_slight_support_desc: "Civilní křídlo obecně podporuje směřování vlády. Jejich spolupráce přináší skromné, ale hmatatelné výhody."
 idea_SIA_civilian_neutral: "Civilní křídlo: neutrální"
 idea_SIA_civilian_neutral_desc: "Civilní křídlo vládě nepomáhá ani jí nepřekáží. Správa funguje, ale bez hybné síly skutečného politického souladu."
 idea_SIA_civilian_opposition: "Civilní křídlo: v opozici"
 idea_SIA_civilian_opposition_desc: "Civilní křídlo se obrátilo proti vládě. Úředníci pracují liknavě a rozpočty jsou špatně rozdělovány, což brzdí státní aparát."
 idea_SIA_civilian_rebellious: "Civilní křídlo: §Rvzpurné§!"
 idea_SIA_civilian_rebellious_desc: "Civilní křídlo je v otevřeném vzdoru. Nestabilita se šíří a hrozba politického rozkolu roste každým dnem."
 idea_SIA_military_full_support: "Vojenské křídlo: §Gplná podpora§!"
 idea_SIA_military_full_support_desc: "Vojenské křídlo pevně stojí za vládou. Důstojníci podporují náborové kampaně i výrobu zbraní a směřují zdroje armády k národním cílům."
 idea_SIA_military_slight_support: "Vojenské křídlo: mírná podpora"
 idea_SIA_military_slight_support_desc: "Vojenské křídlo je obecně ochotné spolupracovat. Jeho podpora přináší skromná zlepšení v náboru a výrobě, i když bez plného nasazení."
 idea_SIA_military_neutral: "Vojenské křídlo: neutrální"
 idea_SIA_military_neutral_desc: "Vojenské křídlo nezaujalo žádné stanovisko. Armáda plní své povinnosti bez nadšení i odporu a vyčkává, jak se situace vyvine."
 idea_SIA_military_opposition: "Vojenské křídlo: v opozici"
 idea_SIA_military_opposition_desc: "Vojenské křídlo pracuje proti vládě. Důstojníci podkopávají výrobní úsilí a nadšení pro vládní věc se z řad vojska vytrácí."
 idea_SIA_military_rebellious: "Vojenské křídlo: §Rvzpurné§!"
 idea_SIA_military_rebellious_desc: "Vojenské křídlo je na pokraji otevřeného vzdoru. Odvody jsou sabotovány, výroba zbraní trpí a nad zemí se vznáší přízrak puče."
 idea_SIA_defenders_of_constitutional_liberty: "Obránci ústavní svobody"
 idea_SIA_civil_service_heroism_1: "Hrdinství státní služby"
 idea_SIA_civil_service_heroism_1_desc: "Státní služba se postavila výzvě čelem a její oddanost i odbornost tiše urychlují tempo výzkumu a rozvoje státu."
