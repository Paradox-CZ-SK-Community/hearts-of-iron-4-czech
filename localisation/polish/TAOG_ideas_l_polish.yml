 AST_australian_culture_investments_idea: "Investice do australské kultury"
 AST_australian_culture_investments_idea_desc: "§W§YPři odstranění§!:\nPřidá §Y$AST_a_sense_of_place$§!, který poskytuje\nStabilita: §G+10.00 %§!\nVálečná podpora: §G+10.00 %§!.§!\n"
 AST_a_sense_of_place: "Pocit domova"
 AST_a_sense_of_place_desc: "Národní identita je pouto, které drží lid pohromadě. Pod prosperující kulturou se Australané sjednotili, odhodlaní vzdorovat komukoli, kdo by mohl ohrozit jejich hranice."
 AST_a_sense_of_place_upgraded: "Pocit domova"
 AST_a_sense_of_place_upgraded_desc: "Národní identita, která kdysi tiše vzkvétala, získala tvrdší hranu. Už nejde jen o hrdost na zemi a způsob života — je to přesvědčení, že za to, co Austrálie vybudovala, stojí bojovat, a že muži a ženy žijící pod Jižním křížem jsou připraveni tak učinit."
