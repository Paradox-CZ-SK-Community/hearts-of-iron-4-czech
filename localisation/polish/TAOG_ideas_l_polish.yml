 idea_SIA_civil_service_heroism_2_desc: "$idea_SIA_civil_service_heroism_1_desc$"
 idea_SIA_redirected_military_funds: "Přesměrované vojenské prostředky"
 idea_SIA_thai_irredentism: "Thajský iredentismus"
 idea_SIA_oss_special_forces_training: "Výcvik speciálních sil OSS" # todo: NEW TRANSLATION
 idea_SIA_seized_japanese_funds: "Zabavené japonské prostředky" # todo: NEW TRANSLATION
 idea_SIA_seized_japanese_funds_desc: "Po zrušení japonské dohody jsou prostředky a zásoby, které po sobě zanechali, k dispozici nám. Umožňují nárůst výstavby a průmyslové výroby." # todo: NEW TRANSLATION
 idea_SIA_oss_special_forces_training_desc: "Naši agenti se školili po boku OSS v sabotáži, infiltraci a vzdušných operacích. Nabyté zkušenosti proměnily naše speciální jednotky v mocný nástroj." # todo: NEW TRANSLATION
 idea_SIA_sold_privy_purse_lands: "Prodané pozemky královské pokladny"
 idea_SIA_sold_privy_purse_lands_desc: "Prodej pozemkových držav královské domácnosti vnesl do státu kapitál, zmírnil hospodářský tlak a uvolnil zdroje pro výstavbu."
 idea_SIA_war_fervor: "Válečné nadšení"
 idea_SIA_bloodlusted_irredentism: "Krvelačný iredentismus"
 idea_SIA_bloodlusted_irredentism_desc: "Územní ambice se proměnily v cosi mnohem zuřivějšího. Armáda bojuje s přesvědčením těch, kdo věří, že znovu získávají to, co jim právem náleží."
 idea_SIA_the_royal_police_counterweight: "Loajalita královské policie"
 idea_SIA_civilian_technocrats_in_institutions: "Civilní technokraté"
 idea_SIA_civilian_technocrats_in_institutions_desc: "Civilní odborníci dosazení do klíčových státních institucí zlepšili těžbu zdrojů i efektivitu politických jmenování."
 idea_SIA_yuvachon: "Yuvachon"
 idea_SIA_yuvachon_desc: "Hnutí Yuvachon cvičí mládež národa ve vojenské disciplíně, buduje zásobu vycvičeného personálu a rozdmýchává nacionalistické nálady."
 idea_SIA_yuvachon_2: "$idea_SIA_yuvachon$"
 idea_SIA_yuvachon_2_desc: "$idea_SIA_yuvachon_desc$"
 idea_SIA_rebuilding_the_war_torn_economy: "Obnova válkou zničeného hospodářství"
 idea_SIA_specialist_marine_forces: "Specializované námořní pěchotní síly"
 idea_SIA_specialist_marine_forces_desc: "Kádr oddaných obojživelných specialistů byl vycvičen a vybaven pro pobřežní útočné operace."
 idea_SIA_rehabilitated_military: "Rehabilitovaná armáda"
 idea_SIA_desperate_gambit: "Zoufalý tah"
 idea_SIA_desperate_gambit_desc: "Možná z té díry, v níž ses ocitl, existuje cesta ven. Šplhej!"
 idea_SIA_purged_senior_military: "Vyčištěné vyšší velení"
 idea_SIA_purged_senior_military_desc: "Vyšší důstojníci považovaní za hrozbu pro vládu byli odstraněni ze svých funkcí. Ztráta zkušených velitelů zanechala stopu na soudržnosti a profesionálním rozvoji armády."
 idea_SIA_cemented_control: "Upevněná kontrola"
 idea_SIA_cemented_control_desc: "Vláda upevnila své sevření státních institucí. Politická opozice byla odsunuta stranou a soukolí moci se nyní spolehlivě otáčí ve prospěch vlády."
 idea_SIA_cemented_control_2: "Zakořeněná kontrola"
 idea_SIA_cemented_control_2_desc: "$idea_SIA_cemented_control_desc$"
 idea_SIA_cemented_control_3: "Zákon o thajské povinnosti za války"
 idea_SIA_cemented_control_3_desc: "Je povinností každého Thajce, aby v případě války ohrožující svrchovanost koruny a jejího lidu každý počestný Thajec vzdoroval okupaci všemi možnými prostředky, ať už zbraní, nebo jinak."
 idea_SIA_suspend_ordinary_legal_procedures: "Pozastavené běžné právní postupy"
 idea_SIA_thai_cultural_mandates: "Thajské kulturní mandáty"
 idea_SIA_military_humiliation: "Vojenské ponížení"
 idea_SIA_death_defiant: "Vzdor smrti"
 idea_SIA_death_defiant_desc: "Už jsme mrtví. Přijďte si vzít, co vám patří, pokud to dokážete."
 idea_SIA_songsuradet_ascendant_0: "Songsuradet na vzestupu"
 idea_SIA_songsuradet_ascendant_0_desc: "Phraya Songsuradet úspěšně přečkal hněv vlády, upevnil svou základnu a vyšel z toho silnější. Nyní je tím, komu by lidé říkali nedotknutelný - příliš známý a příliš zakořeněný na to, aby se ho bylo možné zbavit.\nS největší pravděpodobností bude zasahovat do vládní politiky a zpomalovat rozhodování, aby zajistil, že se znovu nestane terčem čistky."
