 idea_SIA_civilian_full_support: "Civilní křídlo: §GPlná podpora§!" # todo: NEW TRANSLATION
 idea_SIA_civilian_full_support_desc: "Civilní křídlo pevně stojí za vládou. Administrátoři a technokraté poskytují své odborné znalosti a urychlují rozvoj." # todo: NEW TRANSLATION
 idea_SIA_civilian_slight_support: "Civilní křídlo: Mírná podpora" # todo: NEW TRANSLATION
 idea_SIA_civilian_slight_support_desc: "Civilní křídlo obecně podporuje směřování vlády. Jejich spolupráce přináší skromné, ale hmatatelné výhody." # todo: NEW TRANSLATION
 idea_SIA_civilian_neutral: "Civilní křídlo: Neutrální" # todo: NEW TRANSLATION
 idea_SIA_civilian_neutral_desc: "Civilní křídlo ani nepomáhá, ani nebrání vládě. Správa funguje, ale bez hnací síly skutečné politické shody." # todo: NEW TRANSLATION
 idea_SIA_civilian_opposition: "Civilní křídlo: V opozici" # todo: NEW TRANSLATION
 idea_SIA_civilian_opposition_desc: "Civilní křídlo se obrátilo proti vládě. Úředníci zdržují procesy a rozpočty jsou špatně alokovány, což brzdí chod státu." # todo: NEW TRANSLATION
 idea_SIA_civilian_rebellious: "Civilní křídlo: §RVzbouřené§!" # todo: NEW TRANSLATION
 idea_SIA_civilian_rebellious_desc: "Civilní křídlo je v otevřeném vzdoru. Nestabilita se šíří a hrozba politického prasknutí roste každým dnem." # todo: NEW TRANSLATION
 idea_SIA_military_full_support: "Vojenské křídlo: §GPlná podpora§!" # todo: NEW TRANSLATION
 idea_SIA_military_full_support_desc: "Vojenské křídlo pevně stojí za vládou. Důstojníci podporují nábory a výrobu zbraní, směrují zdroje armády k národním cílům." # todo: NEW TRANSLATION
 idea_SIA_military_slight_support: "Vojenské křídlo: Mírná podpora" # todo: NEW TRANSLATION
 idea_SIA_military_slight_support_desc: "Vojenské křídlo je většinou spolupracující. Jejich podpora přináší mírné zlepšení v náboru a výrobě, i když bez plného závazku." # todo: NEW TRANSLATION
 idea_SIA_military_neutral: "Vojenské křídlo: Neutrální" # todo: NEW TRANSLATION
 idea_SIA_military_neutral_desc: "Vojenské křídlo nezaujalo žádné stanovisko. Armáda plní své povinnosti bez nadšení či odporu, čeká, jak se situace vyvine." # todo: NEW TRANSLATION
 idea_SIA_military_opposition: "Vojenské křídlo: V opozici" # todo: NEW TRANSLATION
 idea_SIA_military_opposition_desc: "Vojenské křídlo pracuje proti vládě. Důstojníci podkopávají výrobní snahy a nadšení pro vládní cíle z řad vojska mizí." # todo: NEW TRANSLATION
 idea_SIA_military_rebellious: "Vojenské křídlo: §RVzbouřené§!" # todo: NEW TRANSLATION
 idea_SIA_military_rebellious_desc: "Vojenské křídlo je na pokraji otevřeného vzdoru. Sabotáže branné povinnosti, úpadek výroby zbraní a hrozba puče se blíží." # todo: NEW TRANSLATION
