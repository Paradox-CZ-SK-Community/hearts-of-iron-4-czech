 SIA_wing_state_rebellious: "§RVzbouřené§!" # todo: NEW TRANSLATION
 SIA_civilian_wing_history_tt: "Civilní frakci Khana Ratsadon vedou pokrokoví administrátoři a technokraté, mezi nimi především §YPridi Phanomyong§!. Po studiích práva ve Francii se Pridi vrátil s ambicemi na pozemkovou reformu, státní hospodářské plánování a ústavní demokracii, která by skutečně posílila obyčejné lidi.\n\nCivilní křídlo je obecně §Gpro-vývojové§!, preferuje investice do vzdělání, infrastruktury a průmyslu. Je skeptické vůči vysokým vojenským výdajům a obává se jakéhokoli posunu k silnému vůdcovství. Jejich podpora se nejlépe získává politikami, které modernizují stát a chrání ústavní vládu." # todo: NEW TRANSLATION
 SIA_military_wing_history_tt: "Vojenskou frakci Khana Ratsadon ovládají důstojníci armády, kteří se považují za pravé strážce revoluce. Jejich nejambicióznější postavou je §YPlaek Phibunsongkhram§!, plukovník, jehož obdiv k nacionalistickým hnutím Evropy každým rokem roste.\n\nVojenské křídlo je §Gpro-zbrojení§! a přitahováno k silnému, centralizovanému státu. Podezírají Pridiho ekonomické myšlenky jako nebezpečně radikální a mají malou trpělivost s civilním zasahováním do obranných záležitostí. Jejich loajalitu nejlépe zajišťují vojenské investice a politiky, které projekují národní sílu." # todo: NEW TRANSLATION
