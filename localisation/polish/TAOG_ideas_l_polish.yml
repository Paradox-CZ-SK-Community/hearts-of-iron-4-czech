 idea_SIA_purged_military: "Pročištěná armáda" # todo: NEW TRANSLATION
 idea_SIA_purged_military_desc: "Odstranění důstojníků považovaných za politicky nespolehlivé zanechalo armádu bez zkušeného velení, čímž se narušila organizace a rozvoj zbývajících jednotek." # todo: NEW TRANSLATION
