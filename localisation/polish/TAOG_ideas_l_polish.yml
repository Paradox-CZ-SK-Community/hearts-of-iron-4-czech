 INS_bangka_bauxite_export_desc: "Ostrovy Bangka a Belitung ukrývají značnou část světového bauxitu, který je hlavní surovinou pro výrobu hliníku. Ačkoli bychom mohli sami investovat do výroby hliníku, samotné množství produkovaného bauxitu činí prodej suroviny ve velkém životaschopnou strategií."
