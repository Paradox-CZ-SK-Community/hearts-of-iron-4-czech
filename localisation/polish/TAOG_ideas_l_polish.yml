 idea_SIA_anti_burmese_sentiment: "Protibarmské nálady"
 idea_SIA_sued_king_prajadhipok: "Zažalovaný král Prajadhipok"
 idea_SIA_pan_thaiism: "Panthajismus"
 idea_SIA_pan_thaiism_desc: "Ideologie panthajismu tvrdí, že všechny národy thajského původu by měly být sjednoceny v jednom státě. Pohání národ k expanzi a udržuje morálku útočnými akcemi."
