l_polish:
 idea_INS_volksraad: "Volksraad" # todo: NEW TRANSLATION
 idea_INS_volksraad_desc: "Volksraad je rada zřízená Nizozemskem v roce 1918 jako součást systému „Ethical Policies“, která měla vytvořit systém polodemokracie, kde mohou být zastoupeny různé etnické menšiny a kultury napříč souostrovím. Ačkoli je teoreticky demokratická, generální guvernér a nizozemská koruna mají neomezené veto." # todo: NEW TRANSLATION
 INS_volksraad_custom_tt: "Umožňuje najímat §YVolksraad poradce§!\nUmožňuje používat §YVolksraad rozhodnutí§!" # todo: NEW TRANSLATION
 INS_great_depression: "Velká hospodářská krize" # todo: NEW TRANSLATION
 INS_great_depression_desc: "Ačkoliv bezprostřední dopad Velké hospodářské krize na Indie byl malý, následné protekcionistické politiky, které země po celém světě zavedly, měly ničivé účinky na ekonomiku Indii, která je závislá na nepřetržitém exportu surovin jako kaučuk a ropa." # todo: NEW TRANSLATION
 INS_great_depression_tt: "Mění §Y$INS_great_depression$§! takto:" # todo: NEW TRANSLATION
 INS_dutch_east_indies: "Neefektivní správa" # todo: NEW TRANSLATION
 INS_dutch_east_indies_desc: "Východní Indie jsou rozsáhlé souostroví obsahující stovky odlišných kultur a jazyků, což z něj činí notoricky obtížnou kolonii k administraci. Různé hnutí za nezávislost, kulturní bariéry a ekonomické dopady Velké hospodářské krize této situaci nepomohly a správa funguje velmi neefektivně. „Ethical Policies“, zavedené v roce 1918, se snažily situaci zlepšit zavedením etických pracovních předpisů a poskytnutím demokratického zastoupení menšinám, avšak velká krize je nechala převážně bez uplatnění." # todo: NEW TRANSLATION
 INS_dutch_east_indies_tt: "Mění §Y$INS_dutch_east_indies$§! takto:" # todo: NEW TRANSLATION
 INS_volksraad_tt: "Mění §Y$INS_dutch_east_indies$§! takto:" # todo: NEW TRANSLATION
 INS_royal_netherlands_east_indies_army_desc: "Koninklijk Nederlands Indisch Leger (KNIL) je dlouhodobá armáda Východních Indií, fungující nezávisle na Nizozemsku. KNIL se skládá jak z evropských, tak indonéských vojáků, avšak kulturní a jazykové bariéry mezi mnoha kulturami souostroví a Nizozemskem činí nábor obtížným a pomalým procesem." # todo: NEW TRANSLATION
 idea_INS_netherlands_most_precious_jewel: "Nejcennější klenot Nizozemska" # todo: NEW TRANSLATION
 idea_INS_netherlands_most_precious_jewel_desc: "Nizozemské Východní Indie byly kolonií Nizozemska přibližně 350 let a správa kolonie je těsně propojena s nizozemskou vládou. Východní Indie jsou často nazývány „klenotem v nizozemské koruně“ a Nizozemsko nejeví žádnou touhu povolit svůj stisk nad tímto cenným klenotem." # todo: NEW TRANSLATION
