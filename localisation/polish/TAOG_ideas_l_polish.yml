 AST_anti_fascist_measures: "Antifašistická opatření" # todo: NEW TRANSLATION
 AST_anti_fascist_measures_desc: "Fašismus ještě nezakořenil v Austrálii a demokratické síly chtějí, aby to tak zůstalo. Commonwealth Investigation Branch bude sledovat a zadržovat podezřelé prvky, aby žádné fašistické skupiny nezískaly vliv." # todo: NEW TRANSLATION
 ABDA_corps_expeditionnaire_spirit: "Corps Expéditionnaire" # todo: NEW TRANSLATION
 ABDA_corps_expeditionnaire_spirit_desc: "Francouzské síly nasazené v tichomořském divadle byly otuženy koloniální službou a jsou zvyklé operovat daleko od domova v obtížných podmínkách. Jejich zkušenost s bojem v jihovýchodní Asii jim dává zvláštní povědomí o japonské taktice a terénu, což je činí houževnatou silou, když proti nim nepřítel tlačí." # todo: NEW TRANSLATION
 ABDA_maintain_strategic_flexibility_spirit: "Strategická flexibilita" # todo: NEW TRANSLATION
 ABDA_maintain_strategic_flexibility_spirit_desc: "Americká průmyslová výroba je směrována do tichomořského divadla, s urychlenou produkcí loděnic tak, aby udržela flotilu schopnou projekce síly přes celý oceán. Tím, že se odmítá nadměrné závazky na kteroukoli frontu, USA zajišťují, že jejich námořní síla může být použita kdekoliv, kde to situace vyžaduje." # todo: NEW TRANSLATION
 AST_toe_the_line_spirit: "Držet se pravidel" # todo: NEW TRANSLATION
 AST_toe_the_line_spirit_desc: "Stát vyzval k obětem a populace odpověděla. Příděly, delší pracovní doba a přesměrování civilní výroby k národnímu úsilí uvolnily zdroje, které vláda neměla jinak k dispozici. Je to střídmé uspořádání a není univerzálně populární." # todo: NEW TRANSLATION
