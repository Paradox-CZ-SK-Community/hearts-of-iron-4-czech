 INS_anti_colonialist_sentiment_idea_desc: "Indonéští revolucionáři jsou v naší zemi aktivní a šíří propagandu mezi obyvatelstvem, což vede k rostoucím protikoloniálním náladám." # todo: NEW TRANSLATION
