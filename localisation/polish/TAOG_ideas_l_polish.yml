 ABDA_supreme_command: "Vrchní velení ABDACOM"
 ABDA_supreme_command_desc: "Americko-britsko-nizozemsko-australské velení zavedlo jednotnou námořní doktrínu ve všech členských námořnictvech. S prohlubováním aliance sdílené zpravodajské informace, koordinované hlídkové úkoly a vzájemná logistická podpora postupně zlepšují bojovou efektivitu každé flotily, která pluje pod praporem ABDACOM."
