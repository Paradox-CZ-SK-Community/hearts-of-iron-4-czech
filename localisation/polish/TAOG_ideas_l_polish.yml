 AST_australian_culture_investments_idea: "Investice do australské kultury" # todo: NEW TRANSLATION
 AST_australian_culture_investments_idea_desc: "§W§YPo odstranění§!:\nPřidá §YPocit sounáležitosti§!, který uděluje\nStabilita: §G+10.00%§!\nPodpora války: §G+10.00%§!.§!\n" # todo: NEW TRANSLATION
 AST_a_sense_of_place: "Pocit sounáležitosti" # todo: NEW TRANSLATION
 AST_a_sense_of_place_desc: "Národní identita je vazba, která drží lidi pohromadě. Za prosperující kultury se Australané sjednotili, odhodláni odolat těm, kdo by mohli ohrozit jejich hranice." # todo: NEW TRANSLATION
 AST_a_sense_of_place_upgraded: "Pocit sounáležitosti" # todo: NEW TRANSLATION
 AST_a_sense_of_place_upgraded_desc: "Národní identita, která kdysi tiše kvetla, dostala ostřejší rys. Už to není jen hrdost na zemi a způsob života — je to přesvědčení, že to, co Austrálie vybudovala, stojí za to bránit, a že muži a ženy pod Jižním křížem jsou připraveni to udělat." # todo: NEW TRANSLATION
 AST_the_promise_of_nauru: "Slib Nauru" # todo: NEW TRANSLATION
