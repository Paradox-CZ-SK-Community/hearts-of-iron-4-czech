 AST_singapore_strategy_idea: "Obranné stavby v Singapuru" # todo: NEW TRANSLATION
 AST_singapore_strategy_idea_desc: "Na žádost Austrálie učiníme krok k vylepšení obranných struktur v Singapuru. Singapore Strategy je základním prvkem pacifické obranné politiky.\n\n§W§YPo odstranění§! (§YSingapore§!):\n Přidá §G2§! §YLetecká základna§!.\n Přidá §G2§! §YNámořní základna§!.\n Přidá §G1§! §YPobřežní pevnost§!.§!\n" # todo: NEW TRANSLATION
