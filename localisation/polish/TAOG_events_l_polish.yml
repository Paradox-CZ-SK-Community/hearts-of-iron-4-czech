l_polish:
 INS_political_events.1.t: "Nový generální guvernér pro [INS.GetNameDef]"
 INS_political_events.1.desc: "Pětileté funkční období [INS.GetLeader] se blíží ke konci, a proto musíme rozhodnout o vhodném vůdci, který zaujme jeho místo. Královna Vilemína doporučila Alidia Tjardu van Starkenborgha Stachouwera, který projevil velký příslib jako mimořádný velvyslanec a zplnomocněný ministr."
 INS_political_events.1.a: "Jak si přeje královna."
 INS_political_events.1.b: "[INS.GetLeader] si vedl dobře, měl by sloužit další období."
 INS_political_events.2.t: "[FROM.GetName] požaduje vlastnictví státu [721.GetName]"
 INS_political_events.2.desc: "Nová republikánská vláda v bývalých Indiích prohlásila celé souostroví za své území. [FROM.GetLeader] nám zaslal oficiální požadavek, abychom se vzdali státu [721.GetName], a v případě odmítnutí hrozí vojenskou akcí."
 INS_political_events.2.a: "Dobře, nestojí to za vyvolání incidentu."
 INS_political_events.2.b: "V žádném případě!"
 INS_political_events.3.t: "[FROM.GetName] souhlasí, že se vzdá státu [721.GetName]"
 INS_political_events.3.desc: "Jak se očekávalo, [FROM.GetLeader] souhlasil s našimi požadavky a začal stahovat jednotky ze státu [721.GetName]. Síly TKR vstoupily do regionu společně s několika vládními vyslanci. Sám [INS.GetLeader] pronesl v Dili projev, v němž vyhlásil osvobození od koloniálního vlivu."
 INS_political_events.3.a: "Skvělé!"
 INS_political_events.4.t: "[FROM.GetName] odmítá vzdát se státu [721.GetName]"
 INS_political_events.4.desc: "Jednání se zemí [FROM.GetName] nedopadla dobře. [FROM.GetLeader] odmítl vzdát se státu [721.GetName] z jakéhokoli důvodu a předčasně ukončil schůzku."
 INS_political_events.4.a: "Pak bude válka."
 INS_political_events.5.t: "Indonéské všeobecné volby"
 INS_political_events.5.desc: "Dnešek je historickým milníkem pro Indonésii. Po oficiálním skončení revoluce premiér [INS.GetLeader] prohlásil, že Indonésie uspořádá své první svobodné a demokratické volby. Výsledek těchto voleb bude mít na Indonésii trvalý dopad."
 INS_political_events.5.a: "Sutan Sjahrir dovedl naši zemi až sem, povede nás dál!"
 INS_political_events.5.b: "Amir Sjarifuddin je férovým kompromisem mezi socialisty a nacionalisty."
 INS_political_events.5.c: "Mohammad Hatta revoluci zahájil a také ji dokončí."
 INS_political_events.6.t: "Naše přípravy se vyplácejí"
 INS_political_events.6.desc: "S probíhající revolucí už naši partyzáni, kteří infiltrovali správu Indií, nemusí jednat v utajení a začnou provádět sabotážní mise dříve, než Nizozemsko stihne zareagovat."
 INS_political_events.6.a: "Musíme dál jednat rychle."
 INS_political_events.7.t: "Soetardjova petice"
 INS_political_events.7.desc: "Petice Volksraadu organizovaná Soetardjem, která požaduje svolání konference u kulatého stolu mezi nizozemskými a indonéskými zástupci k projednání indonéské touhy po autonomii, dokončila vnitřní debatu a byla předána generálnímu guvernérovi ke schválení. Ačkoli mnoho poradců trvá na tom, že status quo musí být zachováno, a petice by proto měla být vetována, nelze popřít, že nacionalistická hnutí jen sílí a radikalizují se. Budeme-li nadále odmítat každou mírovou žádost o autonomii, nacionalisté mohou místo toho začít zkoušet násilnější alternativy."
 INS_political_events.7.a: "Musíme zahájit jednání, abychom se vyhnuli nevyhnutelné občanské válce."
 INS_political_events.7.b: "Status quo musí pokračovat."
 INS_political_events.7.c: "Možná mají nacionalisté pravdu?"
 INS_political_events.8.t: "Blíží se [?event_target:INS_invasion_event_invader.GetAdjective] okupace"
 INS_political_events.8.desc: "Vojáci ze země [?event_target:INS_invasion_event_invader.GetName] dorazili do státu [?event_target:INS_invasion_event_invaded_state.GetName] a našim vojákům v oblasti, kteří jsou výrazně přečísleni, bylo nařízeno provést úplnou vojenskou evakuaci státu [?event_target:INS_invasion_event_invaded_state.GetName]. [?event_target:INS_invasion_event_invader.GetAdjective] síly pokračují v postupu v Indiích a naše šance vyhnout se okupaci vypadají mizivě."
 INS_political_events.8.a: "Zatkneme nacionalisty a budeme bránit svůj domov až do smrti!"
 INS_political_events.9.t: "Indonésané vyhlašují nezávislost"
 INS_political_events.9.desc: "Když [JAP.GetNameDef] začalo stahovat své síly z Východní Indie, vyslali jsme vojáky do Batávie, abychom obnovili koloniální vládu. Naši vojáci však zjistili, že politická situace v Indiích se od okupace výrazně změnila. Ještě než naše jednotky dorazily do Batávie, [INS.GetLeader] již podepsal vyhlášení nezávislosti a prohlásil Indonéskou republiku za nezávislý národ s překvapivě rozsáhlou podporou veřejnosti."
 INS_political_events.9.a: "Pošlete tanky!"
 INS_political_events.9.b: "To je beznadějné, další boje nejsou to, co potřebujeme. Měli bychom se soustředit na obnovu mateřské země."
 INS_political_events.11.t: "[HOL.GetNameDefCap] uznává indonéskou svrchovanost"
 INS_political_events.11.desc: "Po vyhlášení nezávislosti se naše milice okamžitě přesunuly bránit naše území před očekávanou nizozemskou invazí. K překvapení mnohých však [HOL.GetLeader] oznámil, že nevyzve k invazi, a místo toho dá přednost obnově nizozemské mateřské země a vyhnutí se dalšímu konfliktu."
 INS_political_events.11.a: "Překvapení, ale vítané."
 INS_political_events.12.t: "Setkání s indonéskými nacionalisty"
 INS_political_events.12.desc: "Naše jednotky se vylodily ve státě [?event_target:INS_invasion_event_invaded_state.GetName] a vítězství na indonéské frontě je na dosah. Musíme se rozhodnout, jakým způsobem budeme Indonésii okupovat. Přímá okupace by nám sice poskytla potřebné zdroje, ale bude nákladná a obtížná. Vyjednávali jsme se Sukarnem, předním revolucionářem, a vytvořili plán, podle něhož zřídíme indonéský loutkový stát, oficiálně částečně vedený Sukarnem, ale pod naším velením. To udrží indonéské civilisty v klidu a bude mnohem levnější než úplná okupace."
 INS_political_events.12.a: "Měli bychom pokračovat v jednáních se Sukarnem"
 INS_political_events.12.b: "Nemáme zájem spolupracovat s revolucionáři."
 INS_political_events.13.t: "Blíží se [?event_target:INS_invasion_event_invader.GetAdjective] okupace"
 INS_political_events.13.desc: "Vojáci ze země [?event_target:INS_invasion_event_invader.GetName] dorazili do státu [?event_target:INS_invasion_event_invaded_state.GetName] a našim vojákům v oblasti, kteří jsou výrazně přečísleni, bylo nařízeno provést úplnou vojenskou evakuaci státu [?event_target:INS_invasion_event_invaded_state.GetName]. [?event_target:INS_invasion_event_invader.GetAdjective] síly pokračují v postupu v Indiích a naše šance vyhnout se okupaci vypadají mizivě. Naši špioni navíc hlásí, že [?event_target:INS_invasion_event_invader.GetLeader] byl spatřen při jednání se Sukarnem a dalšími nacionalistickými vůdci s cílem vytvořit indonéský loutkový stát vedený Sukarnem pod Sféra společné prosperity."
 INS_political_events.13.a: "Zatkneme nacionalisty a budeme bránit svůj domov až do smrti!"
 INS_political_events.13.b: "Je to nebezpečné, ale možná je to skutečná šance stát se nezávislými?"
 INS_peta_explain_tt: "Budeme moci využít chaosu okupace k vyhlášení úplné nezávislosti, pokud bude [JAP.GetName] zatlačeno zpět."
 INS_peta_explain_tt_jap: "§R[INS.GetName] nám může zůstat loajální, ale pokud začneme ztrácet kontrolu nad územím, může naši hru prohlédnout a vyhlásit nezávislost§!."
 INS_political_events.14.t: "Nacionalističtí vůdci zatčeni"
 INS_political_events.14.desc: "Sukarno i několik dalších vrcholných revolucionářů v Indonésii byli zatčeni nizozemskou vojenskou policií dříve, než jsme stihli zřídit loutkový režim."
 INS_political_events.14.a: "Škoda, byl by cenným spojencem."
 INS_political_events.15.t: "Obránci vlasti"
 INS_political_events.15.desc: "Jednání se Sukarnem byla uzavřena a loutkový režim v Indonésii se rozbíhá. Sukarno využil své kontakty spolu s naší vojenskou přítomností k destabilizaci nizozemské vlády a k nastolení faktické kontroly nad souostrovím."
 INS_political_events.15.a: "Nezajistili jsme jen levné zdroje, zajistili jsme si cenného spojence."
 INS_political_events.16.t: "[?event_target:INS_invasion_event_invader.GetAdjective] okupace Indií"
 INS_political_events.16.desc: "[?event_target:INS_invasion_event_invader.GetAdjective] síly v Indiích spolupracovaly s indonéskými nacionalisty na destabilizaci naší koloniální správy a plně obsadily Indie. Nizozemské vlajky byly spuštěny a nahrazeny indonéskými vlajkami a domorodí obyvatelé Indií zřejmě vítají [?event_target:INS_invasion_event_invader.GetAdjective] okupanty. Pro naši koloniální říši to nevypadá dobře."
 INS_political_events.16.a: "Vyhráli bitvu, ale nevyhráli válku."
 INS_political_events.17.t: "[INS.GetName] vyhlašuje nezávislost"
 INS_political_events.17.desc: "Do Císařského generálního štábu dorazily zprávy z Batávie. Sukarno a jeho klika, kterou jsme vlastní rukou povznesli, aby vládla ostrovům ve jménu císaře, vyhlásili [FROM.GetAdjective] republiku jako odpověď na naše opakované územní ztráty, protože věří, že jsme příliš roztažení, než abychom s tím mohli cokoli udělat."
 INS_political_events.17.a: "Bohužel mohou mít pravdu."
 INS_political_events.18.t: "Tan Malaka se vrací do Indonésie"
 INS_political_events.18.desc: "Tan Malaka, indonéský komunista, který v posledních letech sloužil jako důvěryhodný poradce naší vlády, oznámil svůj okamžitý odchod. Protože [INS.GetNameDef] nyní stojí jako svobodná republika, hodlá se konečně vrátit do země, do níž naposledy vstoupil jako uprchlík před více než dvěma desetiletími. Děkuje nám za poskytnuté útočiště a svobodu pokračovat v práci a říká pouze, že jeho místo je nyní doma."
 INS_political_events.18.a: "Popřejeme mu hodně štěstí."
 INS_political_events.19.t: "[HOL.GetName] povolává admirála Helfricha"
 INS_political_events.19.desc: "Do [1058.GetName] dorazila zpráva, že admirál Conrad Helfrich, velitel našich námořních sil a nejschopnější důstojník, kterého v těchto vodách máme, byl povolán domů. Haag se odvolává na naléhavé potřeby v metropoli a nabízí jen málo dalšího vysvětlení. Jeho odchod zanechává souostroví slabě bráněné v okamžiku, kdy naše pozice zde zdaleka není bezpečná, a o důstojnické jídelně v Surabaji se říká, že v ní panuje kyselá nálada."
 INS_political_events.19.a: "Ponurý den pro flotilu"
 INS_industrial_events.4.t: "Přerozdělení rozpočtu ve státě [FROM.FROM.GetName]"
 INS_industrial_events.4.desc: "Uzavřením kaučukových plantáží ve státě [FROM.FROM.GetName] jsme v rozpočtu uvolnili prostor pro nové průmyslové projekty v regionu."
 INS_industrial_events.4.a: "Postavíme ropné vrty ve státě [FROM.FROM.GetName]"
 INS_industrial_events.4.b: "Měli bychom otevřít hliníkárnu ve státě [FROM.FROM.GetName]"
 INS_industrial_events.4.c: "Měli bychom provést průzkum zdrojů, jejichž výroba nám chybí"
 INS_industrial_events.4.d: "Můžeme otevřít uhelné doly ve státě [FROM.FROM.GetName]"
 INS_industrial_events.5.t: "[INS_industrial_events_5_t_scripted]"
 INS_industrial_events_5_t_colonial: "Osud De Javasche Bank"
 INS_industrial_events_5_t_independent: "Osud Bank Indonesia"
 INS_industrial_events.5.desc: "[INS_industrial_events_5_desc_scripted]"
 INS_industrial_events_5_desc_colonial: "Rezervy De Javasche Bank klesly na nejnižší úroveň za deset let. Gulden nakupuje každý měsíc méně a vlastníci plantáží požadují platby v zahraniční měně. Naši finanční poradci se shodují, že banka sama nedokáže pokles zvrátit, ale ostře se rozcházejí v tom, jak jej napravit."
 INS_industrial_events_5_desc_independent: "Bank Indonesia oznámila, že rupie jen za poslední čtvrtletí ztratila téměř pětinu své hodnoty. Obchodníci s rýží v Surabaji ji začali rovnou odmítat ve prospěch zahraničních bankovek. Náš ministr financí trvá na tom, že měnu lze zachránit, ale pouze pokud budeme jednat rozhodně a brzy."
 INS_industrial_events.5.a: "Měli bychom se pokusit posílit gulden, ne jej nahradit."
 INS_industrial_events.5.b: "Navážeme východoindický gulden na nizozemský gulden."
 INS_industrial_events.5.c: "Navážeme východoindický gulden na americký dolar."
 INS_industrial_events.6.t: "Výnosnější dohoda"
 INS_industrial_events.6.desc: "Cinchona Bureau přijala naše podmínky. Když malárie sužuje polovinu tropů a náhrada za chinin není v dohledu, neměla moc na výběr. Nová dohoda nám zaručuje podstatně větší podíl ze zisku z každého gramu chininu, který opustí naše břehy. Otázkou teď je, kam tento neočekávaný příjem nasměrovat."
 INS_industrial_events.6.a: "Investovat do našich měst."
 INS_industrial_events.6.b: "Rozvíjet vnější ostrovy."
 INS_industrial_events.6.c: "Posílit náš vojenský průmysl."
 INS_industrial_events.28.t: "Zásilka kaučuku odeslána"
 INS_industrial_events.28.desc: "Konvoje naložily poslední kaučuk a vypluly na moře. Naši kupci dostanou to, za co zaplatili, a naše účetnictví v pravý čas odrazí dohodnutou kompenzaci. Po příští dva roky budou náklady této transakce ležet v našich rozvahách jako připomínka toho, co od nás hospodářská krize vyžaduje."
 INS_industrial_events.28.a: "Bereme na vědomí."
 INS_industrial_events.28.b: "Zařídit další zásilku."
 INS_industrial_events.36.t: "Zásilka ropy odeslána"
 INS_industrial_events.36.desc: "Tankery opustily naše rafinerie, jejich nádrže směřují do přístavů kupce. Kompenzace byla dohodnuta a bude přijata v plné výši, ačkoli břemeno prodeje bude naši ekonomiku zatěžovat ještě příští dva roky. Takové jsou podmínky, které nám svět v těchto chudých letech nabízí."
 INS_industrial_events.36.a: "Bereme na vědomí."
 INS_industrial_events.36.b: "Zařídit další zásilku."
 INS_volksraad_events.2.t: "[HOL.GetLeader] vetoval petici Volksraadu."
 INS_volksraad_events.2.desc: "Ačkoli petici schválil [INS.GetLeader], po přezkoumání ji vetoval [HOL.GetLeader], a proto v tuto chvíli nebudeme moci pokračovat v jejím zavádění."
 INS_volksraad_events.2.a: "Možná to v budoucnu zkusíme znovu s ratifikovanou peticí."
 INS_volksraad_events.10.t: "Návrh ve Volksraadu na povolení indonéštiny ve školách"
 INS_volksraad_events.10.desc: "[INS.GetLeader] schválil petici Volksraadu na podporu vzniku indonéskojazyčných škol a univerzit v [INS.GetNameDef] a poslal ji [HOL.GetLeader] ke konečnému schválení."
 INS_volksraad_events.10.a: "Volksraad plní svůj účel."
 INS_volksraad_events.10.b: "V žádném případě. Vetovat!"
 INS_volksraad_events.11.t: "Indonéskojazyčné vzdělávání bude zřízeno."
 INS_volksraad_events.11.desc: "Petici podepsal [HOL.GetLeader] a nyní je oficiálně nařízena. Její zavádění začne brzy, jakmile budou rozhodnuty poslední detaily."
 INS_volksraad_events.11.a: "Volksraad plní svůj účel."
 INS_volksraad_events.20.t: "Návrh ve Volksraadu na povolení indonéštiny ve vládě"
 INS_volksraad_events.20.desc: "Vládní pozice v Indiích, včetně Volksraadu, všechny vyžadují plynulou znalost nizozemštiny, což vedlo mnoho členů Volksraadu, zejména zástupce domorodých komunit, ke zpochybnění platnosti jeho demokracie. Připravili návrh, který trvá na tom, aby bylo možné vládní pozice obsazovat indonésky mluvícími osobami, kdykoli to bude možné."
 INS_volksraad_events.21.t: "Indonéština je nyní ve vládě povolena!"
 INS_volksraad_events.21.desc: "Petici podepsal [HOL.GetLeader] a nyní je oficiálně nařízena. Její zavádění začne brzy, jakmile budou rozhodnuty poslední detaily."
 INS_volksraad_events.30.t: "Návrh ve Volksraadu na zrušení systému vzdělávacích kvót"
 INS_volksraad_events.30.desc: "[INS.GetLeader] schválil petici Volksraadu na zrušení systému vzdělávacích kvót v [INS.GetNameDef], aby ukončil dlouhodobé spory ve Volksraadu o jeho zavádění a spravedlnosti. Byla poslána [HOL.GetLeader] ke konečnému schválení."
 INS_volksraad_events.31.t: "Systém vzdělávacích kvót byl zrušen."
 INS_volksraad_events.31.desc: "Petici podepsal [HOL.GetLeader] a nyní je oficiálně nařízena. Její zavádění začne brzy, jakmile budou rozhodnuty poslední detaily."
 INS_volksraad_events.40.t: "Návrh ve Volksraadu na snížení vývozní daně z kaučuku"
 INS_volksraad_events.40.desc: "[INS.GetLeader] podepsal a schválil petici Volksraadu na snížení vysokých daní uvalených na soukromě vlastněné kaučukové plantáže. Tyto daně historicky umožňovaly velmi výnosný vládní monopol na kaučuk, mezinárodní protekcionismus však učinil tento systém mnohem méně výnosným. [INS.GetLeader] prohlásil, že už nevěří, že daně vyvažují hospodářské následky, které způsobují."
 INS_volksraad_events.40.a: "[INS.GetLeader] má pravdu."
 INS_volksraad_events.40.b: "Daně zůstanou."
 INS_volksraad_events.41.t: "Soukromá daň z vývozu kaučuku byla snížena."
 INS_volksraad_events.41.desc: "Petici podepsal [HOL.GetLeader] a nyní je oficiálně nařízena. Její zavádění začne brzy, jakmile budou rozhodnuty poslední detaily."
 INS_volksraad_events.60.t: "Návrh ve Volksraadu na zrušení nepsaného hodnostního limitu pro indonéské důstojníky"
 INS_volksraad_events.60.desc: "[INS.GetLeader] schválil petici Volksraadu na zrušení nepsaného pravidla, které omezuje hodnost, již mohou zastávat nenizozemští důstojníci KNIL, a na povýšení indonéských důstojníků, kteří jsou považováni za podhodnocené vzhledem ke svým úspěchům. Petice byla poslána [HOL.GetLeader] ke konečnému schválení."
 INS_volksraad_events.61.t: "Neviditelný hodnostní strop pro [INS.GetAdjective] generály byl zrušen."
 INS_volksraad_events.61.desc: "Petici podepsal [HOL.GetLeader] a nyní je oficiálně nařízena. Její zavádění začne brzy, jakmile budou rozhodnuty poslední detaily."
 INS_volksraad_events.70.t: "Návrh ve Volksraadu na legalizaci veřejného vyvěšování nacionalistických vlajek a symbolů"
 INS_volksraad_events.70.desc: "[INS.GetLeader] schválil petici Volksraadu na zrušení omezení veřejného vyvěšování nacionalistických vlajek a symbolů v [INS.GetNameDef], zejména za účelem snížení radikalizace mnoha mladých nacionalistů. [INS.GetLeader] trvá na tom, že bychom měli v této otázce zaujmout obranný postoj, spolupracovat s mírovými nacionalistickými vůdci a zároveň vykořeňovat revoluční hnutí, konečné rozhodnutí však spočívá na nás."
 INS_volksraad_events.71.t: "Červeno-bílou vlajku už není nelegální vyvěšovat!"
 INS_volksraad_events.71.desc: "Petici podepsal [HOL.GetLeader] a nyní je oficiálně nařízena. Její zavádění začne brzy, jakmile budou rozhodnuty poslední detaily."
 INS_volksraad_events.100.t: "Návrh ve Volksraadu na povolení vzdělávacích dotací pro nenizozemské obyvatele"
 INS_volksraad_events.100.desc: "[INS.GetLeader] schválil petici Volksraadu, která umožňuje nenizozemským obyvatelům [INS.GetNameDef] žádat o vzdělávací dotace. Petice byla poslána [HOL.GetLeader] ke konečnému schválení."
 INS_volksraad_events.101.t: "[INS.GetAdjectiveCap] obyvatelé nyní mohou žádat o vzdělávací dotace"
 INS_volksraad_events.101.desc: "Petici podepsal [HOL.GetLeader] a nyní je oficiálně nařízena. Její zavádění začne brzy, jakmile budou rozhodnuty poslední detaily."
 INS_dutch_events.1.t: "[INS.GetNameDefCap] žádá o velení našemu námořnictvu"
 INS_dutch_events.1.desc: "Po pádu naší mateřské země nás [INS.GetNameDef] požádal o převedení velení našich námořních sil na [INS.GetNameDef]. Tvrdí, že sjednocené velení umožní lepší koordinaci v této bezprecedentní době."
 INS_dutch_events.1.a: "Pokud to posílí naši věc, musíme ustoupit."
 INS_dutch_events.1.b: "Naše lodě budou odpovídat pouze Haagu."
 INS_dutch_events.2.t: "[HOL.GetNameDefCap] přijímá náš návrh námořního velení"
 INS_dutch_events.2.desc: "[HOL.GetNameDefCap] přijal náš návrh, aby nám umožnil převzít velení nad spojenými námořními silami. Přechod probíhá hladce a [HOL.GetAdjective] i [INS.GetAdjective] důstojníci pracují bok po boku na posílení naší pozice v Pacifiku."
 INS_dutch_events.2.a: "Společně udržíme Pacifik."
 INS_dutch_events.3.t: "[HOL.GetNameDefCap] odmítá náš návrh námořního velení"
 INS_dutch_events.3.desc: "[HOL.GetNameDefCap] odmítl naši nabídku sjednoceného námořního velení s odkazem na logistické a administrativní obavy. Ačkoli je to zklamání, naše spolupráce pokračuje jinými kanály válečného úsilí."
 INS_dutch_events.3.a: "Najdeme jiný způsob, jak posílit svůj námořní vliv."
 INS_dutch_events.4.t: "[HOL.GetNameDefCap] zřizuje námořní program [HOL.GetName]-[INS.GetName]"
 INS_dutch_events.4.desc: "[HOL.GetNameDefCap] oznámil vytvoření námořního programu [HOL.GetName]-[INS.GetName], společné iniciativy k reorganizaci a rozšíření našich námořních sil. [HOL.GetAdjectiveCap] odbornost a [INS.GetAdjective] personál společně vytvoří páteř nové pacifické obranné sítě."
 INS_dutch_events.4.a: "Pevný krok ke společnému přežití."
 INS_union_events.1.t: "[HOL.GetNameDefCap] žádá o přesun vlády do státu [1058.GetName]"
 INS_union_events.1.desc: "Se ztracenou mateřskou zemí nás [HOL.GetNameDef] informoval, že jeho vláda a královský dvůr se přesunou do státu [1058.GetName]. Píší o nezbytnosti, kontinuitě a nutnosti udržet království při životě tam, kde stále vlaje vlajka."
 INS_union_events.1.a: "Válka bude pokračovat ze státu [1058.GetName]."
 INS_union_events.1.b: "Za koho se považují! Není to nic než pokus znovu prosadit koloniální nadvládu!"
 INS_union_events.2.t: "[INS.GetNameDefCap] přijímá návrh na přesun"
 INS_union_events.2.desc: "[INS.GetNameDefCap] souhlasil s hostováním naší exilové vlády ve státě [1058.GetName]. Přípravy na přesun jsou v chodu a obě správy koordinují integraci úřadů a personálu. Společně poneseme pochodeň království dál z východu."
 INS_union_events.2.a: "Sjednocená fronta proti našim společným nepřátelům."
 INS_union_events.3.t: "[INS.GetNameDefCap] odmítá návrh na přesun"
 INS_union_events.3.desc: "[INS.GetNameDefCap] přímo odmítl naši žádost o přesun do státu [1058.GetName]. [INS.GetLeader] prohlásil, že nemáme právo požadovat takovou úroveň pomoci, když jsou už tak roztaženi na samou hranici možností."
 INS_union_events.3.a: "Zdá se, že zapomněli, čí prapor je stále váže."
 INS_union_events.4.t: "[HOL.GetNameDefCap] přesouvá ozbrojené síly do státu [1058.GetName]"
 INS_union_events.4.desc: "Z mateřské země dorazily první transporty. Lodě přeplněné důstojníky, vojáky a zbytky našich arzenálů. Jak se očekávalo, některé konvoje se do přístavu nedostaly. To, co přežilo, vytvoří páteř našich sil ve státě [1058.GetName]."
 INS_union_events.4.a: "Dost na to, aby vlajka dál vlála."
 INS_union_events.5.t: "[INS.GetNameDefCap] navrhuje Nizozemsko-indonéskou unii"
 INS_union_events.5.desc: "Světu je jasné, že válka se nevyvíjí v náš prospěch. Naše země padla a naše operační základna se přesunula na východ. Ministři v [INS.GetName] nám poslali návrh na vytvoření společného unijního státu vedeného královnou Vilemínou, aby byla zaručena co největší spolupráce. Ačkoli se zdá, že návrh nikoho zvlášť netěší, může být naším klíčem k přežití."
 INS_union_events.5.a: "Je to riziko, které musíme podstoupit. Ať žije královna!"
 INS_union_events.5.b: "S tím nemůžeme souhlasit."
 INS_union_events.6.t: "[HOL.GetNameDefCap] přijímá návrh unie"
 INS_union_events.6.desc: "Po naléhavé debatě v kabinetu [HOL.GetLeader] schválil [INS.GetAdjective] návrh. Dekret je stručný a bez obřadů. Naše vlády budou od nynějška až do konce války jednat jako jedna pod korunou."
 INS_union_events.6.a: "Historická dohoda pro oba národy."
 INS_union_events.7.t: "[HOL.GetNameDefCap] odmítá návrh unie"
 INS_union_events.7.desc: "Rada v [HOL.GetNameDef] odmítla návrh na společnou unii. Jejich sdělení je pevné: spolupráce bude pokračovat, ale svrchovanost sdílena nebude."
 INS_union_events.7.a: "Pravděpodobně by to stejně nefungovalo."
 INS_union_events.8.t: "[HOL.GetNameDefCap] navrhuje Nizozemsko-indonéskou unii"
 INS_union_events.8.desc: "Světu je jasné, že válka se nevyvíjí v náš prospěch. [HOL.GetNameDef] padlo a jeho operační základna se přesunula na východ. [HOL.GetAdjectiveCap] vůdci nám poslali návrh na vytvoření společného unijního státu vedeného královnou Vilemínou, aby byla zaručena co největší spolupráce. Ačkoli se zdá, že návrh nikoho zvlášť netěší, může být naším klíčem k přežití."
 INS_union_events.8.a: "Musí to být provedeno."
 INS_union_events.8.b: "Není to nic než pokus znovu prosadit koloniální nadvládu."
 INS_union_events.9.t: "[INS.GetNameDefCap] přijímá návrh unie"
 INS_union_events.9.desc: "[INS.GetNameDefCap] souhlasil s naším návrhem. Není jasné, jak to dopadne, ale musíme se dál soustředit na válečné úsilí."
 INS_union_events.9.a: "Máme-li vydržet, musíme vydržet společně."
 INS_union_events.10.t: "[INS.GetNameDefCap] odmítá návrh unie"
 INS_union_events.10.desc: "[INS.GetNameDefCap] odmítl návrh na unii. [INS.GetAdjectiveCap] lid a vůdci nevidí, že by to dlouhodobě fungovalo, a staví se proti jakémukoli návrhu vzdání se moci."
 INS_union_events.10.a: "Pravděpodobně by to stejně nefungovalo."
 INS_exile_accepted_flag: "Hostí [HOL.GetNameDef] v exilu"
 INS_hey_btw_you_are_gonna_die_just_know_that_yeah_tt: "§RTímto pro vás hra skončí.§!"
 INS_revolution_events.1.t: "[HOL.GetNameDefCap] se chystá rozdrtit republiku"
 INS_revolution_events.1.desc: "Jak se očekávalo, nizozemská vláda reagovala na náš požadavek nezávislosti vysláním vojáků do státu [1058.GetName] a šířením protirepublikánské propagandy v médiích."
 INS_revolution_events.1.a: "Musíme jednat rychle."
 INS_revolution_events.2.t: "[HOL.GetNameDefCap] žádá o dodatečnou pomoc"
 INS_revolution_events.2.desc: "[HOL.GetLeader] svolal mimořádnou schůzku s našimi vůdci a žádá, abychom poskytli další pomoc při znovudobytí Indií, a to až po přímé zapojení do konfliktu. [HOL.GetLeader] prohlásil, že situace je zoufalá a nizozemské síly nedokážou zatlačit revoluční milice. [HOL.GetLeader] slibuje, že pokud jim pomůžeme, dostaneme jako odměnu Borneo."
 INS_revolution_events.2.a: "Uděláme to kvůli Borneu."
 INS_revolution_events.2.b: "Nemáme zájem."
 INS_revolution_events.3.t: "[ENG.GetNameDefCap] souhlasí s Londýnsko-batávijskou dohodou"
 INS_revolution_events.3.desc: "[ENG.GetNameDefCap] souhlasila s přímým zapojením do konfliktu a posílá několik divizí bojovat v Batávii. Ačkoli se budeme muset vzdát Bornea, výrazně to posouvá šance v náš prospěch."
 INS_revolution_events.3.a: "Borneo bude nezbytnou obětí."
 INS_revolution_events.4.t: "[ENG.GetNameDefCap] odmítá Londýnsko-batávijskou dohodu"
 INS_revolution_events.4.desc: "[ENG.GetNameDefCap] odmítla jakoukoli další pomoc v konfliktu navzdory naléhavosti a nabízené odměně. [ENG.GetLeader] prohlásil, že ačkoli je v jejich nejlepším zájmu, abychom zachovali svou koloniální říši, riziko globální eskalace po jejich zapojení je příliš vysoké a budeme si s tím muset poradit sami."
 INS_revolution_events.4.a: "To nevypadá dobře."
 INS_revolution_events.5.t: "[HOL.GetNameDefCap] žádá o naši pomoc"
 INS_revolution_events.5.desc: "Revolucionáři v Nizozemské východní Indii vyhlásili nezávislost na [HOL.GetNameDef] a obsadili velká města. [HOL.GetLeader] se na nás naléhavě obrátil s žádostí, abychom jim vojensky pomohli, zatímco připravují invazi."
 INS_revolution_events.5.a: "Pokud revolucionáři uspějí, občané v našich koloniích se mohou inspirovat k témuž."
 INS_revolution_events.5.b: "Nemáme zájem."
 INS_revolution_events.6.t: "[ENG.GetNameDefCap] souhlasí, že nám pomůže"
 INS_revolution_events.6.desc: "[ENG.GetNameDefCap] souhlasila s vysláním dobrovolnických jednotek a vybavení do státu [1058.GetName], aby nám pomohla znovu převzít kontrolu nad Indiemi."
 INS_revolution_events.6.a: "To bude snadné."
 INS_revolution_events.7.t: "[ENG.GetNameDefCap] nám odmítá pomoci"
 INS_revolution_events.7.desc: "[ENG.GetNameDefCap] nám odmítla pomoci znovu prosadit kontrolu nad Indiemi a trvá na tom, že Indie nejsou jejich starostí, navzdory jejich blízkosti ke konfliktu. Budeme muset znovu vyzbrojit KNIL sami."
 INS_revolution_events.7.a: "To je nepřijatelné!"
 INS_revolution_events.8.t: "Revoluční milice kují pikle v Indiích"
 INS_revolution_events.8.desc: "Naše koloniální policie ve Východní Indii zatkla a vyslechla několik členů rostoucího revolučního hnutí v Indonésii. Zdá se, že se snaží zřídit vojenskou přítomnost, aby se připravili na zahájení národního tažení za nezávislost. Zatím to nevíme jistě, ale možná plánují ozbrojenou revoluci."
 INS_revolution_events.8.a: "Musíme je bedlivě sledovat."
 INS_revolution_events.9.t: "Indonéské vyhlášení nezávislosti"
 INS_revolution_events.9.desc: "Dnes na Jávě pronesl [INS.GetLeader] projev, v němž vyhlásil nezávislost nově založené Indonéské republiky. Ačkoli tuto novou republiku neuznáváme, její milice obsadily území a naše policie v těchto oblastech selhává ve správě. Pokud tuto situaci nevezmeme vážně, může přerůst v otevřenou válku."
 INS_revolution_events.9.a: "Nepřijatelné!"
 INS_revolution_events.9.b: "Nestojí to za energii; pokud tak moc chtějí nezávislost, budiž."
 INS_revolution_events.11.t: "Vojenské síly Indií úspěšně zastavují tažení milicí"
 INS_revolution_events.11.desc: "Tým republikánských milicí zahájil vojenskou operaci s cílem obsadit [?event_target:INS_temp_occupied_state.GetName]. Našim statečným vojákům v Indiích se podařilo milice vytlačit a my si nad regionem udržujeme plnou kontrolu."
 INS_revolution_events.11.a: "Další vítězství pro [HOL.GetNameDef]."
 INS_revolution_events.12.t: "Milice se pokoušejí obsadit [?event_target:INS_temp_occupied_state.GetName]"
 INS_revolution_events.12.desc: "Tým republikánských milicí zahájil vojenskou operaci s cílem obsadit [?event_target:INS_temp_occupied_state.GetName]. Naše policie a vojáci nakonec situaci zvládli, ale vyvolala nespokojenost ve státě [?event_target:INS_temp_occupied_state.GetName], kde mnoho civilistů milice podporuje a veřejně vystupuje proti [HOL.GetAdjective] vládě."
 INS_revolution_events.12.a: "Nesmíme dovolit, aby to eskalovalo."
 INS_revolution_events.14.t: "Milice obsazují [?event_target:INS_temp_occupied_state.GetName]"
 INS_revolution_events.14.desc: "Navzdory nejlepšímu úsilí naší koloniální policie a vojáků republikánské milice úspěšně zahájily vojenskou operaci k obsazení [?event_target:INS_temp_occupied_state.GetName]. Naše policie a vojáci museli evakuovat a vyhlásili stav neschopnosti spravovat region kvůli odboji milicí. Pokud dovolíme milicím, aby s námi dál takto zacházely, riskujeme, že svou velkou kolonii navždy ztratíme."
 INS_revolution_events.14.a: "To je pobuřující!"
 INS_revolution_no_effect_tt: "Žádné účinky"
 INS_revolution_events.19.t: "Mírová jednání v Indiích"
 INS_revolution_events.19.desc: "[HOL.GetLeader] byl povolán na schůzku s [INS.GetLeader], aby projednali možnou mírovou dohodu. [INS.GetLeader] prohlásil, že bylo ztraceno příliš mnoho životů, a navrhl řešení dvou států, v němž hranice zůstanou tak, jak jsou nyní, s drobnými úpravami, a boje se trvale zastaví."
 INS_revolution_events.19.a: "Musíme souhlasit. Už bylo ztraceno příliš mnoho životů."
 INS_revolution_events.19.b: "Pokud tak zoufale chcete mír, můžete se vzdát!"
 INS_revolution_events.20.t: "[HOL.GetNameDefCap] souhlasí s řešením dvou států!"
 INS_revolution_events.20.desc: "[INS.GetLeader] se vrátil ze schůzky s [HOL.GetLeader] s dobrými zprávami. Obě strany se dohodly na řešení dvou států a my okamžitě začneme přesouvat své jednotky v souladu s novými hranicemi. Ačkoli nikdo není šťastný, že jsme museli zanechat naše indonéské druhy za sebou, rozhodnutí ukončit boje je nakonec nejlepší."
 INS_revolution_events.20.a: "Krveprolití konečně skončí."
 INS_revolution_events.21.t: "[HOL.GetNameDefCap] odmítá zastavit boje"
 INS_revolution_events.21.desc: "Schůzka [INS.GetLeader] s [HOL.GetLeader] nedopadla podle plánu, obě strany se viditelně rozhněvaly a odmítly kompromis, což vedlo k předčasnému ukončení jednání."
 INS_revolution_events.21.a: "Kolik dalších životů musí být ztraceno?"
 INS_revolution_events.22.t: "[HOL.GetNameDefCap] žádá o naši pomoc"
 INS_revolution_events.22.desc: "[HOL.GetLeader] svolal schůzku s [FRA.GetLeader] v Amsterdamu, aby projednali probíhající situaci v Indiích. Během schůzky [HOL.GetLeader] vysvětlil, jak revolucionáři začali vyzbrojovat milice tempem, kterému nizozemská armáda nedokáže stačit, a že [HOL.GetNameDef] hrozí ztráta koloniální hegemonie. [HOL.GetLeader.GetHeShe] požádal, abychom se formálně připojili ke konfliktu na nizozemské straně a vyslali divize do Batávie k pomoci při znovudobytí Indií. Výměnou budeme mít po obnovení pořádku nárok na severovýchodní Sumatru."
 INS_revolution_events.22.a: "Ačkoli pomoc bude nákladná, Sumatra by za to mohla stát."
 INS_revolution_events.22.b: "To je po nás příliš."
 INS_revolution_events.23.t: "[FRA.GetNameDefCap] souhlasí, že nám pomůže!"
 INS_revolution_events.23.desc: "[FRA.GetNameDefCap] souhlasila s naší žádostí o pomoc a okamžitě poslala mnoho francouzských divizí do Batávie, aby nám pomohly."
 INS_revolution_events.23.a: "Šance jsou nyní v náš prospěch."
 INS_revolution_events.24.t: "[FRA.GetNameDefCap] odmítá pomoci."
 INS_revolution_events.24.desc: "[FRA.GetNameDefCap] nám odmítla pomoci s revolucí navzdory naléhavosti. Musíme se začít rychle znovu vyzbrojovat, jinak budeme brzy přečísleni."
 INS_revolution_events.24.a: "To nevypadá dobře."
 INS_revolution_events.25.t: "Konec války v Indonésii"
 INS_revolution_events.25.desc: "[HOL.GetAdjectiveCap] síly zničily hlavní základny milicí a svrhly republikánskou vládu. Republikánské elity a velitelé byli zatčeni a vláda Indií obnovuje své operace na bývalém republikánském území. Jak bylo za naše příspěvky slíbeno, dohodnuté území nám bylo předáno."
 INS_revolution_events.25.a: "Skvělé!"
 INS_revolution_events.26.t: "Konec války v Indonésii"
 INS_revolution_events.26.desc: "[HOL.GetAdjectiveCap] síly a republikánské milice bojují mnohem déle, než kterákoli strana očekávala, a [HOL.GetLeader] souhlasil s podpisem mírové dohody, která ukládá řešení dvou států. Protože jsme však stále splnili svou část dohody, [HOL.GetLeader] potvrdil, že nám bude stále předáno území, které nám bylo slíbeno."
 INS_revolution_events.26.a: "Zajímavý vývoj."
 INS_revolution_events.27.t: "Konec války v Indonésii"
 INS_revolution_events.27.desc: "[HOL.GetAdjectiveCap] síly a republikánské milice bojují mnohem déle, než kterákoli strana očekávala, a navzdory úsilí [HOL.GetNameDef] i našemu vlastnímu vojenskému zapojení způsobila pouhá početnost milicí a partyzánský charakter jejich armády, že konflikt dospěl k patové situaci výrazně ve prospěch republikánů. [HOL.GetLeader] proto dnes oznámil, že [HOL.GetLeader.GetHeShe] podepsal mírovou dohodu s republikou, která ukládá řešení dvou států ve prospěch republikánů. Z toho, co zbylo z Indií, je skořápka bývalé slávy. [HOL.GetLeader] uvedl, že jelikož konflikt skončil porážkou, nebude nám moci předat slíbené území za naše vojenské příspěvky."
 INS_revolution_events.27.a: "To je šílenství!"
 INS_revolution_events.28.t: "Pád Indií"
 INS_revolution_events.28.desc: "Navzdory vysokým vojenským výdajům [HOL.GetNameDef] a našim přímým příspěvkům do konfliktu se obrovskému počtu milicí v Indiích podařilo přemoci naše síly, obsadit všechna velká města, svrhnout nizozemskou správu a vynutit kapitulaci."
 INS_revolution_events.28.a: "Ale bylo nám slíbeno území!"
 INS_revolution_events.29.t: "Pád Indií"
 INS_revolution_events.29.desc: "Navzdory našemu nejlepšímu úsilí revolucionáři v Indiích převzali kontrolu nad našimi velkými městy a zničili koloniální vládu zevnitř. Naši generálové byli zajati a naše komunikační linky přerušeny. Nemáme jinou možnost než přijmout porážku."
 INS_revolution_events.29.a: "To je tragédie."
 INS_revolution_events.30.t: "[INS.GetLeader] navrhuje místní dohodu o příměří"
 INS_revolution_events.30.desc: "[INS.GetLeader] navrhl místní příměří ve státě [FROM.GetName] a slíbil stáhnout své jednotky z [FROM.GetName], pokud budeme souhlasit, což umožní našim jednotkám znovu prosadit kontrolu nad regionem. Podmínkou však je, že dočasně odložíme své hlavní vojenské operace a dáme revolucionářům čas plánovat."
 INS_revolution_events.30.a: "Souhlasíme s tím."
 INS_revolution_events.30.b: "Odmítáme, vezmeme si [FROM.GetName] zpět silou!"
 INS_revolution_events.31.t: "[HOL.GetNameDefCap] souhlasí s příměřím ve státě [FROM.GetName]"
 INS_revolution_events.31.desc: "Jednání o příměří proběhla dobře a [HOL.GetLeader] souhlasil s našimi podmínkami. Nařídili jsme velitelům milicí ve státě [FROM.GetName], aby své síly okamžitě stáhli."
 INS_revolution_events.31.a: "Doufejme, že dodrží svou část dohody."
 INS_revolution_events.32.t: "[HOL.GetNameDefCap] odmítá příměří"
 INS_revolution_events.32.desc: "Jednání o příměří neproběhla podle plánu a [HOL.GetLeader] odmítl dohodu podepsat a ukončil jednání dříve, než bylo možné najít kompromis."
 INS_revolution_events.32.a: "To je nepřijatelné!"
 INS_revolution_events.33.t: "[INS.GetNameDefCap] žádá o zprostředkování"
 INS_revolution_events.33.desc: "Indonéští republikáni formálně požádali o naši pomoc při zprostředkování urovnání s Nizozemci. Naši poradci v regionu hlásí, že se situace rychle zhoršuje a že pokračující nizozemské vojenské operace riskují zatlačení nacionalistů do náruče Sovětů. Nizozemsko je ceněným spojencem v Evropě, ale nemůžeme ignorovat politickou realitu jihovýchodní Asie. Pokud Indonésie padne ke komunismu, protože jsme nečinně přihlíželi, bude to naše selhání."
 INS_revolution_events.33.a: "Vyšlete zprostředkovatele."
 INS_revolution_events.33.b: "Nemůžeme riskovat vztahy s Nizozemci."
 INS_revolution_events.34.t: "[FROM.GetNameDefCap] souhlasí se zprostředkováním"
 INS_revolution_events.34.desc: "Washington souhlasil se zprostředkováním mezi naší vládou a Nizozemci. Američtí vyslanci jsou na cestě a bude navrženo formální příměří. Je to obrovská příležitost. S největší mocností světa podporující vyjednávání bude pro Nizozemce mnohem obtížnější zdržovat nebo se uchýlit k síle. Musíme u jednacího stolu pevně stát a nechat Američany dělat to, co umí nejlépe."
 INS_revolution_events.34.a: "Doufejme, že Nizozemci dostanou rozum."
 INS_revolution_events.35.t: "[USA.GetNameDefCap] oznamuje zprostředkování"
 INS_revolution_events.35.desc: "Američané se vložili do indonéské otázky. Washington tvrdí, že jedná jako neutrální zprostředkovatel, ale důsledky jsou jasné. Pokud nedokážeme tento konflikt vyřešit k jejich spokojenosti, použijí proti nám svůj značný vliv. Naši vyjednavači musí postupovat opatrně. Americkou přízeň si nemůžeme dovolit promarnit."
 INS_revolution_events.35.a: "Vyřešíme to podle vlastních podmínek."
 INS_revolution_events.36.t: "[FROM.GetNameDefCap] odmítá zasáhnout"
 INS_revolution_events.36.desc: "Američané odmítli naši žádost o zprostředkování. Washington se rozhodl stát při svých evropských spojencích, místo aby podpořil náš boj za sebeurčení. Jsme na to sami. Je to hořká rána, ale revoluce nezačala proto, že bychom čekali, že nám cizí mocnosti předají svobodu."
 INS_revolution_events.36.a: "Vyhrajeme tuto válku bez nich."
 INS_revolution_events.37.t: "[USA.GetNameDefCap] vydává ultimátum"
 INS_revolution_events.37.desc: "Američanům došla trpělivost. Washington doručil ultimátum požadující okamžité zastavení všech vojenských operací v Indonésii a uznání indonéské svrchovanosti. Hrozba je sotva zastřená. Naše postavení v mezinárodním společenství nepřežije veřejný rozkol s Američany a naše ekonomika neunese následky. Naši generálové trvají na tom, že tažení lze stále vyhrát, ale za jakou cenu?"
 INS_revolution_events.37.a: "Nemáme jinou možnost než vyhovět."
 INS_revolution_events.37.b: "Indonésie je naše. Neustoupíme."
 INS_revolution_events.38.t: "Nizozemci ustupují"
 INS_revolution_events.38.desc: "Je konec. Nizozemská vláda přijala americké ultimátum a uznala naši svrchovanost. Tři sta padesát let koloniální vlády skončilo nejen na bojišti, ale i u jednacího stolu s vahou největší světové mocnosti za naší věcí. Republika je konečně naše, skutečně a úplně."
 INS_revolution_events.38.a: "Merdeka!"
 INS_revolution_events.39.t: "Nizozemci odmítají"
 INS_revolution_events.39.desc: "Navzdory všem očekáváním Nizozemci odmítli americké ultimátum. Jejich generálové musí věřit, že tuto válku mohou vyhrát dříve, než Washington zasáhne. Mýlí se. S Američany nyní otevřeně oddanými naší věci se rovnováha sil rozhodně posunula. Ať přijdou. Už nebojujeme sami."
 INS_revolution_events.39.a: "Svět stojí při nás."
 INS_revolution_events.40.t: "Nizozemci přijímají naše podmínky"
 INS_revolution_events.40.desc: "Haag přijal naše ultimátum. Nizozemské síly v Indonésii složí zbraně a svrchovanost bude předána Indonéské republice. Je to uspokojivý závěr nešťastné epizody. Našim zájmům v regionu nyní mnohem lépe poslouží stabilní, nezávislá Indonésie než podpírání koloniálního podniku, který Nizozemci už nedokázali udržet."
 INS_revolution_events.40.a: "Rozumný výsledek."
 INS_revolution_events.41.t: "Nizozemci se nám vzpírají"
 INS_revolution_events.41.desc: "Haag naše ultimátum otevřeně odmítl. Nizozemské síly v Indonésii pokračují v operacích v přímém vzdoru americkým požadavkům. Je to mimořádně chybný odhad. Nizozemsko nemůže vést koloniální válku v Asii a zároveň spoléhat na americkou pomoc v Evropě. Přinutili nás jednat."
 INS_revolution_events.41.a: "Budiž."
 INS_revolution_events.42.t: "Poslední vrh kostkou"
 INS_revolution_events.42.desc: "Zprávy našich zpravodajských služeb v Batávii popisují nepřátelskou přípravu, jakou jsme u republikánů ještě nikdy neviděli. Zdá se, že připravují destabilizační operaci k útoku na Jávu a zničení veškeré naší komunikační infrastruktury, což by jim fakticky zaručilo vítězství. Operace je však mimořádně riskantní a vyžaduje, aby na ni přesunuli téměř všechny své zdroje. Naši generálové odhadují, že tuto pozici dokážou udržet jen přibližně dva roky a nemohou z ní snadno vycouvat. Pokud je zadržíme dostatečně dlouho, budeme moci rozdrtit jejich vládu a revoluci jako přezrálé rajče."
 INS_revolution_events.42.a: "Tak začíná poslední bitva."
 INS_revolution_events.43.t: "Byla zřízena základna milice v [FROM.GetName]" # todo: NEW TRANSLATION
 INS_revolution_events.43.desc: "Naše úsilí v [FROM.GetName] bylo úspěšné a místní velitelé milice potvrdili, že jsou připraveni jednat, až nastane čas." # todo: NEW TRANSLATION
 INS_revolution_events.43.a: "Musíme pokračovat v našem úsilí." # todo: NEW TRANSLATION
 INS_chaos_events.1.t: "Bitva v Surabaji"
 INS_chaos_events.1.desc: "Po vyhlášení nezávislosti se moc v Surabaji stala nestabilní. Dnes skupina nizozemských loajalistů vztyčila starou koloniální vlajku na bývalém hotelu Yamato. Místní mládež z Pemudy budovu vzala útokem, vlajky odstranila a místo nich vztyčila červeno-bílou indonéskou vlajku. Incident přerostl v násilný, neorganizovaný boj."
 INS_chaos_events.1.a: "Jak se sluší!"
 INS_chaos_events.1.b: "Nařiďte příměří, nemůžeme riskovat eskalaci."
 INS_chaos_events.2.t: "Socialistické strany se slučují"
 INS_chaos_events.2.desc: "Dvě největší socialistické strany v Indonésii, vedené Amirem Sjarifuddinem a Sutanem Sjahrirem, dnes oznámily sloučení a vytvořily sjednocenou Socialistickou stranu Indonésie. To výrazně zvyšuje politický vliv strany a potenciálně ohrožuje naši správu."
 INS_chaos_events.2.a: "Povolit to."
 INS_chaos_events.2.b: "Na politiku není čas, vyhlásit stanné právo!"
 INS_chaos_events.3.t: "Neúspěšný pokus o atentát na Sukarna"
 INS_chaos_events.3.desc: "Dnes došlo k pokusu o atentát na Sukarna ze strany nizozemského vojáka, který vystřelil na Sukarnovo auto. Naštěstí Sukarno ve vozidle nebyl, jeho řidič však byl těžce zraněn. Ačkoli byl tento pokus neúspěšný, je jasné, že nebude poslední, ať už ze strany nizozemských vojáků, nebo indonéské opozice."
 INS_chaos_events.3.a: "Musíme obnovit pořádek!"
 INS_chaos_events.4.t: "Sukarnův atentát"
 INS_chaos_events.4.desc: "Indonésii dnes postihl tragický den. Sukarno čelil dalšímu pokusu o atentát, tentokrát úspěšnému. Nesmíme dopustit, aby z toho vznikla nástupnická krize; pořádek musí být rychle obnoven, jinak se republika zhroutí."
 INS_chaos_events.4.a: "Moci se ujme viceprezident Hatta."
 INS_chaos_events.4.b: "Moci se ujme Socialistická strana."
 INS_chaos_events.4.c: "Zrušte republiku, Tan Malaka nás dovede k vítězství!"
 INS_loyalist_events.1.t: "[INS.GetLeader] žádá o přesun Henriho Winkelmana"
 INS_loyalist_events.1.desc: "[INS.GetLeader] nás kontaktoval ohledně probíhajících konfliktů po celém světě a nebezpečné pozice, v níž se [INS.GetNameDef] nachází. [INS.GetLeader] navrhl, aby byl Henri Winkelman, bývalý velitel Královské nizozemské východoindické armády, formálně převeden zpět do [INS.GetNameDef], aby zajistil bezpečnost kolonie."
 INS_loyalist_events.1.a: "Zařídíme jeho okamžitý přesun."
 INS_loyalist_events.1.b: "Henri Winkelman je potřebný v mateřské zemi."
 INS_loyalist_events.2.t: "[HOL.GetLeader] souhlasí s přesunem Henriho Winkelmana."
 INS_loyalist_events.2.desc: "[INS.GetLeader] se vrátil z [HOL.GetNameDef], kde se setkal s [HOL.GetLeader]. Schůzka dopadla dobře, [HOL.GetLeader] uznal situaci a souhlasil s okamžitým přesunem Winkelmana. Henri Winkelman je na cestě do státu [1058.GetName], kde bude čekat na naše rozkazy."
 INS_loyalist_events.2.a: "To bude velmi užitečné."
 INS_loyalist_events.3.t: "[HOL.GetLeader] odmítá přesunout Henriho Winkelmana"
 INS_loyalist_events.3.desc: "[INS.GetLeader] se vrátil z [HOL.GetNameDef], kde se setkal s [HOL.GetLeader]. Henri Winkelman bohužel nebude poslán do Indií a budeme se muset bránit bez něj."
 INS_loyalist_events.3.a: "Musíme rychle vymyslet nový plán."
 INS_henri_winkelman_tt: "Přesun Henriho Winkelmana odmítnut"
 INS_loyalist_events.4.t: "[FROM.GetNameDefCap] navrhuje sjednocení"
 INS_loyalist_events.4.desc: "Do [ROOT.Capital.GetCapitalVictoryPointName] dorazila [FROM.GetAdjective] delegace s návrhem na sjednocení. Poukazují na společné malajské dědictví našich národů a poznamenávají, že hranice mezi našimi zeměmi stanovili evropští koloniální správci, nikoli lidé, kteří tyto země obývají. Návrh by znamenal rozpuštění obou vlád a jejich přetvoření v jediný stát."
 INS_loyalist_events.4.a: "Návrh přijímáme."
 INS_loyalist_events.4.b: "Musíme odmítnout."
 INS_loyalist_events.5.t: "[FROM.GetNameDefCap] přijímá sjednocení"
 INS_loyalist_events.5.desc: "Naši diplomaté se vrátili z [FROM.Capital.GetCapitalVictoryPointName] se skvělými zprávami. [FROM.GetAdjectiveCap] vláda přijala náš návrh a její úředníci již připravují začlenění jejich území do naší správy."
 INS_loyalist_events.5.a: "Společně jsme silnější!"
 INS_loyalist_events.6.t: "[FROM.GetNameDefCap] odmítá sjednocení"
 INS_loyalist_events.6.desc: "Naši diplomaté se vrátili z [FROM.Capital.GetCapitalVictoryPointName] s prázdnýma rukama. [FROM.GetAdjectiveCap] vláda nebyla ochotna návrh vůbec zvažovat. Bylo uvedeno jen málo důvodů a naše delegace byla poslána domů s pouhými zdvořilostními formalitami."
 INS_loyalist_events.6.a: "Jejich ztráta."
 INS_loyalist_events.7.t: "[FROM.GetNameDefCap] požaduje referendum v [MAL.GetName]"
 INS_loyalist_events.7.desc: "[FROM.GetNameDefCap] formálně požádal, abychom povolili referendum v [MAL.GetName] o otázce sjednocení s jeho státem. Jejich velvyslanec mluvil přímo o pravděpodobném výsledku a prohlásil, že malajský lid na obou stranách hranice se považuje za jeden národ. Povolení hlasování by téměř jistě znamenalo ztrátu [MAL.GetName]."
 INS_loyalist_events.7.a: "Ať rozhodne lid."
 INS_loyalist_events.7.b: "To nedovolíme."
 INS_loyalist_events.8.t: "[FROM.GetNameDefCap] schvaluje referendum o sjednocení"
 INS_loyalist_events.8.desc: "Náš suzerén udělil [FROM.FROM.GetNameDef] povolení uspořádat referendum v naší zemi. [FROM.FROM.GetAdjectiveCap] agitátoři dorazili v plné síle a hlasování má začít během měsíce. Otázka položená našemu lidu je jednoduchá. Chceme se připojit k [FROM.FROM.GetNameDef], nebo chceme zůstat tak, jak jsme?"
 INS_loyalist_events.8.a: "Připojíme se k nim."
 INS_loyalist_events.8.b: "Raději zůstaneme."
 INS_loyalist_events.9.t: "[FROM.GetNameDefCap] hlasuje proti sjednocení"
 INS_loyalist_events.9.desc: "Referendum v [FROM.GetName] skončilo. [FROM.GetAdjectiveCap] lid hlasoval pro setrvání pod naší správou. [FROM.FROM.GetAdjectiveCap] agitátoři odjeli."
 INS_loyalist_events.9.a: "Jak se očekávalo."
 INS_loyalist_events.10.t: "[FROM.GetNameDefCap] hlasuje pro sjednocení"
 INS_loyalist_events.10.desc: "Referendum v [FROM.GetName] skončilo rozhodným hlasem ve prospěch sjednocení s [FROM.FROM.GetNameDef]. Naši správci v regionu hlásí, že výsledek byl očekáván. Jsme povinni jej respektovat."
 INS_loyalist_events.10.a: "Dali jsme své slovo."
 INS_loyalist_events.11.t: "Malajské referendum uspělo"
 INS_loyalist_events.11.desc: "Lid [MAL.GetName] hlasoval pro připojení k našemu národu. [MAL.GetAdjectiveCap] úředníci spolupracují s naší správou na zahájení předání autority. Na mapě malajského světa bude o jednu hranici méně."
 INS_loyalist_events.11.a: "Vítejte doma."
 INS_loyalist_events.12.t: "Malajské sjednocení odmítnuto"
 INS_loyalist_events.12.desc: "Náš návrh na sjednocení s [MAL.GetName] byl odmítnut. [MAL.GetAdjectiveCap] vláda, nebo ti nad ní, se rozhodli proti němu. Budeme se muset k této otázce vrátit v příhodnější době."
 INS_loyalist_events.12.a: "Na to nezapomeneme."
 INS_loyalist_events.13.t: "[FROM.GetNameDefCap] navrhuje kompromis ohledně Singapuru"
 INS_loyalist_events.13.desc: "[FROM.GetAdjectiveCap] vláda nás oslovila s návrhem týkajícím se Singapuru. Žádají svrchovanost nad ostrovem s odkazem na jeho místo v malajském světě. Na oplátku jsou připraveni zaručit náš pokračující přístup k přístavu, jeho vojenským zařízením a všem aktuálně platným právům na těžbu zdrojů."
 INS_loyalist_events.13.a: "Spravedlivé uspořádání."
 INS_loyalist_events.13.b: "Singapur není na prodej."
 INS_loyalist_events.14.t: "Singapurský kompromis přijat"
 INS_loyalist_events.14.desc: "Dohoda byla přijata. Singapur bude převeden pod naši kontrolu, zatímco bývalí správci si ponechají obchodní a vojenský přístup k přístavu. Naše vlajka nyní vlaje nad jedním z nejdůležitějších přístavů v Asii."
 INS_loyalist_events.14.a: "Průlivy jsou naše."
 INS_loyalist_events.15.t: "Singapurský kompromis odmítnut"
 INS_loyalist_events.15.desc: "Náš návrh byl odmítnut. Správci Singapuru se nejsou ochotni vzdát ostrova za žádných podmínek. Nabídli jsme jim všechno kromě pokračující svrchovanosti a nestačilo to."
 INS_loyalist_events.15.a: "Budiž."
 INS_loyalist_events.16.t: "[FROM.GetNameDefCap] žádá o předání Cejlonu"
 INS_loyalist_events.16.desc: "[FROM.GetAdjectiveCap] vláda vznesla formální žádost o předání Cejlonu. Jejich diplomaté poukazují na dlouhodobé obchodní a etnické vazby mezi ostrovem a malajským světem. Nárok je upřímně řečeno slabý, ale [FROM.GetNameDef] zesílil natolik, že takové žádosti musí být brány vážně."
 INS_loyalist_events.16.a: "Dobrá, ať ho mají."
 INS_loyalist_events.16.b: "Cejlon zůstane pod naší kontrolou."
 INS_loyalist_events.17.t: "Cejlon předán"
 INS_loyalist_events.17.desc: "Předání Cejlonu je dokončeno. Naše správa začala přesouvat úředníky na ostrov a předání proběhlo bez incidentů. Nyní držíme pozici na obou stranách průlivu."
 INS_loyalist_events.17.a: "Výborně."
 INS_loyalist_events.18.t: "Žádost o Cejlon zamítnuta"
 INS_loyalist_events.18.desc: "Naše žádost o předání Cejlonu byla zamítnuta. Současní správci nemají v úmyslu se ostrova vzdát a naši diplomaté hlásí, že další diskuse na toto téma by byla marná."
 INS_loyalist_events.18.a: "Snad jindy."
 INS_loyalist_events.19.t: "[FROM.GetNameDefCap] požaduje referendum na Papui"
 INS_loyalist_events.19.desc: "[FROM.GetNameDefCap] požadoval, abychom povolili referendum ve východní Papui. Na [FROM.GetAdjective] straně hranice vedou džunglí nové silnice, kliniky obsluhují vládní lékaři a školy vyučují v místních jazycích. Na naší straně poslední guvernér navštívil Port Moresby dvakrát za tři roky. [FROM.GetAdjectiveCap] velvyslanec už nemusel říkat o mnoho víc."
 INS_loyalist_events.19.a: "Ať uspořádají hlasování."
 INS_loyalist_events.19.b: "To nedovolíme."
 INS_loyalist_events.20.t: "Papujské referendum schváleno"
 INS_loyalist_events.20.desc: "Australané souhlasili s uspořádáním referenda. Každý okres ve východní Papui vrátil stejný výsledek. Naše investice do západní poloviny ostrova promluvily hlasitěji než jakýkoli volební plakát."
 INS_loyalist_events.20.a: "Ostrov je konečně celý."
 INS_loyalist_events.21.t: "Papujské referendum zamítnuto"
 INS_loyalist_events.21.desc: "Australané odmítli. Jejich guvernér v Port Moresby vydal prohlášení, v němž žádost označil za urážku australské svrchovanosti. Samotný papuánský lid nebyl dotázán."
 INS_loyalist_events.21.a: "To si zapamatujeme."
 INS_loyalist_events.22.t: "[FROM.GetNameDefCap] požaduje Východní Timor"
 INS_loyalist_events.22.desc: "[FROM.GetAdjectiveCap] vláda vydala formální požadavek na vydání Východního Timoru. Jejich velvyslanec poznamenal, že naše posádka tam čítá méně než dvě stě mužů a že Lisabon tomuto území po léta nepřidělil téměř nic. Poté se zeptal, čeho přesně se vlastně držíme."
 INS_loyalist_events.22.a: "Nestojí za to kvůli tomu bojovat."
 INS_loyalist_events.22.b: "Timor je náš a zůstane náš."
 INS_loyalist_events.23.t: "Východní Timor vydán"
 INS_loyalist_events.23.desc: "Správci Východního Timoru začali stahovat svou posádku a balit koloniální správu. Celý ostrov bude brzy pod [INS.GetAdjective] autoritou."
 INS_loyalist_events.23.a: "Jak má být."
 INS_loyalist_events.24.t: "Požadavek na Východní Timor odmítnut"
 INS_loyalist_events.24.desc: "Koloniální guvernér v Dili nám osobně napsal, aby odmítl náš požadavek, a trvá na tom, že Východní Timor zůstává svrchovaným územím jeho vlády. Náš generální štáb vypracoval nouzové plány, pokud by kabinet chtěl v této záležitosti pokračovat."
 INS_loyalist_events.24.a: "Zahajte přípravy."
 INS_loyalist_events.25.t: "[FROM.GetNameDefCap] navrhuje sjednocení"
 INS_loyalist_events.25.desc: "[FROM.GetAdjectiveCap] delegace dorazila s návrhem na sjednocení našich dvou republik. Tvrdí, že naše národy sdílejí společné austronéské kořeny mnohem starší než koloniální hranice, které nás rozdělují, a že jediný stát rozprostírající se přes souostroví by byl přední mocností jihovýchodní Asie. Přijetí by znamenalo rozpuštění naší vlády a integraci do jejich."
 INS_loyalist_events.25.a: "Přijímáme."
 INS_loyalist_events.25.b: "Za tuto republiku jsme bojovali příliš tvrdě."
 INS_loyalist_events.26.t: "[FROM.GetNameDefCap] přijímá sjednocení"
 INS_loyalist_events.26.desc: "[FROM.GetAdjectiveCap] vláda přijala náš návrh. Jejich úředníci již koordinují s našimi zahájení integračního procesu. Od Ačehu po Luzon, od Bornea po Mindanao, náš národ nyní pokrývá celou šíři malajského souostroví."
 INS_loyalist_events.26.a: "Začíná nová éra."
 INS_loyalist_events.27.t: "[FROM.GetNameDefCap] odmítá sjednocení"
 INS_loyalist_events.27.desc: "[FROM.GetAdjectiveCap] vláda odmítla. Jejich vlastní boj za nezávislost je příliš nedávný a příliš nákladný na to, aby se vzdali své svrchovanosti ve prospěch jiného státu. Návrh byl odložen."
 INS_loyalist_events.27.a: "Škoda."
 INS_loyalist_events.28.t: "[FROM.GetNameDefCap] žádá o referendum v [PHI.GetName]"
 INS_loyalist_events.28.desc: "[FROM.GetNameDefCap] formálně požádal, abychom povolili referendum v [PHI.GetName] o otázce sjednocení. Jejich diplomaté zdůrazňují společný austronéský původ obou národů a umělou povahu koloniálních hranic, které je oddělují. Pokud se hlasování uskuteční, výsledek bude pravděpodobně ve prospěch [FROM.GetNameDef]."
 INS_loyalist_events.28.a: "Lid by měl dostat slovo."
 INS_loyalist_events.28.b: "Ani náhodou."
 INS_loyalist_events.29.t: "Referendum o sjednocení schváleno"
 INS_loyalist_events.29.desc: "[FROM.FROM.GetNameDefCap] navrhl sjednocení našich dvou národů na základě společného austronéského dědictví. Náš suzerén jim udělil povolení uspořádat k této otázce referendum a [FROM.FROM.GetAdjective] agitátoři již začali přijíždět. Výsledek rozhodne, zda se naše republika připojí k [FROM.FROM.GetNameDef], nebo bude pokračovat v současném uspořádání."
 INS_loyalist_events.29.a: "Je to zajímavý návrh."
 INS_loyalist_events.29.b: "V žádném případě."
 INS_loyalist_events.30.t: "[FROM.GetNameDefCap] hlasuje proti sjednocení"
 INS_loyalist_events.30.desc: "Volební urny byly sečteny a [FROM.FROM.GetAdjective] agitátoři posláni pryč. [FROM.GetAdjectiveCap] lid hlasoval pro setrvání. Zdá se, že nezávislost v [FROM.Capital.GetCapitalVictoryPointName] stále něco znamená."
 INS_loyalist_events.30.a: "Tím to končí."
 INS_loyalist_events.31.t: "[FROM.GetNameDefCap] hlasuje pro sjednocení"
 INS_loyalist_events.31.desc: "Volební urny byly sečteny. [FROM.GetAdjectiveCap] lid si vybral [FROM.FROM.GetNameDef] místo nás a rozdíl nebyl těsný. Naši správci už dostávají pokyny k zahájení předání."
 INS_loyalist_events.31.a: "Lid promluvil."
 INS_loyalist_events.32.t: "[PHI.GetNameDefCap] hlasuje pro sjednocení"
 INS_loyalist_events.32.desc: "[PHI.GetAdjectiveCap] referendum skončilo v náš prospěch. Jejich vláda výsledek přijala a navázala kontakt s naším ministerstvem zahraničí, aby dohodla předání autority."
 INS_loyalist_events.32.a: "Konečně spolu."
 INS_loyalist_events.33.t: "[PHI.GetNameDefCap] odmítá sjednocení"
 INS_loyalist_events.33.desc: "[PHI.GetAdjectiveCap] vláda odmítla náš návrh na sjednocení. Jejich parlament jej zamítl bez jediného druhého čtení. Nabídli jsme jim místo v největším národě jihovýchodní Asie a oni na něj plivli."
 INS_loyalist_events.33.a: "Jen nezdar, nic víc."
 INS_communist_events.6.t: "[FROM.GetAdjectiveCap] agenti agitují v [ROOT.GetName]"
 INS_communist_events.6.desc: "Naše zpravodajské služby potvrdily to, co jsme dlouho tušili. [FROM.GetNameDefCap] vede v našich hranicích soustavnou podvratnou kampaň, financuje radikální buňky, šíří pobuřující letáky a organizuje stávky mezi dělníky. Jejich agenti se usadili v odborech a venkovských družstvech a nyní otevřeně volají po svržení naší vlády. Situace dosáhla kritického bodu a musíme jednat rozhodně, než se vymkne naší kontrole."
 INS_communist_events.6.a: "To nelze tolerovat!"
 INS_communist_events.7.t: "Komunistická subverze v [FROM.GetName]"
 INS_communist_events.7.desc: "Z [FROM.FROM.GetName] k nám dorazily znepokojivé zprávy. Agenti jednající jménem [FROM.GetNameDef] rozdmýchávají revoluční nálady mezi místním obyvatelstvem a využívají křivdy vůči naší správě k budování podpory pro komunistické převzetí moci. Pokud to necháme bez kontroly, [FROM.FROM.GetNameDef] může být zcela ztracen ve prospěch radikálů a hniloba se může rozšířit i do dalších našich držav."
 INS_communist_events.7.a: "Musíme to zadupat dříve, než se to rozšíří!"
 INS_communist_events.8.t: "[FROM.GetAdjectiveCap] propaganda koluje v [ROOT.GetName]"
 INS_communist_events.8.desc: "V našich továrnách, trzích a univerzitách se stále častěji objevují pamflety a letáky [FROM.GetAdjective] původu. Hlásají evangelium třídního boje a slibují osvobození skrze revoluci a naše policie hlásí, že mezi nespokojenými nacházejí vnímavé publikum. Materiál je hrubý, ale účinný a jeho šíření nejeví známky zpomalení."
 INS_communist_events.8.a: "Zjistěte, kdo tu špínu rozdává!"
 INS_communist_events.1.t: "Revoluce v [ROOT.GetName]"
 INS_communist_events.1.desc: "Situace se zhoršila za hranici nápravy. Měsíce [FROM.GetAdjective] agitace vykonaly své a komunistické hnutí v [ROOT.GetName] už nelze zadržet běžnými prostředky. Generální stávky ochromily města, ozbrojení partyzáni ovládají celé provincie a [FROM.GetAdjective] vláda vrhla celou svou váhu za revolucionáře. Naše bezpečnostní síly jsou přetížené a jejich loajalita už není jistá. Musíme se nyní rozhodnout, zda bojovat o přežití státu, nebo přijmout nevyhnutelné dříve, než bude prolito více krve."
 INS_communist_events.1.a: "Shromážděte armádu. Neodejdeme potichu."
 INS_communist_events.1.b: "Další odpor přinese našemu lidu jen zkázu."
 INS_communist_events.1.c: "Možná pokud jim dáme místo u stolu, stále je dokážeme ovládat."
 INS_communist_events.2.t: "[FROM.GetNameDefCap] se rozhoduje bojovat"
 INS_communist_events.2.desc: "Vláda v [FROM.GetName] odmítla ustoupit a nařídila ozbrojeným silám potlačit revoluční hnutí silou. Naši soudruzi tam již zaujímají pozice a obsazují klíčové opěrné body. Boj nebude krátký, ale lid [FROM.GetName] učinil svou volbu a my zajistíme, že v ní nebude stát sám."
 INS_communist_events.2.a: "Revoluce pochoduje vpřed."
 INS_communist_events.3.t: "[FROM.GetNameDefCap] padl"
 INS_communist_events.3.desc: "Stará vláda v [FROM.GetName] kapitulovala. Tváří v tvář plnému rozsahu revolučního hnutí a jistotě, že [ROOT.GetNameDef] stojí za ním, neviděla jinou cestu vpřed než podrobení. Moc byla předána místní komunistické straně a nová vláda se na nás již začala obracet o vedení. Další národ byl osvobozen ze sevření starého řádu."
 INS_communist_events.3.a: "Velké vítězství pro pracující lid světa."
 INS_communist_events.4.t: "V [FROM.GetName] propuká občanská válka"
 INS_communist_events.4.desc: "Komunističtí revolucionáři, vyzbrojení a organizovaní s podporou [FROM.FROM.GetNameDef], zahájili otevřené povstání v [FROM.GetName]. Koloniální správa ztratila kontrolu nad rozsáhlými částmi území a guvernér hlásí, že místní posádka nedokáže obnovit pořádek bez posil."
 INS_communist_events.4.a: "Pošlete jednotky. [FROM.GetName] je náš!"
 INS_communist_events.5.t: "[FROM.GetName] ztracen ve prospěch komunistů"
 INS_communist_events.5.desc: "Správa v [FROM.GetName] se bez boje vzdala komunistickým povstalcům. Guvernér a jeho štáb byli zatčeni, naše vlajka stažena a místo ní byla vyhlášena revoluční vláda. To vše zorganizovali [FROM.FROM.GetNameDef] a jejich agenti, kteří po měsíce pracovali na podkopání naší autority. To není nic menšího než krádež a nezůstane bez odpovědi."
 INS_communist_events.5.a: "To je pobuřující!"
 INS_communist_events.9.t: "[FROM.GetAdjectiveCap] důstojníci spatřeni při schůzkách s disidenty"
 INS_communist_events.9.desc: "[FROM.GetAdjectiveCap] operativci byli spatřeni ve společnosti známých agitátorů a militantních vůdců po celé zemi. Studentští organizátoři, kteří kdysi rozdávali letáky na rozích ulic, nyní pořádají schůzky za zavřenými dveřmi s muži nesoucími [FROM.GetAdjective] diplomatické dokumenty. Zakázané publikace se tisknou rychleji, než je policie dokáže zabavit, a protesty, které kdysi vyšuměly za jedno odpoledne, nyní na celé dny uzavírají celé čtvrti. Tito komunisté se každý den učí organizovat ve větších skupinách; pokud nebudeme jednat rychle, můžeme nad nimi ztratit kontrolu."
 INS_communist_events.9.a: "Okamžitě vykořeňte tyto cizí agenty!"
 INS_communist_events.10.t: "[FROM.GetAdjectiveCap] rétorika získává půdu"
 INS_communist_events.10.desc: "[FROM.GetAdjectiveCap] pamflety kolují v kasárnách a státní službě a úsilí o jejich zabavování jen málo brzdí příliv. Mluví o národech zbavených okovů, o lidech, kteří svrhli své koloniální guvernéry a vybudovali něco vlastního. Bylo by snazší je potlačit, kdyby ta myšlenka nezněla pravdivě. I loajální úředníci se začali potichu ptát, zda naše současné uspořádání slouží našemu lidu, nebo pouze našim pánům."
 INS_communist_events.10.a: "Musíme postupovat opatrně."
 taog_news.1.t: "Úsvit Nizozemsko-indonéské unie"
 taog_news.1.desc: "Královna Vilemína včera v [1058.GetName] učinila oznámení, v němž vyhlásila nečekané vytvoření Nizozemsko-indonéské unie. S mateřskou zemí pod okupací se [HOL.GetAdjective] exilová vláda a [INS.GetAdjective] správa dohodly, že budou vládnout jako jeden orgán pod korunou. Představitelé obou zemí tento krok popisují spíše jako nezbytné opatření než jako volbu - zoufalou snahu zachovat jednotu a autoritu království napříč dvěma kontinenty."
 taog_news.1.a: "Zajímavý vývoj."
 taog_news.2.t: "Indonéské vyhlášení nezávislosti"
 taog_news.2.desc: "[INS.GetAdjectiveCap] revolucionář [INS.GetLeader] dnes na Jávě pronesl projev, v němž vyhlásil nezávislost nově vzniklé Indonéské republiky. [HOL.GetNameDef] svrchovanost této nově vzniklé republiky neuznává, republikánské milice však již fakticky ovládají určitá území."
 taog_news.2.a: "To by mohlo vyvolat rozsáhlý posun po celém světě."
 siam.1.t: "[SIA_phraya_phahon.GetName] zapleten do skandálu"
 siam.1.desc: "[SIA_phraya_phahon.GetName] je obviněn z prodeje korunových nemovitostí úředníkům za ceny pod tržní hodnotou, což je skandál, který výrazně oslabil jeho legitimitu v Lidovém shromáždění. Zdá se, že vliv [SIA_phraya_phahon.GetName] se chýlí ke konci."
 siam.1.a: "Možná to uvolní cestu někomu jinému?"
 siam.2.t: "Třetí pokus o život [SIA_plaek_phibunsongkhram.GetName]"
 siam.2.desc: "Zpráva bangkockého zpravodaje Reuters odhaluje třetí pokus za čtyři roky otrávit předsedu vlády Siamu (pana Phibula Songgrama)\nMinulý týden, jak se uvádí, byl do jídla přimíchán jed a dočasně zasáhl pana Songgrama, jeho manželku i dceru.\nBritský ministr zahraničí (lord Halifax) ve zprávě panu Songgramovi vyjádřil znepokojení nad zbabělým pokusem o život předsedy vlády a radost nad jeho únikem."
 siam.2.a: "Kdo to jen mohl udělat?"
 siam.3.t: "Phraya Songsuradet poslán do vyhnanství"
 siam.3.desc: "Phraya Songsuradet je obviněn, že byl hlavou jednoho či více pokusů o atentát na [SIA_plaek_phibunsongkhram.GetName], stejně jako z přípravy puče proti jeho vládě. Vůlí vlády je, aby byl Phraya Songsuradet zbaven velení, přišel o své hodnosti a tituly, byl donucen odejít z armády bez penze a vypovězen ze země.\nKritici tvrdí, že jde o sotva zastřenou čistku, kterou [SIA_plaek_phibunsongkhram.GetName] podnítil, aby odstranil svého hlavního soupeře, ale to je zjevně pomluva."
 siam.3.a: "Smutný konec."
 siam.4.t: "Stoupenci Songsuradeta zatčeni"
 siam.4.desc: "V časných ranních hodinách vláda s pomocí Královské thajské policie zatkla dalších 51 podezřelých a stoupenců, včetně prince Rangsita, Phrayi Thepahatsadina a Phrayi Udoma Pongphensawada. Jsou obviněni ze spiknutí s Phrayou Songsuradetem proti státu, přičemž zvláštní pozornost budí skutečnost, že Rangsit, člen královské rodiny, má stanout před soudem. Někteří komentátoři se ptají, zda byl princ cíleně vybrán, aby vyslal vzkaz královským osobám, které zůstaly v [THIS.GetName]: držte linii, nebo padnete."
 siam.4.a: "Zápletka houstne."
 siam.5.t: "Vzpoura osmnácti mrtvol"
 siam.5.desc: "Phibul zřídil zvláštní tribunál, který měl soudit 51 osob zapojených do vzpoury; z nich má být 25 uvězněno na doživotí a 21 popraveno zastřelením. Ze 21 mají být tři omilostněni kvůli své čestné službě, jmenovitě princ Rangsit a Phraya Thepahatsadin."
 siam.5.a: "Tato záležitost je vyřízena."
 siam.6.t: "Songsuradetova patová situace"
 siam.6.desc: "Phraya Songsuradet je obviněn z toho, že byl strůjcem jednoho či více pokusů o atentát na [SIA_plaek_phibunsongkhram.GetName], a také z plánování puče proti jeho vládě. Vůlí vlády je zbavit Songsuradeta velení a poslat jej do exilu.\nJeho zatčení však zabránil vojenský personál loajální Songsuradetovi, který zatčení odsoudil jako politicky motivované. Vláda a Songsuradetova vojenská klika se nyní ocitly v patové situaci a ani jedna strana nehodlá ustoupit."
 siam.6.a: "Neustoupíme."
 siam.6.b: "Tohle se obrátilo proti nám. Ustupme."
 siam.7.t: "Songsuradet hledá podporu námořnictva"
 siam.7.desc: "Zatímco napjatá patová situace mezi vládními silami a Songsuradetovou vojenskou klikou pokračuje, vládní vyšetřovatelé začali slýchat zvěsti, že mezi Královským námořnictvem a Songsuradetem vzniklo spojenectví s výslovným cílem čelit Phibunovu sílícímu autoritářství.\nA to není vše. Někteří pobočníci královského dvora oznámili, že se zástupci Songsuradeta setkali s vysoce postavenými princi, což zvyšuje obavy, že se k opozici přidají i roajalisté."
 siam.7.a: "My jsme vláda, nenecháme se vydírat!"
 siam.7.b: "Tohle se vymyká kontrole. Ustupme."
 siam.8.t: "Songsuradetovo povstání"
 siam.8.desc: "Songsuradetova vojenská klika si zajistila dostatečnou politickou i vojenskou podporu a ve spojení s námořnictvem fakticky ovládla rozsáhlé oblasti [THIS.GetName]. V časných ranních hodinách se na předměstích Bangkoku rozezněla střelba a celá země se zdá být na pokraji rozsáhlé občanské války mezi vládou a Songsuradetem."
 siam.8.a: "Vláda musí přežít."
 siam.9.t: "Konec Songsuradetova povstání"
 siam.9.desc: "Povstání leží v troskách a po Songsuradetově zajetí zbývá už jen proces, ačkoli v tuto chvíli jde pouze o formalitu. Spiknutí bylo odhaleno nejen v armádě a námořnictvu, ale i mezi členy královského rodu, přičemž princ Rangsit byl přistižen při otevřené podpoře povstalců. Hluboká čistka disidentů se stala nutností, nikoli možností."
 siam.9.a: "Je čas znovu budovat."
 siam.10.t: "Vítězství!"
 siam.10.desc: "Nepřítel ustupuje a naše vítězství se zdá být jisté. Když máme území pevně pod kontrolou, staré imperialistické síly se musí třást strachy. Jak mohly prohrát? Je to znamení naší božské prozřetelnosti."
 siam.10.a: "Za [ROOT.GetName]!"
 siam.10.b: "Vlastně to jde docela dobře"
 siam.11.t: "[FROM.GetAdjectiveCap] strategický průlom"
 siam.11.desc: "Navzdory očekáváním [FROM.GetAdjective] armáda přechytračila naše síly a zmocnila se sporného regionu. Jejich okupace oslabila naši autoritu a zpochybnila náš nárok na tuto oblast. Pokračování konfliktu hrozí dalším úpadkem disciplíny a důvěry, zatímco vzdání se území by bylo veřejným přiznáním neúspěchu."
 siam.11.a: "Musíme omezit ztráty a stáhnout se."
 siam.11.b: "Svého nároku se nevzdáme!"
 siam.12.t: "[FROM.GetName] přijímá porážku"
 siam.12.desc: "Naše tažení uspělo. Nepřátelský odboj se zhroutil a [FROM.GetName] se formálně vzdal kontroly nad spornými územími, aby zabránil dalšímu zpustošení. Toto vítězství posiluje naše postavení a zajišťuje naše hranice - prozatím."
 siam.12.a: "Naše síla je nepopiratelná."
 siam.13.t: "[FROM.GetName] odmítá jakékoli urovnání"
 siam.13.desc: "[FROM.GetName] odmítl všechny návrhy zahrnující územní ústupky a označil je za nepřijatelné. Jeho vedení prohlásilo, že tento konflikt ukončí pouze zničení našeho státu."
 siam.13.a: "Budiž."
 siam.14.t: "[FROM.GetNameDefCap] se zavazuje k totální válce"
 siam.14.desc: "[FROM.GetNameDefCap] odložil veškeré předstírání vyjednávání. Jeho záměr je jasný: úplné dobytí a pohlcení našeho národa. Tuto válku nerozhodnou smlouvy, nýbrž naprosté vítězství nebo úplný kolaps."
 siam.14.a: "Žádný kompromis, žádná kapitulace."
 siam.15.t: "[SIA.GetAdjectiveCap] útok se zastavil"
 siam.15.desc: "Rychlý útok [SIA.GetAdjective] sil nás sice mohl zaskočit, ale jak se jejich postup pod rostoucím tlakem zadrhává, jejich slabost je zjevná. To, co mělo být bleskovým tažením, se pro [SIA.GetAdjective] armádu změnilo ve vyčerpávající strádání. Mohli bychom projevit velkorysost a nabídnout jim cestu ven prostřednictvím ústupků, avšak rozhodnutí, zda milosrdenství poslouží našim zájmům lépe než úplné vítězství, spočívá na nás."
 siam.15.a: "Nabídněte ústupky."
 siam.15.b: "Přijatelné je pouze úplné vítězství."
 siam.16.t: "Zastavená ofenzíva"
 siam.16.desc: "Naše ofenzíva se zastavila. To však není ten problém. Problém je, že to ví náš nepřítel. Poslal nám ultimátum: buď se nyní vzdáme s minimálními ztrátami, nebo budeme pokračovat ve válce s větším krveprolitím. Jediný rozdíl je v tom, kolik mrtvých bude třeba pohřbít."
 siam.16.a: "Mír tedy budiž"
 siam.16.b: "Nikdy se nevzdáme!"
 siam.17.t: "[FROM.GetName] odmítá ustoupit"
 siam.17.desc: "[FROM.GetName] naprosto jednoznačně prohlásil, že raději uvidí celou svou zemi v plamenech, než aby nám postoupil jediný kousek území. Válka pokračuje."
 siam.17.a: "Jejich přání se jim splní."
 siam.18.t: "[FROM.GetName] nás chce donutit kapitulovat!"
 siam.18.desc: "Zachycená komunikace nepřátelského vrchního velení potvrdila naše nejhorší obavy: nebude žádné vyjednané urovnání, žádné ústupky, které by tuto válku přivedly k uměřenému konci. Požadují nic menšího než úplnou kapitulaci našeho národa a odsuzují nás k životu pod další imperialistickou botou. Pokud je toto jejich cílem, máme jen jedinou odpověď: odmítáme ustoupit."
 siam.18.a: "[ROOT.GetNameDefCap] vytrvá!"
 siam.19.t: "[SIA.GetName] požaduje návrat území"
 siam.19.desc: "[SIA.GetName], povzbuzen rostoucím nacionalismem a naším vnímaným nedostatkem síly v regionu, požaduje návrat území, která považuje za domovská území svého státu. Zjevně se snaží překonat vlastní váhu, ale území, na která si činí nárok, nemusí nutně stát za boj, když se světová situace řítí k Armagedonu."
 siam.19.a: "Nestojí za to kvůli tomu bojovat"
 siam.19.b: "Ani náhodou!"
 siam.20.t: "[FROM.GetName] předává území"
 siam.20.desc: "[FROM.GetName] se rozhodl vrátit naše území. Zda uznává naši svrchovanost nad těmito územími, nebo pouze čelí nátlaku jiných aktérů, je nepodstatné; naše věc zůstává spravedlivá."
 siam.20.a: "Velký den!"
 siam.21.t: "[FROM.GetName] odmítá předat území"
 siam.21.desc: "[FROM.GetName] naši žádost odmítl. Tito imperialisté se drží minulého století zuby nehty, neschopní přiznat si, že písek v hodinách těchto takzvaných „velkých národů“ již dosypal."
 siam.21.a: "Přimějeme je, aby si to uvědomili."
 SIA_sent_bureaucrats_to_us: "Školení státních úředníků u nás" # todo: NEW TRANSLATION
 SIA_tied_their_currency_to_ours: "Navázali svou měnu na naši" # todo: NEW TRANSLATION
 SIA_sent_started_cooperative_with_us: "Založili s námi rozvojové družstvo" # todo: NEW TRANSLATION
 siam.22.t: "Poslat [SIA.GetName] úředníky do zahraničí"
 siam.22.desc: "Naši úředníci nejsou vhodně připraveni pro moderní ekonomiku a postrádají nezbytný výcvik potřebný k podpoře růstu. Naštěstí existuje mnoho zemí s moderní a zavedenou byrokracií, kam je můžeme poslat, aby získali zkušenosti, aniž bychom zároveň importovali jejich vládu."
 siam.22.a: "Pošlete je do [ENG.GetName]"
 siam.22.b: "Pošlete je do [JAP.GetName]"
 siam.23.t: "Zákon o stabilizaci bahtu"
 siam.23.desc: "Baht nemůže zůstat bez pevného ukotvení, zatímco [ROOT.GetName] usiluje o pořádek v obchodu a financích. Naši úředníci nyní tvrdí, že měnová stabilita vyžaduje pevnou vnější kotvu, navázanou na měnu s dostatečnou vahou, aby uklidnila obchodníky, věřitele i zahraniční partnery. Volba před námi není pouze technická. Utváří směr našeho obchodu, charakter našeho rozvoje i zahraniční vliv, který spočine na [SIA.GetAdjective] ekonomice."
 siam.23.a: "Navázat jej na libru šterlinků"
 siam.23.b: "Navázat jej na jen"
 siam.24.t: "[SIA.GetAdjectiveCap] rozvojové družstvo"
 siam.24.desc: "[SIA.GetAdjectiveCap] rozvojové družstvo dalo státu nový nástroj národního zlepšování, ale naše ambice stále přesahují domácí kapitál. Železnice, dílny a elektrické provozy vyžadují vnější financování, mají-li vyrůst dostatečně rychle. Nyní před námi stojí dvě cesty. [ENG.GetAdjectiveCap] investice nabízejí přístup k zavedeným trhům, zkušeným firmám a finanční prestiži Londýna. [JAP.GetAdjectiveCap] investice slibují užší průmyslové partnerství s rostoucí asijskou mocností dychtivou rozšířit svůj vliv. Obě možnosti mohou urychlit rozvoj, avšak ani jedna nepřijde bez závazků."
 siam.24.a: "Usilovat o investice od [ENG.GetName]"
 siam.24.b: "Usilovat o investice od [JAP.GetName]"
 siam.25.t: "Smrt Pradžádhipoka"
 siam.25.desc: "Král Pradžádhipok je mrtev. Bývalý král, jehož jméno neslo vzpomínku na starý řád během let exilu a otřesů, nyní odchází z lidských záležitostí do dějin. Pro některé jeho smrt uzavírá poslední kapitolu zápasu, který začal koncem absolutní vlády. Věc, kterou začal ztělesňovat, však nezaniká spolu s ním. Trůn přetrvává, dynastie zůstává a práce na obnově důstojnosti a stability v [ROOT.GetName] musí nyní pokračovat ve jménu mladého krále Anandy."
 siam.25.a: "Nechť Jeho Veličenstvo vystoupí na nebesa."
 siam.27.t: "Zformovat krále"
 siam.27.desc: "Král Ananda zůstává v [SWI.GetName], daleko od království, jemuž má jednou vládnout. Vzdálenost jej však nestaví mimo náš vliv. Učitele lze vybírat, předměty zdůrazňovat a návyky podporovat tak, aby byla jeho mysl utvářena směrem k budoucnosti, kterou zamýšlíme pro [ROOT.GetNameDef]. Zda se vrátí jako voják, učenec, nebo něco víc, závisí nemalou měrou na tom, co bude nyní veden ke studiu.\n\nČím je král skutečně, ne-li prodloužením země?"
 siam.27.a: "Veďte jej k učenosti."
 siam.27.b: "Vzdělávejte jej ve vojenských záležitostech."
 siam.27.c: "Směřujte jej ke správě a zásobování."
 siam.27.d: "Vzdělávejte jej v průmyslu a rozvoji."
 siam.28.t: "Korunovace krále Anandy"
 siam.28.desc: "Dlouhá léta regentství se nyní blíží svému určenému konci. V Bangkoku, před princi, mnichy, ministry a státními důstojníky, Ananda nastupuje na trůn vlastním právem a přijímá pocty náležející králi z dynastie Čakrí. Obřady hlásají kontinuitu tam, kde nastaly otřesy, a posvátný řád tam, kde panoval svár. Pro království není tato korunovace pouhou slavností, ale prohlášením, že koruna přetrvává, že říše nebyla zlomena exilem a občanským konfliktem a že nad [ROOT.GetNameDef] nyní začíná nová vláda."
 siam.28.a: "Ať žije král."
 siam.29.t: "Studie konvenčních tanků"
 siam.29.desc: "Konvenční tanky jsou stále králi bojiště, a proto se musíme učit od nejlepších, abychom vytvořili mocný tankový sbor."
 siam.29.a: "Budeme se učit od Němců"
 siam.29.b: "Budeme se učit od Američanů"
 siam.29.c: "Budeme se učit od Britů"
 siam.31.t: "Pořízení ponorek"
 siam.31.desc: "Rozšiřování námořnictva si žádá ponorkovou složku a my se musíme rozhodnout, odkud naše plavidla získáme. [ENG.GetNameDef] i [JAP.GetNameDef] předložili nabídky - volba však bude mít důsledky přesahující loděnice."
 siam.31.a: "[ENG.GetAdjectiveCap] čluny nám dobře poslouží."
 siam.31.b: "Vybudujeme naši ponorkovou složku na [JAP.GetAdjective] konstrukcích."
 siam.32.t: "Pořízení lodí pobřežní obrany"
 siam.32.desc: "Naše pobřežní vody vyžadují schopná obranná plavidla a my si musíme vybrat dodavatele. [ENG.GetNameDefCap] i [JAP.GetNameDef] jsou připraveni je dodat - toto rozhodnutí utváří naši flotilu i naše zahraniční vztahy."
 siam.32.a: "Pro naši pobřežní obranu se spolehneme na [ENG.GetAdjective] plavidla."
 siam.32.b: "Pro naši pobřežní flotilu se spolehneme na [JAP.GetAdjective] lodě."
 siam.33.t: "Prodej Bangkok Dock Co."
 siam.33.desc: "Prodej společnosti Bangkok Dock Company byl dokončen a výnosy nyní leží ve státní pokladně. Vláda musí rozhodnout, kam budou tyto prostředky nejlépe nasměrovány - zda ke zmírnění finanční zátěže běžných občanů, k urychlení technických ambicí národa, nebo k posílení důvěry v budoucnost země."
 siam.33.a: "Snižte daňovou zátěž našeho lidu."
 siam.33.b: "Nasměrujte prostředky do námořního výzkumu."
 siam.33.c: "Využijte mimořádný příjem k uklidnění národa."
 siam.34.t: "[FROM.GetAdjectiveCap] požadavky u našich břehů"
 siam.34.desc: "[FROM.GetAdjectiveCap] síly nyní tlačí na [ROOT.GetNameDef] a jejich diplomaté mluví se sebejistotou mužů, kteří věří, že věc už je rozhodnuta. Nabízejí nám obvyklá slova o pořádku a stabilitě, avšak ve skutečnosti žádají poslušnost. Můžeme se podrobit a zachovat stát v omezené podobě, připojit se k jejich frakci v naději, že si ponecháme alespoň nějakou svobodu jednání, nebo na tento nátlak odpovědět otevřeným vzdorem a rozkázat vetřelci, aby opustil naše břehy."
 siam.34.a: "Připojíme se k jejich frakci a zachováme naši vládu."
 siam.34.b: "Řekněte jim, ať táhnou od našich břehů."
 siam.35.t: "[JAP.GetNameDefCap] požaduje, abychom tiskli více peněz"
 siam.35.desc: "[JAP.GetNameDefCap] jasně vyložil svá očekávání: máme zvýšit peněžní zásobu, abychom uspokojili jeho hospodářské požadavky. Břemeno dopadne na náš vlastní lid v podobě rostoucích cen, zatímco [JAP.GetAdjective] průmysl bude sklízet výhody. Máme jen málo prostoru k odmítnutí."
 siam.35.a: "Vyhovte požadavkům [JAP.GetNameDef]."
 siam.36.t: "[SIA.GetNameDefCap] požaduje splacení dluhu"
 siam.36.desc: "[SIA.GetNameDefCap] formálně požaduje, abychom splatili náklady vzniklé v důsledku dohody o tisku peněz, k níž jsme je donutili. Toto ujednání nám dobře posloužilo, ale účet nyní dospěl k zaplacení."
 siam.36.a: "Uznat dluh a zahájit splátky."
 siam.37.t: "[JAP.GetNameDefCap] souhlasí se splacením našich dluhů"
 siam.37.desc: "Po našich požadavcích [JAP.GetNameDef] souhlasil, že začne splácet hospodářské náklady dohody o tisku peněz. Kompenzace plně neodčiní břemeno uvalené na náš lid, ale přinese určitou úlevu státní pokladně."
 siam.37.a: "Spravedlivé urovnání. Naše ekonomika se zotaví."
 siam.38.t: "[SIA.GetName] hledá podmínky"
 siam.38.desc: "[SIA.GetAdjectiveCap] vláda před nás předstoupila s žádostí o podmínky. Její ministři nyní uznávají to, co naše zbraně již prokázaly: že [ROOT.GetNameDef] má v tomto zápase iniciativu. Můžeme přijmout jejich kapitulaci a přivést je k poslušnosti, připoutat je k naší frakci, aby jejich vláda sloužila naší širší věci, nebo odmítnout veškeré kompromisy a pokračovat v tažení, dokud nebude Siam zcela obsazen."
 siam.38.a: "Přijměte jejich kapitulaci."
 siam.38.b: "Ne. Dokončíme to silou."
 siam.39.t: "[FROM.GetAdjectiveCap] vláda přijímá naši kapitulaci"
 siam.39.desc: "[FROM.GetLeader] se rozhodl přijmout naše podrobení. Prozatím je [ROOT.GetNameDef] ušetřen dalšího zpustošení, avšak nikoli ponížení. Armáda dostává rozkaz složit zbraně a vláda zůstává na místě pouze ze shovívavosti silnější mocnosti. Zachováváme stát, ale za cenu hrdosti a svobody jednání."
 siam.39.a: "Snášíme, co musíme."
 siam.40.t: "[FROM.GetAdjectiveCap] vláda odmítá naši nabídku"
 siam.40.desc: "[FROM.GetLeader] odmítl každý návrh vyslaný z Bangkoku. Žádné podrobení není považováno za dostatečné a žádný kompromis za přijatelný. Nepřítel hodlá věc vyřešit pouze úplným dobytím. [ROOT.GetNameDef] nyní nezbývá nic než odboj. Pokud neodejdou od našich břehů dohodou, musí být zahnáni silou."
 siam.40.a: "Pak budeme bojovat."
 siam.41.t: "[FROM.GetNameDefCap] posílá úředníky studovat naše metody"
 siam.41.desc: "Dorazila delegace [FROM.GetAdjective] úředníků, aby pozorovala a studovala naše správní a výzkumné postupy. Zdá se, že [FROM.GetNameDefCap] hodlá modernizovat svou byrokracii čerpáním ze zahraničních zkušeností a vybral si [ROOT.GetNameDef] za svůj vzor. Návštěva je nepřímým uznáním našich metod a příležitostí budovat dobré vztahy s další vládou."
 siam.41.a: "Vítáme jejich delegaci."
 siam.42.t: "[FROM.GetNameDefCap] navazuje svou měnu na naši"
 siam.42.desc: "[FROM.GetNameDefCap] se formálně rozhodl ukotvit svou měnu k naší. Toto rozhodnutí přitahuje [FROM.GetNameDef] blíže do naší hospodářské oběžné dráhy a signalizuje určitou důvěru ve stabilitu našich finančních institucí. Obchod mezi našimi národy by měl být předvídatelnější a [FROM.GetAdjective] obchodníci budou s těmi našimi podnikat snáze."
 siam.42.a: "Vítaný vývoj pro naše obchodní vztahy."
 siam.43.t: "[FROM.GetNameDefCap] žádá o rozvojovou investici"
 siam.43.desc: "[FROM.GetNameDefCap] nám rozšířil pozvání, aby naši inženýři a specialisté pomohli s rozvojem jeho národa. Družstvo nabízí našemu průmyslu opěrný bod v regionu a posiluje hospodářské vazby mezi našimi vládami. Jde o skromný návrh, ale takový, který může časem přinést značné výnosy."
 siam.43.a: "Rádi pomůžeme."
 siam.44.t: "[FROM.GetNameDefCap] zadává objednávku ponorek"
 siam.44.desc: "[FROM.GetNameDefCap] zadal objednávku na ponorky postavené podle našich konstrukcí. Prodej představuje významné vyjádření důvěry v náš námořní průmysl a rozšiřuje [FROM.GetAdjective] vliv do vod jihovýchodní Asie."
 siam.44.a: "Vítaná objednávka pro naše loděnice."
 SIA_purchased_submarines_from_us: "Koupili od nás ponorky"
 siam.45.t: "[FROM.GetNameDefCap] navrhuje sloučení aliancí"
 siam.45.desc: "Dorazila delegace z [FROM.GetName] s návrhem od [FROM.GetLeader]. Tvrdí, že naše oddělené aliance nyní sledují tytéž obecné cíle, zatímco dělí muže, materiál i diplomatický vliv mezi soupeřící velení.\n\nSloučením našich sil s jejich bychom vytvořili silnější blok schopný koordinovat strategii na širší frontě. Taková dohoda by posílila společnou věc, ačkoli by od nás také vyžadovala přijmout [FROM.GetAdjective] vliv na budoucí směřování aliance."
 siam.45.a: "Jednotná fronta je nezbytná."
 siam.45.b: "Naše aliance zůstane naše."
 siam.46.t: "[FROM.GetNameDefCap] přijímá sloučení"
 siam.46.desc: "[FROM.GetLeader] přijal náš návrh na sloučení našich aliancí do jediné koalice. To, co byly kdysi oddělené velení a diplomatické kanály, se nyní skládá do jediné struktury, která našim vládám umožní koordinovat válečné plány, zásobovací opatření a zahraniční politiku s mnohem větší jasností.\n\nUspořádání není bez komplikací, ale nutnost jednoty převážila."
 siam.46.a: "Společně stojíme silnější."
 siam.47.t: "[FROM.GetNameDefCap] odmítá sloučení"
 siam.47.desc: "[FROM.GetLeader] odmítl náš návrh na sloučení našich aliancí. Jeho vláda tvrdí, že spolupráce může pokračovat tam, kde se zájmy shodují, ale svou alianci neumístí do širší koalice vedené z [ROOT.Capital.GetCapitalVictoryPointName].\n\nRozdělení mezi našimi bloky prozatím zůstává. Musíme sledovat své cíle, aniž bychom předpokládali jejich plné odhodlání."
 siam.47.a: "Pak budeme postupovat sami."
 siam.48.t: "[SIA.GetName] žádá o [JAP.GetAdjective] pomoc"
 siam.48.desc: "[SIA.GetNameDefCap] formálně požádal o vojenskou pomoc proti silám napadajícím jeho zemi. Na oplátku je [SIA.GetAdjective] vláda připravena udělit [JAP.GetAdjective] firmám privilegovaný přístup ke strategickým zdrojům, infrastruktuře a obchodním právům.\n\nPodpora [SIA.GetName] by rozšířila náš vliv v jihovýchodní Asii a zajistila cenné suroviny pro císařství, ačkoli by nás také mohla hlouběji zatáhnout do regionálních konfliktů."
 siam.48.a: "Přijměte jejich návrh."
 siam.48.b: "[JAP.GetName] si nemůže dovolit uvolnit zdroje."
 siam.49.t: "[JAP.GetName] přijímá naši žádost"
 siam.49.desc: "[JAP.GetNameDefCap] souhlasil s podporou [ROOT.GetNameDef] v jeho zápase. [JAP.GetAdjectiveCap] poradci, vybavení a zásoby začnou brzy přicházet, zatímco [JAP.GetAdjective] společnostem byly v souladu s dohodou uděleny hospodářské ústupky.\n\nAčkoli kabinet slaví přežití národa, mnozí si potichu kladou otázku, kolik nezávislosti bylo za tuto pomoc směněno."
 siam.49.a: "Získali jsme spojence."
 SIA_japan_aid_request.4.t: "[JAP.GetName] odmítá naši žádost"
 SIA_japan_aid_request.4.desc: "Vláda [JAP.GetNameDef] odmítla naši žádost o vojenskou pomoc. Tokio tvrdí, že císařství nyní nemůže do našeho zápasu zapojit muže a materiál.\n\nBez zahraniční pomoci se [ROOT.GetNameDef] musí nyní spolehnout na vlastní sílu, chce-li přežít invazi."
 SIA_japan_aid_request.4.a: "Pak stojíme sami."
 siam_adc.1.t: "[FROM.GetNameDefCap] požaduje propuštění [?var:SIA_adc_demand_country_to_be_released.GetNameDef]"
 siam_adc.1.desc: "Dorazila formální nóta od [FROM.GetNameDef], v níž [FROM.GetLeader] odsuzuje naši pokračující okupaci asijských zemí jako nesnesitelnou urážku jejich práva na sebeurčení. Zpráva uvádí, že Asie není kořistí, kterou lze rozdělovat nebo spravovat podle cizí libovůle, a požaduje, abychom okamžitě stáhli své síly a obnovili nezávislou vládu v [?var:SIA_adc_demand_country_to_be_released.GetNameDef].\n\nPožadavek neponechává prostor k nedorozumění. [FROM.GetNameDefCap] očekává poslušnost a jakékoli odmítnutí z naší strany bude pamatováno jako úmyslná urážka jeho národa."
 siam_adc.1.a: "Propustíme je."
 siam_adc.1.b: "Zůstanou pod okupací."
 siam_adc.2.t: "[FROM.GetNameDefCap] nabízí obnovu naší nezávislosti"
 siam_adc.2.desc: "Po [FROM.GetAdjective] přijetí požadavků [SIA.GetNameDef] ohledně budoucnosti [ROOT.GetNameDef] před nás [FROM.GetLeader] nyní klade poslední otázku. Okupační úřady jsou připraveny se stáhnout a uznat svrchovanou [ROOT.GetAdjective] vládu, rozhodneme-li se znovu stát sami.\n\nNezávislost nabízí důstojnost a svobodu jednání, ale také nás ponechává obnovovat stát bez záruk [FROM.GetNameDef]. Zůstat pod jejich ochranou je pokornější cesta, avšak taková, která může zemi v těchto nejistých časech ušetřit dalšího nepořádku."
 siam_adc.2.a: "Budeme stát jako svobodný národ."
 siam_adc.2.b: "Zůstaneme pod [FROM.GetAdjective] ochranou."
 siam_adc.3.t: "[?var:SIA_tag_that_was_released_due_to_sia_pressure.GetName] přijímá nezávislost"
 siam_adc.3.desc: "Vláda [?var:SIA_tag_that_was_released_due_to_sia_pressure.GetNameDef] si zvolila nezávislost. Zatímco se okupační správa připravuje na rozpuštění, [var:SIA_tag_that_was_released_due_to_sia_pressure.GetNameDef] se chystá znovu zaujmout své místo mezi svrchovanými národy světa."
 siam_adc.3.a: "Jaká bude jejich budoucnost?"
 siam_adc.4.t: "[FROM.GetNameDefCap] odmítá nezávislost"
 siam_adc.4.desc: "Navzdory příležitosti získat svobodu vláda [FROM.GetNameDef] odmítla okamžitou nezávislost. Její ministři tvrdí, že stát ještě není připraven nést břemena plné svrchovanosti a prozatím dává přednost zachování současného stavu."
 siam_adc.4.a: "Pak uspořádání pokračuje."
 siam_adc.5.t: "[FROM.GetNameDefCap] odmítá naše požadavky"
 siam_adc.5.desc: "[FROM.GetName] dal jasně najevo, že naše požadavky jsou přinejlepším směšné. Poukazují na naši ubohou armádu jako na důkaz, že nejsme v pozici zpochybňovat současný stav."
 siam_adc.5.a: "Pak jim to ukážeme."
 siam_dem_event_count: "Armáda plánuje očerňovací kampaň, čím déle čekáme "
 siam_dem.2.t: "Armáda namítá"
 siam_dem.2.desc: "Na soukromém setkání ministrů a vyšších důstojníků přednesl vojenský zástupce přísnou kritiku návrhu Žlutého spisu. Tvrdí, že jeho autoři příliš volně hovoří o státním řízení, přerozdělování a společenské povinnosti, zatímco příliš málo dbají na disciplínu, majetek a břemena, která by dopadla na důstojnický sbor i venkov. Podle něj nelze [ROOT.GetNameDef] přetvořit teoriemi sepsanými na papíře, zatímco se svět měsíc od měsíce stává nebezpečnějším."
 siam_dem.2.a: "Armáda vyložila svůj případ"
 siam_dem.3.t: "Veřejné pokárání"
 siam_dem.3.desc: "Spor opustil zasedací místnost. Noviny široce považované za vojenského prostředníka otiskly úplné odsouzení Žlutého spisu a představily jej jako cizorodý program oděný do vlasteneckého jazyka. Jejich redaktoři varují, že návrh staví třídní křivdy nad národní jednotu, oslabuje důvěru v zavedené instituce a vzbuzuje nebezpečná očekávání mezi dělníky a rolníky. Odpoledne se článek opakuje v kasárnách, kancelářích i čajovnách a to, co bylo vnitřním sporem, je nyní veřejnou kontroverzí."
 siam_dem.3.a: "Kritika se šíří"
 siam_dem.4.t: "Phibun odsuzuje spis"
 siam_dem.4.desc: "Phibun vstoupil do sporu otevřeně a s nezaměnitelnou razancí. V projevu před stoupenci a důstojníky odsuzuje Žlutý spis jako svou podstatou komunistický, ať už jeho obhájci dávají přednost jakémukoli jazyku. Prohlašuje, že každý program, který povyšuje stát nad majetek, slibuje rozsáhlou společenskou proměnu a rozdmýchává neklid mezi nižšími třídami, vnáší rudý jed do [ROOT.GetNameDef] pod jiným jménem."
 siam_dem.4.a: "Nenechává nikoho na pochybách"
 AST_election_events.1.t.a: "UAP zvítězila!"
 AST_election_events.1.t.b: "Laboristé zvítězili!"
 AST_election_events.1.desc.a: "Hlasy jsou sečteny; volby vyhrála Sjednocená australská strana.\n\nUAP projde krátkým obdobím formování vlády, než stráví následující tři roky dokazováním, že důvěra občanů byla právem vložena na bedra jejích zástupců."
 AST_election_events.1.desc.b: "Hlasy jsou sečteny; volby vyhrála Australská strana práce.\n\nLaboristé projdou krátkým obdobím formování vlády, než stráví následující tři roky dokazováním, že důvěra občanů byla právem vložena na bedra jejich zástupců."
 AST_election_events.1.a: "Lid promluvil."
 AST_election_events.2.t: "Na půli cesty k federálním volbám"
 AST_election_events.2.desc: "$AST_democratic_party_long$ vede [AST.GetName] od roku 1931, provádí zemi velkou hospodářskou krizí a drží ji dál od protidemokratických nálad. Stabilním vedením, konzervativními sklony a loajalitou k Británii si UAP upevnila podporu a další období se zdá stále pravděpodobnější. Do věci však má stále co říci i jiná strana.\n\n$AST_labor_party_long$ se stále vzpamatovává z hlasování o nedůvěře, které ji v roce 1931 svrhlo od moci, ale začíná znovu nabírat sílu. Když byly komunistické hlasy umlčeny, dělnická třída nyní hledá jiné vůdčí světlo. Ve své snaze zastupovat každého občana přijala ALP odlišný pohled na imperialismus a australskou loajalitu k impériu. Domácí potřeby musí stát na prvním místě a zahraniční zájmy už nesmí mít přednost.\n\nDo příštích federálních voleb zbývá rok a půl. Pokud si chce UAP zajistit další vítězství, musí její vůdci urychlit reformy, aby si udrželi podporu veřejnosti. Jinak může kampaň ALP znovu obnovit její postavení."
 AST_election_events.2.a: "UAP prosadí své poslední reformy."
 AST_election_events.2.b: "Předvolební cesta napříč Austrálií zvýší podporu ALP."
 AST_election_events.3.t: "$AST_election_season_cat$"
 AST_election_events.3.desc: "$AST_election_season_cat_desc$"
 AST_election_events.3.a: "Začíná to."
 AST_diplomatic_events.1.t: "Australský pakt o neútočení"
 AST_diplomatic_events.1.desc: "V rámci svých nedávných diplomatických snah se australská vláda snaží uzavřít dohody o neútočení s několika vybranými asijskými zeměmi; jednou z nich jsme i my. Zda tento pokus vyhnout se válce odhalí australské úředníky jako odtržené od reality, nebo je vykreslí v čestné nevinnosti, částečně rozhodne naše odpověď.\n\nPodepíšeme pakt o neútočení s [AST.GetName]?"
 AST_diplomatic_events.1.a: "Bez debat — ne."
 AST_diplomatic_events.1.b: "Jistě, podepíšeme."
 AST_diplomatic_events.2.t: "Odpor vůči Tichomořskému paktu"
 AST_diplomatic_events.2.desc: "Delegace vyslaná do [FROM.GetNameDef] telegrafovala odpověď země na náš návrh paktu o neútočení. Věděli jsme, že tato iniciativa sahá daleko, a tak odmítnutí ze strany [FROM.GetLeader] není velkým překvapením."
 AST_diplomatic_events.2.a: "Byl to alespoň čestný pokus."
 AST_diplomatic_events.3.t: "Ať žije Tichomořský pakt"
 AST_diplomatic_events.3.desc: "Delegace vyslaná do [FROM.GetNameDef] telegrafovala odpověď země na náš návrh paktu o neútočení. K naší velké radosti [FROM.GetLeader] naši iniciativu ocenil a souhlasil, že ji zpečetí svým podpisem."
 AST_diplomatic_events.3.a: "Skvělé!"
 AST_diplomatic_events.4.t: "Austrálie žádá Singapur"
 AST_diplomatic_events.4.desc: "[AST.GetNameDefCap] již dlouho zpochybňuje spolehlivost singapurské strategie; podle australských úředníků je nejisté, zda jim v případě války v Tichomoří dokážeme přijít na pomoc. Převedení tichomořských námořních povinností na [AST.GetName] by zmenšilo břemeno na britských bedrech, ale zároveň by totéž břemeno přeneslo na bedra australská.\n\nMůžeme věřit, že větší australská kontrola postaví naše tichomořské subjekty a území do silnější pozice, než kdyby Singapur zůstal nám?"
 AST_diplomatic_events.4.a: "Ano, můžeme."
 AST_diplomatic_events.4.b: "Singapur zůstane náš."
 AST_diplomatic_events.5.t: "Británie souhlasí s naší žádostí"
 AST_diplomatic_events.5.desc: "Británie souhlasí s převedením Singapuru pod australskou správu. Tím konečně skončí zastaralá singapurská strategie a my převezmeme otěže vlastní obrany."
 AST_diplomatic_events.5.a: "Strategie je přepsána!"
 AST_diplomatic_events.5.a.tt: "§YSingapur§!:\n  Je ovládán §YAustrálií§!.\n  Je vlastněn §YAustrálií§!.\n§YVánoční ostrov§!:\n  Je ovládán §YAustrálií§!.\n  Je vlastněn §YAustrálií§!.\n§YKokosové ostrovy§!:\n  Jsou ovládány §YAustrálií§!.\n  Jsou vlastněny §YAustrálií§!."
 AST_diplomatic_events.6.t: "Británie odmítá naši žádost"
 AST_diplomatic_events.6.desc: "Británie odmítá převést Singapur pod australskou správu. Současný stav zůstane zachován."
 AST_diplomatic_events.6.a: "Singapurská strategie zkrátka musí vydržet."
 AST_diplomatic_events.7.t: "[AST.GetName] žádá naši pomoc"
 AST_diplomatic_events.7.desc: "[AST.GetNameDefCap] si přeje obdržet vybavení od spojenců pro své válečné úsilí a žádá naši pomoc se zajištěním potřebných zásilek. Můžeme postrádat konvoje, aby je [AST.GetName] mohl využít?"
 AST_diplomatic_events.7.a: "Můžeme."
 AST_diplomatic_events.7.b: "Nemůžeme"
 AST_diplomatic_events.8.t: "[USA.GetName] souhlasí s naší žádostí"
 AST_diplomatic_events.8.desc: "[USA.GetNameDefCap] souhlasil, že uvolní několik konvojů na podporu zásobovacích snah [AST.GetName]."
 AST_diplomatic_events.8.a: "Budou velmi užitečné!"
 AST_diplomatic_events.9.t: "[USA.GetName] odmítá naši žádost"
 AST_diplomatic_events.9.desc: "[USA.GetNameDefCap] nemá žádné konvoje, které by mohl uvolnit pro zásobovací snahy [AST.GetName]."
 AST_diplomatic_events.9.a: "Zásilky musíme zajistit sami."
 AST_diplomatic_events.10.t: "Válečná aliance"
 AST_diplomatic_events.10.desc: "[AST.GetNameDefCap] si velmi cení spojenectví s [USA.GetNameDef] a nyní žádá, aby bylo formalizováno ve společné mezinárodní válečné koalici. Spojením sil by si naše dvě země mohly pomáhat v současných i budoucích konfliktech."
 AST_diplomatic_events.10.a: "Musíme souhlasit."
 AST_diplomatic_events.10.b: "[USA.GetNameDefCap] bude silnější bez nich."
 AST_diplomatic_events.11.t: "Válečná aliance"
 AST_diplomatic_events.11.desc: "[USA.GetNameDefCap] souhlasil se spojením sil. Jako členové frakce [AST.GetFactionName] si [AST.GetName] a [USA.GetName] budou pomáhat v současných i budoucích konfliktech."
 AST_diplomatic_events.11.a: "Naši nepřátelé se nás budou bát."
 AST_diplomatic_events.12.t: "Odmítnutá válečná aliance"
 AST_diplomatic_events.12.desc: "[USA.GetNameDefCap] odmítl náš návrh na spojení sil. [AST.GetNameDefCap] a [USA.GetName] zůstanou ve svém válečném úsilí odděleny."
 AST_diplomatic_events.12.a: "Musíme obstát bez nich."
 AST_diplomatic_events.13.t: "Klauzule 6"
 AST_diplomatic_events.13.desc: "Během procesu, který sjednotil australské kolonie do federace, se Nový Zéland nakonec rozhodl neúčastnit. Od té doby nás však australská ústava nadále definuje jako jeden z potenciálních států svého Commonwealthu a naši přijetí umožňuje.\n\n[AST.GetName] nyní tvrdí, že současná světová situace vyžaduje jednotu, a žádá, aby [NZL.GetName] přešel pod australskou správu. Máme v této věci vyhlásit referendum?"
 AST_diplomatic_events.13.a: "Vyhlásíme."
 AST_diplomatic_events.13.a.tt: "Bude uspořádáno referendum, které může vést k §Ranexi§! §Y[NZL.GetName]§!"
 AST_diplomatic_events.13.b: "Rozhodně ne!"
 AST_diplomatic_events.14.t: "[NZL.GetNameDefCap] se stává australským státem"
 AST_diplomatic_events.14.desc: "Po nedávno konaném referendu se [NZL.GetName] rozhodl uplatnit klauzuli 6 australské ústavy. Novozélanďané souhlasili, že jejich země budou pod australskou správou bezpečnější, a proto souhlasili s připojením k [AST.GetNameDef]."
 AST_diplomatic_events.14.a: "Austrálie se rozšiřuje."
 AST_diplomatic_events.15.t: "Novozélandská veřejnost vzdoruje"
 AST_diplomatic_events.15.desc: "Po nedávno konaném referendu se [NZL.GetName] rozhodl neuplatnit klauzuli 6 australské ústavy. [NZL.GetNameDefCap] zůstane vlastním národem."
 AST_diplomatic_events.15.a: "Austrálie zůstane taková, jaká je."
 AST_diplomatic_events.16.t: "Úředníci [NZL.GetNameDef] vzdorují"
 AST_diplomatic_events.16.desc: "Navzdory australskému nátlaku se [NZL.GetName] rozhodl neuspořádat referendum o uplatnění klauzule 6 australské ústavy. [NZL.GetNameDefCap] zůstane vlastním národem."
 AST_diplomatic_events.16.a: "Austrálie zůstává taková, jaká je."
 AST_diplomatic_events.17.t: "Australské partnerství"
 AST_diplomatic_events.17.desc: "Nepřítel přichází ze severu a je jen otázkou času, než dorazí až k našemu prahu - alespoň to tvrdí australští úředníci. [AST.GetNameDefCap] navrhuje, abychom se spojili a vytvořili jedinou hráz, nejlépe převedením [INS.GetName] pod australskou správu, ale přinejmenším udělením vojenského přístupu."
 AST_diplomatic_events.17.a: "Souhlasit s převedením pod australskou správu."
 AST_diplomatic_events.17.a.tt: "§Y[INS.GetNameDefCap]§! se stane §Yloutkou§! země §Y[AST.GetNameDefCap]§!."
 AST_diplomatic_events.17.b: "Udělit vojenský přístup."
 AST_diplomatic_events.17.b.tt: "§Y[INS.GetNameDefCap]§! uzavře §Yvojenský přístup§! se zemí §Y[AST.GetNameDefCap]§!."
 AST_diplomatic_events.17.c: "Nebudeme souhlasit ani s jedním."
 AST_diplomatic_events.18.t: "[INS.GetNameDefCap] ustupuje australské žádosti"
 AST_diplomatic_events.18.desc: "[INS.GetName] souhlasil s naší žádostí; naše spolupráce bude mít velký dopad na obranné schopnosti obou našich národů."
 AST_diplomatic_events.18.a: "Fantastické!"
 AST_diplomatic_events.19.t: "[INS.GetNameDefCap] odmítá"
 AST_diplomatic_events.19.desc: "[INS.GetName] odmítl naši žádost; naše země se budou muset o svou obranu postarat samy."
 AST_diplomatic_events.19.a: "[AST.GetNameDefCap] přečká konflikty i bez nich."
 AST_diplomatic_events.20.t: "Předvolání do britského válečného kabinetu"
 AST_diplomatic_events.20.desc: "[ENG.GetNameDefCap] předvolává australského premiéra do britského válečného kabinetu. Světová situace je vážná, což Británii vede k hledání společných strategií a vojenské spolupráce se svými spojenci.\n\nAustrálie má však své vlastní starosti. Můžeme postrádat část premiérova času, abychom vyhověli Britům?"
 AST_diplomatic_events.20.a: "[AST.GetLeader] odjede do Británie."
 AST_diplomatic_events.20.b: "Je potřeba zde."
 AST_diplomatic_events.22.t: "Úspěšné příspěvky britskému válečnému kabinetu"
 AST_diplomatic_events.22.desc: "Během uplynulého roku se australský premiér pravidelně účastnil britského válečného kabinetu. Přestože za to [AST.GetNameDef] občas musel zaplatit cenu, náš národ nyní díky britské vojenské spolupráci zesílil."
 AST_diplomatic_events.22.a: "Nakonec ta cena stála za to."
 AST_diplomatic_events.23.t: "[ENG.GetLeader] už neusiluje o australský válečný vliv"
 AST_diplomatic_events.23.desc: "[ENG.GetNameDefCap] několikrát předvolal australského premiéra do britského válečného kabinetu, ale po opakovaných odmítnutích už [ENG.GetLeader] nevidí žádný důvod v tom pokračovat."
 AST_diplomatic_events.23.a: "Je to pochopitelné."
 AST_diplomatic_events.24.t: "Změna vedení"
 AST_diplomatic_events.24.desc: "Australský premiér měl velký vliv na válečné úsilí Britského společenství. Během svých pravidelných návštěv Londýna si Robert Menzies získal důvěru britských ministrů, zatímco jejich víra ve vlastního premiéra vyprchala. Ministři nyní přiměli vůdce [ENG.GetNameDef], aby odstoupil, a aby jeho místo zaujal Menzies.\n\nI když [AST.GetName] ztrácí svého premiéra, získává trvalou loajalitu od svého suzeréna, chráněnou australským krajanem, který nyní drží otěže Británie. Země protinožců chce větší autoritu a Robert Menzies je první, kdo se pod to podepsal."
 AST_diplomatic_events.24.a: "Vítr se obrací."
 AST_diplomatic_events.25.t: "Pod vládou Canberry"
 AST_diplomatic_events.25.desc: "Rostoucí napětí mezi tichomořskými národy je znepokojivé a vzhledem k tomu, že Británie je zaměstnána vlastními boji, naše schopnost přijít našim subjektům na pomoc se zdá nepravděpodobná; alespoň to tvrdí [AST.GetName].\n\nSnaží se přebudovat Britské společenství tak, aby národy Tichého a Indického oceánu byly spravovány přímo z Canberry. Máme souhlasit?"
 AST_diplomatic_events.25.a: "Souhlasíme; tichomořský region bude posílen centralizovanou kontrolou."
 AST_diplomatic_events.25.b: "Rozhodně ne!"
 AST_diplomatic_events.26.t: "Tichomořské společenství"
 AST_diplomatic_events.26.desc: "[ENG.GetNameDefCap] souhlasí; tichomořský region bude posílen centralizovanou kontrolou. Britská tichomořská území byla převedena pod naši správu."
 AST_diplomatic_events.26.a: "Tichomořské národy spojují síly."
 AST_diplomatic_events.27.t: "Británie odmítá naši žádost"
 AST_diplomatic_events.27.desc: "[ENG.GetNameDefCap] nesouhlasí; tichomořský region nebude posílen centralizovanou kontrolou. Tichomořská území zůstanou pod naší britskou správou."
 AST_diplomatic_events.27.a: "Austrálie přesto vytrvá."
 AST_diplomatic_events.28.t: "[ENG.GetLeader] zavěšuje"
 AST_diplomatic_events.28.desc: "Kabelová rozepře premiéra s [ENG.GetLeader] přinesla Austrálii jen málo posil, ale zvýšila britskou nevoli vůči [AST.GetLeader] za prosazování australských zájmů."
 AST_diplomatic_events.28.a: "Austrálie se musí postarat o svou obranu sama."
 AST_diplomatic_events.29.t: "Británie nám přichází na pomoc"
 AST_diplomatic_events.29.desc: "Po australském nátlaku na [ENG.GetNameDef], aby vyvolal konflikt s [JAP.GetName], Británie souhlasila s podporou našich obranných stavebních snah."
 AST_diplomatic_events.29.a: "Pomoc je vítaná, ale japonskou válku neodvrátí."
 AST_diplomatic_events.30.t: "Austrálie žádá práva na zdroje"
 AST_diplomatic_events.30.desc: "Expanzionističtí agresoři hledí na Indočínu nejen kvůli samotnému území, ale i kvůli zdrojům, které vlastní. Pokud bohatství skončí v nepřátelských rukou, válku jen prodlouží, zatímco v australských rukou by ji mohlo pomoci ukončit; alespoň to tvrdí australská vláda.\n\nSouhlasíme s tím, že jim na našem území udělíme práva na zdroje?"
 AST_diplomatic_events.30.a: "Souhlasíme."
 AST_diplomatic_events.30.b: "Zdroje nejsou k dispozici ani pro [AST.GetName]."
 AST_diplomatic_events.31.t: "[FROM.GetNameDefCap] uděluje [AST.GetName] práva na zdroje"
 AST_diplomatic_events.31.desc: "Expanzionističtí agresoři hledí na Indočínu nejen kvůli samotnému území, ale i kvůli zdrojům, které vlastní. Pokud bohatství skončí v nepřátelských rukou, válku jen prodlouží, zatímco v australských rukou by ji mohlo pomoci ukončit; alespoň to tvrdí australská vláda.\n\n[ROOT.OVERLORD.GetNameDefCap] žádosti vyhověl."
 AST_diplomatic_events.31.a: "Je to mimo naši kontrolu."
 AST_diplomatic_events.32.t: "[FROM.GetNameDefCap] uděluje práva na zdroje"
 AST_diplomatic_events.32.desc: "[FROM.GetNameDefCap] souhlasí, že zdroje Indočíny budou lépe využity v australských rukou, a udělil nám práva na zdroje."
 AST_diplomatic_events.32.a: "Budou velmi užitečné."
 AST_diplomatic_events.33.t: "[FROM.GetNameDefCap] odmítá udělit práva na zdroje"
 AST_diplomatic_events.33.desc: "[FROM.GetNameDefCap] nesouhlasí, že zdroje Indočíny budou lépe využity v australských rukou, a odmítá nám udělit práva na zdroje."
 AST_diplomatic_events.33.a: "Doufáme, že neskončí v nepřátelských rukou."
 AST_diplomatic_events.34.t: "[AST.GetNameDefCap] žádá o rozdělení tichomořských území"
 AST_diplomatic_events.34.desc: "[AST.GetNameDefCap] navrhuje pakt; takový, který by urovnal potenciální konflikty mezi našimi dvěma zeměmi dříve, než by mohly vzniknout. Rozdělením tichomořských území mezi nás můžeme plánovat budoucí expanzi bez obav ze zásahů druhé strany."
 AST_diplomatic_events.34.a: "Pakt se zdá rozumný."
 AST_diplomatic_events.34.b: "[JAP.GetNameDefCap] se bude rozšiřovat, jak uzná za vhodné."
 AST_diplomatic_events.35.t: "Tichomoří bylo rozděleno"
 AST_diplomatic_events.35.desc: "[AST.GetNameDefCap] a [JAP.GetNameDefCap] se dohodly, do kterých tichomořských území se která země může rozšiřovat. Snad to odvrátí případné budoucí konflikty mezi našimi dvěma mocnostmi."
 AST_diplomatic_events.35.a: "Je rozhodnuto!"
 AST_diplomatic_events.36.t: "Tichomoří se rozdělí samo"
 AST_diplomatic_events.36.desc: "[JAP.GetNameDefCap] nebude souhlasit s rozdělením tichomořských území mezi naše dvě země; japonská vláda se bude rozšiřovat, jak uzná za vhodné."
 AST_diplomatic_events.36.a: "A australská také."
 AST_diplomatic_events.37.t: "Převod suzerenity"
 AST_diplomatic_events.37.desc: "Z neznámých důvodů se [AST.GetName] rozhodl převést kontrolu nad našimi zeměmi na [JAP.GetNameDef]. V zákulisí se vaří cosi zlověstného a je jen otázkou času, než svět zjistí co."
 AST_diplomatic_events.37.a: "Zjevně do toho nemáme co mluvit."
 AST_diplomatic_events.38.t: "Naurský pakt"
 AST_diplomatic_events.38.desc: "V důsledku první světové války bylo několik německých území v Tichomoří převedeno pod australskou kontrolu, ale nyní možná existuje způsob, jak jedno z nich získat zpět: ostrov Nauru.\n\n[AST.GetFascistParty] zastává hodnoty, které jsou v souladu s našimi zájmy, jednou z nich je úplné oddělení [AST.GetName] od [ENG.GetNameDef]. Vzhledem k současnému omezenému vlivu hnutí jeho představitelé žádají naši podporu, aby urychlili jeho růst, a jakmile budou plně u moci, trvají na navrácení kontroly nad ostrovem Nauru — za předpokladu, že jim při snaze o nezávislost poskytneme záruky."
 AST_diplomatic_events.38.a: "Naše území se vrátí!"
 AST_diplomatic_events.38.b: "Nemůžeme se zavázat k prázdným slibům."
 AST_diplomatic_events.39.t: "[GER.GetNameDefCap] souhlasí s Naurským paktem"
 AST_diplomatic_events.39.desc: "[GER.GetNameDefCap] a [AST.GetFascistParty] se dohodly na společném cíli: [AST.GetName] dosáhne nezávislosti. Kvůli současnému omezenému politickému vlivu [AST.GetFascistParty] přispěje [GER.GetNameDef] grantem na urychlení jejího růstu, a jakmile náš vliv už nebude omezen, dohoda bude plně naplněna."
 AST_diplomatic_events.39.a: "Skvělé!"
 AST_diplomatic_events.40.t: "Naurský pakt se hroutí"
 AST_diplomatic_events.40.desc: "[GER.GetNameDef] se odmítá zavázat ke slibům, které zatím nelze splnit, a nepodpoří náš vzestup k moci. Naurský pakt končí dříve, než vůbec mohl začít, a ambice [AST.GetFascistParty] zůstanou zcela na našich bedrech."
 AST_diplomatic_events.40.a: "[AST.GetFascistParty] bude pokračovat bez německé podpory."
 AST_diplomatic_events.41.t: "Nauru se vrací do německých rukou"
 AST_diplomatic_events.41.desc: "Nyní, když je [AST.GetFascistParty] plně u moci, ctí svůj slib a plní svou část dohody. Nauru se vrací [GER.GetNameDef] a my zaručíme australskou nezávislost."
 AST_diplomatic_events.41.a: "Tak učiníme."
 AST_diplomatic_events.42.t: "[AST.GetFascistParty] porušuje svůj slib"
 AST_diplomatic_events.42.desc: "Sliby mají jednu osudovou vadu; mohou být porušeny. Nyní, když drží otěže moci, se vůdci [AST.GetFascistParty] rozhodli, že Nauru nejenže zůstane jejich, ale že si vezmou i další tichomořské ostrovy.\n\nNaše stará tichomořská území zůstanou stejně daleko od toho, aby byla naše, jako před podpisem Naurského paktu, a pokud to chceme jinak, musí přijít válka."
 AST_diplomatic_events.42.a: "Budoucnost rozhodne o následcích."
 AST_diplomatic_events.43.t: "[AST.GetNameDefCap] žádá jihovýchodní Asii"
 AST_diplomatic_events.43.desc: "[AST.GetName] tvrdí, že svou expanzí na sever můžeme zvýšit náš společný vliv na diplomacii a konflikty v jihovýchodní Asii. Ačkoli nejde o přímý požadavek, [AST.GetLeader] naznačuje, že odmítnutí by nebylo přijato."
 AST_diplomatic_events.43.a: "Když je naše pozornost jinde, bude to nejlepší."
 AST_diplomatic_events.43.b: "Odmítnutí je přesně to, co dostanou."
 AST_diplomatic_events.44.t: "Převod jihovýchodní Asie"
 AST_diplomatic_events.44.desc: "[ENG.GetNameDefCap] moudře souhlasil s převedením svých jihovýchodoasijských území na nás. Jak se australské hranice rozšiřují, náš vliv je následuje a je jen otázkou času, než nám svět bude ležet u nohou."
 AST_diplomatic_events.44.a: "Budoucnost vypadá jasně."
 AST_diplomatic_events.45.t: "Jihovýchodní Asie zůstává beze změny"
 AST_diplomatic_events.45.desc: "[ENG.GetNameDefCap] odmítl převést svá jihovýchodoasijská území na nás. Přesto je pro nás přitažlivost ovládnutí regionu zjevná, a i když nám nebude patřit na žádost, může se jím ještě stát."
 AST_diplomatic_events.45.a: "Ano, může."
 AST_diplomatic_events.47.t: "Sdílení břemen"
 AST_diplomatic_events.47.desc: "Navzdory svému nedávnému odtržení od Britského společenství nabízí [AST.GetName] vojenskou spolupráci. [AST.GetName] tvrdí, že sdílení břemen by pro [ENG.GetNameDefCap] bylo výhodné, uvážíme-li, jak roztažené jsou jeho síly po celém světě."
 AST_diplomatic_events.47.a: "Souhlasíme."
 AST_diplomatic_events.47.b: "Poradíme si sami."
 AST_diplomatic_events.48.t: "Britsko-australský pakt"
 AST_diplomatic_events.48.desc: "[ENG.GetNameDefCap] souhlasil s podpisem paktu o neútočení, čímž položil základ vojenské spolupráce."
 AST_diplomatic_events.48.a: "To značí novou kapitolu v našich vztazích."
 AST_diplomatic_events.49.t: "Nepodepsaný pakt"
 AST_diplomatic_events.49.desc: "[ENG.GetNameDefCap] odmítl podepsat pakt o neútočení. Náš pokus navázat vojenskou spolupráci mezi našimi dvěma národy proto selhal a ve svém postupu navenek musíme pokračovat sami."
 AST_diplomatic_events.49.a: "To skutečně musíme."
 AST_diplomatic_events.50.t: "Australská tichomořská posádka"
 AST_diplomatic_events.50.desc: "Ačkoli ochrana jihovýchodní Asie a Tichomoří leží v britských zájmech, region je od Britských ostrovů daleko; tak to pochopil [FROM.GetName]. Výměnou za naši podporu v zásobování nabídl převzít velení nad obranou území, což nám umožní zaměřit pozornost jinam."
 AST_diplomatic_events.50.a: "Pomoc [FROM.GetName] bude vítána."
 AST_diplomatic_events.50.b: "Region leží dost blízko."
 AST_diplomatic_events.51.t: "Tichomořská posádka [ENG.GetNameDef]"
 AST_diplomatic_events.51.desc: "[FROM.GetNameDefCap] souhlasí; jihovýchodoasijské vody budou chráněny námi. Výměnou za britské dodávky paliva [ROOT.GetName] zaměří své úsilí na zvýšení námořní převahy v našich sousedních vodách."
 AST_diplomatic_events.51.a: "Vody budou naše."
 AST_diplomatic_events.52.t: "Vlastní australská tichomořská posádka"
 AST_diplomatic_events.52.desc: "[FROM.GetNameDefCap] nesouhlasí; nepotřebují žádnou pomoc s obranou jihovýchodoasijských vod. S britskou podporou či bez ní však [ROOT.GetName] zaměří své úsilí na zvýšení námořní převahy v sousedních vodách. "
 AST_diplomatic_events.52.a: "Vody budou naše."
 AST_diplomatic_events.53.t: "Vichy z Afriky pryč"
 AST_diplomatic_events.53.desc: "[AST.GetName] má podezření, že pád nebo spolupráce vichistické Francie patří mezi hlavní cíle [ENG.GetNameDef], a proto nabídl, že se připojí a bude usilovat o francouzské africké kolonie, dokud nebude Vichy podrobeno. Ačkoli za návrhem může stát neznámý záměr, není pochyb, že zvýšená spojenecká přítomnost v regionu by nám prospěla.\n\nPokud udělíme své povolení, [AST.GetName] zahájí jednání s vichistickou Francií a bude usilovat o pokojné předání jejích kolonií a zřízení australské posádky."
 AST_diplomatic_events.53.a: "Jejich podporu uvítáme."
 AST_diplomatic_events.53.b: "Riziko, že to [AST.GetName] využije proti nám, je příliš velké."
 AST_diplomatic_events.54.t: "Na jejich pomoc"
 AST_diplomatic_events.54.desc: "[ENG.GetNameDefCap] souhlasí: zvýšená spojenecká přítomnost v Africe by prospěla Commonwealthu.\n\nZahájíme jednání s vichistickou Francií a budeme usilovat o pokojné předání jejích kolonií a zřízení australské posádky."
 AST_diplomatic_events.54.a: "Tak učiníme."
 AST_diplomatic_events.55.t: "S povolením nebo bez něj"
 AST_diplomatic_events.55.desc: "[ENG.GetNameDefCap] odmítá australskou pomoc v Africe a záležitost vichistické Francie vyřeší sám. Naše ambice však nelze snadno odklonit.\n\nAustralská kontrola nad africkými územími vichistické Francie by z nás učinila rovnocenného partnera Britského společenství, nikoli jeho podřízeného. Musíme o ně usilovat navzdory přáním [ENG.GetNameDef], i když to bude muset být silou."
 AST_diplomatic_events.55.a: "Rozšíříme se."
 AST_diplomatic_events.56.t: "[AST.GetName] požaduje africké území"
 AST_diplomatic_events.56.desc: "Jménem [ENG.GetNameDef] klepe [AST.GetName] na naše dveře a požaduje předání afrických území.\n\n[ENG.GetNameDefCap] je odhodlán rozšířit svou kontrolu v Africe, a pokud se nepodrobíme australské okupaci, vrátí se k našemu prahu ozbrojeni."
 AST_diplomatic_events.56.a: "Abychom se vyhnuli konfliktu, území budou předána."
 AST_diplomatic_events.56.b: "Pak se musí vrátit ozbrojeni."
 AST_diplomatic_events.57.t: "Vichy předává africké území"
 AST_diplomatic_events.57.desc: "Vichistická Francie souhlasila s předáním požadovaných afrických území a umožnila australské posádce převzít kontrolu nad regionem."
 AST_diplomatic_events.57.a: "Další expanze do Afriky bude pokračovat!"
 AST_diplomatic_events.58.t: "Vichy odpírá [AST.GetName] území"
 AST_diplomatic_events.58.desc: "Vichistická Francie odmítá předat nám africká území. Nebyla to však žádost, nýbrž požadavek.\n\nBudeme usilovat o region, který nám upřeli, i když to bude muset být silou."
 AST_diplomatic_events.58.a: "Pokojně nebo ne, [AST.GetName] se rozšíří."
 AST_diplomatic_events.62.t: "Protibritský pakt?"
 AST_diplomatic_events.62.desc: "Diplomaté z [AST.GetName] za námi přišli s nabídkou na uzavření protibritského paktu. Ten by zahrnoval jejich pomoc při znovuzískání severního Irska od Anglosasů, aniž bychom museli přímo zasáhnout.\nNa oplátku bychom se v případě jejich úspěchu připojili k jejich frakci a pomohli jim v budoucí válce proti Británii, pokud k ní dojde.\nAčkoli je sjednocení se severem lákavé, musíme pečlivě zvážit, zda jsme v pozici, abychom si takto znepřátelili silnějšího souseda, a hlavně zda bychom v případě konfliktu mohli zvítězit - aby se celé Irsko znovu nestalo pouhou britskou kolonií."
 AST_diplomatic_events.62.a: "Sjednocení nemůže čekat! Podepište pakt!"
 AST_diplomatic_events.62.b: "Je to příliš nebezpečné."
 AST_diplomatic_events.63.t: "Irsko odmítá!"
 AST_diplomatic_events.63.desc: "Irsko odmítlo podepsat protibritský pakt."
 AST_diplomatic_events.63.a: "Pak Irsko zůstane rozdělené."
 AST_diplomatic_events.64.t: "Irsko přijímá!"
 AST_diplomatic_events.64.desc: "Irsko přijalo podpis protibritského paktu."
 AST_diplomatic_events.64.a: "Vpřed, na Belfast!"
 AST_diplomatic_events.65.t: "[FROM.GetName] poskytuje podporu"
 AST_diplomatic_events.65.desc: "Rostoucí vliv strany [FROM.GetCommunistParty] v [FROM.GetNameDef] nyní nese ovoce, neboť její zástupci procestovali Čínu, aby nás informovali o [FROM.GetAdjective] dobrovolnických silách, které se mobilizují na podporu našich jednotek. Tito dobrovolníci navíc přivážejí přebytečné vybavení, které pomůže vyzbrojit naše vlastní vojáky."
 AST_diplomatic_events.65.a: "Dobrý začátek spolupráce s našimi [FROM.GetAdjective] soudruhy"
 AST_diplomatic_events.66.t: "[FROM.GetName] nám děkuje za podporu"
 AST_diplomatic_events.66.desc: "Zástupci [FROM.GetLeader] nám tlumočili jeho poděkování za podporu našich dobrovolníků i za poskytnutý válečný materiál. Rozsáhlé [FROM.GetAdjective] zkušenosti s občanskou válkou jistě znamenají, že tyto zdroje budou využity účinně."
 AST_diplomatic_events.66.a: "Skvělý první krok"
 AST_diplomatic_events.67.t: "[FROM.GetName] nám děkuje za podporu"
 AST_diplomatic_events.67.desc: "Zástupci [FROM.GetLeader] nám tlumočili jeho poděkování za podporu našich dobrovolníků i za poskytnutý válečný materiál. Rozsáhlé [FROM.GetAdjective] zkušenosti s občanskou válkou jistě znamenají, že tyto zdroje budou využity účinně."
 AST_diplomatic_events.67.a: "Skvělý první krok"
 AST_diplomatic_events.68.t: "Australské požadavky"
 AST_diplomatic_events.68.desc: "Austrálie nechce čelit svému drtivému nepříteli - [JAP.GetNameDef] - sama. Tlačí na nás, abychom učinili první krok a vyřešili hrozící konflikt co nejdříve."
 AST_diplomatic_events.68.a: "Jak se karta obrátila."
 AST_diplomatic_events.69.t: "Znovu svázáni"
 AST_diplomatic_events.69.desc: "Pouto mezi [ENG.GetNameDef] a [AST.GetName] je vystaveno zkoušce, ale druhá jmenovaná země je odhodlána jej znovu posílit naplno. [AST.GetName] má v britské vládě tak rozsáhlé kontakty a spojence, že jej její představitelé zkrátka nemohou odmítnout; země znovu vstoupí do stejné frakce a ostrovy i země protinožců budou opět spolupracovat."
 AST_diplomatic_events.69.a: "Tak se stane."
 AST_diplomatic_events.71.t: "Austrálie žádá tichomořské ostrovy"
 AST_diplomatic_events.71.desc: "[AST.GetName] požaduje kontrolu nad našimi tichomořskými ostrovy a tvrdí, že západní Tichomoří nemá být pod velením [USA.GetNameDef]. Ostrovy mohou být malou cenou za uklidnění australského nepřátelství, ale cenou přesto. Máme riskovat vyprovokování sílící fašistické mocnosti, i když už teď máme plné ruce práce?"
 AST_diplomatic_events.71.a: "Ne, to nebudeme."
 AST_diplomatic_events.71.b: "Tichomořské ostrovy zůstanou naše."
 AST_diplomatic_events.72.t: "Převod tichomořských ostrovů [USA.GetNameDef]"
 AST_diplomatic_events.72.desc: "Protože už mají plné ruce práce, ukázaly se tichomořské ostrovy jako malá cena, kterou [USA.GetNameDef] zaplatil za uklidnění australského nepřátelství. Jejich tichomořské ostrovy jsou nyní naše."
 AST_diplomatic_events.72.a: "Výborně."
 AST_diplomatic_events.73.t: "[USA.GetNameDefCap] odmítá"
 AST_diplomatic_events.73.desc: "[USA.GetNameDefCap] nám odmítl vydat své tichomořské ostrovy. Navzdory našim požadavkům a rostoucímu vlivu v Tichomoří Washington nadále odmítá vzdát se své držby ostrovů."
 AST_diplomatic_events.73.a: "Ostrovy ještě nemusí být naše."
 AST_diplomatic_events.74.t: "Australský požadavek na převod Filipín"
 AST_diplomatic_events.74.desc: "[AST.GetName] ve svých ambicích rozšířit svá území požaduje kontrolu nad [PHI.GetNameDef]. Pokud odmítneme, [AST.GetName] hrozí válkou a považuje za jednoduše nemyslitelné, aby si [USA.GetNameDef] ponechal území ve sféře vlivu [AST.GetName]."
 AST_diplomatic_events.74.a: "Nemůžeme riskovat válku; vyhovte jejich požadavkům."
 AST_diplomatic_events.74.b: "Filipíny zůstanou naše!"
 AST_diplomatic_events.75.t: "Převod [PHI.GetNameDef]"
 AST_diplomatic_events.75.desc: "Je zřejmé, že vzestup [AST.GetName] jako fašistické mocnosti začíná přinášet jisté výhody, když se národy obávají našeho hněvu do takové míry. [USA.GetNameDefCap] souhlasil; [PHI.GetNameDef] jsou naše."
 AST_diplomatic_events.75.a: "Rodí se nový řád."
 AST_diplomatic_events.76.t: "[USA.GetNameDefCap] odmítá"
 AST_diplomatic_events.76.desc: "[USA.GetNameDefCap] nám odmítl vydat [PHI.GetNameDef]. Navzdory našim požadavkům a rostoucímu vlivu v Tichomoří Washington nadále odmítá vzdát se své držby tohoto území."
 AST_diplomatic_events.76.a: "To znamená válku."
 AST_political_events.1.t: "Výzva k referendu"
 AST_political_events.1.desc: "Jsou dvě oblasti, v nichž se my jako vláda snažíme posílit federální kontrolu: letectví a marketing.\n\nPokud jde o letectví, cílem je změnit ústavu tak, aby parlament Commonwealthu získal pravomoc přijímat zákony týkající se letecké navigace a letadel.\n\nDodatek o marketingu má umožnit spolupráci mezi Commonwealthem a státy v oblasti marketingu, která je v současnosti ústavně nemožná.\n\nKe kterému z nich máme vyhlásit referendum?"
 AST_political_events.1.a: "K letectví, aby bylo možné regulovat leteckou navigaci v celém [AST.GetName]."
 AST_political_events.1.a.tt: "Jakmile reforma projde:\n Přidá §YSchválená letecká reforma§!, která uděluje:\n Rychlost leteckého výzkumu: §G+15 %§!\n Rychlost výstavby §Yleteckých základen§!: §G+5,00 %§!"
 AST_political_events.1.b: "K marketingu, aby bylo možné koordinovat celostátní systémy odbytu zemědělských produktů."
 AST_political_events.1.b.tt: "Jakmile reforma projde:\n Přidá §YSchválená marketingová reforma§!, která uděluje:\n Faktor továren na spotřební zboží: §Y-10,0 %§!"
 AST_political_events.2.t: "Úspěšné referendum"
 AST_political_events.2.desc.a: "Veřejnost souhlasila s přijetím naší letecké reformy. Protože letectví v době sepsání australské ústavy neexistovalo, je jedině správné, aby vláda konečně převzala pravomoc nad leteckou navigací a regulací. V zájmu bezpečnosti a efektivity nyní budou následovat jednotné národní letecké zákony."
 AST_political_events.2.desc.b: "Veřejnost souhlasila s přijetím naší marketingové reformy. Díky pravomoci regulovat zemědělské produkty a jejich odbyt bude nyní vláda schopna stabilizovat trhy a zlepšit spolupráci mezi státy. Příjmy farmářů budou stabilnější - a stejně tak i národní ekonomika."
 AST_political_events.2.a: "Federální kontrola se rozšíří!"
 AST_political_events.4.t: "Premiér podlehl"
 AST_political_events.4.desc: "Premiér už dlouho strádal pod tlakem válečných příprav a nakonec jeho srdce už nedokázalo vydržet; [AST.GetLeader] zemřel na infarkt.\n\nVzhledem k současnému stavu světa bude jeho vedení bolestně chybět. Přesto musí Austrálie pokračovat bez něj."
 AST_political_events.4.a: "Národní tragédie."
 AST_political_events.5.t: "Australská vláda přitvrzuje"
 AST_political_events.5.desc: "Vznikla skupina vzdorovitých a kontroverzních hlasů: hnutí Australia First. Vláda se obává, že jeho úmysly nemusí být zcela demokratické, a rozhodla se sledovat jak skupinu, tak její členy. Zásahy demokratů omezí naši schopnost organizace a zbrzdí nábor nových členů."
 AST_political_events.5.a: "Jen čas ukáže skutečnou povahu hnutí."
 AST_political_events.6.t: "Stopadesáté výročí roku 1938"
 AST_political_events.6.desc: "Dříve dnes, zatímco probíhaly oslavy stopadesátého výročí roku 1938 a průvod „Australský pochod k národnímu bytí“ procházel hlavními ulicemi Sydney, se v Australia Hall konal protest.\n\nAktivisté a skupiny za práva Aboridžinců se shromáždili, aby upozornili na skutečnost, že 150. výročí neoznačovalo pouze počátek britské kolonizace, ale také ústavní diskriminaci Aboridžinců. Aktivisté požadovali nové zákony pro vzdělávání a péči o Aboridžince, stejně jako novou politiku umožňující povýšení původních obyvatel na plnoprávné občany."
 AST_political_events.6.a: "Je třeba jednat."
 AST_political_events.7.t: "Imperiální nátlak"
 AST_political_events.7.desc: "Po nedávných událostech už nelze popírat, že australská politika se mění. [ENG.GetNameDefCap] podnikl kroky, aby diplomaticky zajistil, že [AST.GetName] zůstane na cestě vhodné pro národ pod jeho commonwealthským deštníkem, v naději, že tento mírný postrčen správným směrem postačí k udržení loajality jeho dominia."
 AST_political_events.7.a: "Navzdory britským pokusům si [AST.GetName] zvolí vlastní cestu."
 AST_political_events.8.t: "Válka se blíží"
 AST_political_events.8.desc: "$AST_war_is_coming_cat_desc$"
 AST_political_events.8.a: "Musíme se připravit."
 AST_political_events.9.t: "Spor o Dalfram"
 AST_political_events.9.desc: "To, co začalo jako spor o nakládku surového železa, zažehlo něco mnohem většího. Dělníci po celé Austrálii odcházejí z práce na znamení solidarity a vzdorují vládě i průmyslu. Jak se stávky šíří a napětí roste, krize se vymyká kontrole a požaduje rezignaci těch, kdo jsou u moci. A tak vláda, která situaci naprosto nezvládla, přesně to udělá a ponechá pozici vládnoucí strany volnou pro [AST.GetCommunistParty]."
 AST_political_events.9.a: "A my si ji vezmeme."
 AST_canberra_air_disaster_events.1.t: "Canberrská letecká katastrofa"
 AST_canberra_air_disaster_events.1.desc: "Dříve dnes se přímo u Canberry zřítil letoun Lockheed Hudson. Mezi deseti lidmi na palubě, kteří všichni tragicky zahynuli, byli i tři vládní úředníci předvolaní na zasedání kabinetu.\n\nCo havárii způsobilo, je záhadou; počasí nabízelo ideální letové podmínky a let pilotoval zkušený důstojník RAAF, Flight Lieutenant Robert Hitchcock.\n\nBez ohledu na příčinu je to pochmurný den pro celý národ - v neposlední řadě pro rodiny a přátele obětí - a Austrálie nyní hledí ke svým vůdcům. Jak odpoví?"
 AST_canberra_air_disaster_events.1.a: "Strašlivě tragická událost."
 AST_canberra_air_disaster_events.1.a.tt: "Odemkne rozhodnutí §YDůvěra kabinetu§! a §Ymisi§! k záchraně nebo odstranění úřadující vlády."
 AST_canberra_air_disaster_events.2.t: "[AST.GetRulingParty] obstála"
 AST_canberra_air_disaster_events.2.desc: "Úřadující vláda úspěšně provedla Austrálii národními otřesy, které následovaly po canberrské letecké katastrofě. Jako vůdčí světlo prokázala [AST.GetRulingParty] svou spolehlivost a sílu v těžkých časech, čímž nakonec zvýšila podporu veřejnosti po celé zemi."
 AST_canberra_air_disaster_events.2.a: "Budoucnost leží před námi."
 AST_canberra_air_disaster_events.3.t: "Návrh na vyslovení nedůvěry"
 AST_canberra_air_disaster_events.3.desc: "Po úspěšném návrhu na vyslovení nedůvěry je úřadující vláda konečně nahrazena a neochotně předává otěže svým nástupcům. Po období politické nestability a veřejné nedůvěry je Austrálie připravena na nový začátek."
 AST_canberra_air_disaster_events.3.a: "Nové vedení Austrálii pomůže."
 AST_canberra_air_disaster_events.4.t: "Změna vedení"
 AST_canberra_air_disaster_events.4.desc: "Po období politické nestability a veřejné nedůvěry mění [AST.GetRulingParty] své vedení. Většinové hlasování nutí premiéra odstoupit a umožňuje jeho nástupci převzít řečnický pult."
 AST_canberra_air_disaster_events.4.a: "Snad to Austrálii otevře cestu vpřed."
 AST_canberra_air_disaster_events.5.t: "Australská obvinění"
 AST_canberra_air_disaster_events.5.desc: "Na tiskové konferenci [AST.GetName] vznesl obvinění naším směrem a tvrdil, že jsme zodpovědní za nedávnou leteckou havárii na australské půdě, která vedla ke smrti několika politických činitelů.\n\nObvinění jsou samozřejmě zcela nepravdivá, což činí tuto neúctu o to zlovolnější."
 AST_canberra_air_disaster_events.5.a: "Tvrzení jsou nepravdivá, nemusíme jednat."
 AST_canberra_air_disaster_events.5.b: "To nezůstane bez trestu."
 AST_canberra_air_disaster_events.6.t: "[JAP.GetNameDefCap] podniká odvetu"
 AST_canberra_air_disaster_events.6.desc: "[JAP.GetNameDefCap] naše obvinění nevzal na lehkou váhu a označil je za první akt agrese. [JAP.GetLeader] konflikt dále vyhrotil prohlášením, že jeho národ má nyní plné právo napadnout naše země."
 AST_canberra_air_disaster_events.6.a: "Už nebudeme dále zvyšovat napětí."
 AST_canberra_air_disaster_events.6.b: "To nemůže zůstat bez odpovědi."
 INS_limited_war_events.1.t: "Rozdrťte Malajsko!"
 INS_limited_war_events.1.desc: "Nepřátelské linie se prolomily a naši muži postupují vpřed bez odporu. Za průlivem se britský klientský stát hroutí pod tíhou lidového hněvu. Loutky Londýna si myslely, že je jejich bodáky ochrání před dějinami. Mýlily se."
 INS_limited_war_events.1.a: "Merdeka!"
 INS_limited_war_events.1.b: "Skvělý den pro republiku."
 INS_limited_war_events.2.t: "[FROM.GetName] vrací úder"
 INS_limited_war_events.2.desc: "To, co bylo slibováno jako rychlý úder proti loutkovému režimu, zkyslo. [FROM.GetAdjectiveCap] síly, posílené svými imperiálními chlebodárci, vyhnaly naše muže ze sporného území a nyní na něm sedí jako okupanti. Každý den vysílačka přináší zprávy o jejich chvástání. Pokračovat znamená riskovat další ponížení, ale stáhnout se znamená přiznat porážku před celým souostrovím."
 INS_limited_war_events.2.a: "Stáhněte muže. Zachraňte, co se dá."
 INS_limited_war_events.2.b: "Loutkám neustoupíme!"
 INS_limited_war_events.3.t: "[FROM.GetName] se sklání před republikou"
 INS_limited_war_events.3.desc: "Z Kuala Lumpuru dorazila zpráva. Loutková vláda, opuštěná v rozhodující hodině svými londýnskými pány, přijala naše podmínky, místo aby viděla svá města v plamenech. Sporná území jsou naše. Ostatní klientské státy regionu si z toho vezmou ponaučení."
 INS_limited_war_events.3.a: "Indonésie povstává."
 INS_limited_war_events.4.t: "[FROM.GetName] odmítá naše podmínky"
 INS_limited_war_events.4.desc: "[FROM.GetName] nám mrštil naši nabídku do tváře. Loutkoví ministři, čtoucí ze scénáře sepsaného ve Whitehallu, prohlašují, že nebude vydán ani centimetr půdy a že samotná republika musí být přivedena k poslušnosti, než zbraně utichnou."
 INS_limited_war_events.4.a: "Pak ať promluví děla."
 INS_limited_war_events.5.t: "[FROM.GetNameDef] volá po našem zničení"
 INS_limited_war_events.5.desc: "[FROM.GetNameDefCap] odhodil poslední předstírání uměřené války. Jejich vysílání nyní otevřeně hovoří o roztrhání republiky na kusy a rozparcelování jejích ostrovů mezi staré koloniální pány. Tato záležitost neskončí potichu. Buď bude Indonésie na jejím konci stát, nebo nebude stát vůbec."
 INS_limited_war_events.5.a: "Společně obstojíme, nebo padneme."
 INS_limited_war_events.6.t: "[FROM.GetAdjectiveCap] postup vázne"
 INS_limited_war_events.6.desc: "[FROM.GetAdjectiveCap] výpad nás zastihl nepřipravené a po nějaký čas jsme se obávali nejhoršího. Jejich postup však uvízl v bahně. Jejich muži jsou unavení, jejich linie dlouhé a chvástání z Londýna s každým komuniké slábne. Republika může ještě projevit velkorysost a nabídnout loutkám cestu, jak se z této záležitosti vyklonit, ačkoli mnozí by řekli, že čisté vítězství poslouží věci lépe než uměřené."
 INS_limited_war_events.6.a: "Nabídněte jim podmínky."
 INS_limited_war_events.6.b: "Žádné slitování pro loutky."
 INS_limited_war_events.7.t: "Naše ofenzíva se zadrhla"
 INS_limited_war_events.7.desc: "Náš postup se zastavil, a co hůř, nepřítel to ví. Zpoza průlivu dorazil požadavek. Složte zbraně hned a přijměte jejich podmínky, nebo sledujte, jak seznamy obětí rostou pro tentýž výsledek. Volba, kterou nám nabízejí, je jen velikost pohřbu."
 INS_limited_war_events.7.a: "Lepší špatný mír než horší válka."
 INS_limited_war_events.7.b: "Republika se nevzdává."
 INS_limited_war_events.8.t: "[FROM.GetName] se odmítá ohnout"
 INS_limited_war_events.8.desc: "[FROM.GetName] odpověděl na naši nabídku vzdorem. Jejich ministři prohlašují, že raději uvidí každý kampong od Penangu po Johor v plamenech, než aby republice postoupili jediný ústupek. Válka tedy pokračuje."
 INS_limited_war_events.8.a: "Budiž."
 INS_limited_war_events.9.t: "[FROM.GetName] chce zlomit republiku!"
 INS_limited_war_events.9.desc: "Zachycené vysílání nepřátelského velení potvrdilo to nejhorší. Nebude žádné urovnání, žádný uměřený mír, žádný návrat k liniím, které jsme drželi dříve. Loutky a jejich londýnští páni požadují úplnou kapitulaci republiky, aby Indonésie byla zlomena na kole a její ostrovy vráceny pod imperialistickou botu, zpod níž jsme je vyrvali. Na to existuje jediná odpověď."
 INS_limited_war_events.9.a: "Indonésie vytrvá!"
 AST_union_control_events.1.t: "Zahraniční agenti v našich odborech"
 AST_union_control_events.1.desc: "Zpravodajské služby předložily vládě znepokojivou zprávu. Australští komunističtí operativci navazují kontakty s místními odborovými předáky, rozdávají radikální literaturu a povzbuzují dělníky k organizování v revolučním duchu. Hnutí je zatím malé, ale bezpečnostní činitelé varují, že přesně takové věci začínají. Je třeba rozhodnout, než zakoření."
 AST_union_control_events.1.a: "Držte je pod dohledem. Budeme sledovat a čekat."
 AST_union_control_events.4.t: "Komunističtí infiltrátoři obsazují [MAL.GetAdjective] území"
 AST_union_control_events.4.desc: "Vládě dorazila šokující zpráva. Koordinovaná operace obsadila jeden z našich států a prohlásila jej za součást revoluční vlády. Rychlost a organizace útoku vyvolaly nepříjemné otázky - naše zpravodajské služby mají podezření, že povstalci nejednali sami a že je k našim břehům mohly vést cizí ruce. Ti, kteří převzetí území unikli, se nevzdali. Přeskupili se a chopili se zbraní, odhodláni získat zpět to, co jim bylo vzato."
 AST_union_control_events.4.a: "Zjistěte, kdo za tím stojí. Tito povstalci to území dlouho neudrží."
 AST_union_control_events.4.a.tt: "Protîkomunistické milice se shromáždily a zformovaly, aby vzdorovaly komunistické okupaci."
 AST_union_control_events.5.t: "[MAL.GetAdjectiveCap] katastrofa"
 AST_union_control_events.5.desc: "Operace skončila katastrofou. Naše jednotky se nikdy nedostaly na břeh. Byly zahnány loajalistickými hlídkami, ztratily se v průlivech nebo byly zajaty dříve, než mohly zřídit pozici. Podrobnosti jsou nejasné, ale výsledek nikoli. Horší je, že tisk se o celé záležitosti doslechl. V parlamentu se nyní kladou otázky, co přesně naše síly v těch vodách dělaly. Veřejnost reaguje šokem a rozpaky. Jakékoli zisky jsme doufali zajistit pro revoluci, budeme muset najít jinou cestou."
 AST_union_control_events.5.a: "Strašlivý nezdar. Musíme hledat jiné cesty, jak podpořit naše soudruhy."
 AST_union_control_events.3.t: "V [MAL.GetNonIdeologyName] propuká revoluce"
 AST_union_control_events.3.desc: "Dělníci v [MAL.GetNonIdeologyName] povstali. Komunistické buňky pěstované naší dlouhou kampaní se chopily zbraní po celé zemi - ale obraz z bojiště je znepokojivý. Revoluční síly se ocitly soustředěné ve špatných oblastech, oddělené od srdce poloostrova vodou a džunglí. Bez opěrného bodu na pevnině je vláda jednoduše vyhladoví a revoluci udusí dříve, než se může rozšířit. Austrálie musí jednat skrytě a rychle, vysadit bojovníky na poloostrově a dát revoluci půdu, kterou potřebuje k přežití."
 AST_union_control_events.3.a: "Nemůžeme nechat revoluci zemřít na pláži. Zajistěte jim opěrný bod."
 AST_union_control_events.2.t: "[AST.GetAdjectiveCap] podporovaní agitátoři v našich ulicích"
 AST_union_control_events.2.desc: "Agenti australské komunistické vlády dorazili do našich měst. Neskrývají se - u bran továren se rozdávají letáky, na veřejných náměstích se pronášejí projevy a mezi australskými operativci a místními radikálními skupinami vznikají sítě solidarity. Zdá se, že stávající sítě zahraničního vlivu byly přes noc znovu oživeny. Jde o koordinovanou kampaň a vláda se musí rozhodnout, jak odpoví, než se lidová nespokojenost změní v něco hůře zvládnutelného."
 AST_union_control_events.2.b: "Znepokojivý vývoj."
 ABDA_events.1.t: "Pozvánka do nového nejvyššího velení"
 ABDA_events.1.desc: "[FROM.GetNameDef] zřídil společné nejvyšší velení pro tichomořské válčiště a rozšířil nám pozvání, abychom se připojili. Iniciativa známá jako ABDACOM usiluje o sdružení námořních, leteckých i pozemních sil spojeneckých národů působících v regionu pod jednotnou velitelskou strukturu. Členství by znamenalo užší koordinaci s [FROM.GetNameDef] a dalšími partnery, kteří se již k úsilí zavázali. Musíme se rozhodnout, zda přijmeme."
 ABDA_events.1.a: "Budeme stát společně."
 ABDA_events.1.b: "V tuto chvíli se k tomu nemůžeme zavázat."
 ABDA_events.2.t: "[FROM.GetName] vstupuje do ABDACOM"
 ABDA_events.2.desc: "[FROM.GetNameDef] přijal naše pozvání ke vstupu do nejvyššího velení ABDACOM. Jejich síly budou nyní působit pod společnou velitelskou strukturou a posílí naši pozici v tichomořském válčišti."
 ABDA_events.2.a: "Vítaný vývoj."
 ABDA_events.3.t: "[FROM.GetName] odmítá vstoupit"
 ABDA_events.3.desc: "[FROM.GetNameDef] odmítl naše pozvání ke vstupu do nejvyššího velení ABDACOM. Jejich síly se v tuto chvíli nezapojí do společného úsilí, i když dveře mohou zůstat otevřené."
 ABDA_events.3.a: "Nešťastné, ale bereme na vědomí."
 ABDA_events.5.t: "Pozvánka ke vstupu do ABDACOM"
 ABDA_events.5.desc: "[FROM.GetNameDef] nám rozšířil pozvání ke vstupu do Americko-britsko-nizozemsko-australského velení. ABDACOM se již etabloval jako nejvyšší koordinační autorita spojeneckých sil v tichomořském válčišti a spojuje námořnictva i armády hlavních spojeneckých mocností pod jedním velením. Členství by naše síly začlenilo do této jednotné struktury s přístupem ke sdílenému zpravodajství, koordinované doktríně a plné váze spojenecké podpory. Musíme se rozhodnout."
 ABDA_events.5.a: "Budeme stát společně."
 ABDA_events.5.b: "V tuto chvíli se k tomu nemůžeme zavázat."
 ABDA_events.4.t: "Obrana Singapuru"
 ABDA_events.4.desc: "Vzhledem k tomu, že Singapur byl určen jako opěrný bod obranného perimetru ABDACOM, musí naši velitelé rozhodnout, jak investovat do jeho opevnění. Můžeme upřednostnit námořní přístupy a obranu přístavu, posílit pozemní přístupy proti útoku po souši, nebo rozdělit zdroje mezi obojí. Každý postup ovlivní, jak bude možné Singapur bránit, až nepřítel přijde."
 ABDA_events.4.a: "Posilte námořní přístupy. Síla Singapuru je v jeho přístavu."
 ABDA_events.4.b: "Opevněte pozemní perimetr. Skutečná hrozba přijde po souši."
 ABDA_events.4.c: "Vyvážený přístup. Žádná cesta útoku nesmí zůstat nebráněná."
 ABDA_fortress_singapore_choice_tt: "Dokončení tohoto zaměření nabídne volbu, jak opevnit Singapur."
 AST_diplomatic_events.46.t: "Převod suzerenity"
 AST_diplomatic_events.46.desc: "Ve snaze zvýšit společný vliv na diplomacii a konflikty v jihovýchodní Asii se [ENG.GetNameDefCap] rozhodl převést kontrolu nad našimi zeměmi na [AST.GetNameDef]. Protože samotný [AST.GetName] leží v tomto regionu, očekává se, že jeho suzerenita bude účinnější než britská."
 AST_diplomatic_events.46.a: "Zjevně do toho nemáme co mluvit."
