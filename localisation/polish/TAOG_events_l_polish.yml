l_polish:
 INS_political_events.1.t: "Nový generální guvernér pro [INS.GetNameDef]"
 INS_political_events.1.desc: "Pětileté období [INS.GetLeader] se blíží ke konci, a proto musíme rozhodnout o vhodném vůdci, který jej nahradí. Královna Wilhelmina doporučila Alidiuse Tjardu van Starkenborgh Stachouwera, který se jako mimořádný velvyslanec a zplnomocněný ministr ukázal jako velmi nadějný."
 INS_political_events.1.a: "Jak chce královna."
 INS_political_events.1.b: "[INS.GetLeader] se osvědčil, měl by sloužit další období."
 INS_political_events.2.t: "[FROM.GetName] požaduje vlastnictví [721.GetName]"
 INS_political_events.2.desc: "Nová republikánská vláda v bývalých Indii prohlásila celý souostroví za své území. [FROM.GetLeader] nám zaslal oficiální požadavek, abychom se vzdali [721.GetName], a pohrozil vojenskou akcí v případě odmítnutí."
 INS_political_events.2.a: "Dobrá, nestojí za to vyvolávat incident."
 INS_political_events.2.b: "Rozhodně ne!"
 INS_political_events.3.t: "[FROM.GetName] souhlasí s předáním [721.GetName]"
 INS_political_events.3.desc: "Jak se očekávalo, [FROM.GetLeader] přijal naše požadavky a začal stahovat jednotky z [721.GetName]. Síly TKR vstoupily do regionu spolu s několika vládními vyslanci. [INS.GetLeader] sám pronesl v Dili projev o svržení koloniální nadvlády."
 INS_political_events.3.a: "Skvělé!"
 INS_political_events.4.t: "[FROM.GetName] odmítá předat [721.GetName]"
 INS_political_events.4.desc: "Vyjednávání s [FROM.GetName] nedopadlo dobře. [FROM.GetLeader] odmítl z jakéhokoli důvodu vzdát se [721.GetName] a schůzku předčasně ukončil."
 INS_political_events.4.a: "Tak tedy válka."
 INS_political_events.5.t: "Indonéské volby"
 INS_political_events.5.desc: "Dnes začíná historický milník pro Indonésii. S revolucí oficiálně u konce premiér [INS.GetLeader] oznámil, že Indonésie uskuteční své první svobodné a demokratické volby. Výsledek těchto voleb bude mít trvalý dopad na Indonésii."
 INS_political_events.5.a: "Sutan Sjahrir dovedl naši zemi až sem, on nás dále povede!"
 INS_political_events.5.b: "Amir Sjarifuddin je rozumný kompromis mezi socialisty a nacionalisty."
 INS_political_events.5.c: "Mohammad Hatta zahájil revoluci a dokončí ji."
 INS_political_events.6.t: "Naše přípravy se vyplácejí"
 INS_political_events.6.desc: "S probíhající revolucí už naše partyzánské skupiny infiltrované do správy Indies nemusí působit v utajení a začnou provádět sabotážní operace dříve, než Nizozemsko dokáže zareagovat."
 INS_political_events.6.a: "Musíme jednat dál rychle."
 INS_political_events.7.t: "Petice Soetardjo"
 INS_political_events.7.desc: "Volksraad petice organizovaná Soetardjem, která žádá o uspořádání kulatého stolu mezi nizozemskými a indonéskými zástupci za účelem projednání touhy Indonésie po autonomii, skončila vnitřní debatu a nyní jde k schválení generálnímu guvernérovi. Mnoho poradců trvá na zachování statu quo a tedy na vetu petice, nicméně nelze popřít, že nacionalistická hnutí sílí a radikalizují se. Pokud budeme nadále odmítat každou mírumilovnou žádost o autonomii, mohou nacionalisté začít zkoušet násilnější alternativy."
 INS_political_events.7.a: "Musíme zahájit vyjednávání, abychom se vyhnuli nevyhnutelné občanské válce."
 INS_political_events.7.b: "Stav věcí musí zůstat zachován."
 INS_political_events.7.c: "Možná mají nacionalisté pravdu?"
 INS_political_events.8.t: "[?event_target:INS_invasion_event_invader.GetAdjective] okupace hrozí"
 INS_political_events.8.desc: "Vojáci z [?event_target:INS_invasion_event_invader.GetName] dorazili do [?event_target:INS_invasion_event_invaded_state.GetName], a naše jednotky v oblasti, značně početně slabší, byly vyzvány k plné vojenské evakuaci z [?event_target:INS_invasion_event_invaded_state.GetName]. [?event_target:INS_invasion_event_invader.GetAdjective] síly postupují v Indies dál a naše šance vyhnout se okupaci vypadají bledě."
 INS_political_events.8.a: "Zatknime nacionalisty a budeme bránit domov až do smrti!"
 INS_political_events.9.t: "Indonésané vyhlašují nezávislost"
 INS_political_events.9.desc: "Jakmile [JAP.GetNameDef] začal stahovat své síly z Východních Indie, poslali jsme jednotky do Batávie, abychom obnovili koloniální vládu. Naše jednotky však zjistily, že politická situace v Indies se od okupace zásadně změnila. Ještě dříve, než naše jednotky dorazily do Batávie, [INS.GetLeader] podepsal prohlášení o nezávislosti a vyhlásil Republiku Indonésie za samostatný stát, s ohromnou podporou veřejnosti."
 INS_political_events.9.a: "Pošlete tanky!"
 INS_political_events.9.b: "Tohle je beznadějné, další boje nepotřebujeme. Měli bychom se soustředit na obnovu domova."
 INS_political_events.11.t: "[HOL.GetNameDefCap] uznává indonéskou svrchovanost"
 INS_political_events.11.desc: "Po vyhlášení nezávislosti naše milice okamžitě začaly bránit naše území před očekávanou nizozemskou invazí. Nicméně k překvapení mnohých [HOL.GetLeader] oznámil, že nevyhlásí invazi, místo toho upřednostní obnovu nizozemského domova a vyhne se dalším konfliktům."
 INS_political_events.11.a: "Překvapení, ale vítané."
 INS_political_events.12.t: "Setkání s indonéskými nacionalisty"
 INS_political_events.12.desc: "Naše jednotky vylodily v [?event_target:INS_invasion_event_invaded_state.GetName] a vítězství na indonéském frontu je blízko. Musíme se rozhodnout, jak zahájíme okupaci Indonésie. Přímá okupace by nám sice přinesla požadované zdroje, bude však drahá a obtížná. Vyjednali jsme se Sukarnem, vedoucím revolucionářem, plán, podle něhož zřídíme indonéský loutkový stát, formálně částečně vedený Sukarnem, ale pod naší kontrolou. To udrží civilisty v klidu a bude mnohem levnější než úplná okupace."
 INS_political_events.12.a: "Měli bychom pokračovat v jednáních se Sukarnem"
 INS_political_events.12.b: "Nejsme zainteresovaní na spolupráci s revolucionáři."
 INS_political_events.13.t: "[?event_target:INS_invasion_event_invader.GetAdjective] okupace hrozí"
 INS_political_events.13.desc: "Vojáci z [?event_target:INS_invasion_event_invader.GetName] dorazili do [?event_target:INS_invasion_event_invaded_state.GetName], a naše jednotky v oblasti, značně početně slabší, byly vyzvány k plné vojenské evakuaci z [?event_target:INS_invasion_event_invaded_state.GetName]. [?event_target:INS_invasion_event_invader.GetAdjective] síly postupují v Indies dál a naše šance vyhnout se okupaci vypadají bledě. Navíc naše špionáž hlásí, že [?event_target:INS_invasion_event_invader.GetLeader] byl viděn v jednání se Sukarnem a dalšími nacionalistickými vůdci s cílem vytvořit indonéský loutkový stát vedený Sukarnem pod Společnou sférou blahobytu."
 INS_political_events.13.a: "Zatknime nacionalisty a budeme bránit domov až do smrti!"
 INS_political_events.13.b: "Je to nebezpečné, ale možná je to skutečná šance stát se nezávislými?"
 INS_peta_explain_tt: "Budeme moci využít chaos okupace k vyhlášení úplné nezávislosti, pokud bude [JAP.GetName] zatlačeno zpět."
 INS_peta_explain_tt_jap: "§R[INS.GetName] nám může zůstat věrný, ale pokud začneme ztrácet kontrolu nad územím, mohou odhalit náš bluf a vyhlásit nezávislost§!."
 INS_political_events.14.t: "Nacionalističtí vůdci zatčeni"
 INS_political_events.14.desc: "Sukarno i několik dalších předních revolucionářů v Indonésii byli zatčeni nizozemskou vojenskou policií dříve, než jsme stihli zřídit loutkový režim."
 INS_political_events.14.a: "Škoda, byl by cenným spojencem."
 INS_political_events.15.t: "Obránci vlasti"
 INS_political_events.15.desc: "Vyjednávání se Sukarnem skončila a loutkový režim v Indonésii je na cestě. Sukarno využil svých kontaktů spolu s naší vojenskou přítomností k destabilizaci nizozemské vlády a k nastolení faktické kontroly nad souostrovím."
 INS_political_events.15.a: "Nejenže jsme získali levné zdroje, získali jsme i cenného spojence."
 INS_political_events.16.t: "[?event_target:INS_invasion_event_invader.GetAdjective] okupace Indies"
 INS_political_events.16.desc: "[?event_target:INS_invasion_event_invader.GetAdjective] síly v Indies spolupracovaly s indonéskými nacionalisty na destabilizaci naší koloniální správy a plně obsadily Indies. Nizozemské vlajky byly staženy a nahrazeny indonéskými vlajkami a domorodí obyvatelé Indies zdají se [?event_target:INS_invasion_event_invader.GetAdjective] okupanty vítat. Naše koloniální říše to nemá dobré."
 INS_political_events.16.a: "Vyhráli sice bitvu, ale nevyhráli válku."
 INS_political_events.17.t: "[INS.GetName] vyhlašuje nezávislost"
 INS_political_events.17.desc: "Z Velkého generálního štábu přišla zpráva z Batávie. Sukarno a jeho klika, vychovaní vlastní rukou, aby spravovali ostrovy ve jménu císaře, prohlásili [FROM.GetAdjective] Republiku jako odpověď na naše opakované ztráty území, věříce, že jsme příliš roztaženi, abychom s tím něco udělali."
 INS_political_events.17.a: "Bohužel, mohou mít pravdu."
 INS_political_events.18.t: "Tan Malaka se vrací do Indonésie"
 INS_political_events.18.desc: "Tan Malaka, indonéský komunista, který v těchto letech sloužil jako důvěryhodný poradce naší vlády, oznámil své okamžité odchod. S [INS.GetNameDef] nyní jako svobodnou republikou má v úmyslu konečně se vrátit do země, kterou opustil před více než dvěma desetiletími jako uprchlík. Děkuje nám za poskytnuté útočiště a svobodu pokračovat ve své práci a říká pouze, že jeho místo je nyní doma."
 INS_political_events.18.a: "Přejeme mu hodně štěstí."
 INS_political_events.19.t: "[HOL.GetName] odvolává admirála Helfricha"
 INS_political_events.19.desc: "Do [1058.GetName] dorazila zpráva, že admirál Conrad Helfrich, velitel našich námořních sil a nejvhodnější důstojník v těchto vodách, byl povolán domů. Haag uvádí naléhavé potřeby v metropoli a nabízí jen málo dalších vysvětlení. Jeho odchod nechává souostroví špatně bráněné v době, kdy naše pozice zde není zdaleka zajištěná, a velitelské sbory v Surabaji prý panují v zhoršené náladě."
 INS_political_events.19.a: "Chmurný den pro flotilu"
 INS_industrial_events.4.t: "Přerozdělení rozpočtu v [FROM.FROM.GetName]"
 INS_industrial_events.4.desc: "Zavřením plantáží kaučuku v [FROM.FROM.GetName] jsme uvolnili prostor v rozpočtu pro nové průmyslové projekty v regionu."
 INS_industrial_events.4.a: "Vybudujeme ropné vrty v [FROM.FROM.GetName]"
 INS_industrial_events.4.b: "Měli bychom otevřít hliníkárnu v [FROM.FROM.GetName]"
 INS_industrial_events.4.c: "Měli bychom provést průzkum zdrojů, jejichž výrobu nemáme"
 INS_industrial_events.4.d: "Můžeme otevřít uhelné doly v [FROM.FROM.GetName]"
 INS_industrial_events.5.t: "[INS_industrial_events_5_t_scripted]"
 INS_industrial_events_5_t_colonial: "Osud De Javasche Bank"
 INS_industrial_events_5_t_independent: "Osud Bank Indonesia"
 INS_industrial_events.5.desc: "[INS_industrial_events_5_desc_scripted]"
 INS_industrial_events_5_desc_colonial: "Rezervy De Javasche Bank klesly na nejnižší úroveň za poslední desetiletí. Gulden se kupuje méně každý měsíc a majitelé plantáží požadují platby v zahraniční měně. Naši finanční poradci se shodují, že banka sama nezvrátí pokles, ale výrazně se rozcházejí v názoru na nápravu."
 INS_industrial_events_5_desc_independent: "Bank Indonesia oznámila, že rupiah ztratila téměř pětinu své hodnoty jen v posledním čtvrtletí. Obchodníci s rýží v Surabaji ji začali odmítat ve prospěch zahraničních bankovek. Náš ministr financí trvá na tom, že měnu lze zachránit, ale pouze pokud budeme jednat rozhodně a brzy."
 INS_industrial_events.5.a: "Měli bychom se pokusit posílit gulden, nikoli ho nahrazovat."
 INS_industrial_events.5.b: "Připoutáme gulden Indies k nizozemskému guldenu."
 INS_industrial_events.5.c: "Připoutáme gulden Indies k americkému dolaru."
 INS_industrial_events.6.t: "Více výnosná dohoda"
 INS_industrial_events.6.desc: "Úřad pro chinovník (Cinchona Bureau) přijal naše podmínky. S malárií pustošící polovinou tropů a bez náhrady za chinín neměli mnoho možností. Nová dohoda nám zaručuje podstatně větší podíl zisků z každého gramu chinínu, který opouští naše pobřeží. Otázkou nyní je, kam tento neočekávaný příjem nasměrovat."
 INS_industrial_events.6.a: "Investovat do našich měst."
 INS_industrial_events.6.b: "Rozvíjet vnější ostrovy."
 INS_industrial_events.6.c: "Posílit náš vojenský průmysl."
 INS_industrial_events.28.t: "Zaslána zásilka kaučuku"
 INS_industrial_events.28.desc: "Konvoje naložily poslední kaučuk a vypluly. Naši odběratelé dostanou, za co zaplatili, a naše účty odrážejí dohodnutou kompenzaci v patřičném čase. Po další dva roky bude náklad této transakce tížit naše rozpočty, připomínka toho, co od nás Deprese žádá."
 INS_industrial_events.28.a: "Potvrzeno."
 INS_industrial_events.28.b: "Zařiďte další zásilku."
 INS_industrial_events.36.t: "Zaslána zásilka ropy"
 INS_industrial_events.36.desc: "Tankery opustily naše rafinerie, jejich náklady směřují do přístavů kupujících. Kompenzace byla dohodnuta a bude přijata v plné výši, i když zátěž pro ekonomiku bude pociťována ještě dvě léta. Takové jsou podmínky, které nám svět nabízí v těchto hubených letech."
 INS_industrial_events.36.a: "Potvrzeno."
 INS_industrial_events.36.b: "Zařiďte další zásilku."
 INS_volksraad_events.2.t: "[HOL.GetLeader] vetoval Volksraad petici."
 INS_volksraad_events.2.desc: "Petice byla schválena [INS.GetLeader], ale [HOL.GetLeader] ji po přezkoumání vetoval, a proto nyní nemůžeme v její implementaci pokračovat."
 INS_volksraad_events.2.a: "Možná to zkusíme znovu v budoucnu s ratifikovanou peticí."
 INS_volksraad_events.10.t: "Návrh ve Volksraadu povolit indonéský jazyk ve školách"
 INS_volksraad_events.10.desc: "[INS.GetLeader] schválil Volksraad petici na podporu vytváření škol a univerzit vyučujících indonésky v [INS.GetNameDef], a byla zaslána [HOL.GetLeader] ke konečnému schválení."
 INS_volksraad_events.10.a: "Volksraad plní svůj účel."
 INS_volksraad_events.10.b: "Rozhodně ne. Veto!"
 INS_volksraad_events.11.t: "Vzdělávání v indonéském jazyce bude zřízeno."
 INS_volksraad_events.11.desc: "Petice byla podepsána [HOL.GetLeader] a je nyní oficiálně nařízena. Implementace petice začne brzy, jakmile budou odsouhlaseny konečné detaily."
 INS_volksraad_events.11.a: "Volksraad plní svůj účel."
 INS_volksraad_events.20.t: "Návrh ve Volksraadu povolit indonéský jazyk ve vládě"
 INS_volksraad_events.20.desc: "Vládní role v Indies, včetně Volksraadu, vyžadují plynulost v nizozemštině, což vedlo mnoho členů Volksraadu, zejména zástupců domorodých komunit, k otázkám o legitimitě jeho demokracie. Sestavili návrh, který trvá na tom, aby vládní pozice mohly být, pokud možno, obsazeny mluvčími indonéského jazyka."
 INS_volksraad_events.21.t: "Indonéský jazyk je nyní povolen ve vládě!"
 INS_volksraad_events.21.desc: "Petice byla podepsána [HOL.GetLeader] a je nyní oficiálně nařízena. Implementace petice začne brzy, jakmile budou odsouhlaseny konečné detaily."
 INS_volksraad_events.30.t: "Návrh ve Volksraadu zrušit systém kvót ve vzdělání"
 INS_volksraad_events.30.desc: "[INS.GetLeader] schválil Volksraad petici na zrušení systému kvót ve vzdělání v [INS.GetNameDef], aby ukončil dlouhotrvající spory ve Volksraadu o jeho provádění a spravedlnost. Byla zaslána [HOL.GetLeader] ke konečnému schválení."
 INS_volksraad_events.31.t: "Systém kvót ve vzdělání byl zrušen."
 INS_volksraad_events.31.desc: "Petice byla podepsána [HOL.GetLeader] a je nyní oficiálně nařízena. Implementace petice začne brzy, jakmile budou odsouhlaseny konečné detaily."
 INS_volksraad_events.40.t: "Návrh ve Volksraadu snížit daň z vývozu kaučuku"
 INS_volksraad_events.40.desc: "[INS.GetLeader] podepsal a schválil Volksraad petici na snížení vysokých daní uvalených na soukromé plantáže kaučuku. Tyto daně historicky umožňovaly velmi lukrativní vládní monopol na kaučuk, avšak mezinárodní protekcionismus tento systém výrazně omezil. [INS.GetLeader] prohlásil, že už dál nevěří, že daně vyváží ekonomické následky, které způsobují."
 INS_volksraad_events.40.a: "[INS.GetLeader] má pravdu."
 INS_volksraad_events.40.b: "Daně zůstanou."
 INS_volksraad_events.41.t: "Soukromá daň z vývozu kaučuku byla snížena."
 INS_volksraad_events.41.desc: "Petice byla podepsána [HOL.GetLeader] a je nyní oficiálně nařízena. Implementace petice začne brzy, jakmile budou odsouhlaseny konečné detaily."
 INS_volksraad_events.60.t: "Návrh ve Volksraadu zrušit nepřiznaný strop hodností pro indonéské důstojníky"
 INS_volksraad_events.60.desc: "[INS.GetLeader] schválil Volksraad petici zrušit nepřiznané pravidlo omezené hodnosti, kterou mohou držet nedutchští důstojníci KNIL, a povýšit indonéské důstojníky, kteří jsou za své zásluhy nedostatečně ohodnoceni. Petice byla zaslána [HOL.GetLeader] ke konečnému schválení."
 INS_volksraad_events.61.t: "Neviditelný strop hodností pro [INS.GetAdjective] generály je zrušen."
 INS_volksraad_events.61.desc: "Petice byla podepsána [HOL.GetLeader] a je nyní oficiálně nařízena. Implementace petice začne brzy, jakmile budou odsouhlaseny konečné detaily."
 INS_volksraad_events.70.t: "Návrh ve Volksraadu legalizovat veřejné vystavování nacionalistických vlajek a symboliky"
 INS_volksraad_events.70.desc: "[INS.GetLeader] schválil Volksraad petici zrušit omezení týkající se vystavování nacionalistických vlajek a symboliky na veřejných prostranstvích v [INS.GetNameDef], z velké části za účelem snížení radikalizace mnoha mladých nacionalistů. [INS.GetLeader] trvá na tom, že bychom měli zaujmout obranný přístup, spolupracovat s mírumilovnými nacionalisty a mezitím odhalovat revoluční hnutí, avšak rozhodnutí nakonec náleží nám."
 INS_volksraad_events.71.t: "Červenobílá vlajka už není ilegální!"
 INS_volksraad_events.71.desc: "Petice byla podepsána [HOL.GetLeader] a je nyní oficiálně nařízena. Implementace petice začne brzy, jakmile budou odsouhlaseny konečné detaily."
 INS_volksraad_events.100.t: "Návrh ve Volksraadu povolit příspěvky na vzdělání pro ne-nizozemské obyvatele"
 INS_volksraad_events.100.desc: "[INS.GetLeader] schválil Volksraad petici, která povoluje ne-nizozemským obyvatelům [INS.GetNameDef] žádat o příspěvky na vzdělání. Petice byla zaslána [HOL.GetLeader] ke konečnému schválení."
 INS_volksraad_events.101.t: "[INS.GetAdjective] nyní mohou žádat o příspěvky na vzdělání"
 INS_volksraad_events.101.desc: "Petice byla podepsána [HOL.GetLeader] a je nyní oficiálně nařízena. Implementace petice začne brzy, jakmile budou odsouhlaseny konečné detaily."
 INS_dutch_events.1.t: "[INS.GetNameDefCap] žádá velení nad naší flotilou"
 INS_dutch_events.1.desc: "Po pádu naší vlasti [INS.GetNameDef] nás požádal, abychom převedli velení nad našimi námořními silami na [INS.GetNameDef]. Tvrdí, že jednotné velení umožní lepší koordinaci v této bezprecedentní době."
 INS_dutch_events.1.a: "Pokud to posílí věc, musíme ustoupit."
 INS_dutch_events.1.b: "Naše lodě budou odpovídat jen Haagu."
 INS_dutch_events.2.t: "[HOL.GetNameDefCap] přijímá návrh na naše námořní velení"
 INS_dutch_events.2.desc: "[HOL.GetNameDefCap] přijal náš návrh, abychom převzali velení spojených námořních sil. Přechod probíhá hladce a důstojníci jak z [HOL.GetAdjective], tak z [INS.GetAdjective] spolupracují ruku v ruce na posílení naší pozice v Pacifiku."
 INS_dutch_events.2.a: "Společně udržíme Pacifik."
 INS_dutch_events.3.t: "[HOL.GetNameDefCap] odmítá náš návrh na námořní velení"
 INS_dutch_events.3.desc: "[HOL.GetNameDefCap] odmítl naši nabídku na jednotné námořní velení, s odvoláním na logistické a administrativní obavy. I když to zklamalo, naše spolupráce pokračuje jinými kanály válečného úsilí."
 INS_dutch_events.3.a: "Najdeme jiný způsob, jak posílit náš námořní vliv."
 INS_dutch_events.4.t: "[HOL.GetNameDefCap] zakládá [HOL.GetName]-[INS.GetName] námořní program"
 INS_dutch_events.4.desc: "[HOL.GetNameDefCap] oznámil vznik [HOL.GetName]-[INS.GetName] námořního programu, společné iniciativy k reorganizaci a rozšíření našich námořních sil. [HOL.GetAdjective] expertíza a [INS.GetAdjective] personál společně vytvoří páteř nové pacifické obranné sítě."
 INS_dutch_events.4.a: "Pevný krok k vzájemnému přežití."
 INS_union_events.1.t: "[HOL.GetNameDefCap] žádá o přesídlení vlády do [1058.GetName]"
 INS_union_events.1.desc: "S domovinou ztracenou [HOL.GetNameDef] nás informoval, že jejich vláda a královský dvůr se přemístí do [1058.GetName]. Píší o nutnosti, kontinuitě a potřebě udržet království při životě tam, kde vlajka stále vlaje."
 INS_union_events.1.a: "Válka bude pokračovat z [1058.GetName]."
 INS_union_events.1.b: "Kdo si myslí, že jsou! To je jen pokus znovu prosadit koloniální dominanci!"
 INS_union_events.2.t: "[INS.GetNameDefCap] přijímá návrh na přesídlení"
 INS_union_events.2.desc: "[INS.GetNameDefCap] souhlasil s hostěním naší exilové vlády v [1058.GetName]. Přípravy na přesídlení jsou v běhu a obě administrativy koordinují integraci úřadů a personálu. Společně poneseme pochodeň království dál ze Východu."
 INS_union_events.2.a: "Jednotný front proti našim společným nepřátelům."
 INS_union_events.3.t: "[INS.GetNameDefCap] odmítá návrh na přesídlení"
 INS_union_events.3.desc: "[INS.GetNameDefCap] nám odmítl hostit exilovou vládu v [1058.GetName]. [INS.GetLeader] prohlásil, že nemáme právo požadovat takovou pomoc, když jsou již tak rozptýleni."
 INS_union_events.3.a: "Zdá se, že zapomněli, čí prapor nás stále spojuje."
 INS_union_events.4.t: "[HOL.GetNameDefCap] přesouvá ozbrojené síly do [1058.GetName]"
 INS_union_events.4.desc: "První transporty dorazily z domova. Lodě plné důstojníků, vojáků a pozůstatků našich arsenálů. Jak se dalo očekávat, některé konvoje nedoplavily. To, co přežilo, vytvoří páteř našich sil v [1058.GetName]."
 INS_union_events.4.a: "Dost na to, aby vlajka zůstala vztyčena."
 INS_union_events.5.t: "[INS.GetNameDefCap] navrhuje Nizozemsko–Indonéskou unii"
 INS_union_events.5.desc: "Pro celý svět je jasné, že válka se nám netočí ve prospěch. Naše země padla a naše operační základna se přesunula na východ. Ministři v [INS.GetName] nám zaslali návrh na vytvoření společného unijního státu vedeného královnou Wilhelminou, aby byla zaručena co největší spolupráce. I když se zdá, že s návrhem nikdo není příliš spokojen, může to být náš klíč k přežití."
 INS_union_events.5.a: "Je to riziko, které musíme podstoupit. Ať žije královna!"
 INS_union_events.5.b: "Nemůžeme s tím souhlasit."
 INS_union_events.6.t: "[HOL.GetNameDefCap] přijímá návrh unie"
 INS_union_events.6.desc: "Po naléhavé debatě v kabinetu [HOL.GetLeader] schválil [INS.GetAdjective] návrh. Dekret je stručný a bez obřadů. Naše vlády budou od nynějška jednat jako jedna pod korunou až do konce války."
 INS_union_events.6.a: "Historická dohoda pro obě země."
 INS_union_events.7.t: "[HOL.GetNameDefCap] odmítá návrh unie"
 INS_union_events.7.desc: "Rada v [HOL.GetNameDef] odmítla návrh na společnou unii. Jejich zpráva je pevná, spolupráce bude pokračovat, ale suverenita nebude sdílena."
 INS_union_events.7.a: "Pravděpodobně by to stejně nefungovalo."
 INS_union_events.8.t: "[HOL.GetNameDefCap] navrhuje Nizozemsko–Indonéskou unii"
 INS_union_events.8.desc: "Celému světu je jasné, že válka se nevyvíjí v náš prospěch. [HOL.GetNameDef] padl a jejich operační základna se přesunula na východ. [HOL.GetAdjective] vůdci nám poslali návrh vytvořit společný unijní stát vedený královnou Wilhelminou, aby byla zaručena co největší spolupráce. I když s návrhem nikdo není příliš spokojen, může to být klíč k přežití."
 INS_union_events.8.a: "To musí být uděláno."
 INS_union_events.8.b: "Tohle je jen pokus znovu prosadit koloniální dominanci."
 INS_union_events.9.t: "[INS.GetNameDefCap] přijímá návrh unie"
 INS_union_events.9.desc: "[INS.GetNameDefCap] souhlasil s naším návrhem. Není jasné, jak to dopadne, ale musíme zůstat soustředěni na válečné úsilí."
 INS_union_events.9.a: "Pokud máme přetrvat, musíme přetrvat společně."
 INS_union_events.10.t: "[INS.GetNameDefCap] odmítá návrh unie"
 INS_union_events.10.desc: "[INS.GetNameDefCap] odmítl návrh unie. [INS.GetAdjective] lidé a vůdci nevidí dlouhodobý smysl v oddání moci."
 INS_union_events.10.a: "Pravděpodobně by to stejně nefungovalo."
 INS_exile_accepted_flag: "Ubytoval [HOL.GetNameDef] v exilu"
 INS_hey_btw_you_are_gonna_die_just_know_that_yeah_tt: "§RToto pro vás skončí hru.§!"
 INS_revolution_events.1.t: "[HOL.GetNameDefCap] jedná, aby zničil Republiku"
 INS_revolution_events.1.desc: "Jak se dalo očekávat, nizozemská vláda zareagovala na naše požadavky po nezávislosti tím, že vyslala vojáky do [1058.GetName] a šíří proti-republikánskou propagandu médii."
 INS_revolution_events.1.a: "Musíme jednat rychle."
 INS_revolution_events.2.t: "[HOL.GetNameDefCap] žádá o další pomoc"
 INS_revolution_events.2.desc: "[HOL.GetLeader] svolal nouzové jednání s našimi vůdci a požádal nás, abychom poskytli další pomoc při znovudobytí Indies, až po přímé zapojení do konfliktu. [HOL.GetLeader] uvedl, že situace je vážná a nizozemské síly nejsou schopny zatlačit revoluční milice. [HOL.GetLeader] slíbil, že pokud jim pomůžeme, dostaneme Borneo jako odměnu."
 INS_revolution_events.2.a: "Uděláme to pro Borneo."
 INS_revolution_events.2.b: "Nejsme zainteresovaní."
 INS_revolution_events.3.t: "[ENG.GetNameDefCap] souhlasí s londýnsko-batávským akordem"
 INS_revolution_events.3.desc: "[ENG.GetNameDefCap] souhlasil s přímým zapojením do konfliktu a poslal několik divizí bojovat v Batávii. I když budeme muset obětovat Borneo, výrazně to zvyšuje naše šance."
 INS_revolution_events.3.a: "Borneo bude nutná oběť."
 INS_revolution_events.4.t: "[ENG.GetNameDefCap] odmítá londýnsko-batávský akord"
 INS_revolution_events.4.desc: "[ENG.GetNameDefCap] odmítl další pomoc v konfliktu navzdory naléhavosti a slibované odměně. [ENG.GetLeader] uvedl, že ačkoli je v jejich zájmu, abychom si zachovali koloniální říši, riziko globální eskalace je příliš vysoké, a tak se s tím budeme muset vypořádat sami."
 INS_revolution_events.4.a: "To nevypadá dobře."
 INS_revolution_events.5.t: "[HOL.GetNameDefCap] žádá naši pomoc"
 INS_revolution_events.5.desc: "Revolucionáři v Nizozemských Východních Indii vyhlásili nezávislost na [HOL.GetNameDef] a obsadili hlavní města. [HOL.GetLeader] se naléhavě obrátil na nás s žádostí o vojenskou pomoc, zatímco připravují invazi."
 INS_revolution_events.5.a: "Pokud revolucionáři uspějí, občané v našich koloniích by se mohli inspirovat a udělat totéž."
 INS_revolution_events.5.b: "Nejsme zainteresovaní."
 INS_revolution_events.6.t: "[ENG.GetNameDefCap] souhlasí, že nám pomůže"
 INS_revolution_events.6.desc: "[ENG.GetNameDefCap] souhlasil s posláním dobrovolnických jednotek a vybavení do [1058.GetName], aby nám pomohl znovu získat kontrolu nad Indies."
 INS_revolution_events.6.a: "To bude jednoduché."
 INS_revolution_events.7.t: "[ENG.GetNameDefCap] odmítá nám pomoci"
 INS_revolution_events.7.desc: "[ENG.GetNameDefCap] odmítl pomoci nám znovu nastolit kontrolu nad Indies a trvá na tom, že Indies nejsou jejich starostí, přestože jsou v blízkosti konfliktu. Budeme muset znovu vyzbrojit KNIL sami."
 INS_revolution_events.7.a: "To je nepřijatelné!"
 INS_revolution_events.8.t: "Revoluční milice spřádají plány v Indies"
 INS_revolution_events.8.desc: "Naše koloniální policie ve Východních Indii zatkla a vyslýchala několik členů rostoucího revolučního hnutí v Indonésii. Zdá se, že se snaží vytvořit vojenskou přítomnost, aby se připravili na zahájení kampaně za národní nezávislost. Je možné, že plánují ozbrojenou revoluci."
 INS_revolution_events.8.a: "Musíme je pečlivě sledovat."
 INS_revolution_events.9.t: "Indonéské vyhlášení nezávislosti"
 INS_revolution_events.9.desc: "Dnes v Jávě pronesl projev [INS.GetLeader], v němž vyhlásil nezávislost nově založené Republiky Indonésie. Ačkoli tento nový stát neuznáváme, jejich milice okupují území a naše policie selhává v jeho správě. Pokud tuto situaci nebudeme brát vážně, může přerůst do otevřené války."
 INS_revolution_events.9.a: "Nepřijatelné!"
 INS_revolution_events.9.b: "Nestojí to za námahu, pokud tak moc chtějí nezávislost, ať si ji vezmou."
 INS_revolution_events.11.t: "Vojenské síly Indies úspěšně zastavily milice"
 INS_revolution_events.11.desc: "Tým republikánských milicí spustil operaci za účelem obsazení [?event_target:INS_temp_occupied_state.GetName]. Naši stateční vojáci v Indies dokázali vyhnat milice a udrželi plnou kontrolu nad regionem."
 INS_revolution_events.11.a: "Další vítězství pro [HOL.GetNameDef]."
 INS_revolution_events.12.t: "Milice se pokoušejí obsadit [?event_target:INS_temp_occupied_state.GetName]"
 INS_revolution_events.12.desc: "Tým republikánských milicí spustil operaci za účelem obsazení [?event_target:INS_temp_occupied_state.GetName]. Naše policie a vojáci situaci nakonec dokázali zvládnout, ale incident vyvolal nesouhlas v [?event_target:INS_temp_occupied_state.GetName], s mnoha civilisty podporujícími milice a veřejně vystupujícími proti [HOL.GetAdjective] vládě."
 INS_revolution_events.12.a: "Nesmíme dovolit, aby to eskalovalo."
 INS_revolution_events.14.t: "Milice obsadily [?event_target:INS_temp_occupied_state.GetName]"
 INS_revolution_events.14.desc: "Navzdory nejlepším snahám naší koloniální policie a vojáků republikánské milice úspěšně obsadily [?event_target:INS_temp_occupied_state.GetName]. Naše jednotky se musely evakuovat a prohlásily neschopnost spravovat region kvůli odporu milicí. Pokud milice budou nadále postupovat, riskujeme navždy ztratit naši velkou kolonii."
 INS_revolution_events.14.a: "To je pobuřující!"
 INS_revolution_no_effect_tt: "Žádné efekty"
 INS_revolution_events.19.t: "Mírová jednání v Indies"
 INS_revolution_events.19.desc: "[HOL.GetLeader] byl svolán na schůzku s [INS.GetLeader] za účelem projednání možné mírové dohody. [INS.GetLeader] řekl, že bylo ztraceno příliš mnoho životů, a navrhl dvoustátní řešení, kde hranice zůstanou převážně jak jsou, s drobnými úpravami, a boje budou trvale ukončeny."
 INS_revolution_events.19.a: "Musíme souhlasit. Už bylo ztraceno příliš mnoho životů."
 INS_revolution_events.19.b: "Pokud tak moc chcete mír, tak se můžete vzdát!"
 INS_revolution_events.20.t: "[HOL.GetNameDefCap] souhlasí s dvoustátním řešením!"
 INS_revolution_events.20.desc: "[INS.GetLeader] se vrátil ze schůzky s [HOL.GetLeader] s dobrými zprávami. Obě strany souhlasily s dvoustátním řešením a my okamžitě začneme přesuny našich jednotek v souladu s novými hranicemi. I když nikdo není šťastný, že musíme opustit naše spoluobčany v Indonésii, rozhodnutí ukončit boje je nakonec to nejlepší."
 INS_revolution_events.20.a: "Krveprolití konečně skončí."
 INS_revolution_events.21.t: "[HOL.GetNameDefCap] odmítá přestat bojovat"
 INS_revolution_events.21.desc: "Schůzka [INS.GetLeader] s [HOL.GetLeader] nedopadla dobře; obě strany se viditelně rozzlobily a odmítly kompromis, takže schůzka byla předčasně ukončena."
 INS_revolution_events.21.a: "Kolik dalších životů musí být ztraceno?"
 INS_revolution_events.22.t: "[HOL.GetNameDefCap] žádá naši pomoc"
 INS_revolution_events.22.desc: "[HOL.GetLeader] svolal setkání s [FRA.GetLeader] v Amsterdamu, aby projednali situaci v Indies. Během schůzky [HOL.GetLeader] vysvětlil, že revolucionáři začali vyzbrojovat milice tempem, které nizozemská armáda nezvládne, a že [HOL.GetNameDef] riskuje ztrátu své koloniální hegemonie. [HOL.GetLeader.GetHeShe] požádal, abychom se formálně připojili do konfliktu na nizozemské straně a poslali divize do Batávie. Výměnou nám bude náležet severovýchodní Sumatra po obnovení pořádku."
 INS_revolution_events.22.a: "I když bude pomoc nákladná, Sumatra to může vyvážit."
 INS_revolution_events.22.b: "To je od nás příliš velké požadování."
 INS_revolution_events.23.t: "[FRA.GetNameDefCap] souhlasí, že nám pomůže!"
 INS_revolution_events.23.desc: "[FRA.GetNameDefCap] souhlasil s naší žádostí o pomoc a okamžitě poslal mnoho francouzských divizí do Batávie."
 INS_revolution_events.23.a: "Šance se přiklonily na naši stranu."
 INS_revolution_events.24.t: "[FRA.GetNameDefCap] odmítá pomoci."
 INS_revolution_events.24.desc: "[FRA.GetNameDefCap] odmítl pomoci v revoluci navzdory naléhavosti. Musíme začít rychle zbrojit, jinak brzy budeme přepadeni."
 INS_revolution_events.24.a: "To nevypadá dobře."
 INS_revolution_events.25.t: "Konec války v Indonésii"
 INS_revolution_events.25.desc: "[HOL.GetAdjective] síly zničily hlavní základny milicí a svrhly republikánskou vládu. Elity a velitelé republiky byli zatčeni a vláda Indies obnovuje svou činnost na bývalém republikánském území. Jak bylo slíbeno za naši pomoc, dohodnuté území nám bylo předáno."
 INS_revolution_events.25.a: "Skvělé!"
 INS_revolution_events.26.t: "Konec války v Indonésii"
 INS_revolution_events.26.desc: "[HOL.GetAdjective] síly a republikánské milice bojovaly déle, než kdokoli očekával, a [HOL.GetLeader] souhlasil s podpisem mírové dohody, která ukládá dvoustátní řešení. Nicméně jelikož jsme splnili svou část dohody, [HOL.GetLeader] potvrdil, že nám bude stále přiděleno slíbené území."
 INS_revolution_events.26.a: "Zajímavý vývoj."
 INS_revolution_events.27.t: "Konec války v Indonésii"
 INS_revolution_events.27.desc: "[HOL.GetAdjective] síly a republikánské milice bojovaly mnohem déle, než kdo čekal, a navzdory našemu zapojení i snahám [HOL.GetNameDef], obrovský počet milic a partyzánská povaha jejich armády vedly konflikt k patové situaci výrazně ve prospěch Republiky. [HOL.GetLeader] dnes oznámil, že [HOL.GetLeader.GetHeShe] podepsal mírovou dohodu v prospěch Republiky. Co z Indies zbylo, je jen stín bývalé slávy. [HOL.GetLeader] uvedl, že vzhledem k prohře nebude schopen dodat slíbené území za naši vojenskou pomoc."
 INS_revolution_events.27.a: "To je šílenství!"
 INS_revolution_events.28.t: "Pád Indies"
 INS_revolution_events.28.desc: "Navzdory těžkým výdajům [HOL.GetNameDef] a našemu přímému přispění, obrovský počet milicí v Indies dokázal naše síly přemoci a obsadil všechna hlavní města, svrhl koloniální správu a donutil nás k kapitulaci."
 INS_revolution_events.28.a: "Ale přece nám bylo slíbeno území!"
 INS_revolution_events.29.t: "Pád Indies"
 INS_revolution_events.29.desc: "Navzdory našim nejlepším snahám revolucionáři v Indies převzali kontrolu nad hlavními městy a zničili koloniální vládu zevnitř. Naši generálové byli zajati a komunikační linky přerušeny. Nemáme jinou možnost než přijmout porážku."
 INS_revolution_events.29.a: "To je tragédie."
 INS_revolution_events.30.t: "[INS.GetLeader] navrhuje místní příměří"
 INS_revolution_events.30.desc: "[INS.GetLeader] navrhl místní příměří v [FROM.GetName], s podmínkou, že stáhne své jednotky z [FROM.GetName], pokud my v tomtéž období dočasně odložíme velké vojenské operace, čímž dáme revolucionářům čas na plánování."
 INS_revolution_events.30.a: "Souhlasíme s tím."
 INS_revolution_events.30.b: "Odmítáme, vezmeme [FROM.GetName] zpět silou!"
 INS_revolution_events.31.t: "[HOL.GetNameDefCap] souhlasí s příměřím v [FROM.GetName]"
 INS_revolution_events.31.desc: "Jednání o příměří dopadla dobře a [HOL.GetLeader] přijal naše podmínky. Rozkázali jsme velitelským strukturám v [FROM.GetName] okamžitě odsunout jejich milice."
 INS_revolution_events.31.a: "Doufejme, že dodrží svou část dohody."
 INS_revolution_events.32.t: "[HOL.GetNameDefCap] odmítá příměří"
 INS_revolution_events.32.desc: "Jednání o příměří nedopadla podle plánu a [HOL.GetLeader] odmítl podpis dohody a přerušil jednání dříve, než bylo možné najít kompromis."
 INS_revolution_events.32.a: "To je nepřijatelné!"
 INS_revolution_events.33.t: "[INS.GetNameDefCap] žádá o mediaci"
 INS_revolution_events.33.desc: "Indonésští republikáni oficiálně požádali o naši pomoc při zprostředkování dohody s Nizozemskem. Naši poradci v regionu hlásí, že situace se rychle zhoršuje a že pokračující nizozemské vojenské operace hrozí odvést nacionalisty do náruče Sovětů. Nizozemsko je ceněným spojencem v Evropě, ale nemůžeme ignorovat politickou realitu v jihovýchodní Asii. Pokud Indonésie padne do komunismu, protože jsme zůstali v klidu, bude to naše selhání."
 INS_revolution_events.33.a: "Vyslat mediátory."
 INS_revolution_events.33.b: "Nemůžeme riskovat naše vztahy s Nizozemskem."
 INS_revolution_events.34.t: "[FROM.GetNameDefCap] souhlasí s mediací"
 INS_revolution_events.34.desc: "Washington souhlasil zprostředkovat mezi naší vládou a Nizozemskem. Američtí vyslanci jsou na cestě a bude navrženo formální příměří. To je obrovská příležitost. S nejsilnějším světem na naší straně bude Nizozemsko mnohem hůře zdržovat nebo sahat po síle. Musíme pevně stát u stolu a nechat Američany dělat, co umějí nejlépe."
 INS_revolution_events.34.a: "Doufejme, že Nizozemci prohlédnou."
 INS_revolution_events.35.t: "[USA.GetNameDefCap] oznamuje mediaci"
 INS_revolution_events.35.desc: "Američané se vložili do indonéské otázky. Washington tvrdí, že jedná jako neutrální zprostředkovatel, ale implikace jsou jasné. Pokud tento konflikt nevyřešíme k jejich spokojenosti, použijí své značné nástroje proti nám. Naši vyjednavači musí jednat opatrně. Americká dobrá vůle není něco, co si můžeme dovolit promarnit."
 INS_revolution_events.35.a: "Urovnáme to za našich podmínek."
 INS_revolution_events.36.t: "[FROM.GetNameDefCap] odmítá zasáhnout"
 INS_revolution_events.36.desc: "Američané odmítli naši žádost o mediaci. Washington se rozhodl stát na straně svých evropských spojenců spíše než podporovat naši snahu o sebeurčení. Jsme sami. To je hořká rána, ale revoluce nezačala proto, že bychom očekávali, že nám cizí mocnosti darují svobodu."
 INS_revolution_events.36.a: "Vyhrajeme tuto válku bez nich."
 INS_revolution_events.37.t: "[USA.GetNameDefCap] dává ultimátum"
 INS_revolution_events.37.desc: "Američané ztratili trpělivost. Washington doručil ultimátum požadující okamžité zastavení všech vojenských operací v Indonésii a uznání indonéské suverenity. Hrozba je sotva zahalená. Naše postavení v mezinárodním společenství by veřejným rozchodem s Američany nepřežilo a naše ekonomika nemůže absorbovat následky. Naši generálové trvají, že kampaň lze stále vyhrát, ale za jakou cenu?"
 INS_revolution_events.37.a: "Nemáme jinou možnost než vyhovět."
 INS_revolution_events.37.b: "Indonésie je naše. Nevzdáme se."
 INS_revolution_events.38.t: "Nizozemsko ustupuje"
 INS_revolution_events.38.desc: "Je to konec. Nizozemská vláda přijala americké ultimátum a uznala naši suverenitu. Tři sta padesát let koloniální nadvlády skončilo nejen na bitevním poli, ale u vyjednávacího stolu s váhou největší světové velmoci za naším hnutím. Republika je naše, skutečně a úplně."
 INS_revolution_events.38.a: "Merdeka!"
 INS_revolution_events.39.t: "Nizozemsko odmítá"
 INS_revolution_events.39.desc: "Proti očekávání Nizozemsko odmítlo americké ultimátum. Jejich generálové musí věřit, že válku dokážou vyhrát dříve, než Washington zasáhne. Mýlí se. S Američany nyní otevřeně na naší straně se poměr sil zásadně změnil. Ať přijdou. Už nebojujeme sami."
 INS_revolution_events.39.a: "Svět stojí při nás."
 INS_revolution_events.40.t: "Nizozemsko přijímá naše podmínky"
 INS_revolution_events.40.desc: "Haag přijal naše ultimátum. Nizozemské síly v Indonésii se stáhnou a suverenita bude převedena na indonéskou republiku. Je to uspokojivý závěr nešťastné epizody. Naše zájmy v regionu jsou nyní lépe slouženy stabilní, nezávislou Indonésií než vytvářením a udržováním koloniálního podniku, který Nizozemsko už nemůže udržet."
 INS_revolution_events.40.a: "Rozumný výsledek."
 INS_revolution_events.41.t: "Nizozemsko nás vzdoruje"
 INS_revolution_events.41.desc: "Haag otevřeně odmítl naše ultimátum. Nizozemské síly v Indonésii pokračují v operacích navzdory americkým požadavkům. Je to mimořádné pochybení. Nizozemsko nemůže vést koloniální válku v Asii a zároveň se spoléhat na americkou pomoc v Evropě. Nutili nás k rozhodnutí."
 INS_revolution_events.41.a: "Ať tak bude."
 INS_revolution_events.42.t: "Poslední hod kostek"
 INS_revolution_events.42.desc: "Zprávy z naší rozvědky v Batávii popisují nepřátelskou přípravu, jakou jsme u Republiky dosud neviděli. Zdá se, že připravují destabilizační operaci, která má vtrhnout na Jávu a zničit veškerou komunikační infrastrukturu, čímž si prakticky zajistí vítězství. Tato operace je však extrémně riskantní a vyžaduje přesun téměř veškerých sil na ni. Naši generálové odhadují, že ji budou schopni udržet jen asi dva roky a nebude snadné se z ní stáhnout. Pokud je udržíme dostatečně dlouho, budeme moci jejich vládu a revoluci rozdrtit jako přezrálé rajče."
 INS_revolution_events.42.a: "Tak začíná poslední bitva."
 INS_chaos_events.1.t: "Bitva v Surabaji"
 INS_chaos_events.1.desc: "Po vyhlášení nezávislosti se moc v Surabaji stala nestabilní. Dnes skupina nizozemských loajálců vyvěsila starou koloniální vlajku na bývalém Hotelu Yamato. Místní pemuda mládež budovu vtrhla a vlajky sundala, místo nich vyvěsila červenobílou indonéskou vlajku. Incident přerostl v násilné, neorganizované boje."
 INS_chaos_events.1.a: "A tak to má být!"
 INS_chaos_events.1.b: "Přikázat příměří, nesmíme riskovat eskalaci."
 INS_chaos_events.2.t: "Sjednocení socialistických stran"
 INS_chaos_events.2.desc: "Dvě největší socialistické strany v Indonésii, vedené Amirem Sjarifuddinem a Sutanem Sjahrirem, dnes oznámily sloučení a vytvoření jednotné Socialistické strany Indonésie. To výrazně zvyšuje politický vliv strany a může ohrozit naši administrativu."
 INS_chaos_events.2.a: "Povolit to."
 INS_chaos_events.2.b: "Není čas na politiku, vyhlásit výjimečný stav!"
 INS_chaos_events.3.t: "Neúspěšný pokus o atentát na Sukarna"
 INS_chaos_events.3.desc: "Dnes se pokusil nizozemský voják o atentát na Sukarna, když vypálil na jeho auto. Naštěstí Sukarno v autě nebyl, avšak jeho řidič byl těžce raněn. I když pokus nevyšel, je jasné, že to nebude poslední útok od nizozemských vojáků ani indonéské opozice."
 INS_chaos_events.3.a: "Musíme obnovit pořádek!"
 INS_chaos_events.4.t: "Atentát na Sukarna"
 INS_chaos_events.4.desc: "Tragický den postihl Indonésii. Sukarno byl terčem dalšího pokusu na život, tentokrát úspěšného. Nesmíme dovolit, aby z toho vznikla nástupnická krize; řád musí být rychle obnoven, jinak republika zkolabuje."
 INS_chaos_events.4.a: "Viceprezident Hatta převezme vedení."
 INS_chaos_events.4.b: "Socialistická strana převezme vedení."
 INS_chaos_events.4.c: "Zrušme republiku, Tan Malaka nás dovede k vítězství!"
 INS_loyalist_events.1.t: "[INS.GetLeader] žádá přesun Henriho Winkelmana"
 INS_loyalist_events.1.desc: "[INS.GetLeader] nás kontaktoval ohledně probíhajících konfliktů po světě a nebezpečné pozice, v níž se [INS.GetNameDef] nachází. Navrhl, aby byl Henri Winkelman, bývalý velitel Královské armády Nizozemských Východních Indii, formálně přesunut zpět do [INS.GetNameDef], aby byla zajištěna bezpečnost kolonie."
 INS_loyalist_events.1.a: "Zařídíme jeho okamžitý přesun."
 INS_loyalist_events.1.b: "Henri Winkelman je potřeba v domovině."
 INS_loyalist_events.2.t: "[HOL.GetLeader] souhlasí s přesunem Henriho Winkelmana."
 INS_loyalist_events.2.desc: "[INS.GetLeader] se vrátil z [HOL.GetNameDef], kde se setkal s [HOL.GetLeader]. Schůzka dopadla dobře; [HOL.GetLeader] uznal situaci a souhlasil s okamžitým přesunem Winkelmana. Henri Winkelman je na cestě do [1058.GetName], kde bude čekat na naše rozkazy."
 INS_loyalist_events.2.a: "To bude velká pomoc."
 INS_loyalist_events.3.t: "[HOL.GetLeader] odmítá přesun Henriho Winkelmana"
 INS_loyalist_events.3.desc: "[INS.GetLeader] se vrátil z [HOL.GetNameDef], kde se setkal s [HOL.GetLeader]. Bohužel Henri Winkelman nebude do Indies poslán a musíme se bránit bez něj."
 INS_loyalist_events.3.a: "Musíme rychle vymyslet nový plán."
 INS_henri_winkelman_tt: "Přesun Henriho Winkelmana odmítnut"
 INS_loyalist_events.4.t: "[FROM.GetNameDefCap] navrhuje sjednocení"
 INS_loyalist_events.4.desc: "Delegace z [FROM.GetAdjective] dorazila do [ROOT.Capital.GetCapitalVictoryPointName] s návrhem na sjednocení. Poukazují na sdílené malajské dědictví našich národů a poznamenávají, že hranice mezi našimi zeměmi byly stanoveny evropskými koloniálními administrátory, nikoli lidmi, kteří tato území obývají. Návrh by obě vlády rozpustil a zformoval jednu stát."
 INS_loyalist_events.4.a: "Přijímáme návrh."
 INS_loyalist_events.4.b: "Musíme odmítnout."
 INS_loyalist_events.5.t: "[FROM.GetNameDefCap] přijímá sjednocení"
 INS_loyalist_events.5.desc: "Naši diplomaté se vrátili z [FROM.Capital.GetCapitalVictoryPointName] s výbornými zprávami. [FROM.GetAdjective] vláda přijala náš návrh a jejich úředníci již dělají opatření pro integraci jejich území do naší administrativy."
 INS_loyalist_events.5.a: "Společně jsme silnější!"
 INS_loyalist_events.6.t: "[FROM.GetNameDefCap] odmítá sjednocení"
 INS_loyalist_events.6.desc: "Naši diplomaté se vrátili z [FROM.Capital.GetCapitalVictoryPointName s prázdnýma rukama]. [FROM.GetAdjective] vláda nebyla ochotná návrh zvážit. Dostali jsme jen zdvořilá formalita."
 INS_loyalist_events.6.a: "Jejich ztráta."
 INS_loyalist_events.7.t: "[FROM.GetNameDefCap] žádá referendum v [MAL.GetName]"
 INS_loyalist_events.7.desc: "[FROM.GetNameDefCap] formálně požádal, abychom umožnili referendum v [MAL.GetName] o otázce sjednocení s jejich státem. Jejich velvyslanec otevřeně prohlásil, že malajský lid na obou stranách hranice považuje sám sebe za jeden národ. Umožnit hlasování by s velkou pravděpodobností znamenalo ztrátu [MAL.GetName]."
 INS_loyalist_events.7.a: "Ať lid rozhodne."
 INS_loyalist_events.7.b: "Nedovolíme to."
 INS_loyalist_events.8.t: "[FROM.GetNameDefCap] schvaluje referendum o sjednocení"
 INS_loyalist_events.8.desc: "Náš suzerén dal [FROM.FROM.GetNameDef] povolení uspořádat referendum v naší zemi. [FROM.FROM.GetAdjective] volební štáby dorazily v plné síle a hlasování má začít během měsíce. Otázka je jednoduchá: Chceme se připojit k [FROM.FROM.GetNameDef] nebo zůstat, jak jsme?"
 INS_loyalist_events.8.a: "Připojíme se k nim."
 INS_loyalist_events.8.b: "Raději zůstaneme."
 INS_loyalist_events.9.t: "[FROM.GetNameDefCap] hlasuje proti sjednocení"
 INS_loyalist_events.9.desc: "Referendum v [FROM.GetName] skončilo. [FROM.GetAdjective] lid hlasoval za setrvání pod naší administrací. [FROM.FROM.GetAdjective] kampaně odcestovaly."
 INS_loyalist_events.9.a: "Jak se dalo očekávat."
 INS_loyalist_events.10.t: "[FROM.GetNameDefCap] hlasuje pro sjednocení"
 INS_loyalist_events.10.desc: "Referendum v [FROM.GetName] skončilo jasným výsledkem ve prospěch sjednocení s [FROM.FROM.GetNameDef]. Naši úředníci hlásí, že výsledek byl očekávaný. Jsme povinni jej respektovat."
 INS_loyalist_events.10.a: "Dodrželi jsme slovo."
 INS_loyalist_events.11.t: "Malajské referendum uspělo"
 INS_loyalist_events.11.desc: "Lidé v [MAL.GetName] hlasovali pro připojení k naší zemi. [MAL.GetAdjective] úředníci spolupracují na převodu pravomocí. Na mapě malajského světa bude o jednu hranici méně."
 INS_loyalist_events.11.a: "Vítejte doma."
 INS_loyalist_events.12.t: "Malajské sjednocení odmítnuto"
 INS_loyalist_events.12.desc: "Náš návrh sjednocení s [MAL.GetName] byl zamítnut. [MAL.GetAdjective] vláda se rozhodla proti. Budeme se k tomu vracet jindy."
 INS_loyalist_events.12.a: "Nezapomeneme si to."
 INS_loyalist_events.13.t: "[FROM.GetNameDefCap] navrhuje kompromis ohledně Singapuru"
 INS_loyalist_events.13.desc: "[FROM.GetAdjective] vláda přistoupila s návrhem ohledně Singapuru. Požadují svrchovanost nad ostrovem s odvoláním na jeho místo v malajském světě. Na oplátku jsou připraveni zaručit nám nadále přístup do přístavu, vojenské instalace a veškerá těžební práva v platnosti."
 INS_loyalist_events.13.a: "Férová dohoda."
 INS_loyalist_events.13.b: "Singapur není na prodej."
 INS_loyalist_events.14.t: "Kompromis ohledně Singapuru přijat"
 INS_loyalist_events.14.desc: "Dohoda je přijata. Singapur bude převeden pod naši kontrolu, zatímco bývalí držitelé si udrží obchodní a vojenský přístup do přístavu. Naše vlajka nyní vlaje nad jedním z nejdůležitějších přístavů v Asii."
 INS_loyalist_events.14.a: "Průlivy jsou naše."
 INS_loyalist_events.15.t: "Kompromis ohledně Singapuru odmítnut"
 INS_loyalist_events.15.desc: "Náš návrh byl odmítnut. Správci Singapuru nejsou ochotni ostrov vzdát za žádných podmínek. Nabídli jsme vše kromě suverenity, a to nestačilo."
 INS_loyalist_events.15.a: "Ať tak bude."
 INS_loyalist_events.16.t: "[FROM.GetNameDefCap] žádá převod Cejlonu"
 INS_loyalist_events.16.desc: "[FROM.GetAdjective] vláda formálně požádala o převod Cejlonu. Diplomaté poukazují na dlouhodobé obchodní a etnické vazby mezi ostrovem a malajským světem. Nárok je chatrný, ale [FROM.GetNameDef] nabyl dost moci, že takové požadavky je třeba vážně zvážit."
 INS_loyalist_events.16.a: "Velmi dobře, ať ho mají."
 INS_loyalist_events.16.b: "Cejlon zůstane pod naší kontrolou."
 INS_loyalist_events.17.t: "Cejlon převeden"
 INS_loyalist_events.17.desc: "Převod Cejlonu je dokončen. Naše administrace začala přesouvat úředníky na ostrov a předání proběhlo bez incidentu. Nyní máme pozici na obou stranách průlivu."
 INS_loyalist_events.17.a: "Výborně."
 INS_loyalist_events.18.t: "Žádost o Cejlon zamítnuta"
 INS_loyalist_events.18.desc: "Naše žádost o převod Cejlonu byla zamítnuta. Současní správci nemají v úmyslu ostrov vydat a naši diplomaté hlásí, že další diskuze by byla marná."
 INS_loyalist_events.18.a: "Možná jindy."
 INS_loyalist_events.19.t: "[FROM.GetNameDefCap] žádá referendum v Papui"
 INS_loyalist_events.19.desc: "[FROM.GetNameDefCap] formálně požádal, abychom povolili referendum ve východní Papui. Na jejich straně hranice jsou nové silnice v džungli, kliniky s vládními lékaři a školy vyučující v místních jazycích. U nás poslední guvernér navštívil Port Moresby dvakrát za tři roky. [FROM.GetAdjective] velvyslanec nemusel říct nic víc."
 INS_loyalist_events.19.a: "Ať hlasování proběhne."
 INS_loyalist_events.19.b: "To nedovolíme."
 INS_loyalist_events.20.t: "Referendum v Papui schváleno"
 INS_loyalist_events.20.desc: "Australané souhlasili uspořádat referendum. Každý okres ve východní Papui vrátil stejný výsledek. Naše investice do západní poloviny ostrova hovořily hlasitěji než jakákoli volební kampaň."
 INS_loyalist_events.20.a: "Ostrov je konečně celý."
 INS_loyalist_events.21.t: "Referendum v Papui odmítnuto"
 INS_loyalist_events.21.desc: "Australané odmítli. Jejich guvernér v Port Moresby vydal prohlášení, že žádost je útokem na australskou suverenitu. Papuánský lid přitom nebyl konzultován."
 INS_loyalist_events.21.a: "Budeme si to pamatovat."
 INS_loyalist_events.22.t: "[FROM.GetNameDefCap] žádá východní Timor"
 INS_loyalist_events.22.desc: "[FROM.GetAdjective] vláda vydala formální požadavek na předání Východního Timoru. Jejich velvyslanec poznamenal, že naše posádka tam má méně než dvě stě mužů a že Lisabon ostrov v posledních letech téměř opomíjel. Poté se zeptal, co si myslíme, že tam vlastně držíme."
 INS_loyalist_events.22.a: "Nestojí to za boj."
 INS_loyalist_events.22.b: "Timor je náš a zůstane tak."
 INS_loyalist_events.23.t: "Východní Timor odevzdán"
 INS_loyalist_events.23.desc: "Správci Východního Timoru začali stahovat posádku a balit koloniální administrativu. Celý ostrov brzy přejde pod autoritu [INS.GetAdjective]."
 INS_loyalist_events.23.a: "Jak má být."
 INS_loyalist_events.24.t: "Požadavek na Východní Timor odmítnut"
 INS_loyalist_events.24.desc: "Koloniální guvernér v Dili osobně napsal dopis s odmítnutím našeho požadavku, trvající na tom, že Východní Timor zůstává suverénním územím jeho vlády. Naši generálové připravili nouzové plány, pokud kabinet bude chtít záležitost dále řešit."
 INS_loyalist_events.24.a: "Začněte přípravy."
 INS_loyalist_events.25.t: "[FROM.GetNameDefCap] navrhuje sjednocení"
 INS_loyalist_events.25.desc: "Delegace z [FROM.GetAdjective] dorazila s návrhem na sjednocení našich dvou republik. Tvrdí, že naše národy sdílejí společné austronéské kořeny starší než koloniální hranice, a že jeden stát pokrývající celé souostroví by byl největší mocností v Jihovýchodní Asii. Přijetí by znamenalo rozpuštění naší vlády a integraci do jejich struktury."
 INS_loyalist_events.25.a: "Přijímáme."
 INS_loyalist_events.25.b: "Příliš jsme za tuto republiku bojovali."
 INS_loyalist_events.26.t: "[FROM.GetNameDefCap] přijímá sjednocení"
 INS_loyalist_events.26.desc: "[FROM.GetAdjective] vláda přijala náš návrh. Jejich úředníci již koordinují s našimi, aby zahájili proces integrace. Od Acehu po Luzon, od Bornea po Mindanao, náš národ nyní pokrývá celý malajský oblouk."
 INS_loyalist_events.26.a: "Začíná nová éra."
 INS_loyalist_events.27.t: "[FROM.GetNameDefCap] odmítá sjednocení"
 INS_loyalist_events.27.desc: "[FROM.GetAdjective] vláda návrh odmítla. Jejich vlastní boj za nezávislost je příliš čerstvý a nákladný na to, aby vzdali suverenitu jinému státu. Návrh byl odložen."
 INS_loyalist_events.27.a: "Škoda."
 INS_loyalist_events.28.t: "[FROM.GetNameDefCap] žádá referendum v [PHI.GetName]"
 INS_loyalist_events.28.desc: "[FROM.GetNameDefCap] formálně požádal, abychom povolili referendum v [PHI.GetName] o sjednocení. Jejich diplomaté zdůrazňují sdílené austronéské dědictví obou národů a umělost koloniálních hranic, které je oddělují. Pokud hlasování proběhne, výsledek pravděpodobně favorizuje [FROM.GetNameDef]."
 INS_loyalist_events.28.a: "Lidé by měli mít hlas."
 INS_loyalist_events.28.b: "To nepřichází v úvahu."
 INS_loyalist_events.29.t: "Referendum o sjednocení schváleno"
 INS_loyalist_events.29.desc: "[FROM.FROM.GetNameDefCap] navrhl sjednocení našich zemí na základě sdíleného austronéského dědictví. Náš suzerén jim dal povolení uspořádat referendum a [FROM.FROM.GetAdjective] kampaně již dorazily. Výsledek rozhodne, zda se naše republika připojí k [FROM.FROM.GetNameDef] nebo zůstane, jak je."
 INS_loyalist_events.29.a: "To je zajímavý návrh."
 INS_loyalist_events.29.b: "Rozhodně ne."
 INS_loyalist_events.30.t: "[FROM.GetNameDefCap] hlasuje proti sjednocení"
 INS_loyalist_events.30.desc: "Sčítání hlasů skončilo a [FROM.FROM.GetAdjective] kampaň byla poslána pryč. [FROM.GetAdjective] lidé se rozhodli zůstat. Nezávislost stále něco znamená v [FROM.Capital.GetCapitalVictoryPointName]."
 INS_loyalist_events.30.a: "Tím to končí."
 INS_loyalist_events.31.t: "[FROM.GetNameDefCap] hlasuje pro sjednocení"
 INS_loyalist_events.31.desc: "Sčítání hlasů skončilo. [FROM.GetAdjective] lid zvolil [FROM.FROM.GetNameDef] a marže nebyla malá. Naši úředníci dostali pokyny zahájit předání."
 INS_loyalist_events.31.a: "Lidé promluvili."
 INS_loyalist_events.32.t: "[PHI.GetNameDefCap] hlasuje pro sjednocení"
 INS_loyalist_events.32.desc: "Referendum v [PHI.GetAdjective] skončilo v náš prospěch. Jejich vláda akceptovala výsledek a zahájila kontakt s naším ministerstvem zahraničí, aby domluvila převod pravomocí."
 INS_loyalist_events.32.a: "Konečně spolu."
 INS_loyalist_events.33.t: "[PHI.GetNameDefCap] odmítá sjednocení"
 INS_loyalist_events.33.desc: "[PHI.GetAdjective] vláda odmítla náš návrh sjednocení. Jejich parlament ho zamítl bez dalšího čtení. Nabídli jsme jim místo v největším státu Jihovýchodní Asie a oni to pohrdli."
 INS_loyalist_events.33.a: "Následek, nic víc."
 INS_communist_events.6.t: "[FROM.GetAdjective] agenti agitují v [ROOT.GetName]"
 INS_communist_events.6.desc: "Naše rozvědky potvrdily, co jsme dlouho tušili. [FROM.GetNameDefCap] provádí trvalou kampaň subverze uvnitř našich hranic, financuje radikální buňky, distribuuje vzpourné letáky a organizuje stávky mezi dělníky. Jejich agenti se vetřeli do odborů a venkovských družstev a nyní otevřeně volají po svržení naší vlády. Situace dosáhla kritického bodu a musíme jednat rozhodně, než se vymkne kontrole."
 INS_communist_events.6.a: "To se netoleruje!"
 INS_communist_events.7.t: "Komunistická subverze v [FROM.GetName]"
 INS_communist_events.7.desc: "Znepokojivé zprávy k nám dorazily z [FROM.FROM.GetName]. Operace za účelem [FROM.GetNameDef] podněcují revoluční nálady mezi místním obyvatelstvem, využívají nespokojenosti se správou k budování podpory pro komunistické převzetí. Pokud se to nezastaví, může [FROM.FROM.GetNameDef] padnout zcela do rukou radikálů a zkáza by se mohla rozšířit i do dalších našich oblastí."
 INS_communist_events.7.a: "Musíme to vyrvat kořenem dřív, než se to rozšíří!"
 INS_communist_events.8.t: "Komunistická propaganda obíhá v [ROOT.GetName]"
 INS_communist_events.8.desc: "Letáky a brožury pocházející z [FROM.GetAdjective] se objevují v našich továrnách, trzích a univerzitách čím dál častěji. Kážou třídní boj a slibují osvobození revolucí, a naše policie hlásí, že nacházejí přijímání mezi nespokojenými. Materiál je hrubý, ale účinný, a jeho šíření nezpomaluje."
 INS_communist_events.8.a: "Zjistěte, kdo toto šíří!"
 INS_communist_events.1.t: "Revoluce v [ROOT.GetName]"
 INS_communist_events.1.desc: "Situace se zhoršila natolik, že už není zvrátitelná. Měsíce agitace [FROM.GetAdjective] udělaly své a komunistické hnutí v [ROOT.GetName] už není možné kontrolovat běžnými prostředky. Generální stávky paralyzují města, ozbrojení partyzáni drží celé provincie a [FROM.GetAdjective] vláda vrhla celou svou váhu za revolucionáře. Naše bezpečnostní síly jsou přetížené a jejich loajalita už není jistá. Musíme se nyní rozhodnout, zda bojovat za přežití státu, nebo přijmout nevyhnutelné, než bude prolita další krev."
 INS_communist_events.1.a: "Svolat armádu. Nenecháme se potichu."
 INS_communist_events.1.b: "Další odpor přinese jen zkázu našemu lidu."
 INS_communist_events.1.c: "Možná pokud jim dáme místo u stolu, stále to můžeme kontrolovat."
 INS_communist_events.2.t: "[FROM.GetNameDefCap] rozhodl bojovat"
 INS_communist_events.2.desc: "Vláda v [FROM.GetName] odmítla ustoupit a nařídila ozbrojeným silám potlačit revoluční hnutí silou. Naši soudruzi tam už obsadili pozice a uchvátili klíčová sídla. Boj nebude krátký, ale lid [FROM.GetName] si zvolil a my zajistíme, že v tom nezůstane sám."
 INS_communist_events.2.a: "Revoluce postupuje vpřed."
 INS_communist_events.3.t: "[FROM.GetNameDefCap] padl"
 INS_communist_events.3.desc: "Starý režim v [FROM.GetName] kapituloval. Konfrontován s rozsáhlým revolučním hnutím a s vědomím, že [ROOT.GetNameDef] stojí za ním, nenašel cestu vpřed než podrobení se. Moc byla předána místní komunistické straně a nová vláda už začala vyhledávat naše vedení. Další národ byl osvobozen od starého řádu."
 INS_communist_events.3.a: "Velké vítězství pracujících lidí světa."
 INS_communist_events.4.t: "Občanská válka propuká v [FROM.GetName]"
 INS_communist_events.4.desc: "Komunističtí revolucionáři, vyzbrojení a organizovaní za podpory [FROM.FROM.GetNameDef], zahájili otevřenou vzpouru v [FROM.GetName]. Koloniální správa ztratila kontrolu nad velkými územími a guvernér hlásí, že místní posádka bez posil nedokáže obnovit pořádek."
 INS_communist_events.4.a: "Poslat vojáky. [FROM.GetName] je náš!"
 INS_communist_events.5.t: "[FROM.GetName] ztracen komunistům"
 INS_communist_events.5.desc: "Správa v [FROM.GetName] se bez boje vzdala komunistickým povstalcům. Guvernér a jeho štáb byli zatčeni, naše vlajka stažena a revoluční vláda vyhlášena. To vše zorganizované [FROM.FROM.GetNameDef] a jejich agenty, kteří měsíce narušovali naši autoritu. To je nic menšího než krádež a nezůstane to bez odezvy."
 INS_communist_events.5.a: "To je pobuřující!"
 INS_communist_events.9.t: "[FROM.GetAdjective] důstojníci viděni v setkání s disidenty"
 INS_communist_events.9.desc: "[FROM.GetAdjective] operativci byli zahlédnuti s známými agitátory a militantními vůdci po celé zemi. Studenti, kteří dříve rozdávali letáky, teď pořádají schůzky za zavřenými dveřmi s muži nosícími [FROM.GetAdjective] diplomatické papíry. Zakázané publikace se tisknou rychleji, než je policie stihne zabavit, a protesty, které dříve vyhasly za odpoledne, teď uzavírají celé čtvrti na dny. Tito komunisté se učí organizovat ve větších skupinách každý den; pokud nezasáhneme rychle, můžeme je ztratit."
 INS_communist_events.9.a: "Vymýtit tyto zahraniční agenty okamžitě!"
 INS_communist_events.10.t: "[FROM.GetAdjective] rétorika získává vliv"
 INS_communist_events.10.desc: "Letáky [FROM.GetAdjective] kolují v kasárnách a státní správě a konfiskační snahy sotva stačí. Mluví o národech osvobozených od pout a o lidech, kteří svrhli koloniální guvernéry a vybudovali něco vlastního. Bylo by snazší to potlačit, kdyby to rčení neznívalo pravdivě. I loajální úředníci začínají potichu přemýšlet, zda současné uspořádání slouží našim lidem nebo jen našim pánům."
 INS_communist_events.10.a: "Musíme postupovat opatrně."
 taog_news.1.t: "Úsvit Nizozemsko-Indonéské unie"
 taog_news.1.desc: "Královna Wilhelmina včera v [1058.GetName] oznámila neočekávané vytvoření Nizozemsko–Indonéského unijního státu. S domovinou pod okupací [HOL.GetAdjective] exilová vláda a [INS.GetAdjective] administrace souhlasily vládnout jako jeden celek pod korunou. Úředníci obou zemí popisují krok jako nutnost spíše než volbu, zoufalé úsilí zachovat jednotu a autoritu království napříč dvěma kontinenty."
 taog_news.1.a: "Zajímavý vývoj."
 taog_news.2.t: "Indonéské vyhlášení nezávislosti"
 taog_news.2.desc: "Revolučník [INS.GetAdjective] [INS.GetLeader] dnes v Jávě pronesl projev vyhlašující nezávislost nově vytvořené Republiky Indonésie. [HOL.GetNameDef] neuznává svrchovanost tohoto nového státu, ale republikánské milice už fakticky kontrolují některé oblasti."
 taog_news.2.a: "To by mohlo vyvolat velký globální posun."
 siam.1.t: "[SIA_phraya_phahon.GetName] zapleten v korupčním skandálu"
 siam.1.desc: "[SIA_phraya_phahon.GetName] je obviněn, že prodal královské nemovitosti úředníkům pod tržní cenou, skandál, který výrazně snížil jeho legitimitu v Lidovém shromáždění. Zdá se, že vliv [SIA_phraya_phahon.GetName] končí."
 siam.1.a: "Možná to otevře cestu někomu jinému?"
 siam.2.t: "Třetí pokus o atentát na [SIA_plaek_phibunsongkhram.GetName]"
 siam.2.desc: "Zpráva z bangkockého zpravodaje Reuters odhaluje třetí pokus v průběhu čtyř let o otravu premiéra Siamu (pana Phibul Songgram).\nMinulý týden se uvádí, že došlo k otrávě v jídle, která dočasně postihla pana Songgrama i jeho manželku a dceru.\nBritský ministr zahraničí (Lord Halifax) v dopise panu Songgramovi vyjadřuje znepokojení nad zbabělým pokusem o život premiéra a potěšení z jeho úniku."
 siam.2.a: "Kdo by to mohl udělat?"
 siam.3.t: "Phraya Songsuradet v exilu"
 siam.3.desc: "Phraya Songsuradet je obviněn, že stojí za jedním či více pokusy o atentát na [SIA_plaek_phibunsongkhram.GetName] a že plánoval převrat proti jeho vládě. Vláda rozhodla, že Songsuradet bude zbaven velení, zbaven hodností a titulů, nucen odejít z armády bez penze a vyhoštěn ze země.\nKritici tvrdí, že jde o zástěrkovou čistku iniciovanou [SIA_plaek_phibunsongkhram.GetName] k odstranění hlavního rivala, ale to je zjevně pomluva."
 siam.3.a: "Smutný konec."
 siam.4.t: "Sympatizanti Songsuradeta zatčeni"
 siam.4.desc: "Brzy ráno, za pomoci královské thajské policie, vláda zatkla dalších 51 podezřelých a sympatizantů, včetně prince Rangsita, Phraya Thepahatsadina a Phraya Udom Pongphensawada. Jsou obviněni ze spiknutí s Phraya Songsuradetem proti státu, přičemž je zvlášť zmiňováno, že princ Rangsit, člen královské rodiny, má stanout před soudem. Někteří komentátoři se ptají, zda princ nebyl cíleně zasažen, aby poslal vzkaz zbytku královské rodiny v [THIS.GetName], aby zůstal v řadě, nebo padl."
 siam.4.a: "Dějství houstne."
 siam.5.t: "Vzpoura 18 těl"
 siam.5.desc: "Phibul zřídil zvláštní tribunál k souzení 51 osob zapojených do vzpoury, z nichž 25 má být doživotně uvězněno a 21 popraveno zastřelením. Z 21 bude tři udělená milost kvůli jejich čestným záznamům, jmenovitě princ Rangsit a Phraya Thepahatsadin."
 siam.5.a: "Tuto záležitost máme urovnanou."
 siam.6.t: "Patová situace Songsuradeta"
 siam.6.desc: "Phraya Songsuradet je obviněn z plánování atentátů na [SIA_plaek_phibunsongkhram.GetName] a z plánování převratu. Vláda rozhodla o jeho zbavení velení a vyhoštění.\nJeho zatčení ale zablokovaly vojenské jednotky loajální Songsuradetovi, které označily zatčení za politicky motivované. Vláda a Songsuradetova vojenská skupina jsou nyní v patové situaci, obě strany odmítají ustoupit."
 siam.6.a: "Neustoupíme."
 siam.6.b: "To se vymstilo. Stáhněme se."
 siam.7.t: "Songsuradet hledá podporu námořnictva"
 siam.7.desc: "Jak napětí mezi vládními silami a Songsuradetovou vojenskou skupinou přetrvává, vyšetřovatelé slyší fámy o spojenectví mezi královským námořnictvem a Songsuradetem s cílem čelit rostoucímu autoritářství Phibuna.\nNavíc někteří členové královského dvora hlásili, že zástupci Songsuradeta se setkávali s vysokými prince, což zvyšuje obavy, že královská rodina se také přikloní k opozici."
 siam.7.a: "Jsme vláda, nebudeme se vydírat!"
 siam.7.b: "Situace vymyká kontrole. Stáhněme se."
 siam.8.t: "Songsuradetova vzpoura"
 siam.8.desc: "Poté, co získal dostatečnou politickou i vojenskou podporu, Songsuradetův vojenský dav spolu s námořnictvem ovládl velké oblasti [THIS.GetName]. Brzy zazněla střelba v předměstích Bangkoku a země se připravuje na plnohodnotnou občanskou válku."
 siam.8.a: "Vláda musí přežít."
 siam.9.t: "Konec Songsuradetovy vzpoury"
 siam.9.desc: "Vzpoura je v troskách a po zatčení Songsuradeta zůstává jen soudní proces, který je teď formality. Spiknutí bylo nalezeno nejen v armádě a námořnictvu, ale i v královské rodině, když princ Rangsit byl přistižen při otevřené podpoře rebelů. Hluboká čistka disidentů je nutností."
 siam.9.a: "Je čas obnovit pořádek."
 siam.10.t: "Vítězství!"
 siam.10.desc: "Nepřítel prchá a naše vítězství se zdá jisté. S územím pevně pod kontrolou musí staré imperialistické síly třást strachem. Jak mohli prohrát? Je to znamení naší božské prozřetelnčnosti."
 siam.10.a: "Pro [ROOT.GetName]!"
 siam.10.b: "Vlastně to jde docela dobře"
 siam.11.t: "[FROM.GetAdjective] strategický průlom"
 siam.11.desc: "Proti očekávání se [FROM.GetAdjective] armádě podařilo přehrát naše síly a získat kontrolu nad sporným regionem. Jejich okupace oslabuje naši autoritu a zpochybňuje naše nároky na oblast. Pokračování konfliktu hrozí dalším erozi disciplíny a důvěry, ale kapitulace by byla veřejným přiznáním selhání."
 siam.11.a: "Musíme omezit ztráty a stáhnout se."
 siam.11.b: "Neopustíme své nároky!"
 siam.12.t: "[FROM.GetName] přijímá porážku"
 siam.12.desc: "Naše kampaň uspěla. Nepřátelský odpor se zhroutil a [FROM.GetName] formálně odstoupil od sporných území, aby se vyhnul dalším škodám. Toto vítězství posiluje naši pozici a zajišťuje hranice — prozatím."
 siam.12.a: "Naše síla je nepopiratelná."
 siam.13.t: "[FROM.GetName] odmítá jakékoliv urovnání"
 siam.13.desc: "[FROM.GetName] zamítl všechny návrhy zahrnující ústupky, označil je za nepřijatelné. Jejich vedení prohlásilo, že pouze zničení našeho státu ukončí konflikt."
 siam.13.a: "Ať tak bude."
 siam.14.t: "[FROM.GetNameDefCap] se zavazuje k totální válce"
 siam.14.desc: "[FROM.GetNameDefCap] opustil jakoukoli přetvář vyjednávání. Jejich záměr je jasný: úplné dobytí a pohlcení našeho národa. Tato válka nebude rozhodnuta smlouvami, ale totálním vítězstvím nebo úplným kolapsem."
 siam.14.a: "Žádný kompromis, žádná kapitulace."
 siam.15.t: "Útok [SIA.GetAdjective] se zastavil"
 siam.15.desc: "Rychlý útok [SIA.GetAdjective] sil nás mohl zaskočit, ale jak jejich postup zpomaluje pod rostoucím tlakem, jejich slabost je zřejmá. Co mělo být bleskovou kampaní, stal se pro [SIA.GetAdjective] armádu vleklý boj. Můžeme být velkorysí a nabídnout jim východisko skrze ústupky, nebo usilovat o úplné vítězství — volba je na nás."
 siam.15.a: "Nabídnout ústupky."
 siam.15.b: "Pouze úplné vítězství je přijatelné."
 siam.16.t: "Zastavená ofenzíva"
 siam.16.desc: "Naše ofenzíva uvázla, to není problém, problémem je, že to ví i nepřítel. Poslal nám ultimátum: buď se vzdáte nyní s minimálními ztrátami, nebo pokračujete ve válce s dalším krveprolitím. Jediný rozdíl je v počtu pohřbených."
 siam.16.a: "Mír."
 siam.16.b: "Nikdy se nevzdáme!"
 siam.17.t: "[FROM.GetName] odmítá ustoupit"
 siam.17.desc: "[FROM.GetName] jasně prohlásil, že raději uvidí svou zemi v plamenech, než aby ustoupil o kousek. Válka pokračuje."
 siam.17.a: "Ať dostanou, co si přejí."
 siam.18.t: "[FROM.GetName] se nás snaží pokořit!"
 siam.18.desc: "Zachycené komunikace z nepřátelského štábu potvrdily naše nejhorší obavy; nebude žádná vyjednávání, žádné ústupky. Požadují naše úplné podrobení. Pokud je to jejich cíl, máme jen jednu odpověď: odmítáme."
 siam.18.a: "[ROOT.GetNameDefCap] stojí!"
 siam.19.t: "[SIA.GetName] požaduje navrácení území"
 siam.19.desc: "[SIA.GetName], posílený rostoucím nacionalismem a naším vnímáním slabosti v regionu, požaduje navrácení území, která považuje za svého jádra. Snaží se přepočítat síly, ale území, o které žádá, nemusí stát za riziko s ohledem na světovou situaci směřující k Armagedonu."
 siam.19.a: "Nestojí to za boj."
 siam.19.b: "Do toho!"
 siam.20.t: "[FROM.GetName] nám vrací území"
 siam.20.desc: "[FROM.GetName] se rozhodl vrátit naše území, ať již z uznání naší svrchovanosti, nebo pod tlakem ostatních aktérů, je to jedno. Naše věc zůstává spravedlivá."
 siam.20.a: "Skvělý den!"
 siam.21.t: "[FROM.GetName] odmítá vrátit území"
 siam.21.desc: "[FROM.GetName] nám odmítl žádost. Tito imperialisté se drží minulosti jako klíště a nechtějí přiznat, že jejich čas skončil."
 siam.21.a: "Uvědomíme je o tom."
 SIA_sent_bureaucrats_to_us: "Vyslali nám školené úředníky"
 SIA_tied_their_currency_to_ours: "Připoutali svou měnu k naší"
 SIA_sent_started_cooperative_with_us: "Zahájili s námi rozvojovou spolupráci"
 siam.22.t: "Poslat úředníky z [SIA.GetName] do zahraničí"
 siam.22.desc: "Naši úředníci nejsou připraveni na moderní ekonomiku, chybí jim potřebné školení. Naštěstí existuje mnoho zemí s moderní, stabilní byrokracií, kam je můžeme poslat získat zkušenosti, aniž bychom importovali i jejich vládu."
 siam.22.a: "Poslat je do [ENG.GetName]"
 siam.22.b: "Poslat je do [JAP.GetName]"
 siam.23.t: "Zákon o stabilizaci bahtu"
 siam.23.desc: "Baht nemůže zůstat volný, zatímco [ROOT.GetName] hledá pořádek v obchodu a financích. Naši úředníci nyní tvrdí, že měnová stabilita vyžaduje pevné externí zakotvení k měně, která uklidní obchodníky, věřitele a zahraniční partnery. Volba před námi není jen technická. Ovlivní směr našeho obchodu, charakter rozvoje a zahraniční vliv, který na [SIA.GetAdjective] ekonomii dopadne."
 siam.23.a: "Připoutat k libře"
 siam.23.b: "Připoutat k jenu"
 siam.24.t: "Rozvojová spolupráce [SIA.GetAdjective]"
 siam.24.desc: "Rozvojová spolupráce poskytla státu nový nástroj k národnímu zlepšení, ale ambice stále předběhly domácí kapitál. Železnice, dílny a elektrárny vyžadují zahraniční finance, pokud mají rychle vyrůst. Nyní před námi stojí dvě cesty. [ENG.GetAdjective] investice nabízejí přístup na zavedené trhy, zkušené firmy a finanční prestiž Londýna. [JAP.GetAdjective] investice slibují bližší průmyslové partnerství s rostoucí asijskou mocností ochotnou rozšířit svůj vliv. Každá cesta může urychlit rozvoj, ale žádná nepřichází bez závazků."
 siam.24.a: "Žádat investice od [ENG.GetName]"
 siam.24.b: "Žádat investice od [JAP.GetName]"
 siam.25.t: "Smrt Prajadhipoka"
 siam.25.desc: "Král Prajadhipok zemřel. Bývalý král, jehož jméno neslo památku starého řádu přes léta exilu a zmatku, odchází do historie. Pro některé uzavírá jeho smrt poslední kapitolu boje, který začal koncem absolutní vlády. Trůn přetrvává, dynastie zůstává a práce na obnově důstojnosti a stability [ROOT.GetName] musí pokračovat ve jménu mladého krále Anandy."
 siam.25.a: "Ať jeho veličenstvo vystoupí do nebes."
 siam.27.t: "Vytvořit krále"
 siam.27.desc: "Král Ananda zůstává v [SWI.GetName], daleko od království, které jednoho dne povede. Vzdálenost ho však nevystavuje mimo náš vliv. Učitelé, předměty a zvyky mohou být voleny tak, aby jeho mysl byla formována pro budoucnost, kterou máme pro [ROOT.GetNameDef]. Zda se vrátí jako voják, učenec nebo něco jiného, závisí do značné míry na tom, co nyní studuje.\n\nCo je vlastně král, jestli ne prodloužení státu?"
 siam.27.a: "Vést ho ke studiu."
 siam.27.b: "Vzdělávat ho v vojenských záležitostech."
 siam.27.c: "Nasměrovat ho k administraci a zásobování."
 siam.27.d: "Vzdělávat ho v průmyslu a rozvoji."
 siam.28.t: "Koritace krále Anandy"
 siam.28.desc: "Dlouhé roky regentství se chýlí ke konci. V Bangkoku, před princezny, mnichy, ministry a státními důstojníky, Ananda vystoupí na trůn a obdrží pocty náležité králi Chakri. Obřady prohlašují kontinuitu tam, kde byl zmatek, a svatý řád tam, kde byl boj. Pro království tato korunovace není jen hostinou, ale prohlášením, že koruna přetrvává, že říše nebyla zlomena exilem a občanské konflikty a že začíná nové panování nad [ROOT.GetNameDef]."
 siam.28.a: "Ať žije král."
 siam.29.t: "Studium konvenčních tanků"
 siam.29.desc: "Konvenční tanky jsou stále králi bojiště, musíme se učit od nejlepších, abychom vytvořili silný tankový sbor."
 siam.29.a: "Budeme se učit od Němců"
 siam.29.b: "Budeme se učit od Američanů"
 siam.29.c: "Budeme se učit od Britů"
 siam.31.t: "Získání ponorek"
 siam.31.desc: "Rozšíření námořnictva volá po ponorkovém sboru a musíme rozhodnout, odkud plavidla získat. [ENG.GetNameDef] i [JAP.GetNameDef] nám učinili nabídky — volba nese důsledky nad rámec loděnice."
 siam.31.a: "Britské ponorky nám poslouží dobře."
 siam.31.b: "Postavíme naše ponorky podle [JAP.GetAdjective] návrhů."
 siam.32.t: "Získání pobřežních obranných lodí"
 siam.32.desc: "Naše pobřežní vody vyžadují schopné obranné lodě a musíme zvolit dodavatele. [ENG.GetNameDefCap] i [JAP.GetNameDef] jsou připraveni dodat — rozhodnutí utváří naši flotilu i zahraniční vazby."
 siam.32.a: "Budeme se spoléhat na [ENG.GetAdjective] plavidla pro pobřežní obranu."
 siam.32.b: "Budeme se spoléhat na [JAP.GetAdjective] lodě pro naši pobřežní flotilu."
 siam.33.t: "Prodej loděnice v Bangkoku dokončen"
 siam.33.desc: "Prodej Bangkok Dock Company byl dokončen a výnosy nyní sedí v pokladně. Vláda musí rozhodnout, kam tyto prostředky nejlépe nasměrovat — zda ulevit finanční zátěži občanů, urychlit technické ambice země nebo posílit důvěru v budoucnost."
 siam.33.a: "Snížit daňové zatížení našeho lidu."
 siam.33.b: "Směřovat prostředky do námořního výzkumu."
 siam.33.c: "Použít výnos k uklidnění národa."
 siam.34.t: "[FROM.GetAdjective] požadavky na našich březích"
 siam.34.desc: "[FROM.GetAdjective] síly nyní tlačí proti [ROOT.GetNameDef] a jejich diplomaté mluví s jistotou mužů, kteří věří, že věc je již rozhodnuta. Nabízejí obvyklý jazyk pořádku a stability, avšak tím, co skutečně žádají, je poslušnost. Můžeme se podvolit a zachovat stát v oslabené podobě, připojit se k jejich frakci ve snaze uchovat si nějakou svobodu jednání, nebo odpovědět otevřeným vzdorem a vyhnat vetřelce z našich břehů."
 siam.34.a: "Přidáme se k jejich frakci a zachráníme naši vládu."
 siam.34.b: "Řekněte jim, aby zmizeli z našich břehů."
 siam.35.t: "[JAP.GetNameDefCap] žádá, abychom tiskli více peněz"
 siam.35.desc: "[JAP.GetNameDefCap] jasně očekává: máme zvýšit nabídku peněz, abychom obsloužili jejich ekonomické požadavky. Zátěž padne na naše lidi skrze růst cen, zatímco [JAP.GetAdjective] průmysl bude těžit. Máme malý prostor k odmítnutí."
 siam.35.a: "Vyhovíme požadavkům [JAP.GetNameDef]."
 siam.36.t: "[SIA.GetNameDefCap] žádá splatit dluh"
 siam.36.desc: "[SIA.GetNameDefCap] formálně požaduje, abychom splatili náklady vzniklé dohodou o tisku peněz, kterou jsme je přinutili provést. Dohoda nám sloužila, ale teď přišel účet."
 siam.36.a: "Poctivě dluh uznat a začít splácet."
 siam.37.t: "[JAP.GetNameDefCap] souhlasí splatit naše dluhy"
 siam.37.desc: "Po našich nárocích [JAP.GetNameDef] souhlasil začít splácet ekonomické náklady z aranžmá tisku peněz. Kompenzace plně neodčiní břemeno, které jsme utrpěli, ale přinese do pokladny určité ulehčení."
 siam.37.a: "Férové urovnání. Naše ekonomika se zotaví."
 siam.38.t: "[SIA.GetName] žádá podmínky"
 siam.38.desc: "Vláda [SIA.GetAdjective] přichází s návrhem kapitulace. Jejich ministři nyní uznávají, co naše zbraně už ukázaly, že [ROOT.GetNameDef] drží iniciativu v tomto boji. Můžeme přijmout jejich kapitulaci a snížit je k poslušnosti, přivázat je k naší frakci, aby jejich vláda sloužila širšímu cíli, nebo odmítnout kompromis a pokračovat v tažení, dokud Siam nebude zcela obsazen."
 siam.38.a: "Přijmout jejich kapitulaci."
 siam.38.b: "Ne. Dokončíme to silou."
 siam.39.t: "[FROM.GetAdjective] vláda přijímá naši kapitulaci"
 siam.39.desc: "[FROM.GetLeader] se rozhodl přijmout naši kapitulaci. Prozatím je [ROOT.GetNameDef] ušetřeno dalšího ničení, byť poníženě. Armáda má rozkaz stáhnout se a vláda zůstává jen z milosti mocnějšího. Zachováváme stát, ale za cenu hrdosti a svobody jednání."
 siam.39.a: "Vzdorujeme tomu, co musíme."
 siam.40.t: "[FROM.GetAdjective] vláda odmítá naši nabídku"
 siam.40.desc: "[FROM.GetLeader] odmítl všechny nabídky z Bangkoku. Žádné podřízení není dostatečné a žádný kompromis přijatelný. Nepřítel se rozhodl pro úplné dobytí. Nyní nezbyde [ROOT.GetNameDef] než odpor. Pokud nám neodejdou dohodou, musí být vyhnáni silou."
 siam.40.a: "Pak bojujeme."
 siam.41.t: "[FROM.GetNameDefCap] posílá úředníky studovat naše metody"
 siam.41.desc: "Delegace [FROM.GetAdjective] úředníků dorazila, aby pozorovala a studovala naše administrativní a výzkumné postupy. [FROM.GetNameDefCap] se zdá mít v úmyslu modernizovat svou byrokracii a zvolil si [ROOT.GetNameDef] jako vzor. Návštěva je implicitním uznáním našich metod a příležitostí vybudovat s jinou vládou důvěru."
 siam.41.a: "Vítáme jejich delegaci."
 siam.42.t: "[FROM.GetNameDefCap] připojil svou měnu k naší"
 siam.42.desc: "[FROM.GetNameDefCap] formálně zvolil ukotvit svou měnu na naší. Rozhodnutí přibližuje [FROM.GetNameDef] do naší ekonomické sféry a znamená důvěru v stabilitu našich finančních institucí. Obchod mezi našimi zeměmi by se měl stát předvídatelnějším a [FROM.GetAdjective] obchodníci snadněji obchodovat s našimi."
 siam.42.a: "Vítaný vývoj pro naše obchodní vztahy."
 siam.43.t: "[FROM.GetNameDefCap] žádá rozvojovou investici"
 siam.43.desc: "[FROM.GetNameDefCap] pozval naše inženýry a specialisty, aby pomohli rozvoji jejich národa. Spolupráce nabízí našemu průmyslu oporu v regionu a posiluje ekonomické vazby mezi vládami. Je to skromný návrh, ale může přinést značné výnosy v čase."
 siam.43.a: "Rádi pomůžeme."
 siam.44.t: "[FROM.GetNameDefCap] zadává objednávku na ponorky"
 siam.44.desc: "[FROM.GetNameDefCap] zadal objednávku na ponorky postavené podle našich návrhů. Prodej je výrazem důvěry v náš námořní průmysl a rozšiřuje [FROM.GetAdjective] vliv do vod jihovýchodní Asie."
 siam.44.a: "Vítaná objednávka pro naše loděnice."
 SIA_purchased_submarines_from_us: "Zakoupili od nás ponorky"
 siam.45.t: "[FROM.GetNameDefCap] navrhuje sloučení aliancí"
 siam.45.desc: "Delegace z [FROM.GetName] dorazila s návrhem od [FROM.GetLeader]. Tvrdí, že naše oddělené aliance nyní sledují stejné cíle a rozdělují muže, materiál a diplomatický vliv mezi konkurenční velení.\n\nSloučením sil vytvoříme silnější blok schopný koordinovat strategii na širším frontu. Taková dohoda posílí společnou věc, ale také bude vyžadovat, abychom přijali [FROM.GetAdjective] vliv na budoucí směřování aliance."
 siam.45.a: "Jednotný front je nezbytný."
 siam.45.b: "Naše aliance zůstane naše."
 siam.46.t: "[FROM.GetNameDefCap] přijímá sloučení"
 siam.46.desc: "[FROM.GetLeader] přijal náš návrh sloučit naše aliance do jedné koalice. Co dříve byly oddělené velení a diplomatické kanály, nyní se skládají do jedné struktury, což umožní vládám koordinovat válečné plány, zásobování a zahraniční politiku s větší jasností.\n\nUjednání není bez komplikací, ale nezbytnost jednoty převážila."
 siam.46.a: "Společně stojíme silnější."
 siam.47.t: "[FROM.GetNameDefCap] odmítá sloučení"
 siam.47.desc: "[FROM.GetLeader] odmítl náš návrh sloučit aliance. Jejich vláda tvrdí, že spolupráce může pokračovat, kde zájmy souhlasí, ale nechtějí vložit svou alianci do širší koalice vedené z [ROOT.Capital.GetCapitalVictoryPointName].\n\nProzatím rozdělení mezi našimi bloky přetrvává. Musíme sledovat naše cíle bez předpokladu jejich plného závazku."
 siam.47.a: "Pak půjdeme sami."
 siam.48.t: "[SIA.GetName] žádá [JAP.GetAdjective] pomoc"
 siam.48.desc: "[SIA.GetNameDefCap] formálně požádal o vojenskou pomoc proti silám okupujícím jejich zemi. Výměnou je [SIA.GetAdjective] vláda připravena udělit [JAP.GetAdjective] firmám privilégiovaný přístup k strategickým zdrojům, infrastruktuře a obchodním právům.\n\nPodpora [SIA.GetName] by rozšířila náš vliv v jihovýchodní Asii a zajistila cenné suroviny pro Imperium, i když by nás to mohlo také více zaplést do regionálních konfliktů."
 siam.48.a: "Přijmout jejich návrh."
 siam.48.b: "[JAP.GetName] nemůže poskytnout zdroje."
 siam.49.t: "[JAP.GetName] přijal naši výzvu"
 siam.49.desc: "[JAP.GetNameDefCap] souhlasil podpořit [ROOT.GetNameDef] v boji. [JAP.GetAdjective] poradci, vybavení a zásoby brzy začnou přicházet a ekonomické ústupky byly uděleny [JAP.GetAdjective] společnostem podle dohody.\n\nAč kabinet slaví zachování státu, mnozí tiše přemýšlejí, kolik nezávislosti bylo prodáno za tuto pomoc."
 siam.49.a: "Zajistili jsme spojence."
 SIA_japan_aid_request.4.t: "[JAP.GetName] odmítá naši výzvu"
 SIA_japan_aid_request.4.desc: "Vláda [JAP.GetNameDef] odmítla naši žádost o vojenskou pomoc. Tokio tvrdí, že Impérium nemůže v tuto chvíli uvolnit lidi a materiál.\n\nBez zahraniční pomoci musí nyní [ROOT.GetNameDef] spoléhat na vlastní síly, aby přežilo invazi."
 SIA_japan_aid_request.4.a: "Pak stojíme sami."
 siam_adc.1.t: "[FROM.GetNameDefCap] požaduje propuštění [?var:SIA_adc_demand_country_to_be_released.GetNameDef]"
 siam_adc.1.desc: "Formální nóta dorazila z [FROM.GetNameDef], kde [FROM.GetLeader] odsuzuje naši pokračující okupaci asijských zemí jako nesnesitelný útok na jejich právo na sebeurčení. Zpráva stanoví, že Asie není kořist k rozdělování nebo správě podle cizí libovůle, a požaduje, abychom okamžitě stáhli síly a obnovili nezávislou vládu v [?var:SIA_adc_demand_country_to_be_released.GetNameDef].\n\nPožadavek nezanechává prostor pro nedorozumění. [FROM.GetNameDefCap] očekává soulad a jakékoliv naše odmítnutí bude pamatováno jako záměrná urážka jejich národa."
 siam_adc.1.a: "Propustíme je."
 siam_adc.1.b: "Zůstanou okupováni."
 siam_adc.2.t: "[FROM.GetNameDefCap] nabízí obnovit naši nezávislost"
 siam_adc.2.desc: "Po [FROM.GetAdjective] akceptaci požadavků ohledně budoucnosti [ROOT.GetNameDef] [FROM.GetLeader] nyní předkládá konečnou otázku. Okupační orgány jsou připraveny se stáhnout a uznat suverénní [ROOT.GetAdjective] vládu, pokud se rozhodneme znovu stát samostatnou zemí.\n\nNezávislost nabízí důstojnost a svobodu jednání, ale také nás nechává obnovit stát bez záruk [FROM.GetNameDef]. Zůstat pod jejich ochranou je skromnější postup, který však může ušetřit zemi další rozvrat v nejistých časech."
 siam_adc.2.a: "Budeme stát jako svobodný národ."
 siam_adc.2.b: "Zůstaneme pod ochranou [FROM.GetAdjective]."
 siam_adc.3.t: "[?var:SIA_tag_that_was_released_due_to_sia_pressure.GetName] přijímá nezávislost"
 siam_adc.3.desc: "Vláda [?var:SIA_tag_that_was_released_due_to_sia_pressure.GetNameDef] se rozhodla pro nezávislost. S tím, jak bude okupační správa rozpuštěna, [?var:SIA_tag_that_was_released_due_to_sia_pressure.GetNameDef] se připravuje znovu zaujmout místo mezi suverénními státy světa."
 siam_adc.3.a: "Co je čeká v budoucnu?"
 siam_adc.4.t: "[FROM.GetNameDefCap] odmítá nezávislost"
 siam_adc.4.desc: "Navzdory nabídce získat svobodu vláda [FROM.GetNameDef] odmítla okamžitou nezávislost. Její ministři tvrdí, že stát není připraven nést břemeno plné suverenity a prozatím preferuje zachování statu quo."
 siam_adc.4.a: "Pak bude pořádek pokračovat."
 siam_adc.5.t: "[FROM.GetNameDefCap] odmítá naše požadavky"
 siam_adc.5.desc: "[FROM.GetName] dali jasně najevo, že naše požadavky jsou směšné. Poukazují na naší skromnou armádu jako důkaz, že nejsme v pozici zpochybňovat status quo."
 siam_adc.5.a: "Pak jim to ukážeme."
 siam_dem_event_count: "Vojáci plánují kampaň, čím déle čekáme, tím snáze bude zkazena "
 siam_dem.2.t: "Armáda nesouhlasí"
 siam_dem.2.desc: "Na soukromém jednání ministrů a vyšších důstojníků vojenský zástupce přednesl přísnou kritiku návrhu Žlutého spisu. Tvrdí, že jeho autoři mluví příliš volně o směrování státu, přerozdělování a společenské odpovědnosti, přičemž dávají příliš málo ohledu na disciplínu, vlastnictví a břemena, která by padla na důstojnický sbor a venkov. Podle něj nelze [ROOT.GetNameDef] přetvořit teoriemi napsanými na papíře, zatímco svět se měsíc od měsíce stává nebezpečnějším."
 siam_dem.2.a: "Armáda předložila svůj názor"
 siam_dem.3.t: "Veřejné odsouzení"
 siam_dem.3.desc: "Spor se přenesl za dveře výboru. Noviny považované za vojenský proxy zveřejnily plné odsouzení Žlutého spisu, prezentovaného jako cizí program v patriotovském hávu. Redaktoři varují, že návrh dává třídní nároky nad národní jednotu, oslabuje důvěru ve zavedené instituce a povzbuzuje nebezpečná očekávání mezi dělníky a rolníky. Do odpoledne se článek šíří v kasárnách, úřadech a čajovnách a to, co bylo interním sporem, je nyní veřejnou kontroverzí."
 siam_dem.3.a: "Kritika se šíří"
 siam_dem.4.t: "Phibun odsuzuje spis"
 siam_dem.4.desc: "Phibun se do sporu aktivně zapojil a bez váhání Žlutý spis ostře kritizuje. Mluví před stoupenci a důstojníky, označuje spis jako komunistický v jádru bez ohledu na jazyk, kterým jeho obhájci mluví. Prohlašuje, že jakýkoli program, který staví stát nad vlastnictví, slibuje rozsáhlé společenské změny a podněcuje nižší třídy, přináší do [ROOT.GetNameDef] rudý jed pod jiným názvem."
 siam_dem.4.a: "Nezanechává žádné pochybnosti"
 AST_election_events.1.t.a: "UAP vítězí!"
 AST_election_events.1.t.b: "Labor vítězí!"
 AST_election_events.1.desc.a: "Hlasy byly sečteny; United Australia Party vyhrála volby.\n\nUAP projde krátkým obdobím formování vlády, než stráví další tři roky dokazováním, že důvěra občanů byla oprávněně vložena do ramen jejích zástupců."
 AST_election_events.1.desc.b: "Hlasy byly sečteny; Australská labouristická strana vyhrála volby.\n\nLabor projde krátkým obdobím formování vlády, než stráví další tři roky dokazováním, že důvěra občanů byla oprávněně vložena do ramen jejích zástupců."
 AST_election_events.1.a: "Lid promluvil."
 AST_election_events.2.t: "Půl cesty k federálním volbám"
 AST_election_events.2.desc: "$AST_democratic_party_long$ vede [AST.GetName] od roku 1931, vedl národ z Velké deprese a odvrátil antidemokratické nálady. Díky stabilnímu vedení, konzervativní orientaci a loajalitě k Británii si UAP upevnila podporu a další období se zdá být pravděpodobné. Přesto má i druhá strana stále šanci.\n\nLabor se zotavuje po neúspěchu hlasování o nedůvěře v roce 1931 a začíná opět získávat hybnost. S umlčenými komunistickými hlasy se pracovní třída hledá nové vedení. Labor získává jiný pohled na imperialismus a loajalitu k Británii. Domácí potřeby musí být na prvním místě a zahraniční zájmy by už neměly mít prioritu.\n\nDo federálních voleb zbývá rok a půl. Pokud chce UAP zajistit další vítězství, její vedení musí zrychlit reformy, aby udrželo veřejnou podporu. Jinak může kampaň ALP obnovit své postavení."
 AST_election_events.2.a: "UAP provede poslední reformy."
 AST_election_events.2.b: "Kampaň po Austrálii zvýší podporu ALP."
 AST_election_events.3.t: "$AST_election_season_cat$"
 AST_election_events.3.desc: "$AST_election_season_cat_desc$"
 AST_election_events.3.a: "Začíná."
 AST_diplomatic_events.1.t: "Australský pakt o neútočení"
 AST_diplomatic_events.1.desc: "V rámci svých nedávných diplomatických snah chce australská vláda podepsat dohody o neútočení s několika vybranými asijskými státy; jsme jedním z nich. Zda tato snaha odhaluje australské úředníky jako odtržené od reality, nebo je líčí jako čestné a nevinné, náš souhlas bude částečně rozhodující.\n\nPodepíšeme pakt o neútočení s [AST.GetName]?"
 AST_diplomatic_events.1.a: "Rozhodně — ne."
 AST_diplomatic_events.1.b: "Ano, podepíšeme."
 AST_diplomatic_events.2.t: "Odmítnutí Pacifického paktu"
 AST_diplomatic_events.2.desc: "Delegace poslaná do [FROM.GetNameDef] poslala kódovaný dopis s odpovědí na naši nabídku paktu o neútočení. Věděli jsme, že iniciativa je široká, a tak nás [FROM.GetLeader] odmítnutí nijak nepřekvapilo."
 AST_diplomatic_events.2.a: "Byl to poctivý pokus."
 AST_diplomatic_events.3.t: "Ať žije Pacifický pakt"
 AST_diplomatic_events.3.desc: "Delegace poslaná do [FROM.GetNameDef] poslala odpověď na naši nabídku paktu o neútočení. Nejpotěšivější je, že [FROM.GetLeader] ocenil naši iniciativu a souhlasil ji podepsat."
 AST_diplomatic_events.3.a: "Skvělé!"
 AST_diplomatic_events.4.t: "Austrálie žádá Singapur"
 AST_diplomatic_events.4.desc: "[AST.GetNameDefCap] dlouho zpochybňuje spolehlivost Singapurské strategie; podle australských úředníků je naše schopnost pomoci v případné pacifické válce nejistá. Předáním pacifických námořních odpovědností Austrálii by se zátěž snížila z britských ramen, avšak současně by se přenesla na australská.\n\nMůžeme věřit, že zvýšená australská kontrola posílí pozici našich pacifických podřízených více, než kdyby Singapur zůstal u nás?"
 AST_diplomatic_events.4.a: "Ano, můžeme."
 AST_diplomatic_events.4.b: "Singapur zůstane náš."
 AST_diplomatic_events.5.t: "Británie souhlasí s naší žádostí"
 AST_diplomatic_events.5.desc: "Británie souhlasí přenést Singapur pod australskou autoritu. To konečně přepíše zastaralou Singapurskou strategii a postaví nás u kormidla našich vlastních obranných plánů."
 AST_diplomatic_events.5.a: "Strategie je přepsána!"
 AST_diplomatic_events.5.a.tt: "§YSingapur§!:\n  Je kontrolován §YAustrálií§!.\n  Je vlastněn §YAustrálií§!.\n§YVánoční ostrov§!:\n  Je kontrolován §YAustrálií§!.\n  Je vlastněn §YAustrálií§!.\n§YCocos Islands§!:\n  Je kontrolován §YAustrálií§!.\n  Je vlastněn §YAustrálií§!."
 AST_diplomatic_events.6.t: "Británie odmítá naši žádost"
 AST_diplomatic_events.6.desc: "Británie odmítá převést Singapur pod australskou autoritu. Stávající stav zůstane."
 AST_diplomatic_events.6.a: "Singapurská strategie prostě musí zůstat."
 AST_diplomatic_events.7.t: "[AST.GetName] žádá naši pomoc"
 AST_diplomatic_events.7.desc: "[AST.GetNameDefCap] chce obdržet vybavení od spojenců pro své válečné úsilí a žádá nás o pomoc s řízením požadovaných zásilek. Můžeme uvolnit konvoje, aby [AST.GetName] mohl zásilky využít?"
 AST_diplomatic_events.7.a: "Můžeme."
 AST_diplomatic_events.7.b: "Nemůžeme"
 AST_diplomatic_events.8.t: "[USA.GetName] souhlasí s naší žádostí"
 AST_diplomatic_events.8.desc: "[USA.GetNameDefCap] souhlasil uvolnit několik konvojů, aby pomohl zásobovacím snahám [AST.GetName]."
 AST_diplomatic_events.8.a: "Budou velmi užitečné!"
 AST_diplomatic_events.9.t: "[USA.GetName] odmítá naši žádost"
 AST_diplomatic_events.9.desc: "[USA.GetNameDefCap] nemá žádné konvoje, které by mohl uvolnit pro zásobování [AST.GetName]."
 AST_diplomatic_events.9.a: "Musíme zásilky zvládnout sami."
 AST_diplomatic_events.10.t: "Válečná aliance"
 AST_diplomatic_events.10.desc: "[AST.GetNameDefCap] si velmi váží spojenectví s [USA.GetNameDef] a nyní žádá, aby bylo formalizováno do společné mezinárodní válečné koalice. Společným působením by si naše dvě země mohly navzájem pomoci v současných i budoucích konfliktech."
 AST_diplomatic_events.10.a: "Musíme souhlasit."
 AST_diplomatic_events.10.b: "[USA.GetNameDefCap] bude silnější bez nich."
 AST_diplomatic_events.11.t: "Válečná aliance"
 AST_diplomatic_events.11.desc: "[USA.GetNameDefCap] souhlasil s připojením. Jako členové [AST.GetFactionName] budou [AST.GetName] a [USA.GetName] vzájemně pomáhat v současných i budoucích konfliktech."
 AST_diplomatic_events.11.a: "Naši nepřátelé se nás budou bát."
 AST_diplomatic_events.12.t: "Odmítnutá válečná aliance"
 AST_diplomatic_events.12.desc: "[USA.GetNameDefCap] odmítl náš návrh spojit síly. [AST.GetNameDefCap] a [USA.GetName] zůstanou rozděleni ve svých válečných snahách."
 AST_diplomatic_events.12.a: "Musíme stát bez nich."
 AST_diplomatic_events.13.t: "Článek 6"
 AST_diplomatic_events.13.desc: "Během procesu, který sjednotil australské kolonie do federace, se Nový Zéland rozhodl nepřipojit. Australská ústava nás však stále definuje jako jeden z potenciálních států Commonwealthu a umožňuje naši přijetí.\n\n[AST.GetName] nyní tvrdí, že současná světová situace vyžaduje jednotu a žádá, aby [NZL.GetName] přenesl autoritu pod australskou správu. Vyhlásíme referendum?"
 AST_diplomatic_events.13.a: "Vyhlásíme."
 AST_diplomatic_events.13.a.tt: "Proběhne referendum, které může vést k §Ranexi§! §Y[NZL.GetName]§!"
 AST_diplomatic_events.13.b: "Rozhodně ne!"
 AST_diplomatic_events.14.t: "[NZL.GetNameDefCap] se stává australským státem"
 AST_diplomatic_events.14.desc: "Po nedávném referendu se [NZL.GetName] rozhodl uplatnit Článek 6 australské ústavy. Novozélanďané souhlasili, že jejich území budou bezpečnější pod australskou správou, a proto se rozhodli připojit k [AST.GetNameDef]."
 AST_diplomatic_events.14.a: "Austrálie se rozšiřuje."
 AST_diplomatic_events.15.t: "Novozélandský veřejnost vzdoruje"
 AST_diplomatic_events.15.desc: "Po nedávném referendu se [NZL.GetName] rozhodl neaplikovat Článek 6. [NZL.GetNameDefCap] zůstane samostatnou zemí."
 AST_diplomatic_events.15.a: "Austrálie zůstane, jak je."
 AST_diplomatic_events.16.t: "Úředníci [NZL.GetNameDefCap] vzdorují"
 AST_diplomatic_events.16.desc: "Navzdory australskému tlaku se [NZL.GetName] rozhodl neprovést referendum. [NZL.GetNameDefCap] zůstane samostatnou zemí."
 AST_diplomatic_events.16.a: "Austrálie zůstane, jak je."
 AST_diplomatic_events.17.t: "Australské partnerství"
 AST_diplomatic_events.17.desc: "Nepřítel přichází ze severu a je jen otázkou času, kdy se objeví u našich dveří, nebo tak alespoň tvrdí australští úředníci. [AST.GetNameDefCap] navrhuje, abychom se spojili do jedné bariéry, nejlépe tím, že umístíme [INS.GetName] pod australskou autoritu, ale minimálně poskytnutím vojenského přístupu."
 AST_diplomatic_events.17.a: "Souhlasíme být pod australskou autoritou."
 AST_diplomatic_events.17.a.tt: "§Y[INS.GetNameDefCap]§! se stane §Yloutkou§! §Y[AST.GetNameDefCap]§!."
 AST_diplomatic_events.17.b: "Poskytnout vojenský přístup."
 AST_diplomatic_events.17.b.tt: "§Y[INS.GetNameDefCap]§! uzavře §Yvojenský přístup§! s §Y[AST.GetNameDefCap]§!."
 AST_diplomatic_events.17.c: "Nesouhlasíme s žádným."
 AST_diplomatic_events.18.t: "[INS.GetNameDefCap] ustupuje australské žádosti"
 AST_diplomatic_events.18.desc: "[INS.GetName] souhlasil s naší žádostí; naše spolupráce bude mít velký dopad na obranné schopnosti obou národů."
 AST_diplomatic_events.18.a: "Fantastické!"
 AST_diplomatic_events.19.t: "[INS.GetNameDefCap] odmítá"
 AST_diplomatic_events.19.desc: "[INS.GetName] naši žádost odmítl; naše národy si budou muset zajistit obranu sami."
 AST_diplomatic_events.19.a: "[AST.GetNameDefCap] obstojí i bez nich."
 AST_diplomatic_events.20.t: "Summons to the British War Cabinet"
 AST_diplomatic_events.20.desc: "[ENG.GetNameDefCap] svolává australského premiéra do Britského válečného kabinetu. Světová situace je vážná a Británie hledá společné strategie a vojenskou spolupráci se svými spojenci.\n\nMůže Austrálie uvolnit premiéra, aby uspokojila Brity?"
 AST_diplomatic_events.20.a: "[AST.GetLeader] odjede do Británie."
 AST_diplomatic_events.20.b: "Je tady potřeba."
 AST_diplomatic_events.22.t: "Úspěšné příspěvky do Britského válečného kabinetu"
 AST_diplomatic_events.22.desc: "Během uplynulého roku se australský premiér pravidelně účastnil Britského válečného kabinetu. Přestože [AST.GetNameDef] musela někdy platit cenu, naše země nyní díky britské vojenské spolupráci silněji vyrostla."
 AST_diplomatic_events.22.a: "Cena byla nakonec stojí za to."
 AST_diplomatic_events.23.t: "[ENG.GetLeader] už nevyhledává australský válečný vliv"
 AST_diplomatic_events.23.desc: "[ENG.GetNameDefCap] několikrát svolal australského premiéra do Britského válečného kabinetu, ale po opakovaných odmítnutích [ENG.GetLeader] už nevidí důvod v tom pokračovat."
 AST_diplomatic_events.23.a: "To je pochopitelné."
 AST_diplomatic_events.24.t: "Změna vedení"
 AST_diplomatic_events.24.desc: "Australský premiér měl velký vliv na britské válečné úsilí. Během svých pravidelných návštěv Londýna Robert Menzies získal důvěru britských ministrů, zatímco jejich víra ve vlastního premiéra ochabla. Ministři nyní tlačí vedení [ENG.GetNameDef] k rezignaci a k tomu, aby Menzies převzal vedení.\n\nI pokud [AST.GetName] ztratí premiéra, získá věčnou loajalitu od svého suzeréna, střeženou australským krajanem nyní u britského kormidla. Země pod jižním křížem žádá zvýšenou autoritu a Robert Menzies je první, kdo se za to postavil."
 AST_diplomatic_events.24.a: "Větry se mění."
 AST_diplomatic_events.25.t: "Pod vládou Canberra"
 AST_diplomatic_events.25.desc: "Rostoucí napětí mezi pacifickými národy znepokojuje a s Británií zaměstnanou svými vlastními boji se naše schopnost pomáhat našim podřízeným je omezená; nebo tak alespoň tvrdí [AST.GetName].\n\nNavrhují rekonstruovat Britské společenství tak, aby regiony Pacifiku a Indického oceánu byly řízeny přímo z Canberry. Souhlasíme?"
 AST_diplomatic_events.25.a: "Souhlasíme; pacifický region bude posílen centralizovanou kontrolou."
 AST_diplomatic_events.25.b: "Rozhodně ne!"
 AST_diplomatic_events.26.t: "Pacifické společenství"
 AST_diplomatic_events.26.desc: "[ENG.GetNameDefCap] souhlasí; pacifický region bude posílen centralizovanou kontrolou. Britská pacifická území byla umístěna pod naši autoritu."
 AST_diplomatic_events.26.a: "Pacifické národy spojují síly."
 AST_diplomatic_events.27.t: "Británie odmítá naši žádost"
 AST_diplomatic_events.27.desc: "[ENG.GetNameDefCap] nesouhlasí; pacifický region nebude centralizovaně řízen. Pacifická území zůstanou pod britskou autoritou."
 AST_diplomatic_events.27.a: "I tak Austrálie obstojí."
 AST_diplomatic_events.28.t: "[ENG.GetLeader] zavěsil"
 AST_diplomatic_events.28.desc: "Premiérův kabelový spor s [ENG.GetLeader] přinesl málo posil pro Austrálii, ale zvýšil britské roztrpčení vůči [AST.GetLeader] za neustálé prosazování australských zájmů."
 AST_diplomatic_events.28.a: "Austrálie se musí postarat o vlastní obranu."
 AST_diplomatic_events.29.t: "Británie nám pomůže"
 AST_diplomatic_events.29.desc: "Po australském tlaku na [ENG.GetNameDef] zahájit konflikt s [JAP.GetName], Británie souhlasila podpořit naše obranné stavební snahy."
 AST_diplomatic_events.29.a: "Pomoc je vítána, ale neodvrátí japonskou válku."
 AST_diplomatic_events.30.t: "Austrálie žádá práva na zdroje"
 AST_diplomatic_events.30.desc: "Expanzionističtí agresoři hledají v Indočíně nejen území samotné, ale i jeho zdroje. Pokud bohatství skončí v rukou nepřítele, prodlouží to válku, zatímco v rukou Austrálie by mohly pomoci ji ukončit; tak tvrdí australská vláda.\n\nSouhlasíme udělit jim práva na suroviny v našem území?"
 AST_diplomatic_events.30.a: "Souhlasíme."
 AST_diplomatic_events.30.b: "Zdroje nejsou pro [AST.GetName] k odebírání."
 AST_diplomatic_events.31.t: "[FROM.GetNameDefCap] uděluje [AST.GetName] práva na suroviny"
 AST_diplomatic_events.31.desc: "Rozšířené agresory v Indočíně považují zdroje za klíč ke konfliktu. [ROOT.OVERLORD.GetNameDefCap] souhlasil s žádostí."
 AST_diplomatic_events.31.a: "Není to v naší moci."
 AST_diplomatic_events.32.t: "[FROM.GetNameDefCap] uděluje práva na suroviny"
 AST_diplomatic_events.32.desc: "[FROM.GetNameDefCap] souhlasil, že zdroje Indočiny by měly být lépe využity v australských rukou, a udělil nám práva na jejich těžbu."
 AST_diplomatic_events.32.a: "Budou velmi užitečné."
 AST_diplomatic_events.33.t: "[FROM.GetNameDefCap] odmítá udělit práva na suroviny"
 AST_diplomatic_events.33.desc: "[FROM.GetNameDefCap] nesouhlasí s tím, že by zdroje Indočiny měly být v australských rukou, a odmítá nám práva udělit."
 AST_diplomatic_events.33.a: "Doufáme, že neskončí v rukou nepřítele."
 AST_diplomatic_events.34.t: "[AST.GetNameDefCap] žádá rozdělení pacifických území"
 AST_diplomatic_events.34.desc: "[AST.GetNameDefCap] navrhuje pakt; takový, který by vyhladil potenciální konflikty mezi našimi zeměmi dříve, než vzniknou. Rozdělením pacifických území mezi námi můžeme plánovat budoucí expanze bez obav o zásahy druhé strany."
 AST_diplomatic_events.34.a: "Pakt se zdá rozumný."
 AST_diplomatic_events.34.b: "[JAP.GetNameDefCap] se rozšíří, jak uzná za vhodné."
 AST_diplomatic_events.35.t: "Pacifik byl rozdělen"
 AST_diplomatic_events.35.desc: "[AST.GetNameDefCap] a [JAP.GetNameDefCap] se dohodli, které pacifické území může která země rozšířit. Doufejme, že to odradí od potenciálních budoucích konfliktů mezi našimi mocnostmi."
 AST_diplomatic_events.35.a: "Je rozhodnuto!"
 AST_diplomatic_events.36.t: "Tichomoří se samo rozdělí"
 AST_diplomatic_events.36.desc: "[JAP.GetNameDefCap] nebude souhlasit s rozdělením tichomořských území mezi naše dvě země; japonská vláda se bude rozšiřovat podle vlastního uvážení."
 AST_diplomatic_events.36.a: "A Austrálie také."
 AST_diplomatic_events.37.t: "Předání suverenity"
 AST_diplomatic_events.37.desc: "Z neznámých důvodů se [AST.GetName] rozhodl předat kontrolu nad našimi zeměmi [JAP.GetNameDef]. Za scénou se dusí cosi zlověstného a je jen otázkou času, než svět zjistí, o co jde."
 AST_diplomatic_events.37.a: "Zřejmě v tom nemáme co říct."
 AST_diplomatic_events.38.t: "Nauruský pakt"
 AST_diplomatic_events.38.desc: "V důsledku první světové války byla řada německých území v Tichomoří umístěna pod australskou kontrolu, ale možná existuje cesta, jak jedno z nich získat zpět: ostrov Nauru.\n\n[AST.GetFascistParty] zastává hodnoty, které jsou v souladu s našimi zájmy, jednou z nich je úplné oddělení [AST.GetName] od [ENG.GetNameDef]. Vzhledem k současnému omezenému vlivu tohoto hnutí jeho zástupci hledají naši podporu, aby urychlili jeho růst, a jakmile se dostanou plně k moci, trvají na navrácení kontroly nad ostrovem Nauru — za podmínky, že jim při usilování o nezávislost poskytneme záruku."
 AST_diplomatic_events.38.a: "Naše území se vrátí!"
 AST_diplomatic_events.38.b: "Nemůžeme se zavazovat k prázdným slibům."
 AST_diplomatic_events.39.t: "[GER.GetNameDefCap] souhlasí s Nauruským paktem"
 AST_diplomatic_events.39.desc: "[GER.GetNameDefCap] a [AST.GetFascistParty] se dohodli na společném cíli: [AST.GetName] dosáhne nezávislosti. Vzhledem k aktuálně omezenému politickému vlivu [AST.GetFascistParty] přispěje [GER.GetNameDef] grantem, aby urychlil jeho růst, a jakmile náš vliv již nebude omezený, bude dohoda plně uskutečněna."
 AST_diplomatic_events.39.a: "Skvěle!"
 AST_diplomatic_events.40.t: "Nauruský pakt se rozpadá"
 AST_diplomatic_events.40.desc: "Neschopný zavázat se k slibům, které nelze zatím splnit, [GER.GetNameDef] odmítá podporovat náš vzestup k moci. Nauruský pakt končí dříve, než mohl začít, a ambice [AST.GetFascistParty] zůstanou zcela na našich bedrech."
 AST_diplomatic_events.40.a: "[AST.GetFascistParty] bude pokračovat bez německé podpory."
 AST_diplomatic_events.41.t: "Návrat Nauru do německých rukou"
 AST_diplomatic_events.41.desc: "Nyní plně u moci dodržuje [AST.GetFascistParty] svůj slib a plní dohodu. Nauru je vráceno [GER.GetNameDef] a my zajistíme záruku australské nezávislosti."
 AST_diplomatic_events.41.a: "Tak tedy."
 AST_diplomatic_events.42.t: "[AST.GetFascistParty] porušuje svůj slib"
 AST_diplomatic_events.42.desc: "Sliby mají jednu fatální vadu; mohou být zlomeny. Nyní u moci se vůdci [AST.GetFascistParty] rozhodli, že nejenže si Nauru ponechají, ale že si nárokují i další tichomořské ostrovy.\n\nNaše stará tichomořská území zůstanou od nás tak daleko, jako před podpisem Nauruského paktu, a pokud to chceme změnit, bude nutná válka."
 AST_diplomatic_events.42.a: "Budoucnost ukáže následky."
 AST_diplomatic_events.43.t: "[AST.GetNameDefCap] požaduje jihovýchodní Asii"
 AST_diplomatic_events.43.desc: "[AST.GetName] tvrdí, že svou expanzí na sever můžeme zvýšit náš společný vliv nad diplomacií a konflikty v jihovýchodní Asii. Ač to není přímý požadavek, [AST.GetLeader] naznačuje, že odmítnutí nebude přijato."
 AST_diplomatic_events.43.a: "S naší pozorností jinde to bude nejlepší."
 AST_diplomatic_events.43.b: "Každopádně jim odmítneme."
 AST_diplomatic_events.44.t: "Předání jihovýchodní Asie"
 AST_diplomatic_events.44.desc: "[ENG.GetNameDefCap] moudře souhlasil s předáním svých území v jihovýchodní Asii nám. Jak se hranice Austrálie rozšiřují, náš vliv jde ruku v ruce, zbývá jen otázka času, než bude svět náš."
 AST_diplomatic_events.44.a: "Budoucnost vypadá slibně."
 AST_diplomatic_events.45.t: "Jihovýchodní Asie zůstává beze změny"
 AST_diplomatic_events.45.desc: "[ENG.GetNameDefCap] odmítl předat svá území v jihovýchodní Asii nám. Nicméně přízeň kontroly nad regionem je pro nás zjevná a ač nám region nebyl udělen, může se přesto stát naším."
 AST_diplomatic_events.45.a: "Ano, může."
 AST_diplomatic_events.46.t: "Předání suverenity"
 AST_diplomatic_events.46.desc: "[ENG.GetNameDefCap] se rozhodl předat kontrolu nad našimi zeměmi [AST.GetNameDef]. Jelikož se [AST.GetName] nachází v regionu, očekává se, že jeho suzerenství bude efektivnější než britské."
 AST_diplomatic_events.46.a: "Zřejmě v tom nemáme co říct."
 AST_diplomatic_events.47.t: "Sdílení břemen"
 AST_diplomatic_events.47.desc: "Přes nedávné odloučení od Britského společenství nabízí [AST.GetName] vojenskou spolupráci. [AST.GetName] tvrdí, že sdílení břemen by prospělo [ENG.GetNameDefCap], vzhledem k tomu, jak je roztažený po celém světě."
 AST_diplomatic_events.47.a: "Souhlasíme."
 AST_diplomatic_events.47.b: "Postaráme se sami o sebe."
 AST_diplomatic_events.48.t: "Britsko-australský pakt"
 AST_diplomatic_events.48.desc: "[ENG.GetNameDefCap] souhlasil s podpisem paktu o neútočení, čímž položil základy pro vojenskou spolupráci."
 AST_diplomatic_events.48.a: "To znamená novou kapitolu v našich vztazích."
 AST_diplomatic_events.49.t: "Nepodepsaný pakt"
 AST_diplomatic_events.49.desc: "[ENG.GetNameDefCap] odmítl podepsat pakt o neútočení. Náš pokus o navázání vojenské spolupráce mezi našimi dvěma zeměmi tedy selhal a musíme pokračovat sami ve svých vnějších postupech."
 AST_diplomatic_events.49.a: "To skutečně musíme."
 AST_diplomatic_events.50.t: "Australská tichomořská posádka"
 AST_diplomatic_events.50.desc: "Ač ochrana jihovýchodní Asie a Tichomoří leží v zájmu Británie, region je daleko od Britských ostrovů; [FROM.GetName] to pochopil. Výměnou za naši podporu v zásobování nabídl převzít velení obrany území, což nám umožní zaměřit pozornost jinam."
 AST_diplomatic_events.50.a: "Pomoc [FROM.GetName] přivítáme."
 AST_diplomatic_events.50.b: "Region je dost blízko."
 AST_diplomatic_events.51.t: "[ENG.GetNameDefCap] tichomořská posádka"
 AST_diplomatic_events.51.desc: "[FROM.GetNameDefCap] souhlasí; vody jihovýchodní Asie budou chráněny námi. Výměnou za britské dodávky paliva vloží [ROOT.GetName] úsilí do zvýšení námořní převahy v našich sousedních vodách."
 AST_diplomatic_events.51.a: "Vody budou naše."
 AST_diplomatic_events.52.t: "Austrálie: vlastní tichomořská posádka"
 AST_diplomatic_events.52.desc: "[FROM.GetNameDefCap] nesouhlasí; k obraně vod jihovýchodní Asie nepotřebují naši pomoc. Nicméně s britskou podporou či bez ní vloží [ROOT.GetName] úsilí do upevnění námořní převahy v sousedních vodách."
 AST_diplomatic_events.52.a: "Vody budou naše."
 AST_diplomatic_events.53.t: "Vichy pryč z Afriky"
 AST_diplomatic_events.53.desc: "[AST.GetName] tuší, že pád nebo spolupráce Vichy France je jedním z hlavních cílů [ENG.GetNameDef], a proto nabídl, že se připojí a bude usilovat o francouzské africké kolonie, dokud nebude Vichy potlačeno. Ač za návrhem může ležet neznámé pozadí, není pochyb, že zvýšená spojenecká přítomnost v regionu by nám prospěla.\n\nPokud udělíme souhlas, [AST.GetName] zahájí jednání s Vichy France, usilujíc o pokojné předání jejich kolonií a zřízení australské posádky."
 AST_diplomatic_events.53.a: "Přivítáme jejich podporu."
 AST_diplomatic_events.53.b: "Riziko, že by [AST.GetName] toho mohlo zneužít proti nám, je příliš velké."
 AST_diplomatic_events.54.t: "Na jejich pomoc"
 AST_diplomatic_events.54.desc: "[ENG.GetNameDefCap] souhlasí: zvýšená spojenecká přítomnost v Africe by pro Společenství byla ku prospěchu.\n\nZahájíme jednání s Vichy France, usilujíc o pokojné předání jejich kolonií a zřízení australské posádky."
 AST_diplomatic_events.54.a: "Tak učiníme."
 AST_diplomatic_events.55.t: "S povolením nebo bez něho"
 AST_diplomatic_events.55.desc: "[ENG.GetNameDefCap] odmítá australskou pomoc v Africe a záležitost Vichy France vyřeší sám. Nicméně naše ambice nejsou snadno odvratitelné.\n\nAustralská kontrola nad africkými územími Vichy France by nás učinila rovnocennými Britskému společenství místo jeho podřízených. Musíme je následovat přes jejich přání, ačkoli to bude nutně silou."
 AST_diplomatic_events.55.a: "Budeme expandovat."
 AST_diplomatic_events.56.t: "[AST.GetName] požaduje africké území"
 AST_diplomatic_events.56.desc: "Za [ENG.GetNameDef] klepe na naše dveře [AST.GetName] a požaduje převod afrických území.\n\n[ENG.GetNameDefCap] je odhodlána rozšířit svou kontrolu v Africe, a pokud nepřistoupíme na australskou okupaci, vrátí se k nám ozbrojená."
 AST_diplomatic_events.56.a: "Abychom se vyhnuli konfliktu, území budou předána."
 AST_diplomatic_events.56.b: "Nechť se tedy vrátí ozbrojeni."
 AST_diplomatic_events.57.t: "Vichy převede africké území"
 AST_diplomatic_events.57.desc: "Vichy France souhlasila s předáním požadovaných afrických území a umožnila australské posádce uchopit kontrolu nad regionem."
 AST_diplomatic_events.57.a: "Další expanze v Africe bude pokračovat!"
 AST_diplomatic_events.58.t: "Vichy odmítá [AST.GetName] území"
 AST_diplomatic_events.58.desc: "Vichy France odmítla předat africká území nám. To však nebyl požadavek, ale nařízení.\n\nBudeme usilovat o region, který nám odepřeli, byť to bude nutně silou."
 AST_diplomatic_events.58.a: "Pokojně či násilím, [AST.GetName] se rozšíří."
 AST_diplomatic_events.62.t: "Pakt proti Británii?"
 AST_diplomatic_events.62.desc: "Diplomaté z [AST.GetName] k nám přišli s nabídkou uzavření paktu proti Británii. To by zahrnovalo jejich pomoc při znovuzískání severního Irska od Anglů, aniž bychom museli přímo zasahovat.\n Výměnou, pokud uspějí, bychom se připojili k jejich frakci a podpořili je v případné válce proti Británii.\nAč je sjednocení severu lákavé, musíme pečlivě zvážit, zda jsme v pozici si silnějšího souseda takto poštvat, a hlavně, zda bychom v konfliktu mohli vyjít vítězně — aby se celý ostrov Irska opět nestal pouhou britskou kolonií."
 AST_diplomatic_events.62.a: "Sjednocení nemůže čekat! Podepište pakt!"
 AST_diplomatic_events.62.b: "Je to příliš nebezpečné."
 AST_diplomatic_events.63.t: "Irsko odmítá!"
 AST_diplomatic_events.63.desc: "Irsko odmítlo podepsat Pakt proti Británii."
 AST_diplomatic_events.63.a: "Pak Irsko zůstane rozdělené."
 AST_diplomatic_events.64.t: "Irsko přijalo!"
 AST_diplomatic_events.64.desc: "Irsko souhlasilo s podepsáním Paktu proti Británii."
 AST_diplomatic_events.64.a: "Vpřed, do Belfastu!."
 AST_diplomatic_events.65.t: "[FROM.GetName] poskytuje podporu"
 AST_diplomatic_events.65.desc: "Rostoucí vliv [FROM.GetCommunistParty] v [FROM.GetNameDef] nyní přináší ovoce, jelikož jeho zástupci přicestovali přes Čínu, aby nám sdělili, že se mobilizuje [FROM.GetAdjective] dobrovolnická síla, která má podpořit naše jednotky. Kromě toho tito dobrovolníci přinášejí náhradní vybavení, které pomůže vyzbrojit naše vlastní jednotky."
 AST_diplomatic_events.65.a: "Dobrý začátek spolupráce s našimi [FROM.GetAdjective] spojenci"
 AST_diplomatic_events.66.t: "[FROM.GetName] děkuje za naši podporu"
 AST_diplomatic_events.66.desc: "Zástupci [FROM.GetLeader] předali poděkování za podporu našich dobrovolníků a dodaného válečného materiálu. [FROM.GetAdjective] rozsáhlé zkušenosti s občanskou válkou jistě znamenají, že tyto zdroje budou efektivně využity."
 AST_diplomatic_events.66.a: "Skvělý první krok"
 AST_diplomatic_events.67.t: "[FROM.GetName] děkuje za naši podporu"
 AST_diplomatic_events.67.desc: "Zástupci [FROM.GetLeader] předali poděkování za podporu našich dobrovolníků a dodaného válečného materiálu. [FROM.GetAdjective] rozsáhlé zkušenosti s občanskou válkou jistě znamenají, že tyto zdroje budou efektivně využity."
 AST_diplomatic_events.67.a: "Skvělý první krok"
 AST_diplomatic_events.68.t: "Australské požadavky"
 AST_diplomatic_events.68.desc: "Austrálie nechce čelit svému ohromnému nepříteli sama — [JAP.GetNameDef]. Tlačí na nás, abychom udělali první krok a vyřešili blížící se konflikt co nejdříve."
 AST_diplomatic_events.68.a: "Jak se věci obrátily."
 AST_diplomatic_events.69.t: "Opět spojeni"
 AST_diplomatic_events.69.desc: "Vazba mezi [ENG.GetNameDef] a [AST.GetName] je vystavena zkoušce, ale druhá jmenovaná je odhodlána ji znovu posílit. [AST.GetName] má v britské vládě tolik kontaktů a spojenců, že její představitelé jim prostě nemohou odmítnout; národy vstoupí opět do téže frakce a ostrovy i země na druhé straně světa budou znovu spolupracovat."
AST_diplomatic_events.69.a: "Tak tomu bude."
AST_diplomatic_events.71.t: "Austrálie žádá tichomořské ostrovy"
AST_diplomatic_events.71.desc: "[AST.GetName] požádal o kontrolu nad našimi tichomořskými ostrovy s tvrzením, že západní Tichomoří není pro [USA.GetNameDef] k velení. Ostrovy mohou být malou cenou za uklidnění australské nepřátelskosti, ale přesto cenou. Riskneme provokaci rostoucí fašistické moci, když už máme plné ruce práce?"
AST_diplomatic_events.71.a: "Ne, neuděláme to."
AST_diplomatic_events.71.b: "Tichomořské ostrovy zůstanou naše."
AST_diplomatic_events.72.t: "Předání tichomořských ostrovů [USA.GetNameDef]"
AST_diplomatic_events.72.desc: "S už tak vytíženýma rukama se tichomořské ostrovy ukázaly být malou cenou, kterou [USA.GetNameDef] zaplatil, aby uklidnil australskou nepřátelskost. Jejich tichomořské ostrovy jsou nyní naše."
AST_diplomatic_events.72.a: "Výborně."
AST_diplomatic_events.73.t: "[USA.GetNameDefCap] odmítá"
AST_diplomatic_events.73.desc: "[USA.GetNameDefCap] odmítl vzdát se svých tichomořských ostrovů nám. Navzdory našim požadavkům a rostoucímu vlivu v Tichomoří Washington zůstává neochotný pustit ostrovy."
AST_diplomatic_events.73.a: "Ty ostrovy ještě nemusí být naše."
AST_diplomatic_events.74.t: "Australský požadavek na předání [PHI.GetNameDef]"
AST_diplomatic_events.74.desc: "Ve své touze rozšířit území požaduje [AST.GetName] kontrolu nad [PHI.GetNameDef]. Pokud odmítneme, [AST.GetName] hrozí válkou, považujíc za nepřijatelné, že [USA.GetNameDef] drží území v oblasti jejich sféry vlivu."
AST_diplomatic_events.74.a: "Nemůžeme riskovat válku; vyhovíme jejich požadavkům."
AST_diplomatic_events.74.b: "Filipíny zůstanou naše!"
AST_diplomatic_events.75.t: "Předání [PHI.GetNameDef]"
AST_diplomatic_events.75.desc: "Je jasné, že vzestup [AST.GetName] jako fašistické mocnosti začíná přinášet určité výhody, když se národy tak obávají naší zuřivosti. [USA.GetNameDefCap] souhlasil; [PHI.GetNameDef] je náš."
AST_diplomatic_events.75.a: "Vynořuje se nový řád."
AST_diplomatic_events.76.t: "[USA.GetNameDefCap] odmítá"
AST_diplomatic_events.76.desc: "[USA.GetNameDefCap] odmítl vzdát se [PHI.GetNameDef] nám. Navzdory našim požadavkům a rostoucímu vlivu v Tichomoří Washington zůstává neochotný pustit teritorium."
AST_diplomatic_events.76.a: "To znamená válku."
AST_political_events.1.t: "Vyhlášení referenda"
AST_political_events.1.desc: "Jsou dvě oblasti, v nichž se vláda snaží zvýšit federální kontrolu: letectví a marketing.\n\nCo se týče letectví, cílem je změnit Ústavu tak, aby Parlament Commonwealthu získal pravomoc vydávat zákony týkající se letecké navigace a letadel.\n\nNovela o marketingu umožní spolupráci mezi Commonwealthem a státy v oblasti marketingu zemědělských produktů, což je nyní ústavně nemožné.\n\nNa které z nich vyhlásíme referendum?"
AST_political_events.1.a: "Letecká doprava, k regulaci letecké navigace po celém [AST.GetName]."
AST_political_events.1.a.tt: "Jakmile reforma projde:\n Přidá §YPassed Aviation Reform§!, které dává:\n Rychlost leteckého výzkumu: §G+15%§!\n Rychlost výstavby §YLetecké základny§!: §G+5.00%§!"
AST_political_events.1.b: "Marketing, k koordinaci celostátních marketingových programů zemědělských produktů."
AST_political_events.1.b.tt: "Jakmile reforma projde:\n Přidá §YPassed Marketing Reform§!, které dává:\n Faktor továren na spotřební zboží: §Y-10.0%§!"
AST_political_events.2.t: "Úspěšné referendum"
AST_political_events.2.desc.a: "Veřejnost souhlasila s uvedením naší letecké reformy v platnost. Jelikož letectví neexistovalo, když byla psána Australská ústava, je správné, že vláda konečně převezme pravomoc nad leteckou navigací a regulací. Ve prospěch bezpečnosti a efektivity nyní nastanou jednotné národní letecké zákony."
AST_political_events.2.desc.b: "Veřejnost souhlasila s uvedením naší reformy marketingu v platnost. S pravomocí regulovat zemědělské produkty a jejich marketing bude vláda schopna stabilizovat trhy a zlepšit spolupráci mezi státy. Příjmy zemědělců se stanou stabilnějšími, a stejně tak i národní ekonomika."
AST_political_events.2.a: "Federální kontrola se rozšíří!"
AST_political_events.4.t: "Premiér podlehl"
AST_political_events.4.desc: "Premiér dlouho pociťoval tlak válečných příprav a nakonec to jeho srdce nevydrželo; [AST.GetLeader] zemřel na infarkt.\n\nVzhledem k současnému stavu světa bude jeho vedení bolestně postrádáno. Austrálie však musí pokračovat i bez něj."
AST_political_events.4.a: "Národní tragédie."
AST_political_events.5.t: "Australská vláda přitvrzuje"
AST_political_events.5.desc: "Vznikla skupina vzdorovitých a kontroverzních hlasů: Hnutí Australia First. Vláda se obává, že jeho úmysly nemusí být zcela demokratické, a rozhodla se skupinu i její členy sledovat. Demokratické zásahy omezí jejich schopnosti organizovat se a potlačí nábor nových členů."
AST_political_events.5.a: "Čas ukáže pravou povahu hnutí."
AST_political_events.6.t: "Sesquicentenárium 1938"
AST_political_events.6.desc: "Dnes dopoledne, zatímco se odehrávala oslava 150. výročí a průvod „Austrálie na cestě k národu“ procházel hlavními ulicemi Sydney, byl před Australia Hall uspořádán protest.\n\nAktivisté za práva původních obyvatel a jejich skupiny se sešli, aby upozornili na to, že 150. výročí nejen připomíná začátek britské kolonizace, ale i ústavní diskriminaci domorodých obyvatel. Aktivisté požadovali nové zákony pro vzdělávání a péči o původní obyvatele a novou politiku umožňující povýšení domorodých obyvatel na plnoprávné občany."
AST_political_events.6.a: "Je třeba jednat."
AST_political_events.7.t: "Imperiální nátlak"
AST_political_events.7.desc: "Po nedávných událostech již nelze popřít, že se australská politika mění. Británie podnikla kroky, aby diplomaticky zajistila, že [AST.GetName] zůstane na cestě vhodné pro zemi pod jejich společenstvím, doufajíc, že jejich nenásilné postrčení udrží Dominion loajálním."
AST_political_events.7.a: "Navzdory britským pokusům si [AST.GetName] určí vlastní cestu."
AST_political_events.8.t: "Blíží se válka"
AST_political_events.8.desc: "$AST_war_is_coming_cat_desc$"
AST_political_events.8.a: "Musíme se připravit."
AST_political_events.9.t: "Spor o Dalfram"
AST_political_events.9.desc: "To, co začalo jako sporná záležitost ohledně nakládání s litinou, vyvolalo něco mnohem většího. Dělníci po celé Austrálii přistoupili ke stávce na protest, vzdorují vládě i průmyslu. Jak se stávky šíří a napětí roste, krize se vymyká kontrole a vyžaduje rezignaci těch u moci. Vláda selhala situaci zvládnout, a tak skutečně odstoupila, čímž se pozice vládnoucí strany otevřela [AST.GetCommunistParty]."
AST_political_events.9.a: "A uplatníme si nárok."
AST_canberra_air_disaster_events.1.t: "Letecká nehoda v Canbeře"
AST_canberra_air_disaster_events.1.desc: "Dnes dopoledne havarovalo letadlo Lockheed Hudson přímo u Canberry. Mezi deseti lidmi na palubě, kteří všichni tragicky zahynuli, byli tři vládní úředníci svolaní na zasedání kabinetu.\n\nCo havárii způsobilo, zůstává záhadou; počasí bylo ideální a let pilotoval zkušený důstojník RAAF Flight Lieutenant Robert Hitchcock.\n\nAť už byla příčina jakákoli, je to černý den pro celý národ — zejména pro rodiny a přátele obětí — a Austrálie nyní hledí na své vůdce. Jak zareagují?"
AST_canberra_air_disaster_events.1.a: "Hrozně tragická událost."
AST_canberra_air_disaster_events.1.a.tt: "Odemkne rozhodnutí §Y'Cabinet Trust'§! a §Ymisi§! k záchraně nebo odstranění současné vlády."
AST_canberra_air_disaster_events.2.t: "[AST.GetRulingParty] zvítězila"
AST_canberra_air_disaster_events.2.desc: "Současná vláda úspěšně vedla Austrálii skrz národní zmatek po letecké nehodě u Canberry. Jako světlo v temnotě ukázala [AST.GetRulingParty] svou spolehlivost a sílu v dobách zkoušky, čímž si nakonec zvýšila veřejnou podporu po celé zemi."
AST_canberra_air_disaster_events.2.a: "Budoucnost je před námi."
AST_canberra_air_disaster_events.3.t: "Hlasování o nedůvěře"
AST_canberra_air_disaster_events.3.desc: "Po úspěšném návrhu na vyslovení nedůvěry je konečně nahrazena současná vláda a zdráhavě přenechává moc svým nástupcům. Po období politické nestability a veřejné nedůvěry je Austrálie připravena na nový začátek."
AST_canberra_air_disaster_events.3.a: "Nové vedení pro Austrálii."
AST_canberra_air_disaster_events.4.t: "Změna vedení"
AST_canberra_air_disaster_events.4.desc: "Po období politické nestability a veřejné nedůvěry [AST.GetRulingParty] vyměnila své vedení. Většinové hlasování donutilo premiéra odstoupit a umožnilo jeho nástupci převzít funkci."
AST_canberra_air_disaster_events.4.a: "Snad to otevře cestu pro Austrálii."
AST_canberra_air_disaster_events.5.t: "Australská obvinění"
AST_canberra_air_disaster_events.5.desc: "Na tiskové konferenci na nás [AST.GetName] vyslovil obvinění, že jsme odpovědní za nedávnou leteckou havárii na australském území, při níž zahynulo několik politických činitelů.\n\nTato obvinění jsou samozřejmě zcela nepravdivá, což dělá tento akt neúcty o to zlomyslnějším."
AST_canberra_air_disaster_events.5.a: "Obvinění jsou nepravdivá, nemusíme jednat."
AST_canberra_air_disaster_events.5.b: "To nezůstane bez trestu."
AST_canberra_air_disaster_events.6.t: "[JAP.GetNameDefCap] odplácí"
AST_canberra_air_disaster_events.6.desc: "[JAP.GetNameDefCap] naše obvinění nebral na lehkou váhu a považuje je za první akt agrese. [JAP.GetLeader] eskaloval konflikt ještě více a prohlásil, že má nyní plné právo na invazi na naše území."
AST_canberra_air_disaster_events.6.a: "Nebudeme dál zvyšovat napětí."
AST_canberra_air_disaster_events.6.b: "To nemůže zůstat bez odpovědi."
INS_limited_war_events.1.t: "Zničit Malajsko!"
INS_limited_war_events.1.desc: "Nepřátelské linie se zhroutily a naši muži postupují nebráněni. Napříč průlivem britský loutkový stát pod tíhou lidového hněvu praská. Loutky Londýna doufaly, že jejich bajonety je ochrání před historií. Mýlily se."
INS_limited_war_events.1.a: "Merdeka!"
INS_limited_war_events.1.b: "Skvělý den pro republiku."
INS_limited_war_events.2.t: "[FROM.GetAdjective] protiútok"
INS_limited_war_events.2.desc: "To, co bylo slíbeno jako rychlý úder proti loutkovému režimu, se zvrhlo. [FROM.GetAdjective] síly, posílené svými imperiálními pány, vyhnaly naše muže z kontestované oblasti a nyní tam sedí jako okupanti. Každý den rozhlas hlásí jejich chválu. Pokračovat znamená další ponížení, ale ustoupit je přiznáním porážky před celým souostrovím."
INS_limited_war_events.2.a: "Stáhněte muže. Zachraňme, co můžeme."
INS_limited_war_events.2.b: "Nevzdáme se loutkám!"
INS_limited_war_events.3.t: "[FROM.GetName] se podřídil Republice"
INS_limited_war_events.3.desc: "Přišly zprávy z Kuala Lumpuru. Loutková vláda, opuštěná ve chvíli rozhodnutí svými londýnskými pány, přijala naše podmínky, než by viděla svá města v plamenech. Sporná území jsou naše. Lekce to bude i pro ostatní klientské státy regionu."
INS_limited_war_events.3.a: "Indonésie povstává."
INS_limited_war_events.4.t: "[FROM.GetName] odmítá naše podmínky"
INS_limited_war_events.4.desc: "[FROM.GetName] nám odmítl nabídku. Loutkoví ministři, čtoucí ze scénáře napsaného ve Whitehallu, prohlašují, že ani šířečka půdy nebude vzdána a že Republika musí být zkrocená předtím, než utichnou zbraně."
INS_limited_war_events.4.a: "Nechť promluví zbraně."
INS_limited_war_events.5.t: "[FROM.GetNameDef] volá po naší zkáze"
INS_limited_war_events.5.desc: "[FROM.GetNameDefCap] svlékl poslední přetvář umírněné války. Jejich rozhlasy nyní otevřeně mluví o rozparcelování Republiky a přerozdělení jejích ostrovů mezi staré koloniální mocnosti. Není tu žádné klidné zakončení. Buď Indonésie po skončení stojí, nebo nestojí vůbec."
INS_limited_war_events.5.a: "Stojíme nebo padneme společně."
INS_limited_war_events.6.t: "Postup [FROM.GetAdjective] uvadl"
INS_limited_war_events.6.desc: "Útok [FROM.GetAdjective] nás zaskočil a na chvíli jsme se obávali nejhoršího. Jejich tlak však zapadl do bahna. Jejich muži jsou unavení, linie dlouhé a vytahování z Whitehallu slábne s každým rozhlasem. Republika může ještě nabídnout loutkám cestu k ústupku, i když mnozí řeknou, že čisté vítězství je lepší než mír."
INS_limited_war_events.6.a: "Nabídněme jim podmínky."
INS_limited_war_events.6.b: "Žádná milost pro loutky."
INS_limited_war_events.7.t: "Naše ofenzíva se zastavuje"
INS_limited_war_events.7.desc: "Náš postup se zasekl a co je horší, nepřítel to ví. Přišla žádost z druhé strany průlivu: položte zbraně nyní a přijměte jejich podmínky, nebo sledujte, jak se seznam obětí prodlužuje pro stejný výsledek. Volba, kterou nabízejí, je velikost pohřbu."
INS_limited_war_events.7.a: "Lepší chabý mír než horší válka."
INS_limited_war_events.7.b: "Republika se nevzdá."
INS_limited_war_events.8.t: "[FROM.GetName] odmítá ustoupit"
INS_limited_war_events.8.desc: "[FROM.GetName] odpověděl na naši nabídku výsměchem. Jejich ministři prohlašují, že raději uvidí každý kampung od Penang po Johor v plamenech, než by vzdali jediný centimetr půdy Republiky. Tak válka pokračuje."
INS_limited_war_events.8.a: "Ať tak bude."
INS_limited_war_events.9.t: "[FROM.GetName] chce rozbít Republiku!"
INS_limited_war_events.9.desc: "Odposlechy z velení nepřítele potvrdily nejhorší. Nebude žádné urovnání, žádný měřený mír, žádný návrat na linie, které jsme drželi dříve. Loutky a jejich londýnští páni požadují úplné kapitulace Republiky, aby byla Indonésie zlámaná a její ostrovy vráceny imperiálním bostem. Na to existuje jen jedna odpověď."
INS_limited_war_events.9.a: "Indonésie stojí!"
AST_union_control_events.1.t: "Zahraniční agenti v našich odborech"
AST_union_control_events.1.desc: "Zpravodajské služby přinesly vládě znepokojivou zprávu. Australscí komunističtí operativci navazují kontakty s místními odborovými vůdci, rozdávají radikální literaturu a povzbuzují dělníky k organizaci revolučních struktur. Hnutí je prozatím malé, ale bezpečnostní úředníci varují, že právě takto to obvykle začíná. Je třeba rozhodnout dříve, než se to uchytí."
AST_union_control_events.1.a: "Mějte je pod dohledem. Budeme sledovat a čekat."
AST_union_control_events.4.t: "Komunističtí infiltrátoři obsadili [MAL.GetAdjective] území"
AST_union_control_events.4.desc: "Šokující hlášení dorazilo vládě. Koordinovaná operace obsadila jeden z našich států a vyhlásila ho součástí revoluční vlády. Rychlost a organizace útoku vyvolává nepříjemné otázky — naše zpravodajské služby tuší, že povstalci nejednali sami a že cizí ruce je mohly navést na naše pobřeží. Ti, kteří unikli obsazení, se nevzdali. Seskupili se znovu a chopili zbraní, odhodláni získat to, co jim bylo vzato."
AST_union_control_events.4.a: "Zjistěte, kdo za tím stojí. Ti povstalci to území dlouho neudrží."
AST_union_control_events.4.a.tt: "Protikomunistické milice se seskupily a vznikly, aby odolaly komunistické okupaci."
AST_union_control_events.5.t: "Katastrofa [MAL.GetAdjective]"
AST_union_control_events.5.desc: "Operace skončila katastrofálně. Naše jednotky se nedostaly na pobřeží. Byly odraženy loajalistickými hlídkami, zabloudily v průlivech nebo byly zajaty, dříve než si stihly upevnit pozici. Detaily jsou mlhavé, ale výsledek je jasný. Navíc se o záležitosti doslechla tisk. V parlamentu se nyní kladou otázky, co přesně naše síly v těch vodách prováděly. Veřejná reakce je šok a ostuda. Jakékoli zisky, které jsme doufali zajistit pro revoluci, si musíme najít jinou cestu."
AST_union_control_events.5.a: "Hrozné nezdar. Musíme se obrátit k jiným cestám podpory našich spojenců."
AST_union_control_events.3.t: "V [MAL.GetNonIdeologyName] propuká revoluce"
AST_union_control_events.3.desc: "Dělníci v [MAL.GetNonIdeologyName] povstali. Komunistické buňky, vyživované naší dlouhodobou kampaní, pozvedly zbraně po celé zemi — ale obraz z bojiště je znepokojující. Revoluční síly se ocitly soustředěny na špatných místech, oddělené od jádra poloostrova vodou a džunglí. Bez opěrného bodu na pevnině vláda prostě počká a hladoví revoluci, než se rozšíří. Austrálie musí jednat tajně a rychle, vylodit bojovníky na poloostrov a poskytnout revoluci prostor k přežití."
AST_union_control_events.3.a: "Nemůžeme nechat revoluci zemřít na pláži. Zajistěte jim opěrný bod."
AST_union_control_events.2.t: "Agitátoři podporovaní [AST.GetAdjective] na našich ulicích"
AST_union_control_events.2.desc: "Agentury australské komunistické vlády dorazily do našich měst. Ne skrývají se — letáky se rozdávají u vrátek továren, projevy jsou pronášeny na veřejných náměstích a sítě solidarity se budují mezi australskými operativci a místními radikálními skupinami. Existující sítě cizího vlivu se zdají být přes noc znovu oživeny. Jedná se o koordinovanou kampaň a vláda musí rozhodnout, jak zareagovat, dříve než se lidové nespokojenosti promění v něco horšího."
AST_union_control_events.2.b: "Znepokojivý vývoj."
ABDA_events.1.t: "Pozvání do nového vrchního velení"
ABDA_events.1.desc: "[FROM.GetNameDef] založil společné vrchní velení pro tichomořské válčiště a předložil nám pozvání k připojení. Iniciativa — známá jako ABDACOM — usiluje o spojení námořních, vzdušných a pozemních sil spojeneckých zemí působících v regionu pod jednotnou velitelskou strukturou. Členství by znamenalo bližší koordinaci s [FROM.GetNameDef] a dalšími partnery již zapojenými do snahy. Musíme se rozhodnout, zda přijmeme."
ABDA_events.1.a: "Budeme stát společně."
ABDA_events.1.b: "V současné době se k tomu nemůžeme zavázat."
ABDA_events.2.t: "[FROM.GetName] se připojuje k ABDACOM"
ABDA_events.2.desc: "[FROM.GetNameDef] přijal naše pozvání připojit se k vrchnímu velení ABDACOM. Jejich síly nyní budou působit pod jednotnou velitelskou strukturou, což posílí naši pozici v tichomořském válčišti."
ABDA_events.2.a: "Vítaný vývoj."
ABDA_events.3.t: "[FROM.GetName] odmítá účast"
ABDA_events.3.desc: "[FROM.GetNameDef] odmítl naše pozvání k vrchnímu velení ABDACOM. Jejich síly v tuto chvíli nebudou zapojeny do společného úsilí, i když dveře zůstávají otevřené."
ABDA_events.3.a: "Nešťastné, ale bereme na vědomí."
ABDA_events.5.t: "Pozvání připojit se k ABDACOMu"
ABDA_events.5.desc: "[FROM.GetNameDef] nás pozval, abychom se připojili k Americko-Britsko-Nizozemsko-Australskému velitelskému uspořádání. ABDACOM se již ustavil jako vrchní koordinační autorita spojeneckých sil v tichomořském válčišti, sdružující námořnictva a armády hlavních spojeneckých mocností pod jedním velením. Členství by zapojilo naše síly do této jednotné struktury s přístupem k sdílenému zpravodajství, koordinované doktríně a plné podpoře spojenců. Musíme se rozhodnout."
ABDA_events.5.a: "Budeme stát společně."
ABDA_events.5.b: "V současné době se k tomu nemůžeme zavázat."
ABDA_events.4.t: "Obrana Singapuru"
ABDA_events.4.desc: "Se Singapurem jako oporou obranného perimetru ABDACOM musí naši velitelé rozhodnout, jak investovat do jeho opevnění. Můžeme upřednostnit námořní přístupy a obranu přístavu, zpevnit přístupy po zemi proti pozemnímu útoku, nebo rozdělit zdroje mezi obě. Každá volba ovlivní, jak bude Singapur bráněn, až nepřítel přijde."
ABDA_events.4.a: "Zesílit námořní přístupy. Síla Singapuru je v jeho přístavu."
ABDA_events.4.b: "Opevnit pozemní perimetr. Skutečná hrozba přijde po zemi."
ABDA_events.4.c: "Vyvážený přístup. Žádný směr útoku nesmí zůstat nebráněný."
ABDA_fortress_singapore_choice_tt: "Dokončení tohoto zaměření předloží volbu, jak opevnit Singapur."
