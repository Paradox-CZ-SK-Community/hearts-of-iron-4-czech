 INDUSTRY_TITLE_PRODUCTION: "VÝROBA"
 INDUSTRY_TITLE_OIL: "SYNTETICKÁ ROPA"
 INDUSTRY_TITLE_CONSTRUCTION: "VÝSTAVBA"
 JET_ENGINES_RESEARCHED: "Umožňuje výzkum technologií, které vyžadují proudové motory, jako jsou proudové letouny"
 cat_fleet_in_being: "Doktrína přítomnost flotily"
 air_equipment: "Letadla"
 bicycle_infantry: "Cyklistická pěchota"
 bicycle_infantry_desc: "Pravidelná pěchota na bicyklech je mobilnější než jejich pěší protějšky, a to za velmi skromnou cenu."
 torpedo_cruiser_mtg: "Torpédový křižník"
 amphibious_mechanized_infantry: "Obojživelné traktory"
 amphibious_mechanized_infantry_desc: "Obojživelné traktory neboli Amtracs umožňují vylodění mariňáků na pláži pod obrněnou ochranou. Je to však za cenu nízké palivové účinnosti."
 amphibious_mechanized_infantry_2: "Vylepšené obojživelné traktory"
 amphibious_mechanized_infantry_2_desc: "Tyto Amtraky mají oproti základní verzi několik vylepšení, například zadní nakládací rampu pro snadnější vykládání na pláži."
 amphibious_tank: "Obojživelný tank"
 amphibious_tank_desc: "Obojživelné tanky jsou určeny k tomu, aby poskytovaly mariňákům palebnou podporu při útoku na pláž."
 amphibious_tank_2: "Vylepšený obojživelný tank"
 amphibious_tank_2_desc: "Druhá generace obojživelných tanků má lepší ochranu a vyšší palebnou sílu."
 NAVAL_TITLE_MINES: "MINOVÁ VÁLKA"
 basic_naval_mines: "Kontaktní mina"
 basic_naval_mines_desc: "Jednoduchá plovoucí bomba, zakotvena na mořském dně. Mina exploduje při styku s lodí."
 improved_naval_mines: "Magnetická mina"
 improved_naval_mines_desc: "Tato sofistikovaná mina exploduje, když zjistí změny v magnetickém poli způsobeném procházející lodí."
 advanced_naval_mines: "Akustická mina"
 advanced_naval_mines_desc: "Tento typ námořní miny detonuje, když její senzory detekují hluk v blízkosti plavidla."
 modern_naval_mines: "Tlaková mina"
 modern_naval_mines_desc: "Tato vysoce pokročilá mina detekuje malé změny ve vodním tlaku způsobené lodí, která se pohybuje poblíž."
 degaussing: "Demagnetizování"
 degaussing_desc: "Instalací výkonných elektromagnetických cívek lze výrazně snížit magentickou signaturu lodi, takže je mnohem méně zranitelná vůči magnetickým minám."
 submarine_mine_laying: "Pokládání min ponorkou"
 submarine_mine_laying_desc: "Instalací speciálního vybavení pro držení a uvolnění min může speciálně navržená ponorka nasazovat miny pod hladinou a, doufejme, neodhalena."
 improved_submarine_mine_laying: "Pokládání min z torpédových trubic"
 improved_submarine_mine_laying_desc: "Předělání min pro umístění do torpédových trubic umožňuje každé ponorce stát se minonoskou, byť na úkor nesených torpéd."
 airdrop_mines: "Letecké zaminování"
 airdrop_mines_desc: "Díky vybavení min malým padákem je možné je bezpečně shazovat z letadel, což umožní rychlé a efektivní vytváření minových polí."
 airdrop_mines_bba: "$airdrop_mines$"
 airdrop_mines_bba_desc: "$airdrop_mines_desc$"
 airsweep_mines: "Letecké odminování"
 airsweep_mines_desc: "Letadla mohou být vybavena speciálním zařízením pro detekci a bezpečné odpalování námořních min ze vzduchu."
 airsweep_mines_bba: "$airsweep_mines$"
 airsweep_mines_bba_desc: "$airsweep_mines_desc$"
 naval_mines: "Technologie minového boje"
 concentrated_industry_category: "Technologie koncentrovaného průmyslu"
 dispersed_industry_category: "Technologie rozptýleného průmyslu"
 NAVAL_TITLE_ARMAMENT: "VÝZBROJ"
 NAVAL_TITLE_TORPEDOES: "TORPÉDA"
 NAVAL_TITLE_DAMAGE_CONTROL: "ŘÍZENÍ ŠKOD"
 NAVAL_TITLE_FIRE_CONTROL: "METODY ŘÍZENÍ PALBY"
 early_ship_hull_carrier: "Přestavby paluby"
 early_ship_hull_carrier_short: "Přestavby paluby"
 early_ship_hull_carrier_desc: "Přestavby starých trupů umožňují levné experimenty s námořním letectvím, aby získaly zkušenosti v budování a provozování letadlových lodí. Tyto lodě budou méně schopné než cíleně stavěná letadlová loď, ale mnohem rychleji se vytvoří."
 cruiser_submarines: "Křižník ponorka"
 midget_submarines: "Miniponorky"
 fleet_submarines: "Ponorková flotila"
 coastal_defense_ships: "Lodě pobřežní obrany"
 pre_dreadnoughts: "Před-dreadnoughtské lodě"
 basic_ship_hull_heavy: "1936 Trup těžké lodě"
 basic_ship_hull_heavy_short: "1936 Těžký trup lodi"
 basic_ship_hull_cruiser: "1936 Trup křižníku"
 basic_fire_control_system: "Základní systém řízení palby"
 basic_fire_control_system_desc: "Veškerá palba lodních děl je řízena z centrální pozice, což zajišťuje těsnější seskupení výstřelů a zvyšuje přesnost."
 improved_fire_control_system: "Vylepšený systém řízení palby"
 improved_fire_control_system_desc: "Zadáním kurzu, rychlosti a vzdálenosti cíle může mechanický počítač přesně předpovědět, kde se cíl bude nacházet, když bude další salva připravena k vypálení."
 advanced_fire_control_system: "Pokročilý systém řízení palby"
 advanced_fire_control_system_desc: "Velký a složitý mechanický počítač, který sleduje velké množství vstupních údajů o cíli, střílející lodi, povětrnostních podmínkách a stavu moře, umožňuje velmi přesné balistické výpočty."
 sonar: "Pasivní sonar"
 sonar_desc: "Základní souprava hydrofonů umožňuje sledovat podvodní cíle detekováním zvuku, který vydávají.\n\nInstalace tohoto modulu do §YElektronického slotu§! na §YLehkých lodích§! nebo §YKřižnících§! jim pomůže detekovat nepřátelské §YPonorky§!."
 improved_sonar: "Aktivní sonar"
 improved_sonar_desc: "Použitím modulovaných zvukových vln může tento systém přesně měřit azimut a vzdálenost k ponořenému cíli.\n\nUpevnění tohoto modulu v §YElektronickém slotu§! na §YLehkých lodích§! nebo §YKřižnících§! jim pomůže detekovat nepřátelské §YPonorky§!."
 advanced_sonar: "Pokročilý sonar"
 advanced_sonar_desc: "Vylepšené hydrofonové soustavy a techniky aktivního sonarového „pingování“ poskytují výrazně lepší přesnost a dosah při hledání nepřátelských ponorek. \n\nUmístění tohoto modulu do §YEelektronického slotu§! na §YLehkých lodích§! nebo §YKřižnících§! jim pomůže odhalovat nepřátelské §YPonorky§!."
 modern_sonar: "Moderní sonar"
 modern_sonar_desc: "Pokroky ve filtrování signálu a směrovém skenování dávají tomuto novému typu sonaru bezkonkurenční přesnost a umožňují nám lovit nepřátelské ponorky s ničivou přesností. \n\nUmístění tohoto modulu do §YEelektronického slotu§! na §YLehkých lodích§! nebo §YKřižnících§! jim pomůže odhalovat nepřátelské §YPonorky§!."
 smoke_generator: "Kouřové generátory"
 smoke_generator_desc: "Některé drobné úpravy motorů a komínů lehkých a středních lodí jim umožňují vytvářet velké množství kouře, aby se vyhnuly nebo přerušily kontakt s nepřítelem."
 depth_charges_advice_tt: "\nMontáž modulu §YHlubinná nálož§! na §YLehké Lodě§! a §YKřižníky§! jim umožní útočit na nepřátelské §YPonorky§!."
 sonar_advice_tt: "\nInstalací modulu §YSonar§! na §YLehké lodě§! a §YKřižníky§! budou schopny detekovat nepřátelské §YPonorky§!."
 basic_depth_charges: "Základní hlubinné nálože"
 basic_depth_charges_desc: "Jednoduchá výbušná nádoba s tlakově citlivým spouštěčem exploduje, když dosáhne předem stanovené hloubky. \n\nUmístění tohoto modulu na §YLehké lodě§! a §YKřižníky§! jim umožní útočit na nepřátelské §YPonorky§!."
 improved_depth_charges: "Vrhač hlubinních náloží"
 improved_depth_charges_desc: "Jednoduché mechanické zařízení, které vyhazuje hlubinní bombu na stanovenou vzdálenost od lodi. To znamená, že torpédoborec již nemusí projet přímo nad cílem, aby ho zasáhl. \n\nNamontování tohoto modulu na §YLehké lodě§! a §YKřižníky§! jim umožní útočit na nepřátelské §YPonorky§!."
 advanced_depth_charges: "Hlubinný minomet"
 advanced_depth_charges_desc: "Minomet na palubě torpédoborce může hodit výbušnou nálož mnohem dále, což lodi umožňuje udržovat sonarový kontakt s ponorkou po celou dobu útoku a výrazně zvyšuje jeho přesnost.\n\nUmístění tohoto modulu na §YLehké lode§! a §YKřižníky§! jim umožní útočit na nepřátelské §YPonorky§!."
 modern_depth_charges: "Vylepšené hlubinné nálože"
 modern_depth_charges_desc: "Větší pohonná nálož vrhá správně nastavenou hlubinnou nálož na konkrétní hloubku na ponorku z značné vzdálenosti.\n\nMontáž tohoto modulu na §YLehkých lodích§! a §YKřižnících§! jim umožní útočit na nepřátelské §Yponorky§!."
 improved_seaplane_tender: "Vylepšený nosič hydroplánů"
 improved_seaplane_tender_desc: "Pokrok v zásobování na moři a technologii jeřábů pro vyzvedávání zvyšuje efektivitu provozu hydroplánů. \n\nUmístění modulu §YNosič hydroplánů§! na §YTorpédoborce§! zlepšuje jejich schopnost odhalovat nepřátelské lodě."
 seaplane_tender_advice_tt: "\nUmístění modulu §YNosič hydroplánů§! na §YTorpédoborce§! zlepšuje jejich schopnost odhalovat nepřátelské lodě."
 improved_airplane_launcher: "Vylepšený letadlový katapult"
 improved_airplane_launcher_desc: "Vylepšený pneumatický mechanismus umožňuje odpalovat větší letouny z katapultu, čímž se zvyšuje jejich pátrací dosah. \n\nInstalací tohoto modulu na §Ykřižníky§!, §Ytěžké lodě§! nebo specializované §Yponorky§! lze výrazně zlepšit jejich schopnost detekovat nepřátelské lodě."
 airplane_launcher_advice_tt: "\nInstalace modulu §YKatapult§! na §YKřižnících§!, §YTěžkých lodích§! nebo specializovaných §YPonorkách§! zlepšuje jejich schopnost detekovat nepřátelské lodě."
 cruiser_armor_advice_tt: "\nNamontování lepšího modulu §YPancíře§! na §YKřižníky§! zlepšuje jejich schopnost odolávat poškození."
 heavy_armor_advice_tt: "\nMontáž lepšího §YPancíře§! na §YTěžkých lodích§! zlepšuje jejich schopnost odolávat poškození. §YBoží lodě§! a §YBitevní krížníky§! jsou definovány svými různými §YPancířovými schématy§!, přičemž bitevní krížníky obvykle mají horší pancéřování."
 basic_cruiser_armor_scheme: "Základní schéma pancíře křižníku"
 basic_cruiser_armor_scheme_desc: "Schéma pancéřování kopíruje rozdělení mezi pásový a palubní pancíř, které je vidět na hlavních lodích, a poskytuje určitou ochranu proti střepinám a zbraním malé ráže.\n\nMontáž tohoto modulu na §YKřižníky§! zlepšuje jejich schopnost §Yodolávat nepřátelskému poškození§!, ale také §Rredukuje§! jejich §Yrychlost§!."
 improved_cruiser_armor_scheme: "Šikmé pásové pancéřování křižníků"
 improved_cruiser_armor_scheme_desc: "Díky tomu, že je pásový pancíř umístěn pod úhlem, je mnohem těžší prorazit pancíř o stejné hmotnosti a tloušťce.\n\nInstalací tohoto modulu na §YKřižníky§! se zlepšuje jejich schopnost §Yodolávat nepřátelskému poškození§!, ale také §Rzmenšuje§! jejich §Yrychlost§!."
 advanced_cruiser_armor_scheme: "Schéma obrnění křižníku Vše-anebo-nic"
 advanced_cruiser_armor_scheme_desc: "Tento systém se zaměřuje pouze na ochranu nejdůležitějších částí lodi, zatímco nedůležité části ignoruje.\n\nNamontování tohoto modulu na §YKřižníky§! zlepšuje jejich schopnost §Yodolávat poškození od nepřítele§!, ale také §Rredukuje§! jejich §Yrychlost§!."
 basic_heavy_armor_scheme: "Zešikmené pancéřování"
 basic_heavy_armor_scheme_desc: "Díky tomu, že je pásový pancíř umístěn pod úhlem, je mnohem těžší prorazit pancíř o stejné hmotnosti a tloušťce.\n\nMontáž tohoto modulu na §YTěžké lodě§! zlepšuje jejich schopnost §Yodolávat nepřátelskému poškození§!. §YBitevní lodě§! a §YBitevní křižníky§! se vyznačují svými různými §YPancířovými schématy§!."
 improved_heavy_armor_scheme: "Pancéřové schéma Vše-nebo-nic"
 improved_heavy_armor_scheme_desc: "Tento plán se zaměřuje na ochranu pouze nejdůležitějších částí lodi, zatímco nepodstatné oblasti ponechává bez pancéřování.\n\nMontáž tohoto modulu na §YTěžké lodě§! zvyšuje jejich schopnost §Yodolávat nepřátelskému poškození§!. §YBitevní lodě§! a §YBitevní křižníky§! jsou definovány svými odlišnými §Ytypy pancéřování§!."
 torpedo_advice_tt: "\nMontáž §YTorpédových odpalovačů§! na §YLehké lodě§! nebo §YKřižníky§! jim umožňuje způsobit významné škody nepřátelským §YHlavním lodím§! ve §Yválčišti§!, pokud mohou přetížit nepřátelskou §YDoprovodnou skupinu§!."
 basic_torpedo: "Základní torpédo"
 basic_torpedo_desc: "Samohybná zbraň s výbušnou hlavicí, která se pohybuje po předem stanovené trase, dokud nenarazí na cíl pod vodní hladinou.\n\nInstalace tohoto modulu na §YLehké lodě§! nebo §YKřižníky§! jim umožňuje způsobit značné škody nepřátelským §YHlavním lodím§!."
 magnetic_detonator: "Magnetický detonátor"
 magnetic_detonator_desc: "Nový detonátor detekuje změnu v zemském magnetickém poli, když torpédo prochází pod cílem. Výbuch přímo pod lodí způsobuje mnohem větší poškození a často zlomí kýl cíle, což jej okamžitě potopí."
 homing_torpedo: "Naváděná torpéda"
 homing_torpedo_desc: "Vybavena akustickým detektorem, torpédo se může zaměřit na největší zdroj hluku před sebou - obvykle na cíl."
 electric_torpedo: "Elektrická torpéda"
 electric_torpedo_desc: "Místo toho, aby torpédo s elektrickým motorem zanechávalo snadno odhalitelnou stopu bublin, zůstává prakticky neviditelné, dokud nezasáhne. To také znamená, že k odpalovací ponorce nevede žádná stopa."
 improved_ship_torpedo_launcher: "Vylepšený torpédomet na lodích"
 improved_ship_torpedo_launcher_desc: "Silnější motory umožňují instalovat více trubic v jednom montáži a rychleji se zaměřovat na cíl.\n\nInstalace tohoto modulu na §YLehkých lodích§! nebo §YKřižnících§! jim umožňuje způsobit značné škody nepřátelským §YHlavním lodím§!."
 advanced_ship_torpedo_launcher: "Pokročilý lodní torpédomet"
 advanced_ship_torpedo_launcher_desc: "Větší průměr trubek umožňuje použití větších torpéd s těžšími hlavicemi.\n\nMontáž tohoto modulu na §YLehké lodě§! nebo §YKřižníky§! umožňuje jim způsobit značné poškození nepřátelským §YHlavním lodím§!."
 modern_ship_torpedo_launcher: "Moderní torpédomet na lodi"
 modern_ship_torpedo_launcher_desc: "Silné komprimované vzduchové náboje umožňují vypouštět těžší torpéda vyššími rychlostmi.\n\nNamontování tohoto modulu na §YLehké lodě§! nebo §YKřižníky§! jim umožňuje způsobit značné škody nepřátelským §YVýznamným lodím§!."
 snorkel_advice_tt: "\nMontáž §Yšnorchlů§! na §YPonorky§! dramaticky snižuje jejich §YOdhalitelnost§!, což je činí obtížně viditelnými a zacílitelnými pro nepřátelské lodě."
 basic_submarine_snorkel: "Základní ponorkový šnorchl"
 basic_submarine_snorkel_desc: "Jednoduchá vzduchová trubice vedoucí ze strojovny do řídicí věže. Po prodloužení umožňuje ponorce provozovat motory a nabíjet baterie i při ponoření.\n\nNamontování tohoto modulu na §YPonorky§! snižuje jejich §YOdhalitelnost§!, díky čemuž jsou hůře detekovatelné."
 improved_submarine_snorkel: "Vylepšený šnorchl ponorky"
 improved_submarine_snorkel_desc: "Vylepšený design zabraňuje nasátí vody do motorů a navíc snižuje radarovou stopu hlavy šnorchlu.\n\nNamontování tohoto modulu na §YPonorky§! snižuje jejich §YOdhalitelnost§!, díky čemuž jsou hůře detekovatelné."
 light_battery_advice_tt: "\n\nNamontování modulů §YLehké baterie§! na §YLehké lodě§! a §YKřižníky§! zlepšuje jejich §YÚtok lehkými děly§!, což pomáhá ničit nepřátelské §YZákladní lodě§!. §YLehké baterie§! obvykle vykazují špatnou výkonnost vůči obrněným lodím, jako jsou §YKřižníky§! a §YTěžké lodě§!"
 medium_battery_advice_tt: "\n\nMontáž modulů §YLehká střední baterie§! nebo §YStřední baterie§! na §YKřižníky§! zlepšuje jejich §YLehký útok§! nebo §YTěžký útok§!, čímž je umožňuje bojovat proti nepřátelským §YDoprovodním§! nebo §YHlavním lodím§!. Montáž jakékoliv §YStřední baterie§! určí loď jako §YTěžký křižník§!, zatímco montáž pouze §YLehké střední baterie§! určí loď jako §YLehký křižník§!."
 heavy_battery_advice_tt: "\n\nNamontování modulů §YTěžká baterie§! zvyšuje §YTěžkým lodím§! jejich §YTěžký útok§!, což mu umožňuje angažovat a ničit nepřátelské §YHlavní lodě§!. §YTěžké baterie§! obvykle špatně fungují proti menším plavidlům, jako jsou §YLehké lodě§! a §YLehké křižníky§!."
 basic_battery: "Námořní dělostřelecká střelba"
 basic_battery_desc: "Základní návrh pro školení obsluhy námořních děl."
 basic_light_battery: "Základní lehká baterie"
 basic_light_battery_desc: "Otevřený, poháněný montáž pro malokalibrovou zbraň určenou k použití na menších lodích.\n\nInstalace tohoto modulu zvyšuje §YLehký útok§!, což pomáhá při zapojení nepřátelských §YDoprovodních lodí§!."
 improved_light_battery: "Zlepšená lehká baterie"
 improved_light_battery_desc: "Uzavřený, napájený montáž pro malokaliberní zbraň poskytuje posádce určitou ochranu před živly a střepinami. \n\nNamontování tohoto modulu zvyšuje §YLehký útok§!, což pomáhá při zapojení do bojů s nepřátelskými §YDoprovodními loděmi§!."
 advanced_light_battery: "Pokročilá lehká baterie"
 advanced_light_battery_desc: "Pokročilý dvojitý závěs přináší pod pancéřovou ochranou výrazně větší palebnou sílu.\n\nNamontování tohoto modulu zvyšuje §YLehký útok§!, což pomáhá při útocích na nepřátelské §YDoprovodní lodě§!."
 basic_light_shell: "Malokalibrové polo-průbojné granáty"
 basic_light_shell_desc: "Tato střela je kompromisem mezi průbojností pancíře a výbušnou silou a po proražení slabého pancíře lehkých lodí způsobuje výrazně větší poškození."
 improved_light_shell: "Drobné pancéřové projektily"
 improved_light_shell_desc: "Správný pancéřový projektil pro zbraně malého kalibru dává destruktorům a jiným lehkým lodím šanci na boj proti obrněným protivníkům."
 basic_medium_battery: "Základní střední baterie"
 basic_medium_battery_desc: "Napájená věž s dvěma nebo třemi zbraněmi středního kalibru pro použití na křižnících. \n\nNamontování modulu §YLehká střední baterie§! zvyšuje §YLehký útok§!, což pomáhá při zapojení nepřátelských §YDoprovodních lodí§!. Namontování modulu §YStřední baterie§! zvyšuje §YTěžký útok§!, což pomáhá při zapojení nepřátelských §YHlavním lodím§!."
 improved_medium_battery: "Vylepšená střední baterie"
 improved_medium_battery_desc: "Vylepšené uspořádání věže umožňuje rychlejší nabíjení, zatímco lepší pancéřování zlepšuje přežití. \n\nMontáž modulu §YLehká střední baterie§! zvyšuje §YLehký útok§!, což pomáhá při útocích na nepřátelské §YDoprovodné lodě§!. Montáž modulu §YStřední baterie§! zvyšuje §YTěžký útok§!, což pomáhá při útocích na nepřátelské §YHlavní lodě§!."
 advanced_medium_battery: "Pokročilá střední baterie"
 advanced_medium_battery_desc: "Integrací nabíjení energie a dálkového ovládání energie mohou moderní křižníky dosahovat rychlostí palby a přesnosti, které byly dosud považovány za nemožné.\n\nInstalace modulu §YLehká střední baterie§! zvyšuje §YLehký útok§!, což pomáhá při zapojení nepřátelských §YDoprovodních lodí§!. Instalace modulu §YStřední baterie§! zvyšuje §YTěžký útok§!, což pomáhá při zapojení nepřátelských §YHlavním lodím§!."
 basic_medium_shell: "Střední střela s průbojným hrotem"
 basic_medium_shell_desc: "Přidáním balistického krytu mohou být granáty aerodynamičtější, zatímco stále zachovávají svou schopnost proniknout do pancíře."
 improved_medium_shell: "Středněkalibrový polopancéřový granát"
 improved_medium_shell_desc: "Kompromis mezi výkonem pro proražení pancíře a explozivní silou, tento granát způsobí významně více poškození po proniknutí slabým pancířem lehkých lodí."
 basic_heavy_battery: "Základní těžká baterie"
 basic_heavy_battery_desc: "Gigantická věž s masivními zbraněmi pod těžkým pancířem.\n\nNamontování modulu §YTěžká baterie§! zvyšuje §YTěžký útok§! lodi, což zlepšuje výkon proti nepřátelským §YHlavním lodím§!."
 improved_heavy_battery: "Vylepšená těžká baterie"
 improved_heavy_battery_desc: "Power Rammers zvyšují rychlost nabíjení těžkých děl, zatímco automatické obvodové dveře zvyšují bezpečnost. \n\nMontáž modulu §YTěžká baterie§! zvyšuje §YTěžký útok§! lodi, čímž se zlepšuje výkonnost proti nepřátelským §YHlavním lodím§!."
 advanced_heavy_battery: "Pokročilá těžká baterie"
 advanced_heavy_battery_desc: "Vylepšené mechanismy pro snížení zpětného rázu a zpožďovací cívky snižují rušení střel za letu a výrazně zvyšují přesnost.\n\nMontáž modulu §YTěžká baterie§! zvyšuje §YTěžký útok§! lodi, čímž se zlepšuje výkon proti nepřátelským §YHlavním lodím§!."
 basic_heavy_shell: "Granát s protipancéřovým nárazníkem"
 basic_heavy_shell_desc: "Důsledným vybavením balistického krytu lze náboje učinit aerodynamickými, přičemž si stále zachovávají svou schopnost prorazit pancíř."
 improved_heavy_shell: "Super těžká střela s průbojným hrotem"
 improved_heavy_shell_desc: "Vážící dobře přes tunu, tyto masivní granáty útočí s bezprecedentní silou a představují vážnou hrozbu i pro nejtěžší pancíře."
 secondary_battery_advice_tt: "\n§YSekundární baterie§! umožňuje §YKřižníkům§! a §YTěžkým lodím§! útočit na nepřátelské §Ydoprovodné lodě§! jako na sekundární cíle, zatímco způsobují poškození jinému cíli."
 basic_secondary_battery: "Kasematová sekundární baterie"
 basic_secondary_battery_desc: "Umístěné v otvorech podél trupu, tyto menší zbraně poskytují lodi určitou obranu proti menším lodím, ale mají omezené pole palby.\n\nNamontování modulu §YSekundární výzbroje§! poskytuje §YKřižníku§!, §YLetadlové lodi§! nebo §YTěžké lodi§! malé množství §YLehký útok§! a umožňuje mu pálit na druhý cíl."
 improved_secondary_battery: "Sekundární baterie s věžičkou"
 improved_secondary_battery_desc: "Umístěním sekundárních kanónů do motorových věží získají mnohem širší palebné pole na úkor větší hmotnosti a snížené stability v těžkých mořích.\n\nMontáž modulu §YSekundární výzbroje§! dává §YKřižníku§!, §YLetadlové lodi§! nebo §YTěžké lodi§! malé množství §YTaktické úderné síly§! a umožňuje jí zasáhnout druhý cíl."
 damage_control_1: "Cvičení požární ochrany"
 damage_control_1_desc: "Každý člen posádky lodi, od kapitána po obyčejného námořníka, musí být schopen pomoci při hašení a bojování proti požárům na palubě lodi."
 damage_control_2: "Oddělené požární rozvody"
 damage_control_2_desc: "Oddělením hlavních vodovodních potrubí kolem lodi se výrazně snižuje pravděpodobnost, že zásah způsobí, že loď nebude schopna bojovat s požáry."
 damage_control_3: "Dieselové nouzové pumpy"
 damage_control_3_desc: "U těžkých čerpadel, jejichž pohon je obvykle závislý na hlavních motorech, může jediný a poměrně lehký zásah ve strojovně způsobit, že se loď neudrží na hladině."
 fire_control_methods_1: "Závorková střelba"
 fire_control_methods_1_desc: "Chcete-li zasáhnout terč, nejprve jej rozkročte tak, že vystřelíte z několika zbraní najednou, dokud nedojde k zásahu na obou stranách terče."
 fire_control_methods_2: "Řebríková střelba"
 fire_control_methods_2_desc: "Místo toho, aby se střílelo nad cíl a ztrácely se stopy po dopadech za nepřátelskou lodí, jsou střely záměrně odhozeny kousek od cíle a pro určení dostřelu se měří vzdálenost mezi dopadem a cílem."
 fire_control_methods_3: "Barvivo pro granáty"
 fire_control_methods_3_desc: "Přidáním malých barevných balíčků k šrapnelům, když jsou vypáleny, se zabarví nárazy kolem cíle a umožní více lodím zasáhnout stejný cíl, aniž by si vzájemně mýlili zásahy."
 fuel_silos: "Skladování paliva"
 fuel_silos_desc: "Hromadné skladování paliva vyžaduje složitou sadu nádrží, trubek a ventilů, aby bylo zajištěno, že je jak zabezpečené, tak snadno dostupné."
 fuel_refining: "Rafinace paliva I"
 fuel_refining_desc: "Pokroky v chemickém krakování umožňují lepší výtěžnost lehkých paliv z ropy."
 fuel_refining2: "Rafinace paliva II"
 fuel_refining2_desc: "Lepší plánování uspořádání rafinérií snižuje plýtvání palivy."
 fuel_refining3: "Rafinace paliva III"
 fuel_refining3_desc: "Vylepšené metody zpracování umožňují rafinaci paliva z vedlejších produktů."
 fuel_refining4: "Rafinace paliva IV"
 fuel_refining4_desc: "Nové vývoj v chemickém inženýrství umožňují rafinaci paliva z nových zdrojů."
 fuel_refining5: "Rafinace paliva V"
 fuel_refining5_desc: "Použití nových metod a zlepšených rozvržení při stavbě rafinérií dramaticky zvyšuje propustnost při snižování ztrát."
 scout_plane1: "Průzkumné letadlo I"
 scout_plane1_desc: "Shromažďování zpravodajských informací o pohybech nepřátelských jednotek a poskytování zpráv o nasazení nepřátelských námořních sil je původním úkolem letadel od jejich prvního nasazení ve Velké válce a stále zůstává důležitým úkolem."
 scout_plane2: "Průzkumné letadlo II"
 scout_plane2_desc: "Vyvinutím specializovaných letadel pro vzdušný průzkum a dlouhodobou rekognoskaci zajišťujeme, že získáváme a udržujeme přesný přehled o úmyslech a schopnostech našeho protivníka."
 SURRENDER_REDUCTION_TOOLTIP: "Spolupráce v $COUNTRY|H$ sníží hranicu jejich kapitulace o $VALUE|+%.0$"
 COLLABORATION_EFFECTS_TOOLTIP: "Máte $COLLABORATION|+%.0$ spolupráce v $COUNTRY|H$. To sníží jejich úroveň kapitulace o $SURRENDER|+%.0$ a dá $COMPLIANCE|+%.0$ dodatečné spolupráce, když nepřítel kapituluje, což bude použito k odemknutí dodatečných modifikátorů dodržování."
 COLLABORATION_EFFECTS_OTHER_SIDE_TOOLTIP: "$OTHER_COUNTRY|H$ má $COLLABORATION|+%.0$ spolupráci v $COUNTRY|H$. To sníží hranici kapitulace $COUNTRY|H$ o $SURRENDER|+%.0$ a poskytne $COMPLIANCE|+%.0$ spolupráci, když nepřítel kapituluje, což bude použito pro odemykání dodatečných modifikátorů spolupráce."
 train_tech: "Vlaky a železnice"
 SUPPORT_TITLE_TRAINS: "Vlaky"
 cat_production: "Výroba"
 cat_synth_rubber: "Syntetická guma"
 cat_synth_oil: "Syntetická ropa"
 cat_armored_cars: "Obrněné automobily"
 cat_special_forces_generic: "Speciální jednotky"
 cat_torpedoes: "Torpéda"
 cat_ship_light_battery: "Lehké baterie"
 cat_ship_medium_battery: "Střední baterie"
 cat_ship_heavy_battery: "Těžké baterie"
 masterful_blitz: "Mistrovský blitz"
 grand_banzai_charge: "Velký banzai útok"
 masterful_blitz_desc: "Možná jsme nevynalezli Blitzkrieg, ale vyvineme a zdokonalíme tuto strategii tak, aby ani nejpevnější obranné linie nepřítele nebyly schopny zastavit postup naší slavné armády."
 penal_infantry: "Trestné prapory"
 penal_infantry_desc: "Trestné prapory poskytují odsouzeným vojákům a důstojníkům Rudé armády příležitost vykrvácet za vlast a vykoupit se za hanebné nebo nečestné činy spáchané v minulosti."
 camicie_nere_security_militias: "$ITA_camicie_nere$"
 blackshirt_assault_battalion_tech: "$blackshirt_assault_battalion$"
 mountain_warfare_militias_tech: "$ITA_grande_rivolta_rurale$"
 basic_heavy_cruiser: "Základní těžký křižník (Těžký křižník II)"
 basic_ship_hull_carrier: "1936 Trup letadlové lodi"
 early_carrier: "Raná letadlová loď (Letadlová loď I)"
 basic_carrier: "Základní letadlová loď (Letadlová loď II)"
 improved_destroyer: "Vylepšený torpédoborec (Torpédoborec III)"
 basic_dp_light_battery: "Základní duální baterie"
 basic_dp_light_battery_desc: "Kombinace protizemních a protileteckých děl v jednom montáži umožňuje větší flexibilitu a šetří váhu.\n\nNamontování tohoto modulu zvyšuje §Y$EQUIPMENT_DESIGNER_LG_ATTACK_ICON_TOOLTIP$§!, což pomáhá při zapojení nepřátelských §YDoprovodních lodí§!. Tyto moduly také zvyšují §Y$EQUIPMENT_DESIGNER_ANTI_AIR_ATTACK_ICON_TOOLTIP$§!.\nNamontování modulu §YSekundární výzbroje§! dává §Y$ship_hull_cruiser$§!, §Y$ship_hull_carrier$§!, nebo §Y$ship_hull_heavy$§! malé množství §Y$EQUIPMENT_DESIGNER_LG_ATTACK_ICON_TOOLTIP$§! a umožňuje mu útočit na druhý cíl."
 improved_dp_light_battery: "Vylepšená baterie dvojího určení"
 improved_dp_light_battery_desc: "Plně uzavřené kanóny dvojího určení výrazně zvyšují palebnou sílu a ochranu, a přitom šetří váhu.\n\nMontáž tohoto modulu zvyšuje §Y$EQUIPMENT_DESIGNER_LG_ATTACK_ICON_TOOLTIP$§!, což pomáhá při zapojení nepřátelských §YDoprovodních lodí§!. Tyto moduly také zvyšují §Y$EQUIPMENT_DESIGNER_ANTI_AIR_ATTACK_ICON_TOOLTIP$§!. \nMontáž modulu §YSekundární výzbroje§! dává §Y$ship_hull_cruiser$§!, §Y$ship_hull_carrier$§!, nebo §Y$ship_hull_heavy$§! malou hodnotu §Y$EQUIPMENT_DESIGNER_LG_ATTACK_ICON_TOOLTIP$§! a umožňuje mu zapojit se do boje s druhým cílem."
 advanced_dp_light_battery: "Pokročilá dvojúčelová baterie"
 advanced_dp_light_battery_desc: "Automatizované rychlopalné uzavřené zbraně výrazně zvýší palebnou sílu.\n\nInstalace tohoto modulu zvyšuje §Y$EQUIPMENT_DESIGNER_LG_ATTACK_ICON_TOOLTIP$§!, což pomáhá při zapojení nepřátelských §Ydoprovodních lodí§!. Tyto moduly také zvyšují §Y$EQUIPMENT_DESIGNER_ANTI_AIR_ATTACK_ICON_TOOLTIP$§!. \nInstalace modulu §YSekundární výzbroje§! poskytuje §Y$ship_hull_cruiser$§!, §Y$ship_hull_carrier$§!, nebo §Y$ship_hull_heavy$§! malé množství §Y$EQUIPMENT_DESIGNER_LG_ATTACK_ICON_TOOLTIP$§! a umožňuje mu zapojit se do boje s druhým cílem."
 basic_dp_medium_battery: "Pokročilá střední dvojí účelová baterie"
 basic_dp_medium_battery_desc: "Automaticky nabíjené rychlopalné střední uzavřené dělové baterie výrazně zvyšují palebnou sílu.\n\nMontáž modulu §YLehká střední baterie§! zvyšuje §Y$EQUIPMENT_DESIGNER_LG_ATTACK_ICON_TOOLTIP$§!, což pomáhá při boji proti nepřátelským §YDoprovodním lodím§!. Tento modul také zvyšuje §Y$EQUIPMENT_DESIGNER_ANTI_AIR_ATTACK_ICON_TOOLTIP$§!."
 armored_train: "$train_equipment_3$"
 railway_gun: "$railway_gun_equipment_1$"
 basic_train: "$train_equipment_1$"
 special_forces_doctrine: "Doktrína speciálních sil"
 special_forces_doctrine_folder: "Doktrína speciálních sil"
 special_forces_doctrine_folder_desc: "Jak jsou naše speciální síly vycvičeny."
 MOUNTAINEERS_DOCTRINE_LABEL: "Horská pěchota"
 MARINES_DOCTRINE_LABEL: "Námořní pěchota"
 PARATROOPERS_DOCTRINE_LABEL: "Výsadkáři"
 MOUNTAINEERS_DOCTRINE_DESC: "Silné vojenské zaměření na pluky zvyklé na nepříznivý terén nám poskytne výhodu při manévrování a odvracení protivníků."
 MARINES_DOCTRINE_DESC: "Posílená námořní pěchota zajistí, že žádné nepřátelské pobřeží nebude v bezpečí. Naše elitní námořní pěchota vyniká v operacích pod palbou v těch nejnepřátelštějších situacích."
 PARATROOPERS_DOCTRINE_DESC: "Vzdušný výsadek je budoucností války. Posílením výsadkářů dosáhneme dokonalé souhry letecké síly a pozemního útoku."
 RANGERS_DOCTRINE_LABEL: "Hraničáři"
 RANGERS_DOCTRINE_DESC: "Schopností operovat s velkými silami v hustě zalesněných oblastech může naše armáda obkličovat a přelstít nepřátelské síly."
 special_forces_mountaineers: "Posílit horskou pěchotu"
 special_forces_mountaineers_desc: "Nehostinné prostředí a tvrdé konflikty přitahují ty nejodolnější vojáky do našich elitních jednotek. Upevněním jejich postavení v naší doktríně zajistíme další přísun těch nejlepších."
 special_forces_paratroopers: "Posílit výsadkáře"
 special_forces_paratroopers_desc: "Není děsivějšího pohledu než potemnělá obloha plná výsadkových letounů. Naše doktrína musí využít moment překvapení a šok, které vzdušný výsadek přináší."
 special_forces_marines: "Posílit námořní pěchotu"
 special_forces_marines_desc: "Námořní pěchota působí tam, kde si jiní netroufnou. Od domácího pobřeží po cizí dálavy, tito odborníci vynikají v infiltračních a obojživelných operacích. Široký záběr a flexibilní filozofie by měly tvořit základ naší vojenské doktríny."
 special_forces_rangers: "Posílit hraničáře"
 special_forces_rangers_desc: "Lehká pěchota je klíčem k našemu úspěchu. Tradice ostrostřelců a infiltrační taktiky by měly tvořit základ při budování našich elitních jednotek."
 ski_troops: "Specialisté na chladné počasí"
 ski_troops_desc: "Specialisté na chladné počasí jsou zásadní pro naši taktiku na bojišti. Oficiálním uznáním těchto expertů v naší vojenské ústavě můžeme uvolnit zdroje a školení, abychom je ještě více vyzvedli."
 special_forces_recon: "Bojové zpravodajství"
 special_forces_recon_desc: "Naše elitní jednotky těží z výjimečných schopností v oblasti kontrarozvědky a situačního přehledu na bojišti. Další výcvik tyto výhody ještě umocní."
 gwtank: "Tank z Velké války"
 basic_light_tank: "Lehký tank I"
 armored_car1: "$gw_armored_car_equipment$"
 armored_car2: "$armored_car_equipment_1$"
 armored_car3: "$armored_car_equipment_2$"
 mountaineers_combat_1: "Udržení linie"
 mountaineers_combat_1_desc: "Naše elitní jednotky se musí soustředit na udržení klíčových oblastí, kde vynikají. Kombinace léček a zdokonalené plukovní organizace z nich činí silnou hloubkovou obranu proti nepřátelskému průniku."
 mountaineers_combat_2: "Horské dělostřelectvo"
 mountaineers_combat_2_desc: "Horské dělostřelecké pluky jsou specializované jednotky, vycvičené k rychlé palebné podpoře našich elitních divizí v náročném terénu. Jejich přítomnost výrazně zvyšuje bojeschopnost našich speciálních sil."
 mountaineers_combat_3: "Kombinovaný výcvik"
 mountaineers_combat_3_desc: "Přestože naše elitní pluky operují převážně samostatně, rozšíření jejich výcviku o principy kombinovaných zbraní zvyšuje jejich efektivitu na bojišti."
 mountaineers_keystone_1: "Páteř ozbrojených sil"
 mountaineers_keystone_1_desc: "Úspěchy našich elitních speciálních jednotek si vyžadují reorganizaci vojenské doktríny tak, aby jejich role tvořila její ústřední prvek."
 mountaineers_keystone_2: "Sdílení instruktorů"
 mountaineers_keystone_2_desc: "Zkušenosti, které získaly naše horské jednotky, by bylo nerozumné nevyužít v ostatních složkách speciálních sil. Zavádíme systém rotace instruktorů, který má zlepšit institucionální úroveň výcviku napříč armádou."
 paras_dispersed_drop: "Průzkum a sabotáž"
 paras_dispersed_drop_desc: "Povaha našich operací vyžaduje, aby se naši výsadkáři specializovali na rozptýlené seskoky, které umožní rozsáhlé sabotáže ještě předtím, než si nás nepřítel vůbec všimne."
 paras_combat_drop: "Bojový výsadek"
 paras_combat_drop_desc: "Ačkoliv nebezpečný, výcvik elitních sil pro přímé nasazení do boje při výsadku nám může zajistit výraznou převahu v kombinaci s konvenčním útokem."
 SF_PARAS_combat_effect_tt: "Nepřátelským divizím ve státech, do kterých jsme udělali §Hvýsadek§!, se sníží jejich aktuální §Horganizace§!.\n\n$PARA_EFFECT_TIMER$"
 SF_PARAS_sabotage_effect_tt: "Státy ovládané nepřítelem, do kterých vysadíme §Hvýsadkáře§!, utrpí škody na §HVojenských továrnach§!, §HCivilních továrnach§! a §HInfrastruktuře§!.\n\n$PARA_EFFECT_TIMER$"
 PARA_EFFECT_TIMER: "Tento efekt se může vyskytnout jednou za stát každých §H30§! dní."
 paras_airborne_light_armor: "Tank pro vzdušný výsadek"
 paras_airborne_light_armor_desc: "Některé lehké tanky lze upravit pro výsadek pomocí těžkých kluzáků. Tento nový způsob nasazení je sice specifický, ale otevírá nám nové operační možnosti."
 paras_bonus_2: "Sbor pro strategický vzdušný transport"
 paras_bonus_2_desc: "Zavedením specializované správy pro vzdušný transport budeme schopni lépe přizpůsobit naše nákladní letouny účelům výsadku."
 paras_combat_1: "Výsadková spojovací rota"
 paras_combat_1_desc: "Nic se nevyrovná spolehlivé komunikaci s jednotkami za nepřátelskou linií. Výcvik spojovacích jednotek pro vzdušný výsadek zajistí spojení i za nejtěžších podmínek."
 paras_combat_2: "Výsadková zdravotnická jednotka"
 paras_combat_2_desc: "Rozsah našich operací si vyžaduje, aby i nezbytné zdravotnické vybavení a personál byl připraven k výsadku."
 paras_bonus_1: "Zdokonalený výcvik v navigaci"
 paras_bonus_1_desc: "I nejlepší výsadek se může pokazit. Naši vojáci musí být důkladně vycvičeni v improvizované navigaci."
 paras_keystone_1: "Nejlepší z nejlepších"
 paras_keystone_1_desc: "Do výsadkových jednotek by měli být vybíráni jen nejzkušenější veteráni. Ačkoliv se tím zúží výběr, na bojišti se to bohatě vyplatí."
 paras_keystone_2: "Páteř ozbrojených sil"
 paras_keystone_2_desc: "Naše ozbrojené síly budou nově stavět na dovednostech a výcviku výsadkových jednotek. Až potemní obloha jejich příchodem, nepřítel pocítí strach."
 rangers_jaegers_training: "Začlenit tradice myslivců"
 rangers_jaegers_training_desc: "Lehká pěchota vycvičená k boji v lesích, žijící z toho, co území nabízí, odborníci na stavění pastí, léček a vynikající střelci."
 rangers_jungle_training: "Džunglový výcvik hraničářů"
 rangers_jungle_training_desc: "Zdatní nejen v přežití, ale i v boji v nejhustších lesích a tropickém horku — tito hraničáři jsou klíčoví pro operace v oblastech, kam se běžné jednotky neodváží vstoupit."
 rangers_guerilla_doctrine: "Lesní partyzáni"
 rangers_guerilla_doctrine_desc: "Iniciativa a pohyb jsou klíčové pro schopnost útočit na nepřítele. Naši hraničáři by měli excelovat v používání ticha a překvapení."
 rangers_recon_terrain_training: "Mistrovství terénu průzkumných hraničářů"
 rangers_recon_terrain_training_desc: "Základním předpokladem taktik hraničářů je schopnost překonat nejobtížnější terén a udeřit na nepřítele tam, kde to nečeká."
 rangers_fire_support_integration: "Integrace palebné podpory"
 rangers_fire_support_integration_desc: "Začlenění předsunutých pozorovatelů s přenosným spojařským vybavením do hraničářských týmů znamená, že ani malé, izolované jednotky nemusí bojovat bez podpory dělostřelecké palby."
 rangers_urban_combat: "Městský boj hraničářů"
 rangers_urban_combat_desc: "Boj v lese a ve městě má určité podobnosti, jako je krátký dosah a omezená viditelnost. Vojáci, kteří jsou zběhlí v jednom prostředí, mohou být vycvičeni, aby se přizpůsobili i druhému."
 elite_rangers_doctrine: "Elitní hraničáři"
 elite_rangers_doctrine_desc: "Naši hraničáři jsou chloubou našich ozbrojených sil. Musíme i nadále přijímat pouze ty nejlepší a motivovat je k ještě větším výkonům."
 rangers_backbone_doctrine: "Specializace lehké pěchoty"
 rangers_backbone_doctrine_desc: "Dovednosti, které si naši lesní specialisté osvojili, mohou využít všechny naše elitní jednotky. Musíme tyto znalosti využít ve všech složkách lehkých a elitních jednotek."
