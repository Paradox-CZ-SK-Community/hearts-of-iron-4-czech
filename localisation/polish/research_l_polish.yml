 infantry_folder: "Pěchota"
 infantry_folder_desc: "Vybavení a zbraně pro pěchotu."
 support_folder: "Podpůrné jednotky"
 support_folder_desc: "Průzkum, inženýři, polní nemocnice & další podpůrné jednotky."
 armour_folder: "Obrněné jednotky"
 armour_folder_desc: "Tanky a jejich varianty."
 nsb_armour_folder: "Obrněné jednotky"
 nsb_armour_folder_desc: "Tanky a jejich varianty."
 artillery_folder: "Dělostřelectvo"
 artillery_folder_desc: "Dělostřelectvo, protitankové a protiletadlové zbraně pro divize."
 land_doctrine_folder: "Pozemní doktrína"
 land_doctrine_folder_desc: "Pozemní doktrína, způsoby, jakými bojují vaše pozemní síly."
 naval_folder: "Námořní"
 naval_folder_desc: "Lodě a ponorky."
 mtgnavalfolder: "Námořnictví"
 mtgnavalfolder_desc: "Lodě a ponorky. Výzkum nových modulů pro přizpůsobení vašich lodí."
 mtgnavalsupportfolder: "Námořní podpora"
 mtgnavalsupportfolder_desc: "Námořní výzbroj a specializované námořní zařízení. Prozkoumejte nové moduly pro přizpůsobení vašich lodí."
 naval_doctrine_folder: "Námořní doktrína"
 naval_doctrine_folder_desc: "Námořní doktrína, jak vaše námořnictvo bojuje."
 air_techs_folder: "Letectví"
 air_techs_folder_desc: "Letecké prostředky a jejich varianty."
 air_doctrine_folder: "Letecká doktrína"
 air_doctrine_folder_desc: "Letecká doktrína — jak bojuje vaše letectvo."
 click_to_open_doctrine: "§GKlikněte§! pro otevření doktrín"
 industry_folder: "Průmysl"
 industry: "Průmysl"
 industry_folder_desc: "Průmysl a výroba."
 electronics_folder: "Inženýrství"
 electronics_folder_desc: "Inženýrství, radar, šifrování a výzkum pokročilých technologií."
 secret_weapons_folder: "Tajné zbraně"
 secret_weapons_folder_desc: "Zázračné zbraně, produkt šílené vědy."
 mobile_warfare: "Mobilní válka"
 mobile_warfare_desc: "Mobilní válka je zaměřena na rychlost a manévrování k odříznutí a dezorganizaci nepřátelských sil.\n\n"
 delay: "Zdržování"
 delay_desc: "I když nelze vyhrát bitvu, může být výhodné zpomalit postup útočných sil pomocí přepadů a zdržovacích taktik."
 elastic_defence: "Elastická obrana"
 elastic_defence_desc: "Místo toho, abychom soustředili všechnu sílu na frontovou linii, elastická obrana vytváří 'hlubší' vrstvu obrany, která dává obránci více času reagovat a provádět protiútoky, zatímco útočník je roztažený a zablokovaný."
 mobile_infantry: "Mobilní pěchota"
 mobile_infantry_desc: "Pravidelná pěchota je často příliš pomalá, aby stíhala, reagovala na nebo unikla rychle se pohybujícím obrněným silám. Odpovědí je zaměřit se na motorizovanou nebo mechanizovanou pěchotu, která může držet krok s tempem moderního boje.\n\n"
 mass_motorization: "Hromadná motorizace"
 mass_motorization_desc: "Ještě větší zaměření na motorizované jednotky."
 mechanised_offensive: "Mechanizovaná ofenziva"
 mechanised_offensive_desc: "Motorizované jednotky jsou dobré, ale k vedení ofenziv potřebujeme pěchotu, která se může zapojit do boje v obrněných transportech, které je chrání a nesou těžké zbraně."
 armored_spearhead: "Obrněná špice"
 armored_spearhead_desc: "Aby bylo možné využít tanky na maximum, nemohou být vázány na podporu pěchoty. Místo toho by měly být utvářeny do rychle se pohybujících, nezávislých jednotek, které mohou vést útoky.\n\n"
 schwerpunk: "Schwerpunkt"
 schwerpunk_desc: "V každé operaci je třeba určit bod, kde se nachází ohnisko, a soustředit do něj maximální sílu, aby se v něm zvítězilo."
 blitzkrieg: "Blitzkrieg"
 blitzkrieg_desc: "Blitzkrieg odkazuje na strategii rychlého pohybu obrněných sil podporovaných mobilní pěchotou a vzdušnou podporou, která proráží nepřátelské linie, aby je zneorganizovala a obklíčila."
 kampfgruppe: "Kampfgruppe"
 kampfgruppe_desc: "Kampfgruppe byla ad hoc formací, která byla organizována k provedení konkrétního úkolu."
 firebrigades: "Hasičské sbory"
 firebrigades_desc: "'Hasičské sbory' byly rychle seskupené síly, které byly shromážděny, aby reagovaly na průlomy nepřítele nebo jiné kritické problémy.\n\n"
 backhand_blow: "Úder zezadu"
 backhand_blow_desc: "Namísto boje o každý centimetr půdy se nepřátelským průnikům z velké části vyhýbáme, dokud se nerozšíří, a pak je můžeme odříznout a zničit protiútokem."
 modern_blitzkrieg: "Moderní blitzkrieg"
 modern_blitzkrieg_desc: "Vrchol mobilní války, moderní blitzkrieg zahrnuje všechny nejnovější technologické pokroky a lekce, které jsme se naučili z předchozích doktrín."
 volkssturm: "Volkssturm"
 volkssturm_desc: "Volkssturm, nebo Lidová milice, se skládal z mužů, kteří byli příliš staří, příliš mladí, nebo jinak nezpůsobilí pro pravidelnou vojenskou službu.\n\n"
 nd_conscription: "Nediskriminační odvod"
 nd_conscription_desc: "Dokonce i invalidé a postižené osoby musí být odvedeni, není možné mít civilisty."
 werwolf_guerillas: "Partyzáni Werwolf"
 werwolf_guerillas_desc: "Vlkodlaci byli plánovanou německou odbojovou skupinou, která by bojovala proti okupačním mocnostem, když by byla válka prohrána."
 superior_firepower: "Nadřazená palebná síla"
 superior_firepower_desc: "Tato doktrína se zaměřuje na vrhání granátů, ne mužů, na nepřítele. Naše síly jsou cenné, náboje jsou levné.\n\n"
 sup_delay: "Zpoždění"
 sup_delay_desc: "I když nelze vyhrát bitvu, může být výhodné zpomalit postup útočných sil pomocí přepadů a zdržovacích taktik."
 mobile_defence: "Mobilní obrana"
 mobile_defence_desc: "Mobilní síly mohou být použity k posílení obrany, kdekoliv může nepřítel zaútočit."
 intergrated_support: "Integrovaná podpora"
 intergrated_support_desc: "Úzká integrace podpůrných jednotek s bojovými jednotkami vytváří divize, které jsou silnější na útok.\n\n"
 regimental_combat_teams: "Plukovní bojové uskupení"
 regimental_combat_teams_desc: "Plukovní bojové uskupení je pěší pluk úzce integrovaný s podpůrnými jednotkami, jako je dělostřelectvo, tanky a průzkumné prvky, a tvoří tak malou soběstačnou jednotku, která umožňuje větší flexibilitu při útoku."
 dispersed_support: "Rozptýlená podpora"
 dispersed_support_desc: "Rozptýlením našich podpůrných jednotek mohou pokrývat širší oblast, zatímco zůstávají mimo palebnou linii, což vede k divizím s větší obranou.\n\n"
 overwhelming_firepower: "Palební přesila"
 overwhelming_firepower_desc: "Povolání všech dostupných podpůrných jednotek k poskytnutí drtivé palebné síly může výrazně oslabit cíl, nebo ještě lépe, vážně pokazit útočníkovi den."
 sup_mechanized_offensive: "Mechanizovaný útok"
 sup_mechanized_offensive_desc: "Motorizované jednotky jsou fajn, ale k vedení ofenziv potřebujeme pěchotu, která může do boje nastoupit v obrněných transportérech, které je chrání a nesou těžké zbraně."
 concentrated_fire_plans: "Plány koncentrovaného palby"
 concentrated_fire_plans_desc: "Soustředěním palby různých baterií do synchronizovaného bombardování může být způsobena mnohem větší škoda na nepříteli.\n\n"
 combined_arms: "Kombinované síly"
 combined_arms_desc: "Obrněnce, pěchota a podpůrné jednotky pracující společně ve dobře organizovaných týmech jsou daleko efektivnější než stejné síly použití odděleně."
 tactical_control: "Taktické řízení"
 tactical_control_desc: "Důstojníci obeznámení s operacemi kombinovaných zbraní na předních pozicích nyní mohou přímo řídit všechny operace jednotlivých složek."
 air_land_battle: "Vzdušno-pozemní bitva"
 air_land_battle_desc: "Vzhledem k tomu, že pozemní síly již operují v kombinovaných formacích, klade nyní systém vzdušno-pozemní bitvy důraz také na úzkou koordinaci mezi pozemními a leteckými silami a spojuje tak vzdušné a pozemní bojiště v jeden celek."
 centralized_fire_control: "Centralizované řízení palby"
 centralized_fire_control_desc: "Systém centralizovaného řízení palby umožňuje vyhodnocovat všechny žádosti o dělostřeleckou podporu na jednom místě, a pokud je to potřeba, koncentrovat celou palebnou sílu divize na cíl, spíše než aby jednotka mohla požadovat palbu pouze od dělostřelectva, které jí bylo přiděleno.\n\n"
 forward_observers: "Vysunutí pozorovatelé"
 forward_observers_desc: "Vysunutí pozorovatelé zaujímají pozice, odkud mohou přímo pozorovat přesnost a účinky dělostřelecké palby a předávat výsledky zpět k dělům k opravě."
 advanced_firebases: "Pokročilé opěrné body"
 advanced_firebases_desc: "Dělostřelecké stanoviště může být umístěno v blízkosti frontové linie na opevněných základnách, aby poskytovalo maximální možnou podporu postupujícím jednotkám."
 shock_and_awe: "Šok a úžas"
 shock_and_awe_desc: "Masivní koncentrace palebné síly způsobí protivníkovi okamžitý nebo dostatečně včasný šok a hrůzu, aby ochromila jeho vůli pokračovat."
 grand_battle_plan: "Velký bojový plán"
 grand_battle_plan_desc: "Rozsáhlé plánování a příprava před zapojením do bitvy jsou klíčem k úspěchu.\n\n"
 trench_warfare: "Zákopová válka"
 trench_warfare_desc: "Lopatka je často nejlepší zbraní pěchoty. Jednotky se učí hodnotu zakopání se v jakékoli pozici, kterou zaujmou."
 prepared_defense: "Připravená obrana"
 prepared_defense_desc: "Rozsáhlejší systémy polního opevnění výrazně zlepšují obranu jednotky."
 grand_assault: "Velký útok"
 grand_assault_desc: "Jakmile se shromáždí dostatečné síly a cíle jsou dobře naplánovány, silný útok nemůže nic jiného než zničit nepřítele."
 grand_mechanized_offensive: "Mechanizovaný útok"
 grand_mechanized_offensive_desc: "Motorizované jednotky jsou dobré, ale k vedení ofenzív potřebujeme pěchotu, která může vyrazit do boje v obrněných transportních prostředcích, které je chrání a nesou těžké zbraně.\n\n"
 assault_concentration: "Koncentrace útoku"
 assault_concentration_desc: "Před útokem jsou vedoucí prvky pečlivě připraveny a rozmístěny v předsunutých pozicích, aby bylo možné v úvodních okamžicích použít maximální sílu."
 branch_interoperation: "Mezioborová spolupráce"
 branch_interoperation_desc: "Zvýšená koordinace mezi různými složkami ozbrojených sil jim umožňuje lépe spolupracovat během operací spojovaných zbraní."
 assault_breakthrough: "Útočný průlom"
 assault_breakthrough_desc: "Namísto rozsáhleho útoku podél celé fronty může být mnohem účinnější soustředit úder pouze na jeden nebo několik málo bodů nepřátelské linie a dosáhnout průlomu tam."
 central_planning: "Centrální plánování"
 central_planning_desc: "Důstojníci ze všech odvětví nyní přispívají k plánování dané operace, aby zajistili, že funguje s maximální efektivitou."
 c3i_theory: "C3I"
 c3i_theory_desc: "Efektivní štábní důstojníci zajišťují tok velení, řízení, komunikace a zpravodajství mezi velícím důstojníkem a jím řízenými jednotkami."
 infantry_offensive: "Ofenzíva pěchoty"
 infantry_offensive_desc: "Ofenzivní duch pěchoty je rozhodující prvek pro vítězství v bitvách. Naše pěchota musí vést cestu.\n\n"
 armored_operations: "Obrněné operace"
 armored_operations_desc: "Tanky a další obrněné vozidla jsou velmi užitečné pro přepravu pěchoty na bojiště a poskytování přímé podpory v boji."
 infiltration_assault: "Infiltrační útok"
 infiltration_assault_desc: "V úvodních krocích útoku musí pěchota cílit na slabá místa v nepřátelské linii, aby obešla a izolovala lépe bráněné sekce, které poté mohou být vymazány zbytkem útočných sil."
 night_assault_tactics: "Taktiky nočního útoku"
 night_assault_tactics_desc: "Vojáci, kteří jsou zvyklí pohybovat se a bojovat v noci, se mohou buď předem umístit k útoku, nebo přímo zaútočit na nevědomé nepřátelské síly."
 attritional_containment: "Opotřebovací zadržení"
 attritional_containment_desc: "Pokud nejsme schopni zahájit útok a zlikvidovat nepřátelskou pozici, musí být přesto vystavena neustálým menším útokům, které způsobí ztráty a zabrání nepříteli zahájit vlastní útoky."
 infiltration_in_depth: "Hluboká infiltrace"
 infiltration_in_depth_desc: "Naše síly jsou nyní vycvičeny k obcházení a izolování nepřátelských pevnůstek do mnohem větší hloubky, ideálně by naše útočné síly neměly zastavit, dokud nedosáhnou zadních oblastí nepřítele a jejich síly nejsou úplně odříznuty."
 mass_assault: "Masivní útok"
 mass_assault_desc: "„Dokonalé“ zbraně jsou přeceňovány, velký počet „dostatečně dobrých“ zbraní je cestou k vítězství!\n\n"
 pocket_defence: "Obrana v obklíčení"
 pocket_defence_desc: "Je možné, že naši vojáci mohou být na obranné pozici chyceni v kapse. V takovém případě musí vydržet, dokud je neosvobodí nevyhnutelný protiútok."
 defence_in_depth: "Obrana v hloubce"
 defence_in_depth_desc: "Nabídnutím relativně slabého odporu a dočasným ustoupením můžeme směnit prostor za čas a umožnit útočným silám, aby se unavily před protiútokem."
 large_front_operations: "Velké frontové operace"
 large_front_operations_desc: "Boj na velké frontě zahrnuje koordinaci úsilí více jednotek na dlouhých vzdálenostech: Na operační úrovni, nikoli taktické.\n\n"
 deep_operations: "Hluboké operace"
 deep_operations_desc: "Koncept hlubokých operací, nebo hlubokého boje, je prolomit obranné linie nepřítele na více místech a zničit jeho operační rezervy, jeho operační hloubku a obsadit co nejvíce jeho strategické hloubky."
 operational_concentration: "Operační koncentrace"
 operational_concentration_desc: "Klíčem k jakékoli vojenské akci je ohromná místní převaha. Pokud nemáme ohromnou převahu po celé frontě, zahrnuje to oslabení částí vaší frontové linie, abyste mohli soustředit jednotky tam, kde jsou potřeba, spíše než pokoušet se být silní všude."
 vast_offensives: "Rozsáhlé ofenzívy"
 vast_offensives_desc: "Pokud se podaří dosáhnout průlomu, je třeba ho co nejvíce využít: Rozsáhlá ofenzíva, která se protlačí co nejhlouběji do nepřátelských linií, ztíží, učiní obranu jejich fronty zcela nemožnou nebo irelevantní."
 breakthrough_priority: "Priorita průlomu"
 breakthrough_priority_desc: "Rozšiřováním Operační koncentrace jsou všechny potřeby fronty podřízeny potřebě soustředit síly pro proražení. Místní porážky jsou bezvýznamné ve srovnání s zasazením rozhodujícího úderu."
 mechanized_wave: "Mechanizovaná vlna"
 mechanized_wave_desc: "Mechanizované síly jsou ideální pro vedení rychlých postupů potřebných k řádnému využití průlomů, jak pro podporu obrněných sil, tak pro zajištění boků průlomu."
 continuous_offensive: "Pokračující ofenzíva"
 continuous_offensive_desc: "Správně využité průlomy jsou sice často velmi účinné, ale dříve či později se útočník vždy vyčerpá a obránce je schopen se přeorganizovat a vytvořit nové obranné linie. S dostatečnými rezervami a správnou organizací však může ofenziva pokračovat do mnohem větší hloubky s devastujícími následky pro nepřítele."
 human_wave_offensive: "Ofenziva lidských vln"
 human_wave_offensive_desc: "Ofenzíva lidskou vlnou je pěchotní taktika, ve které útočník provádí čelní útok s hustě koncentrovanými pěšími formacemi proti nepřátelské linii, s úmyslem přetnout obránce zapojením do boje na blízko."
 human_infantry_offensive: "Ofenzíva pěchoty"
 human_infantry_offensive_desc: "Ofenzivní duch pěchoty je rozhodujícím prvkem vítězství v bitvách. Naše pěchota musí jít na čelo."
 large_front_offensive: "Velká frontová ofenzíva"
 large_front_offensive_desc: "Provedením, nebo hrozbou, ofenziv po lidských vlnách přes více oblastí fronty můžeme zabránit nepříteli koncentrovat svou palebnou sílu proti jakémukoli jediné útoku."
 peoples_army: "Lidová armáda"
 peoples_army_desc: "Lidová armáda věří v nadřazenost mužů nad zbraněmi, kdy vynikající motivace kompenzuje horší technologie, a těší se široké podpoře civilního obyvatelstva.\n\n"
 guerilla_warfare: "Guerrillová válka"
 guerilla_warfare_desc: "Nepřítel postupuje, my ustupujeme; nepřítel se utáboří, my ho obtěžujeme; nepřítel se unaví, my útočíme; nepřítel ustupuje, my ho pronásledujeme."
 infantry_weapons2: "Vylepšené vybavení pěchoty I"
 infantry_weapons2_desc: "Osobní a posádkou používané zbraně pro pěchotu, stejně jako různý další výstroj, který voják potřebuje. Vylepšené modely zbraní a specializovanější vybavení."
 improved_infantry_weapons_2: "Vylepšené vybavení pěchoty II"
 improved_infantry_weapons_2_desc: "Osobní a posádkové zbraně pro pěchotu, stejně jako různé jiné kusy vybavení, které voják potřebuje. Vylepšené modely zbraní a specializovanější vybavení."
 advanced_infantry_weapons2: "Zdokonalené vybavení pěchoty III"
 advanced_infantry_weapons2_desc: "Osobní a posádkové zbraně pro pěchotu a různé další součásti výstroje, které voják potřebuje. Dále modernizováno tak, aby zahrnovalo osobní útočné pušky a protitankové rakety. Zlepšená dostupnost zbraní, které byly dříve distribuovány v omezené míře."
 infantry_at: "Pěchotní protitankové zbraně I"
 infantry_at_desc: "Vybavení našich pěších jednotek protitankovými puškami jim umožní zničit lehce obrněná vozidla a zároveň si zachovat mobilitu."
 infantry_at2: "Pěchotní protitankové zbraně II"
 infantry_at2_desc: "Aby pěchota efektivně zasahovala těžce obrněné jednotky, je třeba vyrobit vysoce explozivní protitankové zbraně menší a lehčí."
 support_weapons: "Podpůrné zbraně I"
 support_weapons_desc: "Automatické zbraně se stávají mobilnějšími. Samopaly se již prokázaly jako efektivní a vývoj ručních podpůrných zbraní musí pokračovat."
 support_weapons2: "Podpůrné zbraně II"
 support_weapons2_desc: "Vývoj automatických zbraní, které kombinují aspekty lehkých a těžkých kulometů, umožňuje všestrannost v tom, jak naše pěchota používá své vybavení."
 support_weapons3: "Podpůrné zbraně III"
 support_weapons3_desc: "Zatímco udržujeme a zlepšujeme spolehlivost kulometů, můžeme také experimentovat s vyššími rychlostmi střelby, abychom zajistili smrtící účinnost konstantního proudu střel."
 support_weapons4: "Podpůrné zbraně IV"
 support_weapons4_desc: "Se zvýšeným využitím útočných pušek je prioritou moderní armády vyvinout spolehlivé automatické zbraně, které mohou být použity v jakémkoli prostředí všemi vojáky."
 paratroopers: "Výsadkáři I"
 paratroopers_desc: "Začleněním výsadkových sil do naší armády můžeme provádět průlomy a rozmístit klíčové jednotky i do oblastí, které byly dosud nepřístupné - a tím získat nové taktické příležitosti."
 paratroopers2: "Výsadkáři II"
 paratroopers2_desc: "Přechod od malých operací s několika málo výsadkáři k větším výsadkovým divizím otevírá cestu k masivním výsadkům, čímž se tyto síly stávají nejen novinkou, ale i přirozenou součástí války."
 paratroopers3: "Výsadkáři III"
 paratroopers3_desc: "Naučit se přizpůsobovat výsadkové operace podle počasí, standardizovat vybavení, jako jsou boty pro seskoky, a rozšířit specializovaný výcvik minimalizuje zmatek a rizika spojená s těmito nebezpečnými misemi."
 marines: "Námořní pěchota I"
 marines_desc: "Jednotky specializující se na obojživelnou válku se stávají stále nezbytnějšími. Improvisované metody a vybavení se stávají minulostí, protože naši námořní pěšáci jsou podporováni specializovanými vyloďovacími plavidly a výcvikem."
 marines2: "Námořní pěchota II"
 marines2_desc: "Obojživelná válka vyžaduje neustálou inovaci. Vylepšená logistická podpora a přenosné přístavy mohou umožnit našim námořníkům provádět vylodění, které by jinak mohlo být nemožné."
 marines3: "Námořní pěchota III"
 marines3_desc: "Námořní pěchota může být více než jen obojživeln pěchota. V budoucnu bude naše námořní pěchota jednou z nejdisciplínovanějších a nejaranžovanějších zvláštních sil."
 tech_mountaineers: "Horská pěchota I"
 tech_mountaineers_desc: "Boj v horských oblastech vystavuje jednotky mnoha nebezpečím, avšak někdy se mu nelze vyhnout. Můžeme tyto rizika minimalizovat poskytnutím specializovaného výcviku pro naše vojáky v tomto prostředí."
 tech_mountaineers2: "Horská pěchota II"
 tech_mountaineers2_desc: "Překračujíc přežití, naše síly se mohou cvičit, aby využily hory ve svůj prospěch. S lehkým vybavením a mulemi mohou lépe manévrovat v tomto terénu než jiná pěchota."
 tech_mountaineers3: "Horská pěchota III"
 tech_mountaineers3_desc: "Příprava na nejnáročnější horské mise ve velkých nadmořských výškách a za nízkých teplot vyžaduje od našich horských jednotek mimořádný výcvik a disciplínu."
 rangers_tech: "Hraničáři I"
 rangers_tech_desc: "Specializací na boj v lesnatém terénu a výcvikem naší lehké pěchoty k přizpůsobení se terénu a vegetaci můžeme šetřit síly při obraně, nebo dokonce prorazit nepřátelské linie tam, kde to nejméně očekávají."
 rangers_tech2: "Hraničáři II"
 rangers_tech2_desc: "Nasazení lesních specialistů ve velkém počtu namísto malých průzkumných jednotek nám dává možnost provádět rozsáhlé útoky proti lehce bráněným sektorům."
 rangers_tech3: "Hraničáři III"
 rangers_tech3_desc: "Operace v obtížném terénu vyžadují zvláštní vybavení a specifické výcvikové metody. Musíme zajistit, aby byli naši vojáci vybaveni nejnovějšími prostředky a cvičeni podle nejmodernějších postupů."
 tech_special_forces: "Speciální síly"
 tech_special_forces_desc: "Nekonvenční boj vyžaduje specializovaný výcvik. Musíme zajistit, aby byly naše jednotky připraveny a schopny se přizpůsobit drsným podmínkám."
 advanced_special_forces: "Pokročilý výcvik speciálních jednotek"
 advanced_special_forces_desc: "Díky rozsáhlému výcviku můžeme zajistit, že naše speciální jednotky budou schopny podávat lepší výkony než běžní muži."
 improved_special_forces: "Rozšířený program speciálních jednotek"
 improved_special_forces_desc: "Speciální jednotky jsou schopny vykonávat mise, které obvyklí vojáci nemohou. Musíme rozšířit výcvikové programy, abychom získali více našich vojáků kvalifikovaných."
 extreme_environment_training: "Výcvik v extrémních podmínkách"
 extreme_environment_training_desc: "Musíme být schopni bojovat v těch nejtvrdších podmínkách. S správným výcvikem a vybavením budou naše jednotky schopny bojovat v extrémních podmínkách."
 survival_training: "Výcvik přežití"
 survival_training_desc: "Naše zvláštní síly často bojují za nepřátelskými liniemi a v krátkém zásobování. Musíme je vyškolit, aby snášeli drsné počasí a bojovali s omezenými zásobami."
 elite_forces: "Elitní jednotky"
 elite_forces_desc: "Pouze ti nejlepší z nejlepších se stanou speciálními silami. Vojáci, kteří projdou výcvikem, budou silnější, rychlejší a budou bojovat tvrději než kdokoliv jiný."
 jungle_warfare: "Džunglová válka"
 jungle_warfare_desc: "Speciální výcvik, aby naši vojáci byli efektivní v džungli."
 jungle_training_tech: "Výcvik v džungli"
 desert_training_tech: "Výcvik v poušti"
 hills_training_tech: "Výcvik v kopcích"
 urban_training_tech: "Výcvik v městském prostředí"
 HUN_light_infantry_tech: "Doktrina lehkých pěších divizí"
 HUN_light_infantry_tech_desc: "Snížení množství podpůrných zbraní v našich pěších divizích je činí flexibilnějšími a dává jim výhodu v boji v omezeném terénu, jako jsou města a lesy."
 SWI_mountaineer_paratroopers_tech: "$SWI_mountaneer_paratroopers$"
 mountain_warfare: "Horská válka"
 mountain_warfare_desc: "Speciální výcvik, aby naši vojáci byli efektivní v horských oblastech."
 mountain_defensive_training: "Horský obranný výcvik"
 mountain_defensive_training_desc: "Speciální výcvik umožní našim jednotkám lépe bránit v horském terénu."
 tech_recon: "Průzkumná jednotka I"
 tech_recon_desc: "Posílání menších skupin dopředu na průzkum před pohybem hlavní síly nám umožňuje shromáždit informace o tom, kde se nepřítel nachází a kolik jich čelíme."
 tech_recon2: "Průzkumná jednotka II"
 tech_recon2_desc: "Průzkumné mise jsou často nebezpečné a počty obětí jsou vysoké. Připravením našich hlídek ke rychlému pohybu a stáhnutí a jejich vybavením k překonávání překážek položených nepřítelem zvýšíme jejich šance na návrat živých."
 tech_recon3: "Průzkumná jednotka III"
 tech_recon3_desc: "Zlepšení v rozhlasové technologii mění způsob, jakým mohou být prováděny průzkumné mise, což umožňuje rychlou komunikaci shromážděné zpravodajské informace."
 tech_recon4: "Průzkumná jednotka IV"
 tech_recon4_desc: "Hluboké průzkumné operace, mixující špionáž, guerillové operace a výcvik komand, pomohou našim taktickým rozhodnutím a umožní nám rychle se přizpůsobit při rozhodování."
 tech_engineers: "Ženijní rota I"
 tech_engineers_desc: "Výstavba opevnění a překonávání překážek činí ženisti nezbytnými v terénu. Dávání našim inženýrům univerzální úlohu nám umožňuje nasazovat je v různých situacích, kde budou potřeba."
 tech_engineers2: "Ženijní rota II"
 tech_engineers2_desc: "S moderním vybavením a výbušninami mohou naši ženisti překračovat své tradiční úkoly a překvapit nepřítele svou vynalézavostí, na souši i na moři."
 tech_engineers3: "Ženijní rota III"
 tech_engineers3_desc: "Vojenské ženijné projekty se blíží většímu měřítku. Výstavba pokročilé infrastrukturní pomoci umožňuje operace vyžadující zásoby nad rámec toho, co je běžně k dispozici v terénu."
 tech_engineers4: "Ženijní rota IV"
 tech_engineers4_desc: "Udržování místní mobility při stavbě toho, co by dříve bylo považováno za trvalé opevnění a dodavatelské systémy, se ženisti budoucnosti postarají o to, aby naši vojáci byli připraveni na jakýkoliv útok."
 hospital_tech: "Polní nemocnice"
 helicopter_tech: "Vrtulníky"
 logistics_tech: "Logistická rota"
 recon_tech: "Průzkumná rota"
 tech_field_hospital: "Polní nemocnice I"
 tech_field_hospital_desc: "Ztráta nemusí znamenat mrtvého vojáka. Mít okamžitou lékařskou pomoc k dispozici pro naše raněné přivezené zpět do zázemí je prvním krokem k zajištění toho."
 tech_field_hospital2: "Polní nemocnice II"
 tech_field_hospital2_desc: "Zavedením použití mobilních nemocnic, které přinášejí lékařskou péči tam, kde je potřeba, můžeme zastavit mnoho zbytečných úmrtí a trvalých zranění."
 tech_field_hospital3: "Polní nemocnice III"
 tech_field_hospital3_desc: "Chirurgie patří mezi nejčastější nouzové postupy potřebné v terénu. Postupy a nástroje pro to musí být k dispozici blíže k frontě a musíme zajistit, že kvalifikovaní chirurgové jsou součástí vojenských lékařských jednotek."
 tech_field_hospital4: "Polní nemocnice IV"
 tech_field_hospital4_desc: "Ačkoli bylo dosaženo mnoha zlepšení v polní medicíně, mnoho pokroků je improvizovaných a postrádáme ustavenou doktrínu. S více zkušenostmi můžeme jasněji vysvětlit úlohu těchto jednotek a učinit improvizované inovace trvalými prvky."
 tech_logistics_company: "Logistická rota I"
 tech_logistics_company_desc: "Specializovaní logističtí důstojníci v našich řadách zajistí, že podpůrné sítě budou využity k minimalizaci plýtvání."
 tech_logistics_company2: "Logistická rota II"
 tech_logistics_company2_desc: "Přizpůsobení našich analýz rizik novým okolnostem války zlepší bezpečnost naší logistické podpory."
 tech_logistics_company3: "Logistická rota III"
 tech_logistics_company3_desc: "Pokračující statistické hodnocení potřeb zásobování jednotek přispívá k maximalizaci užitku našich zdrojů."
 tech_logistics_company4: "Logistická rota IV"
 tech_logistics_company4_desc: "Vyvinutí standardizovaných klasifikací pro zásoby minimalizuje zmatení a činí plánování efektivnějším."
 tech_military_police: "Vojenská policie I"
 tech_military_police_desc: "Pravidelné jednotky mohou být schopny spravovat okupaci po kratší dobu, ale jsou především vojáci. Integrace vojenské policie do našich sil zajistí, že budeme mít lidi na zemi k reakci na odpor a vyšetřování sabotáže."
 tech_military_police2: "Vojenská policie II"
 tech_military_police2_desc: "Prováděním pravidelných policejních povinností v okupovaných územích, jako je řízení dopravy a udržování veřejného pořádku, mohou naši vojenská policie minimalizovat chaos a zmatek, v nichž se partizánská hnutí daří."
 tech_military_police3: "Vojenská policie III"
 tech_military_police3_desc: "Spoluprací s místními špionážními sítěmi a informátory založenými před okupací se naše vojenská policie může aktivně připravit na to, kde je pravděpodobné, že se odpor objeví."
 tech_military_police4: "Vojenská policie IV"
 tech_military_police4_desc: "Bezpečné policování obsazeného území je stejně o návratu k normalitě, jak o nemilosrdném odstranění opozice. Naše vojenská policie musí zajistit, aby tento proces začal brzy, aby zajistil bezpečnost vojáků i civilistů."
 tech_signal_company: "Spojovací rota I"
 tech_signal_company_desc: "Navazování a udržování komunikace v terénu vždy vyžadovalo zvláštní dovednosti. S nástupem nových komunikačních a detekčních technologií ve Velké válce se před námi objevily nové možnosti pro praxi."
 tech_signal_company2: "Spojovací rota II"
 tech_signal_company2_desc: "Spojovací roty zaměřené na komunikaci mezi různými složkami armády mohou zajistit, že pozemní síly budou schopny koordinovat své úsilí s námořními a leteckými operacemi a rychleji plánovat své přesuny."
 tech_signal_company3: "Spojovací rota III"
 tech_signal_company3_desc: "Stále více přenosných komunikačních technologií je možné nosit osobně jako batoh. Této zvýšené mobility spojovacích sborů je třeba využít."
 tech_signal_company4: "Spojovací rota IV"
 tech_signal_company4_desc: "Mezi našimi spojovacími specialisty jsou lidé s bezkonkurenčními přímými znalostmi používání tohoto zařízení v terénu. Jejich zapojením do výzkumu nových komunikačních technologií můžeme využít jejich odborných znalostí."
 tech_maintenance_company: "Technická rota I"
 tech_maintenance_company_desc: "Údržba, opravy a generální opravy jsou důležité pro to, aby vojenské vybavení bylo spolehlivé a bezpečné k použití. Mít jednotky věnované tomu zajistí, že bude věnována odpovídající pozornost."
 tech_maintenance_company2: "Technická rota II"
 tech_maintenance_company2_desc: "Rutinní provozní údržbové procedury minimalizují rizika poruchy vybavení a upozorňují vojáky, aby je vyměnili dříve, než se to stane."
 tech_maintenance_company3: "Technická rota III"
 tech_maintenance_company3_desc: "Zajištění, že naše jednotky mají vždy v terénu základní materiály pro provádění běžných oprav, zabrání pokračujícímu používání poškozeného vybavení."
 tech_maintenance_company4: "Technická rota IV"
 tech_maintenance_company4_desc: "Zkušenosti s návrhem aktivní redundance v první světové válce lze obnovit pro práci s modernějším vybavením, což usnadní údržbu."
 motorised_infantry: "Motorizovaná pěchota"
 motorised_infantry_desc: "Rozšířením používání motorových vozidel při přepravě pěchoty v terénu lze výrazně zlepšit mobilitu jinak pomalu se pohybujících pěších jednotek, což umožňuje rychlejší reakce a nové strategie."
 night_vision: "Noční vidění I"
 night_vision_desc: "Mít možnost vidět nepřítele, aniž by byl viděn, je klíčové pro noční operace. S vynálezem infračervené technologie můžeme vybavit naši armádu zařízeními, která, ačkoli jsou obtížně ovladatelná, to umožňují."
 night_vision2: "Noční vidění II"
 night_vision2_desc: "Raní infračervené zakreslení, ačkoli původně určené pro odstřelovače, měly omezený dosah vidění. Jak se zlepšuje přenosnost a vidění, mohou být tyto zařízení používána více jednotkami operujícími v noci."
 basic_machine_tools: "Základní obráběcí stroje"
 basic_machine_tools_desc: "Ve vojenské výrobě lze použít celou řadu nově vyvinutých frézovacích strojů, od malých a univerzálních typů, které jsou k dispozici v každé obráběcí dílně, až po velké a pokročilé modely, které posouvají technologické hranice."
 improved_machine_tools: "Zdokonalené obráběcí stroje"
 improved_machine_tools_desc: "Soustruhy pro dělové věže se ukazují jako nezbytné pro masovou výrobu. Zajištění efektivní konstrukce a použití samotných soustruhů nám poskytne významnou průmyslovou výhodu."
 advanced_machine_tools: "Pokročilé obráběcí stroje"
 advanced_machine_tools_desc: "O automatizaci obráběcích strojů pomocí servomechanismů se hovořilo již dříve. Zavedení těchto myšlenek do praxe umožňuje využít další pokroky v automatizaci, jako jsou počítače."
 assembly_line_production: "Výroba na montážní lince"
 assembly_line_production_desc: "Motorizovaná montážní linka, která se již používá v mnoha průmyslových odvětvích, může změnit průběh války tím, že umožní nebývalou lavinovou výrobu."
 flexible_line: "Flexibilní linky"
 flexible_line_desc: "Ačkoli je montážní linka skvěle naolejovaný stroj, stále je obsluhována lidmi, což umožňuje přizpůsobení, když je to nutné. Měli bychom toho využít v naší průmyslové výrobě."
 streamlined_line: "Aerodynamická linie"
 streamlined_line_desc: "Standardizace a rigidní struktura montážní linky jsou klíčové k její efektivitě a bezpečnosti. Tyto by měly být klíčovými aspekty pro rozvoj naší průmyslové výroby."
 improved_equipment_conversion: "Kotle spalující mleté uhlí"
 improved_equipment_conversion_desc: "Používáním jemně rozemletého uhlí k ohřevu kotlů můžeme dosáhnout mnohem vyšší účinnosti spalování, což vede k vyšší výrobě energie pro náš průmysl."
 advanced_equipment_conversion: "Vysoce účinné turbíny"
 advanced_equipment_conversion_desc: "Přijetí vylepšených konstrukcí generátorů jim umožní pracovat při mnohem vyšších tlacích a teplotách, čímž se výrazně zvýší energetická účinnost našich uhelných elektráren."
 concentrated_industry: "Koncentrovaný průmysl I"
 concentrated_industry_desc: "Zaměření naší průmyslové výroby na několik klíčových lokalit nám umožní dramaticky zlepšit její efektivitu.\n\n"
 concentrated_industry2: "Koncentrovaný průmysl II"
 concentrated_industry2_desc: "Další koncentrace výroby pomůže snižovat náklady."
 concentrated_industry3: "Koncentrovaný průmysl III"
 concentrated_industry3_desc: "Infrastrukturní náklady lze snížit přizpůsobením sítí naší více zaměřené průmyslové činnosti."
 concentrated_industry4: "Koncentrovaný průmysl IV"
 concentrated_industry4_desc: "Udržování klíčových bodů v našem průmyslu blízko sebe zvyšuje dopad těchto koncentrovaných míst."
 concentrated_industry5: "Koncentrovaný průmysl V"
 concentrated_industry5_desc: "Hlavní průmyslové komplexy nyní kombinují mnoho částí našeho průmyslu, minimalizují náklady na dopravu a pracovní sílu."
 dispersed_industry: "Rozptýlený průmysl I"
 dispersed_industry_desc: "Rozložením našich průmyslových odvětví můžeme zajistit, aby se nepřítel v době války mohl jen obtížně zaměřit na naše cíle.\n\n"
 dispersed_industry2: "Rozptýlený průmysl II"
 dispersed_industry2_desc: "Další decentralizace naší výroby ztěžuje zásah do jejích konkrétních částí."
 dispersed_industry3: "Rozptýlený průmysl III"
 dispersed_industry3_desc: "Působení továren pod záminkou jiných operací sníží riziko přímých útoků."
 dispersed_industry4: "Rozptýlený průmysl IV"
 dispersed_industry4_desc: "Maskování a rozptylování našich továren vytváří síť, kterou je velmi obtížné zcela narušit."
 dispersed_industry5: "Rozptýlený průmysl V"
 dispersed_industry5_desc: "Pokud naše průmyslové odvětví, ale také infrastruktura, která je spojuje, bude fungovat v utajení, můžeme ještě více ztížit jejich zničení leteckými útoky."
 synth_oil_experiments: "Experimenty se syntetickou ropou"
 synth_oil_experiments_desc: "Abychom snížili závislost na ropě, mohou být zkoumány procesy k výrobě substitutů z jiných látek a materiálů."
 early_refining: "Rané rafinování"
 early_refining_desc: "Ropný produkt může být rafinován na řadu látek a materiálů, které jsou klíčové pro jakoukoli moderní válku. Udržení náskoku v těchto metodách bude nezbytné pro vybudování moderního průmyslu."
 oil_processing: "Zpracování ropy"
 oil_processing_desc: "Síť továren na syntetickou destilaci a rafinaci ropných produktů je dalším krokem k zajištění dodávek paliva pro naši zemi."
 improved_oil_processing: "Vylepšené zpracování ropy"
 improved_oil_processing_desc: "Přechod od dříve experimentálních metod destilace na velkoobjemové operace nám umožní lépe se přizpůsobit dostupným materiálům a potřebám."
 advanced_oil_processing: "Pokročilé zpracování ropy"
 advanced_oil_processing_desc: "Při výrobě ropy lze použít nové experimentální techniky čištění, jako je hydrogenace, které výrazně zlepšují výsledný produkt."
 modern_oil_processing: "Moderní zpracování ropy"
 modern_oil_processing_desc: "Naše rafinérie ropy může být dále vylepšena pomocí nových pokročilých metod zpracování ropy, jako jsou hydrokrakování, alkylace, oxidace merkaptanů a izomerace."
 rubber_processing: "Zpracování gumy"
 rubber_processing_desc: "Průmyslové zpracování syntetické gumy je nezbytné k omezení naší závislosti na přírodní gumě."
 improved_rubber_processing: "Vylepšené zpracování gumy"
 improved_rubber_processing_desc: "Velkovýroba syntetického kaučuku je možná s novými procesy, které urychlují dehydrogenační reakce."
 advanced_rubber_processing: "Pokročilé zpracování gumy"
 advanced_rubber_processing_desc: "Univerzální syntetický kaučuk s vylepšenými procesy, jako jsou polymerační modifikátory dodecylmerkaptan, nám umožní rozšířit výrobu syntetického kaučuku."
 modern_rubber_processing: "Moderní zpracování gumy"
 modern_rubber_processing_desc: "Přechod na optimalizované polymerizační procesy povede k nižším nákladům a vyšší produkci."
 POWERED_BUILDING: "Napájená výstavba: $VAL|+=%2$"
 POWERED_DOCKYARD: "Výstup napájené loděnice: $VAL|+=%2$"
 POWERED_FACTORY: "Výstup napájené továrny: $VAL|+=%2$"
 construction1: "Stavitelství I"
 construction1_desc: "Zlepšené metody a materiály nám umožňují rychlejší výstavbu budov, jak civilních, tak vojenských."
 construction2: "Stavitelství II"
 construction2_desc: "Modernizace našich nástrojů a vybavení dále podpoří naše stavební úsilí."
 construction3: "Stavitelství III"
 construction3_desc: "Přijetí moderních vozidel a zkušenosti z našich pokroků ve stavebnictví umožňují výrazně urychlit opravy."
 construction4: "Stavitelství IV"
 construction4_desc: "Vyšší úroveň mechanizace a lepší rutiny dále zlepšují rychlost výstavby."
 construction5: "Stavitelství V"
 construction5_desc: "Budoucnost efektivní výstavby si bude vyžadovat rozsáhlejší plánování pro jednotlivé projekty, stejně jako standardizovaná řešení kdekoliv to bude možné."
 excavation1: "Těžba I"
 excavation1_desc: "Pokroky v technikách vrtání nám umožňují vykopávat zdroje, které byly dříve nemožné dosáhnout."
 excavation2: "Těžba II"
 excavation2_desc: "Nové techniky nám pomáhají sbírat zdroje efektivněji. Již nezkazíme zdroje při těžbě, což vede k většímu výnosu."
 excavation3: "Těžba III"
 excavation3_desc: "Pokrok v geologii nám pomáhá určit umístění zdrojů. Nyní se můžeme soustředit na naše těžební úsilí na místech, kde je větší šance na nalezení velkého množství přírodních zdrojů."
 excavation4: "Těžba IV"
 excavation4_desc: "Automatizace klíčových procesů a pokroky v mechanice činí všechna naše ložiska zdrojů mnohem efektivnější."
 excavation5: "Těžba V"
 excavation5_desc: "Pokroky v oblastech jako je povrchová těžba nám poskytují větší výnosy surovin z našich současných těžebních míst."
 excavation_tech: "Těžební technologie"
 electronic_mechanical_engineering: "Elektronické mechanické inženýrství"
 electronic_mechanical_engineering_desc: "Žijeme v době, kdy elektrická zařízení již nemohou pouze zahřívat a osvětlovat, ale také nám pomáhat myslet a komunikovat. Elektronika bude klíčová pro vojenskou inteligenci v nadcházejícím století."
 radio: "Rádio"
 radio_desc: "Přijetí vynálezů radioamatérů a rozšíření používání FM rádia sníží rádiové rušení a umožní nám najít nové využití rádiové technologie."
 improved_radio: "Vylepšené rádio"
 improved_radio_desc: "Zlepšení v síle signálu umožnilo rádiím vysílat dále než předtím."
 advanced_radio: "Pokročilé rádio"
 advanced_radio_desc: "Pokrok v rádiové technologii zvýšil dosah vysílaček a některé z nich jsou dokonce dostatečně malé na to, aby se daly nosit s sebou. Někteří tomu říkají vysílačky"
 radio_detection: "Radar"
 radio_detection_sp_2_tt: "$coordination_bonus$: §G+2%§!\n$MODIFIER_STATIC_ANTI_AIR_HIT_CHANCE_FACTOR$: §G+20%§!"
 radio_detection_desc: "Vývoj systému RADAR (Radio Detection and Ranging) umožňuje používat rádiové vlny k detekci fyzických objektů. Vzhledem k dopadu, který by tyto vynálezy mohly mít na lokalizaci jednotek, je výzkum přísně tajný."
 radio_detection_unlock_tt: "Odblokováno dokončením experimentálního výzkumu §Y$sp_air_radar$§! v §Y$land_facility$§!"
 cavity_magnatron: "Dutinový magnetron"
 cavity_magnatron_desc: "Pomocí trubice, která generuje mikrovlny, zvané dutinový magnetron, můžeme výrazně zlepšit schopnost stávajících radarových systémů detekovat objekty tím, že se od nich vlny odrazí."
 improved_cavity_magnatron: "Vylepšený dutinový magnetron"
 improved_cavity_magnatron_desc: "Použití radaru se již ukázalo jako zásadní, ale naše decimetrové radarové systémy jsou zatím příliš řídké na to, aby poskytly dostatečné pokrytí. Vybavení více jednotek radary nám umožní naplno využít technologickou převahu."
 centimetric_radar: "Centimetrový radar"
 centimetric_radar_desc: "Nové radary pracující v mikrovlnných pásmech nám umožňují detekovat objekty, které byly pro předchozí radary příliš malé."
 phased_array: "Fázovaná pole"
 phased_array_desc: "Na rozdíl od tradičních radarů, které se spoléhají na mechanické otáčení, využívají fázovaná pole k řízení paprsku elektroniku, což jim umožňuje plnit více funkcí současně, například sledovat více cílů."
 monopulse_radar: "Monopulzní radar"
 monopulse_radar_desc: "S monopulzním radarem můžeme určit směr cíle porovnáním signálů z několika antén, což zlepšuje detekci."
 mechanical_computing: "Mechanické výpočty"
 mechanical_computing_desc: "Konstrukce strojů schopných pokročilé diferenciální analýzy zásadně změní, jaké druhy strojově asistovaných výpočtů mohou být provedeny."
 computing_machine: "Výpočetní stroj"
 computing_machine_desc: "Vypracování teoretického základu pro moderní počítače a konstrukce elektromechanických strojů pro jejich uvedení do praxe bude prvním krokem do této oblasti možností."
 improved_computing_machine: "Vylepšený výpočetní stroj"
 improved_computing_machine_desc: "Nyní lze vyrábět programovatelné elektronické digitální počítače. Ačkoli jsou stále drahé a objemné, umožňují analýzu zpravodajských dat na úrovni dalece přesahující lidské možnosti."
 advanced_computing_machine: "Pokročilý výpočetní stroj"
 advanced_computing_machine_desc: "Začátek práce na počítačích schopných ukládat programy a využívajících tranzistory nás přivede na cestu k digitální revoluci, kdy se tyto stroje budou moci využívat téměř ve všech oblastech."
 basic_encryption: "Šifrování - polyalfabetické šifry"
 basic_encryption_desc: "S novými způsoby komunikace přicházejí nová rizika odposlechu. K rychlému a komplexnímu šifrování lze použít rotační šifrovací stroje."
 improved_encryption: "Šifrování - cyklické permutace"
 improved_encryption_desc: "Omezení v náhodnosti šifrovacích strojů lze využít k prolomení šifer. Zlepšením náhodnosti rotorové mechaniky můžeme tento druh kryptoanalýzy ztížit."
 advanced_encryption: "Šifrování - Pulzně kódová modulace"
 advanced_encryption_desc: "Technologická vylepšení a těžce nabyté zkušenosti nám umožňují zavést do naší komunikace více opatření pro zabezpečení datových toků."
 basic_decryption: "Dešifrování - frekvenční analýza"
 basic_decryption_desc: "Kryptoanalýza se stále více stává pokročilou matematickou vědou. Systémy, jako jsou kartotéky, a zařízení, jako jsou cyklometry, mohou pomoci při nezbytné práci."
 improved_decryption: "Dešifrování - útok postranním kanálem"
 improved_decryption_desc: "Vývoj sofistikovanějších počítačů umožňuje nové aplikace metod kryptoanalýzy, jako je diferencování, které lze v kombinaci s novými metodami ručního luštění použít k prolomení pokročilých šifer."
 advanced_decryption: "Dešifrování - automatizovaná dedukce"
 advanced_decryption_desc: "Zvýšený výpočetní výkon, který dosud zlepšil naši kryptoanalýzu, hrozí v budoucnu vytvořením téměř neprolomitelných šifer. Abychom si udrželi náskok, musíme být připraveni pracovat intenzivněji na získávání interních informací o této technologii."
 experimental_rockets: "Experimentální Rakety"
 experimental_rockets_desc: "Pokrok v oblasti raketové vědy zlepšením dosahu a spolehlivosti raket na kapalná paliva nás naučí dost o technologii, abychom mohli postavit odpalovací rampy pro pokročilejší modely."
 rocket_engines: "Raketové motory"
 rocket_engines_desc: "Poznatky o raketovém pohonu se dostávají na úroveň, kdy můžeme konstruovat létající bomby a letadla poháněná raketami, která dosahují dříve nedosažitelných rychlostí."
 improved_rocket_engines: "Vylepšené rakety"
 improved_rocket_engines_desc: "První dlouhé balistické střely mohou být vyrobeny a stále přesnější, dosahující do vzdálených měst nepřítele a dokonce i do vesmíru."
 advanced_rocket_engines: "Pokročilé raketové motory"
 advanced_rocket_engines_desc: "Budoucnost raketové techniky otevírá možnosti, jako jsou mezikontinentální rakety, jejichž dolet nezná hranic, zatímco užitečné zatížení je stále smrtonosnější."
 atomic_research: "Atomový výzkum"
 atomic_research_desc: "Při jaderném štěpení, rozdělení atomu přináší obrovské množství energie a nekonečné destruktivní schopnosti."
 rocket_interceptor: "Raketová stíhačka"
 rocket_interceptor_desc: "Stíhací letouny s raketovým pohonem na bázi kluzáků se mohou po krátkou dobu pohybovat rychleji než jakákoli jiná letadla. Nestálost paliva sice letouny ohrožuje, ale mohou vzlétnout a reagovat na útoky rychleji, než by jakýkoli nepřítel očekával."
 rocket_interceptor_2: "Raketová stíhačka II"
 rocket_interceptor_2_desc: "Stíhačky s raketovým pohonem, jejichž provoz je stále považován za extrémně nebezpečný, jsou nyní podporovány autopiloty a vlečnými letouny, aby se maximálně využila jejich extrémní rychlost, ale krátké palivové okno."
 rocket_interceptor_3: "Raketová stíhačka III"
 rocket_interceptor_3_desc: "Nové techniky přistávání a bezpečnější palivové systémy výrazně zvýšily šance raketových stíhačů na úspěch a přežití a naplnily tak kdysi teoretický potenciál těchto špičkových strojů."
 nukes: "Jaderné bomby"
 nukes_desc: "Projekt konstrukce atomové bomby bude jedním z nejvíce utajovaných a nejtěžších úkolů, které národ může podstoupit, ale pokud bude úspěšný, může změnit nejen průběh dnešních válek, ale i budoucnost světa."
 interwar_artillery: "Meziválečné dělostřelectvo"
 interwar_artillery_desc: "Poznatky získané při vývoji různých typů dělostřelectva lze aplikovat na konstrukci jiných děl."
 artillery1: "Dělostřelectvo I"
 artillery1_desc: "Díky modernějším materiálům a mechanismům lze houfnice a polní děla z Velké války přestavět a modernizovat pro moderní válku."
 artillery2: "Vylepšení dělostřelectva I"
 artillery2_desc: "Modernizace starých kusů nás může dovést jen do určité míry. Budou zapotřebí nové konstrukce houfnic, které využijí výhod nových systémů hydraulického zpětného rázu a delších hlavní."
 artillery3: "Vylepšení dělostřelectva II"
 artillery3_desc: "Aby bylo možné umístit těžší děla na lehčí vozy, mohou být do konstrukce houfnic zahrnuty úsťové brzdy."
 artillery4: "Dělostřelectvo IV"
 artillery4_desc: "Vývoj lehkého dělostřelectva, které lze rozložit pro přepravu, umožní dělostřeleckou podporu v oblastech, kam bylo dříve obtížné se dostat."
 artillery5: "Pokročilé dělostřelecké vylepšení"
 artillery5_desc: "Dělostřelecké konstrukce s nižšími siluetami budou pro nepřítele obtížněji zaměřitelné."
 mountain_gun: "Horský kanón"
 mountain_gun_desc: "Horský terén severní Indie vedl k vývoji dělostřeleckého kusu, který mohl být rozložen a dopraven na oslu tam, kde bylo potřeba."
 rocket_artillery2: "Vylepšení raketového dělostřelectva I"
 rocket_artillery2_desc: "Samohybné dělostřelectvo vybavené více raketami bude schopno rychle způsobit rozsáhlou destrukci a zároveň si zachovat mobilitu, aby se vyhnulo protibateriové palbě."
 rocket_artillery3: "Vylepšení raketového dělostřelectva II"
 rocket_artillery3_desc: "Obětujeme-li dolet ve prospěch zásahu, můžeme na větší vozidla namontovat těžší rakety. Tyto dělostřelecké baterie, které operují v týmech, mohou spolupracovat, aby se rychle nabíjely a přemisťovaly."
 rocket_artillery4: "Raketové dělostřelectvo III"
 rocket_artillery4_desc: "Rakety s rotační stabilizací mohou zvýšit dostřel lehčích dělostřeleckých baterií."
 interwar_antiair: "Protivzdušná zbraň"
 antiair1: "Vylepšení protivzdušné obrany"
 antiair1_desc: "Díky rychlejším nabíjecím mechanismům mohou protiletadlové zbraně nesoucí velké náboje stále udržovat potřebnou rychlost střelby."
 antiair2: "Protivzdušná obrana II"
 antiair2_desc: "K zaměření na vysoko letící letadla budou zapotřebí delší náboje a hlavně pro protiletadlové zbraně."
 antiair3: "Zdokonalená protivzdušná obrana I"
 antiair3_desc: "Se zdokonalováním radarových systémů je použití radarového navádění protiletadlových děl stále schůdnější. Držení kroku s touto technologií nám umožní vyrábět jedny z nejpřesnějších dostupných protiletadlových systémů."
 antiair4: "Zdokonalená protivzdušná obrana II"
 antiair4_desc: "Pro rychlou reakci proti rychlejším letounům bude nutné kombinovat moderní systémy radarů, výpočetní techniky a automatického nabíjení."
 antiair5: "Protivzdušná obrana V"
 antiair5_desc: "Střely země-vzduch jsou budoucností protiletadlového boje. Vývoj mobilní platformy pro ně by měl být naším dalším cílem."
 interwar_antitank: "Protitankové dělo"
 antitank1: "Vylepšení protitankových zbraní"
 antitank1_desc: "Význam účinných protitankových zbraní se ukázal ve Velké válce. Zavedení nové generace těchto zbraní bude nezbytné pro boj s moderními konstrukcemi tanků."
 antitank2: "Protitankové dělo II"
 antitank2_desc: "Většina protitankových děl je zatím poměrně lehká. Pro boj s těžšími tanky se zešikmeným pancířem budou zapotřebí děla větší ráže."
 antitank3: "Zdokonalené protitankové zbraně I"
 antitank3_desc: "V protitankovém dělostřelectvu lze použít náboje HEAT (high-explosive anti-tank), které kompenzují omezenou úsťovou rychlost."
 antitank4: "Zdokonalené protitankové zbraně II"
 antitank4_desc: "Nová univerzální protitanková děla používající střely s pancéřovou střelou, která odhazuje opláštění, mohou prorazit pancíř téměř každého tanku."
 antitank5: "Protitankové dělo V"
 antitank5_desc: "Kombinací různých druhů nové technologie střeliva a zbraní s vyšší úsťovou rychlostí můžeme být připraveni na jakoukoli novou výzbroj, kterou naši nepřátelé vyvinou."
 air_superiority: "Vzdušná nadvláda"
 air_superiority_desc: "Získání vzdušné nadvlády ztíží použitelnost nepřátelských bombardérů proti naší zemi, což umožní našim bombardérům útočit na naše nepřátele."
 formation_flying: "Formace létání"
 formation_flying_desc: "Létáním ve formaci mohou letadla vzájemně poskytovat podporu nebo spolupracovat na útoku na nepřátele."
 air_offense: "Doprovod stíhačů"
 air_offense_desc: "Vzhledem k zaměření na bombardování během dne musíme udržet naše bombardéry v bezpečí před stíhači. Výcvik našich stíhacích pilotů k úzké spolupráci s bombardéry zlepší jejich bojové schopnosti při ochraně bombardérů v nepřátelském vzdušném prostoru."
 fighter_baiting: "Nalákání letounů"
 fighter_baiting_desc: "Předstíráním zranitelnosti mohou naši stíhači lákat nepřátelské letouny do přepadů."
 dogfighting_experience: "Zkušenosti v leteckých soubojech"
 dogfighting_experience_desc: "Není snadné sledovat relativní polohy přátel a nepřátel v hektickém víru leteckého souboje, ale jak naši piloti získávají zkušenosti, stávají se v tom obratnějšími."
 fighter_ace_initiative: "Iniciativa pro stíhací esa"
 fighter_ace_initiative_desc: "Udílení zvláštních ocenění a statusu pilotům, kteří dosáhnou statusu esa, tím, že sestřelí pět nepřátel, podněcuje riskování a přináší pocit výjimečnosti u pilotů es - ačkoliv to obvykle nutí zkušené piloty zůstat v bojových pozicích."
 multialtitude_flying: "Víceúrovňové létání"
 multialtitude_flying_desc: "Vzdušný boj se odehrává ve třech dimenzích, ale většina pilotů má potíže sledovat letadla, která létají nad nebo pod nimi. Můžeme toho využít rozprostřením našich formací vertikálně."
 offensive_formations: "Ofenzivní formace"
 offensive_formations_desc: "Výcvik v víc ofenzivně orientovaných formacích činí naše letce smrtelnějšími v boji."
 fighter_sweeps: "Útoky stíhačů"
 fighter_sweeps_desc: "Agresivní hlídky stíhacích letadel nad nepřátelským územím mohou chytit jejich letadla při vzletu nebo přistání, kdy jsou obzvlášť zranitelná, nebo narušit nepřátelské výcvikové lety."
 force_rotation: "Rotace sil"
 force_rotation_desc: "Boj, nebo jednoduše dlouhé období intenzivního soustředění, je vyčerpávající, ale výměnou čerstvých sil kdykoli je to možné můžeme snížit chyby způsobené únavou pilotů."
 air_defence: "Protivzdušná obrana"
 air_defence_desc: "Výcvikem našich pilotů, aby byli neustále ve střehu, i když zdánlivě nehrozí žádné nebezpečí, se zvyšuje jejich šance na zachycení nepřátelských letadel."
 dispersed_fighting: "Rozptýlené boje"
 dispersed_fighting_desc: "Přijetí více rozptýlené formace umožňuje stejného počtu letadel hlídkovat ve větší oblasti."
 forward_interception: "Záchyt v předstihu"
 forward_interception_desc: "Prací blíže k nepřátelskému vzdušnému prostoru se zvyšuje pravděpodobnost, že naši stíhači dokážou zachytit nepřátelské letouny, dříve než dosáhnou svých cílů."
 fighter_veteran_initiative: "Iniciativa veteránů stíhaček"
 fighter_veteran_initiative_desc: "Zaměření na dlouhodobé přežití pilotů, jak prostřednictvím rozumné taktiky, tak rotací zkušených pilotů do výcvikových pozic, znamená, že mohou předat lekce, které se naučili, novým pilotům."
 formation_fighting: "Boj ve formaci"
 formation_fighting_desc: "Létání ve správných formacích umožňuje našimPilotům pokrýt vzájemné slepé skvrny, což vede ke zvýšení schopnosti odhalit nepřátelské letadla."
 air_skirmish: "Letecké potyčky"
 air_skirmish_desc: "Bohužel není vždy možné zničit každé nepřátelské letadlo, které se objeví nad naším územím, ale je možné je obtěžovat od okamžiku, kdy je spatříme, až do okamžiku, kdy odletí, a neustále je opotřebovávat."
 home_defence: "Obrana domova"
 home_defence_desc: "Pozorovatelé na zemi, stejně jako detekční a odposlouchávací stanice, spolupracují s naší leteckou silou na sledování a ničení nepřátelských incursion."
 battlefield_destruction: "Destrukce bojiště"
 battlefield_destruction_desc: "Zatímco letectvo může útočit na vzdálené nepřátelské země, může také být velkým přínosem při přímé podpoře armády v bitvách."
 dive_bombing: "Střemhlavé bombardování"
 dive_bombing_desc: "Střemhlavé bombardování umožňuje větší přesnost, ale pro dosažení nejlepších výsledků vyžaduje specializované letouny, které jsou schopny zpomalit střemhlavý let a přežít zátěž při jeho dokončování."
 direct_ground_support: "Přímá pozemní podpora"
 direct_ground_support_desc: "Úzkou koordinací pilotů letecké podpory s pozemními pozorovateli může být letecká palebná síla přesně směrována, aby co nejlépe pomohla jednotkám v boji."
 bomber_veteran_initiative: "Iniciativa veteránů bombardérů"
 bomber_veteran_initiative_desc: "Politika umožnění veteránským pilotům předávat své znalosti novým rekrutům výrazně pomáhá jejich přežití."
 bomber_ace_initiative: "Iniciativa bombardérských es"
 bomber_ace_initiative_desc: "Formální uznání a odměňování es bombardérů povzbuzuje odvahu a iniciativa."
 cas_veteran_initiative: "Iniciativa pro veterány pozemních vojsk"
 cas_veteran_initiative_desc: "Politika, aby veteráni předávali své znalosti novým rekrutům, významně zvyšuje jejich šance na přežití."
 cas_ace_initiative: "Esa letecké podpory"
 cas_ace_initiative_desc: "Formální uznání a ocenění pilotů letecké podpory podporuje odvahu a iniciativu."
 hunt_and_destroy: "Lov a ničení"
 hunt_and_destroy_desc: "Kromě přímé palebné podpory mohou jednotky letecké podpory samostatně vyhledávat cíle a často nečekaně útočit na nepřátelské pozemní síly při jejich přesunech na frontu."
 naval_strike_torpedo_tactics: "Námořní úder torpédovými taktikami"
 naval_strike_torpedo_tactics_desc: "Výcvik pilotů k přesnějšímu útoku torpédy učiní naše letecké útoky na nepřátelské lodě efektivnější."
 naval_strike_torpedo_tactics_oi: "Taktika námořních úderových torpéd"
 naval_strike_torpedo_tactics_oi_desc: "Výcvik pilotů k přesnějšímu úderu torpédy učiní naše letecké útoky na nepřátelské lodě efektivnějšími."
 naval_strike_tactics: "Námořní úderové taktiky"
 naval_strike_tactics_desc: "Výcvik pilotů v předpovídání pohybů lodí a koordinaci útoků učiní naše letecké útoky na nepřátelské lodě efektivnějšími."
 low_echelon_support: "Podpora nízkého stupně"
 low_echelon_support_desc: "Při přiřazení jednotek letecké podpory přímo k malým pozemním formacím zajišťuje, že vždy mají dodatečnou palebnou sílu k dispozici, i když jsou mimo dosah tradičního dělostřelectva."
 combat_unit_destruction: "Zničení bojové jednotky"
 combat_unit_destruction_desc: "Školení našich pilotů letecké podpory, aby opakovaně útočili na stejný cíl, dokud není potvrzeno jeho zničení, zajišťuje, že žáden cíl neunikne."
 operational_destruction: "Operační zničení"
 operational_destruction_desc: "Útok na dodavatelské linky nepřátelských pozemních sil brání jejich schopnosti se přesouvat mezi bojišti. To se přetváří na výhodu naší armády při operacích v oblastech, kde máme vzdušnou nadřazenost."
 infrastructure_destruction: "Ničení infrastruktury"
 infrastructure_destruction_desc: "Výcvik našich pilotů v nejlepších způsobech napadání infrastruktury, jako jsou železnice a mosty, zajišťuje efektivnější taktická bombardování."
 logistical_bombing: "Bombardování logistiky"
 logistical_bombing_desc: "Větší důraz na útoky na nepřátelské zásobovací linie ze vzduchu dává našim pozemním silám v oblasti větší výhodu."
 battlefield_support: "Podpora na bojišti"
 battlefield_support_desc: "Je obtížné pro taktická bombardéry zaútočit na cíle blízko našich pozemních sil ve střetu, protože úroveň bombardování je méně přesná než bombardování z pádu, ale více výcviku a interakce se pozemními pozorovateli může pomoci překonat tyto problémy."
 carousel_bombing: "Kolotočové bombardování"
 carousel_bombing_desc: "Bombardéry často chtějí jednoduše odhodit všechny bomby, jakmile dosáhnou cílové oblasti, a pak co nejdříve odletět domů. To sice může fungovat při plošném bombardování, ale pokud jde o zasažení malého cíle, je efektivnější se nad cílem zdržet a shodit najednou jen část nálože bomb, aby bylo dosaženo maximální přesnosti."
 keypoint_bombing: "Útok na klíčové body"
 keypoint_bombing_desc: "Přesné bombardování cílených klíčových bodů na bojišti na podporu našich pozemních sil může značně pomoci při porážce nepřítele."
 ground_support_integration: "Integrace pozemní podpory"
 ground_support_integration_desc: "Úplná integrace našich taktických bombardérů s pozemními pozorovateli zvyšuje nejen jejich přesnost, ale také umožňuje přímou podporu našich pozemních sil v boji."
 strategic_destruction: "Strategická destrukce"
 strategic_destruction_desc: "Naši piloti mají přístup k strategickým cílům mnohem rychleji než naše námořní nebo pozemní síly. Bez možností vybavit nové rekruty brzy přesáhneme počty nepřátelských sil."
 high_level_bombing: "Bombardování z výšek"
 high_level_bombing_desc: "Z větších výšek se můžeme vyhnout některým vzdušným střetům a protiletadlovým zbraním. Kdybychom shazovali bomby z výšky, vyžaduje to větší přesnost, ale je to bezpečnější."
 massed_bomber_formations: "Hromadné bombardovací formace"
 massed_bomber_formations_desc: "Zůstat ve formaci našim bombardérům umožňuje bránit jejich skupinu a zvyšovat naše šance na úspěšné svržení bomb."
 night_bombing: "Noční bombardování"
 night_bombing_desc: "S oslabenou obranou nepřítele a našimi bombardéry pokrytými tmou můžeme zůstat ofenzivní a efektivní 24 hodin denně. Ukážeme našemu nepříteli, jak vytrvalí jsme.\n\n"
 dead_reckoning_bombing: "Bombardování na základě odhadu"
 dead_reckoning_bombing_desc: "Měřením rychlosti, směru a odchylky od předchozích pozic můžeme vypočítat přesnější svržení bomby i v noci."
 infiltration_bombing: "Infiltrační bombardování"
 infiltration_bombing_desc: "Zapojení se do nepřátelských formací nebo sledování jich zpět na základnu se může zdát jako šílenství. S dostatečnou praxí je to zcela možné."
 pathfinder_groups: "Skupiny průzkumníků"
 pathfinder_groups_desc: "Zkušení piloti jsou vybaveni těmi nejlepšími nástroji pro osvětlení cílových pozic. Žádný kouř ani špatné počasí nezabrání bombardérům v plnění jejich mise."
 day_bombing: "Denní bombardování"
 day_bombing_desc: "Zaměřené úsilí během dne je devastující kvůli velké výhodě viditelnosti. Projekce síly je vítaným vedlejším efektem.\n\n"
 escort_relay_system: "Systém doprovodů"
 escort_relay_system_desc: "Bombardéry doprovázené stíhači výrazně zlepšují naši schopnost reagovat na nepřátelskou palbu."
 flying_fortress: "Létající pevnost"
 flying_fortress_desc: "Vybavení našich těžkých bombardérů, které létají ve velkých výškách, zbraněmi na obranu a dostatečným pancířem, aby snesly ránu a stále se vrátily domů."
 mass_destruction: "Hromadné ničení"
 mass_destruction_desc: "Bombardéry jsou vybaveny těmi nejodpornějšími zbraněmi ve velkém množství. Zaručujeme výsledky i když se dostane pouze několik našich pilotů."
 fleet_in_being: "Přítomnost flotily"
 fleet_in_being_desc: "Lodě zůstávají v přístavu, kde jsou v bezpečí, a zapojují se do bojů pouze v příhodných momentech. Přítomnost našich lodí učiní nepřátele zdrženlivějšími, pokud jde o obsazení našich přístavů.\n\n"
 battlefleet_concentration: "Koncentrace bitevní flotily"
 battlefleet_concentration_desc: "Jakmile zpozorujete nepřátelské plavidlo, zavolejte okolní lodě. Koordinovaná soustředěná palba rychle vyřadí nepřátelské lodě z provozu. Lovte je jednu po druhé."
 battlefleet_concentration_ti: "Koncentrace bitevní flotily"
 battlefleet_concentration_ti_desc: "Jakmile zpozorujete nepřátelské plavidlo, zavolejte okolní lodě. Koordinovaná soustředěná palba rychle vyřadí nepřátelské lodě z provozu. Lovte je jednu po druhé."
 subsidiary_carrier_role: "Sekundární roli nosiče"
 subsidiary_carrier_role_desc: "Nosné jednotky podporují bitevní lodě, zlepšují jejich připravenost na přechod z obrany do útoku. Užitek nosné jednotky jako očí na obloze a mocného rychlého úderného velení dobře doplňuje pomalejší bitevní lodě."
 subsidiary_carrier_role_ti: "Dcesná role letadlové lodě"
 subsidiary_carrier_role_ti_desc: "Letadlové lodě podporují bitevní lodě, zlepšují jejich připravenost přecházet z obrany do útoku. Užitek letadlové lodi jako 'oka na nebi' a mocné rychlé úderné síly dobře doplňuje pomalejší bitevní lodě."
 hunter_killer_groups: "Skupiny lovců-zabijáků"
 hunter_killer_groups_desc: "Torpédoborce vytvářejí skupiny určené k vyhledávání a ničení nepřátelských ponorek. Spojení průzkumných a úderných specialistů tvoří smrtící tým."
 floating_fortress: "Plovoucí pevnost"
 floating_fortress_desc: "S bitevními loděmi na nejvyšší pohotovosti budeme vždy připraveni reagovat, pokud se nepřítel odváží ohrozit naše vody. Každá flotila potřebuje solidní základnu a síla bitevní lodě je bezkonkurenční."
 floating_fortress_ti: "Plovoucí pevnost"
 floating_fortress_ti_desc: "S bitevními loděmi v nejvyšší pohotovosti jsme vždy připraveni reagovat, pokud se nepřítel odváží ohrozit naše vody. Každá flotila potřebuje solidní základ a síla bitevní lodě je bezkonkurenční."
 floating_fortress_bs: "Plovoucí pevnost"
 floating_fortress_bs_desc: "S bitevními loděmi na nejvyšší pohotovosti budeme vždy připraveni reagovat, pokud se nepřítel odváží ohrozit naše vody. Každá flotila potřebuje solidní základnu a síla bitevní lodě je bezkonkurenční."
 floating_airfield: "Plovoucí letiště"
 floating_airfield_desc: "Vylepšená integrace letadlových lodí do naší flotily nás udržuje připravené útočit jak ze země, tak vzduchu. Je klíčové, abychom dominovali vzduchu, kamkoli jdeme."
 floating_airfield_ti: "Plovoucí letiště"
 floating_airfield_ti_desc: "Zlepšená integrace letadlových lodí do naší flotily nás udržuje připravené útočit z moře i vzduchu. Je klíčové, abychom dominovali ve vzduchu, kamkoli jdeme."
 floating_airfield_bs: "Plovoucí letiště"
 floating_airfield_bs_desc: "Vylepšená integrace letadlových lodí do naší flotily nás udržuje připravené uderit jak ze moře, tak ze vzduchu. Klíčové je, abychom dominovali vzduchu, kamkoli jdeme."
 grand_battlefleet: "Velká bitevní flotila"
 grand_battlefleet_desc: "Výcvik velitelů umožňuje našim velitelům zachovat klid v bitevní vřavě, i když velí obrovským flotilám. Naše flotila rozdrtí jakoukoli opozici hlava nehlava."
 convoy_sailing: "Konvojové plavby"
 convoy_sailing_desc: "Zavedení povinné plavby v konvojích usnadní odhalení nepřátelských nájezdů a včasnou reakci. Bezpečnost v počtu je správná cesta."
 convoy_sailing_ti: "Konvojové plavby"
 convoy_sailing_ti_desc: "Zavedení povinné plavby v konvojích usnadní odhalení nepřátelských nájezdů a včasnou reakci. Bezpečnost v počtu je správná cesta."
 convoy_sailing_bs: "Konvojové plavby"
 convoy_sailing_bs_desc: "Zavedení povinné plavby v konvojích usnadní odhalení nepřátelských nájezdů a včasnou reakci. Bezpečnost v počtu je správná cesta."
 convoy_escorts: "Doprovody konvojů"
 convoy_escorts_desc: "Rychlé hladinové lodě jako součást našich konvojů nám umožní odhalovat nepřátelské ponorky a reagovat včas. Detekce je klíčem k eliminaci ponorkové hrozby."
 convoy_escorts_bs: "Doprovody konvojů"
 convoy_escorts_bs_desc: "Rychlé hladinové lodě jako součást našich konvojů nám umožní odhalovat nepřátelské ponorky a reagovat včas. Detekce je klíčem k eliminaci ponorkové hrozby."
 escort_carriers: "Průvodní letadlové lodě"
 escort_carriers_desc: "Oblast pokrytá letadly nosičů usnadňuje doprovod obchodních konvojů. Zajištění toku zdrojů je nezbytné."
 integrated_convoy_defence: "Integrovaná obrana konvojů"
 integrated_convoy_defence_desc: "Lepší koordinace námořnictva a vzduchu nám umožňuje útočit na nepřátele z kilometrů daleko, ještě předtím, než se přiblíží k našim obchodním konvojům. To dramaticky zvýší účinnost plavby konvojů."
 integrated_convoy_defence_bs: "Integrovaná obrana konvojů"
 integrated_convoy_defence_bs_desc: "Lepší koordinace námořnictva a vzduchu nám umožňuje útočit na nepřátele z kilometrů daleko dříve, než se přiblíží k našim obchodním konvojům. To dramaticky zvýší efektivitu plavby konvojů."
 submarine_operations: "Operační činnost ponorek"
 submarine_operations_desc: "Nemusíme se střetnout s nepřátelskou flotilou přímo, abychom vyhráli válku. Útočte na jejich obchodní konvoje, než se budou moci zareagovat a zmizet opět pod hladinu. Nemůžete bojovat s tím, co nemůžete vidět."
 submarine_operations_bs: "Operace ponorek"
 submarine_operations_bs_desc: "Nemusíme se utkat s nepřátelskou flotilou čelně, abychom vyhráli válku. Útočte na jejich obchodní konvoje, než stihnou zareagovat a zmizet opět pod hladinou. Nemůžete bojovat s tím, co nevidíte."
 undersea_blockade: "Podmořská blokáda"
 undersea_blockade_desc: "Ponorky jsou dokonalým nástrojem pro zastavení přílivu důležitých surovin k nepříteli. Oslabíme výrobu nepřítele a vyhrajeme tím, že je vyhladovíme."
 undersea_blockade_bs: "Podmořská blokáda"
 undersea_blockade_bs_desc: "Ponorky jsou ideálním nástrojem pro přerušení přísunu důležitých surovin k nepříteli. Oslabíme nepřítelskou výrobu a vyhrajeme tím, že je vyhladovíme."
 convoy_interdiction: "Zablokování konvoje"
 convoy_interdiction_desc: "Lepší koordinace našich ponorek jim umožní zasáhnout obchodní konvoje na cestě. Narušení zásobovacích tras nepřítele nám poskytne strategickou výhodu."
 convoy_interdiction_ti: "Zablokování konvoje"
 convoy_interdiction_ti_desc: "Lepší koordinace našich ponorek jim umožní zasáhnout obchodní konvoje na cestě. Narušení zásobovacích tras nepřítele nám poskytne strategickou výhodu."
 convoy_interdiction_bs: "Zablokování konvoje"
 convoy_interdiction_bs_desc: "Lepší koordinace našich ponorek jim umožní zasáhnout obchodní konvoje na cestě. Narušení zásobovacích tras nepřítele nám poskytne strategickou výhodu."
 submarine_offensive: "Ofenzíva ponorek"
 submarine_offensive_desc: "Dosažení vrcholu komunikace mezi našimi ponorkami jim umožňuje jít do ofenzívy. Zničme nepřátelské obchodní konvoje rychleji, než je mohou nahradit."
 submarine_offensive_bs: "Ponorkový útok"
 submarine_offensive_bs_desc: "Dosažení vrcholu komunikace mezi našimi ponorkami nám umožňuje přejít do ofenzívy. Pojďme zničit nepřátelské obchodní konvoje rychleji, než je mohou nahradit."
 trade_interdiction: "Přerušení obchodních tras"
 trade_interdiction_desc: "Čím dříve nepřátelské lodě objevíme, tím dříve je můžeme zničit. Zasáhněte jejich obchodní konvoje a utečte, než stihnou zareagovat.\n\n"
 unrestricted_submarine_warfare: "Neomezená ponorková válka"
 unrestricted_submarine_warfare_desc: "Nechme naše ponorky potápět jakékoli plavidlo bez varování, civilní či nikoli. I když někteří považují toto za porušení pravidel války, nelze popřít jeho účinnost."
 wolfpacks: "Vlčí smečky"
 wolfpacks_desc: "Díky tomu, že jsou naše ponorky organizovány do skupin, se výrazně zlepšila jejich vzájemná koordinace. Jakmile je nepřítel lokalizován, naše ponorka vyčkává, dokud nedorazí zbytek smečky, a zaútočí pouze tehdy, když je převaha v náš prospěch."
 advanced_submarine_warfare: "Pokročilá ponorková válka"
 advanced_submarine_warfare_desc: "Obrovské zlepšení komunikace mezi našimi ponorkami jim umožňuje dokonale načasovat útoky. Až nás konečně uvidí, bude to z potápějící se lodi."
 combined_operations_raiding: "Kombinované operace nájezdů"
 combined_operations_raiding_desc: "Vyčlenění všech zdrojů na pátrání po nepřátelských obchodních konvojích. Díky koordinaci mezi hlavní flotilou a ponorkami je naše flotila stále ve střehu. Žádná loď nezůstane v našich vodách bez povšimnutí."
 raider_patrols: "Hlídky nájezdníků"
 raider_patrols_desc: "Hlídky rychlých i těžkých lodí nedovolí nepřátelským obchodním konvojům se nikde ukrýt. \nNejen ponorky dokáží lovit."
 capital_ship_raiders: "Útočníci na hlavní bojové lodě"
 capital_ship_raiders_desc: "S našimi nejmocnějšími loděmi na lovu obchodních konvojů nepřítel již nenajde bezpečí v číslech. Jsou jako sedící kachny, modlí se, že je nenajdeme."
 carrier_operations: "Operace z letadlových lodí"
 carrier_operations_desc: "Letadlové lodě umožní našim pilotům útočit na moři rychleji a snadněji než z našich leteckých základen na pevnině. Útočit budeme dřív, než budou mít čas reagovat."
 naval_air_operations: "Námořní vzdušné operace"
 naval_air_operations_desc: "Piloti vyškolení k provádění misí z letadlových lodí otevírá novou cestu, jak dominovat mořím. Letadla jsou efektivním způsobem, jak ztenčit nepřátelskou flotilu."
 base_strike: "Úder na základny"
 base_strike_desc: "Útok na nepřátelské přístavy ochromí jejich schopnost obnovit loďstvo. To nám umožní dominovat na mořích díky početní převaze.\n\n"
 carrier_primacy: "Prvenství letadlových lodí"
 carrier_primacy_desc: "Moderní letadla mají větší dosah a přesnost než obyčejná námořní děla. Integrujte letadlové lodě do naší flotily a dominujte moři ze vzduchu."
 carrier_task_forces: "Úderné skupiny letadlových lodí"
 carrier_task_forces_desc: "Organizované úderné skupiny s letadlovými loděmi a lehkými křižníky zajišťují, že nás nepřítel nikdy nepřekvapí."
 massed_strikes: "Hromadné útoky"
 massed_strikes_desc: "Piloti vyškolení pro mise s letadlovými loděmi umožní i přeplněné letadlové lodi fungovat hladce, obklopujíc nepřítele a výrazně zvyšující jejich účinnost v námořních bitvách. Letadlová loď musí fungovat jako dobře promazaný stroj, kde každý zná svou roli."
 carrier_battlegroups: "Skupiny letadlových lodí"
 carrier_battlegroups_desc: "Letadlové lodě dokážou zasahovat nepřítele na větší vzdálenost než kterékoliv námořní dělo, a s očima na obloze nikdy nebudeme zaskočeni. Seskupení letadlových lodí představuje sílu, se kterou je třeba počítat."
 escort_patrols: "Doprovodné hlídky"
 escort_patrols_desc: "Zlepšení detekce činí naše konvojové eskorty mnohem smrtelnějšími pro ponorky. Bez místa, kde by se skrývaly, nepředstavují žádné skutečné nebezpečí."
