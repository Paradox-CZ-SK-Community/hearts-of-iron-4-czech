 basic_fortification_tech: "Základní opevnění"
 basic_fortification_tech_desc: "Použitím silnějších materiálů a kovových výztuží uvnitř struktur můžeme postavit větší pevnosti, aniž bychom se museli obávat, že se zhroutí."
 land_fort_tech_1: "Vylepšené pozemní pevnosti"
 land_fort_tech_1_desc: "Lepším využitím země obklopující naše opevnění a zapojením nové technologie můžeme posílit naše stávající struktury a ještě je dále rozšířit."
 land_fort_tech_2: "Pokročilé pozemní pevnosti"
 land_fort_tech_2_desc: "Odborné učení se z minulých chyb a posílení nejen samotné struktury, ale také jejích základových fondů nám umožní postavit mnohem větší opevnění, která budou schopna odolávat i těm nejzkušenějším nepřátelům."
 coastal_fort_tech_1: "Zdokonalená pobřežní opevnění"
 coastal_fort_tech_1_desc: "Vylepšením využití země kolem našich pobřežních opevnění a zapojením nových technologií můžeme posílit naše stávající struktury a dále je rozšířit."
 coastal_fort_tech_2: "Pokročilé pobřežní opevnění"
 coastal_fort_tech_2_desc: "Stavbou našich bunkrů a opevnění dále do svahů a kopců můžeme postavit ještě větší komplexy, které mají schopnost odrazit i největší námořní invazní síly."
 sp_rockets_improved_guidance: "Vylepšené navádění"
 sp_rockets_improved_guidance_desc: "Lepší naváděcí systémy umožní přesnější dělostřeleckou i raketovou palbu, zatímco řízené střely doletí dále a s vyšší ničivostí."
 sp_rockets_rocket_bomber: "$rocket_propelled_bombs$"
 sp_rockets_rocket_bomber_desc: "$rocket_propelled_bombs_desc$"
 sp_rockets_improved_rocket_bomber: "$improved_rocket_propelled_bombs$"
 sp_rockets_improved_rocket_bomber_desc: "$improved_rocket_propelled_bombs_desc$"
 sp_armored_advanced_flamethrower_tech: "Pokročilý plamenomet"
 sp_armored_advanced_flamethrower_tech_desc: "$advanced_flamethrower_desc$"
 sp_armored_lc_high_impact_obliterator_cannon_tech: "Těžký ničivý kanón"
 sp_armored_lc_high_impact_obliterator_cannon_tech_desc: "$lc_high_impact_obliterator_cannon_desc$"
 sp_armored_lc_naval_engine_conversion_tech: "Konverze námořních motorů"
 sp_armored_lc_naval_engine_conversion_tech_desc: "Využití námořního strojírenství - zesílené klikové hřídele, vysoký točivý moment a speciální chlazení - pro zvýšení výkonu a odolnosti motorů těžkých pozemních křižníků."
 sp_armored_lc_transmission_improvements_tech: "Zlepšení převodovky"
 sp_armored_lc_transmission_improvements_tech_desc: "Vylepšené převodové poměry, spojky a měniče točivého momentu umožňují efektivnější převodovky pro zvládání extrémních sil a hmotnosti pozemních křižníků."
 sp_armored_lc_specialized_field_manuals_tech: "Speciální polní příručky"
 sp_armored_lc_specialized_field_manuals_tech_desc: "Vývoj podrobných výcvikových manuálů pro osádky pozemních křižníků - zaměřených na obsluhu, údržbu i bojové nasazení těchto obrněných kolosů."
 sp_armored_lc_weapon_fire_control_tech: "Řízení palby"
 sp_armored_lc_weapon_fire_control_tech_desc: "Zavedení pokročilé optiky, dálkoměrů a gyroskopické stabilizace pro přesné zaměření i za pohybu a při zpětném rázu."
 sp_armored_engineer_tech: "Obrněná ženijní rota"
 sp_armored_engineer_tech_desc: "Spojením ženijní odbornosti s pancéřovou ochranou vznikají specializované jednotky pro překonávání překážek a podporu útoku v těžké palbě."
 sp_armored_maintenance_tech: "Obrněná technická rota"
 sp_armored_maintenance_tech_desc: "Použití obrněných vyprošťovacích vozidel zajišťuje rychlé opravy a udržení bojeschopnosti techniky v první linii."
 sp_armored_signal_tech: "Obrněná spojovací jednotka"
 sp_armored_signal_tech_desc: "Vybavení našich jednotek velitelskými vozidly zajistí bezpečné a spolehlivé komunikace a koordinaci na bojišti pod pancéřovou ochranou."
 sp_armored_motorized_military_police_tech: "Motorizovaná vojenská policie"
 sp_armored_motorized_military_police_tech_desc: "Jednotky vybavené vojenskými motocykly zajišťují pořádek v týlu, doprovod konvojů a rychlou reakci na incidenty. V případě potřeby jsou schopny i průzkumu v bojové zóně."
 sp_cluster_shells: "Kazetové granáty"
 sp_cluster_shells_desc: "Kazetové granáty rozptylují více podnáloží na široké ploše a maximalizují tak účinek proti nepřátelské pěchotě a technice."
 sp_artillery_rocket_assisted_projectiles_tech: "Raketové střely"
 sp_artillery_rocket_assisted_projectiles_tech_desc: "Vylepšené střely pro supertěžké houfnice, využívající raketový pohon ke zvýšení dostřelu a účinnosti dopadu."
 sp_artillery_purpose_built_gun_motor_carriages_tech: "Speciálně konstruované dělostřelecké podvozky"
 sp_artillery_purpose_built_gun_motor_carriages_tech_desc: "Specializovaná vozidla určená pro přepravu a podporu supertěžkých houfnic, zajišťující jejich mobilitu a snadné nasazení v boji."
 sp_multi_product_supply_ships: "Víceúčelová zásobovací loď"
 sp_multi_product_supply_ships_desc: "Nasazením nově vyrobených zásobovacích lodí zajišťujeme plynulejší přepravu paliva, munice a zásob."
 sp_standard_tenshioned_replenishment_alongside_method: "Standardizovaná metoda zásobování podél paluby"
 sp_standard_tenshioned_replenishment_alongside_method_desc: "Standardizovaná metoda zásobování podél paluby, známá jako STREAM, představuje další vývoj při zajištění plynulého zásobování našich dálkových námořních operací."
 sp_aip_engine_improved_tech: "Kombinované AIP-dieselové motory"
 sp_aip_engine_improved_tech_desc: "Díky zdokonalení technologie AIP dochází k lepšímu výkonu i efektivitě spotřeby materiálů a paliva."
 sp_aip_engine_advanced_tech: "Vysokorychlostní Walterovy motory"
 sp_aip_engine_advanced_tech_desc: "Naše zkušenosti s bezvzduchovým pohonem (AIP) nám umožnily vyvinout špičkové motory: tiché, rychlé a smrtící."
 sp_refined_pykrete: "Rafinovaný pykret"
 sp_refined_pykrete_desc: "Díky zdokonalení pykretu dosahujeme mnohem lepší izolaci a ochranu pro naše letadla na ledových letadlových lodích."
 sp_ice_composite_runawayas: "Kompozitní ledové dráhy"
 sp_ice_composite_runawayas_desc: "S pokračujícím vývojem ledových kompozitů hledáme nejlepší materiály a stavební postupy, které poskytnou ochranu našim letadlovým lodím a letadlům."
 heavy_battleship2: "Super-těžký bitevní loď II"
 heavy_battleship2_desc: "Vylepšení na našem dřívějším super těžkém designu se silnějšími zbraněmi a vylepšenými systémy řízení palby."
 sp_shock_hardening_techniques: "Techniky odolnosti proti otřesům"
 sp_shock_hardening_techniques_desc: "Použitím technik tlumení otřesů a vyrovnání napětí jsme snížili riziko předčasných výbuchů - střely jsou nyní spolehlivější a účinnější."
 sp_variable_time_fuze_shells: "Granáty s časovým zapalovačem"
 sp_variable_time_fuze_shells_desc: "Nasazením granátů s variabilním časovým zapalovačem dosáhneme explozí ve vzduchu a tím výrazně větší účinné zóny zásahu. "
 sp_helicopter_transport_pods_tech: "Jednotka dopravních vrtulníků"
 sp_helicopter_transport_pods_tech_desc: "Vrtulníky vybavené transportními moduly nebo vlečením zboží pod nimi mohou rychle a bez ohledu na terén přepravovat zásoby a vybavení. Zaseknutí v blátě je věcí minulosti!"
 sp_helicopter_artillery_observers_tech: "Vrtulníková průzkumná jednotka"
 sp_helicopter_artillery_observers_tech_desc: "Vrtulníky mohou získat dobrý výhled na bojiště bez ohledu na skutečný terén, a proto se stávají výbornými předními průzkumníky, kteří poskytují přesnou zpětnou vazbu na dělostřelecké palby."
 sp_helicopter_med_evac_tech: "Helikoptérová medevac jednotka"
 sp_helicopter_med_evac_tech_desc: "Přicházejí zraněné! Máme přicházející zraněné! Vrtulníky poskytují ještě rychlejší evakuaci raněných než běžné sanitky."
 sp_rockets_dual_chamber_rocket_engine_1: "Dvoukomorové raketové motory"
 sp_rockets_dual_chamber_rocket_engine_1_desc: "Přidáním druhé spalovací komory prodlužujeme dobu letu a zvyšujeme účinnost raketových motorů."
 sp_rockets_dual_chamber_rocket_engine_2: "Pokročilé dvoukomorové raketové motory"
 sp_rockets_dual_chamber_rocket_engine_2_desc: "Další vylepšení dvoukomorového designu přináší vyšší účinnost i výkonnost raketových systémů."
 sp_advance_sabot_shells: "Pokročilé podkaliberní střely"
 sp_advance_sabot_shells_desc: "Dodatečné prostředky přidělené výzkumu průbojné munice nám poskytly poznatky, jak zlepšit stabilizaci podkaliberních střel v celé řadě způsobů nasazení."
 reinforced_wings_mothership: "Posílení letek mateřské lodi"
 reinforced_wings_mothership_desc: "Bez mateřské lodi jsou stíhačky v podstatě uvězněny ve vzduchu, což značně omezuje jejich operační účinnost. Posílení letek mateřské lodi je nákladově nejefektivnější strategií, jak zvýšit schopnost přežití celé letky."
 miniature_fighters: "Zmenšené stíhačky"
 miniature_fighters_desc: "S menšími stíhačkami budeme schopni vzít více z nich do boje, aniž bychom obětovali mnoho palebné síly, a také snížit váhu zátěže mateřské lodě."
 aerial_hangars: "Letecké hangáry"
 aerial_hangars_desc: "Letecké hangáry připojené k mateřské lodi umožňují umístit na horní část letadlové lodi ještě více zmenšených stíhaček, což zvyšuje palebnou sílu a dosah."
 mothership: "Mateřská loď"
 transport_planes_cat: "Transportní letadla"
 RESEARCH_SHARING_VALUE_SCIENTISTS: "$VALUE|H1%$"
 naval_minelaying_research: "Výzkum pokládání min"
 naval_minelaying_research_desc: "Vývoj v oblasti magnetické detekce a stabilních zdrojů zapalování pro námořní výbušniny."
