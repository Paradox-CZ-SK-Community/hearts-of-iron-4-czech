 ASSAULT_LABEL: "ÚTOK"
 ASSAULT_LABEL_TT: "Zaměřte se na přímé a čelní útoky se pancéřovými jednotkami."
 INFILTRATION_LABEL: "INFILTRACE"
 INFILTRATION_LABEL_TT: "Zaměřte se na lest a nekonvenční strategie pěchoty."
 DEEP_BATTLE_LABEL: "HLUBOKÝ PROSTOR"
 DEEP_BATTLE_LABEL_TT: "Zlepšete podporu a schopnosti k úderu hluboko do nepřátelského území."
 MASS_MOBILIZATION_LABEL: "TOTÁLNÍ MOBILIZACE"
 MASS_MOBILIZATION_LABEL_TT: "Maximalizujte nábor a sílu v počtech."
 FLEET_IN_BEING_DESC: "Silná flotila zaměřená na bitevní lodě znamená, že jsme silou, s níž je třeba počítat při nasazení na moři."
 TRADE_INTERDICTION_DESC: "Proti silnějšímu námořnímu protivníkovi se můžeme zaměřit na vázání jeho flotily a ničení zásobovacích linek, abychom jeho válečnou mašinérii vyhladověli."
 BASE_STRIKE_DESC: "S důrazem na letadlové lodě a jejich podporu nebude žádný nepřítel mimo naši dosah, ať už na souši nebo na moři."
 AIR_SUPERIORITY_DESC: "Naše stíhačky jsou páteří letectva a brání naši oblohu, doprovázejí bombardéry a čistí oblohu od nepřátel pro naše pozemní jednotky."
 BATTLEFIELD_SUPPORT_DESC: "Zlepšením interakcí letecké podpory s divizemi můžeme zničit nepřátelské divize s optimální podporou"
 OPERATIONAL_INTEGRITY_DESC: "Taktické bombardéry jsou flexibilní a mohou provádět jak pozemní podporu, tak pravidelné bombardování."
 STRATEGIC_DESTRUCTION_DESC: "Bombardováním nepřátelských továren, ať už v noci, nebo, což je nebezpečnější, ve dne, můžeme vážně narušit jejich válečnou mašinérii."
