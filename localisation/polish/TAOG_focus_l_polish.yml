 HOL_curtail_colonial_autonomy_taog_desc: "$HOL_curtail_colonial_autonomy_desc$"
 HOL_taog_guarantee_colonial_loyalty: "Zaručit loajalitu kolonie"
 HOL_taog_guarantee_colonial_loyalty_desc: "Nacionalismus roste a další revoluce je na spadnutí. Zatímco revoluce z roku 1927 byla snadno potlačena, naše zdroje říkají, že tentokrát můžeme čelit mnohem připravenější skupině revolucionářů. Pokud dáme nějaké ústupky Soetardjově mírové národně orientované mobilizaci, můžeme odvést pozornost obyvatel od revoluce a nasměrovat ji na Soetardja."
 HOL_taog_guarantee_colonial_loyalty_tt: "§WWaruje, že [INS.GetNameDef] nebude mít revoluci.§!\n[INS.GetNameDefCap] se pokusí vyhlásit nezávislost mírovou cestou. To lze zastavit dokončením zaměření §Y$INSHOL_industrialized_colony$§!, které bude vyžadovat masivní investice do kolonie."
 SIA_the_khana_ratsadon: "Khana Ratsadon"
 SIA_the_khana_ratsadon_desc: "Lidová strana ukončila absolutismus a otevřela cestu k ústavní vládě. Její odkaz je diskutován, zrazen a krví potřísněn, ale zůstává základem, na kterém může být postavena moderní [SIA.GetName]."
 SIA_the_khana_ratsadon_tt: "\n§YKhana Ratsadon§! se stává aktivní.\n\n§YKhana Ratsadon§! je vedoucí stranou v [ROOT.GetName], která se dělí na §YVojenské křídlo§! a §YObčanské křídlo§!.\n\n§YObčanské křídlo§! zpravidla preferuje pro-demokratické politiky se zaměřením na civilní průmysl, zatímco §YVojenské křídlo§! inklinuje k pro-fašistickým politikám a militarizaci průmyslu.\n\nNaše volby je přivedou k větší nebo menší přízni, což udělí různé bonusy nebo penalizace.\nPokud se stanou rebelskými, mohou se pokusit o převrat.\n\nRůzné stavy schválení jsou §YRebelský§!, §YV opozici§!, §YNeutrální§!, §YMírná podpora§! a §YPlná podpora§!"
 SIA_shuffle_pridi_to_the_minister_of_interior: "Posílení pozice občanského křídla"
 SIA_shuffle_pridi_to_the_minister_of_interior_desc: "Přesunutím Pridiho na post ministra vnitra místo ministra zahraničí by efektivněji kontroloval alokaci vládních zdrojů a zpomalil rostoucí vliv vojenského křídla."
 SIA_shuffle_pridi_to_the_minister_of_interior_tt: "§Y$anti_fascist_raids$§! nyní zvýší podporu §YObčanského křídla§! a sníží podporu §YVojenského křídla§!"
 SIA_civil_nationalism: "Občanský nacionalismus"
 SIA_civil_nationalism_desc: "Každý Thajec by měl vědět, že jeho loajalita není k jedné vládě nebo jedné osobě, ale k hodnotám svobody, rovnosti a spravedlnosti, bez ohledu na to, kdo zrovna vládne."
 SIA_the_true_heirs_of_1932: "Skuteční dědicové roku 1932"
 SIA_the_true_heirs_of_1932_desc: "Vojensko rádo rámuje revoluci z roku 1932 jako svůj vlastní úspěch, přičemž opomíjí, že to byla výhra lidu. Lidem stačí to připomenout a z nich nabereme sílu."
 SIA_thammasat_university: "Thammasatova univerzita"
 SIA_thammasat_university_desc: "Thammasat jako nově založená univerzita může být rozšířena a položit základy nové éry thajské inovace."
 SIA_defenders_of_constitutional_liberty: "Obránci ústavní svobody"
 SIA_defenders_of_constitutional_liberty_desc: "Učitelé, bankéři, zdravotní sestry – vzdělaná střední vrstva může být mobilizována a galvanizována k obraně svobody, pokud vojenské křídlo překročí meze."
 SIA_dominate_public_symbols: "Dominovat veřejné symboly"
 SIA_dominate_public_symbols_desc: "Vojenské křídlo dlouho dominovalo veřejným symbolům, stavělo sochy a vyhlašovalo svátky oslavující samo sebe. Potřebujeme to vyvážit vlastním souborem symbolů, které oslavují právo lidu na sebeurčení a vítězství nad starým autokratickým režimem."
 SIA_civil_service_heroism: "Hrdinství státní služby"
 SIA_civil_service_heroism_desc: "Každému Thajci musí být vštěpen vnitřní povinnost chránit právní řád, pokud by se kterákoliv moc, cizí či domácí, pokusila tuto moc zmocnit sama. Nejenže potřebujeme podporu lidu, pokud by se někdo pokusil vzít nám svobody, ale také potřebujeme, aby lid sám vystupoval jako nositel standardů."
 SIA_spread_democratic_sentiment_in_universities: "Šířit demokratické nálady na univerzitách"
 SIA_spread_democratic_sentiment_in_universities_desc: "Akademici v sobě nesou budoucí směr [SIA.GetName]. To, co se naučí dnes, se odrazí v budoucnu, a vštěpováním silného smyslu pro demokratickou povinnost dnešním učencům jej můžeme rozšířit i mimo akademické síně."
 SIA_sideline_disloyal_officers: "Odstavit neloajální důstojníky"
 SIA_sideline_disloyal_officers_desc: "Důstojnický sbor armády není monolit. V jeho řadách sedí muži, jejichž loajalita patří bývalým patronům, soupeřícím frakcím nebo jejich vlastním ambicím spíše než vládě. Pečlivými přesuny a administrativním nátlakem lze tyto osoby umístit na posty, kde nepředstavují hrozbu, zatímco těm, kteří prokázali spolehlivost, se dají odpovědnosti, které si zaslouží."
 SIA_sideline_disloyal_officers_tt: "Dva náhodní generálové získají vlastnost §YPřeřazen§! na 4 roky, což jim znemožní dávat bonusy.\nDva náhodní generálové, kteří nemají vlastnost §YPřeřazen§!, získají zvýšené statistiky a další pozitivní vlastnost."
 SIA_direct_funds_from_the_military_towards_development: "Přesměrovat finance z armády na rozvoj"
 SIA_direct_funds_from_the_military_towards_development_desc: "Ačkoliv to Zbrojní křídlo pobouří, že jeho financování je přesměrováváno na rozvoj, bude to jejich odpovědnost, nikoli naše, vysvětlit veřejnosti, proč je toto menší investování nakonec pro ně výhodné."
 SIA_as_the_eyes_turn_towards_southeast_asia: "Když se oči obracejí k Asii"
 SIA_as_the_eyes_turn_towards_southeast_asia_desc: "Jihovýchodní Asie už není vzdálené divadlo. Je to křižovatka impérií, revolucí a války. [SIA.GetName] se musí rozhodnout, zda bude pěšcem v tomto boji, nebo mocností s vlastními záměry."
 SIA_support_songsuradets_military_clique: "Podpořit vojenskou skupinu Songsuradet"
 SIA_support_songsuradets_military_clique_desc: "Ne každý důstojník je nepřítel národa. Songsuradet a jeho věrní nabízejí disciplinovanou vojenskou alternativu ke zkorumpovaným generálům, kteří Siam přivedli na pokraj. S jejich podporou lze obnovit pořádek, aniž bychom vydali stát chaosu."
 SIA_support_songsuradets_military_clique_tt: "Pokud vypukne §YObčanská válka§!, Songsuradet nás podpoří a udělí §Y3§! dalších divizí\n§RPokud posílíme Songsuradeta a poté se pokusíme ho zadržet skrze $SIA_the_songsuradet_rebellion$ může se bránit.§!"
 SIA_the_royal_police_counterweight: "Královská policie"
 SIA_the_royal_police_counterweight_desc: "Královská policie působí jako nezávislá složka a může být využita proti naší opozici, pokud se budou snažit uchopit moc."
 SIA_the_royal_police_counterweight_tt: "Pokud vypukne §YObčanská válka§!, Královská policie nás podpoří a udělí §Y2§! dalších divizí"
 SIA_for_the_preservation_of_siamese_independence: "Konsolidovat kontrolu Zbrojního křídla"
 SIA_for_the_preservation_of_siamese_independence_desc: "Poslední století vidělo, jak mocnosti světa narušovaly [SIA.GetAdjective] územní celistvost, a toto století se zdá být v tomtéž duchu. Musíme jednat rozhodně, pokud chceme zachovat náš způsob života, jinak zůstaneme trupovým státem, zmrzačeným, rozděleným a roztrhaným."
 SIA_for_the_preservation_of_siamese_independence_tt: "§Y$anti_democratic_raids$§! nyní zvýší oblibu §YZbrojního křídla§! a sníží oblibu §YCivilního křídla§!"
 SIA_the_peoples_day: "Den lidu"
 SIA_the_peoples_day_desc: "Místo dalšího zdůrazňování role armády při svržení staré monarchie bychom měli pozvednout roli samotného lidu. Zřízení Dne lidu sjednotí národ a naučí naše občany nechtít méně."
 SIA_hold_military_parades: "Uspořádat vojenské přehlídky"
 SIA_hold_military_parades_desc: "Pro posílení vojenské morálky, odměnění našich loajálních generálů a připomenutí občanům síly [SIA.GetAdjective] ozbrojených sil uspořádáme velkou přehlídku po Bangkoku. Ať mají noviny co tisknout!"
 SIA_embed_technocrats_in_civilian_institutions: "Uvést technokraty do civilních institucí"
 SIA_embed_technocrats_in_civilian_institutions_desc: "Můžeme utvořit spojenectví s technokraty ve vládě a využít je jako prodlouženou ruku civilního křídla k dalšímu oslabení vlivu armády."
 SIA_military_academies_indoctrination: "Indoktrinace na vojenských akademiích"
 SIA_military_academies_indoctrination_desc: "Naše vojenské akademie jsou ideálním cílem pro ideologické školení. Jsou dobře ozbrojené a mladí kadeti jsou snadno ovlivnitelní svými instruktory. Získáte-li instruktory, získáte vojenskou mládež. Silná armáda, loajální vládnoucí třídě, je základem každého mocného státu, a mocní my budeme."
 SIA_the_king_of_the_white_elephant: "Král bílého slona"
 SIA_the_king_of_the_white_elephant_desc: "Hysterie ohledně navrácení ztracených území hrozí zasáhnout národ a svět sleduje. Abychom tento zápal zchladili, natočíme protivojenský film, první thajský film v angličtině, aby ukázal světu pravou tvář [SIA.GetName]."
 SIA_drum_up_irredentism: "Podněcovat irredentismus"
 SIA_drum_up_irredentism_desc: "Není dostačující zajistit pouze podporu armády pro budoucí válku, musíme také získat podporu populace obecně. Básněmi, filmy a projevy připravíme [SIA.GetName] na vyrovnání se s imperialistickými mocnostmi, které ukradly naše historické země."
 SIA_sell_privy_purse_lands: "Prodat pozemky z privátního fondu"
 SIA_sell_privy_purse_lands_desc: "Královská rodina drží obrovské pozemky, které teď jsou pod naší kontrolou. Tyto statky by mohly výrazně posílit naši pokladnu a části lze prodat za příznivé ceny vybraným důstojníkům, abychom zajistili jejich loajalitu."
 SIA_sell_privy_purse_lands_tt: "Když duch vyprší, §Y[SIA_phraya_phahon.GetName]§! bude zapleten do skandálu, což vám umožní obejít požadavek fašismu pro §Y$SIA_phibuns_premiership$§!"
 SIA_war_fervor: "Válečné nadšení"
 SIA_war_fervor_desc: "Bubny zní v očekávání nadcházejícího konfliktu. Lidé jsou připraveni, zápal vzplanul a válečné nadšení brzy dosáhne vrcholu. Musíme pečlivě směrovat tuto energii k hodné věci."
 SIA_war_fervor_tt: "Podpora války se trvale zvýší, dokud nevyhlásíme válku jiné zemi, při čemž bude duch odstraněn.\n\nPokud §YPodpora války§! zůstane dlouho nad §Y95%§! bez vyhlášení války, vypukne občanská válka.\nPo vyhlášení války: "
 SIA_the_midnight_meeting: "Půlnoční setkání"
 SIA_the_midnight_meeting_tt: "[SIA_plaek_phibunsongkhram.GetName] uchopí moc v [SIA.GetNameDef], vede vládu. Budeme ho muset sesadit, aby byla obnovená monarcie."
 SIA_the_midnight_meeting_desc: "Vojenský maršál Songsuradet sleduje, jak Phibun nabývá stále větší moci a vidí v tom příslib vyrovnání. Pokud mají monarchie a Songsuradet přežít, royalisté, vrchní důstojníci a civilní notabilové se musí tajně sejít a dohodnout se na odstranění Phibuna dříve, než udeří on."
 SIA_meet_with_king_prajadhipok: "Setkat se s králem Prajadhipokem"
 SIA_meet_with_king_prajadhipok_desc: "Spiknutí bez krále je jen další vojenské intriky. Setkáním s králem Prajadhipokem v exilu můžeme jejich kauzu podložit rouchem královské legitimity a získat požehnání muže, jehož návrat může rozbouřit váhavé a rozdělit režim."
 SIA_prajadhipok_audience_with_churchill: "Prajadhipok na audienci u [ENG.GetLeader]"
 SIA_prajadhipok_audience_with_churchill_desc: "Přítomnost Prajadhipoka v [ENG.GetName] nabízí víc než prestiž. Pokud přesvědčí [ENG.GetLeader], že loajalistické povstání slouží britským zájmům v Asii, mohou zbraně z Malajsie doputovat do rukou mužů věrných trůnu."
 SIA_prajadhipok_audience_with_churchill_tt: "[ENG.GetName] nám poskytne "
 SIA_prajadhipok_audience_with_churchill_tt2: "Po zahájení občanské války."
 SIA_facilitate_prajadhipoks_move_to_japan: "Umožnit Prajadhipokův přesun do Japonska"
 SIA_facilitate_prajadhipoks_move_to_japan_desc: "Británie není jediná mocnost, která by mohla profitovat z rozvratu v [ROOT.GetNameDef]. Zajištěním přepravy Prajadhipoka do Japonska můžeme získat přízeň Tokia a snad i záruku, že divize budou k dispozici, pokud se loajalistické povstání změní v občanskou válku."
 SIA_facilitate_prajadhipoks_move_to_japan_tt: "3 divize Hraničářů z [JAP.GetNameDef] nás podpoří během občanské války."
 SIA_the_kings_gambit: "Králova gambit"
 SIA_the_kings_gambit_desc: "Prajadhipok se vrátí do Bangkoku v plné naději, že ho režim umístí do vězení. Tento akt poskytne royalistům pobouření, legitimitu a autoritu, které potřebují, aby se zbavili váhání a povstali ve jeho jménu. Jakmile bude exilový král zadržen, zazní signál a boj o [ROOT.GetName] začne."
 SIA_the_kings_gambit_tt: "Naše podpora bude záviset na tom, kolik klik máme na naší straně."
 SIA_restore_order: "Obnovit pořádek"
 SIA_restore_order_desc: "Občanská válka je vyhrána, ale samotné vítězství království neléčí. Suť musí být obnovena, stará garda pacifikována a správa obnovena, aby [ROOT.GetName] mohl z chaosu vystoupit s korunou zajištěnou a veřejný život navrácen do řádného běhu."
 SIA_ananda_age_trigger_12: "Král Ananda je alespoň §Y12§! let (aktuálně §Y[?var:SIA_anandas_age]§!). Jeho narozeniny jsou 20. září"
 SIA_ananda_age_trigger_15: "Král Ananda je alespoň §Y15§! let (aktuálně §Y[?var:SIA_anandas_age]§!). Jeho narozeniny jsou 20. září"
 SIA_ananda_trait_tt: "Když Ananda nastoupí na trůn dostane: "
 SIA_to_forge_a_king: "Vytesat krále"
 SIA_to_forge_a_king_desc: "Král Ananda zůstává daleko ve Švýcarsku, dost mladý na to, aby se jeho mysl a charakter ještě formovaly. Pokud pečlivě nasměrujeme jeho studium, můžeme vykovat nejen korunovanou figurku, ale vládce vhodného pro osud, který hodláme pro [ROOT.GetNameDef]."
 SIA_to_forge_a_king_tt: "Budoucí král Ananda Mahidol je právě mladý a studuje v [SWI.GetName]. Můžeme ovlivnit jeho budoucí studia a zájmy, zajistit, že se stane velkým králem.\n\nKaždý rok, na jeho narozeniny, dokud mu nebude 15, si budeme moci vybrat zájem, který bude studovat, což mu udělí různé bonusy, když nakonec nastoupí na trůn.\n\nJeho datum narození je 20. září a jeho věk je §Y[?var:SIA_anandas_age]§!"
 SIA_ascend_the_throne: "Nástup na trůn"
 SIA_ascend_the_throne_desc: "Roky regentství nemohou trvat věčně. Ananda je nyní dospělý natolik, aby přijal břemeno království sám, a jeho formální nástup umožní obnovené monarchii přejít z poručenství a intrik do nové a legitimní vlády."
 SIA_the_provincial_council_of_state: "Provincionální rada státu"
 SIA_the_provincial_council_of_state_desc: "Boje zanechávají mechanismus vlády rozbitý a autoritu nejistou. Dokud mladý král Ananda nebude moci vládnout ve svém vlastním jméně, musí Provincionální rada státu sloužit jako dočasná vláda a prohlásit, že loajalisté bojují ne pro sebe, ale pro obnovení zákonné monarchie."
 SIA_the_regency_of_boworadet: "Regentství Boworadeje"
 SIA_the_regency_of_boworadet_desc: "Princ Boworadej nese prestiž starého řádu a nikdo nemůže pochybovat, kde leží jeho loajalita. Jmenováním regentem jménem Anandy vložíme stát do konzervativních rukou a dáme jasně najevo, že obnova má být více než pouhá změna ministrů."
 SIA_the_sacred_hierarchy: "Svatá hierarchie"
 SIA_the_sacred_hierarchy_desc: "Boworadej stojí na tom, že království je nejsilnější, když každé stavovství zná své místo a Koruna stojí nad všemi světskými ambicemi. Monarchie, víra a přirozená hierarchie [ROOT.GetNameDef] musejí zase být považovány za svaté pilíře, nikoliv relikvie, o které se obchoduje."
 SIA_the_regency_of_songsuradet: "Regentství Songsuradeta"
 SIA_the_regency_of_songsuradet_desc: "Songsuradet není liberál, ale ani slepý k potřebám moderního státu. Jako regent může zachovat královskou autoritu a svěřit budoucnost [ROOT.GetNameDef] disciplíně, plánování a vojensky řízenému programu národního rozvoje."
 SIA_order_discipline_and_unity: "Pořádek, disciplína a jednota"
 SIA_order_discipline_and_unity_desc: "Chaos frakční politiky a občanské války téměř zničil království. Songsuradetova odpověď je jasná: pořádek ve vládě, disciplína ve společnosti a jednota cíle, aby království mohlo být přetvořeno na silnější a modernější stát."
 SIA_the_regency_of_rangsit: "Regentství Rangsita"
 SIA_the_regency_of_rangsit_desc: "Princ Rangsit chápe, že monarchie může přežít pouze usmířením se s zastupitelskou vládou. Jeho regentství nabízí královskou obnovu konzervativní v důstojnosti, ale demokratickou v metodách a připravenou dát [ROOT.GetNameDef] stabilní parlamentní budoucnost."
 SIA_constitutional_virtue: "Ústavní ctnost"
 SIA_constitutional_virtue_desc: "Monarchie, která respektuje zákon, se hůře svrhává a snadněji brání. Pod Rangsitovým vedením oživíme ústavní vládu, omezíme libovůli a naučíme národ, že Koruna je nejvíce bezpečná, když stojí jako ochránce zákonné svobody."
 SIA_an_absolute_monarchy: "Absolutní monarchie"
 SIA_an_absolute_monarchy_desc: "Experiment s omezenou monarchií přinesl jen ponížení, puče a uzurpaci královské moci ambiciózními důstojníky. Pokud má trůn znovu získat loajalitu, musí Koruna obnovit své plné pravomoci a vládnout bez podřízenosti stranám nebo parlamentu."
 SIA_a_constitutional_monarchy: "Ústavní monarchie"
 SIA_a_constitutional_monarchy_desc: "Trůn nemusí ovládat stát, aby zachoval království. Obnovením monarchie v rámci trvalého ústavního uspořádání můžeme svázat Korunu a lid dohromady a zajistit, že královská důstojnost koexistuje se zodpovědnou vládou."
 SIA_to_lay_the_bait: "Naložit návnadu"
 SIA_to_lay_the_bait_tt: "Unikneme falešný ekonomický plán, abychom rozezlili armádu.\nČím déle odložíme §Y$SIA_and_spring_the_trap$§!, tím silnější bude odplata proti armádě a tím více vzroste naše podpora.\n\n$SIA_dem_event_count_cw_scale_tt$\n\nPokaždé, když armáda kritizuje falešný návrh, naše podpora v občanské válce vzroste, až do maxima §Y75%§! podpory v občanské válce. Dodatečných §Y25%§! podpory v občanské válce lze získat z naší celkové demokratické podpory (škálováno z §Y0%-100%§!)."
 SIA_dem_event_count_cw_scale_tt: "§YAktuálně předpovězená podpora§!: §G[?var:SIA_dem_event_count_cw_scale|%]§!"
 SIA_to_lay_the_bait_desc: "Žlutý spis volá po ekonomické reformě, ale armáda jej označí za komunistický. Uniknutím falešného radikálního návrhu můžeme vyprovokovat jejich pobouření a pak je zdiskreditovat, když bude vydána skutečná, mírnější verze."
 SIA_and_spring_the_trap: "A spustit past"
 SIA_and_spring_the_trap_desc: "Generálové kousli na návnadu. Jejich pobouření se změnilo v povstání, jejich povstání odhalilo ambice a civilní vláda byla připravena. Teď se past zavírá a budoucnost [ROOT.GetName] bude rozhodnuta těmi, kteří jsou loajální ústavě."
 SIA_and_spring_the_trap_tt: "Pokud je naše celková podpora nad §Y80%§!, vyhneme se občanské válce a okamžitě svrháme armádu."
 SIA_rebuild_the_war_torn_economy: "Obnovit válkou zničenou ekonomiku"
 SIA_rebuild_the_war_torn_economy_desc: "Občanská válka roztrhala silnice, továrny, rýžová pole a obchodní trasy. Rekonstrukce musí začít okamžitě. Mzdy, obilí, koleje a úvěry stabilizují [ROOT.GetName] více než jakýkoli projev z Bangkoku."
 SIA_end_military_grift: "Skoncovat s armádním zbohatlictvím"
 SIA_end_military_grift_desc: "Příliš dlouho vojenské rozpočty živily soukromé jmění, patronážní sítě a zbytečné prestižní projekty. Válka odhalila hnilobu. Každá zkorumpovaná smlouva, fiktivní jednotka a ukradené dodávky musí být prošetřeny a odebrány staré klikě."
 SIA_the_purge: "Čistka"
 SIA_the_purge_desc: "Vojenská klika polila národ krví raději než aby se podřídila civilní vládě. S vlastizrádci není kompromis možný. Důstojníci, kolaboranti a sympatizanti musí být odstraněni ze všech velení dříve, než opět ohrozí stát."
 SIA_achieve_foreign_legitimacy: "Získat zahraniční legitimitu"
 SIA_achieve_foreign_legitimacy_desc: "Cizí mocnosti sledovaly naši krizi s nedůvěrou, čekajíce, zda se Siam zhroutí do junty nebo revoluce. Musíme dokázat, že civilní vláda je stabilní, zákonná a schopná bránit zemi."
 SIA_achieve_foreign_legitimacy_trigger: "Jakákoli velmoc má vůči nám více než §Y75§! Názor"
 SIA_countries_that_like_me_doctrine_tt: "§Y[?var:SIA_countries_that_like_me]x§! §G50%§! snížení nákladů pro: §YPozemní doktrínu§!"
 SIA_achieve_foreign_legitimacy_tt: "Získat §G[?var:SIA_achieve_foreign_legitimacy_base_stab_gain|%.0]§! stability pro každou velmoc, která má nad §Y75§! názoru na nás.\n\nPokud více než §Y3§! velmocí kvalifikuje, získáme také §Y1x§! §G50%§! snížení nákladů pro: §YPozemní doktrínu§! za každou kvalifikující se velmoc nad tento limit.\n\nPokud §Y6§! nebo více velmocí kvalifikuje, získáme §G+2§! §YCivilní továrny§!."
 SIA_secure_the_state: "Zabezpečit stát"
 SIA_secure_the_state_desc: "Vítězství v občanské válce neznamená stabilitu. Železnice, přístavy, arzenály a komunikační uzly musí být zajištěny dříve, než se reakční důstojníci opět seskupí. Bangkok musí zůstat klidný, spojený a pevně pod civilní kontrolou."
 SIA_expand_upon_the_dossier: "Rozšířit spis"
 SIA_expand_upon_the_dossier_desc: "Žlutý spis byl napsán pro křehký okamžik. Ten okamžik pominul. Se zničenou vojenskou klikou můžeme jít dál: hlubší pozemková reforma, silnější pracovněprávní ochrany a stát schopný přetvořit Siam od základů."
 SIA_military_oversight_bureau: "Úřad vojenského dohledu"
 SIA_military_oversight_bureau_desc: "Armáda nesmí znovu stát se státem ve státě. Civilní dohlížecí úřad bude monitorovat jmenování, rozpočty a politickou činnost v ozbrojených silách, zajišťujíc, že baráky odpovídají Bangkoku, ne naopak."
 SIA_military_oversight_bureau_tt: "§YMOB§! provádí vyšetřování generálů každých 5-9 měsíců. Během těchto období fungují dotčení generálové s nižší efektivitou, obezřetní vůči zvýšenému dohledu."
 SIA_the_yellow_dossier: "Žlutý spis"
 SIA_the_yellow_dossier_desc: "Falešný radikální návrh splnil svůj účel. Nyní může být implementován skutečný Žlutý spis: uměřená reforma, ekonomická modernizace a politické pojistky navržené k prolomení dominance armády, aniž by se národ vydal chaosu."
 SIA_achieve_domestic_legitimacy: "Získat vnitřní legitimitu"
 SIA_achieve_domestic_legitimacy_desc: "Vláda přežila silou zbraní, ale nyní musí zvítězit zákonem, chlebem a pořádkem. Musíme obnovit veřejnou důvěru, ospravedlnit výjimečná opatření a ukázat lidu, že civilní vláda nabízí víc než pouhé přežití."
 SIA_achieve_domestic_legitimacy_tt: "Systém §YKhana Ratsadon§! bude deaktivován.\n§YArmáda§! bude trvale ochromena a jakékoliv negativní duchy, kteří jsou aktivní, budou trvale odstraněny, zatímco pozitivní budou zachovány.\n\nKaždý duch Civilního křídla se trvale vymění na $idea_SIA_civilian_full_support$."
 SIA_allies_integration: "Integrace s spojenci"
 SIA_allies_integration_desc: "Naše síly se musí naučit bojovat po boku spojenců. Velitelské struktury, komunikace, zásobovací postupy a standardy vybavení musí být sjednoceny dříve, než se Siam stane něčím víc než symbolickým partnerem."
 SIA_prepare_for_a_pacific_war: "Připravit se na pacifickou válku"
 SIA_prepare_for_a_pacific_war_desc: "Oči impérií se obracejí k Pacifiku. Ambice Japonska, evropské kolonie a spojenecká strategie ukazují na blížící se bouři. Siam se musí připravit dříve, než první výstřely dopadnou na naše pobřeží."
 SIA_the_end_of_gunboat_diplomacy: "Konec válečné diplomacie"
 SIA_the_end_of_gunboat_diplomacy_desc: "Už nikdy nebudou cizí válečné lodě diktovat podmínky u ústí Čao Phraya. Siam musí mít děla, doky, miny a pobřežní obrany, aby každé ohrožení Bangkoku učinil činem šílenství."
 SIA_preemtive_strike: "Preemptivní úder"
 SIA_preemtive_strike_desc: "Čekat, až Japonsko zvolí hodinu války, by byla hloupost. Pokud impérium hodlá protrhnout Asii, [SIA.GetName] musí udeřit dřív, než budou jeho armády a flotily plně nasazeny jinde."
 SIA_the_siamese_armada: "Armáda [SIA.GetAdjective]"
 SIA_the_siamese_armada_desc: "Moderní [SIA.GetName] potřebuje moderní flotilu. S novými loděmi, vycvičenými posádkami a rozšířenou námořní infrastrukturou se [SIA.GetAdjective] armada stane silou schopnou bránit naše pobřeží a projekci moci za nimi."
 SIA_asian_democratic_compact: "Asijský demokratický pakt"
 SIA_a_more_moderate_option: "Mírnější možnost"
 SIA_a_more_moderate_option_desc: "Reformy musí vydržet, ne shořet v bouři opozice. Udržením Žlutého spisu v mezích umírněnosti můžeme izolovat extremistické živly, uklidnit střední třídu a postavit civilní pořádek, který přežije své první vítězství."
 SIA_asian_democratic_compact_desc: "Asie se nemůže navždy spoléhat na vzdálená impéria nebo sliby velmocí. Demokratické státy regionu musí stát společně, bránit se navzájem a dokázat, že nezávislost a svoboda mohou v Asii přežít."
 SIA_asian_democratic_compact_tt: "Odemkne možnost požadovat nezávislost pro asijské subjekty a umožní nám je pozvat do naší frakce."
 SIA_southeast_asia_joint_command: "Válčiště společné velení Jihovýchodní Asie"
 SIA_southeast_asia_joint_command_desc: "Náš pakt musí být víc než diplomatický slib. Společné velení zkoordinuje strategii, zásobování, zpravodajství a plánování obrany napříč Jihovýchodní Asií a promění oddělené armády v společný štít."
 SIA_pan_asian_weapon_standardization: "Pan-asijská standardizace zbraní"
 SIA_pan_asian_weapon_standardization_desc: "Každý spojenec používající jiné pušky, ráže, vysílačky a vozidla je pozvánkou k logistickému kolapsu. Standardizované zbraně a sdílené výrobní plány posílí naši koalici, zlevní ji a urychlí výzbroj."
 SIA_united_against_aggression: "Jednotní proti agresi"
 SIA_united_against_aggression_desc: "Žádný člen našeho paktu nesmí stát sám. Ať hrozba přijde z impéria, fašismu, militarismu nebo oportunistických sousedů, národy Asie odpoví společně."
 SIA_the_hammers_that_strike: "Kladiva, která udeří"
 SIA_the_hammers_that_strike_desc: "Naše aliance už není sbírkou malých států, které doufají přežít. Je to zbraň. Každý národ je kladivo a společně uderíme proti každé moci, která usiluje ovládnout Asii."
 SIA_mobilize_the_defenders_of_siam: "Mobilizovat obránce Siamu"
 SIA_mobilize_the_defenders_of_siam_desc: "Stará armáda zklamala národ, ale Siam stále potřebuje obránce. Dobrovolníci, loajální důstojníci, provinční gardy a vlastenečtí občané musí být organizováni do síly, která ochrání ústavu před nepřáteli vně i uvnitř."
 SIA_join_the_allies: "Přidat se ke spojencům"
 SIA_join_the_allies_desc: "[ROOT.GetName] nemůže stát osamoceně, zatímco svět pohltí válka. Spojenci nabízejí zbraně, mezinárodní uznání a místo mezi národy, které odolávají agresi. Připojením se k nim svážeme přežití Siamu s širším bojem za svobodný svět."
 SIA_the_malay_peninsular_defense_plan: "Obranný plán Malajského poloostrova"
 SIA_the_malay_peninsular_defense_plan_desc: "Pokud válka přijde do Jihovýchodní Asie, Malajsie bude jedním z prvních bojišť. Opevnění, zásobovací sklady a společné plánování s Brity změní poloostrov v štít proti invazi."
 SIA_the_malay_peninsular_defense_plan_tt: "Postaví železnici mezi Bangkokem a Singapurem.\n\nKaždý Victory Point v [MAL.GetName], Singapore, [724.GetName], [289.GetName] a [1076.GetName]\nPřidá §G2§! §YPobřežní pevnost§!\nPřidá §G2§! §YZemní pevnost§!\nKaždému z těchto států:\nPřidá §G1§! §YStatické protiletadlové dělostřelectvo§!"
 SIA_join_the_united_front: "Přidat se k Jednotné frontě"
 SIA_join_the_united_front_desc: "Čína krvácejí pod japonskou agresí, a přece stále bojuje. Připojením se k Jednotné frontě může [SIA.GetName] pomoci proměnit pozemní válku v hřbitov pro impérium."
 SIA_a_land_war_in_asia_desc: "Válka nebude vyhrána jen prohlášeními. Siamští vojáci musí pochodovat, bojovat a vydržet v těžkém terénu Asie. Naše závazek k Jednotné frontě musí být měřen činy."
 SIA_death_to_the_communists: "Smrt komunistům"
 SIA_death_to_the_communists_desc: "Porážka vojenské kliky nesmí otevřít cestu dalšímu útlaku. Komunističtí agitátoři si myslí, že krize oslabila stát. Brzy se naučí, že civilní demokracie není bezbranná."
 SIA_death_to_the_nationalists: "Smrt nacionalistům"
 SIA_death_to_the_nationalists_desc: "Japonsko bylo odraženo, ale otázka budoucnosti Asie zůstává. Starý nacionalistický řád jen nahradí jednu hierarchii jinou. Pokud má být Asie přetvořena, musí zvítězit komunisté."
 SIA_a_new_dawn_over_asia: "Nový úsvit nad Asií"
 SIA_a_new_dawn_over_asia_desc: "Japonské impérium padlo a zkorumpované síly, které doufaly získat jeho trosky, byly zahnány. Po celé Asii vychází nový úsvit nad národy rozhodnutými budovat svou budoucnost bez impériální nadvlády."
 SIA_phibuns_premiership: "Phibunovo premiérství"
 SIA_phibuns_premiership_desc: "Jak končí premiérství [SIA_phraya_phahon.GetName], připraven převzít moc stojí stranický kandidát Plaek Phibunsongkhram. To výrazně potěší postavení armády u nás, ale vyděsí civilní křídlo.\nPro nás existuje jen jedna cesta vpřed v této nové éře; s velkou pevností!"
 SIA_siamese_youth_movement: "Mladé hnutí [THIS.GetAdjective]"
 SIA_siamese_youth_movement_desc: "Mladí dospělí [THIS.GetName] musí být zkroteni jako ocel na žhavém ohni. Naučí se respektovat stát, bránit vlast a stát se užitečnými členy thajské společnosti."
 SIA_territorial_defense_student: "Student územní obrany"
 SIA_territorial_defense_student_desc: "Rozšířením hnutí mládeže mohou být nejpříhodnější kandidáti přemístěni do výcvikových táborů pro juniory, kde pomohou v obraně [SIA.GetNameDef]. Dostanou řádný vojenský výcvik a budou sloužit jako další nástroj, který armáda může využít."
 SIA_expand_domestic_arms_workshops: "Rozšířit domácí zbrojní dílny"
 SIA_expand_domestic_arms_workshops_desc: "Naše domácí schopnost vyrábět válečný materiál výrazně zaostává za vyspělými zeměmi. Musíme se soustředit na rozšíření vojenské výroby na domácí půdě, aby naše síly měly neustálý přísun nového vybavení."
 SIA_look_to_european_fascism: "Ohlédnout se po evropském fašismu"
 SIA_look_to_european_fascism_desc: "Máme příležitost reformovat tuto zemi, osvobozeni od minulosti budeme hledět k nové budoucnosti inspirováni tím, co se děje na Západě. Je jasné, že starý světový řád je rozebírán a ti, kdo zůstanou pozadu, ponesou následky za svůj nedostatek vize."
 SIA_the_songsuradet_rebellion: "Povstání Songsuradeta"
 SIA_the_songsuradet_rebellion_desc: "Vrchní důstojník Phraya Songsuradet je potenciální hrozbou pro současný režim, pokud by chtěl být. Toto nebezpečí nelze tolerovat a jako hlavní odpůrce Phibuna musí pryč.\nNepochybně existuje dost kompromitujícího materiálu, jímž lze Songsuradeta a jeho stoupence obvinit, což by pomohlo konsolidovat naši moc a eliminovat domácí protivníky."
 SIA_the_songsuradet_rebellion_historical_tt: "Generál Phraya Songsuradet bude obviněn ze spiknutí proti státu. On a poradce §Y[SIA_rangsit_prayurasakdi.GetName]§! budou vyčištěni.\n\nZískáme\n"
 SIA_the_songsuradet_rebellion_historical_tt2: "Po vypršení získat: "
 SIA_the_songsuradet_rebellion_historical_tt3: "na §Y[?var:SIA_purged_military_timer]§! dní"
 SIA_the_songsuradet_rebellion_alt_tt: "Generál Phraya Songsuradet bude obviněn ze spiknutí proti státu.\n\nJelikož jsme však posílili jeho vojenskou kliku, může se cítit odvážný a odmítnout předvolání, což může vést ke střetu nebo potenciálně k občanské válce."
 SIA_sue_the_king_in_exile: "Žalovat krále v exilu"
 SIA_sue_the_king_in_exile_desc: "O králi v exilu se říká, že si odvezl mnoho cenností do [ENG.GetNameDefCap]. Měli bychom je získat zpět, a pokud k tomu bude třeba jej a jeho manžela žalovat, ať tak bude."
 SIA_suspend_ordinary_legal_procedures: "Pozastavit běžné právní procedury"
 SIA_suspend_ordinary_legal_procedures_desc: "Povstání Songsuradeta nám dává příležitost přijmout razantní reformy ve jménu národní bezpečnosti. Kontroly a vyvážení, které drží soudy a další politické orgány, budou ochromeny, což nám dá čas potřebný ke centralizaci moci."
 SIA_the_duty_of_the_thai_people_during_the_war_act: "Zákon o povinnosti thajského lidu během války"
 SIA_the_duty_of_the_thai_people_during_the_war_act_desc: "$idea_SIA_cemented_control_3_desc$"
 SIA_recognize_manchukuo: "Uznat Mandžukuo"
 SIA_recognize_manchukuo_desc: "TODO_CM"
 SIA_press_censorship: "Cenzura tisku"
 SIA_press_censorship_desc: "Volná tiskovina riskuje podkopání stability státu. Zatímco určité volné pole musí existovat, musíme zajistit, aby hlas a vůle vlády měli přednost v médiích."
 SIA_department_of_publicity: "Úřad veřejných sdělení"
 SIA_department_of_publicity_desc: "Propagační stroj je nezbytný pro jakýkoliv stát, zvláště pro takový s územními ambicemi. Financování úřadu veřejných sdělení nám to umožní."
 SIA_thai_cultural_mandates: "Thajské kulturní mandáty"
 SIA_thai_cultural_mandates_desc: "Můžeme mobilizovat thajský lid a vybudovat silnou národní kulturu vydáním mandátů, posílením jednoty lidu a vytvořením jednotné identity."
 SIA_thai_cultural_mandates_tt: "Odemkne rozhodnutí k vydání kulturních mandátů, které dávají různé posílení za cenu §YPolitická síla§!. Mandát jedna a první další mandát jsou zdarma."
 SIA_relocate_the_capital_to_phetchabun: "Přesunout hlavní město do Phetchabun"
 SIA_relocate_the_capital_to_phetchabun_desc: "Vláda je ohrožena! Jak historie ukázala, Bangkok je zranitelný proti námořním útokům a i když to bude nepopulární rozhodnutí, přesun hlavního města více do vnitrozemí je nezbytný."
 SIA_relocate_the_capital_to_phetchabun_tt: "Přesune až §G3§! §YZbrojní továrny§! z §Y[1076.GetName]§! do §Y[1077.GetName]§!\nPřesune §G3§! §YCivilní továrny§! z §Y[1076.GetName]§! do §Y[1077.GetName]§!\nPostaví úroveň §G3§! pevností kolem Petchabun"
 SIA_relocate_the_capital_to_phetchabun_tt2: "Po vypršení duchů - Získat základní stabilitu: §R-25%§!"
 SIA_radio_propaganda: "Rozhlasová propaganda"
 SIA_radio_propaganda_desc: "Rozhlas se stává hlavním zdrojem, jak se [SIA.GetName] elektrifikuje, a stejně jako musíme mít kontrolu nad tiskem, musíme mít i kontrolu nad tím, co se vysílá."
 SIA_sala_chaloem_thai_movie_theater: "Kino Sala Chaloem Thai"
 SIA_sala_chaloem_thai_movie_theater_tt: "Odemkne rozhodnutí k výrobě propagačních filmů, které dávají různá posílení. Například:\n"
 SIA_sala_chaloem_thai_movie_theater_desc: "Filmy jsou v naší zemi novým médiem, ale jejich potenciál je zřejmý. Stejně jako poezie, knihy a rozhlas může naplnit srdce a mysli obyčejných lidí i elity. Tímto médiem můžeme posílit odhodlání občanů vidět velký [SIA.GetName]."
 SIA_pan_thaiism: "Pan-thajismus"
 SIA_pan_thaiism_desc: "Není dostačující, aby [ROOT.GetName] jen přežila, ale musí prosperovat. Budoucnost [ROOT.GetAdjective] lidu nespočívá v tom, být odsouzen k roli třetí kategorie státu, ale stát se aktivním hráčem ve světových záležitostech. Nejprve musí být srdce a mysli lidu mobilizovány proti imperialistům, kteří vzali to, co nám kdysi patřilo, a připomenout lidem, co nám bylo ukradeno."
 vichy_exist_trigger: "§YVichistická Francie§! existuje"
 vichy_exist_not_trigger: "§YVichistická Francie§! neexistuje"
 SIA_retake_lost_british_states: "Znovu získat ztracené britské státy"
 SIA_retake_lost_british_states_tt: "Odemkne možnost zahájit omezené války proti britským územím v §YBarmě§! a §YMalajsii§!"
 INS_retake_lost_british_states_tt: "Odemkne možnost zahájit omezené války proti britským územím v §YMalajsii§!"
 SIA_retake_lost_british_states_desc: "Nejen [FRA.GetAdjective] nás rozdělili, ale i [ENG.GetAdjective], kteří poháněni ambicí využili každou příležitost si vzít svou část. Když je jejich pozornost upřena na větší rivaly, nastal okamžik k naší akci."
 SIA_recover_indochina: "Obnovit Indočínu"
 SIA_recover_indochina_desc: "Minulé století vidělo, jak nás rozdělili [FRA.GetAdjective], vláda na druhém konci světa, která nemá právo nám určovat, jak žít, a přesto se svými válečnými loděmi a zbraněmi vzali, co bylo naše. V tomto století moc [FRA.GetAdjecive] slábne; toto století je naše."
 SIA_recover_indochina_tt: "Odemkne možnost zahájit omezené války proti územím §YIndochiny§!"
 SIA_demand_the_return_of_lost_territory: "Požadovat navrácení ztraceného území"
 SIA_demand_the_return_of_lost_territory_desc: "[FRA.GetNameDefCap] ukázalo svou slabost, není to víc než papírový tygr držící poslední stín vlivu. S kolapsem jeho ozbrojených sil již nemůže prosazovat sílu, kterou kdysi mělo, a není v pozici odolat našim požadavkům."
 SIA_demand_the_return_of_lost_territory_tt: "Požádáme vlastníky §YIndochiny§! a části §Y[MAL.GetName]§!, aby nám navrátili §Y[1069.Getname]§!, §Y[1067.Getname]§!, §Y[741.Getname]§!, §Y[1068.Getname]§!, §Y[1061.Getname]§!, §Y[1064.Getname]§!, §Y[1065.Getname]§! a §Y[670.Getname]§!.\n\nFaktory ovlivňující:\n-Srovnatelnost bojové síly alespoň 30% ve srovnání s vlastníkem\n-Vlastník je ve válce s velmocí\n-Vlastník není ve frakci\n-Vlastník je §YVichistická Francie§!\n-Jdeme ve frakci\n-Vlastník nás nemá rád"
 SIA_the_greater_thai_empire: "Velké Thajské impérium"
 SIA_the_greater_thai_empire_available_trigger: "§Y[ROOT.GetName]§! kontroluje každý indočínský stát\nKaždý indočínský stát má poslušnost vyšší než: §Y[?var:SIA_greater_thai_empire_compliance_requirement]%§!"
 SIA_the_greater_thai_empire_desc: "Hodina našeho vzestupu je na dosah. Co bylo jednou vzato, bylo navráceno, a s lidem, který nás uznává jako de facto autoritu, jsme pevně ustanovili naši legitimitu jako právoplatných vůdců obnoveného Velkého thajského impéria."
 SIA_crack_down_of_foreign_merchants: "Potlačit zahraniční obchodníky"
 SIA_crack_down_of_foreign_merchants_desc: "Obchod byl dlouho formován vnějšími zájmy, vytvářejíc zranitelnosti, které mohou ovlivnit naši národní odolnost. Abychom ochránili naši ekonomickou bezpečnost, musíme kontrolovat náš vlastní obchod a zajistit, aby prosperita a stabilita stály na naší vlastní základně."
 SIA_royal_palace_bureau_directive_no_1523: "Směrnice Královské palácové kanceláře č. 1523"
 SIA_royal_palace_bureau_directive_no_1523_desc: "S nárůstem nacionalismu v zemi i koruna vyšla na podporu vlády, žádajíc každého člena královského paláce darovat 10% svého příjmu na nákup moderního zbrojení."
 SIA_new_territories_administration: "Správa nových území"
 SIA_new_territories_administration_tt: "Odemkne rozhodnutí spravovat §YIndočínská§! území, které dávají zvýšenou poslušnost, průmysl a opevnění."
 SIA_new_territories_administration_desc: "Získání našich ztracených území je jen začátek. Musíme ukázat těm, kdo tam žijí, že jsme lepší volba. Bude realizován komplexní program ke zvýšení životní úrovně pro všechny, aby se každý občan cítil rovnoprávným v tomto novém větším [ROOT.GetName]."
 SIA_new_territories_administration_available_trigger: "Jakýkoli stát v §YIndochině§!\n   Je kontrolován §Y[ROOT.GetName]§!"
 SIA_industrialization_drive: "Průmyslová kampaň"
 SIA_industrialization_drive_desc: "Generace bohatství [ROOT.GetName] spočívaly v rýžových polích a vesnicích. Moderní svět však formují továrny a stroje, ne pluh. Pokud chceme zachovat nezávislost mezi velmocemi, musíme proměnit naše agrární království v průmyslový stát."
 SIA_industrialization_drive_trigger: "§YKhana Ratsadon§! je aktivní"
 SIA_asian_financial_compact: "Asijský finanční pakt"
 SIA_asian_financial_compact_desc: "Evropský kapitál stále dominuje velké části asijského obchodu, což vystavuje naši ekonomiku cizím tlakům. Hledáním těsnějších finančních vazeb se sousedy rozšíříme přístup k úvěrům, trhům a investicím, aniž bychom vzdali nezávislost."
 SIA_revision_of_unequal_treaties: "Revize nerovných smluv"
 SIA_revision_of_unequal_treaties_desc: "Staré smlouvy podepsané ze slabosti stále dávají cizím zájmům privilegia, která žádný moderní stát nesmí tolerovat. Musíme tyto nerovné smlouvy revidovat a obnovit plnou autoritu [ROOT.GetNameDef] nad obchodem, soudy a koncesemi."
 SIA_renegotiate_teak_control: "Přezkoumat kontrolu tiku"
 SIA_renegotiate_teak_control_desc: "Naše severní lesy obohacují koncesionáře, zatímco státu se vrací příliš málo. Přezkoumáním kontroly těžby tiku můžeme získat příjmy zpět, regulovat těžbu a zajistit, že thajské dřevo slouží thajskému rozvoji."
 SIA_a_fledgling_tobacco_industry: "Vznikající tabákový průmysl"
 SIA_a_fledgling_tobacco_industry_desc: "Tabák zůstává marginálním obchodem, rozptýleným a špatně organizovaným. S mírnou ochranou a pečlivými investicemi se tento drobný výnos může stát spolehlivým zdrojem spotřebních daní, venkovských příjmů a tovární práce."
 SIA_a_fledgling_tobacco_industry_tt: "Být na §Y$limited_exports$§! nebo §Y$closed_economy$§! přinese další §YCivilní továrnu§!"
 SIA_all_weather_roads: "Cesty do každého počasí"
 SIA_all_weather_roads_desc: "Příliš mnoho cest mizí s dešti, zanechávajíc provincie odříznuté od hlavního města a trhů. Síť cest odolných všem ročním obdobím sváže království dohromady a umožní zboží a vojákům pohyb v každém ročním období."
 SIA_the_bank_of_siam: "Banka Siamu"
 SIA_the_bank_of_siam_desc: "Průmyslový růst se neudrží jen na zvyk a soukromé přízni. Silnější národní banka dá státu větší kontrolu nad úvěrem, měnou a cirkulací kapitálu."
 SIA_thai_rice_company: "Thajská rýžová společnost"
 SIA_thai_rice_company_desc: "Rýže zůstává životní silou [ROOT.GetName], přestože obchod s ní je roztříštěný, spekulativní a zranitelný vůči cizím tlakům. Národní rýžová společnost umožní státu řídit vývoz, stabilizovat ceny a proměnit úrodu našich polí v pevnější základ národní síly."
 SIA_uk_japan_focus_tt: "Které umožňuje výběr mezi [ENG.GetNameDef] a [JAP.GetNameDef] s následujícími efekty:\n\n§Y[ENG.GetFlag][ENG.GetNameDefCap]§!:"
 SIA_japan_option_tt: "§Y[JAP.GetFlag][JAP.GetNameDefCap]§!"
 SIA_send_bureaucrats_abroad: "Poslat byrokraty do zahraničí"
 SIA_send_bureaucrats_abroad_desc: "Jiné národy již vybudovaly ministerstva, školy a technické služby, které potřebujeme. Posláním slibných úředníků do zahraničí můžeme importovat administrativní zkušenosti, aniž bychom importovali cizí nadvládu."
 SIA_baht_stabilization_act: "Zákon o stabilizaci bahtu"
 SIA_baht_stabilization_act_desc: "Moderní ekonomika potřebuje měnu, které obchodníci důvěřují a investoři přijímají. Stabilizace bahtu sníží nejistotu v obchodu a dá [ROOT.GetNameDef] pevnější postavení na mezinárodním trhu."
 SIA_siamese_development_cooperative: "Siamské rozvojové družstvo"
 SIA_siamese_development_cooperative_desc: "Soukromý kapitál je zdrženlivý a stát nemůže vše postavit sám. Národní rozvojové družstvo umožní úředníkům, obchodníkům a velkostatkářům sdružit prostředky pro projekty, které slouží společné ekonomice."
 SIA_boon_rawd_brewery: "Pivovar Boon Rawd"
 SIA_boon_rawd_brewery_desc: "Domácí pivovarnictví není jen otázkou spotřeby. Podniky jako Boon Rawd ukazují, že thajský kapitál, stroje a řízení mohou vytvořit moderní průmysl na thajské půdě."
 SIA_national_savings_bond: "Státní spořicí dluhopis"
 SIA_national_savings_bond_desc: "Bohatství národa nesmí ležet ladem v truhlách a ozdobách, zatímco silnice a továrny zůstanou nepostavené. Státní spořicí dluhopis přemění soukromé spoření na veřejné investice."
 SIA_national_savings_bond_tt: "Získáte duch $SIA_national_savings_bond$, který mění sílu podle vaší §YVyhlášky o branné povinnosti§!. Čím nižší je vaše vyhláška o branné povinnosti, tím silnější jsou pozitivní efekty, zatímco čím vyšší, tím horší.\n\nPři §Y$disarmed_nation$§! získat: "
 SIA_national_savings_bond_scraping_the_barrel: "Při §Y$scraping_the_barrel$§! získat:"
 SIA_national_savings_bond_volunteer_only: "Při §Y$volunteer_only$§! získat:"
 SIA_national_savings_bond_limited_conscription: "Při §Y$limited_conscription$§! získat:"
 SIA_national_savings_bond_extensive_conscription: "Při §Y$extensive_conscription$§! získat:"
 SIA_national_savings_bond_service_by_requirement: "Při §Y$service_by_requirement$§! získat:"
 SIA_national_savings_bond_all_adult_serve: "Při §Y$all_adults_serve$§! získat:"
 SIA_national_savings_bond_current: "Naše současná mobilizační zákonnost by nám poskytla: "
 SIA_deficit_spending: "Deficitní výdaje"
 SIA_deficit_spending_desc: "Ortodoxní účetnictví včas nevybuduje moderní ekonomiku, aby čelila nebezpečnému světu. Stát musí být ochoten utrácet předběžně, využívaje veřejné práce a veřejné zakázky k nastartování průmyslového růstu."
 SIA_deficit_spending_tt: "Po vypršení ducha získat: "
 SIA_acquire_light_tools: "Získat lehké nářadí"
 SIA_acquire_light_tools_desc: "Než budeme vyrábět velké stroje, musíme ovládnout skromné nástroje průmyslu. Import lehkého nářadí a vybavení dílen umožní malým továrnám a opravárnám rozmnožit se po [ROOT.GetName]."
 SIA_railway_and_port_extensions: "Rozšíření železnic a přístavů"
 SIA_railway_and_port_extensions_desc: "Rýže, dřevo a cín jsou k ničemu, pokud se nedostanou na trh. Rozšířením železnic a rozšířením přístavů vtáhneme provincie do národního obchodu a propojíme [ROOT.GetNameDef] se širším světem."
 SIA_mechanization_of_agriculture: "Mechanizace zemědělství"
 SIA_mechanization_of_agriculture_desc: "Příliš mnoho práce zůstává svázáno s tradičním pěstováním, což dává málo přebytku pro průmysl. Zavedením moderních nástrojů a strojů na venkově zvýšíme výnosy a uvolníme ruce pro továrny."
 SIA_irrigation: "Zavlažování"
 SIA_irrigation_desc: "Úspěch rolníka je stále závislý na záplavách a suchu. Širší zavlažovací systém ustálí sklizeň, rozšíří obdělávané plochy a učiní venkov pevnějším základem národního rozvoje."
 SIA_siam_cement_group: "Cementová skupina [ROOT.GetName]"
 SIA_siam_cement_group_desc: "Založena pod královskou patronací, [ROOT.GetName] Cement Group stojí jako jeden z nejvýznamnějších průmyslových podniků [ROOT.GetNameDef]. S cílenými investicemi a vládní podporou může společnost přejít z domácího dodavatele na pilíř širší průmyslové kapacity — položit základy, doslova, pro budoucnost národa."
 SIA_chemical_imports: "Import chemikálií"
 SIA_chemical_imports_desc: "Moderní zemědělství i průmysl závisí na sloučeninách, které ještě nedokážeme vyrobit ve vhodném množství. Import chemikálií dodá hnojiva, léky, barviva a výbušniny, dokud domácí průmysl nezvládne výrobu."
 SIA_chemical_imports_tt: "Přidá §G+1§! mimo-mapovou §YCivilní továrnu§! pokud je názor nad §Y[?var:ROOT.SIA_chemical_imports_opinion_threshold]§! při dokončení tohoto zaměření."
 INS_chemical_imports_stolen_tt: "Přidá §G[?var:ROOT.INS_guns_from_seek_help_focus]§! jednotek pěchotního vybavení, pokud je názor nad §Y75§! při dokončení tohoto zaměření."
 SIA_foreign_currency_exchange: "Směnárna cizích měn"
 SIA_foreign_currency_exchange_desc: "Industrializace požaduje zahraniční stroje, léky a paliva, a to lze kupovat jen za vzácnou měnu. Kontrolovaný systém směny nasměruje zahraniční prostředky tam, kde jsou nejdůležitější pro stát."
 SIA_farmers_into_the_city: "Přesun rolníků do měst"
 SIA_farmers_into_the_city_desc: "Moderní ekonomika nemůže být udržována jen vesnickou prací. Jak průmysl roste, stát musí podporovat řádnou migraci z rýžových polí do měst, kde lze vytvořit novou městskou pracovní sílu."
 SIA_textile_mills: "Textilní továrny"
 SIA_textile_mills_desc: "Látky jsou denní nezbytností, přesto mnoho z nich se tkaní v cizině a prodává nám zpět. Textilní továrny nahradí dovoz, zaměstnají městskou pracovní sílu a dají [ROOT.GetNameDef] jeden ze základních průmyslů moderního života."
 SIA_public_credit: "Veřejný úvěr"
 SIA_public_credit_desc: "Obchodníci, pěstitelé i výrobci trpí omezeným přístupem ke kapitálu. Rozšířením veřejného úvěru může vláda půjčovat tam, kde soukromé finance váhají, a vtlačit rozvoj do opomíjených odvětví."
 SIA_public_credit_trigger: "$idea_SIA_public_credit_debt$ je aktivní alespoň §Y180 dní§!"
 SIA_a_modern_economy: "Moderní ekonomika"
 SIA_a_modern_economy_desc: "Starý agrární řád nezmizí za den, ale už nemůže definovat budoucnost [ROOT.GetNameDef]. S bankami, školami, továrnami a infrastrukturou vznikajícími, začínáme budovat ekonomiku hodnou nezávislého moderního státu."
 SIA_reduction_of_agricultural_yield_taxes: "Snížení daní z zemědělské úrody"
 SIA_reduction_of_agricultural_yield_taxes_tt: "Snižuje §YZboží pro spotřebu§! od $idea_SIA_agricultural_tax_reduction$ o §Y[?var:SIA_agricultural_tax_reduction_cg_decrease_rate|%]§! každý měsíc a zvyšuje §YStabilitu§! o §Y[?var:SIA_agricultural_tax_reduction_stability_gain|%]§! každý měsíc, dokud malus §YZboží pro spotřebu§! nedosáhne §Y0%§!"
 SIA_reduction_of_agricultural_yield_taxes_desc: "Rolníkům nelze přikázat, aby krmili království, financovali stát a snášeli veškeré těžkosti bez úlevy. Snížením daní z úrody zanecháme více přebytku na venkově, posílíme loajalitu pěstitele a povzbudíme větší produkci ze země."
 SIA_fuel_oil_act: "Zákon o palivovém oleji"
 SIA_fuel_oil_act_desc: "Moderní doprava, průmysl i obrana závisí na palivech, která mohou být v válce uškrcena. Zákon o palivovém oleji dá spotřebu, skladování a nouzové přidělování pod pevnější státní dohled, aby se vzácné zásoby neplýtvaly."
 SIA_siam_electricity_company: "Siamská elektrická společnost"
 SIA_siam_electricity_company_desc: "Žádná ekonomika nevydrží moderní zátěž bez spolehlivé energie. Posílením Siam Electricity Company můžeme rozšířit výrobu, zlepšit koordinaci a zajistit, že dílny, sklady a města zůstanou zásobovány i v těžkých dobách."
 SIA_revise_the_taxation_system: "Přehodnotit daňový systém"
 SIA_revise_the_taxation_system_desc: "Současná daňová struktura nedostatečně slouží státu připravujícímu se na těžkosti a soběstačnost. Revidovaný systém vybere příjmy rovnoměrněji, sníží plýtvání a nasměruje břemeno národní obrany a rozvoje s větší disciplínou."
 SIA_census_the_hill_tribes: "Sčítání v horních kmenech"
 SIA_census_the_hill_tribes_desc: "Vysočiny zůstávají mimo plný dosah správy, zdanění a zásobování. Řádné sčítání nám dá znalosti potřebné pro efektivnější správu těchto oblastí a vtáhne jejich lidi a zdroje do širšího života národa."
 SIA_increase_rice_exports: "Zvýšit vývoz rýže"
 SIA_increase_rice_exports_desc: "Rýže je nejspolehlivějším zdrojem zahraničních příjmů pro [ROOT.GetNameDef]. Rozšířením vývozů, dokud jsou trhy otevřené, můžeme budovat rezervy, financovat strategické dovozy a připravit pokladnu na přerušení, která mohou přijít."
 SIA_pad_thai: "Pad Thai"
 SIA_pad_thai_desc: "Moderní národ drží při životě nejen ministerstva a továrny, ale i obyčejné zvyky, které spojují lidi. Propagací národního pokrmu z thajských ingrediencí podpoříme domácí spotřebu, naše farmáře a snížíme závislost na zahraničním jídle v nejistých časech."
 SIA_rice_husk_steam_turbines: "Parní turbíny na rýžové plevy"
 SIA_rice_husk_steam_turbines_desc: "To, co cizinec vidí jako odpad, nám dává hodnotu. Spalováním rýžových plevek pro výrobu páry můžeme čerpat energii z naší vlastní sklizně a snížit závislost na dováženém uhlí a ropě."
 SIA_domestic_tin_smelters: "Domácí tavírny cínu"
 SIA_domestic_tin_smelters_desc: "Už nestačí jen vykopat rudu a posílat ji do ciziny. Výstavbou domácích tavíren cínu si ponecháme větší část hodnoty zdrojů doma a zajistíme průmyslový kov nezbytný pro obchod i válku."
 SIA_use_ships_as_generators: "Využít lodě jako generátory"
 SIA_use_ships_as_generators_tt: "Umístění §YHlavní lodě§! vlastněných námi v přístavech domovských států nám dá §G-2%§! bonus ke spotřebě elektrické energie továren za každou §YHlavní loď§!, až do celkem §G-15%§!.\n\nOdplutí těchto lodí sníží bonus o totéž a lze jej znovu získat umístěním lodí zpět v přístavu."
 SIA_use_ships_as_generators_desc: "Dokonce i starší plavidla mohou národu sloužit, když nejsou vhodná pro bitvu nebo obchod. Ukotvením lodí jako plovoucích elektráren můžeme poskytnout nouzovou elektřinu přístavům a pobřežnímu průmyslu a uchovat cenné palivo a infrastrukturu."
 SIA_diversity_foreign_reserves: "Diversifikovat zahraniční rezervy"
 SIA_diversity_foreign_reserves_desc: "Je nebezpečné, aby [ROOT.GetNameDef] vkládalo svou finanční bezpečnost do měny nebo úvěru jediné cizí moci. Diversifikací rezerv snižujeme riziko externích šoků a uchováváme větší svobodu v obchodě a diplomacii."
 SIA_diversity_foreign_reserves_tt: "Přidá další §G2§! mimo-mapové §YZbrojní továrny§! při vyhlášení války.\nPřidá produkci §G8§! oceli v náhodném domovském státě při vyhlášení války."
 SIA_exclusivity_resource_contract: "Exkluzivní smlouva o zdrojích"
 SIA_exclusivity_resource_contract_desc: "Jeden zahraniční partner nabízí kapitál a zaručené nákupy výměnou za privilegovaný přístup k našim zdrojům. Taková exkluzivní smlouva může urychlit rozvoj, i když vázne část budoucnosti [ROOT.GetNameDef] na apetitu jiné země."
 SIA_maintain_resource_independence: "Udržet nezávislost zdrojů"
 SIA_maintain_resource_independence_desc: "Zahraniční smlouvy mohou přinést rychlé zisky, ale závislost jde ruku v ruce. Udržením kontroly nad našimi zdroji si zachováme svobodu je nasměrovat podle thajských potřeb, ne podle požadavků cizích mocností."
 SIA_kasetsart_university: "Univerzita Kasetsart"
 SIA_kasetsart_university_desc: "Pokud má být zemědělství produktivnější, musí být řízeno vědou, ne jen dědictvím. Kasetsart University vytrénuje agronomy, veterináře a technické odborníky pro modernizaci země."
 SIA_mahidol_university: "Univerzita Mahidol"
 SIA_mahidol_university_desc: "Moderní stát potřebuje lékaře, výzkumníky a administrátory stejně jako vojáky a inženýry. Mahidol University posílí vysoké školství a poskytne vyškolené mozky potřebné pro národní reformu."
 SIA_silpakorn_university: "Univerzita Silpakorn"
 SIA_silpakorn_university_desc: "TODO_CM"
 SIA_contingency_funds: "Rezervní fondy"
 SIA_contingency_funds_desc: "Bohatství v míru má malou hodnotu, pokud stát vstoupí do krize nepřipraven. Vytvořením rezervních fondů nyní zajistíme, že blokáda, neúroda nebo náhlá válka okamžitě nezastaví stroje vlády."
 SIA_contingency_funds_tt: "Během míru naspoříme rezervní fond. Při shromažďování fondu získáme mírný počet §Yfaktoru spotřebního zboží§!.\n\nBěhem války můžeme tento fond uvolnit a získat velký výrobní bonus.\nDélka platnosti fondu závisí na tom, jak dlouho jsme fond shromažďovali před jeho uvolněním."
 SIA_prepare_for_the_next_blockade: "Připravit se na příští blokádu"
 SIA_prepare_for_the_next_blockade_desc: "Pokud se moře stanou nepřátelskými, [ROOT.GetNameDef] může být odříznut od trhů, strojů a paliva. Musíme se proto připravit nyní na příští blokádu, budováním zásob, nouzových plánů a náhrad dříve, než nutnost donutí ruku."
 SIA_domestic_arms_industry: "Domácí zbrojní průmysl"
 SIA_domestic_arms_industry_desc: "Království, které musí dovážet každou pušku a granát, nemůže být bezpečné. I když počátky budou skromné, domácí zbrojní průmysl umožní [ROOT.GetNameDef] vyzbrojovat své vojáky z vlastních dílen a vydržet, když zahraniční dodávky selžou."
 SIA_war_material_substitutions: "Náhrady válečných materiálů"
 SIA_war_material_substitutions_desc: "V době blokády není dokonalý materiál cennější než dostupný. Musíme studovat náhražky kovů, chemikálií a dovážených komponent, aby produkce mohla pokračovat i tehdy, když zahraniční zboží přestane přicházet."
 SIA_royal_thai_ordnance_factory: "Královská thajská zbrojní továrna"
 SIA_royal_thai_ordnance_factory_desc: "Bezpečný stát vyžaduje víc než dovážené zbraně a rozptýlené opravářské dílny. Královská thajská zbrojní továrna soustředí dovednosti, stroje a dohled pod korunou a dá [ROOT.GetNameDef] trvalé centrum pro výrobu zbraní a munice."
 SIA_built_to_withstand_every_flame: "Postaveno, aby odolalo každému ohni"
 SIA_built_to_withstand_every_flame_desc: "Továrna, která shoří jedné noci, nemůže sloužit národu ráno. Naše sklady, mlýny a dílny musí být postaveny s ohledem na rozptýlení, nehořlavost a nouzovou ochranu, aby sabotáže, bombardování nebo nehoda nemohly snadno zničit výrobu."
 SIA_the_army_of_siam: "Armáda Siamu"
 SIA_the_army_of_siam_desc: "Staré uspořádání našich ozbrojených sil už nevyhovuje nárokům doby. Pokud má [ROOT.GetName] bránit svou suverenitu a prosazovat zájmy v zahraničí, musíme vybudovat novou moderní armádu, vyzbrojenou, vycvičenou a organizovanou pro války, které se nyní rýsují po světě."
 SIA_plan_for_a_short_war: "Plánovat krátkou válku"
 SIA_plan_for_a_short_war_desc: "Naše zdroje jsou omezené a nepřátel může být mnoho. [ROOT.GetNameDefCap] si nemůže dovolit dlouhý vyčerpávající konflikt. Pokud válka přijde, musí být rychlá, rozhodná a ukončena dříve, než se protivník posílí."
 SIA_intermediate_war_preparation: "Příprava na střednědobou válku"
 SIA_intermediate_war_preparation_desc: "Je nebezpečné připravovat se pouze na bleskovou kampaň, a zároveň plýtvavé organizovat se jen pro nekonečný boj. Vyvážená doktrína nám umožní udeřit s vervou a zároveň uchovat vytrvalost k čelení zatvrdlejšímu nepříteli."
 SIA_prepare_for_a_long_war: "Připravit se na dlouhou válku"
 SIA_prepare_for_a_long_war_desc: "Velmoci mohou rozhodovat války za měsíce, ale menší státy jsou často nuceny je roky vydržet. Musíme tedy připravit [ROOT.GetAdjective] zbraně, průmysl a dopravu pro dlouhý, vleklý konflikt, kde trpělivost a odolnost jsou stejně důležité jako odvaha."
 SIA_specialized_warfare: "Specializované vedení války"
 SIA_specialized_warfare_desc: "Terén našeho regionu nepřeje jednotné armádě. Hory, džungle a říční krajiny vyžadují odlišné dovednosti. Vytvářením specializovaných jednotek zajistíme, že [ROOT.GetNameDef] potká nepřítele správnou silou na každém poli."
 SIA_artillery_reigns_supreme: "Dělostřelectvo vládne"
 SIA_artillery_reigns_supreme_desc: "Moderní bitvu nevyhraje jen odvaha. Dělo zůstává králem bojiště, boří silné body, ničí útoky a dláždí cestu naší pěchotě. Abychom zvítězili, musí být [ROOT.GetAdjective] palba hojnější i přesnější."
 SIA_yield_the_air_war: "Přenechat vzdušný boj"
 SIA_yield_the_air_war_desc: "Nemůžeme doufat, že se vyrovnáme velmocím ve vzduchu. Místo abychom promrhali vzácné zdroje ve sporu, který pravděpodobně prohrajeme, posílíme protiletadlovou obranu a ztížíme nepříteli zasahovat naše jednotky a města."
 SIA_the_thunder_at_the_gates: "Hrom u bran"
 SIA_the_thunder_at_the_gates_desc: "Existují pevnosti, které obyčejná děla nedolují, a útoky, které musí být ohlášeny ohromující silou. Těžké dělostřelectvo, obléhací a železniční děla dají [ROOT.GetNameDef] moc prorazit brány každému nepříteli, který považuje naši zdrženlivost za slabost."
 SIA_night_time_training: "Noční výcvik"
 SIA_night_time_training_desc: "Odvážné útoky ve dne přinášejí katastrofu proti připravenému nepříteli. Trénink mužů pro infiltrace, pohyb a útok pod rouškou tmy nám může zajistit iniciativu, když je protivník slepý, zmatený a nejméně připraven odpovědět."
 SIA_steel_arteries: "Ocelové tepny"
 SIA_steel_arteries_desc: "Žádná armáda nepojde daleko bez tratí a silnic, které ji zásobují. Ocelové tepny národa musí být posíleny, aby vojska, zásoby a děla mohla být rychle přepravena na každý ohrožený pohraniční bod. V této práci jde ruku v ruce bezpečnost i národní rozvoj."
 SIA_prepare_northern_infrastructure_for_war: "Připravit severní infrastrukturu pro válku"
 SIA_prepare_northern_infrastructure_for_war_desc: "Severní přístupy budou klíčové v jakémkoli sporu s Barmou a těmi, kdo za ní stojí. Silnice, železnice a sklady v této oblasti musí být okamžitě rozšířeny, aby se [ROOT.GetAdjective] jednotky mohly tam bez prodlení přesouvat či bránit."
 SIA_unconventional_tank_construction: "Neortodoxní výroba tanků"
 SIA_unconventional_tank_construction_desc: "Nemůžeme kopírovat programy obrněnců velmocí krok za krokem. Pokud má [ROOT.GetNameDef] nasadit tanky, musíme jít cestou levnějších a přizpůsobivějších metod výroby, obětujíc krásu ve prospěch počtu a užitku."
 SIA_conventional_tank_construction: "Konvenční výroba tanků"
 SIA_conventional_tank_construction_desc: "Obrana se stala legitimní složkou moderní války a improvizovaná řešení nás dříve či později doženou. Měli bychom tedy založit pořádný tankový průmysl na zdravých principech, standardních konstrukcích a spolehlivých výrobních metodách hodných moderní armády."
 SIA_reverse_engineer_allied_tanks: "Zpětně inženýrovat spojenecké tanky"
 SIA_reverse_engineer_allied_tanks_desc: "Jiní již nesli náklady experimentování. Zajaté tanky a dovážené stroje lze rozebrat, studovat a napodobit. Učením se z cizích návrhů může [ROOT.GetName] zkrátit cestu k vlastní obrněné síle."
 SIA_tankettes: "Tanketky"
 SIA_tankettes_desc: "Lehké, levné a jednoduché na výrobu — tanketky možná nerozhodnou velké bitvy, ale mohou plnit úlohu průzkumu, koloniálních operací a podpory pěchoty. Pro stát s omezenými prostředky představují praktický vstup do mechanizované války."
 SIA_jungle_armor: "Džunglové obrněnce"
 SIA_jungle_armor_desc: "Džungle našeho regionu není místo pro těžké stroje navržené pro evropské pláně. Pokud mají obrněnce sloužit [ROOT.GetNameDef], musí být přizpůsobeny pro úzké cesty, slabou půdu a dusné klima — vyměnit váhu za pohyblivost, kde džungle vyžaduje."
 SIA_mountain_tanks: "Horští tanky"
 SIA_mountain_tanks_desc: "Surové kopce a horské průsmyky nelze nechat jen pěchotě. Sledujíc kompaktní obrněná vozidla vhodná pro rozbitý terén můžeme dát armádám prostředek přivézt krytou palbu do oblastí, kde běžné tanky selžou."
 SIA_reluctant_submission: "Neochotné podřízení"
 SIA_reluctant_submission_desc: "Pokud by [ROOT.GetNameDef] čelil invazi silnějšího nepřítele, může nastat okamžik, kdy otevřený odpor slibuje pouze zkázu. Ohýbat se je hořké, ale někdy musí vláda ustoupit, aby zachovala národ před zničením a počkala na příznivější chvíli."
 SIA_reluctant_submission_trigger: "Toto zaměření se automaticky dokončí, pokud jsme napadeni a zvolíme možnost §YPodřízení§! v události."
 SIA_reluctant_submission_tt: "Budeme schopni uzavřít mír s útočící velmocí. Nicméně od nich budou požadovat, abychom tiskli peníze pro ně.\nNáš §YFaktor továren spotřebního zboží§! se bude zvyšovat o §Y[?idea_SIA_printing_money_monthly_change|%]§! měsíčně, až do maxima §Y[?idea_SIA_printing_money_monthly_change_max|%]§!.\n\nPřijetí zaměření §Y$SIA_thai_rice_company$§! sníží tempo nárůstu o §G50%§!\n\nPřijetí zaměření §Y$SIA_demand_repatriation$§! odstraní potřebu tisknout peníze."
 SIA_seri_thai: "Seri Thai"
 SIA_seri_thai_desc: "Podřízení nemusí znamenat zkázu národního ducha. Pod povrchem okupace a poslušnosti lze organizovat loajální odboj, shromažďovat zpravodajské informace a připravit den, kdy [ROOT.GetName] opět povstane."
 SIA_contact_the_south_east_asia_command: "Kontaktovat velení Jihovýchodní Asie"
 SIA_contact_the_south_east_asia_command_desc: "Pokud má odpor být něčím více než statečnými gesty, musí být napojen na širší strategii. Navázáním kontaktu se spojeneckým velením v Jihovýchodní Asii mohou vlastenci [ROOT.GetName] získat vedení, zásoby a místo v širším boji."
 SIA_broadcast_weather_reports_to_the_allies: "Vysílat meteorologické zprávy spojencům"
 SIA_broadcast_weather_reports_to_the_allies_desc: "Pevnost operací v regionu je řízena počasím stejně jako flotami a armádami. Spolehlivé zprávy z [ROOT.GetNameDef] mohou pomoci spojeneckému plánování, ochránit jejich operace před překvapením a učinit z naší domoviny tichého, ale cenného partnera ve válce."
 SIA_american_investment_aid: "Americká investiční pomoc"
 SIA_american_investment_aid_desc: "Spojené státy disponují bohatstvím daleko přesahujícím to naše. Pokud zajistíme americkou pomoc a investice pro naše tajné a národní úsilí, získá [ROOT.GetNameDef] materiální prostředky k vydržení útrap a přípravě na osvobození."
 SIA_thai_students_in_the_oss: "Thajští studenti v OSS"
 SIA_thai_students_in_the_oss_desc: "Nová generace vlastenecké mládeže může být školena v zahraničí v umění špionáže, sabotáže a partyzánského boje. Posláním důvěryhodných thajských studentů do orbity spojeneckého zpravodajství připravíme schopné služebníky pro skrytou válku."
 SIA_prepare_to_drop: "Připravit seskok"
 SIA_prepare_to_drop_desc: "Když přijde hodina osvobození, mohou spojenci chtít seskočit do naší vlasti ze vzduchu. Musíme proto identifikovat přistávací plochy, připravit kontakty a zorganizovat podpůrné sítě, aby výsadkové síly mohly být přijaty a nasměrovány tam, kde budou nejvíc potřeba."
 SIA_unseat_the_government: "Svrhnout vládu"
 SIA_unseat_the_government_desc: "Režim, který svázal [ROOT.GetNameDef] cizí nadvládou, nemůže trvat věčně. Odbojem, intrikami a načasovanou akcí můžeme odstranit ty, kteří kompromitovali národ, a obnovit vládu hodnou Siamu."
 SIA_unseat_the_government_tt: "[ROOT.GetName] opustí svou současnou frakci a ve válce přejde na stranu §YSpojců§!.\nLoajalisté povstanou proti změně, vyvolávajíc občanskou válku."
 SIA_the_phayap_army: "Armáda Phayap"
 SIA_the_phayap_army_desc: "Pokud spojíme osud s útočníkem, musí naše armády získat místo v novém válečném řádu. Určené polní velení pro operace na západě a severu umožní [ROOT.GetName] postupovat po boku mocného partnera a usilovat o vlastní zisky."
 SIA_securing_the_rubber_islands: "Zajistit ostrovy s kaučukem"
 SIA_securing_the_rubber_islands_desc: "Kaučuk je životní silou moderní války, krmící pneumatiky, těsnění a nespočet mechanických dílů. Zdroje jihu představují příležitost i nutnost. Měli bychom je zajistit dříve, než to udělají jiní."
 SIA_breaking_the_burmese_line: "Prolomení barmské linie"
 SIA_breaking_the_burmese_line_desc: "Barma stojí jako bariéra mezi našimi ambicemi a zeměmi za ní. Pokud se [ROOT.GetAdjective] zbraně mají ukázat, musí být nepřátelská linie tam prolomena odhodláním, plánováním a soustředěným použitím síly."
 SIA_pacific_war: "Pacifická válka"
 SIA_pacific_war_desc: "Konflikt ve Východní Asii už nelze považovat za vzdálený. Válka v Pacifiku formuje osudy všech národů v našem regionu a [ROOT.GetNameDef] musí rozhodnout, jaké místo v tomto boji zaujme — jestli následovníka, partnera nebo oběť."
 SIA_joint_asian_military_command: "Společné asijské vojenské velení"
 SIA_joint_asian_military_command_desc: "Naše úsilí budou silnější, pokud budou koordinována s našimi regionálními partnery. Společné velení slibuje vyšší efektivitu, jasnější plánování a společný směr pro kampaně, které by jinak hrozily být promrhány soupeřením a zmatkem."
 SIA_demand_repatriation: "Požadovat repatriaci"
 SIA_demand_repatriation_desc: "Ti, kdo vstoupili na naši zem pod záminkou nutnosti, si nashromáždili dluh vůči [ROOT.GetNameDef]. Jakmile se naše štěstí zlepší, měli bychom požadovat navrácení toho, co bylo vzato, a vtlačit okupanta, aby zaplatil náklady za své vniknutí."
 SIA_standing_our_ground: "Držet jsme pozici"
 SIA_standing_our_ground_desc: "Je chvíle, kdy ústup a vyjednávání nabízí jen další ponížení. [ROOT.GetNameDefCap] musí ukázat, že stále má vůli stát, bojovat a vykázat ty, kdo si myslí, že nám mohou diktovat osud pod zbraní."
 SIA_standing_our_ground_trigger: "Toto zaměření se automaticky dokončí, pokud jsme napadeni a zvolíme možnost §YOdpor§! v události."
 SIA_ask_for_the_release_of_american_commodities: "Žádat o uvolnění amerických komodit"
 SIA_ask_for_the_release_of_american_commodities_desc: "Americké zásoby, stroje a zboží mohou poskytnout nádech čerstvého vzduchu, který naše země potřebuje. Pečlivou diplomacií můžeme požádat o uvolnění těchto komodit, zmírnit nedostatky a posílit materiální základna našeho válečného úsilí."
 SIA_japanese_fighters: "Japonská stíhačka"
 SIA_japanese_fighters_desc: "I když náš letecký průmysl je zatím malý, zahraniční letadla mohou pomoci zaplnit mezeru. Japonské stíhačky v rukou [ROOT.GetAdjective] by nám daly alespoň určitou moderní leteckou sílu, i když v omezeném rozsahu vzhledem k naší průmyslové slabosti."
 SIA_get_off_our_shores: "Slezte z našich břehů"
 SIA_get_off_our_shores_desc: "Přítomnost cizích vojsk na siamské půdě je urážkou, kterou nelze umírnit výmluvami. Ať už silou zbraní nebo tlakem událostí v zahraničí, musíme trvat na tom, aby vetřelci odešli a obnovili důstojnost [ROOT.GetNameDef].\n\nJsou zbabělci, jako všichni krutí muži. Teď slezte z našich břehů."
 SIA_singaporean_reinforcements: "Singapurské posily"
 SIA_singaporean_reinforcements_desc: "Boj o Malajsii a dál je nerozlučně spjat s naší vlastní bezpečností. Posily z okolí Singapuru by mohly utužit naši linii, rozšířit spolupráci se spojenci a svázat divadlo pod společným cílem."
 modify_SIA_directorate_of_aeronautical_engineering: "Mění §YDirectorate of Aeronautical Engineering§! takto:"
 SIA_aid_for_resources: "Pomoc za zdroje"
 SIA_aid_for_resources_desc: "Náš národ má zdroje, které cizí mocnosti chtějí, a postrádá některé prostředky, které ony mohou poskytnout. Rozumná výměna pomoci za materiály pomůže udržet [ROOT.GetNameDef] zásobený a zajistí, že naše bohatství přispěje k naší vlastní ochraně."
 SIA_aid_for_resources_tt: "Požádáme [JAP.GetNameDef], aby se připojili k naší válce, za což dostanou práva na zdroje kaučuku v §Y[724.GetName]§!"
 SIA_how_quickly_the_tables_turn: "Jak rychle se otáčí stoly"
 SIA_how_quickly_the_tables_turn_desc: "Ti, kdo považovali [ROOT.GetNameDef] za slabé a poslušné, mohou nakonec nalézt převahu obrácenou. Štěstí ve válce se rychle mění a musíme být připraveni uchopit chvíli, kdy naši utlačovatelé zaváhají a stoly se konečně otočí proti nim."
 SIA_how_quickly_the_tables_turn_trigger: "Byli jsme napadeni velmocí a tato velmoc kapitulovala."
 SIA_royal_thai_navy: "Královské thajské námořnictvo"
 SIA_royal_thai_navy_desc: "Obrana [ROOT.GetNameDef] nekončí na pobřeží. Naše pobřeží, řeky a námořní obchod vyžadují flotilu hodnou království. Posílením Královského thajského námořnictva zajistíme, že Siam zůstane pánem svých vod."
 modify_royal_thai_navy: "Mění §Y$idea_SIA_thai_royal_navy$§! takto:"
 SIA_direct_army_fundings_towards_the_navy: "Přesměrovat armádní financování k námořnictvu"
 SIA_direct_army_fundings_towards_the_navy_desc: "Armáda dlouho požírala lví podíl vojenských výdajů, přesto strategické potřeby [ROOT.GetNameDef] nejsou pouze kontinentální. Přesunem financí k flotě můžeme začít napravovat tuto nerovnováhu a zajistit moře, která chrání náš obchod a pobřeží."
 SIA_thonburi_class_coastal_defense_ship: "Pobřežní obranná loď třídy Thonburi"
 SIA_thonburi_class_coastal_defense_ship_desc: "Skromná flotila může mít ostré zuby, pokud je správně navržena pro místní podmínky. Třída Thonburi nabízí [ROOT.GetNameDef] praktický prostředek pobřežní obrany, kombinující slušnou palebnou sílu s rolí vhodnou pro vody, které musíme nejdříve chránit."
 SIA_acquire_submarines: "Získat ponorky"
 SIA_acquire_submarines_desc: "Ponorky dají malé námořnictvo šanci udeřit nad svou váhovou kategorií. Skryté pod vlnami mohou ohrozit dopravu, odradit silnější flotily a zkomplikovat jakýkoli nepřátelský plán proti našemu pobřeží. [ROOT.GetNameDefCap] by takovou zbraň neměla opomíjet."
 SIA_submarine_day: "Den ponorek"
 SIA_submarine_day_desc: "Zavedení podmořské války do naší flotily si zaslouží veřejné uznání a národní nadšení. Oslavou ponorkového loďstva můžeme povzbuzovat nábor, zvyšovat prestiž a ukotvit v myslích občanů, že Siam vstupuje do nové námořní éry."
 SIA_the_thonburi_dockyard_project: "Projekt suchého doku Thonburi"
 SIA_the_thonburi_dockyard_project_desc: "Námořnictvo se nemůže dlouhodobě udržet jen dováženými trupmi. Pokud má [ROOT.GetNameDef] udržovat a rozšiřovat námořní síly, musí investovat do doků, dílen a pracovních zdrojů, které tvoří skutečný základ námořní moci."
 SIA_expand_the_slipways: "Rozšířit skluzavky"
 SIA_expand_the_slipways_desc: "Naše současná zařízení jsou příliš stísněná pro ambice, které se rýsují. Zvětšením skluzavek zvýšíme kapacitu stavby a oprav plavidel, umožníme flotě růst v počtu i připravenosti."
 SIA_a_new_drydock: "Nový suchý dok"
 SIA_a_new_drydock_desc: "Seriózní námořní údržba vyžaduje moderní suchý dok. Bez něj je oprava větších lodí pomalá, neefektivní a závislá na cizí pomoci. Nový suchý dok dá [ROOT.GetNameDef] pevnější kontrolu nad vlastní námořní budoucností."
 SIA_install_heavy_cranes_and_power_plant: "Instalovat těžké jeřáby a elektrárnu"
 SIA_install_heavy_cranes_and_power_plant_desc: "Stavba lodí není pouze otázkou dřeva a oceli, ale strojů a energie. Těžké jeřáby a spolehlivý elektrický přívod promění naše loděnice z hrubých zařízení v skutečné moderní průmyslové závody."
 SIA_establish_the_foundry_and_machine_shop: "Zřídit slévárnu a strojírnu"
 SIA_establish_the_foundry_and_machine_shop_desc: "Suverénní námořnictvo potřebuje víc než trup složený z dovážených dílů. Založením vlastní slévárny a strojírny posílíme průmyslové svaly, které dovolí [ROOT.GetNameDef] odlévat, tvarovat a opravovat vitalní součásti válečných lodí doma."
 SIA_the_thonburi_arsenal: "Arzenál Thonburi"
 SIA_the_thonburi_arsenal_desc: "Dok bez vyzbrojení je neúplný. Zřízení arzenálu v Thonburi umožní výrobu a skladování námořních děl, munice a souvisejícího vybavení, čímž více svážeme flotilu k národnímu průmyslu."
 SIA_focus_on_commercial_civilian_ships: "Zaměřit se na obchodní civilní lodě"
 SIA_focus_on_commercial_civilian_ships_desc: "Ne každý kýl musí být kladen pro bitvu. Obchodní lodě, transporty a jiné civilní plavidla tvoří oběhový systém národní ekonomiky. Podporou komerčního stavitelství lodí posílíme prosperitu i válečnou odolnost."
 SIA_empower_the_coastguard: "Zplnomocnit pobřežní stráž"
 SIA_empower_the_coastguard_desc: "Flotila nemůže být všude současně a mnoho úkolů pobřežní bezpečnosti lépe zvládnou lehčí sbory. Posílená pobřežní stráž ochrání naše rybolovy, hlídá pobřeží a uvolní námořnictvo, aby se věnovalo závažnějším hrozbám."
 SIA_river_patrols: "Říční hlídky"
 SIA_river_patrols_desc: "Řeky [ROOT.GetNameDef] jsou současně silnice, hranice i tepny. Hlídky na těchto vodách nám pomohou vynucovat pořádek, podporovat místní posádky a rozšířit dosah státu do oblastí, kde je daleké hlavní město pomalejší jednat."
 SIA_sell_bangkok_dock_co: "Prodat Bangkok Dock Co"
 SIA_sell_bangkok_dock_co_desc: "Soukromý kapitál může dosáhnout toho, co státní správa dělá pomalu. Prodejem společnosti Bangkok Dock Co přilákáme investice, podpoříme efektivitu a přesměrujeme veřejné prostředky k naléhavějším vojenským potřebám."
 SIA_a_race_against_time: "Závod s časem"
 SIA_a_race_against_time_desc: "Naše námořnictvo je zastaralé, podfinancované a nepřipravené na moderní válku. Prostředky musí být okamžitě přesměrovány do stavby lodí, rekonstrukcí, pobřežní obrany a námořního výcviku. Hodiny tikají rychleji než naše loděnice."
 SIA_a_race_against_time_tt: "Po vypršení ducha získáme: "
 SIA_a_race_against_time_tt2: "na §Y280§! dní"
 the_thunder_at_our_gates_artillery: "Hrom u našich bran"
 SIA_siamese_tankettes: "Siamské tanketky"
 SIA_siamese_tankettes_desc: "Naše armáda si zvykl na flotilu lehkých tanketek, zlepšujíc jejich spolehlivost a snižujíc náklady na jejich udržování v poli."
 idea_SIA_specialized_warfare: "Specializované vedení války"
 idea_SIA_nighttime_training: "Noční výcvik"
 idea_SIA_nighttime_training_desc: "Jednotky intenzivně cvičené pro noční operace se pohybují a bojují efektivněji ve tmě a lépe využívají omezené zásoby."
 idea_SIA_the_thunder_at_our_gates: "Hrom u našich bran"
 idea_SIA_yielded_the_air_war: "Přenechali vzdušný boj"
 idea_SIA_yielded_the_air_war_desc: "Po ustoupení kontroly nad oblohou jsou zdroje přesměrovány na protiletadlovou obranu místo přímého boje o vzdušnou převahu."
