 INSHOL_foundations_of_defense_desc: "$HOL_the_foundations_of_defense_desc$"
 INSHOL_investments_in_civ_railways_tt: "Pokud [HOL.GetFlag]§Y[HOL.GetName]§! dokončí zaměření:\n         ([INS.GetFlag]§Y[INS.GetName]§!: Přidat §Y£autonomy_texticon -250.00§!)\n   Pokud [INS.GetFlag]§Y[INS.GetName]§! dokončí zaměření:\n         Přidat §Y£autonomy_texticon 250.00§!"
 INSHOL_investments_in_civ_railways: "Investice do civilních železnic"
 INSHOL_investments_in_civ_railways_desc: "Získání podpory obyvatel Indies vyžaduje investice do civilní infrastruktury. Naše železnice jsou nyní primárně pro nákladní dopravu. Měli bychom zakoupit osobní vlaky pro provoz po existujících tratích na Javě a Sumatře."
 INSHOL_continue_exclusive_rights: "Zachovat výhradní práva De Javasche Bank"
 INSHOL_continue_exclusive_rights_desc: "Indonéský guilder přišel během Velké deprese o většinu hodnoty a ekonomický růst se zastavil. Můžeme zkosit stabilizaci gullideru tím, že dáme De Javasche Bank výhradní právo tisku, které měla do roku 1922."
 INSHOL_peg_indies_guilder_to_dutch_guilder: "Vázat guilder Indies na nizozemský guilder"
 INSHOL_peg_indies_guilder_to_dutch_guilder_desc: "Indonéský guilder ztratil mnoho hodnoty během Velké deprese a ekonomika stojí. Nejsnazší řešení je vázat guilder Indies na nizozemský guilder, stabilnější měnu. To nás také více sváže s naším suverénem."
 INSHOL_peg_indies_guilder_to_us_dollar: "Vázat guilder Indies na americký dolar"
 INSHOL_peg_indies_guilder_to_us_dollar_desc: "Indonéský guilder ztratil během Velké deprese hodnotu. Místo vázání na nizozemský guilder je US dolar stabilnější volba. Vázání guilderu na dolar nám také poskytne větší ekonomickou nezávislost a učiní samosprávu dosažitelnější."
 indonesia_currency_pegged_to_dollar_modifier: "Indonéský guilder vázaný na US dolar"
 INS_direct_rule_tt: "Odemkne §Y$INS_direct_rule_occupation_law$§! zákon o okupaci ve indonéských knížecích státech.\nEfekty:\n     §GZvyšuje§! továrny a zdroje ve státě\n     §R Snižuje§! růst poslušnosti\n     §R Zvyšuje§! růst odboje"
 INS_local_autonomy_tt: "Odemkne §Y$INS_local_autonomy_occupation_law$§! zákon o okupaci ve indonéských knížecích státech.\nEfekty:\n     Dává §Ymalé§! všestranné posílení\n     §GZvyšuje§! růst poslušnosti"
 INS_invest_in_batavian_education_req_tt: "Úspěšně dokončeno alespoň §Y3§! misí Volksraadu"
 INS_invest_in_batavian_education_req_2_tt: "Úspěšně dokončeno alespoň §Y6§! misí Volksraadu"
 INSHOL_eventual_autonomy_req_tt: "Úspěšně dokončeno alespoň §Y4§! misí Volksraadu"
 indonesia_volksraad_passed_12: "Indonéská národní vlajka byla oficiálně uznána "
 INS_stronghold_java_tt: "Jakýkoli indonéský stát: Není obsazen [ROOT.GetFlag][ROOT.GetNameDefCap]"
 INSHOL_request_east_timor: "Požadovat navrácení Východního Timoru"
 INSHOL_request_east_timor_desc: "Timor nemá být pod portugalskou správou; je to pozůstatek koloniální historie, který nesmíme dále tolerovat. Požádáme Portugalsko o okamžité vrácení Timoru."
 INS_resist_occupation: "Odpor proti okupaci"
 INS_resist_occupation_desc: "Hněv mnoha Indonésanů vůči Nizozemsku nás nemůže dovést k fašismu. Musíme vše, co můžeme, udělat, abychom odolali japonské invazi a bránili vlast."
 INS_local_resistance: "Místní odpor"
 INS_local_resistance_desc: "Zřídíme odbojové buňky na teritoriích, která ještě nejsou okupována, abychom byli připraveni je získat zpět, pokud budou obsazeny."
 INS_stronghold_java: "Silná Jav"
 INS_stronghold_java_desc: "Indie je rozsáhlé souostroví s mnoha národy a tvrdým terénem. Bránit každý ostrov, džungli a horu proti mnohem silnějšímu nepříteli je zaručené selhání. Ač těžké opustit naše lidi, evakuace všech ostrovů kromě Javy a soustředění armády tam může být pro národ nejlepší."
 INS_silence_nationalists: "Utišit nacionalisty"
 INS_silence_nationalists_desc: "Japonská invaze způsobila, že revoluční nacionalistické hnutí začalo podporovat japonské okupanty kvůli společnému nepříteli — Nizozemsku. Nestabilita z invaze způsobila nebývalý růst těchto hnutí. Pokud s tím nic neuděláme, vymkne se to kontrole."
 INS_east_indies_exile_government: "Exilová vláda Východních Indies"
 INS_east_indies_exile_government_desc: "Bohužel Indies padly. Nemůžeme ztratit naději. Musíme dělat, co je v našich omezených silách. Prohráli jsme bitvu, válku ještě ne."
 INS_establish_nefis: "Zřídit NEFIS"
 INS_establish_nefis_desc: "Vytvoříme Netherlands East Indies Forces Intelligence Service spolu se spojenci, umístěnou v Austrálii. Budeme provádět tajné operace k sabotáži japonských okupantů. Každým malým vítězstvím se přibližujeme k návratu do vlasti."
 INS_evacuate_soldiers_to_australia: "Evakuovat vojáky do Austrálie"
 INS_evacuate_soldiers_to_australia_desc: "Zřídíme vojenskou základnu poblíž NEFIS v severní Austrálii a umístíme tam vojáky KNIL, kteří unikli zajetí během okupace, abychom mohli pokračovat v boji."
 INS_australian_weapons: "Australské zbraně"
 INS_australian_weapons_desc: "Tajné operace nejsou jednoduché a budeme potřebovat vhodné vybavení k úspěchu. Můžeme licencovat australské továrny a upravit je na výrobu zbraní pro NEFIS."
 INS_defenders_of_homeland: "Obránci vlasti"
 INS_defenders_of_homeland_tt: "Toto zaměření bude automaticky dokončeno, pokud budou Obánci vlasti založeni."
 INS_resist_occupation_tt: "Toto zaměření bude automaticky dokončeno, pokud budeme invadováni a nesložíme zbraně."
 INS_defenders_of_homeland_desc: "Vláda Indies padla a nový režim převzal moc. Vedení nacionalistů a japonské vlády vytvoří novou armádu lepší než KNIL a vyhrají válku. Nicméně, aliance nacionalistů a imperialistů je křehká. Vydrží, nebo skončí krví?"
 INS_embrace_co_prosp_sphere: "Přijmout sféru vzájemného blahobytu"
 INS_embrace_co_prosp_sphere_desc: "Konec nizozemské nadvlády je tu; nahradili jsme jednoho suveréna druhým, ale sliby ekonomické prosperity a panslanství jsou lákavé. Budeme podporovat japonské válečné úsilí, aby Nizozemsko už nikdy nemělo šanci vrátit se do Indonésie."
 INS_seize_oppurtunity: "Využít příležitost"
 INS_seize_oppurtunity_desc: "[JAP.GetNameDefCap] je na ústupu a jejich okupační vláda je slabá. Poprvé po staletích máme reálnou šanci zlomit okovy Indonésie jednou provždy a vyhlásit nezávislost. Pokud toho nevyužijeme, nevíme, kdy příště dostaneme šanci."
 INS_japanese_resource_infrastructure: "Financovat velké válečné úsilí"
 INS_japanese_resource_infrastructure_desc: "Předání kontroly nad našimi hlavními těžebními zařízeními [JAP.GetNameDef] je nezbytné pro vítězství, protože je prioritní, aby [JAP.GetAdjective] jednotky byly plně zásobovány. [JAP.GetNameDefCap] bude také rozvíjet místní infrastrukturu, aby zvýšil efektivitu vývozu surovin."
 INS_japanese_army_training: "Reformovat armádu"
 INS_japanese_army_training_desc: "Máme co se učit od našich [JAP.GetAdjective] pánů a nyní, když je KNIL rozpuštěn, měli bychom vytvořit novou armádu vycvičenou IJA, připravenou bránit Indonésii před vnějšími hrozbami."
 INS_governor_general_de_jonge: "Generální guvernér de Jonge"
 INS_governor_general_de_jonge_desc: "Bonifacius Cornelis de Jonge je známý tvrdou rukou, odporuje nacionalismu a často ignoruje Volksraad. Jeho vláda v Indies trvá dlouho a zkušenosti sahají až do velké války, kde sloužil jako ministr války Indies."
 INS_governor_general_tjarda: "Generální guvernér Tjarda"
 INS_tjarda_explain_tt: "Funkční období §YBonifacius Cornelis de Jonge§! vyšumělo a §YAlidius Tjarda van Starkenborgh Stachouwer§! byl zvolen náhradním guvernérem v září 1936."
 INS_governor_general_tjarda_desc: "Alidius Tjarda van Starkenborgh Stachouwer má o něco jinou vizi Indies než jeho předchůdce. I když je stále proti nacionalismu, má mírně liberálnější politiku a více naslouchá Volksraadu."
 INS_electrical_investments: "Investice do elektroenergetiky"
 INS_electrical_investments_desc: "Každý evropský průmyslový stát má silnou elektrickou síť. Abychom přestali spoléhat na suroviny a vybudovali vlastní průmysl, musíme vybudovat vysoce kapacitní elektrickou síť po celé Javě."
 INS_reduce_land_taxes: "Snížit daň z půdy"
 INS_reduce_land_taxes_desc: "Vysoké daně z vlastnictví půdy znesnadňují domorodcům vlastnění plantáží a podniků. Přestože to usnadnilo monopol na gumě, způsobilo to ekonomické problémy. Měli bychom tyto daně vrátit na předchozí úroveň."
 INS_invest_in_batavian_education: "Investice do batavského školství"
 INS_invest_in_batavian_education_desc: "Volksraad jasně požaduje, aby vzdělání bylo přístupné více lidem, protože nyní si ho mohou dovolit převážně nizozemští Indonésané a malá skupina elit. Abychom vyhověli petici Volksraadu, postavíme několik základních a středních škol v a kolem Batavie."
 INS_javanese_education_investments: "Investice do jávského školství"
 INS_javanese_education_investments_desc: "Kromě projektu základního a středního vzdělávání postavíme komunitní vysokou školu a specializované odborné školy, aby bylo vyšší vzdělání dostupnější střední třídě."
 INS_allow_local_autonomy: "Povolit místní autonomii"
 INS_allow_local_autonomy_desc: "Systém Vorstenlanden, který uděluje knížecím státům samosprávu, usnadnil řízení nacionalistických hnutí a zvýšil stabilitu. Měli bychom zvýšit úroveň autonomie knížecích států, abychom snížili vnitřní konflikty."
 INS_direct_rule: "Přímá správa"
 INS_direct_rule_desc: "Systém Vorstenlanden přidává administrativní vrstvu a zdržuje řízení. Je čas systém zrušit a uplatnit přímou správu nad celým souostrovím."
 INS_seize_oppurtunity_tt: "§Y[JAP.GetFlag][JAP.GetName]§! byl zatlačen zpět a kontroluje méně než §Y[?var:temp_states_plus_more]§! států. (aktuálně: §Y[?var:JAP.num_controlled_states]§!)"
 INS_seize_oppurtunity_refuse_warn_tt: "§RZačne národní revoluce, která může vést k válce s [HOL.GetNameDef]§!."
 INS_economic_stabilization: "Ekonomická stabilizace"
 INS_economic_stabilization_desc: "Velká deprese a protekcionismus nás ekonomicky ochromily a mnoho Indonésanů ztratilo práci. Musíme přijmout drastická opatření a vytvořit pracovní program, kde budou nezaměstnaní občané přiděleni na práci."
 INS_restore_order_in_indies: "Obnovit pořádek v Indies"
 INS_restore_order_in_indies_desc: "Vznikající nacionalistické hnutí v Indies destabilizovalo několik regionů a může se vymknout z rukou. Naším prvořadým úkolem je obnovit pořádek a stabilitu."
 INS_detangle_supply_chains: "Rozmotat dodavatelské řetězce"
 INS_detangle_supply_chains_desc: "Naše exportní ekonomika vyžaduje, aby zboží procházelo desítkami prostředníků, což přidává poplatky a daně. Měli bychom to narovnat a ovládat většinu dodavatelského řetězce přímo."
 INS_prioritize_industrial_growth: "Prioritizovat průmyslový růst"
 INS_prioritize_industrial_growth_desc: "Exportní ekonomika je příliš nestálá a drží nás v závislosti na Nizozemsku. Měli bychom vybudovat výrobní průmysl stavbou továren v Batavii a stát se nejprůmyslovějším státem v Tichomoří."
 INS_closer_economic_ties_to_netherlands: "Utěsnění ekonomických vazeb na Nizozemsko"
 INS_closer_economic_ties_to_netherlands_desc: "Můžeme se od Nizozemska mnoho naučit, zejména ekonomicky. Pokud ještě více integrujeme exportní ekonomiku s Nizozemskem, využijeme jejich infrastrukturu a kontakty k zajištění výhodnějších obchodních dohod."
 INS_prioritize_dutch_companies: "Upřednostnit nizozemské společnosti"
 INS_prioritize_dutch_companies_desc: "Nizozemské společnosti jako Shell a Fokker jsou páteří naší ekonomiky po staletí, naše suroviny jsou silně provázány se Shell. To přineslo značné bohatství a měli bychom je upřednostňovat před menšími místními podniky, aby spolupráce zůstala silná."
 INSHOL_java_factories: "Otevřít zbrojní továrny na Javě"
 INSHOL_java_factories_desc: "I obyčejné vybudování více zbrojních továren výrazně zlepší sílu armády. Java je průmyslové centrum kolonie, ideální místo pro ně."
 INSHOL_license_dutch_weapon_blueprints: "Licencovat nizozemské konstrukční plány zbraní"
 INSHOL_license_dutch_weapon_blueprints_desc: "Místo budování celého domácího výrobního procesu a vývoje vlastních technologií bychom měli spolupracovat s nizozemskými firmami a koupit jejich konstrukční plány."
 INSHOL_bangka_production_lines: "Výrobní linky na Bangka"
 INSHOL_bangka_production_lines_desc: "Exponenciální rozvoj infrastruktury Bangka díky projektu učinil ostrov ideálním místem pro nové průmyslové projekty. Máme příležitost posílit KNIL výstavbou zbrojní továrny v Bangka, která díky soustředěným silnicím, železnicím a přístavům bude efektivnější."
 INSHOL_artillerie_inrichtingen: "Artillerie Inrichtingen"
 INSHOL_artillerie_inrichtingen_desc: "Artillerie Inrichtingen vyrábí dělostřelectvo v Nizozemsku přes 250 let a operuje v Indies desetiletí. Rozšíření jejich výrobních kapacit v Indies by výrazně posílilo schopnosti KNIL a vytvořilo pracovní místa v zanedbaných oblastech."
 INSHOL_ai_pyrotechnische: "Artillerie Inrichtingen Pyrotechnische"
 INSHOL_ai_pyrotechnische_desc: "Pokračováním expanze výrobních kapacit Artillerie Inrichtingen ve Východních Indies bychom měli podpořit založení indonéské divize jejich pyrotechnické pobočky."
 INSHOL_bio_pharma: "Bio Pharma"
 INSHOL_bio_pharma_desc: "Rozšíření farmaceutického průmyslu Indies je dalším krokem k reformě KNIL, aby ranění vojáci měli řádnou péči. Dostatek chinínu v Indies snižuje náklady tohoto projektu."
 INSHOL_develop_fighters: "Vyvinout nové stíhačky"
 INSHOL_develop_fighters_desc: "Pošleme batavské inženýry do Amsterdamu studovat Fokkerovu výrobu stíhaček, získat pečlivě střežené výrobní tajemství a vrátit se vybaveni znalostmi k založení moderní domácí výroby stíhaček v Indies."
 INSHOL_develop_bombers: "Vyvinout nové bombardéry"
 INSHOL_develop_bombers_desc: "Pošleme batavské inženýry do Amsterdamu studovat Fokkerovu výrobu bombardérů, získat výrobní tajemství a vrátit se s dovednostmi pro založení domácí výroby bombardérů v Indies."
 INSHOL_bandung_aircraft_facility: "Výrobní zařízení letadel v Bandungu"
 INSHOL_bandung_aircraft_facility_desc: "Plány a tajemství jsou k ničemu, pokud je nepřevedeme do kusů letadel. Otevřeme nové letecké závody v Bandungu, abychom splnili současné potřeby ML-KNIL."
 INSHOL_netherlands_indies_air_doctrine: "Nizozemsko-Indies letecká doktrína"
 INSHOL_netherlands_indies_air_doctrine_desc: "Prostudujeme letectva zemí, které čelí podobným výzvám, a čerpáme z jejich zkušeností, abychom vytvořili doktrínu vhodnou pro realitu Východních Indies, aniž bychom opakovali historické chyby."
 INSHOL_manado_military_academy: "Makassarská vojenská akademie"
 INSHOL_manado_military_academy_desc: "Zřízení vojenské akademie mimo Javu pomůže zmírnit nedostatek lidských zdrojů rozšířením branné povinnosti i na východní ostrovy. Makassar, v centrální části Indies, je pro to ideální."
 INSHOL_infantry_training_in_borneo: "Výcvik pěchoty v Borneu"
 INSHOL_infantry_training_in_borneo_desc: "Indie definuje džungle, drsné hory a nehostinný terén. Naši vojáci, převážně z Jávy, nejsou připraveni bojovat v těchto podmínkách. Musíme rozšířit výcvik mimo Javu a cvičit v těžších prostředích. Borneo je ideální pro vycvičení světové úrovně hraničářů."
 INSHOL_knil_engineers: "Genie Corps"
 INSHOL_knil_engineers_desc: "Nemáme se zaměřit jen na pěchotu; logistika a komunikace hrají klíčovou roli. Vyškolíme inženýry a podpoříme batavská odborná učiliště, aby armáda nebyla zpomalena špatnou logistikou."
 INSHOL_work_with_oil_barons: "Spolupracovat s ropnými barony"
 INSHOL_work_with_oil_barons_desc: "Velká deprese zanechala exportní ekonomiku v bídě. Možná je čas přenechat některá obchodní jednání ropným baronům Sumatry, aby zajistili odbyt. Bude to stát - budou vyžadovat výrazně nižší ceny."
 INSHOL_rubber_taxation: "Zdanění gumy"
 INSHOL_rubber_taxation_desc: "Nizozemské investice a know-how proměnily gumové plantáže v jednu z nejcennějších částí impéria. Koruna má právo na svůj podíl. I když někteří politici protestují, zájmy impéria nemohou být diktovány provinčními neshodami."
 INSHOL_padang_port: "Mezinárodní přístav v Padangu"
 INSHOL_padang_port_desc: "Zboží z Padangu musí nejdřív putovat přes Javu, protože region postrádá přístavy pro velké konvoje. Tato zbytečná odbočka zatěžuje dodavatelské řetězce a omezuje potenciál Sumatry. Vybudováním velkého nákladního přístavu v Padangu odstraníme tuto prodlevu."
 INSHOL_subsidize_bauxite: "Dotovat projekty bauxitu"
 INSHOL_subsidize_bauxite_desc: "Projekt modernizace Bangka-Belitung je slibný s vysokým potenciálem dlouhodobého zisku. Podpoříme vládu Indies dotacemi, aby projekt urychlila."
 INSHOL_agricultural_subsidies: "Privatizovat zemědělství"
 INSHOL_agricultural_subsidies_desc: "Povolením založení soukromých farem různých velikostí urychlíme rozvoj infrastruktury na venkově a zároveň zvýšíme vládní příjmy. Zavedeme strukturované zdanění, kde veškeré daně od těchto farem půjdou přímo do Nizozemska, nikoli přes Indies."
 INSHOL_import_sugar: "Dovážet cukr"
 INSHOL_import_sugar_desc: "Nařídíme cenové kontroly v rostoucím zemědělském sektoru Indies tak, že dovezeme veškerý cukr pro národní potřebu z plantáží Indies za ceny, které jiná vláda nemůže konkurovat, a zřídíme státní monopol na cukr."
 INSHOL_import_lumber: "Dovážet dřevo"
 INSHOL_import_lumber_desc: "Nařídíme cenové kontroly v rostoucím zemědělském sektoru Indies tak, že dovezeme veškeré dřevo pro národní potřebu z plantáží Indies za ceny, které jiná vláda nemůže konkurovat, a zřídíme státní monopol na dřevo."
 INSHOL_industrialized_colony: "Industrializovaná kolonie"
 INSHOL_industrialized_colony_desc: "Východní Indies se staly jedním z nejprůmyslovějších a nejbohatších regionů v celé Asii. Je to monumentální okamžik pro Nizozemsko a lidstvo. Budeme pokračovat v investicích a obnovíme Nizozemsko jako globální mocnost."
 INSHOL_economic_integration: "Ekonomická integrace"
 INSHOL_economic_integration_desc: "Nizozemská východní Indie jsou zářivým klenotem našeho impéria; jejich prosperita je zajištěna pevným vedením královny, premiéra a generálního guvernéra. Tuto stabilitu nesmíme ohrozit nerozvážnými voláními po nezávislosti. Sváže me ekonomiky Nizozemska a Indies těsněji dohromady."
 INSHOL_republic_of_indonesia: "Republika Indonésie"
 INSHOL_republic_of_indonesia_desc: "Když Nizozemsko neochotně přistoupilo na Soetardjovu petici, výsledek vázal indonéskou nezávislost na dlouhém seznamu podmínek. Navzdory tomu byly tyto podmínky nyní splněny, díky odhodlání indonéského lidu, a Nizozemsko nemá jinou možnost než přijmout formální vyhlášení nezávislosti."
 INSHOL_propose_malay_unification: "Návrh sjednocení Malajska"
 INSHOL_propose_malay_unification_desc: "Indonésie je souostroví stovek kultur, jazyků a etnik. Některé jsou podobné, jiné odlišné. Přes společný boj za svobodu jsme našli jednotu jako jeden národ. Proč by tato jednota měla končit u našich břehů, když v Malajsku lidé sdílejí podobnou historii a aspirace?"
 INSHOL_singapore_compromise: "Singapurský kompromis"
 INSHOL_singapore_compromise_desc: "Singapur je historicky i kulturně spojen s Indonésií a logicky by měl být součástí sjednocené Indonésie. Británie se ale brání ho vzdát kvůli strategickému významu a vojenské základně. Navrhneme kompromis, aby se Singapur připojil k unii výměnou za právo Británie tam mít stanoviště."
 INSHOL_request_ceylon: "Žádat o převod Cejlonu"
 INSHOL_request_ceylon_desc: "Britská kolonie Cejlon má hluboké kulturní a jazykové vazby s malajským světem. Jak se rozrůstá panmalajská federace Maphilindo, bylo by přirozené požádat o jejím začlenění."
 INSHOL_papua_referendum: "Referendum o Papui"
 INSHOL_papua_referendum_desc: "Ostrov Papua je rozdělen mezi Indonésii a Austrálii. Naše investice proměnily naši část v rostoucí region, zatímco australská spravovaná část zůstává zanedbaná. Budoucnost ostrova by měla být v rukou jeho obyvatel; požadujeme referendum o sjednocení Papuy."
 INSHOL_invite_phillipines: "Navrhnout Maphillindo"
 INSHOL_invite_phillipines_desc: "Národy našeho svazku mluví různými jazyky a dodržují různé tradice, přesto většina má kořeny v malajském světě. Měli bychom přetvořit naši unii do panmalajské konfederace a pozvat Filipíny jako člena. Co bylo kdysi několik bezvýznamných kolonií, nyní by stálo jako regionální mocnost JV Asie."
 INS_focus_time_reduce_usa_tt: "§Y$INS_realign_supply_chains$§! sníží dobu potřebnou pro toto zaměření o 70 dní."
 INS_focus_time_reduce_jap_tt: "§Y$INS_first_come_first_serve$§! sníží dobu potřebnou pro toto zaměření o 70 dní."
 INS_focus_time_reduce_fokker_tt: "§Y$INSHOL_east_indies_fokker_division$§! sníží dobu potřebnou pro toto zaměření o 35 dní."
 INS_focus_time_reduce_tjarda_tt: "§Y$INS_governor_general_tjarda$§! sníží dobu potřebnou pro toto zaměření o 35 dní."
 INS_focus_time_reduce_pki_tt: "§Y$INS_utilize_tan_malakas_militia$§! sníží dobu potřebnou pro toto zaměření o 35 dní."
