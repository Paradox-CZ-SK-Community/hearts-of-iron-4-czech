 idea_SIA_weather_broadcasts: "Meteorologické vysílání"
 idea_SIA_weather_broadcasts_desc: "Pravidelné meteorologické vysílání dává našim leteckým a námořním silám jasnější obraz podmínek, čímž zlepšuje jejich efektivitu a snižuje rizika operací za špatného počasí."
 idea_SIA_seri_thai_contacts: "Kontakty Seri Thai"
 idea_SIA_seri_thai_contacts_desc: "Kontakty s odbojovou sítí Seri Thai prokazují svou hodnotu, přivádějí zkušené bojovníky a posilují vazby se Spojenci."
 idea_SIA_secure_rubber_islands: "Zajištění kaučukových ostrovů"
 idea_SIA_joint_military_command: "Společné vojenské velení"
 idea_SIA_joint_military_command_desc: "Jednotná velitelská struktura zlepšila koordinaci mezi složkami a urychlila rozvoj zkušených důstojníků a bojové doktríny."
