 effect_tt: "\n§YÚčinek§!:"
 AST_natunity_becomes_ruling_party: "\n[GET_AST_RULING_PARTY] pozve [GET_AST_NON_RULING_PARTY] ke vstupu do vlády národní jednoty.\n\n[GET_AST_NON_RULING_PARTY] získá §Y1§! volební vítězství\n\n"
 AST_natunity_effect_update_tt: "Seznam zaměření se aktualizuje podle aktuální §Ynevládnoucí strany§! a jejích již odemčených skupin zaměření."
