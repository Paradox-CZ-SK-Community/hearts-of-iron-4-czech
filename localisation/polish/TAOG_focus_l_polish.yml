 idea_SIA_german_tank_studies: "Studie německých tanků"
 idea_SIA_german_tank_studies_desc: "Naši důstojníci strávili čas studiem zahraničních obrněných doktrín a konstrukcí a vrátili se s technickými znalostmi, které přímo přispívají k rozvoji našich vlastních obrněnců."
