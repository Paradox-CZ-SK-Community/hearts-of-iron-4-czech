 AST_natunity_desc: "§YVláda národní jednoty§!\n§LVe chvílích krize ustupují malé spory těm větším. Národy kolem nás čelí jednomu konfliktu za druhým, a přestože domácí otázky mají svou naléhavost, tato naléhavost bledne, když hrozba krveprolití stále zřetelněji sílí. Demokratické strany [AST.GetName] musí odložit své neshody a čelit světu jednotně.§!"
