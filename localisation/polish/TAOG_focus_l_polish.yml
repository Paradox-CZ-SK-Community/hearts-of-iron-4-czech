 INS_govt_relocated_tt: "§Y[HOL.GetNameDefCap]§! přesune svou vládu na Jávu."
 indonesia_trading_with_us_modifier: "Obchodní dohody"
 indonesia_opposing_us_modifier: "Obchodní opozice"
 indonesia_trading_with_enemy_modifier: "Obchodování s Japonskem"
 INS_revolution_ended_tt: "Národní revoluce skončila"
 INS_the_jewel_in_the_crown: "Klenot v koruně"
 INS_the_jewel_in_the_crown_desc: "Východní Indie je nejzářivějším klenotem nizozemské koloniální koruny a my máme v úmyslu zajistit, aby to tak zůstalo. Prostřednictvím Volksraadu náš hlas doléhá až do Haagu."
 INSHOL_java: "$HOL_java$"
 INSHOL_java_desc: "$HOL_java_desc$"
 INSHOL_sumatra: "$HOL_sumatra$"
 INSHOL_sumatra_desc: "$HOL_sumatra_desc$"
 INSHOL_borneo_and_the_grote_oost: "$HOL_borneo_and_the_grote_oost$"
 INSHOL_borneo_and_the_grote_oost_desc: "$HOL_borneo_and_the_grote_oost_desc$"
 INSHOL_foundations_of_defense: "$HOL_the_foundations_of_defense$"
 INSHOL_foundations_of_defense_desc: "$HOL_the_foundations_of_defense_desc$"
 INSHOL_investments_in_civ_railways_tt: "Pokud [HOL.GetFlag]§Y[HOL.GetName]§! dokončí zaměření:\n         ([INS.GetFlag]§Y[INS.GetName]§!: Přidá §Y£autonomy_texticon -250.00§!)\n   Pokud [INS.GetFlag]§Y[INS.GetName]§! dokončí zaměření:\n         Přidá §Y£autonomy_texticon 250.00§!"
 INSHOL_investments_in_civ_railways: "Investice do civilních železnic"
 INSHOL_investments_in_civ_railways_desc: "Získání podpory lidu Indií vyžaduje investice do civilní infrastruktury. V současnosti jsou naše železnice primárně využívány pro nákladní dopravu. Měli bychom zakoupit osobní vlaky k provozu na našich stávajících železnicích na Jávě a Sumatře."
 INSHOL_continue_exclusive_rights: "Výhradní práva pro De Javasche Bank"
 INSHOL_continue_exclusive_rights_desc: "Východoindický gulden během velké hospodářské krize ztratil většinu své hodnoty a náš hospodářský růst se zastavil. Mohli bychom se pokusit stabilizovat gulden udělením výhradních emisních práv Bank of Java, která je měla do roku 1922."
 INSHOL_peg_indies_guilder_to_dutch_guilder: "Navázat východoindický gulden na nizozemský gulden"
 INSHOL_peg_indies_guilder_to_dutch_guilder_desc: "Východoindický gulden během velké hospodářské krize ztratil většinu své hodnoty a náš hospodářský růst se zastavil. Nejjednodušším řešením je navázat východoindický gulden na nizozemský gulden, mnohem stabilnější měnu. Tím se také těsněji připoutáme ke svému suzerénovi."
 INSHOL_peg_indies_guilder_to_us_dollar: "Navázat východoindický gulden na americký dolar"
 INSHOL_peg_indies_guilder_to_us_dollar_desc: "Východoindický gulden během velké hospodářské krize ztratil většinu své hodnoty a náš hospodářský růst se zastavil. Ačkoli bychom mohli gulden navázat na nizozemský gulden, americký dolar je mnohem stabilnější měna. Navázání guldenu na dolar nám také umožní větší hospodářskou nezávislost, díky čemuž se samospráva stane dosažitelnějším cílem."
 indonesia_currency_pegged_to_dollar_modifier: "Východoindický gulden navázán na americký dolar"
 INS_direct_rule_tt: "Odemkne okupační zákon §Y$INS_direct_rule_occupation_law$§! v indonéských knížecích státech.\nÚčinky:\n     §GZvýší§! továrny a zdroje ze státu\n     §RSníží§! růst poslušnosti\n     §RZvýší§! růst odboje"
 INS_local_autonomy_tt: "Odemkne okupační zákon §Y$INS_local_autonomy_occupation_law$§! v indonéských knížecích státech.\nÚčinky:\n     Poskytuje všude §Ymalá§! zlepšení\n     §GZvýší§! růst poslušnosti"
 INS_invest_in_batavian_education_req_tt: "Úspěšně dokončil alespoň §Y3§! mise Volksraadu"
 INS_invest_in_batavian_education_req_2_tt: "Úspěšně dokončil alespoň §Y6§! misí Volksraadu"
 INSHOL_eventual_autonomy_req_tt: "Úspěšně dokončil alespoň §Y4§! mise Volksraadu"
 indonesia_volksraad_passed_12: "Indonéská národní vlajka byla oficiálně uznána "
 INS_stronghold_java_tt: "Jakýkoli indonéský stát: není okupován [ROOT.GetFlag][ROOT.GetNameDefCap]"
 INSHOL_request_east_timor: "Požadovat návrat Východního Timoru"
 INSHOL_request_east_timor_desc: "Timor nemá žádné právo být okupován Portugalskem; je pozůstatkem koloniálních dějin, který nesmíme dál tolerovat, protože jde o právoplatné indonéské území. Vydáme Portugalsku formální požadavek, aby nám Timor okamžitě vrátilo."
 INS_resist_occupation: "Odpor proti okupaci"
 INS_resist_occupation_desc: "Hněv, který mnoho Indonésanů chová vůči Nizozemsku, nám nesmí dovolit padnout fašismu. Musíme udělat vše, co můžeme, abychom vzdorovali japonské invazi a bránili vlast."
 INS_local_resistance: "Místní odboj"
 INS_local_resistance_desc: "Zřídíme odbojové buňky na území, které dosud nebylo okupováno, čímž zajistíme, že pokud okupováno bude, budeme připraveni jej ve správný čas získat zpět."
 INS_stronghold_java: "Opevnit Jávu"
 INS_stronghold_java_desc: "Indie jsou rozsáhlé souostroví domovem mnoha národů a mimořádně drsného terénu. Pokus bránit každý poslední ostrov, džungli a horu před armádou mnohem větší než naše je zaručeným selháním. Ačkoli není snadné opustit naše druhy, evakuace všech ostrovů kromě Jávy, která nám umožní rozmístit tam celou armádu, může být pro národ jako celek nejlepším krokem."
 INS_silence_nationalists: "Umlčet nacionalistické sympatizanty"
 INS_silence_nationalists_desc: "Japonská invaze způsobila, že revoluční nacionalistická hnutí začala podporovat japonské útočníky kvůli jejich společnému nepříteli, Nizozemsku. Nestabilita vyplývající z invaze způsobila, že tato hnutí rostou tempem, jaké tu dosud nebylo. Pokud s tím hned něco neuděláme, může se to zcela vymknout naší kontrole."
 INS_east_indies_exile_government: "Východoindická exilová vláda"
 INS_east_indies_exile_government_desc: "Bohužel, navzdory našemu nejlepšímu úsilí Indie padly. Ještě však nesmíme ztratit naději. Musíme dál dělat vše, co můžeme, s omezenými zdroji, které máme k dispozici. Možná jsme prohráli bitvu, ale válku jsme ještě neprohráli."
 INS_establish_nefis: "Zřídit NEFIS"
 INS_establish_nefis_desc: "Společně se Spojenci vytvoříme Netherlands East Indies Forces Intelligence Service, kterou umístíme v Austrálii. Jejím prostřednictvím budeme provádět tajné operace k sabotáži japonských okupačních sil. Každým malým vítězstvím se přibližujeme návratu do vlasti."
 INS_evacuate_soldiers_to_australia: "Evakuovat vojáky do Austrálie"
 INS_evacuate_soldiers_to_australia_desc: "Zřídíme vojenskou základnu poblíž základny NEFIS v severní Austrálii. Tam umístíme vojáky KNIL, kteří se během okupace vyhnuli zajetí, což nám umožní pokračovat v boji."
 INS_australian_weapons: "Australské zbraně"
 INS_australian_weapons_desc: "Tajné operace není snadné provádět a k úspěchu budeme potřebovat řádné vybavení. Můžeme licencovat australské továrny a přesměrovat je na výrobu zbraní pro NEFIS."
 INS_defenders_of_homeland: "Obránci vlasti"
 INS_defenders_of_homeland_tt: "Toto zaměření bude automaticky dokončeno, pokud budou zřízeni Obránci vlasti."
 INS_resist_occupation_tt: "Toto zaměření bude automaticky dokončeno, pokud budeme napadeni a nevzdáme se."
 INS_defenders_of_homeland_desc: "Vláda Indií padla a její místo zaujal nový režim. Vedeni nacionalisty a japonskou vládou vytvoříme novou armádu nadřazenou KNIL a vyhrajeme válku. Nelze však popřít, že toto spojenectví mezi nacionalisty a imperialisty je křehké. Vydrží spojenectví, nebo skončí krveprolitím?"
 INS_embrace_co_prosp_sphere: "Přijmout Sféru společné prosperity"
 INS_embrace_co_prosp_sphere_desc: "Konečně jsme ukončili nizozemskou vládu, a ačkoli jsme právě nahradili jednoho suzeréna druhým, sliby hospodářské prosperity a panasiatismu jsou velmi lákavé. Budeme nadále pomáhat japonskému válečnému úsilí, abychom zajistili, že se Nizozemsko už nikdy nepokusí vrátit pro Indonésii."
 INS_seize_oppurtunity: "Chopit se příležitosti"
 INS_seize_oppurtunity_desc: "[JAP.GetNameDefCap] prohrává a jeho okupační vláda je slabá. Poprvé po mnoha staletích máme skutečnou šanci zlomit okovy kolem Indonésie nadobro a vytvořit nezávislý národ. Pokud této příležitosti k vyhlášení nezávislosti nevyužijeme nyní, nelze říci, jak dlouho bude trvat, než dostaneme další."
 INS_japanese_resource_infrastructure: "Financovat širší válečné úsilí"
 INS_japanese_resource_infrastructure_desc: "Předání kontroly nad naší klíčovou infrastrukturou těžby zdrojů zemi [JAP.GetNameDef] je nezbytným krokem k vítězství ve válce, protože je nejvyšší prioritou, aby [JAP.GetAdjective] jednotky byly neustále plně zásobeny. [JAP.GetNameDefCap] bude také rozvíjet naši místní infrastrukturu, aby zvýšila efektivitu vývozu zdrojů."
 INS_japanese_army_training: "Reformovat armádu"
 INS_japanese_army_training_desc: "Od našich [JAP.GetAdjective] suzerénů se máme mnoho co učit, a nyní, když je KNIL rozpuštěna, bychom měli vytvořit novou armádu vycvičenou IJA, připravenou bránit Indonésii před vnějšími hrozbami."
 INS_governor_general_de_jonge: "Generální guvernér de Jonge"
 INS_governor_general_de_jonge_desc: "Bonifacius Cornelis de Jonge je známý tím, že vládl železnou pěstí, odporoval jakékoli formě nacionalismu a často ignoroval přání Volksraadu. Jeho vláda nad Indiemi trvala dlouho a jeho zkušenosti sahají až do velké války, kdy sloužil jako ministr války Indií."
 INS_governor_general_tjarda: "Generální guvernér Tjarda"
 INS_tjarda_explain_tt: "Funkční období §YBonifacia Cornelise de Jongeho§! vypršelo a §YAlidius Tjarda van Starkenborgh Stachouwer§! byl v září 1936 vybrán jako náhradní guvernér."
 INS_governor_general_tjarda_desc: "Alidius Tjarda van Starkenborgh Stachouwer má pro Indie poněkud odlišnou vizi než jeho předchůdce. Ačkoli je stále proti nacionalismu, má o něco liberálnější politiku a je ochotnější naslouchat přáním Volksraadu."
 INS_electrical_investments: "Investice do elektrifikace"
 INS_electrical_investments_desc: "Každý evropský industrializovaný národ má silnou elektrickou síť podporující jeho průmysl. Chceme-li přestat spoléhat na vývoz surovin a vytvořit vlastní zpracovatelský průmysl jako oni, měli bychom vybudovat vysokokapacitní elektrickou síť napříč celou Jávou."
 INS_reduce_land_taxes: "Snížit pozemkové daně"
 INS_reduce_land_taxes_desc: "Vysoké daně uvalené na vlastnictví půdy ztížily původním Indonésanům vlastnictví plantáží a podniků. Ačkoli nám to usnadnilo udržení monopolu na kaučukový průmysl, způsobilo to hospodářské problémy po celé zemi. Měli bychom zvážit snížení těchto daní na jejich předchozí sazby, aby mohly fungovat menší, soukromě vlastněné kaučukové plantáže."
 INS_invest_in_batavian_education: "Investice do batávijského vzdělávání"
 INS_invest_in_batavian_education_desc: "Volksraad dal jasně najevo, že vůlí indonéského lidu je zpřístupnit vzdělání, protože v současnosti si je mohou dovolit především nizozemští Indonésané a malá skupina indonéské elity. Abychom vyhověli návrhu Volksraadu, měli bychom v Batávii a jejím okolí postavit několik základních a středních škol."
 INS_javanese_education_investments: "Investice do jávského vzdělávání"
 INS_javanese_education_investments_desc: "Kromě našeho probíhajícího projektu výstavby základních a středních škol bychom mohli postavit komunitní vysokou školu a specializované odborné školy, což by výrazně zpřístupnilo vyšší vzdělání rodinám ze střední třídy."
 INS_allow_local_autonomy: "Povolit místní autonomii"
 INS_allow_local_autonomy_desc: "Systém Vorstenlanden poskytující knížecím státům samosprávu výrazně usnadnil zvládání nacionalistických hnutí a zvýšil stabilitu národa jako celku. Měli bychom úroveň autonomie udělené knížecím státům ještě zvýšit, aby se vláda mohla soustředit na důležitější záležitosti."
 INS_direct_rule: "Přímá vláda"
 INS_direct_rule_desc: "Systém Vorstenlanden poskytující knížecím státům samosprávu přidal správě další vrstvu obtížnosti, vyžaduje dodatečnou byrokracii a plýtvá časem. Je čas tento systém zcela zrušit a prosadit přímou vládu nad celým souostrovím."
 INS_seize_oppurtunity_tt: "§Y[JAP.GetFlag][JAP.GetName]§! byla zatlačena zpět a ovládá méně než §Y[?var:temp_states_plus_more]§! států. (aktuálně: §Y[?var:JAP.num_controlled_states]§!)"
 INS_seize_oppurtunity_refuse_warn_tt: "§RZačne národní revoluce, která může vést k válce s [HOL.GetNameDef]§!."
 INS_economic_stabilization: "Hospodářská stabilizace"
 INS_economic_stabilization_desc: "Velká hospodářská krize a celosvětový protekcionismus nás hospodářsky ochromily a mnoho Indonésanů, kteří kdysi pracovali v odvětví surovin, se ocitlo bez práce. Musíme přijmout drastická opatření a vytvořit pracovní program, v němž občanům bez práce bude práce přidělena."
 INS_restore_order_in_indies: "Obnovit pořádek v Indiích"
 INS_restore_order_in_indies_desc: "Rostoucí nacionalistické hnutí v Indiích destabilizovalo několik regionů a mohlo by se vymknout kontrole, pokud jej nezastavíme. Obnovení pořádku a stability musí být naší nejvyšší prioritou."
 INS_detangle_supply_chains: "Rozmotat dodavatelské řetězce"
 INS_detangle_supply_chains_desc: "Naše exportní ekonomika vyžaduje, aby zboží prošlo desítkami prostředníků, než konečně dorazí do cíle, přičemž pokaždé je vyžadován poplatek, daň nebo jakýkoli jiný důvod, proč si vzít trochu z vrchu. Měli bychom pracovat na rozmotání tohoto nepořádku a přímo ovládat většinu dodavatelského řetězce."
 INS_prioritize_industrial_growth: "Upřednostnit průmyslový růst"
 INS_prioritize_industrial_growth_desc: "Naše exportní ekonomika je příliš nestálá a udržuje nás závislé na nizozemské spolupráci. Měli bychom pracovat na vytvoření zpracovatelského průmyslu výstavbou továren po celé Batávii. Mohli bychom se stát nejindustrializovanější zemí v Pacifiku."
 INS_closer_economic_ties_to_netherlands: "Užší hospodářské vazby na Nizozemsko"
 INS_closer_economic_ties_to_netherlands_desc: "Od našeho suzeréna se máme mnoho co učit, zejména v hospodářství. Pokud bychom svou exportní ekonomiku dále integrovali s Nizozemskem, mohli bychom využít jejich infrastrukturu a kontakty k zajištění výnosnějších obchodních dohod."
 INS_prioritize_dutch_companies: "Upřednostnit nizozemské společnosti"
 INS_prioritize_dutch_companies_desc: "Nizozemské společnosti jako Shell a Fokker tvoří páteř našeho hospodářství již po staletí a náš vývoz surovin je silně integrován se Shellem. To přineslo Indiím značné bohatství a měli bychom je upřednostnit před menšími místními podniky, abychom zajistili, že naše spolupráce zůstane silná."
 INSHOL_java_factories: "Otevřít zbrojní továrny na Jávě"
 INSHOL_java_factories_desc: "Ačkoli je to základní, nelze popřít, že prostá výstavba dalších zbrojních továren výrazně zvyšuje sílu armády. Jako průmyslové centrum kolonie je Jáva zřejmým místem, kde je postavit."
 INSHOL_license_dutch_weapon_blueprints: "Licencovat nizozemské zbrojní plány"
 INSHOL_license_dutch_weapon_blueprints_desc: "Místo investic do vybudování celého domácího výrobního procesu a tvorby vlastních technologických návrhů bychom měli spolupracovat s nizozemskými společnostmi a zakoupit jejich zbrojní plány."
 INSHOL_bangka_production_lines: "Výrobní linky Bangka"
 INSHOL_bangka_production_lines_desc: "Exponenciální rozvoj infrastruktury Bangky v důsledku projektu Bangka proměnil tento kdysi malý, většinou nedůležitý ostrov v ideální místo pro nové průmyslové projekty. Máme příležitost posílit KNIL vybudováním nové zbrojní továrny na Bangce, která bude díky soustředěným silnicím, železnicím a přístavům ostrova fungovat efektivněji, než kdybychom ji postavili jinde."
 INSHOL_artillerie_inrichtingen: "Artillerie Inrichtingen"
 INSHOL_artillerie_inrichtingen_desc: "Artillerie Inrichtingen vyrábí dělostřelectvo a jiné zbraně v Nizozemsku již více než 250 let a v Indiích působí několik desetiletí. Rozšíření jejich výrobních schopností otevřením nových výrobních zařízení v Indiích by výrazně zlepšilo schopnosti KNIL a zároveň posílilo ekonomiku podfinancovaných oblastí vytvořením nových pracovních míst."
 INSHOL_ai_pyrotechnische: "Artillerie Inrichtingen Pyrotechnische"
 INSHOL_ai_pyrotechnische_desc: "V rámci pokračujícího rozšiřování výrobních zařízení Artillerie Inrichtingen ve Východní Indii bychom měli financovat zřízení východoindické divize pyrotechnické dceřiné společnosti Artillerie Inrichtingen."
 INSHOL_bio_pharma: "Bio Pharma"
 INSHOL_bio_pharma_desc: "Rozšíření indického farmaceutického průmyslu je zřejmým dalším krokem v reformě KNIL, aby bylo zajištěno, že ranění vojáci dostanou odpovídající léčbu a bezpečně se zotaví. Rozšíření chininu v Indiích činí náklady tohoto projektu výrazně nižšími než obvykle."
 INSHOL_develop_fighters: "Vyvinout nové stíhačky"
 INSHOL_develop_fighters_desc: "Pošleme batávijské inženýry do Amsterdamu, aby z první ruky studovali výrobu stíhaček Fokker a získali přístup k jejím pečlivě střeženým výrobním tajemstvím. Vrátí se se znalostmi a technickou odborností potřebnou k vytvoření moderního domácího stíhacího průmyslu v Indiích."
 INSHOL_develop_bombers: "Vyvinout nové bombardéry"
 INSHOL_develop_bombers_desc: "Pošleme batávijské inženýry do Amsterdamu, aby z první ruky studovali výrobu bombardérů Fokker a získali přístup k jejím pečlivě střeženým výrobním tajemstvím. Vrátí se se znalostmi a technickou odborností potřebnou k vytvoření moderního domácího bombardovacího průmyslu v Indiích."
 INSHOL_bandung_aircraft_facility: "Bandungské zařízení na výrobu letadel"
 INSHOL_bandung_aircraft_facility_desc: "Ačkoli jsou plány a výrobní tajemství užitečné, jsou k ničemu, dokud z nich nepostavíme letadla. Otevřeme nová letecká zařízení v Bandungu, abychom splnili současné potřeby ML-KNIL."
 INSHOL_netherlands_indies_air_doctrine: "Nizozemsko-indická letecká doktrína"
 INSHOL_netherlands_indies_air_doctrine_desc: "Budeme studovat letectva národů čelících podobným výzvám jako my a čerpat z jejich těžce nabytých zkušeností při formování doktríny vhodné pro realitu Východní Indie, aniž bychom opakovali jejich historické chyby."
 INSHOL_manado_military_academy: "Vojenská akademie Makassar"
 INSHOL_manado_military_academy_desc: "Zřízení vojenské akademie mimo Jávu nám výrazně pomůže zmírnit nedostatek personálu tím, že umožní odvody na východních ostrovech. Makassar, ležící přibližně uprostřed Východní Indie, je pro ni dokonalým místem."
 INSHOL_infantry_training_in_borneo: "Pěchotní výcvik na Borneu"
 INSHOL_infantry_training_in_borneo_desc: "Východní Indie jsou definovány hustými džunglemi, drsnými horami a neúprosným terénem. Naši vojáci, sídlící převážně na Jávě, jsou na boj v těchto podmínkách žalostně nepřipraveni. Musíme rozšířit vojenský výcvik mimo Jávu a provádět cvičení v drsnějších prostředích. Jen málo míst na zemi se vyrovná džunglím a horám Bornea, což z něj činí ideální místo k výcviku špičkových hraničářů."
 INSHOL_knil_engineers: "Ženijní sbor"
 INSHOL_knil_engineers_desc: "Nesmíme soustředit veškeré úsilí na pěchotu a výrobu pušek a musíme si pamatovat, že logistika a komunikace hrají zásadní roli ve vyhrávání bitev. Měli bychom cvičit ženisty a financovat batávijské odborné školy, abychom zajistili, že naši armádu nebude brzdit špatná logistika."
 INSHOL_work_with_oil_barons: "Spolupracovat s ropnými barony"
 INSHOL_work_with_oil_barons_desc: "Velká hospodářská krize zanechala naši exportní ekonomiku v žalostném stavu. Možná nastal čas zvážit přenesení části obchodních jednání na ropné barony Sumatry, abychom zajistili, že se ropa prodá. To však bude něco stát, protože aby na tuto dohodu přistoupili, budeme muset ropu prodávat za ceny výrazně nižší než tržní."
 INSHOL_rubber_taxation: "Zdanění kaučuku"
 INSHOL_rubber_taxation_desc: "Nizozemské investice a odbornost proměnily kaučukové plantáže Východní Indie v jeden z nejcennějších majetků Impéria. Je jen spravedlivé, aby si koruna nárokovala svůj právoplatný podíl z bohatství, které vytvořila. Ačkoli někteří místní politici protestují, zájmy Impéria nemohou být diktovány provinční agitací."
 INSHOL_padang_port: "Mezinárodní přístav v Padangu"
 INSHOL_padang_port_desc: "Zdroje vyprodukované v Padangu musí nejprve projít přes Jávu, než se dostanou na mezinárodní trhy, protože region postrádá zařízení schopná odbavit velké konvoje. Tato zbytečná objížďka zatěžuje náš dodavatelský řetězec a omezuje hospodářský potenciál Sumatry. Vybudováním velkého nákladního přístavu v Padangu můžeme tuto objížďku odstranit a zvýšit výnosnost padangských plantáží."
 INSHOL_subsidize_bauxite: "Subvencovat bauxitové projekty"
 INSHOL_subsidize_bauxite_desc: "Probíhající projekt v Indiích na modernizaci na bauxit bohatých ostrovů Bangka-Belitung je velmi slibný a potenciál dlouhodobého zisku je vysoký. Měli bychom podpořit vládu Indií hospodářskými dotacemi, abychom projekt urychlili."
 INSHOL_agricultural_subsidies: "Privatizovat zemědělský sektor"
 INSHOL_agricultural_subsidies_desc: "Povolením zakládání soukromě vlastněných farem různých velikostí můžeme urychlit rozvoj infrastruktury v podfinancovaných venkovských regionech a zároveň zvýšit vládní příjmy. Za tímto účelem zavedeme strukturovaný daňový rámec, v němž všechny daňové příjmy vytvořené těmito farmami budou odváděny přímo Nizozemsku, místo aby nejprve procházely přes Indie."
 INSHOL_import_sugar: "Dovážet cukr"
 INSHOL_import_sugar_desc: "Nařídíme cenové kontroly v rostoucím zemědělském sektoru v Indiích, abychom dováželi veškerý cukr národa z plantáží v Indiích za ceny, jimž žádná jiná vláda nedokáže konkurovat, a zavedeme vládní monopol na cukr."
 INSHOL_import_lumber: "Dovážet dřevo"
 INSHOL_import_lumber_desc: "Nařídíme cenové kontroly v rostoucím zemědělském sektoru v Indiích, abychom dováželi veškeré dřevo národa z plantáží v Indiích za ceny, jimž žádná jiná vláda nedokáže konkurovat, a zavedeme vládní monopol na dřevo."
 INSHOL_industrialized_colony: "Industrializovaná kolonie"
 INSHOL_industrialized_colony_desc: "Východní Indie, kdysi skromná kolonie, se stala jedním z nejindustrializovanějších a nejbohatších regionů celé Asie. Jde o monumentální okamžik v dějinách Nizozemska i lidstva. Naše úsilí se vyplatilo a budeme nadále investovat do rozvoje své kolonie a znovu obnovíme Nizozemsko jako globální mocnost."
 INSHOL_economic_integration: "Hospodářská integrace"
 INSHOL_economic_integration_desc: "Nizozemská východní Indie je zářícím klenotem našeho Impéria, její prosperita je zajištěna pevným vedením královny, premiéra a generálního guvernéra. Tato stabilita nesmí být ohrožena lehkomyslnými výzvami k nezávislosti, které by přinesly jen nepořádek a úpadek. Ještě těsněji svážeme hospodářství Nizozemska a Indií, čímž zajistíme trvalou stabilitu a velikost."
 INSHOL_republic_of_indonesia: "Indonéská republika"
 INSHOL_republic_of_indonesia_desc: "Když Nizozemsko neochotně souhlasilo se Soetardjovou peticí, výsledná legislativa svázala indonéskou nezávislost dlouhým seznamem podmínek pro uznání hospodářské soběstačnosti. Navzdory tomu byly tyto podmínky díky odhodlání indonéského lidu nyní splněny v plném rozsahu a Nizozemsko nemá jinou možnost než přijmout naše formální vyhlášení nezávislosti."
 INSHOL_propose_malay_unification: "Navrhnout malajské sjednocení"
 INSHOL_propose_malay_unification_desc: "Indonésie je souostroví domovem stovek kultur, jazyků a etnik. Některé jsou si podobné, jiné jsou zřetelně odlišné. Přesto jsme skrze společný boj pod koloniální vládou našli jednotu pod jedním národem: Indonésií. Možná bychom se měli zeptat, proč tato jednota musí končit zde, když za průlivy sdílí lid Malajska velmi podobné dějiny a touhy jako my?"
 INSHOL_singapore_compromise: "Singapurský kompromis"
 INSHOL_singapore_compromise_desc: "Singapur je historicky i kulturně indonéská země a je jen přirozené, že by měl být zahrnut do sjednocené Indonésie. Británie však kvůli jeho strategickému významu a nezbytnosti jako vojenské základny není ochotna se Singapuru vzdát. Měli bychom navrhnout kompromis, v němž Singapur vstoupí do unie pod podmínkou, že si Británie ponechá právo rozmístit na ostrově síly."
 INSHOL_request_ceylon: "Požádat o předání Cejlonu"
 INSHOL_request_ceylon_desc: "Britská kolonie Cejlon sdílí hluboké kulturní a jazykové vazby s širším malajským světem. Jak panmalajská federace Maphilindo roste, je jen přirozené, že i tento ostrov najde své místo v konfederaci."
 INSHOL_papua_referendum: "Papujské referendum"
 INSHOL_papua_referendum_desc: "Dnes je ostrov Papua rozdělen mezi Indonésii a Austrálii. Zatímco naše investice a rozvoj proměnily naši polovinu v rostoucí a prosperující region, území spravované Austrálií zůstává zanedbané a nerozvinuté. Budoucnost ostrova by měla spočívat v rukou jeho lidu, a proto musíme požadovat oficiální referendum o sjednocení Papuy."
 INSHOL_invite_phillipines: "Navrhnout Maphilindo"
 INSHOL_invite_phillipines_desc: "Mnohé národy naší unie mluví různými jazyky a dodržují různé tradice, přesto téměř všechny odvozují své kořeny z malajského světa. Měli bychom přetvořit náš unijní stát v panmalajskou konfederaci a pozvat Filipíny jako členský stát. To, co kdysi byly jen bezvýznamné kolonie, nyní bude stát pevně jako regionální mocnost jihovýchodní Asie."
