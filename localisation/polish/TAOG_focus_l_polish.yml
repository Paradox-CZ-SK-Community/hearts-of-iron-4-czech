l_polish:
 INS_nationalize_companies_tt: "Všechny vojenské průmyslové organizace a průmyslové koncerny budou znárodněny a dostanou nový název."
 available_focus_tt: "§GDostupná§! zaměření:\n"
 INS_denounce_soetardjo: "Odsoudit Soetardja"
 INS_denounce_soetardjo_tt: "Začneme plánovat podzemní revoluci, infiltrovat vládu a zakládat partyzánské buňky po celém souostroví. Jakmile budeme dostatečně připraveni, zahájíme partyzánskou válku za nezávislost proti Nizozemcům."
 INS_soetardjo_petition_debate_done_tt: "Debata Volksraadu o Soetardjově petici za autonomii skončila"
 INS_tkr_tt: "Upraví §YLidovou bezpečnostní armádu§! o:"
 INS_commander_sudirman_tt: "§YSudirman§!([INS.GetFlag]) bude povýšen na §Ypolního maršála§!"
 INS_the_declaration_of_independence: "Vyhlášení nezávislosti"
 INS_the_declaration_of_independence_desc: "Nemůžeme riskovat další čekání, musíme kout železo, dokud je žhavé! Měli bychom vyslat naše milice, aby se zmocnily přístavů, měst a průmyslových center dostatečně rychle na to, aby nizozemské úřady nestihly zareagovat. Poté vyhlásíme nezávislost a prohlásíme Indonéskou republiku."
 INS_the_declaration_of_independence_tt: "Vyhlásíme §Ynezávislost§!. Každý stát, kde jsme zřídili §YMiliční základnu§! nebo §YVelitelství§!, bude pod naší kontrolou, zatímco ostatní zůstanou pod kontrolou [HOL.GetNameDef]\n\n[HOL.GetNameDefCap] nebude uznávat naši svrchovanost a začne konflikt nízké intenzity. Ten by se mohl vyvinout v §Rválku§!.\n\nOdemkne pozemní nájezdy k obsazení států." # todo: CHANGED
 INSHOL_the_declaration_of_independence: "Národní revoluce"
 INS_laskar_rakjat: "Laskar Rakyat"
 INS_laskar_rakjat_desc: "Revoluci tvoří mnoho různých milic napříč Indonésií, některé velké a některé malé. Organizace milic je nezbytným krokem k dosažení vítězství. Nesmíme však být příliš ukvapení, protože posílení milic napojených na naše politické soupeře by mohlo vést ke katastrofě."
 INS_militia_tt: "Vytvoří novou šablonu divize milicí §Ybojovníků za svobodu§! a odemkne rozhodnutí k jejich správě."
 INS_militia_warning_tt: "Milice jsou §Ypolosamostatné§! skupiny bojovníků za svobodu. Budou za nás bojovat, ale jejich pomoc není zdarma. Budou očekávat odměnu za své úsilí. §RStabilita bude drasticky zasažena, pokud nebudou jejich požadavky splněny!§!"
 INS_usa_tanks_opinion_mod: "Zakoupil naše tanky"
 INS_republic_add_generals_tt: "(§Y$INS_sudirman$§!([INS.GetFlag]), §Y$INS_soengkono$§!([INS.GetFlag]), §Y$INS_supriyadi$§!([INS.GetFlag]), §Y$INS_djatikoesoemo$§!([INS.GetFlag]), §Y$INS_maludin_simbolan$§!([INS.GetFlag])) se stane generálem."
 INS_big_militia_presence_tt: "Po vyhlášení nezávislosti bude ovládáno našimi milicemi."
 INS_prepare_raiding_bases: "Připravit nájezdové základny"
 INS_prepare_raiding_bases_desc: "Využijeme naši síť špionů k tajnému zřízení bunkrů po celém souostroví a zajistíme, že budeme připraveni udeřit, jakmile revoluce začne."
 INSHOL_dutch_east_indies: "Nizozemská východní Indie"
 INSHOL_dutch_east_indies_desc: "Kolonie byla založena téměř před 500 lety a od té doby měla mnoho podob. Svět se rychle mění a naše současné kroky určí budoucnost nizozemsko-indonéských vztahů na dlouhá léta dopředu."
 INSHOL_the_war_in_europe: "Válka v Evropě"
 INSHOL_the_war_in_europe_desc: "Konflikt v Evropě rychle eskaluje a Nizozemsko je nyní ve válce. Už se na ně nemůžeme spoléhat, že nás ochrání, a musíme se postavit na vlastní nohy, jinak riskujeme, že nás přemohou cizí mocnosti."
 INSHOL_military_equipment_contracts: "Smlouvy na vojenské vybavení"
 INSHOL_military_equipment_contracts_desc: "Indie jsou rozsáhlé souostroví s desítkami milionů obyvatel. Zdaleka nemáme průmyslovou kapacitu potřebnou k vlastní obraně. Máme však dostatek zdrojů k zajištění obchodu po celém světě. Uzavřením smluv s demokraciemi po celém světě můžeme náš problém vyřešit."
 INSHOL_hawk_75a7: "Hawk 75A-7"
 INSHOL_hawk_75a7_desc: "Americký stíhací letoun Hawk 75A-7 je pro Indie dokonalým letadlem, dostupným a výkonným. Můžeme uzavřít dohodu s výrobcem, abychom provedli tolik potřebná zlepšení našeho letectva."
 INSHOL_purchase_american_tanks: "Zakoupit americké tanky"
 INSHOL_purchase_american_tanks_desc: "Ačkoli Indie postrádají průmysl potřebný k výrobě tanků, můžeme je zakoupit přímo ze Spojených států a financovat je z indického kaučukového průmyslu."
 INSHOL_purchase_british_artillery: "Zakoupit britské dělostřelectvo"
 INSHOL_purchase_british_artillery_desc: "Výrobu našeho dělostřelectva můžeme zadat Spojenému království, což nám umožní upřednostnit jiné vybavení."
 INSHOL_produce_own_goods: "Vyrábět vlastní zboží"
 INSHOL_produce_own_goods_desc: "Ačkoli máme spoustu výnosných obchodních dohod, které můžeme uzavřít, nesmíme zapomínat na vlastní výrobní linky a vojenské průmyslové společnosti. Měli bychom tyto společnosti subvencovat, abychom snížili svou závislost na zahraničním dovozu."
 INSHOL_east_indies_investments: "Investice ve Východní Indii"
 INSHOL_east_indies_investments_desc: "Dobrý suzerén je ten, který investuje do rozvoje svých kolonií. Investice do hospodářského rozvoje Indií je v našem nejlepším zájmu a prospívá občanům kolonie."
 INSHOL_east_indies_student_exchange: "Studentský výměnný program Východní Indie"
 INSHOL_east_indies_student_exchange_desc: "Vytvoření systému, v němž se Indonésané mohou přesouvat do Nizozemska ke studiu na našich univerzitách, může být významným přínosem pro hospodářství Nizozemska i Indií."
 INSHOL_east_indies_fokker_division: "Založit východoindickou divizi Fokkeru"
 INSHOL_east_indies_fokker_division_desc: "Fokker je letectvem Indií licencován v takové míře, že stojí za zvážení vytvoření specializované pobočky upřednostňující letectvo Indií."
 INSHOL_expand_shell: "Rozšířit infrastrukturu Shellu"
 INSHOL_expand_shell_desc: "Shell se postupně stává větší součástí našeho hospodářství. Je zřejmé, že musíme rozšířit ropnou infrastrukturu v Indiích, abychom udrželi krok s exportní kapacitou Shellu."
 INSHOL_increase_funding_for_tix: "Zvýšit financování projektu letounu T.IX"
 INSHOL_increase_funding_for_tix_desc: "Inženýři ve Fokkeru vyvíjejí nový dvoumotorový bombardér, který má nahradit zastaralé modely používané letectvem Indií. Tento projekt má velmi nízký rozpočet a pravděpodobně nebude dokončen ještě velmi dlouho. Můžeme zvýšit jeho financování a výrazně urychlit pokrok."
 INSHOL_reduce_land_ownership_taxes: "Snížit daně z vlastnictví půdy"
 INSHOL_reduce_land_ownership_taxes_desc: "Měli bychom snížit daň uvalenou na indonéské občany vlastnící půdu, abychom podpořili rozvoj farem a podniků."
 INSHOL_coffee_plantations: "Kávové plantáže"
 INSHOL_coffee_plantations_desc: "Měli bychom se zaměřit na získání většího množství státem vlastněné půdy na východních ostrovech. Tuto půdu můžeme využít k výstavbě kávových plantáží."
 INSHOL_overallwagen: "Overvalwagen"
 INSHOL_overallwagen_desc: "Tanky nemusí být pro armádu Východní Indie nutně řešením. Postrádáme průmyslovou sílu potřebnou k jejich výrobě a drsný terén z nich dělá specializovaný prostředek. Mohli bychom investovat do stavby obrněných automobilů pro Indonésii, abychom tuto mezeru vyplnili."
 INSHOL_indonesian_cheap_labor: "Levná indonéská pracovní síla"
 INSHOL_indonesian_cheap_labor_desc: "$CONGO_cheap_labor_desc$"
 INSHOL_eastern_development_fund: "Rozvojový fond pro východní ostrovy"
 INSHOL_eastern_development_fund_desc: "Příliš se zaměřujeme na investice do Jávy a Sumatry a ignorujeme většinu území kolonie. Musíme se zavázat k rozvoji infrastruktury na východě, abychom umožnili budoucí industrializaci."
 INSHOL_increase_rubber_taxes: "Zvýšit daně z kaučuku"
 INSHOL_increase_rubber_taxes_desc: "Mnoho kaučukových společností v Indiích získává velké bohatství využíváním zdrojů kolonie. Je jen spravedlivé uvalit na tyto provozy vysokou daň."
 INSHOL_reform_knil: "Reformovat KNIL"
 INSHOL_reform_knil_desc: "Od doby, kdy Východní Indie dokončila dobytí celého souostroví, zůstává Královská nizozemská východoindická armáda nehybná a trpí vážným nedostatkem financí. Vzhledem k rostoucímu napětí ve světě musíme začít Indie znovu vyzbrojovat raději dříve než později."
 INSHOL_fund_ml_knil: "Financovat ML-KNIL"
 INSHOL_fund_ml_knil_desc: "Chceme-li držet krok s armádami světa, musíme si vybudovat vlastní řádné letectvo, jinak budeme ve značné nevýhodě."
 INSHOL_bandung_aircraft_facility_tt: "§YZápadní Jáva:§!\n    Přidá §G1§! stavební slot a §G1§! §Yvojenskou továrnu§! za každé dokončené předpokladové zaměření."
 INSHOL_rangers: "Hraničáři"
 INSHOL_rangers_desc: "Indie jsou rozsáhlé souostroví s rozmanitým prostředím. Měli bychom vycvičit hraničáře přizpůsobené boji v těchto drsných prostředích, abychom byli připraveni je bránit."
 INSHOL_mountaineers: "Horalé"
 INSHOL_mountaineers_desc: "Měli bychom vycvičit horaly připravené bojovat v nehostinném terénu našeho souostroví."
 INSHOL_elevate_elite_infantry: "Depot Speciale Troepen"
 INSHOL_elevate_elite_infantry_desc: "Nemůžeme se věčně spoléhat na strategie Velké války, musíme se přizpůsobit novým technologiím a zajistit, že nezaostaneme. Měli bychom zřídit několik elitních pěších divizí připravených bránit všechny druhy prostředí."
 INSHOL_modernize_knil: "Modernizovat KNIL"
 INSHOL_modernize_knil_desc: "Budeme studovat nové strategie a doktríny pro armádu Východní Indie, abychom si udrželi výhodu nad nepřítelem."
 INSHOL_transfer_of_henri_winkelman: "Přesun Henriho Winkelmana"
 INSHOL_transfer_of_henri_winkelman_desc: "Henri Winkelman dříve mnoho let sloužil v KNIL. Je zřejmé, že je v Indiích znovu zapotřebí, a měli bychom zařídit jeho formální přesun do Východní Indie."
 INSHOL_eastern_conscription: "Povolat pomocné sbory"
 INSHOL_eastern_conscription_desc: "Na Jávě a Maduře existuje několik domorodých pomocných sborů, které ovládají místní knížecí vládci. V těchto těžkých časech bychom mohli s místními vládci vyjednat dohodu, podle níž budou tyto divize pod naší autoritou."
 INSHOL_establish_vk_knil: "Zřídit VK-KNIL"
 INSHOL_establish_vk_knil_desc: "Zřídíme Ženský dobrovolnický sbor pro KNIL. Jejich přínos bude hrát důležitou roli při zlepšování naší logistiky a komunikace."
 INSHOL_emergency_dockyard_construction: "Nouzová výstavba loděnic"
 INSHOL_emergency_dockyard_construction_desc: "Hrozbu námořní invaze nelze podceňovat, musíme jako nejvyšší prioritu upřednostnit naši námořní obranu."
 INSHOL_emergency_powers_gov_general: "Nouzové pravomoci pro generálního guvernéra"
 INSHOL_emergency_powers_gov_general_desc: "Probíhající válka vyžaduje tvrdá rozhodnutí bez odkladu, což není možné, pokud musí všechna rozhodnutí v Indiích nejprve projít Nizozemskem. Měli bychom [INS.GetLeader] udělit nouzové pravomoci, aby mohl jednat bez prodlení."
 INSHOL_emergency_naval_purchases: "Nouzové nákupy lodí"
 INSHOL_emergency_naval_purchases_desc: "Naše pobřeží je nebezpečné a nedostatečně bráněné. Čas je rozhodující, musíme získat silnější námořnictvo, jinak jistě zahyneme. Nakoupíme lodě od soukromých společností na dluh a přezbrojíme je na námořní torpédoborce."
 INS_netherlands_can_remove_autonomy_tt_50: "\nPokud [HOL.GetFlag]§Y[HOL.GetNameDefCap]§! dokončí toto zaměření jako první:\n    ([INS.GetFlag]§Y[INS.GetName]§!): Přidá §Y£autonomy_texticon -50.00§!"
 INS_netherlands_can_remove_autonomy_tt_75: "\nPokud [HOL.GetFlag]§Y[HOL.GetNameDefCap]§! dokončí toto zaměření jako první:\n    ([INS.GetFlag]§Y[INS.GetName]§!): Přidá §Y£autonomy_texticon -75.00§!"
 INS_netherlands_can_remove_autonomy_tt_100: "\nPokud [HOL.GetFlag]§Y[HOL.GetNameDefCap]§! dokončí toto zaměření jako první:\n    ([INS.GetFlag]§Y[INS.GetName]§!): Přidá §Y£autonomy_texticon -100.00§!"
 INS_netherlands_can_remove_autonomy_tt_150: "\nPokud [HOL.GetFlag]§Y[HOL.GetNameDefCap]§! dokončí toto zaměření jako první:\n    ([INS.GetFlag]§Y[INS.GetName]§!): Přidá §Y£autonomy_texticon -150.00§!"
 INS_netherlands_can_remove_autonomy_tt_200: "\nPokud [HOL.GetFlag]§Y[HOL.GetNameDefCap]§! dokončí toto zaměření jako první:\n    ([INS.GetFlag]§Y[INS.GetName]§!): Přidá §Y£autonomy_texticon -200.00§!"
 INS_netherlands_can_remove_autonomy_tt_250: "\nPokud [HOL.GetFlag]§Y[HOL.GetNameDefCap]§! dokončí toto zaměření jako první:\n    ([INS.GetFlag]§Y[INS.GetName]§!): Přidá §Y£autonomy_texticon -250.00§!"
 INSHOL_begin_negotiations_soetardjo: "Zahájit jednání se Soetardjem"
 INSHOL_begin_negotiations_soetardjo_desc: "Soetardjova petice za autonomii je slibná a dává nám příležitost ke kompromisu mezi nacionalisty a loajalisty. Měli bychom zahájit oficiální jednání s jeho stranou."
 INSHOL_urge_gov_veto: "Naléhat na guvernérské veto"
 INSHOL_urge_gov_veto_desc: "Soetardjova petice je nacionalistické schéma, kterému vláda Indií naletěla. Musíme naléhat na generálního guvernéra, aby petici okamžitě vetoval, jinak riskujeme ztrátu naší kolonie."
 INSHOL_eventual_autonomy: "Souhlasit s budoucí autonomií"
 INSHOL_eventual_autonomy_desc: "Indonéská touha po nezávislosti je silná a neslábne. Souhlasíme s budoucí autonomií Indií, ale teprve poté, co kolonie prokáže, že se dokáže uživit a bude i nadále hájit demokratické ideály."
 INSHOL_autonomous_dominion: "Soetardjův zákon z roku [GetYear]"
 INSHOL_autonomous_dominion_desc: "Navzdory nepřiměřené definici „soběstačnosti“ stanovené Nizozemskem, kterou musíme splnit, aby podmínky Soetardjovy petice byly platné, je indonéská touha po nezávislosti tak silná, že se nám podařilo tyto požadavky splnit. V souladu s dohodou vyhlásíme úplnou a bezpodmínečnou nezávislost na nizozemské koruně."
 INS_cannot_become_independent_tt: "§W§Y[INS.GetFlag][INS.GetNameDefCap]§! bude mít bez zahraniční intervence §Rtrvale uzamčenou možnost stát se nezávislou§!.§!"
 INSHOL_sideline_the_volksraad: "Odsunout Volksraad stranou"
 INSHOL_sideline_the_volksraad_desc: "Petice svolaná Soetardjem je v jasném rozporu s článkem 1 nizozemské ústavy a správě Indií způsobí jen potíže. Petice musí být vetována."
 INSHOL_prioritize_dutch_profits: "Upřednostnit nizozemské zisky"
 INSHOL_prioritize_dutch_profits_desc: "Zaměříme své úsilí na zvyšování zisků pro mateřskou zemi. Její hospodářská stabilita je ku prospěchu celého království."
 INSHOL_development_loans_netherlands: "Rozvojové půjčky z Nizozemska"
 INSHOL_development_loans_netherlands_desc: "Můžeme si vzít půjčky od nizozemských společností, abychom urychlili své industrializační úsilí. Ačkoli využijeme svého postavení rozvíjející se kolonie k zajištění nízkých úrokových sazeb, stále budeme muset platit úroky."
 INSHOL_request_economic_dev_subsidy: "Požádat o dotace na hospodářský rozvoj"
 INSHOL_request_economic_dev_subsidy_desc: "Prokázali jsme svou hodnotu pro našeho suzeréna jako výnosná kolonie. Můžeme toho využít jako vyjednávacího materiálu k získání dotací na průmyslový rozvoj."
 INSHOL_loyalty_to_crown: "Loajalita ke koruně"
 INSHOL_loyalty_to_crown_desc: "Východní Indie je mnohé, ale především jsme loajální nizozemskou kolonií. Královna Vilemína nás dovede k vítězství. Nesmíme dovolit, aby nacionalismus ukončil téměř 500 let dějin, a musíme nadále potvrzovat svou naprostou loajalitu ke koruně."
 INS_loans_timer: "\nZa §Y365§! dní:"
 INS_expand_batavia_med_school_tt: "§Y$INS_dutch_east_indies$§!: Modifikátor rychlosti výzkumu je alespoň §G1.00 %§!."
 INS_subsidize_local_business: "Subvencovat místní podniky"
 INS_subsidize_local_business_desc: "Měli bychom poskytnout dotace místním podnikům, abychom podnítili hospodářský růst a dlouhodobě posílili naši ekonomiku."
 INSHOL_education_reforms: "Reformy vzdělávání"
 INSHOL_education_reforms_desc: "Mnoho občanů Východní Indie nemá možnost získat vzdělání a jen velmi málo jich dokončilo střední školu. Chceme-li, aby se Východní Indie stala bohatým industrializovaným státem, musíme zajistit, aby bylo vzdělání obyvatelstvu řádně dostupné."
 INS_expand_batavia_med_school: "Rozšířit batávijskou lékařskou školu"
 INS_expand_batavia_med_school_desc: "Rozšíření batávijské lékařské školy výstavbou nových kampusových zařízení a najmutím dalších profesorů výrazně zpřístupní vyšší vzdělání, což je zásadní pro náš dlouhodobý hospodářský růst."
 INS_prepare_for_policy_shift: "Připravit změnu politiky"
 INS_prepare_for_policy_shift_desc: "Politické prostředí v Indiích bylo ovlivněno národním obrozením posledních desetiletí a naše současná politika je zjevně zastaralá. Měli bychom zvážit určité změny ve své správní struktuře."
 INS_reallocate_rubber_industry_funding: "Přerozdělit financování kaučukového průmyslu"
 INS_reallocate_rubber_industry_funding_desc: "Naše závislost na prodeji kaučuku měla katastrofální dopad na naši ekonomiku. Měli bychom diverzifikovat hospodářství průzkumem zdrojů a otevíráním dolů a továren po celém souostroví. Nebude to levné, a proto budeme muset snížit rozpočet na údržbu kaučukových plantáží."
 INS_reallocate_rubber_industry_funding_tt: "Odemkne rozhodnutí k §Yodstranění kaučuku ze státu§! a jeho nahrazení menším množstvím §Yjiných zdrojů§!."
 INSHOL_nationalist_coallition: "Nacionalistická koalice"
 INSHOL_nationalist_coallition_desc: "Volksraad mluvil příliš dlouho jedním hlasem a ten hlas byl příliš tichý. Čas petic a trpělivých odkladů pominul. Koalice nacionalistických členů komory odloží své spory a bude požadovat bezpodmínečnou nezávislost. Starší hlasy zvenčí komory, muži, o nichž si Nizozemci kdysi mysleli, že byli bezpečně odsunuti stranou, budou opět přivítány do našich řad."
 INSHOL_volksraad_compromises: "Kompromisy Volksraadu"
 INSHOL_volksraad_compromises_desc: "Reforma uvnitř komory nás dovedla až sem a není důvod tuto cestu nyní opouštět. Volksraad bude pokračovat ve své opatrné práci, vyměňovat ústupek za ústupek s Haagem a usilovat o samosprávu trpělivostí, nikoli roztržkou. Budoucnost uvnitř nizozemského commonwealthu nabízí více než budoucnost strávená bojem za místo mimo něj."
 INSHOL_establish_the_princely_council: "Zřídit knížecí radu"
 INSHOL_establish_the_princely_council_desc: "Sultáni a rádžové souostroví ovládají loajalitu, jakou žádná komora v Batávii nikdy neměla. Jejich dvory jsou starší než Společnost i než republika, která ji následovala. Formální rada knížecích rodů dá těmto vládcům místo u stolu nového národa a sváže jejich autoritu s naší."
 INSHOL_nationalize_dutch_companies: "Znárodnit nizozemské společnosti"
 INSHOL_nationalize_dutch_companies_desc: "Velké obchodní domy, lodní linky, plantážní koncerny i banky nesly nizozemská jména tak dlouho, kam až sahá lidská paměť. Odteď ponesou jména indonéská. Správní rady budou nově obsazeny, cedule strženy a kapitál, který byl z těchto ostrovů po tři století odčerpáván, bude konečně patřit samotným ostrovům."
 INSHOL_democracy: "Demokratická Indonésie"
 INSHOL_democracy_desc: "Volksraad začal svůj život jako polovičaté opatření, poradní orgán s pečlivě omezenými pravomocemi, navržený tak, aby nabízel zdání zastoupení a zároveň zadržoval jeho podstatu. Přerostl své tvůrce. Komora bude přetvořena ve skutečný zákonodárný sbor s členy volenými lidem, který má zastupovat, a s rozhodnutími závaznými pro vládu, která ji kdysi držela na krátkém vodítku."
 INSHOL_princely_authority: "Knížecí autorita"
 INSHOL_princely_authority_desc: "Rada poradců je na svém místě užitečná věc, ale sultáni, kteří propůjčili svá jména založení tohoto národa, mohou propůjčit ještě více. Parlament nebude stát v cestě těm, kdo by rádi viděli jednoho z nich vyvýšeného nad ostatní. Staré dvory čekaly dlouho na to, až jim tato otázka bude znovu položena."
 INSHOL_encourage_further_investment: "Podpořit další investice"
 INSHOL_encourage_further_investment_desc: "Podmínky dohodnuté ve Volksraadu prozatím vyřešily politickou otázku a nizozemský kapitál si toho všiml. Cla budou uvolněna, záruky rozšířeny a obchodní komory v Amsterdamu a Rotterdamu ujištěny, že souostroví zůstává otevřené podnikání. Co bylo výnosné za starého uspořádání, bude výnosné i za nového."
 INSHOL_east_indies_artillery: "Výroba dělostřelectva ve Východní Indii"
 INSHOL_east_indies_artillery_desc: "Otevření zařízení na výrobu dělostřelectva na Jávě nám umožní méně se spoléhat na zahraniční obchod při našem vojenském úsilí."
 INSHOL_recall_gerardus_johannes_berenschot: "Povolat generála Berenschota"
 INSHOL_recall_gerardus_johannes_berenschot_desc: "Gerardus Johannes Berenschot je jedním z nejtalentovanějších generálů v Commonwealthu. Většinu své kariéry strávil v Indiích, ale několik let působil v Nizozemsku. V těchto těžkých časech jej musíme povolat zpět do Indií, aby pomohl válečnému úsilí."
 INSHOL_east_indies_cruiser_manufacturing: "Výroba křižníků ve Východní Indii"
 INSHOL_east_indies_cruiser_manufacturing_desc: "Výroba vlastních křižníků namísto jejich přímého objednávání od Nizozemců je prvním krokem k vytvoření skutečného námořnictva, což je nezbytné úsilí vzhledem k japonské hrozbě."
 INSHOL_transfer_of_conrad_helfrich: "Přesunout Conrada Helfricha do Indií"
 INSHOL_transfer_of_conrad_helfrich_desc: "Přímý přesun admirála Conrada Helfricha do Indií zásadně zlepší námořní úsilí v Indiích."
 INSHOL_naval_program: "Nizozemsko-indonéský námořní program"
 INSHOL_naval_program_desc: "[INS.GetNameDefCap] postrádá oficiální námořnictvo, takže obrana zůstává na nás. S rostoucím napětím v Evropě a Asii to takto nemůže pokračovat. Musíme učinit první krok k založení samostatného [INS.GetAdjective] námořnictva, i když to přijde draho."
 INSHOL_naval_program_transfer_25_tt: "Převést §Y25 %§! našich námořních sil zemi [INS.GetNameDef]."
 INSHOL_naval_program_transfer_25_2_tt: "§Y[HOL.GetFlag] [HOL.GetNameDefCap]§! převede §Y25 %§! svých námořních sil zemi §Y[INS.GetNameDefCap]§!."
 INSHOL_naval_program_transfer_100_tt: "Převést §Rcelé naše námořnictvo§! zemi [INS.GetNameDef]."
 INSHOL_naval_program_transfer_100_2_tt: "§Y[HOL.GetFlag] [HOL.GetNameDefCap]§! převede celé své námořnictvo zemi §Y[INS.GetNameDefCap]§!."
 INSHOL_naval_program_rejected_tt: "Odemkne národní zaměření §Y$INSHOL_naval_secondchance$§!."
 INSHOL_hybrid_navy: "Hybridní námořnictvo"
 INSHOL_hybrid_navy_desc: "Naše námořnictvo se nemůže spoléhat pouze na převzetí pacifické flotily země [HOL.GetNameDef]. Musíme začít vyrábět vlastní lodě, jinak by jediná chyba mohla odříznout celé naše námořní zásobování."
 INSHOL_request_naval_control: "Východoindická eskadra"
 INSHOL_request_naval_control_desc: "[HOL.GetNameDefCap] padla a není v pozici, aby provozovala celé námořnictvo. Měli bychom nad ním převzít kontrolu po zbytek války."
 INSHOL_naval_secondchance: "Východoindický námořní plán"
 INSHOL_naval_secondchance_desc: "Ačkoli [HOL.GetNameDef] odmítli předat kontrolu nad námořnictvem, stále musíme bránit Pacifik, pokud nechceme být přemoženi. I když to nemusí dopadnout tak dobře, jako kdyby s naším návrhem souhlasili, najdeme dostatečně dobré alternativní řešení."
 INSHOL_netherlands_in_exile: "Nizozemsko v exilu"
 INSHOL_netherlands_in_exile_desc: "Tragický pád našeho království je nyní skutečností. Nesmíme klesnout k poraženectví. Musíme přijmout, co se stalo, a zaměřit se na to, co lze zachránit."
 INSHOL_relocate_our_generals: "Přesunout naši armádu na Jávu"
 INSHOL_relocate_our_generals_desc: "Zbývající exiloví generálové, velitelé a vojáci držící pozice musí být s nejvyšší prioritou přesunuti do státu [1058.GetName], než bude příliš pozdě."
 INSHOL_netherlands_indonesia_union: "Nizozemsko-indonéská unie"
 INSHOL_netherlands_indonesia_union_desc: "Myšlenka rovnoprávného unijního státu mezi [HOL.GetNameDef] a [INS.GetNameDef] je mnohým k smíchu, ale v krizi, v níž se nacházíme, se zdá být jediným způsobem, jak maximalizovat naše šance na zachování svrchovanosti."
 INS_underground_revolution: "Podzemní revoluce"
 INS_underground_revolution_desc: "Začneme plánovat revoluci ze stínů, postupně navyšovat členství a aktivitu milicí, dokud nebudeme připraveni udeřit."
 INS_infiltrate_the_media: "Infiltrovat média"
 INS_infiltrate_the_media_desc: "Naše hnutí si zajistilo členství několika vysoce postavených pracovníků mediálních organizací v Indiích. Můžeme toho využít ve svůj prospěch a nenápadně zasévat prorevoluční nálady do myslí občanů."
 INS_infiltrate_the_army: "Infiltrovat armádu"
 INS_infiltrate_the_army_desc: "Mnozí naši členové slouží v KNIL, od nízkých hodností až po majory. Měli bychom shromáždit co nejvíce tajemství a zároveň povyšovat naše lidi do vysokých pozic. Jakmile stiskneme spoušť, můžeme v KNIL rozpoutat chaos."
 INS_privately_owned_military_industry: "Soukromě vlastněný vojenský průmysl"
 INS_privately_owned_military_industry_desc: "Založíme několik stínových společností ve vojensko-průmyslovém sektoru, čímž zajistíme, že si po zahájení revoluce udržíme kontrolu nad vojenským průmyslem."
 INS_instigate_chaos_sulawesi: "Podnítit chaos na Sulawesi"
 INS_instigate_chaos_sulawesi_desc: "Budeme spolupracovat s místními nacionalisty na Sulawesi, organizovat stávky a nepokoje a radikalizovat obyvatelstvo."
 INS_instigate_chaos_sulawesi_tt: "Jakmile vyhlásíme nezávislost, získáme §Gdomovské území§! ve státech §Y[673.GetName]§! a §Y[1056.GetName]§!. Nizozemská východní Indie je bude nadále postrádat jako domovská území."
 INS_instigate_chaos_medan: "Podnítit chaos v Medanu"
 INS_instigate_chaos_medan_desc: "Budeme spolupracovat s místními nacionalisty v Medanu a Riau, organizovat stávky a nepokoje a radikalizovat obyvatelstvo."
 INS_instigate_chaos_medan_tt: "Jakmile vyhlásíme nezávislost, získáme §Gdomovské území§! ve státě §Y[1049.GetName]§!. Nizozemská východní Indie jej bude nadále postrádat jako domovské území."
 INS_embezzlement_scheme_in_batavia: "Zpronevěřovací plán v Batávii"
 INS_embezzlement_scheme_in_batavia_desc: "Připravíme plán, jak po vyhlášení nezávislosti přesunout naši výrobu z Batávie na republikánské území."
 INS_embezzlement_scheme_in_batavia_tt: "Po vyhlášení nezávislosti bude polovina všech továren ve státě §Y[1058.GetName]§! přesunuta do našeho §Yrevolučního velitelství§!."
 INS_volksraad_rumors: "Zvěsti ve Volksraadu"
 INS_volksraad_rumors_desc: "Začneme diskrétně probírat revoluci uvnitř Volksraadu. Budeme-li úspěšní, můžeme přesvědčit indonéské členy Volksraadu, aby se přidali k naší věci."
 INS_volksraad_rumors_tt: "Všichni §Yindonéští§! poradci Volksraadu budou po vyhlášení nezávislosti §Gzachováni§!."
 INS_railway_youth_force: "Spolupracovat s železniční mládežnickou silou"
 INS_railway_youth_force_desc: "Železniční mládežnická síla je islámská mládežnická milice působící především ve Střední Jávě, pojmenovaná podle své strategie obsazování železnic. Byli by cenným spojencem, jsou však energičtí a chtějí se zapojit do boje. Pokud zůstaneme příliš dlouho v příměří, začnou být s vládou nespokojeni."
 INS_sleeper_informant_network: "[GetInformantNetworkName]"
 INS_Sleeper_Informant_Network_name: "Síť spících informátorů"
 INS_KNIL_Informant_Network_name: "Síť informátorů KNIL"
 INS_sleeper_informant_network_desc: "Vytvoříme síť informátorů zasazenou napříč správním aparátem KNIL, která nám poskytne včasné varování před nepřátelskými plány."
 INS_sleeper_informant_network_tt: "§RPři vyhlášení nezávislosti:§!\n"
 INS_the_peoples_security_army: "Lidová bezpečnostní armáda"
 INS_the_peoples_security_army_desc: "Naši členové, především mladí Indonésané, jsou stále netrpělivější, dychtiví přispět a bojovat za naši nezávislost. Měli bychom zřídit revoluční ozbrojené síly a začít cvičit naše budoucí vojáky."
 INS_commander_sudirman: "Sudirmanova armáda"
 INS_commander_sudirman_desc: "Sudirman, přestože je mladým nadějným důstojníkem, projevil velký potenciál a je mezi mladými členy odboje velmi oblíbený. Měl by vést cestu Lidové bezpečnostní armády a dovést nás k vítězství."
 INS_commander_oerip: "Oeripova armáda"
 INS_commander_oerip_desc: "Oerip sloužil v armádě desítky let a je jediným Indonésanem, který byl kdy v KNIL povýšen na majora. Jeho znalosti a zkušenosti daleko přesahují kohokoli jiného z našich řad. Měl by vést cestu Lidové bezpečnostní armády a dovést nás k vítězství."
 INS_sudirmans_promotion: "Sudirmanovo povýšení"
 INS_sudirmans_promotion_desc: "Sudirman prokázal velké vůdcovské schopnosti a zorganizoval několik úspěšných útoků. Je čas uznat úsilí našeho velitele tím, že mu udělíme titul generála, který si zaslouží."
 INS_tkr_steal_general: "Přetáhnout generály KNIL"
 INS_tkr_steal_general_desc: "Pokud dokážeme přesvědčit vysoce postavené členy východoindické armády, aby se přidali k naší věci, současně posílíme naši armádu a sabotujeme tu jejich."
 INS_tkr_supply: "Každý revolucionář musí bojovat"
 INS_tkr_supply_desc: "Zajistíme, aby každý člen našeho hnutí dostal formální vojenský výcvik, bez výjimek."
 INS_tkr_professional_army: "Profesionální armáda"
 INS_tkr_professional_army_desc: "Nesmíme se spoléhat jen na milice. Měli bychom vytvořit profesionální republikánskou armádu k udržení pořádku."
 INS_arm_the_revolutionaries: "Vyzbrojit revolucionáře"
 INS_arm_the_revolutionaries_desc: "Musíme začít u revolucionářů a nacionalistů plných energie, připravených dát Indonésii vše, co mají. Poskytneme jim výcvik a vybavení potřebné k boji za jejich zemi."
 INS_arm_the_youth: "Vyzbrojit mládež"
 INS_arm_the_youth_desc: "Kromě revolucionářů musíme vyzbrojit i mládež. Stále plná energie a naděje ponese plamen revoluce. Musíme zajistit, aby bylo co nejvíce mladých dospělých Indonésanů vycvičeno a vybaveno k boji. Pokud se boje dostanou k jejich domovům, budou připraveni jednat."
 INS_arm_the_students: "Vyzbrojit studenty"
 INS_arm_the_students_desc: "Studenti budovali základy revoluce po celá desetiletí a budou ji nadále vést vpřed."
 INS_guerilla_industry: "Partyzánský průmysl"
 INS_guerilla_industry_desc: "Využijeme naše partyzánské síly napříč souostrovím k převzetí kontroly nad továrnami, což nám umožní vyrábět nové zbraně pro naše milice."
 INS_indonesian_assault_doctrine: "Indonéská útočná doktrína"
 INS_indonesian_assault_doctrine_desc: "Vojáci nejsou vše, co válka potřebuje. Milion mužů neznamená nic, pokud nemají zbraně, s nimiž by mohli bojovat. Musíme upřednostnit získání kvalitního dělostřelectva, abychom mohli postupovat hlouběji do nepřítelem ovládaného území."
 INS_tighter_tkr_integration: "Těsnější integrace TKR a Laskaru"
 INS_tighter_tkr_integration_desc: "Lidová bezpečnostní armáda a různé milice nepůsobí jednotně a koordinace je omezená. S pokračováním války to bude způsobovat stále více problémů. Musíme ozbrojené síly a milice proplést do jediné sjednocené organizace navzdory nevyhnutelným protestům důstojníků milicí."
 INS_quality_over_quantity: "Kvalita nad kvantitou"
 INS_quality_over_quantity_desc: "Jeden dobře vycvičený voják s promyšlenou strategií a moderním vybavením porazí pět studentů s pistolemi. Musíme upřednostnit kvalitní, dobře vyzbrojené vojáky a speciální síly před mobilizací co největšího počtu vojáků."
 INS_add_militia_cap_1_tt: "Limit divizí §Ybojovníků za svobodu§! se zvýší o §Y1§!.\n"
 INS_add_militia_cap_2_tt: "Limit divizí §Ybojovníků za svobodu§! se zvýší o §Y2§!.\n"
 INS_add_militia_cap_3_tt: "Limit divizí §Ybojovníků za svobodu§! se zvýší o §Y3§!.\n"
 INS_add_3_militia_unit_tt: "Vytvoří tři jednotky §Ybojovníků za svobodu§!, které lze použít v §Ynájezdech§! ke zvýšení §Gpřítomnosti milicí§! v nizozemských státech."
 INS_add_fully_trained_militia_unit_tt: "Vytvoří jednu vycvičenou jednotku §Ybojovníků za svobodu§!.\n"
 INS_expand_resistance_membership: "Rozšířit členství v odboji"
 INS_expand_resistance_membership_desc: "Soustředění celého našeho hnutí na jedné základně zaručí selhání. Rozdělíme členy do skupin milicí a vyšleme je jako vyslance, kteří zvýší naši popularitu a kontrolu v různých regionech."
 INS_deploy_the_kris: "Indonéská lidová služba Sulawesi"
 INS_deploy_the_kris_desc: "Indonéská lidová služba Sulawesi, v indonéštině známá jako KRIS, je aktivní skupina milicí a tvoří většinu přítomnosti milicí na Sulawesi a v Manadu. Měli bychom je naverbovat k formálnímu boji po boku TKR."
 INS_assist_the_pemuda: "Pomoci Pemudě"
 INS_assist_the_pemuda_desc: "Jáva je plná různých studentských milicí Pemuda. Spojení sil s nimi a poskytnutí vojenské pomoci při jejich misích proti Nizozemcům by nám mohlo zajistit užitečného spojence."
 INS_mobilize_the_pemuda: "Mobilizovat Pemudu"
 INS_mobilize_the_pemuda_desc: "Nyní, když jsme úspěšně získali důvěru největších skupin Pemudy, měli bychom začít plánovat jejich mobilizaci do TKR."
 INS_organize_jakarta_pemuda: "Zorganizovat jakartské Pemudy"
 INS_organize_jakarta_pemuda_desc: "Jáva má mnoho skupin Pemuda všech velikostí. Ačkoli jsme většinu z nich mobilizovali a naverbovali, v Jakartě stále působí desítky malých skupin nezávisle. Musíme je kontaktovat a navázat spolupráci."
 INS_recognize_moestopos_batallion: "Uznání Moestopova praporu"
 INS_recognize_moestopos_batallion_desc: "Revolucionář jménem Moestopo se v Surabaji prohlásil za samozvaného „úřadujícího ministra obrany“ a udržuje kontrolu nad tamními milicemi. Jeho úsilí si zaslouží formální uznání; měli bychom jej oficiálně povýšit na generálmajora TKR."
 INS_darul_islam_focus: "Darul Islam"
 INS_darul_islam_focus_desc: "Kartosoewirjovi hizbullahové se osvědčili v kopcích Západní Jávy a nemůžeme si dovolit nechat takové bojovníky mimo naše řady. Nechť jeho nepravidelné oddíly stojí mezi našimi a nechť sám muž nese hodnost, kterou si zasloužil. Věřící brzy v republice prosadí své požadavky."
 INS_just_a_fisherman: "Jen rybář"
 INS_just_a_fisherman_desc: "Vést válku v souostroví bez námořnictva je obtížný úkol a nemůžeme jej vydržet dlouho. Zkusíme možná naivní strategii, kdy pošleme milice na rybářských člunech převlečené za rybáře do přístavů ovládaných Nizozemci."
 INS_a_cheap_navy: "Levné námořnictvo"
 INS_a_cheap_navy_desc: "Nemáme čas ani peníze na vybudování velkého moderního námořnictva. Musíme si vystačit s tím, co máme, a posbírat vše, co najdeme."
 INS_divert_army_funds_to_navy: "Přesměrovat armádní zdroje k námořnictvu"
 INS_divert_army_funds_to_navy_desc: "Indonésie je souostroví; naše pěchota je bez lodí, které ji přepraví, k ničemu. Přesměrování financí z TKR k našemu novému námořnictvu je oběť, která za to stojí."
 INS_indonesian_naval_doctrine: "Indonéská námořní doktrína"
 INS_indonesian_naval_doctrine_desc: "Nyní, když budujeme vlastní námořnictvo, je důležité zvážit doktrínu, podle níž budeme bojovat a cvičit. Měli bychom co nejdříve upřednostnit vytvoření a přijetí námořní doktríny."
 INS_domestic_shipbuilding: "Domácí stavba lodí"
 INS_domestic_shipbuilding_desc: "Nemůžeme se věčně spoléhat na zajaté a zakoupené lodě. Nebude trvat dlouho a nezbudou žádné další nizozemské lodě k zajmutí. Měli bychom začít stavět vlastní lodě včas."
 INS_acquire_modern_blueprints: "Získat moderní plány"
 INS_acquire_modern_blueprints_desc: "Zakoupíme plány od jiných zemí a soukromých společností a použijeme je k výstavbě našeho nového námořnictva."
 INS_reclaiming_the_dutch_navy: "Převzetí nizozemského indického námořnictva"
 INS_reclaiming_the_dutch_navy_desc: "Nizozemci ponechali v přístavech, které nyní ovládáme, mnoho lodí. Měli bychom si tyto lodě nárokovat, dokud máme příležitost."
 INS_admiral_mas_pardi: "Admirál Mas Pardi"
 INS_admiral_mas_pardi_desc: "Každé dobré námořnictvo potřebuje admirála, který mu bude velet. Mas Pardi je zřejmou volbou."
 INS_akademi_angkatan_laut: "Vybudovat Akademi Angkatan Laut"
 INS_akademi_angkatan_laut_desc: "Vybudujeme námořní akademii se zařízeními pro námořní výzkum a zároveň vzděláme více občanů jako inženýry a admirály."
 INS_pki_militia_tt: "Tan Malaka má velmi silnou milici, bojuje však nejen za vůli Indonésie, ale i za vůli §Rkomunismu§! a Sovětů. §RNakonec se násilně postaví proti jakékoli nekomunistické vládě.§!"
 INS_increase_laskar_funding_tt: "§WZíská§! 1 §Yvojenskou továrnu§! za každý požadavek úspěšně splněný milici (maximum §G6§!)"
 INS_subsidize_laskar_armament: "Subvencovat výzbroj Laskaru"
 INS_subsidize_laskar_armament_desc: "Milice bojující bambusovými kopími dlouho nepřežijí proti těžce vyzbrojeným jednotkám. Musíme upřednostnit výrobu více zbraní a munice pro tyto milice."
 INS_loot_knil_weapons_caches: "Vyrabovat skrýše zbraní KNIL"
 INS_loot_knil_weapons_caches_desc: "Existuje mnoho skrýší zbraní, které KNIL uložila před revolucí. Mnozí naši členové jsou bývalí příslušníci KNIL a možná dokážeme tyto skrýše najít a vyrabovat."
 INS_utilize_tan_malakas_militia: "Využít milici Tana Malaky"
 INS_utilize_tan_malakas_militia_desc: "Rudá milice Tana Malaky je možná nejsilnější samostatnou milicí v celé Indonésii a její mobilizace do TKR by byla obrovským přínosem. Nepřichází to však bez rizik; dát silné milici se silnými politickými motivy takový vliv jim výrazně usnadní převzetí moci pro sebe."
 INS_increase_laskar_funding: "Zvýšit financování Laskaru"
 INS_increase_laskar_funding_desc: "Naše milice tvoří většinu našich sil. Musíme to uznat a odpovídajícím způsobem je financovat, i když nejsou zcela loajální k [INS.GetLeader]."
 INS_develop_a_functioning_airforce: "Vybudovat řádné letectvo"
 INS_develop_a_functioning_airforce_desc: "Letectvo má na armádu velký dopad; měli bychom upřednostnit jeho vytvoření."
 INS_political_stabilization: "Obnovit pořádek"
 INS_political_stabilization_desc: "Náš národ je s každým dnem nestabilnější. Pokud brzy nezareagujeme, občanská válka bude téměř nevyhnutelná. Musíme zahájit jednání mezi Národním výborem, prezidentem a vůdci milicí, abychom našli řešení."
 INS_vice_presidential_edict: "Podepsat viceprezidentský edikt X"
 INS_vice_presidential_edict_desc: "Národní výbor téměř jednomyslně požaduje skutečnou zákonodárnou moc. Prezidentovi byla předána petice navrhující hybridní systém, v němž se Národní výbor stane nezávislým parlamentem sdílejícím zákonodárné pravomoci s prezidentem. Nabídka je lákavá, ale hrozí, že prezidentská moc se stane zanedbatelnou."
 INS_local_cooperatives: "Zřídit místní družstva"
 INS_local_cooperatives_desc: "Neměli bychom vytvářet kapitalistický systém jako na Západě, ale neměli bychom přehlížet hospodářský přínos privatizace. Umožníme vznik místních družstev, jejichž úspěch přinese bohatství jejich vlastníkům. Budou však pod dohledem vlády a bude jim zakázáno expandovat mimo jejich lokalitu."
 INS_local_unity: "Částečná knížecí autonomie"
 INS_local_unity_desc: "Udělíme knížecím státům částečnou autonomii jako dočasné opatření ke snížení vnitřních sporů v těchto už tak hektických časech."
 INS_education_subsidies: "Vzdělávací dotace"
 INS_education_subsidies_desc: "Investice do budoucnosti mládeže národa jsou naprosto nezbytné, pokud chceme hospodářsky úspěšný stát. Vybudujeme dostupné školy po celé republice."
 INS_land_reform: "Pozemková reforma"
 INS_land_reform_desc: "Nizozemsko před vyhlášením naší nezávislosti přímo vlastnilo velké množství půdy. Měli bychom tuto půdu rozdělit za nízké ceny každému Indonésanovi, který ji využije, abychom podpořili hospodářský růst."
 INS_dominion_of_atjeh: "Ačehské dominium"
 INS_dominion_of_atjeh_desc: "Separatistické hnutí v Ačehu je velké a roste. Není důvod situaci eskalovat; měli bychom místo toho vyjednat kompromis, v němž zůstanou součástí Indonésie, ale budou převážně autonomní."
 INS_dissolve_national_party: "Rozpustit Národní stranu"
 INS_dissolve_national_party_desc: "Hybridní systém vznikl jako nezbytný kompromis, aby se zabránilo chaosu. Nesmíme dovolit, aby prezident držel tolik moci nedemokraticky. Prezident musí být sesazen parlamentem, jinak nikdy nedosáhneme demokracie."
 INS_womens_sufferage: "Volební právo žen"
 INS_womens_sufferage_desc: "Rozšíření volebního práva na ženy povede ke krátkodobé nestabilitě, ale je nezbytné pro dlouhodobou stabilitu a demokracii."
 INS_women_in_military: "Ženy v armádě"
 INS_women_in_military_desc: "Povolit ženám službu v armádě je nezbytné k zajištění toho, aby naše ozbrojené síly byly co nejsilnější."
 INS_fair_election: "Spravedlivé volby"
 INS_fair_election_desc: "S prezidentem sesazeným a revolucí za námi můžeme konečně uspořádat první skutečně spravedlivé volby bez autoritářského vlivu."
 INS_continue_hybrid_politics: "Pokračovat v hybridní politice"
 INS_continue_hybrid_politics_desc: "Hybridní politika je nezbytné zlo. Ačkoli konečným cílem je skutečná demokracie, Indonésie je příliš mladá a nestabilní na to, aby byla veškerá moc předána lidu. Prezident a parlament se budou nadále vzájemně usměrňovat a zajistí, že žádný z orgánů nebude příliš mocný."
 INS_guided_economy: "Řízené hospodářství"
 INS_guided_economy_desc: "Budeme na indonéské hospodářství přímo dohlížet, abychom si udrželi kontrolu. Znárodníme všechny banky i ropný a zemědělský sektor."
 INS_reform_education_system: "Povinné ideologické vzdělávání"
 INS_reform_education_system_desc: "Revoluce prokázala, že studenti a mládež nespokojení se společenským řádem budou vždy vést vzpouru. Pro bezpečnost naší vlády a národa budeme vyžadovat, aby školy vyučovaly v souladu s naší vládní ideologií."
 INS_reform_education_system_2: "Reforma vzdělávání"
 INS_reform_education_system_2_desc: "Chceme-li, aby se Indonésie v budoucnu stala bohatým národem, všichni Indonésané bez ohledu na místo narození musí mít právo na vzdělání."
 INS_three_year_plan: "Tříletý plán"
 INS_three_year_plan_desc: "Můžeme zavést tříletý plán na výstavbu infrastruktury napříč souostrovím a propojení ostrovů."
 INS_destroy_pacific_colonialism: "Zničit pacifický kolonialismus"
 INS_destroy_pacific_colonialism_desc: "Revoluce možná skončila, ale stále je třeba vést další boje. Na našem prahu stále žije mnoho lidí pod koloniální tyranií. Nemůžeme nečinně sedět a přihlížet; musíme podniknout kroky k jejich osvobození od suzerénů!"
 INS_rapid_mobilization: "Rychlá mobilizace"
 INS_rapid_mobilization_desc: "Každý silný národ stojí na silné armádě. Chceme-li se stát regionální velmocí schopnou obstát, musíme začít tím, že svou armádu výrazně posílíme."
 INS_greater_indonesia: "Vyhlásit Velkou Indonésii"
 INS_greater_indonesia_desc: "Starověká říše Nusantara kdysi sjednotila malajský svět jako jeden celek, jeden lid. Nyní, když jsme osvobodili Malajsko od koloniální tyranie, měli bychom následovat naše předky z Nusantary a prohlásit celý malajský svět za jeden sjednocený národ."
 INS_secularism: "Sekularismus"
 INS_secularism_desc: "Indonésie je domovem mnoha lidí mnoha náboženství. Mísení náboženství a politiky způsobí pouze vnitřní spory, proto bychom měli zakázat náboženské politické strany."
 INS_integrate_sarekat_islam: "Integrovat Sarekat Islam"
 INS_integrate_sarekat_islam_desc: "Velké islámské politické strany mají značnou lidovou podporu. Je v našem nejlepším zájmu začlenit je do vlády."
 INS_sjahrirs_continued_tenure: "Pokračující funkční období Sjahrira"
 INS_sjahrirs_continued_tenure_desc: "Premiér Sjahrir se osvědčil jako skvělý vůdce, provedl nás revolucí, zlepšil naši ekonomiku a nastolil demokracii. Měli bychom jej znovu zvolit premiérem."
 INS_unity_in_diversity: "Jednota v rozmanitosti"
 INS_unity_in_diversity_desc: "Po staletí slova Jednota v rozmanitosti vystihovala ducha našeho souostroví. Během revoluce se tato myšlenka stala bojovým heslem, připomínajícím Indonésanům, že ačkoli mluvíme mnoha jazyky a dodržujeme mnoho různých tradic, stojíme společně jako jeden lid. Měli bychom tuto frázi zakotvit v naší ústavě, aby naše jednota přetrvala pro budoucí generace."
 INS_the_timor_issue: "Timorská otázka"
 INS_the_timor_issue_desc: "Východní Timor je zjevně právoplatným indonéským územím, a ačkoli revoluce skončila, stále je pod koloniální vládou. Zašleme ultimátum zemi [721.OWNER.GetName] a budeme požadovat okamžité předání Východního Timoru."
 INS_pledge_to_allies: "Zavázat se Spojencům"
 INS_pledge_to_allies_desc: "Hrozí nám invaze v rámci rostoucího světového konfliktu. Ačkoli naše vztahy se Spojenci byly nejisté, etablovali jsme se jako demokratická mocnost v Pacifiku a měli bychom se sladit s velkými demokratickými mocnostmi."
 INS_mixed_economy_system: "Systém smíšeného hospodářství"
 INS_mixed_economy_system_desc: "Indonésie je jedinečná země a nebude prosperovat pod tradičním kapitalismem ani komunismem. Měli bychom zavést systém smíšeného hospodářství s prvky kapitalismu i komunismu."
 INS_social_democracy: "Sociální demokracie"
 INS_social_democracy_desc: "[INS.GetAdjectiveCap] hospodářství od zavedení Sjahrirovy hospodářské politiky mohutně vzrostlo. Měli bychom prohlásit Indonésii za plně sociálnědemokratický stát a rozvíjet budoucí hospodářskou politiku na principech sociální demokracie."
 INS_prime_minister_sjarifuddin: "Premiér Sjarifuddin"
 INS_prime_minister_sjarifuddin_desc: "Sjarifuddin je nejlepším kandidátem pro Indonésii; jeho umírněná politika umožňuje kompromis mezi komunisty a socialisty."
 INS_concessions_to_communists: "Ústupky komunistům"
 INS_concessions_to_communists_desc: "PKI má v parlamentu významný počet křesel. Měli bychom udělit několik ministerských pozic vůdcům PKI, abychom zajistili stabilitu."
 INS_sjarifuddin_focus_2: "Samosprávná exportní ekonomika"
 INS_sjarifuddin_focus_2_desc: "S nově nabytou nezávislostí bychom měli znovu posoudit náš exportní hospodářský systém a přeuspořádat jej tak, aby již nebral v potaz nizozemské zisky. Ačkoli ekonomika založená na vývozu je stále nebezpečná, můžeme ji učinit mnohem spolehlivější než v předchozích letech."
 INS_prime_minister_hatta: "Premiér Hatta"
 INS_prime_minister_hatta_desc: "Mohammad Hatta, známý jako proklamátor revoluce, sloužil jako viceprezident Sukarna a obecně byl z této dvojice demokratičtěji orientovaný. Bude vhodným premiérem, na němž se většina politických stran dokáže shodnout."
 INS_hatta_focus_2: "Další kroky"
 INS_hatta_focus_2_desc: "Revoluce skončila, a ačkoli někteří političtí činitelé trvají na tom, že revoluce musí pokračovat, tyto hlasy by měly být ignorovány. Místo toho bychom měli hledět vpřed; musíme vybudovat Indonésii tak, aby budoucí generace žily v prosperitě."
 INS_hatta_princely_advisors: "Integrovat knížecí státy"
 INS_hatta_princely_advisors_desc: "Ve sdílené rozmanitosti nacházíme jednotu. Na tomto principu jsme založili náš národ, ale konec revoluce tuto myšlenku zatížil kvůli nedostatku společného boje. Abychom předešli zášti a povstáním menšinových skupin, měli bychom zřídit dodatečnou radu, v níž budou mít místní vládci z knížecích států přímé slovo v národní politice."
 INS_prime_minister_tt: "První indonéské všeobecné volby se konaly"
 INS_guided_democracy: "Řízená demokracie"
 INS_guided_democracy_desc: "Demokracie může být ideálem, ale předat moc lidu právě teď povede jen k chaosu. Povýšíme Sukarna na doživotního prezidenta, který bude dohlížet na demokratický parlament a v případě potřeby zasáhne."
 INS_enact_militarism: "Zavést militarismus"
 INS_enact_militarism_desc: "Měli bychom si vzít několik ponaučení od [JAP.GetNameDefCap] a jeho militaristické politiky. Přijetí podobných principů prospěje naší nové vládě."
 INS_sukarnos_industrialization: "Posílit jávský průmysl"
 INS_sukarnos_industrialization_desc: "Jávský průmysl je páteří našeho hospodářství i armády. Všechny cesty musí vést do Říma."
 INS_sukarnos_industrialization2: "Každý muž musí sehrát svou roli"
 INS_sukarnos_industrialization2_desc: "Válečné úsilí je prioritou číslo jedna tohoto národa, a proto je prioritou číslo jedna každého Indonésana přispět. Luxus je nepřítel, vojensko-průmyslový komplex musí růst."
 INS_japanese_military_lessons: "Japonské vojenské poznatky"
 INS_japanese_military_lessons_desc: "Měli bychom studovat japonské vojenské doktríny a podle nich přizpůsobit vlastní armádu."
 INS_support_tan_malakas_coup: "Podpořit puč Tana Malaky"
 INS_support_tan_malakas_coup_desc: "Sukarno vyhlásil naši nezávislost, ale ukázal se jako muž polovičatých opatření a diplomatických ústupků. Tan Malaka a jeho Persatuan Perjuangan požadují to, co požaduje lid: stoprocentní nezávislost, žádná jednání, žádný kompromis. Pokud Sukarno nebude bojovat za revoluci naplno, pak si revoluce musí najít vůdce, který bude."
 INS_minimum_program: "Minimální program"
 INS_minimum_program_desc: "Persatuan Perjuangan předložilo své požadavky: lidovou vládu, lidovou armádu a znárodnění všech zahraničně vlastněných plantáží a průmyslu. Potřebujeme schopné muže, kteří tento program povedou vpřed. Njono mluví za dělníky, Setyadjit za stranické intelektuály. Společně zajistí, že revoluce bude organizována od tovární haly až po vládní sály."
 INS_agrarian_reform: "Agrární reforma"
 INS_agrarian_reform_desc: "Po tři století půda Indonésie živila plantáže cizinců. Rolníci, kteří na ní pracovali, nepoznali téměř nic jiného. Revoluce, která toto ponechá beze změny, není žádnou revolucí. Zajistíme, aby půda přešla k těm, kdo ji obdělávají."
 INS_soviet_aid: "Sovětská pomoc"
 INS_soviet_aid_desc: "Sovětský svaz uznal naši revoluci a je připraven ji zásobovat. Ať už se náš program od Moskvy liší jakkoli, nemůžeme si dovolit odmítnout to, co je nabízeno. Měli bychom vzít zbraně a pokračovat."
 INS_pacific_revolution: "Pacifická revoluce"
 INS_pacific_revolution_desc: "Koloniální mocnosti neustoupily z Asie, jen z Indonésie. Starý řád stále drží v místech, jako jsou Malajsko a Filipíny, a v každém z nich jsou muži a ženy, kteří jej chtějí svrhnout. Naše revoluce nám dala jak postavení, tak povinnost jim pomoci. Musíme."
 INS_purge_oppurtunists_tt: "Odemkne §Y$INS_launch_revolution$§! v zemích s §Y60 %§! nebo vyšší podporou komunismu. Země, v nichž podnítíme revoluce, se stanou našimi §Yloutkami§!."
 INS_purge_oppurtunists: "Odstranit oportunisty"
 INS_purge_oppurtunists_desc: "Musso strávil dvacet let v Moskvě učením se poslouchat rozkazy. Vrátil se se sovětskými instrukcemi v kapse a plánem proměnit naši republiku v loutku Kominterny. Nesvrhli jsme Nizozemce proto, abychom poklekli před dalším cizím pánem. Oportunisté, kteří by naši revoluci prodali Moskvě, musí být vykořeněni a národy, které osvobodíme, budou vzhlížet k Jakartě, nikoli ke Kremlu."
 INS_federation_of_aslia: "Federace Aslie"
 INS_federation_of_aslia_desc: "Národy, které jsme osvobodili, nemusí stát osamoceně. Tan Malaka si vždy představoval něco většího než jednu republiku. Federaci od pevniny po Pacifik, sjednocenou proti každé koloniální mocnosti, která by se odvážila vrátit. Nabídneme jim plné členství v našem státě."
 INS_aslia_tt: "Umožňuje integrovat jako domovská území a anektovat §Ypacifické§! subjekty"
 INS_musso_ascends: "Musso se ujímá moci"
 INS_musso_ascends_tt: "Odemkne §Y$INS_launch_revolution$§! v zemích s §Y30 %§! nebo vyšší podporou komunismu. Země, v nichž podnítíme revoluce, zůstanou nezávislé."
 INS_musso_ascends_desc: "Tan Malaka je snílek. Musso přináší to, co snílci nedokážou: plnou podporu Sovětského svazu a solidaritu mezinárodního komunistického hnutí. Naše revoluce nemusí stát osamoceně."
 INS_soviet_economic_integration: "Sovětská hospodářská integrace"
 INS_soviet_economic_integration_desc: "Revoluce nám dala svobodu, ale svoboda sama továrny nepostaví ani masy nenakrmí. Sovětský svaz nabízí to, co žádná kapitalistická mocnost nenabídne: průmyslové know-how, rozvojové úvěry a obchod za podmínek bez koloniálních pout. Byli bychom hlupáci, kdybychom odmítli."
 INSHOL_revolution_ongoing_tt: "Probíhá indonéská revoluce"
 INSHOL_reasserting_control: "Znovu prosadit kontrolu nad Indiemi"
 INSHOL_reasserting_control_desc: "Nemůžeme nečinně přihlížet, jak se tito oportunisté pokoušejí zničit to, co jsme po staletí budovali, zatímco ničí naši infrastrukturu a radikalizují mládež. Musíme jednat!"
 INSHOL_request_british_support: "Požádat o britskou podporu"
 INSHOL_request_british_support_desc: "[ENG.GetNameDefCap] jako kolegiální koloniální mocnost bude pravděpodobně naší situaci nakloněna, zvláště protože úspěch revolucionářů by mohl spustit dominový efekt ve východní Asii. Měli bychom požádat o jejich hospodářskou a vojenskou pomoc."
 INS_eng_treaty_holside_tt: "§Y[ENG.GetNameDefCap]§! se oficiálně prohlásí za naši stranu konfliktu a poskytne značnou pomoc. Pokud válka skončí vítězstvím, §Y[ENG.GetNameDefCap]§! získá nárok na Borneo."
 INS_eng_treaty_engside_tt: "Oficiálně se přikloníme k §Y[HOL.GetNameDefCap]§! v konfliktu ve Východní Indii. Pokud §Y[HOL.GetNameDefCap]§! zvítězí, získáme nárok na vlastnictví Bornea."
 INS_fra_treaty_holside_tt: "§Y[FRA.GetNameDefCap]§! se oficiálně prohlásí za naši stranu konfliktu a poskytne značnou pomoc. Pokud válka skončí vítězstvím, §Y[FRA.GetNameDefCap]§! získá nárok na severovýchodní Sumatru."
 INS_fra_treaty_fraside_tt: "Oficiálně se přikloníme k §Y[HOL.GetNameDefCap]§! v konfliktu ve Východní Indii. Pokud §Y[HOL.GetNameDefCap]§! zvítězí, získáme nárok na vlastnictví severovýchodní Sumatry."
 INSHOL_franco_dutch_accord: "Francouzsko-nizozemská dohoda"
 INSHOL_franco_dutch_accord_desc: "Ačkoli jsou naši vojáci lépe vybavení a organizovanější než republikánské milice, jejich drtivá početní převaha obrátila konflikt proti nám. K zajištění vítězství potřebujeme vnější podporu, větší než jakou by většina poskytla. Francie může být ochotna zasáhnout, pokud jí nabídneme území v Indiích k rozšíření její přítomnosti v Pacifiku."
 INSHOL_london_batavia_accord: "Londýnsko-batávijská dohoda"
 INSHOL_london_batavia_accord_desc: "Ačkoli jsou naši vojáci lépe vybavení a organizovanější než republikánské milice, jejich drtivá početní převaha obrátila konflikt proti nám. K zajištění vítězství potřebujeme vnější podporu, větší než jakou by většina poskytla. [ENG.GetNameDefCap] by mohla mít zájem kvůli své přítomnosti v Malajsku. Možná by se dala přesvědčit, pokud jí nabídneme něco na oplátku?"
 INSHOL_australian_divisions: "Poslat australskou pěchotu na Jávu"
 INSHOL_australian_divisions_desc: "Podle londýnsko-batávijské dohody je Británie povinna poslat do Indií přes Austrálii další divize, jakmile o to požádáme, protože blízkost Austrálie k Indiím z ní dělá dokonalého kandidáta na hostování vojenské základny mimo samotné Indie."
 INSHOL_indian_divisions: "Divize Britské indické armády"
 INSHOL_indian_divisions_desc: "Ačkoli Británie s největší pravděpodobností nebude ochotna poslat do Indií vlastní muže, přesvědčit ji, aby poslala indické divize, je mnohem snazší, zejména kvůli jejich blízkosti k Batávii."
 INSHOL_undermine_the_militias: "Podkopat milice"
 INSHOL_undermine_the_militias_desc: "Média přehánějí závažnost této situace; milice jsou jen skupina zdivočelé mládeže, která se snaží dosáhnout něčeho nedosažitelného. Nemusíme odvádět všechny své zdroje na jejich zastavení, měli bychom jen držet linii a počkat, až se unaví."
 INSHOL_flag_will_fly_again: "Vlajka znovu zavlaje"
 INSHOL_flag_will_fly_again_desc: "Nizozemská vlajka v Indiích vlála po staletí a neexistuje svět, v němž bychom dovolili, aby byla spuštěna. Pokud udržení naší kolonie, klenotu koruny, vyžaduje nasazení tanků a bombardérů, pak budou nasazeny!"
 INSHOL_flag_will_fly_again_tt: "§YJakmile revoluce skončí, duch bude odstraněn a změny pravidel budou vráceny zpět.§!"
 INSHOL_mass_mobilization: "Masová mobilizace"
 INSHOL_mass_mobilization_desc: "Tento konflikt nemůžeme vyhrát a republiku rozdrtit bez dobře vybavené armády. Musíme znovu vyzbrojit Indie a přesměrovat financování z civilních sektorů do KNIL."
 INSHOL_batavia_storm_operation: "Útok na Batávii"
 INSHOL_instigate_infighting: "Podnítit vnitřní boje v republice"
 INSHOL_ultimatum_to_republic: "Ultimátum republice"
 INSHOL_comite_rijkseenheid: "Comité Rijkseenheid"
 INSHOL_comite_rijkseenheid_desc: "Vlajka v Indiích je spouštěna, a lidé tomu jen přihlížejí. To nesmíme dopustit; musíme přesvědčit správu Indií, že nizozemský lid chce revoluci zastavit!"
 INSHOL_increase_esclation_placeholder: "Rychlá eskalace"
 INSHOL_increase_esclation_placeholder_desc: "Naše milice převzaly kontrolu nad mnoha životně důležitými přístavy, městy a průmyslovými centry. Nebudeme dál čekat, až Nizozemsko začne jednat; sami vyzveme k velké vojenské ofenzivě!"
 INS_take_batavia_explination_tt: "Pokud úspěšně obsadíme celou Jávu, zničíme koloniální vládu zevnitř a §Gvyhrajeme válku§!. Pokud se nám to však nepodaří do §Y730 dní§!, §Rzahyneme§!."
 INSHOL_linggadjati_agreement: "Jednání o dohodách o příměří"
 INSHOL_linggadjati_agreement_desc: "Invaze na Jávu se ukázala jako obtížná a naše správa je stále nestabilnější. Musíme ustoupit a hrát defenzivně, abychom neriskovali pád celé republiky. Měli bychom vyjednat místní příměří s Nizozemskem, což nám umožní reorganizovat síly, než se znovu zaměříme na Jávu."
 INSHOL_increase_esclation_placeholder_tt: "Odemkne §Yrozhodnutí§! vyjednat místní příměří a §Yprodloužit časovač§! pro obsazení Jávy."
 INSHOL_seek_foreign_help: "Hledat zahraniční pomoc"
 INSHOL_seek_foreign_help_desc: "Není tajemstvím, že pokus vyhrát válku proti silně industrializované koloniální mocnosti jako nově vzniklý národ bez zavedené ekonomiky je téměř nemožný úkol. Měli bychom oslovit jiné země, které podporují naši věc, a zjistit, zda by nám byly ochotny pomoci."
 INSHOL_renville_agreement: "Renvillská dohoda"
 INSHOL_renville_agreement_desc: "Bezprecedentní agrese Nizozemska přitáhla k revoluci mezinárodní pozornost, přesto Nizozemsko nadále porušuje příměří a snaží se z nás vylákat reakci. Musíme se pokusit obrátit na [USA.GetNameDef], protože pokud je přesvědčíme, aby se postavili za Indonésii, Nizozemsko nebude mít jinou možnost než ustoupit."
 INSHOL_no_compromise: "Žádný kompromis, žádná kapitulace"
 INSHOL_no_compromise_desc: "Nizozemská chamtivost, která je přiměla investovat téměř výhradně do Jávy a ignorovat východní ostrovy, učinila z Jávy Achillovu patu celé kolonie. To bude jejich pád!"
 INSHOL_end_to_bloodshed: "Řešení dvou států"
 INSHOL_end_to_bloodshed_desc: "Tento konflikt trvá příliš dlouho, s malým pokrokem na obou stranách a s novými ztrátami na životech každý den. Nikdo nechce, aby to pokračovalo; je čas jednat s nizozemskými vůdci u vyjednávacího stolu."
 INSHOL_reorganize_colonies: "Reorganizovat kolonii"
 INS_we_will_need_another_tt: "Protože již ovládáme celou Jávu, budeme muset kromě Jávy ovládat ještě jeden další stát."
 INS_centralize_the_state: "Centralizovat stát"
 INS_centralize_the_state_desc: "Od Sumatry po Sulawesi, od Bornea po Bangku přinesly naše rozvojové programy silnice, továrny a instituce územím, která [1058.GetName] kdysi spravovala jen podle jména. Tyto regiony již nejsou vzdálenými provinciemi. Jsou [INS.GetNameDefCap]."
 INS_centralize_the_state_1_tt: "Předpokladové státy, které jsou §Ydomovskými územími§!:"
 INS_centralize_the_state_2_tt: "Předpokladové státy, které §Ynejsou domovskými územími§!:"
 INS_fate_of_de_javasche_bank: "[INS_fate_of_de_javasche_bank_scripted_name]"
 INS_fate_of_de_javasche_bank_scripted_name_colony: "Osud De Javasche Bank"
 INS_fate_of_de_javasche_bank_scripted_name_independent: "Osud Bank Indonesia"
 INS_fate_of_de_javasche_bank_desc: "[INS_fate_of_de_javasche_bank_scripted_desc]"
 INS_fate_of_de_javasche_bank_scripted_desc_colony: "Východoindický gulden je od vypuknutí krize ve volném pádu a De Javasche Bank postrádá nástroje k zastavení poklesu. Musíme rozhodnout, jak stabilizovat naši měnu, než se zbytek důvěry investorů zcela vypaří."
 INS_fate_of_de_javasche_bank_scripted_desc_independent: "Zdědili jsme měnu v krizi. Starý koloniální gulden už selhával a přechod na rupii trhy nijak neuklidnil. Bank Indonesia potřebuje jasné směřování od vlády, jinak naše mladá ekonomika utrpí."
 INS_finish_the_bauxite_project: "Dokončit projekt Bangka"
 INS_finish_the_bauxite_project_desc: "S novými silnicemi, přístavy a železnicemi v provozu napříč Bangka-Belitung hlásí průzkumné týmy ložiska wolframu a chromu nad naše původní očekávání. Tyto ostrovy ještě republice ukážou svou plnou hodnotu."
 INS_australian_contracts: "Australské smlouvy"
 INS_australian_contracts_desc: "Naše zásoby kaučuku daleko přesáhly domácí potřeby. Austrálie, vždy hladová po surovinách pro svůj vlastní průmysl, představuje přirozeného obchodního partnera. Zajištění dlouhodobých smluv s australskými firmami by přineslo stabilní příjmy a posílilo naše postavení v regionální ekonomice."
 INS_coopereate_with_chinese_businessmen: "Spolupracovat s čínskými obchodníky"
 INS_coopereate_with_chinese_businessmen_desc: "Bohatá a dobře propojená obchodnická třída dlouho usnadňovala obchod napříč souostrovím. Místo abychom tyto zavedené sítě odsouvali stranou, měli bychom s nimi spolupracovat. Jejich kapitál a obchodní odbornost mohou být neocenitelné při vytahování naší ekonomiky ze současné malátnosti."
 INS_oil_decisions_unlock_tt: "Odemkne nová rozhodnutí §Y$INS_realign_supply_chains_cat$§! k prodeji §Yropy§!."
 INS_negotiate_new_contracts_unlock_tt: "Odemkne nová rozhodnutí §Y$INS_realign_supply_chains_cat$§!."
 INS_realign_supply_chains_explain_tt: "Odemkne rozhodnutí §Y$INS_realign_supply_chains_cat$§! k prodeji zdrojů soukromým společnostem v rámci dvouletého pronájmu."
 INS_negotiate_new_contracts: "Vyjednat nové smlouvy"
 INS_negotiate_new_contracts_desc: "Naše rostoucí pověst spolehlivého dodavatele otevřela dveře, které nám dříve zůstávaly zavřené. Krouží kolem nás noví kupci a měli bychom jednat rychle, abychom je uvázali dlouhodobými dohodami dříve, než nás naši konkurenti podseknou."
 INS_all_in_on_rubber: "Vše vsadit na kaučuk"
 INS_all_in_on_rubber_desc: "Kaučuk je naše nejsilnější karta a máme v úmyslu ji zahrát. Každý dostupný akr plantážní půdy bude předán pěstování kaučuku a náš exportní aparát bude reorganizován tak, aby jej přepravoval rychleji a levněji než kdokoli jiný v regionu."
 INS_more_market_resources: "Prodejem přes Velkou hospodářskou krizi"
 INS_more_market_resources_desc: "Svět se možná topí v hospodářské krizi, ale krize plodí příležitosti pro ty, kdo jsou dost odvážní se jich chopit. Zaplavením trhu našimi komoditami za ceny, jimž žádný konkurent nedokáže čelit, zajistíme, že až se svět zotaví, indonéské zboží už bude na každé polici a v každém skladu."
 INS_recovering_from_the_great_depression: "Zotavení z velké hospodářské krize"
 INS_recovering_from_the_great_depression_desc: "Velká hospodářská krize měla ničivý dopad na [INS.GetNameDef]. Jelikož je naše ekonomika převážně exportní, protekcionismus po celém světě nás ochromil. Jak se zdá, že světový obchod se znovu otevře, musíme hledat nové trhy a pracovat na obnovení starých obchodních tras."
 INS_first_come_first_serve: "Kdo dřív přijde, ten dřív mele"
 INS_first_come_first_serve_desc: "Ačkoli protekcionismus velké hospodářské krize polevuje, zvýšená produkce a nadhodnocený gulden zanechaly nizozemský exportní trh v troskách, protože naši staří obchodní partneři na Západě se obrátili na Jižní Ameriku, aby pokryli svou poptávku. Místo abychom je honili kvůli novým obchodním dohodám, mohli bychom toho využít jako příležitosti k expanzi na nové trhy v Asii."
 INS_oil_export: "Zvýšený vývoz ropy"
 INS_oil_export_desc: "Zlepšíme ropnou infrastrukturu na Sumatře a Kalimantanu, abychom zajistili obchodní dohody s našimi novými obchodními partnery."
 INS_increased_trade_with_japan: "Zvýšený obchod s Japonskem"
 INS_increased_trade_with_japan_desc: "[JAP.GetNameDefCap] se stává stále cennějším obchodním partnerem a nezklamalo nás. Měli bychom vyjednat nové obchodní dohody k prohloubení hospodářské spolupráce mezi našimi dvěma národy a pomoci nám setřást zbytky velké hospodářské krize. To může rozladit naše spojence na Západě, zejména Nizozemsko. Pokud však někdy chceme mít slovo ve vlastním osudu, budeme si muset zajistit vlastní obchodní vazby."
 INS_asian_trade_investments: "Asijské obchodní investice"
 INS_asian_trade_investments_desc: "Pustošení velké hospodářské krize nám ukázalo, jak příliš závislí jsme byli na našich dlouhodobých obchodních partnerech na Západě. Jelikož je naše ekonomika převážně exportní, je nyní důležitější než kdy dříve rozvíjet a rozšiřovat nové trhy v jihovýchodní Asii, aby naše hospodářství nezáviselo na žádné jednotlivé zemi."
 INS_asian_trade_investments_tt: "Každých §Y420§! dní se postih zdrojů na trh z §Yvelké hospodářské krize§! §Gzlepší§! o §Y5 %§!, dokud negativní modifikátory nezmizí."
 INS_declare_free_trade: "Vyhlásit volný obchod"
 INS_declare_free_trade_desc: "Neměli bychom se výhradně přiklánět k jedné zemi. Necháme trh přirozeně dělat nejlepší rozhodnutí pro [INS.GetNameDef]."
 INS_japanese_export_contracts: "Jedna obchodní smlouva, která vládne všem"
 INS_japanese_export_contracts_desc: "Vyjednáme velkou obchodní dohodu s [JAP.GetNameDef], v níž prodáme veškerý kaučuk ve státech [1049.GetName] a [672.GetName]. Ačkoli jej prodáme za velmi nízkou cenu, budeme mít zaručeno, že se prodá všechen."
 INS_realign_supply_chains: "Přesměrovat dodavatelské řetězce"
 INS_realign_supply_chains_desc: "Ačkoli protekcionismus velké hospodářské krize polevuje, zvýšená produkce a nadhodnocený gulden zanechaly nizozemský exportní trh v troskách, protože naši staří obchodní partneři na Západě se obrátili na Jižní Ameriku, aby pokryli svou poptávku. Musíme podniknout kroky, abychom přesvědčili své spojence začít s námi znovu obchodovat."
 INS_invite_foreign_companies: "Podpořit americké ropné podniky"
 INS_invite_foreign_companies_desc: "Od roku 1930 působí Standard Oil California v naší zemi prostřednictvím své nizozemské dceřiné společnosti Nederlandsche Pacific Petroleum Maatschappij. Jejich průzkumy v Riau vypadají slibně; měli bychom jejich těžební operace podpořit jakýmkoli způsobem - velký objev by zvýšil naše příjmy a povzbudil další mezinárodní společnosti k investicím v naší zemi."
 INS_expand_sea_routes: "Rozšířit námořní trasy"
 INS_expand_sea_routes_desc: "Naše země je bohatá na přírodní zdroje, ale náš těžební průmysl je příliš specializovaný a chybí nám infrastruktura potřebná k těžbě některých vzácných minerálů, jako je chrom a wolfram. Chceme-li zlepšit své vojenské výrobní schopnosti, budeme je muset dovážet odjinud. Abychom plně využili naši rostoucí obchodní síť, budeme muset zvýšit kapacitu obchodní flotily."
 INS_ship_contracts: "Zajistit lodní smlouvy"
 INS_ship_contracts_desc: "Vybudování námořnictva je nezbytné k udržení našich obchodních tras v případě války. Můžeme využít nově nabyté obchodní vztahy k získání námořních kontraktů."
 INS_developing_sumatra: "Rozvoj Sumatry"
 INS_developing_sumatra_desc: "Sumatra je na zdroje nejbohatším ostrovem souostroví, přesto je infrastruktura tak špatná, že značná část vytěžených zdrojů se nikdy ani nedostane zpět do Batávie. Doprava se opírá o změť prašných cest a nepropojených železničních tratí, zcela nedostatečných k podpoře našich plánů pro ostrov. Nemůžeme dovolit, aby to pokračovalo."
 INS_sumatra_railway: "Sumaterská železnice"
 INS_sumatra_railway_desc: "V rámci našeho pokračujícího úsilí o rozvoj sumaterské infrastruktury bychom měli postavit velkou železnici táhnoucí se od severního Ačehu k nejjižnějšímu přístavu na Sumatře, který je lodí velmi rychle spojen s Batávií. Takto bude zdroje stačit dopravit na nejbližší vlakové nádraží a odtud je dokážeme přesunout do Batávie během několika dní."
 INS_develop_borneo: "Rozvíjet Kalimantan"
 INS_develop_borneo_desc: "Kalimantan má potenciál velkého bohatství, přesto je ostrov velmi řídce rozvinutý a jeho lidé jsou sužováni chudobou. Doprava nákladu silně závisí na mnoha řekách a vodních cestách ostrova a jakákoli dálková komunikace je brzděna nedostatkem elektřiny. Budováním elektrického vedení a silnic můžeme vydláždit cestu budoucím průzkumům a těžbě zdrojů."
 INS_kalimantan_mic: "Kalimantanský vojenský průmysl"
 INS_kalimantan_mic_desc: "Naše úsilí o rozvoj infrastruktury na Kalimantanu se vyplatilo. Šíření elektřiny a komunikací nás přivedlo do kontaktu s komunitami, které bývaly daleko mimo dosah vlády. Můžeme využít této příležitosti k naplnění potřeb zvýšené vojenské výroby výstavbou nových továren v regionu a jejich obsazením touto nově dostupnou pracovní silou."
 INS_pontianak_to_balikpapan: "Z Pontianaku do Tanjung Seloru"
 INS_pontianak_to_balikpapan_desc: "Myšlenka postavit železnici na Kalimantanu byla dlouze diskutována, ale drsný, z velké části neprozkoumaný terén ve středu ostrova z ní činí obtížný úkol. Jediným řešením je železnice ve tvaru U od pobřeží k pobřeží. Nebude levná, ale dlouhodobě se zaplatí."
 INS_develop_sulawesi: "Rozvíjet Sulawesi"
 INS_develop_sulawesi_desc: "Sulawesi je středem souostroví, a tedy důležitou strategickou polohou. Měli bychom budovat silnice, elektrická vedení a komunikační sítě, aby mohlo být v případě války využito jako vojenský uzel."
 INS_the_bangka_project: "Projekt Bangka"
 INS_the_bangka_project_desc: "Ostrovy Bangka-Belitung jsou sice malé, ale díky svým ložiskům bauxitu tvoří základní kámen indonéské ekonomiky. Musíme na Bangka-Belitung vybudovat silnice, přístavy a železnice, abychom zajistili, že budeme moci plně sklízet odměny bohatství nerostů těchto ostrovů."
 INS_aluminium_factory: "Hliníkárna Pangkalpinang"
 INS_aluminium_factory_desc: "Naše těžba surového bauxitu roste, ale nedostatek domácí výroby hliníku omezuje naše zisky. Pangkalpinang jako provinční hlavní město ostrovů Bangka-Belitung by byl ideálním místem pro zřízení vlastních továren. To by nám umožnilo obejít prostředníky a maximalizovat výnosy."
 INS_bauxite_export: "Vsadit ještě více na vývoz bauxitu"
 INS_bauxite_export_desc: "Dokončení projektu Bangka nám zanechalo více surového bauxitu, než víme, co s ním. Ačkoli prodat vše by bylo obtížné, mohli bychom nabídnout výrazně nižší cenu bauxitu než kdokoli jiný na trhu a zajistit, že se prodá každý gram. Vzhledem k samotnému množství bauxitu, které můžeme prodat, by to stále přineslo poměrný růst zisku oproti našemu současnému vývozu."
 INS_tin_mining: "Investice do těžby cínu"
 INS_tin_mining_desc: "Dějiny těžby cínu na ostrovech Bangka-Belitung předcházejí evropské přítomnosti v souostroví. Není proto divu, že cínový průmysl na ostrovech už dávno čeká na modernizaci. Přepracování výrobních kapacit je nákladné a náš stávající cínový průmysl nebude po dobu rekonstrukce v provozu. Existuje však značný potenciál dlouhodobého zisku."
 in_240_days_tt: "§YZa 240 dní:§!\n"
 INS_tin_to_usa: "Prodat cín - [USA.GetNameDef]"
 INS_tin_to_usa_desc: "[USA.GetNameDefCap] je plná korporací a vládních institucí nakupujících cín. Nyní, když máme řádný těžební provoz, máme příležitost zde vydělat mnoho peněz."
 INS_tin_to_japan: "Prodat cín - [JAP.GetNameDef]"
 INS_tin_to_japan_desc: "[JAP.GetNameDefCap] má mnoho lodí, které jsou nyní považovány za zastaralé a nahraditelné, přestože by se dokonale hodily pro [INS.GetAdjective] námořnictvo. Měli bychom tyto lodě koupit za peníze z naší produkce cínu."
 INS_tin_to_japan_tt: "[JAP.GetNameDefCap] nám pošle §Y9§! starších torpédoborců."
 INS_new_bauxite_routes: "Nové bauxitové trasy"
 INS_new_bauxite_routes_desc: "Naše strategie podsekávání trhu za účelem zvýšení objemu vývozu bauxitu byla úspěšná a podstatně jsme zvýšili celkové příjmy. Zde však nesmíme přestat. Měli bychom nadále rozšiřovat obchodní sítě, optimalizovat dodavatelské řetězce a hledat další příležitosti k maximalizaci výnosů."
 INS_bangka_bauxite_export_flag: "Dokončil zaměření §Y$INS_bauxite_export$§!:"
 INS_not_industry: "Plánovat budoucnost"
 INS_not_industry_desc: "Jáva je tepajícím srdcem našeho národa, domovem většiny našeho obyvatelstva a sídlem naší vlády. Než budeme moci ostrov skutečně industrializovat, musíme nejprve připravit půdu. Pozemkové průzkumy, územní rozdělení a vyklizení lokalit zajistí, že až továrny přijdou, budou postaveny tam, kde přinesou největší užitek."
 INS_construction_focus: "Průmyslový boom"
 INS_construction_focus_desc: "Zahraniční kapitál proudí dovnitř, vývozní příjmy rostou a poprvé po letech existují skutečné peníze k investování do domácího průmyslu. Musíme se chopit okamžiku a stavět, dokud nám podmínky přejí."
 INS_developing_java: "Rozšířit jávskou infrastrukturu"
 INS_developing_java_desc: "Jáva je zdaleka nejindustrializovanějším ostrovem souostroví a zdrojem většiny našeho bohatství. Některá města, jako Batávie, jsou však kvůli populačnímu růstu stále přeplněnější. Měli bychom tato města rozšířit o nové domy, obchodní zóny, tramvaje, vlaky a továrny, abychom podpořili rostoucí populaci."
 INS_prioritize_sugar_economy: "Upřednostnit cukrovarnictví"
 INS_prioritize_sugar_economy_desc: "Měli bychom snížit vládní rozpočet na průmyslový rozvoj Batávie; ta je již mnohem industrializovanější než jakékoli jiné město v souostroví. Místo toho bychom měli tyto peníze použít k zakládání mnoha malých palmových plantáží po celé zemi. Tyto plantáže budou produkovat palmový cukr, komoditu s vysokou mezinárodní poptávkou."
 INS_all_cards_into_industry: "Všechny karty do průmyslu"
 INS_all_cards_into_industry_desc: "Industrializace měla obrovský dopad na ekonomiku státu [1058.GetName]. Pokud industrializujeme celý ostrov s desítkami milionů obyvatel, mohli bychom se stát vlivnými v globálním měřítku."
 INS_expand_batavia_technical_institute: "Rozšířit Batávijský technologický institut"
 INS_expand_batavia_technical_institute_desc: "Rozšíření Batávijského technologického institutu umožní vzdělat větší počet studentů a zvýšit tempo našeho technologického rozvoje."
 INS_quinine_export: "Výnosnější dohoda o chininu"
 INS_quinine_export_desc: "Cinchona Bureau v Amsterdamu má téměř monopol na vývoz chininu, který je zvláště výnosný, protože chinin je po celém světě velmi žádaný jako léčba malárie. Úřad získává většinu svého chininu z Východní Indie. Přesto dostáváme jen velmi malou část zisku. Měli bychom využít naši produkci chininu jako páku k vyjednání spravedlivější dohody."
 INS_spend_profits_on_rural: "Vynaložit zisky na rozvoj venkova"
 INS_spend_profits_on_rural_desc: "S dokončenou novou dohodou o chininu se nám naskýtá příležitost využít dodatečné příjmy k rozvoji dopravní a komunikační infrastruktury ve venkovských oblastech a vydláždit cestu budoucímu průmyslovému rozvoji."
 INS_spend_profits_on_urban: "Vynaložit zisky na městský rozvoj"
 INS_spend_profits_on_urban_desc: "S dokončenou novou dohodou o chininu se nám naskýtá příležitost využít dodatečné příjmy k rozšíření batávijského zpracovatelského průmyslu, což diverzifikuje naši ekonomiku a sníží naši závislost na vývozu surovin."
 INS_spend_profits_on_military: "Vynaložit zisky na vojenský rozvoj"
 INS_spend_profits_on_military_desc: "S dokončenou novou dohodou o chininu se nám naskýtá příležitost výrazně zlepšit naši armádu tím, že dodatečné příjmy vynaložíme na stavbu a údržbu nových zbrojních továren v Yogyakartě a Semarangu."
 INS_end_to_bloodshed_tt: "Válka skončí a nové hranice budou vytyčeny podle současné okupace. Jáva, Sumatra a Borneo budou §Yanektovány§! stranou, která má v oblasti aktuálně největší kontrolu."
