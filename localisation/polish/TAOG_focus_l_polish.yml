 indonesia_trading_with_us_modifier: "Obchodní dohody"
 indonesia_opposing_us_modifier: "Protiobchodní postoj"
 indonesia_trading_with_enemy_modifier: "Obchod s Japonskem"
 INS_revolution_ended_tt: "Národní revoluce skončila"
 INS_the_jewel_in_the_crown: "Klenot v koruně"
 INS_the_jewel_in_the_crown_desc: "Východní Indie jsou nejjasnějším klenotem nizozemské koloniální koruny a hodláme to tak udržet. Prostřednictvím Volksraadu má náš hlas váhu v Háagu."
