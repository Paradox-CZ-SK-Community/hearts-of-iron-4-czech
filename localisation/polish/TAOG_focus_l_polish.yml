 AST_alp_election_campaign_tt: "§YA.L.P volební kampaň§!\n§LOsobit dělnickou třídu, odboráře a domácky smýšlející reformisty; Australian Labor Party zahájí politickou kampaň.§!\n\n§YEfekt:§!\nDenní politická síla: §R1.00§!\nDenní nárůst hlasů §YA.L.P§!: §G+0.05%§!"
 AST_uap_win_count_trigger_tt: "§YU.A.P§! má alespoň $COUNT|Y$ volebních vítězství."
 AST_alp_win_count_trigger_tt: "§YA.L.P§! má alespoň $COUNT|Y$ volebních vítězství."
 AST_natunity_desc: "§YNárodní jednota vlády§!\n§VV dobách krize ustupují malé spory do pozadí. Národy kolem nás čelí konfliktům jeden za druhým a i když vnitrostátní otázky mají vlastní naléhavost, ta mizí, když hrozí krev. Demokratické strany [AST.GetName] musí odložit neshody a čelit světu jednotně.§!"
