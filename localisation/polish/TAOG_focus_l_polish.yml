 HOL_curtail_colonial_autonomy_taog: "$HOL_curtail_colonial_autonomy$"
 HOL_curtail_colonial_autonomy_taog_desc: "$HOL_curtail_colonial_autonomy_desc$"
 HOL_taog_guarantee_colonial_loyalty: "Zaručit koloniální loajalitu"
 HOL_taog_guarantee_colonial_loyalty_desc: "Nacionalismus je v Indiích na vzestupu a je jasné, že se chystá další revoluce. Tu, které jsme čelili v roce 1927, jsme sice snadno rozdrtili, ale naše zdroje nám sdělují, že tentokrát můžeme mít co do činění s mnohem lépe připravenou skupinou revolucionářů. Možná pokud udělíme určité ústupky Soetardjovu mírovému nacionalistickému hnutí, dokážeme odvést pozornost civilistů od revoluce směrem k Soetardjovi?"
 HOL_taog_guarantee_colonial_loyalty_tt: "§WZaručí, že [INS.GetNameDef] nezažije revoluci.§!\n[INS.GetNameDefCap] se pokusí vyhlásit nezávislost mírovou cestou. Tomu lze zabránit dokončením zaměření §Y$INSHOL_industrialized_colony$§!, které bude vyžadovat značné investice do kolonie."
 SIA_the_khana_ratsadon: "Khana Ratsadon"
 SIA_the_khana_ratsadon_desc: "Lidová strana ukončila absolutismus a otevřela cestu k ústavní vládě. Její odkaz byl zpochybňován, zrazován a zkrvaven, ale zůstává základem, na němž lze vybudovat moderní [SIA.GetName]."
 SIA_the_khana_ratsadon_tt: "\n§YKhana Ratsadon§! se stane aktivní.\n\n§YKhana Ratsadon§! je vedoucí strana v zemi [ROOT.GetName], rozdělená na §Yarmádní křídlo§! a §Ycivilní křídlo§!.\n\n§YCivilní křídlo§! obecně upřednostňuje prodemokratickou politiku se zaměřením na civilní průmysl, zatímco §Yvojenské křídlo§! obecně podporuje profašistickou politiku a militarizaci průmyslu.\n\nNaše volby povedou k tomu, že nás budou mít raději nebo méně rádi, což poskytne různé bonusy či postihy.\nPokud se stanou vzpurnými, mohou se pokusit zahájit puč.\n\nJednotlivé stavy podpory jsou §YVzpurné§!, §YV opozici§!, §YNeutrální§!, §YMírná podpora§! a §YPlná podpora§!"
 SIA_shuffle_pridi_to_the_minister_of_interior: "Posílit postavení civilního křídla"
 SIA_shuffle_pridi_to_the_minister_of_interior_desc: "Přesunutím Pridiho na post ministra vnitra namísto ministra zahraničí by mohl účinněji kontrolovat přidělování vládních zdrojů a sloužit jako brzda rostoucího vojenského vlivu."
 SIA_shuffle_pridi_to_the_minister_of_interior_tt: "§Y$anti_fascist_raids$§! nyní zvýší podporu §Ycivilního křídla§! a sníží podporu §Yvojenského křídla§!"
 SIA_civil_nationalism: "Občanský nacionalismus"
 SIA_civil_nationalism_desc: "Každý Thajec bez ohledu na postavení by měl vědět, že jeho loajalita nemá patřit jedné vládě či jedné osobě, nýbrž hodnotám svobody, volnosti a rovnosti, bez ohledu na to, kdo právě sedí na trůnu moci."
 SIA_the_true_heirs_of_1932: "Skuteční dědicové roku 1932"
 SIA_the_true_heirs_of_1932_desc: "Armáda ráda vykresluje revoluci z roku 1932 jako výhradně svůj úspěch a zametá pod koberec skutečnost, že šlo o vítězství lidu. Lid si tuto skutečnost stačí jen připomenout a z něj načerpáme sílu."
 SIA_thammasat_university: "Univerzita Thammasat"
 SIA_thammasat_university_desc: "Thammasat jako nově založená univerzita může a měla by být rozšířena, aby připravila cestu nové éře thajských inovací."
 SIA_defenders_of_constitutional_liberty: "Obránci ústavní svobody"
 SIA_defenders_of_constitutional_liberty_desc: "Učitelé, bankéři, zdravotní sestry - vzdělané střední vrstvy lze povzbudit a mobilizovat k obraně svobody, pokud vojenské křídlo zajde příliš daleko."
 SIA_dominate_public_symbols: "Ovládnout veřejné symboly"
 SIA_dominate_public_symbols_desc: "Vojenské křídlo dlouho ovládalo veřejné symboly, stavělo sochy a vyhlašovalo státní svátky oslavující samo sebe. Musíme tomu čelit zavedením vlastních symbolů, oslavujících právo lidu na sebeurčení a vítězství nad starou autokracií."
 SIA_civil_service_heroism: "Hrdinství státní služby"
 SIA_civil_service_heroism_desc: "Každému Thajci musí být vštípena vrozená povinnost chránit vládu práva, pokud se jakákoli moc, cizí či domácí, pokusí uchvátit ji pro sebe. Nejenže potřebujeme podporu lidu, pokud se někdo pokusí odebrat nám svobody, ale potřebujeme, aby lid sám jednal jako nositelé praporu."
 SIA_spread_democratic_sentiment_in_universities: "Šířit demokratické smýšlení na univerzitách"
 SIA_spread_democratic_sentiment_in_universities_desc: "Akademici v sobě nesou budoucí směřování země [SIA.GetName]. To, co se dnes naučí, se odrazí v budoucnosti, a vštípením silného smyslu pro demokratickou povinnost dnešním učencům jej můžeme rozšířit i za hranice učených sálů."
 SIA_sideline_disloyal_officers: "Odsunout neloajální důstojníky stranou"
 SIA_sideline_disloyal_officers_desc: "Armádní důstojnický sbor není monolit. V jeho řadách sedí muži, jejichž loajalita patří bývalým patronům, soupeřícím frakcím nebo vlastním ambicím spíše než vládě. Pečlivým přeřazením a administrativním nátlakem lze tyto postavy přesunout na místa, kde nepředstavují hrozbu, zatímco ti, kteří prokázali svou spolehlivost, dostanou odpovědnosti, jež si zaslouží."
 SIA_sideline_disloyal_officers_tt: "Dva náhodní generálové získají rys §YPřeřazen§! na 4 roky, což způsobí, že nebudou poskytovat bonusy.\nDva náhodní generálové, kteří nemají rys §YPřeřazen§!, získají dodatečné statistiky a další pozitivní rys."
 SIA_direct_funds_from_the_military_towards_development: "Přesměrovat prostředky z armády do rozvoje"
 SIA_direct_funds_from_the_military_towards_development_desc: "Ačkoli vojenské křídlo bude nespokojeno, že jeho financování je přesměrováno do rozvoje, bude jejich odpovědností, nikoli naší, vysvětlit veřejnosti, proč je tento nedostatek investic nakonec prospěšný."
 SIA_as_the_eyes_turn_towards_southeast_asia: "Když se zraky obracejí k jihovýchodní Asii"
 SIA_as_the_eyes_turn_towards_southeast_asia_desc: "Jihovýchodní Asie už není vzdáleným válčištěm. Je křižovatkou impéria, revoluce a války. [SIA.GetName] se musí rozhodnout, zda bude v tomto zápase pěšákem, nebo mocností s vlastními plány."
 SIA_support_songsuradets_military_clique: "Podpořit Songsuradetovu kliku"
 SIA_support_songsuradets_military_clique_desc: "Ne každý důstojník je nepřítelem národa. Songsuradet a jeho loajalisté nabízejí disciplinovanou vojenskou alternativu ke zkorumpovaným generálům, kteří přivedli Siam na pokraj. S jejich podporou lze obnovit pořádek, aniž bychom stát vydali chaosu."
 SIA_support_songsuradets_military_clique_tt: "Pokud vypukne §Yobčanská válka§!, Songsuradet nás podpoří a poskytne §Y3§! dodatečné divize\n§RPokud Songsuradeta posílíme a poté se jej pokusíme zatknout prostřednictvím $SIA_the_songsuradet_rebellion$, může se vzepřít.§!"
 SIA_the_royal_police_counterweight: "Královská policie"
 SIA_the_royal_police_counterweight_desc: "Královská policie působí jako nezávislá síla a lze ji využít proti naší opozici, pokud se pokusí uchvátit moc pro sebe."
 SIA_the_royal_police_counterweight_tt: "Pokud vypukne §Yobčanská válka§!, Královská policie nás podpoří a poskytne §Y2§! dodatečné divize"
 SIA_for_the_preservation_of_siamese_independence: "Upevnit kontrolu vojenského křídla"
 SIA_for_the_preservation_of_siamese_independence_desc: "Poslední století vidělo, jak mocnosti světa zasahují do [SIA.GetAdjective] územní celistvosti, a toto století se zdá být stejné. Musíme jednat rozhodně, chceme-li zachovat svůj způsob života, jinak zůstaneme okleštěným státem, zmrzačeným, rozděleným a rozervaným."
 SIA_for_the_preservation_of_siamese_independence_tt: "§Y$anti_democratic_raids$§! nyní zvýší podporu §Yvojenského křídla§! a sníží podporu §Ycivilního křídla§!"
 SIA_the_peoples_day: "Den lidu"
 SIA_the_peoples_day_desc: "Místo dalšího zdůrazňování role armády při svržení staré monarchie bychom měli vyzdvihnout roli samotného lidu. Zřízení Dne lidu povzbudí národ a naučí naše občany neočekávat nic menšího."
 SIA_hold_military_parades: "Pořádat vojenské přehlídky"
 SIA_hold_military_parades_desc: "Abychom posílili vojenskou morálku, odměnili naše loajální generály a připomněli občanům sílu [SIA.GetAdjective] ozbrojených sil, uspořádáme velkou přehlídku Bangkokem. Ať mají noviny o čem psát!"
 SIA_embed_technocrats_in_civilian_institutions: "Začlenit technokraty do civilních institucí"
 SIA_embed_technocrats_in_civilian_institutions_desc: "Můžeme uzavřít spojenectví s technokraty ve vládě a využít je jako prodlouženou ruku civilního křídla, která dosáhne dál a vyváží vliv armády."
 SIA_military_academies_indoctrination: "Indoktrinace vojenských akademií"
 SIA_military_academies_indoctrination_desc: "Naše vojenské akademie jsou ideálním cílem ideologického výcviku. Jsou dobře vyzbrojené a mladí kadeti jsou snadno ovlivnitelní svými instruktory. Získejte instruktory a získáte vojenskou mládež. Silná armáda loajální vládnoucí třídě je základem každého mocného státu - a mocní budeme."
 SIA_the_king_of_the_white_elephant: "Král bílého slona"
 SIA_the_king_of_the_white_elephant_desc: "Hysterie kolem znovuzískání ztracených území hrozí smést národ a svět se dívá. Abychom tento zápal zmírnili, vyrobíme protiválečný film, první thajský film natočený v angličtině, abychom světu ukázali pravou tvář země [SIA.GetName]."
 SIA_drum_up_irredentism: "Rozdmýchat iredentismus"
 SIA_drum_up_irredentism_desc: "Nestačí zajistit podporu armády pro budoucí válku, musíme získat i podporu širšího obyvatelstva. Prostřednictvím básní, filmů a projevů připravíme [SIA.GetName] na zúčtování s imperialistickými mocnostmi, které ukradly naše historické země."
 SIA_sell_privy_purse_lands: "Prodat pozemky královské pokladny"
 SIA_sell_privy_purse_lands_desc: "Královská rodina drží rozsáhlé pozemky, které jsou nyní pod naší kontrolou. Tyto statky by mohly výrazně posílit naši pokladnu a jejich části lze prodat za výhodné ceny vybraným důstojníkům, abychom si zajistili jejich loajalitu."
 SIA_sell_privy_purse_lands_tt: "Jakmile duch vyprší, §Y[SIA_phraya_phahon.GetName]§! se zaplete do skandálu, což vám umožní obejít požadavek fašismu pro §Y$SIA_phibuns_premiership$§!"
 SIA_war_fervor: "Válečné nadšení"
 SIA_war_fervor_desc: "Bubny znějí v očekávání nadcházejícího konfliktu. Lid je připraven, zápalka zažehnuta a válečné nadšení brzy dosáhne vrcholu. Musíme dbát, abychom tuto energii nasměrovali k hodné věci."
 SIA_war_fervor_tt: "Válečná podpora bude trvale růst, dokud nevyhlásíme válku jiné zemi, načež bude duch odstraněn.\n\nPokud §Yválečná podpora§! zůstane příliš dlouho nad §Y95 %§! bez vyhlášení války, začne občanská válka.\nPři vyhlášení války: "
 SIA_the_midnight_meeting: "Půlnoční schůzka"
 SIA_the_midnight_meeting_tt: "[SIA_plaek_phibunsongkhram.GetName] uchvátí moc v [SIA.GetNameDef] a povede vládu. Budeme ho muset sesadit, abychom řádně obnovili monarchii."
 SIA_the_midnight_meeting_desc: "Polní maršál Songsuradet sleduje, jak Phibun shromažďuje stále větší moc, a vidí v tom příslib zúčtování. Pokud mají monarchie a Songsuradet přežít, royalisté, vyšší důstojníci a civilní významné osobnosti se musí tajně sejít a dohodnout na odstranění Phibuna dříve, než on udeří proti nim."
 SIA_meet_with_king_prajadhipok: "Setkat se s králem Prajadhipokem"
 SIA_meet_with_king_prajadhipok_desc: "Spiknutí bez krále je jen další vojenská intrika. Setkáním s králem Prajadhipokem v exilu můžeme jejich věc vložit pod plášť královské legitimity a zajistit požehnání jediného muže, jehož návrat může povzbudit váhavé a rozdělit režim."
 SIA_prajadhipok_audience_with_churchill: "Prajadhipokova audience u [ENG.GetLeader]"
 SIA_prajadhipok_audience_with_churchill_desc: "Prajadhipokova přítomnost v [ENG.GetName] nabízí víc než jen prestiž. Pokud dokáže přesvědčit [ENG.GetLeader], že loajalistické povstání slouží britským zájmům v Asii, pak si zbraně z Malajska mohou najít cestu do rukou mužů stále věrných trůnu."
 SIA_prajadhipok_audience_with_churchill_tt: "[ENG.GetName] nám poskytne "
 SIA_prajadhipok_audience_with_churchill_tt2: "Po začátku občanské války."
 SIA_facilitate_prajadhipoks_move_to_japan: "Usnadnit Prajadhipokův přesun do Japonska"
 SIA_facilitate_prajadhipoks_move_to_japan_desc: "Británie není jediná mocnost, která může mít prospěch z nepokojů v [ROOT.GetNameDef]. Zajištěním Prajadhipokovy cesty do Japonska si můžeme zajistit přízeň Tokia a možná i ujištění, že budou k dispozici divize, pokud royalistické povstání přeroste v občanskou válku."
 SIA_facilitate_prajadhipoks_move_to_japan_tt: "Během občanské války nás podpoří 3 divize hraničářů z [JAP.GetNameDef]."
 SIA_the_kings_gambit: "Králův gambit"
 SIA_the_kings_gambit_desc: "Prajadhipok se má vrátit do Bangkoku s plným očekáváním, že ho režim zatkne. Tento čin poskytne royalistům rozhořčení, legitimitu a autoritu, které potřebují k odložení váhání a povstání v jeho jménu. Jakmile bude exilový král zadržen, bude dán signál a začne boj o [ROOT.GetName]."
 SIA_the_kings_gambit_tt: "Naše podpora bude záviset na tom, kolik klik máme na své straně."
 SIA_restore_order: "Obnovit pořádek"
 SIA_restore_order_desc: "Občanská válka je vyhrána, ale samotné vítězství království nevyléčí. Trosky musí být znovu vybudovány, stará garda uklidněna a správa obnovena, aby [ROOT.GetName] mohl vystoupit z nepořádku s korunou v bezpečí a veřejným životem navráceným do řádných kolejí."
 SIA_ananda_age_trigger_12: "Král Ananda má alespoň §Y12§! let (aktuálně §Y[?var:SIA_anandas_age]§!). Jeho narozeniny jsou 20. září"
 SIA_ananda_age_trigger_15: "Král Ananda má alespoň §Y15§! let (aktuálně §Y[?var:SIA_anandas_age]§!). Jeho narozeniny jsou 20. září"
 SIA_ananda_trait_tt: "Když Ananda nastoupí na trůn, získá: "
 SIA_to_forge_a_king: "Vykovat krále"
 SIA_to_forge_a_king_desc: "Král Ananda zůstává daleko ve Švýcarsku, dost mladý na to, aby se jeho mysl a charakter stále utvářely. Pokud budeme jeho studia pečlivě řídit, můžeme z něj vykovat nejen korunovanou loutku, ale vládce vhodného pro osud, který zamýšlíme pro [ROOT.GetNameDef]."
 SIA_to_forge_a_king_tt: "Budoucí král Ananda Mahidol je v současnosti mladý a studuje v [SWI.GetName]. Můžeme ovlivnit jeho budoucí studia a zájmy, aby se z něj stal velký král.\n\nKaždý rok v den jeho narozenin, dokud mu nebude 15 let, budeme moci vybrat zájem, který bude studovat, což mu po případném nástupu na trůn poskytne různé bonusy.\n\nJeho datum narození je 20. září a jeho věk je §Y[?var:SIA_anandas_age]§!"
 SIA_ascend_the_throne: "Nastoupit na trůn"
 SIA_ascend_the_throne_desc: "Roky regentství nemohou pokračovat věčně. Ananda je nyní dostatečně starý, aby sám převzal břemeno království, a jeho formální nástup na trůn umožní obnovené monarchii přejít z poručnictví a intrik do nové a legitimní vlády."
 SIA_the_provincial_council_of_state: "Zemská státní rada"
 SIA_the_provincial_council_of_state_desc: "Boje zanechávají státní aparát rozbitý a autoritu nejistou. Dokud mladý král Ananda nebude moci vládnout vlastním jménem, musí Zemská státní rada sloužit jako dočasná vláda a prohlásit, že loajalisté nebojují za sebe, nýbrž za obnovu zákonné monarchie."
 SIA_the_regency_of_boworadet: "Boworadejovo regentství"
 SIA_the_regency_of_boworadet_desc: "Princ Boworadej nese prestiž starého řádu a nikdo nemůže pochybovat, kde leží jeho loajalita. Jmenováním regentem v Anandově jménu svěříme stát do konzervativních rukou a dáme jasně najevo, že obnova má být víc než pouhá výměna ministrů."
 SIA_the_sacred_hierarchy: "Posvátná hierarchie"
 SIA_the_sacred_hierarchy_desc: "Boworadej zastává názor, že království je nejsilnější, když každý stav zná své místo a koruna stojí nad veškerou světskou ctižádostí. Monarchie, víra a přirozená hierarchie [ROOT.GetNameDef] musí být znovu považovány za posvátné pilíře, nikoli za relikvie určené k vyjednávání."
 SIA_the_regency_of_songsuradet: "Songsuradetovo regentství"
 SIA_the_regency_of_songsuradet_desc: "Songsuradet není žádný liberál, ale není ani slepý k potřebám moderního státu. Jako regent může zachovat královskou autoritu a zároveň svěřit budoucnost [ROOT.GetNameDef] disciplíně, plánování a vojensky vedenému programu národního rozvoje."
 SIA_order_discipline_and_unity: "Řád, disciplína a jednota"
 SIA_order_discipline_and_unity_desc: "Chaos frakční politiky a občanské války téměř zničil říši. Songsuradetova odpověď je jasná: řád ve vládě, disciplína ve společnosti a jednota v účelu, aby mohlo být království přetvořeno v silnější a modernější stát."
 SIA_the_regency_of_rangsit: "Rangsitovo regentství"
 SIA_the_regency_of_rangsit_desc: "Princ Rangsit chápe, že monarchie může přetrvat pouze tehdy, pokud se smíří se zastupitelskou vládou. Jeho regentství nabízí královskou obnovu, která je konzervativní v důstojnosti, ale demokratická ve způsobu a připravená dát [ROOT.GetNameDef] stabilní parlamentní budoucnost."
 SIA_constitutional_virtue: "Ústavní ctnost"
 SIA_constitutional_virtue_desc: "Monarchie, která respektuje zákon, se hůře svrhává a snáze brání. Pod Rangsitovým vedením obnovíme ústavní vládu, omezíme svévolnou moc a naučíme národ, že koruna je nejbezpečnější, když stojí jako strážkyně zákonné svobody."
 SIA_an_absolute_monarchy: "Absolutní monarchie"
 SIA_an_absolute_monarchy_desc: "Experiment omezené monarchie přinesl jen ponížení, puče a uchvácení královské autority ambiciózními důstojníky. Má-li trůn znovu vzbuzovat loajalitu, musí koruna obnovit své plné výsady a vládnout bez podřízenosti stranám či parlamentu."
 SIA_a_constitutional_monarchy: "Konstituční monarchie"
 SIA_a_constitutional_monarchy_desc: "Trůn nemusí ovládat stát, aby zachoval království. Obnovením monarchie v rámci trvalého ústavního uspořádání můžeme spojit korunu a lid a zajistit, že královská důstojnost bude existovat po boku odpovědné vlády."
 SIA_to_lay_the_bait: "Nastražit návnadu"
 SIA_to_lay_the_bait_tt: "Unikne nám zfalšovaný hospodářský plán, abychom popudili armádu.\nČím déle odložíme §Y$SIA_and_spring_the_trap$§!, tím větší bude odpor proti armádě a tím silnější poroste naše podpora.\n\n$SIA_dem_event_count_cw_scale_tt$\n\nPokaždé, když armáda kritizuje falešný návrh, naše podpora v občanské válce vzroste, až do maxima §Y75 %§! podpory v občanské válce. Dalších §Y25 %§! podpory v občanské válce lze získat z naší celkové demokratické podpory (škálováno od §Y0 %-100 %§!)"
 SIA_dem_event_count_cw_scale_tt: "§YAktuální předpokládaná podpora§!: §G[?var:SIA_dem_event_count_cw_scale|%]§!"
 SIA_to_lay_the_bait_desc: "Žlutý spis volá po hospodářské reformě, ale armáda jej označí za komunistický. Únikem zfalšovaného radikálního návrhu je nejprve vyprovokujeme k rozhořčení a poté je zdiskreditujeme, až bude zveřejněna skutečná, mírnější verze."
 SIA_and_spring_the_trap: "Sklapnout past"
 SIA_and_spring_the_trap_desc: "Generálové spolkli návnadu. Jejich rozhořčení se stalo vzpourou, jejich vzpoura odhalila jejich ambice a civilní vláda byla připravena. Nyní past sklapne a o budoucnosti [ROOT.GetName] rozhodnou ti, kdo jsou loajální ústavě."
 SIA_and_spring_the_trap_tt: "Pokud je naše celková podpora vyšší než §Y80 %§!, vyhneme se občanské válce a okamžitě sesadíme armádu."
 SIA_rebuild_the_war_torn_economy: "Obnovit válkou zničené hospodářství"
 SIA_rebuild_the_war_torn_economy_desc: "Občanská válka roztrhala silnice, továrny, rýžová pole i obchodní trasy. Obnova musí začít okamžitě. Mzdy, obilí, koleje a úvěry stabilizují [ROOT.GetName] více než jakýkoli projev z Bangkoku."
 SIA_end_military_grift: "Ukončit vojenskou korupci"
 SIA_end_military_grift_desc: "Příliš dlouho vojenské rozpočty živily soukromá bohatství, patronátní sítě a zbytečné prestižní projekty. Válka odhalila hnilobu. Každá zkorumpovaná smlouva, fiktivní jednotka a ukradená zásilka musí být vyšetřena a vytržena ze staré kliky."
 SIA_the_purge: "Čistka"
 SIA_the_purge_desc: "Vojenská klika zalila národ krví, než aby se podřídila civilní vládě. S vlastizrádci nemůže být kompromis. Důstojníci, kolaboranti a sympatizanti musí být odstraněni z každého velení, než budou moci stát znovu ohrozit."
 SIA_achieve_foreign_legitimacy: "Dosáhnout zahraniční legitimity"
 SIA_achieve_foreign_legitimacy_desc: "Cizí mocnosti sledovaly naši krizi s podezřením a čekaly, zda se Siam zhroutí do vlády junty nebo revoluce. Musíme prokázat, že civilní vláda je stabilní, zákonná a schopná bránit zemi."
 SIA_achieve_foreign_legitimacy_trigger: "Kterákoli velmoc má o nás názor vyšší než §Y75§!"
 SIA_countries_that_like_me_doctrine_tt: "§Y[?var:SIA_countries_that_like_me]x§! §G50%§! snížení nákladů na: §Ypozemní doktrínu§!"
 SIA_achieve_foreign_legitimacy_tt: "Získá §G[?var:SIA_achieve_foreign_legitimacy_base_stab_gain|%.0]§! stability za každou velmoc, která má o nás názor vyšší než §Y75§!.\n\nPokud se kvalifikují více než §Y3§! velmoci, získáme také §Y1x§! §G50%§! snížení nákladů na: §Ypozemní doktrínu§! za každou další kvalifikovanou velmoc nad tento limit.\n\nPokud se kvalifikuje §Y6§! nebo více velmocí, získáme §G+2§! §Ycivilní továrny§!."
 SIA_secure_the_state: "Zabezpečit stát"
 SIA_secure_the_state_desc: "Vítězství v občanské válce neznamená stabilitu. Železnice, přístavy, arzenály a komunikační uzly musí být zabezpečeny dříve, než se reakční důstojníci přeskupí. Bangkok musí zůstat klidný, propojený a pevně pod civilní kontrolou."
 SIA_expand_upon_the_dossier: "Rozšířit spis"
 SIA_expand_upon_the_dossier_desc: "Žlutý spis byl sepsán pro křehký okamžik. Ten okamžik pominul. S poraženou vojenskou klikou můžeme jít dál: hlubší pozemková reforma, silnější ochrana pracujících a stát schopný přetvářet Siam od základů."
 SIA_military_oversight_bureau: "Úřad vojenského dohledu"
 SIA_military_oversight_bureau_desc: "Armádě nesmí být dovoleno znovu se stát státem ve státě. Civilně vedený úřad dohledu bude sledovat jmenování, rozpočty a politickou činnost uvnitř ozbrojených sil a zajistí, že kasárna budou odpovídat Bangkoku, nikoli naopak."
 SIA_military_oversight_bureau_tt: "§YÚVD§! provádí vyšetřování generálů každých 5-9 měsíců. Během těchto období dotčení generálové působí se sníženou efektivitou, obezřetní vůči zvýšené kontrole."
 SIA_the_yellow_dossier: "Žlutý spis"
 SIA_the_yellow_dossier_desc: "Zfalšovaný radikální návrh splnil svou práci. Nyní lze zavést skutečný Žlutý spis: rozvážné reformy, hospodářskou modernizaci a politické pojistky navržené k prolomení vojenské dominance, aniž by byl národ vydán chaosu."
 SIA_achieve_domestic_legitimacy: "Dosáhnout domácí legitimity"
 SIA_achieve_domestic_legitimacy_desc: "Vláda přežila silou zbraní, ale nyní musí zvítězit zákonem, chlebem a pořádkem. Veřejná důvěra musí být obnovena, nouzová opatření ospravedlněna a lid musí vidět, že civilní vláda nabízí víc než pouhé přežití."
 SIA_achieve_domestic_legitimacy_tt: "§YSystém Khana Ratsadon§! bude deaktivován.\n§YArmáda§! bude trvale zneškodněna a všichni aktivní negativní duchové budou trvale odstraněni, zatímco pozitivní budou zachováni.\n\nKaždý duch civilního křídla se trvale změní na $idea_SIA_civilian_full_support$."
 SIA_allies_integration: "Integrace se Spojenci"
 SIA_allies_integration_desc: "Naše síly se musí naučit bojovat po boku Spojenců. Velitelské struktury, komunikace, zásobovací postupy a standardy vybavení musí být sladěny, než se Siam může stát víc než symbolickým partnerem."
 SIA_prepare_for_a_pacific_war: "Připravit se na válku v Pacifiku"
 SIA_prepare_for_a_pacific_war_desc: "Zraky impérií se obracejí k Pacifiku. Japonské ambice, evropské kolonie a spojenecká strategie ukazují na přicházející bouři. Siam se musí připravit dříve, než první výstřely dorazí k našim břehům."
 SIA_the_end_of_gunboat_diplomacy: "Konec diplomacie dělových člunů"
 SIA_the_end_of_gunboat_diplomacy_desc: "Už nikdy nebudou cizí válečné lodě diktovat podmínky od ústí řeky Chao Phraya. Siam musí mít děla, doky, doly a pobřežní obranu potřebné k tomu, aby každá hrozba proti Bangkoku byla činem šílenství."
 SIA_preemtive_strike: "Preventivní úder"
 SIA_preemtive_strike_desc: "Čekat, až si Japonsko zvolí hodinu války, by bylo pošetilé. Pokud se impérium chystá prodrat Asií, musí [SIA.GetName] udeřit dříve, než budou jeho armády a flotily plně vázány jinde."
 SIA_the_siamese_armada: "[SIA.GetAdjectiveCap] armada"
 SIA_the_siamese_armada_desc: "Moderní [SIA.GetName] vyžaduje moderní flotilu. S novými loděmi, vycvičenými posádkami a rozšířenou námořní infrastrukturou se [SIA.GetAdjective] armada stane silou schopnou bránit naše pobřeží a promítat moc za ně."
 SIA_asian_democratic_compact: "Asijský demokratický pakt"
 SIA_a_more_moderate_option: "Umírněnější možnost"
 SIA_a_more_moderate_option_desc: "Reforma musí přetrvat, ne vyhořet v bouři odporu. Udržením Žlutého spisu v umírněných mezích můžeme izolovat extremisty, uklidnit střední vrstvy a vybudovat civilní řád, který přežije své první vítězství."
 SIA_asian_democratic_compact_desc: "Asie se nemůže navždy spoléhat na vzdálená impéria nebo sliby velmocí. Demokratické národy regionu musí stát při sobě, bránit jeden druhého a dokázat, že nezávislost a svoboda mohou v Asii přežít."
 SIA_asian_democratic_compact_tt: "Odemkne možnost požadovat nezávislost pro asijské subjekty a umožní nám je pozvat do naší frakce."
 SIA_southeast_asia_joint_command: "Společné velení jihovýchodní Asie"
 SIA_southeast_asia_joint_command_desc: "Náš pakt se musí stát víc než diplomatickým slibem. Společné velení bude koordinovat strategii, zásobování, zpravodajství a obranné plánování napříč jihovýchodní Asií a promění oddělené armády ve společný štít."
 SIA_pan_asian_weapon_standardization: "Panasijská standardizace zbraní"
 SIA_pan_asian_weapon_standardization_desc: "Každý spojenec používající jiné pušky, ráže, rádia a vozidla je pozvánkou k logistickému selhání. Standardizované zbraně a sdílené výrobní plány učiní naši koalici silnější, levnější a rychleji vyzbrojenou."
 SIA_united_against_aggression: "Sjednoceni proti agresi"
 SIA_united_against_aggression_desc: "Žádný člen našeho paktu nebude stát sám. Ať už hrozba přichází od impéria, fašismu, militarismu nebo oportunistických sousedů, národy Asie odpoví společně."
 SIA_the_hammers_that_strike: "Kladiva, která udeří"
 SIA_the_hammers_that_strike_desc: "Naše aliance už není sbírkou malých států doufajících v přežití. Je zbraní. Každý národ je kladivem a společně udeříme proti každé moci, která se snaží ovládnout Asii."
 SIA_mobilize_the_defenders_of_siam: "Mobilizovat obránce Siamu"
 SIA_mobilize_the_defenders_of_siam_desc: "Stará armáda zklamala národ, ale Siam stále potřebuje obránce. Dobrovolníci, loajální důstojníci, provinční gardy a vlastenečtí občané musí být organizováni do síly, která bude chránit ústavu před nepřáteli uvnitř i vně."
 SIA_join_the_allies: "Připojit se ke Spojencům"
 SIA_join_the_allies_desc: "[ROOT.GetName] nemůže stát sám, zatímco svět pohlcuje válka. Spojenci nabízejí zbraně, uznání a místo mezi národy vzdorujícími agresi. Připojením k nim svážeme přežití Siamu s širším bojem za svobodný svět."
 SIA_the_malay_peninsular_defense_plan: "Obranný plán Malajského poloostrova"
 SIA_the_malay_peninsular_defense_plan_desc: "Pokud válka přijde do jihovýchodní Asie, Malajsko bude jedním z jejích prvních bojišť. Opevnění, zásobovací sklady a společné plánování s Brity promění poloostrov ve štít proti invazi."
 SIA_the_malay_peninsular_defense_plan_tt: "Postaví železnici mezi Bangkokem a Singapurem.\n\nKaždý vítězný bod v [MAL.GetName], Singapuru, [724.GetName], [289.GetName] a [1076.GetName]\nPřidá §G2§! §Ypobřežní pevnosti§!\nPřidá §G2§! §Ypozemní pevnosti§!\nKaždý z těchto států:\nPřidá §G1§! §Ystatickou protileteckou obranu§!"
 SIA_join_the_united_front: "Připojit se ke Sjednocené frontě"
 SIA_join_the_united_front_desc: "Čína krvácí pod [JAP.GetAdjective] agresí, a přesto stále bojuje. Připojením ke Sjednocené frontě může [SIA.GetName] pomoci proměnit pozemní válku v pohřebiště imperiálních ambicí."
 SIA_a_land_war_in_asia_desc: "Válka nebude vyhrána pouhými prohlášeními. Siamští vojáci musí pochodovat, bojovat a vydržet napříč obtížným terénem Asie. Náš závazek ke Sjednocené frontě musí být měřen činy."
 SIA_death_to_the_communists: "Smrt komunistům"
 SIA_death_to_the_communists_desc: "Porážka vojenské kliky nesmí otevřít dveře jiné tyranii. Komunističtí agitátoři věří, že krize oslabila stát. Brzy poznají, že civilní demokracie není bezbranná."
 SIA_death_to_the_nationalists: "Smrt nacionalistům"
 SIA_death_to_the_nationalists_desc: "Japonsko bylo zatlačeno zpět, ale otázka budoucnosti Asie zůstává. Starý nacionalistický řád jen nahradí jednu hierarchii druhou. Má-li být Asie přetvořena, musí zvítězit komunisté."
 SIA_a_new_dawn_over_asia: "Nový úsvit nad Asií"
 SIA_a_new_dawn_over_asia_desc: "Japonské impérium padlo a zkorumpované síly, které chtěly zdědit jeho trosky, byly smeteny stranou. Napříč Asií vychází nový úsvit nad národy odhodlanými budovat svou budoucnost bez imperiální nadvlády."
 SIA_phibuns_premiership: "Phibunovo premiérství"
 SIA_phibuns_premiership_desc: "S koncem premiérství [SIA_phraya_phahon.GetName] je stranou vybraný nástupce Plaek Phibunsongkhram připraven převzít moc. To značně potěší vojenské křídlo v jeho vztahu k nám, ale civilní křídlo to naplní úzkostí.\nPro nás existuje v tomto novém věku jen jedna cesta vpřed: s velkým přesvědčením!"
 SIA_siamese_youth_movement: "[THIS.GetAdjectiveCap] hnutí mládeže"
 SIA_siamese_youth_movement_desc: "Mladí dospělí země [THIS.GetName] musí být zakaleni jako ocel nad žhavým plamenem. Naučí se respektovat stát, bránit vlast a stát se hodnotnými členy thajské společnosti."
 SIA_territorial_defense_student: "Student územní obrany"
 SIA_territorial_defense_student_desc: "Rozšířením hnutí mládeže lze nejslibnější kandidáty přesunout do juniorských vojenských výcvikových táborů, kde budou pomáhat s obranou [SIA.GetNameDef]. Dostanou řádný vojenský výcvik a budou sloužit jako další nástroj, který armáda může využít."
 SIA_expand_domestic_arms_workshops: "Rozšířit domácí zbrojní dílny"
 SIA_expand_domestic_arms_workshops_desc: "Naše domácí schopnost vyrábět válečný materiál je žalostně pozadu za ostatními vyspělými zeměmi. Musíme se zaměřit na rozšíření vojenské výroby na domácí půdě, abychom zajistili, že naše síly budou neustále dostávat nové vybavení."
 SIA_look_to_european_fascism: "Vzhlédnout k evropskému fašismu"
 SIA_look_to_european_fascism_desc: "Máme příležitost reformovat tuto zemi, oproštěni od minulosti budeme hledět k nové budoucnosti inspirované tím, co se děje na Západě. Je jasné, že starý světový řád je rozebírán a ti, kdo zůstanou pozadu, ponesou následky svého nedostatku vize."
 SIA_the_songsuradet_rebellion: "Songsuradetova vzpoura"
 SIA_the_songsuradet_rebellion_desc: "Vyšší důstojník Phraya Songsuradet je hrozbou pro současný režim, pokud si to bude přát. Toto nebezpečí pro režim nemůže trvat a jako hlavní protivník Phibuna musí odejít.\nNepochybně existuje dost škodlivého materiálu, který lze použít proti Songsuradetovi a jeho stoupencům, což by nám pomohlo upevnit moc a odstranit domácí protivníky."
 SIA_the_songsuradet_rebellion_historical_tt: "Generál Phraya Songsuradet bude obviněn ze spiknutí proti státu. On a poradce §Y[SIA_rangsit_prayurasakdi.GetName]§! budou očištěni.\n\nZískáme\n"
 SIA_the_songsuradet_rebellion_historical_tt2: "Po vypršení získá: "
 SIA_the_songsuradet_rebellion_historical_tt3: "na §Y[?var:SIA_purged_military_timer]§! dní"
 SIA_the_songsuradet_rebellion_alt_tt: "Generál Phraya Songsuradet bude obviněn ze spiknutí proti státu.\n\nProtože jsme však posílili jeho vojenskou kliku, může se cítit povzbuzen a odmítnout předvolání, což povede k patové situaci nebo případně k občanské válce."
 SIA_sue_the_king_in_exile: "Zažalovat krále v exilu"
 SIA_sue_the_king_in_exile_desc: "O králi v exilu se říká, že si s sebou do [ENG.GetNameDefCap] vzal mnoho cenností. Měli bychom je získat zpět, a pokud toho dosáhneme žalobou na něj a jeho manželku, budiž."
 SIA_suspend_ordinary_legal_procedures: "Pozastavit běžné právní postupy"
 SIA_suspend_ordinary_legal_procedures_desc: "Songsuradetova vzpoura nám poskytuje příležitost zavést rozsáhlé reformy ve jménu národní bezpečnosti. Kontroly a protiváhy držené soudy a dalšími politickými orgány budou zneškodněny, což nám poskytne čas potřebný k centralizaci moci."
 SIA_the_duty_of_the_thai_people_during_the_war_act: "Zákon o povinnosti thajského lidu za války"
 SIA_the_duty_of_the_thai_people_during_the_war_act_desc: "$idea_SIA_cemented_control_3_desc$"
 SIA_recognize_manchukuo: "Uznat Mandžukuo"
 SIA_recognize_manchukuo_desc: "TODO_CM"
 SIA_press_censorship: "Cenzura tisku"
 SIA_press_censorship_desc: "Svobodný tisk riskuje podrývání stability státu. Ačkoli musí existovat určitá volnost, musíme zajistit, aby hlas a vůle vlády byly v médiích upřednostněny."
 SIA_department_of_publicity: "Odbor publicity"
 SIA_department_of_publicity_desc: "Propagandistická mašinérie je nezbytná pro každý stát, zejména pro takový, jako je náš, s územními ambicemi. Financování odboru publicity nám umožní toho dosáhnout."
 SIA_thai_cultural_mandates: "Thajské kulturní mandáty"
 SIA_thai_cultural_mandates_desc: "Můžeme povzbudit thajský lid a vybudovat silnou národní kulturu vydáváním mandátů, posilováním jednoty lidu a kováním sjednocené identity."
 SIA_thai_cultural_mandates_tt: "Odemkne rozhodnutí k zavádění kulturních mandátů, poskytujících různé bonusy za cenu §Ypolitické síly§!. První mandát a první další mandát jsou zdarma."
 SIA_relocate_the_capital_to_phetchabun: "Přesunout hlavní město do Phetchabunu"
 SIA_relocate_the_capital_to_phetchabun_desc: "Vláda je ohrožena! Jak historie prokázala, Bangkok je zranitelný vůči námořním útokům, a ačkoli to jistě bude nepopulární rozhodnutí, přesun hlavního města dále do vnitrozemí je rozhodnutí, které musí být učiněno."
 SIA_relocate_the_capital_to_phetchabun_tt: "Přesune až §G3§! §Yvojenské továrny§! z §Y[1076.GetName]§! do §Y[1077.GetName]§!\nPřesune §G3§! §Ycivilní továrny§! z §Y[1076.GetName]§! do §Y[1077.GetName]§!\nPostaví pevnosti úrovně §G3§! kolem Phetchabunu"
 SIA_relocate_the_capital_to_phetchabun_tt2: "Po vypršení duchů - získá základní stabilitu: §R-25 %§!"
 SIA_radio_propaganda: "Rozhlasová propaganda"
 SIA_radio_propaganda_desc: "Rozhlas se stává oporou s tím, jak [SIA.GetName] elektrifikuje, a stejně jako musíme mít pevný dohled nad tiskem, musíme mít pevný dohled i nad tím, co se vysílá."
 SIA_sala_chaloem_thai_movie_theater: "Kino Sala Chaloem Thai"
 SIA_sala_chaloem_thai_movie_theater_tt: "Odemkne rozhodnutí k tvorbě propagandistických filmů, poskytujících různé bonusy. Například:\n"
 SIA_sala_chaloem_thai_movie_theater_desc: "Filmy jsou v naší zemi novým médiem, ale jejich potenciál je zřejmý všem. Stejně jako básně, knihy a rozhlas mohou naplnit srdce i mysl prostých lidí i elity. Využitím tohoto média můžeme posílit odhodlání občanů vidět vzestup velkého [SIA.GetName]."
 SIA_pan_thaiism: "Panthajismus"
 SIA_pan_thaiism_desc: "Nestačí, aby [ROOT.GetName] pouze žil; musí vzkvétat. Budoucnost [ROOT.GetAdjective] lidu nespočívá v pouhém smíření se s postavením státu třetího řádu, ale v aktivním hráči světového dění. Nejprve je třeba povzbudit srdce a mysl lidu proti imperialistům, kteří odňali to, co nám kdysi patřilo, a připomenout lidem, co nám bylo vzato."
 vichy_exist_trigger: "§YVichistická Francie§! existuje"
 vichy_exist_not_trigger: "§YVichistická Francie§! neexistuje"
 SIA_retake_lost_british_states: "Znovu získat ztracené britské státy"
 SIA_retake_lost_british_states_tt: "Odemkne možnost zahájit omezené války proti britským územím v §YBarmě§! a §YMalajsii§!"
 INS_retake_lost_british_states_tt: "Odemkne možnost zahájit omezené války proti britským územím v §YMalajsii§!"
 SIA_retake_lost_british_states_desc: "Naše velké království nerozdělili jen [FRA.GetAdjective], ale také [ENG.GetAdjective], kteří vedeni ctižádostí rovněž využili každé příležitosti k získání svého dílu. Jakmile je jejich pozornost upřena na větší soupeře, nadešel čas jednat."
 SIA_recover_indochina: "Znovu získat Indočínu"
 SIA_recover_indochina_desc: "Minulé století vidělo naši zemi rozdrobenou [FRA.GetAdjective], vládou z druhého konce světa, která nám nemá co říkat, co máme dělat nebo jak máme žít, a přesto nám dělovými čluny a zbraněmi vzala to, co bylo naše. V tomto století moc [FRA.GetAdjecive] slábne; toto století je naše."
 SIA_recover_indochina_tt: "Odemkne možnost zahájit omezené války proti územím §YIndočína§!"
 SIA_demand_the_return_of_lost_territory: "Požadovat návrat ztracených území"
 SIA_demand_the_return_of_lost_territory_desc: "[FRA.GetNameDefCap] ukázala svou slabost, je jen papírovým tygrem lpícím na jakémkoli blednoucím vlivu, který jí ještě zbývá. S kolapsem jejích ozbrojených sil už nedokáže promítat sílu, kterou kdysi měla, a není v pozici, aby odporovala našim požadavkům."
 SIA_demand_the_return_of_lost_territory_tt: "Požádáme vlastníky §YIndočína§! a částí §Y[MAL.GetName]§!, aby nám vrátili §Y[1069.Getname]§!, §Y[1067.Getname]§!, §Y[741.Getname]§!, §Y[1068.Getname]§!, §Y[1061.Getname]§!, §Y[1064.Getname]§!, §Y[1065.Getname]§! a §Y[670.Getname]§!.\n\nOvlivňující faktory:\n-Bojová síla alespoň 30 % ve srovnání s vlastníkem\n-Vlastník je ve válce s velmocí\n-Vlastník není ve frakci\n-Vlastník je §YVichistická Francie§!\n-Jsme ve frakci\n-Vlastník nás nemá rád"
 SIA_the_greater_thai_empire: "Velká thajská říše"
 SIA_the_greater_thai_empire_available_trigger: "§Y[ROOT.GetName]§! ovládá každý indočínský stát\nPoslušnost všech indočínských států je vyšší než: §Y[?var:SIA_greater_thai_empire_compliance_requirement]%§!"
 SIA_the_greater_thai_empire_desc: "Hodina našeho vzestupu je na dosah. Co bylo kdysi vzato, bylo obnoveno, a s lidem uznávajícím nás jako faktickou autoritu jsme pevně ustavili svou legitimitu jako právoplatní vůdci obnovené Velké thajské říše."
 SIA_crack_down_of_foreign_merchants: "Potlačit zahraniční obchodníky"
 SIA_crack_down_of_foreign_merchants_desc: "Obchod byl dlouho formován vnějšími zájmy, což vytvářelo zranitelnosti, které mohou ovlivnit naši národní odolnost. Abychom ochránili svou hospodářskou bezpečnost, musíme být schopni ovládat vlastní obchod a zajistit, že prosperita a stabilita budou vybudovány na základech, které sami kontrolujeme."
 SIA_royal_palace_bureau_directive_no_1523: "Směrnice Úřadu král. paláce č. 1523"
 SIA_royal_palace_bureau_directive_no_1523_desc: "S přívalem nacionalismu v zemi se i koruna postavila na podporu vlády a žádá každého člena královského paláce, aby věnoval 10 % svého příjmu na nákup modernizovaných zbraní."
 SIA_new_territories_administration: "Správa nových území"
 SIA_new_territories_administration_tt: "Odemkne rozhodnutí ke správě §Yindočínských§! území, poskytující zvýšenou poslušnost, průmysl a opevnění."
 SIA_new_territories_administration_desc: "Znovuzískání našich ztracených území je teprve začátek. Musíme těm, kdo tam žijí, ukázat, že jsme lepší volbou. Bude proveden komplexní program ke zvýšení životní úrovně pro všechny, aby se každý občan cítil rovnocenný v tomto novém větším [ROOT.GetName]."
 SIA_new_territories_administration_available_trigger: "Jakýkoli stát v §YIndočíně§!\n   Je ovládán §Y[ROOT.GetName]§!"
 SIA_industrialization_drive: "Industrializační úsilí"
 SIA_industrialization_drive_desc: "Po generace spočívalo bohatství [ROOT.GetName] v rýžových polích a venkovských vesnicích. Moderní svět však není formován pluhem, ale továrnou a strojem. Chceme-li zachovat svou nezávislost mezi velmocemi, musíme proměnit své agrární království v průmyslový národ."
 SIA_industrialization_drive_trigger: "§YKhana Ratsadon§! je aktivní"
 SIA_asian_financial_compact: "Asijský finanční pakt"
 SIA_asian_financial_compact_desc: "Evropský kapitál stále ovládá velkou část asijského obchodu, což naši ekonomiku vystavuje zahraničnímu nátlaku. Hledáním užších finančních uspořádání se sousedy můžeme rozšířit přístup k úvěrům, trhům a investicím, aniž bychom se vzdali své nezávislosti."
 SIA_revision_of_unequal_treaties: "Revize nerovných smluv"
 SIA_revision_of_unequal_treaties_desc: "Staré dohody podepsané ze slabosti stále dávají zahraničním zájmům výsady, které žádný moderní stát nesmí tolerovat. Musíme tyto nerovné smlouvy revidovat a obnovit plnou autoritu [ROOT.GetNameDef] nad jeho obchodem, soudy a koncesemi."
 SIA_renegotiate_teak_control: "Přehodnotit kontrolu nad teakem"
 SIA_renegotiate_teak_control_desc: "Naše severní lesy obohacují koncesionáře, zatímco státu se vrací příliš málo. Přehodnocením kontroly nad teakem můžeme znovu získat příjmy, regulovat těžbu a zajistit, že siamské dřevo bude sloužit siamskému rozvoji."
 SIA_a_fledgling_tobacco_industry: "Rodící se tabákový průmysl"
 SIA_a_fledgling_tobacco_industry_desc: "Tabák zůstává drobným obchodem, rozptýleným a špatně organizovaným. Se skromnou ochranou a opatrnými investicemi se tato malá plodina může stát spolehlivým zdrojem spotřebních daní, venkovských příjmů a tovární práce."
 SIA_a_fledgling_tobacco_industry_tt: "Být na §Y$limited_exports$§! nebo §Y$closed_economy$§! nám poskytne dodatečnou §Ycivilní továrnu§!"
 SIA_all_weather_roads: "Silnice za každého počasí"
 SIA_all_weather_roads_desc: "Příliš mnoho silnic mizí s dešti a nechává provincie odříznuté od hlavního města a trhů. Síť silnic za každého počasí spojí království dohromady a umožní zboží i vojákům pohybovat se v každém ročním období."
 SIA_the_bank_of_siam: "Bank of Siam"
 SIA_the_bank_of_siam_desc: "Průmyslový růst nemůže pokračovat jen na základě zvyku a soukromé přízně. Silnější národní banka dá státu větší kontrolu nad úvěry, měnou a oběhem kapitálu."
 SIA_thai_rice_company: "Thai Rice Company"
 SIA_thai_rice_company_desc: "Rýže zůstává životní krví [ROOT.GetName], ale příliš mnoho jejího obchodu je roztříštěné, spekulativní a zranitelné vůči zahraničnímu tlaku. Národní rýžová společnost umožní státu řídit vývoz, stabilizovat ceny a proměnit sklizeň našich rýžových polí v pevnější základ národní síly."
 SIA_uk_japan_focus_tt: "Což umožňuje volbu mezi [ENG.GetNameDef] a [JAP.GetNameDef] s následujícími účinky:\n\n§Y[ENG.GetFlag][ENG.GetNameDefCap]§!:"
 SIA_japan_option_tt: "§Y[JAP.GetFlag][JAP.GetNameDefCap]§!"
 SIA_send_bureaucrats_abroad: "Vyslat byrokraty do zahraničí"
 SIA_send_bureaucrats_abroad_desc: "Jiné národy již vybudovaly ministerstva, školy a technické služby, které nyní potřebujeme. Vysláním nadějných úředníků do zahraničí můžeme dovézt správní zkušenosti, aniž bychom dováželi cizí vládu."
 SIA_baht_stabilization_act: "Zákon o stabilizaci bahtu"
 SIA_baht_stabilization_act_desc: "Moderní ekonomika vyžaduje měnu, jíž obchodníci důvěřují a investoři ji přijímají. Stabilizace bahtu sníží nejistotu v obchodu a dá [ROOT.GetNameDef] pevnější oporu na mezinárodním trhu."
 SIA_siamese_development_cooperative: "Siamské rozvojové družstvo"
 SIA_siamese_development_cooperative_desc: "Soukromý kapitál je opatrný a stát nemůže postavit vše sám. Národní rozvojové družstvo umožní úředníkům, obchodníkům a pozemkovým vlastníkům sdružit zdroje pro projekty sloužící společné ekonomice."
 SIA_boon_rawd_brewery: "Boon Rawd Brewery"
 SIA_boon_rawd_brewery_desc: "Domácí pivovarnický průmysl je víc než otázkou spotřeby. Podniky jako Boon Rawd ukazují, že siamský kapitál, stroje a řízení dokážou vytvořit moderní průmysl na siamské půdě."
 SIA_national_savings_bond: "Národní spořicí dluhopis"
 SIA_national_savings_bond_desc: "Bohatství národa nesmí ležet ladem v trezorech a ozdobách, zatímco silnice a továrny zůstávají nepostavené. Národní spořicí dluhopis promění soukromou šetrnost ve veřejnou investici."
 SIA_national_savings_bond_tt: "Získá ducha $SIA_national_savings_bond$, jehož síla se škáluje podle vašeho §Yzákona o odvodech§!. Čím nižší je váš zákon o odvodech, tím silnější pozitivní účinky jsou, zatímco čím vyšší je, tím horší to bude.\n\nPři §Y$disarmed_nation$§! získá: "
 SIA_national_savings_bond_scraping_the_barrel: "Při §Y$scraping_the_barrel$§! získá:"
 SIA_national_savings_bond_volunteer_only: "Při §Y$volunteer_only$§! získá:"
 SIA_national_savings_bond_limited_conscription: "Při §Y$limited_conscription$§! získá:"
 SIA_national_savings_bond_extensive_conscription: "Při §Y$extensive_conscription$§! získá:"
 SIA_national_savings_bond_service_by_requirement: "Při §Y$service_by_requirement$§! získá:"
 SIA_national_savings_bond_all_adult_serve: "Při §Y$all_adults_serve$§! získá:"
 SIA_national_savings_bond_current: "Náš současný zákon o mobilizaci by nám poskytl: "
 SIA_deficit_spending: "Deficitní výdaje"
 SIA_deficit_spending_desc: "Ortodoxní účetnictví nevybuduje moderní ekonomiku včas, aby čelila nebezpečnému světu. Stát musí být ochoten utrácet nad rámec současných příjmů a pomocí veřejných prací a zakázek uvést průmyslový růst do pohybu."
 SIA_deficit_spending_tt: "Po vypršení ducha získá: "
 SIA_acquire_light_tools: "Získat lehké nástroje"
 SIA_acquire_light_tools_desc: "Než budeme moci vyrábět velké stroje, musíme nejprve ovládnout skromné nástroje průmyslu. Dovoz lehkého nářadí a dílenského vybavení umožní množit malé továrny a opravárenské dílny napříč [ROOT.GetName]."
 SIA_railway_and_port_extensions: "Rozšíření železnic a přístavů"
 SIA_railway_and_port_extensions_desc: "Rýže, dřevo a cín jsou bezcenné, pokud se nedostanou na trh. Rozšíření železnic a přístavů vtáhne provincie do národního obchodu a spojí [ROOT.GetNameDef] se širším světem."
 SIA_mechanization_of_agriculture: "Mechanizace zemědělství"
 SIA_mechanization_of_agriculture_desc: "Příliš mnoho práce zůstává svázáno s tradičním obděláváním a přináší jen malý přebytek pro průmysl. Zavedením moderních nástrojů a strojů na venkov můžeme zvýšit produkci a uvolnit ruce pro továrny."
 SIA_irrigation: "Zavlažování"
 SIA_irrigation_desc: "Osud rolníka stále stoupá a klesá s povodní a suchem. Širší zavlažovací systém stabilizuje sklizně, rozšíří obdělávanou půdu a učiní venkov pevnějším základem národního rozvoje."
 SIA_siam_cement_group: "[ROOT.GetName] Cement Group"
 SIA_siam_cement_group_desc: "[ROOT.GetName] Cement Group, založená pod královskou patronací, stojí jako jeden z nejvýznamnějších průmyslových podniků [ROOT.GetNameDef]. Cílenými investicemi a vládní podporou lze společnost proměnit z domácího dodavatele v základní kámen širší průmyslové kapacity - doslova pokládající základy budoucnosti národa."
 SIA_chemical_imports: "Dovoz chemikálií"
 SIA_chemical_imports_desc: "Moderní zemědělství i průmysl závisí na sloučeninách, které dosud nevyrábíme v dostatečném množství. Dovoz chemikálií zajistí hnojiva, léky, barviva a výbušniny, dokud se toho neujme domácí průmysl."
 SIA_chemical_imports_tt: "Přidá §G+1§! mimo-mapovou §Ycivilní továrnu§!, pokud je názor nad §Y[?var:ROOT.SIA_chemical_imports_opinion_threshold]§! při dokončení tohoto zaměření."
 INS_chemical_imports_stolen_tt: "Přidá §G[?var:ROOT.INS_guns_from_seek_help_focus]§! jednotek pěchotního vybavení, pokud je názor nad §Y75§! při dokončení tohoto zaměření."
 SIA_foreign_currency_exchange: "Směna zahraničních měn"
 SIA_foreign_currency_exchange_desc: "Industrializace vyžaduje zahraniční stroje, léky a palivo, avšak ty lze kupovat pouze za vzácné devizy. Kontrolovaný systém směny měn nasměruje zahraniční prostředky do průmyslů nejdůležitějších pro stát."
 SIA_farmers_into_the_city: "Rolníci do měst"
 SIA_farmers_into_the_city_desc: "Moderní ekonomika nemůže být udržena pouze vesnickou prací. Jak se průmysl rozšiřuje, stát musí podporovat spořádanou migraci z rýžových polí do měst, kde může vzniknout nová městská pracovní síla."
 SIA_textile_mills: "Textilní továrny"
 SIA_textile_mills_desc: "Látka je každodenní nutností, přesto se jí příliš mnoho tká v zahraničí a prodává zpět nám. Textilní továrny nahradí dovážené zboží, zaměstnají městskou pracovní sílu a dají [ROOT.GetNameDef] jedno ze základních odvětví moderního života."
 SIA_public_credit: "Veřejný úvěr"
 SIA_public_credit_desc: "Obchodníci, pěstitelé i výrobci jsou omezováni omezeným přístupem ke kapitálu. Rozšířením veřejného úvěru může vláda půjčovat tam, kde soukromé finance váhají, a tlačit rozvoj do opomíjených sektorů."
 SIA_public_credit_trigger: "$idea_SIA_public_credit_debt$ je aktivní alespoň §Y180 dní§!"
 SIA_a_modern_economy: "Moderní ekonomika"
 SIA_a_modern_economy_desc: "Starý agrární řád nezmizí za jediný den, ale už nemůže určovat budoucnost [ROOT.GetNameDef]. S bankami, školami, továrnami a infrastrukturou, které se nyní formují, začínáme budovat ekonomiku hodnou nezávislého moderního národa."
 SIA_reduction_of_agricultural_yield_taxes: "Snížení daní ze zemědělského výnosu"
 SIA_reduction_of_agricultural_yield_taxes_tt: "Každý měsíc sníží §Yspotřební zboží§! z $idea_SIA_agricultural_tax_reduction$ o §Y[?var:SIA_agricultural_tax_reduction_cg_decrease_rate|%]§! a každý měsíc zvýší §Ystabilitu§! o §Y[?var:SIA_agricultural_tax_reduction_stability_gain|%]§!, dokud postih §Yspotřebního zboží§! nedosáhne §Y0 %§!"
 SIA_reduction_of_agricultural_yield_taxes_desc: "Od rolnictva nelze žádat, aby živilo království, financovalo stát a snášelo každou strázeň bez úlevy. Snížením daní ze zemědělského výnosu ponecháme na venkově více přebytku, posílíme loajalitu pěstitelů a podpoříme větší produkci z půdy."
 SIA_fuel_oil_act: "Zákon o topném oleji"
 SIA_fuel_oil_act_desc: "Moderní doprava, průmysl i obrana závisí na palivu, avšak přístup k němu může být ve válce uškrcen. Zákon o topném oleji dá spotřebu, skladování a nouzové přidělování pod pevnější státní dohled, aby vzácné zásoby nebyly plýtvány."
 SIA_siam_electricity_company: "Siam Electricity Company"
 SIA_siam_electricity_company_desc: "Žádná ekonomika nemůže snést moderní zátěž bez spolehlivé energie. Posílením Siam Electricity Company můžeme rozšířit výrobu, zlepšit koordinaci a zajistit, že dílny, sklady a města zůstanou zásobeny i v nepřízni."
 SIA_revise_the_taxation_system: "Revidovat daňový systém"
 SIA_revise_the_taxation_system_desc: "Současná daňová struktura dostatečně neslouží státu připravujícímu se na útrapy a soběstačnost. Revidovaný systém bude vybírat příjmy rovnoměrněji, omezí plýtvání a s větší disciplínou nasměruje břemeno národní obrany a rozvoje."
 SIA_census_the_hill_tribes: "Sečíst horské kmeny"
 SIA_census_the_hill_tribes_desc: "Vysočiny zůstávají mimo plný dosah správy, zdanění a zásobování. Řádné sčítání poskytne vládě znalosti potřebné k účinnější správě těchto regionů a začlenění jejich lidí a zdrojů do širšího života národa."
 SIA_increase_rice_exports: "Zvýšit vývoz rýže"
 SIA_increase_rice_exports_desc: "Rýže je nejjistějším zdrojem zahraničních příjmů dostupným [ROOT.GetNameDef]. Rozšířením vývozu, dokud trhy zůstávají otevřené, můžeme vybudovat rezervy, financovat strategický dovoz a připravit státní pokladnu na narušení, která mohou přijít."
 SIA_pad_thai: "Pad Thai"
 SIA_pad_thai_desc: "Moderní národ je udržován nejen ministerstvy a továrnami, ale i společnými zvyky, které lid spojují. Podporou národního rýžového pokrmu ze siamských surovin podporujeme domácí spotřebu, naše rolníky a snižujeme závislost na cizích potravinách v nejistých časech."
 SIA_rice_husk_steam_turbines: "Parní turbíny na rýžové slupky"
 SIA_rice_husk_steam_turbines_desc: "Co cizinec považuje za odpad, to nás nutnost učí oceňovat. Spalováním rýžových slupek pro výrobu páry můžeme získávat energii z vlastních sklizní a snížit závislost na dováženém uhlí a ropě."
 SIA_domestic_tin_smelters: "Domácí cínové hutě"
 SIA_domestic_tin_smelters_desc: "Už nestačí jen kopat rudu ze země a posílat ji do zahraničí. Vybudováním domácích cínových hutí si doma ponecháme větší část hodnoty našich zdrojů a zajistíme průmyslový kov nezbytný pro obchod i válku."
 SIA_use_ships_as_generators: "Využít lodě jako generátory"
 SIA_use_ships_as_generators_tt: "Umístění námi vlastněných §Yhlavních lodí§! v §Ypřístavech domovských států§! nám poskytne bonus §G-2 %§! ke spotřebě energie továren za každou §Yhlavní loď§!, až do celkových §G-15 %§!.\n\nOdplutí těchto lodí z přístavu sníží bonus o stejnou hodnotu a lze jej znovu získat jejich opětovným umístěním v přístavu."
 SIA_use_ships_as_generators_desc: "I starší plavidla mohou stále sloužit národu, když už nejsou vhodná pro boj či obchod. Zakotvením lodí jako plovoucích elektráren můžeme poskytnout nouzovou elektřinu přístavům a pobřežnímu průmyslu a zároveň šetřit vzácné palivo i infrastrukturu."
 SIA_diversity_foreign_reserves: "Diverzifikovat devizové rezervy"
 SIA_diversity_foreign_reserves_desc: "Pro [ROOT.GetNameDef] je nebezpečné vkládat finanční bezpečí do měny nebo úvěru jediné zahraniční mocnosti. Diverzifikací rezerv snížíme riziko vnějších otřesů a zachováme si větší volnost jednání v obchodu a diplomacii."
 SIA_diversity_foreign_reserves_tt: "Přidá dodatečné §G2§! mimo-mapové §Yvojenské továrny§! při vstupu do války.\nPřidá produkci §G8§! oceli v náhodném domovském státě při vstupu do války."
 SIA_exclusivity_resource_contract: "Výhradní smlouva na zdroje"
 SIA_exclusivity_resource_contract_desc: "Jediný zahraniční partner nabízí kapitál a zaručené nákupy výměnou za privilegovaný přístup k našim zdrojům. Taková výhradní smlouva může urychlit rozvoj, ale váže část budoucnosti [ROOT.GetNameDef] k apetitu jiného národa."
 SIA_maintain_resource_independence: "Zachovat nezávislost ve zdrojích"
 SIA_maintain_resource_independence_desc: "Zahraniční smlouvy mohou přinést rychlé zisky, ale závislost je následuje těsně v patách. Udržením kontroly nad svými zdroji si zachováme svobodu směrovat je podle siamských potřeb, nikoli cizích požadavků."
 SIA_kasetsart_university: "Univerzita Kasetsart"
 SIA_kasetsart_university_desc: "Má-li být zemědělství produktivnější, musí být vedeno vědou, nikoli jen dědictvím. Univerzita Kasetsart bude školit agronomy, veterináře a technické odborníky pro modernizaci půdy."
 SIA_mahidol_university: "Univerzita Mahidol"
 SIA_mahidol_university_desc: "Moderní stát potřebuje lékaře, výzkumníky a správce stejně jistě jako vojáky a inženýry. Univerzita Mahidol posílí vyšší vzdělání a poskytne vyškolené mysli potřebné pro národní reformu."
 SIA_silpakorn_university: "Univerzita Silpakorn"
 SIA_silpakorn_university_desc: "TODO_CM"
 SIA_contingency_funds: "Nouzové fondy"
 SIA_contingency_funds_desc: "Prosperita v míru má malou hodnotu, pokud stát vstoupí do krize nepřipraven. Odložením nouzových fondů nyní zajistíme, že blokáda, neúroda nebo náhlá válka okamžitě nezastaví chod vládního aparátu."
 SIA_contingency_funds_tt: "Během míru budeme shromažďovat nouzový fond. Při shromažďování tohoto fondu získáme mírné množství §Yfaktoru spotřebního zboží§!.\n\nBěhem války můžeme tento fond podle své volby uvolnit a získat velký výrobní bonus.\nDoba trvání fondu závisí na tom, jak dlouho jsme jej shromažďovali před uvolněním."
 SIA_prepare_for_the_next_blockade: "Připravit se na další blokádu"
 SIA_prepare_for_the_next_blockade_desc: "Pokud se moře stanou nepřátelskými, [ROOT.GetNameDef] může zjistit, že je odříznut od trhů, strojů a paliva. Musíme se proto na další blokádu připravit již nyní budováním zásob, nouzových plánů a náhrad dříve, než nás k tomu donutí nutnost."
 SIA_domestic_arms_industry: "Domácí zbrojní průmysl"
 SIA_domestic_arms_industry_desc: "Království, které musí dovážet každou pušku a granát, se nemůže nazývat bezpečným. Jakkoli skromné budou jeho začátky, domácí zbrojní průmysl umožní [ROOT.GetNameDef] vyzbrojovat vojáky z vlastních dílen a vydržet, když selžou zahraniční dodávky."
 SIA_war_material_substitutions: "Náhrady válečného materiálu"
 SIA_war_material_substitutions_desc: "V době blokády je dokonalý materiál méně cenný než dostupný. Musíme studovat náhrady kovů, chemikálií a dovážených součástek, aby výroba mohla pokračovat i tehdy, když cizí zboží přestane přicházet k našim břehům."
 SIA_royal_thai_ordnance_factory: "Královská thajská zbrojovka"
 SIA_royal_thai_ordnance_factory_desc: "Bezpečný stát vyžaduje víc než dovážené zbraně a rozptýlené opravárenské dílny. Královská thajská zbrojovka soustředí dovednosti, stroje a dohled pod korunu a dá [ROOT.GetNameDef] trvalé centrum pro výrobu zbraní a munice."
 SIA_built_to_withstand_every_flame: "...aby odolalo každému plameni"
 SIA_built_to_withstand_every_flame_desc: "Továrna, která shoří za jednu noc, nemůže ráno sloužit národu. Naše sklady, mlýny a dílny musí být stavěny s ohledem na rozptýlení, ohnivzdornost a nouzovou ochranu, aby sabotáž, bombardování či nehoda nemohly tak snadno ochromit výrobu."
 SIA_the_army_of_siam: "Armáda Siamu"
 SIA_the_army_of_siam_desc: "Stará struktura našich ozbrojených sil již neodpovídá požadavkům doby. Má-li [ROOT.GetName] bránit svou svrchovanost a prosazovat své zájmy v zahraničí, musíme vybudovat novou moderní armádu, vybavenou, vycvičenou a organizovanou pro války, které se nyní formují po celém světě."
 SIA_plan_for_a_short_war: "Plánovat krátkou válku"
 SIA_plan_for_a_short_war_desc: "Naše zdroje jsou omezené a nepřátel může být mnoho. [ROOT.GetNameDefCap] si nemůže dovolit dlouhý vyčerpávací zápas. Pokud válka přijde, musí být rychlá, rozhodná a dovedená k závěru dříve, než nepřítel shromáždí sílu."
 SIA_intermediate_war_preparation: "Střednědobá válečná příprava"
 SIA_intermediate_war_preparation_desc: "Je nebezpečné připravovat se pouze na bleskové tažení, ale plýtváním by bylo organizovat se výhradně pro nekonečný zápas. Vyvážená doktrína umožní [ROOT.GetName] udeřit s vervou a zároveň si ponechat vytrvalost potřebnou k čelení houževnatějšímu nepříteli."
 SIA_prepare_for_a_long_war: "Připravit se na dlouhou válku"
 SIA_prepare_for_a_long_war_desc: "Velmoci mohou rozhodovat války v měsících, ale menší národy jsou často nuceny snášet je celé roky. Musíme proto připravit [ROOT.GetAdjective] zbraně, průmysl a dopravu na dlouhý, vyčerpávající konflikt, v němž trpělivost a odolnost znamenají stejně jako odvaha."
 SIA_specialized_warfare: "Specializované válčení"
 SIA_specialized_warfare_desc: "Terén našeho regionu nepřeje jednotné armádě. Hory, džungle a říční krajiny vyžadují každá jiné dovednosti. Pěstováním specializovaných jednotek zajistíme, že [ROOT.GetNameDef] postaví proti nepříteli správnou sílu v každém prostředí."
 SIA_artillery_reigns_supreme: "Dělostřelectvo vládne bojišti"
 SIA_artillery_reigns_supreme_desc: "Moderní bitva se nevyhrává jen duchem. Dělo zůstává králem bojiště, láme opěrné body, tříští útoky a razí cestu pěchotě. Máme-li zvítězit, [ROOT.GetAdjective] palebná síla musí být hojná i přesná."
 SIA_yield_the_air_war: "Vzdát se vzdušné války"
 SIA_yield_the_air_war_desc: "Nemůžeme doufat, že vyzveme velmoci na nebi za rovných podmínek. Místo plýtvání vzácnými zdroji v zápase, který pravděpodobně nevyhrajeme, posílíme protileteckou obranu a upřeme nepřátelským letadlům svobodu útočit na naše muže a města bez následků."
 SIA_the_thunder_at_the_gates: "Bouře před branami"
 SIA_the_thunder_at_the_gates_desc: "Existují pevnosti, které obyčejná děla nezlomí, a útoky, které musí být oznámeny zdrcující silou. Těžké dělostřelectvo, obléhací děla a železniční baterie dají [ROOT.GetNameDef] sílu rozbít brány každého nepřítele, který si naši zdrženlivost splete se slabostí."
 SIA_night_time_training: "Noční výcvik"
 SIA_night_time_training_desc: "Smělé útoky za bílého dne zvou katastrofu proti připravenému nepříteli. Výcvikem našich mužů k infiltraci, pohybu a útoku pod rouškou tmy můžeme uchopit iniciativu, když je nepřítel slepý, zmatený a nejméně připraven odpovědět."
 SIA_steel_arteries: "Ocelové tepny"
 SIA_steel_arteries_desc: "Žádná armáda nepochoduje daleko bez železnic a silnic, které ji udrží. Ocelové tepny národa musí být posíleny, aby vojáci, zásoby a děla mohli být rychle přepraveni na každou ohroženou hranici. V této práci jde vojenská bezpečnost a národní rozvoj ruku v ruce."
 SIA_prepare_northern_infrastructure_for_war: "Připravit severní infrastrukturu na válku"
 SIA_prepare_northern_infrastructure_for_war_desc: "Severní přístupy se stanou životně důležitými v jakémkoli střetu s Barmou a těmi, kdo za ní stojí. Silnice, železnice a sklady v tomto regionu musí být okamžitě rozšířeny, aby [ROOT.GetAdjective] síly mohly postupovat či vzdorovat bez prodlení."
 SIA_unconventional_tank_construction: "Nekonvenční konstrukce tanků"
 SIA_unconventional_tank_construction_desc: "Nemůžeme napodobit tankové programy velmocí kus po kuse. Má-li [ROOT.GetNameDef] vůbec nasadit tanky, musíme usilovat o levnější a přizpůsobivější způsoby konstrukce, obětovat velkolepost ve prospěch počtu a užitku."
 SIA_conventional_tank_construction: "Konvenční konstrukce tanků"
 SIA_conventional_tank_construction_desc: "Pancéřové síly se staly uznávanou složkou moderní války a provizorní řešení nás donesou jen do určitého bodu. Měli bychom proto zřídit řádný tankový průmysl založený na zdravých principech, standardních návrzích a spolehlivých výrobních metodách hodných moderní armády."
 SIA_reverse_engineer_allied_tanks: "Zpětně zkonstruovat spojenecké tanky"
 SIA_reverse_engineer_allied_tanks_desc: "Jiní už nesli náklady experimentování. Zajaté tanky a dovezené stroje lze rozebrat, prostudovat a napodobit. Učením se z cizích návrhů může [ROOT.GetName] zkrátit cestu k vlastní obrněné síle."
 SIA_tankettes: "Tankety"
 SIA_tankettes_desc: "Lehké, levné a jednoduché na výrobu - tankety možná samy nerozhodnou velké bitvy, ale stále mohou sloužit průzkumu, koloniálnímu válčení a podpoře pěchoty. Pro národ skromných prostředků taková malá obrněná vozidla nabízejí praktický vstup do mechanizované války."
 SIA_jungle_armor: "Džunglové pancéřování"
 SIA_jungle_armor_desc: "Džungle našeho regionu nejsou místem pro těžkopádné stroje navržené pro evropské pláně. Má-li pancéřování sloužit [ROOT.GetNameDef], musí být přizpůsobeno úzkým stezkám, špatnému podloží a tísnivému klimatu, přičemž tam, kde to džungle vyžaduje, vymění hmotnost za pohyblivost."
 SIA_mountain_tanks: "Horské tanky"
 SIA_mountain_tanks_desc: "Drsné kopce a horské průsmyky nelze jednoduše ponechat samotné pěchotě. Vývojem kompaktních obrněných vozidel vhodných pro členitý terén můžeme dát armádám prostředek k přinesení chráněné palebné síly do oblastí, kde by běžné tanky selhaly."
 SIA_reluctant_submission: "Neochotné podrobení"
 SIA_reluctant_submission_desc: "Pokud [ROOT.GetNameDef] čelí invazi silnějšího nepřítele, může přijít okamžik, kdy otevřený odpor slibuje jen zkázu. Sklonit se je hořké, ale někdy musí vláda ustoupit, aby zachovala národ před zničením a vyčkala na příznivější hodinu."
 SIA_reluctant_submission_trigger: "Toto zaměření bude automaticky dokončeno, pokud budeme napadeni a v události zvolíme možnost §YPodrobení§!."
 SIA_reluctant_submission_tt: "Budeme moci uzavřít mír s útočící velmocí. Bude však očekávat, že pro ni budeme tisknout peníze.\nNáš §Yfaktor továren na spotřební zboží§! se bude každý měsíc zvyšovat o §Y[?idea_SIA_printing_money_monthly_change|%]§!, až do maxima §Y[?idea_SIA_printing_money_monthly_change_max|%]§!.\n\nPřijetí zaměření §Y$SIA_thai_rice_company$§! sníží tempo nárůstu o §G50 %§!\n\nPřijetí zaměření §Y$SIA_demand_repatriation$§! odstraní nutnost tisknout peníze."
 SIA_seri_thai: "Seri Thai"
 SIA_seri_thai_desc: "Podrobení nemusí znamenat kapitulaci národního ducha. Pod povrchem okupace a poslušnosti lze zorganizovat loajální podzemí k zachování věci nezávislosti, sběru zpravodajských informací a přípravě dne, kdy [ROOT.GetName] znovu povstane."
 SIA_contact_the_south_east_asia_command: "Kontaktovat Velitelství jihovýchodní Asie"
 SIA_contact_the_south_east_asia_command_desc: "Má-li odpor znamenat víc než statečná gesta, musí být svázán s širší strategií. Navázáním kontaktu se spojeneckým velením v jihovýchodní Asii mohou vlastenci [ROOT.GetName] získat vedení, zásoby a místo ve větším boji."
 SIA_broadcast_weather_reports_to_the_allies: "Vysílat meteorologické zprávy Spojencům"
 SIA_broadcast_weather_reports_to_the_allies_desc: "Nebe i moře regionu se řídí počasím stejně jako flotilami a armádami. Spolehlivé zprávy z [ROOT.GetNameDef] mohou pomoci spojeneckému plánování, chránit jejich operace před překvapením a učinit z naší vlasti tichého, ale cenného partnera v jejich válce."
 SIA_american_investment_aid: "Americká investiční pomoc"
 SIA_american_investment_aid_desc: "Spojené státy disponují bohatstvím přesahujícím cokoli dostupné v našem regionu. Pokud dokážeme zajistit americkou pomoc a investice pro naše tajné i národní úsilí, [ROOT.GetNameDef] získá materiální prostředky k překonání útrap a přípravě na osvobození."
 SIA_thai_students_in_the_oss: "Thajští studenti v OSS"
 SIA_thai_students_in_the_oss_desc: "Nová generace vlastenecké mládeže může být v zahraničí vycvičena v umění špionáže, sabotáže a nepravidelného boje. Vysláním důvěryhodných thajských studentů do okruhu spojenecké rozvědky připravíme schopné služebníky pro skrytou válku, která nás čeká."
 SIA_prepare_to_drop: "Připravit výsadek"
 SIA_prepare_to_drop_desc: "Až přijde hodina osvobození, Spojenci se mohou pokusit sestoupit na naši vlast z nebe. Musíme proto určit přistávací plochy, připravit kontakty a zorganizovat podpůrné sítě, aby výsadkové síly mohly být přijaty a nasměrovány tam, kde jich bude nejvíce třeba."
 SIA_unseat_the_government: "Sesadit vládu"
 SIA_unseat_the_government_desc: "Režimu, který svázal [ROOT.GetNameDef] s cizí nadvládou, nesmí být dovoleno trvat věčně. Prostřednictvím odporu, intrik a včasné akce můžeme odstranit ty, kdo kompromitovali národ, a obnovit vládu hodnější Siamu."
 SIA_unseat_the_government_tt: "[ROOT.GetName] opustí svou současnou frakci a změní stranu ve válce, připojí se ke §YSpojencům§!.\nLoajalisté povstanou proti změně, čímž rozpoutají občanskou válku."
 SIA_the_phayap_army: "Armáda Phayap"
 SIA_the_phayap_army_desc: "Pokud spojíme svůj osud s útočníkem, pak naše armády musí dostat místo v novém válečném řádu. Vyhrazené polní velení pro operace na západě a severu umožní [ROOT.GetName] postupovat po boku silného partnera a usilovat o vlastní zisky."
 SIA_securing_the_rubber_islands: "Zajištění kaučukových ostrovů"
 SIA_securing_the_rubber_islands_desc: "Kaučuk je životní krví moderní války, živí pneumatiky, těsnění a nesčetné nástroje mechanizovaného konfliktu. Území bohatá na zdroje na jih od nás představují příležitost i nezbytnost. Měli bychom je zajistit dříve, než to udělají jiní."
 SIA_breaking_the_burmese_line: "Prolomení barmské linie"
 SIA_breaking_the_burmese_line_desc: "Barma stojí jako bariéra mezi našimi ambicemi a zeměmi za ní. Mají-li [ROOT.GetAdjective] zbraně prokázat svou hodnotu, nepřátelská linie tam musí být prolomena odhodláním, plánováním a soustředěným použitím síly."
 SIA_pacific_war: "Válka v Pacifiku"
 SIA_pacific_war_desc: "Konflikt ve východní Asii už nelze považovat za vzdálený. Válka v Pacifiku formuje osud všech národů našeho regionu a [ROOT.GetNameDef] musí rozhodnout o svém místě v tomto zápase, ať už jako následovník, partner či oběť."
 SIA_joint_asian_military_command: "Společné asijské vojenské velení"
 SIA_joint_asian_military_command_desc: "Naše úsilí bude silnější, pokud bude koordinováno s úsilím našich regionálních partnerů. Společná velitelská struktura slibuje větší efektivitu, jasnější plánování a společný směr pro tažení, která by jinak hrozilo promarnit soupeřením a zmatkem."
 SIA_demand_repatriation: "Požadovat reparace"
 SIA_demand_repatriation_desc: "Ti, kdo vstoupili na naši půdu pod záminkou nutnosti, mají vůči [ROOT.GetNameDef] dluh. Jakmile se naše situace zlepší, měli bychom požadovat návrat toho, co bylo vzato, a tlačit na okupanta, aby splatil cenu svého vpádu."
 SIA_standing_our_ground: "Držet své pozice"
 SIA_standing_our_ground_desc: "Přichází chvíle, kdy ústup a vyjednávání nabízejí jen další ponížení. [ROOT.GetNameDefCap] musí ukázat, že stále má vůli stát, bojovat a vyhnat ty, kdo předpokládají, že nám mohou diktovat osud pod hrozbou zbraní."
 SIA_standing_our_ground_trigger: "Toto zaměření bude automaticky dokončeno, pokud budeme napadeni a v události zvolíme možnost §YOdpor§!."
 SIA_ask_for_the_release_of_american_commodities: "Požádat o uvolnění amerických komodit"
 SIA_ask_for_the_release_of_american_commodities_desc: "Americké zásoby, stroje a zboží mohou poskytnout prostor k nadechnutí, který náš národ potřebuje. Pečlivou diplomacií můžeme požádat o uvolnění takových komodit, zmírnit nedostatky a posílit materiální základnu našeho válečného úsilí."
 SIA_japanese_fighters: "Japonské stíhačky"
 SIA_japanese_fighters_desc: "Ačkoli náš vlastní letecký průmysl zůstává slabý, cizí letadla mohou pomoci tuto mezeru vyplnit. Japonské stíhačky v [ROOT.GetAdjective] rukou by nám alespoň poskytly určitou míru moderní letecké síly, byť jen v mezích daných naší průmyslovou slabostí."
 SIA_get_off_our_shores: "Pryč z našich břehů"
 SIA_get_off_our_shores_desc: "Přítomnost cizích jednotek na siamské půdě je urážkou, kterou nelze zmírnit výmluvami. Ať už silou zbraní, nebo tlakem událostí v zahraničí, musíme trvat na tom, aby útočník opustil naše břehy a obnovil důstojnost [ROOT.GetNameDef].\n\nJsou to zbabělci, jako všichni krutí muži. A teď pryč z našich břehů."
 SIA_singaporean_reinforcements: "Singapurské posily"
 SIA_singaporean_reinforcements_desc: "Boj v Malajsku a za ním je neoddělitelný od naší vlastní bezpečnosti. Posily čerpané ze sil shromažďujících se kolem Singapuru by mohly zpevnit naši linii, rozšířit spolupráci se Spojenci a svázat válčiště společným účelem."
 modify_SIA_directorate_of_aeronautical_engineering: "Upraví §YŘeditelství leteckého inženýrství§! o:"
 SIA_aid_for_resources: "Pomoc za zdroje"
 SIA_aid_for_resources_desc: "Náš národ má zdroje, po nichž cizí mocnosti touží, a postrádá určité nástroje, které ony mohou poskytnout. Prozřetelná výměna pomoci za suroviny pomůže udržet [ROOT.GetNameDef] zásobený a zároveň zajistí, že naše bohatství přispěje k vlastní záchraně."
 SIA_aid_for_resources_tt: "Požádáme [JAP.GetNameDef], aby se připojilo k naší válce výměnou za získání práv na zdroje kaučuku ve státě §Y[724.GetName]§!"
 SIA_how_quickly_the_tables_turn: "Jak rychle se karta obrací"
 SIA_how_quickly_the_tables_turn_desc: "Ti, kdo kdysi považovali [ROOT.GetNameDef] za slabý a poddajný, mohou zjistit, že se rovnováha obrátila. Štěstí ve válce se obrací rychle a my musíme být připraveni chopit se okamžiku, kdy naši utlačovatelé zaváhají a karta se konečně obrátí proti nim."
 SIA_how_quickly_the_tables_turn_trigger: "Byli jsme napadeni velmocí a tuto velmoc jsme kapitulovali."
 SIA_royal_thai_navy: "Královské thajské námořnictvo"
 SIA_royal_thai_navy_desc: "Obrana [ROOT.GetNameDef] nekončí na pobřeží. Naše pobřeží, řeky a námořní obchod vyžadují flotilu hodnou království. Posílením Královského thajského námořnictva zajistíme, že Siam zůstane pánem vlastních vod."
 modify_royal_thai_navy: "Upraví §Y$idea_SIA_thai_royal_navy$§! o:"
 SIA_direct_army_fundings_towards_the_navy: "Přesměrovat armádní prostředky k námořnictvu"
 SIA_direct_army_fundings_towards_the_navy_desc: "Armáda dlouho spotřebovávala lví podíl vojenských výdajů, ale strategické potřeby [ROOT.GetNameDef] nejsou čistě kontinentální. Přesunem prostředků k flotile můžeme začít napravovat tuto nerovnováhu a zajistit moře, která chrání náš obchod a pobřeží."
 SIA_thonburi_class_coastal_defense_ship: "Pobřežní obranná loď třídy Thonburi"
 SIA_thonburi_class_coastal_defense_ship_desc: "Skromná flotila může stále mít ostré zuby, pokud je řádně navržena pro místní podmínky. Třída Thonburi nabízí [ROOT.GetNameDef] praktický prostředek pobřežní obrany, spojující slušnou palebnou sílu s rolí vhodnou pro vody, které potřebujeme chránit nejnaléhavěji."
 SIA_acquire_submarines: "Získat ponorky"
 SIA_acquire_submarines_desc: "Ponorky dávají malému námořnictvu šanci udeřit nad svou váhu. Skryté pod vlnami mohou ohrožovat lodní dopravu, odstrašovat silnější flotily a komplikovat jakýkoli nepřátelský plán proti našemu pobřeží. [ROOT.GetNameDefCap] by takovou zbraň neměl zanedbat."
 SIA_submarine_day: "Den ponorek"
 SIA_submarine_day_desc: "Zavedení podmořského válčení do naší flotily si zaslouží veřejné uznání a národní nadšení. Oslavou ponorkové zbraně můžeme podpořit nábor, zvýšit prestiž a upevnit v mysli veřejnosti představu, že Siam vstupuje do nového námořního věku."
 SIA_the_thonburi_dockyard_project: "Projekt thonburských doků"
 SIA_the_thonburi_dockyard_project_desc: "Námořnictvo nelze udržovat pouze dováženými trupy. Má-li [ROOT.GetNameDef] udržovat a rozšiřovat své námořní síly, musí investovat do doků, dílen a pracovní síly, které tvoří skutečný základ námořní moci."
 SIA_expand_the_slipways: "Rozšířit skluzy"
 SIA_expand_the_slipways_desc: "Naše současná zařízení jsou příliš stísněná pro ambice, které se nyní formují. Rozšířením skluzů zvýšíme kapacitu stavět a opravovat plavidla, což umožní flotile růst co do velikosti i připravenosti."
 SIA_a_new_drydock: "Nový suchý dok"
 SIA_a_new_drydock_desc: "Seriózní námořní údržba vyžaduje moderní suchý dok. Bez něj zůstává údržba větších lodí pomalá, neefektivní a závislá na zahraniční pomoci. Nový suchý dok dá [ROOT.GetNameDef] pevnější kontrolu nad vlastní námořní budoucností."
 SIA_install_heavy_cranes_and_power_plant: "Instalovat těžké jeřáby a elektrárnu"
 SIA_install_heavy_cranes_and_power_plant_desc: "Stavba lodí není jen otázkou dřeva a oceli, ale strojů a energie. Těžké jeřáby a spolehlivé elektrické zásobování promění naše loděnice z hrubých zařízení ve skutečné nástroje moderního průmyslu."
 SIA_establish_the_foundry_and_machine_shop: "Zřídit slévárnu a strojírnu"
 SIA_establish_the_foundry_and_machine_shop_desc: "Svrchované námořnictvo vyžaduje víc než trupy sestavené z dovážených dílů. Založením vlastní slévárny a strojírny posílíme průmyslové šlachy, které umožní [ROOT.GetNameDef] odlévat, tvarovat a opravovat životně důležité součásti válečných lodí doma."
 SIA_the_thonburi_arsenal: "Thonburský arzenál"
 SIA_the_thonburi_arsenal_desc: "Loděnice bez výzbroje zůstává neúplná. Zřízení arzenálu v Thonburi umožní výrobu a skladování námořních děl, munice a souvisejícího vybavení, čímž naši flotilu pevněji sváže s národním průmyslem."
 SIA_focus_on_commercial_civilian_ships: "Zaměřit se na obchodní civilní lodě"
 SIA_focus_on_commercial_civilian_ships_desc: "Ne každý položený kýl musí být určen k boji. Obchodní lodě, transporty a další civilní plavidla tvoří oběhový systém národního hospodářství. Podporou komerční stavby lodí [ROOT.GetNameDef] posiluje prosperitu i válečnou odolnost."
 SIA_empower_the_coastguard: "Posílit pobřežní stráž"
 SIA_empower_the_coastguard_desc: "Flotila nemůže být všude najednou a mnohé úkoly pobřežní bezpečnosti lépe zvládnou lehčí služby. Posílená pobřežní stráž ochrání naše rybářství, bude hlídat naše břehy a uvolní námořnictvu ruce pro vážnější hrozby."
 SIA_river_patrols: "Říční hlídky"
 SIA_river_patrols_desc: "Řeky [ROOT.GetNameDef] jsou zároveň cestami, hranicemi a tepnami života. Hlídková plavidla na těchto vodách nám pomohou prosazovat pořádek, podporovat místní posádky a rozšířit dosah státu do regionů, kde vzdálené hlavní město jinak jedná pomalu."
 SIA_sell_bangkok_dock_co: "Prodat Bangkok Dock Co"
 SIA_sell_bangkok_dock_co_desc: "Soukromý kapitál může dosáhnout toho, co státní správa provádí příliš pomalu. Prodejem Bangkok Dock Company do schopných rukou můžeme přilákat investice, podnítit efektivitu a přesměrovat veřejné prostředky k naléhavějším vojenským potřebám."
 SIA_a_race_against_time: "Závod s časem"
 SIA_a_race_against_time_desc: "Naše námořnictvo je zastaralé, podfinancované a nepřipravené na moderní válku. Prostředky musí být okamžitě přesměrovány do stavby lodí, přezbrojení, pobřežní obrany a námořního výcviku. Hodiny běží rychleji než naše loděnice."
 SIA_a_race_against_time_tt: "Po vypršení ducha získáme: "
 SIA_a_race_against_time_tt2: "na §Y280§! dní"
 the_thunder_at_our_gates_artillery: "Hrom před našimi branami"
 SIA_siamese_tankettes: "Siamské tankety"
 SIA_siamese_tankettes_desc: "Naše armáda se obeznámila se svou flotilou lehkých tanket, což zlepšilo jejich spolehlivost a snížilo náklady na jejich udržení v poli."
