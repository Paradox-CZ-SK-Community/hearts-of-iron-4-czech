 generic_choice_tt: "Dává volbu mezi: \n"
 generic_or_tt: "Nebo:\n"
 SIA_a_land_war_in_asia: "Pozemní válka v Asii"
 idea_SIA_land_war_in_asia: "Pozemní válka v Asii"
 SIA_the_peoples_war_in_asia: "Lidová válka v Asii"
 SIA_the_peoples_war_in_asia_desc: "Boj proti japonskému imperialismu není jen soutěží mezi státy. Je to válka dělníků, rolníků a vojáků proti cizí nadvládě. Staneme-li po boku komunistických sil v Číně, [ROOT.GetNameDef] se zaváže k širší lidové válce po celé Asii."
 SIA_peoples_war_in_asia_idea: "Lidová válka v Asii"
 SIA_peoples_war_in_asia_idea_desc: "Válka je udržována více než pravidelnými formacemi. Místní výbory, partyzánské vodítka a rolnické zásobovací kolony nyní slouží armádě v poli. Každá vesnice se stává skladem, každá cesta možným přepadovým místem a každý ústup příležitostí vléct nepřítele hlouběji do vnitrozemí."
 SIA_national_defense_in_asia: "Národní obrana v Asii"
 SIA_national_defense_in_asia_desc: "Obrana Asie vyžaduje disciplínu, hierarchii a společný strategický cíl. Stáním po boku nacionalistické Číny se [ROOT.GetNameDef] připojí ke koalici odhodlané vzdorovat japonské expanzi organizovanými armádami a koordinovaným velením."
 SIA_national_defense_in_asia_tt: "§Y[ROOT.GetNameWithFlag]§! se připojuje k nacionalistickým silám v Jednotné frontě.\nPřidá §Y$SIA_national_defense_in_asia_idea$§!, která dává:\n $MODIFIER_ARMY_ORG_FACTOR$: §G+5%§!\n $MODIFIER_PLANNING_SPEED$: §G+10%§!\n $MODIFIER_MAX_PLANNING$: §G+10%§!\n $MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+5%§!"
 SIA_stronger_together: "Silnější spolu"
 SIA_stronger_together_desc: "Válka zredukovala vzdálené sliby a paralelní aliance na překážky. Pokud má [ROOT.GetNameDef] formovat Asii, musíme požádat naše partnery, aby svázali svou frakci s naší a přijali jednotné velení v nadcházejícím boji."
 idea_SIA_national_defense_in_asia: "Národní obrana v Asii"
 SIA_directorate_of_aeronautical_engineering_desc: "Budoucnost leteckých sil [ROOT.GetNameDef] nezabezpečí pouze piloti. Potřebuje inženýry, inspektory, dílny a centrální autoritu schopnou proměnit zahraniční nákupy v provozuschopná letadla. Direktorát aeronautického inženýrství se stane základem tohoto úsilí."
 idea_SIA_aeronautical_engineering_directorate: "Direktorát aeronautického inženýrství"
 SIA_standardize_aircraft_maintenance: "Standardizovat údržbu letadel"
 SIA_standardize_aircraft_maintenance_desc: "Naše letadla pocházejí z mnoha zdrojů, každý s odlišnými díly, nástroji a postupy opravy. Standardizací údržbových postupů pod Direktorátem může [ROOT.GetNameDef] udržet více letadel ve vzduchu a snížit zbytečné plýtvání způsobené zmatkem na zemi."
 SIA_expand_aircraft_workshops: "Rozšířit letecké dílny"
 SIA_expand_aircraft_workshops_desc: "Direktorát potřebuje víc než kanceláře a inspekční papíry. Nové dílny, strojní nástroje a vyškolení mechanici dovolí opravovat poškozená letadla doma, zatímco jednoduché součásti lze vyrábět bez čekání na zahraniční dodávky."
 SIA_license_modern_airframes: "Licencovat moderní konstrukce trupu"
 SIA_license_modern_airframes_desc: "[ROOT.GetNameDefCap] zatím nedokáže navrhnout každé letadlo, které potřebuje. Praktickou cestou je licencovat zahraniční modely, studovat jejich konstrukci a přizpůsobit je našemu klimatu, letištím a zásobovacím podmínkám pod dohledem Direktorátu."
 SIA_tropical_air_operations: "Tropické letecké operace"
 SIA_tropical_air_operations_desc: "Horko, vlhkost, monzuny a drsné přední polní letiště kladou zvláštní nároky na letadla a posádky. Přizpůsobením motorů, údržbových plánů a pilotní doktríny těmto podmínkám může Direktorát učinit naše letectvo spolehlivějším nad Jihovýchodní Asií."
 effects_of_event_tt: "\n§YEfekty události§!:"
 AST_war_is_coming: "Válka se blíží"
 AST_war_is_coming_desc: "Během posledních tří desetiletí jsme čelili jedné výzvě za druhou, avšak zdá se, že před námi vyvstává poslední z nich, která jednou provždy prověří sílu australské demokracie. Bývalý premiér Billy Hughes má v této věci naprosto jasno a bylo by od nás nezodpovědné přehlížet jeho tvrzení, že — ať se nám to líbí, nebo ne — válka se blíží."
 AST_war_is_coming_tt: "\nOdemkne §Ydemokratické volby§!"
 AST_war_is_coming_uap_advisors_tt: "(§Y$AST_billy_hughes$§!):"
 AST_war_is_coming_alp_advisors_tt: "(§Y$AST_james_scullin$§!):"
 AST_war_is_coming_decrease_advisors_tt: "(§Y$AST_maurice_blackburn$§!):"
 AST_war_is_coming_advisors_tt: "\nUpraví politického poradce o:"
 AST_advance_pacific_initiatives: "Prosadit pacifické iniciativy"
 AST_advance_pacific_initiatives_desc: "Díky paktům o neútočení, které se nám podařilo uzavřít, se naše vztahy s asijskými sousedy zlepšily. Budeme tyto vztahy dále využívat a vyzveme naše nové spojence, aby nám pomohli s průmyslovým rozvojem."
 AST_advance_pacific_initiatives_tt: "\nUzavřít pakt o neútočení s:"
 AST_advance_pacific_initiatives_jap_tt: " §Y[JAP.GetName]§! pro přidání §G2§! mimo-mapových §Yloděnic§! k účinkům."
 AST_advance_pacific_initiatives_ins_tt: " §Y[INS.GetName]§! pro přidání §G1§! mimo-mapové §Ysyntetické rafinerie§! k účinkům."
 AST_advance_pacific_initiatives_chi_tt: " §Y[CHI.GetName]§! pro přidání §G2§! mimo-mapových §Ycivilních továren§! k účinkům."
 AST_advance_pacific_initiatives_jap_2_tt: "§Y[JAP.GetName]§! nabízí:"
 AST_advance_pacific_initiatives_ins_2_tt: "§Y[INS.GetName]§! nabízí:"
 AST_advance_pacific_initiatives_chi_2_tt: "§Y[CHI.GetName]§! nabízí:"
 AST_advance_pacific_initiatives_2_tt: "\nBudovy budou odstraněny v případě války s příslušným národem."
 AST_pacific_initiatives_modifier: "Diplomatické iniciativy"
 AST_domestic_industry: "Domácí průmysl"
 AST_domestic_industry_desc: "Nemůžeme spoléhat na to, že nás spojenecké zbrojní průmysly zásobí, pokud přijde válka. Musíme rozšířit vlastní průmysl, abychom byli připraveni na vše, co přijde."
 AST_a_democratic_bulwark: "Demokratická bašta"
 AST_a_democratic_bulwark_desc: "Máme-li pevně vzdorovat fašistickým i komunistickým hrozbám, musí nám cestu ukazovat demokracie. Vláda přijme politiku proaktivních opatření, aby zajistila zastoupení občanů ve vládním aparátu a aby nespokojenost politiků mohla být uspokojena vstupem do různých demokratických stran namísto škodlivých ideologií."
 AST_the_pacific_pact: "Pacifický pakt"
 AST_the_pacific_pact_desc: "Lyonsovy pacifické iniciativy z roku 1934 navázaly kontakty mezi Austrálií a významnými asijskými národy, díky čemuž se již nemusíme spoléhat na britské úředníky, aby zastupovali naše zájmy. Pokud bychom těchto vztahů dokázali využít k zajištění neútočení asijských mocností vůči Austrálii, byl by to konečný cíl našeho diplomatického úsilí. Může jít o náročný podnik, ale rozhodně stojí za to."
 AST_a_collapsing_league_of_nations: "Hroutící se Společnost národů"
 AST_a_collapsing_league_of_nations_desc: "Společnost národů se hroutí — dobře míněná iniciativa, bohužel založená na nerealistických nadějích. Politika sankcí se snadno stane politikou prázdných gest, tím spíše, když nejsou k dispozici žádné ozbrojené síly, které by dokázaly udržet neukázněné národy na uzdě. Naše přezbrojení musí začít."
 AST_department_of_munitions: "Ministerstvo munice"
 AST_department_of_munitions_desc: "Abychom mohli naše muže na frontě řádně zásobovat, musíme urychlit výrobu munice. Zřízením Ministerstva munice můžeme zajistit větší dohled nad výrobou obranných komponentů."
 AST_call_for_a_referendum: "Vyhlásit referendum"
 AST_call_for_a_referendum_desc: "Chceme posílit kontrolu federální vlády, nejprve však potřebujeme souhlas voličů. Vyhlášením referenda si můžeme vyžádat jejich svolení."
 AST_rural_concessions: "Ústupky venkovu"
 AST_rural_concessions_desc: "Venkovští zástupci Country Party získávají příliš málo hlasů na to, aby mohli vládnout sami, avšak pokud přivítáme jejich vliv v australské politice, my jako současná vládnoucí strana můžeme získat dodatečnou podporu."
 AST_rural_concessions_tt: "\n§Y$AST_country_party_influence_uap$§! zvýší počet hlasů pro stranu, která bude u moci při dokončení zaměření."
 AST_solidarity_by_the_empire: "Solidarita po boku impéria"
 AST_solidarity_by_the_empire_desc: "Až dosud nás Britské impérium provázelo válkou i mírem. Budeme si nadále cenit jeho rad a spolupracovat při přípravách na možné konflikty."
 AST_solidarity_by_the_empire_modifier: "Solidarita po boku impéria"
 AST_wool_agreement: "Dohoda o vlně"
 AST_wool_agreement_desc: "Vlna patří mezi nejvýznamnější obchodní produkty Austrálie a její vývoz přispívá nejen k ziskům, ale také ke zlepšování vztahů s dovážejícími národy. Británie ji však požaduje celou, částečně s úmyslem použít ji na uniformy svých vojáků, ale také při jednáních s mocnostmi trpícími nedostatkem vlny. Britským požadavkům ustoupíme."
 AST_australian_war_cabinet: "Australský válečný kabinet"
 AST_australian_war_cabinet_desc: "Jak nás vyzvalo Spojené království, zřídíme vlastní válečný kabinet. Tím zajistíme účinné a strategické rozhodování, neboť se tento orgán bude soustředit výhradně na národní bezpečnost."
 AST_singapore_strategy: "Singapurská strategie"
 AST_singapore_strategy_desc: "Singapurská strategie je klíčovou součástí australské obranné politiky a samotné území Singapuru má jako základna lodí Královského námořnictva rozmístěných v Pacifiku prvořadý význam. Přesvědčíme Brity, aby podnikli další obrannou výstavbu, zatímco my sami posílíme australské námořní kapacity."
 AST_singapore_strategy_tt: "Po §Y180§! dnech (§YSingapur§!):\n Přidá §G2§! §Yletecké základny§!.\n Přidá §G2§! §Ynámořní základny§!.\n Přidá §G1§! §Ypobřežní pevnost§!."
 AST_british_war_cabinet: "Britský válečný kabinet"
 AST_british_war_cabinet_desc: "Vypukla válka a Spojené království vytvořilo válečný kabinet, aby zajistilo účinné vedení spojeneckého válečného úsilí. Povolali i nás, abychom se k této věci vyjádřili, a proto premiér odcestuje zastupovat australské zájmy."
 potential_consequence_tt: "§YMožný důsledek§!:\n"
 AST_british_pacific_fleet: "Britská pacifická flotila"
 AST_british_pacific_fleet_desc: "Britská přítomnost v Pacifiku bude zásadní, chceme-li odstrašit nepřátelské lodě rozšiřující svou námořní převahu směrem na jih a zároveň se jim bránit. Jako součást frakce [Root.GetFactionName] podnikneme kroky k vytvoření společné velitelské struktury na ochranu našich pobřežních vod."
 AST_all_dressed_up: "V plné výstroji"
 AST_all_dressed_up_desc: "Pokud australští vojáci bojují v britských válkách, britské továrny je vybaví."
 AST_overseas_loyalties: "Zámořská loajalita"
 AST_overseas_loyalties_desc: "Budeme nadále přispívat k zámořským válkám a znovu prokážeme, že pro australské vojáky není žádné území cizí. Války nepřicházejí k nám — my přicházíme k nim."
 AST_the_ultimate_overseas_duty: "Nejvyšší zámořská povinnost"
 AST_the_ultimate_overseas_duty_desc: "Britský premiér nakládal se svými povinnostmi tak špatně, že se nedůvěra rozšířila i mezi jeho vlastní ministry. Menzies během svých návštěv britského válečného kabinetu udělal mimořádně silný dojem a nyní někteří naznačují, že by pro Británii mohl být dost možná lepší volbou. S ním u kormidla Commonwealthu můžeme využít Menziesovu loajalitu vůči [AST.GetName] a posílit svou autoritu."
 AST_the_ultimate_overseas_duty_tt: "\nS §Y$AST_robert_menzies$§! jako vůdcem v §Y[ENG.GetNameDef]§! se můžeme v zaměření §Y$AST_a_change_of_authority$§! stát §Y$autonomy_associated_dominion$§!."
 AST_pleading_britain: "Prosba k Británii"
 AST_pleading_britain_desc: "Válka se jistě blíží a nám se z toho podlamují kolena. Při vší úctě k našemu duchu ANZAC a pověsti Diggerů by se australské válečné kapacity bez pomoci [ENG.GetName] rychle vyčerpaly. Premiér zašle [ENG.GetLeader] telegram při nejbližší příležitosti."
 AST_bound_once_more: "Znovu svázáni"
 AST_bound_once_more_desc: "Naše cesty se rozdělily, ale znovu se spojí. [ENG.GetNameDefCap] i [AST.GetName] procházejí národní proměnou, avšak vzdálenost, která mezi námi kvůli tomu vznikla, je pouze neúmyslným a nepříznivým důsledkem. Alespoň z naší strany. Znovu se spojíme a překážky našich proměňujících se národů zdoláme jednotně."
 AST_eng_to_ast_faction_tt: "§Y[ENG.GetName]§! a jeho subjekty se připojí k frakci §Y[AST.GetFactionName]§!."
 AST_faction_leader_tt: "Nastaví jako vůdce frakce §Y[AST.GetFactionName]§!"
 AST_eng_as_faction_leader_tt: "\n([ENG.GetFlag]§Y[ENG.GetName]§!) $AST_faction_leader_tt$."
 AST_australian_command: "Australské velení"
 AST_australian_command_desc: "Jelikož se význam australské obrany a bezpečnosti stal zřejmým dokonce i v [ENG.GetNameDef], je nutná reorganizace našich společných sil. S větším počtem britských sil pod australským velením lze vést účinnější válečné úsilí."
 AST_taking_the_helm: "Ujmout se kormidla"
 AST_taking_the_helm_desc: "S tím, jak se náš vliv rozšiřuje po jihovýchodní Asii, musí růst i naše námořní schopnosti, abychom jej dokázali bránit. Upřednostníme další investice do Královského australského námořnictva a prosadíme kontrolu nad východními moři."
 AST_eastern_focus: "Východní zaměření"
 AST_eastern_focus_desc: "Jsou-li britské války australskými válkami, pak jsou i australské války britskými. Japonská invaze se už dlouho nepopiratelně blíží a my již nebudeme přijímat současnou pasivitu, která čeká, až nám konflikt spadne do klína. Ukážeme Japonsku, co znamená australské odhodlání, zatímco Británie prokáže svou loajalitu tím nejodvážnějším prohlášením ze všech: vyhlášením války."
 AST_eastern_focus_tt: "\nMise umožní §Y[ENG.GetNameDef]§! okamžitě vyhlásit válku §Y[JAP.GetNameDef]§! a donutí je k tomu, pokud tak neučiní do 180 dnů. §Y[ENG.GetNameDefCap]§! může datum dokončení mise odložit financováním australské obranné výstavby."
 AST_holding_the_battlefield: "Udržet bojiště"
 AST_holding_the_battlefield_desc: "Mnoho australských vojáků padlo v zámoří, jen aby jejich úsilí bylo počítáno jako britské. Austrálie požaduje větší vliv u jednacího stolu po boku [ENG.GetNameDef] na mírových konferencích; jinak mohou naše příspěvky ustat."
 AST_holding_the_battlefield_tt: "§YSnížená cena§! akcí §YDosadit loutkový režim§! a §YZabrat státy§! na mírových konferencích s §Y[ENG.GetNameDef]§!."
 AST_a_change_of_authority: "Změna autority"
 AST_a_change_of_authority_desc: "Z poslušného subjektu Austrálie vyrostla v respektovaný a sebevědomý národ a nadešel čas učinit poslední krok k tomu, aby se stala jednou ze světových mocností. Jako vůdce frakce [AST.GetFactionName] si nás přátelé budou vážit a nepřátelé se nás budou bát. Austrálie se zakopá, vytrvá a neustoupí."
 AST_a_change_of_authority_tt: " §Y[ROOT.GetName]§! nyní může vyhlašovat války.\n §Y[ROOT.GetName]§! nyní může odmítnout výzvu do války.\n §Y[ROOT.GetName]§! již nepřevádí žádné mírové skóre svému suzerénovi."
 AST_reinforcements: "Posily"
 AST_reinforcements_desc: "Připravíme převážně nerozvinuté severní oblasti pomocí obranných zařízení a leteckých základen."
 AST_weekly_stability_tt: " Týdenní stabilita: §G+1.00%§!"
 AST_ending_overseas_conscription: "Ukončení zámořského odvodu"
 AST_ending_overseas_conscription_desc: "Naši vojáci musí okamžitě odplout od cizích břehů; jsou potřeba zde."
 AST_unlocking_conscription_1903_tt: "Vyžadováno k odemčení §Yzákonů o odvodu§!."
 AST_unlocking_further_conscription_tt: "Pro §Yrozsáhlý odvod§! nebo §Yslužbu na vyžádání§! budete potřebovat také některé z následujících zaměření: §Y$AST_british_pact$§! (fašistické), §Y$AST_refuse_british_wars$§! (fašistické), §Y$AST_toe_the_line$§! (fašistické), §Y$AST_from_picket_line_to_front_line$§! (komunistické) nebo §Y$AST_part_with_colonizer$§! (komunistické)."
 AST_unlocking_conscription_tt: "Pokud máte také §Y$AST_invoke_the_1903_defence_act$§!, odemknete všechny zbývající §Yzákony o odvodu§!."
 AST_an_uncle_for_father_figure: "Strýček místo otce"
 AST_an_uncle_for_father_figure_desc: "Postrádáme moderní výzbroj, a proto se obrátíme na [USA.GetName] s žádostí, aby nás zásobili."
 AST_seven_million_britishers: "Sedm milionů Britů"
 AST_seven_million_britishers_desc: "Ačkoli [ENG.GetLeader] váhal složit nám jakékoli sliby, až půjde do tuhého, budeme důvěřovat jeho i britskému závazku vůči [AST.GetNameDef]. Koneckonců jsme jen sedm milionů Britů."
 AST_seven_million_britishers_reinforcements_tt: "\n§YPokud není dokončeno $AST_reinforcements$§!:"
 AST_seven_million_britishers_conscription_tt: "\n§YPokud není dokončeno $AST_ending_overseas_conscription$§!:"
 AST_seven_million_britishers_uncle_tt: "\n§YPokud není dokončeno $AST_an_uncle_for_father_figure$§!:"
 AST_we_endured: "Vydrželi jsme"
 AST_we_endured_desc: "Předpověď nadcházejícího konfliktu nás možná zprvu zahltila, ale tím, že jsme ji využili k urychlení rozšiřování našich obranných schopností, nakonec posloužila svému účelu. Vydrželi jsme a vytrváme, nyní plně oddáni našemu konečnému úkolu: vyhrát válku."
 AST_under_the_rule_of_canberra: "Pod vládou Canberry"
 AST_under_the_rule_of_canberra_desc: "Rostoucí napětí mezi pacifickými národy je znepokojivé a s Británií zaměstnanou vlastními boji se její schopnost přijít nám na pomoc jeví jako nepravděpodobná. Pokud bychom přebudovali Britský Commonwealth tak, aby národy Tichého a Indického oceánu byly spravovány přímo z Canberry, mohli bychom se sjednotit na jedné frontě — i bez [ENG.GetNameDef]."
 AST_its_fight_work_or_perish: "Bojuj, pracuj, nebo zahyň"
 AST_its_fight_work_or_perish_desc: "Válka začala a zbývá jediné: prokázat, že jsme na ni připraveni."
 AST_no_foreign_battlefields: "Žádná cizí bojiště"
 AST_no_foreign_battlefields_desc: "Trvalo to dlouho, ale vláda konečně prohlásí, že žádný občan nebude nucen ke službě na cizích bojištích."
 AST_no_foreign_battlefields_modifier: "Žádná cizí bojiště"
 AST_aerial_defense: "Letecká obrana"
 AST_aerial_defense_desc: "Nemůžeme-li si dovolit — a to nemůžeme — plovoucí námořnictvo rovné námořnictvu světové mocnosti, je přesto v našich silách udržovat leteckou flotilu rovnocennou jakékoli, která může být proti nám nasazena."
 AST_ratify_westminster_adoption_act: "Ratifikovat zákon o přijetí Westminsterského statutu"
 AST_ratify_westminster_adoption_act_desc: "Navzdory kontroverzi, kterou může změna dlouho zavedených politik vyvolat, už je nejvyšší čas ratifikovat zákon o přijetí Westminsterského statutu. Sami si zvolíme, které války jsou naše."
 AST_ratify_westminster_adoption_act_tt: "£GFX_trigger_no Může odmítnout výzvu do války"
 AST_administer_the_mandate: "Spravovat mandát"
 AST_administer_the_mandate_desc: "Od roku 1920 jsme spravovali Novou Guineu na základě mandátu Společnosti národů a Papua byla vnějším územím [AST.GetName] téměř od federace, takže východní část Papuy-Nové Guineje by byla přirozeným přírůstkem k domovským územím [AST.GetName]. Nyní, když se Společnost národů rozpadla, se otevřela příležitost provést takovou federální reorganizaci."
 AST_a_rational_request: "Racionální žádost"
 AST_a_rational_request_desc: "Singapurská strategie teoreticky platí, ale pouze teoreticky. Henry Wynter a další neústupné hlasy měly po celou dobu pravdu; pokud vypukne pacifická válka, Británie bude nejspíše zaměstnána na vlastním kontinentu, a strategie postavená na britské pomoci proto neobstojí. Požádáme o kontrolu nad Singapurem, abychom za obranu našich oceánů mohli nést odpovědnost sami."
 add_trait_to_theorist_tt: "Přidat vlastnost §Yteoretikovi§!:"
 AST_volunteers: "Dobrovolníci"
 AST_volunteers_desc: "Důležitá je možnost volby; schopnost odmítnout výzvu do zbraně neznamená, že to Austrálie bude dělat vždy. Australané budou mít plné právo bojovat za to, co je správné, jak na vlastní, tak na cizí půdě."
 AST_until_the_tide_of_battle_swings: "Dokud se příliv bitvy neobrátí"
 AST_until_the_tide_of_battle_swings_desc: "Ve veřejném prohlášení dáme jasně najevo, že čas přehlížet hrozbu probouzející se na našem dvorku vypršel. Odmítáme přijmout politiku, podle níž musí být pacifický zápas považován za podřízenou část obecného konfliktu; Austrálie se musí okamžitě připravit na invazi."
 AST_walls_and_whispers: "Zdi a šepot"
 AST_walls_and_whispers_desc: "Neproniknutelné zdi spojené s uchem přitisknutým k zemi vytvářejí velký potenciál pro národní bezpečnost. Budou uvedeny do pohybu kroky, které postaví pozemní a pobřežní obranu v našich zemích na pevnější základ a zároveň v jejich rámci zřídí zpravodajské velitelství."
 AST_united_states_as_our_keystone: "Spojené státy jako náš opěrný bod"
 AST_united_states_as_our_keystone_desc: "Známe problémy, kterým Spojené království čelí. Známe nebezpečí rozptýlení sil, ale víme také, že Austrálie může padnout, a Británie přesto může vydržet. Jsme proto odhodláni, že Austrálie nepadne, a veškerou svou energii vložíme do vytvoření plánu, jehož opěrným bodem budou Spojené státy."
 AST_liberty_loans: "Půjčky svobody"
 AST_liberty_loans_desc: "Díky svým zkušenostem ve funkci ministra financí — podle některých dokonce největšího, jakého národ dosud měl — Ben Chifley prokázal svou schopnost řídit válečnou ekonomiku. Na jeho doporučení povzbudíme naše občany, aby převáděli přebytečné osobní příjmy do úspor a investovali do válečných půjček."
 AST_inevitably_independent: "Nevyhnutelně nezávislí"
 AST_inevitably_independent_desc: "Ačkoli Strana sjednocené Austrálie vždy oceňovala britské občanství, lhostejnost [ENG.GetNameDef] vůči australským zájmům nás donutila vyhlásit nezávislost a upřednostnit vlastní obranu. Nyní, když se zámořská služba v britských válkách přirozeně stala bezpředmětnou, jsou i odpůrci loajality ochotnější držet se linie; rozsáhlejší odvod proto narazí na menší odpor."
 AST_bring_on_the_giant: "Přiveďte obra"
 AST_bring_on_the_giant_desc: "Jako konečně sjednocený a autonomní národ budeme brzy podrobeni zkoušce odvahy. Zdá se, že druhá strana Pacifiku sdílí naše zájmy, a díky svému dobře rozvinutému vojenskému průmyslu může [USA.GetNameDef] výrazně prospět sobě i Austrálii tím, že našim jednotkám poskytne část svých bohatých zásob formou Lend-Lease."
 AST_bring_on_the_giant_tt: "  Pokud §Y[USA.GetNameDefCap]§! souhlasí:\n §Y+50§! jednotek §Ykonvojů§! bude přidáno do národních zásob."
 AST_allied_after_all: "Nakonec přece spojenci"
 AST_allied_after_all_desc: "Ačkoli byla australská nezávislost nezbytná, veškerá spolupráce s naším starým suzerénem neskončí. Zůstaneme loajální k frakci [ENG.GetFactionName], jako vždy, ale budeme usilovat o větší vliv uvnitř frakce."
 AST_the_pacific_resistance: "Pacifický odboj"
 AST_the_pacific_resistance_desc: "Australská nezávislost konečně přišla a je jen správné, abychom se odtrhli i od britského válečného úsilí. Pokud se místo toho budeme snažit o jednotu s [USA.GetNameDef], můžeme utvářet společné velitelské strategie, které budou brát ohled na australské zájmy, zatímco sami nezávisle převezmeme úplnou kontrolu nad vlastním obranným průmyslem a jeho rozšiřováním."
 AST_the_pacific_resistance_tt1: "§YAustrálie§! se připojí k frakci §Y[USA.GetFactionName]§!."
 AST_the_pacific_resistance_tt2: "§Y[USA.GetName]§! se připojí k frakci §YPacifický odboj§!."
 AST_conscription_at_last: "Konečně odvod"
 AST_conscription_at_last_desc: "Nezávislost chutná sladce, když si uvědomujeme, že nyní máme moc upřednostnit vlastní obranu — tato moc však s sebou nese i odpovědnost. Povinný odvod by se neměl rozšiřovat lehkomyslně, ale s válkou, která na nás nyní dolehla, se stal nezbytným."
 AST_equal_training: "Rovnocenný výcvik"
 AST_equal_training_desc: "Spolupráce se spojenci se musí pilovat, nikoli jen bezmyšlenkovitě předpokládat, že bude fungovat. Austrálie převezme iniciativu při organizaci společných výcvikových táborů pro národy frakce [ROOT.GetFactionName] a zajistí, aby všichni vojáci prošli stejně důkladným výcvikem."
 AST_a_northern_barrier: "Severní bariéra"
 AST_a_northern_barrier_desc: "Nepřítel přichází ze severu a před ním leží menší, nepřipravené národy, na které může libovolně udeřit, než nakonec dorazí k našim vlastním dveřím. Pokud se sjednotíme s [INS.GetNameDef] a vytvoříme jedinou bariéru, možná ještě budeme mít šanci jej zadržet."
 AST_demand_resources: "Požadovat zdroje"
 AST_demand_resources_desc: "Expanzionističtí agresoři hledí na Indočínu nejen kvůli samotnému území, ale také kvůli zdrojům, které vlastní. Pokud toto bohatství skončí v rukou nepřítele, jen prodlouží válku, zatímco v našich rukou by ji mohlo pomoci ukončit. Požádáme o kontrolu nad těmito zdroji; pokud jejich držitelé odmítnou spolupracovat, nejsou o nic lepší než nepřítel."
 AST_demand_resources_tt: "Odemkne rozhodnutí §Y$AST_resource_acquisition_cat$§! k vyžádání podílu na zdrojích národů jihovýchodní Asie."
 AST_reclaim_the_lost_territory: "Získat zpět ztracené území"
 AST_reclaim_the_lost_territory_desc: "Během procesu, který sjednotil australské kolonie do federace, se Nový Zéland nakonec rozhodl nezúčastnit. Od té doby však ústava nadále definuje Nový Zéland jako jeden z potenciálních států Australského společenství a umožňuje jeho přijetí. Připomeneme to našim východním sousedům a budeme tvrdit, že současná světová situace vyžaduje jednotu."
 AST_australia_first: "Austrálie na prvním místě"
 AST_australia_first_desc: "Krajně pravicové nadšení Strany středu mělo krátké trvání a skončilo jejím rozpuštěním v roce 1935. Začíná však vřít něco nového, vycházejícího z myšlenek podnikatele a politického aktivisty Williama Johna Milese. Pokud však nebudou podniknuty žádné kroky k mobilizaci těchto nálad, mohou vyprchat stejně rychle, jako se objevily. A proto budou kroky podniknuty."
 AST_pankhurst_walsh: "Adela Pankhurst Walsh"
 AST_pankhurst_walsh_desc: "Při formálním založení hnutí Australia First jmenujeme jeho prezidentkou Adelu Pankhurst Walsh. Jako zakladatelka Australského ženského cechu impéria Pankhurst Walsh — při zachování úzkých vazeb na londýnský Ženský cech — dlouho prosazovala hodnotu britského občanství. Tato hodnota bude tvořit základní princip našeho hnutí: pokračující vazby na Británii."
 AST_stephensen: "P.R. Stephensen"
 AST_stephensen_desc: "Při formálním založení hnutí Australia First jmenujeme jeho prezidentem P.R. Stephensena. Jako literární poradce Williama Johna Milese sdílí Stephensen izolacionistické a nacionalistické názory svého mentora. Ty budou tvořit dva základní principy ústavy našeho hnutí: nezávislost na Británii a sjednocení australské kultury."
 AST_stephensen_tt: "\nVolba prezidenta §Yhnutí Australia First§! určuje možné budoucí kroky."
 AST_a_growing_womens_guild: "Rostoucí Ženský cech"
 AST_a_growing_womens_guild_desc: "Od svého založení v roce 1928 prosazoval Australský ženský cech impéria průmyslovou spolupráci v boji proti národním hospodářským problémům. Pro dobro národa mají občané své vládě pomáhat, nikoli pracovat proti ní. S Pankhurst Walsh jako prezidentkou Australia First můžeme toto poselství prostřednictvím jeho politického hnutí šířit dále."
 AST_realize_the_value_of_british_citizenship: "Uvědomit si hodnotu britského občanství"
 AST_realize_the_value_of_british_citizenship_desc: "Suzerenita [ENG.GetNameDef] nad [AST.GetName] dlouho sloužila našemu národu jako ochranný štít i vůdčí světlo. Z Británie jsme vzešli a Británii zůstaneme — dokud nám bude stále sloužit."
 AST_the_bolsheviks_counterforce: "Protiváha bolševikům"
 AST_the_bolsheviks_counterforce_desc: "Vyšetřovací oddělení po desetiletí provádělo vyšetřování činnosti podvratných skupin. Jeho práce na potlačování levicových hrozeb má vysokou hodnotu a neměla by být zanedbána jen proto, že se odpůrci Australia First zavázali klást odpor našemu růstu. Budeme usilovat o pozice v australském zpravodajském úřadu a zajistíme, aby skutečná hrozba pro národní bezpečnost měla přednost."
 AST_public_meetings_tt: "Odemkne rozhodnutí §Yhnutí Australia First§! k mobilizaci členů a zvýšení podpory fašismu."
 AST_rile_up_veterans: "Podnítit veterány"
 AST_rile_up_veterans_desc: "Na počátku velké hospodářské krize se veteráni první světové války sjednotili v krajně pravicových polovojenských skupinách, aby čelili vzestupu komunismu. I když se tyto skupiny od té doby rozpustily, jejich bývalí členové nezmizeli; Australia First je pohltí a pochodeň antikomunismu bude předána dál."
 AST_eureka_stockade_monument_rally: "Sraz u památníku Eureka Stockade"
 AST_eureka_stockade_monument_rally_desc: "V roce 1854 v bitvě u Eureka Stockade australští zlatokopové zuřivě bojovali proti koloniálním silám kvůli nepřiměřené ceně těžebních licencí a zdanění zlatých dolů. Nespokojenost s britskou suzerenitou byla zjevná tehdy a je zjevná i nyní. Shromáždíme se u památníku bitvy a budeme volat po rozchodu s Británií."
 AST_australian_pivot_modifier: "Australský obrat"
 AST_well-being_of_the_community: "Blaho společenství"
 AST_well-being_of_the_community_desc: "Křesťanské ideály života a rodiny by měly být australským obyvatelstvem vysoce ceněny. Slabá porodnost posledních let však nepopiratelně ukazuje, že tyto ideály nebyly ctěny dostatečně. Pro blaho společenství zahájíme kampaň na podporu rodinného života."
 AST_covert_networks: "Tajné sítě"
 AST_covert_networks_desc: "S Australia First působící v rámci Vyšetřovacího oddělení budeme usilovat o přeshraniční spolupráci s podobně smýšlejícími hnutími v [ENG.GetNameDef]. Naše spojenectví s naším suzerénem nám může posloužit ještě jedním způsobem, neboť nám umožní tajně oslovit ideologicky spřízněné spojence a rozšířit naše zpravodajské kapacity."
 AST_refuse_british_wars: "Odmítnout britské války"
 AST_refuse_british_wars_desc: "Gallipolské tažení za Velké války ukázalo lehkovážnost, s jakou [ENG.GetNameDef] zachází s našimi expedičními silami, a představa dalšího zahraničního tažení v jeho jménu je tak zcela nemyslitelná. Australané požadují, aby pod britským velením už nikdy nebyla prolita krev, a nutí vládu jednat; Westminsterský statut bude ratifikován."
 AST_walls_like_uluru: "Zdi jako Uluru"
 AST_walls_like_uluru_desc: "Austrálie je kontinent sám pro sebe. Máme-li obstát bez štítu impéria, musíme si vybudovat vlastní. Pobřeží bude zpevněno, přístavy opevněny a přístupy učiněny zrádnými pro každého, kdo by si myslel, že tento národ je snadnou kořistí."
 AST_at_the_gates: "U bran"
 AST_at_the_gates_desc: "Svět směřuje k válce a Austrálie nesmí být zastižena nepřipravená. Továrny a loděnice národa musí přeřadit na vyšší rychlost. Nejde o přípravu na konflikt někoho jiného, nýbrž o přípravu na naše vlastní přežití."
 AST_the_guild_for_the_war_effort: "Cech pro válečné úsilí"
 AST_the_guild_for_the_war_effort_desc: "Australský ženský cech impéria byl vybudován, aby sloužil koruně. Jeho účel je nyní zcela přesměrován. Rozsáhlá organizační síť, kterou vybudoval, nyní nasměruje svou energii do válečného průmyslu, nemocnic a zásobovacích řetězců soběstačné Austrálie."
 AST_for_the_southern_cross: "Za Jižní kříž"
 AST_for_the_southern_cross_desc: "Jižní kříž nevlaje nad Británií. Vlaje nad námi. Australská identita je něco skutečného, něco vydobytého, něco, co stojí za obranu. Rodí se nová národní hrdost, nevypůjčená z Londýna ani definovaná vzdálenými institucemi, nýbrž vyrostlá zde, z této půdy, pod těmito hvězdami."
 AST_through_the_gates: "Skrze brány"
 AST_through_the_gates_desc: "Přípravy ustoupily naléhavosti. Program národní obrany se rozšiřuje s plnou vahou australského průmyslu za zády. Vedle stávajících zařízení vyrůstají nová, výrobní cíle se upravují směrem vzhůru a hranice mezi civilní výrobou a vojenskou nutností se tiše stírá."
 AST_toe_the_line: "Držet se linie"
 AST_toe_the_line_desc: "Pohodlí, na které si Australané zvykli během let prosperity, musí nyní ustoupit stranou. Příděly, delší pracovní doba a výzva ke službě jsou cenou nezávislosti. Ti, kdo odpoví, naleznou národ připravený stát za nimi. Stát však bude mít jen málo trpělivosti s těmi, kdo věří, že oběť je břemenem někoho jiného."
 AST_crush_the_gates: "Rozdrtit brány"
 AST_crush_the_gates_desc: "Budování je dokončeno. Australský průmysl nyní funguje v plném válečném režimu a jeho produkce je zcela směrována k obraně a prosazování národní moci. Ať přichází jakákoli bouře, Austrálie jí nebude čelit jako zdráhavé dominium, které se narychlo snaží mobilizovat."
 AST_national_defense: "Národní obrana"
 AST_national_defense_desc: "Díky cíleným investicím a národnímu řízení si Austrálie vybudovala průmyslovou základnu schopnou udržet vlastní obranu. Továrny a loděnice fungují pod dohledem státu a jejich produkce se neměří ziskem, nýbrž potřebami národa."
 modify_AST_national_defense_tt: "Upraví §Y$AST_national_defense$§! o:"
 AST_nauru_pact: "Nauruský pakt"
 AST_nauru_pact_desc: "Jelikož před námi stále stojí počáteční překážka převzetí moci, otázka nezávislosti se zdá být vzdálená; australská autonomie však není jen naším zájmem. Výměnou za záruku [GER.GetNameDef] naší svrchovanosti v případě britského odporu vůči Australia First nebo konečnému odtržení od Commonwealthu jim po nástupu k moci vrátíme jeden z jejich ztracených pacifických ostrovů: Nauru."
 AST_australian_culture_investments: "Investice do australské kultury"
 AST_australian_culture_investments_desc: "Svou esejí The Foundations of Culture in Australia ovlivnil Stephensen vznik básnického hnutí Jindyworobak a jasně ukázal jednu věc: australská kultura musí mít přednost. Zdá se, že vláda zcela přehlíží hodnotu umělců a spisovatelů, my však nikoli. Mobilizací příznivců hnutí Jindyworobak i Australia First podnítíme kulturní rozvoj."
 AST_australian_culture_investments_tt: "\nPo §Y365§! dnech:"
 AST_australia_first_party_focus: "Strana Australia First"
 AST_australia_first_party_focus_desc: "Členové Australia First dosáhli takového počtu, že postup hnutí již nelze déle zadržovat. Nastal čas, aby australská veřejnost přivítala nově registrovaný, nejhlasitější nacionalistický hlas: Stranu Australia First."
 AST_australia_first_party_req_tt: "§YStrana Australia First§! byla založena."
 AST_in_from_the_cold: "Z chladu dovnitř"
 AST_in_from_the_cold_desc: "Australia First a její příznivci se již nemusí skrývat. Špatné zacházení, které náš národ snášel pod dlouhou řadou předchozích vlád, konečně vychází na světlo a nastal čas, aby zazněly nové hlasy."
 AST_absorb_the_uap: "Pohltit UAP"
 AST_absorb_the_uap_desc: "Ačkoli Strana sjednocené Austrálie vždy zůstávala liberální, zároveň je pravicově orientovaná. S novou politickou stranou u kormidla však členové UAP možná nebudou mít příliš na výběr a budou muset podpořit věc současné vlády. Oslovíme nejvýznamnější členy a získáme je pro Stranu Australia First."
 AST_big_business_pact: "Pakt s velkým byznysem"
 AST_big_business_pact_desc: "Jelikož Strana Australia First usiluje o ochranu domácího průmyslu, našla mnoho příznivců mezi předními podnikateli. Výměnou za prosazování politik, které zvýší jejich zisky, podpoří naše politické a vojenské cíle."
 AST_big_business_pact_tt: "\nOdemkne rozhodnutí §YPakt s velkým byznysem§!, která ovlivní cíle průmyslu a výstavby."
 AST_autarky: "Autarkie"
 AST_autarky_desc: "Spoléhání se na zahraniční obchod je nejisté, zvláště v časech konfliktu; australský průmysl musí mít přednost, ne být vytlačován dovozem. Pouze omezením našich obchodních zákonů můžeme ochránit domácí ekonomiku a zajistit, že se Austrálie dokáže zásobovat sama."
 AST_energy_independence: "Energetická nezávislost"
 AST_energy_independence_desc: "Spoléhání se na zahraniční obchod je nejisté, zvláště v časech konfliktu; energetická nezávislost je nezbytná k zajištění toho, aby Austrálie dokázala fungovat i v těch nejhorších časech. Investicemi do rafinerií můžeme podpořit domácí výrobu energie. "
 remove_2_offsite_dockyard: "Odebere §R2§! mimo-mapové §Ynámořní loděnice§!."
 AST_british_pact: "Britský pakt"
 AST_british_pact_desc: "Navzdory našemu nedávnému odtržení od Britského Commonwealthu je v zájmu [AST.GetName] nadále spolupracovat se svou starou mateřskou zemí. Vzhledem k tomu, jak je [ENG.GetNameDef] napjatě rozkročeno po celém světě, by měla být naše ochota sdílet jeho břemena nabídkou vojenské spolupráce oceněna."
 AST_naurus_return_to_german_hands: "Návrat Nauru do německých rukou"
 AST_naurus_return_to_german_hands_desc: "Nyní, když Australia First plně drží otěže národa, nastal čas splnit slib týkající se Nauru a aby naši němečtí spojenci dodrželi svou část dohody. [AST.GetName] se konečně vymaní z řetězů Commonwealthu a Britové do toho nebudou mít co mluvit."
 AST_naurus_return_to_german_hands_tt: "„§YNauruský pakt§!“ se stane aktivním."
 AST_naurus_return_to_german_hands_tt_2: "„§YNauruský pakt§!“ je aktivní."
 AST_the_winner_takes_it_all: "Vítěz bere vše"
 AST_the_winner_takes_it_all_desc: "Ačkoli se obětování ostrova Nauru za německou spolupráci kdysi zdálo rozumné, nyní už tomu tak není. Když se naše schopnosti ukázaly jako silné, budeme usilovat o expanzi na Šalomounovy ostrovy a Nový Zéland, i kdyby to první mělo ještě prohloubit naši zradu Nauruského paktu. Koneckonců Šalomounovy ostrovy se stanou dalším německým územím ztraceným ve prospěch Austrálie."
 AST_resist_western_intruders: "Vzdorovat západním vetřelcům"
 AST_resist_western_intruders_desc: "Zdá se, že západní národy mají nutkání vměšovat se do záležitostí Pacifiku, ale tomu bude konec. Než dosáhnou našich břehů, my dosáhneme těch jejich a dokážeme, že [AST.GetName] není země, která se podřizuje požadavkům."
 AST_invasion_preparation_tt: "Doba přípravy invaze: §G-20.0%§!"
 AST_naval_invasion_penalty_tt: "Postih za invazi: §G-20.0%§!"
 AST_expand_the_fort: "Rozšířit pevnost"
 AST_expand_the_fort_desc: "Západní Pacifik nepatří pod velení [USA.GetNameDef]. Ostrovy nárokované Američany náleží východoasijským národům, a jak australský vliv poroste, budeme to my, kdo si je nárokuje. "
 AST_integrate_the_fort: "Integrovat pevnost"
 AST_integrate_the_fort_desc: "Od roku 1920 jsme spravovali Novou Guineu na základě mandátu Společnosti národů a Papua byla vnějším územím [AST.GetName] téměř od federace, takže východní část Papuy-Nové Guineje by byla přirozeným přírůstkem k domovským územím [AST.GetName]. V rámci našeho úsilí o sjednocení australské kultury by to byl další krok."
 AST_defying_american_interference: "Vzdorovat americkému vměšování"
 AST_defying_american_interference_desc: "Stín [USA.GetNameDef] se nad námi tyčí a hrozí, že zasáhne pokaždé, když naše kroky nebudou v souladu s jeho zájmy. Dokud takto mocná globální síla svírá železnou pěst kolem [PHI.GetNameDef], nebudou východoasijské národy nikdy skutečně patřit východní Asii. [AST.GetName] se nepodřídí žádné autoritě cizích vetřelců — Filipíny budou naše."
 AST_the_pacific_garrison: "Pacifická posádka"
 AST_the_pacific_garrison_desc: "Ačkoli ochrana jihovýchodní Asie a Pacifiku leží v britském zájmu, tento region je od Britských ostrovů daleko. Výměnou za jejich podporu v zásobování nabídneme, že převezmeme velení nad obranou území, což umožní [ENG.GetNameDef] obrátit pozornost jinam."
 AST_vichy_out_of_africa: "Vichisty z Afriky"
 AST_vichy_out_of_africa_desc: "Pád či spolupráce vichistické Francie patří mezi hlavní cíle [ENG.GetNameDef]. Jako gesto dobré vůle se [AST.GetName] připojí a bude postupovat proti francouzským africkým koloniím, dokud nebudou podrobeny."
 AST_vichy_out_of_africa_tt1: "Přidá nároky na území §Yvichistické Francie§! v §YAfrice§! skrze zaměření §YVichisty z Afriky§!.\n"
 AST_vichy_out_of_africa_tt2: "Přidá nároky na území §Yvichistické Francie§! v §YAfrice§! skrze rozhodnutí §YVichisty z Afriky§!.\n"
 AST_vichy_africa_claim_flag: "Nároky [AST.GetFlag]§Y[AST.GetName]§! na všechna území §Yvichistické Francie§! v §YAfrice§! budou přidány k §YKonec vměšování§!."
 AST_vichy_claim_tt: "Nároky [AST.GetFlag]§Y[AST.GetName]§! budou přidány k §YKonec vměšování§!."
 vichy_in_africa_trigger: "§YVichistická Francie§!: Jakýkoli ovládaný stát:\n    Nachází se v §YAfrice§!"
 vichy_wargoal: "Získá válečný cíl §Yanexe§! proti §Yvichistické Francii§!."
 AST_britain_supplying_ships: "Británie dodává lodě"
 AST_britain_supplying_ships_desc: "Při nesení tíhy ochrany břehů britských spojenců se ukázalo, že flotila [ROOT.GetName] musí být rozšířena. Je jen správné, aby nám [ENG.GetNameDefCap] dodala lodě."
 AST_hand_in_glove: "Ruku v ruce"
 AST_hand_in_glove_desc: "Rozšiřováním na sever můžeme posílit australský vliv nad diplomacií a konflikty jihovýchodní Asie. Již jsme prokázali schopnost chránit britské zájmy po boku těch vlastních, a tak musí [ENG.GetNameDef] pochopit, proč by jejich vzdálená území byla lépe umístěna v našich rukou."
 AST_claim_french_indochina: "Nárokovat Francouzskou Indočínu"
 AST_claim_french_indochina_desc: "Osud Francie je nerozhodnutý a osud jejích kolonií o nic jistější. Jiné národy se mohou pokusit vztáhnout své chamtivé ruce na Francouzskou Indočínu, ale nad těmi našimi nezvítězí."
 AST_undeniably_ours: "Nepopiratelně naše"
 AST_undeniably_ours_desc: "Ať už by nám diplomacie mohla přiznat cokoli, nikdy by nám nepřiznala vše. V křehkém stavu vichistické Francie jsou její hranice pouhými návrhy a vzdát se příležitosti plně obsadit její země by bylo krajně nerozumné. Nevyhnutelně nadešel čas války."
 AST_done_meddling: "Konec vměšování"
 AST_done_meddling_desc: "Vždy loajální ke staré zemi, [AST.GetName] pokračuje v boji v britských bitvách se vztyčenou hlavou. Australané jsou spolehlivý druh lidí, ale to neznamená, že by měli být považováni za samozřejmost. Zatímco [AST.GetName] bojuje za [ENG.GetNameDef], bude [ENG.GetNameDef] bojovat i za [AST.GetName]."
 AST_northern_advancement: "Postup na sever"
 AST_northern_advancement_desc: "Ačkoli by se Austrálie raději věnovala vlastním politickým záležitostem, nemůžeme očekávat, že nás nechají na pokoji, pokud ze sebe neuděláme hrozbu. [INS.GetNameDefCap] je země jako my, oběť evropských vetřelců, kteří neodcházejí. Vznesením vlastního nároku na toto území vyšleme jasný signál: pacifické národy mají být ponechány na pokoji."
 AST_soothing_australian_fears: "Utišit australské obavy"
 AST_soothing_australian_fears_desc: "Ačkoli někteří vládní činitelé věří v možnost australsko-japonské spolupráce, australská veřejnost nikoli. Po tak dlouhých obavách z japonské invaze je představa spojení rukou s týmž potenciálním agresorem pro většinu lidí těžko pochopitelná. A proto jejich obavy utišíme tím, že se připravíme na válku."
 AST_soothing_australian_fears_tt: "\nPo §Y180§! dnech:"
 AST_dividing_the_pacific: "Rozdělení Pacifiku"
 AST_dividing_the_pacific_desc: "Australia First prosazuje mír s [JAP.GetNameDef] a definuje tento národ — na rozdíl od většiny australských občanů — jako potenciálního pacifického spojence, nikoli jako neustále se blížící hrozbu. Jak moc [AST.GetName] roste, je jen rozumné, aby [JAP.GetName] také souhlasilo a aby potenciální konflikty mezi našimi dvěma národy byly vyřešeny dříve, než budou mít šanci vzniknout."
 AST_dividing_the_pacific_ast_gain_tt: "[GET_AST_DIVIDING_THE_PACIFIC_AST_GAIN]"
 AST_dividing_the_pacific_jap_gain_tt: "[GET_AST_DIVIDING_THE_PACIFIC_JAP_GAIN]"
 AST_dividing_the_pacific_tt1: "§GZískáme§!:"
 AST_dividing_the_pacific_tt2: "§ROni získají§!:"
 AST_dividing_the_pacific_tt3: "§Y[AST.GetName]§! předá následující ovládaná území:"
 AST_against_war_and_fascism: "Proti válce a fašismu"
 AST_against_war_and_fascism_desc: "Hnutí proti válce a fašismu je australskou odnoží mezinárodního úsilí podporovaného Kominternou, jehož cílem je mobilizovat dělníky proti reakčním silám. Ačkoli v posledních letech ztratilo na síle, je na nás, abychom jeho prapor opět nesli vpřed."
 AST_world_peace: "Světový mír"
 AST_world_peace_desc: "Hnutí proti válce a fašismu usilovně pracovalo na vydávání časopisu nazvaného „Světový mír“, který odhaluje zlo fašistického hnutí v Německu, Itálii, zejména během španělské občanské války. Články v něm obsažené podnítily dobrovolníky, kteří se dychtivě hlásí do boje proti fašismu."
 AST_red_fred: "Rudý Fred"
 AST_red_fred_desc: "„Rudý“ Fred Paterson se poprvé prosadil v komunistickém hnutí jako kandidát na starostu Brisbane v roce 1934, kde utrpěl drtivou porážku. Jeho ambice však nepohasly a nyní kandiduje do městské rady v Townsville. S naší podporou by se mohl stát prvním komunistou zvoleným do veřejné funkce."
 AST_workers_defence_corps_sparks_anew: "Dělnický obranný sbor znovu vzplane"
 AST_workers_defence_corps_sparks_anew_desc: "Dělnický obranný sbor byl původně vytvořen k obraně stávkových hlídek a stávek. S rostoucí agresivitou skupin, jako je Nová garda, byl znovu zformován, aby opět působil jako štít pro ty, kdo protestují za lepší práva a příležitosti."
 AST_a_controversial_recruitment: "Kontroverzní nábor"
 AST_a_controversial_recruitment_desc: "Maurice Blackburn je známý socialistický právník proslulý obhajobou práv dělníků v právních bitvách proti utlačovatelským zaměstnavatelům. Jako člen Labouristické strany se však ocitl v pochybnostech ohledně své loajality kvůli vazbám na radikálnější Hnutí proti válce a fašismu."
 AST_from_picket_line_to_front_line: "Od stávkové hlídky na frontovou linii"
 AST_from_picket_line_to_front_line_desc: "Jak zastrašovací taktiky odpůrců osvobození dělnické třídy sílí, musí se v reakci na to vyvíjet i naše vlastní obrana. S každým incidentem jsou dělníci odhodlanější a stále více jich přichází, aby se připojili k Obrannému sboru."
 AST_pig_iron_protests: "Protesty proti surovému železu"
 AST_pig_iron_protests_desc: "Naši přístavní dělníci v mnoha případech nesouhlasí se svou vládou, a zvláště ne v otázce prodeje surového železa válčícím zemím. Australané nemají zájem podílet se na agresi ani přepravovat vybavení používané proti nevinným civilistům, a proto tak neučiní ani [AST.GetName]; vyhlaste stávku."
 AST_part_with_colonizer: "Rozejít se s kolonizátorem"
 AST_part_with_colonizer_desc: "Kořen našich bojů leží v Britském impériu a kapitalistickém systému, který nám vnutily z dálky. Už ne. Zatímco je Británie rozptylována krizemi blíže domovu, nastal čas chopit se svého osudu a vytyčit si vlastní cestu jako svobodný a nezávislý národ."
 AST_take_it_to_the_streets: "Vynést to do ulic"
 AST_take_it_to_the_streets_desc: "Průmyslová akce je jedním z nejmocnějších nástrojů, které máme k vynucení změny ve společnosti, a musíme jej použít proti systému navrženému pouze k vykořisťování. Nastal čas vzít si zpět výrobní prostředky, dělníci Austrálie, spojte se!"
 AST_workers_educational_association: "Dělnické vzdělávací sdružení"
 AST_workers_educational_association_desc: "Dělnické vzdělávací sdružení je mezinárodní organizace zasvěcená zpřístupnění vzdělání pracujícím lidem. Měli bychom založit vlastní pobočku, neboť skutečná rovnost příležitostí začíná ve třídě."
 AST_off_leash: "Bez vodítka"
 AST_off_leash_desc: "Přístavní dělníci jsou páteří odborových akcí v Austrálii. Jako ostrov velikosti kontinentu se nelze divit, že námořní práce hraje v našem hospodářství tak zásadní roli. Nastal čas sundat obojky a vypustit mořské psy průmyslu."
 AST_a_national_housing_commission: "Národní bytová komise"
 AST_a_national_housing_commission_desc: "Bydlení je již dlouho spornou otázkou. Každý si zaslouží střechu nad hlavou, přesto se tato základní nezbytnost příliš často používá proti dělníkům a její cena se stává formou ekonomického útlaku. Už ne. Budeme požadovat spravedlivý přístup k bydlení pro všechny."
 AST_guaranteed_employment: "Zaručené zaměstnání"
 AST_guaranteed_employment_desc: "Socialismus je příliš často odmítán obviněními z lenosti či závislosti namířenými proti těm, kdo jsou v nouzi. To musí skončit. Usilujeme pouze o spravedlivou šanci na práci a spravedlivou mzdu, s níž dokážeme uživit své rodiny."
 AST_equal_pay: "Rovná mzda"
 AST_equal_pay_desc: "Je trvalým omylem tvrdit, že ti, kdo vlastní výrobní prostředky, si zaslouží více než ti, kdo v nich pracují. Vlastníci ani manažeři nedřou tvrději a nejsou ani ze své podstaty schopnější. Vyrovnáním mezd lze plody práce rozdělit spravedlivěji napříč společností."
 AST_all_for_one_one_for_all: "Všichni za jednoho, jeden za všechny"
 AST_all_for_one_one_for_all_desc: "„Všichni za jednoho a více pro mě“ je již dlouho bojovým pokřikem buržoazie, jejíž chamtivost žádá stále více a vrací stále méně. Slib, že bohatství proteče směrem dolů, je lež. Musí být sdíleno rovným dílem, všemi a pro všechny."
 AST_abolition_of_private_property: "Zrušení soukromého vlastnictví"
 AST_abolition_of_private_property_desc: "Soukolí průmyslu je mazáno krví dělníků. Musíme skoncovat s brutalitou hromadění majetku a zcela zrušit soukromé vlastnictví. Vše bude sdíleno, každý podle svých schopností, každému podle jeho potřeb."
 AST_centralized_production: "Centralizovaná výroba"
 AST_centralized_production_desc: "Tržní síly jsou chaotické a nerovné. Máme-li vybudovat skutečně spravedlivou společnost, stát musí převzít ústřední roli při určování toho, co se vyrábí, kým a kde. Naše byrokracie vede pečlivé záznamy a má nejlepší předpoklady stanovovat výrobní kvóty."
 AST_public_institutions: "Veřejné instituce"
 AST_public_institutions_desc: "Společnost ke svému fungování vyžaduje mnoho základních služeb, od zdravotnictví a bydlení po péči o děti a dopravu. Stát je musí poskytovat univerzálně a zajistit přístup všem bez omezení. Osvobozeny od nutnosti vytvářet soukromý zisk mohou tyto systémy fungovat efektivně a sloužit potřebám celého obyvatelstva."
 AST_planned_extraction: "Plánovaná těžba"
 AST_planned_extraction_desc: "Máme štěstí, že vlastníme zemi tak bohatou na zdroje. Musíme zajistit, aby její bohatství bylo systematicky těženo a směrováno do průmyslových odvětví, která je potřebují nejvíce."
 AST_maritime_commission: "$USA_maritime_commission$"
 AST_maritime_commission_desc: "$USA_maritime_commission_desc$"
 AST_state_research_funding: "Státní financování výzkumu"
 AST_state_research_funding_desc: "Abychom maximalizovali účinnost našich výzkumných institucí, stát musí sloužit jako jejich hlavní zdroj financování, směrovat úsilí tam, kde je nejvíce potřeba, a zajistit, aby informace zůstaly přísně kontrolované. Koneckonců nemůžeme riskovat, že naše občany znepokojí nesprávné myšlenky."
 AST_graziers_to_industry: "Pastevci do průmyslu"
 AST_graziers_to_industry_desc: "Během velké hospodářské krize se naše města vylidňovala, když dělníci hledali stabilitu na venkově. Nyní, s kontrolou nad výrobními prostředky, je můžeme přivést zpět do průmyslu. Musíme jim vštípit potřebu národa: že pece průmyslu musí být živeny potem člověka."
 AST_free_school_policy: "Politika bezplatného školství"
 AST_free_school_policy_desc: "Abychom utvářeli vzorového občana, musíme utvářet jeho myšlenky. Od kolébky až po univerzitu bude stát vést to, co se naše děti učí. Tímto způsobem můžeme zajistit, aby budoucí generace chápaly význam socialistického ideálu a nebezpečí volných trhů... i volného myšlení."
 AST_free_healthcare_policy: "Politika bezplatné zdravotní péče"
 AST_free_healthcare_policy_desc: "Naši lidé si zaslouží být osvobozeni od nemocí a zranění, a pokud dojde k nejhoršímu, nesmí je neštěstí uvrhnout do bídy, jak se to děje v jiných společnostech. Poskytneme univerzální přístup ke zdravotní péči, nemocnicím a lékařům - neboť zdravý lid je produktivní lid."
 AST_the_publics_australia: "Austrálie veřejnosti"
 AST_the_publics_australia_desc: "Odhodili jsme starý řád a vybudovali národ, který existuje pro mnohé, nikoli pro hrstku. Průmysl, práce i zdroje nyní slouží lidu jako celku. Toto je Austrálie veřejnosti. Rovná, sjednocená a nezlomná."
 AST_the_australian_commonwealth: "Australský Cominwealth"
 AST_the_australian_commonwealth_desc: "Británie si kdysi nárokovala plášť vůdcovství nad Commonwealthem, ale její vize byla zkažena kapitalistickými zájmy. My se této role chopíme a povedeme národy ke společné socialistické utopii."
 AST_union_control_commonwealth: "Odemkne rozhodnutí §YOdborová kontrola§!. \nUmožní komunistickou infiltraci Nového Zélandu, Malajsie, Barmy a nakonec Indie."
 AST_a_comrade_emancipated: "Osvobozený soudruh"
 AST_a_comrade_emancipated_desc: "Po celém světě zůstává mnoho národů stále spoutáno řetězy kapitalismu a jejich lidem je upírána skutečná svoboda. Jako svobodný socialistický stát máme povinnost pomoci s jejich osvobozením. Dělníci světa, spojte se, a společně tyto řetězy svrhneme."
 AST_union_control_local: "Odemkne rozhodnutí §YOdborová kontrola§!. \nUmožní komunistickou infiltraci Indonésie a Filipín."
 AST_comintern: "Vstoupit do Kominterny"
 AST_comintern_desc: "Ačkoli se Sovětský svaz občas odchýlil od pravých marxistických zásad, zůstává praporečníkem dělnické internacionály. Vstupem do Kominterny můžeme sjednotit naše úsilí a nést pochodeň socialismu po celém světě."
 AST_for_greater_good: "Pro vyšší dobro"
 AST_for_greater_good_desc: "Naše vize světové revoluce vyžaduje krev a oběti. Na příliš mnoha místech pochodeň socialismu skomírá; musíme odpovědět na výzvu a vyslat podporu, abychom zajistili, že nevyhasne. Koneckonců je to pro vyšší dobro (vyšší dobro)."
 AST_make_common_cause: "Spojit síly"
 AST_make_common_cause_desc: "Pod naším vedením začal Commonwealth vzkvétat, veden světlem socialismu z temnot kapitalistického útlaku. V této rozhodující chvíli musíme zajistit, aby naše vůle nebyla zlomena a abychom společně pochodovali k lepším zítřkům."
 AST_the_red_pacific: "Rudý Pacifik"
 AST_the_red_pacific_desc: "Pacifik musí být přetvořen k obrazu revoluce. Napříč ostrovy a pobřežími našeho regionu podpoříme vzestup socialistických vlád a zajistíme, aby rudý prapor vlál od břehu ke břehu."
 AST_the_irish_anti-britain_pact: "Irský protibritský pakt"
 AST_the_irish_anti-britain_pact_desc: "Británie příliš dlouho stála jako bašta kapitalismu, chráněná svou ostrovní polohou a námořní silou. Podněcováním nepokojů mezi přístavními dělníky v Irsku a Severním Irsku můžeme prolomit její obranu a otevřít našim silám cestu přes Irské moře."
 AST_stretch_the_fleet: "Napnout flotilu"
 AST_stretch_the_fleet_desc: "Británie stále stojí jako bašta kapitalismu, chráněná svou mocnou flotilou. Nastal čas rozšířit naše vlastní námořní schopnosti, přenést boj k nim a ukázat světu, který ostrov je větší."
 AST_chinese_relations: "Čínské vztahy"
 AST_chinese_relations_desc: "Naši soudruzi v Číně bojují o samotné přežití. Máme prostředky, jak jim pomoci, ale musíme jednat rychle, než je přemohou imperialistické síly, které se proti nim sešikovaly."
 AST_westward_battles: "Bitvy na západě"
 AST_westward_battles_desc: "Fašistické síly ovládají západ a ohrožují samotnou podstatu našeho přežití. Nyní, když jsme spojeni s Kominternou, musíme přenést boj k nim a postavit se těm, kdo by zničili dělnickou utopii, kterou budujeme."
 AST_strongholds: "Bašty"
 AST_strongholds_desc: "Abychom zajistili svou pozici na tomto novém válčišti, musíme podpořit naše irské soudruhy proti imperiálnímu srdci kapitalismu. Jejich dřívější boj za nezávislost nabízí cenná poučení, zatímco se společně připravujeme na další fázi globálního konfliktu."
 AST_out_of_the_den: "Ven z doupěte"
 AST_out_of_the_den_desc: "Mnozí v Irsku stále chovají hlubokou zášť vůči britské vládě. Nastal čas ukázat naši sílu a vytáhnout je ze stínů, shromáždit je k naší věci proti společnému nepříteli."
 AST_end_the_kingdom: "Ukončit království"
 AST_end_the_kingdom_desc: "Nadešel čas. Kořen imperialistického kapitalismu bude bodnut do svého prohnilého srdce. Osvobození dělníků v celém Britském impériu je na dosah. Ukončete monarchii. Ukončete království. Ukončete útlak. Dělníci Commonwealthu, spojte se!"
 AST_red_solidarity: "Rudá solidarita"
 AST_red_solidarity_desc: "Boj v Číně zuří dál, zatímco miliony trpí a umírají. Jejich boj je naším bojem a nemůžeme nečinně přihlížet. Můžeme zasáhnout, sdílet jejich břemeno a zajistit, aby plamen revoluce nezakolísal."
 AST_free_the_colonies: "Osvobodit kolonie"
 AST_free_the_colonies_desc: "Ohně revoluce hoří napříč hroutícím se Britským impériem. Kolonie už nebudou koloniemi, ale svobodnými národy. Povstaňte, soudruzi! Svrhněte své okovy a připojte se k revoluci!"
 AST_battle_of_the_ocean: "Bitva o oceán"
 AST_battle_of_the_ocean_desc: "Oceány dlouho sloužily jako tepny světového obchodu. Nyní nastal čas přenést boj do Pacifiku a přetnout systém, který živí. Vody zrudnou krví zkažených kapitalistů i hrdinů revoluce."
 AST_borderless_solidarity: "Solidarita bez hranic"
 AST_borderless_solidarity_desc: "Solidarita. Slovo, které sjednocuje dělníky světa. Žádná hranice nás nemůže rozdělit, žádný národ nemůže stát sám. Kdekoli vzplane boj, odpovíme na výzvu a společně se postavíme do globálního boje za osvobození."
 AST_an_equal_union: "Rovnocenná unie"
 AST_an_equal_union_desc: "Ačkoli neseme prapor revoluce, všichni, kdo se k nám připojí, stojí jako rovní. V této unii se zdroje, práce i myšlenky sdílejí svobodně a kují budoucnost, v níž je prosperita společná a žádný národ nestojí nad jiným."
 AST_expanding_influence: "Rozšiřování vlivu"
 AST_expanding_influence_desc: "Stojíme na správné straně dějin a naše myšlenky mluví samy za sebe. Příslib dělnického ráje není snem, ale skutečností ve zrodu. Tuto vizi můžeme šířit dál a zvát ostatní, aby se k nám připojili při budování společné budoucnosti."
 AST_public_works: "Veřejné práce"
 AST_public_works_desc: "Velká hospodářská krize zanechala australskou ekonomiku v zoufalé situaci. Zahájíme řadu programů veřejných prací, abychom lidem znovu dali práci a obnovili spotřebitelské výdaje."
 AST_lang_plan: "Langův plán"
 AST_lang_plan_desc: "Jack Lang se dostal do čela hospodářské politiky díky svému hlasitému odmítání splácet zahraniční dluhové závazky a místo toho přesměrovával tyto prostředky na veřejné iniciativy zaměřené na podporu domácího růstu. Koneckonců z kamene krev nevymáčkneš."
 AST_exports_for_economic_recovery: "Vývoz pro hospodářskou obnovu"
 AST_exports_for_economic_recovery_desc: "Odpůrci Langových myšlenek namísto toho navrhují využít zahraniční trhy a dluh k podpoře zámořských investic a prodeje a zavázat se k exportně orientované ekonomice, která podpoří domácí výrobu, zaměstnanost a nakonec i spotřebitelské výdaje."
 AST_the_phosphate_commision: "Fosfátová komise"
 AST_the_phosphate_commision_desc: "Po Velké válce bylo Nauru svěřeno do společné správy Austrálie, Nového Zélandu a Spojeného království. V roce 1919 byla práva na veškerý prodej fosfátů na ostrově převedena na tyto správce vedené Austrálií. Díky svému vedoucímu postavení můžeme ovlivňovat ceny a zajistit si pro domácí trh vysoce konkurenční sazby."
 AST_goods_standard: "Zbožový standard"
 AST_goods_standard_desc: "Základním pilířem ekonomické teorie Jacka Langa je zrušení zlatého standardu v Austrálii a jeho nahrazení zbožovým standardem, který váže peněžní zásobu na skutečné množství vyrobeného zboží. To zajišťuje, že tok kapitálu je přímo svázán s domácí produktivitou, nikoli s vnějšími faktory."
 AST_standard_gauge_line_to_darwin: "Trať normálního rozchodu do Darwinu"
 AST_standard_gauge_line_to_darwin_desc: "Příliš dlouho nám chybělo řádné spojení s našimi severními územími. V rámci širšího programu veřejných prací zaměřeného na navrácení peněz do ekonomiky můžeme vybudovat železnici spojující naše jižní města se severem."
 AST_lang_is_right: "Lang má pravdu"
 AST_lang_is_right_desc: "Tak se ukázalo, že Lang měl pravdu! Odmítnutím upřednostňovat zahraniční věřitele a agresivnějším využitím vlastního bankovního systému můžeme uvolnit značné prostředky. Ty pak mohou být nasměrovány do domácí ekonomiky, kde poskytnou tolik potřebné investice a podnítí růst."
 AST_within_reach: "Na dosah"
 AST_within_reach_desc: "Tak blízko, a přece tak daleko. Austrálie je země nesmírně bohatá na zdroje, a pokud se prokopeme jen o trochu hlouběji, leží nám pod nohama nevýslovné bohatství. Díky rozšíření naší infrastruktury se zpřístupnily i odlehlé doly a my stojíme na prahu éry australské prosperity poháněné nerostným bohatstvím."
 AST_a_domestic_supply_chain: "Domácí dodavatelský řetězec"
 AST_a_domestic_supply_chain_desc: "Jedním z vedlejších účinků našeho zaměření na domácí ekonomiku je vznik mimořádně odolného výrobního systému. Jelikož všechny úrovně výroby sídlí doma, jsme do značné míry chráněni před vnějšími otřesy."
 AST_broken_hill_propietary_company: "Broken Hill Proprietary Company"
 AST_broken_hill_propietary_company_desc: "Broken Hill Proprietary Company patří mezi přední těžební a ocelářské podniky v Austrálii. Místní ji přezdívají „Velký Australan“ a v odvětví dominuje. Vzhledem k dramatickému nárůstu poptávky po surovinách má společnost výborné předpoklady k ještě rychlejšímu růstu."
 AST_radium_hill: "Radium Hill"
 AST_radium_hill_desc: "V Jižní Austrálii byl objeven uran a důl Radium Hill má značný potenciál k rozšíření. Přestože stále odhalujeme všechny možnosti těchto nově vznikajících technologií, je jasné, že stojíme na prahu atomového věku, a právě toto by mohl být náš vstup do něj."
 AST_industrial_expansion: "Průmyslová expanze"
 AST_industrial_expansion_desc: "Velká hospodářská krize ochromovala hospodářský výkon našeho národa po velkou část uplynulého desetiletí. Nyní, když máme politickou vůli k přímějším krokům, bychom ji měli nasměrovat do odvážného rozšíření naší průmyslové základny, vytvářet pracovní místa, zvyšovat poptávku po zdrojích a vyrábět více zboží pro trh."
 AST_income_tax_assessment_act: "Zákon o vyměření daně z příjmu"
 AST_income_tax_assessment_act_desc: "Náš daňový systém je ve špatném stavu a lidé se v něm obtížně orientují, což vyžaduje tvrdý státní dohled, který si sotva můžeme dovolit. Přepracováním a zefektivněním příslušných ustanovení můžeme výrazně zvýšit účinnost výběru daní."
 AST_council_for_scientific_and_industrial_research: "Rada pro vědecký a průmyslový výzkum"
 AST_council_for_scientific_and_industrial_research_desc: "Rada pro vědecký a průmyslový výzkum byla posílena po imperiální konferenci v roce 1923, aby pomohla rozšířit hospodářskou základnu různých kolonií a dominií. Ačkoli její přínos byl významný, nastal čas dát tomuto orgánu nové zaměření: rozvoj výroby a sekundárních průmyslových odvětví."
 AST_bring_home_the_farmers: "Přivést farmáře domů"
 AST_bring_home_the_farmers_desc: "Během Velké hospodářské krize se naše velká města výrazně vylidnila, když se dělníci přesouvali na venkov za zemědělskou prací. Nyní, když se podmínky začínají zlepšovat, bychom měli návrat naší pracovní síly podpořit pobídkami, abychom mohli znovu spustit továrny a obnovit výrobu."
 AST_reverse_wage_cuts: "Zvrátit škrty mezd"
 AST_reverse_wage_cuts_desc: "Abychom podnikům dali šanci obstát, zavedli jsme v celé ekonomice řadu mzdových škrtů. Nyní, když vidíme známky obnovy, bychom měli změnit směr. Rostoucí mzdy vedou k větší kupní síle, což pomáhá pohánět spotřebu a hospodářský růst."
 AST_the_manpower_directorate: "Ředitelství personálu"
 AST_the_manpower_directorate_desc: "Jak se naše ekonomika stává stále složitější, čelíme rostoucím problémům v oblasti personálu. Toto ředitelství zajistí, aby byli správní lidé umístěni na správné pozice, se správnými dovednostmi a ve správný čas."
 AST_recovery: "Obnova"
 AST_recovery_desc: "Poprvé náš hrubý domácí produkt překonal úroveň před krizí. Je to okamžik k oslavě, protože jediným směrem naší ekonomiky je nyní růst. Vstupujeme do období silného rozvoje a nastal čas sklízet plody naší obnovené prosperity."
 AST_devalued_currency: "Devalvovaná měna"
 AST_devalued_currency_desc: "Jedním z nejúčinnějších způsobů, jak zvýšit vývoz, je slabší měna. Pokud si zahraniční kupci mohou za své peníze koupit více našeho zboží, protože jejich měna má vyšší hodnotu, stáváme se mezinárodně konkurenceschopnějšími. Je to však dvojsečná zbraň, protože dovoz z jiných zemí se také prodraží."
 AST_reverse_industry_tariffs: "Zvrátit průmyslová cla"
 AST_reverse_industry_tariffs_desc: "V minulosti jsme využívali cla k ochraně domácího průmyslu před zahraniční konkurencí. To však vedlo k obchodním válkám a odvetným clům proti našemu vývozu, což zvyšovalo ceny. Měli bychom tyto bariéry snížit a podpořit vzájemné ústupky, které pomohou rozšířit obchod."
 AST_foreign_competition: "Zahraniční konkurence"
 AST_foreign_competition_desc: "Konkurence prospívá podnikání; podporuje inovace a efektivitu a zároveň odstraňuje samolibost. Venku je svět, kde pes žere psa, a my musíme zajistit, aby náš pes byl největší a abychom mu sundali obojek, aby mohl soutěžit zcela svobodně."
 AST_expanding_into_new_markets: "Expanze na nové trhy"
 AST_expanding_into_new_markets_desc: "Výhoda spoléhání se na zahraniční trhy místo domácího je prostá. Globální trh je obrovský. Vždy budou existovat nové trhy, na které lze proniknout; stačí najít naši výhodu a prokázat nadřazenost australského zboží a obchodních postupů."
 AST_populate_or_perish: "Zalidnit, nebo zahynout"
 AST_populate_or_perish_desc: "Když udeřila Velká hospodářská krize, porodnost prudce poklesla a od té doby se jen obtížně zotavuje. Za účelem dalšího domácího rozvoje zřídíme federální Ministerstvo imigrace, které povede a dohlédne na nový imigrační program."
 AST_recruitment_drive: "Náborová kampaň"
 AST_recruitment_drive_desc: "Slabá vůle předchozích vlád a jejich nadměrné spoléhání se na Británii vedly k dlouhému období zanedbávání australských ozbrojených sil. To už nebude pokračovat, protože zahájíme kampaň na podporu náboru do Australských obranných sil."
 AST_new_deal: "Nový úděl"
 AST_new_deal_desc: "Protest, který se konal při 150. výročí [AST.GetName], jasně ukázal, že naše zákony týkající se domorodých občanů musí být přehodnoceny. Na žádost aktivistů za práva Aboriginců se s nimi sejdeme, abychom společně určili cestu k plnému občanství pro domorodé národy."
 AST_the_1938_sesquicentenary_flag: "Událost §Y150. výročí roku 1938§! proběhla."
 AST_the_1938_sesquicentenary_tt: "Zaměření „§YNový úděl§!“ ve větvi §YZalidnit, nebo zahynout§! se zpřístupní."
 AST_repeal_immigration_restrictions: "Zrušit imigrační omezení"
 AST_repeal_immigration_restrictions_desc: "Ministerstvo imigrace je svazováno zastaralými zákony, které určují, komu je dovoleno přistěhovat se do [AST.GetName]. Navzdory riziku vyvolání kontroverzí tyto zákony zrušíme a místo nich zavedeme kvótový systém ke kontrole toku přistěhovalců."
 AST_womens_armed_services: "Ženské ozbrojené služby"
 AST_womens_armed_services_desc: "Navzdory prudkému odporu bude vznik ženských ozbrojených služeb pokračovat. Každá pomocná ruka bude vítána při obraně [AST.GetName] před jeho agresory, bez ohledu na pohlaví. Pro podporu náboru a výcviku má volba ředitelek těchto sil prvořadý význam."
 AST_northern_territory_reconnaissance_unit: "Průzkumná jednotka Severního teritoria"
 AST_northern_territory_reconnaissance_unit_desc: "Flight Lieutenant a antropolog Donald Thomson prosazoval začlenění aboriginského obyvatelstva do ozbrojených služeb [AST.GetName] a konečně bude vyslyšen. Thomsona osobně pověříme vytvořením průzkumné jednotky mužů s místní znalostí a dovednostmi přežití v buši, aby sledovali i naše nejodlehlejší a nejnehostinnější země."
 AST_northern_territory_reconnaissance_unit_tt: "Odemkne podpůrnou rotu §YPrůzkumná jednotka Severního teritoria§!."
 AST_torres_strait_battalion: "Prapor Torresova průlivu"
 AST_torres_strait_battalion_desc: "Úsilí roty Torresova průlivu jako posádky bylo dobře řízeno, ale její muži mají potenciál k dalším výkonům. Jelikož její členové pocházejí z ostrovů u severního pobřeží [AST.GetName], jednotka má rozsáhlé znalosti Torresova průlivu. Vyškolíme její muže jako mariňáky a vyzveme další dobrovolníky k vytvoření praporu."
 AST_department_of_aboriginal_affairs: "Ministerstvo aboriginských záležitostí"
 AST_department_of_aboriginal_affairs_desc: "Uplatníme návrh skupin aktivistů za práva Aboriginců a zřídíme nové Ministerstvo aboriginských záležitostí. Ministerstvu bude radit výbor aboriginského původu a jeho cílem bude zajistit domorodému obyvatelstvu přístup k řádné stravě a lékařské pomoci."
 AST_immediate_rights: "Okamžitá práva"
 AST_immediate_rights_desc: "Žádná skupina obyvatel v [AST.GetName] nesmí být regulována federací a žádný původ nesmí omezovat udělení občanských práv. Zřízením vlastního zákona o občanství a odklonem od představy, že naše obyvatelstvo tvoří pouze britští poddaní, přestanou být australská práva podmíněná."
 AST_diverse_army: "Rozmanitá armáda"
 AST_diverse_army_desc: "Obrana vlastní země není jen výsadou, ale i právem. Každý ochotný Australan se bude moci přihlásit do služby a každý ctižádostivý voják bude moci stoupat v hodnostech."
 AST_bg_empty_text_tt: "Vyvažujte hlasy mezi demokratickými stranami a odemkněte stranicky specifické skupiny zaměření.\n\nDokončete zaměření §Y$AST_war_is_coming$§! k odemčení."
 AST_right_vs_left_campaign_title_text: "Demokratické volby"
 AST_expected_election_winner_text: "§YOčekávaný vítěz§!"
 AST_uap_confirmed_election_winner_text: "§YU.A.P§! §WVÍTĚZSTVÍ VE VOLBÁCH§!"
 AST_alp_confirmed_election_winner_text: "§YA.L.P§! §WVÍTĚZSTVÍ VE VOLBÁCH§!"
 AST_next_election_countdown_text: "Další volby za:\n [?days_until_next_election|0Y] dnů"
