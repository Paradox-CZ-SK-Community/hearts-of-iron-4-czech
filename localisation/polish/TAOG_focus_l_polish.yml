 AST_alp_popularity_decrease_5: "§Y$AST_ruling_party$§! (§Y$AST_alp$§!) Hlasy: §R-5.00%§!\n\n"
 AST_australian_military_forces: "Australské ozbrojené síly"
 AST_australian_military_forces_desc: "Ostřílené bojem ve Velké válce prokázaly australské ozbrojené síly svou hodnotu na vzdálených pláních, stojící pevně v některých z nejkrutějších kampaní konfliktu. V letech poté byla armáda zmenšena a přetvořena na obrannou sílu, primárně určenou k ochraně domovských ostrovů. Tvrdou cestou nabyté lekce přetrvávají a jsou připraveny zasáhnout znovu."
 AST_permanant_military_forces: "Stálé ozbrojené síly"
 AST_permanant_military_forces_desc: "Hlavní vojenskou silou Austrálie je domobrana, určená k obraně pevniny. Avšak v době narůstajících globálních napětí je rozumné založit kádr profesionálních důstojníků a vojáků, z nichž mnozí získali zkušenosti během Velké války. I když budou zpočátku sloužit jako záloha, tato síla poskytne stálost a standardizovanou úroveň výcviku."
 AST_invoke_the_1903_defence_act: "Uplatnit Obranný zákon z roku 1903"
 AST_invoke_the_1903_defence_act_desc: "Tradičně se Austrálie spoléhala na svou domobranu pro národní obranu. V dobách významného ohrožení však můžeme uplatnit Obranný zákon z roku 1903. To nám dovolí povolat dodatečný personál pro obranné účely."
 AST_lithgow_small_arms_factory: "Zbrojovka Lithgow"
 AST_lithgow_small_arms_factory_desc: "Založená v roce 1912, zbrojovka Lithgow byla vytvořena, aby snížila závislost na britských zbraních a vybavení v době války. S narůstajícími globálními napětími bychom měli rozšířit výrobu, aby pokryla rostoucí potřeby ozbrojených sil."
 AST_dingo_scout_car: "Průzkumné vozidlo Dingo"
 AST_dingo_scout_car_desc: "Austrálie nemá silnou tradici vývoje obrněných vozidel, ale naše ozbrojené síly volají po posílení v této oblasti. Měli bychom proto důsledněji přijmout domácí návrhy jako Dingo Scout Car."
 AST_volunteer_defence_corps_taog: "Dobrovolnický obranný sbor"
 AST_volunteer_defence_corps_taog_desc: "Založen jako síla podobná britské Home Guard, Volunteer Defence Corps je neplacená občanská domobrana složená z těch, kdo nejsou způsobilí pro pravidelnou službu. Navzdory omezením je jejich znalost místního terénu cenná pro partyzánskou válku, pokud by nastalo nejhorší."
 AST_war_carriers: "Válečné dopravníky"
 AST_war_carriers_desc: "Logistika vyhrává války a většina terénu, ve kterém Austrálie operuje, je pro konvenční dopravu jako kamiony nebo vlaky nevhodná. Místo toho se musíme spolehnout na místní pracovní síly, dobře přizpůsobené podmínkám a obeznámené s tajnými cestami a zkratkami."
 AST_anzac_spirit: "Duch ANZAC"
 AST_anzac_spirit_desc: "Australsko-novozélandské armádní sbory (ANZAC) si ve Velké válce vydobyly silnou pověst, vynakládajíce obrovské úsilí a mnoho krve pro vítězství impéria. Jejich kvality byly zřejmé: vytrvalost, odvaha, vynalézavost a dobrý humor — kombinované s neformálním vzdorem tváří v tvář nebezpečí a těžkostem."
 AST_lee_enfield_no1_mark3: "Lee-Enfield No.1 Mk III*"
 AST_lee_enfield_no1_mark3_desc: "Ta maličká hvězdička má význam — Lee-Enfield No.1 Mk III* označuje válečné úpravy pro rychlejší a levnější výrobu. Jak poptávka přesahuje i tyto zisky, musíme přijmout 'přenesený plán', kdy komponenty vyrábějí menší firmy a sestavují se v Lithgow ke zvýšení produkce."
 AST_new_south_wales_government_railways: "Železnice vlády Nového Jižního Walesu"
 AST_new_south_wales_government_railways_desc: "Dílny Železnic vlády Nového Jižního Walesu poskytují unikátní kapacitu: velké ocelové díly lité v jednom kuse. Jako jedna z mála zemí Společenství schopná vyrábět celé litinové tankové vany a věže bychom tuto kapacitu měli využít."
 AST_second_australian_imperial_force: "Druhý australský imperiální sbor"
 AST_second_australian_imperial_force_desc: "Austrálie nasadila První australský imperiální sbor během Velké války, posílajíc vojáky do zámoří. S hrozbou války znovu pohlcující svět bychom měli povolat Druhý imperiální sbor, abychom předvedli australskou sílu v zahraničí."
 AST_expeditionary_leader: "Generál získá rys §YExpeditionary Leader§!, který zlepšuje jejich schopnosti v zahraničí, ale omezí počet divizí, kterými mohou velení."
 AST_expeditionary_leader_plural: "Oba §Ygenerálové§! získají rys §YExpeditionary Leader§!, který zlepšuje jejich schopnosti v zahraničí, ale omezí počet divizí, kterými mohou velení."
 AST_larrikinism: "Larrikinismus"
 AST_larrikinism_desc: "Definovaný jako 'špinavý, hlučný, ale dobrácký člověk', larrikinismus se stal synonymem australské kultury; drsná vytrvalost, neuctivost k autoritě a dobromyslný vzdor tváří v tvář nebezpečí. Australští vojáci ve Velké válce získali pověst vyrovnávání se s těžkostmi s odolností a nadhledem."
 AST_diggers: "Diggerové"
 AST_diggers_desc: "„Kop, kop, kop, dokud nebudeš v bezpečí“, přišel rozkaz generálu Williamu Birdwoodovi při vylodění ANZAC na Gallipoli — slova, která se stala synonymem australského válečného způsobu. Duch Diggeru jde hlouběji a spojuje australské a novozélandské vojáky skrz 'mateship': trvající pouto boje po boku a pro své druhy."
 AST_owen_gun: "Owenova zbraň"
 AST_owen_gun_desc: "Inovativní domácí Owen Gun si vysloužila reputaci odolné spolehlivosti, podobně jako naši vojáci. Jak naše síly bojují po celém světě, měli bychom tuto zbraň přijmout nejen jako symbol australské důmyslnosti a designu, ale i našeho vlastního ducha ve válce."
 AST_department_of_supply_and_development_taog: "Ministerstvo zásobování a rozvoje"
 AST_department_of_supply_and_development_taog_desc: "Jak nároky války zatěžují naše výrobní a logistické systémy na jejich meze, musíme soustředit úsilí pod vyhrazený orgán odpovědný za koordinaci a udržení těchto systémů."
 AST_sentinel_tank_development: "Vývoj tanku Sentinel"
 AST_sentinel_tank_development_desc: "Historicky jsme se spoléhali na dovážené tankové návrhy, i když je vyráběli doma. Měli bychom navázat na získané lekce a s trochou australské inovace vyvinout vlastní tank, přizpůsobený našim schopnostem a zdrojům."
 AST_establish_training_camps: "Zřídit výcvikové tábory"
 AST_establish_training_camps_desc: "Stejně jako ve Velké válce, Druhý imperiální sbor může být povolán bojovat kdekoli na světě. Musíme proto vyvinout komplexní výcvikové programy, připravující naše vojáky na jakékoli prostředí, od pouští Severní Afriky po džungle jižního Pacifiku."
 AST_jungle_tanks_if_sentinel_tank_development: "Pokud jsme dokončili 'Sentinel Tank Development':"
 jungle_heavy_tanks: "Těžké džunglové tanky"
 AST_anti_malaria_campaign: "Kampaň proti malárii"
 AST_anti_malaria_campaign_desc: "Naše síly mohou být povolány bojovat v džunglích Pacifiku, kde hrozí smrtelnější nebezpečí než kulky: malárie. Musíme jednat rozhodně, aby ochránili naše jednotky před tímto neviditelným nepřítelem."
 AST_defence_citizen_military_forces_act: "Zákon o obranných občanských silách"
 AST_defence_citizen_military_forces_act_desc: "Až dosud mohli být vysíláni do zahraničí pouze dobrovolní profesionální vojáci. Jak konflikt eskaluje, musíme vytvořit právní rámec, který umožní nasazení domobrany do zahraničí, pokud to bude nutné."
 AST_call_that_a_knife: "Žádné starosti!"
 AST_call_that_a_knife_desc: "'To není nůž... TOHLE je nůž!' Trocha odvahy a humoru hodně pomůže. Naši vojáci čelí nebezpečí s jistotou, houževnatostí a nemalou drzostí."
 AST_army_inventions_directorate_taog: "Ředitelství armádních vynálezů"
 AST_army_inventions_directorate_taog_desc: "Jedna z mála věcí, které válka přináší, je rychlé tempo technologických inovací hnacích nouze. Měli bychom založit centralizovanou organizaci pro vývoj, zdokonalování a využití těchto průlomů."
 AST_yeramba: "Yeramba"
 AST_yeramba_desc: "Navazujíc na úspěch australsky vyvinutých vozidel jako Sentinel, udělali jsme další krok s Yerambou — silným novým přírůstkem do našeho arzenálu. 25-pounder kanón namontovaný na tankovém podvozku poskytuje mobilní ničivou palebnou sílu proti nepříteli."
 AST_alice_springs: "Alice Springs"
 AST_alice_springs_desc: "Outback je obrovský... opravdu obrovský. Uprostřed leží malé město Alice Springs, které může sloužit jako centrální logistický uzel pro operace po celé Austrálii. Rozvineme ho a zřídíme armádní základnu pro výcvik jednotek připravených na jakékoli prostředí."
 AST_australian_regular_army: "Australská pravidelná armáda"
 AST_australian_regular_army_desc: "Naučili jsme se mnoho lekcí, od pláží Gallipoli po pouště Severní Afriky, hory Řecka a džungle jihovýchodní Asie. Tato získaná zkušenost vytvořila armádu více flexibilní a přizpůsobivou než jakákoli jiná."
 AST_no1_flying_training_school: "Letecká škola č. 1"
 AST_no1_flying_training_school_desc: "Založena v roce 1921 s vytvořením Royal Australian Air Force, Letecká škola č.1 byla otevírána a zavírána podle poptávky po leteckém personálu. S rostoucími globálními napětími bychom ji měli znovu otevřít k výcviku nové generace pilotů a leteckého personálu."
 AST_empire_air_training_scheme_taog: "Plán výcviku letectva Impéria"
 AST_empire_air_training_scheme_taog_desc: "Plán výcviku letectva Britského společenství nabízí značné financování a odborné znalosti zemím Commonwealthu pro školení velkého počtu pilotů a leteckého personálu. Soutěž o pořadatelství je tvrdá mezi Austrálií a Kanadou. Podali jsme vlastní nabídku v rámci tohoto schématu."
 AST_volunteer_air_corps: "Dobrovolnický letecký sbor pozorovatelů"
 AST_volunteer_air_corps_desc: "Australský vzdušný prostor je obrovský, daleko mimo dosah oficiálních jednotek samotných. Místo toho bychom měli spoléhat na místní dobrovolníky, stojící v tisících pozorovacích stanic rozmístěných po zemi, aby bděli nad naším nebem."
 AST_improved_ground_crews: "Vylepčené pozemní posádky"
 AST_improved_ground_crews_desc: "Ke každému pilotovi patří celý tým pozemních techniků nezbytných pro údržbu letadel, koordinaci letů a provoz základny. Nemluvě o navigátorech, střelcích a bombardérech, kteří je doprovázejí. Musíme zřídit vhodná výcviková zařízení, aby náš letectvo fungovalo s maximální efektivitou."
 AST_advanced_pilot_training: "Pokročilý výcvik pilotů"
 AST_advanced_pilot_training_desc: "Jak se letadla stávají složitějšími, rychlejšími a vyspělejšími, musí se zlepšit i dovednosti našich pilotů, aby plně využili těchto technologií."
 AST_commonwealth_aircraft_corporation_taog: "Společnost Commonwealth Aircraft Corporation"
 AST_commonwealth_aircraft_corporation_taog_desc: "S rostoucím zájmem o letecký boj musíme zajistit, abychom nezůstali pozadu. Civilní nadšenci a inovátoři již začali vidět potenciál leteckého průmyslu; poskytnutím počátečního financování můžeme tento vznikající sektor podpořit a rozvinout."
 AST_reestablish_central_flying_school: "Obnovit Centrální leteckou školu"
 AST_reestablish_central_flying_school_desc: "Další z australských leteckých škol, fungující spolu s Leteckou školou č.1, Centrální letecká škola pomůže uspokojit rostoucí poptávku moderního letectva. S narůstajícími napětími musíme zajistit, že náš personál má zařízení, která potřebuje."
 AST_aerodrome_of_democracy_democracy: "Aerodrom demokracie"
 AST_aerodrome_of_democracy_fascism: "Aerodrom dominace"
 AST_aerodrome_of_democracy_communism: "Aerodrom emancipace"
 AST_aerodrome_of_democracy_neutrality: "Aerodrom síly"
 AST_aerodrome_of_democracy: "[GET_AERODOME_NAME]"
 AST_aerodrome_of_democracy_desc: "Díky dosažení vrcholu leteckých schopností si Australské letectvo vysloužilo titul '[GET_AERODOME_NAME].' Naši letci vedou vzdušné souboje po celém světě, zatímco naše bombardéry vrhají smrtící stín nad průmyslem nepřátel."
 AST_government_aircraft_factories: "Vládní továrny na letadla"
 AST_government_aircraft_factories_desc: "Vzhledem k naší vzdálenosti od Evropy se nemůžeme spoléhat na tradiční zdroje dodávek letadel za války. Je proto nezbytné vyvinout vlastní domácí výrobní kapacity, což nám umožní vyrábět rámy a motory letadel podle našich specifikací."
 AST_death_from_down_under_taog: "Smrt z jihu"
 AST_death_from_down_under_taog_desc: "Z dalekých oblastí jižní polokoule jsme vybudovali letectvo bez rovného. Naše letadla operují po celém světě, útočí s přesností a ničivou silou; kdekoliv se nepřítel skryje, smrt přijde z Down Under."
 AST_ride_the_lightning: "Jezdit na blesku"
 AST_ride_the_lightning_desc: "Naši stíhací piloti jsou špičkou letecké síly; rychlí, agresivní a neúprosní. Jezdí bleskem do boje, uchvacují kontrolu nad oblohou, sestřelují nepřátelská letadla a zajišťují, že kamkoli naše síly jdou, vzdušná nadvláda je v patách."
 AST_the_gathering_storm: "Bouře se blíží"
 AST_the_gathering_storm_desc: "Na obzoru se sbírá bouře. Naše rostoucí letecká síla přináší rostoucí tlak z výšky, udeří tam, kde je nepřítel nejslabší, a podpoří náš postup. Co začíná jako vzdálené dunění, brzy se rozpadne v neúprosné peklo ničení."
 AST_hear_the_thunder: "Slyšte hřmění"
 AST_hear_the_thunder_desc: "Slyšíte, slyšíte hřmění? Z dalekého jihu naše strategické bombardéry nesou australskou moc po celé zeměkouli. Když obloha zařve a zem se zachvěje, naši nepřátelé poznají: bouře přišla a přináší zkázu."
 AST_department_of_aircraft_production: "Ministerstvo výroby letadel"
 AST_department_of_aircraft_production_desc: "Rychlé rozšiřování Royal Australian Air Force zatížilo naši výrobní kapacitu. Musíme myslet ambiciózněji, rozšiřovat a koordinovat průmyslovou základnu, abychom uspokojili poptávku a zajistili, že obloha bude tmavá od našich letadel."
 AST_royal_australian_navy: "Královské australské námořnictvo"
 AST_royal_australian_navy_desc: "Zformované po federaci spojením koloniálních flotil, Královské australské námořnictvo sloužilo ve skoro každém divadle Velké války. Od té doby bylo omezováno nedostatkem financí, ale s narůstajícími globálními napětími je čas vrátit flotilu na moře."
 AST_coast_watchers: "Pobřežní hlídky"
 AST_coast_watchers_desc: "Zatímco většina našich sil se soustředí na pevninu, naše severní přístupy nabízejí klíčovou včasnou varovnou síť. Nasazením místních zpravodajských operativců po odlehlých ostrovech dokážeme odhalit nepřátelské letecké a námořní pohyby dlouho předtím, než ohrozí australské břehy."
 AST_marines: "Mariňáci"
 AST_marines_desc: "Jako největší ostrov uprostřed moře ostrovů musíme zajistit schopnost projekce síly za naše pobřeží. Pokud bude potřeba přejít z obrany na ofenzívu, tyto síly umožní efektivní postup ostrov za ostrovem."
 AST_naval_auxiliary_patrol_taog: "Námořní pomocný hlídkový sbor"
 AST_naval_auxiliary_patrol_taog_desc: "S našimi profesionálními silami jinde můžeme využít nadšených místních dobrovolníků k ochraně přístavů a pobřežních zařízení. Jejich intimní znalost místních vod je neocenitelná a nikdo by netušil, že místní rybář slouží v naší službě."
 AST_cockatoo_island_shipyards_taog: "Loděnice Cockatoo Island"
 AST_cockatoo_island_shipyards_taog_desc: "Loděnice Cockatoo Island dlouho sloužily jako imperiální opravárenské a údržbové centrum podporující operace Královského námořnictva v zámoří. Nyní jako základ Královského australského námořnictva musíme rozšířit jejich kapacitu, aby vyhověla rostoucím požadavkům flotily a udržela naši námořní sílu."
 AST_kangaroo_point_dry_dock_taog: "Suchý dok Kangaroo Point"
 AST_kangaroo_point_dry_dock_taog_desc: "Ačkoli Evans Deakin and Company jsou především inženýrská firma, správně identifikovali potřebu rozšíření lodní konstrukce vzhledem k rostoucím globálním napětím a zaměřili se na Kangaroo Point. Měli bychom podpořit jejich převzetí tohoto území pro podporu růstu naší flotily."
 AST_scrap_iron_flotilla_taog: "Flotila šrotu"
 AST_scrap_iron_flotilla_taog_desc: "Kritici je považovali za zastaralé a opotřebované, ale několik našich starších torpédoborců bylo shromážděno do jedné formace. Ačkoli postrádají prestiž moderních plavidel, představují vynalézavé využití toho, co už vlastníme."
 AST_cruising_for_a_bruising: "Plavba na ránu"
 AST_cruising_for_a_bruising_desc: "Naše námořnictvo dlouho uměle využívalo křižníky a je to tradice hodná rozšíření. Rychlé, všestranné a tvrdě zasahující, tyto lodě si brzy vybudují reputaci — každý nepřítel, který je potká, bude čelit vážným následkům."
 AST_strike_from_down_under: "Úder z Down Under"
 AST_strike_from_down_under_desc: "Pod vlnami kloužou, žádný hrmot hromu, a pokud tě najdou, tvoje lodě vydrancují. Už slyšel, slyšel jsi o ponorkách z Down Under? Raději uteč, nebo svou flotilu zahodíš. Yee-aaah!"
 AST_hmas_sydney: "HMAS Sydney"
 AST_hmas_sydney_desc: "Věk bitevních lodí končí. Budoucnost námořní síly leží v obloze nad flotou a Austrálie nezůstane pozadu. Po letech obnovy a modernizace námořnictva jsme připraveni učinit ten závěrečný krok; letadlová loď, která definuje australskou námořní moc na generaci."
 AST_conscription_level_allowed_tt: "Politická vůle pro více branných povinností (hledej ikonu personálu na Focusy)"
 AST_conscription_level_allowed_limited_conscription_tt: "Odemkne dodatečnou úroveň §YZákona o branné povinnosti§!, která umožní §YOmezenou brannou povinnost§!"
 AST_conscription_level_allowed_extensive_conscription_tt: "Odemkne dodatečnou úroveň §YZákona o branné povinnosti§!, která umožní §YRozsáhlou brannou povinnost§!"
 AST_conscription_level_allowed_service_by_requirement_tt: "Odemkne dodatečnou úroveň §YZákona o branné povinnosti§!, která umožní §YSlužbu na požádání§!"
 AST_conscription_level_allowed_all_adults_serve_tt: "Odemkne dodatečnou úroveň §YZákona o branné povinnosti§!, která umožní §YVšichni dospělí slouží§!"
 AST_conscription_level_allowed_scraping_the_barrel_tt: "Odemkne dodatečnou úroveň §YZákona o branné povinnosti§!, která umožní §YSeškrábání barely§!"
 AST_conscription_law_so_far: "[CONSCRIPTION_LAW_SO_FAR]"
 add_random_stat_to_general_tt: "Přidá jeden navíc náhodný dovednostní parametr tomuto generálovi"
 generic_unlock_industrial_concern_tt: "Dostupné jako Průmyslový zájem: \n"
 NZL_rail_standardization_tt: "§Y[?NZL_train_var]§! jednotek §Y$NZL_train_equipment_1$§! je přidáno do národní zásoby."
 NZL_ministry_of_public_works: "Ministerstvo veřejných prací"
 NZL_ministry_of_public_works_desc: "Koordinovaným plánováním a disciplinovanými investicemi budou silnice, železnice a energetické projekty rozvíjeny podle soudržné národní strategie, nikoli fragmentárního úsilí."
 NZL_abolish_the_railways_board: "Zrušit železniční radu"
 NZL_abolish_the_railways_board_desc: "Rada vládních železnic byla neúčinná při modernizaci sítě. Je čas zrušit tuto aberraci a vrátit železnice pod ministeriální kontrolu."
 NZL_rail_standardization: "Standardizace lokomotiv"
 NZL_rail_standardization_desc: "[ROOT.GetName] má řadu dílen po celé zemi, které vyráběly lokomotivy různé kvality. Aby byl železniční systém efektivnější, stanovíme několik standardních lokomotiv, které budou vyrábět, každou specializovanou pro určitý účel."
 NZL_full_employment: "Plná zaměstnanost"
 NZL_full_employment_desc: "Díky trvalým veřejným pracím, pečlivému plánování a stabilní průmyslové expanzi nezaměstnanost konečně ustoupila příležitostem. Nečinné dílny z dob deprese jsou opět aktivní a pracovní síla národa je plně zapojena do produktivního podnikání. Obnovili jsme důvěru a stabilitu a stojíme nejen na cestě k zotavení, ale i zpevnění pro nadcházející výzvy."
 NZL_direct_the_coal_industry: "Řídit uhelný průmysl"
 NZL_direct_the_coal_industry_desc: "Jak se uhlí stává stále více důležitým pro železnice, průmysl a elektrárny, vláda musí vstoupit a koordinovat výrobu a distribuci v národním zájmu."
 NZL_establish_the_ncb: "Zřídit Národní uhelnou radu"
 NZL_establish_the_ncb_desc: "Zřízením Národní uhelné rady můžeme přivést rozptýlené doly pod koordinované řízení a zajistit stabilní zásobu paliva pro železnice, průmysl a výrobu elektřiny. Centrální dohled nám umožní racionalizovat produkci, zlepšit efektivitu a zajistit, že strategické potřeby budou mít přednost před soukromým zájmem."
 NZL_electrification: "Rozšířit výrobu energie"
 NZL_electrification_desc: "Využitím našich řek a rozšířením hydroelektrické výroby můžeme položit základy trvalé průmyslové síly. Nové přehrady a přenosové práce zvýší kapacitu v celé zemi, zajišťující, že továrny, železnice a přístavy budou mít energii, kterou potřebují."
 NZL_bureau_of_industry_taog: "$NZL_bureau_of_industry$"
 NZL_bureau_of_industry_taog_desc: "$NZL_bureau_of_industry_desc$"
