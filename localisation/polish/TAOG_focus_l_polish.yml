 idea_SIA_weather_broadcasts: "Meteorologické vysílání"
 idea_SIA_weather_broadcasts_desc: "Pravidelné meteorologické vysílání dává našim leteckým a námořním silám jasnější představu o podmínkách, zlepšuje jejich efektivitu a snižuje rizika operování v nepříznivém počasí."
 idea_SIA_seri_thai_contacts: "Kontakty Seri Thai"
 idea_SIA_seri_thai_contacts_desc: "Kontakty se sítí Seri Thai dokazují svou hodnotu, přivádějí zkušené bojovníky a posilují vazby se spojenci."
 idea_SIA_secure_rubber_islands: "Zajištění ostrovů s kaučukem"
 idea_SIA_joint_military_command: "Společné vojenské velení"
 idea_SIA_joint_military_command_desc: "Sjednocená velitelská struktura zlepšila koordinaci mezi větvemi, urychlila rozvoj zkušených důstojníků a taktiky na bojišti."
