 AST_uap_election_campaign_tt: "§YVolební kampaň U.A.P§!\n§LShromážděte střední třídu, podnikatele a imperiální loajalisty; Strana sjednocené Austrálie zahájí politickou kampaň.§!\n\n§YÚčinek:§!\nDenní náklady na politickou sílu: §R1.00§!\nDenní nárůst hlasů §YU.A.P§!: §G+0.05%§!"
 AST_alp_election_campaign_tt: "§YVolební kampaň A.L.P§!\n§LShromážděte dělnickou třídu, členy odborů a reformisty zaměřené na domácí záležitosti; Australská labouristická strana zahájí politickou kampaň.§!\n\n§YÚčinek:§!\nDenní náklady na politickou sílu: §R1.00§!\nDenní nárůst hlasů §YA.L.P§!: §G+0.05%§!"
 AST_uap_win_count_trigger_tt: "§YU.A.P§! má alespoň $COUNT|Y$ volebních vítězství."
