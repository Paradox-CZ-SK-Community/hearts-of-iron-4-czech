 AST_australian_military_forces: "Australské vojenské síly"
 AST_australian_military_forces_desc: "Australská armáda, zocelená ohněm Velké války, prokázala své kvality na vzdálených březích, kde pevně obstála v některých z nejbrutálnějších tažení celého konfliktu. V letech od té doby byla armáda zmenšena a přetvořena v obrannou sílu, jejímž hlavním úkolem je chránit domácí ostrovy. Tvrdě nabytá poučení z minulosti přetrvávají a jsou připravena být znovu povolána do služby."
 AST_permanant_military_forces: "Stálé vojenské síly"
 AST_permanant_military_forces_desc: "Hlavní vojenskou silou Austrálie je milice, pověřená obranou pevniny. V této době rostoucího globálního napětí je však rozumné vytvořit kádr profesionálních důstojníků a vojáků, z nichž mnozí získali zkušenosti během Velké války. I kdyby tato síla zpočátku sloužila v záložní kapacitě, poskytla by stálost a standardizovanou úroveň výcviku."
 AST_invoke_the_1903_defence_act: "Uplatnit obranný zákon z roku 1903"
 AST_invoke_the_1903_defence_act_desc: "Austrálie se při národní obraně tradičně spoléhala na svou milici. V časech významné hrozby však můžeme uplatnit obranný zákon z roku 1903. Ten nám umožňuje povolat dodatečný personál pro obranné účely."
 AST_lithgow_small_arms_factory: "Továrna na ruční zbraně v Lithgow"
 AST_lithgow_small_arms_factory_desc: "Továrna na ruční zbraně v Lithgow byla založena v roce 1912, aby v době války snížila závislost na britských zbraních a vybavení. S opět rostoucím globálním napětím bychom měli rozšířit výrobu, abychom uspokojili rostoucí potřeby našich ozbrojených sil."
 AST_dingo_scout_car: "Průzkumný vůz Dingo"
 AST_dingo_scout_car_desc: "Austrálie nemá silnou tradici vývoje obrněných vozidel, ale naše ozbrojené síly stále naléhavěji volají po posílení v této oblasti. Proto bychom měli důsledněji přijmout domácí konstrukce, jako je průzkumný vůz Dingo."
 AST_volunteer_defence_corps_taog: "Dobrovolnický obranný sbor"
 AST_volunteer_defence_corps_taog_desc: "Dobrovolnický obranný sbor, založený jako síla podobná britské Domobraně, je neplacená občanská milice složená z těch, kteří nejsou způsobilí k běžné službě. Navzdory těmto omezením je jejich znalost místního terénu činí vhodnými pro partyzánskou válku, pokud by došlo k nejhoršímu."
 AST_war_carriers: "Váleční nosiči"
 AST_war_carriers_desc: "Logistika vyhrává války a velká část terénu, v němž Austrálie operuje, se špatně hodí pro běžnou dopravu, jako jsou nákladní vozy či vlaky. Místo toho bychom se měli spoléhat na místní personál, dobře přizpůsobený podmínkám a obeznámený se skrytými stezkami a zkratkami."
 AST_anzac_spirit: "Duch ANZAC"
 AST_anzac_spirit_desc: "Australský a novozélandský armádní sbor si během Velké války vydobyl obávanou pověst, když vynaložil obrovské úsilí a mnoho krve při usilování o vítězství impéria. Jejich vlastnosti byly zřejmé všem: vytrvalost, odvaha, vynalézavost a dobrá nálada — spojené s nenuceným vzdorem tváří v tvář nebezpečí a strádání."
 AST_lee_enfield_no1_mark3: "Lee-Enfield No.1 Mk III*"
 AST_lee_enfield_no1_mark3_desc: "Ta malá hvězdička má význam — Lee-Enfield No. 1 Mk III* označuje válečné úpravy pro rychlejší a levnější výrobu. Jelikož poptávka překonává i tyto zisky, musíme přijmout „peddled scheme“, v jehož rámci budou součástky vyráběny menšími firmami a montovány v Lithgow, aby se zvýšila produkce."
 AST_new_south_wales_government_railways: "Vládní železnice Nového Jižního Walesu"
 AST_new_south_wales_government_railways_desc: "Dílny Vládních železnic Nového Jižního Walesu poskytují jedinečnou schopnost: velké ocelové díly odlévané v jednom kuse. Jako jeden z mála národů Commonwealthu schopných vyrábět plně odlévané korby a věže tanků bychom měli tuto kapacitu dobře využít."
 AST_second_australian_imperial_force: "Druhé australské imperiální síly"
 AST_second_australian_imperial_force_desc: "Austrálie během Velké války nasadila První australské imperiální síly a vyslala jednotky bojovat do zámoří. S válkou, která opět hrozí pohltit svět, bychom měli postavit Druhé imperiální síly, abychom prokázali australskou sílu v zámoří."
 AST_expeditionary_leader: "§YGenerál§! bude mít vlastnost §YExpediční velitel§!, která zlepší jeho schopnosti v zámoří, ale omezí počet divizí, jimž může velet."
 AST_expeditionary_leader_plural: "Oba §Ygenerálové§! budou mít vlastnost §YExpediční velitel§!, která zlepší jejich schopnosti v zámoří, ale omezí počet divizí, jimž mohou velet."
 AST_larrikinism: "Larrikinismus"
 AST_larrikinism_desc: "Larrikinismus, definovaný jako „nekultivovaný, hlučný, ale dobrosrdečný člověk“, začal ztělesňovat australskou kulturu: drsnou vytrvalost, neúctu k autoritám a dobromyslný vzdor tváří v tvář nebezpečí. Australští vojáci si během Velké války získali pověst těch, kdo čelí strádání s odolností a berou vše s nadhledem."
 AST_diggers: "Diggeři"
 AST_diggers_desc: "„Kopejte, kopejte, kopejte, dokud nebudete v bezpečí,“ zněl rozkaz generálu Williamu Birdwoodovi, když se ANZAC vylodili u Gallipoli — slova, která se stala synonymem australského způsobu války. Duch Diggera však sahá hlouběji a spojuje australské a novozélandské vojáky skrze „mateship“: trvalé pouto boje po boku svých druhů a za ně."
 AST_owen_gun: "Samopal Owen"
 AST_owen_gun_desc: "Inovativní domácí samopal Owen si získal pověst drsné spolehlivosti, podobně jako naši vojáci. Jelikož naše síly bojují po celém světě, měli bychom tuto zbraň přijmout nejen jako symbol australské vynalézavosti a konstrukce, ale i samotného našeho ducha ve válce."
 AST_department_of_supply_and_development_taog: "Ministerstvo zásobování a rozvoje"
 AST_department_of_supply_and_development_taog_desc: "Jelikož válečné požadavky tlačí naše výrobní a logistické systémy na hranice možností, musíme centralizovat své úsilí pod specializovaný orgán odpovědný za jejich koordinaci a udržení."
 AST_sentinel_tank_development: "Vývoj tanku Sentinel"
 AST_sentinel_tank_development_desc: "Historicky jsme se spoléhali na dovážené tankové konstrukce, i když jsme je vyráběli doma. Měli bychom navázat na poučení získaná z těchto strojů a s dávkou australské vynalézavosti vyvinout vlastní tank, přizpůsobený našim schopnostem a zdrojům."
 AST_establish_training_camps: "Zřídit výcvikové tábory"
 AST_establish_training_camps_desc: "Stejně jako za Velké války mohou být Druhé imperiální síly povolány k boji kdekoli na světě. Musíme proto vytvořit komplexní výcvikové programy, které připraví naše vojáky na jakékoli prostředí, od pouští severní Afriky po džungle jižního Pacifiku."
 AST_jungle_tanks_if_sentinel_tank_development: "Pokud jsme dokončili „Vývoj tanku Sentinel“:"
 jungle_heavy_tanks: "Džunglové těžké tanky"
 AST_anti_malaria_campaign: "Kampaň proti malárii"
 AST_anti_malaria_campaign_desc: "Naše síly mohou být povolány k boji napříč džunglemi Pacifiku, kde na ně čeká hrozba smrtelnější než nepřátelské kulky: malárie. Musíme podniknout rozhodné kroky k ochraně našich jednotek před tímto neviditelným nepřítelem."
 AST_defence_citizen_military_forces_act: "Zákon o obranných občanských silách"
 AST_defence_citizen_military_forces_act_desc: "Až dosud mohli být do zámoří nasazováni pouze dobrovolní profesionální vojáci. Jelikož konflikt dále eskaluje, musíme vytvořit právní rámec umožňující nasazení jednotek milice v zahraničí, bude-li to nutné."
 AST_call_that_a_knife: "Žádný strach!"
 AST_call_that_a_knife_desc: "„Tohle není nůž... TOHLE je nůž!“ Trocha chvástání a humoru dokáže mnoho. Naši vojáci čelí nebezpečí se sebedůvěrou, tvrdostí a notnou dávkou frajeřiny."
 AST_army_inventions_directorate_taog: "Armádní ředitelství vynálezů"
 AST_army_inventions_directorate_taog_desc: "Jednou z mála kladných stránek války, pokud se tomu tak dá říkat, je rychlé tempo technologických inovací poháněné nutností. Měli bychom zřídit centralizovanou organizaci, která bude tyto průlomy vyvíjet, zdokonalovat a využívat."
 AST_yeramba: "Yeramba"
 AST_yeramba_desc: "Na základě úspěchu australsky vyvinutých vozidel, jako je Sentinel, jsme učinili další krok s Yerambou, mocným novým přírůstkem do našeho arzenálu. Pětadvacetiliberní dělo namontované na tankovém podvozku poskytuje mobilní a ničivou palebnou sílu proti našim nepřátelům."
 AST_alice_springs: "Alice Springs"
 AST_alice_springs_desc: "Outback je velký... opravdu velký. V jeho srdci leží městečko Alice Springs, které může sloužit jako ústřední logistický uzel pro operace napříč Austrálií. Měli bychom jej rozvinout a zřídit zde armádní základnu k výcviku jednotek připravených na jakékoli prostředí."
 AST_australian_regular_army: "Australská pravidelná armáda"
 AST_australian_regular_army_desc: "Získali jsme mnoho poučení, od pláží Gallipoli přes pouště severní Afriky, hory Řecka až po džungle jihovýchodní Asie. Tato tvrdě nabytá zkušenost vykovala armádu, která je pružnější a přizpůsobivější než kterákoli jiná."
 AST_no1_flying_training_school: "Letecká výcviková škola č. 1"
 AST_no1_flying_training_school_desc: "Letecká výcviková škola, založená v roce 1921 při vzniku Královského australského letectva, byla otevírána a zavírána podle toho, jak kolísala poptávka po leteckém personálu. S rostoucím globálním napětím bychom ji měli znovu otevřít, aby vycvičila novou generaci pilotů a leteckých posádek."
 AST_empire_air_training_scheme_taog: "Imperiální letecký výcvikový plán"
 AST_empire_air_training_scheme_taog_desc: "Letecký výcvikový plán Britského Commonwealthu nabízí národu Commonwealthu významné financování a odborné znalosti k výcviku velkého počtu pilotů a leteckých posádek. Soutěž o jeho hostitelství je tvrdá a hlavními uchazeči jsou Austrálie a Kanada. Podali jsme vlastní nabídku v rámci Imperiálního leteckého výcvikového plánu."
 AST_volunteer_air_corps: "Dobrovolnický letecký pozorovatelský sbor"
 AST_volunteer_air_corps_desc: "Australský vzdušný prostor je obrovský, daleko za dosahem samotných oficiálních jednotek. Místo toho bychom se měli spoléhat na místní dobrovolníky, kteří budou obsluhovat tisíce pozorovacích stanovišť rozesetých po celé zemi a střežit naše nebe."
 AST_improved_ground_crews: "Vylepšený pozemní personál"
 AST_improved_ground_crews_desc: "Na každého pilota připadá celý tým pozemního personálu potřebný k zajištění řádné údržby letadel, koordinace letů a provozu základen. Nemluvě o navigátorech, střelcích a bombometčících, kteří je doprovázejí ve vzduchu. Musíme zřídit řádná výcviková zařízení, aby naše letectvo fungovalo s maximální účinností."
 AST_advanced_pilot_training: "Pokročilý výcvik pilotů"
 AST_advanced_pilot_training_desc: "Jak se letadla stávají složitějšími, rychlejšími a pokročilejšími, musí se odpovídajícím způsobem zlepšovat i schopnosti našich pilotů, aby dokázali tyto technologie plně využít."
 AST_commonwealth_aircraft_corporation_taog: "Commonwealth Aircraft Corporation"
 AST_commonwealth_aircraft_corporation_taog_desc: "S rostoucím zájmem o válku na nebi musíme zajistit, že nezůstaneme pozadu. Civilní nadšenci a inovátoři již začali chápat potenciál leteckého průmyslu; poskytnutím počátečního financování můžeme toto vznikající odvětví podpořit a rozšířit."
 AST_reestablish_central_flying_school: "Obnovit Ústřední leteckou školu"
 AST_reestablish_central_flying_school_desc: "Ústřední letecká škola, další z australských leteckých škol působící po boku Letecké výcvikové školy č. 1, pomůže uspokojit rostoucí požadavky moderního letectva. S rostoucím napětím musíme zajistit, aby měl náš personál potřebná zařízení."
 AST_aerodrome_of_democracy_democracy: "Letiště demokracie"
 AST_aerodrome_of_democracy_fascism: "Letiště nadvlády"
 AST_aerodrome_of_democracy_communism: "Letiště osvobození"
 AST_aerodrome_of_democracy_neutrality: "Letiště síly"
 AST_aerodrome_of_democracy: "[GET_AERODOME_NAME]"
 AST_aerodrome_of_democracy_desc: "Australské letectvo dosáhlo špičky leteckých schopností a vysloužilo si titul „[GET_AERODOME_NAME]“. Naši letci se zapojují do vzdušných bojů po celém světě, zatímco naše bombardéry vrhají smrtící stín na průmysl našich nepřátel."
 AST_government_aircraft_factories: "Vládní letecké továrny"
 AST_government_aircraft_factories_desc: "Vzhledem k naší vzdálenosti od Evropy se ve válce nemůžeme spoléhat na tradiční zdroje dodávek letadel. Je proto nezbytné, abychom rozvinuli vlastní domácí výrobní kapacity, které nám umožní vyrábět letecké rámy a motory podle vlastních specifikací."
 AST_death_from_down_under_taog: "Smrt od protinožců"
 AST_death_from_down_under_taog_desc: "Z dalekých končin jižní polokoule jsme vykovali letectvo bez sobě rovného. Naše letadla operují po celém světě a útočí s přesností a ničivou silou. Kdekoli se naši nepřátelé ukryjí, smrt přijde od protinožců."
 AST_ride_the_lightning: "Jet na blesku"
 AST_ride_the_lightning_desc: "Naši stíhací piloti jsou hrotem našeho letectva; rychlí, útoční a neúnavní. Jízdou na blesku do bitvy získávají kontrolu nad nebem, zachycují nepřátelská letadla a zajišťují, že kamkoli naše síly zamíří, vzdušná převaha je bude následovat."
 AST_the_gathering_storm: "Blížící se bouře"
 AST_the_gathering_storm_desc: "Na obzoru se sbírá bouře. Naše rostoucí letecká síla přináší sílící nátlak shora, útočí tam, kde je nepřítel nejslabší, a podporuje náš postup. To, co začíná jako vzdálené dunění, se brzy promění v neúprosnou bouři zkázy."
 AST_hear_the_thunder: "Slyšíš hrom"
 AST_hear_the_thunder_desc: "Slyšíš, slyšíš ten hrom? Ze země od protinožců nesou naše strategické bombardéry australskou moc napříč světem. Až nebesa zařvou a země se zachvěje, naši nepřátelé poznají: bouře přišla a přináší zkázu."
 AST_department_of_aircraft_production: "Ministerstvo letecké výroby"
 AST_department_of_aircraft_production_desc: "Rychlé rozšiřování Královského australského letectva výrazně zatížilo naše výrobní kapacity. Musíme myslet odvážněji, rozšířit a koordinovat svou průmyslovou základnu, abychom uspokojili poptávku a zajistili, že dokážeme zatemnit oblohu našimi letadly."
 AST_royal_australian_navy: "Královské australské námořnictvo"
 AST_royal_australian_navy_desc: "Královské australské námořnictvo vzniklo po federaci sjednocením koloniálních flotil a během Velké války sloužilo téměř na každém válčišti. Od té doby bylo kvůli omezenému financování zredukováno, ale s rostoucím globálním napětím nastal čas, aby se flotila vrátila na moře."
 AST_coast_watchers: "Pobřežní pozorovatelé"
 AST_coast_watchers_desc: "Zatímco většina našich sil zůstává soustředěna na pevninu, naše severní přístupy nabízejí životně důležitou síť včasného varování. Rozmístěním místních zpravodajských operativců po těchto odlehlých ostrovech můžeme odhalit nepřátelské letecké a námořní přesuny dlouho předtím, než ohrozí australské břehy."
 AST_marines: "Námořní pěchota"
 AST_marines_desc: "Jako největší ostrov v oceánu ostrovů musíme zajistit, že budeme mít obojživelné schopnosti k promítání síly za naše břehy. Pokud budeme muset přejít z obrany do útoku, tyto síly umožní efektivní operace postupného obsazování ostrovů."
 AST_naval_auxiliary_patrol_taog: "Pomocná námořní hlídka"
 AST_naval_auxiliary_patrol_taog_desc: "Jelikož jsou naše profesionální síly jinak vytíženy, můžeme se obrátit na horlivé místní dobrovolníky, aby chránili naše přístavy a pobřežní zařízení. Jejich důvěrná znalost místních vodních cest je činí neocenitelnými a nikdo by nepodezíral místního rybáře, že je v našich službách."
 AST_cockatoo_island_shipyards_taog: "Loděnice na ostrově Cockatoo"
 AST_cockatoo_island_shipyards_taog_desc: "Loděnice na ostrově Cockatoo dlouho sloužily jako imperiální opravárenské a údržbářské centrum podporující operace Královského námořnictva v zámoří. Nyní jsou základním kamenem Královského australského námořnictva a my musíme rozšířit jejich kapacitu, aby zvládly rostoucí požadavky naší flotily a udržely naši námořní sílu."
 AST_kangaroo_point_dry_dock_taog: "Suchý dok Kangaroo Point"
 AST_kangaroo_point_dry_dock_taog_desc: "Ačkoli Evans Deakin and Company je především strojírenská firma, správně rozpoznala potřebu rozšířit kapacitu stavby lodí s rostoucím globálním napětím a zaměřila se na Kangaroo Point. Měli bychom usnadnit její převzetí tohoto pozemku na podporu dalšího růstu naší flotily."
 AST_scrap_iron_flotilla_taog: "Flotila šrotového železa"
 AST_scrap_iron_flotilla_taog_desc: "Ačkoli je kritici odepsali jako zastaralé a opotřebované, několik našich starších torpédoborců bylo přesto spojeno do jediné formace. Přestože postrádají prestiž moderních plavidel, představují vynalézavé využití toho, co již máme."
 AST_cruising_for_a_bruising: "Křižování pro nakládačku"
 AST_cruising_for_a_bruising_desc: "Naše námořnictvo dlouho obratně využívalo křižníky a je to tradice hodná rozšíření. Rychlé, všestranné a tvrdě úderné lodě si brzy získají pověst po celém světě — každý nepřítel, který jim zkříží cestu, zjistí, že si koleduje o pořádnou nakládačku."
 AST_strike_from_down_under: "Úder od protinožců"
 AST_strike_from_down_under_desc: "Pod vlnami kloužou, hrom nezaburácí, a když tě najdou, tvé lodě vyplení. Slyšel jsi, slyšel jsi o ponorkách od protinožců? Radši utíkej, nebo svou flotilu promarníš. Jéé-ááá!"
 AST_hmas_sydney: "HMAS Sydney"
 AST_hmas_sydney_desc: "Věk bitevních lodí skončil. Budoucnost námořní moci leží na nebi nad flotilou a Austrálie nezůstane pozadu. Po letech přestavby a modernizace našeho námořnictva jsme připraveni učinit poslední krok; letadlovou loď, která určí australskou námořní sílu pro celou příští generaci."
 AST_conscription_level_allowed_tt: "Politická vůle k větší mobilizaci (hledejte ikonu personálu u zaměření)"
 AST_conscription_level_allowed_limited_conscription_tt: "Odemkne další úroveň §Yzákona o mobilizaci§!, která umožní §Yomezený odvod§!"
 AST_conscription_level_allowed_extensive_conscription_tt: "Odemkne další úroveň §Yzákona o mobilizaci§!, která umožní §Yrozsáhlý odvod§!"
 AST_conscription_level_allowed_service_by_requirement_tt: "Odemkne další úroveň §Yzákona o mobilizaci§!, která umožní §Yslužbu na vyžádání§!"
 AST_conscription_level_allowed_all_adults_serve_tt: "Odemkne další úroveň §Yzákona o mobilizaci§!, která umožní §Yslužbu všech dospělých§!"
 AST_conscription_level_allowed_scraping_the_barrel_tt: "Odemkne další úroveň §Yzákona o mobilizaci§!, která umožní §Yvyškrabávání dna sudu§!"
 AST_conscription_law_so_far: "[CONSCRIPTION_LAW_SO_FAR]"
 add_random_stat_to_general_tt: "Přidá tomuto generálovi jeden náhodný dodatečný bod schopnosti"
 generic_unlock_industrial_concern_tt: "Dostupný jako průmyslový koncern: \n"
 NZL_rail_standardization_tt: "Do národních zásob bude přidáno §Y[?NZL_train_var]§! jednotek §Y$NZL_train_equipment_1$§!."
 NZL_ministry_of_public_works: "Ministerstvo veřejných prací"
 NZL_ministry_of_public_works_desc: "Prostřednictvím koordinovaného plánování a disciplinovaných investic budou silnice, železnice a energetické projekty rozvíjeny podle soudržné národní strategie, nikoli po částech."
 NZL_abolish_the_railways_board: "Zrušit železniční radu"
 NZL_abolish_the_railways_board_desc: "Vládní železniční rada byla při modernizaci sítě neúčinná. Je čas tuto zrůdnost zrušit a vrátit železnice pod ministerskou kontrolu."
 NZL_rail_standardization: "Standardizace lokomotiv"
 NZL_rail_standardization_desc: "[ROOT.GetName] má po celé zemi řadu dílen, které vyráběly lokomotivy různé kvality. Aby byl železniční systém efektivnější, zavedeme několik standardních lokomotiv, které budou tyto dílny vyrábět, přičemž každá bude specializovaná pro konkrétní účel. "
 NZL_full_employment: "Plná zaměstnanost"
 NZL_full_employment_desc: "Díky vytrvalým veřejným pracím, pečlivému plánování a stabilní průmyslové expanzi nezaměstnanost konečně ustoupila příležitostem. Zahálející dílny z let krize jsou znovu aktivní a práce národa je plně zapojena do produktivního podnikání. Po obnovení důvěry a stability nestojíme jen zotaveni, ale posíleni pro výzvy, které nás čekají."
 NZL_direct_the_coal_industry: "Řídit uhelný průmysl"
 NZL_direct_the_coal_industry_desc: "Jak se uhlí stává stále důležitějším pro naše železnice, průmysl a elektrárny, vláda musí zasáhnout a koordinovat výrobu a distribuci v národním zájmu."
 NZL_establish_the_ncb: "Zřídit Národní uhelnou radu"
 NZL_establish_the_ncb_desc: "Zřízením Národní uhelné rady můžeme dostat rozptýlené doly země pod koordinované řízení a zajistit stabilní dodávky paliva pro železnice, průmysl a výrobu energie. Ústřední dohled nám umožní racionalizovat výrobu, zlepšit efektivitu a zajistit, aby strategické potřeby měly přednost před soukromým zájmem."
 NZL_electrification: "Rozšířit výrobu energie"
 NZL_electrification_desc: "Využitím našich řek a rozšířením vodní energetiky můžeme položit základy trvalé průmyslové síly. Nové přehrady a přenosové sítě zvýší kapacitu po celé zemi a zajistí, že továrny, železnice a přístavy budou mít energii, kterou potřebují."
 NZL_bureau_of_industry_taog: "$NZL_bureau_of_industry$"
 NZL_bureau_of_industry_taog_desc: "$NZL_bureau_of_industry_desc$"
 NZL_wairarapa_sheep_farms_taog: "$NZL_wairarapa_sheep_farms$"
 NZL_wairarapa_sheep_farms_taog_desc: "$NZL_wairarapa_sheep_farms_desc$"
 NZL_national_roads_board_taog: "$NZL_national_roads_board$"
 NZL_national_roads_board_taog_desc: "$NZL_national_roads_board_desc$"
 NZL_taranaki_oil_taog: "$NZL_taranaki_oil$"
 NZL_taranaki_oil_taog_desc: "$NZL_taranaki_oil_desc$"
 NZL_women_in_the_workforce: "Ženy v pracovním procesu"
 NZL_women_in_the_workforce_desc: "Jak se nedostatek personálu prohlubuje, ženy nastupují do důležitých rolí v továrnách, na farmách i ve veřejných službách a zajišťují, aby výroba pod válečným tlakem nezakolísala. Rozšíření možností výcviku a zaměstnání nám umožní udržet průmyslovou produkci při zachování národní obrany."
 NZL_restart_the_onekaka_ironworks: "Znovu spustit železárny Onekaka"
 NZL_restart_the_onekaka_ironworks_desc: "Železárny Onekaka kdysi představovaly naši ambici vyrábět železo a ocel doma a snížit závislost na zámořských dodávkách. Abychom nastartovali ekonomiku a zvýšili národní bezpečnost, objevil se zájem znovu zažehnout pece v Onekace."
 NZL_new_zealand_steel_taog: "$NZL_new_zealand_steel$"
 NZL_new_zealand_steel_taog_desc: "$NZL_new_zealand_steel_desc$"
 NZL_scrap_metal_recycling: "Recyklační kampaň"
 NZL_scrap_metal_recycling_desc: "Ekonomika těžce závislá na dovozu, jako je ta naše, si nemůže dovolit plýtvat strategickými zdroji. Abychom posílili svou hospodářskou odolnost, zřídíme zařízení na recyklaci šrotu ke zpracování a opětovnému využití kovů a kaučuku."
 NZL_domestic_car_industry: "Investovat do závodů na montáž vozidel"
 NZL_domestic_car_industry_desc: "Výroba vozidel v [ROOT.GetName] byla omezena na montáž dílů od zahraničních výrobců, které sem byly posílány k finální konstrukci. Díky nedávným investicím do domácí výroby oceli možná budeme moci začít vyrábět součástky sami."
 NZL_department_of_scientific_and_industrial_research_taog: "$NZL_department_of_scientific_and_industrial_research$"
 NZL_department_of_scientific_and_industrial_research_taog_desc: "$NZL_department_of_scientific_and_industrial_research_desc$"
 NZL_project_seal_taog: "$NZL_project_seal$"
 NZL_project_seal_taog_desc: "$NZL_project_seal_desc$"
 NZL_industrial_conscription_taog: "$NZL_industrial_conscription$"
 NZL_think_big_taog: "$NZL_think_big$"
 NZL_industrial_conscription_taog_desc: "$NZL_industrial_conscription_desc$"
 NZL_think_big_taog_desc: "$NZL_think_big_desc$"
 NZL_expand_the_university_of_auckland_taog: "$NZL_expand_the_university_of_auckland$"
 NZL_expand_the_university_of_auckland_taog_desc: "$NZL_expand_the_university_of_auckland_desc$"
 NZL_national_broadcasting_service: "Národní vysílací služba"
 NZL_national_broadcasting_service_desc: "Po zásahu pošty do voleb v roce 1935 a jejím dohledu nad státními vysílacími službami je zjevné, že musíme reformovat řízení této organizace. Měli bychom také investovat do modernizace vysílacího vybavení, které používá."
 NZL_support_allies_with_meat: "Využít masný průmysl"
 NZL_support_allies_with_meat_desc: "Naši spojenci v Pacifiku často napínají své zásobovací linie až na hranici možností. Abychom snížili zátěž a udrželi jejich jednotky nasycené, začneme jim dodávat maso."
 NZL_support_allies_with_meat_tt: "Každý spojenec obdrží §G1§! §Ymimo-mapovou civilní továrnu§!"
 AST_COMINWEALTH_FACTION: "Cominwealth"
 AST_cominwealth_tech_sharing_tt: "Uzavřeme §Ydohodu o sdílení technologií§! se všemi členy naší frakce."
 AST_modify_offshore_advancements_spirit_tt: "Upraví §Y$AST_offshore_advancements_spirit$§! o:"
 AST_gain_claims_on_japan_tt: "Získáme nároky na §Yjaponské domovské ostrovy§!"
 AST_ireland_anti_british_pact_offer_accept_tt: "Pokud přijmou:"
 AST_through_the_barricades_tt: "Pokud má §Y[ENG.GetNameDef]§! alespoň §Y10 %§! podporu komunismu, na začátku války povstanou přístavní dělníci z §Y[132.GetCapitalVictoryPointName]§! na naši podporu!"
 AST_end_the_kingdom_ireland_join_tt: "Protože [IRE.GetName] podepsalo protibritský pakt, připojí se k válce na naší straně, jakmile vyhlásíme válku [ENG.GetNameDef]."
 ABDA_abdacom: "Zřídit ABDACOM"
 ABDA_abdacom_desc: "Jak nepřátelské mocnosti rychle postupují napříč jihovýchodní Asií a Pacifikem, spojenecké síly v regionu musí jednat jednotně, aby je zadržely. Zřízením společného vrchního velení můžeme sdružit své zdroje, koordinovat námořní prostředky a vytvořit jednotnou frontu proti nepříteli."
 ABDA_fortress_singapore: "Pevnost Singapur"
 ABDA_fortress_singapore_desc: "Singapur je klíčovým bodem naší obranné strategie v regionu. Posílení jeho opevnění a silné posádky získá zásadní čas pro širší úsilí ABDACOM a upře nepříteli rychlé strategické vítězství."
 ABDA_corps_expeditionnaire: "Expéditionnaire Français en Extrême-Orient"
 ABDA_corps_expeditionnaire_desc: "Francouzská Indočína leží na severním křídle obranného perimetru ABDACOM. Nasazením Corps Expéditionnaire do aktivních operací přinese [FRA.GetNameDef] společnému velení životně důležitý personál a zkušenosti svých koloniálních sil."
 ABDA_maintain_strategic_flexibility: "Udržet strategickou flexibilitu"
 ABDA_maintain_strategic_flexibility_desc: "Spojené státy nesmí příliš vázat své síly na jediné válčiště. Pečlivým řízením strategické zálohy zajistíme, že americká průmyslová a vojenská moc bude moci být nasazena tam, kde je v Pacifiku nejvíce potřeba."
 ABDA_the_malay_barrier: "Malajská bariéra"
 ABDA_the_malay_barrier_desc: "Řetěz ostrovů táhnoucí se od Malajska přes [INS.GetNonIdeologyName] tvoří přirozenou obrannou bariéru. Síly ABDA musí tuto geografii využít a vytvořit koordinovanou námořní i pozemní obranu, která zpomalí nepřátelský postup."
 ABDA_develop_naval_infrastructure: "Rozvíjet námořní infrastrukturu"
 ABDA_develop_naval_infrastructure_desc: "Trvalé námořní operace v Pacifiku vyžadují základny, sklady paliva a opravárenská zařízení. Investice do infrastruktury našich přístavů a kotvišť prodlouží dosah a výdrž námořních sil ABDA."
 ABDA_unified_naval_command: "Sjednocené námořní velení"
 ABDA_unified_naval_command_desc: "S vytvořenou pozemní obranou a připravenou infrastrukturou může ABDA nyní sjednotit všechny námořní síly pod jedno společné velení. Standardizované signály, sdílené zpravodajství a koordinované hlídkové trasy znásobí účinnost každého plavidla na válčišti."
 ABDA_ship_a_day_sinking_quotas: "Kvóty potopení lodí za den"
 ABDA_ship_a_day_sinking_quotas_desc: "Nepřátelské zásobovací linie táhnoucí se Pacifikem jsou jejich strategickou slabinou. Stanovením agresivních a koordinovaných kvót potápění pro naše ponorkové i hladinové síly může ABDACOM logisticky vykrvácet nepřítele a přinutit jej k obraně."
 ABDA_naval_procurement: "Námořní pořizování"
 ABDA_naval_procurement_desc: "Již utrpěné ztráty vyžadují naléhavou náhradu. Koordinovaný pořizovací program ABDACOM upřednostní torpédoborce, ponorky a hlídková plavidla nejvhodnější pro pacifické válčiště a zajistí, že naše spojená flotila dokáže držet krok s nepřátelskou expanzí."
 ABDA_keep_trade_open: "Udržet obchod otevřený"
 ABDA_keep_trade_open_desc: "Kaučuk a ropa z [INS.GetNonIdeologyName] jsou pro spojenecké válečné úsilí zásadní. ABDACOM musí chránit námořní trasy, které tyto životně důležité zdroje přepravují, chránit konvoje před nepřátelským narušováním a udržet obchod proudící do našeho průmyslu."
 ABDA_expand_the_command: "Rozšířit velení"
 ABDA_expand_the_command_desc: "ABDACOM prokázal svou hodnotu. Nyní musíme na tomto základu stavět, rozšířit členství na další spojenecké národy v regionu a prohloubit sdílení výzkumu a zpravodajství, abychom si udrželi náskok před nepřítelem."
 ABDA_basic_available_trigger_tt: "Není ve válce s žádným členem ABDACOM"
