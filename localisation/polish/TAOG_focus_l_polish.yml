 generic_choice_tt: "Dává volbu mezi: \n"
 generic_or_tt: "Nebo:\n"
 SIA_a_land_war_in_asia: "Pozemní válka v Asii"
 idea_SIA_land_war_in_asia: "Pozemní válka v Asii"
 SIA_the_peoples_war_in_asia: "Lidová válka v Asii"
 SIA_the_peoples_war_in_asia_desc: "Boj proti japonskému imperialismu není jen soutěží mezi státy. Je to válka dělníků, rolníků a vojáků proti cizí nadvládě. Staneme-li po boku komunistických sil v Číně, [ROOT.GetNameDef] se zaváže k širší lidové válce po celé Asii."
 SIA_peoples_war_in_asia_idea: "Lidová válka v Asii"
 SIA_peoples_war_in_asia_idea_desc: "Válka je udržována více než pravidelnými formacemi. Místní výbory, partyzánské vodítka a rolnické zásobovací kolony nyní slouží armádě v poli. Každá vesnice se stává skladem, každá cesta možným přepadovým místem a každý ústup příležitostí vléct nepřítele hlouběji do vnitrozemí."
 SIA_national_defense_in_asia: "Národní obrana v Asii"
 SIA_national_defense_in_asia_desc: "Obrana Asie vyžaduje disciplínu, hierarchii a společný strategický cíl. Stáním po boku nacionalistické Číny se [ROOT.GetNameDef] připojí ke koalici odhodlané vzdorovat japonské expanzi organizovanými armádami a koordinovaným velením."
 SIA_national_defense_in_asia_tt: "§Y[ROOT.GetNameWithFlag]§! se připojuje k nacionalistickým silám v Jednotné frontě.\nPřidá §Y$SIA_national_defense_in_asia_idea$§!, která dává:\n $MODIFIER_ARMY_ORG_FACTOR$: §G+5%§!\n $MODIFIER_PLANNING_SPEED$: §G+10%§!\n $MODIFIER_MAX_PLANNING$: §G+10%§!\n $MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+5%§!"
 SIA_stronger_together: "Silnější spolu"
 SIA_stronger_together_desc: "Válka zredukovala vzdálené sliby a paralelní aliance na překážky. Pokud má [ROOT.GetNameDef] formovat Asii, musíme požádat naše partnery, aby svázali svou frakci s naší a přijali jednotné velení v nadcházejícím boji."
 idea_SIA_national_defense_in_asia: "Národní obrana v Asii"
 SIA_directorate_of_aeronautical_engineering_desc: "Budoucnost leteckých sil [ROOT.GetNameDef] nezabezpečí pouze piloti. Potřebuje inženýry, inspektory, dílny a centrální autoritu schopnou proměnit zahraniční nákupy v provozuschopná letadla. Direktorát aeronautického inženýrství se stane základem tohoto úsilí."
 idea_SIA_aeronautical_engineering_directorate: "Direktorát aeronautického inženýrství"
 SIA_standardize_aircraft_maintenance: "Standardizovat údržbu letadel"
 SIA_standardize_aircraft_maintenance_desc: "Naše letadla pocházejí z mnoha zdrojů, každý s odlišnými díly, nástroji a postupy opravy. Standardizací údržbových postupů pod Direktorátem může [ROOT.GetNameDef] udržet více letadel ve vzduchu a snížit zbytečné plýtvání způsobené zmatkem na zemi."
 SIA_expand_aircraft_workshops: "Rozšířit letecké dílny"
 SIA_expand_aircraft_workshops_desc: "Direktorát potřebuje víc než kanceláře a inspekční papíry. Nové dílny, strojní nástroje a vyškolení mechanici dovolí opravovat poškozená letadla doma, zatímco jednoduché součásti lze vyrábět bez čekání na zahraniční dodávky."
 SIA_license_modern_airframes: "Licencovat moderní konstrukce trupu"
 SIA_license_modern_airframes_desc: "[ROOT.GetNameDefCap] zatím nedokáže navrhnout každé letadlo, které potřebuje. Praktickou cestou je licencovat zahraniční modely, studovat jejich konstrukci a přizpůsobit je našemu klimatu, letištím a zásobovacím podmínkám pod dohledem Direktorátu."
 SIA_tropical_air_operations: "Tropické letecké operace"
 SIA_tropical_air_operations_desc: "Horko, vlhkost, monzuny a drsné přední polní letiště kladou zvláštní nároky na letadla a posádky. Přizpůsobením motorů, údržbových plánů a pilotní doktríny těmto podmínkám může Direktorát učinit naše letectvo spolehlivějším nad Jihovýchodní Asií."
 effects_of_event_tt: "\n§YEfekty události§!:"
 AST_war_is_coming: "Válka se blíží"
 AST_war_is_coming_desc: "Během posledních tří desetiletí nás postihla jedna výzva za druhou, a zdá se, že se rýsuje poslední, která prověří sílu australské demokracie. Bývalý premiér Billy Hughes na to je velmi zřetelný a bylo by nezodpovědné jeho tvrzení ignorovat — ať už se nám to líbí nebo ne — válka přichází."
 AST_war_is_coming_tt: "\nOdemkne §YDemokratické volby§!"
 AST_war_is_coming_uap_advisors_tt: "(§Y$AST_billy_hughes$§!):"
 AST_war_is_coming_alp_advisors_tt: "(§Y$AST_james_scullin$§!):"
 AST_war_is_coming_decrease_advisors_tt: "(§Y$AST_maurice_blackburn$§!):"
 AST_war_is_coming_advisors_tt: "\nZměnit politického poradce o:"
 AST_advance_pacific_initiatives: "Podporovat pacifická opatření"
 AST_advance_pacific_initiatives_desc: "Díky paktům o neútočení, které jsme uzavřeli, se naše vztahy s asijskými sousedy zlepšily. Budeme nadále využívat těchto vztahů a požádáme naše nové spojence, aby podpořili náš průmyslový rozvoj."
 AST_advance_pacific_initiatives_tt: "\nUzavřít pakt o neútočení s:"
 AST_advance_pacific_initiatives_jap_tt: " §Y[JAP.GetName]§! přidá §G2§! mimo-mapové §YDoky§! k efektům."
 AST_advance_pacific_initiatives_ins_tt: " §Y[INS.GetName]§! přidá §G1§! mimo-mapové §YSyntetické rafinerie§! k efektům."
 AST_advance_pacific_initiatives_chi_tt: " §Y[CHI.GetName]§! přidá §G2§! mimo-mapové §YCivilní továrny§! k efektům."
 AST_advance_pacific_initiatives_jap_2_tt: "§Y[JAP.GetName]§! nabízí:"
 AST_advance_pacific_initiatives_ins_2_tt: "§Y[INS.GetName]§! nabízí:"
 AST_advance_pacific_initiatives_chi_2_tt: "§Y[CHI.GetName]§! nabízí:"
 AST_advance_pacific_initiatives_2_tt: "\nBudovy budou odstraněny, pokud budeme ve válce s příslušnou zemí."
 AST_pacific_initiatives_modifier: "Diplomatická iniciativa"
 AST_domestic_industry: "Domácí průmysl"
 AST_domestic_industry_desc: "Nemůžeme se spoléhat na spojenecké obranné průmysly, aby nás zásobovaly, pokud přijde válka. Musíme rozšířit vlastní průmysl, aby jsme byli připraveni."
 AST_a_democratic_bulwark: "Demokratický bulvár"
 AST_a_democratic_bulwark_desc: "Abychom čelili fašistickým i komunistickým hrozbám, musí demokracie vést. Vláda přijme politiku proaktivních opatření, aby občané byli zastoupeni v řízení a nespokojenost politiků mohla být uhašena sloučením do různých demokratických stran místo odchylkami k nebezpečným ideologiím."
 AST_the_pacific_pact: "Pacifický pakt"
 AST_the_pacific_pact_desc: "Lyonsovy pacifické iniciativy v roce 1934 navázaly kontakt mezi Austrálií a významnými asijskými státy, což nám umožnilo přestat spoléhat se na britské úředníky při reprezentaci našich zájmů. Pokud bychom tyto vztahy využili k zajištění asijské neutrálnosti vůči Austrálii, byl by to vrchol našich diplomatických snah. Může to být náročné, ale stojí to za to."
 AST_a_collapsing_league_of_nations: "Rozpadající se Společnost národů"
 AST_a_collapsing_league_of_nations_desc: "Společnost národů se rozpadá — ušlechtilé úsilí založené na nereálných nadějích. Politika sankcí se snadno stává prázdnými gesty, zvláště když nejsou k dispozici ozbrojené síly k zajištění pořádku. Naše zbrojení musí začít."
 AST_department_of_munitions: "Ministerstvo munice"
 AST_department_of_munitions_desc: "Abychom naše muže na frontě správně zásobili, musíme urychlit výrobu muničních komponent. Zřízením Ministerstva munice zajistíme větší dohled nad produkcí obranných součástí."
 AST_call_for_a_referendum: "Vyhlásit referendum"
 AST_call_for_a_referendum_desc: "Chceme zvýšit federální kontrolu; však nejprve potřebujeme souhlas voličů. Vyhlášením referenda můžeme získat jejich svolení."
 AST_rural_concessions: "Venkovské ústupky"
 AST_rural_concessions_desc: "Zastupitelé venkova Country Party ztrácejí příliš mnoho hlasů, aby vládli sami, ale přivítáním jejich vlivu v australské politice můžeme jako vládnoucí strana získat další podporu."
 AST_rural_concessions_tt: "\n§Y$AST_country_party_influence_uap$§! zvýší hlasy pro stranu, která je u moci, když se zaměření dokončí."
 AST_solidarity_by_the_empire: "Solidarita impéria"
 AST_solidarity_by_the_empire_desc: "Doposud nás Britské impérium vedlo válkou i mírem. Budeme nadále vážit jeho rad a spolupracovat při přípravě na potenciální konflikty."
 AST_solidarity_by_the_empire_modifier: "Solidarita impéria"
 AST_wool_agreement: "Smlouva o vlně"
 AST_wool_agreement_desc: "Vlna je jedním z největších australských produktů; její vývoz přináší zisky a zlepšuje vztahy s dovozci. Británie však požaduje vše, částečně aby je použila pro uniformy svých vojáků, ale také jako páku v jednání s národy s nedostatkem vlny. Ustoupíme britským požadavkům."
 AST_australian_war_cabinet: "Australská válečná rada"
 AST_australian_war_cabinet_desc: "Jak to požaduje Spojené království, zřídíme vlastní válečnou radu. Tím zajistíme efektivní strategické rozhodování tím, že tělo se zaměří výhradně na národní bezpečnost."
 AST_call_for_a_referendum: "Vyhlásit referendum"
 AST_call_for_a_referendum_desc: "Chceme zvýšit federální kontrolu; však nejprve potřebujeme svolení voličů. Vyhlášením referenda můžeme získat jejich souhlas."
(AST pokračuje dále - všechny uvedené texty byly přeloženy výše podle jejich klíčů a zadaného obsahu.)
 AST_the_guild_for_the_war_effort_desc: "Australská ženská cechovní organizace Impéria byla postavena, aby sloužila koruně. Její účel je nyní zcela přesměrován. Obrovská organizační síť, kterou vybudovala, nyní nasměruje svou energii do válečného průmyslu, nemocnic a zásobovacích řetězců soběstačné Austrálie."
 AST_for_the_southern_cross: "Pro Jižní kříž"
 AST_for_the_southern_cross_desc: "Jižní kříž nelétá nad Británií. Létá nad námi. Australská identita je něco reálného, něco získaného, něco, co stojí za to bránit. Ková se nová národní hrdost, nevypůjčená z Londýna ani nedefinovaná vzdálenými institucemi, ale vyrůstající tady, z této půdy, pod těmito hvězdami."
 AST_through_the_gates: "Skrz brány"
 AST_through_the_gates_desc: "Přípravy daly místo naléhavosti. Národní obranný program se rozšiřuje s plnou váhou australského průmyslu v zádech. Nové závody rostou vedle stávajících, cíle produkce jsou zvýšeny a hranice mezi civilní výrobou a vojenskou nezbytností se tiše vymazávají."
 AST_toe_the_line: "Držet se linie"
 AST_toe_the_line_desc: "Pohodlí, na která si Australané zvykli v době prosperity, musí být nyní odložena. Příděly, delší pracovní doba a výzva k službě jsou cenou za nezávislost. Ti, kdo odpoví, naleznou národ připravený je podpořit. Ale stát nebude mít velkou trpělivost s těmi, kdo věří, že oběť je břemenem někoho jiného."
 AST_crush_the_gates: "Zlomit brány"
 AST_crush_the_gates_desc: "Přípravy jsou dokončeny. Australský průmysl nyní funguje na plný válečný provoz, jeho výroba je zcela nasměrována na obranu a projekci národní moci. Ať přijde jakákoli bouře, Austrálie ji potká nikoli jako neochotné dominion snažící se mobilizovat, ale připravena."
 AST_national_defense: "Národní obrana"
 AST_national_defense_desc: "Díky cíleným investicím a národnímu řízení vybudovala Austrálie průmyslovou základnu schopnou udržet vlastní obranu. Továrny a loděnice fungují pod dohledem státu, jejich produkce se měří nikoli ziskem, ale potřebami národa."
 modify_AST_national_defense_tt: "Modifikuje §Y$AST_national_defense$§! o:"
 AST_nauru_pact: "Pakt Nauru"
 AST_nauru_pact_desc: "S počáteční překážkou získání moci stále před námi se záležitost nezávislosti zdá daleko; avšak australská autonomie není jen naším zájmem. Výměnou za záruku [GER.GetNameDef] na naši suverenitu v případě britského odporu proti Australia First nebo případnému odtržení od Commonwealthu, při nástupu k moci vrátíme jeden z jejich ztracených pacifických ostrovů: Nauru."
 AST_australian_culture_investments: "Investice do australské kultury"
 AST_australian_culture_investments_desc: "Se svým esejem Základy kultury v Austrálii Stephensen ovlivnil vznik básnického hnutí Jindyworobak a učinil jednu věc jasnou: australská kultura musí mít prioritu. Vláda zdá se kompletně přechází hodnotu umělců a spisovatelů, ale my ne. Mobilizací podporovatelů Jindyworobak a Australia First podpoříme kulturní rozvoj."
 AST_australian_culture_investments_tt: "\nPo §Y365§! dnech:"
 AST_australia_first_party_focus: "Strana Australia First"
 AST_australia_first_party_focus_desc: "Členové hnutí Australia First vyrostli do takových čísel, že postup hnutí již nelze zastavit. Je čas, aby australská veřejnost přivítala nově registrovaný, nejsilnější nacionalistický hlas: Stranu Australia First."
 AST_australia_first_party_req_tt: "§YStrana Australia First§! byla založena."
 AST_in_from_the_cold: "Znovu z veřejného života"
 AST_in_from_the_cold_desc: "Australia First a její stoupenci se již nemusí skrývat. Špatné zacházení, kterého se náš národ dočkal pod dlouhou řadou předchozích vlád, je konečně odkryto a je čas, aby nové hlasy byly slyšet."
 AST_absorb_the_uap: "Přijmout UAP"
 AST_absorb_the_uap_desc: "Ačkoli Spojená australská strana (United Australia Party) zůstala liberální, je také pravicově nakloněná. S novou politickou stranou u moci nemusí mít členové UAP mnoho možností kromě podpory současné vlády. Oslovíme nejvýznamnější členy a přetáhneme je do Strany Australia First."
 AST_big_business_pact: "Pakt velkého byznysu"
 AST_big_business_pact_desc: "Protože Strana Australia First si klade za cíl chránit domácí průmysl, našla mnoho podporovatelů mezi špičkovými podnikateli. Výměnou za prosazování politik, které zvýší jejich zisky, podpoří naše politické a vojenské cíle."
 AST_big_business_pact_tt: "\nOdemkne rozhodnutí §YBig Business Pact§! ovlivňující cíle průmyslu a výstavby."
 AST_autarky: "Autarkie"
 AST_autarky_desc: "Závislost na zahraničním obchodu je nejistá, zvláště v dobách konfliktu; australské průmysly musí mít prioritu, ne být přemáhány dovozem. Jen omezením obchodních zákonů můžeme ochránit domácí ekonomiku a zajistit, že Austrálie si dokáže sama zajistit zásoby."
 AST_energy_independence: "Energetická nezávislost"
 AST_energy_independence_desc: "Závislost na zahraničním obchodu je nejistá, zvláště v dobách konfliktu; energetická nezávislost je zásadní, aby Austrálie mohla fungovat i v nejhorších časech. Investicemi do rafinérií můžeme podpořit domácí produkci energie."
 remove_2_offsite_dockyard: "Odstranit §R2§! mimo-mapové §YLoděnice§!."
 AST_british_pact: "Britský pakt"
 AST_british_pact_desc: "Navzdory našemu nedávnému odtržení od Britského společenství je v zájmu [AST.GetName] pokračovat v spolupráci se svou starou matkou. Vzhledem k tomu, jak je [ENG.GetNameDef] roztažena po celém světě, naše ochota sdílet její břemena nabídkou vojenské spolupráce by měla být oceněna."
 AST_naurus_return_to_german_hands: "Vrácení Nauru do německých rukou"
 AST_naurus_return_to_german_hands_desc: "Nyní, když je Australia First pevně u národních otěží, nastal čas splnit slib ohledně Nauru a naši němečtí spojenci mají dodat svou část dohody. [AST.GetName] se konečně osvobodí z řetězů Commonwealthu a nechá Brity bez slova v této záležitosti."
 AST_naurus_return_to_german_hands_tt: "Pakt '§YNauru Pact§!' se stává aktivním."
 AST_naurus_return_to_german_hands_tt_2: "Pakt '§YNauru Pact§!' je aktivní."
 AST_the_winner_takes_it_all: "Vítěz bere vše"
 AST_the_winner_takes_it_all_desc: "Ačkoli obětování ostrova Nauru za německou spolupráci se dříve zdálo rozumné, už tomu tak není. S našimi prokázanými schopnostmi budeme usilovat o expanzi na Šalomounovy ostrovy a do Nového Zélandu, i když to může přidat k naší zrazené dohodě o Nauru. Koneckonců, Šalomounovy ostrovy se stanou další německou oblastí ztracenou do australských rukou."
 AST_resist_western_intruders: "Odpor vůči západním vetřelcům"
 AST_resist_western_intruders_desc: "Západní národy se zdají být náchylné vměšovat se do záležitostí Pacifiku, ale tomu se postavíme. Než dosáhnou našich břehů, dosáhneme jejich, a dokážeme, že [AST.GetName] není národ, který podléhá požadavkům."
 AST_invasion_preparation_tt: "Čas přípravy invaze: §G-20.0%§!"
 AST_naval_invasion_penalty_tt: "Penalizace invaze: §G-20.0%§!"
 AST_expand_the_fort: "Rozšířit pevnost"
 AST_expand_the_fort_desc: "Západní Pacifik není pro [USA.GetNameDef] k rozkazování. Ostrovy nárokované Amerikou patří východoasijským národům, a jak roste australský vliv, budeme to my, kdo je nárokuje."
 AST_integrate_the_fort: "Integrace pevnosti"
 AST_integrate_the_fort_desc: "Spravovali jsme Novou Guineu východní část pod mandátem Ligy národů od roku 1920 a Papua byla externím územím [AST.GetName] téměř od federace; východní část Papuy-Nové Guiney by se přirozeně stala součástí domovského území [AST.GetName]. V rámci snah o sjednocení australské kultury by to byl další krok."
 AST_defying_american_interference: "Vzpoura proti americkému vměšování"
 AST_defying_american_interference_desc: "Stín [USA.GetNameDefCap] se nad námi vznáší a hrozí vměšováním, kdykoli naše kroky nejsou v souladu s jeho zájmy. S globální mocí takové velikosti uchopující železnou pěst kolem [PHI.GetNameDef] nikdy východoasijské země nebudou skutečně patřit Východní Asii. [AST.GetName] nepodlehneme žádné autoritě cizích vetřelců — Filipíny budou naše."
 AST_the_pacific_garrison: "Pacifické záložní vojsko"
 AST_the_pacific_garrison_desc: "Ačkoli ochrana jihovýchodní Asie a Pacifiku je v britském zájmu, oblast je daleko od britských ostrovů. Výměnou za jejich podporu v zásobování nabídneme převzetí velení obrany území, aby se [ENG.GetNameDef] mohl věnovat jiným oblastem."
 AST_vichy_out_of_africa: "Vichy pryč z Afriky"
 AST_vichy_out_of_africa_desc: "Pád nebo spolupráce Vichy Francie je jedním z hlavních cílů [ENG.GetNameDef]. Jako gesto dobré vůle se [AST.GetName] připojí a bude usilovat o získání francouzských afrických kolonií, dokud nebudou podrobeny."
 AST_vichy_out_of_africa_tt1: "Přidat nároky na území §YVichy France§! v §YAfrica§! skrze Focus §YVichy Out of Africa§!.\n"
 AST_vichy_out_of_africa_tt2: "Přidat nároky na území §YVichy France§! v §YAfrica§! skrze rozhodnutí §YVichy Out of Africa§!.\n"
 AST_vichy_africa_claim_flag: "Nároky [AST.GetFlag]§Y[AST.GetName]§! na všechna území §YVichy France§! v §YAfrica§! jsou přidány do §YDone Meddling§!."
 AST_vichy_claim_tt: "Nároky [AST.GetFlag]§Y[AST.GetName]§! jsou přidány do §YDone Meddling§!."
 vichy_in_africa_trigger: "§YVichy France§!: Jakýkoli kontrolovaný stát:\n    Je v §YAfrica§!"
 vichy_wargoal: "Získá válečný cíl §YAnexovat§! proti §YVichy France§!."
 AST_britain_supplying_ships: "Británie dodává lodě"
 AST_britain_supplying_ships_desc: "Z nosení břemene hlídání břehů britských spojenců se ukázalo, že flotila [ROOT.GetName] musí být rozšířena. Je správné, aby nám [ENG.GetNameDefCap] dodala lodě."
 AST_hand_in_glove: "Ruka v rukavici"
 AST_hand_in_glove_desc: "Rozšiřováním na sever můžeme zvýšit australský vliv na jihovýchodní asijskou diplomacii a konflikty. Již jsme prokázali schopnost chránit britské zájmy společně s těmi našimi, a proto [ENG.GetNameDef] musí pochopit, proč by jejich vzdálená území byla lépe v našich rukou."
 AST_claim_french_indochina: "Nárok na francouzskou Indočínu"
 AST_claim_french_indochina_desc: "S osudem Francie nevyřešeným není rozhodnuto ani o osudu jejích kolonií. Jiné národy se mohou pokusit chopit se francouzské Indočíny, ale ony nepřeváží nad našimi zájmy."
 AST_undeniably_ours: "Nepopiratelně naše"
 AST_undeniably_ours_desc: "Ať už nám diplomacie dá cokoli, nikdy by nám nedala vše. Vichy Francie je v křehkém stavu a její hranice jsou spíše návrhy; promarnit příležitost plně obsadit jejich země by bylo velmi nerozumné. Nevyhnutelně přichází čas války."
 AST_done_meddling: "Konec vměšování"
 AST_done_meddling_desc: "Věrni staré zemi, [AST.GetName] nadále bojuje britské bitvy s hrdě vztyčenou hlavou. Australané jsou spolehlivý národ, ale to neznamená, že je lze brát jako samozřejmost. Zatímco [AST.GetName] bojuje za [ENG.GetNameDef], [ENG.GetNameDef] bude bojovat i za [AST.GetName]."
 AST_northern_advancement: "Postup na sever"
 AST_northern_advancement_desc: "Ačkoli by se Austrálie raději věnovala vlastním politickým záležitostem, nemůžeme očekávat, že nás nechají na pokoji, pokud se sami nestaneme hrozbou. [INS.GetNameDefCap] je národ jako náš, oběť evropských vetřelců, kteří neodchází. Vznesením nároku na jeho území vysíláme jasný signál: tichomořské národy musí být nechány na pokoji."
 AST_soothing_australian_fears: "Uklidnění australských obav"
 AST_soothing_australian_fears_desc: "Ačkoli někteří úředníci věří v možnost spolupráce Austrálie a Japonska, australská veřejnost tomu nevěří. Po dlouhém strachu z japonské invaze je myšlenka spojit se s tímto potenciálním agresorem těžko přijatelná. Uklidníme jejich obavy přípravou na válku."
 AST_soothing_australian_fears_tt: "\nPo §Y180§! dnech:"
 AST_dividing_the_pacific: "Rozdělení Pacifiku"
 AST_dividing_the_pacific_desc: "Australia First prosazuje mír s [JAP.GetNameDef], vidí národ — na rozdíl od většiny australských občanů — jako potenciálního pacifického spojence spíše než jako věčný hrozící nepřítel. Jak roste moc [AST.GetName], je rozumné, aby [JAP.GetName] souhlasil, a potenciální konflikty mezi našimi zeměmi se vyřešily dříve, než vzniknou."
 AST_dividing_the_pacific_ast_gain_tt: "[GET_AST_DIVIDING_THE_PACIFIC_AST_GAIN]"
 AST_dividing_the_pacific_jap_gain_tt: "[GET_AST_DIVIDING_THE_PACIFIC_JAP_GAIN]"
 AST_dividing_the_pacific_tt1: "§GZískáme§!:"
 AST_dividing_the_pacific_tt2: "§ROni získají§!:"
 AST_dividing_the_pacific_tt3: "§Y[AST.GetName]§! převádí následující kontrolovaná území:"
 AST_against_war_and_fascism: "Proti válce a fašismu"
 AST_against_war_and_fascism_desc: "Hnutí Proti válce a fašismu je australskou větví kominternou podporovaného mezinárodního úsilí mobilizovat dělníky proti reakčním silám. Ačkoli v posledních letech ztratilo hybnost, je na nás nést prapor dál."
 AST_world_peace: "Světový mír"
 AST_world_peace_desc: "Hnutí Proti válce a fašismu usilovně pracuje na magazínu nazvaném 'Světový mír', který odhaluje zlo Fašistického hnutí v Německu, Itálii, zejména během španělské občanské války. Podpořeni články se dobrovolníci dychtivě hlásí do boje proti fašismu."
 AST_red_fred: "Rudý Fred"
 AST_red_fred_desc: "'Rudý' Fred Paterson vstoupil do povědomí komunistického hnutí jako kandidát na starostu Brisbane v roce 1934, kde byl drtivě poražen. Jeho ambice však nezmizely a nyní kandiduje do městské rady v Townsville. S naší podporou by se mohl stát prvním komunistou zvoleným do veřejné funkce."
 AST_workers_defence_corps_sparks_anew: "Obrození dělnických obranných sborů"
 AST_workers_defence_corps_sparks_anew_desc: "Workers Defence Corps byl původně vytvořen k obraně štrajkových línií. S rostoucí agresí skupin jako New Guard byl znovu reorganizován, aby opět sloužil jako štít pro protestující za lepší práva a příležitosti."
 AST_a_controversial_recruitment: "Kontroverzní nábor"
 AST_a_controversial_recruitment_desc: "Maurice Blackburn je známý socialistický právník, proslulý obhajobou práv dělníků v právních sporech proti utlačujícím zaměstnavatelům. Jako člen Strany práce (Labor Party) je jeho loajalita zpochybňována kvůli vazbám na radikálnější Hnutí proti válce a fašismu."
 AST_from_picket_line_to_front_line: "Od štrajkové linie na frontu"
 AST_from_picket_line_to_front_line_desc: "Jak zastrašovací taktiky těch, kdo se staví proti osvobození dělnické třídy, rostou, naše obrana musí vyvíjet odpověď. S každým incidentem se dělníci stávají odhodlanějšími a stále více jich vstupuje do Obranného sboru."
 AST_pig_iron_protests: "Pig Iron protesty"
 AST_pig_iron_protests_desc: "Naši dělníci na přístavech často nesouhlasí s vládou zejména v případě prodeje surového železa do válčících zemí. Australané nechtějí se podílet na agresi nebo přepravě vybavení použitého proti nevinným civilistům, a tak [AST.GetName] nebude; vyhlásíme stávku."
 AST_part_with_colonizer: "Rozejít se s kolonizátorem"
 AST_part_with_colonizer_desc: "Kořeny našich bojů leží v Britském impériu a kapitalistickém systému, který nám z dálky vnutili. Už ne. S Británií rozptýlenou krizemi je nyní čas chopit se osudu a vytyčit vlastní cestu jako svobodný a nezávislý národ."
 AST_take_it_to_the_streets: "Vezměme to do ulic"
 AST_take_it_to_the_streets_desc: "Odborné akce jsou jedním z nejsilnějších nástrojů, které máme k vynucení společenské změny, a musíme jej použít proti systému, který má jediný cíl — vykořisťování. Je čas vrátit výrobní prostředky lidem, dělníci Austrálie, spojte se!"
 AST_workers_educational_association: "Dělnická vzdělávací asociace"
 AST_workers_educational_association_desc: "Workers Educational Association je mezinárodní organizace, která se věnuje zpřístupnění vzdělání pracujícím lidem. Měli bychom založit naši vlastní pobočku, protože skutečná rovnost příležitostí začíná ve školách."
 AST_off_leash: "Propuštěno z vodítek"
 AST_off_leash_desc: "Přístavní dělníci jsou páteří odborového hnutí v Austrálii. Jako kontinentální ostrov není překvapivé, že námořní práce hrají v naší ekonomice tak důležitou roli. Je čas sundat obojky a pustit námořní vlky do činnosti."
 AST_a_national_housing_commission: "Národní bytová komise"
 AST_a_national_housing_commission_desc: "Bydlení bylo dlouho spornou otázkou. Každý má právo na střechu nad hlavou, přesto je toto základní potřeba často zneužívána proti dělníkům, její cena formou ekonomického útlaku. Už ne. Budeme požadovat spravedlivý přístup k bydlení pro všechny."
 AST_guaranteed_employment: "Zaručené zaměstnání"
 AST_guaranteed_employment_desc: "Socialismus je často haněn jako líný nebo závislý systém. To musí skončit. Chceme spravedlivou šanci na práci a spravedlivou mzdu, abychom uživili své rodiny."
 AST_equal_pay: "Rovné platy"
 AST_equal_pay_desc: "Přetrvávající omyl je, že ti, kdo vlastní výrobní prostředky, si zaslouží více než ti, kdo v nich pracují. Vlastníci a manažeři nepracují tvrději ani nejsou inherentně více zruční. Vyrovnáním mezd může být ovoce práce spravedlivěji sdíleno ve společnosti."
 AST_all_for_one_one_for_all: "Všichni za jednoho, jeden za všechny"
 AST_all_for_one_one_for_all_desc: "'Všichni za jednoho, a více pro mě' byl dlouho bojový pokřik buržoazie, jejich chamtivost požaduje stále víc a dává méně. Příslib, že bohatství bude proudit dolů, je lež. Musí být sdíleno rovným dílem, všemi a pro všechny."
 AST_abolition_of_private_property: "Zrušení soukromého vlastnictví"
 AST_abolition_of_private_property_desc: "Ozubená kola průmyslu jsou promazávána krví dělníků. Musíme ukončit brutalitu akumulace a zrušit soukromé vlastnictví úplně. Všechno bude sdíleno, od každého podle jeho schopností, každému podle jeho potřeb."
 AST_centralized_production: "Centralizovaná výroba"
 AST_centralized_production_desc: "Tržní síly jsou chaotické a nerovné. Pokud chceme vybudovat skutečně spravedlivou společnost, stát musí převzít centrální roli v určování, co se vyrábí, kým a kde. Naše byrokracie vede pečlivé záznamy a je v nejlepší pozici stanovovat výrobní kvóty."
 AST_public_institutions: "Veřejné instituce"
 AST_public_institutions_desc: "Společnost vyžaduje mnoho základních služeb, od zdravotnictví a bydlení po péči o děti a dopravu. Stát musí tyto služby poskytovat univerzálně, zajišťovat přístup pro všechny bez omezení. Osvobozené od nutnosti generovat soukromý zisk, tyto systémy mohou efektivně sloužit potřebám celého obyvatelstva."
 AST_planned_extraction: "Plánovaná těžba"
 AST_planned_extraction_desc: "Máme to štěstí, že vlastníme zemi bohatou na suroviny. Musíme zajistit, aby její bohatství bylo systematicky těženo a směrováno do odvětví, která to nejvíce potřebují."
 AST_maritime_commission: "$USA_maritime_commission$"
 AST_maritime_commission_desc: "$USA_maritime_commission_desc$"
 AST_state_research_funding: "Státní financování výzkumu"
 AST_state_research_funding_desc: "Aby naše výzkumné instituce pracovaly co nejúčinněji, stát musí být jejich hlavním zdrojem financí, řídit úsilí tam, kde jsou nejvíce potřeba, a zajistit, že informace zůstanou přísně kontrolovány. Nemůžeme riskovat, že by naši občané byli znepokojováni špatnými myšlenkami."
 AST_graziers_to_industry: "Pastýři do průmyslu"
 AST_graziers_to_industry_desc: "Během Velké hospodářské krize se naše města vyprázdnila, když dělníci hledali stabilitu na venkově. Teď, když kontrolujeme výrobní prostředky, je můžeme přivést zpět do průmyslu. Musíme jim vštěpovat potřebu národa: že pece průmyslu musí být krmeny potem lidí."
 AST_free_school_policy: "Politika bezplatného školství"
 AST_free_school_policy_desc: "Abychom formovali vzorového občana, musíme formovat jeho názory. Od kolébky po univerzitu stát bude řídit, co se naše děti učí. Tím zajistíme, že budoucí generace pochopí důležitost socialistického ideálu a nebezpečí volného trhu... a svobodného myšlení."
 AST_free_healthcare_policy: "Politika bezplatné zdravotní péče"
 AST_free_healthcare_policy_desc: "Naši lidé si zaslouží být osvobozeni od nemoci a zranění, a pokud se nejhorší stane, nesmí být zruinováni neštěstím jako jinde. Poskytneme univerzální přístup ke zdravotní péči, nemocnicím a lékařům — zdravý lid je produktivní lid."
 AST_the_publics_australia: "Austrálie lidu"
 AST_the_publics_australia_desc: "Odstranili jsme starý řád a vybudovali národ, který existuje pro mnohé, ne pro pár. Průmysl, práce a zdroje nyní slouží lidu jako celku. To je Austrálie lidu. Rovná, sjednocená a nezlomná."
 AST_the_australian_commonwealth: "Australské společenství"
 AST_the_australian_commonwealth_desc: "Británie kdysi nesla mantii vedení nad Commonwealthem, ale její vize byla zkažena kapitálovými zájmy. Uchopíme tu roli a povedeme národy k sdílené socialistické utopii."
 AST_union_control_commonwealth: "Odemkne rozhodnutí §YUnion Control§!. \nUmožňuje komunistickou infiltrace Nového Zélandu, Malajsie, Barmy a nakonec Indie."
 AST_a_comrade_emancipated: "Osvobozený soudruh"
 AST_a_comrade_emancipated_desc: "Po celém světě zůstává mnoho národů svázaných řetězy kapitalismu, jejich lidé jsou připraveni o skutečnou svobodu. Jako svobodný socialistický stát je naší povinností pomoci v jejich osvobození. Dělníci světa, spojte se, společně shoďme tyto řetězy."
 AST_union_control_local: "Odemkne rozhodnutí §YUnion Control§!. \nUmožňuje komunistickou infiltrace Indonésie a Filipín."
 AST_comintern: "Připojit se ke Kominterně"
 AST_comintern_desc: "I když Sovětský svaz občas odbočoval od pravých marxistických principů, zůstává standard-bearerem dělnické internacionály. Připojením ke Kominterně můžeme sjednotit úsilí a nést pochodnici socialismu po celém světě."
 AST_for_greater_good: "Pro větší dobro"
 AST_for_greater_good_desc: "Naše vize světové revoluce vyžaduje krev a oběti. Na mnoha místech plápolá pochodeň socialismu; musíme odpovědět a poslat naši podporu, aby neunavila. Koneckonců, je to pro větší dobro."
 AST_make_common_cause: "Spojit společnou věc"
 AST_make_common_cause_desc: "Pod naším vedením Commonwealth začal prosperovat, veden světlem socialismu z temnoty kapitalistického útlaku. V tomto kritickém okamžiku musíme zajistit, aby naše vůle nebyla zlomena a aby jsme společně kráčeli k lepšímu zítřku."
 AST_the_red_pacific: "Rudý Pacifik"
 AST_the_red_pacific_desc: "Pacifik musí být přetvořen v obrazu revoluce. Napříč ostrovy a pobřežími našeho regionu podpoříme vznik socialistických vlád a zajistíme, aby rudý prapor vlál z břehu na břeh."
 AST_the_irish_anti-britain_pact: "Irský pakt proti Británii"
 AST_the_irish_anti-britain_pact_desc: "Británie byla příliš dlouho pevností kapitalismu, chráněna svou ostrovní polohou a námořní silou. Podněcováním nepokojů mezi přístavními dělníky v Irsku a Severním Irsku můžeme prorazit její obranu a otevřít cestu přes Irské moře pro naše síly."
 AST_stretch_the_fleet: "Rozšířit flotilu"
 AST_stretch_the_fleet_desc: "Británie stále stojí jako bašta kapitalismu, chráněná svou mohutnou flotou. Je čas rozšířit naše námořní schopnosti, vzít boj k nim a ukázat světu, který ostrov je větší."
 AST_chinese_relations: "Vztahy s Čínou"
 AST_chinese_relations_desc: "Naši soudruzi v Číně zápasí o přežití. Máme prostředky jim pomoci, ale musíme jednat rychle, než budou přemoženi imperialistickými silami seřazenými proti nim."
 AST_westward_battles: "Boje na západ"
 AST_westward_battles_desc: "Fašistické síly dominují západu a ohrožují samotné základy našeho přežití. Nyní spojený s Kominternou musíme bojovat proti nim a postavit se těm, kdo by zničili dělnickou utopii, kterou budujeme."
 AST_strongholds: "Opěrné body"
 AST_strongholds_desc: "Abychom zajistili naši pozici v tomto novém divadle, musíme podpořit naše irské soudruhy proti imperiálnímu srdci kapitalismu. Jejich dřívější boj za nezávislost nabízí cenné lekce, když se spolu připravujeme na další etapu světového konfliktu."
 AST_out_of_the_den: "Ven z nory"
 AST_out_of_the_den_desc: "Mnozí v Irsku stále chovají hlubokou zášť vůči britské nadvládě. Je čas ukázat naši sílu a přitáhnout je z stínů, sjednotit je pro naši věc proti společnému nepříteli."
 AST_end_the_kingdom: "Zničit království"
 AST_end_the_kingdom_desc: "Nastal čas. Kořen imperiálního kapitalismu bude bodnut v jeho zkaženém srdci. Osvobození dělníků napříč Britským impériem je na dosah. Zrušte monarchii. Zrušte království. Zrušte útlak. Dělníci Commonwealthu, spojte se!"
 AST_red_solidarity: "Rudá solidarita"
 AST_red_solidarity_desc: "Boje v Číně zuří, miliony trpí a umírají. Jejich boj je i naším bojem, nemůžeme stát stranou. Můžeme zasáhnout, sdílet jejich břemeno a zajistit, že plamen revoluce neuhasne."
 AST_free_the_colonies: "Osvoboďte kolonie"
 AST_free_the_colonies_desc: "Plameny revoluce šlehají skrz rozpadající se Britské impérium. Kolonie již nebudou koloniemi, ale svobodnými národy. Povstaňte, soudruzi! Shoďte vaše okovy a přidejte se k revoluci!"
 AST_battle_of_the_ocean: "Bitva oceánu"
 AST_battle_of_the_ocean_desc: "Oceány byly dlouho tepnami světového obchodu. Nyní je čas vzít boj do Pacifiku a přetnout systém, který ho živí. Vody se začervenají krví zkorumpovaných kapitalistů i hrdinů revoluce."
 AST_borderless_solidarity: "Solidarita bez hranic"
 AST_borderless_solidarity_desc: "Solidarita. Slovo, které spojuje dělníky světa. Žádná hranice nás nerozdělí, žádný národ nestojí sám. Kdekoli hoří boj, odpovíme a postavíme se společně v globálním boji za osvobození."
 AST_an_equal_union: "Rovné sjednocení"
 AST_an_equal_union_desc: "Ač neseme prapor revoluce, všichni, kdo se k nám přidají, stojí jako rovní. V tomto svazku se zdroje, práce a myšlenky volně sdílejí, formují budoucnost, kde je bohatství kolektivní a žádný národ nestojí nad jiným."
 AST_expanding_influence: "Rozšiřující se vliv"
 AST_expanding_influence_desc: "Stojíme na správné straně dějin, naše myšlenky mluví samy za sebe. Příslib dělnického ráje není snem, ale vznikající realitou. Můžeme tuto vizi rozšířit dál a zvát ostatní, aby se k nám připojili při budování sdílené budoucnosti."
 AST_public_works: "Veřejné práce"
 AST_public_works_desc: "Velká depresi zanechala australskou ekonomiku v těžkém stavu. Zahájíme řadu veřejných prací, abychom lidi zaměstnali a obnovili spotřebu."
 AST_lang_plan: "Langův plán"
 AST_lang_plan_desc: "Jack Lang vystoupil do popředí ekonomické politiky odmítnutím úhrady zahraničních dluhů a místo toho přesměrováním těchto fondů na veřejné projekty podporující domácí růst. Koneckonců, ze skály krev nedostanete."
 AST_exports_for_economic_recovery: "Exporty pro ekonomické zotavení"
 AST_exports_for_economic_recovery_desc: "Oponenti Langových myšlenek navrhují využít zahraniční trhy a dluh k povzbuzení zahraničních investic a prodejů, zavázat se k exportně orientované ekonomice pro podporu domácí produkce, zaměstnanosti a konečně spotřeby."
 AST_the_phosphate_commision: "Komise pro fosfáty"
 AST_the_phosphate_commision_desc: "Po Velké válce byla Nauru umístěna do společného mandátu Austrálie, Nového Zélandu a Spojeného království. V roce 1919 byla práva na veškerý prodej fosfátů na ostrově převedena na tyto správce vedené Austrálií. Využitím naší vedoucí pozice můžeme ovlivnit ceny a zajistit vysoce konkurenceschopné sazby pro náš domácí trh."
 AST_goods_standard: "Standard zboží"
 AST_goods_standard_desc: "Základním principem ekonomické teorie Jacka Langa je zrušení zlatého standardu v Austrálii a jeho nahrazení Standardem zboží, který váže množství peněžní nabídky na skutečné množství vyprodukovaného zboží. Zajišťuje to, že tok kapitálu je přímo spojen s domácí produktivitou, nikoli s vnějšími faktory."
 AST_standard_gauge_line_to_darwin: "Trať standardního rozchodu do Darwin"
 AST_standard_gauge_line_to_darwin_desc: "Po příliš dlouhou dobu nám chyběly správné spojení s našimi severními teritorii. V rámci širšího programu veřejných prací zaměřeného na nasměrování peněz zpět do ekonomiky můžeme vybudovat železnici spojující naše jižní města se severem."
 AST_lang_is_right: "Lang má pravdu"
 AST_lang_is_right_desc: "Ukazuje se, že Lang měl pravdu! Odmítnutím upřednostňovat zahraniční věřitele a agresivnějším využitím našeho bankovního systému můžeme uvolnit značné prostředky. Ty mohou být následně směřovány do domácí ekonomiky, poskytujíc potřebné investice a stimulující růst."
 AST_within_reach: "Na dosah"
 AST_within_reach_desc: "Tak blízko a přesto daleko. Austrálie je velmi bohatá na zdroje, a když jen trochu více prozkoumáme, bezedné bohatství leží pod našimi nohami. S rozšířením infrastruktury se i odlehlé doly staly dostupnými a stojíme na prahu éry prosperity tažené nerostným bohatstvím."
 AST_a_domestic_supply_chain: "Domácí dodavatelský řetězec"
 AST_a_domestic_supply_chain_desc: "Jedním z vedlejších efektů našeho zaměření na domácí ekonomiku je vznik mimořádně odolného produkčního systému. Když jsou všechny úrovně výroby doma, jsme do značné míry izolováni od vnějších šoků."
 AST_broken_hill_propietary_company: "Broken Hill Proprietary Company"
 AST_broken_hill_propietary_company_desc: "Broken Hill Proprietary Company je jedním z předních producentů těžby a oceli v Austrálii. Přezdívaná místními 'Velký Australan', dominuje odvětví. S dramatickým nárůstem poptávky po surovinách má společnost dobré postavení pro ještě rychlejší růst."
 AST_radium_hill: "Radium Hill"
 AST_radium_hill_desc: "V Jižní Austrálii byl objeven uran a důl Radium Hill má značný potenciál pro rozšíření. I když teprve odhalujeme plné možnosti těchto nových technologií, je jasné, že stojíme na prahu atomového věku a to by mohl být náš vstup do něj."
 AST_industrial_expansion: "Průmyslová expanze"
 AST_industrial_expansion_desc: "Velká deprese ochromila národní průmyslovou produkci po většinu minulého desetiletí. Nyní, když máme politickou vůli k rozhodnějším krokům, měli bychom ji využít k odvážné expanzi průmyslové základny, vytvářením pracovních míst, zvyšováním poptávky po zdrojích a produkcí více zboží pro trh."
 AST_income_tax_assessment_act: "Zákon o posuzování daně z příjmu"
 AST_income_tax_assessment_act_desc: "Náš daňový systém je v špatném stavu a složitý pro lidi k orientaci, vyžadující těžkou vládní kontrolu, kterou si nemůžeme dovolit. Přepracováním a zjednodušením příslušných ustanovení můžeme učinit výběr daní výrazně efektivnějším."
 AST_council_for_scientific_and_industrial_research: "Rada pro vědecký a průmyslový výzkum"
 AST_council_for_scientific_and_industrial_research_desc: "Rada pro vědecký a průmyslový výzkum byla posílena po Imperial Conference roku 1923, aby pomohla rozšířit ekonomickou základnu různých kolonií a dominí. Ačkoli její příspěvky byly významné, je čas dát tělu nový fokus: rozvoj výroby a sekundárních odvětví."
 AST_bring_home_the_farmers: "Přivést farmáře zpět"
 AST_bring_home_the_farmers_desc: "Během Velké deprese se naše hlavní města výrazně vylidnila, když dělníci přesídlili na venkov hledat zemědělskou práci. Nyní, když se podmínky začínají zlepšovat, měli bychom stimulovat návrat pracovní síly, aby se továrny opět rozběhly a obnovila se produkce."
 AST_reverse_wage_cuts: "Zrušit snižování mezd"
 AST_reverse_wage_cuts_desc: "Abychom dali podnikům šanci, zavedli jsme sérii snižování mezd v celé ekonomice. Nyní, když se objevují známky oživení, měli bychom změnit kurz. Rostoucí mzdy vedou k větší dělění kupní síly, pomáhají zvyšovat spotřebu a ekonomický růst."
 AST_the_manpower_directorate: "Ředitelství pro personál"
 AST_the_manpower_directorate_desc: "Jak naše ekonomika roste složitější, čelíme rostoucím problémům s lidskými zdroji. Toto řed
 itelství zařídí, že správní lidé budou umístěni na správné role, se správnými dovednostmi, ve správný čas."
 AST_recovery: "Oživení"
 AST_recovery_desc: "Poprvé od krize náš hrubý domácí produkt překročil úroveň před Depresí. Je to chvíle k oslavě, jediná trajektorie pro naši ekonomiku je nyní vzhůru. Vstupujeme do období silného růstu a je čas sklízet ovoce naší obnovené prosperity."
 AST_devalued_currency: "Znehodnocená měna"
 AST_devalued_currency_desc: "Jedním z nejúčinnějších způsobů, jak zvýšit exporty, je slabší měna. Pokud si zahraniční kupující mohou koupit více našeho zboží, staneme se mezinárodně konkurenceschopnějšími. Je to však dvojsečný meč, protože dovoz ze zahraničí také zdraží."
 AST_reverse_industry_tariffs: "Zrušit průmyslové tarify"
 AST_reverse_industry_tariffs_desc: "V minulosti jsme používali tarify k ochraně domácích průmyslů před zahraniční konkurencí. To však vedlo k obchodním válkám a odvetným tarifům proti našim exportům, zvyšujícím ceny. Měli bychom tyto bariéry snížit a podpořit vzájemná snížení k rozšíření obchodu."
 AST_foreign_competition: "Zahraniční konkurence"
 AST_foreign_competition_desc: "Konkurence je dobrá pro podnikání; podněcuje inovace a efektivitu a odstraňuje pohodlnost. Je to svět, kde pes sežere psa, a musíme zajistit, že náš pes je největší a že mu sundáme obojek, aby mohl svobodně soutěžit."
 AST_expanding_into_new_markets: "Expanze na nové trhy"
 AST_expanding_into_new_markets_desc: "Výhoda spoléhat se na zahraniční trhy je jednoduchá. Globální trh je obrovský. Vždy budou nové trhy k osvojení; musíme najít naši konkurenční výhodu a ukázat nadřazenost australského zboží a obchodních praktik."
 AST_populate_or_perish: "Osídlit nebo zahynout"
 AST_populate_or_perish_desc: "Když udeřila Velká deprese, porodnost prudce klesla a od té doby se sotva zotavila. Pro pokračující domácí rozvoj zřídíme federální Ministerstvo imigrace, které provede a dohlédne nový imigrační program."
 AST_recruitment_drive: "Náborová kampaň"
 AST_recruitment_drive_desc: "Slabá vůle předchozích vlád a jejich nadměrná spoleh na Británii vedly k dlouhému období zanedbávání australských ozbrojených sil. To už nebude. Zahájíme kampaň na zvýšení náboru do Australian Defence Force."
 AST_new_deal: "Nový řád"
 AST_new_deal_desc: "Protest, který se odehrál při 150. výročí [AST.GetName], ukázal, že naše zákony týkající se domorodých občanů musí být přehodnoceny. Na žádost aktivistů za práva domorodců se s nimi setkáme a společně najdeme cestu k plnému občanství pro domorodé obyvatelstvo."
 AST_the_1938_sesquicentenary_flag: "Událost §YThe 1938 Sesquicentenary§! se odehrála."
 AST_the_1938_sesquicentenary_tt: "Focus '§YNew Deal§!' ve větvi §YPopulate or Perish§! se stává dostupný."
 AST_repeal_immigration_restrictions: "Zrušit imigrační omezení"
 AST_repeal_immigration_restrictions_desc: "Ministerstvo imigrace je vázáno zastaralými zákony určujícími, kdo smí imigrovat do [AST.GetName]. Navzdory riziku vyvolání kontroverze tyto zákony zrušíme a zavede kvótní systém pro řízení toku imigrantů."
 AST_womens_armed_services: "Ženské ozbrojené služby"
 AST_womens_armed_services_desc: "Navzdory prudkému odporu bude vytvoření ženských ozbrojených složek pokračovat. Každá pomocná ruka bude vítána v obraně [AST.GetName] proti agresorům, bez ohledu na pohlaví. Výběr ředitelů pro tyto síly je klíčový pro nábor a výcvik."
 AST_northern_territory_reconnaissance_unit: "Průzkumná jednotka Severních teritorií"
 AST_northern_territory_reconnaissance_unit_desc: "Flight Lieutenant a antropolog Donald Thomson prosazoval začlenění domorodého obyvatelstva do ozbrojených složek [AST.GetName] a bude konečně vyslyšen. Thomsonovi osobně nařídíme vytvoření průzkumné jednotky mužů s místními znalostmi a dovednostmi v oblasti života v buši pro dohled i nad našimi nejodlehlejšími a nehostinnými oblastmi."
 AST_northern_territory_reconnaissance_unit_tt: "Odemknout podpůrnou společnost §YNorthern Territory Reconnaissance Unit§!."
 AST_torres_strait_battalion: "Batalion Torresova průlivu"
 AST_torres_strait_battalion_desc: "Snaha Torres Strait Company jako posádky byla dobře vedena, ale jejich muži mají potenciál k dalším výkonům. Jako pocházející z ostrovů u severního pobřeží [AST.GetName] mají rozsáhlé znalosti Torresova průlivu. Vyškolíme jejich muže jako mariňáky a požádáme další dobrovolníky k vytvoření batalionu."
 AST_department_of_aboriginal_affairs: "Ministerstvo domorodých záležitostí"
 AST_department_of_aboriginal_affairs_desc: "Realizujeme návrh aktivistických skupin za práva domorodých obyvatel a zřídíme nové Ministerstvo domorodých záležitostí. Ministerstvu bude radit výbor složený z osob dědictví domorodých obyvatel a jeho cílem bude zajistit přístup domorodých komunit k potravinám a lékařské pomoci."
 AST_immediate_rights: "Okamžitá práva"
 AST_immediate_rights_desc: "Žádná skupina obyvatel v rámci [AST.GetName] nebude regulována federací tak, aby její dědictví omezovalo přidělení občanských práv. Zavedením našeho vlastního zákona o občanství a opuštěním představy, že naši lidé jsou pouze britští subjektové, budou australská práva již bez podmínek."
 AST_diverse_army: "Různorodá armáda"
 AST_diverse_army_desc: "Obrana vlasti není pouze privilegiem, ale právem. Každý ochotný Australan může vstoupit do armády a každý ambiciózní voják by měl mít možnost povýšit."
