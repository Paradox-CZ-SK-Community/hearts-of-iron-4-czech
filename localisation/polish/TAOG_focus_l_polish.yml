l_polish:
 INS_nationalize_companies_tt: "Všechny vojenské průmyslové organizace a průmyslové podniky budou znárodněny a dostanou nové jméno."
 available_focus_tt: "§DDostupné§! zaměření(a):\n"
 INS_denounce_soetardjo: "Odsoudit Soetardja"
 INS_denounce_soetardjo_tt: "Začneme plánovat podzemní revoluci, infiltrovat vládu a zakládat partyzánské buňky po celém souostroví. Jakmile budeme dostatečně připraveni, zahájíme partyzánskou válku za nezávislost proti Nizozemcům."
 INS_soetardjo_petition_debate_done_tt: "Debata Volksraadu o Soetardjově petici za autonomii skončila"
 INS_tkr_tt: "Mění §YLidovou bezpečnostní armádu§! takto:"
 INS_commander_sudirman_tt: "§YSudirman§!([INS.GetFlag]) je povýšen na §YMaršála polníka§!"
 INS_the_declaration_of_independence: "Deklarace nezávislosti"
 INS_the_declaration_of_independence_desc: "Nemůžeme už déle čekat, musíme udeřit, dokud je železo žhavé! Měli bychom rychle vyslat naše milice, aby obsadily přístavy, města a průmyslová centra natolik rychle, aby nizozemské úřady nestihly zareagovat. Poté vyhlásíme nezávislost a prohlásíme Republiku Indonésie."
 INS_the_declaration_of_independence_tt: "Vyhlásíme §YNezávislost§!. Každý stát, kde jsme zřídili §YZákladnu milic§! nebo §YHlavní stan§!, bude pod naší kontrolou, zatímco ostatní zůstanou u [HOL.GetNameDef]\n\n[HOL.GetNameDefCap] nebude uznávat naši suverenitu a začne nízkoúrovňový konflikt. To by se mohlo vyhrotit v §Rválku§!.\n\nOdemkne §Ypozemní nájezd§!, který zvýší §Gpřítomnost milicí§! v nizozemském státě a umožní vám nakonec stát ovládnout."
 INSHOL_the_declaration_of_independence: "Národní revoluce"
 INS_laskar_rakjat: "Laskar Rakyat"
 INS_laskar_rakjat_desc: "Revoluci tvoří mnoho různých milic po celé Indii, některé velké a některé malé. Organizace milic je nezbytným krokem k vítězství. Nesmíme však jednat příliš ukvapeně, protože posilování milic s vazbami na naše politické rivaly by mohlo způsobit katastrofu."
 INS_militia_tt: "Vytvoří novou šablonu divize §YBojovníků za svobodu§! a odemkne rozhodnutí pro jejich řízení."
 INS_militia_warning_tt: "Milice jsou §Ypolonezávislé§! skupiny bojovníků za svobodu. Budou za nás bojovat, ale jejich pomoc není zadarmo. Budou očekávat odměnu za své úsilí. §RStabilita bude výrazně ovlivněna, pokud nebudou jejich požadavky splněny!§!"
 INS_usa_tanks_opinion_mod: "Zakoupili nám tanky"
 INS_republic_add_generals_tt: "(§Y$INS_sudirman$§!([INS.GetFlag]), §Y$INS_soengkono$§!([INS.GetFlag]), §Y$INS_supriyadi$§!([INS.GetFlag]), §Y$INS_djatikoesoemo$§!([INS.GetFlag]), §Y$INS_maludin_simbolan$§!([INS.GetFlag])) se stává generálem."
 INS_big_militia_presence_tt: "Budou pod naší kontrolou po vyhlášení nezávislosti."
 INS_prepare_raiding_bases: "Připravit nájezdové základny"
 INS_prepare_raiding_bases_desc: "Využijeme naši síť špionů k tajnému zřízení bunkrů po celém souostroví, abychom byli připraveni udeřit, až revoluce začne."
 INSHOL_dutch_east_indies: "Nizozemská východní Indie"
 INSHOL_dutch_east_indies_desc: "Kolonie byla založena před téměř 500 lety a od té doby nabyla mnoha podob. Svět se rychle mění a naše kroky nyní určí budoucí nizozemsko-indonéské vztahy na dlouhou dobu."
 INSHOL_the_war_in_europe: "Válka v Evropě"
 INSHOL_the_war_in_europe_desc: "Konflikt v Evropě rychle eskaluje a Nizozemsko je nyní ve válce. Nemůžeme se na ně už dál spoléhat, že nás ochrání, a musíme stát pevně na svých nohou, jinak nám hrozí převzetí cizími mocnostmi."
 INSHOL_military_equipment_contracts: "Smlouvy na vojenské vybavení"
 INSHOL_military_equipment_contracts_desc: "Indie je rozsáhlé souostroví s desítkami milionů obyvatel. Chybí nám průmyslová kapacita nezbytná k obraně. Máme ale dost zdrojů, abychom zabezpečili obchod po celém světě. Uzavřením kontraktů s demokratickými zeměmi můžeme tento problém vyřešit."
 INSHOL_hawk_75a7: "Hawk 75a-7"
 INSHOL_hawk_75a7_desc: "Americký stíhací letoun Hawk 75A-7 je pro Indie ideální – dostupný a výkonný. Můžeme uzavřít dohodu s výrobcem, abychom tak zlepšili naši letectvo."
 INSHOL_purchase_american_tanks: "Zakoupit americké tanky"
 INSHOL_purchase_american_tanks_desc: "Zatímco Indies postrádají průmysl pro výrobu tanků, můžeme je přímo koupit od Spojených států, financováno průmyslem gumy v Indies."
 INSHOL_purchase_british_artillery: "Zakoupit britské dělostřelectvo"
 INSHOL_purchase_british_artillery_desc: "Můžeme outsourcovat výrobu dělostřelectva do Spojeného království, což nám umožní prioritizovat jinou výzbroj."
 INSHOL_produce_own_goods: "Vyrábět vlastní zboží"
 INSHOL_produce_own_goods_desc: "I když máme lukrativní obchodní dohody, nesmíme zapomínat na vlastní výrobní linky a vojenské průmyslové podniky. Měli bychom tyto podniky dotovat, abychom snížili závislost na zahraničních dovozech."
 INSHOL_east_indies_investments: "Investice do Východních Indies"
 INSHOL_east_indies_investments_desc: "Dobrý suzerén investuje do rozvoje svých kolonií. Investice do ekonomického rozvoje Indies jsou v našem nejlepším zájmu a prospěšné pro obyvatele kolonie."
 INSHOL_east_indies_student_exchange: "Program výměny studentů Indies"
 INSHOL_east_indies_student_exchange_desc: "Zřízení systému, kde Indonésané mohou studovat v Nizozemsku na našich univerzitách, může být významným přínosem pro ekonomiku Nizozemska i Indies."
 INSHOL_east_indies_fokker_division: "Zřídit oddělení Fokker pro Indies"
 INSHOL_east_indies_fokker_division_desc: "Fokker je licencován Leteckými silami Indies natolik, že stojí za zvážení vytvořit specializovanou pobočku prioritizující letectvo Indies."
 INSHOL_expand_shell: "Rozšířit infrastrukturu Shell"
 INSHOL_expand_shell_desc: "Shell se postupně stává větší součástí naší ekonomiky. Musíme rozšířit ropnou infrastrukturu v Indies, aby držela krok s exportní kapacitou Shellu."
 INSHOL_increase_funding_for_tix: "Zvýšit financování projektu T.IX"
 INSHOL_increase_funding_for_tix_desc: "Inženýři v Fokkeru vyvíjejí nový dvoumotorový bombardér k nahrazení zastaralých modelů používáných letectvem Indies. Projekt má velmi nízký rozpočet a dokončení potrvá dlouho. Zvýšením financí výrazně urychlíme pokrok."
 INSHOL_reduce_land_ownership_taxes: "Snížit daně z vlastnictví půdy"
 INSHOL_reduce_land_ownership_taxes_desc: "Měli bychom snížit daň u indonéských občanů, kteří vlastní půdu, aby to povzbudilo vznik farem a podniků."
 INSHOL_coffee_plantations: "Plantáže kávy"
 INSHOL_coffee_plantations_desc: "Měli bychom se zaměřit na získání více státně vlastněné půdy na východních ostrovech. Tuto půdu můžeme využít k budování kávových plantáží."
 INSHOL_overallwagen: "Overalwagen"
 INSHOL_overallwagen_desc: "Tanky nejsou nutně řešením pro armádu Východních Indies. Postrádáme průmyslovou sílu pro jejich výrobu a drsný terén je činí málo univerzálními. Můžeme investovat do výroby obrněných vozů pro Indonésii."
 INSHOL_indonesian_cheap_labor: "Levná indonéská pracovní síla"
 INSHOL_indonesian_cheap_labor_desc: "$CONGO_cheap_labor_desc$"
 INSHOL_eastern_development_fund: "Fond rozvoje východních ostrovů"
 INSHOL_eastern_development_fund_desc: "Příliš se zaměřujeme na investice do Jávy a Sumatry a ignorujeme většinu území kolonie. Musíme se zavázat k rozvoji infrastruktury na Východě, aby budoucí industrializace byla možná."
 INSHOL_increase_rubber_taxes: "Zvýšit daně z gumy"
 INSHOL_increase_rubber_taxes_desc: "Mnohé gumové společnosti v Indies získávají obrovské bohatství z prostředků kolonie. Je spravedlivé zatížit tyto provozy vysokou daní."
 INSHOL_reform_knil: "Reforma KNIL"
 INSHOL_reform_knil_desc: "Od doby, kdy Indies dokončily dobytí souostroví, zůstala Royální nizozemská armáda Východní Indie nehybná a značně podfinancovaná. S rostoucím napětím ve světě musíme zbrojit Indies raději dříve než později."
 INSHOL_fund_ml_knil: "Financovat ML-KNIL"
 INSHOL_fund_ml_knil_desc: "Pokud chceme držet krok s armádami světa, musíme vybudovat vlastní letectvo, jinak budeme ve značné nevýhodě."
 INSHOL_bandung_aircraft_facility_tt: "§YZápadní Jáva:§!\n    Přidá §G1§! stavební místo a §G1§! §YZávod na vojenskou výrobu§! za každé splněné předpokladové zaměření."
 INSHOL_rangers: "Hraničáři"
 INSHOL_rangers_desc: "Indie je rozsáhlé souostroví s rozmanitým prostředím. Měli bychom trénovat hraničáře přizpůsobené boji v těchto drsných podmínkách, aby byly připraveny je bránit."
 INSHOL_mountaineers: "Horští střelci"
 INSHOL_mountaineers_desc: "Měli bychom vycvičit horští jednotky připravené bojovat v nepříznivém terénu našeho souostroví."
 INSHOL_elevate_elite_infantry: "Depot Speciale Troepen"
 INSHOL_elevate_elite_infantry_desc: "Nemůžeme se na velké válečné strategie spoléhat věčně, musíme se adaptovat na nové technologie a zajistit, že neupadneme. Měli bychom zřídit několik elitních pěších divizí připravených bránit různé typy prostředí."
 INSHOL_modernize_knil: "Modernizovat KNIL"
 INSHOL_modernize_knil_desc: "Budeme studovat nové strategie a doktríny pro armádu Východních Indies, abychom si udrželi výhodu nad nepřítelem."
 INSHOL_transfer_of_henri_winkelman: "Přesun Henriho Winkelmana"
 INSHOL_transfer_of_henri_winkelman_desc: "Henri Winkelman sloužil v KNIL mnoho let. Je jasné, že je Indies znovu potřebuje, a měli bychom zajistit jeho formální přeložení do Východních Indies."
 INSHOL_eastern_conscription: "Povýšit pomocné sbory"
 INSHOL_eastern_conscription_desc: "Existuje několik domorodých pomocných sborů na Javě a Maduře, které řídí místní panovníci. V těchto tíživých časech bychom mohli vyjednat dohodu, podle níž budou tyto divize pod naší autoritou."
 INSHOL_establish_vk_knil: "Zřídit VK-KNIL"
 INSHOL_establish_vk_knil_desc: "Založíme Dobrovolnický ženský sbor pro KNIL. Jejich přínos výrazně zlepší logistiku a komunikace."
 INSHOL_emergency_dockyard_construction: "Nouzová stavba loděnic"
 INSHOL_emergency_dockyard_construction_desc: "Hrozba námořní invaze je značná, musíme dát námořní obraně nejvyšší prioritu."
 INSHOL_emergency_powers_gov_general: "Nouzové pravomoci pro generálního guvernéra"
 INSHOL_emergency_powers_gov_general_desc: "Probíhající válka vyžaduje tvrdá rozhodnutí bez prodlení, což není možné, když všechna rozhodnutí v Indies musí projít Nizozemskem. Měli bychom udělit nouzové pravomoci [INS.GetLeader], aby mohl jednat bez zdržení."
 INSHOL_emergency_naval_purchases: "Nouzové nákupy námořnictva"
 INSHOL_emergency_naval_purchases_desc: "Naše pobřeží nejsou bezpečná a nejsme dostatečně bráněni. Čas je klíčový, musíme získat silnější námořnictvo, nebo zanikneme. Koupíme lodě od soukromých společností na dluh a přestavíme je na torpédoborce."
 INS_netherlands_can_remove_autonomy_tt_50: "\nPokud [HOL.GetFlag]§Y[HOL.GetNameDefCap]§! dokončí toto zaměření jako první:\n    ([INS.GetFlag]§Y[INS.GetName]§!): Přidat §Y£autonomy_texticon -50.00§!"
 INS_netherlands_can_remove_autonomy_tt_75: "\nPokud [HOL.GetFlag]§Y[HOL.GetNameDefCap]§! dokončí toto zaměření jako první:\n    ([INS.GetFlag]§Y[INS.GetName]§!): Přidat §Y£autonomy_texticon -75.00§!"
 INS_netherlands_can_remove_autonomy_tt_100: "\nPokud [HOL.GetFlag]§Y[HOL.GetNameDefCap]§! dokončí toto zaměření jako první:\n    ([INS.GetFlag]§Y[INS.GetName]§!): Přidat §Y£autonomy_texticon -100.00§!"
 INS_netherlands_can_remove_autonomy_tt_150: "\nPokud [HOL.GetFlag]§Y[HOL.GetNameDefCap]§! dokončí toto zaměření jako první:\n    ([INS.GetFlag]§Y[INS.GetName]§!): Přidat §Y£autonomy_texticon -150.00§!"
 INS_netherlands_can_remove_autonomy_tt_200: "\nPokud [HOL.GetFlag]§Y[HOL.GetNameDefCap]§! dokončí toto zaměření jako první:\n    ([INS.GetFlag]§Y[INS.GetName]§!): Přidat §Y£autonomy_texticon -200.00§!"
 INS_netherlands_can_remove_autonomy_tt_250: "\nPokud [HOL.GetFlag]§Y[HOL.GetNameDefCap]§! dokončí toto zaměření jako první:\n    ([INS.GetFlag]§Y[INS.GetName]§!): Přidat §Y£autonomy_texticon -250.00§!"
 INSHOL_begin_negotiations_soetardjo: "Zahájit jednání se Soetardjem"
 INSHOL_begin_negotiations_soetardjo_desc: "Soetardjova petice za autonomii je nadějná a nabízí prostor ke kompromisu mezi nacionalisty a loajalisty. Měli bychom zahájit oficiální jednání s jeho stranou."
 INSHOL_urge_gov_veto: "Nabádat guvernéra k vetu"
 INSHOL_urge_gov_veto_desc: "Soetardjova petice je nacionalistický kousek, do kterého se vláda Indies chystá skočit. Musíme nabádat generálního guvernéra, aby petici okamžitě vetoval, jinak riskujeme ztrátu kolonie."
 INSHOL_eventual_autonomy: "Souhlasit s budoucí autonomií"
 INSHOL_eventual_autonomy_desc: "Indonéská touha po nezávislosti je silná a nezpomalila. Souhlasíme s budoucí autonomií Indies, ale pouze až kolonie prokáže, že se dokáže uživit sama a nadále bude ctít demokratické hodnoty."
 INSHOL_autonomous_dominion: "Soetardjův akt z roku [GetYear]"
 INSHOL_autonomous_dominion_desc: "Navzdory přísným podmínkám „sebeobstaratelnosti“, které stanovily Nizozemsko pro platnost Soetardjovy petice, je indonéská touha po nezávislosti tak silná, že jsme tyto požadavky splnili. Podle dohody vyhlásíme úplnou a bezpodmínečnou nezávislost na nizozemské koruně."
 INS_cannot_become_independent_tt: "§W§Y[INS.GetFlag][INS.GetNameDefCap]§! bude §Rnatrvalo zablokován stát se nezávislým§! bez zahraniční intervence.§!"
 INSHOL_sideline_the_volksraad: "Postrčit Volksraad stranou"
 INSHOL_sideline_the_volksraad_desc: "Petice vyhlášená Soetardjem jasně porušuje článek 1 nizozemské ústavy a bude jen působit potíže správě Indies. Petice musí být vetována."
 INSHOL_prioritize_dutch_profits: "Dávat přednost nizozemským ziskům"
 INSHOL_prioritize_dutch_profits_desc: "Soustředíme se na zvyšování zisků pro domovinu. Jejich ekonomická stabilita je v zájmu celého království."
 INSHOL_development_loans_netherlands: "Rozvojové půjčky z Nizozemska"
 INSHOL_development_loans_netherlands_desc: "Můžeme si vzít půjčky od nizozemských společností, abychom urychlili industrializaci. Využijeme naše postavení rozvojové kolonie k zajištění nízkých úroků, ale úroky platit budeme muset."
 INSHOL_request_economic_dev_subsidy: "Žádat o dotace na ekonomický rozvoj"
 INSHOL_request_economic_dev_subsidy_desc: "Prokázali jsme svou hodnotu jako zisková kolonie. Můžeme toho využít jako páku k získání dotací na průmyslový rozvoj."
 INSHOL_loyalty_to_crown: "Věrnost koruně"
 INSHOL_loyalty_to_crown_desc: "Východní Indie je mnoho věcí, ale především věrnou nizozemskou kolonií. Královna Wilhelmina nás povede k vítězství. Nesmíme dovolit, aby nacionalismus ukončil téměř 500 let historie, a budeme nadále potvrzovat naši absolutní věrnost koruně."
 INS_loans_timer: "\nZa §Y365§! dní:"
 INS_expand_batavia_med_school_tt: "§Y$INS_dutch_east_indies$§!: Modifikátor rychlosti výzkumu je alespoň §G1.00%§!."
 INS_subsidize_local_business: "Dotovat místní podniky"
 INS_subsidize_local_business_desc: "Měli bychom dávat dotace místním podnikům, aby se stimuloval ekonomický růst a dlouhodobě posílila ekonomika."
 INSHOL_education_reforms: "Školské reformy"
 INSHOL_education_reforms_desc: "Mnoho obyvatel Východních Indies nemá přístup ke vzdělání a jen málo dokončí střední školu. Pokud chceme, aby se Indies staly bohatým industrializovaným státem, musíme zajistit, že vzdělání bude dostupné."
 INS_expand_batavia_med_school: "Rozšířit Batavskou lékařskou školu"
 INS_expand_batavia_med_school_desc: "Rozšíření školy vybudováním nových kampusů a najmutím více profesorů zpřístupní vyšší vzdělání, což je zásadní pro dlouhodobý ekonomický růst."
 INS_prepare_for_policy_shift: "Připravit změnu politiky"
 INS_prepare_for_policy_shift_desc: "Politická krajina Indies byla ovlivněna národním probuzením posledních desetiletí a naše současné politiky jsou zastaralé. Měli bychom zvážit změny v našem vládním uspořádání."
 INS_reallocate_rubber_industry_funding: "Přesměrovat financování gumového průmyslu"
 INS_reallocate_rubber_industry_funding_desc: "Naše závislost na prodeji gumy poškodila ekonomiku. Měli bychom diverzifikovat ekonomiku průzkumem zdrojů a otevíráním dolů a továren po celém souostroví. To nebude levné, proto musíme snížit rozpočet na udržování gumových plantáží."
 INS_reallocate_rubber_industry_funding_tt: "Odemkne rozhodnutí §Yodebrat gumu ze státu§! a nahradit ji menšími množstvími §Yjiných zdrojů§!."
 INSHOL_nationalist_coallition: "Nacionalistická koalice"
 INSHOL_nationalist_coallition_desc: "Volksraad příliš dlouho mluvil tichým hlasem. Čas petic a trpělivého odkládání je pryč. Koalice nacionalistických členů sněmovny odloží spory stranou a bude žádat bezpodmínečnou nezávislost. Starší hlasy zvenčí sněmovny, které Nizozemci považovali za bezpečně postrčené stranou, budou opět přivítány."
 INSHOL_volksraad_compromises: "Kompromisy ve Volksraadu"
 INSHOL_volksraad_compromises_desc: "Reforma uvnitř sněmovny nás dovedla až sem a není důvod cestu opouštět. Volksraad bude pokračovat v pečlivé práci, obchodovat ústupky s Háagou a usilovat o samosprávu trpělivostí místo rozbití. Budoucnost v nizozemském společenství nabízí víc než boj o samostatnost."
 INSHOL_establish_the_princely_council: "Zřídit knížecí radu"
 INSHOL_establish_the_princely_council_desc: "Sultáni a rádžové souostroví mají loajalitu, kterou sněmovna v Batavii nikdy neměla. Jejich dvory jsou starší než Kompanie i republiky, které jí nahradily. Formální rada knížecích domů dá těmto vládcům místo u stolu nové země a připoutá jejich autoritu k té naší."
 INSHOL_nationalize_dutch_companies: "Známět nizozemské společnosti"
 INSHOL_nationalize_dutch_companies_desc: "Velké obchodní domy, lodní linky, plantážní společnosti a banky nosily nizozemská jména tak dlouho, že si to nikdo nedokáže představit jinak. Od teď budou nést indonéská jména. Představenstva budou vyměněna, nápisy sejmuty a kapitál vyváděný z těchto ostrovů po tři století konečně zůstane ostrovům."
 INSHOL_democracy: "Demokratická Indonésie"
 INSHOL_democracy_desc: "Volksraad začal jako poradní orgán s omezenými pravomocemi, určený k vytvoření iluze zastoupení bez skutečné moci. Přerostl své tvůrce. Sněmovna bude přetvořena v pravý zákonodárný orgán, jehož členové budou voleni lidem, kterého zastupují, a jeho rozhodnutí budou závazná pro vládu, která je kdysi svazovala."
 INSHOL_princely_authority: "Autorita knížat"
 INSHOL_princely_authority_desc: "Rada rádců má své místo, ale sultáni, kteří přispěli k založení této země, mohou nabídnout víc než jméno. Parlament nebude překážet těm, kdo by chtěli, aby byl jeden z nich vyvýšen nad ostatní. Staré dvory dlouho čekaly, až se jim tato otázka znovu položí."
 INSHOL_encourage_further_investment: "Podpořit další investice"
 INSHOL_encourage_further_investment_desc: "Podmínky dojednané ve Volksraadu uklidnily politickou otázku a nizozemský kapitál si toho všiml. Cla budou zmírněna, záruky rozšířeny a obchodní komory v Amsterdamu a Rotterdamu ujištěny, že souostroví zůstává otevřené pro podnikání. To, co bylo ziskové dříve, bude ziskové i nyní."
 INSHOL_east_indies_artillery: "Výroba dělostřelectva ve Východních Indies"
 INSHOL_east_indies_artillery_desc: "Zřízení výrobních zařízení pro dělostřelectvo na Javě nám umožní méně se spoléhat na zahraniční obchod při vojenské výrobě."
 INSHOL_recall_gerardus_johannes_berenschot: "Povýkat generála Berenschota"
 INSHOL_recall_gerardus_johannes_berenschot_desc: "Gerardus Johannes Berenschot je jeden z největších talentů mezi generály Commonwealthu. Většinu kariéry strávil v Indies, ale několik let i v Nizozemsku. V těchto tíživých časech ho musíme povolat zpět do Indies, aby pomohl válečnému úsilí."
 INSHOL_east_indies_cruiser_manufacturing: "Výroba křižníků ve Východních Indies"
 INSHOL_east_indies_cruiser_manufacturing_desc: "Vlastní výroba křižníků místo objednávání v Nizozemsku je prvním krokem k vytvoření skutečného námořnictva, což je nezbytné vzhledem k japonské hrozbě."
 INSHOL_transfer_of_conrad_helfrich: "Přesun Conrada Helfricha do Indies"
 INSHOL_transfer_of_conrad_helfrich_desc: "Přesun admirála Conrada Helfricha do Indies by výrazně zlepšil námořní úsilí v Indies."
 INSHOL_naval_program: "Nizozemsko-indonéský námořní program"
 INSHOL_naval_program_desc: "[INS.GetNameDefCap] postrádá oficiální námořnictvo, což nás staví do role obránců jejich pobřeží. S rostoucím napětím v Evropě a Asii to takto nemůže pokračovat. Musíme podniknout první krok k založení věnovaného [INS.GetAdjective] námořnictva, i když to bude stát značně."
 INSHOL_naval_program_transfer_25_tt: "Převést §Y25%§! našich námořních sil na [INS.GetNameDef]."
 INSHOL_naval_program_transfer_25_2_tt: "§Y[HOL.GetFlag] [HOL.GetNameDefCap]§! převede §Y25%§! svých námořních sil na §Y[INS.GetNameDefCap]§!."
 INSHOL_naval_program_transfer_100_tt: "Převést §Rcelé naše námořnictvo§! na [INS.GetNameDef]."
 INSHOL_naval_program_transfer_100_2_tt: "§Y[HOL.GetFlag] [HOL.GetNameDefCap]§! převede své celé námořnictvo na §Y[INS.GetNameDefCap]§!."
 INSHOL_naval_program_rejected_tt: "Odemkne národní zaměření §Y$INSHOL_naval_secondchance$§!."
 INSHOL_hybrid_navy: "Hybridní námořnictvo"
 INSHOL_hybrid_navy_desc: "Naše námořnictvo se nemůže spoléhat jen na převzetí tichomořské flotily [HOL.GetNameDef]; musíme začít vyrábět vlastní lodě, nebo jedna chyba může zastavit celý námořní přísun."
 INSHOL_request_naval_control: "Eskadra Východních Indies"
 INSHOL_request_naval_control_desc: "[HOL.GetNameDefCap] padlo a není schopno provozovat celé námořnictvo. Měli bychom převzít kontrolu nad ním pro zbytek války."
 INSHOL_naval_secondchance: "Schéma námořnictva Východních Indies"
 INSHOL_naval_secondchance_desc: "I když [HOL.GetNameDef] odmítli podepsat předání kontroly nad námořnictvem, musíme přesto bránit Tichomoří, pokud nechceme být přemoženi. I když to nemusí dopadnout tak dobře jako náš původní návrh, najdeme přijatelné řešení."
 INSHOL_netherlands_in_exile: "Nizozemsko v exilu"
 INSHOL_netherlands_in_exile_desc: "Tragický pád našeho království je realitou. Nemůžeme podlehnout fatalismu. Musíme přijmout, co se stalo, a soustředit se na to, co lze zachránit."
 INSHOL_relocate_our_generals: "Přesunout naši armádu na Javu"
 INSHOL_relocate_our_generals_desc: "Zbývající vyhnaní generálové, velitelé a vojáci se musí s maximální prioritou přemístit na [1058.GetName], než bude pozdě."
 INSHOL_netherlands_indonesia_union: "Nizozemsko-indonéská unie"
 INSHOL_netherlands_indonesia_union_desc: "Koncepce rovnoprávného unijního státu mezi [HOL.GetNameDef] a [INS.GetNameDef] se mnohým zdá směšná, ale za krize, v níž se nacházíme, vypadá jako jedinný způsob, jak maximalizovat šanci udržet si suverenitu."
 INS_underground_revolution: "Podzemní revoluce"
 INS_underground_revolution_desc: "Začneme plánovat revoluci ve stínech, pomalu zvyšovat členství a aktivitu milicí, dokud nebudeme připraveni udeřit."
 INS_infiltrate_the_media: "Infiltrovat média"
 INS_infiltrate_the_media_desc: "Náš hnutí získalo členství několika vysoce postavených lidí z mediálních organizací v Indies. Můžeme toho využít k nenápadnému vnášení prorevolučních nálad do myslí občanů."
 INS_infiltrate_the_army: "Infiltrovat armádu"
 INS_infiltrate_the_army_desc: "Mnoho našich členů slouží v KNIL, od nízkých hodností až po majory. Měli bychom získat co nejvíce tajných informací a prosazovat naše lidi na vysoké posty. Jakmile stiskneme spoušť, způsobíme v KNIL chaos."
 INS_privately_owned_military_industry: "Soukromý vojenský průmysl"
 INS_privately_owned_military_industry_desc: "Zřídíme několik tajných korporací v sektoru vojenského průmyslu, abychom si udrželi kontrolu nad vojenským průmyslem po začátku revoluce."
 INS_instigate_chaos_sulawesi: "Podnítit chaos na Sulawesi"
 INS_instigate_chaos_sulawesi_desc: "Budeme spolupracovat s místními nacionalisty na Sulawesi, organizovat stávky, nepokoje a radikalizovat obyvatelstvo."
 INS_instigate_chaos_sulawesi_tt: "Po vyhlášení nezávislosti získáme §Gdomovské území§! na §Y[673.GetName]§! a §Y[1056.GetName]§!. Nadále zůstanou nekore od Nizozemské východní Indie."
 INS_instigate_chaos_medan: "Podnítit chaos v Medanu"
 INS_instigate_chaos_medan_desc: "Budeme spolupracovat s místními nacionalisty v Medanu a Riouw, organizovat stávky, nepokoje a radikalizovat obyvatelstvo."
 INS_instigate_chaos_medan_tt: "Po vyhlášení nezávislosti získáme §Gdomovské území§! na §Y[1049.GetName]§!. Nadále zůstane nekore Nizozemské východní Indie."
 INS_embezzlement_scheme_in_batavia: "Podvod s vyváděním v Batavii"
 INS_embezzlement_scheme_in_batavia_desc: "Zřídíme schéma přesunu naší výroby z Batavie na republikánské území po vyhlášení nezávislosti."
 INS_embezzlement_scheme_in_batavia_tt: "Po vyhlášení nezávislosti bude polovina všech továren v §Y[1058.GetName]§! přemístěna do našeho §YRevolučního hlavního stanu§!."
 INS_volksraad_rumors: "Pověsti ve Volksraadu"
 INS_volksraad_rumors_desc: "Diskrétně začneme diskutovat o revoluci ve Volksraadu. Pokud uspějeme, můžeme přesvědčit indonéské členy Volksraadu, aby se připojili k naší věci."
 INS_volksraad_rumors_tt: "Všichni §Yindonésští§! poradci Volksraadu budou §Guchováni§! po vyhlášení nezávislosti."
 INS_railway_youth_force: "Spolupracovat s Railway Youth Force"
 INS_railway_youth_force_desc: "Railway Youth Force je islámská mládežnická milice aktivní hlavně v Centrální Javě, pojmenovaná podle strategie obsazování železnic. Byli by cenným spojencem, ale jsou energičtí a chtějí bojovat. Pokud budeme dlouho v příměří, budou nespokojení s vládou."
 INS_sleeper_informant_network: "[GetInformantNetworkName]"
 INS_Sleeper_Informant_Network_name: "Síť spících informátorů"
 INS_KNIL_Informant_Network_name: "Síť informátorů KNIL"
 INS_sleeper_informant_network_desc: "Vytvoříme síť informátorů vloženou do administrativního aparátu KNIL, která nám poskytne předstih o nepřátelských plánech."
 INS_sleeper_informant_network_tt: "§RKdyž je vyhlášena nezávislost:§!\n"
 INS_the_peoples_security_army: "Lidová bezpečnostní armáda"
 INS_the_peoples_security_army_desc: "Naši členové, převážně mladí Indonésané, netrpělivě touží přispět a bojovat za naši nezávislost. Měli bychom zřídit Revoluční ozbrojené síly a začít cvičit budoucí vojáky."
 INS_commander_sudirman: "Sudirmanova armáda"
 INS_commander_sudirman_desc: "Sudirman, přestože je mladý a ambiciózní, ukázal velký potenciál a je velmi populární mezi mladými členy odboje. Měl by vést Lidovou bezpečnostní armádu k vítězství."
 INS_commander_oerip: "Oeripova armáda"
 INS_commander_oerip_desc: "Oerip sloužil v armádě dekády a je jediným Indonésanem, který kdy byl povýšen na majora v KNIL. Jeho znalosti a zkušenosti daleko převyšují ostatní. Měl by vést Lidovou bezpečnostní armádu k vítězství."
 INS_sudirmans_promotion: "Sudirmanovo povýšení"
 INS_sudirmans_promotion_desc: "Sudirman projevil skvělé vůdcovské schopnosti a zorganizoval několik úspěšných útoků. Je čas uznat jeho úsilí a udělit mu titul generála, který si zaslouží."
 INS_tkr_steal_general: "Nábory generálů KNIL"
 INS_tkr_steal_general_desc: "Pokud dokážeme přesvědčit vysoké důstojníky armády Východních Indies, aby se přidali k nám, zároveň zlepšíme vlastní armádu a oslabíme jejich."
 INS_tkr_supply: "Každý revolucionář musí bojovat"
 INS_tkr_supply_desc: "Zajistíme, aby každý člen hnutí prošel formálním vojenským výcvikem, bez výjimek."
 INS_tkr_professional_army: "Profesionální armáda"
 INS_tkr_professional_army_desc: "Nesmíme spoléhat jen na milice, musíme vybudovat profesionální republikánskou armádu k udržení pořádku."
 INS_arm_the_revolutionaries: "Ozbrojit revolucionáře"
 INS_arm_the_revolutionaries_desc: "Začneme u revolutionářů a nacionalistů, kteří jsou plní energie a připraveni obětovat vše pro Indonésii. Poskytneme jim výcvik a vybavení, aby mohli bojovat za svou zemi."
 INS_arm_the_youth: "Ozbrojit mládež"
 INS_arm_the_youth_desc: "Mládež je plná energie a naděje, budou nést plamen revoluce dál. Zajistíme, aby co nejvíce mladých Indonésanů bylo vycvičeno a vybaveno. Pokud boj přijde k nim domů, budou připraveni zasáhnout."
 INS_arm_the_students: "Ozbrojit studenty"
 INS_arm_the_students_desc: "Studenti položili základy revoluce po desetiletí a budou ji i nadále vést."
 INS_guerilla_industry: "Partyzánský průmysl"
 INS_guerilla_industry_desc: "Využijeme naše partyzánské síly po souostroví k obsazování továren, což nám umožní vyrábět zbraně pro naše milice."
 INS_indonesian_assault_doctrine: "Indonéská útočná doktrína"
 INS_indonesian_assault_doctrine_desc: "Válka není jen o počtu vojáků. Milion mužů nic nezmůže bez zbraní. Musíme upřednostnit kvalitní dělostřelectvo, abychom se mohli zatlačit hlouběji do nepřátelského území."
 INS_tighter_tkr_integration: "Těsnější integrace TKR-Laskar"
 INS_tighter_tkr_integration_desc: "Lidová bezpečnostní armáda a různé milice neoperují jednotně a koordinace je omezená. To bude způsobovat stále větší problémy během války, musíme proplést ozbrojené síly a milice do jedné organizace, navzdory protestům velitelských milic."
 INS_quality_over_quantity: "Kvalita před kvantitou"
 INS_quality_over_quantity_desc: "Jeden dobře vycvičený voják s promyšlenou strategií a moderním vybavením porazí pět studentů s pistolkami. Musíme upřednostnit kvalitní, dobře vyzbrojené jednotky a speciální síly před mobilizací co největšího počtu vojáků."
 INS_add_militia_cap_1_tt: "Kapacita divizí §YBojovníků za svobodu§! se zvýší o §Y1§!.\n"
 INS_add_militia_cap_2_tt: "Kapacita divizí §YBojovníků za svobodu§! se zvýší o §Y2§!.\n"
 INS_add_militia_cap_3_tt: "Kapacita divizí §YBojovníků za svobodu§! se zvýší o §Y3§!.\n"
 INS_add_3_militia_unit_tt: "Vytvoří tři jednotky §YBojovníků za svobodu§!, které lze použít v §Ynájezdech§! ke zvýšení §Gpřítomnosti milicí§! v nizozemských státech."
 INS_add_fully_trained_militia_unit_tt: "Vytvoří jednu vycvičenou jednotku §YBojovníků za svobodu§!.\n"
 INS_expand_resistance_membership: "Rozšířit členství v odboji"
 INS_expand_resistance_membership_desc: "Soustředit celé hnutí na jedno základnu zaručuje selhání. Naverbujeme členy do skupin milicí jako poslové, které zvýší naši popularitu a kontrolu v různých regionech."
 INS_deploy_the_kris: "Indonéská lidová služba Sulawesi"
 INS_deploy_the_kris_desc: "Indonéská lidová služba Sulawesi, známá jako KRIS, je aktivní skupina milic tvořící většinu přítomnosti milicí na Sulawesi a v Manadu. Měli bychom je naverbovat, aby formálně bojovali po boku TKR."
 INS_assist_the_pemuda: "Pomoci Pemuda"
 INS_assist_the_pemuda_desc: "Java je plná různých studentských milic Pemuda. Spojením sil s nimi a poskytnutím vojenské pomoci při jejich akcích proti Nizozemcům si můžeme zajistit užitečného spojence."
 INS_mobilize_the_pemuda: "Mobilizovat Pemuda"
 INS_mobilize_the_pemuda_desc: "Nyní, když jsme získali důvěru největších skupin Pemuda, měli bychom začít plány na jejich mobilizaci v rámci TKR."
 INS_organize_jakarta_pemuda: "Organizovat pemuda v Jakartě"
 INS_organize_jakarta_pemuda_desc: "Na Javě existuje mnoho skupin Pemuda všech velikostí. I když jsme většinu mobilizovali a naverbovali, desítky malých skupin v Jakartě stále jednají nezávisle. Musíme je kontaktovat a navázat spolupráci."
 INS_recognize_moestopos_batallion: "Uznat Moestopův prapor"
 INS_recognize_moestopos_batallion_desc: "Revolucionář Moestopo se prohlásil za dočasného 'ministra obrany' v Surabayi a drží kontrolu nad milicemi v Surabayi. Jeho úsilí si zaslouží formální uznání, měli bychom ho povýšit na generálmajora TKR."
 INS_darul_islam_focus: "Darul Islam"
 INS_darul_islam_focus_desc: "Kartosoewirjovy hizbullah prokázali svou hodnotu v kopcích Západní Javy a nemůžeme si dovolit nechat takové bojovníky mimo naše řady. Nechť jeho irregularové stojí mezi námi a on si ponese hodnost, kterou získal. Věrní brzy v republice prosadí své zájmy."
 INS_just_a_fisherman: "Pouze rybář"
 INS_just_a_fisherman_desc: "Vést válku v souostroví bez námořnictva je těžké a neudržitelné. Zkusíme možná naivní strategii, kdy pošleme milice na rybářských člunech převlečené za rybáře do nizozemských přístavů."
 INS_a_cheap_navy: "Levné námořnictvo"
 INS_a_cheap_navy_desc: "Nemáme čas ani peníze na vybudování velkého moderního námořnictva. Musíme využít, co najdeme, a dát dohromady cokoliv možné."
 INS_divert_army_funds_to_navy: "Přesměrovat armádní fondy na námořnictvo"
 INS_divert_army_funds_to_navy_desc: "Indonésie je souostroví; naše pěchota je bez lodí k transportu bezcenná. Je rozumná oběť přesměrovat financování z TKR na naše nové námořnictvo."
 INS_indonesian_naval_doctrine: "Indonéská námořní doktrína"
 INS_indonesian_naval_doctrine_desc: "Nyní, když budujeme vlastní námořnictvo, je důležité zvolit doktrínu, podle které budeme bojovat a cvičit. Měli bychom co nejdříve vytvořit a přijmout námořní doktrínu."
 INS_domestic_shipbuilding: "Domácí stavba lodí"
 INS_domestic_shipbuilding_desc: "Nemůžeme se spoléhat na ukořistené a koupené lodě věčně; brzy už žádné nizozemské lodě nezůstanu k obsazení. Měli bychom co nejdříve začít stavět vlastní lodě."
 INS_acquire_modern_blueprints: "Získat moderní plány"
 INS_acquire_modern_blueprints_desc: "Koupíme plány od jiných zemí a soukromých korporací, které použijeme k výstavbě nového námořnictva."
 INS_reclaiming_the_dutch_navy: "Reklamace nizozemského indonéského námořnictva"
 INS_reclaiming_the_dutch_navy_desc: "Nizozemci opustili mnoho lodí v přístavech, které nyní okupujeme. Měli bychom tyto lodě nárokovat, dokud můžeme."
 INS_admiral_mas_pardi: "Admirál Mas Pardi"
 INS_admiral_mas_pardi_desc: "Každé dobré námořnictvo potřebuje admirála. Mas Pardi je zřejmou volbou."
 INS_akademi_angkatan_laut: "Postavit Akademi Angkatan Laut"
 INS_akademi_angkatan_laut_desc: "Vybudujeme námořní akademii s výzkumnými zařízeními a vzděláme více občanů jako inženýry a admirály."
 INS_pki_militia_tt: "Tan Malaka má velmi mocnou milici, nicméně bojují nejen za indonéskou vůli, ale i za §Rkomunismus§! a Sověty. §RA nakonec budou násilně odporovat každé nekomunistické vládě.§!"
 INS_increase_laskar_funding_tt: "§WDostat§! 1§Y vojenskou továrnu§! za každý úspěšně uspokojený požadavek milice (maximálně §G6§!)"
 INS_subsidize_laskar_armament: "Dotovat výzbroj Laskar"
 INS_subsidize_laskar_armament_desc: "Milice bojující se bambusovými kopími dlouho nepřežijí proti těžce vyzbrojeným jednotkám. Musíme prioritizovat výrobu více zbraní a munice pro tyto milice."
 INS_loot_knil_weapons_caches: "Vykrást sklady zbraní KNIL"
 INS_loot_knil_weapons_caches_desc: "Existuje mnoho zbrojních skladů, které KNIL ukryl před revolucí. Mnoho našich členů byli bývalí členové KNIL a můžeme tyto sklady najít a vykrást."
 INS_utilize_tan_malakas_militia: "Využít milice Tan Malaky"
 INS_utilize_tan_malakas_militia_desc: "Červená milice Tan Malaky je možná nejsilnější jednotlivou milicí v celé Indonésii a bylo by velkým přínosem je mobilizovat v TKR. To však nese rizika — dát mocné milici s výraznými politickými motivy tolik vlivu zjednoduší jejich cestu k uchopení moci."
 INS_increase_laskar_funding: "Zvýšit financování Laskar"
 INS_increase_laskar_funding_desc: "Naše milice tvoří většinu našich sil. Musíme to uznat a financovat je odpovídajícím způsobem, i když nejsou zcela loajální k [INS.GetLeader]."
 INS_develop_a_functioning_airforce: "Vybudovat fungující letectvo"
 INS_develop_a_functioning_airforce_desc: "Vliv letectva na armádu je velký; měli bychom mu dát prioritu."
 INS_political_stabilization: "Obnovit pořádek"
 INS_political_stabilization_desc: "Náš stát se každý den stává více nestabilním. Pokud nezasáhneme brzy, občanská válka je nevyhnutelná. Musíme zahájit vyjednávání mezi Národním výborem, prezidentem a vůdci milicí, aby se našlo řešení."
 INS_vice_presidential_edict: "Podepsat viceprezidentský dekret X"
 INS_vice_presidential_edict_desc: "Národní výbor téměř jednomyslně požaduje skutečnou zákonodárnou moc. Podána byla petice prezidentovi navrhující hybridní systém, kde se Národní výbor stane nezávislým parlamentem se sdílenou zákonodárnou pravomocí s prezidentem. Nabídka je lákavá, ale hrozí, že prezidentská moc se stane marginální."
 INS_local_cooperatives: "Zřídit místní družstva"
 INS_local_cooperatives_desc: "Neměli bychom vytvořit kapitalistický systém jako na Západě, ale nemůžeme ignorovat ekonomický přínos privatizace. Umožníme vznik místních družstev; jejich úspěch přinese bohatství jejich majitelům. Budou však pod dohledem vlády a nebude jim dovoleno expandovat mimo své lokality."
 INS_local_unity: "Částečná knížecí autonomie"
 INS_local_unity_desc: "Udělení částečné autonomie knížecím státům je dočasným opatřením ke snížení vnitřních sporů v těchto hektických časech."
 INS_education_subsidies: "Dotace do školství"
 INS_education_subsidies_desc: "Investice do budoucnosti mladých je nezbytná pro ekonomický úspěch státu. Postavíme dostupné školy po celé republice."
 INS_land_reform: "Pozemková reforma"
 INS_land_reform_desc: "Nizozemsko vlastnilo velké plochy půdy před vyhlášením nezávislosti. Měli bychom tuto půdu rozdat Indonésanům, kteří ji zužitkují, za nízké ceny, abychom podpořili ekonomický růst."
 INS_dominion_of_atjeh: "Dominion Atjeh"
 INS_dominion_of_atjeh_desc: "Separatistické hnutí v Atjehu je velké a roste. Není důvod eskalovat; měli bychom vyjednat kompromis, ve kterém zůstanou součástí Indonésie, ale s vysokou mírou autonomie."
 INS_dissolve_national_party: "Rozpustit Národní stranu"
 INS_dissolve_national_party_desc: "Hybridní systém vznikl jako nezbytný kompromis, aby se předešlo chaosu. Neměli bychom dovolit prezidentovi držet takovou moc nedemokraticky. Prezident musí být parlamentem sesazen, jinak demokracie nenastane."
 INS_womens_sufferage: "Voličské právo žen"
 INS_womens_sufferage_desc: "Rozšíření volebního práva žen povede krátkodobě k nestabilitě, ale je nezbytné pro dlouhodobou stabilitu a demokracii."
 INS_women_in_military: "Ženy v armádě"
 INS_women_in_military_desc: "Povolit ženám sloužit v armádě je nutné, aby naše ozbrojené síly byly co nejsilnější."
 INS_fair_election: "Spravedlivé volby"
 INS_fair_election_desc: "Po sesazení prezidenta a konci revoluce můžeme uskutečnit první skutečně spravedlivé volby bez autoritářského vlivu."
 INS_continue_hybrid_politics: "Pokračovat v hybridní politice"
 INS_continue_hybrid_politics_desc: "Hybridní politika je nutné zlo. Cílem je sice pravá demokracie, ale Indonésie je stále příliš mladá a nestabilní, aby se veškerá moc předala lidu. Prezident a parlament budou vzájemně vyvažovat moc, aby žádné těleso nepřevládlo."
 INS_guided_economy: "Řízená ekonomika"
 INS_guided_economy_desc: "Budeme řídit indonéskou ekonomiku přímo, abychom udrželi kontrolu. Známětíme všechny banky i ropný a zemědělský sektor."
 INS_reform_education_system: "Povinné ideologické vzdělávání"
 INS_reform_education_system_desc: "Revoluce dokázala, že studenti a mládež nespokojení se společenským řádem vždy vedou povstání. Pro bezpečí vlády a národa nařídíme, aby školy vyučovaly dle ideologie vlády."
 INS_reform_education_system_2: "Školská reforma"
 INS_reform_education_system_2_desc: "Chceme-li, aby Indonésie byla bohatým státem budoucnosti, musí mít všichni Indonésané, bez ohledu na původ, nárok na vzdělání."
 INS_three_year_plan: "Tříletý plán"
 INS_three_year_plan_desc: "Můžeme zavést tříletý plán na budování infrastruktury po celém souostroví a propojení ostrovů."
 INS_destroy_pacific_colonialism: "Zničit pacifický kolonialismus"
 INS_destroy_pacific_colonialism_desc: "Revoluce skončila, ale boje pokračují. Mnoho lidí žije pod koloniálním útlakem v našem okolí. Nemůžeme jen přihlížet, musíme je osvobodit od jejich suzerénů!"
 INS_rapid_mobilization: "Rychlá mobilizace"
 INS_rapid_mobilization_desc: "Každý silný národ má silnou armádu. Chceme-li se stát regionální mocností, musíme nejprve posílit naši armádu."
 INS_greater_indonesia: "Prohlásit Velkou Indonésii"
 INS_greater_indonesia_desc: "Starobylé Nusantarské impérium jednou sjednotilo malajský svět. Když jsme osvobodili Malajské oblasti od koloniální tyranie, měli bychom, jako naši předkové, vyhlásit jednotu malajského světa jako jeden národ."
 INS_secularism: "Sekularismus"
 INS_secularism_desc: "Indonésie je domovem mnoha náboženství. Mísení náboženství a politiky způsobí jen vnitřní konflikty, proto bychom měli zakázat náboženské politické strany."
 INS_integrate_sarekat_islam: "Integrovat Sarekat Islam"
 INS_integrate_sarekat_islam_desc: "Velké islámské politické strany mají značnou podporu. Je v našem nejlepším zájmu integrovat je do vlády."
 INS_sjahrirs_continued_tenure: "Prodloužení mandátu Sjahrira"
 INS_sjahrirs_continued_tenure_desc: "Premiér Sjahrir se ukázal jako skvělý vůdce, vedl nás revolucí, zlepšil ekonomiku a založil demokracii. Měli bychom ho znovu zvolit premiérem."
 INS_unity_in_diversity: "Jednota v rozmanitosti"
 INS_unity_in_diversity_desc: "Po staletí zachycovala fráze Jednota v rozmanitosti ducha našeho souostroví. Během revoluce se stala heslem, které připomínalo, že přes různé jazyky a tradice stojíme společně jako jeden národ. Měli bychom tuto frázi zakotvit v ústavě, aby naše jednota přetrvala generace."
 INS_the_timor_issue: "Otázka Timoru"
 INS_the_timor_issue_desc: "Východní Timor je zřetelně indonéské území a zatímco revoluce skončila, stále je pod koloniální správou. Pošleme ultimátum [721.OWNER.GetName] požadující okamžité předání Východního Timoru."
 INS_pledge_to_allies: "Zavázat se spojencům"
 INS_pledge_to_allies_desc: "Hrozí nám invaze v souvislosti s rostoucím světovým konfliktem. I když jsou naše vztahy s Dohodou vratké, etablovali jsme se jako demokratická moc v Tichomoří a měli bychom se spojit s velkými demokratickými mocnostmi."
 INS_mixed_economy_system: "Systém smíšené ekonomiky"
 INS_mixed_economy_system_desc: "Indonésie je unikátní a nebude prosperovat ani pod tradičním kapitalismem, ani komunismem. Zavedením smíšené ekonomiky s prvky obou systémů najdeme střední cestu."
 INS_social_democracy: "Sociální demokracie"
 INS_social_democracy_desc: "Ekonomika [INS.GetAdjective] výrazně vzrostla díky Sjahrirově politice. Měli bychom prohlásit Indonésii za plně sociálnědemokratický stát a vyvíjet budoucí ekonomické politiky na principech sociální demokracie."
 INS_prime_minister_sjarifuddin: "Premiér Sjarifuddin"
 INS_prime_minister_sjarifuddin_desc: "Sjarifuddin je nejvhodnějším kandidátem pro Indonésii; jeho umírněné politiky umožňují kompromis mezi komunisty a socialisty."
 INS_concessions_to_communists: "Ústupky komunistům"
 INS_concessions_to_communists_desc: "PKI má významný počet křesel v parlamentu; měli bychom někteří vedení PKI pověřit ministerskými posty pro zajištění stability."
 INS_sjarifuddin_focus_2: "Exportní ekonomika řízená dělníky"
 INS_sjarifuddin_focus_2_desc: "S naší novou nezávislostí bychom měli zrevidovat systém exportní ekonomiky a přeorganizovat jej tak, aby už nezvýhodňoval nizozemské zisky. Ač exportní ekonomika zůstává riziková, můžeme ji učinit spolehlivější než dříve."
 INS_prime_minister_hatta: "Premiér Hatta"
 INS_prime_minister_hatta_desc: "Mohammad Hatta, známý jako jeden ze proclamátorů revoluce, sloužil jako viceprezident Sukarnovi a byl obecně více demokraticky laděný ze dvou. Bude vhodným premiérem, na němž se většina stran může shodnout."
 INS_hatta_focus_2: "Další kroky"
 INS_hatta_focus_2_desc: "Revoluce skončila a ač někteří politici trvají na jejím pokračování, tyto hlasy by měly být ignorovány. Měli bychom hledět dopředu a budovat Indonésii tak, aby budoucí generace žily v prosperitě."
 INS_hatta_princely_advisors: "Integrovat knížecí státy"
 INS_hatta_princely_advisors_desc: "Sjednocení v rozmanitosti je naší silou. Konec revoluce však přinesl napětí. Abychom předešli odporu menšin a povstáním, měli bychom zřídit radu, kde budou místní vládcové knížecích států mít přímé slovo v národní politice."
 INS_prime_minister_tt: "Byly konány první indonéské všeobecné volby"
 INS_guided_democracy: "Řízená demokracie"
 INS_guided_democracy_desc: "Demokracie může být ideálem, ale vzdát se moci lidu nyní by skončilo chaosem. Zvedneme Sukarna na prezidenta na doživotí, který bude dohlížet na demokratický parlament a zasahovat v případě potřeby."
 INS_enact_militarism: "Zavést militarismus"
 INS_enact_militarism_desc: "Měli bychom se poučit z politiky [JAP.GetNameDefCap] a jejích militaristických principů. Přijetí podobných zásad prospěje naší nové vládě."
 INS_sukarnos_industrialization: "Posílit jávský průmysl"
 INS_sukarnos_industrialization_desc: "Průmysl Jávy je páteří naší ekonomiky a armády. Vše musí směřovat tam."
 INS_sukarnos_industrialization2: "Každý muž musí přispět"
 INS_sukarnos_industrialization2_desc: "Válečné úsilí je hlavní prioritou státu a tudíž hlavní prioritou každého Indonésana. Luxus je nepřítel; vojensko-průmyslový komplex musí růst."
 INS_japanese_military_lessons: "Japonské vojenské lekce"
 INS_japanese_military_lessons_desc: "Měli bychom studovat japonské vojenské doktríny a přizpůsobit naši armádu."
 INS_support_tan_malakas_coup: "Podpořit puč Tan Malaky"
 INS_support_tan_malakas_coup_desc: "Sukarno vyhlásil nezávislost, ale ukázal se být člověkem kompromisů. Tan Malaka a Persatuan Perjuangan požadují stoprocentní nezávislost bez jednání. Pokud Sukarno nebude bojovat za revoluci plně, revoluce si najde vůdce, který ano."
 INS_minimum_program: "Minimální program"
 INS_minimum_program_desc: "Persatuan Perjuangan vytyčila požadavky: lidová vláda, lidová armáda a znárodnění všech zahraničně vlastněných plantáží a průmyslu. Potřebujeme schopné muže, kteří program prosadí. Njono mluví za dělníky, Setyadjit za stranické intelektuály. Společně zajistí, že revoluce bude organizována od továren až po vládu."
 INS_agrarian_reform: "Agrární reforma"
 INS_agrarian_reform_desc: "Po tři století indonéská půda krmila plantáže cizinců. Revoluce, která to nezmění, není pravou revolucí. Převod půdy na ty, kdo ji obdělávají, je nezbytný."
 INS_soviet_aid: "Sovětská pomoc"
 INS_soviet_aid_desc: "Sovětský svaz uznal naši revoluci a je připraven ji zásobit. Ať nás rozdíly dělí jakkoli, nemůžeme odmítnout nabídku, co je na stole. Vezměme zbraně a pokračujme."
 INS_pacific_revolution: "Tichomořská revoluce"
 INS_pacific_revolution_desc: "Koloniální mocnosti neustoupily z Asie, pouze z Indonésie. Starý řád stále drží v Malajsii a Filipínách a v každé z těchto zemí jsou lidé, kteří chtějí zapřít tento pořádek. Naše revoluce nám dává povinnost jim pomoci. Musíme jednat."
 INS_purge_oppurtunists_tt: "Odemkne §Y$INS_launch_revolution$§! v zemích s §Y60%§! nebo více komunistické podpory. Země, v nichž vyvoláme revoluce, se stanou našimi §Ypřeběhlíky§!."
 INS_purge_oppurtunists: "Vyčistit oportunisty"
 INS_purge_oppurtunists_desc: "Musso strávil dvacet let v Moskvě, naučil se přijímat rozkazy. Vrátil se s instrukcemi a plánem přeměny republiky v loutku Kominterny. Nehodlali jsme svrhnout Nizozemce, abychom se pak sklonili před jiným pánem. Oportunisty, kteří by prodali revoluci Moskvě, musíme vytěsnit, a osvobozené národy mají hledět na Jakartu, ne na Kreml."
 INS_federation_of_aslia: "Federace Aslie"
 INS_federation_of_aslia_desc: "Národy, které jsme osvobodili, nemusí stát osaměle. Tan Malaka vždy snil o něčem větším než jedna republika: federaci od pevniny k Tichomoří, sjednocenou proti jakékoliv koloniální moci. Nabídneme jim plné členství v našem státě."
 INS_aslia_tt: "Umožňuje jádřit a anektovat §YTichomořské§! subjekty"
 INS_musso_ascends: "Vzrůst Muss a"
 INS_musso_ascends_tt: "Odemkne §Y$INS_launch_revolution$§! v zemích s §Y30%§! nebo více komunistické podpory. Země, v nichž vyvoláme revoluce, zůstanou nezávislé."
 INS_musso_ascends_desc: "Tan Malaka je snílek. Musso přináší to, co snilkům chybí: plnou podporu Sovětského svazu a solidaritu mezinárodního komunistického hnutí. Naše revoluce nemusí stát osaměle."
 INS_soviet_economic_integration: "Sovětská ekonomická integrace"
 INS_soviet_economic_integration_desc: "Revoluce nám dala svobodu, ale samotná svoboda nevytváří továrny ani nekrmí masy. Sovětský svaz nabízí, co žádná kapitalistická mocnost: průmyslové know-how, rozvojové úvěry a obchod za podmínek bez koloniálních podmínek. Byli bychom hloupí, kdybychom to odmítli."
 INSHOL_revolution_ongoing_tt: "Indonéská revoluce probíhá"
 INSHOL_reasserting_control: "Znovu převzít kontrolu nad Indies"
 INSHOL_reasserting_control_desc: "Nemůžeme jen pasivně přihlížet, jak tito oportunisté ničí, co jsme staletí budovali, ničí infrastrukturu a radikalizují mládež. Musíme jednat!"
 INSHOL_request_british_support: "Žádat o britskou podporu"
 INSHOL_request_british_support_desc: "[ENG.GetNameDefCap], jako další koloniální mocnost, pravděpodobně projeví soucit s naší situací, zvláště protože pokud revoluce uspěje, může to spustit domino efekt v východní Asii. Měli bychom požádat o jejich ekonomickou a vojenskou pomoc."
 INS_eng_treaty_holside_tt: "§Y[ENG.GetNameDefCap]§! se oficiálně přihlásí na naši stranu konfliktu a poskytne výraznou pomoc. Pokud válka skončí vítězstvím, §Y[ENG.GetNameDefCap]§! bude mít nárok na Borneo."
 INS_eng_treaty_engside_tt: "Oficiálně se sblížíme s §Y[HOL.GetNameDefCap]§! v konfliktu o Východní Indies. Pokud §Y[HOL.GetNameDefCap]§! zvítězí, máme nárok na Borneo."
 INS_fra_treaty_holside_tt: "§Y[FRA.GetNameDefCap]§! se oficiálně přihlásí na naši stranu konfliktu a poskytne výraznou pomoc. Pokud válka skončí vítězstvím, §Y[FRA.GetNameDefCap]§! bude mít nárok na severovýchodní Sumatru."
 INS_fra_treaty_fraside_tt: "Oficiálně se sblížíme s §Y[HOL.GetNameDefCap]§! v konfliktu o Východní Indies. Pokud §Y[HOL.GetNameDefCap]§! zvítězí, máme nárok na severovýchodní Sumatru."
 INSHOL_franco_dutch_accord: "Franco-nizozemská dohoda"
 INSHOL_franco_dutch_accord_desc: "I když jsou naše jednotky lépe vyzbrojené a organizované než republikánské milice, jejich přesila obrací konflikt proti nám. Abychom získali vítězství, potřebujeme vnější podporu. Francie může být ochotna zasáhnout, pokud jí nabídneme území v Indies k rozšíření své přítomnosti v Tichomoří."
 INSHOL_london_batavia_accord: "Dohoda Londýn-Batavia"
 INSHOL_london_batavia_accord_desc: "I když jsou naše jednotky lépe vybavené, jejich přesila způsobuje potíže. Pro zajištění vítězství potřebujeme vnější podporu. [ENG.GetNameDefCap] by mohla mít zájem kvůli své přítomnosti v Malajsii. Možná by je přilákala nabídka protislužby."
 INSHOL_australian_divisions: "Poslat australskou pěchotu na Javu"
 INSHOL_australian_divisions_desc: "Podle dohody London-Batavia je Británie povinna poslat další divize do Indies přes Austrálii, protože blízkost Austrálie ji činí ideálním kandidátem pro vojenskou základnu mimo Indies."
 INSHOL_indian_divisions: "Divize britské Indické armády"
 INSHOL_indian_divisions_desc: "I když Británie možná nebude chtít posílat své vlastní jednotky do Indies, přesvědčit je, aby poslali indické divize, je mnohem snazší, zvláště s ohledem na blízkost k Batavii."
 INSHOL_undermine_the_militias: "Podkopat milice"
 INSHOL_undermine_the_militias_desc: "Média přehánějí vážnost situace; milice jsou jen skupina rozbouřených mladíků. Nemusíme všechny zdroje obracet na jejich zastavení, měli bychom držet linii a počkat, až vyhostí."
 INSHOL_flag_will_fly_again: "Znovu zavlaje vlajka"
 INSHOL_flag_will_fly_again_desc: "Nizozemská vlajka vlála v Indies po staletí, nedovolíme ji sundat. Pokud udržení naší korunní kolonie vyžaduje poslat tanky a bombardéry, budou poslány!"
 INSHOL_flag_will_fly_again_tt: "§YPo skončení revoluce bude duch odstraněn a změny pravidel budou vráceny.§!"
 INSHOL_mass_mobilization: "Hromadná mobilizace"
 INSHOL_mass_mobilization_desc: "Nemůžeme tento konflikt vyhrát a porazit Republiku bez dobře vybavené armády. Musíme přezbrojit Indies a přesměrovat financování z civilních sektorů do KNIL."
 INSHOL_batavia_storm_operation: "Útok na Batavii"
 INSHOL_instigate_infighting: "Způsobit vnitřní konflikty v Republice"
 INSHOL_ultimatum_to_republic: "Ultimátum republice"
 INSHOL_comite_rijkseenheid: "Comité Rijkseenheid"
 INSHOL_comite_rijkseenheid_desc: "Vlajka je v Indies skládána a lidé jen sledují. Nemůžeme to dovolit; musíme přesvědčit správu Indies, že nizozemský lid chce revoluci zastavit!"
 INSHOL_increase_esclation_placeholder: "Rychlá eskalace"
 INSHOL_increase_esclation_placeholder_desc: "Naše milice obsadily mnoho klíčových přístavů, měst a průmyslových center. Už nebudeme čekat na Nizozemsko, sami vyhlásíme velkou vojenskou ofenzivu!"
 INS_take_batavia_explination_tt: "Pokud úspěšně obsadíme celou Javu, zničíme koloniální vládu zevnitř a §Gvyhrajeme válku§!. Pokud se nám to nepodaří do §Y730 dní§!, §Rzgineme§!."
 INSHOL_linggadjati_agreement: "Vyjednávání příměří"
 INSHOL_linggadjati_agreement_desc: "Invaze na Javu je obtížná a naše správa slábne. Musíme ustoupit a bránit se, abychom neriskovali pád celé republiky. Měli bychom s Nizozemskem vyjednat lokální příměří, abychom se mohli reorganizovat."
 INSHOL_increase_esclation_placeholder_tt: "Odemkne §YRozhodnutí§! vyjednat lokální příměří a §YZvýšit časový limit§! pro obsazení Javy."
 INSHOL_seek_foreign_help: "Hledat zahraniční pomoc"
 INSHOL_seek_foreign_help_desc: "Je zřejmé, že zvítězit ve válce proti průmyslově silné koloniální mocnosti jako nově vzniklý stát bez ekonomiky je téměř nemožné. Měli bychom oslovit země, které nás podporují, zda by nám nepomohly."
 INSHOL_renville_agreement: "Renvilleova dohoda"
 INSHOL_renville_agreement_desc: "Bezprecedentní agrese Nizozemska přilákala mezinárodní pozornost, přesto Nizozemsko dál porušuje příměří a láká nás k reakci. Musíme zkusit zavolat [USA.GetNameDef]; pokud je přesvědčíme, aby stály na naší straně, Nizozemsko bude muset ustoupit."
 INSHOL_no_compromise: "Žádný kompromis, žádná kapitulace"
 INSHOL_no_compromise_desc: "Nizozemská chamtivost, která investovala téměř výhradně do Jávy a ignorovala východní ostrovy, zanechala Javu jako Achillovu patu celé kolonie. To bude jejich pád!"
 INSHOL_end_to_bloodshed: "Řešení dvou států"
 INSHOL_end_to_bloodshed_desc: "Konflikt trvá příliš dlouho bez výrazného posunu, pouze ztráty na životech rostou. Nikdo nechce pokračování; je čas sednout k jednacímu stolu s nizozemskými vůdci."
 INSHOL_reorganize_colonies: "Přestavět kolonii"
 INS_we_will_need_another_tt: "Jelikož již kontrolujeme celou Javu, budeme muset ovládnout ještě jeden stát kromě Javy."
 INS_centralize_the_state: "Centralizovat stát"
 INS_centralize_the_state_desc: "Od Sumatry po Sulawesi, od Bornea po Bangku, naše rozvojové programy přinesly silnice, továrny a instituce do území, které [1058.GetName] dříve jen administrativně spravoval. Tyto regiony už nejsou vzdálenými provinciemi. Jsou §Y[INS.GetNameDefCap]."
 INS_centralize_the_state_1_tt: "Požadované státy, které jsou §Ydomovské území§!:"
 INS_centralize_the_state_2_tt: "Požadované státy, které jsou §Ynedomovské§!:"
 INS_fate_of_de_javasche_bank: "[INS_fate_of_de_javasche_bank_scripted_name]"
 INS_fate_of_de_javasche_bank_scripted_name_colony: "Osud De Javasche Bank"
 INS_fate_of_de_javasche_bank_scripted_name_independent: "Osud Bank Indonesia"
 INS_fate_of_de_javasche_bank_desc: "[INS_fate_of_de_javasche_bank_scripted_desc]"
 INS_fate_of_de_javasche_bank_scripted_desc_colony: "Východní indonéský guilder je v pádu od začátku krize a De Javasche Bank nemá nástroje k jeho stabilizaci. Musíme rozhodnout, jak stabilizovat měnu, než zcela zanikne důvěra investorů."
 INS_fate_of_de_javasche_bank_scripted_desc_independent: "Zdědili jsme měnu v krizi. Starý koloniální guilder již kolaboval a přechod na rupii situaci nekorigoval. Bank Indonesia potřebuje jasné vedení od vlády, jinak naše mladá ekonomika utrpí."
 INS_finish_the_bauxite_project: "Dokončit projekt Bangka"
 INS_finish_the_bauxite_project_desc: "S novými silnicemi, přístavy a železnicemi v Bangka-Belitung hlásí průzkumné týmy naleziště wolframu a chromu přesahující naše počáteční očekávání. Tyto ostrovy se pro republiku ještě ukážou jako velmi hodnotné."
 INS_australian_contracts: "Australské kontrakty"
 INS_australian_contracts_desc: "Naše zásoby gumy výrazně překročily domácí potřeby. Austrálie, žíznivá po surovinách pro svůj průmysl, je přirozeným obchodním partnerem. Zajištění dlouhodobých kontraktů s australskými firmami by přineslo stabilní příjmy."
 INS_coopereate_with_chinese_businessmen: "Spolupracovat s čínskými obchodníky"
 INS_coopereate_with_chinese_businessmen_desc: "Bohatá a dobře napojená obchodnická třída dlouho usnadňovala obchod v souostroví. Místo abychom je marginalizovali, měli bychom s nimi spolupracovat. Jejich kapitál a obchodní expertíza by mohly být neocenitelné při oživení naší ekonomiky."
 INS_oil_decisions_unlock_tt: "Odemkne nové §Y$INS_realign_supply_chains_cat$§! rozhodnutí pro prodej §RYele§!."
 INS_negotiate_new_contracts_unlock_tt: "Odemkne nové §Y$INS_realign_supply_chains_cat$§! rozhodnutí."
 INS_realign_supply_chains_explain_tt: "Odemkne §Y$INS_realign_supply_chains_cat$§! rozhodnutí pro prodej surovin soukromým společnostem na 2leté pronájmy."
 INS_negotiate_new_contracts: "Vyjednat nové kontrakty"
 INS_negotiate_new_contracts_desc: "Náš rostoucí věhlas spolehlivého dodavatele otevírá dveře, které byly dříve zavřené. Noví odběratelé se ozývají; musíme rychle uzavřít dlouhodobé dohody dříve, než nás předběhne konkurence."
 INS_all_in_on_rubber: "Vsadit vše na gumu"
 INS_all_in_on_rubber_desc: "Guma je naše nejsilnější karta a chceme ji hrát naplno. Každý dostupný hektar plantáží přeměníme na gumovníky a reorganizujeme exportní aparát, aby fungoval rychleji a levněji než kdokoliv jiný."
 INS_more_market_resources: "Převálcovat Velkou depresi"
 INS_more_market_resources_desc: "Svět možná uvízl v ekonomické krizi, ale krize přináší příležitosti těm, kdo jsou odvážní. Záplavou trhu našimi komoditami za ceny, které nikdo jiný nezvládne, zajistíme, že když se svět zotaví, indonéské zboží bude na každé polici."
 INS_recovering_from_the_great_depression: "Oživení po Velké depresi"
 INS_recovering_from_the_great_depression_desc: "Velká deprese měla devastující dopad na [INS.GetNameDef]. Jakožto převážně exportní ekonomika nás protekcionismus po celém světě zdecimoval. Jak se svět začne otevírat, musíme hledat nové trhy a obnovit staré obchodní cesty."
 INS_first_come_first_serve: "Kdo dřív přijde, ten dřív mele"
 INS_first_come_first_serve_desc: "Protecionismus Velké deprese slábne, ale zvýšená produkce a předražený guilder poškodily nizozemský exportní trh. Místo honu za starými partnery na Západě můžeme využít příležitost rozšířit se na nové trhy v Asii."
 INS_oil_export: "Zvýšit vývoz ropy"
 INS_oil_export_desc: "Zlepšíme ropnou infrastrukturu v Sumatře a Kalimantanu, abychom zajistili obchodní dohody s novými partnery."
 INS_increased_trade_with_japan: "Zvýšený obchod s Japonskem"
 INS_increased_trade_with_japan_desc: "[JAP.GetNameDefCap] je stále významnějším obchodním partnerem a neselhal. Měli bychom vyjednat nové dohody a prohloubit ekonomickou spolupráci, i když to rozčílí naše západní spojence, zejména Nizozemsko. Pokud chceme mít vlastní hlas, musíme zajistit vlastní obchodní linky."
 INS_asian_trade_investments: "Investice do asijského obchodu"
 INS_asian_trade_investments_desc: "Deprimující účinek Velké deprese ukázal naši přehnanou závislost na západních obchodních partnerech. Jako exportně orientovaná ekonomika je nyní zásadní rozvíjet nové trhy v Jihovýchodní Asii, aby naše ekonomika nezávisela na jedné zemi."
 INS_asian_trade_investments_tt: "Každých §Y420§! dní se penalizace za trhy z §YVelké deprese§! §Zlepší§! o §Y5%§! dokud negativní modifikátory nezmizí."
 INS_declare_free_trade: "Vyhlásit volný obchod"
 INS_declare_free_trade_desc: "Neměli bychom se vázat výhradně na jednu zemi; necháme trh rozhodnout, co je pro [INS.GetNameDef] nejlepší."
 INS_japanese_export_contracts: "Jedna obchodní smlouva vládne všem"
 INS_japanese_export_contracts_desc: "Vyjednáme velkou obchodní dohodu s [JAP.GetNameDef], prodáme veškerou gumu z [1049.GetName] a [672.GetName]. I když ji prodáme za velmi nízkou cenu, budeme mít zaručen odbyt."
 INS_realign_supply_chains: "Přeuspořádat dodavatelské řetězce"
 INS_realign_supply_chains_desc: "Protecionismus Velké deprese slábne, ale zvýšená produkce a předražený guilder poškodily nizozemský exportní trh. Musíme podniknout kroky, aby nás spojenci znovu začali obchodovat."
 INS_invite_foreign_companies: "Podpořit americké ropné projekty"
 INS_invite_foreign_companies_desc: "Od roku 1930 Standard Oil California působí v naší zemi přes nizozemskou pobočku Nederlandsche Pacific Petroleum Maatschappij. Jejich průzkumy v Riouw slibují – měli bychom podpořit jejich vrtné operace. Velké naleziště by zvýšilo příjmy a podnítilo další investice."
 INS_expand_sea_routes: "Rozšířit námořní trasy"
 INS_expand_sea_routes_desc: "Naše země je bohatá na suroviny, ale těžební průmysl je příliš specializovaný a chybí nám infrastruktura k těžbě vzácných minerálů jako chrom a wolfram. Abychom využili rostoucí obchodní sítě, musíme zvýšit kapacitu naší obchodní lodi."
 INS_ship_contracts: "Zajistit zakázky na lodě"
 INS_ship_contracts_desc: "Vybudování námořnictva je nezbytné k udržení obchodních tras v případě války. Můžeme využít nové obchodní vztahy k získání námořních zakázek."
 INS_developing_sumatra: "Rozvoj Sumatry"
 INS_developing_sumatra_desc: "Sumatra má nejvíce zdrojů v souostroví, ale infrastruktura je tak špatná, že velká část vytěžených surovin se nedostane do Batavie. Přeprava spoléhala na prašné cesty a nespojené železnice. To nemůžeme nechat."
 INS_sumatra_railway: "Železnice Sumatra"
 INS_sumatra_railway_desc: "V rámci rozvoje infrastruktury Sumatry postavíme železnici táhnoucí se od severního Atjehu po nejjižnější přístav Sumatry, který se lodí rychle napojuje na Batavii. Zásoby budou přepravovány na nejbližší nádraží a odtud do Batavie během dnů."
 INS_develop_borneo: "Rozvoj Kalimantanu"
 INS_develop_borneo_desc: "Kalimantan má velký potenciál, ale je málo rozvinutý a lidé žijí v chudobě. Doprava závisí na řekách a dlouhodobé komunikace brzdí absence elektřiny. Budováním silnic a elektrického vedení vytvoříme podmínky pro budoucí průzkum a těžbu."
 INS_kalimantan_mic: "Kalimantanský vojenský průmysl"
 INS_kalimantan_mic_desc: "Naše rozvojové úsilí v Kalimantanu se vyplatilo. Rozšíření elektřiny a komunikací nás přiblížilo komunitám dříve mimo dosah vlády. Můžeme toho využít k budování nových továren a jejich obsazení novými pracovními silami."
 INS_pontianak_to_balikpapan: "Z Pontianaku do Tanjung Selor"
 INS_pontianak_to_balikpapan_desc: "Nápad na železnici v Kalimantanu byl dlouho diskutován, ale drsný a málo prozkoumaný vnitrozemský terén činí stavbu náročnou. Jediným řešením je U-čková trať z pobřeží na pobřeží. Nebude levná, ale v dlouhodobém horizontu se vyplatí."
 INS_develop_sulawesi: "Rozvoj Sulawesi"
 INS_develop_sulawesi_desc: "Sulawesi je střed souostroví a důležitá strategická oblast. Postavíme silnice, elektrická vedení a komunikace, aby mohla sloužit jako vojenské centrum v případě války."
 INS_the_bangka_project: "Projekt Bangka"
 INS_the_bangka_project_desc: "Bangka-Belitung, i když malé, jsou pilířem indonéské ekonomiky díky ložiskům bauxitu. Potřebujeme vybudovat silnice, přístavy a železnice, aby ostrovy maximálně přispěly k republice."
 INS_aluminium_factory: "Hliníková továrna v Pangkalpinangu"
 INS_aluminium_factory_desc: "Naše těžba bauxitu roste, ale nedostatek domácí výroby hliníku omezuje zisk. Pangkalpinang je ideální místo pro továrnu, která nás zbaví prostředníků a maximalizuje výnosy."
 INS_bauxite_export: "Dvakrát více vývozu bauxitu"
 INS_bauxite_export_desc: "Dokončení projektu Bangka nám přineslo více bauxitu, než umíme zpracovat. Můžeme jej nabídnout za výrazně nižší cenu než konkurence, aby se vše vyprodalo. Kvantita i při nízké ceně přinese poměrný růst zisku."
 INS_tin_mining: "Investice do těžby cínu"
 INS_tin_mining_desc: "Těžba cínu na Bangka-Belitung předchází evropské přítomnosti. Modernizace průmyslu je nutná, ale nákladná. Potenciál dlouhodobých zisků je však značný."
 in_240_days_tt: "§YZa 240 dní:§!\n"
 INS_tin_to_usa: "Prodat cín [USA.GetNameDef]"
 INS_tin_to_usa_desc: "[USA.GetNameDefCap] je plné korporací a státních institucí kupujících cín. Nyní, když máme provozní důl, máme tu příležitost značně vydělat."
 INS_tin_to_japan: "Prodat cín [JAP.GetNameDef]"
 INS_tin_to_japan_desc: "[JAP.GetNameDefCap] má mnoho lodí považovaných za zastaralé, které by se hodily pro [INS.GetAdjective] námořnictvo. Měli bychom tyto lodě koupit za peníze z těžby cínu."
 INS_tin_to_japan_tt: "§Y[JAP.GetNameDefCap]§! nám pošle §Y9§! starších torpédoborců."
 INS_new_bauxite_routes: "Nové trasy pro bauxit"
 INS_new_bauxite_routes_desc: "Strategie podřezávání trhu, abychom zvýšili objem vývozu bauxitu, fungovala a naše příjmy výrazně vzrostly. Neměli bychom zastavit – rozšíříme obchodní sítě, optimalizujeme dodavatelské řetězce a hledáme další příležitosti maximalizovat výnosy."
 INS_bangka_bauxite_export_flag: "Dokončeno zaměření §Y$INS_bauxite_export$§!:"
 INS_not_industry: "Plán pro budoucnost"
 INS_not_industry_desc: "Java je srdcem národa, většina populace a sídlo vlády. Než ji začneme industrializovat naplno, musíme připravit půdu: průzkumy, plánování území a vyčištění lokalit, aby továrny stály na co nejvhodnějších místech."
 INS_construction_focus: "Průmyslový boom"
 INS_construction_focus_desc: "Zahraniční kapitál přitéká, exporty rostou a poprvé za dlouhou dobu jsou peníze k investicím do domácího průmyslu. Musíme příležitost využít a stavět, když podmínky hrají do karet."
 INS_developing_java: "Rozšíření jávské infrastruktury"
 INS_developing_java_desc: "Java je nejprůmyslovější ostrov a zdroj většiny bohatství. Ale města jako Batavia se přelidňují. Měli bychom rozšířit tyto městské oblasti novými domy, obchodními zónami, tramvajemi, vlaky a továrnami, aby unesly rostoucí populaci."
 INS_prioritize_sugar_economy: "Upřednostnit cukernou ekonomiku"
 INS_prioritize_sugar_economy_desc: "Snížíme vládní rozpočet na batavský průmyslový rozvoj; už je daleko průmyslovější než jiné oblasti. Místo toho použijeme peníze na založení drobných palmových plantáží po zemi, které budou produkovat palmový cukr – komoditu s vysokou mezinárodní poptávkou."
 INS_all_cards_into_industry: "Vše do průmyslu"
 INS_all_cards_into_industry_desc: "Industrializace výrazně ovlivnila [1058.GetName]. Kdybychom industrializovali celý ostrov, s desítkami milionů obyvatel, mohli bychom se stát globálním hráčem."
 INS_expand_batavia_technical_institute: "Rozšířit Batavský technologický institut"
 INS_expand_batavia_technical_institute_desc: "Rozšíření institutu umožní většímu počtu studentů získat vzdělání a zvýšit tempo technologického rozvoje."
 INS_quinine_export: "Výhodnější dohoda na chinín"
 INS_quinine_export_desc: "Cinchona Bureau v Amsterdamu má téměř monopol na vývoz chinínu, což je vysoce ziskové, protože chinín je žádaný jako léčba proti malárii. Většina zdrojů pochází z Indies, ale my z toho profitujeme málo. Měli bychom vyjednat spravedlivější dohodu."
 INS_spend_profits_on_rural: "Vydělané prostředky investovat do venkova"
 INS_spend_profits_on_rural_desc: "S novou dohodou o chinínu máme možnost použít dodatečné příjmy na rozvoj dopravy a komunikací v venkovských oblastech a připravit půdu pro budoucí industrializaci."
 INS_spend_profits_on_urban: "Vydělat zisky investovat do měst"
 INS_spend_profits_on_urban_desc: "S novou dohodou o chinínu máme možnost rozšířit batavský průmysl, diverzifikovat ekonomiku a snížit závislost na surovinovém exportu."
 INS_spend_profits_on_military: "Vydělat zisky investovat do armády"
 INS_spend_profits_on_military_desc: "S novou dohodou o chinínu máme možnost výrazně zlepšit armádu investováním dodatečných prostředků do výstavby zbrojních továren v Yogyace a Semarangu."
 INS_end_to_bloodshed_tt: "Válka skončí s novými hranicemi podle současné okupace. Java, Sumatra a Borneo budou §Yanektovány§! stránkou, která má v oblasti největší kontrolu."
