 AST_demand_central_africa: "Požadovat Střední Afriku" # todo: NEW TRANSLATION
 AST_demand_southwestern_territories: "Požadovat jihozápadní teritoria" # todo: NEW TRANSLATION
 AST_vichy_req_ongoing_flag: "Žádost o teritorium §Yprobíhá§!" # todo: NEW TRANSLATION
 AST_remove_vichy_out_of_africa_decisions: "\nOdstranit rozhodnutí §YVichy Pryč z Afriky§!.\n" # todo: NEW TRANSLATION
 AST_big_business_pact_cat: "Pakt velkého podnikání" # todo: NEW TRANSLATION
 AST_big_business_request_ongoing_flag: "Žádost Velkého podnikání §Yprobíhá§!" # todo: NEW TRANSLATION
 AST_naval_expansion: "$NOR_alt_dem_naval_expansion$" # todo: NEW TRANSLATION
 AST_factory_conversions: "Konverze továren" # todo: NEW TRANSLATION
 AST_factory_conversions_desc: "Výměnou za to, že [ROOT.GetFascistParty] provede politiky ve prospěch podnikatelů, hlavní obchodníci souhlasili investovat do průmyslových reforem, které odpovídají cílům strany.\n\nObranný průmysl musí být upřednostněn a australské továrny proto musí být převedeny tak, aby ho podporovaly." # todo: NEW TRANSLATION
 AST_land_development: "Rozvoj území" # todo: NEW TRANSLATION
 AST_land_development_desc: "Výměnou za to, že [ROOT.GetFascistParty] prosadí politiky, které je zlepší, hlavní podnikatelé souhlasili investovat do reforem průmyslu. Příliš mnoho území [ROOT.GetName] zůstává neindustrializovaných a nerozvinutých. Rozvojem těchto regionů je učiníme vhodnými pro výstavbu." # todo: NEW TRANSLATION
 AST_electrical_grid_expansions: "Rozšíření elektrické sítě" # todo: NEW TRANSLATION
 AST_electrical_grid_expansions_desc: "Výměnou za politiky pro podnikatele, hlavní obchodníci souhlasili investovat. Rozšířením naší elektrické sítě můžeme podpořit domácí výrobu energie, která není závislá na dovozu." # todo: NEW TRANSLATION
 AST_factory_investments: "Investice do továren" # todo: NEW TRANSLATION
 AST_factory_investments_desc: "Výměnou za politiky výhodné pro průmyslníky, ti souhlasili investovat do reforem. Pokud chceme zajistit dostatek vojenských i civilních zásob v konfliktu, musíme rozšířit průmyslovou kapacitu." # todo: NEW TRANSLATION
 AST_develop_port_kemla_steel_medium_decision: "Postavit druhou vysokou pec Port Kembla" # todo: NEW TRANSLATION
 AST_develop_port_kemla_steel_medium_decision_desc: "Port Kembla fungovala dobře s jednou vysokou pecí, ale poptávka vzrostla natolik, že bychom mohli postavit druhou. To přibližně zdvojnásobí produkci oceli regionu." # todo: NEW TRANSLATION
 AST_prospect_pilbara_iron_decision: "Otevřít region Pilbara pro těžbu" # todo: NEW TRANSLATION
 AST_prospect_pilbara_iron_decision_desc: "Region Pilbara má obrovské zásoby železné rudy, jedny z největších na světě. Nicméně v tomto odlehlém kraji by investice nutná k těžení byla obrovská... ale zisky by byly stejně veliké." # todo: NEW TRANSLATION
 AST_scale_up_pilbara_mines_steel_decision: "Rozšířit doly v Pilbaře" # todo: NEW TRANSLATION
 AST_scale_up_pilbara_mines_steel_decision_desc: "Jakmile byl region Pilbara otevřen pro velkoplošné těžby, je čas nechat investice proudit!" # todo: NEW TRANSLATION
 AST_pilbara_mining_tt: "Otevření §Y$STATE_870$§! k dalšímu průzkumu umožní opakovatelná rozhodnutí pro zvyšování výroby §YOceli§! bez omezení." # todo: NEW TRANSLATION
 AST_scale_up_middleback_mines_steel_decision_1: "Rozšířit důl Iron Knob" # todo: NEW TRANSLATION
 AST_scale_up_middleback_mines_steel_decision_1_desc: "Ačkoliv byl důl Iron Knob aktivní delší dobu, s rostoucí poptávkou po železné rudě je čas rozšířit naše úsilí zde." # todo: NEW TRANSLATION
 AST_scale_up_middleback_mines_steel_decision_2: "Otevřít důl Iron Monarch" # todo: NEW TRANSLATION
 AST_scale_up_middleback_mines_steel_decision_2_desc: "Důl Iron Knob nestačí pro naše potřeby, naštěstí jsou Middleback Mountains bohaté na železo. Je čas vybudovat náš největší důl." # todo: NEW TRANSLATION
 AST_scale_up_middleback_mines_steel_decision_3: "Otevřít důl Iron Prince" # todo: NEW TRANSLATION
 AST_scale_up_middleback_mines_steel_decision_3_desc: "Válečná poptávka po kovech je na vrcholu, ale Middleback Mountains stále zásobují." # todo: NEW TRANSLATION
 AST_expand_iron_mining_tt: "Mít jak §Y$AST_exports_for_economic_recovery$§!, tak §Y$AST_within_reach$§! umožní těžbu regionu Pilbara v §Y$STATE_870$§! a uvolní téměř nevyčerpatelný zdroj §YOceli§!. To můžeme využít k nastartování ekonomiky." # todo: NEW TRANSLATION
 AST_develop_port_kemla_steel_tt: "To nám umožní vzít rozhodnutí §YPostavit druhou vysokou pec Port Kembla§!, které významně posílí naši produkci §YOceli§!." # todo: NEW TRANSLATION
 AST_develop_middleback_tt: "Toto odemkne tři rozhodnutí k rozvoji naší produkce §YOceli§! v §Y$STATE_519$§!" # todo: NEW TRANSLATION
 AST_ireland_weapon_smuggling_cat: "Ozbrojení Irska" # todo: NEW TRANSLATION
 AST_smuggle_arms_to_ireland: "Pašovat zbraně do Irska" # todo: NEW TRANSLATION
 AST_smuggle_arms_to_ireland_desc: "Musíme zásobit Iry zbraněmi potřebnými k boji s Brity." # todo: NEW TRANSLATION
 AST_smuggle_arms_to_ireland_ongoing_flag: "Pašování zbraní §Yprobíhá§!" # todo: NEW TRANSLATION
 AST_smuggle_arms_to_northern_ireland: "Pašovat zbraně do Severního Irska" # todo: NEW TRANSLATION
 AST_smuggle_arms_to_northern_ireland_desc: "Pokud dokážeme zásobit Severní Irsko dostatečně zbraněmi a propojit ho s Irskem, můžeme zajistit, že se sjednocení uskuteční dříve, než Britové zareagují." # todo: NEW TRANSLATION
 AST_northern_ireland_rises_up: "Severní Irsko povstává" # todo: NEW TRANSLATION
 AST_specialize_on_jungle_combat: "Specializovat na boj v džungli" # todo: NEW TRANSLATION
 AST_specialize_on_desert_combat: "Specializovat na boj v poušti" # todo: NEW TRANSLATION
 AST_switch_combat_specialization: "Přepnout specializaci boje" # todo: NEW TRANSLATION
 AST_special_forces_cat: "Výcvik speciálních sil" # todo: NEW TRANSLATION
 AST_you_can_switch_sf: "Budete moci mezi specializacemi přepínat." # todo: NEW TRANSLATION
 AST_training_camps_specialization: "Naše výcvikové tábory jsou připraveny nabídnout odborný výcvik našim jednotkám a zvýšit jejich účinnost v různých válčištích." # todo: NEW TRANSLATION
