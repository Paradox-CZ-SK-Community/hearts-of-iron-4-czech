 AST_afm_decisions_fascism_upgrade_tt: "\nVylepšit denní zisk podpory fašismu rozhodnutí §YAustralia First Movement§!.\n\n" # todo: NEW TRANSLATION
 AST_afm_decisions_autonomy_upgrade_tt: "\nVylepšit získávání autonomie rozhodnutí §YAustralia First Movement§!.\n\n" # todo: NEW TRANSLATION
 AST_vichy_out_of_africa_cat: "Vichy pryč z Afriky" # todo: NEW TRANSLATION
