 SIA_public_credit_repayment: "Splacení veřejného úvěru"
 SIA_public_credit_repayment_tt: "Splatíme celý náš dluh z veřejného úvěru najednou, čímž odstraníme veškerý dluh za cenu velkého dočasného postihu k §Yspotřebnímu zboží§!."
 idea_SIA_deficit_spending: "Deficitní výdaje"
 idea_SIA_deficit_spending_desc: "Vláda utrácí nad své možnosti a směřuje vypůjčené prostředky do zrychleného stavebního programu. Průmyslové zisky jsou skutečné, ale účty jednou přijdou."
 SIA_print_additional_money: "Vytisknout další peníze"
 SIA_print_additional_money_tt: "Vytiskneme pro Japonsko ještě více peněz."
 SIA_appeal_to_industrialists: "Obrátit se na průmyslníky"
 SIA_implement_industrialists_reforms_countdown: "Provést reformy průmyslníků"
 SIA_implement_industrialists_reforms_countdown_trigger: "Vybudujte §Y2 civilní továrny§! (kromě továren získaných ze zaměření a obchodu)"
 SIA_appeal_to_industrialists_tt: "Získáme podporu průmyslníků.\n\nPomohou nám v občanské válce a poskytnou nám dodatečné vybavení. Budou však očekávat, že rozšíříme svou průmyslovou základnu vybudováním §Y2§! dodatečných §Ycivilních továren§! z továren, které budeme mít na konci občanské války, do §Y720 dní§! od získání moci (kromě továren získaných ze zaměření nebo obchodu). \n\nPokud tak neučiníme, utrpíme zásah do §Ystability§! a §Yválečné podpory§!\n\nNa začátku občanské války získáme: "
 SIA_seek_support_from_constitutional_monarchists: "Hledat podporu u konstitučních monarchistů"
 SIA_implement_constitutionalist_reforms_countdown: "Provést konstitucionalistické reformy"
 SIA_seek_support_from_constitutional_monarchists_tt: "Získáme podporu konstitučních monarchistů.\n\nPomohou nám v občanské válce vytvořením dodatečných divizí. Budou však očekávat, že zůstaneme konstituční monarchií dokončením zaměření §Y$SIA_a_constitutional_monarchy$§! do §Y720 dní§! od získání moci.\n\nPokud tak neučiníme, utrpíme zásah do §Ystability§! a §Yválečné podpory§!"
 SIA_appeal_to_rural_people: "Obrátit se na venkovský lid"
 SIA_appeal_to_rural_people_tt: "Získáme podporu venkovského lidu.\n\nPomůže nám v občanské válce poskytnutím milicí. Bude však očekávat, že mu na oplátku schválíme prospěšnou zemědělskou politiku dokončením buď zaměření §Y$SIA_mechanization_of_agriculture$§!, nebo §Y$SIA_reduction_of_agricultural_yield_taxes$§! do §Y720 dní§! od získání moci.\n\nPokud tak neučiníme, utrpíme zásah do §Ystability§! a §Yválečné podpory§!\n\nNa začátku občanské války získáme: "
 SIA_implement_rural_reforms_countdown: "Provést venkovské reformy"
 SIA_implement_absolutist_reforms_countdown: "Provést absolutistické reformy"
 SIA_seek_support_from_absolutists_monarchists: "Hledat podporu u absolutistických monarchistů"
 SIA_seek_support_from_absolutists_monarchists_tt: "Získáme podporu absolutistických monarchistů.\n\nPomohou nám v občanské válce vytvořením dodatečných divizí. Budou však očekávat, že se vrátíme k absolutní monarchii dokončením zaměření §Y$SIA_an_absolute_monarchy$§! do §Y720 dní§! od získání moci.\n\nPokud tak neučiníme, utrpíme zásah do §Ystability§! a §Yválečné podpory§!"
 SIA_appeal_to_navy_clique: "Obrátit se na námořní kliku"
 SIA_appeal_to_navy_clique_countdown: "Provést námořní reformy"
 SIA_appeal_to_navy_clique_tt: "Získáme podporu námořní kliky.\n\nPomůže nám v občanské válce tím, že nám poskytne celé naše námořnictvo a divizi námořní pěchoty. Bude však očekávat, že schválíme prospěšnou námořní politiku dokončením zaměření §Y$SIA_thonburi_class_coastal_defense_ship$§! do §Y720 dní§! od získání moci.\n\nPokud tak neučiníme, utrpíme zásah do §Ystability§! a §Yválečné podpory§!\n\nNa začátku občanské války získáme:\n§Ycelé naše námořnictvo§!\nDivizi námořní pěchoty §YKrálovského thajského sboru námořní pěchoty§!\nTechnologii §Ynámorní pěchoty§!"
 SIA_appeal_for_support_cat: "Žádost o podporu"
 SIA_appeal_for_support_cat_desc: "Žádné politické hnutí neuspěje samo. Monarchisté, konstitucionalisté, vojáci i civilisté mají každý vliv nad částí země. Jejich podporu musíme pečlivě pěstovat, máme-li mít sílu jednat, až přijde vhodný okamžik."
 SIA_demand_independence: "Požadovat nezávislost pro §Y[FROM.GetName]§! na §Y[FROM.OVERLORD.GetNameDef]§!"
 SIA_demand_independence_VIN: "Požadovat uvolnění §Y[VIN.GetName]§!"
 SIA_demand_independence_VIN_tt: "Budeme požadovat, aby správci [VIN.GetName] tuto zemi osvobodili"
 SIA_demand_independence_LAO: "Požadovat uvolnění §Y[LAO.GetName]§!"
 SIA_demand_independence_LAO_tt: "Budeme požadovat, aby správci [LAO.GetName] tuto zemi osvobodili"
 SIA_demand_independence_CAM: "Požadovat uvolnění §Y[CAM.GetName]§!"
 SIA_demand_independence_CAM_tt: "Budeme požadovat, aby správci [CAM.GetName] tuto zemi osvobodili"
 SIA_invite_to_adc: "Pozvat §Y[FROM.GetName]§! do naší frakce"
 SIA_asian_democratic_compact_cat: "Asijský demokratický pakt"
 SIA_asian_democratic_compact_cat_desc: "Národy Asie mají právo si vládnout samy. Jako nositelé praporu asijského sebeurčení můžeme vyvíjet nátlak na koloniální mocnosti, aby uvolnily národy, které drží."
 SIA_khana_ratsadon_cat: "Khana Ratsadon"
 SIA_khana_ratsadon_cat_desc: "Khana Ratsadon, Lidová strana, která ukončila absolutní monarchii, není monolit. Její vojenské a civilní křídlo mají každé vlastní vizi země a napětí mezi nimi se skrývá pod povrchem každého rozhodnutí. Udržte obě frakce spokojené, jinak riskujete, že se koalice roztrhá na kusy."
 SIA_army_navy_reform_cat: "Armáda a námořnictvo"
 SIA_army_navy_reform_cat_desc: "Armáda a námořnictvo soupeří o stejný omezený zdroj prostředků. Přesouvání financí mezi oběma složkami je neustálým balancováním, při němž má každé přerozdělení důsledky pro připravenost té druhé."
 SIA_divert_army_funds_to_navy_toggle: "[SIA_GetDivertingArmyFundsToNavyTitle]"
 SIA_divert_army_funds_to_navy_toggle_tt: "[SIA_GetDivertingArmyFundsToNavyTT]"
 SIA_divert_army_funds_to_navy_toggle_do: "Přesměrovat armádní prostředky k námořnictvu"
 SIA_divert_army_funds_to_navy_toggle_do_tt: "Přesměrujeme část našich armádních prostředků k námořnictvu, abychom urychlili jeho rozvoj."
 SIA_divert_army_funds_to_navy_toggle_undo: "Přestat přesměrovávat armádní prostředky k námořnictvu"
 SIA_divert_army_funds_to_navy_toggle_undo_tt: "Již nebudeme přesměrovávat část našich armádních prostředků k námořnictvu."
 SIA_standing_our_ground_mission: "Držíme své pozice"
 SIA_standing_our_ground_mission_tt: "Musíme bojovat za svou svobodu."
 SIA_sway_generals_to_seri_thai: "Přiklonit generály k Seri Thai"
 SIA_sway_generals_to_seri_thai_tt: "K našemu povstání se připojí více členů generálního štábu."
 SIA_khana_ratsadon_dummy_military: "Riziko vojenského puče"
 SIA_khana_ratsadon_dummy_military_tt: "Armáda zahájí puč, pokud si ji příliš znepřátelíme. Abychom se vyhnuli občanské válce, neměli bychom mít příliš dlouho §Y$idea_SIA_military_rebellious$§!."
 SIA_khana_ratsadon_dummy_military_desc: "Armáda je mocnou klikou strany Khana Ratsadon. Nebude schvalovat politiku, kterou považuje za odporující svým zájmům, ale schvaluje kroky, které vnímá jako podporující militarizaci země."
 SIA_khana_ratsadon_military_coup_mission: "Armáda plánuje svržení vlády!"
 SIA_khana_ratsadon_military_coup_mission_desc: "Armáda považuje současnou vládní politiku za hrozbu pro své zájmy. Aktivně plánuje sesadit vládu, pokud se její postavení nezlepší."
 SIA_khana_ratsadon_dummy_civilian: "Riziko puče civilního křídla"
 SIA_khana_ratsadon_dummy_civilian_tt: "Civilní křídlo zahájí puč, pokud si je příliš znepřátelíme. Abychom se vyhnuli občanské válce, neměli bychom mít příliš dlouho §Y$idea_SIA_civilian_rebellious$§!."
 SIA_khana_ratsadon_dummy_civilian_desc: "Civilní křídlo je mocnou klikou strany Khana Ratsadon. Nebude schvalovat politiku, kterou považuje za odporující svým zájmům, ale schvaluje kroky, které vnímá jako prodemokratické a procivilní."
 SIA_khana_ratsadon_civilian_coup_mission: "Civilní křídlo plánuje svržení vlády!"
 SIA_khana_ratsadon_civilian_coup_mission_desc: "Civilní křídlo považuje současnou vládní politiku za hrozbu pro své zájmy. Aktivně plánuje sesadit vládu, pokud se jeho postavení nezlepší."
 NZL_mangahao_power_scheme: "Energetický projekt Mangahao"
 NZL_waitaki_power_station: "Elektrárna Waitaki"
 AST_communism_support_text: "[?party_popularity_100@communism|Y]% podpora komunismu"
 AST_union_control_1_cat: "Kontrola odborů"
 AST_union_control_1_cat_desc: "Naši členové odborů začali mobilizovat podporu mezi širokým obyvatelstvem napříč Austrálií. Můžeme proniknout do zákonodárných sborů v jednotlivých státech a zevnitř budovat podporu pro vládu vedenou komunisty. Bude to stát značné množství politické síly a hrozí destabilizací národa. \n\nVeteráni Nové gardy naše kroky bedlivě sledují, a pokud vláda včas nezasáhne nebo se národ stane příliš nestabilním, tento konflikt by mohl zemi zcela roztrhat.\n\nPodpora komunismu: [?party_popularity_100@communism|Y]§Y%§!\n\n§RObčanská válka vypukne, pokud stabilita klesne pod 40 %, nebo pokud vyprší čas na vzpouru veteránů.§!"
 AST_veterans_revolt_stability_tt: "Stabilita je vyšší než §Y40 %§! (pokles pod tuto hodnotu způsobí občanskou válku!)"
 AST_union_control_1_cat_name: "Vyberte, kde podnítit odbory k naší podpoře"
 AST_union_control_1_map_area_name: "Státy, které lze ještě ovlivnit"
 AST_nationalizing_cat: "Znárodnění"
 AST_union_control_2_cat: "Kontrola odborů"
 AST_union_control_2_cat_desc: "Dělníci země [ROOT.GetNonIdeologyName] nesvrhli své utlačovatele jen proto, aby sledovali, jak imperiální mocnosti dál drží naše soudruhy v zámoří v okovech. Šíření komunismu za našimi hranicemi není jen ideologickým cílem, ale strategickou nezbytností. Musíme rozdmýchat plameny revoluce za oceány, dát naději a zdroje těm, kdo chtějí setřást jho imperialismu, dokud starý řád neztratí poslední půdu pod nohama."
 AST_union_control_2_foreign_cat: "Potlačit komunismus"
 AST_union_control_tt: "Odbory se musí prosadit ve státech napříč Austrálií, veteráni Nové gardy se však snaží šíření komunismu překazit."
 AST_seize_local_leadership_in_state_major: "Převzít místní vedení ve státě [FROM.GetName]"
 AST_seize_local_leadership_in_state_mid: "Převzít místní vedení ve státě [FROM.GetName]"
 AST_seize_local_leadership_in_state_low: "Převzít místní vedení ve státě [FROM.GetName]"
 AST_seize_local_leadership_in_queensland: "Převzít místní vedení v Queenslandu"
 AST_union_strike: "Zorganizovat stávku"
 AST_union_strike_desc: "Naši dělníci odešli ze svých pracovišť a požadují lepší podmínky a práva. To na vládu jistě vyvine nátlak, aby zavedla nové reformy."
 AST_veterans_revolt: "Vzpoura veteránů"
 AST_veterans_revolt_desc: "V armádě je mnoho antikomunistů, z nichž mnozí dříve patřili k fašistickým skupinám. Komunismem pohrdají a raději se chopí zbraní, než aby ho viděli dostat se k moci.\nPokud nám uskutečnění revoluce potrvá příliš dlouho nebo necháme stabilitu klesnout příliš nízko, vezmou věci do vlastních rukou, aby jí zabránili."
 AST_organize_in_nation: "Infiltrovat odbory v zemi §Y[FROM.GetName]§!"
 AST_organize_in_nation_desc: "Dělnické hnutí nezná hranice. Směrováním zdrojů do sítí našich soudruhů můžeme komunistické organizátory zapustit do odborů země [FROM.GetName] a budovat podporu revoluce zdola v rámci dělnické třídy."
 AST_civil_war_in_nation: "Podnítit revoluci v zemi §Y[FROM.GetName]§!"
 AST_civil_war_in_nation_desc: "Semena, která jsme zaseli, jsou připravena nést plody. Komunistická podpora v zemi [FROM.GetName] vzrostla natolik, že otevřená revoluce je na dosah. S financováním, agitátory a pečlivě načasovaným tlakem můžeme proměnit lidovou nespokojenost v ozbrojené povstání a přivést [FROM.GetName] o krok blíže k dělnickému státu, který si zaslouží."
 AST_take_it_to_foreign_streets: "Zorganizovat mezinárodní pochod dělnické solidarity"
 AST_take_it_to_foreign_streets_desc: "Dělníci nemají hranice. Zahájíme koordinovanou mezinárodní kampaň a vyšleme australské komunistické organizátory do ulic každého národa, kde se náš vliv již uchytil, abychom oživili místní hnutí a udrželi plamen revoluce při životě."
 AST_take_it_to_foreign_streets_tt: "Prodlouží trvání zahraničního komunistického vlivu o 60 dní ve všech aktuálně infiltrovaných zemích."
 AST_raj_locked_tt: "Rádž nemůže být cílem, dokud Nový Zéland, Malajsko, Barma, Filipíny a Indonésie nepadnou pod komunistickou vládu."
 AST_supply_arms_to_nation: "Dodat zbraně zemi §Y[FROM.GetName]§!"
 AST_supply_arms_to_nation_desc: "Dodáme zbraně našim soudruhům"
 AST_strikes_tt: "§Y$AST_workers_educational_association$§!, §Y$AST_off_leash$§!, §Y$AST_a_national_housing_commission$§!, §Y$AST_guaranteed_employment$§! a §Y$AST_equal_pay$§! budete moci dokončit pouze během probíhající stávky."
 AST_nationalization: "Zahájit znárodnění"
 AST_nationalizing_process_tt: "Umožní rozhodnutí §YZahájit znárodnění§!, které uplatní §YProbíhající znárodnění§!. Vyžadováno pro níže uvedená zaměření a odstraněno po dokončení §YVeřejné Austrálie§!. §RNezvolená zaměření budou poté uzamčena!§!"
 AST_nationalization_underway_tt: "§YProbíhající znárodnění§! \nVýstup továren: §R-30 %§! \nVýstup loděnic: §R-30 %§!"
 AST_nationalizing_process_ends_tt: "§RPřijetí tohoto zaměření uzamkne všechna výše uvedená zaměření!§!"
