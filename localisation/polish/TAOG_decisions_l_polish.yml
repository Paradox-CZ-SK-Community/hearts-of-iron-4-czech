 SIA_limited_war_indochina: "[SIA_GetLimitedWarTarget]" # todo: NEW TRANSLATION
 SIA_limited_war_indochina_desc: "Ovládněte všechny zvýrazněné státy, abyste vyhráli §YOmezenou válku§! a získali je bez eskalace do plné války.\n§RProhrát více než [?var:global.limited_war_surrender_threshold|%.0] postupu kapitulace znamená prohrát omezenou válku§!" # todo: NEW TRANSLATION
