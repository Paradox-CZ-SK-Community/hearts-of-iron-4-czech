l_polish:
 HOL_recall_conrad_helfrich: "Povolat Conrada Helfricha z Indií"
 HOL_recall_conrad_helfrich_desc: "V těchto naléhavých časech musíme upřednostnit vlast nade vše ostatní. Conrad Helfrich se jako nejlepší admirál Královského nizozemského námořnictva musí vrátit do Nizozemska."
 INS_is_taking_volksraad: "Právě schvaluje zákon ve Volksraadu"
 INS_volksraad_cat: "Volksraad"
 INS_volksraad_cat_desc: "Lidová rada, v nizozemštině známá jako Volksraad, byla zřízena roku 1918 jako pokus přinést do Východní Indie demokracii v rámci provádění takzvané „etické politiky“. Křesla obsazují nizozemští i indonéští úředníci, vybíraní různými způsoby. Ačkoli si Nizozemsko ponechává bezpodmínečné právo veta, Volksraad může vládě předkládat návrhy a zákony."
 INS_volksraad_allow_language_in_schools: "Povolit indonéštinu ve školách"
 INS_volksraad_allow_language_in_schools_desc: "Přístup k vyššímu vzdělání v Indiích je z velké části omezen na Nizozemce a bohaté vrstvy Indonésanů, kteří mluví nizozemsky, protože právě v tomto jazyce se vyšší vzdělání vyučuje. Probíhající návrh ve Volksraadu na otevření škol s indonéským vyučovacím jazykem čeká na hlasování generálního guvernéra."
 INS_volksraad_allow_language_in_government: "Povolit indonéštinu ve vládě"
 INS_volksraad_allow_language_in_government_desc: "Vládní funkce v Indiích, včetně Volksraadu, vyžadují plynulou znalost nizozemštiny, což vedlo mnoho členů Volksraadu, zejména zástupce domorodých komunit, ke zpochybnění skutečné demokratičnosti tohoto orgánu. Předložili návrh, který trvá na tom, aby vládní pozice mohli tam, kde je to možné, zastávat i mluvčí indonéštiny."
 INS_volksraad_remove_education_quotas: "Zrušit systém vzdělávacích kvót"
 INS_volksraad_remove_education_quotas_desc: "Vzdělávací systém ve Východní Indii v současnosti funguje pomocí vzdělávacích kvót, podle nichž musí být přijat určitý počet indonéských studentů a určitý počet nizozemských studentů. Ve Volksraadu to vyvolává spory kvůli rozšířenému přesvědčení, že systém je nespravedlivě vychýlen ve prospěch Nizozemců. Mohli bychom nechat Volksraad další roky debatovat o reformě systému, ale možná bude lepší kvótní systém zcela zrušit."
 INS_volksraad_reduce_rubber_export_tax: "Snížit daň ze soukromého vývozu kaučuku"
 INS_volksraad_reduce_rubber_export_tax_desc: "Na soukromé společnosti vyvážející kaučuk je v současnosti uvalena mimořádně vysoká daň, díky níž si udržujeme monopol nad trhem. To však v některých regionech vedlo k hospodářské stagnaci, protože soukromé plantáže nemohou fungovat. V době zavedení to bylo považováno za opodstatněné, ale mezinárodní protekcionismus vyvolaný velkou hospodářskou krizí učinil naši ekonomiku vývozu kaučuku mnohem méně výnosnou. Možná stojí za to daň snížit, abychom povzbudili hospodářství."
 INS_volksraad_knil_rank_limit: "Přijmout antidiskriminační zákony pro vojenské hodnosti"
 INS_volksraad_knil_rank_limit_desc: "Ačkoli neexistuje žádné formální pravidlo, které by indonéským domorodcům bránilo postupovat v hodnostech KNIL, platí zde nepsané pravidlo, které jim v tom brání a omezuje i ty nejschopnější vojáky tak, že nemohou postoupit nad hodnost plukovníka. Několik stran ve Volksraadu tlačí na vládu, aby uznala úsilí výkonných indonéských důstojníků."
 INS_volksraad_legalize_displaying_flag: "Legalizovat vyvěšování červeno-bílé vlajky"
 INS_volksraad_legalize_displaying_flag_desc: "Červeno-bílou vlajku „Indonésie“ je v současnosti kvůli jejím vazbám na nacionalistické a protikoloniální organizace zakázáno veřejně vyvěšovat. Legalizace jejího vyvěšování by pravděpodobně ukázala naši ochotu spolupracovat a zastavila pokračující radikalizaci nacionalistů napříč souostrovím."
 INS_volksraad_education_subsidies_for_indonesians: "Otevřít vzdělávací dotace nenizozemským obyvatelům"
 INS_volksraad_education_subsidies_for_indonesians_desc: "Ve Volksraadu probíhá debata o dotacích a stipendiích poskytovaných nizozemským studentům ve Východní Indii. Několik zástupců domorodých komunit ve Volksraadu tvrdí, že tento systém by měl být rozšířen na všechny studenty bez ohledu na původ. Získalo by nám to u obyvatelstva mnoho dobré vůle, i když by to nebylo levné."
 INS_volksraad_indonesian_national_language: "Učinit indonéštinu oficiálním národním jazykem"
 INS_volksraad_indonesian_national_language_desc: "Indonéština se v mnoha částech souostroví stala společným jazykem, který přemosťuje jazykové rozdíly mezi několika kulturami. Nyní, když je indonéština povolena ve vzdělávání a ve vládních funkcích, mnoho zástupců Volksraadu žádá její zákonné uznání jako oficiálního jazyka kolonie se stejným postavením jako nizozemština."
 INS_volksraad_official_flag: "Učinit indonéskou vlajku oficiální"
 indonesia_volksraad_official_flag_effect_tt: "Naše vlajka bude změněna na červeno-bílou vlajku."
 INS_volksraad_official_flag_desc: "Návrhy ve Volksraadu prosazující autonomii nakonec uspěly a to, čemu se ještě před několika lety říkalo Nizozemská východní Indie, je nyní Indonéské dominium. Naše vlajka by měla být upravena tak, aby tyto změny odrážela."
 indonesia_volksraad_passed_6: "Přijal antidiskriminační zákony v armádě"
 INS_autonomy_indonesian_in_schools: "Indonéština povolena ve školách"
 INS_autonomy_indonesian_in_govenment: "Indonéština povolena ve vládě"
 INS_autonomy_no_education_quotas: "Vzdělávací kvóty zrušeny"
 INS_autonomy_reduced_rubber_tax: "Daň z vývozu kaučuku snížena"
 INS_autonomy_knil_rank_limit: "V armádě přijaty antidiskriminační zákony"
 INS_autonomy_flag_legalized: "Vyvěšování červeno-bílé vlajky legalizováno"
 INS_autonomy_education_subsidies: "Vzdělávací dotace dostupné pro Indonésany"
 INS_autonomy_national_language: "Indonéština uznána"
 INS_autonomy_official_flag: "Indonéská vlajka v používání"
 INS_sukarno_is_dead: "Sukarno je mrtvý"
 INS_atjeh_management: "Policejní akce v Atjehu"
 INS_atjeh_management_2: "Integrovat Atjeh"
 INS_soetardjo_petition: "Soetardjova petice čeká na schválení"
 INS_soetardjo_petition_desc: "Konference u kulatého stolu, kterou Soetardjo požadoval, se uskutečnila a dospěla k závěru, že [INS.GetNameDef] musí splnit řadu hospodářských požadavků, aby zajistila soběstačnost. Musíme prokázat jasný pokrok k těmto cílům, jinak [HOL.GetNameDef] nakonec toto rozhodnutí zvrátí, aby zachovalo současný stav."
 INS_soetardjo_petition_refresh_tt: "Znovu aktivuje misi: §YSoetardjova petice čeká na schválení§! s trváním §Y120 dní§!."
 INS_soetardjo_pending: "Volksraad projednává Soetardjovu petici za autonomii"
 INS_soetardjo_pending_desc: "Soetardjo je člen Volksraadu známý vedením mírového nacionalistického hnutí. V současnosti organizuje petici požadující, aby [INS.GetNameDef] získala větší autonomii a aby byla mezi nizozemskými a indonéskými zástupci uspořádána konference u kulatého stolu, která by projednala přání Indonésanů stát se autonomní součástí nizozemského commonwealthu. Tato petice je právě projednávána ve Volksraadu. Jakmile tyto debaty skončí, musíme rozhodnout, jak zareagovat, protože důsledky petice jsou velmi významné."
 INS_flag_legalized: "Červeno-bílou vlajku je legální vyvěšovat"
 INS_owned_states_at_game_start_tt: "Všechny indonéské státy"
 INS_win_condition_base_republic_warning: "Zničit Východní Indii"
 INS_win_condition_base_republic_warning_desc: "Musíme dál bojovat, rekrutovat civilisty a zajistit, aby oheň v každé indonéské duši nepřestal hořet. Jakmile svrhnieme správu Indií, [HOL.GetNameDef] nebude mít jinou možnost než se vzdát."
 INS_win_condition_base_republic_real: "Zničit Východní Indii"
 INS_win_condition_base_republic_real_desc: "Musíme dál bojovat, rekrutovat civilisty a zajistit, aby oheň v každé indonéské duši nepřestal hořet. Jakmile svrhnieme správu Indií, [HOL.GetNameDef] nebude mít jinou možnost než se vzdát."
 will_complete_when_conditions_met_tt: "Toto bude automaticky vybráno, jakmile budou splněny předpoklady."
 INS_militias_cat: "Laskar Rakyat"
 INS_militias_basic_summon: "Mobilizovat civilisty"
 INS_militias_basic_summon_desc: "Naverbujeme mladé dospělé a studenty zapálené pro indonéskou nezávislost, aby se připojili k TKR jako ozbrojené milice."
 INS_militias_kris_repayment: "Milice KRIS požadují investice na Sulawesi"
 INS_militias_di_mission: "Darul Islam požaduje zastoupení"
 INS_militias_jakarta_pemuda_mission: "Jakartští pemudové požadují lepší vzdělání"
 INS_militias_railway_pemuda_mission: "Železniční mládežnické síly požadují boj"
 INS_revolution_planning_cat: "Podzemní revoluce"
 INS_revolution_planning_hq: "Zřídit revoluční velitelství ve státě [FROM.GetName]"
 INS_revolution_planning_hq_desc: "Zřídíme naše velitelství milicí ve státě [FROM.GetName], které bude fungovat jako naše ústřední velení pro základny milicí napříč souostrovím. Naše velitelství a jeho okolní území budou mít v infiltračních misích prioritu a budou pevně pod naší kontrolou."
 INS_revolution_planning_hq_tt: "Vybudoval nejvýše §Y3§! revoluční velitelství"
 INS_revolution_planning_hq_DONE: "Revoluční velitelství"
 INS_revolution_planning_hq_DONE_desc: "Toto je naše revoluční velitelství, kam se hlásí naše milice. Tento stát bude po vyhlášení nezávislosti pod naší kontrolou."
 INS_revolution_planning_hq_DONE_trigger_tt: "Lze zřídit pouze jedno velitelství"
 INS_revolution_planning_envoy_DONE_trigger_tt: "Ve stejném státě nelze zřídit více základen"
 INS_revolution_planning_envoy_DONE: "Základna milicí ve státě [FROM.GetName]"
 INS_has_revolutionary_hq: "Zřídil revoluční velitelství"
 INS_revolution_planning_influence_state: "Zřídit základnu milicí ve státě [FROM.GetName]"
 INS_revolution_planning_influence_state_desc: "Vyšleme milice do státu [FROM.GetName], aby zde zřídily základnu milicí a zajistily, že místní revolucionáři budou schopni komunikovat s velitelstvím a snáze provádět operace, jakmile vyhlásíme nezávislost."
 INS_revolution_planning_cat_map_name: "Vyberte, kde spravovat aktivitu milicí"
 INS_state_revolution_hq_tt: "Stát bude po vyhlášení nezávislosti pod naší kontrolou"
 INS_hq_warning: "§W§RUmístění našeho velitelství sem je obtížné a vyčerpá většinu našich zdrojů.§!§!"
 INS_revolution_points_remaining_tt: "Může vybudovat alespoň §Y1§! další základnu milicí, aktuálně zbývá §Y[?INS_revolution_points_remaining]§!"
 INS_revolution_planning_influence_state_points_notif_tt: "Budeme moci zřídit základnu milicí v dalších §Y[?INS_starting_revolution_points_count]§! §Rnejávských§! státech."
 INS_revolution_planning_influence_state_points_notif_tt_1: "Budeme moci zřídit základnu milicí už jen v §Y1§! dalším §Rnejávském§! státě."
 INS_revolution_point_spend_tt: "Ve státě [FROM.GetName] je zřízena základna milicí"
 INS_revolution_points_in_state_tt: "[FROM.GetName] již nemá základnu milicí"
