 AST_communism_support_text: "[?party_popularity_100@communism|Y]% podpora komunismu" # todo: NEW TRANSLATION
 AST_union_control_1_cat: "Kontrola odborů" # todo: NEW TRANSLATION
 AST_union_control_1_cat_desc: "Naši členové odborů začali mobilizovat podporu mezi obyvatelstvem po celé Austrálii. Můžeme infiltrací obsazovat zákonodárné sbory v jednotlivých státech a budovat podporu pro komunistickou vládu zevnitř. To bude stát značné množství politické síly a hrozí destabilizací národa.\n\nVeteráni New Guard bedlivě sledují naše kroky a pokud vláda nestihne zasáhnout včas nebo se země stane příliš nestabilní, tento konflikt by mohl zemi roztrhat.\n\nPodpora komunismu: [?party_popularity_100@communism|Y]§Y%§!\n\n§RObčanská válka propukne, pokud stabilita klesne pod 40%, nebo pokud vyprší čas na Vets Revolt.§!" # todo: NEW TRANSLATION
 AST_veterans_revolt_stability_tt: "Stabilita je nad §Y40%§! (pokles pod způsobí občanskou válku!)" # todo: NEW TRANSLATION
 AST_union_control_1_cat_name: "Vyberte, kde rozdmýchat odbory ve vaší podpoře" # todo: NEW TRANSLATION
 AST_union_control_1_map_area_name: "Státy, které lze ještě ovlivnit" # todo: NEW TRANSLATION
 AST_nationalizing_cat: "Nacionalizace" # todo: NEW TRANSLATION
 AST_union_control_2_cat: "Kontrola odborů" # todo: NEW TRANSLATION
 AST_union_control_2_cat_desc: "Dělníci [ROOT.GetNonIdeologyName] nevystřídali své utlačovatele jen proto, aby pozorovali, jak impéria dál drží naše soudruhy v zahraničí v řetězech. Šíření komunismu za naše hranice není pouze ideologický cíl, je to strategická nutnost. Musíme rozdmychat plamen revoluce za mořem, dávat naději a zdroje těm, kdo by se zbavili jha imperialismu, dokud starý řád nemá kam se opřít." # todo: NEW TRANSLATION
 AST_union_control_2_foreign_cat: "Potlačit komunismus" # todo: NEW TRANSLATION
 AST_union_control_tt: "Odbory se musí etablovat v australských státech, přičemž veteráni New Guard pracují na tom, aby šíření komunismu zabránili." # todo: NEW TRANSLATION
 AST_seize_local_leadership_in_state_major: "Uchopit místní vedení v [FROM.GetName]" # todo: NEW TRANSLATION
 AST_seize_local_leadership_in_state_mid: "Uchopit místní vedení v [FROM.GetName]" # todo: NEW TRANSLATION
 AST_seize_local_leadership_in_state_low: "Uchopit místní vedení v [FROM.GetName]" # todo: NEW TRANSLATION
 AST_seize_local_leadership_in_queensland: "Uchopit místní vedení v Queenslandu" # todo: NEW TRANSLATION
 AST_union_strike: "Organizovat stávku" # todo: NEW TRANSLATION
 AST_union_strike_desc: "Naši dělníci vyšli do stávky z požadavku lepších podmínek a práv. To určitě vyvine tlak na vládu, aby zavedla nové reformy." # todo: NEW TRANSLATION
 AST_veterans_revolt: "Vůle veteránů" # todo: NEW TRANSLATION
 AST_veterans_revolt_desc: "Armáda má mnoho antikomunistických členů, mnozí z nich byli dříve součástí fašistických skupin. Pohrdají komunismem a raději vezmou zbraně, než aby ho viděli povstat.\nPokud budeme příliš dlouho v přechodu k revoluci nebo necháme stabilitu příliš klesnout, vezmou věci do svých rukou." # todo: NEW TRANSLATION
 AST_organize_in_nation: "Infiltrujte odbory v §Y[FROM.GetName]§!" # todo: NEW TRANSLATION
 AST_organize_in_nation_desc: "Hnutí dělníků nezná hranic. Směřováním zdrojů do sítí našich soudruhů můžeme vložit komunistické organizátory do odborů [FROM.GetName] a budovat tak základní podporu revoluce." # todo: NEW TRANSLATION
 AST_civil_war_in_nation: "Podnítit revoluci v §Y[FROM.GetName]§!" # todo: NEW TRANSLATION
 AST_civil_war_in_nation_desc: "Semena, která jsme zaseli, jsou připravena nést plody. Podpora komunismu v [FROM.GetName] vyrostla natolik, že otevřená revoluce je na dosah. S financováním, agitátory a správným načasováním můžeme proměnit nespokojenost v ozbrojené povstání a dát [FROM.GetName] krok blíž ke státní moci dělníků, kterou si zaslouží." # todo: NEW TRANSLATION
 AST_take_it_to_foreign_streets: "Organizovat mezinárodní pochod dělnické solidarity" # todo: NEW TRANSLATION
 AST_take_it_to_foreign_streets_desc: "Dělníci nemají hranice. Spustíme koordinovanou mezinárodní kampaň a pošleme australské komunistické organizátory do ulic všech zemí, kde již máme vliv, oživíme místní hnutí a udržíme plamen revoluce." # todo: NEW TRANSLATION
 AST_take_it_to_foreign_streets_tt: "Prodlužuje dobu zahraniční komunistické infiltrace o 60 dní ve všech právě infiltrovaných zemích." # todo: NEW TRANSLATION
 AST_raj_locked_tt: "Ráj nelze cílit dokud Nový Zéland, Malajsie, Barma, Filipíny a Indonésie nespadnou pod komunistickou vládu." # todo: NEW TRANSLATION
 AST_supply_arms_to_nation: "Dodat zbraně do §Y[FROM.GetName]§!" # todo: NEW TRANSLATION
 AST_supply_arms_to_nation_desc: "Dodáme zbraně našim soudruhům" # todo: NEW TRANSLATION
 AST_strikes_tt: "Dokončit můžete pouze §Y$AST_workers_educational_association$§!, §Y$AST_off_leash$§!, §Y$AST_a_national_housing_commission$§!, §Y$AST_guaranteed_employment$§!, a §Y$AST_equal_pay$§! zatímco stávka probíhá." # todo: NEW TRANSLATION
 AST_nationalization: "Zahájit nacionalizaci" # todo: NEW TRANSLATION
 AST_nationalizing_process_tt: "Umožní rozhodnutí §YZahájit nacionalizaci§!, aplikuje §YNacionalizace v běhu§!. Požadováno pro níže uvedená zaměření a odstraněno po dokončení §YLidova Austrálie§!. §RNezvolené zaměření budou následně zamčeny!§!" # todo: NEW TRANSLATION
 AST_nationalization_underway_tt: "§YNacionalizace v běhu§! \nVýroba továren: §R-30%§! \nVýroba loděnic: §R-30%§!" # todo: NEW TRANSLATION
