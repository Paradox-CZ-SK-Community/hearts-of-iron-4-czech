 SIA_divert_army_funds_to_navy_toggle_do: "Přesměrovat prostředky armády k námořnictvu" # todo: NEW TRANSLATION
 SIA_divert_army_funds_to_navy_toggle_do_tt: "Přesměrujeme část našich armádních prostředků k námořnictvu, aby jeho rozvoj zrychlil." # todo: NEW TRANSLATION
 SIA_divert_army_funds_to_navy_toggle_undo: "Neručit více armádní prostředky k námořnictvu" # todo: NEW TRANSLATION
 SIA_divert_army_funds_to_navy_toggle_undo_tt: "Už nebudeme přesměrovávat část armádních prostředků k námořnictvu." # todo: NEW TRANSLATION
 SIA_standing_our_ground_mission: "Stát pevně na místě" # todo: NEW TRANSLATION
 SIA_standing_our_ground_mission_tt: "Musíme bojovat za naši svobodu." # todo: NEW TRANSLATION
 SIA_sway_generals_to_seri_thai: "Přesvědčit generály k Seri Thai" # todo: NEW TRANSLATION
 SIA_sway_generals_to_seri_thai_tt: "Více generálního štábu se připojí k našemu povstání." # todo: NEW TRANSLATION
 SIA_khana_ratsadon_dummy_military: "Riziko vojenského převratu" # todo: NEW TRANSLATION
 SIA_khana_ratsadon_dummy_military_tt: "Armáda spustí převrat, pokud ji příliš rozhněváme. Abychom se vyhnuli občanské válce, neměli bychom příliš dlouho mít §Y$idea_SIA_military_rebellious$§!." # todo: NEW TRANSLATION
 SIA_khana_ratsadon_dummy_military_desc: "Armáda je mocná klika strany Khana Ratsadon. Neschvaluje politiky, které považuje za proti jejím zájmům, a schvaluje ty, které vnímá jako pro-militarizaci země." # todo: NEW TRANSLATION
 SIA_khana_ratsadon_military_coup_mission: "Armáda plánuje sesadit vládu!" # todo: NEW TRANSLATION
 SIA_khana_ratsadon_military_coup_mission_desc: "Armáda považuje současné vládní politiky za hrozbu svým zájmům. Aktivně plánuje svrhnout vládu, pokud jejich postavení nezlepší." # todo: NEW TRANSLATION
 SIA_khana_ratsadon_dummy_civilian: "Riziko převratu civilního křídla" # todo: NEW TRANSLATION
 SIA_khana_ratsadon_dummy_civilian_tt: "Civilní křídlo spustí převrat, pokud jej příliš rozhněváme. Abychom se vyhnuli občanské válce, neměli bychom příliš dlouho mít §Y$idea_SIA_civilian_rebellious$§!." # todo: NEW TRANSLATION
 SIA_khana_ratsadon_dummy_civilian_desc: "Civilní křídlo je mocná klika Khana Ratsadon. Neschvaluje politiky, které považuje za proti jejich zájmům, ale schvaluje ty, které vnímá jako pro-demokratické a pro-civilní." # todo: NEW TRANSLATION
 SIA_khana_ratsadon_civilian_coup_mission: "Civilní křídlo plánuje sesadit vládu!" # todo: NEW TRANSLATION
 SIA_khana_ratsadon_civilian_coup_mission_desc: "Civilní křídlo považuje současné vládní politiky za hrozbu svým zájmům. Aktivně plánuje svrhnout vládu, pokud jejich postavení nezlepší." # todo: NEW TRANSLATION
