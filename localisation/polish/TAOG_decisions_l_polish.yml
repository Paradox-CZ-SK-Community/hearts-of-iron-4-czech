 SIA_modify_cultural_mandates: "Mění $idea_SIA_thai_cultural_mandates$ o:" # todo: NEW TRANSLATION
 SIA_mandate_1: "Mandát první" # todo: NEW TRANSLATION
 SIA_mandate_1_desc: "Země, lid a národnost se budou nazývat Thai" # todo: NEW TRANSLATION
 SIA_mandate_1_tt: "§Y[THIS.GetName]§! bude známá jako §Y$SIA_thailand$§!" # todo: NEW TRANSLATION
 SIA_mandate_2: "Mandát druhý" # todo: NEW TRANSLATION
 SIA_mandate_2_desc: "Thajští lidé nesmí podnikat žádný obchod bez zvážení prospěchu a bezpečnosti národa\n\nThajští lidé nikdy nesmí nic sdělit cizincům, co by mohlo poškodit národ. Takové jednání je zrádou národa\n\nThajští lidé nesmí jednat jako agent nebo mluvčí cizinců bez zvážení prospěchu thajského národa a nesmí vyjadřovat názor nebo stát na straně cizinců v mezinárodních sporech. Toto je zrada národa.\n\nThajští lidé nesmí tajně nakupovat pozemky jménem cizinců způsobem, který ohrožuje národ. Toto je zrada národa.\n\nKdyž člověk zradil národ, je povinností thajských lidí aktivně a rychle tomu zabránit." # todo: NEW TRANSLATION
 SIA_mandate_3: "Mandát třetí" # todo: NEW TRANSLATION
 SIA_mandate_3_desc: "Přestat označovat thajské lidi nesourodě s názvem národnosti nebo podle preferencí skupiny.\n\nPoužívat název 'Thai' pro všechny thajské lidi bez jejich rozdělování." # todo: NEW TRANSLATION
 SIA_mandate_4: "Mandát čtvrtý" # todo: NEW TRANSLATION
 SIA_mandate_4_desc: "Při vidění státní vlajky zvedané nebo skláněné podle vládního zvyku, při slyšení signálního trubky nebo píšťalky, nebo když je dán signál ke zvednutí či sklopení vlajky, uctěte vlajku podle předpisu nebo zvyku.\n\nKdyž je slyšet státní hymna, ať už při oficiálních účelech nebo při jakémkoli ceremoniálu, účastníci nebo přítomní uctí hymnu podle předpisu nebo zvyku.\n\nPokud někdo neprojevuje patřičný respekt, napomenout ho, aby pochopil důležitost uctívání státní vlajky, hymny a královské hymny." # todo: NEW TRANSLATION
 SIA_mandate_5: "Mandát pátý" # todo: NEW TRANSLATION
 SIA_mandate_5_desc: "Thajští lidé by se měli snažit konzumovat jen potraviny vyrobené z thajských produktů.\n\nThajští lidé by se měli snažit nosit oblečení vyrobené pouze z thajských produktů.\n\nThajští lidé by měli podporovat zemědělské, obchodní, průmyslové a jiné řemeslné snahy svých krajanů.\n\nThajští lidé by měli používat a podporovat veřejné služby zřízené vládou nebo Thajci.\n\nThajští lidé, kteří se věnují zemědělství, obchodu, průmyslu nebo jinému povolání podporovanému tímto mandátem, musí usilovat o udržení standardů, zlepšení kvality a čestné podnikání." # todo: NEW TRANSLATION
 SIA_mandate_6: "Mandát šestý" # todo: NEW TRANSLATION
 SIA_mandate_6_desc: "Hudba státní hymny bude ta, kterou složil Phra Chenduriyang a je uložena v Úřadu krásných umění\n\nText státní hymny budou ty, které předložila armáda" # todo: NEW TRANSLATION
 SIA_mandate_7: "Mandát sedmý" # todo: NEW TRANSLATION
 SIA_mandate_7_desc: "Každý Thajec musí pomáhat budovat národ. Každý schopný člověk musí pracovat v stabilním zaměstnání. Ten, kdo nemá zaměstnání, je pro národ neužitečný a nezaslouží si respekt thajského národa." # todo: NEW TRANSLATION
 SIA_mandate_8: "Mandát osmý" # todo: NEW TRANSLATION
 SIA_mandate_8_desc: "U královské hymny zkrátíme text a nahradíme slovo Siam slovem Thai" # todo: NEW TRANSLATION
 SIA_mandate_9: "Mandát devátý" # todo: NEW TRANSLATION
 SIA_mandate_9_desc: "Thajští lidé musí vychvalovat, ctít a respektovat thajský jazyk a musí být hrdí, že jím mluví.\n\nThajští lidé by měli považovat za svou povinnost studovat státní jazyk a musí být alespoň schopni číst a psát; Thajci by také měli považovat za důležitý úkol pomáhat a podporovat občany, kteří neumějí thajsky nebo neumějí číst, aby se to naučili.\n\nThajští lidé by neměli považovat místo narození, bydliště nebo regionální přízvuk za důvod k rozdělení. Všichni by měli věřit, že všichni narození jako Thajci mají stejnou thajskou krev a mluví stejným thajským jazykem. Místo narození nebo přízvuk nerozhoduje.\n\nThajští lidé by měli považovat za svou povinnost chovat se jako dobří thajští občané a nabádat a poučovat ty, kteří ještě neznají a nepochopili svých povinností občana thajského národa." # todo: NEW TRANSLATION
 SIA_mandate_10: "Mandát desátý" # todo: NEW TRANSLATION
 SIA_mandate_10_desc: "Thajští lidé by se neměli objevovat na veřejných shromážděních, na veřejných prostranstvích nebo v městských hranicích bez náležitého oděvu. Nevhodný oděv zahrnuje nošení pouze spodního prádla, bez košile nebo nošení omotaného látkového kusu.\n\nVhodný oděv pro Thajce zahrnuje: uniformy podle postavení, slušné mezinárodně stylové oblečení, slušné tradiční oděvy." # todo: NEW TRANSLATION
 SIA_mandate_11: "Mandát jedenáctý" # todo: NEW TRANSLATION
 SIA_mandate_11_desc: "Thajští lidé by měli rozdělit svůj čas na tři části: práci, osobní aktivity a odpočinek a spánek. Mělo by to být organizované a podle denního rozvrhu, dokud se to nestane zvykem.\n\nThajští lidé by měli své běžné osobní aktivity provádět takto: jíst v stanovených časech, nejvýše čtyřikrát denně; spát přibližně 68 hodin týdně.\n\nThajští lidé by měli svědomitě vykonávat pracovní povinnosti bez ztráty elánu. Polední přestávka na odpočinek a oběd by neměla trvat déle než hodinu. Po pracovní době věnovat alespoň hodinu cvičení nebo jiné činnosti jako zahradničení, péče o domácí mazlíčky nebo sázení stromů. Poté se osprchovat a večeřet.\n\nThajští lidé by měli využívat volný večerní čas k dokončení nutných prací, konverzaci s rodinou a přáteli, získávání vědomostí poslechem rozhlasových zpráv nebo čtením či jiné zábavě a umění, pokud to příležitost dovolí." # todo: NEW TRANSLATION
 SIA_mandate_12: "Mandát dvanáctý" # todo: NEW TRANSLATION
 SIA_mandate_12_desc: "Na veřejných místech nebo silnicích by lidé měli pomáhat a chránit děti, staré nebo postižené.\n\nKdo plní bod 1, je považován za kulturní osobu zasluhující si respekt thajského národa." # todo: NEW TRANSLATION
 SIA_movie_theater_cat: "$SIA_sala_chaloem_thai_movie_theater$" # todo: NEW TRANSLATION
 SIA_movie_theater_cat_desc: "Stříbrné plátno je jedním z nejsilnějších nástrojů moderního státu. Pečlivě vybrané filmy a propagandistické kampaně mohou formovat veřejné mínění, podněcovat vlastenectví a umlčet nesouhlasné hlasy." # todo: NEW TRANSLATION
