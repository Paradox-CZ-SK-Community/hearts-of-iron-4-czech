 INS_militias_cat: "Laskar Rakyat" # todo: NEW TRANSLATION
 INS_militias_basic_summon: "Mobilizovat civilisty" # todo: NEW TRANSLATION
 INS_militias_basic_summon_desc: "Naverbujeme mladé dospělé a studenty, kteří jsou zapálení pro indonéskou nezávislost, aby se připojili k TKR jako ozbrojené milice." # todo: NEW TRANSLATION
 INS_militias_kris_repayment: "Milice KRIS požadují investice na Sulawesi" # todo: NEW TRANSLATION
