 AST_cabinet_trust_complete_not_tt: "Neprovedl zaměření §YAustrálie na prvním místě§!" # todo: NEW TRANSLATION
 AST_war_angst_cat: "Strach z války" # todo: NEW TRANSLATION
 AST_deteriorating_prime_minister_nerves_mission: "Zhoršující se nervy premiéra" # todo: NEW TRANSLATION
 AST_deteriorating_prime_minister_nerves_desc: "[AST.GetLeader] pod velkým tlakem z očekávané války. Pokud se brzy nenajde úleva, jeho nervy nemusí vydržet." # todo: NEW TRANSLATION
 AST_australian_demands_cat: "Australské požadavky" # todo: NEW TRANSLATION
 AST_aid_australian_military_construction: "Pomoci s australskou vojenskou výstavbou" # todo: NEW TRANSLATION
 AST_aid_australian_military_construction_desc: "Británie není připravena na válku. Pomocí Austrálii vojenskou výstavbou můžeme zmírnit její netrpělivost." # todo: NEW TRANSLATION
 AST_japanese_war_mission: "Japonská válka" # todo: NEW TRANSLATION
 AST_japanese_war_mission_desc: "Austrálie nechce čelit svému ohromnému nepříteli sama — [JAP.GetNameDef]. Nátlak nás nutí učinit první krok a vyřešit hrozící konflikt co nejdříve." # todo: NEW TRANSLATION
 AST_resource_acquisition_cat: "Získávání zdrojů" # todo: NEW TRANSLATION
 AST_request_resource_rights_in_indonesia: "Požádat o práva na zdroje v [INS.GetNameDef]" # todo: NEW TRANSLATION
 AST_request_resource_rights_in_malaya: "Požádat o práva na zdroje v [MAL.GetNameDef]" # todo: NEW TRANSLATION
 AST_request_resource_rights_in_burma: "Požádat o práva na zdroje v [BRM.GetNameDef]" # todo: NEW TRANSLATION
 AST_request_resource_rights_in_indochina: "Požádat o práva na zdroje ve Francouzské Indočíne" # todo: NEW TRANSLATION
 AST_resource_request_ongoing_flag: "Žádost o zdroje §Yprobíhá§!" # todo: NEW TRANSLATION
 AST_australia_first_movement_cat: "Hnutí Australia First" # todo: NEW TRANSLATION
 AST_summons_to_australian_hall: "Svolání do Australského sálu" # todo: NEW TRANSLATION
 AST_summons_to_australian_hall_desc: "Abychom rozšířili [AST.GetFascistParty], musíme spojit a mobilizovat naše příznivce. Australský sál čeká." # todo: NEW TRANSLATION
 AST_summons_to_australian_hall_upgrade: "$AST_summons_to_australian_hall$" # todo: NEW TRANSLATION
 AST_summons_to_australian_hall_upgrade_desc: "$AST_summons_to_australian_hall_desc$" # todo: NEW TRANSLATION
 AST_print_the_publicist: "Vytisknout Publicistu" # todo: NEW TRANSLATION
 AST_print_the_publicist_desc: "Publicist, newsletter Australia First, hraje důležitou roli při oslovování potenciálních příznivců. Vydáním dalšího čísla můžeme šířit naše poselství." # todo: NEW TRANSLATION
 AST_print_the_publicist_upgrade: "$AST_print_the_publicist$" # todo: NEW TRANSLATION
 AST_print_the_publicist_upgrade_desc: "$AST_print_the_publicist_desc$" # todo: NEW TRANSLATION
 AST_call_on_fascists: "[GET_AST_CALL_ON_FASCISTS]" # todo: NEW TRANSLATION
 AST_call_on_fascists_desc: "Jako malé hnutí s málo příznivci Australia First občas nedosáhne na finance. Nicméně zahraniční skupina se stejnými idejemi nabídla financování našich ambicí, což by zaručilo pokračování našeho postupu." # todo: NEW TRANSLATION
 AST_call_on_japanese_fascists: "Volat japonské fašisty" # todo: NEW TRANSLATION
 AST_call_on_foreign_fascists: "Volat zahraniční fašisty" # todo: NEW TRANSLATION
 AST_a_convenient_disaster: "Vhodná katastrofa" # todo: NEW TRANSLATION
 AST_a_convenient_disaster_desc: "Jak populární Australia First bude, konzervativci vždy budou odporovat jejímu učení. Aby se Australia First dostalo k moci, může být potřeba dramatická událost, ne volby; něco, co vrhne vládu do chaosu.\n\nNaše hnutí nemá kapacitu vyvolat takovou událost samo, ale náš zahraniční fašistický podporovatel ano. Podpoří nás a najde jsme spojence v [AST.GetName]." # todo: NEW TRANSLATION
 AST_a_convenient_disaster_tt: "\nTato událost naruší sedící vládu a nakonec umožní, aby se §Y[AST.GetFascistParty]§! stala vládnoucí stranou." # todo: NEW TRANSLATION
 AST_sufficient_funds_tt: "Dostatečné prostředky (dosaženo za §Y[?AST_insufficient_funds:days_left]§! dní)" # todo: NEW TRANSLATION
 AST_sufficient_funds_tt_2: "§ZZískat§! dostatečné prostředky" # todo: NEW TRANSLATION
 AST_lose_sufficient_funds_tt_100: "§SZtratit§! dostatečné prostředky (na §Y100§! dní)\n" # todo: NEW TRANSLATION
 AST_lose_sufficient_funds_tt_50: "§SZtratit§! dostatečné prostředky (na §Y50§! dní)\n" # todo: NEW TRANSLATION
