 SIA_demand_independence_CAM_tt: "Budeme požadovat, aby správci [CAM.GetName] je propustili" # todo: NEW TRANSLATION
 SIA_invite_to_adc: "Pozvat §Y[FROM.GetName]§! do naší frakce" # todo: NEW TRANSLATION
 SIA_asian_democratic_compact_cat: "Asijský demokratický pakt" # todo: NEW TRANSLATION
 SIA_asian_democratic_compact_cat_desc: "Národy Asie mají právo se samostatně řídit. Jako standardní nositel asijského sebeurčení můžeme tlačit na koloniální mocnosti, aby své národy uvolnily." # todo: NEW TRANSLATION
 SIA_khana_ratsadon_cat: "Khana Ratsadon" # todo: NEW TRANSLATION
 SIA_khana_ratsadon_cat_desc: "Khana Ratsadon, Lidová strana, která ukončila absolutní monarchii, není monolit. Její vojenské a civilní křídlo má odlišnou vizi země a napětí mezi nimi je pod povrchem každého rozhodnutí. Udržujte obě křídla spokojená, jinak se koalice roztrhá." # todo: NEW TRANSLATION
 SIA_army_navy_reform_cat: "Armáda a námořnictvo" # todo: NEW TRANSLATION
 SIA_army_navy_reform_cat_desc: "Armáda a námořnictvo soupeří o stejný omezený objem zdrojů. Přesouvání prostředků mezi dvěma větvemi je stálým balancováním, přičemž každé přesměrování nese následky pro připravenost toho druhého." # todo: NEW TRANSLATION
 SIA_divert_army_funds_to_navy_toggle: "[SIA_GetDivertingArmyFundsToNavyTitle]" # todo: NEW TRANSLATION
