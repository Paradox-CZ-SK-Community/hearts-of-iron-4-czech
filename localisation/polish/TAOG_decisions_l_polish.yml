 INS_autonomy_knil_rank_limit: "V armádě schváleny protidiskriminační zákony" # todo: NEW TRANSLATION
 INS_autonomy_flag_legalized: "Vystavování červeno-bílé vlajky legalizováno" # todo: NEW TRANSLATION
 INS_autonomy_education_subsidies: "Dotace na vzdělání dostupné pro Indonésany" # todo: NEW TRANSLATION
 INS_autonomy_national_language: "Indonéština uznána" # todo: NEW TRANSLATION
 INS_autonomy_official_flag: "Indonéská vlajka v užívání" # todo: NEW TRANSLATION
