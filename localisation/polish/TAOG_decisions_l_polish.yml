 INS_national_revolution_dutch_cat_map: "Zobrazit státy obsazené milicemi" # todo: NEW TRANSLATION
 INS_take_batavia: "Zajmout Javu" # todo: NEW TRANSLATION
 INS_take_batavia_desc: "Nizozemská chamtivost, která investovala téměř výlučně do Javy a ignorovala východní ostrovy, učinila z Javy Achillovou patu celé kolonie. To bude jejich pád! Musíme naše síly vtrhnout na Javu a zničit nizozemské komunikační a zásobovací sítě, čímž učiníme administrativu Indies neschopnou fungovat." # todo: NEW TRANSLATION
 INS_hold_batavia_HOL: "Držet Javu" # todo: NEW TRANSLATION
 INS_hold_batavia_HOL_desc: "Republikánské síly zahájily operaci přesunu většiny svých sil na Javu, s cílem ovládnout celý ostrov. Musíme dál odolávat; jejich operace je riskantní a pokud selže, dává nám příležitost svrhnout jejich vládu." # todo: NEW TRANSLATION
 INS_militias_moestopo_mission: "Moestopo požaduje povýšení za své úsilí" # todo: NEW TRANSLATION
 INS_militias_pki_uprising_mission: "Komunistické povstání nevyhnutelné" # todo: NEW TRANSLATION
 INS_pacific_revolution_cat: "Pacifická revoluce" # todo: NEW TRANSLATION
 INS_instigate_in_country: "Podnítit revoluci v [FROM.GetName]" # todo: NEW TRANSLATION
 INS_instigate_in_country_desc: "Naše revoluce neskončila, když byl poslední koloniální voják vyhnán z [ROOT.GetAdjective] půdy. Dělníci a rolníci v [FROM.GetName] trpí pod stejným jhem, které jsme svrhli, a nyní se na nás dívají jako na důkaz, že útlak lze porazit. Pošleme mezi ně naše agitátory, rozdáme letáky, financujeme odbory a rozdmycháme nespokojenost, dokud nebudou podmínky pro revoluci zralé." # todo: NEW TRANSLATION
 INS_launch_revolution: "Vyvolat revoluci" # todo: NEW TRANSLATION
 INS_launch_revolution_desc: "Podmínky v [FROM.GetName] jsou zralé. Naši agenti hlásí rostoucí neklid ve fabrikách i na polích a místní buňky strany jsou připraveny jednat. Nastal čas vyzvat dělníky a rolníky [FROM.GetName], aby povstali a vzali si, co jim náleží." # todo: NEW TRANSLATION
 INS_anti_colonialist_bonus: "Šířit antikolonialistické Sentimenty v [FROM.GetName]" # todo: NEW TRANSLATION
 INS_anti_colonialist_bonus_desc: "Lidé v [FROM.GetName] dřou ve prospěch cizího pána, slouží zájmům, které nejsou jejich. Připomeneme jim, že podrobení je volba a že jejich páni nejsou tak silní, jak se tváří." # todo: NEW TRANSLATION
 INS_revolutionary_sentiment: "Spolupracovat s revolucí v [FROM.GetAdjective]" # todo: NEW TRANSLATION
 INS_revolutionary_sentiment_desc: "V [FROM.GetName] jsou již lidé, kteří se chopili věci sami. Chybí jim organizace a zdroje, nikoli přesvědčení. Koordinací s těmito skupinami můžeme urychlit pád stávajícího řádu, i když výsledná nestabilita ztíží krátkodobě správu země." # todo: NEW TRANSLATION
 INS_arm_militias: "Ozbrojit místní [FROM.GetAdjective] milice" # todo: NEW TRANSLATION
 INS_arm_militias_desc: "Letáky a projevy revoluci ponesou jen do určité míry. Až přijde chvíle, musejí naši soukmenovci v [FROM.GetName] umět bojovat. Přebytečné zbraně a zásoby budou pašovány k sympatickým milicím, aby síly reakce nenarazily na neozbrojené obyvatelstvo." # todo: NEW TRANSLATION
 INS_arm_militias_tt: "Pokud vypukne občanská válka, Komunisté začnou s dalšími divizemi." # todo: NEW TRANSLATION
 INS_propoganda_mission: "Šířit komunismus v [FROM.GetName]" # todo: NEW TRANSLATION
 INS_propoganda_mission_desc: "Organizátoři strany budou vysláni po [FROM.GetName], aby zakládali čtenářské kroužky, náborovali v odborech a nesli poselství revoluce do vesnic. Semena, která dnes zasadíme, brzy přinesou plody." # todo: NEW TRANSLATION
 INS_abandon_mission: "Zrušit misi" # todo: NEW TRANSLATION
 INS_abandon_mission_desc: "Naše zdroje nejsou neomezené a boj v [FROM.GetNameDef] vyžaduje více, než si můžeme dovolit. Stáhneme naše agenty a přesměrujeme úsilí tam, kde jsou potřeba více." # todo: NEW TRANSLATION
