 INS_atjeh_management_2: "Integrovat Atjeh" # todo: NEW TRANSLATION
 INS_soetardjo_petition: "Petice Soetardjo čeká na schválení" # todo: NEW TRANSLATION
 INS_soetardjo_petition_desc: "Konferenční jednání kolem Soetardjo, které svolal, proběhlo a dospělo k závěru, že [INS.GetNameDef] musí splnit řadu ekonomických požadavků, aby zajistilo soběstačnost. Musíme prokázat jasný pokrok směrem k těmto cílům, jinak [HOL.GetNameDef] nakonec rozhodnutí zruší, aby udržel status quo." # todo: NEW TRANSLATION
 INS_soetardjo_petition_refresh_tt: "Znovu aktivuje misi: §YSoetardjo Petition Pending Approval§! s trváním §Y120 dní§!." # todo: NEW TRANSLATION
 INS_soetardjo_pending: "Volksraad debatuje o Soetardjově petici o autonomii" # todo: NEW TRANSLATION
 INS_soetardjo_pending_desc: "Soetardjo je člen Volksraadu známý vedením nenásilného nacionalistického hnutí. Organizuje petici, která žádá, aby [INS.GetNameDef] bylo uděleno více autonomie, a aby byla uspořádána kulatá stůl konference mezi nizozemskými a indonéskými zástupci, aby se projednalo přání Indonésanů stát se autonomní součástí nizozemského společenství. Tato petice je nyní ve Volksraadu v debatě. Po jejich skončení musíme rozhodnout, jak reagovat, protože důsledky petice jsou vysoce významné." # todo: NEW TRANSLATION
 INS_flag_legalized: "Červeno-bílá vlajka je legální k vystavování" # todo: NEW TRANSLATION
 INS_owned_states_at_game_start_tt: "Všechny indonéské státy" # todo: NEW TRANSLATION
 INS_win_condition_base_republic_warning: "Zničit Východní Indie" # todo: NEW TRANSLATION
 INS_win_condition_base_republic_warning_desc: "Musíme pokračovat v boji, získávat civilisty a zajistit, aby plamen v každé indonéské duši dál hořel. Jakmile svrhneme administrativu Indies, [HOL.GetNameDef] nebude mít jinou možnost než se vzdát." # todo: NEW TRANSLATION
 INS_win_condition_base_republic_real: "Zničit Východní Indie" # todo: NEW TRANSLATION
 INS_win_condition_base_republic_real_desc: "Musíme pokračovat v boji, získávat civilisty a zajistit, aby plamen v každé indonéské duši dál hořel. Jakmile svrhneme administrativu Indies, [HOL.GetNameDef] nebude mít jinou možnost než se vzdát." # todo: NEW TRANSLATION
