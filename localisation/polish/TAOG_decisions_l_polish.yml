 SIA_war_fervor_cat: "Válečné nadšení"
 SIA_war_fervor_cat_desc: "Touha lidu po konfliktu musí být pečlivě řízena. Pokud zůstane bez kontroly, válečné nadšení se obrátí dovnitř - vláda, která rozněcuje bojového ducha, aniž by mu dala směr, riskuje, že se sama stane jeho dalším cílem."
 SIA_war_fervor_coup_dummy: "Válečné nadšení překypuje"
 SIA_war_fervor_coup_dummy_desc: "Pokud touha lidu po válce překypí a nenajde uplatnění, nevyhnutelně se obrátí proti nám."
 SIA_urge_restraint: "Vyzvat ke zdrženlivosti"
 SIA_war_fervor_coup: "Bezprostřední puč"
 SIA_modify_cultural_mandates: "Upraví $idea_SIA_thai_cultural_mandates$ o:"
 SIA_mandate_1: "První mandát"
 SIA_mandate_1_desc: "Země, lid a národnost se mají nazývat thajské"
 SIA_mandate_1_tt: "§Y[THIS.GetName]§! bude známa jako §Y$SIA_thailand$§!"
 SIA_mandate_2: "Druhý mandát"
 SIA_mandate_2_desc: "Thajci se nesmějí pouštět do žádného podnikání bez ohledu na prospěch a bezpečnost národa\n\nThajci nesmějí cizincům nikdy prozradit nic, co by mohlo poškodit národ. Takové činy jsou zradou národa\n\nThajci nesmějí jednat jako agenti nebo mluvčí cizinců bez ohledu na prospěch thajského národa a nesmějí vyjadřovat názory ani se stavět na stranu cizinců v mezinárodních sporech. Takové činy jsou zradou národa.\n\nThajci nesmějí tajně nakupovat půdu jménem cizinců způsobem, který ohrožuje národ. Takové činy jsou zradou národa.\n\n Když někdo zradí národ, je povinností Thajců aktivně a rychle tomu učinit přítrž."
 SIA_mandate_3: "Třetí mandát"
 SIA_mandate_3_desc: "Přestaňte označovat Thajce v rozporu s názvem národnosti nebo podle preference jednotlivých skupin.\n\nPro všechny Thajce používejte označení „Thajci“, aniž byste je dále členili."
 SIA_mandate_4: "Čtvrtý mandát"
 SIA_mandate_4_desc: "Když uvidíte vztyčování nebo spouštění státní vlajky podle vládních zvyklostí, uslyšíte zvuk pozdravné polnice nebo píšťalky, nebo když bude dán signál ke vztyčení či spuštění vlajky, vzdejte vlajce čest podle předpisů nebo zvyklostí.\n\nKdyž zazní státní hymna, ať už při oficiální příležitosti nebo v rámci jakéhokoli obřadu, účastníci i přítomní vzdají hymně čest podle předpisů nebo zvyklostí.\n\nKdyž uvidíte někoho, kdo neprojevuje náležitou úctu, napomeňte ho, aby pochopil význam úcty ke státní vlajce, státní hymně a královské hymně."
 SIA_mandate_5: "Pátý mandát"
 SIA_mandate_5_desc: "Thajci by se měli snažit konzumovat pouze potraviny vyrobené z thajských výrobků.\n\nThajci by se měli snažit nosit pouze oděvy vyrobené z thajských výrobků.\n\nThajci by měli podporovat zemědělské, obchodní, průmyslové a jiné profesní úsilí ostatních Thajců.\n\nThajci by měli využívat a podporovat veškeré veřejné služby zřízené vládou nebo Thajci.\n\nThajci provozující zemědělství, obchod, průmysl nebo jiné povolání podporované tímto mandátem se musí snažit udržovat standardy, zvyšovat kvalitu a vést své podnikání poctivě."
 SIA_mandate_6: "Šestý mandát"
 SIA_mandate_6_desc: "Hudbou státní hymny bude skladba, kterou napsal Phra Chenduriyang a která je uložena na Oddělení krásných umění\n\nTextem státní hymny bude text předložený armádou"
 SIA_mandate_7: "Sedmý mandát"
 SIA_mandate_7_desc: "Každý Thajec musí pomáhat budovat národ. Každý práceschopný člověk musí vykonávat stálé povolání. Člověk bez povolání není národu prospěšný a nezaslouží si úctu Thajců."
 SIA_mandate_8: "Osmý mandát"
 SIA_mandate_8_desc: "U královské hymny zkrátíme její text a nahradíme slovo Siam slovem Thajsko"
 SIA_mandate_9: "Devátý mandát"
 SIA_mandate_9_desc: "Thajci musí velebít, ctít a respektovat thajský jazyk a musí být poctěni tím, že jím mluví.\n\nThajci musí považovat za povinnost dobrého občana studovat národní jazyk a musí umět alespoň číst a psát; Thajci musí také považovat za svou důležitou povinnost pomáhat občanům, kteří thajsky nemluví nebo neumějí thajsky číst, aby se jazyk naučili.\n\nThajci nesmějí považovat místo narození, bydliště nebo regionální přízvuk za znak rozdělení. Každý musí považovat za pravdu, že všichni narození jako Thajci mají stejnou thajskou krev a mluví stejným thajským jazykem. Místo narození ani přízvuk nehraje žádnou roli.\n\nThajci musí považovat za svou povinnost chovat se tak, jak se sluší na dobré thajské občany, a nabádat a poučovat ty, kteří dosud neznají a nechápou své povinnosti, o povinnostech dobrého občana thajského národa."
 SIA_mandate_10: "Desátý mandát"
 SIA_mandate_10_desc: "Thajci by se neměli objevovat na veřejných shromážděních, na veřejných místech ani v hranicích měst bez vhodného oděvu. Nevhodný oděv zahrnuje nošení pouze spodků, chození bez košile nebo nošení zavinovací látky.\n\nVhodný oděv pro Thajce tvoří: uniformy, dovoluje-li to postavení a příležitost; slušný oděv mezinárodního stylu; slušný tradiční oděv."
 SIA_mandate_11: "Jedenáctý mandát"
 SIA_mandate_11_desc: "Thajci by měli svůj čas rozdělit na tři části. Jednu na práci, jednu na osobní činnosti a jednu na odpočinek a spánek. Mělo by to být řádné a řídit se rozvrhem, dokud se z toho nestane zvyk.\n\nThajci by měli své běžné osobní činnosti vykonávat následovně: jíst v pevně stanovených časech, nejvýše čtyřikrát denně; spát přibližně 68 hodin.\n\nThajci by měli věrně vykonávat pracovní povinnosti bez malomyslnosti či vyhýbání se práci. Polední odpočinek a přestávka na oběd by neměly trvat déle než jednu hodinu. Na konci pracovního dne by měli alespoň jednu hodinu cvičit sportem nebo se věnovat jiným činnostem, jako je zahradničení, péče o domácí zvířata nebo sázení stromů. Poté by se měli osprchovat a povečeřet.\n\nThajci by měli volný čas v noci využívat k dokončení nezbytné práce, rozhovorům s rodinou a přáteli, získávání vědomostí poslechem rozhlasových zpráv nebo čtením, případně jiné zábavě či umění, dovolí-li to příležitost"
 SIA_mandate_12: "Dvanáctý mandát"
 SIA_mandate_12_desc: "Na veřejných místech nebo silnicích by lidé měli pomáhat dětem, starým lidem a postiženým a chránit je.\n\nKdo dodržuje bod 1, je považován za kultivovaného člověka hodného úcty Thajců."
 SIA_movie_theater_cat: "$SIA_sala_chaloem_thai_movie_theater$"
 SIA_movie_theater_cat_desc: "Stříbrné plátno patří k nejmocnějším nástrojům moderního státu. Prostřednictvím pečlivě vybraných filmů a propagandistických kampaní může vláda utvářet veřejné mínění, rozdmýchávat vlastenectví a přehlušit nesouhlasné hlasy."
