 AST_summons_to_australian_hall_upgrade_desc: "$AST_summons_to_australian_hall_desc$"
 AST_print_the_publicist: "Vytisknout The Publicist"
 AST_print_the_publicist_desc: "The Publicist, zpravodaj Austrálie především, hraje důležitou roli při oslovování potenciálních stoupenců. Vydáním dalšího čísla můžeme šířit naše poselství."
 AST_print_the_publicist_upgrade: "$AST_print_the_publicist$"
 AST_print_the_publicist_upgrade_desc: "$AST_print_the_publicist_desc$"
 AST_call_on_fascists: "[GET_AST_CALL_ON_FASCISTS]"
 AST_call_on_fascists_desc: "Jako malé hnutí s malým počtem stoupenců Austrálie především ne vždy dokáže vyjít s prostředky. Zahraniční skupina podobného smýšlení však projevila ochotu financovat naše ambice a nabídla řešení, jak zajistit náš další postup."
 AST_call_on_japanese_fascists: "Obrátit se na japonské fašisty"
 AST_call_on_foreign_fascists: "Obrátit se na zahraniční fašisty"
 AST_a_convenient_disaster: "Příhodná katastrofa"
 AST_a_convenient_disaster_desc: "Ať už se Austrálie především stane jakkoli populární, konzervativci budou ideologii této skupiny vždy odporovat. Má-li Austrálie především úspěšně získat moc, může být zapotřebí něco dramatičtějšího než běžné volby; něco, co uvrhne vládu do chaosu.\n\nNaše hnutí nemá kapacitu takovou událost vyvolat samo, ale náš zahraniční fašistický podporovatel ano. Pomocí našemu vzestupu k moci najdou zahraniční fašisté v [AST.GetName] přítele."
 AST_a_convenient_disaster_tt: "\nTato událost naruší úřadující vládu a nakonec umožní, aby se §Y[AST.GetFascistParty]§! stala vládnoucí stranou."
