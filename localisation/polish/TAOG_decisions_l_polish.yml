 AST_deteriorating_prime_minister_nerves_mission: "Zhoršující se nervy premiéra"
 AST_deteriorating_prime_minister_nerves_desc: "[AST.GetLeader] se hroutí pod tlakem nevyhnutelné války. Pokud se brzy nenajde úleva, jeho nervy to možná nevydrží."
 AST_australian_demands_cat: "Australské požadavky"
 AST_aid_australian_military_construction: "Pomoci australské vojenské výstavbě"
 AST_aid_australian_military_construction_desc: "Británie není připravena na válku. Pomocí Austrálii s vojenskou výstavbou můžeme zmírnit její netrpělivost."
 AST_japanese_war_mission: "Japonská válka"
 AST_japanese_war_mission_desc: "Austrálie nechce čelit svému zdrcujícímu nepříteli - [JAP.GetNameDef] - sama. Tlačí na nás, abychom učinili první krok a vyřešili hrozící konflikt co nejdříve."
