 INS_can_raid_here_HOL_tt: "Tento stát je možným cílem pozemního nájezdu milicí Republiky. Pokud bude úspěšný, stát nám bude odebrán. Abychom stát před nájezdy ubránili, můžeme:\n$success_modifier_INS_has_influence_mod_counterplay$\n$success_modifier_INS_defense_modifier_counterplay$\n$success_modifier_INS_naval_dominance_modifier_counterplay$\n- Zvýšit §Yleteckou převahu§!\n- Snížit množství informací dostupných nepřátelům\n- Snížit odboj ve státě"
