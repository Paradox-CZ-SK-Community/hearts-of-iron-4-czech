 INS_can_raid_here_HOL_tt: "Tento stát je potenciálním cílem pozemního přepadu milicí Republiky. Pokud bude úspěšný, stát bude ztracen pro nás. Abychom jej ubránili před přepady, můžeme:\n$success_modifier_INS_has_influence_mod_counterplay$\n$success_modifier_INS_defense_modifier_counterplay$\n$success_modifier_INS_naval_dominance_modifier_counterplay$\n- Zvýšit §YAviční převahu§!\n- Snížit průzkum nepřátel\n- Snížit odboj ve státě" # todo: NEW TRANSLATION
