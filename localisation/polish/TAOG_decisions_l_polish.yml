 INS_militias_railway_pemuda_mission: "Železniční mládež požaduje boj" # todo: NEW TRANSLATION
 INS_revolution_planning_cat: "Podzemní revoluce" # todo: NEW TRANSLATION
 INS_revolution_planning_hq: "Zřídit revoluční velitelství v [FROM.GetName]" # todo: NEW TRANSLATION
 INS_revolution_planning_hq_desc: "Zřídíme naše velitelství milicí v [FROM.GetName], které bude fungovat jako naše centrální velení pro základny milicí po celém souostroví. Naše velitelství a jeho okolní území budou upřednostněny při infiltračních misích a budou pevně pod naší kontrolou." # todo: NEW TRANSLATION
 INS_revolution_planning_hq_tt: "Postavilo nejvýše §Y3§! revolučních velitelství" # todo: NEW TRANSLATION
 INS_revolution_planning_hq_DONE: "Revoluční velitelství" # todo: NEW TRANSLATION
 INS_revolution_planning_hq_DONE_desc: "Toto je naše revoluční velitelství, kam se hlásí naše milice. Tento stát bude pod naší kontrolou, jakmile vyhlásíme nezávislost." # todo: NEW TRANSLATION
 INS_revolution_planning_hq_DONE_trigger_tt: "Lze zřídit pouze jedno velitelství" # todo: NEW TRANSLATION
 INS_revolution_planning_envoy_DONE_trigger_tt: "Nelze zřídit více základen ve stejném státě" # todo: NEW TRANSLATION
 INS_revolution_planning_envoy_DONE: "Základna milicí v [FROM.GetName]" # todo: NEW TRANSLATION
 INS_has_revolutionary_hq: "Zřídilo revoluční velitelství" # todo: NEW TRANSLATION
 INS_revolution_planning_influence_state: "Zřídit základnu milicí v [FROM.GetName]" # todo: NEW TRANSLATION
 INS_revolution_planning_influence_state_desc: "Pošleme milice do [FROM.GetName], aby tam zřídily základnu, zajistily komunikaci s velitelstvím a usnadnily provádění operací, jakmile vyhlásíme nezávislost." # todo: NEW TRANSLATION
 INS_revolution_planning_cat_map_name: "Vyberte, kde řídit činnost milicí" # todo: NEW TRANSLATION
 INS_state_revolution_hq_tt: "Stát bude ovládán námi po vyhlášení nezávislosti" # todo: NEW TRANSLATION
 INS_hq_warning: "§W§RUmístit naše velitelství sem je obtížné a spotřebuje to většinu našich zdrojů.§!§!" # todo: NEW TRANSLATION
 INS_revolution_points_remaining_tt: "Lze postavit alespoň §Y1§! další základnu milicí (aktuálně §Y[?INS_revolution_points_remaining]§! zbývá)" # todo: NEW TRANSLATION
 INS_revolution_planning_influence_state_points_notif_tt: "Budeme schopni zřídit základnu milicí v §Y[?INS_starting_revolution_points_count]§! dalších §Rmimo-Javy§! státech." # todo: NEW TRANSLATION
