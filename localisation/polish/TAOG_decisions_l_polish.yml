 SIA_use_abandoned_french_tools: "Využít opuštěné francouzské nástroje" # todo: NEW TRANSLATION
 SIA_use_abandoned_french_tools_desc: "Francouzi v našem okupovaném území zanechali některé těžké nástroje. Můžeme je použít pro sebe." # todo: NEW TRANSLATION
 SIA_fortress_saigon: "Pevnost Saigon" # todo: NEW TRANSLATION
 SIA_fortress_saigon_desc: "Sever naší nové říše bude chráněn Hanojí. S horami na severu a Rudou řekou před ní je ideálně situovaná k odražení jakýchkoli vetřelců." # todo: NEW TRANSLATION
