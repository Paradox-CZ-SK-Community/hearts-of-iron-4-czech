 SIA_war_fervor_cat_desc: "Chuť lidu po konfliktu musí být pečlivě řízena. Pokud se vymkne kontrole, válečné nadšení se obrátí dovnitř — vláda, která rozdmýchává bojového ducha, aniž by ho nasměrovala, riskuje, že se sama stane jeho cílem." # todo: NEW TRANSLATION
