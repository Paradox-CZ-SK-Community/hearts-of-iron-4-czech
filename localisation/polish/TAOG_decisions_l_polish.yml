 indonesia_reduce_escalation_1_effect_tooltip_for_min_4: "Snižuje eskalaci o §G1§!, na minimum §Y4§!." # todo: NEW TRANSLATION
 INS_ongoing_influence_process: "Právě nezřizuje základnu milicí" # todo: NEW TRANSLATION
 INS_current_revolution_strength_3_tt: "V tomto státě je nyní §VVysoká§! aktivita milicí." # todo: NEW TRANSLATION
 INS_current_revolution_strength_0_tt: "V tomto státě nyní není žádná aktivita milicí." # todo: NEW TRANSLATION
 INS_has_spent_points_trigger_tt: "Nelze zřídit další základny milicí" # todo: NEW TRANSLATION
 INS_national_revolution_cat: "Indonéská národní revoluce" # todo: NEW TRANSLATION
 INS_national_revolution_cat_desc: "Po 350 letech nizozemského útlaku jsme vzali věci do vlastních rukou a vyhlásili nezávislost. Nizozemsko naši autoritu neuznává a nadále spravuje Indies jako svou kolonii, zatímco nás považuje za zločince.\n\nMusíme nadále ovládnout více regionů a důležitých měst a svrhnout nizozemskou vládu zevnitř. Měli bychom však být opatrní, abychom nebyli příliš agresivní bez řádného plánování, protože rychlá eskalace by mohla vyprovokovat nizozemickou vojenskou akci." # todo: NEW TRANSLATION
 INS_national_revolution_cat_map: "Spustit falešné povstání" # todo: NEW TRANSLATION
 INS_national_revolution_dutch_cat: "Revoluční milice v Indies" # todo: NEW TRANSLATION
 INS_national_revolution_dutch_cat_desc: "Revolucionáři ve Východní Indii nelegálně vyhlásili nezávislost a převzali kontrolu nad částmi Indies milicemi. Navzdory našemu úsilí se nám nedaří tyto oblasti znovu ovládnout kvůli obrovskému počtu milic.\n\nMusíme je zastavit dříve, než ovládnou více měst a dál destabilizují administrativu Indies. V krajním případě může být nutná vojenská síla, pokud budou pokračovat v takovém jednání." # todo: NEW TRANSLATION
 INS_HOL_revolution_not_going_well_tt: "§RBez Batavie nemůžeme spravovat Indies a nebudeme mít jinou možnost než vyjednat mírovou dohodu s revolucionáři.§!" # todo: NEW TRANSLATION
 INS_gradual_escalation_republic: "Postupná eskalace" # todo: NEW TRANSLATION
 INS_gradual_escalation_HOL: "Postupná eskalace" # todo: NEW TRANSLATION
 INS_gradual_escalation_republic_desc: "Nizozemské odvety se po každém našem přepadu ztížily a jejich hlídky znovu pronikají do čtvrtí, které opustily měsíce zpět. Naši velitelé hlásí tvrdší boje na místech, která se dříve považovala za uklidněná, a naše ztráty rostou rychleji, než je možné nahradit náborem. Konflikt se rozšířil do provincií, které loni byly klidné." # todo: NEW TRANSLATION
 INS_gradual_escalation_HOL_desc: "Zprávy z rezidencí se zhoršují každý týden. Rebelové útočí v čtvrtích, kde se o nich dříve nevědělo, a velení v Batavii tlačí na přijetí opatření těžších než vše, co bylo dosud vyzkoušeno. V Haagu ti, kdo dříve radili trpělivost, u každého kabinetního zasedání ubývají." # todo: NEW TRANSLATION
 INS_national_revolution_republic_win_ins_tt: "§Y[INS.GetAdjective]§! republikánské milice uplatní §Gde-facto kontrolu§! nad regionem a konflikt skončí §Grepublikánským vítězstvím§!." # todo: NEW TRANSLATION
