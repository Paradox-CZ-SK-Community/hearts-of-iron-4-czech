 AST_naval_expansion: "$NOR_alt_dem_naval_expansion$"
 AST_factory_conversions: "Přestavby továren"
 AST_factory_conversions_desc: "Výměnou za to, že [ROOT.GetFascistParty] bude prosazovat politiku, která jim prospívá, se přední podnikatelé dohodli na investicích do průmyslových reforem odpovídajících cílům strany.\n\nObranný průmysl musí mít prioritu, a australské továrny proto musí být přeměněny tak, aby jej podporovaly."
 AST_land_development: "Rozvoj půdy"
 AST_land_development_desc: "Výměnou za to, že [ROOT.GetFascistParty] bude prosazovat politiku, která jim prospívá, se přední podnikatelé dohodli na investicích do průmyslových reforem odpovídajících cílům strany.\n\nPříliš velká část území země [ROOT.GetName] zůstává neindustrializovaná a nerozvinutá. Rozvojem těchto regionů je učiníme vhodnými pro výstavbu."
 AST_electrical_grid_expansions: "Rozšíření elektrické sítě"
 AST_electrical_grid_expansions_desc: "Výměnou za to, že [ROOT.GetFascistParty] bude prosazovat politiku, která jim prospívá, se přední podnikatelé dohodli na investicích do průmyslových reforem odpovídajících cílům strany.\n\nRozšířením naší elektrické sítě můžeme podpořit domácí výrobu energie, která se nespoléhá na dovoz."
 AST_factory_investments: "Investice do továren"
 AST_factory_investments_desc: "Výměnou za to, že [ROOT.GetFascistParty] bude prosazovat politiku, která jim prospívá, se přední podnikatelé dohodli na investicích do průmyslových reforem odpovídajících cílům strany.\n\nChceme-li zajistit, aby vojenské i civilní zásoby zůstaly v dobách konfliktu dostatečné, musíme rozšířit naši průmyslovou kapacitu."
 AST_develop_port_kemla_steel_medium_decision: "Postavit druhou vysokou pec v Port Kembla"
 AST_develop_port_kemla_steel_medium_decision_desc: "Port Kembla fungovala dobře pouze s jednou vysokou pecí, ale poptávka vzrostla natolik, že možná budeme chtít postavit druhou. Tím se výroba oceli v regionu zhruba zdvojnásobí."
 AST_prospect_pilbara_iron_decision: "Otevřít region Pilbara těžbě"
 AST_prospect_pilbara_iron_decision_desc: "Region Pilbara má obrovské zásoby železné rudy, jedny z největších na světě. V této mimořádně odlehlé části země by však investice potřebné k využití tohoto zdroje byly obrovské... ale obrovské by byly i zisky."
 AST_scale_up_pilbara_mines_steel_decision: "Rozšířit doly v Pilbaře"
 AST_scale_up_pilbara_mines_steel_decision_desc: "Nyní, když byl region Pilbara otevřen rozsáhlé těžbě, je čas nechat investice proudit!"
 AST_pilbara_mining_tt: "Otevření §Y$STATE_870$§! dalšímu průzkumu umožní opakovatelné rozhodnutí bez omezení zvyšovat výrobu oceli."
 AST_scale_up_middleback_mines_steel_decision_1: "Rozšířit důl Iron Knob"
 AST_scale_up_middleback_mines_steel_decision_1_desc: "Ačkoli důl Iron Knob je aktivní už nějakou dobu, s rostoucí poptávkou po železné rudě je čas rozšířit zde naše úsilí."
 AST_scale_up_middleback_mines_steel_decision_2: "Otevřít důl Iron Monarch"
 AST_scale_up_middleback_mines_steel_decision_2_desc: "Důl Iron Knob našim potřebám nestačí, naštěstí jsou Middleback Mountains bohaté na železo. Je čas zřídit náš dosud největší důl!"
 AST_scale_up_middleback_mines_steel_decision_3: "Otevřít důl Iron Prince"
 AST_scale_up_middleback_mines_steel_decision_3_desc: "Válečná poptávka po kovech je na historickém maximu, ale Middleback Mountains nadále poskytují."
 AST_expand_iron_mining_tt: "Díky §Y$AST_exports_for_economic_recovery$§! i §Y$AST_within_reach$§! bude možné využívat region Pilbara ve státě §Y$STATE_870$§!, čímž se uvolní téměř nevyčerpatelný zdroj §Yoceli§!. Můžeme jej využít k pohonu našeho hospodářství."
 AST_develop_port_kemla_steel_tt: "To nám umožní přijmout rozhodnutí §YPostavit druhou vysokou pec v Port Kembla§!, které výrazně zvýší naši produkci §Yoceli§!."
 AST_develop_middleback_tt: "Odemkne tři rozhodnutí k rozvoji naší produkce §Yoceli§! ve státě §Y$STATE_519$§!"
 AST_ireland_weapon_smuggling_cat: "Vyzbrojování Irů"
 AST_smuggle_arms_to_ireland: "Pašovat zbraně do Irska"
 AST_smuggle_arms_to_ireland_desc: "Musíme Irům dodat zbraně potřebné k boji proti Britům."
 AST_smuggle_arms_to_ireland_ongoing_flag: "Pašování zbraní §Yprobíhá§!"
 AST_smuggle_arms_to_northern_ireland: "Pašovat zbraně do Severního Irska"
 AST_smuggle_arms_to_northern_ireland_desc: "Pokud dokážeme Severní Irsko dostatečně zásobit zbraněmi a dostatečně propojit s Irskem, můžeme zajistit, že se bude moci sjednotit s Irskem dříve, než Britové dostanou příležitost zasáhnout."
 AST_northern_ireland_rises_up: "Povstání v Severním Irsku"
 AST_specialize_on_jungle_combat: "Specializovat se na boj v džungli"
 AST_specialize_on_desert_combat: "Specializovat se na boj v poušti"
 AST_switch_combat_specialization: "Změnit bojovou specializaci"
 AST_special_forces_cat: "Výcvik speciálních sil"
 AST_you_can_switch_sf: "Budete moci přepínat mezi specializacemi."
 AST_training_camps_specialization: "Naše výcvikové tábory jsou připraveny nabídnout našim jednotkám specializovaný výcvik, díky němuž budou účinnější na různých válčištích."
