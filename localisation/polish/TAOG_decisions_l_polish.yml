 INS_is_deescalating_tt: "Právě neprobíhá mise na deeskalaci" # todo: NEW TRANSLATION
 INS_escalate_the_conflict: "Eskalovat konflikt" # todo: NEW TRANSLATION
 INS_escalate_the_conflict_desc: "Zorganizujeme nepokoje a lokální střety s nepřátelskými silami, abychom zvýšili napětí a eskalaci, čímž připravíme půdu tak, aby vážnější operace později čelily menšímu mezinárodnímu dohledu." # todo: NEW TRANSLATION
 INS_escalate_the_conflict_HOL: "$INS_escalate_the_conflict$" # todo: NEW TRANSLATION
 INS_escalate_the_conflict_HOL_desc: "$INS_escalate_the_conflict_desc$" # todo: NEW TRANSLATION
 INS_deescalate_the_conflict: "Žádat mezinárodní mediaci" # todo: NEW TRANSLATION
 INS_deescalate_the_conflict_2: "Nařídit příměří" # todo: NEW TRANSLATION
 INS_deescalate_the_conflict_desc: "Nizozemci s námi nebudou jednat v dobré víře. Pro ně zůstáváme povstaleckou skupinou, nepříjemností, kterou je třeba potlačit, nikoli národem, se kterým by se mělo počítat. Ale velmoci světa jsou jiná věc a Haag je nemůže tak snadno ignorovat. Oslovíme mezinárodní společenství, aby zprostředkovalo, a necháme zahraniční nátlak udělat to, co náš vlastní hlas nemůže." # todo: NEW TRANSLATION
 INS_deescalate_the_conflict_2_desc: "Naše přepady udělaly své. Koloniální posádky znají náš dosah a Haag ví, že nejsme zastrašeni. Přesto každý útok dává Nizozemcům novou přiležitost poslat více mužů a lodí a my nejsme připraveni na otevřenou válku. Příkaz půjde našim velitelům, aby přestali střílet. Další úder padne, až to my určíme, ne až nás Nizozemci vyprovokují." # todo: NEW TRANSLATION
 INS_renville_tt_HOL: "§W§Y[USA.GetFlag][USA.GetNameDefCap]§! nám dá ultimátum. Pokud se nevzdáme a neodejdeme z Indonésie, §Rvyhlásí nám válku§!." # todo: NEW TRANSLATION
 INS_renville_wont_happen_neutral_tt: "Konflikt skončí dříve, než americká jednání skončí, nebudou schopni zasáhnout." # todo: NEW TRANSLATION
 INS_renville_explain_USA_tt: "Pokud konflikt nebude vyřešen za §Y365 dní§!:\n\n" # todo: NEW TRANSLATION
 INS_renville_timer_mission_republic: "Renville vyjednávání čekají" # todo: NEW TRANSLATION
