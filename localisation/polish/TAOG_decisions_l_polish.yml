 SIA_release_contigency_funds: "Uvolnit nouzové fondy"
 SIA_release_contigency_funds_tt: "Upraví §Y$idea_SIA_contingency_funds$§! o\n"
 SIA_release_contigency_funds_tt2: "na §Y[?var:SIA_contingency_funds]§! měsíců. Po skončení fondy zmizí. Čím déle budeme fondy shromažďovat v době míru, tím déle fond vydrží za války."
 has_released_contingency_funds: "Uvolnil nouzové fondy"
 AST_election_approaching_cat: "Blížící se volby"
 AST_election_approaching_cat_desc: "Sotva se jedna vláda usadila, už se začínají blížit další volby. Demokratické strany se předhánějí ve všem, co by mohlo zvýšit jejich podporu, v naději, že to bude stačit k zajištění vítězství, až se otevřou volební místnosti a urny se začnou plnit hlasy."
 AST_final_reforms_mission: "Závěrečné reformy"
 AST_final_reforms_mission_desc: "Díky stabilnímu vedení, konzervativním sklonům a loajalitě k Británii UAP posílila svou podporu a další funkční období je stále pravděpodobnější. Aby si její vůdci udrželi veřejnou podporu, musí reformy urychlit.\n\n§YÚčinky během aktivity:§!\n§W(§Ydemokratická§! zaměření):\nSnížení doby dokončení o §Y5§! dní§!"
 AST_final_reforms_effect_tt: "\nÚčinky po dobu aktivity §Y$AST_final_reforms_mission$§! (§Y180§! dní):"
 AST_labor_campaign_tour_mission: "Předvolební turné Labor"
 AST_labor_campaign_tour_mission_desc: "Ve své snaze zastupovat každého občana přijala ALP odlišný pohled na imperialismus a australskou loajalitu k Impériu. Domácí potřeby mají přijít na první místo a zahraniční zájmy už nemají mít přednost.\n\nAby ALP rozšířila své poselství mezi současnou vládnoucí stranu i voliče, vydá se na celostátní předvolební turné.\n\n§YÚčinky během aktivity:§!\n§WDenní nárůst hlasů pro §YA.L.P§!: §G+0.05§!§!"
 AST_labor_campaign_tour_effect_tt: "\nÚčinky po dobu aktivity §Y$AST_labor_campaign_tour_mission$§! (§Y180§! dní):\nDenní nárůst hlasů pro §YA.L.P§!: §G+0.05§!\n\nÚčinky za §Y180§! dní:"
 AST_election_season_cat: "Volební období"
 AST_election_season_cat_desc: "Sotva se jedna vláda usadila, už se další připravuje zaujmout její místo. V tuto chvíli se dá veřejná podpora ovlivnit jen málo, i když to strany nezastaví v pokusech. Není konec, dokud není konec, a ten den přijde u volební urny."
 AST_election_countdown: "Odpočet do voleb"
 AST_election_countdown_desc: "Do otevření volebních místností zbývá už jen několik dní.\n\n§W$AST_expected_election_winner_tt$§!"
 AST_government_formation_period: "Období sestavování vlády"
 AST_government_formation_period_desc: "Každá strana chce mít moc rozhodovat o vlastní politice, ale pokud si to určité okolnosti vyžádají, vláda národní jednoty může být nejrozumnější možností.\n\n§W§YÚčinky během aktivity:§!\n£GFX_trigger_yes $AST_election_recently_concluded$\n\n$ruling_party$ může vytvořit §Yvládu národní jednoty§!.\n\nVytvořte §Yvládu národní jednoty§! v okně Demokratické volby, které se nachází v australském stromu zaměření.§!"
 AST_war_is_coming_cat: "Válka se blíží"
 AST_war_is_coming_cat_desc: "Napětí roste a australští představitelé i občané si začínají uvědomovat, že válka může být nevyhnutelná bez ohledu na to, jak moc si jejich politika či zájmy přejí opak.\n\nMusíme svolat zasedání kabinetu a rozhodnout o postupech pro případ invaze. Ještě předtím však možná stojí za to podniknout kroky, s nimiž by celý kabinet nemusel souhlasit."
 AST_seize_civilian_industry: "Zabavit civilní průmysl"
 AST_seize_civilian_industry_desc: "Ačkoli spotřební zboží je nezbytné jak pro naše občany, tak pro hospodářství, nelze obejít skutečnost, že válečná doba přináší naléhavější potřeby. Válka se blíží; až přijde, budeme připraveni."
 AST_scorch_the_north: "Spálit sever"
 AST_scorch_the_north_desc: "Pokud máme podezření na invazi ze severu, existují způsoby, jak takový postup zmařit, i když mají svou cenu. Ačkoli rozvoj našich severních států politika spálené země zbrzdí, může to být právě to, co bude potřeba k zadržení agresorů."
 AST_the_brisbane_line: "Brisbaneská linie"
 AST_the_brisbane_line_desc: "Australské obranné schopnosti možná nejsou dost silné na to, aby zcela odrazily zahraniční agresi. Přijetím politiky, která upřednostňuje silnou obranu životně důležitých území před slabou obranou všech, můžeme zajistit, že nejrozvinutější a nejobydlenější části země [AST.GetName] zůstanou pod naší kontrolou.\n\nAčkoli se proti takové politice nepochybně postaví ti, kdo odmítají jakoukoli míru ústupu, vláda má povinnost vést [AST.GetName] rozumným směrem."
 AST_summon_the_cabinet_mission: "Svolat kabinet"
 AST_summon_the_cabinet_mission_desc: "Svolejte diplomaty, úředníky a teoretiky do Canberry; vyhlídka na invazi musí být prodiskutována."
 AST_summon_the_cabinet_tt1: "\nTato událost naruší úřadující vládu a může vést k jejímu §Ypádu§!."
 AST_australian_accusations_modifier: "Australská obvinění"
 AST_cabinet_trust_cat: "Důvěra kabinetu"
 AST_cabinet_trust_increase_tt: "\n§GZvýší§! §Ydůvěru kabinetu§!\n"
 AST_cabinet_trust_decrease_tt: "\n§RSníží§! §Ydůvěru kabinetu§!\n"
 AST_cabinet_trust_remove_tt: "§GOdstraní§! §Yduchy důvěry kabinetu§!"
 AST_australian_comforts_fund: "£BoP_right_texticon  Australský fond pro pohodlí vojáků"
 AST_australian_comforts_fund_desc: "Vláda uctí jednu z obětí letecké nehody v Canbeře investicí do Australského fondu pro pohodlí vojáků, pro který nadšeně pracuje vdova po jedné z obětí.\n\nCílem fondu je usnadnit australským vojákům čas strávený v poli zasíláním předmětů, které doplňují jejich armádní příděly a osobní výstroj, takže z investice bude těžit i válečné úsilí."
 AST_eminent_successors: "£BoP_right_texticon  Významní nástupci"
 AST_eminent_successors_desc: "Některé oběti letecké katastrofy v Canbeře byly vysoce váženými vládními činiteli. Ačkoli jejich strašlivý osud nelze nijak odčinit, jmenování několika významných nástupců by možná stabilizovalo vládu a obnovilo důvěru veřejnosti i ministrů."
 AST_critics_to_shame: "£BoP_right_texticon  Zahanbit kritiky"
 AST_critics_to_shame_desc: "Letecká katastrofa v Canbeře zasáhla celý národ a nezanechala žádného Australana nedotčeného smutkem. V takových dobách se vždy najdou tací, kteří se toho pokusí využít. Odhalíme nejhlasitější kritiky takové, jací ve skutečnosti jsou; jejich kritika je pokusem narušit pořádek."
 AST_approach_the_independents: "£BoP_left_texticon  Oslovit nezávislé"
 AST_approach_the_independents_desc: "Vláda je nestabilní, protože víra v její schopnost provést Austrálii nedávnými otřesy den ode dne slábne. Pokud oslovíme nezávislé, možná je přesvědčíme, aby pochopili, že změna vlády by byla nejlepší."
 AST_a_sound_voice: "£BoP_left_texticon  Rozumný hlas"
 AST_a_sound_voice_desc: "V tomto období politických otřesů se zdá, že jeden sebejistý hlas vzbuzuje mezi australským lidem důvěru. Mohl by to být hlas příštího vůdce země [AST.GetName]?"
 AST_challenge_government_narrative: "£BoP_left_texticon  Zpochybnit vládní výklad"
 AST_challenge_government_narrative_desc: "Podrobnosti, které vláda sdělila o letecké katastrofě v Canbeře, působí neobvykle, což nevyhnutelně vede ke spekulacím, že některé informace mohou být zatajovány. Jak mohl zkušený důstojník RAAF havarovat za ideálních letových podmínek? Od vlády je třeba žádat odpovědi."
 AST_make_a_common_enemy: "Vytvořit společného nepřítele"
 AST_make_a_common_enemy_desc: "Hlasy nedůvěry se po ztrátě činitelů, kteří zahynuli při letecké katastrofě v Canbeře, rozmnožily. Neobvyklé okolnosti havárie nejsou jediným faktorem, který podporuje podezření ze zahraničního zapojení; koneckonců nic nesjednocuje víc než společný nepřítel."
 AST_make_a_common_enemy_tt: "§RMožné účinky události:§!"
 AST_ensure_cabinet_loyalty: "Zajistit loajalitu kabinetu"
 AST_ensure_cabinet_loyalty_desc: "Hrozba vyslovení nedůvěry nepředstavuje žádné nebezpečí, pokud většina kabinetu hlasuje ve prospěch úřadující vlády. Zajistíme loajalitu kabinetu."
 AST_castle_crumbling_mission: "Hroutící se hrad"
 AST_castle_crumbling_mission_desc: "Austrálie se po tragické letecké katastrofě v Canbeře obrací ke svým vůdcům. Zůstane úřadující vláda hodna důvěry veřejnosti i po ztrátě členů kabinetu, nebo by změna vedení jednoduše byla nejlepší?"
 AST_castle_crumbling_mission_event_tt: "§YÚčinky události:§!"
 AST_castle_crumbling_mission_complete_tt: "Dokončit misi §YHroutící se hrad§!"
 AST_cabinet_trust_complete_1_flag: "Přijal rozhodnutí: §YVytvořit společného nepřítele§!"
 AST_cabinet_trust_complete_2_flag: "Přijal rozhodnutí: §YZajistit loajalitu kabinetu§!"
 AST_cabinet_trust_complete_not_tt: "Nepřijal zaměření §YAustrálie především§!"
