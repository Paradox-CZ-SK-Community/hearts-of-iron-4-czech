 SIA_limited_war_cat: "Omezená válka" # todo: NEW TRANSLATION
 SIA_limited_war_cat_desc: "Nemůžeme doufat, že porazíme velmoci regionu v otevřené válce — zatím ne. Pokud budeme prosazovat nároky krok po kroku prostřednictvím pečlivě vymezených kampaní, oslabíme jejich pozici, zatímco naše síla poroste." # todo: NEW TRANSLATION
 SIA_start_limited_war_indochina: "Zahájit omezenou válku v Indočíně proti [FROM.GetName]" # todo: NEW TRANSLATION
 SIA_start_limited_war_indochina_tt_main: "Zahajuje §YOmezenou válku§! proti §Y[FROM.GetName]§!.\nOvládnutím všech zvýrazněných států patřících §Y[FROM.GetName]§! budeme moci tyto státy převzít bez eskalace do plnohodnotné války.\n§RProhrát více než [?var:global.limited_war_surrender_threshold|%.0] postupu kapitulace znamená prohrát omezenou válku§!\n\n§RProhra v omezené válce nás může přinutit vrátit dříve dobytá území§!" # todo: NEW TRANSLATION
 SIA_start_limited_war_rejoin_faction: "Dočasně opustíme současnou frakci a po skončení §YOmezených válek§! se k frakci znovu připojíme." # todo: NEW TRANSLATION
 SIA_start_limited_war_can_join_faction: "Budeme se moci po skončení §YOmezené války§! znovu připojit k frakcím!" # todo: NEW TRANSLATION
