 SIA_release_contigency_funds_tt: "Mění §Y$idea_SIA_contingency_funds$§! o\n" # todo: NEW TRANSLATION
 SIA_release_contigency_funds_tt2: "na §Y[?var:SIA_contingency_funds]§! měsíců. Na konci fondy zmizí. Čím déle fondy při míru shromažďujeme, tím déle fond při válce vydrží." # todo: NEW TRANSLATION
 has_released_contingency_funds: "Uvolnil rezervní fondy" # todo: NEW TRANSLATION
 AST_election_approaching_cat: "Blíží se volby" # todo: NEW TRANSLATION
 AST_election_approaching_cat_desc: "S nastolením jedné vlády se už blíží další volby. Demokratické strany hledají cokoli, co by zvýšilo jejich podporu, doufajíce, že to stačí k vítězství u volebních uren, když se otevřou a hlasy budou spočítány." # todo: NEW TRANSLATION
 AST_final_reforms_mission: "Závěrečné reformy" # todo: NEW TRANSLATION
 AST_final_reforms_mission_desc: "Díky stabilnímu vedení, konzervativnímu směřování a věrnosti Británii UAP posílila svou podporu a šance na další období jsou vyšší. Aby udrželi veřejnou podporu, musí urychlit reformy.\n\n§YEfekty během aktivity:§!\n§W(§YZaměření demokratické§!):\n§Y5§! dní snížení doby dokončení§!" # todo: NEW TRANSLATION
 AST_final_reforms_effect_tt: "\nEfekty dokud je §Y$AST_final_reforms_mission$§! aktivní (§Y180§! dní):" # todo: NEW TRANSLATION
 AST_labor_campaign_tour_mission: "Kampaňní turné labouristů" # todo: NEW TRANSLATION
 AST_labor_campaign_tour_mission_desc: "Aby ALP reprezentovala každého občana, přijala jiný pohled na imperialismus a loajalitu Austrálie k Impériu. Domácí potřeby budou na prvním místě.\n\nPro šíření sdělení jak vládě, tak voličům podnikne ALP celonárodní kampaňní turné.\n\n§YEfekty během aktivity:§!\n§WDenní hlasy §YA.L.P§!: §G+0.05§!§!" # todo: NEW TRANSLATION
 AST_labor_campaign_tour_effect_tt: "\nEfekty dokud je §Y$AST_labor_campaign_tour_mission$§! aktivní (§Y180§! dní):\nDenní hlasy §YA.L.P§!: §G+0.05§!\n\nEfekty za §Y180§! dní:" # todo: NEW TRANSLATION
 AST_election_season_cat: "Volební sezóna" # todo: NEW TRANSLATION
 AST_election_season_cat_desc: "S jednou vládou v úřadu se už připravuje další, která ji nahradí. V tuto chvíli lze jen málo udělat, aby se ovlivnil veřejný postoj, přesto strany budou usilovat. Není to u konce, dokud se nezavřou volební místnosti." # todo: NEW TRANSLATION
 AST_election_countdown: "Odpočet do voleb" # todo: NEW TRANSLATION
 AST_election_countdown_desc: "Jen dny zbývají do otevření volebních místností.\n\n§W$AST_expected_election_winner_tt$§!" # todo: NEW TRANSLATION
 AST_government_formation_period: "Období formování vlády" # todo: NEW TRANSLATION
 AST_government_formation_period_desc: "Každá strana chce mít moc rozhodovat o svých politikách, ale pokud okolnosti vyžadují, národní jednotová vláda může být rozumnou volbou.\n\n§W§YEfekty během aktivity:§!\n£GFX_trigger_yes $AST_election_recently_concluded$\n\n$AST_ruling_party$ může vytvořit §YNárodní jednotovou vládu§!.\n\nVytvořte §YNárodní jednotovou vládu§! v okně Demokratických voleb v australském stromě zaměření.§!" # todo: NEW TRANSLATION
 AST_war_is_coming_cat: "Válka přichází" # todo: NEW TRANSLATION
 AST_war_is_coming_cat_desc: "Napětí roste a australské úředníci i občané začínají chápat, že válce se možná nevyhnou. Musíme svolat kabinet k rozhodnutí o postupech v případě invaze. Než tak učiníme, může stát za to podniknout kroky, které by plný kabinet neschválil." # todo: NEW TRANSLATION
 AST_seize_civilian_industry: "Zabavit civilní průmysl" # todo: NEW TRANSLATION
 AST_seize_civilian_industry_desc: "I když jsou spotřební zboží nezbytné pro naše občany a ekonomiku, nelze se vyhnout tomu, že válečný čas vyžaduje jiné potřeby. Válka přichází; budeme připraveni." # todo: NEW TRANSLATION
 AST_scorch_the_north: "Spálit sever" # todo: NEW TRANSLATION
 AST_scorch_the_north_desc: "Pokud očekáváme invazi ze severu, existují způsoby, jak takové postupy ztížit, i když to má cenu. I když vývoj severních států bude zpomalen politikou spálené země, může to pomoci odrazit agresory." # todo: NEW TRANSLATION
 AST_the_brisbane_line: "Brisbane Line" # todo: NEW TRANSLATION
 AST_the_brisbane_line_desc: "Australské obranné schopnosti nemusí stačit zcela odrazit cizí agrese. Přijetím politiky, která upřednostňuje pevnou obranu životně důležitých území místo slabé obrany všech, zajistíme, že nejrozvinutější a nejhustěji osídlené části [AST.GetName] zůstanou pod naší kontrolou.\n\nAčkoliv to jistě odmítnou ti, kdo odmítají jakékoliv ustoupení, vláda má povinnost vést [AST.GetName] rozumným směrem." # todo: NEW TRANSLATION
 AST_summon_the_cabinet_mission: "Svolat kabinet" # todo: NEW TRANSLATION
 AST_summon_the_cabinet_mission_desc: "Svolat diplomaty, úředníky a teoretiky do Canberry; hrozba invaze musí být projednána." # todo: NEW TRANSLATION
 AST_summon_the_cabinet_tt1: "\nTato událost naruší sezení vlády a může vést k jejímu §Ykolapsu§!." # todo: NEW TRANSLATION
 AST_australian_accusations_modifier: "Australská obvinění" # todo: NEW TRANSLATION
 AST_cabinet_trust_cat: "Důvěra v kabinet" # todo: NEW TRANSLATION
 AST_cabinet_trust_increase_tt: "\n§Zvýšit§! §YDůvěru v kabinet§!\n" # todo: NEW TRANSLATION
 AST_cabinet_trust_decrease_tt: "\n§Snížit§! §YDůvěru v kabinet§!\n" # todo: NEW TRANSLATION
 AST_cabinet_trust_remove_tt: "§ZOdstranit§! §YDuchy Důvěry v kabinet§!" # todo: NEW TRANSLATION
 AST_australian_comforts_fund: "£BoP_right_texticon  Australský fond útěchy" # todo: NEW TRANSLATION
 AST_australian_comforts_fund_desc: "Vláda uctí jednu z obětí letecké nehody v Canbeře investicí do Australského fondu útěchy, jehož přeživší manželka je nadšenou pracovnicí.\n\nFond má ulehčit čas australských vojáků v poli zasíláním předmětů, které doplňují jejich raciony a osobní výbavu, a proto z takové investice bude profit i válečné úsilí." # todo: NEW TRANSLATION
 AST_eminent_successors: "£BoP_right_texticon  Vynikající nástupci" # todo: NEW TRANSLATION
 AST_eminent_successors_desc: "Některé oběti letecké katastrofy v Canbeře byly vysoce uznávaní státní činitelé. Ačkoliv není možné nahradit jejich tragický osud, jmenování několika významných nástupců by mohlo stabilizovat vládu a obnovit důvěru veřejnosti i ministrů." # todo: NEW TRANSLATION
 AST_critics_to_shame: "£BoP_right_texticon  Ztrapnit kritiky" # todo: NEW TRANSLATION
 AST_critics_to_shame_desc: "Letecká nehoda v Canbeře zasáhla celou zemi a nezanechala žádného Australa netknutého smutkem. V takových chvílích vždy budou ti, kdo se snaží situaci zneužít. Odhalíme nejhlasitější kritiky za to, čím jejich kritika skutečně je: pokusem narušit pořádek." # todo: NEW TRANSLATION
 AST_approach_the_independents: "£BoP_left_texticon  Oslovit nezávislé" # todo: NEW TRANSLATION
 AST_approach_the_independents_desc: "Vláda je nestabilní, protože důvěra v její schopnost řešit nedávné otřesy slábne. Oslovením nezávislých je možné je přesvědčit, že změna vlády by byla ku prospěchu." # todo: NEW TRANSLATION
 AST_a_sound_voice: "£BoP_left_texticon  Silný hlas" # todo: NEW TRANSLATION
 AST_a_sound_voice_desc: "V této periodě politického otřesu se zdá, že jeden sebevědomý hlas inspiruje důvěru v australský lid. Může to být hlas dalšího vůdce [AST.GetName]?" # todo: NEW TRANSLATION
 AST_challenge_government_narrative: "£BoP_left_texticon  Zpochybnit vládní vyprávění" # todo: NEW TRANSLATION
 AST_challenge_government_narrative_desc: "Detaily sdělené vládou o letecké nehodě v Canbeře se jeví jako neobvyklé, což nevyhnutelně vede ke spekulacím, že informace mohou být zatajovány. Jak mohl zkušený důstojník RAAF havarovat za ideálních letových podmínek? Odpovědi musí být vyžadovány od vlády." # todo: NEW TRANSLATION
 AST_make_a_common_enemy: "Vytvořit společného nepřítele" # todo: NEW TRANSLATION
 AST_make_a_common_enemy_desc: "Hlasy nedůvěry se po ztrátě představitelů v letecké nehodě rozmnožily. Neobvyklé okolnosti nehody nejsou jediným faktorem podněcujícím podezření na cizí zásah; nakonec nic nespojuje více než společného nepřítele." # todo: NEW TRANSLATION
 AST_make_a_common_enemy_tt: "§RMožné efekty události:§!" # todo: NEW TRANSLATION
 AST_ensure_cabinet_loyalty: "Zajistit loajalitu kabinetu" # todo: NEW TRANSLATION
 AST_ensure_cabinet_loyalty_desc: "Hrozba návrhu nedůvěry nepředstavuje nebezpečí, pokud většina kabinetu hlasuje pro stávající vládu. Zajistíme loajalitu kabinetu." # todo: NEW TRANSLATION
 AST_castle_crumbling_mission: "Zámek se hroutí" # todo: NEW TRANSLATION
 AST_castle_crumbling_mission_desc: "Austrálie se dívá ke svým vůdcům po tragické letecké nehodě v Canbeře. Zůstane vládě veřejná důvěra i po ztrátě členů kabinetu, nebo by změna vedení byla nejlepší?" # todo: NEW TRANSLATION
 AST_castle_crumbling_mission_event_tt: "§YEfekty události:§!" # todo: NEW TRANSLATION
 AST_castle_crumbling_mission_complete_tt: "Dokončit misi §YCastle Crumbling§!" # todo: NEW TRANSLATION
 AST_cabinet_trust_complete_1_flag: "Učinil rozhodnutí: §YZaložit společného nepřítele§!" # todo: NEW TRANSLATION
