 INS_is_deescalating_tt: "Již neprovádí deeskalační misi"
 INS_escalate_the_conflict: "Eskalovat konflikt"
 INS_escalate_the_conflict_desc: "Zorganizujeme nepokoje a potyčky s nepřátelskými silami, abychom zvýšili napětí a eskalaci a připravili půdu pro to, aby pozdější závažnější operace čelily menší mezinárodní kritice."
 INS_escalate_the_conflict_HOL: "$INS_escalate_the_conflict$"
 INS_escalate_the_conflict_HOL_desc: "$INS_escalate_the_conflict_desc$"
 INS_deescalate_the_conflict: "Požádat o mezinárodní zprostředkování"
 INS_deescalate_the_conflict_2: "Nařídit příměří"
 INS_deescalate_the_conflict_desc: "Nizozemci s námi nebudou jednat v dobré víře. Pro ně zůstáváme povstalci, nepříjemností k potlačení, nikoli národem, s nímž je třeba počítat. Velmoci světa jsou však něco jiného a Haag je nemůže tak snadno odmítnout. Obrátíme se na mezinárodní společenství se žádostí o zprostředkování a necháme zahraniční nátlak vynutit to, co náš vlastní hlas nedokáže."
 INS_deescalate_the_conflict_2_desc: "Naše nájezdy splnily svůj účel. Koloniální posádka ví, kam až dosáhneme, a Haag ví, že se nenecháme zastrašit. Každý úder však dává Nizozemsku novou záminku poslat více mužů a více lodí, a my nejsme připraveni na otevřenou válku. Našim velitelům bude předán rozkaz zastavit palbu. Další úder přijde, až to řekneme my, ne až nás k němu Nizozemci vyprovokují."
 INS_renville_tt_HOL: "§W§Y[USA.GetFlag][USA.GetNameDefCap]§! nám předloží ultimátum. Pokud se nevzdáme a nestáhneme se z Indonésie, §Rvyhlásí nám válku§!.§!"
 INS_renville_wont_happen_neutral_tt: "Konflikt skončí dříve, než budou americká jednání uzavřena, takže nebudou moci zasáhnout."
 INS_renville_explain_USA_tt: "Pokud konflikt nebude vyřešen do §Y365 dní§!:\n\n"
 INS_renville_timer_mission_republic: "Renvillská jednání probíhají"
 INS_renville_timer_mission_HOL: "$INS_renville_timer_mission_republic$"
 INS_national_revolution_peace_negotiation: "Vyjednat stažení [FROM.GetName]"
 indonesia_reduce_escalation_1_effect_tooltip_for_min_4: "Sníží eskalaci o §G1§!, minimálně na §Y4§!."
 INS_ongoing_influence_process: "Již nezřizuje základnu milicí"
 INS_current_revolution_strength_3_tt: "Tento stát má momentálně §Gvysokou§! aktivitu milicí."
 INS_current_revolution_strength_0_tt: "Tento stát momentálně nemá žádnou aktivitu milicí."
 INS_has_spent_points_trigger_tt: "Nelze zřídit další základny milicí"
 INS_national_revolution_cat: "Indonéská národní revoluce"
 INS_national_revolution_cat_desc: "Po 350 letech nizozemské tyranie jsme vzali věci do vlastních rukou a vyhlásili nezávislost. Nizozemsko naši autoritu neuznává, nadále spravuje Indie jako svou kolonii a zachází s námi jako se zločinci.\n\nMusíme dál přebírat kontrolu nad dalšími regiony a důležitými městy a svrhnout nizozemskou vládu zevnitř. Musíme si však dát pozor, abychom bez pečlivého plánování nebyli příliš agresivní, protože rychlá eskalace z naší strany by mohla vyvolat nizozemskou vojenskou akci."
 INS_national_revolution_cat_map: "Zahájit klamná povstání"
 INS_national_revolution_dutch_cat: "Revoluční milice v Indiích"
 INS_national_revolution_dutch_cat_desc: "Revolucionáři ve Východní Indii nezákonně vyhlásili nezávislost a pomocí milicí převzali kontrolu nad oblastmi Indií. Přes naše nejlepší úsilí se nám v těchto regionech nepodařilo obnovit kontrolu kvůli obrovskému počtu přítomných milicí.\n\nMusíme je zastavit dříve, než převezmou kontrolu nad dalšími městy a ještě více destabilizují správu Indií. Ačkoli jde o krajní řešení, pokud budou takto pokračovat, může být nezbytné použít vojenskou sílu."
 INS_HOL_revolution_not_going_well_tt: "§RBez Batávie nemůžeme Indie spravovat a nezbude nám než s revolucionáři vyjednat mírovou dohodu.§!"
 INS_gradual_escalation_republic: "Postupná eskalace"
 INS_gradual_escalation_HOL: "Postupná eskalace"
 INS_gradual_escalation_republic_desc: "Nizozemské odvety jsou po každém našem nájezdu tvrdší a jejich hlídky pronikají do okresů, které před měsíci opustily. Naši velitelé hlásí těžší boje v místech, jež byla dlouho považována za zajištěná, a naše ztráty rostou rychleji, než je rekruti dokážou nahrazovat. Konflikt se rozšířil do provincií, které byly loni klidné."
 INS_gradual_escalation_HOL_desc: "Zprávy z našich rezidencí se týden od týdne zhoršují. Povstalci útočí v okresech, kde se o jejich působení vůbec neuvažovalo, a vojenské velení v Batávii tlačí na tvrdší opatření než jakákoli, která byla dosud vyzkoušena. V Haagu na každém zasedání kabinetu ubývá těch, kdo dříve radili trpělivost."
 INS_national_revolution_republic_win_ins_tt: "[INS.GetAdjectiveCap] republikánské milice prosadí v regionu §Gde facto kontrolu§! a konflikt skončí §Grepublikánským vítězstvím§!."
 INS_national_revolution_republic_win_hol_tt: "[INS.GetAdjectiveCap] republikánské milice prosadí v regionu §Rde facto kontrolu§! a konflikt skončí §Rrepublikánským vítězstvím§!."
 INS_national_revolution_dutch_cat_map: "Zobrazit státy obsazené milicemi"
 INS_take_batavia: "Převzít kontrolu nad Jávou"
 INS_take_batavia_desc: "Nizozemská chamtivost, kvůli níž investovali téměř výhradně na Jávě a ignorovali východní ostrovy, učinila z Jávy Achillovu patu celé kolonie. To bude jejich zkáza! Musíme vrhnout naše síly na Jávu a zničit nizozemské komunikační a zásobovací sítě, čímž správě Indií znemožníme fungovat."
 INS_hold_batavia_HOL: "Udržet Jávu"
 INS_hold_batavia_HOL_desc: "Republikánské síly zahájily operaci s cílem přesunout většinu svých sil na Jávu a pokusit se převzít kontrolu nad celým ostrovem. Musíme dál klást odpor. Jejich operace je riskantní a dala nám příležitost svrhnout jejich vládu, pokud selžou."
 INS_militias_moestopo_mission: "Moestopo požaduje povýšení za své úsilí"
 INS_militias_pki_uprising_mission: "Komunistické povstání je nevyhnutelné"
 INS_pacific_revolution_cat: "Pacifická revoluce"
 INS_instigate_in_country: "Podnítit revoluci v zemi [FROM.GetName]"
 INS_instigate_in_country_desc: "Naše revoluce neskončila ve chvíli, kdy byl poslední koloniální voják vyhnán z [ROOT.GetAdjective] půdy. Dělníci a rolníci v zemi [FROM.GetName] trpí pod týmž jhem, které jsme my odvrhli, a nyní v nás vidí důkaz, že utlačovatele lze porazit. Vyšleme mezi ně agitátory, budeme šířit letáky, financovat jejich odbory a rozdmýchávat plameny nespokojenosti, dokud podmínky pro revoluci nedozrají."
 INS_launch_revolution: "Vyzvat k revoluci"
 INS_launch_revolution_desc: "Podmínky v zemi [FROM.GetName] dozrály. Naši agenti hlásí rostoucí neklid v továrnách i na polích a místní stranické buňky jsou připraveny jednat. Nastal čas vyzvat dělníky a rolníky země [FROM.GetName], aby povstali a chopili se toho, co jim právem náleží."
 INS_anti_colonialist_bonus: "Šířit protikoloniální nálady v zemi [FROM.GetName]"
 INS_anti_colonialist_bonus_desc: "Lid země [FROM.GetName] dře ve prospěch cizího pána a je nucen sloužit zájmům, které nejsou jeho vlastní. Připomeneme mu, že podřízení je volba a že jeho páni nejsou tak silní, jak se tváří."
 INS_revolutionary_sentiment: "Spolupracovat s [FROM.GetAdjective] revolucionáři"
 INS_revolutionary_sentiment_desc: "V zemi [FROM.GetName] jsou lidé, kteří se již sami přidali k naší věci. Chybí jim organizace a zdroje, nikoli však přesvědčení. Koordinací s těmito skupinami můžeme urychlit zhroucení stávajícího řádu, i kdyby výsledná nestabilita zemi krátkodobě ztížila správu."
 INS_arm_militias: "Vyzbrojit místní [FROM.GetAdjective] milice"
 INS_arm_militias_desc: "Letáky a projevy ponesou revoluci jen do určité míry. Až přijde okamžik, naši soudruzi v zemi [FROM.GetName] musí být schopni bojovat. Přebytečné zbraně a zásoby budou pašovány spřízněným milicím, aby síly reakce čelily ozbrojenému lidu, nikoli bezbranným masám."
 INS_arm_militias_tt: "Pokud vypukne občanská válka, komunisté začnou s dalšími divizemi."
 INS_propoganda_mission: "Šířit komunismus v zemi [FROM.GetName]"
 INS_propoganda_mission_desc: "Straničtí organizátoři budou vysláni po celé zemi [FROM.GetName], aby zakládali čtenářské kroužky, verbovali mezi odbory a přinášeli poselství revoluce do vesnic. Semena, která dnes zasadíme, brzy přinesou plody."
 INS_abandon_mission: "Opustit misi"
 INS_abandon_mission_desc: "Naše zdroje nejsou neomezené a boj v zemi [FROM.GetNameDef] vyžaduje více, než si momentálně můžeme dovolit poskytnout. Stáhneme své agenty a přesměrujeme své úsilí tam, kde je ho nejvíce zapotřebí."
