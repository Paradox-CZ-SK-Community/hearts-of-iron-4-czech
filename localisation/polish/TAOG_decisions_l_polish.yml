 SIA_thai_soldiers_blood: "Krev thajských vojáků"
 SIA_undauntedly_love_nation: "Neohroženě milovat národ"
 SIA_limited_war_cat: "Omezená válka"
 SIA_limited_war_cat_desc: "Nemůžeme doufat, že v otevřené válce porazíme velmoci regionu - zatím ne. Prosazováním našich nároků krok za krokem, prostřednictvím pečlivě vymezených tažení, oslabujeme jejich postavení, zatímco naše vlastní síla nadále roste."
 SIA_start_limited_war_indochina: "Zahájit omezenou válku v Indočíně proti [FROM.GetName]"
 SIA_start_limited_war_indochina_tt_main: "Zahájí §Yomezenou válku§! proti §Y[FROM.GetName]§!.\nOvládnutím všech zvýrazněných států patřících §Y[FROM.GetName]§! budeme moci tyto státy získat bez eskalace do totální války.\n§RZtráta více než [?var:global.limited_war_surrender_threshold|%.0] postupu ke kapitulaci způsobí, že omezenou válku prohrajeme§!\n\n§RProhra v omezené válce může způsobit, že budeme muset vrátit dříve dobytá území§!"
 SIA_start_limited_war_rejoin_faction: "Dočasně opustíme svou současnou frakci a po skončení §Yomezené války§! se do frakce znovu připojíme."
 SIA_start_limited_war_can_join_faction: "Po skončení §Yomezené války§! se budeme moci znovu připojit k frakcím"
 is_not_engaged_in_a_limited_war: "Není zapojen do §Yomezené války§!"
 SIA_limited_war_indochina: "[SIA_GetLimitedWarTarget]"
 SIA_limited_war_indochina_desc: "Ovládněte všechny zvýrazněné státy, abyste vyhráli §Yomezenou válku§! a nárokovali si je bez eskalace do totální války.\n§RZtráta více než [?var:global.limited_war_surrender_threshold|%.0] postupu ke kapitulaci způsobí, že omezenou válku prohrajeme§!"
 SIA_limited_war_indochina_target: "§YOmezená válka§! proti §Y[?var:limited_war_target.GetName]§!"
 SIA_limited_war_indochina_no_target: "Omezená válka selhala"
 SIA_start_limited_war_malaysia_burma: "Zahájit omezenou válku proti [FROM.GetName]"
 SIA_new_territories_administration_cat: "Správa nových území"
 SIA_new_territories_administration_cat_desc: "Dobytí je teprve začátek. Území, která jsme získali, musí být spravována, rozvíjena a bráněna, mají-li se stát trvalou součástí národa, a nikoli přítěží, která láká k opětovnému dobytí."
 SIA_finish_the_triangular_defense_network: "Dokončit trojúhelníkovou obrannou síť"
 SIA_finish_the_triangular_defense_network_desc: "Po dokončení dvou pevností na severu a jihu je můžeme spojit s Bangkokem a vytvořit trojúhelníkovou obrannou síť. Pokud jedna padne, ostatní zůstanou nadále funkční."
 has_built_fortress_saigon: "Vybudoval pevnost Saigon"
 has_built_fortress_hanoi: "Vybudoval pevnost Hanoj"
 SIA_develop_phibunsongkhram: "Rozvíjet [1067.GetName]"
 SIA_develop_southern_indochina: "Rozvíjet jižní Indočínu"
 SIA_develop_northern_indochina: "Rozvíjet severní Indočínu"
 SIA_develop_northern_malaya: "Rozvíjet Si Rat Malai" # todo: NEW TRANSLATION
 SIA_develop_eastern_burma: "Rozvíjet Saharat Thai Doem" # todo: NEW TRANSLATION
 SIA_use_abandoned_french_tools: "Využít opuštěné francouzské nástroje"
 SIA_use_abandoned_french_tools_desc: "Francouzi na našich obsazených územích zanechali část svého těžkého nářadí. Můžeme ho využít pro sebe."
 SIA_fortress_saigon: "Pevnost Saigon"
 SIA_fortress_saigon_desc: "Sever našeho nového impéria bude chránit Hanoj. S horami na severu a Rudou řekou před sebou má ideální polohu k zadržení všech vetřelců."
 SIA_fortress_hanoi: "Pevnost Hanoj"
 SIA_fortress_hanoi_desc: "Jih impéria bude chránit Saigon. Toto pevnostní město bude stát jako strážce Bangkoku a chránit záliv země [ROOT.GetName] před vetřelci."
 SIA_propaganda_poster_slot_available_tt: "Má prázdný slot filmového plakátu."
