l_polish:
 HOL_recall_conrad_helfrich: "Přivolat Conrada Helfricha z Indií" # todo: NEW TRANSLATION
 HOL_recall_conrad_helfrich_desc: "V těchto naléhavých časech musíme nad vše upřednostnit domov. Conrad Helfrich, nejlepší admirál Královského nizozemského námořnictva, se musí vrátit do Nizozemska." # todo: NEW TRANSLATION
 INS_is_taking_volksraad: "Právě schvaluje zákon ve Volksraadu" # todo: NEW TRANSLATION
 INS_volksraad_cat: "Volksraad" # todo: NEW TRANSLATION
 INS_volksraad_cat_desc: "Lidová rada, v holandštině známá jako Volksraad, byla založena v roce 1918 jako pokus přinést demokracii do Východní Indie v rámci provádění tzv. „Etických politik“. Křesla obsazovali jak Nizozemci, tak indonéští úředníci, vybraní různými způsoby. I když Nizozemsko zachovává nepodmíněné veto, Volksraad může vládě schvalovat usnesení a zákony." # todo: NEW TRANSLATION
 INS_volksraad_allow_language_in_schools: "Povolit indonéštinu ve školách" # todo: NEW TRANSLATION
 INS_volksraad_allow_language_in_schools_desc: "Přístup k vyššímu vzdělání v Indii je z velké části omezen na Nizozemce a bohatší třídy Indonésanů, kteří mluví nizozemsky, protože je to jediný jazyk, ve kterém se vyučuje. Probíhající usnesení ve Volksraadu o otevření škol s výukou v indonéštině čeká na hlasování guvernéra generála." # todo: NEW TRANSLATION
 INS_volksraad_allow_language_in_government: "Povolit indonéštinu ve vládě" # todo: NEW TRANSLATION
 INS_volksraad_allow_language_in_government_desc: "Vládní role v Indies, včetně Volksraadu, vyžadují plynulost v nizozemštině, což přimělo mnoho členů Volksraadu, zejména zástupce domorodých komunit, zpochybňovat platnost její demokracie. Připravili návrh, který trvá na tom, že vládní pozice by měly být, když je to možné, obsazeny mluvčími indonéštiny." # todo: NEW TRANSLATION
 INS_volksraad_remove_education_quotas: "Zrušit systém kvót ve vzdělávání" # todo: NEW TRANSLATION
 INS_volksraad_remove_education_quotas_desc: "Vzdělávací systém ve Východní Indii nyní funguje na bázi kvót, kde musí být přijato určité množství indonéských studentů a určité množství nizozemských studentů. To bylo ve Volksraadu kontroverzní vzhledem k běžnému přesvědčení, že to je nespravedlivě nakloněno ve prospěch Nizozemců. Místo toho, aby Volksraad roky debatoval o reformě systému, může stát za to kvótní systém zcela zrušit." # todo: NEW TRANSLATION
 INS_volksraad_reduce_rubber_export_tax: "Snížit daň z vývozu pryže soukromníky" # todo: NEW TRANSLATION
 INS_volksraad_reduce_rubber_export_tax_desc: "V současnosti existuje extrémně vysoká daň na soukromé společnosti vyvážející pryž, což nám umožňuje udržovat monopol na trhu. To však vedlo k ekonomickému zastavení v některých regionech, protože soukromé plantáže nemohly fungovat. Tenkrát se to považovalo za přijatelné, ale mezinárodní protekcionismus po Velké depresi učinil náš vývoz pryže mnohem méně lukrativním. Mohlo by stát za to daň snížit, aby se nastartovala ekonomika." # todo: NEW TRANSLATION
 INS_volksraad_knil_rank_limit: "Schválit protidiskriminační zákony pro vojenské hodnosti" # todo: NEW TRANSLATION
 INS_volksraad_knil_rank_limit_desc: "Ačkoliv neexistuje formální pravidlo bránící domorodým Indonésanům postoupit v hodnostech KNIL, existuje nepsané pravidlo, které tomu brání, omezující i nejvýkonnější vojenský personál na maximálně plukovníka. Několik stran ve Volksraadu tlačí na vládu, aby uznala úsilí vysoce výkonných indonéských důstojníků." # todo: NEW TRANSLATION
 INS_volksraad_legalize_displaying_flag: "Legalizovat vystavování červeno-bílé vlajky" # todo: NEW TRANSLATION
 INS_volksraad_legalize_displaying_flag_desc: "Červenobílá vlajka „Indonésie“ je nyní zakázána na veřejnosti kvůli jejím vazbám na nacionalistické, protikolonialistické organizace. Legalizace jejího vystavování by pravděpodobně byla projevem naší ochoty ke spolupráci a zabránila by dalšímu radikalizování nacionalistů po celém souostroví." # todo: NEW TRANSLATION
 INS_volksraad_education_subsidies_for_indonesians: "Otevřít dotace na vzdělání i pro nedutch obyvatele" # todo: NEW TRANSLATION
 INS_volksraad_education_subsidies_for_indonesians_desc: "Ve Volksraadu probíhá debata ohledně dotací a stipendií poskytovaných nizozemským studentům ve Východní Indii. Několik zástupců domorodých komunit ve Volksraadu argumentovalo, že by měl být tento systém rozšířen na každého studenta, bez ohledu na původ. To by nám přineslo mnoho sympatií obyvatelstva, ale nebylo by to levné." # todo: NEW TRANSLATION
 INS_volksraad_indonesian_national_language: "Udělat indonéštinu oficiálním národním jazykem" # todo: NEW TRANSLATION
 INS_volksraad_indonesian_national_language_desc: "Indonéština se stala běžným jazykem v mnoha částech souostroví a překonává jazykové bariéry mezi různými kulturami. S tím, jak je indonéština nyní povolena ve vzdělávání a ve vládních funkcích, mnoho zástupců ve Volksraadu žádá o její právní uznání jako oficiálního jazyka kolonie na stejné úrovni jako nizozemština." # todo: NEW TRANSLATION
 INS_volksraad_official_flag: "Uznat indonéskou vlajku jako oficiální" # todo: NEW TRANSLATION
 indonesia_volksraad_official_flag_effect_tt: "Naše vlajka bude změněna na červeno-bílou vlajku." # todo: NEW TRANSLATION
 INS_volksraad_official_flag_desc: "Návrhy ve Volksraadu, které usilují o autonomii, nakonec uspěly, a to, co se před několika lety nazývalo Nizozemské Východní Indie, je nyní Dominion Indonésie. Naše vlajka by měla být upravena tak, aby odrážela tyto změny." # todo: NEW TRANSLATION
 indonesia_volksraad_passed_6: "Schválil protidiskriminační zákony v armádě" # todo: NEW TRANSLATION
