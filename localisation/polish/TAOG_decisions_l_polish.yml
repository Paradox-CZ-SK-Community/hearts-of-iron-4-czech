 SIA_new_territories_administration_cat: "Správa nových území" # todo: NEW TRANSLATION
 SIA_new_territories_administration_cat_desc: "Dobytí je teprve začátek. Území, která obsadíme, musí být spravována, rozvíjena a bráněna, aby se stala trvalou součástí národa, nikoli břemenem, které láká znovudobytí." # todo: NEW TRANSLATION
 SIA_finish_the_triangular_defense_network: "Dokončit trojúhelníkovou obrannou síť" # todo: NEW TRANSLATION
 SIA_finish_the_triangular_defense_network_desc: "S dvěma pevnostmi na severu a jihu dokončenými, můžeme je spojit s Bangkokem a vytvořit trojúhelníkovou obrannou síť. Pokud jedna padne, ostatní zůstanou funkční." # todo: NEW TRANSLATION
