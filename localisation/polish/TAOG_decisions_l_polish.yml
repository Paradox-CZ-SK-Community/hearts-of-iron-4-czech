 AST_summons_to_australian_hall: "Svolání do Australian Hall"
 AST_summons_to_australian_hall_desc: "Ve snaze rozšířit [AST.GetFascistParty] musíme sjednotit a mobilizovat naše stoupence. Australian Hall čeká."
