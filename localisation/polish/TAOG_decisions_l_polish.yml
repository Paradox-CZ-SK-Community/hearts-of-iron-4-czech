 SIA_appeal_to_industrialists: "Oslovit průmyslníky" # todo: NEW TRANSLATION
 SIA_implement_industrialists_reforms_countdown: "Implementovat reformy průmyslníků" # todo: NEW TRANSLATION
 SIA_implement_industrialists_reforms_countdown_trigger: "Postavte §Y2 civilní továrny§! (vyjma továren získaných z zaměření a obchodu)" # todo: NEW TRANSLATION
 SIA_appeal_to_industrialists_tt: "Získáme podporu průmyslníků.\n\nPomohou nám v občanské válce, poskytnou další vybavení. Očekávají však, že rozšíříme průmyslovou základnu výstavbou §Y2§! dalších §YCivilních továren§! z továren, které máme na konci občanské války během §Y720 dní§! od získání moci (vyjma továren získaných z zaměření nebo obchodu).\n\nNesplnění bude mít dopad na §YStabilitu§! a §YVálečnou podporu§!\n\nPři začátku občanské války obdržíme: " # todo: NEW TRANSLATION
 SIA_seek_support_from_constitutional_monarchists: "Hledat podporu u ústavních monarchistů" # todo: NEW TRANSLATION
 SIA_implement_constitutionalist_reforms_countdown: "Implementovat ústavní reformy" # todo: NEW TRANSLATION
 SIA_seek_support_from_constitutional_monarchists_tt: "Získáme podporu ústavních monarchistů.\n\nPomohou nám v občanské válce, vytvoří další divize. Očekávají však, že zůstaneme ústavní monarchií tím, že dokončíme zaměření §Y$SIA_a_constitutional_monarchy$§! během §Y720 dní§! od získání moci.\n\nNesplnění to povede k poklesu §YStability§! a §YVálečné podpory§!" # todo: NEW TRANSLATION
 SIA_appeal_to_rural_people: "Oslovit venkovské obyvatele" # todo: NEW TRANSLATION
 SIA_appeal_to_rural_people_tt: "Získáme podporu venkovského obyvatelstva.\n\nPomohou nám v občanské válce, poskytnou milice. Očekávají však, že schválíme prospěšné zemědělské politiky výběrem buď §Y$SIA_mechanization_of_agriculture$§! nebo §Y$SIA_reduction_of_agricultural_yield_taxes$§! během §Y720 dní§! od získání moci.\n\nNesplnění bude mít dopad na §YStability§! a §YVálečnou podporu§!\n\nPři začátku občanské války obdržíme: " # todo: NEW TRANSLATION
 SIA_implement_rural_reforms_countdown: "Implementovat venkovské reformy" # todo: NEW TRANSLATION
 SIA_implement_absolutist_reforms_countdown: "Implementovat absolutistické reformy" # todo: NEW TRANSLATION
 SIA_seek_support_from_absolutists_monarchists: "Hledat podporu u absolutistických monarchistů" # todo: NEW TRANSLATION
 SIA_seek_support_from_absolutists_monarchists_tt: "Získáme podporu absolutistických monarchistů.\n\nPomohou nám v občanské válce, vytvoří další divize. Očekávají však, že obnovíme absolutní monarchii dokončením §Y$SIA_an_absolute_monarchy$§! během §Y720 dní§! od získání moci.\n\nNesplnění bude mít dopad na §YStability§! a §YVálečnou podporu§!" # todo: NEW TRANSLATION
 SIA_appeal_to_navy_clique: "Oslovit námořní kliku" # todo: NEW TRANSLATION
 SIA_appeal_to_navy_clique_countdown: "Implementovat námořní reformy" # todo: NEW TRANSLATION
 SIA_appeal_to_navy_clique_tt: "Získáme podporu námořní kliky.\n\nPomohou nám v občanské válce, odevzdají nám celé námořnictvo a jednu mariňáckou divizi. Očekávají však, že schválíme prospěšné námořní politiky dokončením §Y$SIA_thonburi_class_coastal_defense_ship$§! během §Y720 dní§! od získání moci.\n\nNesplnění bude mít dopad na §YStability§! a §YVálečnou podporu§!\n\nPři začátku občanské války obdržíme:\n§YNaše celé námořnictvo§!\n§YKrálovské thajské mariňky§! mariňáckou divizi\n§YMarines§! technologii" # todo: NEW TRANSLATION
 SIA_appeal_for_support_cat: "Žádat o podporu" # todo: NEW TRANSLATION
 SIA_appeal_for_support_cat_desc: "Žádné politické hnutí neuspěje samo. Monarchisté, ústavníci, vojáci i civilisté každý drží část vlivu v zemi. Jejich podpora musí být pečlivě pěstována, pokud chceme mít sílu jednat, až přijde čas." # todo: NEW TRANSLATION
