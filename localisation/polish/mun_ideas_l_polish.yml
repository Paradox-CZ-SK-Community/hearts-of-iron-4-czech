 CZE_sudeten_facde_desc: "Tím, že nepodporujeme místní polovojenské jednotky, jsou naše ospravedlnění kroků namířených na [CZE.GetNonIdeologyName] nyní po celém světě vnímána jako pouhá zástěrka."
