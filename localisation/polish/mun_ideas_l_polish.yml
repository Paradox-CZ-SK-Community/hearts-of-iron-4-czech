 CZE_sudetenland_german_state_modifier_desc: "Nedávné hospodářské obtíže postihly průmysl v Sudetsku. To způsobilo, že lidé žijící v regionu obviňují vládu [ROOT.getname] ze svých nedávných neštěstí." # todo: CHANGED
