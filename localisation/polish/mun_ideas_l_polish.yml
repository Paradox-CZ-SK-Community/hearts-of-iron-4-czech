 CZE_sudeten_german_quandary: "Dilema Sudetska" # todo: CHANGED
 CZE_sudeten_german_quandary_desc: "Zatímco většina obyvatel Sudetska si přeje pouze větší autonomii pod stávající vládou, mnohé sudetské politické strany a jejich příznivci se mohou rychle stát pátou kolonou, pokud by se nějaký německý stát pokusil anektovat část regionu." # todo: CHANGED
 CZE_sudeten_german_quandary_modifier_tt: "§YPasivní efekt§!:\nPokud §Y[AUS.GetFlag][AUS.GetNonIdeologyName]§!, §Y[GER.GetFlag][GER.GetNonIdeologyName]§!, nebo jakýkoli jiný [BAY.GetFlag]§YNěmecký stát§!, který s námi sousedí, udělí ospravedlnění nebo získá §RCíl války§! proti nám, zatímco buď §Y[69.GetName]§!, §Y[972.GetName]§! nebo §Y[74.GetName]§! jsou pod naší kontrolou:\n - (§YVšechny ovládané státy Sudetska§!):\n    Přidej §Y$CZE_sudetenland_paramilitaries_modifier$§!, který uděluje:\n       $MODIFIER_LOCAL_INTEL_TO_ENEMIES$: §R+10%§!\n       $MODIFIERS_ARMY_CORE_DEFENCE_FACTOR$: §R-10.0%§!\n       $modifier_state_repair_speed_bunker_factor$: §R-10.00%§!\n\n - Tento §Yefekt§! se může stát pouze jednou" # todo: CHANGED
 CZE_sudeten_challenge: "Výzva Sudetska" # todo: CHANGED
