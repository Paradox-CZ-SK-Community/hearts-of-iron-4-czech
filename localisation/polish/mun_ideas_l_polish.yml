 CZE_army_readiness_1: "Nepřipravená armáda"
 CZE_army_readiness_1_desc: "Připravenost armády není jen o mužstvu a vybavení v poli. Důležitá je i důvěra ve vlastní přípravy a podpora politických i průmyslových vůdců země při čelení hrozbám. Mít prostředky k boji je jedna věc, umět je účinně použít věc druhá."
 CZE_army_readiness_3: "Připravená armáda"
 CZE_army_readiness_3_desc: "Připravenost armády není jen o mužstvu a vybavení v poli. Důležitá je i důvěra ve vlastní přípravy a podpora politických i průmyslových vůdců země při čelení hrozbám. Mít prostředky k boji je jedna věc, umět je účinně použít věc druhá."
 CZE_ready_for_anything_idea: "Vždy připraveni"
 CZE_sudeten_german_quandary: "Sudetská otázka"
 CZE_sudeten_german_quandary_desc: "Zatímco většina obyvatel Sudet si přeje pouze větší autonomii v rámci stávající vlády, mnoho sudetských politických stran a jejich podporovatelů by se mohlo rychle stát pátou kolonou, pokud by se některý německý stát pokusil anektovat část regionu."
 CZE_sudeten_german_quandary_modifier_tt: "§YPasivní účinek§!:\nPokud §Y[AUS.GetFlag][AUS.GetNonIdeologyName]§!, §Y[GER.GetFlag][GER.GetNonIdeologyName]§! nebo jakákoli jiná [BAY.GetFlag]§Yněmecká země§!, která s námi sousedí, ospravedlní nebo získá proti nám §Rválečný cíl§!, zatímco §Y[69.GetName]§!, §Y[972.GetName]§! nebo §Y[74.GetName]§! ovládáme:\n - (§YVšechny ovládané sudetské státy§!):\n    Přidá §Y$CZE_sudetenland_paramilitaries_modifier$§!, které poskytuje:\n       $MODIFIER_LOCAL_INTEL_TO_ENEMIES$: §R+10%§!\n       $MODIFIERS_ARMY_CORE_DEFENCE_FACTOR$: §R-10.0%§!\n       $modifier_state_repair_speed_bunker_factor$: §R-10.00%§!\n\n - Tento §Yúčinek§! může nastat pouze jednou"
 CZE_sudeten_challenge: "Sudetská výzva"
 CZE_sudeten_challenge_desc: "Nedávná činnost sudetských polovojenských jednotek v Sudetech přiměla mnohé v mezinárodním společenství uvěřit, že současné agresivní kroky proti nám jsou oprávněné! Bude trvat nějaký čas přesvědčit svět o opaku."
