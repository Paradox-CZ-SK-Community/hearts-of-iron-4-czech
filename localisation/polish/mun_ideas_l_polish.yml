 CZE_taticek_of_czechoslovakia: "Tatíček Masaryk" # todo: CHANGED
 CZE_taticek_of_czechoslovakia_desc: "Tomáš Masaryk, často nazývaný 'Tatíček Masaryk', což znamená 'tatíček' nebo 'otec' (národa), byl od svého vzniku pevnou oporou československého národa. Když se zdálo, že sestavit koalici je nemožné a politické impasy nepřekonatelné, Masaryk znovu a znovu dokázal politické zázraky, které pomohly posílit a rozšířit Československo. I v důchodu jsou jeho názory a doporučení politickému vedení vnímány spíše jako rozkazy než rady." # todo: CHANGED
 CZE_industrialists_veto: "Veto průmyslníků"
 CZE_industrialists_veto_desc: "Průmyslníci mají v politice země značný vliv, neboť stojí v čele mnoha největších [CZE.GetAdjective] koncernů. Jejich obavy nelze v otázkách hospodářské politiky ignorovat a hospodářská mobilizace patří mezi opatření, proti nimž by se stavěli nejtvrději."
 CZE_agrarian_politics_1: "Agrární politika"
 CZE_agrarian_politics_1_desc: "Navzdory průmyslové povaze naší země mají zemědělci a venkovští rolníci v mnoha politických stranách značný politický vliv. Jejich postoje často ovlivňují rozhodování o hospodářské politice a představují stálou politickou překážku dalšímu průmyslovému pokroku."
 CZE_directorate_of_fortification_works_no_gd_idea: "Ředitelství opevňovacích prací"
 CZE_directorate_of_fortification_works_no_gd_idea_desc: "$CZE_directorate_of_fortification_works_no_gd_idea$, známější jako ROP. Je řídicí orgán odpovědný za dohled nad opevňovacími pracemi v zemi."
