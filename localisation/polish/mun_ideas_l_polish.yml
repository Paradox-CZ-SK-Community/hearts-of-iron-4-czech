 CZE_army_readiness_1: "Nepřipravená armáda" # todo: NEW TRANSLATION
 CZE_army_readiness_1_desc: "Připravenost armády není jen o mužích a vybavení v poli. Když čelíte hrozbám, záleží také na důvěře v přípravy a podpoře politických a průmyslových vůdců země. Mít prostředky k boji je jedna věc, schopnost účinně je využít je věc druhá." # todo: CHANGED
 CZE_army_readiness_3: "Připravená armáda" # todo: NEW TRANSLATION
 CZE_army_readiness_3_desc: "Připravenost armády není jen o mužích a vybavení v poli. Když čelíte hrozbám, záleží také na důvěře v přípravy a podpoře politických a průmyslových vůdců země. Mít prostředky k boji je jedna věc, schopnost účinně je využít je věc druhá." # todo: CHANGED
