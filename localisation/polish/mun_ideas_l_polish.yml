 CZE_taticek_of_czechoslovakia: "Tatínek" # todo: NEW TRANSLATION
 CZE_taticek_of_czechoslovakia_desc: "Tomáš Masaryk, často nazývaný 'Tatínek' (význam 'táta' nebo 'otec' národa), je oporou československého národa od jeho založení. Kdykoli se zdálo, že stavět koalice je nemožné a politické patové situace nepřekonatelné, Masaryk dokázal znovu a znovu provádět politická zázraky, které pomohly posílit a rozšířit Československo. I v důchodu jsou jeho názory a návrhy politickému vedení brány spíše jako rozkazy než rady." # todo: CHANGED
 CZE_industrialists_veto: "Veto průmyslníků" # todo: NEW TRANSLATION
 CZE_industrialists_veto_desc: "Průmyslníci mají značný vliv na politiku země, protože stojí v čele mnoha z největších konglomerátů [CZE.GetNameDef]. Jejich obavy nelze ignorovat v otázkách hospodářské politiky a ekonomická mobilizace je mezi opatřeními, kterým by se nejvíce postavili na odpor." # todo: CHANGED
 CZE_agrarian_politics_1: "Agrární politika" # todo: NEW TRANSLATION
 CZE_agrarian_politics_1_desc: "Přes průmyslový charakter naší země mají zemědělci a venkovští rolníci značný politický vliv v mnoha politických stranách. Jejich názory často ovlivňují rozhodování o hospodářské politice a představují trvalou politickou překážku v dalším průmyslovém pokroku." # todo: CHANGED
 CZE_directorate_of_fortification_works_no_gd_idea: "Ředitelství opevňovacích prací" # todo: NEW TRANSLATION
