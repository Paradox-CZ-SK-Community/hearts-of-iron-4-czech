 CZE_ceskoslovenska_armada_dynamic_modifier_desc: "Armáda byla vybudována z popela rakousko-uherských českých jednotek a veteránů Československé legie. Dědictví obou stále ovlivňuje, jak je armáda vedena." # todo: CHANGED
 CZE_ceskoslovenske_letectvo_dynamic_modifier: "Československé letectvo" # todo: NEW TRANSLATION
 CZE_ceskoslovenske_letectvo_dynamic_modifier_desc: "Letadla možná nebudou vždy připravena, ale naši piloti ano. S možnými leteckými hrozbami ze všech stran musíme učinit z nebe naše moře. Každý pilot se musí počítat, jako by byli tři." # todo: CHANGED
 CZE_a_divided_nation_dynamic_modifier: "Rozdějený národ" # todo: CHANGED
 CZE_a_divided_nation_dynamic_modifier_desc: "Stát [CZE.GetAdjective] stál osamocen ve střední Evropě jako pluralitní stát, který chránil všechny uvnitř svých hranic. Velká hospodářská krize to však změnila. Hospodářské obtíže vyvolaly u různých hnutí v zemi nespokojenost vůči vládě. Tyto rozhořčení nyní hluboce rozdělují národ." # todo: CHANGED
 CZE_skoda_works_dynamic_modifier: "Škodovy závody" # todo: CHANGED
 CZE_skoda_works_dynamic_modifier_desc: "Společnost Škoda zahrnuje výrobu, stavebnictví a investice ve všech sektorech našeho těžkého průmyslu. Její dosah nezná v našich hranicích mezí." # todo: CHANGED
