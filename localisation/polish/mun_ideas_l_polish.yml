 CZE_ceskoslovenska_armada_dynamic_modifier: "Československá armáda"
 CZE_ceskoslovenska_armada_dynamic_modifier_desc: "Armáda byla vybudována z popela českých jednotek Rakouska-Uherska a veteránů československých legií. Odkaz obou sil dosud ovlivňuje způsob vedení armády."
 CZE_ceskoslovenske_letectvo_dynamic_modifier: "Československé letectvo"
 CZE_ceskoslovenske_letectvo_dynamic_modifier_desc: "Letadla nemusí být vždy připravena, ale naši piloti ano. Při možných vzdušných hrozbách ze všech stran musíme učinit z nebe naše moře. Každý pilot musí vydat za tři."
 CZE_a_divided_nation_dynamic_modifier: "Rozdělený národ"
 CZE_a_divided_nation_dynamic_modifier_desc: "[CZE.GetNameDef] stojí osamoceně ve střední Evropě jako pluralitní stát chránící všechny uvnitř svých hranic. Velká hospodářská krize to však změnila. Hospodářské těžkosti vyvolaly odpor vůči vládě mezi různými hnutími v zemi. Tyto rozpory nyní hluboce rozdělují národ."
 CZE_skoda_works_dynamic_modifier: "Škodovy závody"
 CZE_skoda_works_dynamic_modifier_desc: "Společnost Škoda zahrnuje výrobu, stavebnictví a investice ve všech odvětvích našeho těžkého průmyslu. Její vliv v našich hranicích nezná mezí."
 CZE_ceskoslovenske_alecne_lodstvo_dynamic_modifier: "Československé válečné loďstvo"
 CZE_sudetenland_german_state_modifier: "Sudetský separatismus"
 CZE_sudetenland_german_state_modifier_desc: "Nedávné hospodářské potíže postihly průmysl v Sudetech. To způsobilo, že obyvatelé regionu viní [ROOT.GetAdjective] vládu ze svého současného neštěstí."
 CZE_tesinko_polish_state_modifier: "Polský separatismus"
 CZE_czech_state_modifier: "Nedostatek kvalifikovaných českých pracovníků"
 CZE_czech_state_modifier_desc: "Rychlý hospodářský rozvoj 20. století zatěžuje převážně zemědělské české obyvatelstvo. Obsazovat pracovní místa kvalifikovanými českými pracovníky je obtížné. Je nutné vyvinout úsilí k přípravě mladých českých občanů na měnící se potřeby moderní ekonomiky."
