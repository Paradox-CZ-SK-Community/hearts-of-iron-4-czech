 CZE_the_second_fortification_program_category: "Opevňovací programy" # todo: CHANGED
 CZE_the_second_fortification_program_category_desc: "Naše méně výhodná hranice je naléhavou otázkou národní bezpečnosti. Sousední země jasně naznačily, že si činí nároky na přerýsování našich hranic ve svůj prospěch. Pokračující opevňování našich hranic donutí případného nepřítele dvakrát si rozmyslet, než zaútočí." # todo: CHANGED
 CZE_fate_of_the_ro: "Osud Rady pro opevnění" # todo: NEW TRANSLATION
 CZE_fate_of_the_ro_desc: "Rada pro opevnění shromažďuje finance související s našimi opevňovacími projekty. Pokud tyto prostředky brzy nebudou použity, lidé začnou pochybovat, proč byly vůbec shromážděny." # todo: CHANGED
 CZE_bop_army_bunker_maintenance: "Údržba opevnění" # todo: NEW TRANSLATION
 CZE_bop_army_bunker_maintenance_desc: "Správná údržba našich opevnění a jejich připravenost k použití zajistí, že armáda jim bude důvěřovat, pokud je někdy bude muset obsadit." # todo: CHANGED
 CZE_fortification_research: "Výzkum opevnění" # todo: NEW TRANSLATION
 CZE_fortification_research_desc: "Potřeba opevnit naše hranice je zřejmá, otázkou ale zůstává jak? Výzkum nám pomůže na tuto otázku odpovědět." # todo: CHANGED
 CZE_fortification_research_tt: "Obsahuje národní duch §Y$CZE_directorate_of_fortification_works_no_gd_idea$§!" # todo: CHANGED
 CZE_fortification_research_subtract_variable_tt: "Všechna budoucí rozhodnutí §YOpevňovací programy§! budou k §YDokončení§! trvat o §Y30§! dní méně." # todo: CHANGED
 CZE_fortification_decision_inprogress: "Již pracujeme na jiném opevňovacím programu" # todo: NEW TRANSLATION
 CZE_second_sudetenland_fortification_program: "Druhý program opevnění v Sudetech" # todo: CHANGED
 CZE_second_sudetenland_fortification_program_desc: "Sudety, naše horské pohraničí s Německem, jsou ideálním místem pro pohraniční opevnění. Po prostudování francouzské Maginotovy linie můžeme vybudovat podobnou linii i my." # todo: CHANGED
 CZE_third_sudetenland_fortification_program: "Třetí program opevnění v Sudetech" # todo: CHANGED
 CZE_third_sudetenland_fortification_program_desc: "Sudety nyní mohou pochlubit slušnou obrannou linií, ale „slušná\" nestačí, když je ohroženo naše národní přežití." # todo: CHANGED
 CZE_fourth_sudetenland_fortification_program: "Čtvrtý program opevnění v Sudetech" # todo: CHANGED
 CZE_fourth_sudetenland_fortification_program_desc: "Sudety mají silný systém opevnění, ale musí být ještě silnější." # todo: CHANGED
 CZE_fortify_the_crossroads_with_slo: "Opevnit křižovatky" # todo: NEW TRANSLATION
 CZE_fortify_the_crossroads_with_slo_desc: "Každý systém opevnění může být prolomen. Abychom se proti tomu pojistili, můžeme vybudovat silná postavení kolem našich nejdůležitějších měst, aby je nepřítel, který prolomí naše linie, nemohl snadno obsadit." # todo: CHANGED
