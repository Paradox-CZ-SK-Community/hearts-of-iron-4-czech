 CZE_send_observers_to_the_italo_ethiopian_war: "£BoP_right_texticon Vyslat pozorovatele do Etiopie"
 CZE_send_observers_to_the_italo_ethiopian_war_bonus: "Vysláni pozorovatelé do italsko-etiopské války"
 CZE_send_observers_to_the_italo_ethiopian_war_desc: "Nenápadné vyslání jednotlivců, aby pozorovali boje na zemi a navázali vedlejší kontakty s účastníky konfliktu, nám poskytne cenný vhled do současné armádní doktríny. Může to také otevřít další příležitosti."
 CZE_send_observers_to_the_italo_ethiopian_war_tt: "§Y$CZE_zbrojovka_brno_organization$§! se začne zajímat o pašování zbraní do §Y[ETH.GetNonIdeologyName]§!."
