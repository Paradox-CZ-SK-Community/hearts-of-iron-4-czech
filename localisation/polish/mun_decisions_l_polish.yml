 CZE_crisis_in_the_sudentenland_desc: "Sudetské polovojenské jednotky povstaly v Sudetech a zahájily proti nám partyzánskou válku. Pokračující střety s našimi silami uvrhly situaci do chaosu. Musíme ji dostat pod kontrolu, a to dříve, než ji některý nepřítel využije."
