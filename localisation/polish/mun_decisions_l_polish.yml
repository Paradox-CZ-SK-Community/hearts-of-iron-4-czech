 CZE_demands_aus_joins_us: "Požadovat, ať se [AUS.GetName] připojí k naší federaci"
 CZE_demands_hun_joins_us: "Požadovat, ať se [HUN.GetName] připojí k naší federaci"
 CZE_the_second_fortification_program_category: "Opevňovací programy"
 CZE_the_second_fortification_program_category_desc: "Naše nevýhodné hranice představují naléhavou otázku národní bezpečnosti. Země, které nás obklopují, daly jasně najevo, že chtějí překreslit hranice ve svůj prospěch. Pokračující opevňování hranic přiměje každého možného nepřítele dvakrát si rozmyslet útok."
 CZE_fate_of_the_ro: "Osud Rady pro opevňování"
 CZE_fate_of_the_ro_desc: "Rada pro opevňování má na starosti shromažďování financí souvisejících s našimi opevňovacími projekty. Pokud tyto prostředky nebudou brzy využity, lidé se začnou ptát, proč byly vůbec shromažďovány."
 CZE_bop_army_bunker_maintenance: "Údržba opevnění"
 CZE_bop_army_bunker_maintenance_desc: "Řádně udržovaná a připravená opevnění zajistí, že v ně armáda bude mít důvěru, pokud je bude muset obsadit."
 CZE_fortification_research: "Výzkum opevnění"
 CZE_fortification_research_desc: "Nutnost opevnit hranice je zřejmá, otázkou však zůstává jak. Výzkum nám pomůže nalézt odpověď."
 CZE_fortification_research_tt: "Má národního ducha §Y$CZE_directorate_of_fortification_works_no_gd_idea$§!"
 CZE_fortification_research_subtract_variable_tt: "Všechna budoucí rozhodnutí §YOpevňovacích programů§! budou vyžadovat o §Y30§! dní méně k §Ydokončení§!"
 CZE_fortification_decision_inprogress: "Již pracujeme na jiném opevňovacím programu"
 CZE_second_sudetenland_fortification_program: "Druhý program opevnění Sudet"
 CZE_second_sudetenland_fortification_program_desc: "Sudety, naše horská hranice s Německem, jsou ideálním místem pro pohraniční opevnění. Po studiu francouzské Maginotovy linie můžeme vybudovat podobnou linii vlastní."
 CZE_third_sudetenland_fortification_program: "Třetí program opevnění Sudet"
 CZE_third_sudetenland_fortification_program_desc: "Sudety se nyní pyšní slušnou obrannou linií, ale slušná nestačí, když jde o přežití našeho národa."
 CZE_fourth_sudetenland_fortification_program: "Čtvrtý program opevnění Sudet"
 CZE_fourth_sudetenland_fortification_program_desc: "Sudety mají silný systém opevnění, ale musí být ještě silnější."
 CZE_fortify_the_crossroads_with_slo: "Opevnit křižovatku cest"
 CZE_fortify_the_crossroads_with_slo_desc: "Každý systém opevnění může být prolomen. Abychom se proti tomu pojistili, můžeme vybudovat opěrné body kolem našich nejdůležitějších měst, aby je nepřítel po průlomu nemohl snadno obsadit."
 CZE_fortify_the_hungarian_border_with_73: "Opevnit maďarskou hranici"
 CZE_fortify_the_hungarian_border_with_73_desc: "Maďarský irredentismus je stálou hrozbou pro naši zemi, systém opevnění podél společné hranice pomůže zajistit naši bezpečnost."
 CZE_fortify_the_polish_border_with_72: "Opevnit polskou hranici"
 CZE_fortify_the_polish_border_with_72_desc: "Polská agrese nezná mezí, ale snad dobře opevněná hranice přiměje Poláky hledat snadnější cíl."
