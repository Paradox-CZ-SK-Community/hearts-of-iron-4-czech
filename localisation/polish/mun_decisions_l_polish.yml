 CZE_sudeten_promise_mission_desc: "Podporou polovojenských jednotek v Sudetech jsme jim slíbili podporu, pokud zkusí opustit [CZE.GetNonIdeologyName] a připojit se k nám. Porušení tohoto slibu by vedlo k politickému odporu."
