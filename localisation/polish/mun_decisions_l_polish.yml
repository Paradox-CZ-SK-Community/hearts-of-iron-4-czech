 CZE_embezzle_quatermaster_funds: "£BoP_left_texticon Zpronevěřit prostředky intendance"
 CZE_embezzle_quatermaster_funds_desc: "O naše vojáky je již dobře postaráno. Jistě si nikdo nevšimne ani mu nebude vadit, když část prostředků určených pro kasárna půjde jinam."
 CZE_prioritize_export_contracts: "£BoP_left_texticon Upřednostnit exportní kontrakty"
 CZE_prioritize_export_contracts_desc: "Náš exportní průmysl nám pomohl vyšplhat se z Velké hospodářské krize. Proč bychom nyní měli měnit své chování? Jakákoli hrozba pro náš národ je stejně zveličená. Armáda si může počkat."
 CZE_focus_on_export_designs: "£BoP_left_texticon Zaměřit se na exportní konstrukce"
 CZE_focus_on_export_designs_desc: "Armáda je velmi náročná v tom, co od našich návrhů požaduje. Exportní trh je shovívavější a navíc pomáhá financovat domácí konstrukce pro armádu. Ve skutečnosti by nám tedy armáda měla děkovat za to, kolik jí šetříme peněz na výzkumu a vývoji. Není zač, armádo."
