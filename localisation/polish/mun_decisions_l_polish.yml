 CZE_form_the_european_federation: "Vytvořit Evropskou federaci"
 CZE_central_european_federation_desc: "S našimi sousedy máme více společného než toho, co nás rozděluje. Vytvoření demokratické federace může být jedinou věcí, která udrží pluralismus ve střední Evropě živý a prosperující tváří v tvář mnoha hrozbám."
