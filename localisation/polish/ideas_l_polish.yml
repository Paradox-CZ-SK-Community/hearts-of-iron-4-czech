 RAJ_agrarian_society_desc: "Místní správci jsou přesvědčeni, že kvůli agrárnímu způsobu života je velká část indického obyvatelstva prostě nezpůsobilá k vojenské službě nebo k jakémukoli druhu války. Tvrdí, že bychom měli rekrutovat pouze z takzvaných „válečných kmenů“. Toto přesvědčení je natolik rozšířené a zakořeněné, že k jeho překonání bude zapotřebí nejméně jedné generace nebo značných investic na venkově."
