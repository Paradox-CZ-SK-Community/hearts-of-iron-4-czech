 liberty_ships_focus: "Liberty Ships"
 air_war_plans_division_focus: "Plány letecké války"
 air_war_plans_division_focus_desc: "Mocnosti Osy mohou být poraženy pouze díky převaze ve vzduchu. Dlouhodobé plány výroby a nasazení stíhaček a strategických bombardérů to nejen umožňují, ale i dokážou."
