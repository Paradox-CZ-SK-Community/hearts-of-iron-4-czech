 rhineland_challenge_met: "Remilitarizace Porýní narazila"
 rhineland_challenge_met_desc: "Po předpovědích, že Porýní může být remilitarizováno bez zásahu Spojenců, bylo Německo nakonec donuceno ustoupit poté, co se ukázalo, že to byl omyl."
 kaiser_challenge_met: "Císařská výzva ztroskotala"
 kaiser_challenge_met_desc: "Po předpovědích, že Kaiser může být propuštěn z Nizozemí bez zásahu Spojenců, se Německo pod tlakem rozhodlo ustoupit poté, co se ukázalo, že to byl omyl."
 fascist_revolutionaries: "Fašističtí revolucionáři"
 fascist_revolutionaries_desc: "Pokud podpora fašismu vzroste nad 70%, země bude ponořena do občanské války. Pokud podpora fašismu klesne pod 30%, revoluční činnost se zastaví."
 communist_revolutionaries: "Komunističtí revolucionáři"
 communist_revolutionaries_desc: "Pokud podpora komunismu vzroste nad 70 %, národ se ponoří do občanské války. Pokud podpora komunismu klesne pod 30 %, revoluční aktivita se zastaví."
 democratic_revolutionaries: "Demokratické revoluční hnutí"
 democratic_revolutionaries_desc: "Pokud podpora demokracie stoupne nad 70 %, země se ocitne ve válce. Pokud podpora demokracie klesne pod 30 %, revoluční aktivita se zastaví."
 home_of_the_free: "Domov svobodných"
 home_of_the_free_desc: "USA se považují za baštu a možná i kolébku demokracie a svobody. Ať už se rozhodnou být čímkoli, jejich hodnoty lze jen těžko zpochybnit, jakkoli se některé příležitosti mohou zdát lákavé."
 closed_economy_TT: "Žádné zdroje nebudou exportovány.\n\n"
 danieli: "Danieli"
 fascism_defeated: "Fasismus poražen"
 fascism_defeated_desc: "Demokracie zvítězila nad totalitárním fašismem a demokratické strany jsou sjednoceny proti této staré hrozbě."
 communism_defeated: "Komunismus poražen"
 communism_defeated_desc: "Demokracie zvítězila nad totalitárním komunismem a demokratické strany se spojily proti této staré hrozbě."
 reign_of_terror: "Vláda teroru"
 reign_of_terror_desc: "Současný režim, který se nedávno dostal k moci, bezohledně pronásleduje své nepřátele a likviduje opozici dříve, než se objeví."
 anti_german_military: "Protiněmecké nálady v armádě"
 anti_german_military_desc: "Frakce v jugoslávském letectvu jsou proti spolupráci s Německem. Mohou se pokusit svrhnout režim, pokud země otevře své hranice nebo vstoupí do aliance s Třetí říší."
 anti_nazi_coup: "Protinacistický převrat"
 anti_nazi_coup_desc: "Po svržení prince Pavla, které mělo zabránit spolupráci s Německem, se nový režim postavil proti profašistické diplomacii."
