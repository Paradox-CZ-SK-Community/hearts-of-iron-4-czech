 RAJ_risk_of_famine_desc: "Indický systém výroby potravin je velmi křehký. I malá narušení mohou způsobit kolaps."
 RAJ_risk_of_famine_instant_desc: "Pokud platí některá z těchto podmínek, spustí se §Rhladomor§!:\n -Ztratíme počátečný indický stát a nepodaří se nám ho získat zpět během §Y30 dnů§! (s výjimkou Adenu)\n-Nový kontrolor není vypuštěným územím, které je námi okupováno od začátku hry\n-Nový kontrolor není naším subjektem."
 RAJ_famine: "Hladomor"
 RAJ_famine_desc: "Neschopnost, lhostejnost a zjevná korupce koloniální vlády a indických železnic změnily obtížnou situaci v naprostou katastrofu. Země tím bude trpět ještě dlouhé měsíce."
