 spiritual_mobilization_idea: "Šintoistická mobilizace"
 spiritual_mobilization_idea_desc: "'Luxus je náš nepřítel!' Šetrnost, čistota a tvrdá práce jsou povýšeny na národní ctnosti a válečnému úsilí je k dispozici více pracovních sil."
 office_of_strategic_services: "Úřad pro strategické služby"
 office_of_strategic_services_desc: "§LÚřad pro strategické služby(OSS) byl zpravodajskou agenturou Spojených států, založenou během druhé světové války. Byla to válečná zpravodajská agentura a předchůdce Centrální zpravodajské služby (CIA).§!"
 nkvd: "NKVD"
 nkvd_desc: "§LNKVD, Lidový komisariát vnitra, byl donucovací orgán Sovětského svazu, který přímo vykonával moc Všesvazové komunistické strany. Jeho úkolem byla také ochrana sovětských hranic a špionáž, která zahrnovala politické vraždy v zahraničí, ovlivňování zahraničních vlád a prosazování stalinské politiky v rámci komunistických hnutí v jiných zemích.§!"
 nkvd_2: "NKVD"
 nkvd_2_desc: "§LNKVD, Lidový komisariát vnitra, byl donucovací orgán Sovětského svazu, který přímo vykonával moc Všesvazové komunistické strany. Jeho úkolem byla také ochrana sovětských hranic a špionáž, která zahrnovala politické vraždy v zahraničí, ovlivňování zahraničních vlád a prosazování stalinské politiky v rámci komunistických hnutí v jiných zemích.§!"
