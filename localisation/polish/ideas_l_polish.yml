 GER_mefo_bills_desc: "MEFO směnky byly dluhopisy, které vytvořil Hjalmar Schacht, aby umožnil vládě financovat zbrojení, a to prostřednictvím podniku Metallurgische Forschungsgesellschaft, který toto zbrojení skrýval před francouzskými a britskými zraky. Platnost těchto směnek musí být prodloužena na šestiměsíční období, jinak by jejich příjemci museli být vyplaceni, až by nastala jejich splatnost."
