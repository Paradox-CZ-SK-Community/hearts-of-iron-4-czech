 POR_unreliable_army: "Nespolehlivá armáda"
 POR_unreliable_army_desc: "Vzhledem k neustálým převratům a kontrapřevratům od zavedení republiky v roce 1910 se armádní důstojníci více zabývají politikou než udržováním disciplíny a podporou výcviku v armádě. Řadoví vojáci jsou demoralizovaní, špatně vybavení a vycvičení."
 POR_unstable_republic: "Nestabilní republika"
 POR_unstable_republic_desc: "Období republiky nastolené v roce 1910 bylo popisováno jako „období neustálé anarchie, korupce, výtržností a rabování, atentátů, svévolného věznění a náboženského pronásledování“. Bylo svědkem inaugurace devíti prezidentů, 44 reorganizací vlády a 21 revolucí. I po vojenském převratu v roce 1926 došlo k několika neúspěšným pokusům o revoluci."
 POR_british_influence: "Britský vliv"
 POR_british_influence_desc: "Britská vláda investuje do využívání zdrojů v naší zemi. Toto je cenná příležitost pro zvýšení našich pokroků ve výzkumu a vývoji."
 POR_hydroelectric_power: "Hydroelektrická energie"
 POR_hydroelectric_power_desc: "Díky investicím provedeným na severu a v středním Portugalsku jsme konečně vybudovali síť přehrad, které vyrábějí elektřinu a regulují tok řek."
