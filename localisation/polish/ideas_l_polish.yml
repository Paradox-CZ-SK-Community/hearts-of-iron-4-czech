 home_of_revolution: "Domov revoluce"
 home_of_revolution_desc: "Soudruzi, po porážce podlých trockistických kontrarevolucionářů jsme se mohli soustředit na obranu revoluce. Naším cílem, naší nadějí, naším heslem je socialismus v jedné zemi. Vybudujeme zde v Sovětském svazu štědrou socialistickou utopii a zbytek světa ji nevyhnutelně přijme."
 en_svensk_tiger: "En Svensk Tiger"
 en_svensk_tiger_desc: "Pokud má Švédsko být jako tygr na lovu, pak ti, kteří nás sledují, nesmí vědět, co děláme. V těchto časech konfliktu a nesnází je vlasteneckou povinností každého Švéda zůstat mlčet."
 state_shintoism: "Státní šintoismus"
 state_shintoism_desc: "Od restaurace Meidži jsme se snažili využít uctívání v šintoistických svatyních k podpoře císařské loajality a pomoci při budování národa. To nám umožnilo vybudovat zemi, která je ochotna obětovat mnoho ve jménu státu."
 vittoria_mutilata: "Vittoria Mutilata"
 vittoria_mutilata_desc: "§LNaši spojenci zradili Itálii a vrazili nám nůž do zad, když porušili Londýnský pakt. Obětovali jsme tolik krve u Isonza za jejich vítězství a oni nám na oplátku upřeli to, co nám právem náleželo. Itálie nyní vezme svůj osud do vlastních rukou a zajistí, aby bylo spravedlnosti učiněno zadost.§!"
 stiff_upper_lip: "Britský stoicismus"
 stiff_upper_lip_desc: "Když bezhlavost svým okem klidně měříš,\nač tupen, sám že nejsi bezhlavý,\nkdyž proti triumfu i ponížení\njak proti svůdcům spolčeným jsi kryt,\npak pán, pak vítěz na širé jsi zemi,\n— a co je víc: pak, synu můj, jsi muž!"
 trotskyite_plot: "Trockistické spiknutí?"
 trotskyite_plot_desc: "Paranoia a patologická nedůvěra pramenící ze starých bojů o moc ovlivňují vedení tohoto národa."
 trotskyite_plot_purged: "Trockistické spiknutí zlikvidováno?"
 trotskyite_plot_purged_desc: "Navzdory čistkám strach ze zrady přetrvává."
