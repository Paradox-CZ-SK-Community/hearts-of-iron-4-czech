 great_depression_desc: "Ačkoli se jedná o celosvětový fenomén, velká hospodářská krize začala krachem na burze ve Spojených státech a způsobila prudký nárůst nezaměstnanosti a pokles daňových příjmů. Američané a jejich vláda mají dost starostí, aniž by se museli zaplést do další války."
