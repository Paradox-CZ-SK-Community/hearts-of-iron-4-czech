l_polish:
 fascist_influence: "Fašistický vliv"
 fascist_influence_desc: "Fašistický tlak učinil fašismus velmi populárním a země je náchylná spojit se s jinými fašisty."
 communist_influence: "Komunistický vliv"
 communist_influence_desc: "Tlak komunistů učinil komunismus velmi populárním a země je náchylná se spojit s jinými komunistickými zeměmi."
 democratic_influence: "Demokratický vliv"
 democratic_influence_desc: "Demokratický tlak učinil demokracii velmi populární a země je náchylná se spojit s jinými demokraty."
 neutrality_influence: "Autoritářský vliv"
 neutrality_influence_desc: "Autoritářský tlak vedl k nově nabytému respektu k těm, kdo mají silné vlády a vznešené královské rody, a země je náchylná k tomu, aby se spojila s jinými autoritářskými vládami."
 soviet_german_friendship: "Sovětsko-německé přátelství"
 soviet_german_friendship_desc: "Německá říše a Sovětský svaz se spojily ve jménu přátelství proti dekadentnímu Západu."
 sour_loser: "Zahořklý poražený"
 sour_loser_desc: "V politice tohoto národa převládá hořkost z porážky ve Velké válce."
 received_attache: "Přijatý přidelenec"
 received_attache_desc: "Zahraniční vojenští přidělenci pobývající v naší zemi."
 ATTACHE_LIST: "$LIST$ k nám poslalo vojenské přidělence. A ti nám dávají následující efekty:"
 porsche: "Porsche"
 porsche_desc: "Porsche preferuje tanky s těžkým pancířem."
 henschel: "Henschel"
 henschel_desc: "Firma Henschel byla zodpovědná za všechny sériově vyráběné modely Tigerů, tanků, které se po vyřešení počátečních problémů se spolehlivostí chovaly pozoruhodně dobře."
 GER_MAN: "MAN"
 GER_MAN_desc: "Nejznámější díky tanku Panther, MAN se také podílel na návrhu a výrobě předchozích modelů Panzer."
 rheinmetall: "Rheinmetall"
 rheinmetall_desc: "Rheinmetall navrhuje a vyrábí všechny typy velkých zbraní a děl."
 mauser: "Mauser"
 mauser_desc: "Mauser navrhuje a vyrábí všechny typy malých pěchotních zbraní."
 ig_faben: "IG Farben"
 ig_faben_desc: "IG Farben má velký zájem o průmyslový výzkum."
 messerschmitt: "Messerschmitt"
 messerschmitt_desc: "Messerschmitt se zaměřuje na návrhy lehkých letadel, jako jsou stíhačky."
 focke_wulf: "Focke-Wulf"
 focke_wulf_desc: "Focke Wulf má zvláštní zájem o navrhování středních letadel, jako jsou těžké stíhače."
 junkers: "Junkers"
 junkers_desc: "Junkers je nejvíce známý pro vývoj bombardéru Stuka."
 todt: "Fritz Todt"
 todt_desc: "Fritz Todt, německý inženýr, byl zakladatelem Organizace Todt. Zvýší rychlost výstavby civilních průmyslových projektů."
 speer: "Albert Speer"
 speer_desc: "Albert Speer byl německý architekt, který byl v letech 1942-1945 ministrem zbrojení a válečné výroby. Často se mu připisuje zásluha o 'zbrojní zázrak', jeho jmenování zvýší efektivitu průmyslu."
 raeder: "Erich Raeder"
 raeder_desc: "Erich Raeder byl německý admirál, který preferoval použití tradičních hladinových lodí a doktrínu $GRAND_DOCTRINE_FLEET_IN_BEING$."
 donitz: "Karl Dönitz"
 donitz_desc: "Karl Dönitz byl německý admirál se zálibou pro ponorky a doktrínu obchodní blokády."
 goering: "Hermann Göring"
 goering_desc: "Hermann Göring byl stíhací eso Velké války, který se stal jedním z hlavních Hitlerových stoupenců. V této práci sice není nejlepší, ale je oddaně loajální."
 walther_wever: "Walther Wever"
 walther_wever_desc: "Walther Wever byl jedním z prvních zastánců teorie strategického bombardování."
 ritter_von_greim: "Ritter von Greim"
 ritter_von_greim_desc: "Ritter von Greim je zastáncem Taktiky přerušení."
 ernst_udet: "Ernst Udet"
 ernst_udet_desc: "Ernst Udet měl vliv na zavedení techniky střemhlavého bombardování i střemhlavého bombardéru Stuka."
 werner_von_fritsch: "Werner von Fritsch"
 werner_von_fritsch_desc: "Werner von Fritsch, generál staré gardy, upřednostňuje zaměření na pěchotu."
 ludwig_beck: "Ludwig Beck"
 ludwig_beck_desc: "Ludwig Beck klade zvláštní důraz na zásobování."
 franz_halder: "Franz Halder"
 franz_halder_desc: "Franz Halder věří v údernou sílu dělostřelectva během útoku."
 heinz_guderian: "Heinz Guderian"
 wilhelm_keitel: "Wilhelm Keitel"
 wilhelm_keitel_desc: "Wilhelm Keitel, generál staré gardy, preferuje pěchotu. Co mu chybí ve schopnostech, to nahrazuje loajalitou."
 ferdinand_schorner: "Ferdinand Schörner"
 ferdinand_schorner_desc: "Ferdinand Schörner je zdatný v obraně a boji v chladných klimatických podmínkách."
 general_staff: "Generální štáb"
 general_staff_desc: "Německý generální štáb byl zodpovědný za průběžné studium všech aspektů války, včetně vypracovávání a přezkoumávání mobilizačních plánů nebo plánů tažení. To přispívalo k vyšší úrovni organizace v armádě."
 v_weapons: "Zbraně odplaty"
 v_weapons_desc: "Bombardovací rakety s dlouhým doletem by byly ideální zbraní odplaty proti našim nepřátelům."
 hermann_gortz: "Hermann Görtz"
 hermann_gortz_desc: "§HHermann Görtz§! je zručný německý špion."
 elyesa_bazna: "Elyesa Bazna"
 elyesa_bazna_desc: "§HElyesa Bazna§! je široce znám pod svým krycím jménem Cicero."
 marina_lee: "Marina Lee"
 marina_lee_desc: "§HMarina Lee§! je balerína, která se specializuje na krádež bojových plánů."
 german_advisors: "Němečtí vojenskí poradci"
 german_advisors_desc: "V Číně je přítomna německá vojenská mise vedená Alexandrem von Falkenhausenem, jejíž poradci nám pomáhají přizpůsobit naši armádu západním standardům."
