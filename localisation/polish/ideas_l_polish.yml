 POR_volunteers_in_the_war_desc: "Národy Španělska bojují v občanské válce. Poskytneme jim vojenskou pomoc tím, že zorganizujeme dobrovolnické jednotky, které budou bojovat za tu správnou stranu."
 POR_a_new_industry: "Nový průmysl"
 POR_improved_production: "Zlepšená produkce"
 POR_improved_production_desc: "Díky státním regulacím, které naše vláda zavedla po letech nejisté finanční situace, se nám podařilo stabilizovat naši ekonomickou situaci a investujeme do dalších veřejných projektů na podporu naší infrastruktury."
