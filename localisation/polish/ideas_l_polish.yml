 the_long_lance: "Dlouhé kopí"
 the_long_lance_desc: "§LTorpédo Type-93, obecně přezdívané Dlouhé kopí, bylo nejmodernějším torpédem své doby. Bylo vyvinuto v Japonsku a Západ se mu nikdy nevyrovnal, protože poskytovalo menším lodím účinný způsob, jak na dálku zasáhnout větší, lépe pancéřované válečné lodě.§!"
