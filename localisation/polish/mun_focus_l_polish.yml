l_polish:
 CZE_military_path_shortcut: "Ozbrojené síly"
 CZE_economic_path_shortcut: "Hospodářství"
 CZE_diplomacy_path_shortcut: "Diplomacie"
 CZE_fort_path_shortcut: "Opevňovací snahy"
 CZE_skoda_priority_shortcut_name: "Priorita Škoda"
 CZE_political_path_shortcut: "Politika"
 CZE_coalition_building: "Budování koalice"
 CZE_coalition_building_desc: "Koalice, která vznikla po volbách, musí mezi svými členy vybudovat větší jednotu, má-li účinně fungovat. Nedávný odchod Jana Malypetra z funkce předsedy vlády vyvinul na Širokou koalici další tlak, aby upevnila svou podporu."
 CZE_merge_the_paramilitaries: "Sloučit polovojenské skupiny"
 CZE_merge_the_paramilitaries_desc: "Naše polovojenské síly jsou rozptýlené a rozdělené mezi mnoho různých skupin. Pokud je chceme vojensky využít, budeme je muset donutit ke sloučení."
 CZE_integrated_paramilitaries: "Začlenit polovojenské skupiny"
 CZE_integrated_paramilitaries_desc: "Armáda z toho nemusí mít zrovna radost, ale začlenění polovojenských skupin do našeho vojska nám poskytne větší zásobu potenciálních záloh, když je budeme nejvíce potřebovat."
 CZE_king_of_the_castle: "Král na hradě"
 CZE_king_of_the_castle_desc: "Všichni víme, kdo v naší vládě skutečně rozhoduje. V době velké nejistoty je načase přestat předstírat a nechat, ať $CZE_edvard_benesh$ vládne přímočařeji. V sázce je bezpečnost naší země."
 CZE_closer_ties_with_the_moderate_germany_parties: "Sjednotit umírněné sudetské strany"
 CZE_closer_ties_with_the_moderate_germany_parties_desc: "Některé sudetské strany jsou ochotné spolupracovat s naší koalicí a navázat styky s vládou. Prohlubme tyto vazby."
 CZE_complete_reconciliation: "Dokončit smíření"
 CZE_complete_reconciliation_desc: "Odvedli jsme práci potřebnou k vybudování mostů důvěry. Nastal čas usmířit se s našimi spoluobčany."
 CZE_complete_reconciliation_cooldown_flag: "Dokončeno zaměření §Y$CZE_closer_ties_with_the_moderate_germany_parties$§!"
 CZE_complete_reconciliation_cooldown_flag_tt: "Aktuální počet dní je: [?CZE_complete_reconciliation_cooldown_flag:days|Y0]"
 CZE_bastion_of_liberty: "Bašta svobody"
 CZE_bastion_of_liberty_desc: "V tomto desetiletí jsme byli jednou z mála skutečně pluralitních zemí v Evropě na východ od Rýna. Zajistěme, aby na to lidé nezapomněli."
 CZE_standing_against_the_storm: "Tváří v tvář bouři"
 CZE_standing_against_the_storm_desc: "Navzdory našim nedostatkům a možná i nepřipravenosti čelíme každé výzvě přímo a postavíme se nadcházející bouři."
 CZE_truth_prevails: "Pravda vítězí"
 CZE_truth_prevails_desc: "I tváří v tvář velkým překážkám a nemožným úkolům naše země ví, že naše národní heslo „Pravda vítězí“ se nakonec naplní. Hledej pravdu, mluv pravdu a ona zvítězí."
 CZE_negotiations_with_the_autonomous_bloc: "Upřednostnit Autonomistický blok"
 CZE_negotiations_with_the_autonomous_bloc_desc: "Chceme-li vytvořit koalici, která nepřenechá moc v Národním shromáždění Benešově legii lokajů, budeme muset spolupracovat s Autonomistickým blokem. Získání jejich plné podpory však bude mít vysokou cenu."
 CZE_slovakia_autonomy_agreement: "Dohoda o autonomii Slovenska"
 CZE_slovakia_autonomy_agreement_desc: "Cenou za spolupráci Autonomistického bloku s naší koalicí je dohoda o autonomii s vládou. Je to vysoká cena, ale následky nesplnění našeho dílu dohody by mohly být ještě horší."
 CZE_slovakia_autonomy_agreement_tt: "§Y[RUT.Getname]§! bude požadovat stejnou dohodu, jakou dostane §Y[SLO.Getname]§!!"
 CZE_slovakia_autonomy_agreement_2_tt: "$CZE_the_autonomous_bloc_demands$ budou při výběru tohoto zaměření zpožděny o §Y35 dní§!."
 CZE_topple_the_king: "Svrhnout krále"
 CZE_topple_the_king_desc: "Vliv, jaký má $CZE_edvard_benesh$ na naši vládu, je dusivý. Jeho moc je větší než jeho role prezidenta díky legii loajalistů v parlamentu. Nyní, když jsou podmínky příznivé, můžeme nahradit jeho vliv v Senátu."
 CZE_comprise_with_the_carpathians: "Kompromis s Podkarpatím"
 CZE_comprise_with_the_carpathians_desc: "Region Podkarpatské Rusi usiluje o podobnou federalizační dohodu, jakou má [SLO.GetNamedef]. To by výrazně oslabilo naši pozici v regionu i pro [9.GetName]. Uzavřít s nimi dohodu může být lepší než zcela ustoupit jejich požadavkům."
 CZE_the_rut_demands_add_35_CZE_comprise_with_the_carpathians_tt: "$CZE_the_rut_demands$ budou při výběru tohoto zaměření zpožděny o §Y35 dní§!."
 CZE_cut_carpathia_loose: "Propustit Podkarpatí"
 CZE_cut_carpathia_loose_desc: "Se Slovenskem jako federálním státem nyní region Podkarpatské Rusi doufá v podobnou dohodu. Ačkoliv se to zdá nerozumné, bez Slovenska pod naší přímou kontrolou by bylo těžké je držet na uzdě. Možná bychom měli jejich požadavkům prostě ustoupit."
 CZE_compromise_with_the_veteran_agrarian: "Kompromis se starými Agrárníky"
 CZE_compromise_with_the_veteran_agrarian_desc: "Stará agrární garda je překážkou při získávání rostoucího městského elektorátu. Abychom dosáhli svých cílů, musíme s nimi uzavřít kompromis."
 CZE_reorient_the_broad_coalition: "Přeorientovat Širokou koalici"
 CZE_reorient_the_broad_coalition_desc: "Široká koalice je již mnoho let vedoucím blokem naší vlády. Různé politické strany, které zahrnuje, činí vedení koalice stále obtížnějším. Změna orientace politiky jednotlivých ministerstev je již dlouho potřebná"
 CZE_leverage_sokol: "Využít Sokol"
 CZE_leverage_sokol_desc: "Sokolské hnutí je v naší zemi důležitou organizací již po desetiletí. V době krize bychom je měli využít k poskytování polovojenského výcviku a rekrutů pro naši armádu."
 CZE_urbanist_policies: "Městské politiky"
 CZE_deepend_ties_with_the_trademans: "Prohloubit vazby s živnostníky"
 CZE_deepend_ties_with_the_trademans_desc: "Živnostenská strana je populární mezi městskými voliči střední třídy. Pokud ji posílíme a budeme s ní spolupracovat, můžeme získat městský elektorát, aniž bychom odcizili naši venkovskou voličskou základnu."
 CZE_apart_but_togather: "Rozděleni, ale jednotní"
 CZE_apart_but_togather_desc: "Naše regiony nyní mají více autonomie než kdy dříve, ale zároveň jsme silnější než kdykoli předtím. Jsme připraveni čelit čemukoli."
 CZE_contact_henlein: "Kontaktovat Henleina"
 CZE_contact_henlein_desc: "$CZE_konrad_henlein$ je již roky trnem v oku naší vlády. Ve světle nedávných mezinárodních událostí však možná nastal čas zahájit s ním dialog."
 CZE_contact_henlein_cooldown_flag: "Dokončeno zaměření §Y$CZE_no_compromise_with_the_sdp$§!"
 CZE_contact_henlein_cooldown_flag_tt: "Aktuální počet dní je: [?CZE_contact_henlein_cooldown_flag:days|Y0]"
 CZE_contact_henlein_focus_warning_tt: "Pokud dokončíme §Y$CZE_no_compromise_with_the_sdp$§!, budeme muset čekat §Y350§! dní, než budeme moci vybrat toto §YNárodní zaměření§!."
 CZE_contact_henlein_focus_order_warning_tt: "Pokud dokončíme §Y$CZE_no_compromise_with_the_sdp$§! po dokončení tohoto §YNárodního zaměření§!, §Y$CZE_konrad_henlein$§! odstoupí."
 CZE_no_compromise_with_the_sdp: "Pokračovat v izolaci SdP"
 CZE_no_compromise_with_the_sdp_desc: "SdP nemá naší koalici co nabídnout. Snaží se pouze vyvolávat politické napětí a očerňovat kroky naší vlády. Ve jménu řádné správy by měla zůstat mimo jakoukoli koalici."
 CZE_no_compromise_with_the_sdp_cooldown_flag: "Dokončeno zaměření §Y$CZE_contact_henlein$§!"
 CZE_no_compromise_with_the_sdp_cooldown_flag_tt: "Aktuální počet dní je: [?CZE_no_compromise_with_the_sdp_cooldown_flag:days|Y0]"
 CZE_no_compromise_with_the_sdp_focus_warning_tt: "Pokud dokončíme §Y$CZE_contact_henlein$§!, budeme muset čekat §Y350§! dní, než budeme moci vybrat toto §YNárodní zaměření§!."
 CZE_form_a_federation: "Vytvoření federace"
 CZE_form_a_federation_desc: "Sen o středoevropské federaci již není nedosáhnutelný. Konečně jej uskutečníme a staneme se demokratickým obrem. Společně budeme mít sílu vzdorovat velmocím vlastními silami!"
 CZE_reassure_the_army: "Uklidnit armádu"
 CZE_reassure_the_army_desc: "Armáda je nervózní z některých našich nedávných rozhodnutí a vládních politik. Je čas ji ujistit, že za ní stojíme bez ohledu na to, co vláda říká nebo dělá."
 CZE_outreach_to_the_western_powers: "Další sbližování se západními mocnostmi"
 CZE_outreach_to_the_western_powers_desc: "Západní demokracie tvrdí, že nám kryjí záda, ale musíme s nimi dále budovat vztahy, aby jejich slova byla v rozhodující chvíli podložena činy."
 CZE_demand_guarantees: "Požadovat silnější záruky"
 CZE_demand_guarantees_desc: "Navzdory našim stávajícím smlouvám a spojenectvím musíme zajistit, aby nás naši partneři v době nouze neopustili jen proto, že je to pro ně snazší. Potřebujeme něco silnějšího než pouhé záruky."
 CZE_guardian_of_central_europe: "Strážce střední Evropy"
 CZE_guardian_of_central_europe_desc: "Nyní stojíme v pozici stražce demokracie ve středu Evropy. Můžeme být ochráncem národů, které se nedokážou ubránit samy, a zajistit, aby demokracie stála pevných základech."
 CZE_central_european_faction: "Vládce střední Evropy"
 CZE_central_european_faction_desc: "Navzdory našemu zaměření na vlastní posílení místo přílišného spoléhání na diplomacii je zásadní, abychom nepřecenili své síly. Možná nastal čas obrátit pohled ven."
 CZE_strike_at_the_heart_of_bolshevism: "[THIS.GetAntiSovietFocusName]"
 CZE_strike_at_the_heart_of_bolshevism_1: "Úder do srdce bolševismu"
 CZE_strike_at_the_heart_of_bolshevism_2: "Zajistit východní křídlo"
 CZE_strike_at_the_heart_of_bolshevism_desc: "[SOV.GetNameDef] představuje existenční hrozbu pro Evropu i naši zemi. Musíme proti nim být hrází."
 CZE_destroy_the_fascist_threats: "Zničit fašistické hrozby"
 CZE_destroy_the_fascist_threats_desc: "[CZE_get_fascist_threats_desc]"
 CZE_destroy_the_fascist_threats_desc_enemy_ger: "Všichni víme, kdo je největší hrozbou pro mír v Evropě. [GER.GetNamedefCAP] je nutno zastavit dřív, než bude pozdě. Pokud to není ochoten udělat nikdo jiný, budeme to muset udělat sami."
 CZE_destroy_the_fascist_threats_desc_backup: "Pro naši bezpečnost je nanejvýš důležité, aby naše sousední země nepřijaly expanzionistickou rétoriku, která by se dříve či později mohla obrátit proti nám."
 CZE_peace_on_our_time: "Mír podle našich podmínek"
 CZE_peace_on_our_time_desc: "V evropských mezinárodních vztazích jsme byli příliš dlouho opomíjeni. To už neplatí! Dokážeme stát na vlastních nohou a určovat své podmínky. Ať už půjde o válku či mír."
 CZE_reach_out_for_military_assistance: "Požádat o vojenskou pomoc"
 CZE_free_tuka: "Propustit Vojtecha Tuku"
 CZE_free_tuka_desc: "$CZE_vojtech_tuka$ si odseděl svůj trest a místo hledání záminky k jeho prodloužení jej můžeme včas propustit a využít v naší vládě. Je lepší ho mít pod sebou než proti sobě."
 CZE_grow_the_anglo_czechoslovak_prague_credit_bank: "Anglo-československá a Pražská úvěrní banka"
 CZE_grow_the_anglo_czechoslovak_prague_credit_bank_desc: "Anglo-československá a Pražská úvěrní banka byla jedním z hlavních motorů našeho průmyslu. Bez jejích prostředků bychom nebyli schopni udržet rozsáhlý exportní obchod, který nyní máme. Zřízení nových poboček v New Yorku a prohloubení vazeb na [ENG.GetNameDef] by umožnilo další růst banky. Zároveň bude mít [ENG.GetName] další zájem na našem přežití."
 CZE_feeding_the_alligator: "Krmení krokodýla"
 CZE_feeding_the_alligator_desc: "[GER.GetName] a jeho nároky na Sudety ohrožují samotnou existenci našeho státu. Možná když jim dáme to, po čem touží, nechají nás na pokoji."
 CZE_complete_capitulation: "Úplná kapitulace"
 CZE_complete_capitulation_desc: "Jakou jinou máme možnost než ustoupit? Nedokážeme vzdorovat bouři, která se blíží na obzoru. Možná když s námi uzavře [GER.GetNameDef] dohodu, dokud ještě máme nějakou vyjednávací sílu, ponechá nám určitou nezávislost pod svým jhem."
 CZE_stabilize_the_protectorate: "Stabilizovat Protektorát"
 CZE_stabilize_the_protectorate_desc: "Protektorát je všechno možné, jen ne stabilní. Musíme vynaložit úsilí, abychom přesvědčili obyvatelstvo, že jsme legitimní vláda a že se postaráme o jejich potřeby."
 CZE_stabilize_the_protectorate_unretire_henlein_tt: "§Y$CZE_konrad_henlein$§! se vrátí z penze a bude pracovat pro §Y[ROOT.GetName]§!."
 CZE_full_faith_in_hacha: "Plná důvěra v Háchu"
 CZE_full_faith_in_hacha_desc: "$CZE_emil_hacha$ je mezi naším obyvatelstvem mnohem oblíbenější a váženější než $CZE_emanuel_moravec$. Jeho působení může být sporné, ale populárnější figurku nelze nahradit."
 CZE_moravecs_bohemia: "Moravcove Čechy"
 CZE_moravecs_bohemia_desc: "Šíří se zvěsti, že $CZE_emil_hacha$ se snaží podkopat naši novou vládu. Pokud chceme za současných podmínek uspět a růst, potřebujeme vedení více v souladu s ideologií našeho suzeréna."
 CZE_form_the_government_army: "Vytvořit Vládní vojsko"
 CZE_form_the_government_army_desc: "Chceme-li, aby naše země uspěla, musíme vytvořit novou armádu, která se poučí ze selhání svého předchůdce. Musíme také zajistit, aby její velení bylo politicky více sladěno s vládou."
 CZE_forced_administration_of_companies: "Nucená správa podniků"
 CZE_forced_administration_of_companies_desc: "Navzdory rozsáhlému dohledu některé podniky stále fungují mimo naši kontrolu. Nastal čas je násilně podřídit našemu dozoru."
 CZE_revisit_custom_union_talks: "Obnovit jednání o celní unii"
 CZE_revisit_custom_union_talks_desc: "Jednání o celní unii dopadla s některými našimi sousedy mnohem hůře než s jinými. Je čas se k nim vrátit a znovu prosadit celní unii mezi našimi zeměmi."
 CZE_revisit_custom_union_talks_tt: "Stále je budeme moci přesvědčit ke vstupu i jinými §Rprostředky§!."
 CZE_revisit_custom_union_talks_2_tt: "Budou mnohem ochotnější přijmout naše požadavky na vstup do naší federace."
 CZE_reintegrate_cross_border_rail_connections: "Zlepšit přeshraniční železniční spojení"
 CZE_reintegrate_cross_border_rail_connections_desc: "Zlepšení železničního spojení s našimi sousedy je dobrý způsob, jak si získat jejich přízeň. Obzvlášť pokud chceme rozšířit hospodářské vazby mezi námi a jimi."
 CZE_reintegrate_cross_border_rail_connections_flag: "Přeshraniční železniční spojení bylo zlepšeno"
 CZE_vonapo_20: "VONAPO 20"
 CZE_vonapo_20_desc: "Nejsme jediní, kdo vidí rostoucí hrozbu, kterou představuje [GER.GetNameDef], a proto byl vytvořen plán, jak můžeme my a [SOV.GetNameDef] spolupracovat při získávání zpravodajských informací, abychom mohli lépe mařit [GER.GetAdjective] ambice."
 CZE_increase_funding_from_moscow: "Zvýšit podporu, kterou posílá [SOV.capital.GetCapitalVictoryPointName]"
 CZE_increase_funding_from_moscow_desc: "[ROOT.GetCommunistParty] je tak podfinancovaná, že své sídlo v současnosti platí ze platů svých zástupců. Abychom rostli, musíme požádat [SOV.GetNameDef] o vyšší financování k šíření našich novin a náboru dalších členů."
 CZE_zdenek_fierlinger_tt: "Jmenuje poradce §Y$CZE_zdenek_fierlinger$§!"
 CZE_expand_the_communist_press: "Rozšířit komunistický tisk"
 CZE_expand_the_communist_press_desc: "Naše noviny „Rudé právo“ mohou sloužit k informování těch, kdo dnes žádné noviny nečtou. Stačí jen zvýšit financování."
 CZE_anti_rearmament_propaganda: "Propaganda proti zbrojení"
 CZE_anti_rearmament_propaganda_desc: "Nyní, když náš uhlavní nepřítel, [GER.GetNonIdeologyName], zažívá pád fašistické vlády, můžeme tvrdit, že jsme měli po celou dobu pravdu v našem postoji proti vojenskému zbrojení."
 CZE_anti_democratic_propaganda: "Propaganda proti demokracii"
 CZE_anti_democratic_propaganda_desc: "Abychom získali podporu pro naši stranu, musíme zdůraznit selhání předchozích vlád republiky a ukázat, jak bychom situaci zvládli lépe."
 CZE_form_workers_brigades: "Vytvořit dělnické milice"
 CZE_form_workers_brigades_desc: "Dělníci, které osvobozujeme, musí být připraveni účastnit se boje. Nemusí být vycvičenými vojáky, ale stále mohou přispět jako specialisté podle svého zaměstnání."
 CZE_kohler_faction: "Köhlerova frakce"
 CZE_kohler_faction_desc: "Frakce Bruna Köhlera věří, že k vytvoření úspěšného komunistického československého státu je nutné násilné svržení buržoazie."
 CZE_gottwald_faction: "Gottwaldova frakce"
 CZE_gottwald_faction_desc: "Stalinistická frakce Klementa Gottwalda, která je Moskvě až přehnaně loajální, si představuje československý stát podle vzoru SSSR."
 CZE_zapotocky_faction: "Zápotockého frakce"
 CZE_zapotocky_faction_desc: "Zakladatelé komunistické strany Bohumír Šmeral a Antonín Zápotocký si představovali umírněnější politiku než tu, kterou straně vnutil Klement Gottwald. Musíme se vrátit k těmto kořenům, chceme-li skutečně oslovit všechny [CZE.GetAdjective] národy."
 CZE_ally_with_moderate_socialists: "Spolupracovat s umírněnými socialisty"
 CZE_ally_with_moderate_socialists_desc: "Ne každá země je připravena přijmout komunismus volební cestou nebo být přesvědčena, že [SOV.GetLeader] je také jejím vzorem, a proto bychom se neměli vyhýbat spolupráci s umírněnějšími hnutími."
 CZE_democracies_willing_to_join_faction_tt: "§YDemokratické země budou ochotnější vstoupit do naší komunistické frakce§!."
 CZE_limited_cooperation: "[SOV.GetLeader] jako částečný partner"
 CZE_limited_cooperation_desc: "Ač ideologicky odlišný, i [SOV.GetNameDef] může uznat naši hodnotu jako partnera a zapojit se do některých pragmatických dohod, i když nás zároveň bude odsuzovat ve svých novinách."
 CZE_denounce_stalinism: "Odsoudit stalinismus"
 CZE_denounce_stalinism_desc: "Pověst komunismu je navždy poskvrněna Stalinovými křivdami. Nastal čas podniknout vojenské kroky k osvobození lidí žijících pod režimy, jako je ten jeho."
 CZE_country_leader_has_ideology_stalinism_tt: "Vůdce země má ideologii §Y$stalinism$§!"
 CZE_cooperate_with_tito: "Spolupracovat s Titem"
 CZE_cooperate_with_tito_desc: "[YUG.GetNameDefCap] se snaží o pragmatickou verzi komunismu stejně jako my. Podobně usilují o sjednocení různorodých národů pod rudým praporem. Při těchto výzvách bychom měli spolupracovat ve vojenských i politických otázkách."
 CZE_reduce_divided_nation_cost_tt: "Snižuje cenu a dobu trvání většiny rozhodnutí §Y$CZE_a_divided_nation_category$§!."
 CZE_balkan_union: "Rozšířit svaz"
 CZE_balkan_union_desc: "Přestože nyní více zemí v regionu přijalo komunismus, bez silné spolupráce se před velmocemi neubráníme. Unie by byla nejúčinnějším způsobem, jak toho dosáhnout."
 CZE_cooperation_with_the_ussr: "[SOV.GetLeader] jako plnohodnotný partner"
 CZE_cooperation_with_the_ussr_desc: "I nejhorlivější [SOV.GetAdjective] podporovatelé ve vedení strany si po návštěvě země uvědomují nedostatky její kolektivizace. Přesto s nimi spolupráce v kolektivizaci znamená, že můžeme pečlivě analyzovat, co se pokazilo, co se povedlo a jak to nejlépe zavést i pro [ROOT.GetNameDef]."
 CZE_exchange_military_expertise: "Výměna vojenských zkušeností"
 CZE_exchange_military_expertise_desc: "[SOV.GetNameDefCap], stejně jako většina mocností s významnou armádou, experimentovala s armádní taktikou. Měli bychom je požádat, aby se s námi podělili o své poznatky, a my se na oplátku můžeme podělit o naše."
 CZE_pressure_romania: "Vyvinout nátlak na Rumunsko"
 CZE_pressure_romania_desc: "[ROM.GetNameDefCap] může představovat vážnou hrozbu, pokud by se přiklonilo k našim nepřátelům, a mohlo by narušit naše spojení na [SOV.GetNameDef] nebo poskytovat našim nepřátelům cennou ropu. S [SOV.GetAdjective] podporou představujeme dostatečnou hrozbu, abychom je mohli přimět ke spolupráci i bez války."
 CZE_facility_in_state_tt: "Pokud se ve $STATE|Y$ nenachází žádná jiná §YExperimentální zařízení§!, získáme §G1§! $FACILITY_TYPE|Y$ ve $STATE|Y$."
 CZE_spread_the_revolution: "Šířit revoluci"
 CZE_spread_the_revolution_desc: "Když revoluce uspěla v naši zemi, měli bychom nyní povzbudit proletariát v zahraničí, aby bojoval za svou svobodu, v boji, který můžeme podpořit."
 CZE_agrarian_reform: "Obnovit Pozemkový úřad"
 CZE_agrarian_reform_desc: "Nedávno zrušený Státní pozemkový úřad byl odpovědný za přerozdělování převážně zemědělské půdy. Nastal čas tuto instituci obnovit pro razantnější opatření."
 CZE_realign_the_church: "Státní ateismus"
 CZE_realign_the_church_desc: "Náboženství bylo příliš dlouho prvkem, který rozděluje [CZE.GetAdjective] národy. Musíme omezit jeho vliv na státní záležitosti, jako je školství a tisk, abychom vytvořili jednotnější společnost."
 CZE_create_a_secret_police_branch: "Vytvořit složku tajné policie"
 CZE_create_a_secret_police_branch_desc: "Abychom zajistili stabilitu, musíme se bránit vnějším i vnitřním nepřátelům. Obyvatelstvu bude chvíli trvat, než si na nový systém zvykne, zvlášť když se stále zdokonaluje."
 CZE_promote_urbanization: "$ARG_promote_urbanization$"
 CZE_promote_urbanization_desc: "Nyní, když jsme vybudovali účinná komunální hospodářství, můžeme zahájit programy k přilákání části venkovského obyvatelstva do měst a zvýšit tam produktivitu."
 CZE_confiscate_church_lands: "Zkonfiskovat církevní půdu"
 CZE_confiscate_church_lands_desc: "Církev ovládá mnohem více půdy a bohatství, než potřebuje ke svým účelům. Musíme část této půdy přerozdělit, stejně jako jsme to učinili pro rolníky."
 CZE_change_the_narrative: "Změnit narativ"
 CZE_change_the_narrative_desc: "Přestože církev naši revoluci dosud nepodporovala, sladění jejích hodnot s našimi může sehrát důležitou roli při získávání podpory pro nový režim."
 CZE_the_second_fortification_program: "Zahájit Druhý pevnostní program"
 CZE_the_second_fortification_program_desc: "První pevnostní program položil základ obrany, na němž musíme okamžitě stavět. V zájmu budoucnosti našeho národa musíme co nejdříve zahájit Druhý pevnostní program a rozšířit i rozvinout naše pevnostní linie."
 CZE_redirect_the_fortification_councils_funds: "Přesměrovat fondy pevnostní rady"
 CZE_redirect_the_fortification_councils_funds_desc: "Tyto pevnostní programy jsou obrovskou zátěží pro naši ekonomiku. Tyto prostředky by bylo lepší využít na financování jiných programů. Armáda další na obranu stejně nepotřebuje, má jí dostatek."
 CZE_jachymov_uranium_mine: "Znovuotevřít uranový důl v Jáchymově"
 CZE_jachymov_uranium_mine_desc: "Doly v Jáchymově dlouho sloužily jako zdroj uranu a dalších rud, avšak uran měl až donedávna jen malé využití, než přišel nedávný pokrok ve fyzice."
 CZE_skoda_internal_competition: "Podpořit vnitřní soutěž"
 CZE_skoda_internal_competition_desc: "V podniku tak velkém jako Škoda je těžké udržet všechny na vrcholu pracovního výkonu. Podpora vnitřní soutěže výrazně pomůže zlepšit výkonnost zaměstnanců v našich závodech."
 CZE_skoda_max_optimization_tt: "Maximální úroveň optimalizace §Y$CZE_industry_focus_title_text$§! bude zvýšena na 7."
 CZE_skoda_increase_cooperation: "Zvýšit spolupráci v rámci Škody"
 CZE_skoda_increase_cooperation_desc: "Abychom se zlepšili, můžeme zvýšit výkon posílením spolupráce mezi závody. To by také mohlo vést ke sdílení odborných znalostí mezi našimi provozy."
 CZE_skoda_fast_optimization_tt: "Rychlost růstu úrovně §Y$CZE_industry_focus_title_text$§! £GFX_prod_eff_cap směrem k maximální úrovni: §G+100.0%§!"
 CZE_master_of_armaments: "Mistr zbrojení"
 CZE_master_of_armaments_desc: "Škodovy závody jsou největším výrobcem zbraní v naši zemi již od dob Rakouska-Uherska. Jejich odborné znalosti a zkušenosti nemají mezi průmyslovými konglomeráty v naší zemi obdoby. Nastal čas z nich udělat skutečného Mistra zbrojení."
 CZE_only_the_best_is_good_enough: "Jen to nejlepší je dost dobré"
 CZE_only_the_best_is_good_enough_desc: "Škodovy závody byly vždy vedeny pracovní morálkou a inovativním duchem. Naši zakladatelé se vždy řídili heslem: „Jen to nejlepší je pro naše zákazníky dost dobré!“ Toto heslo dnes platí více než kdy dřív."
 CZE_an_industrial_legacy: "Průmyslové dědictví"
 CZE_an_industrial_legacy_desc: "Poté, co jsme rozvinuli průmysl naší země do dříve nepředstavitelných výšin, můžeme konečně přijmout a nárokovat si naše průmyslové dědictví. Jsme nepřekonatelnou průmyslovou velmocí."
 CZE_powerhouse_of_europe: "Průmyslové srdce Evropy"
 CZE_powerhouse_of_europe_desc: "Náš průmysl je nyní závistí celého světa. Musíme nyní zajistit, aby jej naše energetika dokázala řádně zásobovat."
 CZE_supply_fighters_for_allies: "Dodávat stíhačky Spojencům"
 CZE_supply_fighters_for_allies_desc: "[FRA.GetNameDef] a [ENG.GetNameDef] se velmi obávají, že [GER.GetAdjective] letadla by v případě konfliktu rychle prolomila jejich obranu a zaměřila se na jejich města. Posílení jejich letectva je proto může učinit o něco jistějšími v jejich schopnosti zastavit [GER.GetAdjective] expanzi bez výrazných ztrát na životech."
 CZE_allies_more_likely_to_defend_us_tt: "§YSpojenci budou ochotnější podpořit nás proti německému expanzionismu ohledně Sudet.§!"
 CZE_allies_more_likely_to_defend_us_2_tt: "§YSpojenci budou výrazně ochotnější podpořit nás proti německému expanzionismu ohledně Sudet.§!"
 CZE_allies_more_likely_to_defend_us_3_tt: "§YSpojenci budou mírně ochotnější podpořit nás proti německému expanzionismu ohledně Sudet.§!"
 CZE_establish_the_state_defense_guard: "Zřídit Stráž obrany státu"
 CZE_german_nonagressionpact: "Haushofer-Kroftův pakt"
 CZE_german_nonagressionpact_desc: "Jednání o paktu o neútočení probíhala již delší dobu. Po známkách nestability, které vykazuje [SOV.GetNameDef] a nových expanzionistických plánech však byla zastavena. Jelikož je [GER.GetNonIdeologyName] nyní zaměstnáno jinými nepřáteli, musíme se pokusit tato jednání obnovit."
 CZE_revive_the_czechoslovak_legion_dynamic: "[CZE_revive_the_czechoslovak_legion]"
 CZE_revive_the_czechoslovak_legion_default: "Obnovit Československé legie"
 CZE_revive_the_czechoslovak_legion_communist: "Založit dobrovolnickou organizaci"
 CZE_revive_the_czechoslovak_legion_dynamic_desc: "Ve světě se opět šíří nepokoje a naši stateční vojáci jsou připraveni bránit [ROOT.GetNonIdeologyName]. Jak však minulost ukázala, obrana vlasti někdy vyžaduje, aby naše jednotky bojující v zahraničí znovu našly ty, kteří jsou ochotni opustit svůj domov právě proto, aby jej bránili."
 CZE_revive_the_czechoslovak_legion_nsb_tt: "§Y$CZE_legacy_of_the_czechoslovak_legion_army_spirit$§! bude přesunut z §YDucha armády§! na §YNárodního ducha§!."
 CZE_state_sponsored_recruitment_for_spain: "Státem podporovaný nábor pro Španělsko"
 CZE_state_sponsored_recruitment_for_spain_desc: "V novém konfliktu, kde může zahraniční zásah hrát klíčovou roli, bychom měli povzbudit zkušené [ROOT.GetAdjective] dobrovolníky, aby podpořili stranu, která je nejbližší našim zásadám. Zároveň se při tom můžeme poučit o vývoji válčení za poslední desetiletí."
 CZE_support_spain_reward_tt: "§YÚčinky, pokud španělská frakce s našimi dobrovolníky zvítězí nebo prohraje:§!"
 CZE_profit_off_the_spanish_civil_war: "Vydělat na španělské občanské válce"
 CZE_profit_off_the_spanish_civil_war_desc: "Španělská občanská válka se stává zástupnou válkou velmocí. Neměli bychom riskovat životy našich statečných vojáků zapletením do takového konfliktu. Místo toho je to dokonalá příležitost financovat rozvoj našeho průmyslu prodejem zbraní, případně i oběma stranám."
 CZE_skoda_sell_weapons_to_SPR_tt: "Odemkne rozhodnutí: §Y$CZE_skoda_sell_weapons_to_SPR$§!"
 CZE_placate_benes_faction: "Ustoupit Benešově frakci"
 CZE_placate_benes_faction_desc: "$CZE_milan_hodza$ se musí smířit s tím, že jeho působení ve funkci ministra zahraničí dopadlo katastrofálně. $CZE_edvard_benesh$ je připraven nastoupit se svými podporovateli mezi Agrárníky a posílit postavení, které má $CZE_milan_hodza$ jako předsedy vlády, pokud se vzdá ministerstva zahraničí."
 CZE_claim_lands_of_the_bohemian_crown: "Nárokovat země Koruny české"
 CZE_claim_lands_of_the_bohemian_crown_desc: "Protože naše země byla v minulých staletích součástí okrajů různých říší, byly naše hranice posouvány podle konfliktů, nikoli podle vůle obyvatel. Nastal čas tyto posuny napravit."
 CZE_demand_katowice: "Požadovat [762.GetName]"
 CZE_demand_katowice_desc: "[762.GetName] pod naši kontrolou neznamenají jen obnovení našich někdejších hranic, ale také oslabení [POL.GetAdjective] nároků na [72.GetName]."
 CZE_fight_over_silesia: "Bojovat o Slezsko"
 CZE_fight_over_silesia_desc: "Slezsko může být právoplatně [ROOT.GetAdjective] zemí, ale napadnout [66.owner.GetNameDef] je nežádoucí. Měli bychom proto předvést svou sílu rozsáhlými pohraničními konflikty namísto velké války. Pokud [66.owner.GetNameDef] nebude chtít bojovat za obranu Slezska, můžeme je o toto území připravit."
 CZE_dismantle_poland: "Rozložit [POL.GetNonIdeologyName]"
 CZE_dismantle_poland_desc: "Nyní, když se ukázala jeho neschopnost se bránit, je zřejmé, že [POL.GetNameDef] nemůže tvořit spolehlivý nárazníkový stát proti našim nepřátelům. Místo toho bychom měli posílit vlastní stát."
 CZE_proclaim_the_restoration_of_bohemia: "Vyhlásit obnovení Českého království"
 CZE_proclaim_the_restoration_of_bohemia_desc: "S obnovenými starými hranicemi si nyní můžeme znovu nárokovat svůj odkaz a zaměřit se na začlenění nových území."
 CZE_integrate_lost_territories: "Začlenit ztracená území"
 CZE_integrate_lost_territories_desc: "Historické země Českého království se táhnou od Baltského moře až k Jadranu. Nastal čas odvolat se na tuto historii při začleňování našich nových držav."
 CZE_deepen_ties_with_puppet_kingdoms: "Prohloubit vazby s loutkovými královstvími"
 CZE_deepen_ties_with_puppet_kingdoms_desc: "Přestože nyní vlastníme zřetelnou sféru vlivu, budeme muset svůj vliv ještě posílit, abychom z těchto spřátelených zemí vytěžili co nejvíce."
 CZE_poland_alliance_monarchist: "[POL.GetNonIdeologyName] na naší straně"
 CZE_poland_alliance_monarchist_desc: "$CZE_ally_poland_desc$"
 CZE_a_strong_poland: "Silné [POL.GetNonIdeologyName]"
 CZE_a_strong_poland_desc: "[POL.GetNameDef] disponuje jednou z nejsilnějších armád východní Evropy a má potenciál stát se cenným spojencem."
 CZE_mend_balkan_relations: "Urovnat balkánské vztahy"
 CZE_facilitate_a_strong_hungary: "Podpořit silné Maďarsko"
 CZE_facilitate_a_strong_hungary_desc: "Od získání nezávislosti mělo [HUN.GetNameDef] s námi nestabilní vztahy. S blížícím se konfliktem je však možná dokážeme přivést na naši stranu."
 CZE_subjegate_romania: "Přitlačit na Rumuny pomocí [HUN.GetAdjective] nároků"
 CZE_subjegate_romania_desc: "Nároky našeho [HUN.GetAdjective] subjektu jsou užitečným kladivem na [ROM.GetNameDef]. Hrozbou, že dovolíme, ať si [HUN.GetNameDef] prosadí své nároky na [ROM.GetAdjective] území a my jim pomůžeme je získat, může stačit na to, že se [ROM.GetNameDef] podřídí."
 CZE_demanded_overlordship_HUN: "Podrobeno Maďarsko"
 CZE_demanded_overlordship_ROM: "Podrobeno Rumunsko"
 CZE_integrate_hungary: "Začlenit Maďarsko"
 CZE_integrate_hungary_desc: "Nyní, když jsme vytvořili významnou sféru vlivu, začlenit nově rozšířené [HUN.GetName] by mohlo znamenat obnovu hranic Rakouska-Uherska, avšak první housle zde bude hrát [ROOT.GetNameDef]."
 CZE_subjegate_serbia: "Podrobit si [YUG.GetName]"
 CZE_subjegate_serbia_desc: "Nyní oslabená [YUG.GetName] již neslouží jako účinný nárazníkový stát chránící naše jižní křídlo. Po začlenění Slovinska bychom nyní měli usilovat o další expanzi."
 CZE_strike_the_eastern_threat: "Udeřit na východní hrozbu"
 CZE_strike_the_eastern_threat_desc: "Pokrytecký [SOV.GetName], který ospravedlňuje své imperiální ambice kritikou naší vlády, představuje existenční hrozbu pro [CZE.GetName], jež musí být odstraněna."
 CZE_assist_austria: "Chránit [AUS.GetNonIdeologyName]"
 CZE_assist_austria_desc: "Udržet [AUS.GetNameDef] mimo jakékoli konflikty je zásadní pro naši národní bezpečnost. [AUS.GetAdjectiveCap] hranice je jedním z nejzranitelnějších bodů naší obrany. Jejich ekonomika by navíc byla cenným přínosem pro naše nepřátele, což nemůžeme dopustit."
 CZE_return_to_democracy: "Návrat k demokracii"
 CZE_return_to_democracy_desc: "Když je náš domov zabezpečen, obyvatelstvo si stále více uvědomuje, že vojenská diktatura již není přínosná. Nastal tedy čas uspořádat volby a předat moc zpět demokratické civilní správě."
 CZE_cooperate_with_the_allies: "Spolupracovat se Spojenci"
 CZE_cooperate_with_the_allies_desc: "Po nastolení větší stability v regionu bychom měli usilovat o obnovení vazeb s našimi tradičními spojenci."
 CZE_eliminate_austrian_defeatists: "Porazit [AUS.GetAdjective] defétisty"
 CZE_eliminate_austrian_defeatists_desc: "[AUS.GetNameDefCap] odmítá bránit svůj stát. Musíme zasáhnout nyní, než se ocitneme obklíčeni."
 CZE_the_legacy_of_ottokar: "Odkaz Otakara"
 CZE_the_legacy_of_ottokar_desc: "Legendární král Otakar II. rozšířil českou říši do Rakouska a k Jadranu se souhlasem rakouské šlechty. Musíme se znovu obrátit na Rakušany, šlechtice i nešlechtice."
 CZE_demand_the_istrian_peninsula: "Požadovat Istrii"
 CZE_demand_the_istrian_peninsula_desc: "[ROOT.GetNameDefCap] jako vnitrozemský stát příliš dlouho čelí překážkám v obchodu i vlivu. Už nemůžeme přijímat, aby naše hospodářství bylo vydáno na milost sousedním zemím, a měli bychom požadovat přístup k Jadranu."
 CZE_demand_slovenia: "Požadovat Slovinsko"
 CZE_demand_slovenia_desc: "Slovinsko bylo v minulosti významnou součástí Rakouského císařství a nyní, když jsme převzali kontrolu nad srdcem této říše, musíme usilovat i o znovuzískání jeho území."
 CZE_demand_overlordship_of_yugoslav_league: "Požadovat suzerenitu nad [YUG.GetAdjective] ligou"
 CZE_demand_overlordship_of_yugoslav_league_desc: "Stejně jako [YUG.GetName] víme, že v mnohonárodním státě je někdy nutná místní autonomie, avšak jejich spojenectví je nyní příliš slabé, aby se ubránilo. Musíme přimět, ať to uzná i [YUG.GetNameDef] a dovolí nám zasáhnout."
 CZE_expand_the_rome_protocols: "Rozšířit Římské protokoly"
 CZE_expand_the_rome_protocols_desc: "Pro naši novou vládu je [ITA.capital.GetCapitalVictoryPointName] mnohem blíž než [GER.capital.GetCapitalVictoryPointName]. Vzhledem k neshodám mezi nimi ohledně Rakouska by vstup do Římských protokolů mohl znamenat, že [ITA.GetNameDef] získá potřebnou jistotu a bude pokračovat ve svém současném kurzu, než aby si za spojence zvolili [GER.GetNameDef]."
 CZE_prague_protocols: "Pražské protokoly"
 CZE_soviet_alliance: "Rozšířit spojeneckou smlouvu z roku 1935"
 CZE_soviet_alliance_desc: "Současná spojenecká smlouva, kterou s námi má [SOV.GetNameDef], je příliš nejasná, než abychom si mohli být jisti jejich zásahem, pokud budeme napadeni. Chceme-li si zajistit bezpečnost, musíme je oslovit s novou dohodou."
 CZE_airlift_soviet_support: "Letecké dopravení sovětské podpory"
 CZE_airlift_soviet_support_desc: "Absence společných hranic s naším [SOV.GetAdjective] spojencem vedl k novému nápadu dopravit [SOV.GetAdjective] jednotky letecky. Operace takového rozsahu ještě nikdy neproběhla, ale znamenala by, že [SOV.GetNameDef] nebude muset vstupovat na území našich sousedů, alespoň po souši."
 CZE_unlocks_volunteer_transport_raid_tt: "Odemkne §YÚder§!:\nLetecký most pro sovětské dobrovolníky na §Y[73.GetName]§!"
 CZE_intervene_in_the_ussr: "Zasáhnout v [SOV.GetAdjective] občanské válce"
 CZE_intervene_in_the_ussr_desc: "[SOV.GetNameDef] se opět propadá do nepokojů, a přestože stará královská rodina, kterou jsme kdysi podporovali, se nevrátí, možnost přátelštější vlády nelze přehlížet."
 CZE_forgive_trading_debts: "Odpustit obchodní dluhy"
 CZE_forgive_trading_debts_desc: "Hospodářská nestabilita a Velká hospodářská krize zatížily některé naše možné spojence dluhy vůči nám, které jen obtížně splácejí, což komplikuje vztahy. Vláda by mohla tyto dluhy odpustit a odškodnit domácí podniky tím zasažené."
 CZE_improve_balkan_trade_relations: "Zlepšit balkánské obchodní vztahy"
 CZE_improve_balkan_trade_relations_desc: "Naší největší předností při získávání možných balkánských spojenců je naše ekonomika. Měli bychom ukázat ochotu vynaložit prostředky na zlepšení hospodářské situace těchto potenciálních spojenců."
 CZE_ally_austria: "[AUS.GetNonIdeologyName] jako spojenec"
 CZE_ally_austria_desc: "Poté, co byla její vláda před několika lety téměř svržena nacistickými násilníky, by si [AUS.GetNonIdeologyName] mělo začít uvědomovat výhody, které získá, pokud bude [ROOT.GetNameDef] na jejich straně."
 CZE_ally_hungary: "[HUN.GetName] jako spojenec"
 CZE_ally_hungary_desc: "Navzdory sporům, které zatěžovaly naše vztahy od momentu, co vzniklo [CZE.GetNonIdeologyName], v poslední době projevuje [HUN.GetName] potenciál stát se cenným spojencem."
 CZE_ally_yugoslavia: "[YUG.GetName] jako spojenec"
 CZE_ally_yugoslavia_desc: "[YUG.GetNameDefCap] se sice v poslední době potýká s hospodářskými problémy, ale jejich strategické zdroje a poloha nelze přehlížet."
 CZE_protect_neutrality: "Chránit neutralitu"
 CZE_protect_neutrality_desc: "Velká válka jasně ukázala, že snaha zůstat neutrální je marná, pokud jste v hledáčku nepřítele. Ochrana těchto zemí znamená přinutit naše nepřátele bojovat na dvou frontách při expanzi, místo aby mohli rozdělovat a dobývat."
 CZE_if_cooperate_with_moderate_socialists_completed_tt: "Účinky, pokud bylo dokončeno §Y$CZE_ally_with_moderate_socialists$§!:"
 CZE_mutual_protection_agreement_with_switzerland: "[SWI.GetNonIdeologyName] a obranná dohoda"
 CZE_mutual_protection_agreement_with_switzerland_desc: "My i [SWI.GetNameDef] usilujeme o stav, kdy invaze do našich zemí nebude možná bez nepřijatelných ztrát. Spoluprací bychom mohli postavit armádu dostatečně početnou nejen k obraně, ale i k rozhodnému protiútoku."
 CZE_exchange_technology: "Spolupracovat na výzkumu"
 CZE_exchange_technology_desc: "Navzdory hojnosti přírodních zdrojů Balkánu chybí výnosné kolonie či vyspělý průmysl velmocí. Proto je klíčové spolupracovat na výzkumu, abychom se mohli soustředit na své vlastní specializace."
 CZE_demand_corridor_to_ussr: "Požadovat koridor pro [SOV.GetNameDef]"
 CZE_demand_corridor_to_ussr_desc: "Pokud s námi [POL.GetNameDef] nebude spolupracovat, musíme podniknout vážnější kroky k zajištění přístupu k našim [SOV.GetAdjective] spojencům."
 CZE_ally_poland: "[POL.GetName] jako spojenec"
 CZE_ally_poland_desc: "S polsko-sovětskou válkou stále v paměti a rostoucí hrozbou na západě se [POL.GetNameDef] nachází v podobné bezpečnostní situaci jako my. Musíme je přesvědčit, že neutralita je nezachrání, a aby vsadili na nás."
 CZE_realize_the_polish_czechoslovak_confederation: "Vytvořit konfederaci"
 CZE_realize_the_polish_czechoslovak_confederation_desc: "Navzdory statečnému boji bylo [POL.GetNameDef] poraženo. S jeho vládou nyní v exilu se objevily myšlenky na unii s námi. Sloučením jejich vlády s naší bychom mohli sjednotit [POL.GetNameDef] pro tento nový stát a koordinovaně usilovat o osvobození společné vlasti."
 CZE_integrate_western_ukrainians: "Začlenit západní Ukrajince"
 CZE_integrate_western_ukrainians_desc: "Ukrajincům poskytuje [CZE.GetNameDef] značnou pomoc a autonomii, nyní se můžeme pokusit začlenit nově získaná území do naší ukrajinské provincie."
 CZE_ally_russia: "[SOV.GetNonIdeologyName] jako spojenec"
 CZE_ally_russia_desc: "Nyní, když je [SOV.GetAdjective] vláda bližší té naší, mohli bychom zkusit rozšířit neurčitou dohodu podepsanou s jejich předchozí vládou."
 CZE_claim_ukraine: "Zřídit spřátelenou ukrajinskou vládu"
 CZE_claim_ukraine_desc: "Ukrajina je pro [SOV.GetNameDef] důležitou součástí. Jejím ovládnutím bychom mohli vytvořit silný nárazníkový stát."
 CZE_strengthen_the_little_entente: "Formalizovat Malou dohodu"
 CZE_strengthen_the_little_entente_desc: "Malá dohoda, zaměřená především na to, aby bylo [HUN.GetNonIdeologyName] udrženo při zemi, má potenciál stát se vážným spojenectvím se značnou armádou."
 CZE_seek_french_leadership: "Usilovat o [FRA.GetAdjective] vedení"
 CZE_seek_french_leadership_desc: "Navzdory naší iniciativě při vytváření této aliance je zřejmé, že [FRA.GetNonIdeologyName] by byla velkým přínosem pro jakékoli spojenectví. I kdyby to znamenalo přenechat vedení jejich armádě."
 CZE_increase_food_and_resource_imports: "Zvýšit dovoz potravin a surovin"
 CZE_increase_food_and_resource_imports_desc: "Naši noví spojenci mají silné zemědělství, a proto je nyní méně nutné dotovat naše vlastní. Levný dovoz surovin nám ušetří peníze a zároveň podpoří ekonomiku našich spojenců."
 CZE_double_down_on_heavy_industry: "Zdvojnásobit důraz na těžký průmysl"
 CZE_double_down_on_heavy_industry_desc: "Nové dohody s našimi spojenci nám umožní soustředit se na odvětví, ve kterých jsme nejkonkurenceschopnější, například na zbrojní průmysl. Přebytky pak můžeme prodávat."
 CZE_neutralize_the_hungarian_threat: "Neutralizovat [HUN.GetAdjective] hrozbu"
 CZE_neutralize_the_hungarian_threat_desc: "[HUN.GetNameDefCap] je překážkou obchodu s možnými spojenci na jihu a v případě spojenectví s našimi nepřáteli by mohlo zaměstnat důležitou část naší armády navzdory dopadům Trianonské smlouvy."
 CZE_cancel_anti_hungary_focus: "Ustoupeno po [GER.GetAdjective] zásahu"
 CZE_ally_romania: "[ROM.GetName] jako spojenec"
 CZE_ally_romania_desc: "[ROM.GetNameDefCap] je v regionu jednou z mála skutečně soběstačných zemí, produkující potraviny i cennou ropu. Jejich získání na naši stranu by nám nejen usnadnilo přístup ke vzájemným zdrojům, ale zároveň by našim nepřátelům odepřelo suroviny potřebné k válce proti nám."
 CZE_divide_germany: "Rozdělit Německo"
 CZE_divide_germany_desc: "Hrozbě, kterou představuje [GER.GetNameDef], lze jen těžko čelit o samotě. Měli bychom proto hledat spojence, kteří mají stejné obavy z [GER.GetAdjective] expanze a vůli jednat preventivně."
 CZE_if_FRA_ally_tt: "Účinky, pokud je §YFrancie monarchistická§! a není již spojena s nikým jiným:"
 CZE_if_POL_ally_tt: "Účinky, pokud bylo dokončeno §Y$CZE_a_strong_poland$§! a výsledkem byla záruka od [POL.GetNonIdeologyName]:"
 CZE_revolutionary_brigades: "Založit revoluční brigády"
 CZE_revolutionary_brigades_desc: "Naši revolucionáři, kteří již získali zkušenosti v boji za [ROOT.GetNameDef], by měli být dále začleněni do pravidelné armády."
 CZE_recruit_communist_exiles: "Naverbovat komunistické exulanty"
 CZE_recruit_communist_exiles_desc: "[ROOT.capital.GetCapitalVictoryPointName] je již dlouho bezpečným útočištěm pro revoluční exulanty. Naše nová vláda by mohla těchto zahraničních radikálů využít."
 CZE_destabilize_potential_adversaries: "Destabilizovat možné protivníky"
 CZE_destabilize_potential_adversaries_desc: "Komunističtí exulanti, se kterými spolupracujeme, rozumějí své vlasti způsobem, kterému se i naši špioni jen těžko vyrovnají. Při volbě strategie k osvobození jejich vlasti musíme tuto znalost plně využít."
 CZE_nationalize_key_industries: "Znárodnit banky a doly"
 CZE_nationalize_key_industries_desc: "Doly poskytují suroviny, které náš průmysl mění ve zbraně války. Zajištění dodávek materiálu v době krize je lepší svěřit vládě než finančníkům a průmyslníkům."
 CZE_rehabilitate_the_army: "Rehabilitovat armádu"
 CZE_rehabilitate_the_army_desc: "Většina generálů [CZE.GetAdjective] armády jsou veteráni Československých legií, které výrazně bojovaly proti Sovětům v jejich občanské válce. Bude nutné zajistit jejich loajalitu nové [CZE.GetAdjective] vládě."
 CZE_unlock_civil_war_army_generals_tt: "Získá zpět velitele ztracené v občanské válce"
 CZE_recruit_ideologically_aligned_generals: "Naverbovat ideologicky spolehlivé generály"
 CZE_recruit_ideologically_aligned_generals_desc: "Je čas upravit naše výcvikové programy tak, aby armádu obohatili noví kandidáti, kteří rozumějí našim novým hodnotám."
 CZE_recruit_communist_generic_general_tt: "Získá komunistického generála."
 CZE_purge_two_random_commanders_tt: "Dva náhodní velitelé budou odstraněni."
 CZE_czechoslovak_union: "Československý svaz"
 CZE_czechoslovak_union_desc: "[CZE.GetNameDef] musí zvýšit místní autonomii. To umožní přizpůsobit komunistický systém místním podmínkám."
 CZE_continue_industrial_relocation_schemes: "Pokračovat v přesunu zbrojních továren"
 CZE_continue_industrial_relocation_schemes_desc: "V zájmu národní bezpečnosti musíme pokračovat v přesunu zranitelnějších továren do oblastí, kde budou lépe chráněny před leteckými i pozemními útoky. Nemůžeme riskovat ohrožení tak kritického průmyslu."
 CZE_continue_industrial_relocation_schemes_tt: "Odstraní §Y1 vojenskou továrnu§!."
 CZE_continue_industrial_relocation_schemes_2_tt: "§RTovárny bude nutné znovu postavit.§!"
 CZE_establish_a_armament_factory_in_uhersky_brod: "Založit zbrojovku v Uherském Brodě"
 CZE_establish_a_armament_factory_in_uhersky_brod_desc: "Továrna v Uherském Brodě je zbrojní podnik specializovaný na výrobu a vývoj automatických zbraní pro pěchotu i letadla. Plánujeme z ní učinit nejpokročilejší továrnu svého druhu na světě."
 CZE_appeal_to_the_castle: "Obrátit se na Hrad"
 CZE_appeal_to_the_castle_desc: "„Hrad“ v Československu označuje rozsáhlou síť vlivných organizací a osob podporujících prezidenty. Tato moc jim umožňuje uplatňovat větší vliv, než by odpovídalo jejich omezeným ústavním pravomocím. Získání podpory této skupiny by výrazně posílilo naši snahu o vedení."
 CZE_petition_the_nobles: "Požádat šlechtu"
 CZE_petition_the_nobles_desc: "Šlechta sice již nemá uznávané tituly, ale stále je vlivnou součástí [ROOT.GetAdjective] společnosti. Její podpora by nám dala legitimitu i prostředky k získání další podpory."
 CZE_unify_the_fascist_parties: "Sjednotit fašistické strany"
 CZE_unify_the_fascist_parties_desc: "Scéna fašistických stran je roztříštěná a mnohé z nich jsou natolik extremistické, že nikdy nemohou získat významnou podporu. V zájmu obrany státu je nutné, aby se sjednotily a vytvořily vizi Československa přitažlivou nejen pro okrajové vrstvy společnosti."
 CZE_pro_rearmament_propaganda: "Propaganda pro zbrojení"
 CZE_pro_rearmament_propaganda_desc: "Abychom zvýšili podporu centralizovanější vlády, musíme zdůraznit současnou křehkou situaci ve světě kolem nás. To zároveň pomůže motivovat obyvatelstvo k podpoře plánů na posílení armády, bude-li to nutné."
 CZE_align_nationalist_parties: "Sjednotit české nacionalistické strany"
 CZE_align_nationalist_parties_desc: "Ačkoli bychom se měli snažit oslovit všechny občany, nelze popřít, že tradiční české nacionalistické strany mají na politické scéně největší vliv a právě s nimi můžeme nejsnáze získat podporu."
 CZE_align_slovak_catholics: "Získat slovenské katolíky"
 CZE_align_slovak_catholics_desc: "Katolické a nacionalistické strany mají na Slovensku značnou podporu. Oslovit nacionalisty by bylo bez zásadních ústupků obtížné, avšak katolické kruhy bychom mohli získat pro naši věc."
 CZE_jozef_tiso_tt: "§Y$CZE_jozef_tiso$§! bude jmenován za poradce"
 CZE_align_catholic_parties: "Získat ČSL"
 CZE_align_catholic_parties_desc: "ČSL a další katolické strany byly tradiční oporou monarchistického systému v Rakousku-Uhersku. Nastal čas pokusit se je přivést zpět k tomuto postoji."
 CZE_restore_the_monarchy: "Obnovit monarchii"
 CZE_restore_the_monarchy_desc: "Když je podpora nového systému zajištěna, nastal čas předložit lidu tuto promyšlenou myšlenku. $CZE_karel_schwarzenberg$ jako zvolený panovník osloví jak staré stoupence monarchie, tak nové, protože je náš, nikoli [AUS.GetAdjective] panovník, který nám byl dříve vnucen."
 CZE_semi_constitutional_monarchy: "Polokonstituční systém"
 CZE_semi_constitutional_monarchy_desc: "Když je nyní monarcha zvolen, nastal čas upravit ústavu. Ačkoli někteří prosazují centralizaci moci, aby se předešlo sporům v těchto neklidných časech, je zřejmé, že monarcha nemůže vše zvládnout sám. Nejlepší proto může být částečně zachovat současný systém pro správu země a zároveň mít panovníka jako jejího vůdce."
 CZE_restore_noble_titles: "Obnovit šlechtické tituly"
 CZE_restore_noble_titles_desc: "Nastal čas odměnit spolupráci šlechty obnovením jejích titulů, které byli zrušeny při založení republiky. To nám také umožní udělovat čestné tituly hrdinům, například veteránům, kteří znovu a znovu bojovali za [ROOT.GetAdjective] stát."
 CZE_restore_the_austro_hungarian_customs_union: "Obnovit celní unii říše"
 CZE_restore_the_austro_hungarian_customs_union_desc: "Jednou z nepopiratelných výhod Rakousko-Uherska byly omezené obchodní bariéry pro náš průmysl. Obnovení této unie by bylo prvním krokem k přivedení dalších bývalých členských zemí do naší sféry vlivu."
 CZE_customs_union: "Celní unie"
 CZE_catholic_focus: "Katolické zaměření"
 CZE_catholic_focus_desc: "Navzdory tomu, že husité tvoří slavnou část [ROOT.GetAdjective] dějin, mnozí stále vyznávají katolickou víru, na kterou bychom měli navázat posílením její role ve společnosti."
 CZE_hussite_legacy: "Husitský odkaz"
 CZE_hussite_legacy_desc: "Husité neprosazovali pouze protestantštější podobu křesťanství, ale vynikali i tolerancí k jiným názorům v této věci, na rozdíl od tyranů, kteří proti nim vedli války."
 CZE_align_with_germany: "Naklonit si [GER.GetNonIdeologyName]"
 CZE_align_with_germany_desc: "Nová [GER.GetAdjective] vláda nemusí být nutně méně expanzivní, ale může být pragmatičtější v tom, s kým [GER.GetNameDef] uzavírá spojenectví a koho odsuzuje. Měli bychom usilovat o to, abychom patřili do první skupiny."
 CZE_rally_against_germany: "[GER.GetNonIdeologyName] jako nepřítel"
 CZE_rally_against_germany_desc: "Českoslováci statečně bojovali za svou nezávislost a nyní musíme vyzvat všechny obyvatele, aby tuto nezávislost chránili."
 CZE_integrate_sudeten_germans: "Začlenit Sudety"
 CZE_integrate_sudeten_germans_desc: "Rozdělení obyvatelstva Sudet nikomu nepomáhá. Musíme se snažit řešit jejich obavy a pracovat na jejich odstranění. Tím bychom mohli odzbrojit separatistické vůdce, protože jejich tvrzení o útlaku by bylo těžké uvěřit."
 CZE_cooperate_with_the_sdp: "Spolupracovat se SdP"
 CZE_cooperate_with_the_sdp_desc: "Ačkoli je SdP destabilizační silou, při správném povzbuzení může zaujmout loajální postoj, například začleněním do vládní koalice."
 CZE_revive_the_december_bloc: "Obnovit Prosincový blok"
 CZE_revive_the_december_bloc_desc: "Prosincový blok fašistických, menšinových a pravicových stran, který se stavěl proti zvolení Edvarda Beneše prezidentem, by měl být obnoven jako alternativa k současné vládě."
 CZE_revert_1926_anti_military_laws: "Zrušit protivojenské zákony z roku 1926"
 CZE_revert_1926_anti_military_laws_desc: "Po pokusu o převrat, který vedl $CZE_radola_gajda$, přišla armáda a četnictvo o volební právo i některá další privilegia. Vzhledem ke klíčové roli armády v těchto těžkých časech je spravedlivé tato omezení odstranit a ukončit rozdělení mezi armádou a politikou."
 CZE_bop_to_fascism_support_tt: "Přidá třetinu hodnoty §Y$CZE_bop_army_readiness$§! k podpoře fašismu:"
 CZE_power_to_the_military: "Moc pro armádu"
 CZE_power_to_the_military_desc: "Je zřejmé, že při obraně národa nelze šetřit žádnými prostředky. Proto je zásadní, aby ti u moci rozuměli potřebám armády, a není lepšího způsobu, jak toho dosáhnout, než vojenskou vládou."
 CZE_militarize_the_associations: "Militarizovat spolky"
 CZE_militarize_the_associations_desc: "Mnohé spolky, které má [CZE.GetNameDef], mohou přispět k obraně národa tím, že budou vyučovat dovednosti nezbytné pro vojáka ještě před mobilizací obyvatelstva."
 CZE_aggressive_foreign_policy: "Agresivní zahraniční politika"
 CZE_aggressive_foreign_policy_desc: "Časy důvěry v křehké pakty skončily. Musíme jednat rozhodně, abychom zajistili svou bezpečnost, i kdyby to vyžadovalo značné oběti."
 CZE_work_with_germany: "[GER.GetNameDef] a vzájemná spolupráce"
 CZE_work_with_germany_desc: "Když je sudetská otázka vyřešena, možná nyní i [GER.GetNameDef] uzná, jak cenným spojencem bude [ROOT.GetNameDef]."
 CZE_control_the_associations: "Ovládnout spolky"
 CZE_control_the_associations_desc: "[CZE.GetNonIdeologyName] má mnoho organizací, od profesních sdružení po zájmové a sportovní spolky. Ovládněte je a ovládnete velkou část společnosti."
 CZE_diversify_bata: "Diverzifikovat Baťu"
 CZE_diversify_bata_desc: "Baťa je velká společnost, kterou můžeme využít ve svůj prospěch v našem zásobovacím řetězci. Může nám pomoci poskytováním klíčových materiálů, které je jinak obtížné získat."
 CZE_devaluate_the_koruna: "Devalvovat korunu"
 CZE_devaluate_the_koruna_desc: "Mít silnou měnu je nebezpečné hospodářské postavení pro zemi, která je z velké části závislá na vývozu. Oslabení měny může přinést krátkodobou bolest, ale z dlouhodobého hlediska se nám vyplatí."
 CZE_continue_the_central_bohemia_plan: "Pokračovat v plánu rozvoje středních Čech"
 CZE_continue_the_central_bohemia_plan_desc: "Pokračování našeho plánu rozšiřování průmyslových oblastí ve středu země nám umožní využít úspor z rozsahu. Rozšiřovat průmysl dále od hranic je navíc moudré i z hlediska národní bezpečnosti."
 CZE_balance_industrial_invevestments: "Vyvážit průmyslový rozvoj"
 CZE_balance_industrial_invevestments_desc: "Zanedbávání oblastí mimo [9.GetName] a [75.GetName] je jedním z důvodů, proč se naše země na začátku desetiletí začala rozdělovat. Rozvoj okrajových oblastí pomůže překlenout rozdíly v průmyslovém rozvoji mezi oběma částmi země."
 CZE_expand_prf_science_facilities: "Rozšířit vědecká zařízení Přírodovědecké fakulty"
 CZE_expand_prf_science_facilities_desc: "Vědecká zařízení Přírodovědecké fakulty jsou plná zástupů nadaných lidí, kteří čekají na příležitost dělat něco většího než doposud. Rozšíření fakulty a zapojení těchto lidí do práce pro vládu je dobrým začátkem ke zlepšení našeho výzkumu."
 CZE_raise_more_industrial_funds: "Získat více prostředků pro průmysl"
 CZE_raise_more_industrial_funds_desc: "Od dob Rakouska-Uherska až po současnost je průmysl srdcem našeho národa. Poskytnutím nezbytného rozpočtu a financování bude v této neklidné Evropě dále vzkvétat."
 CZE_skoda_priority_focus_info_tt: "Některá §YNárodní zaměření§! budou ke svému dokončení vyžadovat konkrétní £GFX_CZE_skoda_text_icon §YPrioritu Škoda§!. Tato zaměření jsou označena malou ikonou související s požadovanou £GFX_CZE_skoda_text_icon §YPrioritou Škoda§!."
 CZE_joint_stock_schemes: "Akciové programy"
 CZE_joint_stock_schemes_desc: "Akciové programy sloužily jako zdroj hospodářského růstu v dobách, kdy tradiční zdroje financování chyběly. Pokračování v těchto postupech povede k dalšímu růstu naší ekonomiky."
 CZE_the_slovak_arrow: "Slovenská strela"
 CZE_the_slovak_arrow_desc: "Vývoj rychlého motorového vozu mezi dvěma našimi hlavními městy by byl velkým zdrojem národní hrdosti. Zároveň by nám dal dobrou záminku ke zlepšení železniční infrastruktury."
 CZE_finish_double_tracking_efforts: "Dokončit zdvoukolejnění tratí"
 CZE_finish_double_tracking_efforts_desc: "Dokončení zdvoukolejnění některých důležitých vedlejších tratí nám umožní vyšší propustnost dopravy na těchto linkách. To povede k lepšímu spojení mezi některými našimi vedlejšími městy."
 CZE_realize_motorway_proposals: "Realizovat návrhy dálnic"
 CZE_realize_motorway_proposals_desc: "Naší vládě byly předloženy návrhy dálnic, které by výrazně zlepšily silniční spojení v našich hranicích. Měli bychom tyto návrhy uskutečnit."
 CZE_build_additional_rail_stations: "Vybudovat další nádraží"
 CZE_build_additional_rail_stations_desc: "S nově rozvinutou železniční infrastrukturou některá stávající nádraží nezvládají zvýšený provoz. Jejich rozšíření by výrazně pomohlo přepravě lidí i zboží ve větším objemu."
 CZE_build_additional_rail_stations_focus_cost_tt: "Zvolení §Y$CZE_devaluate_the_koruna$§! zkrátí dobu tohoto zaměření na §G35§! dní."
 CZE_grow_ckd_secondary_facilities: "Rozšířit vedlejší závody ČKD"
 CZE_grow_ckd_secondary_facilities_desc: "ČKD má mnoho menších vedlejších závodů vyrábějících důležité průmyslové produkty, například elektrické generátory. Rozšíření těchto závodů podpoří růst našeho těžkého průmyslu."
 CZE_bolster_domestic_construction: "Posílit domácí stavebnictví"
 CZE_bolster_domestic_construction_desc: "Naše domácí stavebnictví od získání nezávislosti po Velké válce stabilně roste. Další investice do středně velkých stavebních firem tento růst ještě posílí."
 CZE_invest_in_vhht: "Investovat do VHHT"
 CZE_invest_in_vhht_desc: "VHHT (Vítkovické horní a hutní těžířstvo) je společnost sdružující mnoho kovozpracujících závodů po celé zemi. Investice a rozšíření nám pomůže zlepšit řadu oblastí výroby kovů."
 CZE_expand_vitkovice_ironworks: "Rozšířit Vítkovické železárny"
 CZE_expand_vitkovice_ironworks_desc: "Vítkovické železárny jsou důležitým dodavatelem železa nejen pro [74.GetName]. Jejich rozšíření výrazně zvýší produkci závodu."
 CZE_expand_central_bohemian_mines: "Rozšířit středočeské doly"
 CZE_expand_central_bohemian_mines_desc: "Doly ve středu naší země jsou nejdůležitější pro naši energetickou bezpečnost. Musíme je co nejdříve rozšířit."
 CZE_increase_bauxite_imports: "Zvýšit dovoz bauxitu"
 CZE_increase_bauxite_imports_desc: "Naše země sice není bohatá na hliník, ale využitím určitých rafinačních procesů a zvýšením dovozu bauxitu můžeme malé množství této suroviny vyrábět doma. To pomůže zmírnit nedostatek zdrojů."
 CZE_merge_the_oil_companies: "Sloučit ropné společnosti"
 CZE_merge_the_oil_companies_desc: "Naše ropné společnosti sotva lze tak nazývat. Jsou to malé podniky založené kolem několika vrtů. Jejich sloučením a převedením ropného průmyslu pod státní kontrolu dokážeme více s menšími prostředky."
 CZE_expand_trinec_ironworks: "Rozšířit Třinecké železárny"
 CZE_expand_trinec_ironworks_desc: "Třinecké železárny jsou průmyslovým titanem pro celé [72.GetName] již od svého založení. Další investice nám přinesou obrovské dividendy v produkci surovin."
 CZE_consolidate_mining_operations: "Sloučit těžební provozy"
 CZE_consolidate_mining_operations_desc: "Naše těžební provozy by mohly být lépe optimalizovány, pokud by byla správa těchto společností sjednocena. To umožní efektivnější výzkum i rozšiřování stávajících dolů."
 CZE_expand_praga: "Smlouvy s Pragou"
 CZE_expand_praga_desc: "Praga byla dlouho dodavatelem různých komponent pro náš vojenský průmysl. Je rozumné jí přidělit další zakázky k jejímu rozvoji."
 CZE_shrink_educational_disparities: "Zmírnit vzdělávací rozdíly"
 CZE_shrink_educational_disparities_desc: "Našim venkovským oblastem se nedostává kvalitního vzdělání, které je běžné ve městech. Musíme tyto rozdíly odstranit rozsáhlými vzdělávacími programy zaměřenými na tyto oblasti."
 CZE_kickstart_rapid_rearmanent: "Spustit rychlé přezbrojení"
 CZE_kickstart_rapid_rearmanent_desc: "Mnozí politici a podnikatelé to mohou považovat za strašné rozhodnutí, ale musíme začít přezbrojovat ihned. Země kolem nás se neodzbrojují, právě naopak, a je to veřejné tajemství. Musíme připravit naši armádu, dokud ještě máme čas."
 CZE_keep_focus_on_weapon_exports: "Zachovat důraz na vývoz zbraní"
 CZE_keep_focus_on_weapon_exports_desc: "Náš rozsáhlý vývoz zbraní nás vyvedl z hospodářské krize. Obrátit tento trend by bylo politicky i hospodářsky nebezpečné. Pokračovat v dosavadním směru je nyní nejlepší možností. Hrozby proti nám jsou ostatně přehnané."
 CZE_force_the_industrialists_hand: "Přinutit průmyslníky jednat"
 CZE_force_the_industrialists_hand_desc: "Průmyslníci a konglomeráty příliš dlouho brzdili naši schopnost účinně přezbrojit. Je čas rozhodnout za ně v zájmu národa."
 CZE_embrace_corporatism: "Přijmout korporativismus"
 CZE_embrace_corporatism_desc: "Mohli bychom s průmyslníky vyjednat pomoc při obnovení přezbrojení, pokud přistoupíme na některé jejich podmínky. Určité politické změny v jejich prospěch jsou zcela rozumné a v našem zájmu."
 CZE_expand_existing_armory_plants: "Rozšířit stávající zbrojní závody"
 CZE_expand_existing_armory_plants_desc: "Přesun některých našich stávajících zbrojních závodů by byl nákladnou investicí s malým dlouhodobým přínosem. Rozšíření současných provozů přinese výhody a možnosti navýšit výrobu, výzkum i vývoj v těchto lokalitách, i za cenu toho, že se nacházejí v místech snadněji napadnutelných možnými nepřáteli."
 CZE_expand_skoda_offices: "Rozšířit kanceláře Škody"
 CZE_expand_skoda_offices_desc: "Naše zahraniční kanceláře pohánějí prodej našich zbraní. Je rozumné rozšířit je do nových lokalit."
 CZE_skoda_office_unlock_tt: "Odemkne rozhodnutí: §YVybudovat kancelář prodeje zbraní§!"
 CZE_complete_the_power_grid: "Dokončit elektrickou síť"
 CZE_complete_the_power_grid_desc: "Elektrická síť v našich venkovských oblastech vyžaduje další práci. Zaostává za zbytkem země a brzdí další hospodářský pokrok."
 CZE_build_the_slapy_reservoir: "Vybudovat Vodní nádrž Slapy"
 CZE_build_the_slapy_reservoir_desc: "Vybudování přehrady u Slap povede k vyšší výrobě energie a novým hospodářským příležitostem v oblasti. Zvýšená produkce energie výrazně pomůže rozvoji našeho průmyslu v regionu."
 CZE_diversify_refinery_processes: "Diverzifikovat rafinační procesy"
 CZE_diversify_refinery_processes_desc: "Naše vrty by mohly vyrábět širokou škálu různých ropných produktů. Jediným problémem je nedostatek znalostí, jak toho dosáhnout. Pokud investujeme čas do výzkumu, budeme schopni tento sen proměnit ve skutečnost."
 CZE_enlarge_smaller_wells: "Rozšířit menší vrty"
 CZE_enlarge_smaller_wells_desc: "Navzdory své velikosti mohou naše menší vrty produkovat mnohem více než nepatrné množství ropy, které těží nyní. Stačí investovat čas a prostředky."
 CZE_develop_sudetenland_resources: "Rozvíjet sudetské zdroje"
 CZE_develop_sudetenland_resources_desc: "Sudety mají mnoho ložisek surovin, která nyní nevyužíváme. Byla by chyba neinvestovat do budování dalších dolů v této oblasti."
 CZE_grow_tatras_capabilities: "Rozšířit schopnosti Tatry"
 CZE_grow_tatras_capabilities_desc: "V současnosti malé tankové oddělení Tatry má několik novátorských výrobních návrhů. Poskytnutí dalších prostředků jim umožní pokračovat v pokroku konstrukce obrněných vozidel."
 CZE_bailout_moser: "Zachránit Moser"
 CZE_bailout_moser_desc: "Moser se po Velké hospodářské krizi ocitl v těžkých časech. Jeho podniky je třeba zachránit, závody znovu otevřít a propuštěné pracovníky vrátit do zaměstnání."
 CZE_merge_skodas_consumer_good_plants: "Sloučit spotřební závody Škody"
 CZE_merge_skodas_consumer_good_plants_desc: "Škoda má ve svém portfoliu mnoho menších závodů na spotřební zboží, které nejsou centralizované. Jejich sloučení by pomohlo optimalizovat výrobu v mnoha oblastech těchto podniků a mohlo by mít pozitivní dopady i na Škodu jako celek."
 CZE_giant_of_central_europe_industry: "Průmyslový obr"
 CZE_giant_of_central_europe_industry_desc: "Dosáhli jsme výšin, které byly dříve považovány za nemožné. Nyní jsme titánem evropského průmyslu!"
 CZE_continue_armed_force_reform: "Pokračovat v reformě ozbrojených sil"
 CZE_continue_armed_force_reform_desc: "Pokračováním modernizace našich ozbrojených sil podle plánovaného harmonogramu a přeřazením vojenských oblastí pod zemská velitelství dosáhneme lepší koordinace v jakémkoli budoucím konfliktu."
 CZE_air_force_officer_recruitment: "Nábor důstojníků letectva"
 CZE_air_force_officer_recruitment_desc: "Aérokluby napříč státy ve spolupráci se Školou záložních důstojníků letectva naplňují kritickou potřebu záložních důstojníků pořádáním leteckých kurzů a cvičení s ostrou střelbou."
 CZE_national_defense_act: "Zákon o obraně státu"
 CZE_national_defense_act_desc: "Tento obranný zákon zahrnuje všechna opatření, vojenská i jiná, určená k čelení jakékoli hrozbě nebo útoku proti svrchovanosti, celistvosti, jednotě a bezpečnosti našeho státu pod dohledem Nejvyšší rady obrany státu."
 CZE_car_and_oil_rationing: "Příděly automobilů a ropy"
 CZE_car_and_oil_rationing_desc: "Přídělový systém pro soukromá motorová vozidla a jejich rekvizice podle potřeby nám umožní soustředit automobilovou výrobu a ropné zdroje pro vojenské potřeby."
 CZE_expand_airfield_capacity: "Rozšířit kapacitu letišť"
 CZE_expand_airfield_capacity_desc: "3. odbor letectví naplánoval nová letiště a hangáry pro řádný provoz, skladování a opravy našich letadel, stejně jako ubytování pro nově vzniklé letky a pozemní personál."
 CZE_trust_in_old_guard: "Důvěra ve starou gardu"
 CZE_trust_in_old_guard_desc: "Letecké dovednosti a zkušenosti z Velké války budou předány nové generaci veterány, jimž vkládáme pevnou důvěru."
 CZE_expand_the_aero_clubs: "Rozšířit aerokluby"
 CZE_expand_the_aero_clubs_desc: "Aerokluby prokázaly svou užitečnost jako stálý zdroj talentovaných pilotů pro naši zemi. Měli bychom je dále rozšířit."
 CZE_invest_in_the_smaller_air_plants: "Investovat do menších leteckých závodů"
 CZE_invest_in_the_smaller_air_plants_desc: "Investice do nových a menších výrobců letadel přináší potřebnou konkurenci zavedeným podnikům. Mohou nám pomoci pokrýt širší výrobní požadavky."
 CZE_continue_avia_expansion: "Pokračovat v rozšiřování Avie"
 CZE_continue_avia_expansion_desc: "Investice do Avie poskytne další vybavení potřebné k posílení výrobní kapacity. To může pomoci dosáhnout vyšší efektivity při výrobě velmi žádaných draků letadel."
 CZE_increase_military_aeronautical_institute_funding: "Zvýšit financování VZLÚ"
 CZE_increase_military_aeronautical_institute_funding_desc: "Vybudováním dalších zařízení pro Výzkumný a zkušební letecký ústav získáme lepší poznatky o aerodynamice a dále zdokonalíme konstrukci našich letadel."
 CZE_air_training_abroad: "Letecký výcvik v zahraničí"
 CZE_air_training_abroad_desc: "Vysíláním kadetů k leteckým složkám spřátelených zemí získáme cenné poznatky z různých přístupů i přímé zkušenosti, které po návratu využijí ve službě."
 CZE_establish_air_defense_zones: "Zřídit zóny protivzdušné obrany"
 CZE_establish_air_defense_zones_desc: "Můžeme rozmístit nové protiletadlové baterie u klíčových bodů a továren a zřídit zóny protivzdušné obrany prostřednictvím komunikačních uzlů na územní úrovni, čímž zlepšíme přesnost naší protiletadlové obrany."
 CZE_establish_air_defense_zones_enable_tt: "Povolí §YZóny protivzdušné obrany§!"
 CZE_establish_air_defense_zones_tt: "Faktor šance zásahu statické PVO: §G+10%§!"
 CZE_the_air_is_our_sea: "Vzduch je naše moře"
 CZE_the_air_is_our_sea_desc: "Díky systematickému výcviku pilotů povzbudíme naše letce k odvážnému a sebejistému létání: „Nemáme oceánské přístavy ani zaoceánské lodě. Vzduch je naše moře.“"
 CZE_bring_kramer_and_lobel_under_state_control: "Převést Kramer & Löbl pod státní kontrolu"
 CZE_bring_kramer_and_lobel_under_state_control_desc: "Znárodněním společnosti Kramer & Löbl můžeme zajistit nepřetržitý výzkum a včasné dodávky nezbytného elektrického vybavení a rádiového příslušenství."
 CZE_second_to_none: "Bez konkurence"
 CZE_second_to_none_desc: "Konstrukce našich letadel se každým dnem zlepšují. S dalším výzkumem budou naše návrhy bez konkurence v celém světě!"
 CZE_diversify_airframe_production: "Diverzifikovat výrobu letadel"
 CZE_diversify_airframe_production_desc: "Nemůžeme se ve vzduchu spoléhat pouze na stíhačky. Pro plnění jiných typů misí jsou zapotřebí další letadla a větší draky."
 CZE_projekt_l_52: "Projekt L-52"
 CZE_projekt_l_52_desc: "Technologie proudových motorů je budoucností vojenského letectva. Tato technologie je zatím ještě nevyzrálá, ale pokud věnujeme čas zvláštnímu projektu a navrhneme drak letadla přímo pro ni, můžeme si udržet náskok."
 CZE_fund_vladimir_mandl_research: "Financovat výzkum Vladimíra Mandla"
 CZE_fund_vladimir_mandl_research_desc: "Právník $CZE_vladimir_mandl$ je fascinován myšlenkou raketové techniky. Pokud s ním budeme spolupracovat a poskytneme mu prostředky k přeměně jeho výzkumu v praktickou technologii, můžeme z tohoto partnerství výrazně těžit."
 CZE_mobilize_the_reserves: "Mobilizovat zálohy"
 CZE_mobilize_the_reserves_desc: "Napětí na našich hranicích se zhoršuje. Musíme povolat záložníky a předem určené vojenské specialisty v souladu s mobilizačními kartami."
 CZE_three_kings: "Tři králové"
 CZE_three_kings_desc: "Oficiální podpora našich odbojových skupin výrazně zvýší jejich schopnost škodit nepřátelské armádě. Může to pomoci i našim polním jednotkám."
 CZE_form_the_state_defense_guard: "Vytvořit Stráž obrany státu"
 CZE_form_the_state_defense_guard_desc: "Zřízením SOS vytvoříme organizaci specializovanou na ochranu našich dlouhých hranic. Jelikož jsou její členové vojensky organizováni a vycvičeni, budou tvořit první linii obrany proti jakémukoli pohraničnímu vpádu."
 CZE_expand_the_horska_divisions: "Rozšířit Horskou divizi"
 CZE_expand_the_horska_divisions_desc: "Jelikož naši zemi tvoří převážně pahorkatiny a plošiny, vojáci zvlášť vycvičení pro horský boj budou v tomto obtížném terénu nepostradatelní."
 CZE_develop_horska_artillery: "Vyvinout horské dělostřelectvo"
 CZE_develop_horska_artillery_desc: "Úpravou našeho současného dělostřelectva tak, aby bylo lehké a rozložitelné, zajistíme našim jednotkám dostatečnou palebnou sílu v horském a kopcovitém terénu."
 CZE_develop_horska_artillery_tech_tt: "Povolí §YHorské dělostřelectvo§!\n§YDělostřelectvo (Hory)§!\n Útok: §G+10%§!\n Pohyb: §G+10%§!\n§YDělostřelectvo (Kopce)§!\n Útok: §G+10%§!\n Pohyb: §G+10%§!"
 CZE_bribery_investigations: "Vyšetřování úplatkářství"
 CZE_bribery_investigations_desc: "Obdrželi jsme anonymní dopis týkající se stravy a zacházení s vojáky. Některé důkazy ukazují na nevhodné jednání určitých důstojníků zásobování. Musíme tomu učinit přítrž, než to armádě způsobí větší škody."
 CZE_bribery_investigations_remove_effect_tt: "Tento národní duch bude odstraněn po dokončení zaměření „§Y$CZE_bribery_investigations$§!“"
 CZE_opl_exercises: "Cvičení protivzdušné obrany"
 CZE_opl_exercises_desc: "Pořádáním cvičení protivzdušné obrany může naše armáda procvičit manévrování s lepší koordinací a ochranou, čímž se zlepší celkový pohyb jednotek a jejich bezpečnost."
 CZE_rapid_response_divisions: "Rychlá divize"
 CZE_rapid_response_divisions_desc: "Zahraniční armády předvedly význam mobilních jednotek schopných přesunu rychleji než nepřítel. Mohli bychom vytvořit podobné útvary k vyhodnocení jejich přínosu."
 CZE_redouble_tank_development_efforts: "Zdvojnásobit úsilí ve vývoji tanků"
 CZE_redouble_tank_development_efforts_desc: "Naše současná konstrukce lehkého tanku zaostává za jinými evropskými uživateli obrněné techniky. Musíme zdvojnásobit úsilí, abychom s nimi drželi krok."
 CZE_rearmed_and_retooled: "Přezbrojeni a přestavěni"
 CZE_rearmed_and_retooled_desc: "Náš současný těžší tankový podvozek ukazuje potenciál k modernizaci. Měli bychom pokračovat v tomto směru, abychom vyhověli budoucímu rozšíření našich obrněných sil."
 CZE_establish_the_fall_backlines: "Vybudovat záložní obranné linie"
 CZE_establish_the_fall_backlines_desc: "Musíme být realisté a připustit, že na některých místech může být naše obrana prolomena. Pokud k tomu dojde, předem připravené záložní linie rozhodnou o vítězství či porážce."
 CZE_establish_the_fall_backlines_masterful_delay_tactic_tt: "\nPovolí taktiku: §Y$tactic_masterful_delay$§!"
 CZE_anti_tank_development: "Vývoj protitankových kanónů"
 CZE_anti_tank_development_desc: "Stále více armád nasazuje početnější a silnější obrněné síly, proto jsou zlepšení našich protitankových zbraní nezbytností. Schopnost ničit tanky polním dělostřelectvem rozhodne, zda nepřítele zastavíme, nebo prorazí."
 CZE_anti_tank_development_tech_tt: "Povolí §YProtitanková vylepšení§!\n§YDělostřelectvo§! Průbojnost: §G+5%§!\n§YPodpůrné dělostřelectvo§! Průbojnost: §G+5%§!\n§YProtitankové§! Průbojnost: §G+5%§!\n§YPodpůrné protitankové§! Průbojnost: §G+5%§!"
 CZE_recon_in_force: "Průzkum bojem"
 CZE_recon_in_force_desc: "To, že se naše průzkumná jednotka dostane do kontaktu s nepřítelem při prověřování jeho obrany, je neocenitelným způsobem, jak získat informace."
 CZE_recon_in_force_tech_tt: "Povolí §Y$ABILITY_PROBING_ATTACK$§! \n§YPrůzkum§!: HP: §G+5§!\nPrůzkum: §G+10.0%§!."
 CZE_integrate_fortification_engineers: "Začlenit pevnostní ženisty"
 CZE_integrate_fortification_engineers_desc: "Když naši pevnostní ženisté právě nestaví stálá opevnění, můžeme je rychle přesunout na frontové úkoly a zlepšit naši obranu. Pomohou frontovým jednotkám budovat lepší polní opevnění."
 CZE_integrate_fortification_engineers_tech_tt: "Povolí §YZačleněné pevnostní ženisty§!\n§Y$engineer$§!:\nZakopání §G+10.00%§!.\n§Y(Pevnost)§!\n Obrana §G+10.0%§!"
 CZE_concealment_efforts: "Maskovací opatření"
 CZE_concealment_efforts_desc: "Široké nasazení bitevních a průzkumných letadel učinilo maskovací sítě a další způsoby ukrytí nezbytností. Musíme zesílit úsilí, aby naše jednotky byly v poli dobře maskované."
 CZE_concealment_efforts_tech_tt: "Povolí §YZlepšené maskovací sítě§! \n§YPěchota (Les)§!\n Obrana: §G+10%§!"
 CZE_elevate_the_vsv: "Posílit Vysokou školu válečnou"
 CZE_elevate_the_vsv_desc: "Být mozkem armády je obrovská národní a státní odpovědnost. Služba v generálním štábu proto vyžaduje důstojníky nejvyšších kvalit jak po stránce odborné přípravy, tak spolehlivosti, sebeovládání, taktu a charakteru."
 CZE_continue_with_snejdareks_plan_dynamic: "[CZE_continue_with_snejdareks_plan]"
 CZE_continue_with_snejdareks_plan_default: "Pokračovat ve Šnejdárkově plánu"
 CZE_continue_with_snejdareks_plan_no_snejdareks: "Pokračovat ve plánu statické obrany"
 CZE_continue_with_snejdareks_plan_dynamic_desc: "Účinná síť obrany brání nečekanému průniku nepřátelských vojsk. Poskytuje ochranu a vytváří pevný základ pro přechod ze strategické obrany do útoku."
 CZE_go_with_vojcechovskys_plan_dynamic: "[CZE_go_with_vojcechovskys_plan]"
 CZE_go_with_vojcechovskys_plan_default: "Zvolit Lužův plán"
 CZE_go_with_vojcechovskys_plan_no_luza: "Doktrína aktivní obrany"
 CZE_go_with_vojcechovskys_plan_dynamic_desc: "Nevýhodou statické obrany je, že s ní nelze manévrovat. Jakmile je prolomena, nelze ji už využít k útočným účelům, ale jen jako zbytky původního postavení."
 CZE_improve_the_current_officer_pool: "Zlepšit stávající důstojnický sbor"
 CZE_improve_the_current_officer_pool_desc: "Povýšíme personál, který prokázal schopnosti stát se páteří naší armády, protože je nezbytný pro dohled a koordinaci mezi vyšším velením a místními jednotkami."
 CZE_elevate_slovak_officers: "Povýšit slovenské důstojníky"
 CZE_elevate_slovak_officers_desc: "Zaměříme se na povyšování Slováků, aby bylo zajištěno lepší zastoupení v řadách armády. Snížením některých požadavků pro uchazeče ze slovenských oblastí očekáváme v budoucnu lepší soudržnost armády."
 CZE_promote_moravec_writings: "Propagovat Moravcovy publikace"
 CZE_promote_moravec_writings_desc: "Přestože Moravcova díla „Vojáci a doba“ a „Obrana státu“ vyvolala velmi rozporuplné reakce, jeho nedávno vydaný spis „Válečné možnosti ve střední Evropě“ byl probírán v denním tisku po celé Evropě. Musíme jej povzbudit, aby pokračoval ve své práci jako nepopiratelný odborník na otázky obranné politiky a vojenské historie."
 CZE_lessons_of_war: "Lekce války"
 CZE_lessons_of_war_desc: "Po získání bojových zkušeností proti rovnocennému protivníkovi můžeme tyto poznatky využít ke zlepšení našeho vrchního velení. Nic nenahradí zkušenosti získané ve skutečných střetech s nepřátelskou armádou."
 CZE_lessons_of_war_i_had_war_with_major_flag: "Byl ve válce s velmocí"
 CZE_for_the_homeland: "Za vlast"
 CZE_for_the_homeland_desc: "Když je naše armáda plně připravena na nadcházející výzvy, můžeme s jistotou říci, že jsme připraveni bránit vlast. Jsme připraveni na každý úkol, který před námi stojí."
 CZE_the_lions_roar: "Řev lva"
 CZE_the_lions_roar_desc: "Symbol československého lva představuje nejlepší vlastnosti naší armády. Odvahu, sílu a hrdinství nejvyššího řádu. Každý pozná nepřekonatelného ducha našich ozbrojených sil."
 CZE_diversify_our_specialists: "Rozšířit specializace našich odborníků"
 CZE_diversify_our_specialists_desc: "Musíme rozšířit specializaci našich jednotek i mimo oblast horských vojsk. Válka se nevede jen v horách a na kopcích."
 CZE_merge_the_financial_and_state_guard: "Sloučit Finanční stráž a Stráž obrany státu"
 CZE_merge_the_financial_and_state_guard_desc: "Po vytvoření Stráže obrany státu již Finanční stráž není potřebná. Její začlenění do SOS pomůže rychle zvýšit sílu této organizace."
 CZE_merge_the_financial_and_state_guard_tt: "Povolí §YZačleněná Finanční stráž§! \n§Y$military_police$§!: HP: §G+5§!."
 CZE_logistics_beyond_the_sudetes: "Logistika za Sudetami"
 CZE_logistics_beyond_the_sudetes_desc: "Chceme-li vést bojové operace mimo Sudety, musíme se naučit o fungování dálkové logistiky. Je to zcela odlišné od operací v našem domovském prostoru."
 CZE_logistics_beyond_the_sudetes_tt: "Povolí §YZlepšené zásobovací sklady§!\n§Y$logistics_company$§!: Spotřeba zásob: §G-10%§!"
 CZE_expand_the_river_monitor_fleet: "Rozšířit flotilu říčních monitorů"
 CZE_expand_the_river_monitor_fleet_desc: "Naše flotila říčních monitorů je jednou z největších v Evropě a pomáhá armádě při obraně vnitrozemských oblastí. Její rozšíření výrazně zvýší schopnost plnit tento úkol."
 CZE_the_tvp_project: "Projekt TVP"
 CZE_the_tvp_project_desc: "Naše armáda navrhla program Tanku všeobecného použití (TVP) k vývoji domácí konstrukce tanku. Někteří naši výrobci s rozsáhlými zkušenostmi s výrobou tanků již o projekt projevili zájem."
 CZE_expand_the_land_department_of_vtu: "Rozšířit pozemní oddělení VTÚ"
 CZE_expand_the_land_department_of_vtu_desc: "Rozšířením pozemního oddělení Vojenského technického ústavu (VTÚ) získá další vybavení a zkušební prostory, které posílí jeho výzkumné úsilí pro naši budoucí výzbroj."
 CZE_department_two_expansion: "Rozšíření druhého oddělení"
 CZE_department_two_expansion_desc: "Naše zpravodajská složka, druhé oddělení, potřebuje více prostředků, aby nás lépe chránila před nepřátelskými zvědy. To může vést i k rozšíření specializovaných sekcí v rámci služby."
 CZE_military_intelligence: "Oddělení vojenského zpravodajství"
 CZE_military_intelligence_desc: "Vojenské zpravodajství je jedním z nejdůležitějších aspektů zpravodajské služby. Přidělení více prostředků této oblasti přinese značné výhody."
 CZE_air_intelligence: "Oddělení leteckého zpravodajství"
 CZE_air_intelligence_desc: "Znalost počtu letadel v nepřátelském letectvu je klíčovou součástí vítězství ve vzdušné válce. Přesné informace o nepřátelských vzdušných silách jsou zásadní při střetu s nimi."
 CZE_within_the_eagles_nest: "V orlím hnízdě"
 CZE_within_the_eagles_nest_desc: "Mít armádu informátorů a sabotérů hned za našimi hranicemi by bylo pro naši armádu obrovskou výhodou. S pomocí druhého oddělení mohou naše špionážní sítě v těchto oblastech výrazně vyrůst."
 CZE_restart_naval_gun_production: "Obnovit výrobu námořních děl"
 CZE_restart_naval_gun_production_desc: "Škodovy závody bývaly největším konstruktérem a výrobcem námořních děl v Rakousku-Uhersku. Obnovení výroby vytvoří příležitosti k oživení domácího námořního průmyslu."
 CZE_restart_naval_gun_production_tt: "§YPriorita Škoda§! - Námořní zaměření se stane §YAktivní§!"
 CZE_reform_the_naval_detachment: "Reformovat námořní oddíl"
 CZE_reform_the_naval_detachment_desc: "Námořní oddíl byl nedávno rozpuštěn, protože bylo považováno za vhodnější začlenit jej do armády. Nedávné události však ukázaly, že jeho obnovení je nyní nezbytné."
 CZE_build_2_dockyards_when_we_have_coast_tt: "Okamžitě postaví §G2§! §YLoděnice§! v náhodném pobřežním §Ystátě§!, jakmile některý ovládáme."
 CZE_skoda_naval_yards: "Loděnice Škoda"
 CZE_skoda_naval_yards_desc: "Nyní, když jsme znovu získali přístup k moři, můžeme obnovit starý námořní průmysl Rakouska-Uherska s využitím zkušeností, které stále existují v našich hranicích. Rozběhnutí domácích loděnic musí být nejvyšší prioritou."
 CZE_build_3_dockyards_when_we_have_coast_tt: "Okamžitě postaví §G3§! §YLoděnice§! v náhodném pobřežním §Ystátě§!, jakmile některý ovládáme."
 CZE_legacy_of_the_kriegsmarine: "Odkaz Kriegsmarine"
 CZE_legacy_of_the_kriegsmarine_desc: "Protože jsme ještě nedávno pomáhali se stavbou velkých bitevních lodí, schopnost tak činit stále existuje. Navazujeme na odkaz stejných továren, které pomáhaly budovat rakousko-uherské námořnictvo."
 CZE_build_off_old_ganz_danubius_designs: "Navázat na staré návrhy Ganz Danubius"
 CZE_build_off_old_ganz_danubius_designs_desc: "Obnovení návrhů společnosti Ganz Danubius by se mohlo ukázat užitečné při stavbě nových křižníků. Lidé znalí těchto konstrukcí stále žijí v našich hranicích."
 CZE_modernize_trieste_designs: "Modernizovat terstské návrhy"
 CZE_modernize_trieste_designs_desc: "Využitím starých návrhů rakousko-uherského námořnictva pro menší bitevní lodě získáme lepší představu o stavbě této třídy plavidel."
 CZE_leverage_gunboat_experience: "Využít zkušenosti s dělovými čluny"
 CZE_leverage_gunboat_experience_desc: "Naše zkušenosti s konstrukcí dělových člunů lze využít při stavbě torpédoborců. Současná odborná základna pomůže urychlit vývojový proces."
 CZE_revive_kraljevica_designs: "Obnovit návrhy z Kraljevice"
 CZE_revive_kraljevica_designs_desc: "Využitím našich znalostí dělových člunů a studiem starých návrhů z kraljevických loděnic můžeme pro naši zemi obnovit tuto třídu torpédoborců."
 CZE_wolfs_of_bohemia: "Vlci z Čech"
 CZE_wolfs_of_bohemia_desc: "Vzhledem ke zkušenostem s ponorkami, které v našich hranicích stále existují, by nebylo příliš těžké vytvořit vlastní vlčí smečky."
 CZE_raider_lineage: "Dědictví nájezdníků"
 CZE_raider_lineage_desc: "Máme tradici nájezdních operací díky bývalým důstojníkům rakousko-uherského námořnictva. Měli bychom těchto zkušeností využít."
 CZE_a_modern_navy: "Moderní námořnictvo"
 CZE_a_modern_navy_desc: "Nyní, když jsme pokročili v námořních technologiích, můžeme konečně říci, že máme moderní a schopné námořnictvo."
 CZE_build_1_dockyards_when_we_have_coast_tt: "Okamžitě postaví §G1§! §YLoděnici§! v náhodném pobřežním §Ystátě§!, jakmile některý ovládáme."
 CZE_naval_aviation: "Námořní letectví"
 CZE_naval_aviation_desc: "Letadlové lodě a jejich letadla se zdají být budoucností námořní války. Musíme investovat čas do těchto nových oblastí námořního boje."
 CZE_across_the_atlantic: "Přes Atlantik"
 CZE_across_the_atlantic_desc: "Aby bylo námořnictvo účinné, musí být schopné působit i za oceánem. Musíme z našeho námořnictva vytvořit sílu schopnou přesunů na velké vzdálenosti."
 CZE_joint_equipment_designs: "Společné návrhy výzbroje"
 CZE_joint_equipment_designs_desc: "Jak [ROOT.GetNameDef], tak [GER.GetNameDef] stojí v čele vývoje tanků a letadel, každý se svými vlastními specializacemi. Měli bychom sdílet informace, abychom se mohli dál soustředit na to, co umíme nejlépe."
 CZE_negotiate_sphere_of_influence: "Vyjednat sféru vlivu"
 CZE_negotiate_sphere_of_influence_desc: "Je nepopiratelné, že vojenské zdroje, které má [ROOT.GetNameDef], mají pro [GER.GetAdjective] alianci velkou hodnotu. Je jen spravedlivé požadovat výměnou určité územní zisky."
 CZE_set_up_polish_puppet_state: "Zřídit [POL.GetAdjective] loutkový stát na jihu"
 CZE_set_up_polish_puppet_state_desc: "Jelikož má [GER.GetNameDef] zájem vytvořit v Polsku loutkový stát, je zřejmé, že bychom měli usilovat o totéž."
 CZE_prepare_for_exile: "Připravit se na exil"
 CZE_prepare_for_exile_desc: "Stát by měl tajně podporovat snahy našich politických představitelů uprchnout do zahraničí a vytvořit exilovou vládu."
 CZE_joins_government_in_exile_tt: "Připojí se k §Yexilové vládě§!"
 CZE_infiltrate_collaborationist_organizations: "Infiltrovat kolaboranty"
 CZE_administrative_chaos_tt: "Efekt §Ypro říšský komisariát§! po dokončení zaměření §Y$CZE_enter_exile$§!:"
 CZE_infiltrate_collaborationist_organizations_desc: "[ROOT.GetAdjectiveCap] loajální k exilové vládě dosazení do čela kolaborantských organizací může znít zvláštně, ale je to dokonalý způsob, jak je podrývat a zároveň být informováni o jejich činnosti."
 CZE_enter_exile: "Odejít do exilu"
 CZE_enter_exile_desc: "Když nyní potenciální spojenci konečně bojují proti [GER.GetAdjective] krokodýlovi, naše vláda se může připravit a bojovat za návrat naší svrchovanosti."
 CZE_refused_exile: "Odmítl hostit [ROOT.GetName]"
 CZE_contact_the_czech_and_slovak_legion: "Kontaktovat českou a slovenskou legii"
 CZE_contact_the_czech_and_slovak_legion_desc: "Stateční [ROOT.GetAdjective] legionáři uprchli přes [POL.GetNameDef] a [FRA.GetNameDef], aby pokračovali v boji za svobodné [CZE.GetName]. Měli bychom tyto síly kontaktovat a koordinovat je."
 CZE_skoda_priority_shortcut_finder: "Priorita Škoda"
 CZE_skoda_priority_shortcut_finder_desc: "Toto je současná priorita Škody"
 CZE_decision_unlock: "Odemkne rozhodnutí: "
 CZE_demand_regime_change_tt: "$CZE_decision_unlock$§YPožadovat změnu režimu v zemi§!"
 CZE_propose_unification_tt: "$CZE_decision_unlock$§YPozvat zemi do Československého svazu§!"
 CZE_integrate_nation_tt: "$CZE_decision_unlock$§YIntegrovat zemi§!"
 GER_integrate_czech_manufacturers: "Začlenit české výrobce"
 GER_integrate_czech_manufacturers_desc: "Průmysl nacházející se v Čechách je zlatým dolem výrobních zkušeností a průmyslových zdrojů pro naši ekonomiku. Dodatečná průmyslová síla českých výrobců by výrazně posílila náš zbrojní průmysl. Dává dokonalý smysl začlenit je do našich výrobních linek."
 GER_integrate_czech_manufacturers_no_aat_tt: "§GDostupné§! jako §YKonstruktér techniky§!:\n§Y$CZE_skoda_works_german_organization$§!, §Y$CZE_bohmische_mahrische_maschinenfabrik_ag_german_organization$§!, §Y$CZE_zlin_aircraft_organization$§! a §Y$CZE_ceska_zbrojovka_uhersky_brod_organization$§!"
 CZE_unlocks_sokolov_raid_pfot_tt: "Odemkne §YVýsadkový úder§! na §YFalknov§!"
