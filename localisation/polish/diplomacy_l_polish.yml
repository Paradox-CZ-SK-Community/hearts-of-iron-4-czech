l_polish:
 ACTIVE_THREATS: "Aktivní hrozby:"
 AI_MESSAGE_CAT1_MES10: "Fakt je příjemné rozšiřovat svůj lebensraum, co, $OTHER$?"
 AI_MESSAGE_CAT1_MES1: "Dobrá práce, že ses nechal/a anektovat, $OTHER$. Jsme na tebe všichni hrdí."
 AI_MESSAGE_CAT1_MES2: "Ahahaha, $OTHER$ je v téhle hře úplně příšerný."
 AI_MESSAGE_CAT1_MES3: "Nauč se hrát, $OTHER_ADJ$ noobe."
 AI_MESSAGE_CAT1_MES4: "Tak tvrdě jsem $OTHER$ rozdrtil, že mi je ho skoro líto."
 AI_MESSAGE_CAT1_MES5: "Možná je tahle hra na tebe moc hardcore, $OTHER$. Měl bys zkusit nějakou casual hru jako je Europa Universalis."
 AI_MESSAGE_CAT1_MES6: "Vsadím se, že $OTHER$ ani nestrávil 2 hodiny nastavováním své OOB. Amatér!"
 AI_MESSAGE_CAT1_MES7: "Hele, koukni na všechno to $OTHER_ADJ$ území, co teď mám. Asi ho fakt nepotřeboval!"
 AI_MESSAGE_CAT1_MES8: "Hele $OTHER$, nechceš příště třeba i bojovat? Protože jestli jsi to zkoušel, tak to teda vůbec nebylo vidět!"
 AI_MESSAGE_CAT1_MES9: "Proč $OTHER$ brečí? Protože právě dostal naloženo!"
 AI_MESSAGE_CAT2_MES10: "Vzdej se už, $COUNTRY$! Jenom mi zbytečně plýtváš mým časem."
 AI_MESSAGE_CAT2_MES1: "Problitzuju ti ten tvůj krieg, $OTHER$!"
 AI_MESSAGE_CAT2_MES2: "Brzy budou všichni v $OTHER$ mluvit $US_ADJ$ jezykem."
 AI_MESSAGE_CAT2_MES3: "Podívej na toho $OTHER_ADJ$ amatéra, jak se snaží porazit moje nadřazené $US_ADJ$ jednotky. Bylo by to vtipné, kdyby to nebylo tak smutné!"
 AI_MESSAGE_CAT2_MES4: "Tomuhle říkáš válka, $OTHER$? Já tomu říkám procházka."
 AI_MESSAGE_CAT2_MES5: "Jen se ujisti, že ty $OTHER_ADJ$ továrny pořádně naleštíš. Brzy je budu používat já!"
 AI_MESSAGE_CAT2_MES6: "Slyšíš to, $OTHER$? To je zvuk toho, jak tě právě likviduju."
 AI_MESSAGE_CAT2_MES7: "Hele $OTHER$, možná bys nebyl tak v háji, kdybys přestal utíkat a zkusil se fakt bránit."
 AI_MESSAGE_CAT2_MES8: "LOL, koukejte na $COUNTRY$, jak se mě snaží napadnout! To je jak kdyby armádu vedla fretka v kóme!"
 AI_MESSAGE_CAT2_MES9: "Výhled v $COUNTRY$ je touhle dobou roku fakt nádherný. Moje armády si to tu vážně užívají!"
 AI_MESSAGE_CAT3_MES10: "Jo jasně, $OTHER$ mě porazí pouze kvůli RNG. Škoda, že v týhle hře skill vůbec nic neznamená."
 AI_MESSAGE_CAT3_MES1: "$OTHER|U$ je cheater! Není možný, že mě porazil férově!"
 AI_MESSAGE_CAT3_MES2: "Ta hra je tak nevyvážená! Jako obvykle, $OTHER_ADJ$ Space Marines jsou neporazitelní, zatímco $US_ADJ$ jednotky jsou jak mokrej papír."
 AI_MESSAGE_CAT3_MES3: "Heh, jako bych neměl lepší věci na práci než hrát tuhle blbou hru."
 AI_MESSAGE_CAT3_MES4: "$OTHER$ mně nemá šanci porazit, kdyby Paradox nenaprogramoval moje spojence tak blbě, že jsou tupější než dvě tuny žuly, zatímco nepřítel má jasnovidectví!"
 AI_MESSAGE_CAT3_MES5: "ffaSJLgapigjaslgmag s asv lajvlvNASER SI $OTHER$ UŽ S TEBOU NIKDY NEHRAJU!!!1"
 AI_MESSAGE_CAT3_MES6: "gg $OTHER$, příště bys to mohl zkusit udělat aspoň trochu férový, co?"
 AI_MESSAGE_CAT3_MES7: "Wow, ten jeden herní mechanismus mě úplně podělal. Není divu, že jsem prohrál s $OTHER$."
 AI_MESSAGE_CAT3_MES8: "WOW! KDYBY HRANÍ ZA $OTHER$ NEBYLO V POSLEDNÍM PATCHI ÚPLNĚ ROZBITÝ, byla by tahle válka aspoň trochu férová!"
 AI_MESSAGE_CAT3_MES9: "A přesně proto byl Hearts of Iron 3 lepší hra. V HOI3 bylo nemožné, aby mě porazil $OTHER$ takhle trapně :"
